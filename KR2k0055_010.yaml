兩四錢上下壩皮硝厰坐落祿勸州地方年該溢額歸公銀二十兩遇閏加銀一兩六錢六分七釐曲卑撒喇烏皮硝厰坐落祿勸州地方年該溢額歸公銀三兩遇閏加銀二錢五分以上各厰溢額課項雍正六年總督鄂爾泰為酌勻公件等事題報歸公附無額厰課倭鉛厰委官經理卑淅倭鉛厰坐落羅平州地方塊澤倭鉛厰坐落平彞縣地方雍正七年總督鄂爾泰巡撫沈廷正為詳請鉛題明事合疏具題開採雍正八年題報抽收課每年變價四五千兩不等每百斤抽收課鉛十斤無定額龍樹等厰底母餘息雍正八年總督鄂爾泰為底母餘息以充公用事題明將龍樹等厰所出底母賣給各銀銅厰民以供煎煉出底之厰與各厰需底衰旺不一所賣餘息儘收儘解不為定額個舊錫厰錫票稅銀雍正二年總督高其倬於遵旨查奏銅斤利弊案內摺奏明個舊錫厰錫稅錫課外各商販錫出滇九十斤為一塊二十四塊為一合每合例繳稅銀四兩五錢年收稅銀二千七八百三千餘兩不等原無定額銅斤餘息各銅厰於額例抽收外豫發工本收買餘銅各厰每斤三四分以至五六分不等雇腳發運省城賣給官商及加耗運供鼓鑄照定價每百斤九兩二錢核算除歸還銅本運腳厰費等項外所獲餘息儘數歸公但年辦銅斤衰旺不一餘息盈絀不常原無定額白銅餘息媽泰白銅厰并新開大姚縣茂密白銅子厰發紅銅到厰賣給硐民點出白銅每一百一十斤抽收十斤照定價媽泰厰每斤三錢六分茂密厰每斤三錢變價以充正課外所獲餘息儘數歸公但白銅售價遲速不等硐民採煉多寡不一原無定額爐墩小課茂密白銅厰爐多寡不一厰委每爐每日抽白銅二兩六錢六分以資厰費雍正二年查奏銅斤利弊事案內準其於厰費項下開銷此項歸公採煉多寡不一原無定額白龍金叉銅礦箐等厰銀課各銅厰撤出之鉛微有銀氣煎出銀課多寡不一厰委每兩約抽收銀六分一錢不等以資厰費雍正二年查奏銅斤利弊事案內準於厰費開銷此項歸公緣各厰衰旺不一原無定額寨子山等厰石緑礦課各銅厰微出顔色緑礦厰委每一百二十五斤抽二十五斤每百斤變價一兩五錢以資厰費雍正二年查奏銅斤利弊事案內準於厰費內開銷此項歸公緣厰緑衰旺不一原無定額白龍厰石青礦課厰銅夾有顔色青礦厰委每一百斤抽收六斤每斤約變價三錢以資厰費雍正二年查奏銅斤利弊事案內準於厰費內開銷此項歸公緣厰礦衰旺不一原無定額雲南通志卷十一
