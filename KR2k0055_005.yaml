body:
  text: 欽定四庫全書雲南通志卷六城池附關哨津梁郵傳郡縣之有城池所以定民志壯國威蓋勇夫重閉之義易稱設險詩美完城良有以也我世宗憲皇帝令各直省守土諸臣修濬城隍滇處邊徼控制百蠻邇年疆圉式廓桑土綢繆益謹於藩籬捍衛之防或創建或增修金湯稱孔固焉又相其道里衝繁厄塞之區置郵傳以宣達政令限雄關以嚴譏出入通津渡以利濟往來規制亦綦密矣唯在保障得人斯惠威逺被此維屏維翰所以奠鴻基於不拔也歟志城池關哨郵傳津梁附焉雲南府昆明縣附郭雲南府城舊有故址云創自莊蹻至唐蒙氏改築柘東城明洪武十五年重築磚城周九里三分髙二丈九尺二寸設六門上皆有樓大東門曰咸和樓曰殷春小東門曰敷澤樓曰璧光南門曰麗正樓曰近日大西門曰寶成樓曰拓邊小西門曰威逺樓曰康阜北門曰拱辰樓曰眺京居南門西偏者為鐘樓環城有河可通舟楫外有重關跨衢市之隘萬厯四十八年巡按御史潘濬建本朝順治十七年以來凡有頽壞兵題請動支鹽稅修葺康熙二十年因大攻圍吳逆傾圮重修富民縣城舊建天馬山之陽明萬厯間屢遷始定於大河橋北築土城崇禎十三年知縣王孫齊改築磚城周二里髙二丈八本朝康熙十年知縣髙一品增修歲久傾圮雍正年知縣楊體乾重修有池宜良縣城舊為守禦所明洪武二十四年築磚城周四里髙一丈三尺𢎞治十二年都指揮方略重修增本朝裁所歸縣遂為縣城康熙五十年知縣徐琳修繼因地震傾圮雍正九年知縣朱干捐修無池羅次縣城舊無城明天啓間始築土城後圮周本朝康熙二十一年知縣徐吳錦重築二里髙一丈二尺四十八年知縣謝曾祚建城樓雍正六年知縣王忠武重修四圍垣墻無池晉寧州城舊有外城周七里隋刺史梁毗築內城名陽城堡蒙氏築歲久盡圯明成化二十二年知州熊𢎞重築土城𢎞治十二年知州喻敬復即古城址築土墻萬厯三年巡撫王凝檄知州劉儲改築磚城周四里髙一丈八尺明末流寇攻陷雲本朝康熙六年署州王業厚重修三十年知州李龍新建東西南三樓重修北樓有池呈貢縣城漢有舊城久廢宋時大理髙智升遣土官伽宗築土城名伽宗城明洪武十年知縣揭官保遷築三台山之陽仍為土城天啓間知縣周夢祀改築磚城周二里旋經流寇拆毁今存舊址無城池安寧州城舊有守禦所城在今州南明洪武二十四年千户朱夀築後圯萬厯三年知州姚繼先築磚城於今地即以舊北門為南門周五里有竒髙二丈二尺本朝康熙四十一年知州髙鉁重修雍正九年知州楊若椿增修東北依螳螂川為池其二面無池祿豐縣城舊有上城元至正十二年築明萬歷三十五年燬於土賊阿克四十年知縣向兆麟改築磚城周三里髙一丈六尺年本朝康熙九年知縣郭迪階重修四城樓五十一知縣劉自唐增修四圍垜口西倚河東南北新濬池雍正十一年知縣陳齊庶築護城堤昆陽州城舊無城明正德四年州同陳暘始倚月山築土城崇禎七年巡按御史薑思睿守道楊文嶽遷築磚城於長松山前周二里髙一丈八尺旋為流寇屠平仍遷舊治無城池易門縣城明洪武二十四年築磚城周二里三分為本朝康熙七年合邑士民捐修引河水池嵩明州城舊無城明𢎞治九年知州黃澄原始築土城後圯隆慶二年巡撫陳大賓檄知州羅頌改築磚城周三里三分修本朝雍正七年知州安鼎和重無池曲靖府南寧縣附郭曲靖府城明洪武二十年築磚城周六里三分髙三丈設四門東曰樂耕南曰來薰西曰勝峯北曰迎恩增二敵樓於城北明末沙賊流冦先後焚燬本朝康熙二年總督卞三元巡撫袁懋功委員重修五十一年地震復圮總兵楊鯤同府縣官重修隨又傾圮雍正四年巡撫管總督事鄂爾泰總督管巡撫事楊名時修題請照修理省會城垣之例動公項銀委員重新建四城樓無池霑益州城舊為交水縣有城久廢明天啓二年巡撫閔洪學擊參將尹啓易於舊縣北重築磚城周二里八分有竒髙一大九尺年本朝順治十六年遷霑益州治於此康熙五十二地震傾圯雍正八年知州汪無限重修無池陸涼州城舊為陸涼衛明洪武三十一年築磚城周六里髙二丈六尺本朝裁衛歸州移州治於此歲久傾圮雍正七年知州吳恩正重修改建南城樓於西南隅十二年知州吳柄增修無池馬龍州城舊有土城明萬歷三十九年知州張鑑改築磚城周三里九分髙二丈有竒本朝康熙五十二年地震傾圮雍正三年知州黃士傑重修新建四城樓無池羅平州城舊有土城明萬厯十五年署知州黃宇改築磚城周二里五分髙一丈八尺本朝康熙四年知州王鴻勳重修三十八年知州張含章重建城樓四圍皆引河水為池尋甸州城舊為府明成化十五年知府屈伸築土城在今州北一里嘉靖六年為土酋安銓所破十二年知府劉秉仁遷於今地築磚城周三里髙一丈九尺本朝康熙八年改為州即為州城三十一年知州黃肇新重建東北二城樓五十二年地震女墻盡圯知州李月枝重修東西二面引澗水為池南北無池平彝縣城舊為平彝衛明𢎞治七年自厄勒村移衛於此築磚城周二里有竒髙一丈二尺天啓二年為賊所焚三年巡撫閔洪學檄參將袁善重修本朝康熙三十五年改設縣治三十八年知縣任中宜重修四城樓無池宣威州城舊為霑益州明洪武十六年築土城永樂元年改築石城周三里三分髙二丈本朝順治十六年移霑益州治於交水此城為尋霑營遊擊駐防後漸傾圮康熙四十年遊擊俞懋德重建四城樓雍正五年設宣威州治無池臨安府建水州附郭臨安府城舊有土城明洪武二十年宣寧侯金朝興檄指揮萬中拓地改築磚城周六里髙二丈七尺設四門東曰迎暉南曰阜安西曰清逺北曰永貞東南為鐘樓成化十六年兵備道何純重修後經流寇拆毁重本朝康熙四年知府曹得爵七年知州李澦先後修並鐘鼓樓西樓南樓及炮臺十座雍正五年總兵楊天縱知府栗爾璋知州祝宏增修十三年知府石去浮增修城樓由東北及西南有池正東及東南無池石屏州城舊無城明成化十六年知州蔣彝因民居設四門嘉靖三十年始築土城周四里三分萬厯二十四年知州蕭廷對因舊城重修東南兩門天啓五年攝州事通判顧慶恩州人左江道副使陳鑑改築磚城三本朝康熙六年知州劉維世重建四樓歲久傾圮十二年知州徐印祖重修雍正四年知州龍為霖修葺四圍城墻並東西北三門城樓有池阿迷州城舊無城明正統間知州張安始築土城嘉靖四年分巡道傅尚文拓築萬厯四十五年巡按御史吳應琦改築石城周三里後因流寇拆毁本朝康熙九年知州王民皥重修雍正八年知州毛振翧增修城樓垜口無池寧州城州治舊在浪廣元至正間遷今地明嘉靖十一年築土城崇禎十三年分守道程楷改築磚城周三里三分髙一丈五尺無本朝康熙十一年知州嚴敬重修池通海縣城舊為守禦所明洪武十五年指揮陳鏞築土城二十四年指揮儲傑改築磚城周二里髙一丈七尺十本朝康熙八年裁所歸縣遂移縣治於此五六年知縣髙鍈重修有池河西縣城舊有城在螺髻山下今縣南三里明成化間知縣朱光正遷今地因民居設南北二樓無垣墻萬厯四十年築土城崇禎六年署知縣周莫儀改築石城周二里三分髙丈餘無池嶍峨縣城舊有城在今縣東北二里明正德六年知縣胡淮遷今地築土城嘉靖三十二年知縣邵元善建四樓崇禎三年改築磚城周一里三分髙一丈二尺歲久城樓盡圯本朝雍正七年署知縣蔣斆淳重建四樓無池蒙自縣城舊無城明成化二十年縣丞陳溥始築土城歲久傾圮萬厯四十三年邑人鹽運使尹廷俊捐資改築石城周四里三分髙一丈七尺有竒本朝雍正八年知縣王廷諍重修無池澄江府河陽縣附郭澄江府城舊建於繡毬山上明正德十三年知府童璽遷金蓮山麓築土城嘉靖二十年知府周朝俯復遷舊址隆慶五年知府徐可久始遷舞鳯山麓築磚城周五里三分髙一丈九尺設四門歲久漸圯知本朝康熙五十一年知縣李丕垣重修乾隆元年府來謙鳴修建四門鼓樓並垜口一百八十一座舊有池江川縣城舊有土城在今縣南四里明崇禎七年巡按薑思睿遷於舊江川驛檄知縣王惠卿築磚城周一里三分髙一丈二尺有本朝康熙五十六年知縣張鍾重修池新興州城舊無城明正德二年知府何子竒始築土城萬歷六年知州張于京改築磚城周三里有竒髙二丈四尺後漸傾圯垜本朝康熙四十七年知州任中宜重修增口有池路南州城舊無城明成化間知州魯厚始於通衢建敵樓四座𢎞治間知州龔浩因樓以築土城後圯隆慶六年知州易龍見重築周二里有竒髙一丈一尺萬厯四十八年知州馬鳴陽重修本朝雍正七年知州楊化元增修十一年知府來謙鳴重修完固有池武定府和曲州附郭武定府城舊為土司治有城在五鳯山之東明嘉靖間改土設流隆慶四年巡撫陳大賓巡按劉翾檄知府劉宗寅遷於獅山之麓築石城周四里三分髙二丈設四門東曰迎曦南曰阜民西曰靖逺北曰德潤崇禎間知府盧懋鼎重修正本朝康熙二十七年知府王清賢增修四城樓雍七年水壞城垣百餘丈知府朱源淳知州徐修仁重修無池元謀縣城舊無城明萬厯三十二年知縣于文蔚始築土城天啓二年知縣齊以政改築磚城周一里三分髙一丈八尺十本朝康熙十一年知縣李旭白建南北二城樓五二年地震傾圮知縣王𢎞任重修無池祿勸州城明初改土設流築土城後圮萬厯七年知州何守拙重築周一里有竒本朝康熙三十九年知州孟以恂修東城樓五十二年知州石得恆修南北二城樓雍正八年知州張坦重修四圍垣牆無池廣西府廣西府城舊為土司治無城明成化十四年改土設流知府賀勳始築土城隆慶五年知府戴時雍改築磚城周四里有竒髙一丈八尺設四門東曰拱化南曰清波西曰獻瑞北曰擁祥明末沙賊焚燬焉本朝康熙三年知府萬裕祚同屬州重修且加髙二十四年知府髙起龍增修三十一年地震傾圮雍正八年知府周埰重修四圍垣牆二百餘丈並東西南三門城樓無池師宗州城舊有土城明萬厯二十八年知州夏久安重修四十年知州袁國藩拓築崇禎七年改築石城周二里三分明末沙賊拆毁垜本朝康熙十三年知州韓維一因舊址壘石立口無池彌勒州城舊為八甸村無城明𢎞治三年州同梁伋始築土城隆慶六年知州楊階拓築崇禎七年知州魏起龍改築石城周二里三分髙二丈十五年知州趙焯改築北門四丈拓五步本朝康熙五十四年知州吳永緒重修雍正十一年知州張景澍增建城樓垜牆無池邱北城舊為維摩州地同本朝雍正九年設師宗州同分駐十年州王緯卜築土城於舊州南十五里之歹馬坡無池廣南府廣南府城舊有城久廢明洪武十九年建棑柵周四里西南設二門本朝雍正十年巡撫張允隨委員估勘建築磚城周四里九分髙一丈六尺八寸有池土富州城舊無城建本朝雍正十年巡撫張允隨委員估勘築磚城周三里四分髙一丈六尺八寸東北無池西南以大溪為池元江府元江府城元大德間那中築土城周九里髙二丈壘石為四門本朝順治十六年大兵因收復焚燬十八年改土設流知府劉勇副將王君瑞重修雍正七年改築磚城設四門東曰霞蔚南曰匯江西曰寶曜北曰望龍樓櫓悉備又設來青文利民三便門十三年知府胡承璘補築城基無池新平縣城舊為平甸鄉無城明萬厯十九年知縣李先芬始築土城在今縣西五里崇禎七年知縣秦元惠遷今地築石城周一里九分髙一丈八尺本朝康熙三十七