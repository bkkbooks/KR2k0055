body:
  text: 欽定四庫全書雲南通志卷九户口為國之要在乎得民富教之加因乎既庶故周禮司民掌萬民之版獻之天府王拜而受之重邦本也滇處邊徼䝉段以前雖有十瞼六節度之設民數迄無可考元明始按籍稽之而軍屯漢夷登耗不常我國家重熙累洽薄海内外咸登袵席編户殷繁聖祖仁皇帝詔自康熈五十二年滋生户口永不加賦曠典為從來未有世宗憲皇帝御極以來殊方向化滇南諸郡登版籍者較前增三分之一豈非深仁厚澤醇氣蒸濡之所致歟今聖人繼體教養益隆凡屬邊陲莫不食徳飲和歌詠盛世自兹生聚教訓俾樸者安於畎畝秀者澤以詩書長保此庶則良司牧之責也志戸口元以前無考明洪武二十六年雲南布政司人户五萬九千五百七十六户人口二十五萬九千二百七十口𢎞治四年人户一萬五千九百五十戸人口一十二萬五千九百五十五口十五年人戸一十二萬六千八百七十四戸人口一百四十一萬九十四口嘉靖二十一年人戸一十二萬三千五百三十七户人口一百四十三萬一千一十七口萬厯六年人戸一十三萬五千五百六十戸人口一百四十七萬六千六百九十二口本朝順治十八年人丁一十一萬七千五百八十二丁康熈二十四年人丁一十五萬八千五百五十七丁屯丁二萬九百八十三丁五十年編審清出共民賦人丁一十四萬五千二百四十丁屯賦軍舎土丁三萬八千二百七十七丁五十二年奉詔海宇承平日久户口繁滋嗣後編審人丁但據康熈五十年丁冊定為常額續生人丁永不加賦經户部議覆後遇編審將新増人丁實數造盛世滋生戸口冊奏聞雍正二年巡撫楊名時奏准民丁銀攤入通省民賦田地輸納軍丁銀查出無主影射田地糧條撥抵麗江改土歸流增夷丁二千三百四十四丁三年總督高其倬巡撫楊名時題准永免嵩明太和鄧川浪穹鶴慶騰越等府州縣應徴土軍丁九百五丁銀兩七年橄欖壩平招撫安挿夷民一萬二千三百餘户八年藤條江外三猛邊界猛弄寨長白氏以所屬寨民一百九十戸永附版圖九年威遠同知清出三圈蠻令等村丁銀雲南布政司雍正九年分編審通省共實在定額民賦人丁一十四萬七千五百八十四丁各編不一額徴銀二萬九千五百二十五兩八錢三分屯賦軍舎土丁三萬八千二百七十七丁各編不一額徴銀一萬二千二百九十八兩一錢九分四釐七毫四絲八忽七微四纎五塵六𣺌五漠盛世滋生人丁雍正九年共實在民賦滋生人丁四萬一千三百三十六丁屯賦滋生軍舎土丁一萬七百六十四丁雲南府雍正九年分編審清出民丁除頂補老故外共一萬七千九百六十一丁各編不一額徴銀五千三百四兩八錢四分攤入通省民賦田地輸納原額民丁一萬六千七百一十丁額徴銀四千九百七十六兩五錢五分康熙二十五年編審清出人丁二百四十七丁應徴銀四十三兩三錢八分又額外增出沐莊人丁六百六十八丁應徴銀二百七兩九錢七分自康熈三十年起至五十年止五次編審清出人丁共三百三十六丁應徴銀七十六兩九錢四分以上原額新增共人丁一萬七千九百六十一丁共應徴銀五千三百四兩八錢四分雍正九年分編審清出軍舎土丁除頂補老故外共八千八百三十三丁各編不一内除查出影射田地糧條撥抵丁銀外現徴軍丁銀二千四百六十三兩九錢三分九釐四毫一絲七忽九微九纎二塵六𣺌康熈七年裁安寜易門宜良三所歸併州縣原額軍舎人丁共一千八百六十五丁應徴丁銀六百五十七兩二錢二十六年裁左右中前後廣六衛楊林木宻鳳梧三所歸併州縣原額軍舎土軍人丁共六千八百七十五丁應徴丁銀二千五百三十六兩三錢四分内就近歸併武定府屬武定所右後二衞軍舎土丁一百二十八丁應徴銀四十六兩五錢六分又撥歸武定府屬前衞土軍一丁該除銀五錢自康熈三十年至五十年五次編審清出軍舎土丁八十七丁應徴銀二十八兩七錢二分雍正三年百題准將嵩明州土軍丁一百二十一丁該銀一二十一兩永行豁免實在軍丁八千八百三十三丁應徴銀三千一百四十七兩三錢二分於雍正四五六七八等年查出影射民屯田地科徴糧條抵作丁銀六百八十三兩三錢八分五毫八絲二忽七塵四𣺌仍應徴銀二千四百六十三兩九錢三分九釐𣺌四毫一絲七忽九纎二塵六附盛世滋生人丁雍正九年分民丁共五千五百四十七丁康熈五十五年編審清出滋生三千二百二十二丁六十年編審清出滋生六百六十七丁雍正四年編審清出滋生一千二十七丁九年編審清出滋生六百三十一丁雍正九年分軍舎人丁共二千三百七十七丁康熈五十五年編審清出滋生一千五百四十五丁六十年編審清出滋生二百九十一丁雍正四年編審清出滋生三百九丁九年編審清出滋生三百三十二丁曲靖府雍正九年分編審清出民丁除頂補老故外共八千七百六十三丁各編不一額徴銀一千六百九十三兩六錢九分攤入通省民賦田地輸納原額人丁八千四百六丁額徴銀一千六百三十一兩九錢康熙二十五年編審清出人丁一十二丁應徴銀一兩六錢六分又額外増出沐莊人丁二百五十五丁應徴銀四十五兩七分自康熙三十年起至五十年止五次編審清出人丁九十丁應徴銀十五兩六分以上原額新增共人丁八千七百六十三丁共應徴銀一千六百九十三兩六錢九分雍正九年分編審清出軍舎人丁除頂補老故外共六千三百八十九丁各編不一内除查出影射田地糧條撥抵丁銀外現徴軍丁銀二千六百兩四錢五分二釐七毫四絲七忽七㣲六塵五𣺌二漠康熈七年裁越州曲靖陸涼三衛定雄所歸併府州縣原額軍舎人丁共五千六十三丁應徴銀二千二百一十六兩一錢四分二十五年編審清出人丁一百一十二丁應徴銀五十八兩六錢二分二十六年裁左前平彜三衛木宻馬龍二所歸併州縣原額軍舎人丁共一千一百五丁應徴銀四百七十六兩七錢六分二十五年編審清出人丁二十丁應徴銀七兩四錢自康熙三十年至五十年五次編審清出人丁八十九丁應徴銀二十六兩一錢二分以上原額新增共軍丁六千三百八十九丁共應徴銀二千七百八十五兩四分内除豁免南寜平彜太監伍那漢秦廷芳丁銀九錢又雍正五六兩年查出影射民屯田地科徴糧條抵作丁銀一百八十三兩六錢八分七釐二毫五絲二忽二微九纎三塵四𣺌八漠仍應徴丁銀二千六百兩四錢五分二釐七毫四絲七忽七微六塵五𣺌二漠附盛世滋生人丁雍正九年分民丁共二千四百四十九丁康熈五十五年編審清出滋生一千五百九十九丁六十年編審清出滋生三百二十一丁雍正四年編審清出滋生三百三十六丁九年編審清出滋生一百九十三丁雍正九年分軍舎人丁共一千五百一丁康熙五十五年編審清出滋生八百三十六丁六十年編審清出滋生一百七十一丁雍正四年編審清出滋生二百五十四丁九年編審清出滋生二百四十丁臨安府雍正九年編審清出民丁除頂補老故外共一萬四千九百六十七丁各編不一額徴銀四千二百一十八兩二錢六分攤入通省民賦田地輸納原額人丁一萬四千三百九十丁額徴銀四千七十七兩三分康熈二十五年編審額外增出沐莊人丁三百七十八丁應徴銀一百三兩四錢六分自康熈三十年至五十年五次編審清出人丁一百九十九丁應徴銀三十七兩七錢七分以上原額新增共人丁一萬四千九百六十七丁共應徴銀四千二百一十八兩二錢六分雍正九年分編審清出軍舎人丁除頂補老故外共四千九百四十七丁各編不一内除查出影射田地糧條撥抵丁銀外實徴軍丁銀九百八十二兩八分五釐四毫二絲五忽二微五纎三塵七𣺌九漠康熈七年裁臨安衞通海禦歸併州縣原額軍舎人丁四千四百一十丁應徴銀二千二百四兩六分二十六年裁左前廣後四衞新安所歸併州縣原額軍舎人丁四百六十九丁應徴銀一百七十六兩七錢八分二十五年編審清出軍丁五丁應徴銀一兩八錢自康熈三十年至五十年五次編審清出人丁一十三丁應徴銀十八兩二錢四分以上原額新增共軍丁四千九百四十七丁共應徴銀二千四百兩八錢八分於雍正五六兩年查出影射民屯田地科徴糧條抵作丁銀一千四百一十八兩七錢九分四釐五毫七絲四忽七微四纎六塵二𣺌一漠仍應徴丁銀九百八十二兩八分五釐四毫二絲五忽二微五纎三塵七𣺌九漠附盛世滋生人丁雍正九年分民丁共四千五百四十三丁康熈五十五年編審清出滋生三千三十六丁六十年編審清出滋生六百一十五丁雍正四年編審清出滋生五百八十八丁九年編審清出滋生三百四丁雍正九年分軍舎人丁共一千五百二十一丁康熈五十五年編審清出滋生一千三十六丁六十年編審清出滋生二百一十六丁雍正四年編審清出滋生一百三十五丁九年編審清出滋生一百一十四丁澂江府雍正九年分編審清出民丁除頂補老故外共五千一十七丁各編不一額徴銀一千六百五兩攤入通省民賦田地輸納原額人丁四千八百三十八丁額徴銀一千五百五十四兩五錢七分康熙二十五年編審額外增出沐莊人丁一百二十四丁應徴銀三十六兩八錢二分自康熈三十年至五十年五次編審清出人丁共五十五丁應徴銀一十三兩六錢一分以上原額新增共人丁五千一十七丁共應徴銀一千六百五兩雍正九年分編審清出軍舎土軍人丁除頂補老故外共二千三百八十六丁各編不一内除查出影射田地糧條撥抵丁銀外實徴軍丁銀一千一百九十八兩五分七釐七毫一絲九忽六微二纎七𣺌二漠康熈二十六年裁左右中前後廣六衞歸併州縣原額軍舎土軍人丁共三千三百五十一丁應徴銀一千二百九兩三錢六分自康熈三十年至五十年五次編審清出人丁三十五丁應徴銀十兩零二分以上原額新増共軍丁三千三百八十六丁共應徴銀一千二百一十九兩三錢八分於雍正七年查出影射民屯田地科徴糧條抵作丁銀二十一兩三錢二分二釐二毫八絲三㣲七纎九塵二𣺌八漠仍應徴銀一千一百九十八兩五分七釐七毫一絲九忽六㣲二纎七𣺌二漠附盛世滋生人丁雍正九年分民丁共一千五百三十五丁康熈五十五年編審清出滋生一千一十九丁六十年編審清出滋生二百六丁雍正四年編審清出滋生一百四十四丁九年編審清出滋生一百七十四丁雍正九年分軍舎人丁共一千六十八丁康熈五十五年編審清出滋生六百五十一丁六十年編審清出滋生一百四十八丁雍正四年編審清出滋生一百一十七丁九年編審清出滋生一百五十二丁武定府雍正九年分編審清出民丁除頂補老故外共三百九十九丁各編不一額徴銀九十三兩六錢七分攤入通省民賦田地輸納原額人丁三百五十丁額徴銀八十一兩八錢康熈二十五年編審清出人丁九丁應徴銀二兩二分又額外増出沐莊人丁二十一丁應徴銀四兩八錢八分自康熈三十年至五十年五次編審清出人丁共十九丁應徴銀四兩九錢七分以上原額新增共人丁三百九十九丁共應徴銀九十三兩六錢七分雍正九年分編審清出軍舎土軍人丁除頂補老故外共二百三十一丁各編不一實徴軍丁銀九十二兩五錢八分康熈七年裁武定所歸併州縣原額軍舎人丁二百二丁應徴銀八十五兩一錢八分康熙二十六年裁右後二衞併州原額軍舎人丁一百五十六丁應徴銀五十三兩四錢六分共原額軍舎人丁三百五十八丁應徴銀