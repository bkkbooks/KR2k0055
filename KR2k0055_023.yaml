body:
  text: 雲南通志卷二十三流寓滇雲萬里難逾蜀道躡履而至者鮮矣然自漢唐以來賢士大夫或宦遊而買支遁之山或避地而築少陵之室清風髙躅有足挹者若夫晦迹從亡批鱗遣戍精誠所貫薄日月而感風雷稽彼芳踪頑廉懦立不且與蒼山滇海竝垂不朽乎其他騷人羈客如雍陶賈島輩大雅不羣逺投蠻徼亦空谷足音也志流寓雲南府漢蘇文達籍貫未詳東漢建武丙辰從伏波南征交址事平瘴疾發不能歸及愈遂為散人遨遊山水明帝永平戊午來滇至新羅邑即今安寧與郡主阿樹羅為友歿樹羅立廟祀之相傳安寧溫泉乃其所開云唐賈餘絢蜀人善屬文尤長於書寓雲南西爨王碑其手書也閭邱均成都人與陳子昻杜審言齊名武后時官博士尋罷後從唐九徴為管記南中碑碣多出其手西爨王碑暨河東州刺史王仁求碑其撰文也有臨水亭詩載藝文志賈島字閬仙范陽人能詩寓雲南有送雍陶入蜀詩載藝文志雍陶成都人寓昆明有送裴璋還蜀詩載藝文志明劉謹山陰人洪武中父戍雲南兄又以督運死京師謹六嵗問家人曰雲南在何方家人以西南指之輒朝夕向西南遙拜年十四瞿然曰雲南雖萬里天下豈有無父之子哉治裝尋父歷六月抵雲南艱辛萬狀遇父於逆旅相持號慟俄而父患瘋痺欲以身代戍而國法戍邊者惟十六以上嫡長男始得更替於是復歸攜伯兄子往而兄子亦尚孱不得代又復歸悉鬻家資以往蓋三往返雲南始得歸其父焉王紳字仲縉義烏人贈學士禕之子也宋濂一見奇之曰華川有子矣蜀王聘之教授蜀郡紳痛父奉使死難遺骼未返邱隴白王走雲南慟哭行求奠酒於死所仰天一號幾絶滇人感愴稱王孝子建文即位召為國子博士修太祖實録因上言父死節狀贈禕官賜諡文節後改諡忠文明文臣有諡自禕始唐循仲浙江淳安人長於詩洪武中父宗喜戍滇未行卒兄凱仲例當代戍循仲憫兄無倚願與偕行居數載兄以疾終循仲竟哀痛而歿人皆悲之樓璉金華人以明經歷官藍田縣知縣廣東道御史洪武間謫戍雲南後詔還有居夷集平顯字仲微杭州人洪武間應孝弟力田為廣西藤縣令降主簿尋謫戍於滇博學能文西平侯沐英請於朝除伍籍為墩賓著有松雨軒集費良弼吳興人洪武初以蘇州太守謫戍來滇每旦擐甲執殳登陴風雨罔懈西平侯沐春禮遇之為建庖室於城鋪之側以幼軍一人置爨忽數日堅卧不起西平遣人候其疾弼曰疾痛則無宫車已晏駕矣後十餘日哀詔果至蓋夙精天象也初崇正門在西南直下羊市街弼言其不利因改闢於東尋召為博士冦鼎字良用偃師人年十二能詩隨父比部郎克仁戍滇後以文學舉郡庠博士不就著有池蛙餘響啓䝉韻略逯昶字光古懷慶人洪武初戍滇通經術能詩賦著有方外集陳謙字以遜蘇州人寓昆明别號禾齊能詩有禾齊集蘇珵號信菴池州人寓昆明能詩有信菴集董菩字德善號蒲石生鄞縣人寓昆明能詩著蒲石集劉有年字大行沅州人洪武中以明經薦拜監察御史尋辭職養母忤㫖罰輸通州站役檢閲儀禮逸經十八篇上之命付史館建文中起知太平府有治聲北平師至有年不迎安置昆明與王忠文子紳道義相許黔國知其賢遣子就學常有寓軒詩曰乾坤間氣中物各有所寓俯仰觀宇宙萬物森然具鴻鴈翔朔南蜉蝣寄朝暮軒居悟深情於焉幾居處嘯傲心獨明其中得真趣後交址平起擢按察司僉事卒於官鄭旭字景初閩縣人洪武十一年以學行薦為國子堂儀上幸太學親選才德兼備者十人以傅太子旭居第二後以蜚語謫雲南建文時起高安學竹訓導卒旭精心經學著有詩經總㫖初學提綱咏稿等書朱琳字士林泰興人洪武間以詩纍安置雲南李儼字民望籍貫未詳永樂間湖廣僉事以忤㫖戍滇寓晉寧為人剛正里有爭悉質之卒以客終耿琦字慎安鳳陽人太學生明初泗國公耿再成孫都督耿忠子正統間遊於滇卜居晉寧雅好詩書不樂仕進卒葬州東萬松山黔國公為置墓田碑記子孫世居於州王曇字夢雲號藝窗山陰人博學通經史尤工於詩正統間代父從軍雲南人延為孰師教誨里閈子弟皆知向學著有藝窗吟稿劉福成字以德别號元崖山人浙江開化人善風角推步正統初從王驥征麓川再從侯璡征貴州多所贊畫冦平豫之官不受附籍宜良年八十餘卒黃良卿字廷正號硐山江西撫州人博學能詩嘉靖間遊宜良鄉人延為師一時士大夫多出其門陳振琦號二韓黃巖人博洽能詩尤精鍾繇書法結社為文一時風雅宗之崇禎末年任安寧州守後棄官居宜良今鳳山之原有二韓先生墓鄧凱江西吉安人明末舊臣後祝髮為僧寓居昆陽州守童復晊為結庵於暘光寺後以詩自娛時或狂嘯痛哭居數年還籍曲靖府明彭綱籍貫未詳𢎞治間以翰林謫戍曲靖有才名郡中學者師事之多所成就諸葛元聲不知何許人萬厯間𨼆名為諸昌貞至郡以賣筆為業一日見郡中諸生㑹課閲其藝曰諸公文固佳但題㫖尚未透徹援筆改正數藝羣相推服因請入書院教授生徒所著有咏水集五經闡藴詩雅詞林等集後與弟元敬歸故鄉熊周字六有江西臨川人淹貫經史兼工書畫萬厯間遊學至陸凉州人士從受業者為文皆有法度可觀由是生徒日衆遂家焉提學范允臨見其文奇之有學冠全滇質非凡品之目吳侯江南江寧人明光祿寺卿棄官遊滇寓居羅平大灑馬邑為人端方高潔著有紛游草惟暉堂等集王有詔字世綸蜀人明末隨父宦黔中因流冦陷蜀舉家被害寓宣威讀書談道性情和藹年九十餘雖盛暑必整衣冠能作小楷如米粒大勻淨端莊森然可法人稱有古君子風潘昌字燕如號裕庵浙江山陰人博學能文尤長於詩弱冠挾策入都不遇放懷山水到處輒有題咏明末寓宣威與郡刺史王鼎鉉相友善郡人士學詩詞者皆師事之著有方城草滇南草數十卷臨安府明王奎字景常松陽人洪武初任懷逺教諭纍擢山西右參政以事謫戍臨安博洽多才詩文高古滇士多從之遊後召還修高廟實録遷翰林侍讀永樂間升學士有南詔玉堂稿韓宜可字伯時山陰人洪武間山西布政同王奎謫戍臨安行誼純篤能詩文一時士大夫多尊禮之使子弟受學後升都御史臨安立二賢祠以祀王文德山西文水人由進士洪武間除岷府長史王不法遂棄官遊滇家於河西解守江南句容人為諸生有文名洪武二年選為邑訓導被誣謫戍河西洪武三十二年以軍中通經儒士召入翰林除江西袁州府訓導欲大用㑹北平兵至以建文舊臣仍發戍所𨼆居教授邑士多出其門常升懷逺人開平王遇春次子襲封開國公以抗北平師安置臨安尋以憂死常繼祖升子永樂間安置臨安攜其祖像以隨尋召至京賜鈔幣遣歸生子寧寧生復𢎞治五年録功臣後曰常遇春佐皇祖定天下有大功今其子孫降在氓𨽻朕甚不忍其加恩承祀乃以復為南京錦衣衛指揮使嘉靖間又封升裔孫元振為懷逺侯李灝字仲和臨川人天順間入滇至石屏與學正王驥詩文倡和給事中羅晟敬禮之趙友能籍貫未詳官御史以事謫通海結獨秀軒於秀山古松下王奎有記楊明哲清江人孝廉成化間由四川丹稜教諭左遷石屏河泊所益肆力於文諸生執經問字屨常滿焉所著有述古集閻閎山東臨清人嘉靖初吏科給事中謫䝉自縣丞寓建水作正已堂記後召還閎在臨安探巖穴之勝今有山洞即以閻名尹革河南人嘉靖間任兵科給事中時楊慎以議禮謫戍革上疏諌亦被斥為太和縣丞因寓䝉自遂家焉趙雪濤江西人多技能先世宦滇因遇變流落臨安隱於市計所得足一日費即閉門賦詩書學董其昌甚工後遊雞足山莫知所終劉孝思字維則湖廣攸縣人能詩明末入滇至石屏州牧聞其賢館焉抱疾自知不起取所著詩文盡焚之衆窆於南壇之陽吳鼎江南人官禮部因流冦之變託跡緇衣歷覽名勝寓居㠄峩著作甚富畢山人初不言其生平明末遊至石屏愛異龍湖島遂寓焉常為人相地有奇驗一日危坐語人曰豫逝矣㨂書籍詩草焚之尚遺有手鈔陰符南華諸書今州西有畢山人墓黃河清號陸終子湖廣江夏人因流冦阻於滇初寓臨安東門市後慕石屏山水之勝遂往棲焉精易學星算尤長於詩多感慨激烈之致卒葬州西黑龍坡澄江府元伊喇䝉古人官右丞遊滇至澄江愛華藏寺山水遂卜居其地以詩書自娛足不履城市卒葬於寺之半山明張澥河汾人元末舉進士授迪功郎洪武中因事南遷寓於澄江以文學名王昭字仲彰贑縣人官陜西監察御史洪武間以言事謫戍河陽教授生徒多所成就李彥和長興人洪武間謫戍於澄能詩文邑人士多從受學李恂彥和子工詞翰𨼆居教授士林重之劉茝字文季四川富順人明翰林寓居河陽工詩文風流豪放鄉士大夫多從之遊著有愛蓮軒集萍滇信筆本朝陳文偉江西舉人流寓路南有學識尤精於易學者各得其𫝊武定府明程濟績溪人建文時官編修精邵子先天之學北平兵入帝落髮從水關出濟易服為道人隨帝至滇未幾遍遊蜀粵吳楚而往來嘗住武定獅山濟委曲翼衛歷四十載供給使令聽順無忤嘗奉命述從亡𫝊藏之山巖名從亡隨筆正統間從帝還京入大內乃嘆曰今日方終臣職矣復還滇焚庵散徒今獅山有建文祠與像並祀從亡諸公郭節連州人建文帝舊臣也帝出亡節變姓名號雪舫和尚因尋帝至滇常振衣千仞出袖中一册朗誦不知何書見人至仍貯袖中避他處每登獅山盤陀石上亦取袖中册讀之去來或經年後不知所往黃直常州人纍官侍中改按察使建文帝出亡直遁遊䕫慶間永樂七年入滇訪帝偶遇馮㴶於市一見愕然相持入山哭語移日且言此後無復相見至十年復入滇與㴶㑹同還病於途帝自衡山歸見之馮㴶黃巖人官刑部司務永樂元年從建文帝出亡至滇止永嘉寺變姓名稱馬二子或馬翁或塞馬先生尋奉命去十年復至滇時帝先出遊衡山訪㴶㴶不遇題詩寺壁云夜夢何奇特龍飛天漢津朝回滄海曲夕過滇池濱光雯皆五色蜿蜒無損鱗淵田變化間張主藉高旻比見黃直來相持哭密語竟日即剷詩去帝聞㴶至滇亦還於途間蕭寺廡下見二病者即㴶與直也俄俱死葬於寺東帝題其石曰兩忠之墓葉希賢松陽人楊應能杞縣人建文時葉官御史楊官吳王府教授建文帝將出亡發高帝遺篋有僧牒衣具三帝與葉楊遂分牒祝髮為僧帝名應文葉名應賢楊仍名應能葉楊與程濟等終始隨帝備歷諸險以永樂元年至滇永嘉寺後徙居永昌白龍庵帝與程濟東行留二人守庵及帝還庵為有司所毁葉楊等遂從帝遊浪穹構茅庵於赤壁山下程濟筮之得剝之坤濟曰剝盡而順吉也然龍戰之詞有凶永樂十年三月楊卒四月葉卒並瘞庵東程亨澤州人檢討建文從亡臣同入滇省焦雲籍貫未詳永樂六年同黃直至滇七年從建文帝東行史仲彬吳江人為徐王府賓初建文帝出亡曰吾今往滇南依西平侯彬曰不若且止於是至吳江主彬家兩閲月由襄陽廖平家乃抵滇時永樂元年正月也二年帝復至彬家留三日制衣履而去八年彬偕程亨郭節來滇尋帝各獻方物十五年彬復赴滇遇帝於大喜庵二十二年彬來滇訪帝相值旅舍因同至彬家宣德九年帝以㑹稽之遊至吳江時彬已死帝慰勞其子悲悼久之謝秉鉉字石生浙江山陰人明末守武定勇於為民不避權貴解官後貧不能歸武民愛戴迎居和曲西村後卜居祿勸念多村因家焉尋卒元謀令馬之鵬為立墓表元江府明周官江西人美手儀能詩工草書性剛直敢言明末棄官遊滇從臨安入元江一時士人多所請正後卒於郡本朝鄧魁春號梅菴江西撫州人學問綜博能讀百氏書尤工制舉業順治元年遊學至元江教授生徒宏奬後進郡中人士多所成就大理府唐杜光庭青城人寓滇以文章教䝉氏嘗書䝉詔德化碑精妙有法卒䝉學士爨泰葬之於玉局峯麓其子死葬騰衝龍鳳山清平官張羅匹並為立廟按宋居白幸蜀記光庭杜陵人遊成都𨼆青城山年八十五卒於蜀苐舊志載光庭卒葬又實有據並存其說以備參考鄭回籍貫未詳西瀘令為南詔所獲尊以師禮使教其子弟後說南詔歸唐明汝南王有勳周王橚次子永樂中封汝南王得罪於父文皇遣至雲南居大理能詩文所著有無為寺記鄒衢湖廣興國人永樂初任鶴慶府經歷廉介不茍秩滿不能歸寓於趙州子孫蕃衍世有科第穆孔昭不知何許人天順間寓居浪穹善吟咏逢人輒教以孝弟所居不蔽風雨非力不食作竹枝詞寓化導鄉俗之意謝廷菃號古溪四川富順人嘉靖間吏科給事中言事謫太和縣尉以風節稱許鴻字子羽福建人明末宦滇後因兵亂卜居太和之古生能詩興至輒攜一觴於水邊柳下吟咏自適先是遇兵變斷其右掌以左腕書能作懷素大草鴻以左腕自號人亦稱為左腕云汪蛟字辰初徽州人明末宦滇以中原多故避亂至榆愛太和古生傍水因僑寓焉博學工詩為人簡靜有志操後歸黃山朱藴鑑武昌人明末宦滇值沙定洲孫可望之變遂祝髮為僧名不錯字衷白結庵於浪穹縣之標山題曰楚雲坐卧三十年惟與唐泰相往來善奕工吟咏徐𢎞祖號霞客江南江隂人性好遊覽遍歷天下名勝崇禎間遊至賓川愛雞山之勝遂止焉著雞山志四卷後以病歸楚雄府明黃輔巴縣人成化間以舉人任南安學正後寓廣通聚徒講學士類賴其陶成卒知縣蔣哲營葬於東山今其子孫猶在南安蔣良珙湖廣黔陽人崇禎乙亥拔貢任新化知州有威惠聲後署南安篆值土酋普沙煽亂撫輯甚勞及流冦入滇棄官隱遁於􅑇嘉之竹箐冦帥聞其廉能屢遣使徵之堅節不屈尋卒姚安府唐李善江夏人有雅行淹貫古今號為書簏顯慶中纍遷崇賢館直學士兼沛王侍讀為文選注敷析淵洽表上之賜賚頗渥出為潞王府記室參軍遷涇城令坐與賀蘭敏之善流姚安遇赦還明黃守鍾江西人宋黃庭堅之裔宦於姚遂家焉偰士忠江南溧陽人明學士偰斯之裔官於姚有惠政因卜居焉永昌府元托克托䝉古人順帝時為中書左丞至正中自請出師討徐州賊朝臣上章留行不果遂假便宜總制兵馬破賊於徐州又破張士誠於高郵城外哈瑪爾忌功嗾御史表賽音等劾之詔削官爵安置淮安龔伯遂曰丞相常受密㫖宜一意進討且勿開而詔托克托曰是與天子抗也如君臣何遂受詔既臺臣又論其謫輕再徙雲南之騰衝知府高惠欲事以女辭曰吾罪人也安敢念此後再徙阿恰齊之地哈瑪矯詔遣使鴆之明范從文字復之崑山人文正公十三世孫洪武中以國子生奉使稱㫖擢監察御史改戶部總部主事以罪謫戍莊浪復改戍金齒十年赦歸以薦為金華訓導所著有小學章詁宗牒譜遺後齊集若干卷姬思忠樂亭人元參知政事洪武初歸附授監察御史後以事編置金齒律身以禮夷俗化之劉寅崞縣人洪武庚戍進士江西僉事謫金齒貨藥訓䝉所著有武經直解傷寒脈賦標幽賦注其自銘曰少遊滹陽老滯永昌道不遂其初志心終焉而遑遑研窮典籍著述文章愧無補於名教徒取笑於大方知非思改得善慮亡幸獲享於中夀即九原而徜徉萬厯間巡撫陳用賓祀於㑹城與漢王褒明楊慎為三賢云髙莘山東人洪武中以起居注謫戍金齒時武臣強橫纍欲延為館賓免其役莘不從乃使之守門終日執殳㑹大雨彌旬衣履狼籍殊無戚容其耿介如此葉學則德興人博雅善歌詩洪武中召對稱旨擢奉訓大夫後謫居永平以文雅化俗周志鋐字元亮永安人進士洪武初官翰林以事謫戍金齒精春秋人稱節孝先生徐有貞初名珵字元玉吳縣人天順改元以迎復功特進柱國武功伯尋以論誣殺于忠肅罪編金齒居歸休庵一小室執殳守城不異行伍三年賜還易恆字可久長沙人正統中戍昆明復徙騰衝積學篤行郡人賴其薰陶善書工詩文著有思誠稿楊慎字用修四川新都人父廷和以無子禱於神夢神以五代夏魯奇應之曰武臣也輔以中庸十八章遂生慎年十一擬過秦論後舉正德庚午鄉試第三卒未會試第二廷試第一授修撰嘗奉命祀江瀆以父命見楊文襄公於京口觀所藏書無不言言成誦慎大懼益發憤讀書武皇數遊幸慎上書諫不報遂移疾歸世宗繼統起慎為講官講尚書金作贖刑篇言大憝不可贖蓋指罪璫張鋭于經等以進金得免云㑹大禮議起慎同毛澄范鏓毛玉諸臣力諌又公倡跪門之議帝怒下慎獄十日內再杖之創甚斃而復蘇遂戍永昌時滇之御史郭楠上疏乞宥議禮諸臣被詔下獄自是無敢救慎者居頃之安鳳變起困木密所慎戎服往援與副使張莪謀固守官兵與賊戰城外慎促城內兵開門夾攻之賊敗去安寧守欲𣙜民鹽牛稅慎謂此刀錐者宜推與民軍官以濬海口役為利督丁夫六千人下海民苦之慎作書針告當事俱報罷戍滇三十五年凡兩迤郡縣名勝皆與其士大夫相倡和放浪湖山究心著述暫歸蜀者再晚欲長歸已七十餘而滇士有讒之撫臣王昺者昺俗戾人也使四指揮以鋃鐺鎖來慎不得已至滇則昺已墨敗然竟不能歸病寓蕭寺以歿喪還藁葬新都北門外數百武穆宗即位贈光祿少卿諡文憲昔毅廟問注張星厯官不能對以問慎慎曰栁星也世廟問矞宇嵬瑣四字慎即舉荀子非十二子篇以對其後詢明第一博聞之士或曰慎世廟為之默然程源四川人有才名崇禎進士知明運將終不受職遁居永平山中為亂兵所害祝璀德興人儒士性耿介工詩文尤善易謫戍騰衝尋宥歸從學者留之講易遂家焉年七十餘猶讀書不輟季思友不知何許人工於琴寓保山蕭寺時有紅光滿室嘗鳴琴以自樂詩云焦尾絃難續思賢憶幾回不同箕子操堪比蔡雍徽片片黃花落聲聲栁絮飛陽關人已逺秋雨掩柴扉周東華不知何許人本姓崔明季甲申之變自燕京遁至騰越改姓名為周東華居騰之寶峯寺嘗數月辟穀口不談釋道之言人以儒理叩之則亹亹不倦曽題毗盧寺一聨云殿古含煙冷樓空得月多騰諸生吳茂桂等延於雪山師事之著有雪山集二十四篇後更隱去吳延齡字永夀餘姚人以賢良薦授清潤教諭因上言謫戍大理後調騰越遁跡屯伍以終其身鶴慶府明車文琮臨川人父業商寓籍劍川生文琮幼勤學登鄉薦知彭山縣有廉聲卒於官郡人士多出其門宋守拙字王賓蜀人以明經佐貴州思南府有惠政尤善詩古文辭解組後家於鶴拙言行端方里黨服其嚴正長子珍德守其家訓人稱有父風云黃河圖字十五籍貫未詳明戶部主事棄官尋訪天下名蹟至鶴因家焉善詩尤精皇極經世學順寧府明曹應昌號石霞麻城人明崇禎己卯解元癸未進士博學多才父巽之明末為雲州佐解官居順寧尋卒應昌來滇迎櫬資斧不給遂寓順凡山水名勝多所題咏後卒於滇大理府推官楊兆傑挈其櫬歸陳璠字瑕無四川內江人明崇禎間仕至戶部員外後棄官來遊順寧太守請於育賢館談經以授學者郡士多出其門所著有才子驚夢集五卷育賢館志四卷本朝楊應鶚關東人任貴州貴陽府同知吳逆叛因不受僞職安置順寧大兵入滇僞留守郭壯圖恐鶚倡衆內應移檄僞將令致之死鶚遂自縊其側室佟氏先投繯死雍正三年知府范溥訪其藁葬於荆莽間為起雙墓立碑記之永北府明周良臣湖廣人舉神童正德間聞北勝有神童張宗楚不逺三千里訪之因寓居焉麗江府明敖育元江西新喻人進士成化二十一年因奏劾李孜省僧繼曉謫為麗江臨西縣丞博聞強記淹貫經史著有鐘彛集後起擢衡州知府纍官禮部左侍郎䝉化府明王汝敬字敬夫山西代郡人寓䝉教授生徒敦尚禮法䝉俗一變後回籍成進士名重晉陽時謂之山西王道學曹學字行之號大狂蜀人嘉靖初客遊滇西性豪放能詩草書遒徑更精於畫性嗜酒居榆之中和峯日繫錢與壺於驢背遣入城市酒人知為曹之驢也取錢貯酒復遣而歸偶雪夜墜驢驢以身覆之得不死後同楊慎寓䝉居數年卒他日驢經其墓蹢躅哀鳴撞死於側張登雲貴州烏撒人寓定邊縣㑹猓賊屯營七顆哨登雲謀劫其營賊覺悉衆渡河登雲左持弓右執刃所向披靡斬賊先鋒賊圍之斫其左足登雲猶奮勇直前兵敗被殺雲南通志卷二十三
