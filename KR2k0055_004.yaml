鎮前志石龍表天柱於前木密疉重闗於後勝嶺為四封之雄白石當一面之阻地介極衝險資防守南寧縣附郭霑益州層山繞其西北二水交於東南地當黔蜀之衝山接烏䝉之險陸涼州雄山東峙石户西扄為澂廣之通衢實興古之要鎮馬龍州崇山如墉通道若綫省東要害之區興古薄瘠之地羅平州鐘山羅列逺臨大渡之河白臘髙嶷更接八部之嶺郡東闗鎖捍衛邊陲尋甸州地連中慶壤接曲州山列玉屏海涵清水密邇東川獨當一面平彝縣白馬崚嶒青溪䆳密定南髙插雲霄三臺突起廣野入滇門户孔道衝煩宣威州左峙龍山後距可渡前達交水右遶車滃扼黔蜀之咽喉為曲尋之重蔽臨安府髙山大澤宅其中長江巨河繞其外延袤千里迴環四塞八屬星陳内雄逺甸五司碁布外鎖重闗舊志迷䝉寧嶍扼控邊陲異水杞湖互環府治山水明秀之區人文會萃之地建水州附郭石屏州諸峯聳翠三島洄瀾異湖九曲之勝頗稱靈秀阿迷州烏充東峙安邉西連盤江瀘水瀠繞交流形勢最為竒勝寧州扄以樓山環以瓜水蘭蕙香生文筆清流飛瀉巔崖郡北簡僻之區滇南平衍之土通海縣秀山出羣峯之表杞湖匯衆水之流三郡大道邑壤頗衝河西縣琉璃堆青螺髻擁翠踞溪山之勝極曠渺之觀嶍峨縣峙以峨山襟以曲水巉削萬峯臨元要害䝉自縣城據目山江通梨水壤接交岡諸蠻雜處澂江府三隅負山一面臨水州邑四城環衛郡治原非用武之地稍稱饒沃之區舊志金蓮玉筍突兀東西撫仙星雲瀠繞内外挾湖山之勝名魚稻之鄉前志北通省會南接鉤町東據龜山赤水之雄西連嶍峨新化之險地勢無多界東迤而中處山川獨秀為滇省之名疆河陽縣附郭江川縣北枕闗嶺南撫星湖海門橋一線中通為臨澂孔道新興州竒黎西阻靈照東嵌為會城之南屏實鉤町之北障路南州竹山壁立赤水迴環東界廣曲西輔郡城武定府左翼筆架右輔天馬支雲一塔髙峙如峯南北兩河瀠洄似帶舊志僰陋西連䝉山東峙獅峯崒嵂雄虎視於江闗鳩水蜿蜒儼龍盤於石舊壯金沙之南面控蜀道之北門和曲州附郭元謀縣馬頭聳峙於前長山綿亘於後金沙北繞西溪南瀠禄勸州寨雄羅婺峽峻紅崖絳雲封擬岱宗掌鳩波連滇海撒甸地僻山深川原遼濶壤接東川最為險阻廣西府諸山環峙為屏八甸瀠流為塹比鄰西粤密邇南交舊志大小維摩土酋恃其營窟十八山寨夷盜依作藪淵當分邊腹内外之防宜審獠蠻彈壓之要前志披帶河山界限滇粤南走鉤町北通省會漢夷錯雜之區水陸交接之路師宗州崇山峭拔盤水瀠紆密箐深林壤連西粤彌勒州龍嶺環城盤江遶甸阿盧舊部廣西咽喉邱北維摩五里水下三鄉地廣人稀夷多漢少廣南府崇崖巨壑峻坂深林南限以西洋之水北表以牌頭之山一夫當闗千人莫入舊志兩粤衝途交夷要障南木伏流逺匯右江之水者鷂髙峙遙連古器之墟旅途之斥堠當嚴蠻獠之出沒宜備前志東抵粤西南臨交阯西通阿迷北走彌勒地當水陸之衝川原最為險固元江府清河禮社險據江闗棲霞玉臺雄稱地鎮外有車里作蔽内以新嶍為藩舊志三江合繞諸緬遙牽峩崀為河險矣天開巨壑馬籠列嶂壯哉地闢重藩前志北距哀牢東通鉤町為五司之上游實普沅之門户新平縣深谷崇山地勢險阻伏戎於莽防守宜嚴他郎紅蓮近聯遮碧峭壁凌空阿墨逺匯谷麻長江似帶作元江之蔽扼鎮普之衝開化府鉤町舊疆强現分地臨廣接壤交阯為鄰深山叢箐僻地險區舊志二臺綿亘足衛金湯八戛重圍堪為垣牖崇岡瀠澗作臨郡之屏藩重鎮雄封實邊夷之控制文山縣附郭鎮沅府地處夷粤山漸平衍緬猛交撾之通衢臨元景楚之接壤人皆猓濮屬近羈縻前志樂版崚嶒紆迴鳥道烏連峻峙邃密雲門四圍阻險中闢平原亦邊徼奥區也恩樂縣東據碧松南迎文筆逺控普洱近接哀牢控制夷賊最為切要威逺泉水蘊涵不竭寶谷潤澤無窮財賦要區邊陲僻壤東川府地控金沙臨昭通之南面山髙雲弄綰省治之北門東接威寧西通會理内負江山之雄外連黔蜀之勢會澤縣附郭昭通府地稱僻險勢接川黔八仙海近作湯池二龍山逺為藩衛道路﨑嶇土田瘠薄恩安縣附郭鎮雄州綽紐左峙硌砌右蟠苴斗河横於南白水江繞其北山川險扼地勢阻深永善縣昭通為滇省東北之極邊永善又為昭通東北之極邊山如蓮瓣直接雲霄江連敘州可通舟楫大闗鼠􅋭林深牛欄江逺白水遶其外涼山環其中洵足屹當一面魯甸龍山西峙黑水南流扼塞諸蠻地稍平衍普洱府南接老撾西連車里表以鳯凰天筆之山帶以把邊九龍之水肇造雄封邊陲重地攸樂地衍平川天開曠野芟除荆棘可比成賦中邦思茅玉屏峻削南澗縈紆為郡治之輔車作南陲之屏蔽大理府地稱若水山號昆彌瀾滄金沙繞其東西鐵柱石橋雄其上下舊志蒼山為險榆河為池阻以迴嶺崇岡緣以漾濞巨浸洵南服之都會據全省之上游前志倚鶴麗為北藩藉楚姚作門户西障永昌南倚䝉順上下重闗溪山秀美太和縣附郭趙州左瀕西洱右障昆彌藉鐵柱作巖城為葉榆之庭户雲南縣川原平衍岡巒四塞形勝完固西迤神臯鄧川州南扼龍闗西倚象嶺蒼洱上游此為要地浪穹縣扼塞兩江灌輸寧水南詔奥區西迤勝地賓川州鍾英東峙雞足西盤内擁赤崖鐵索之巖區外繞金沙洱水之天塹雲龍州後阻瀾江前帶沘水崇山複嶺號稱巖疆楚雄府山川清淑峻嶺重闗北距金沙南瀠禮社東接昆明西連大理最為大部舊志岡巒盤鬱林麓迴環東峙響水雄闗直扼諸夷之領南控􅑇嘉要害實通九郡之衢前志四達皆通有隘可守會城屏蔽西道咽喉楚雄縣附郭鎮南州阿雄英武闗塞當衝苴水盤山險要足據一方重地九府通衢南安州妥甸雨竜地皆扼要安郎法戛山盡嵯峨不無伏莽之虞當為綢繆之計定逺縣四圍險峻中衍平川背拊姚安吭扼武定廣通縣陡澗髙岡迴環綿亘外以響水回蹬為鎖鑰内以羅苴和茶為奥區􅑇嘉山峙卜門水流黒石哀牢逼近防守宜嚴黑鹽井兩崖蔽天中通一線烟氣成雲井脈涓涓洪流奔駛財賦不竭琅鹽井鰲峯鎖水寶應開源水秀山明鍾靈井脈姚安府崇山修谷平疇廣川明一統志北枕金沙南襟威楚制烏蠻之悍障邛莋之衝相如諭蜀擬以後園丞相征南駐兹籌筆乃六詔之中分而三川之門户也前志蜻蛉舊地龍馬髙峯金沙逶迤伏莽無憂玉屏重開金湯足恃扼要西北足當藩籬姚州附郭大姚縣烟蘿森列龍馬奔騰儲書案山之英納蜻蛉河之澤蕞爾彈邑明秀可稱白鹽井寶闗毓瑞象嶺連雲井應神羊源流弗涸永昌府西極南隅界華夷於一綫豹闗虎旅咸控引於重門舊志滄江怒水為襟帶於東西九隆三崇作屏藩於左右據八闗二堡之形勝扼三宣六慰之咽喉前志寶蓋髙臨玉壺環拱勢壓邊疆獨當一面滇西鎖鑰邊徼名區保山縣附郭騰越州孤懸天末接壤殊方控制麓木諸司為出緬之門户永平縣深巖絶澗峻嶺重巒為金齒之垣墉實雲龍之犄角鶴慶府四山壁立勢若梯雲一水伏流形如環帶枕雪山以為障雄開義督之都控石門以當闗險扼吐蕃之部前志天塹則金沙漾水地利則鐡橋石門形據上㳺勢雄邊徼劒川州西枕老君南屏石寳華山紫氣劒水川形越析要區石門重地維西山巒萬疊雪嶺千重扼西藏之咽喉據極邊之要地中甸雪巘千尋欄杆十二﨑嶇險仄鳥道羊腸有形勝之足恃自防禦之宜嚴順寧府衆山環繞於西南兩江襟帶於東北雲州彈丸有建瓴之勢三甸鼎足分犄角之形舊志水與吐蕃交阯同其源山從崑崙蜀岷疏其脈兩崖夾峙一路中通神舟渡天塹之雄永鎮闗地軸之險雲州近接景順之交僻在僰濮之徼深山盤水地氣炎蒸永北府枕石峽抱金沙列岫自畫圖而出長江儼束帶而來控扼土番屹為要地土狹而饒兵强而勁明一統志西北籓籬山川險阻波環三島瀘沽髙水寨之雄地擁諸司革甸控野番之域前志孤懸江外三面皆山實巖疆鎖鑰之區有扼拊吭背之勢麗江府雪消春水遙連西蜀之偏鱗次碉房直接吐蕃之宇重闗壁立四塞星羅為南滇之保障作益部之屏藩舊志東寧永而南鶴劎西怒夷而北吐蕃雪嶺崔嵬金沙蜿蜒番夷扼塞南服巖疆䝉化府面威楚背㸃蒼昆彌在其左瀾滄在其右控制南澗諸蠻形勢最為險固舊志兩江天限重嶺墉崇東枕文華南倚巍寶堪稱僻郡亦屬要區前志鳯凰天耳羣峯如帶以迴環漾濞陽瓜一川若掌而平衍崑崙扼要虎視諸蠻䝉舍恢疆雄先六詔景東府邦泰孟沼突兀於東南景董鶴籠逶迤於西北大河源夙名水寨沿江路長抱山根舊志䝉樂為屏屹矣崆峒之勢蘭津若帶儼然江漢之長徼外之極邊緬僰之扼塞前志把邊縈繞於東郊瀾滄瀑流於西界鶴籠北翔錦屏南列壯威普之聲勢作䝉楚之屏藩雲南通志卷五
