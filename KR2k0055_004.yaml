  text: 雲南通志卷五疆域附形勢滇巖疆也北䝉蕃南交阯西緬甸皆與外域接壤惟東北與黔蜀粤西鄰中間夷猓交錯喜則人怒則獸控制撫御厥惟艱哉官斯土者嚴内外之限斯伏莽無虞慎郊圻之守斯民志有定凡勸農敬教戢暴詰戎諸政一一經理於平時周防於無事將西南萬里而遙莫非德澤之所涵濡風聲之所鼓動茫茫疆索永奠於坤維矣至其與封畛相繫屬者則詳覽形勢具知四封阨塞彊弱之處亦經國之逺圖也志疆域形勢附焉雲南通省滇在西南邊徼其地東至廣西泗城府界七百五十里西至神䕶闗接野人界一千七百六十里南至交阯界七百五十里北至四川會理州界四百里東南至廣西鎮安府界一千一百四十里西南至天馬闗接緬甸界二千三百一十里東北至貴州普安州界四百三十里西北至吐蕃界二千里東西廣二千五百一十里南北袤一千一百五十里自省達京師八千二百里雲南府即會城其地東至澂江府路南州界一百二十五里西至楚雄府廣通縣界二百四十五里南至澂江府新興州界一百五十五里北至曲靖府尋甸州界一百四十三里東南至澂江府河陽縣界八十四里西南至楚雄府南安州界四百二十二里東北至尋甸州界二百三十里西北至武定府和曲州界一百六十里東西廣三百七十里南北袤二百九十八里附郭為昆明縣東至嵩明州界六十里西至安寧州界四十里南至呈貢縣界三十里北至嵩明州界五十里東南至宜良縣界一百一十里西南水路至昆陽州界七十里東北至嵩明州界五十里西北至富民縣界四十里府西北七十里為富民縣東至嵩明州界三十里西至羅次縣界三十里南至昆明縣界三十里北至武定府和曲州界四十里東南至昆明縣界五十里西南至安寧州界三十五里東北至曲靖府尋甸州界四十里西北至羅次縣界三十里府東一百二十里為宜良縣東至澂江府路南州界二十里西至呈貢縣界四十里南至澂江府河陽縣界三十里北至嵩明州界三十里東南至路南州界三十里西南至河陽縣界三十里東北至曲靖府陸凉州界三十里西北至昆明縣界五十里府西北一百三十里為羅次縣東至富民縣界三十里西至禄豐縣界三十里南至安寧州界六十里北至武定府和曲州界三十里東南至富民縣界三十里西南至禄豐縣界一百二十里東北至富民縣界二十里西北至和曲州界三十五里府南九十里為晉寧州東至澂江府河陽縣界五里西至昆陽州界三十里南至河陽縣界十里北至呈貢縣界五十里東南至河陽縣界十里西南至澂江府江川縣界五十里東北至呈貢縣界八里西北水路至昆明縣界八十里府南四十里為呈貢縣東至宜良縣界五十里西至昆明縣界十里南至晉寧州界五十里北至昆明縣界十里東南至澂江府河陽縣界四十里西南至晉寧州界五十里東北至昆明縣界四十里西北水路至昆明縣界四十里府西七十里為安寧州東至昆明縣界二十里西至祿豐縣界六十里南至昆陽州界十五里北至羅次縣界六十里東南至昆陽州界二十里西南至易門縣界九十里東北至富民縣界六十里西北至羅次縣界七十里府西北二百一十里為禄豐縣東至羅次縣界三十里西至楚雄府廣通縣界三十五里南至易門縣界一百二十里北至廣通縣界三十五里東南至安寧州界九十里西南至楚雄府南安州界七十五里東北至武定府和曲州界四十里西北至廣通縣界二十五里府南一百二十里為昆陽州東至晉寧州界二十里西至易門縣界九十里南至澂江府新興州界三十里北至昆明縣界四十里東南至澂江府江川縣界五十里西南至楚雄府南安州界三百二里東北水路至昆明縣界五十里西北至安寧州界八十里府西南二百五十里為易門縣東至昆陽州界三十里西至楚雄府南安州界一百里南至臨安府㠄峩縣界六十里北至祿豐縣界三十里東南至昆陽州界三十五里西南至㠄峩縣界六十里東北至安寧州界三十五里西北至南安州界一百里府東北一百三十里為嵩明州東至曲靖府尋甸州界五十里西至昆明縣界七十里南至昆明縣界六十里北至㝷甸州界十五里東南至宜良縣界三十里西南至昆明縣界七十里東北至東川府界二百里西北至富民縣界六十里曲靖府在省東其地東至貴州普安州界一百七十里西至雲南府嵩明州界二百二十里南至廣西府界一百七十里北至貴州威寧州界四百五十里東南至貴州普安州界二百五十八里西南至澂江府路南州界一百三十一里東北至貴州威寧州界二百七十里西北至武定府禄勸州界四百六十七里由府至省三百里東西廣三百九十里南北袤六百二十里附郭為南寧縣東至平彛縣界七十五里西至馬龍州界二十里南至陸凉州界一百里北至霑益州界二十五里東南至羅平州界三十里西南至馬龍州界十八里東北至平彝縣界二十八里西北至馬龍州界二十五里府北三十里為霑益州東至平彜縣界八十里西至東川府界一百八十里南至南寧縣界五里北至宣威州界一百二十里東南至陸凉州界九十里西南至馬龍州界十五里東北至貴州普安州界九十里西北至東川府界九十里府南一百二十里為陸凉州東至羅平州界八十里西至馬龍州界五十里南至澂江府路南州界七十里北至南寧縣界五十里東南至廣西府師宗州界六十里西南至雲南府宜良縣界九十五里東北至南寧縣界五十里西北至南寧縣界五十里府西南五十里為馬龍州東至南寧縣界二十五里西至尋甸州界七十里南至陸凉州界六十里北至霑益州界三十里東南至陸凉州界六十里西南至澂江府路南州界八十里東北至霑益州界五十五里西北至尋甸州界五十里