body:
  text: 雲南通志卷三山川周禮職方氏載九州之域必記名山大川以疆界遞更山川不易也滇處梁州境內位列坤維遙作神京藩衛山如點蒼絳雲水則金沙蘭滄回薄日月蕩沃雲霞蓋宇宙磅礴渾淪之氣盤結於邊隅以壯中原之關軸者國家道化丕隆懷柔禮備車書萬里海嶽效靈梯航阻絶之境咸耀於光明生當盛世者登臨俯仰之餘恍然見德業之崇峻化澤之宏深直與雪嶺滄江共流峙於無窮也已志山川雲南府昆明縣附郭五華山在城中由螺峰疊巘而下端麗尊嚴諸山朝拱本朝康熙二聖十六年總督范承勳建拜雲亭於上為習儀祝年十之所雍正五年總督鄂爾泰又加擴充丹雘六萬月二十九日恭值正肅夀令節文武官民嵩呼忽覩五色卿雲祥光璀燦歷辰巳午三時十一月朔日復現萬目瞻仰稱為盛事祖遍山在五華山左上建大德寺中有雙塔俗名雙塔寺螺峰山在五華山後有巖曰盤坤曰補陀危巒曲磴旋轉如螺總督范承勳建亭於上題曰衲霞下有幽谷潮音二洞金馬山在城東十里山如覆盂相傳阿育王季子至德呼馬於此俗名呼馬山有金馬祠又傳山有金馬隱現故名抹蔥山在城東二十里一名扶蔥山萬德山在城南十里赤甲壁山在城西十里俗名石鼻山玉案山在城西二十里又名列和蒙山其頂方平髙出衆山狀類石枰故俗名碁盤山下有菩提泉進耳山在城西二十五里三峰並峙一名筆架山碧雞山在城西三十里迤西通衢昔傳有鳯鳴於上土人呼為碧雞故名下臨滇池蒼崖百尋緑陂千頃月映澄波雲橫絶頂省會大觀也又漢書宣帝時方士言益州有金馬碧雞之神可祭而致遣王褒入蜀求之注云金形似馬碧形似雞褒有移金馬碧雞神文見藝文志髙嶢山在碧雞山南明楊慎寓此舊有祠燬總督范承勳建碧嶢書院太華山在碧雞山西南峭壁嶙峋蒼崖雄峙其麓為太平山其左為華亭山皆名勝也羅漢山在太華山西南巉崖絶壁下俯滇池其上夷險相埓聯綿幽奧相傳為梁王避暑處大鼓浪山小鼓浪山俱在羅漢山西南為漁舟棲泊之所又南五里為觀音山孤峰突兀宛如文筆銀錠山在城西北五里由􅞼山來折入商山為省治聚仙山在城西北三十里黑林堡上有洞舊名西華石乳嵌結狀若芙蓉俯瞰川原煙雲萬狀總督范承勳題曰五色芝房三華山在聚仙山北五里巃嵸回合石磴盤旋有寺名妙髙􅞼山在城北二十里俗名蛇山丹崖翠壁蜿蜒而來鸞停鵠立省會主山也下有清泉名蓮花池浴之可去風疾文殊山在城北二十里有寺有泉皆名文殊龍泉山在城東北二十里一名太極山峭蒨縈紆仙靈窟宅上有真人宫下即黑龍潭也松華山在龍泉山東北十里聯絡十二峰極嶙峋深秀之竒鳴鳯山在城東北二十里舊名鸚鵡明巡撫陳用賓易今名且稱其山光靈異景物葳蕤九龍奔朝雙鳯翔舞皆實録也上有太和宫諸勝富民縣洞口山在城東南三里有洞前後相通水從中出會安寧河靈芝山在城西南二里舊名赤晟化山元初建寺闢基得靈芝五本故名卧雲山在城西五里峰列如屏上有白塔魯卧山在城西十里一名魯和山蒙課卧山在城西十里今名無怯和山顛卧山在城西北十里一名顛和山名勝志稱縣有三卧謂顛卧魯卧蒙課卧也卧譯為和九峰山在城西北二十里竒峰九出層巒疊翠為縣治主山黃弄山在城北十五里小石嶺在城南中有諸葛洞相傳武侯南征置營於此一名諸葛營飛翠巖在城西五里邑令張鑰建醒心亭於上河上洞在城西十里內寬平爽塏石有如鐘鼓鳥獸形者昔傳髙僧住錫於此宜良縣雉山在城內正南一名南門山明嘉靖七年有彩雉雙飛故名縣之雄山也三台山在城東五里三峰聳翠朝拱縣治龍山在三台山後層巒髙聳雙峰挺秀環縣治焉客爭容山在城東十里舊名黎摩挹髙出雲表為縣鎮山雲泉山在城東南二十里峭壁清流林木蒼翠為邑中勝景涌金山在城西南二十里前有湯池上建火龍寺雲臺山在城西南五十里四山環繞煙雲凝結巖泉山在城西五里連峰疊嶂翠積層崖石涌清泉名曰潄玉世傳內有金蟬隱現水井山在城西十里舊名觀音其南曰巖泉笮箐山在城西四十里蓬萊山在城北十里一名晒袍山明萬厯間知縣羅任建塔於上北樂山在城北二十里舊名播雄又名寶洪赤江環繞雄踞治北象鼻嶺在城西北十里俗名老大坡山髙路險赴省通衢七孔坡在城西北四十里峭壁嵳峩石磴層疊達省要路紅石巖在城南四十里峰髙千仞兩岸壁立一縣之水從此泄入鐵池河仙人洞在城南十五里射雞村山畔內有石龍馬等像相傳有仙人往來時聞洞中有聲羅次縣玉龍山在城東五里澗底涌泉勢若噴玉崛嵕山在城東十五里一名穹蕩又名青山為縣主山峰巒髙聳山雲出沒土人以卜隂晴九成山在城南二十五里一名九涌山竒峰壁立九澗飛流為學宫之面山金鳯山在城西五里其形如鳯俗呼金字山百華山在城北二十五里山頂與和曲分界春時山花遍嶺色如雲錦子望母山有二一在城西五十里一在城東北四十里蠻名苴麼崱褒山譯云子望母山以兩山相對而名分水嶺在城東十里二水分流北入金沙南歸禮社九嶽坪在城東南三十里九嶺相連赴省孔道晉寧州梅溪山在城東三里有龍馬迹相傳晉太元中寧州刺史費統見龍馬於此印山在梅溪山下左有唐仙嶺相傳唐時有仙飛升於此萬松山在城東五里一名盤龍山元時建寺題曰萬松古剎五龍山在城東南五里下有龍湫五一名小石屏山光長山在城南十里俗名小梁王山北瞰滇池山腹空洞扣之有鐘鼓聲金砂山在城西五里山産砂石色如流金其頂坦平相傳梁王演武於上號為金沙武庫望鶴山在城西五里昔有鶴巢其上故名呈貢縣軍營山在城東里許傳為諸葛武侯駐兵處紗帽山在城東十里上有明驃騎將軍沐詳墓月角山在城東三十五里上有石城周遭緣曲徑入石門石柱儼若天造山下出泉名蓮花池羅藏山在城東五十里巉嵓陡絶上有池名飲馬又有元梁王屯兵寨俗名梁王山海寶山在城東南五十里孤峰特起俯臨滇池有石光明潤澤故名海寶龍翔山在城南里許象山在城南十五里萬福山在城北縣治建其下又名三台山俯瞰滇池風帆雲影錯落目中安寧州太極山在城內危石如屏文類古琴斷漆雙株梅樹倚石而生圭山在城內俗名白華山其形如圭龍寶山在城東二里山勢起伏如龍前有小邱如綴珠狀洛陽山在城東十里峰巒峭立昔段氏鐫羅漢像於石壁上有禹碑彩鳯山在城南一十五里峰巒秀拔儼如鳯羽白鶴山在城南三十里舊三泊縣西南二十里相傳有鶴巢其上故名光熠山在舊縣西南三十里其上有小城雲龍山在舊縣西北十五里一名天馬雙峰屹立巔雲聚散可驗隂晴蔥蒙卧山在舊縣北三十里上有漢人故城及唐王仁求碑羅青山在城西二里山下出泉味甘而冽岈嵕山在城西北五里州治主山也山出煎鹽水又産仙茅花蔥山在城西北十里一名龍山其北為鳯城山建曹溪寺有優曇花岱晟山在城北十五里一名坎山又名筆架山祿豐縣西山在城西三里上建學宫三次和山在城西五里蒼翠如屏鰲頭山在城西十里峰巒突起環抱邑治南平山在城西十五里三面險絶南峰稍平故名象頭山在城北十里其形如象五臺山在城北五十里連峰疊嶂積翠層嵐姚陵山在城東北三十里舊名驥琮籠蠻語呼城曰籠孤峰挺秀為縣鎮山其巔有泉古寨存焉昆陽州寶應山在城東南十里金龜山在城南十五里狀若伏龜羣流環繞松竹蓊翳上有飛閣月山在城西州治建其下形如半月三山環拱俗稱三星伴月州主山也鳯儀山在城西三里山形如鳯俯視滇海如在鏡中金屏山在城西四里雲蒸霞蔚鳯翥鸞鶱為州屏障長松山在城西五里螺峰雙髻松竹交森上有靈泉香卉為州名勝珊蒙果山在城西十里三峰秀列石頭山在城西三十里下有翻水洞水泉滭沸深不可測望州山在城北十里回盻州治仙卧山在城東北十里一名白鳥山三元峰在城南十五里三峰並秀上干青雲易門縣龜山在城內其形似龜依麓為城民居環繞其下鼓山在城東十里林木幽深竒花掩映旗山在城東十餘里峰巒峻秀形如列幟黎崖山在城南五十里一名馬頭山明巡撫鄒應龍斬馬誓蠻於上故又名斬馬山祿益山在城西一百里綿亘髙迥上有閟依土城昔為鄯闡邊戍之所智勇山在城北里許一名娘當山形如覆釜下臨縣城登龍山在城東北十三里元武洞在城南斬馬山之後窅然一竅入數武别有天光石上溜紋有如幢如節如將軍者土人增飾為關帝像生氣凛然內宏敞可容數百人旁列石鐘鼓擊之噌有聲龍口洞在城西五里楊慎遊此有詩嵩明州黃龍山在城內山勢層疊狀若盤龍州治主山一名蛇山秀嵩山在城東三十里俗名搖鈴山髙插霄漢上有洗甲池昔孟獲立寨於此明洪武時吳雲盡節處南一峰曰小秀嵩敕雺山在城東四十里相傳蒙世隆征烏蒙得四女歸至此山四女遙望故鄉徘徊吁歎忽山巔霧起結為三峰蠻謂三為欶霧為雺故名山形嵂崒南望滇土諸山悉歸指顧楊林山在城東南二十五里舊楊林縣羣峰錯列山麓立石其狀如羊屼山在舊縣西南十里廣百餘里西連呈貢東接宜良絶頂有石如馬首逺近禱祀以氊裹之一名烏納山土人呼馬首為烏納故名鳯溪山在城南十里山下有泉水噴如珠明知州唐階設嵩髙營於上遺址尚存竹雄山在城南三十里橫亘如屏靈雲山在城西五里林木隂森雙泉瀉碧登花山在城西五十里一名抹摐山野花滿山攢簇如錦土人呼為聚八仙花遊人每登賞焉東葛勒山在城西北三十里髙出衆山太華滇池朗然在目彌雄山在城北二十里蒼崖疊出蔚然深秀一名彌秀羅錦山在城東北十五里俗名鳯嶺丹崖峭壁文如羅錦昆明縣附郭滇池在城南一名昆明池周三百餘里滙盤龍江黃龍潭諸水史稱源廣末狹有似倒流故曰滇一説凡水皆東此獨徂西而下也九龍池在城內五華山右俗名菜海昔旨名栁營為沐氏之别業雍正六年總督鄂爾泰奉建御龍寺於北岸緑水河在城內祖遍山南由城東入滇池盤龍江在城東門外源出邵甸凡九十九泉合流入滇池詳見水利金稜河在城東十里一名金汁河堤上舊植黃花故名詳見水利寶象河在城南二十里源出上板橋分瀉至官渡入於滇池詳見水利澄清河在城西青草湖內七八月間橫流泛漲此水獨清海源河在城西二十里聚仙山下即海源洞一名鴛鴦池流入青草湖內詳見水利銀稜河在城北十里一名銀汁河舊時堤上多白花故名詳見水利西湖即滇池上流一名積波池俗名青草湖荇藻長青蘭橈競泛中産衣鉢蓮花內有近華浦為滇名勝龍湫在城東三十里板橋驛山皆竒石石竇中兩湫疊出一名觀音塘龍淙在城西二十里舊名白龍泉總督范承勳易今名有龍淙石崖聽瀑樓墨雨庵一草亭宛轉溪石香橋顛丈卧石小巫峽小龍湫諸勝瀑布泉在城西二十里寶珠寺後崖髙數丈瀉珠濺玉聲徹里許三龍泉一在城西勒甸村一在城北門外商山其在羅漢山者産金線魚一名金魚泉寒泉有二一在城西髙嶢里一在城北上莊村湧泉出城北􅞼山湧泉寺中一泓清潔流為曲池黃龍潭在城東六十里為馬料河之源黑龍潭在城北三十里其水深黝有魚二種各不相雜禱雨輒應橫山水洞在城西三十里詳見水利清侯井在城內布政司署中昔髙智升領鄯闡牧建宅得泉因號清侯闡侯井在城內土人取以染紅鮮明異於他水一名茜紅井石井在城內旗纛廟中味與吳井同美吳井在城東三里菊花村其水獨重味甘冽汲