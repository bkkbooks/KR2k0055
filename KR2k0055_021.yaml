body:
  text: 雲南通志卷二十一之一人物鄉賢孝義忠烈文學宦蹟隱逸石蘊玉而山輝水懷珠而川媚人才之出邦國之光也夫十室之邑必有忠信矧滇南山水奧衍扶輿磅礴之氣篤生偉人漢唐以來如許淑盛覽之文學呂凱謝恕之忠節隗叔通段赤城之孝義較中區人士何多讓焉沿及元明尤多賢傑我朝運際熙隆人才蔚起士之修於家而獻於廷者蒸蒸日盛夫聚千百年瑰偉竒傑之英或馨香於爼豆或流譽於家邦載在志乘炳如也後之覽者毋亦有慨然而興起者乎志人物鄉賢雲南府漢許淑善闡人元和中入中國受五經歸教鄉人三國漢孟琰朱提人建興閒諸葛亮南征收用豪傑為官屬舉琰仕至輔漢將軍唐王仁求安寧人河東刺史平賦化民漢夷悅服王善寶仁求子以雲麾將軍持節河東諸軍事有治蹟元張景雲字天祥中慶人優於理學能文章拔登仕即明李忠初名特昆明人洪武間選貢入監宣見便殿賞賚甚厚賜名忠登甲戌進士知鳯翔縣恩威兼濟有循吏風尹葆字士蓋昆明人永樂初鄉貢任㑹川教授有文行卒於官段鑑字至明昆明人永樂辛卯舉人宣德閒知嘉定州斷獄如神升惠州知府卒於官兩地立祠祀之李純昆明人永樂甲午舉人倜儻有智略正統閒任御史巡按遼東邉功纍著升遼東巡撫後改榆林尤有功績邉庭賴之卒於官洪誠字克敬昆明人少厲志行登永樂戊戌進士纍官順慶知府所至皆以廉明稱楊景安寧人事母孝中永樂癸卯舉人任霸州州判尋改澧州有誣吳姓盜其牛者牽牛歸吳無以自明景疑其枉取牛縱之郊坰牛奔吳氏誣者服罪秩滿擢化州州同㑹峒夷亂攻城守將夜縋城以遁兵民不滿三百景激以大義皆願盡力乃撤故倉木蔽城缺又縛藁人披衣甲置城上有三人緣堞上擒斬以狥賊引去都督歐信贈景守忠二字而置守將於法天順庚辰以老乞致仕自度官貧鄉遠因占籍巴陵以子太傅一清貴贈如其官張英字時俊昆明人事母至孝中正統戊午解元入太學時祭酒李時勉以直言獲罪英忿且恥乃同時大堅等詣闕請以身代遂蒙宥名動京師是日即乞歸養學士商文毅輅贈以詩居鄉教授生徒卒年九十有四黔國公沐琮禮重之楊一清字應寧號邃庵别號石淙安寧人天順閒薦竒童為翰林秀才登成化壬辰進士厯官右副都御史督理茶馬鹽政條上事宜多所匡濟比巡陜西修復花馬池諸要害亭障固原告警單騎馳至瓦亭㑹總兵曹雄設伏備禦奉敕總制三邉經略河套條陳修築增置防禦六事皆為劉瑾所格罷歸㑹安化王反於寧夏起用乃謂監軍張永曰寧夏事旦暮且有捷音但內變不測為可慮耳已而擒賊報果至張永驚服乃請竟內變之說一清取永手畫瑾字永悚息不敢任一清又密授永策永一一如其言武宗乃收瑾戮之因召為戶部尚書加太子太保尋改吏部纍至少傅入內閣嘗因災異自劾且言時事失宜朱寧等疾之乃謝病致仕嘉靖乙酉復起兵部尚書總督陜西冬召還內閣世宗待以腹心因大禮議不合致仕尋削籍後贈太傅諡文襄一清嘗自謂生於滇南長於湖南老於江南故晚號三南居士卜居於京口丁卯橋猶不忘石淙因以為號李夢陽為之記稱其功著邉徼名顯社稷云所著關中奏議獻納稿石淙等集行於世趙璧字蕳完昆明人成化壬辰進士厯官即中太監蔣宗誣奏南科後湖不法事行璧勘直之宗遂奏璧黨科道左遷吉安府通判厯四川副使所至多善政後乞歸著茶花譜及詩文集唐瑢昆明人成化乙未進士任刑部即中持法不阿有客懷金夜入其門卻之亦不發於人後致政歸號貞碩先生傅澄字景深昆明人成化丁酉舉人任中江教諭嵗饑捐俸為粥以濟貧窶人皆德之初無嗣至是遂舉一子乃決意歸田以子給事中良弼貴贈如其官祀蜀名宦李宗泗字希顔昆明人倜儻有智略幼從父應宦四川籍於彭山登成化辛丑進士任池州府推官以廉能著績升南廣西道御史有丰裁時馬政多弊宗泗一一肅清之遷辰沅兵備道又調山東僉事𢎞治戊午曲阜聖廟災命重建俾泗董其事廟成賜金幣尋升江西副使㑹長河等洞賊攻掠郡邑泗出竒設伏屢以捷聞勞瘁得疾卒於官李宗儒字希雍宗泗弟幼穎悟留心理學登成化甲辰進士丁父艱哀毁骨立廬墓三年服闋授刑部主事以平允稱升本部員外兄宗泗以南臺御史入覲同謁楊文忠廷和皆目為令器後卒於官囊無餘物惟退食漫吟遺稿一帙夏暹字景升左衛人成化甲辰進士厯官湖廣參政有廉名升苑馬寺卿適值用兵軍官以首功數十歸暹卻之轉廣西左布政使卒於任孫較以嵗貢任黔之畢節教諭三世皆清貧吳九功字時序昆明人𢎞治壬子舉人厯官山東僉事齊東嵗饑貧民相聚為盜九功單車抵賊巢諭以禍福皆感泣解散後卒於官立祠祀之繆白字元素呈貢人𢎞治乙卯舉人任成都府通判從征番寇嚴戒妄殺攝推官讞獄多雪寃抑時有宋姓者豪俠不法白亷得之欲正其罪直指不可遂鬱鬱不樂仕進升麻哈州知州即請歸事母曲盡色養林卧四十餘年以盛德稱及卒貧不能殮陳淳字唯素號淡齊呈貢人𢎞治辛酉舉人任太平府通判有疑獄淳立辨之其他善政及人者多民用栴檀刻像以祀後掛冠歸里以詩自娛給諌傅良弼稱其未仕則富既仕而貧嚴於義利明於出處至今鄉人言耆舊必稱淡齊先生毛玉字用成昆明人幼刻厲讀書母憂其鋭恐致疾玉每夜輒以衣障燈初上春官不第僦居燕市與四方名士講業十七年登𢎞治乙丑進士以修孝宗實録奉使滇黔訪求遺事歸報命授行人考選南禮科給事中值察典論劾四十餘人皆當升戶科左給事中條上備禦諸策以憂歸服補吏科諫止巡幸居庸危詞慷慨武宗動色中貴由烏思藏往還沿途橫索御史林有年以論劾得罪下詔獄玉上疏極諌得寬旨嘉靖初大禮議起玉同毛紀毛澄等跪門哭諫世宗震怒被廷杖者一百八十餘人玉以六科之首創更甚血肉糜爛數日卒燕士白衣冠相率送其喪為文挽之穆宗即位追贈光祿寺卿所存奏議十卷俱切中國是玉自幼孝於繼母終身無倦容人咸稱之王輔昆明人言行不茍有古君子風中正德丁卯舉人知南部縣豈弟節儉稱循良吏子廷臣克遵父訓以孝友聞仕至龍安府同知朱尹號朗亭安寧人正德庚午舉人任崑山教諭升國子監助教聲傾六館厯巴州知州多善政歸里淡然寡營品概超逸李資坤字伯生昆陽人自幼以孝友聞中正德癸酉舉人知宜城嘉定二縣升南刑部主事厯官即中出知銅仁府開渠堰均田賦撫平寇亂卓有賢聲考天下循吏第一所至皆有生祠竝崇祀名宦比歸置義孰不謁公府性剛介寡合言動以禮老而彌篤積書萬餘卷自號一蠧居士督學陳善採衆議檄州立祠羅江字孔殷嵩明人天性英敏弱冠登正德甲戌進士任建昌府推官直躬厲操抑折豪强卒於官士民哀之祀名宦胡廷祿右衛人正德丁丑進士任南戶部即中與呂涇野鄒東郭講究正學出為河南按察副使㑹肅宗南巡渡河嬪舟後至逮督撫及廷祿俱削籍歸所居負郭足跡不至公門以篇什自娛顧應祥與同榜先後撫滇未嘗一見後遷秩去造廬促之不得已出見良久以果酒别於家所著書多散逸施光祿昱誄曰庚桑深居泄栁閉戶城闉如林竹松為伍孫繼魯字道甫昆明人少負竒質書史過目不忘登嘉靖癸未進士知澧州以他事避怒已者乞為學官改國子監助教厯戶部即中出知衛輝府未幾調淮安府中貴銜命督江南織造擅作威福繼魯與之抗中貴怒譖訴於上逮至京執政為之解罪止調官既免弗謝調黎平府能以德化感格叛苗升湖廣提學副使每從帖括相士數語盡其生平合若左劵晉山西左參政分守冀南繩宗人以法及升本省按察使宗人數百要於路發其裝惟布袍敝履他無所蓄驚曰髙皇帝以來罕見此官相與載酒偕士民追送之至任益飭法約束舍人子自宗潢以及百姓咸願久於其任尋晉右副都御史巡撫山西以邉事與總督翁萬逹意不合為文誓於神慷慨忠義溢於言表因各陳所見交上封事時宰先萬逹而後繼魯遂被誣下獄讀易賦詩矢死不折圜中無楮筆日用飯碗畫壁與同時得罪御史楊爵倡和百餘首名飯碗集知公者以百口直之而時宰怒不解竟以疽發卒獄中山西士民哭於長安者數百人穆宗即位從言官請贈兵部左侍即諡清愍賜祭葬張素字季文安寧人嘉靖癸未進士厯官湖廣兵備道出方略平賊升四川巡撫復著軍功敕賜金帛致仕歸里囊無餘蓄恬靜自如陳常道字子中呈貢人嘉靖丙戌進士知富順縣蠲鹽課賑荒民升主事疏請終養服闋升常德知府屢辨疑獄運麻陽兵餉有功升建昌兵備道乞歸杜門靜習手録薛西園集參解多所獨得施昱字子貞廣南衛人嘉靖丙戌進士任刑部主事升貟外典試山東取士多名雋升本部即中以議國戚張延齡獄不稱旨落職時已升陜西僉事矣家居八載起補貴州僉事威惠竝行士民繪像祝之瓦店驛峻嶺夾江甚難渡昱設法為巨橋覆以屋又因劾處得當欽賜銀幣值黔中大比録文犯忌罪監臨御史波及之謫茶陵州州同厯永州府通判遷徽州府同知丁艱歸服除補大名知府升湖廣僉事駐承天府百務紛㳫昱一意恤民不狥時好雖見忌疾弗顧也以擒巨寇李邦珍功賜綺幣晉光祿寺少卿卒於京昱孝友醇飭所著有禮經疑問藏於家黃鳯翔字冲霄號竹泉昆明人與其兄鳯翺少相師友登嘉靖丙戌進士任刑部郎尚風節出知重慶府鯁直為當事所忌拂衣歸杜門不出著述甚富人問楊慎曰黃竹泉平平耳曰公勿言如竹泉者宇內未易得也段纁字朝聘昆明人嘉靖戊子舉人十上春官不第益發憤向學在京與周洞巖論愼獨之㫖謂本無寂靜惟動不失常者近是不得分靜存動察為二一時如謝髙泉萬履庵皆與締交纁髙自標植歸田後與胡廷祿遊胡雅意詩文纁曰志於道者恥為詩文胡即其居植衆卉曰借此以發生意纁曰生意豈在彼也胡遂悟及胡卒纁誄之曰始待益於外來終取足於天則自是堅卧不出宦滇者造廬欲一見終不可得所居湫隘旴江羅汝芳題其里曰顔巷李茂陽字三山昆明人蚤喪父事母至孝與兄向陽讀書寒暑不少怠家窘甚司徒劉輔造訪贈之金不受嘉靖甲午癸卯弟兄相繼舉於鄉茂陽授四川南充教諭士類多所成就遷知大足縣縣苦盜撫諭有方朞年盜遂息以直忤上官乞歸終養還里後杜門不出惟養親教子所著有歸來園集佘應桂字夢徵昆明人幼孤事母孝中嘉靖丁酉舉人知灌縣保民如子採山大役報成而民不擾蜀民頌之升重慶府同知清戎理鹺有能聲厯知南康府興學正俗均糧息盜入覲卒周棐字公輔嵩明人嘉靖丁酉舉人任新蔡教諭攝汝陽縣篆救荒全活者衆厯知廬山彭縣有惠政楊秉和字節甫昆明人嘉靖庚子舉人知臨漳縣卻金辨獄遷汝寧㑹宗府奪地自益疏聞下臺臣久未決和慷慨啓王陳利害還所奪地以歸民時稱廉能厯刑部員外郎乞歸石銀呈貢人嘉靖庚子舉人知合江縣遷隴州知州所至以豈弟稱不善事上官左遷韓府長史乞歸隱於大漁村窮約終身晏如也顧天祐字吉甫昆明人嘉靖癸卯舉人知建始縣城介蠻峒嵗比不登艱虞百端祐竭力保障招集蠻黨綜核隱占邉鄙寧謐遷保寧府通判捕大盜得其窟盜悉除致政歸杜門著書以經學授徒卒年八十餘嚴清字直甫後衛人弱冠登嘉靖甲辰進士知富順縣丁母憂服闋補邯鄲縣皆以廉能著徴為工部屯田主事升即中督建外城及九陵綜核出入省費巨萬出知保定府時廷議選邉才清與焉厯升四川右布政綜理撙節蜀庫獨贏隆慶初巡撫貴州復移四川一切公私費悉從減省奏改金錢當輸京師者二十餘萬就近抵陜西佐邉費定番僧貢額罷有司團操蜀民稱便萬歷乙亥再命巡撫貴州條理得宜苗蠻懾服纍遷刑部尚書秉公持平屢白寃抑神宗素知清特授吏部尚書時癸未冬計事滇委所擯斥雖閭里不少庇而引用巖穴知名之士實多無何以勞瘁致疾四上疏乞歸又二年本兵乏人上特旨起清清力辭疏入上遲回久之乃許戊子特晉太子少傅嵗給廩粟輿夫卒贈太子太保賜祭葬諡恭肅清性檢飭有威儀生平操行尤嚴於取與辭受居官食粗衣敝與童僕同甘苦及為尚書亦然輿疾出都門遵潞河泝大江而行置石輕舟無慙古人歸滇後隱於松華别業後進造請惟以修身務學為諄諄其詩隨意興成有冰玉堂集東阿于愼行刻筆麈載酒遺事方馮保以罪籍沒得一册於其家定陵披閲皆籍記朝貴往來事及書清無一字以此受知郭斗字應秀昆明人嘉靖癸丑進士知孝感縣伸疑獄行取南戶科給事中以母憂去服闋補山西按察副使核郵符寬民力遷貴州按察使時安國亨搆殺罰粟而止平滇黔道塗以利行旅厯浙江左布政使致政歸萬厯初再起貴州尋歸田里構小樓於進耳山賦詩作書自適一夕方據案吟咏忽擲筆而卒龍施字德敷昆明人嘉靖乙卯解元厯官戶部郎中升河東運同所在有政聲以母老請養家居二十餘年淡然自樂著書之外治藥濟病視親戚有緩急輒損資佐之所著有露林蟬嘯心濟醫宗等書張橋字衡如昆明人嘉靖己未進士任工部主事管南旺閘河刻意河防運道不滯竣事還京擢寧夏兵備僉事急葺邉牆重罰剝軍者西賊為之捲幕尋以浮議罷歸精心墳典自六經子史旁及真詮釋典靡不研究才髙學冨尤精書法朱運久號蓮峯安寧人隆慶初恩貢任東昌府通判升海北正提舉請告歸居鄉不入公府不置田宅鄉閭重之王制昆明人隆慶丁卯解元任思南府推官行取御史轉韶州僉事晉參議操守清潔比歸好義樂施嵗歉賑饑鄉里德之孫繼先字志顯昆明人隆慶庚午舉人任興化教諭遷陀陵知縣奉檄紀驗膩巂招降賊屬三百人朝廷賜金褒之再遷下石西州知州州故為思明黃獠竊據𢎞治聞始討平設流官率寄妻孥於太平府嵗一履其地繼先始擕家居之闢草昧拓城甃井生聚教訓比於列郡遷承天府同知有築堤救荒之績後因事左遷荆王府長史歸以古禮倡邑人冠婚葬祭一軌於制人皆憚其嚴正李聞馨字德華昆陽人萬厯癸酉舉人知新繁縣奉檄核倉儲持法不阿升知茂州多惠政張薰字伯舜歸化人萬厯丙子舉人任河南教諭為督學楊俊民所器重厯大理司務升刑部即獄無大小各當其情奉命讞囚三州多所平反每與直指使相左遂罷歸王希堯字惟中昆明人萬厯己卯舉人任竹山教諭升知鍾祥縣捐煩苛與民休息尋調藤縣在官以實心行實政後親老請歸孝養者十年每嵗終以錢米濟鄉里貧乏朱運昌字際之昆明人萬厯庚辰進士任大理評事升刑部郎讞獄四川上録囚應縱者百餘人下司寇覆議悉當遷參政分守川西條上錢榖畫一之制纍遷福建左布政使中貴人銜命督稅多所沮抑中貴人欲陷之乃上書乞歸即日登舟當事挽留不得方抵里神宗特簡為右僉都御史巡撫福建凡關疆場及民生吏治者所司未及狀逹已被符令處分監司而下咸驚以為神奉約束惟謹撫閩前後幾三年朝廷嘉其功待以異數尋卒於官賜諭祭羅大器號滄嶽安寧人萬厯壬午舉人任山海關通判清屯選鋭邉關倚重前後薦剡十上為權貴所忌罷歸士民攀轅載道居鄉二十餘年復起用厯知嶽州府丁繼母艱歸絶跡公門官司鄉里皆推重之劉文徴字右吾昆明人萬厯癸未進士厯任紹興知府考清廉第一因漢劉寵為會稽太守以廉潔著稱故民閒有漢明二劉之謡纍官太僕卿致仕歸里禮教甚嚴著作多𫝊於世前纂修通志皆其手筆也朱思明字用晦昆明人萬厯己丑進士授刑部主事署本部郎中適寧夏之變上怒逮及軍府重臣思明掌其獄為具爰書國體獲全繼命欽恤廣東獄無寃滯纍遷河南按察副使㑹大饑設法賑濟全活甚衆開漳河十餘里開歸民感其德為建生祠升本省右參政管理河道時河決沒民居萬計嵗漕不通思明又倡開漳河二十餘里勞瘁無虛日閲四年始告竣升廣西布政使宗人驕縱繩以禮法洎黎賊出沒官軍多濫殺冒功嘗詣獄清讞之釐剔鹽政積弊一清乞終養歸恬淡自怡足跡不入公府孫光前昆明人萬厯戊子舉人任宜良教諭升國子監博士遷沅州知州沅當孔道官民苦於供億光前力裁節之使客往來自為館餐州民以蘇調嘉興府通判未幾歸僅以二鶴隨途中資罄竝鶴鬻焉朱化孚號岱晟安寧人萬厯壬辰進士授行人主試貴州號得士遷兵部主事凡非尺籍什伍而以虛名冒蠧者悉除之轉本部武選即中條選法六事為後人遵守擢銀夏兵備道清錢糧謹斥堠轉貴州參議止營兵之亂升湖廣按察使刑罰清明告歸日與親友故人為文字㑹所著有賁幽吟陽城紀勝行於世楊鳯字明正安寧人萬厯甲午舉人任順慶府通判攝府事賑饑全活甚衆遷知海州築堤遏潮以通鹽舶安插青兖飢民招集流亡給牛種墾田報升南康府同知士民遮留得請在海十一年多異政繼為太原府同知擒妖定傾政績益著升知順慶府值奢酋變助餉練兵賊不敢窺入覲引疾歸為人喜愠弗形鄉里皆重其德量後兩奉徵詔結廬葱山堅卧不出范立朝字二懷昆明人萬厯丁酉舉人任榮陽教諭厯升刑部即中讞獄無疑滯出知平凉府府多宗人恣橫立朝每以法繩之共相服罪時韓王薨世子幼有嬖人子謀立暮夜賂以金立朝正色曰嫡庶之禮何可廢也拂衣而入王妃聞之亦以多金求為善計復奮然曰此公議何以私為使慚謝旋以忤給事某罷歸家居淡泊自甘遇後學必教以禮年八十卒楊師程字道南安寧人萬厯戊戌進士知湘隂縣多善政報最擢御史獻納糾彈指陳邉事巡鹽河東清餘課豁啇逋條議十數上咸報可母既耄三請終養未允而訃至號泣歸廬未幾卒師程慷慨有大志直節敢言一時重之所著疏草行於世趙日亨字貞所安寧人萬厯辛丑進士任太常博士選御史福藩之國中使屣丈膳田騷動連省亨抗疏調畫得允山東嵗饑民亂亨奉命巡按疏請蠲免撫綏底定時有監司恃婦翁為首輔行殊不法亨劾之并及首輔由此外轉川南兵備道值奢酋叛募死士斬叛目黃光輝率兵解省城圍晉秩賜金卭雅皆有祠祀之㑹以病請門人張星曰師勳已勒岷峨樞撫在旦夕閒何遽言歸也亨曰年來中外任事率植黨營私大亂將作每思匡救愧遐踪力微忍逐流乎遂以貴州左布政使致仕著寤歌樓集施堯化號泰維昆明人萬厯甲辰進士知湘潭縣有巨猾善邪術擒治之丁外艱服滿補長葛縣地褊賦繁盡革羡耗以蘇民困調光山廉得主盜者治之萑符以清俗多健訟片言折之即上司左右袒不狥也修城池葺學宫不需時奏功民忘其勞擢吏部郎中悉心延訪善甄别轉驗封乞歸閉戶蕭然不至公府劉鼎新呈貢人為諸生時即存心利物鳯克發難邑中亂民有思揭竿應之者新倡義勇先發擒之嵗歉常減價出糶中萬厯己酉舉人知雙流縣值奢寅之變令縣民老弱婦女匿他所獨與丁壯居守賊至開門延入賊易之競入新率僮僕手刃二賊出伏兵與戰賊倉卒不知為計死者甚衆其後賊凡三攻城不克遁去新遂督鄉民援省城賊望其旗幟咸避之成都圍解以功升叙州府同知監軍攻藺州斬渠魁魯仲賢收集萬餘人以積勞卒於嘉州董邦昌昆明人萬厯己酉舉人知長夀縣多惠政升貴州平越同知值黑苗叛薄興隆城邦昌多方捍禦賴以保全升知思思府告歸遇丁亥流寇之難舉家自焚傅宗龍號括蒼昆明人萬厯庚戌進士知巴縣行取浙江巡鹽御史巡按貴州征安酋有功晉太僕寺卿升薊遼總督兵部侍郎轉戶部以諌忤旨罷職崇禎戊寅復起四川巡撫尋加兵部尚書又以言事下獄壬午總督陜西征流冦李自成屢破賊兵後軍潰被執守義不屈死之諡忠壯夏誥字宗典昆明人貢生任教授自幼究心聖學意在化導愚民常以淨明忠孝倡為㑹而耳食者以淨明二字毁之幾陷於罪幸見雪督學陳善素重之晚益精心性學稱竹牗先生王錫衮祿豐人天啓壬戌進士纍官詹事府正詹吏部左侍郎枚卜二次後豫告歸里沙酋之亂起義討賊被執不屈死之趙撰昆明人天啓丁卯舉人性端方有勇力知龍泉縣有白蓮教倡亂盜賊蜂起苖蠻乘間作亂撰率勇士剿平之撫順苗蠻又於上元夜設劇張燈誘賊入城密調勇士執銅錘擊殺之以卓異擢御史崇禎甲申闖賊陷京師脅撰不屈罵賊而死馬乾號洛水昆明人崇禎癸酉舉人任茂州知州升知龍安府舉邉才卓異署䕫州府時張獻忠圍蘷城凡二十餘日乾誓以死守申眀大義感激人心親冒矢石隨機致勝督師閣部楊嗣昌援至賊敗遁庚辰擢川東道僉事升四川巡撫甲申率師禦寇於內江孤軍援絶死之事聞贈兵部尚書本朝趙士英字鼎望昆明人康熙丙戌進士選庶常事親以純孝聞季父無子英待之極盡誠敬丁亥假歸甘貧自適庭户蕭然有古賢士夫之風曲靖府漢尹珍字道直牂牁郡母斂人桓帝時自以生於荒裔不知禮義願從汝南許慎應奉受經書圖緯學成還鄉里教授於是南域始知學後官至荆州刺史三國漢爨習建寧郡人諸葛亮平南中收其俊傑為官屬習與焉官至領軍將軍晉謝恕字茂理牂牁郡母斂人咸和閒寧州為李壽所破盡有南中地惟恕不從獨保郡城以事晉官至撫夷中即將寧州刺史傅寶字紀圖牂牁郡平彝人仕至尚書郎安長令時號為南中人傑明陳輊字用昻曲靖衛人天順庚辰進士授刑部主事恤録江南多所平反擢員外郎才猷茂著尋按察福建兼兵備邵武值倭冦報警叱馭而行卒平倭亂丁外艱哀毁骨立忠孝篤至張璁字廷璧平彝衛人成化己丑進士授南刑部主事厯貟外郎中以明允著出知重慶府𢎞治初南贑閩廣夷冦為亂升江西兵備副使治城池積糧糗練士卒修器械設險隘建七縣城堡賊憚之不敢出後與當事論不合拂衣去盜復起兩廣都御史鄧廷瓚等奏南贑不可一日無璁特詔留之遂築南康城賊聞風解散尋以疾辭歸璁剛正不阿盤錯立斷墨吏斂手比歸槖中蕭然胡潔字汝清曲靖衛人正德戊辰進士知黃岡縣興賢剔蠧通水利農皆有成績擢監察御史巡撫直𨽻淅江奬廉懲貪風裁凜然晉光祿寺卿尋以內艱歸徜徉山水詩文自娛每朔望必燕㑹同宗以示敦睦陶廉字介夫南寧人嘉靖己丑進士厯官九江知府所至有惠政卒於官祀吉安沅州名宦唐時英字子才南寧人嘉靖己丑進士知平陽縣問民疾苦均賦稅興水利升戶部主事厯郎中擘畫詳盡為大司農所器重出知真定府有水鏡之頌厯官陜西巡撫籌邉有功御書忠勞二字賜之致政歸置義莊周貧乏己則衣布茹淡卒豫葬祭莊自勉字子貴南寧人隆慶間恩貢知德陽縣成都衛卒為其尉凌虐尉以事入德陽境衛卒潛聚於仙人鎮欲殺尉縣捕兵救免尉告鎮民窩盜殺人縣令失覺察徹於臺司鎮民懼罪逃匿勉如不聞徐縛衛卒十餘人白其狀上下恬然民始復業軍興挽運時值審丁即照丁給米運之民以不擾居鄉尤多德行後以南昌府通判致仕謝得申字芳洲曲靖衛人萬厯壬辰進士任順慶府推官有直聲撫按以銓諫薦命甫下病卒朱世昌字章峩曲靖衛人萬厯辛丑進士知舒城縣有政聲升兵禮二部主事致仕居鄉建桂香閣魁星閣鑄文昌像朱家民字同人南寧人萬厯丙午舉人㑹試副榜知涪州升潮州知府著有政聲遷貴州監軍道副使剿安賊建城十七座復創盤江鐡索橋人免病涉尋升布政使屢著治行及平寇有功特進一品服廕二子世襲指揮歸里節儉好義篤於鄉黨更置府㑹館於省城修萬卷樓積書凡有志之士皆養於其中人咸頌之馬夢箕尋甸人萬厯己酉舉人知羅定州升常德知府立身清介鄉人欽之莊大化南寧人萬厯己酉舉人知酃縣秉性清介自月俸外未嘗取民一錢火耗贖鍰痛加革除署清如水至晨炊不繼晏如也六載考滿升王府審理貧無以治裝士民斂金以贈力郤之留滯嶽陽三載訓蒙自給臨安府明弄甥元土官普提之後洪武初大軍南下弄甥率衆夷首先歸附太祖嘉之使世襲寧州土官既蒞任政先撫字能通下情凡州治皆其修創楊鈞字大用寧州人元末任威楚通判後避地景東明師南征鈞勸土官歸款潁國公傅友德上其績除通政司知事厯官戶部郎中升雲南土官參議劉三吾稱其在官以忠居家以孝云張文禮字用中寧州人志尚卓磊登永樂甲申進士疏陳不習吏事乞就學職授雲南府教授勤於課士尋乞歸居鄉訓徒名士皆出其門臨安甲科自文禮始張海字克寬寧州人選貢宣德閒任揚州府推官有異政正統閒擢河南道御史奉敕視閩案牘適延平賊鄧茂七作亂海㑹兵討平之升貴州按察使值苖民作亂按轡撫綏全省以安卒祀貴州名宦李旺河西人正統辛酉舉人知戎縣初蒞任土賊猖獗躬率衆擒之殁於陳事聞贈叙川府通判賜敕褒廕有司立祠祀之張隆字伯興建水人正統閒監生任杭州府知事以廉能薦厯升本府知府有濬湖築堤功入覲治行為天下第一天順閒丁母憂歸廬於墓側有狐兔馴伏之異人以為孝感云張西銘字希載寧州人海之子幼頴異博學登成化乙未進士知金溪縣縣多豪猾下車致其尤者庭誨之人皆感化㑹撫州饑諸屬枹鼓數起獨金溪人相戒勿為盜縣有虎及蝗為文禱於神患遂息以治行擢河南道御史巡按遼東治城塹核軍實再按蘇松發粟賑荒全活甚衆後督學畿輔士類傾心著有鶴軒集羅珦字用誠臨安衛人成化戊戌進士任刑部即中出知桂林府時西延陽洞諸蠻出劫興全珦檄州縣簡練民兵潛扼山口躡殺幾盡諸蠻斂跡王杲字啓昭臨安衛人成化辛丑進士知中江縣鄒智稱其清愼勤賦三事堂詩以美之正德初升四川參議政績懋著祀蜀名宦王璟字明伸建水人幼聰敏為諸生時粵人張某謫戊臨安比放歸鬻妻為資相別慟甚璟遇之為贖其妻與同歸後登𢎞治庚戌進士知懷寧縣興學治水以最聞正德初徴為御史時逆瑾擅權璟抗疏力詆朝中以真御史目之後巡按四川清戎伍之籍改瞿塘之路以邵武知府致仕歸居鄉禮讓人樂親之張繹字思紹建水人𢎞治丙辰進士知南溪縣擒劇賊韓積德勘永寧納溪軍民爭殺積案人咸心服升四川僉事藍賊之亂多所招降添柏林遞運減巴州解銀官民稱便以貴州兵備副使致政歸著有東巖録諸稿李文中字宗周臨安衛人𢎞治甲子舉人厯任吏部主事綜理精詳升禮部員外以議禮廷杖出為四川僉事整肅風紀賊寇秦柏周天星倡亂奉命撫剿悉平之厯固原兵備道致仕劉洙字道源新安所人正德戊辰進士厯官都給事中在諫垣十三年以蹇諤著名諫武宗遊畋五事肅宗端治本七事又請改新安所之地革十八寨之兵劾兵道王昊之乖法薦臨安府朱琉之廉能時議韙之里居置義田施棺藥建家孰繆宗周號碌磎通海人正德辛巳進士任戶部主事以議大禮廷杖後官至淅江左布政使所至有宦績里居三十餘年絶跡公門清約如寒士楊僎號肅菴臨安衛人嘉靖丙戌進士官吏科給事中疏靖難諸忠節事留中不報時論多之仕至參議居鄉以德行稱紀經綸字肫夫建水人純朴不妄言鄉里稱為篤行君子嘗市一婢貌頗異問之曰父為百戶曽立功以貧迫至此遂養為己女厚嫁之弟有癇疾愛護甚至中嘉靖甲午舉人知新都縣編縣馬以濟驛困再補上蔡縣開金梁渠以興民利計擒劇賊黑龍黑虎黑象等厯升鄖陽府通判襄藩長史志操無愧前哲萬文彩字國華臨安衛人嘉靖戊戌進士知富順成安兩縣老成練逹袪弊節冗擢南戶科給事中彈劾不避權貴疏禦堵馬市皆切中邉計出為貴州參議賑飢民擒妖賊升四川威茂兵備道退吐蕃之寇邉賴以安告歸淡泊無營日娛書史年九十而卒吳希賢字進夫建水人父早喪事母以孝聞母病瘵希賢盡讀方書和藥跪進親持溲穢年餘竟不起時祖母在堂慮傷其心承順備至有叔早逝撫其孤女厚嫁之所造就門人擢髙科者數十人中嘉靖丙午舉人知渠縣誘擒劇寇刁七輩萑苻帖然性狷介不隨俗步趨當事中以深文罷歸居鄉恬退和易口不言人過而有過者惟恐其知焉許鎡字國器石屏人嘉靖乙丑進士纍官監察御史時諫官詹仰庇斃於廷杖人懼權璫莫敢近鎡伏其尸大哭上聞之乃命收葬出為江西副使剛方自持與巡按不合遂致仕歸王恩民字成宇建水人隆慶戊辰進士知永川縣有循聲召試御史轉湖廣荆西右參議時崔家坪巨寇嘯聚往來荆門一帶無寧日恩民至廉寇踪跡除殲無遺人有再造之感後值故相張居正以父喪歸一時監司俱屈為趨奉恩民獨投刺迎謁弔賻如常儀張意不悅恩民竟登舟去張後諷湖廣御史論之調貴州參議尋遷副使時有夷寇突至城下挾取在獄罪酋人情震動恩民徐取紙筆分布官兵開城出擊賊遂退撫按合疏薦其才器可用之九邉會以憂歸服闋補官厯福建左布政晉巡撫右副都御史致仕歸優遊林壑淡泊自甘年八十六卒黃立中字訒膺建水人隆慶庚午舉人知資縣適楊應龍奉調遣引兵過其縣前驅者直入其庭立中縛之龍聞止不入訴於軍府右司馬徐元泰時成都知府耿定力亟稱其賢徐遂檄應龍速發兵自是愈加約束他邑賴焉事平應龍不敢復經其地後遷嶺西通判卒蕭崇業字允修建水人隆慶辛未進士識度宏遠生平無疾言遽色選庶常改兵科給事中厯戶工二垣先後封事數十上禁侈靡開泇河劾欺弊其調驛𫝊疏中有云一命半通誰非王臣而膳宰不致餼司里不授館非所以體羣臣也且立法峻則持久難請自今定職名填實數勿使下掠美而上不見德一時咸是其言以為得大體奉使册封琉球歸報命升兵科都給事中厯官南京都察院右僉都御史以養母告歸尋卒賜祭葬談繼統字宗道建水人萬厯己卯舉人與包見捷友善共為詩文倡和任元氏教諭升國子監助教為祭酒李廷機所重升刑部主事尋改工部遷貴州副使郤獨山蒙氏水西安氏餽金剿平野冦阿包等塗時相字揆宇石屏人萬厯庚辰進士任戶部主事有廉聲升大名知府置常平倉遍給牛種在任五年所轄州縣積粟至數十萬朝議推為廉能第一神宗賜鏹厯官南京太僕少卿閣臣張位薦其方正敏逹尋以病告歸家居時巡撫陳用賓以征伐議加稅充兵餉相上書力爭語甚激切天啓辛酉山東道御史陳九疇刑部尚書陸光祖奏相常平倉政績請為直省郡縣式詔令頌行天下所著有仕學膚言養蒙圖記包見捷字汝鈍建水人幼頴異八嵗時太守試以對句及七言詩應口而成登萬厯己丑進士選庶常為焦竑董其昌所推重改禮戶兩科給事中時遣中貴分出採金𣙜稅每中旨出輒力諫章凡十餘上中有云開礦之害陛下謂徒取諸山澤在礦使實奪取之民閒捶擊入山者十二載虎犀出柙者半天下詞意激切上震怒謫貴州布政司都事癸丑召入為戶部主事遷尚寶卿尋晉太僕寺卿在朝公卿以捷熟於典憲輒就咨詢多所匡濟出為江西巡撫戢宗人練軍實甄流品政績愈著特簡吏部左侍郎明年入京護喪之慶陵病卒贈工部尚書賜祭葬陳鑑字虛白石屏人萬厯丁未進士任刑部郎中出知廣西梧州府遷左江道副使厯官廉正有聲見璫禍起致仕歸念環屏多賊土城非久遠計慨捐多金改建磚石後賊起攻城不克人賴以全張法孔字南魯寧州人性孝母卒血出柩隙跪而䑛之登萬厯庚戌進士授戶部即中提督建昌學道厯四川左布政清操絶倫報撙剩銀三十萬以助兵餉後致仕歸修學繕城蜀藩特疏薦之以太常寺少卿取用為天下清官最趙琦字景韓寧州人萬厯庚戌進士任工部磗廠員外積弊俱清陶戶戴德奉敕巡厯山東纍官大名知府東省邪教猖獗琦預選丁壯繕器械城池未幾盜起賴以得全改知保定府刑清政簡卒於官殯殮不辦巡撫遣吏資賻大學士孫承宗以狀聞欽命馳驛歸葬入大名保定名宦王士昌字心泰寧州人崇禎癸酉舉人知泌陽縣時流冦張獻忠等猖獗練兵秣馬為守禦計賊臨城率民兵并所募壯士夜搗賊營獻忠引遁逾數月賊復攻救兵不至城陷士昌冠服懷印正坐堂上罵賊而死特贈光祿寺少卿本朝劉彪字玉菴建水人天性孝友丁亥流冦破臨安其弟被掠彪以身易弟歸養母流離黔蜀者數年張覺寧州人幼失父事母至孝偶得異疾夢神救之曰有趙某者孝子第一汝居第二疾遂瘳後禮部旌表孝子楊慶臨安衛人兄春永樂閒從征交址陳亡慶代兄子行訛言慶亦亡母痛喪明踰年慶歸遍求名醫罔效乃齊沐禱於北辰為母舐目久之復明董紹舒㠄峩人嘉靖閒應嵗貢入京至道中目眩心驚乃曰吾母思我遂歸絶意仕進比母終哀號幾絶操行髙潔足不入公門張廷作蒙自人嘉靖閒土賊逼城劫殺其兄廷佩廷作見兄危急向前救之俱被殺奉㫖建死義坊紀元字調甫建水人萬厯間貢生父良卒於軍母李氏孀居有廢疾三年艱於動履元與妻郝氏晝夜敬事不怠母病癰危甚元為跪吮而愈人稱誠孝所感楊世春阿迷人事母孝母死廬墓三年鄉人稱為楊孝子戴天資河西人母林氏目瞽跪而舐之雙目復明張任晟建水人生員少孤貧母孀弟幼晟篤於孝友養母教弟兩弟皆成名尤邃於易郡人以易起家者多出其門包萬化臨安衛人生員事親色養備至及殁哀毁幾絶祭必涕泣尤好周人之急以子見捷貴贈如其官龔朝傑建水人生員事親孝親歿哀毁盡禮鄉里稱之許綱通海人家貧負薪養母僅有一子一日夫婦往田母瞽目攜其子忽墜井中及歸竟不哭子惟寬慰其母孝養有加趙文宿阿迷人性純孝菽水承歡終身不怠敕賜天下孝子第一姚思敬建水人父母病衣不解帶躬視湯藥田宅財貨推讓其弟卒之日其妻洪氏不食踰旬而死萬容石屏人都指揮中長子性孝友事父及繼母能先意承志篤愛二弟推資不取尤好文學儒者重之馮敬字允恭建水人幼失怙恃事兄政克盡恭謹食必同席兄有疾湯藥必親致之趙臨大嶍峨人生員明末野賊劫掠負母逃賊欲殺其母臨大哀求願以身代賊憐之獲免其子善慶亦以孝聞本朝王敬德蒙自人生員聘段氏值流寇刲氏耳鼻氏父以廢疾辭婚敬德不從卒娶之後生子六人謝正石屏人前明貢生好義推誠素為鄉里所重康熙乙巳土酋龍韜叛攻城正倡義散財率鄉人竭力固守城賴以安許邦相石屏人生員事父母色養竝至親歿喪葬一遵家禮廬墓三年墓下忽湧清泉范學使題其泉曰孝感系以詩云青山數行淚古木一溪烟萬嵗千秋後人思孝感泉張良伍字葆孺石屛人貢生吳逆叛強授以官毁形自匿誡諸子混跡漁樵不入城市大師復滇授霑益學正以母老乞養課訓子孫皆有家法年八十而卒楊培阿迷人貢生堅守臣節不事吳逆文大師復滇授河西教諭升開化教授振興教告歸置義田以贍親族鄉人德之董玘通海人康熙庚辰進士官檢討假歸養母孝謹備至後母歿以哀毁卒房書石屏人康熙戊子舉人幼失父事孀母先意承志及母歿以哀毁廬墓致疾卒陳國琬建水人幼瞽習星命術養親生事死葬皆如禮弟國琰早卒子幼撫如己子其妹亦寡琬贍之終身蘇𢎞名石屏人好施與尤篤於宗族捐資建先祠置祭田數百畝春秋禴祀所餘為族人代納丁差至李占春字載陽郡人幼孤事兄伯春如父撫姪無異己出居鄉以仁厚稱由嵗貢任香山訓導納一妾年幼春曰此吾女輩不可犯也贈金遣之遷仁化教諭建尊經閣疏泮池以德化諸生又時濟其貧乏者崇禎間奉㫖入仁化名宦李士龍字化之郡人坦直端方事後母孝讓祖業與弟好學能文一時諸生半出其門以嵗貢官上海主簿委治河渠有成績民立慕禹堂肖像以祀海盜掠大姓捕獲訊治剖決明敏署縣事尤稱清介士民德之比歸行李蕭然楊繩武字念爾彌勒人偉貌洪聲兼資文武登崇禎辛未進士選庶常授監察御史巡鹽河東浚鹽池完逋課嵗饑設粥濟民全活甚衆妖賊以白蓮教聚衆捕獲首惡其黨立解巡按河南土賊郭三海衆至數萬率兵擒之截殺流冦不敢犯境遂自河南回京條陳數事召對平臺稱㫖擢僉都御史巡撫順天駐遵化時流冦猖獗懷宗以剿賊任之晉兵部侍郎總督薊遼軍務賜尚方劍繩武治兵有法汛地無虞復命旋京㑹松山告警廷推赴援再令督師繩武時病劇輿疾行至豐潤卒上聞震悼贈光祿大夫太子少傅兵部尚書豫祭葬廕一子世襲錦衣千戶元江府元哈繖徹里路總管初行省都元帥舒嚕杰諭以大義賽感慕遂備珍貢增差賦置驛傳比於諸路托迪元江路安撫使大德五年從征八百有功升元江路總管勇鷙過人部夷畏服時洞蛟為孽代挾利劍入洞頃之水盡赤代與蛟俱死蛟患息沿河始得耕種民感其德每嵗祀以中牢明施大節郡人永樂丁酉舉人知交址演州慈愛廉明宣德丁未黎利陷諒江府大節嘆曰豺狼不可厭也繕甲兵積糧餉為守禦計賊逼城下力屈死之本朝曹一彬新平人康熙乙巳土酋祿益反圍新平執彬令誘開城彬入率民兵固守賊攻之不克城得全後叙功旌曰赤心全城力鞏金湯東川府明普合土人以廕補知府撫字有方夷人信服昭通府明阿普土人元末任總管洪武中率衆歸附招鄰酋效順授知府大理府漢盛覽字長通楪榆人元狩閒從學於司馬相如所著有賦心四卷相如答書云詞賦者合纂組以成文列錦繡而為質一經一緯一宫一商此賦之迹也賦家之心包括宇宙總覽人物斯乃得之於內不可得而𫝊覽與張叔開迤西文章之始張叔楪榆人天姿穎異過目成誦元狩閒聞司馬相如至若水負笈從之受經歸教其鄉人晉龎遺楪榆人咸和二年李特據蜀李雄冦建寧遺起義兵攻雄走之唐段宗榜南詔清平官獅子國伐緬緬求援於南詔宗榜救之榜知南詔主老子世隆幼權臣楊苴顛恣擅恐其篡奪因請重其事權得專生殺許之乃限七日齊軍於河尾惟統矢失期立斬其將即苴顛子也既入緬敗獅子兵緬王酬以金寶不受惟取佛舍利歸至騰越聞南詔主死苴顛篡立宗榜與苴顛書曰王崩子幼聞公攝位國家之福曩援緬獅子國不戰而潰緬王酬我佛舍利宜率國人迎之境上苴顛得書服龍衣執金爐陳儀衛出迎舍利甫下拜宗榜即斬之歸國求世隆立焉宋髙升泰大理國人段氏臣保德侯髙智升子也段氏子孫不振國人推戴立之在位二年疾篤謂其子泰明曰段氏中廢國人推我不得已而從之今其子已長可還彼故物後人母效尤也泰明遵遺言求段正淳立之改號曰後理國而段氏復興李紫琮大理國人其主段和譽命為進奉使入貢於宋過湖南見學校文物之盛請於押伴求詣學瞻拜聖像邵州守張察許之遂遍謁諸生又乞觀御書舉笏叩首元段福段日先世為大理國王憲宗朝世祖南征誅其臣髙泰祥仍以段興智主國事乙卯興智與其季父福入覲詔賜金符使歸國丙辰獻地圖請悉平諸部竝條奏治民立賦之法憲宗大喜賜興智名摩訶羅嵯命悉主諸蠻僰爨等部以福領其軍興智遂以國委任福與弟日率僰爨軍二萬為前鋒導大將兀良合合討平諸郡攻降交址入貢興智道卒中統二年段日入覲世祖復賜虎符詔領大理善闡威楚統矢㑹川建昌騰越等城自萬戶以下皆受節制至元元年舍利畏結威楚統矢善闡及三十七部諸爨叛善闡屯守官告急日率衆進討大破之於威楚復遣孛羅攻賊於統矢城遂定統矢其秋舍利畏又以衆十萬謀攻大理詔日討之師至安寧擊敗舍利畏遂復善闡定新興進攻石城皆下之爨部平三年日入覲録功賜金銀衣服鞍勒兵器十一年賽典赤更定諸路名號以日為大理總管未幾舍利畏復叛日遣石買等詭為商旅執贄往見挺矛撞殺之梟首於市復賜金及金織紋衣於是置郡縣署守令行賦役施政化與中州等十三年緬國擁象騎數萬掠金齒南甸欲襲大理日領騎兵千人禦之以功授大理蒙化等處宣撫使十八年與其子阿慶入覲帝嘉其忠勤晉大理威楚金齒等處宣慰使都元帥留阿慶宿衛東宫陛辭復拜為雲南諸路行中書省參知政事十九年詔迎征緬師至金齒卒子阿慶襲爵纍授鎮國上將軍大理金齒等處宣慰使都元帥佩金虎符段日一作信苴日陳惠大理國人段氏臣至正聞明玉珍攻善闡梁王奔威楚召段功救援功與珍戰諜得珍母書令珍成功乃還功更其詞思得人以致珍惠願往功難之惠曰吾以一身救萬人當不負但有母在耳功曰迎爾母家吾家膳吾膳無憂也惠遂持書往珍得書默然揮之出惠歸言狀功知珍必夜遁追及敗之復追至七星關大勝而返功欲官惠惠不受楊升太和人豁逹超邁經史兼通至正閒厯官木邦澄江鶴慶知事以討明玉珍功升木邦路同知卒子寶為大理路通事以招諭土人授姚安路判官從征克蔚州曹州升大理路土官治中梁王搆兵寶曰兩國相鬭民有供餉鋒鏑之苦極力解和土人深感其德明楊禧太和人永樂辛卯舉人任榮經教諭上書言時政詞激切上怒繫之獄尋得釋拜監察御史遷知慶遠府以誠信化民任滿將行民遮道泣留臺臣上其事復留三年又將行民又留如初乃以參政行府事厯十二年實授參政遂乞歸特晉右布政使趙彥趙州人宣德壬子舉人知髙縣仁恕廉能百廢具舉郡守忌而陷之削籍後四年芒部作亂筠珙諸夷望風從之招撫弗聽惟曰趙尹來即降於是辟彥彥至單騎往諭果降論功復任卒於官杜亨字時泰太和人天順庚辰進士纍官黎平知府所至以慈祥稱始為諸生勤學鄉試第一從諸父逰宦洪洞識邑人韓尚書文於童子中大器之授以經及亨歸里韓為雲南布政使禮遇甚篤其孫韓偉復持節按部至郡躬求亨墓以文祭之戴仁太和人成化甲午舉人纍官鎮遠知府舊例有羡稅四千餘金為交際需前守以入私槖日增稅額商賈患之仁至編稅為三百六十兩以足一年經費餘悉裁罷亦不白於當道人或勸之曰彰己之長形人之短非吾心也升松茂兵備道歸里不治第館賓於門設榻於屏自號無懷先生卒之日家無餘財郡守吳晟涕泣而殮葬之包文偉太和人成化丁酉舉人性嚴毅里中後進多從受業鄉試對閹宦策屬詞峻厲閹以為詈己恨甚尋授呈貢教諭一日閹以他事召而辱之偉正色厲聲閹氣沮揖而遣之平居手不釋卷嘗製藥餌作橋梁以利濟人李華字子實大理衛人成化戊戌進士知密雲縣升太僕寺丞出知程蕃府不赴遂歸里優游如野老未嘗干人卒之日貨其居以殮趙弻字廷直太和人成化辛丑進士知邯鄲縣以約己推誠為治升太僕寺丞守官益謹致政歸田躬執耒耜媻跚泥潦中晏然自適同榜姚祥來為監司訪諸田閒問生事何窶對曰差勝諸生時矣有女不得於壻忽暴死壻家恐不知所措弻至謂壻曰死生命也其寬厚類如此張敏太和人成化癸卯舉人纍官至參政平蜀冦以功顯楊鼐號敬菴太和人𢎞治己酉舉人任黃州府通判以廉明稱後歸里四十餘年無老少皆稱長者所著有南詔通紀夀至百嵗李素雲南縣人𢎞治乙卯舉人知射洪縣卓異擢御史厯江西僉事所著有南崖奏議春秋心訣行於世張鳯羽字拱宸太和人𢎞治戊午舉人任鄷都教諭士貧不能婚葬者隨力助之嵗饑作粥賑濟遷知資陽縣明於斷獄知潼川州值威茂張遊擊死吐蕃之難捧檄往勘排浮議而白其忠里中稱為玉山先生楊南金字本重鄧川人𢎞治己未進士知泰和縣民有三不動之謡以刁惡財力權豪也擢御史值劉瑾亂政其黨為總憲凌轢諸御史金曰不做此官便了豈可屈於權奸乎遂拂衣歸即日行二百里瑾聞追之不及除其籍嘉靖間詔起耆舊授湖廣僉事晉江西參議以老歸年八十卒鄉里𫝊之趙儀號春汀太和人𢎞治辛酉舉人任應天府推官多所平反纍官知州在涪在瀘多惠政皆祀名宦生平以不欺自命往回萬里不借一馬一力於官其清介如此周臣字藎菴雲南縣人正德丁丑進士知公安縣性狷介改常德府教授升國子監助教致仕杜門讀書手不停披所著有翼聖𫝊及春秋心𫝊藎菴雜稿楊士雲字從龍太和人正德丁丑進士選庶常改給事中以病辭歸環堵蕭然手不釋卷與昆弟極友愛鄉里婚喪教以節儉一軌於禮著有皇極天文律呂咏史諸集屠巒雲南縣人正德閒知江夏縣以忤中使調蘆山縣㑹天全蠻長攻城屠戮巒受令剿捕俘其衆復所侵故地境內以寧及去邑人悲號流涕為建祠置田報祀焉李元陽字仁甫太和人嘉靖丙戌進士選庶常㑹有詔出翰林習吏事乃知江隂縣有循良績召為御史遇事敢言如止輦承天詰奸東朝等事一時推重巡按閩中懲墨吏禮文學薦舉耆逸林富馬鳴衡等扈駕承天遂知荆州府築堤捍江民皆德之尋罷歸家居四十年精研理學著心性圖說與羅念菴王龍溪等相印可年九十無疾而終所著有中溪漫稿艷雪臺詩等書行於世鄒堯臣號和峯趙州人嘉靖丙戌進士選御史厯官參政所至以治行稱丁艱歸遂不出設義田立家孰宗族德之趙汝濂字敦夫太和人嘉靖壬辰進士選庶常轉考功主事京察時總憲欲調某御史濂曰考察摘過不宜斥無過之官及上疏趙文華在黜中冢宰以文華為內閣所倚信不欲黜濂曰文華不黜則無可黜之官矣其剛直不阿如此晚擢副都御史侃諤有大臣風節致仕家居敦內行不置産業營一草庵匾曰覺真推俸與親族共之髙崶太和人嘉靖乙未進士任行人升監察御史視鹺兩淅巡按八閩風裁凛然豪強斂跡以直忤時謫州倅厯參議政尚整肅清操始終如一後告歸麗江土司以重幣乞言郤而不許李東字震甫太和人隆慶辛未進士知際莊縣成都有親王租稅地諸宗人常與邑民爭畔結訟官多掣肘又臺司郡長往來應酬民疲奔命東視事期月種種治辦彭縣有子殺父獄當事鄭重不敢決命東往讞盡得逆狀當事猶不決㑹恤刑部使取囚復驗忽暴雷殛囚死人益頌其神明灌口有茶山藩邸人侵界牟利久不能決東身履其地博訪獨斷遂成定案召為御史諸所論劾皆屬大奸奉命督修乾清宫羣閹奉約束上嘉其功賜金幣丁母憂歸服闋巡按廣西肅吏平獄時有寨夷之警粵撫意在用兵東曰小醜不足煩斧鉞議主招降果解散及得代遂乞身引退抵家益事暗修崇尚正學有詔搜括遺直廷議推之復御史未幾擢南光祿少卿連章請老隱於點蒼山麓趙用賢謂震甫文宗愚溪詩法少陵理學師白沙咸得其祕史旌賢雲南縣人萬厯庚辰進士知內江縣有賢聲擢監察御史侍經筵厯七省副使致仕著述甚冨李嗣善太和人東之子萬厯辛卯舉人知閬中縣治行卓越入知宛平縣有馮進朝者玉熙宫近侍也其門下王祿有細過進朝撻之立斃事發案驗得實付法曹行縣覆核進朝直入縣堂喧囂不已嗣善叱左右執而杖之付獄獄將上胥吏隂入進朝金嗣善白京兆尹褫其役進朝不勝幽苦益行賄謀以狀聞謂縣令小臣榜掠近侍誣指坐辟且請與嗣善共對簿而大璫又為進朝地人人危之臺諫言進朝罪狀顯白令執法固當於是法司始議嗣善奪俸不報後改奪職一級調外任而進朝止擬罰白粲始奉俞旨嗣善以外調遂不復仕後召為南戶部主事出𣙜武林關未幾卒姬文華雲南縣人少以孝行聞萬厯辛卯舉人知應山縣升睢州知府厯官皆著賢能及居里耿介不阿鄉人稱之艾自修鄧川人萬厯庚子舉人任湖廣知州性孝友丁艱歸廬墓六載手植松柏地溢孝泉應聘講學奉旨旌曰當代名儒其兄自新以選貢入成均卒業亦為理學宗望熊俊臣雲南縣人貢生萬厯間任瑞州訓導升羅次教諭宅衷正直立教有方瑞州祀名宦曾髙捷字雲馭賓川人崇禎庚辰進士纍官吏部驗封司員外致仕歸山居讀書精求性命之學生平慷慨好施至老不倦丁亥流寇入滇脅之以官抗節不屈年八十卒本朝施大成雲龍人貢生康熙乙酉任廣西府訓導性誠篤孝謹不茍言笑少時父遇賊欲殺之大成呼號奔救引頸求代賊感悟父子俱獲免晚年益邃心理學精闡大易訓示後學多所成就年九十卒楚雄府宋髙量成段氏臣世居威楚代髙泰運為相遣使由廣南求內附後退居威楚能恤孤寡老幼風俗化之稱夷中君子明何鑑楚雄縣人善事繼母以孝聞正德庚午舉人任涪州學正為冢宰夏邦謨所重遷知永川縣有惠政後歸居鄉親戚貧不能嫁娶者捐資助之更置田以贍宗族何漸逵楚雄縣人鑑之子恩貢生知蒼溪縣縣有蠶桑之利嵗獻令若干曰樣絲逵罷之嵗饑設粥賑濟後告歸仗義樂施資助婚喪建橋利涉父子世濟其美宋鈺楚雄縣人正德癸酉舉人任蘄水教諭科條嚴密衣食貧士擢知嶽池縣振學校崇積貯嵗旱徒跣祈禱罹疾不辭宦逰埀二十年所入俸資悉分親族家無私藏李啓東楚雄縣人讀書過目成誦下筆纍千餘言登嘉靖壬辰進士二甲第一厯官禮部郎中忠鯁廉介遠近稱之俞汝欽楚雄縣人嘉靖丙午舉人質性清粹超然塵外居家不營産業惟以讀書明道自任山居不履城市當事慕見言不及私惟直陳地方利弊纂修郡志皆其手筆詩文尤為清逸所著有山齊集孫學易楚雄縣人萬厯壬辰進士任寧國府推官斷獄無冤厯遵義道副使不畏強禦土酋奢崇明隂懷反側易欲破其謀請於當事不果行至後猖獗騷動三省衆方服其先見擢陜西右布政使致仕歸㑹友講學置義倉地方事宜有不便者直陳當事閭里賴之本朝徐達乾字躋庵楚雄縣人康熙癸丑進士吳三桂反脅之以官不屈堅正自守者八年及大兵平滇巡撫王繼文疏薦授山東髙苑知縣興利除弊政績甚著行取吏科給事中尋辭歸姚安府宋髙泰祥髙升泰之九葉孫為段氏相元世祖軍薄大理城舉國惶惶咸思蹈海泰祥獨率衆與元將巴延巴哈和爾郭等相持彌月力不能支退至托實救兵不至及被俘不屈豫以官不受殺之臨刑曰段運不回天使其然為臣死國吾事畢矣妻段氏抱孤瓊申訴世祖指其兒曰忠臣之後也善視養之命世其官元髙明姚安路總管天厯中入朝賜衣馬楮幣明年盜起招流離撫擕二闢汙萊還侵軼既又繕修官舍郵傳以至民賦軍儲無不精究治績最著明劉鈞姚安所人成化癸卯舉人孝友純慤未第時甚貧元夜玩燈拾金鈿不以語人明夕至其處候之不至又明夕復候之果一婦人來泣涕曰失此物為翁姑所迫幾死矣鈞持與之是年即登鄉薦知長夀縣分祿以及士之貧者歸里四十餘年不輕入市一日遇鄉飲惡其簡禮竟不赴王鳴鳯大姚人萬厯閒貢生幼事母以孝聞太守王鼎奇其學行為擇配既娶則一醜婦也欲為更娶鳯曰若棄此女則終身失所守益竒之因其貧捐俸買田以助後膺貢謁選赴京從王守仁學獻籌邉六策兵部竒其才除安福丞首卻常規舉鄉飲興水利立社倉擢知峩嵋縣除前弊政以解煩苛作千金堤以興水利兩邑俱祀名宦陶希臯字直南姚安所人從學於旴江羅近溪中萬厯癸酉舉人任石阡府推官發伏摘奸遷知永寧州平賦役擒巨寇以剛直忤上官遷王府官歸里奉親課子疏族伯叔無後者為任喪葬鄉里有不平者解之以息訟爭修學宫捐資倡首平差釁起軍與民交訌希臯抗論不阿幾為奸宄所中及事定而後人人德之陶珽姚安所人萬厯庚戌進士纍官武昌兵備道正直端方厯任有聲里居賑恤族黨講學論文士類重之永昌府三國漢呂凱字季平永昌不韋人仕郡五官掾功曹後主建興元年雍闓等聞先主殂驕黠滋甚降於吳吳遙署闓為永昌太守永昌郡在益州之西道路壅塞與蜀隔絶而郡守更易凱與府丞王伉率屬吏民閉境拒闓闓數移檄永昌凱答檄諭以忠義闓不聽凱恩威內著為郡中所信故能全其節三年丞相亮南征討闓既發在道而闓已為髙定部曲所殺亮至南中上表曰永昌郡吏呂凱府丞王伉等執忠絶域十有餘年雍闓髙定逼其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯會為叛夷所害子祥嗣其後子孫三世為永昌太守李雄破寧州諸吕獨不附世稱其賢唐楊興郡人蒙氏時為布燮天寶八載率所部入附璽書褒美子孫世為永昌酋長厯段髙二姓至明洪武初兵下大理興後裔獻馬領所部歸附明丁嵩保山人家貧事母孝洪熙閒舉懷才抱德辭不就宣德閒詔草野直言嵩上機務八策一曰正心術則天道應二曰重經筵則宗社福三曰開言路則聞見定四曰用賢才則政治美五曰總大綱則庶務舉六曰汰冗兵則軍儲足七曰重守令則邦本寧八曰崇節儉則財用足上嘉納徴之道病卒所著有橫峯樵唱楊元字務本保山人潛心理學終日靜默頓悟卲子先天數學有叩之者言無不驗為諸生卒業太學歸隱居不仕甘貧樂道從學甚衆當路重其人亟饋之無所受或封識待其去任返之所著有納甲圖九圭數學基指南行於世人稱象山先生萬綸字允言金齒司人成化丁酉舉人任武岡州學正升翰林院待詔厯官長史致仕歸內外族黨之貧者咸周之年八十六遍辭親友旬日而卒所著有西窗集妻王氏亦有月梅軒詩集張志淳字進之金齒司人成化甲辰進士𢎞治閒任吏部文選主事厯升選郎用賢拔滯門無請謁與天台黃元昭齊名正德初擢太常少卿提督四譯館懲入館子弟空名之弊一變舊習時論多之晉南戶部右侍郎尋致仕晚年以圖書自娛所著有南園集西銘通南園漫録永昌二芳記諸書年八十一卒滕檳字秀之金齒司人成化丁未進士厯南戶部即中清苦持重以親老乞歸家居淡泊不治産業與人交平易可親非慶弔不出著有永昌百咏歸田録等集吳璋字廷獻金齒司人𢎞治己酉舉人過浙問學於王守仁居三年所養益粹授長夀教諭倡明理學教人以致知力行學者宗之稱執齊先生林巒字鍾秀金齒司人𢎞治辛酉舉人知鬱林州廉介清苦值嵗荒捐俸代貧民償逋稅以內艱歸至沙木和囊罄鄉人延為墩師資以館榖乃得歸及服闋不能治裝郡士髙其誼助之行補賓州卒於官戈諫金齒司人𢎞治甲子舉人厯太僕丞出為湖廣僉事所至以廉幹稱㑹擒巨寇賚豫有加張含字愈光金齒司人志淳子正德丁卯舉人不樂仕進遊梁宋閒為李夢陽所知深加稱賞及歸與楊慎友善學者稱禺山先生著有詩文行世張鐘字子鳴金齒司人正德癸酉舉人任嶽州府推官摘發巨奸不屈閹宦厯南工部郎中以疾歸居家十五年淡泊自如及卒惟圖書數卷士林稱西村先生閃鏜字大聲金齒司人少負義氣為諸生時人有竊其二馬者知其人不發中正德丙子舉人知酆都縣居家不治産業事親以孝聞張合字懋觀金齒司人志淳子十六中嘉靖壬午解元登壬辰進士任刑部主事厯湖廣副使以疾歸性嗜學手不釋卷善書畫權貴造請輒卻之居鄉不談公府事時欲清查夷田人心􅍅􅍅乃為書五千言逹之當事事遂寢所著有賁所文集吳宗堯字協卿騰越人嘉靖癸卯舉人厯馬湖府同知復補延平所至有賢聲終養歸嘗從湛甘泉蔣道林遊講明正學學者宗之輯郡乘二集邵惟中永昌衛人嘉靖丁未進士厯官太僕寺卿在朝有聲告歸居閭里恂謹不敢上人有先民遺度吳嵩永昌衛人嘉靖庚戌進士任刑部主事轉員外出知福州府禦冦有功升四川副使陳情終養創義倉置學田賑饑恤貧鄉人德之薛繼茂字懋敬永昌衛人少刻厲有大志登萬厯癸未進士初知孝感縣調長樂以憂歸補文安召為湖廣道御史慷慨言天下事不少隱諱如論郊廟不親請建國本諸事語皆戅直初竝封之議神宗謀於閣臣時王錫爵以為可及旨出舉朝力爭歸咎錫爵惟繼茂一疏最和平復上書相國事得寢又疏出滇臬李材於獄旋奉命巡按貴州請增解額五人繼為怨者所中削籍歸後追録忠直贈光祿少卿閃繼迪保山人萬厯乙酉舉人任吏部司務天性篤孝家法嚴正生平喜奬掖人不喜人諛漕澗賊臨城建議主剿施甸激變建議主撫皆中機宜鄉人立祠報德以子仲儼貴贈檢討賜諭祭著有羽岑園秋興吳越遊草諸集王㑹圖保山人萬厯癸卯舉人知鹽山縣卓異擢貴州道監察御史巡關𣙜以直忤權璫歸石應嵩字淡寧保山人萬厯庚戌進士知江陵縣操持嚴毅遇事剛斷豪猾斂跡㑹水泛親督沙市居民障水作堤民免昏墊以堰塞罣吏議調靈寶縣礦徒數千人入其郛應嵩登城拒之賊亦登嵩手刃二人指麾力戰賊大奔撫按以聞升南兵部主事浦口城為南都保障江水浸齧南城盡圯部檄應嵩董役應嵩議先築堤障江苦無石乃登髙相山脈指一區掘之得石作堤七百餘丈督率不遺餘力初議一面當糜金錢五萬厥後三面俱新之計其工費僅四萬餘工垂成而嵩卒大司馬黃克繢與戶工二部合詞請贈恤戈允禮字敬輿保山人天啓壬戌進士知麻城縣弊絶風清邑人比之召父擢戶科給事中轉吏科彈劾不避權貴忠言讜論略無回曲厯南府尹升工部侍郎著有四書正眼知儒管見等書閃仲儼字人望繼迪子天啓乙丑進士厯官少詹禮部右侍即兼翰林院侍讀學士枚卜一次初官庶常時忤魏璫矯旨削籍懷宗召為纂修日講官宸眷有加兩典棘闈一奉桐封不究其用而卒潘嗣魁保山人事大父孀母以孝聞置義田焚借劵文行兼優崇禎間行保舉法閃仲儼舉以應詔後中丙子舉人子世臣同榜解元知萍鄉縣以廉慈稱鶴慶府元髙惠直鶴慶路人為本路總管有德行衆所愛戴明趙和字逹道郡人正統閒貢生任貴州銅仁訓導嚴矩範飭條約首以孝弟立教訓誨有方人信愛之內艱服闋補四川建始訓導銅仁諸生上疏乞還舊任許之又外艱服滿當别補銅士又請之復報可凡三任銅仁及致仕歸生徒泣送祀名宦後學道胡堯時榜其行於明倫堂趙子禧字慶夫郡人和之子天性孝友多才藝年十九中成化丁酉舉人任臨安訓導克端模範秩滿試吏部第一升南陽府同知政績甚著卒於官入臨安南陽兩地祠祀所著有碧莎蛙鳴二集張勉字希安劍川人𢎞治戊午舉人知黔江縣有巨寇數年不能平勉饒膽略至才彌月計擒渠魁時督責挽運甚急民且逃散勉止之曰吾能為汝逹之遂力請於上果得減徴民乃安集明年卒於官將屬纊其妻問何以歸櫬曰寄葬重慶可也士民哀之立祠以祀鄉子弟受其教者稱為龍溪先生陸經郡人𢎞治壬戌進士纍官南兵部即中賦性耿介貧約自如卒之日棺殮不具趙德宏字有容郡人正德丙子舉人事父遠以孝聞父沒京師宏哀毁骨立徒跣偕傭人肩柩以歸既葬廬墓三年有白犬護墳馴鳥巢樹之異巡按唐龍奏聞榜其居曰孝子趙氏之門任順慶府通判有疑獄宏一訊立白遷知潼川州贖鍰悉令輸粟得粟萬八千石後嵗大饑鄰邑道殣相望獨潼川得免又興建圯城民不知勞潼人為立祠祀轉慶府左長史及歸行李蕭然包御史大節疏聞以禮存問為立孝廉坊郡人因名其里曰孝廉村朱珮字鳴朝郡人正德辛已進士任大理寺評事多平反寃獄出為貴州僉事調停驛𫝊民用以蘇計縳元惡不費兵餉厯湖廣副使抑豪右增隄防升廣東參政值盜起設謀禦之絶其汲道皆歸降又以計略平定交南莫登庸等升陜西按察使乞休居鄉恂恂若未嘗有官者楊鑰字啓之劍川人嘉靖丁未進士聰穎剛方不隨流俗理學為土人宗厯官工部郎中以修孝陵勞瘁卒彭富字仲禮郡人嘉靖壬戌進士知崑山縣入為戶兵二部主事出知紹興府以廉操薦異等入覲上慰勞有加親賜聨云帝近春常在官清樂有餘㦄貴州參政按察轉四川布政使先後平李富征十寨討建越均徭役寬𣙜稅平出納所在以功德著升貴州巡撫寬和鎮靜夷漢帖然尋致仕歸蔬食敝袍恬然自適而性剛介不妄言笑有古人風查偉字警偉郡人萬厯甲戌進士厯官戶部即中出知真定府再補保寧府所至以廉明稱以苑馬寺卿致仕歸居鄉謙和人咸服其雅量吳堯弻字宗舜郡人萬厯丁丑進士選庶常改兵部武選郎中出為貴州督學僉事嚴冒籍禁有直指某庇其鄉人弻不可遂中傷之廷議知弻寃寢不行後補四川兵備道時安綿蕃夷滋擾弻撫御有方蕃人誓不復反民賴以安卒於官綿人祀名宦閔宗聖字心遇郡人萬厯壬午舉人常置義田以贍族分廪讓田於友時論髙之署咸陽教諭盡心教士周恤孤寒遷知榮昌縣多惠政大工掄材采運如數民不稱擾邑有大憝人莫敢攖聖置之法榮人稱快㑹征楊應龍竭力王事卒於官聖家本裕反以官貧祀榮昌名宦趙捷字習南郡人萬厯壬午舉人任宜良教諭升國子助教出為瑞州府同知攝髙安縣篆時有文牒株連數十人羅織成獄捷止坐殺人者餘杖釋之上官不可捷力爭曰殺人以媚人雖死不為上官銜之捷既耿介不屑趨承復淡於仕進㑹遷長史遂致仕歸楊提字漸髙郡人萬厯戊子舉人知桂東縣地苦瘴人不知醫提置藥局所活甚衆邑賦嵗飽奸胥提核其久占者三人置之法弊始絶邑故無科目子襟橫豪提教之向學士風始一變俊遷西安府同知攝渭南縣及邠州多惠政秦人德之卒於官提生平讀書以體認為功其學有體用相國李標為之𫝊梁州彥郡人萬厯癸丑進士知新繁縣當路謂才浮於地尋調華陽華夙稱巖劇彥到任百務俱興每大牒片言而折以治行卓異入覲留部考選念親老乞歸養未竟厥施而卒楊棟朝字夢蒼劍川人萬厯癸丑進士厯官南禮科給事中值魏璫禍起屢疏抗劾不避斧鉞削奪歸里後起補吏科遷光祿寺卿其劾璫疏載在明史與楊左爭光焉楊芳盛字大豫郡人萬厯丙辰進士知大冶縣有聲考選山西道御史巡按河南剔蠧鋤奸厯見丰采視長蘆鹽政猾商斂手補京畿道適遇黔中奢安之叛條陳安邉諸疏廷議偉之遷太僕寺少卿提督西路馬政多蕃息轉右通政厯應天府尹以敦大持體政績益著崇禎壬午擢南京戶部右侍即兼都御史總督糧儲時流冦滋熾南糧飛挽不繼盛措置有方癸未告歸濟貧乏敦族閭優游泉石閒年七十一卒段髙選字讓宇劍川人萬厯己未進士知巴縣有循聲天啓辛酉奢酋集兵渝州一切治辦俱選經理比從上官㸃閲見酋有叛心隂令吏歸印於署與父汝元訣及奢酋猖獗衆官駭散選獨躃踊大呼不去酋知選廉明戒勿殺選罵賊不絶口遂死於亂斧中變聞父母子女俱相繼死於署僕段黑子挺身赴演武場索選尸亦死之崇禎初賜祭葬諡恭節敕建昭忠祠祀之楊應宿字斗瞻郡人天啓壬戌進士厯官員外即中挖運通州轉輸如法陋規宿弊剔釐殆盡出知成都府百務自裁苞苴頓絶深獲士民心以內艱哀毁骨立匍匐閒關歸尋卒陳奇猷字襄宸劍川人天啓壬戌進士性長厚為諸生時拾遺金歸其主授中書擢御史疏陳滇事極中肻窽視節慎庫以清慎聞因彈主政貪穢為所擠落職歸道卒順寧府明猛蓋郡人世襲土知府恩威竝濟土人懷之猛卿字堯佐郡人通書史世襲土官嘉靖丁亥以武功賜鏹幣永北府明庫齊巴哈父布圗格濟仕元為永寧知州洪武間八合領兵歸順永樂丙戌諭西番入朝上嘉之升永寧為府賜鍍花金帶鐫四字曰克篤忠誠世其官麗江府元麥良父宗見方技良世祖時為察罕章管民官從克大理擒段興智功居烏蘭哈達之右以副元帥佩虎符鎮麼些又破鐡橋城華馬國加授銀印為提調諸路長官司明阿得郡人元時麗江宣撫司副洪武十五年兵下雲南率衆歸附賜姓木十六年開設府治授麗江知府會西番劫瀾滄江得引兵卻之又從指揮董某破石門關寨命世襲土知府征巨津擒阿奴聰斬僞元帥朱保屢著勞績後卒子初襲從征麓川有功羅克蘭州人仕元為萬户洪武中率衆來歸以軍功授土知州其孫羅牙從木初征伯刀于孟屢著戰功木增阿得八世孫萬厯閒襲知府值北勝州搆亂增以兵擒首逆髙蘭三殿鼎建輸金助工兼陳十事下部議可朝廷喜其忠誠特加參政秩增又好讀書博極羣籍家有萬卷樓與楊慎張含唱和甚多蒙化府明左伽蒙舍人永樂中襲知州後從征麓川戰于大侯功第一升臨安知府仍掌州事正統閒升州為府遂以伽為知府丁昶字德輝蒙化衛人成化戊戌進士厯官武選司即中出知石阡府先是苖叛學宫府治壇廟郵𫝊倉厫盡成灰燼昶以次修復設鐘鼓警昏夜賑民恤士收輯流亡卒於官有烈風星殞之異櫬歸囊橐蕭然惟遺稿數卷而已劉揮字本忠蒙化衛人貢生任雅州訓導恂恂雅飭學問淵宏彌渡市舊不知學揮開館教讀竝講明冠婚喪祭之禮風俗一變雷應龍字孟升郡人正德甲戌進士知莆田縣條行八禁皆切時宜時巨璫督貢方物甚橫力折之均徭平賦築堤堰毁淫祠大愜民心擢御史奉敕巡鹽兩淮政暇引諸生講正學江都祠堂久圯檄有司新之因災異疏八事曰務實學親大臣放宫人去無益正禮教改編發宥罪謫均賦役上嘉納之尋有中貴乞織造得請公手疏極論不報憤鬱成病卒於揚州官署本朝張芳譽郡人順治閒貢生居心仁慈樂善好施力行不倦年逾七十猶手録格言𫝊播遠邇雖嚴冬酷暑誦讀不輟康熙庚戌士民公舉德行督學壽以仁旌曰德隆望重壽八十卒李士竒郡人貢生制行端方宅衷謹慤康熙癸丑吳逆叛脅之以官力辭不受操守堅確至老弗移忠烈雲南府明李葆昆明人洪武閒以軍功授前衛守禦千户永樂間從黔國公進征安南有戰功後復征交址與賊鏖戰於大安海口矢石俱盡挺戈刺賊大呼報國遂陷陳死程世勳昆明人後衛百戶嘉靖閒官兵討鳯繼祖世勳護餉至金沙江因令督偏師出哨至波羅結堡猝值賊衆力戰死子道南以孝聞朱朝冠字子儀嵩明人嘉靖壬子舉人厯漢中通判督兵征何勉屢戰皆捷賊火焚營朝冠往救焚死徐朝綱晉寧人萬厯庚子舉人厯安順府推官㑹水西賊攻城誓衆堅守城陷被執不屈闔門被害唐俊德舉人周之麟生員陳宰百戶李印土官俱祿豐人萬厯閒賊攻掠縣城德等血戰被殺汪文度宜良所世襲指揮天啓閒猓賊犯城文度往禦被刺腸出仍奮武擒賊斬之城賴以完程坤昆明人武進士天啓閒官四川總兵中軍㑹西路為賊梗率兵赴援至畢節城陷被執不屈死佘士泰昆明人天啓甲子舉人任石阡府推官上計次襄陽值張獻忠冦亂城陷死之劉惟馨昆明人天啓丁卯舉人任陜西鄜州知州值流寇圍城率衆拒守城陷罵賊亂刺而死司慎昆明人沐天波參隨定洲反先假稟辭襲天波直入府第慎叱之定洲解衣露甲抽佩刀率衆排闥入慎力拒被刃斷胸而死向六馬三俱昆明人沙賊反隂約敢死士十人書報國字為號共圖賊不克俱被殺劉㩠昆明人任戶部主事為闖賊所執三木橫加折一足未死歸至滇流寇使人招之授以督學㩠曰京師不死已無面目見先皇豈復為賊官耶大罵而死李兆旗昆陽人崇禎閒貢生任廬江訓導流寇圍城兆旗守北門城陷被執不屈罵賊死羅銘鼎三泊人崇禎庚午舉人厯官四川威茂兵備道攝按察使篆值流冦張獻忠犯川拒賊守城及城陷被執不屈罵賊而死妻段氏攜三子兆鶴兆桂兆昌俱投水死楊永言昆明人崇禎癸未進士知崑山縣嚴明有治聲流冦破城巷戰而死沐天澤黔國公天波弟任都司明末沙賊叛率兵巷戰被執不屈死之陳大經字爾至昆明人少慷慨有才略善騎射兩中武舉沐天波延與贊畫吾必奎叛大經典大西門防守及沙賊之變沐天波倉皇走城上欲出亡大經叩馬諫曰尚有日月營兵在殺賊不勝行未晚也時奸人干錫朋隨天波每隂為沙賊地忌之以目視天波天波反疑其見誘抽刃殺大經而去徐髙遷沐天波裨將沙賊陷城遷將糾衆援剿而人無鬬志知事不可為闔家閉門自焚死黃恩右衛人百戶沙賊陷城率家丁數人巷戰連殺數賊以衆寡不敵為賊所殺陳爰謀昆明人萬厯壬子舉人原任知府致仕家居沙賊破城逼欲用之不屈而死李開芳富民人貢生沙賊破城潛出乞援知事不濟同生員王朝賀縊死於松華壩劉昌應右衛人武進士明末為參將流冦入滇倡義起兵屢與賊戰被執不屈死之向琪向宸俱左衛人百戶聞流寇至琪一家十六口皆縊死宸亦闔門自焚王來儀字仲威昆明人萬厯庚子舉人任吳縣教諭厯官應州知州性耿介與上官不合歸甲申聞變門人王錫衮督師赴難儀涕泣相對勉以忠孝丁亥流寇入滇罵賊而死蔣薦前衛人百戶聞流冦至一家七口俱自縊死僅存一子施于京昆明人生員流賊破城闔門自焚談三謨昆陽人貢生任臨安府教授歸流寇破城闔家自縊張如良昆陽人貢生持已清慎流冦之亂良與子景輝景輝及妻媳一門俱殉節死莫貴德宜良人子可及靖州知州流冦屠城謂妻麻氏曰子受國恩身蒙寵錫當以身殉同赴井死朱荃安寧人孝行純篤隨父化孚官江南不忍歸後娶歸值丁酉王自竒之亂荃寓趙州不屈而死薛大觀字爾望昆明人與子之翰俱有才名戊戌雲南潰兵肆掠舉家至城北龍泉觀慷慨賦詩妻女皆誓同死以金授僕令他往僕哭曰主死奴輩寧忍獨生相率赴龍潭死數日尸浮水面七人牽聚一處單武襄昆明人貢生戊戌遇潰兵闔家舉火自焚書於門曰一門完節本朝楊思義昆明人流寇入滇聞田主嚴賓闔家殉節與妻陳氏投井死楊樹烈昆明人任四川南川令致任歸流寇潰兵屠掠舉家倉皇奔避烈獨置香案著衣冠北面再拜自縊死逾月家人還視面色如生曲靖府明趙俸馬龍所千戶嘉靖間安銓之亂力戰死趙愷尋甸人性行誠朴為鄉里所重安銓叛攻城愷率衆拒之城陷舉家登樓自焚死知府劉槐即其居址為祠祀之諸藩裕尋甸守禦所指揮萬厯間大理保作難藩裕與千戶戚貴卿陳萬國土舍資有能皆赴敵死之李仲武鳯梧所軍萬厯閒從指揮諸藩裕征東川已擒土酋賊復劫營仲武遂力戰死有司勒碑表之李加培平彝衛指揮天啓間從參將尹啓易討霑益諸夷死於陳曹三捷平彛衛指揮僉事天啓間平彞諸蠻亂陷城官吏士民皆逃竄獨三捷與賊戰死邵元齡陸涼人世襲指揮有能名明末沙定洲作亂其黨趙應元攻陸凉城陷罵賊不屈而死尹大任陸凉人崇禎末任定番州學正孫可望入冦城陷謂家人曰明倫堂我之西山也冠帶謝祖考徐步出拜北闕遂自縊臨安府明王綸臨安衛人永樂閒擊黎賊有功升正千戶鎮守蒙自後復從征黎賊陷伏中死之葉晟臨安衛後所百戶正統閒從征上江奮勇殺賊歿於陳邵謙臨安衛左所百戶正統閒征上江有功後攻馬鞍山戰歿孫華臨安衛前所百戶成化閒撒甸夷亂從征勇敢赴鬭歿於軍王保建水人多勇力殺土賊剿叛兵屢立戰功後禦賊戰死土人祀之劉大經石屏人充寶秀義勇兵嘉靖閒調征武定鳯賊遇伏力戰被執賊支解之周尚懷石屏人野賊肆行劫殺尚懷奮勇捍賊戰於老衛寨被刺而死范印華建水人天啓間以征安效良授遊擊崇禎閒五酋普名聲叛守城力戰屢破賊兵加參將後復領兵誘賊機泄被執不屈死之楊國彥阿迷人生員普名聲叛國彥以義勵鄉民禦之為賊所害史覲宸石屏人崇禎癸酉舉人知南充縣多惠政值土賊姚黃亂率衆拒之多所斬獲以功擢知順慶府賊復引張獻忠入攻順慶力禦被執罵賊而死楊一忠河西人貢生崇禎間任巴縣教諭流冦攻城分門拒守城陷罵賊被害子名嗣伏尸哭亦被殺耿廷籙河西人天啓甲子舉人仕至四川巡撫以討流賊為史可法所重丁艱歸流賊陷河西死之澄江府三國漢李球俞元人李恢姪也任羽林右都督隨諸葛瞻拒鄧艾臨陳授命死於綿竹武定府明楊忠惠和曲人生員嘉靖間鳯繼祖叛軍門議招降賊營以散其黨無敢前者惠奮義請行賊執之不屈罵賊而死金守仁武定守禦指揮王應爵魏守恭梅應時黃桂俱千戶金榮髙鎮撫楊應祖陳宰俱百戶董漢英生員以上諸人俱死萬厯丁未阿克之難御史鄧渼疏稱其或效死封疆或捐軀行陳或延頸待刃或闔門被屠搶恨黃泉血濺萇𢎞之碧銜冤五夜聲哀望帝之魂例當廕叙以慰忠貞本朝徐升曜元謀人副將奉遣往蜀招撫王屏藩欲降之不屈被害贈左都督賜祭葬廣西府明楊廷瑚彌勒人貢生慷慨好義嘉靖閒率鄉兵助知府郭集禮討夷賊阿旦奮勇致敵死之楊令聞彌勒人廩生普名聲之亂罵賊而死何天衢字升宇三鄉城人有勇略普名聲招為頭目使駐三鄉後名聲謀逆擬三路出兵㑹戰省城因遣銃手三百名促天衢由維摩羅平一路天衢慨然曰此丈夫報效朝廷時也豈可與賊反耶遂抗諸銃手率先歸順維摩署州事李嗣泌開城納之時名聲已陷彌勒聞天衢反正患在心腹急撤兩路兵歸巡撫王伉題其功授參將捍禦普逆纍功升都督同知名聲怒甚自攻天衢名聲中炮死其妻萬氏復攻之天衢勢孤糧盡自刎死元江府本朝康天錫郡人任本營把總雍正十年猓賊叛禦于他郎奮勇先登死之張文秀新平人任新㠄營把總分防揚武壩猓賊叛率兵堵禦力屈被殺以上二人事聞俱賜祭葬贈廕賞恤大理府明董寶大理人南詔清平官董成之後洪武閒任順寧土經厯清慎勤敏部民安之後以功遷大理土經厯麓川之役多著功能以死事諭祭尹夢鰲太和人萬厯乙卯舉人崇禎閒官頴州知府流賊破城死之趙興基太和人貢生崇禎間任廬州府通判流賊陷城基肅衣冠縊於城樓尹夢符尹夢旗馮大成俱太和人丙戌沙賊亂同舉義討賊為所執俱罵賊死夢符攴解尤慘髙拱極太和人孝友持躬風節範俗沙賊破城投池而死楊士俊太和人沙賊破城同母及妻妹俱自焚死楊憲太和人廩生居家孝友持己端方沙賊攻城憲倡義拒守城破積薪樓下率妻女等七人次第縊死令舉火焚樓弟婦及女竝壻李孔昭亦移火别室自焚學使謝于道旌曰禦寇則百口登陴殉難則一門全節宜載志乘以薦馨香張景仲太和人生員沙賊破城死於學宫妻女三口皆投井死楊育華太和人沙賊破城死於學宫弟時華振華母妻一家焚死李嗣淳太和人生平負氣沙賊破城投五印菴池水死楊瑡太和人貢生沙賊之難作絶命歌罵賊而死李褒太和人生員賦性剛方沙賊破城被執不食七日死宋應奎馬斯龍張相業皆太和人生員沙賊破城著冠服死於學宫王寧太和人增生沙賊破城正冠服坐中庭罵賊而死同時諸生陳捷尹亮工蘇升楊大鴻胡康尹𢎞載李元鳯張書紳楊先卉等殉難者又數十人陳正大理衛應襲指揮年十八沙賊圍城屢率衆出殺賊城破猶巷戰手刃數賊力屈死之陳誨大理衛守備謀勇兼擅武藝絶羣沙賊攻城分守東門城陷奮力格殺賊數十人而死關維翰大理衛千戶沙賊攻城分守西北隅城陷力戰殺數賊而死刀猶在手子太忠死其側楊昌印王象乾皆大理衛千戶沙賊破城率妻子闔室焚死鮑洪大理衛世襲指揮千戶沙賊破城洪率妻女家人閉戶自焚死楊淇雲南縣土官沙賊叛被執嚙指血書兒曰吾寧死不從賊繫至省城不屈死之楚雄府明王用之鎮南人監生宣德閒任交址慈廉州知州遇交人叛用之執節不屈被殺後同何忠等贈恤吳繼勳楚雄衛指揮使勇智絶倫萬厯間督軍征緬屢戰屢捷緬人恨之孤軍深入陷歿事聞賜祭陳士性楚雄縣人選貢崇禎閒任冀州州同流寇陷城死之丁師羲楚雄縣人選貢崇禎間知霸州值羽書交集竭力戰守城陷被執慷慨殉難贈布政司參議謝琯楚雄縣人崇禎癸酉舉人任四川遵義府推官以廉幹稱擢遵義兵巡道適流冦攻城琯戰敗被執不屈賊下令屠城琯曰茍止殺吾當從汝賊許之遵人獲免賊迫與偕行至貴陽自縊於學宫包洪策廣通人崇禎己卯舉人知新都縣至任甫四月流寇至力守孤城食盡城陷不屈死之杜天正字端先楚雄縣人崇禎己卯舉人少負忠義沙賊攻楚雄同副使楊畏知協守後畏知往禦流寇於獅子口敗績城中瓦解天正書城樓壁曰滿城鼠竄恨滇南無一赤心男子千秋電火求後世免一青史罪名至西城樓正衣冠自縊王承憲楚雄衛世襲指揮中武舉授遊擊為楊畏知前鋒沙賊攻楚守具皆其幹理賊去而復至承憲將中軍往禦土司那崙等翼之賊隂通土司故黨及戰左右翼不至憲知中計大呼手殺數十人身中流矢與弟承頊俱戰死張朝綱廣通人貢生崇禎間任沅州州同致仕家居明末流冦至廣通綱語妻馮氏曰曾受國恩何顔對賊因同妻序左右而縊子廩生張耀慟絶復蘇葬親後亦自縊死王家祥楚雄縣人廩生流冦入城闔家二十九口皆赴水死姚安府明髙棟姚州人土舍𢎞治癸亥普安賊叛棟偕大理指揮唐永擊之奮勇殺賊十餘人追至板橋驛遇伏隻身還戰中十數鎗死巡撫嘉其義勇以禮歸葬之髙鵠姚州人土舍多謀幹善騎射嘗分捕諸夷俱斂跡不敢為盜嘉靖辛亥元江那鑑之變布政使徐樾遇害鵠奮身赴救死之事聞優恤其後李師泌姚州人武生土逆吾必奎叛楊畏知任楚雄監軍道委師泌協守楚城後必奎破城師泌被執不屈賊置䥷於前以脅之師泌罵曰大丈夫肯降賊耶以頭就䥷賊怒先䥷其足斷而為三士民哀之為立祠席上珍姚州人流寇入滇上珍與知州何思固守姚安城孫可望命張虎領兵攻之城破上珍被執不屈賊剝其皮至頸罵聲不絶永昌府明張化樞永平人天啓甲子舉人知無為州流賊攻城極力守禦城陷不屈罵賊而死事聞詔祀忠烈祠李君植瀾滄衛指揮因公務領軍百餘人入大理值沙賊圍城植四面應敵城陷力戰而死其下百餘人俱死之石聲和保山人生員崇禎間刑部即中王國治舉應孝廉丁亥流冦入城聲和與子生員吉皆死之馬生保山人生員失名丁亥流冦至惡少爭焚香迎之生獨閉門縱火舉家自焚死張登元字文蔚保山人生員丁亥兵至與妻潘氏謀自焚乃誘二子出遂舉火男婦共死者七人劉德本保山人素行忠正丁亥兵至積薪樓下夫妻子女五口俱焚死祝維霍保山人生員文行兼優為孰師賢士多出其門丁亥流冦之亂偕妻子三人投井而死陳正猷保山人生員丁亥兵變偕妻避於東山兵至妻先投水正猷自縊王景昌保山人貢生丁亥兵至同妻赴東河死鶴慶府明李繼兒鶴慶前所百戶正統辛酉從征麓川力戰死子轅痛父死奮入賊營亦死事聞遣官諭祭贈繼兒武略將軍副千戶轅忠顯校尉管軍千戶鎮撫仍録其子孫優恤賞賚順寧府明尹良輔郡人萬厯閒領兵攻定善寨敢勇當先歿於陳黎雍熙黃文達俱雲州人明末本郡枯柯土司蔣朝臣叛攻州城雍熙固守拒賊出戰陳亡文達亦同時戰死蒙化府明左重郡人萬厯甲午舉人丰標卓偉尚名節天啓閒知灌縣慈廉明斷㑹奢崇明反圍成都城數匝城中堅守望援重聞變榜示所部謂灌去省咫尺且北控吐蕃首尾受敵不若鼓行入省兩全而有功邑人聽之遂肅隊薄城賊釋圍接戰重死鬬力竭馬蹶罵賊而死事聞贈光祿卿建祠崇祀子廕衛千戶陳于宸字葵若郡人萬厯丁未進士知巴縣致仕居家沙賊陷城死之周二南字汝為郡人貢生天啓任長沙府通判升知嶽州府以士民遮留改升本府知府賊犯瀏陽二南率兵禦之鏖戰竟日後軍不繼遂死於陳事聞贈太僕寺卿廕子入監左廷臯字對揚郡人崇禎庚辰進士沙賊破城死之陳懷瑾字輯瑞郡人生員沙賊攻城登陴守禦城陷不屈死之雲南通志卷二十一之一欽定四庫全書雲南通志卷二十一之二宧蹟雲南府元王升中慶人由學正纍官曲靖宣慰使文章政事著聲南土明施均裕安寧人聰穎絶人過目成誦永樂間貢入成均成祖面試奇之授大理評事改交址御史按部一十七府吏民懷畏爭建祠以祀後按南直風裁凛然氷蘖之操始終如一李圭昆明人宣德乙卯舉人天順間知施秉縣才力優長遷改縣治後升光祿寺丞崇祀施秉名宧黃敏才字性之晉寧人正德癸酉舉人甲戌㑹試副榜任烏程順天訓導先後分校楚粵稱得人升知解州嵗饑不待報出粟賑濟㑹大疫治藥給療全活萬計時有逋寇臨界設方略𠞰捕之升九江府同知疏龍開河平江洋寇尋擢知石阡府督餉交址卒於道櫬歸惟圖書數卷所至祀名宧黃明良字時際敏才子嘉靖乙酉舉人知溫江縣擢知溫州升户部員外郎所至俱有政績後升貴州按察司僉事畢節兵備道撫軍士清屯田理冤獄建學校絶餽遺武備修舉蠻夷懷服罷歸謝客詩文自娛著有西牧山人集行世唐錡字池南中衛人嘉靖丙戌進士知定逺縣嚴明果決不避權勢行取授御史巡按湖廣政績考最轉河南按察司僉事以忤權要歸段承恩字德大晉寧人嘉靖壬辰進士任工部都水主事擢御史按遼東順天值邊事告警士卒多悍畿輔貴幸專恣恩能鈐制懾服尋出知辰州府採辦廟材民不擾而事集後以疾致仕晉階嘉議大夫著有三巡疏要書行世周作樂昆明人萬厯壬午舉人知巴縣政事廉平升知澤州綜核繁劇益有聲晉户部員外升工部郎中㑹計營繕有條理出知遵義府所至以誠感人遵人化之母老乞歸遂不出仕郭維屛昆明人萬厯乙酉舉人以從軍平播有功任播州知州時方改土設流一切制度悉屛經始後晉知府州人懷德畏威久而不替凌秋鵬昆明人萬厯辛卯舉人知龍泉縣時縣治初設一切規為皆其創豎張兆曽字開若昆明人生時父夢宗聖入室因名性至孝倜儻有才中萬厯癸卯舉人任建昌通判升知通州理煩治劇不阿閹貴遷南刑部員外擢陜西參議奉命監軍屢著竒績升僉都御史巡撫甘肅殁於王事賜祭葬恩廕祀陜名宧段師文字忠軒嵩明人幼敏慎好學有孝行中萬厯丙午舉人授成都府通判居官廉明升同知奢賊犯成都師文統兵三千直入雙林渠魁授首以軍功晉四川監軍道提督五衛學政升貴州按察使執法不私晉廣西左布政告歸家居恬淡好施與置義學義田義冢鄉人至今德之段宜標晉寧人萬厯乙酉舉人知龍泉縣甫下車請減浮賦民困立蘇移建縣治規畫井然楊以誠昆明人任貴州通判多惠澤培植學校士民祠祀之吳事心字大寰昆明人萬厯乙卯舉人知臨邑縣釐弊興利請蠲溢額銀萬餘兩性剛正以裁抑御史濫索夫馬被劾邑民至京保留者七百餘人謫四川按察司照磨署璧山縣辨冤薄斂深得民心遷知丹稜縣嵗饑賊起事心設法招徠親至其巢諭之賊悉降後以母老告歸囊無餘金所至三邑悉祠祀之羅九有號雲石安寧人天啓間恩貢任山海關通判以捐餉忤撫軍改兩浙鹽運司判復疏報羡金充餉再忤執政左遷蜀王府司理遂歸賦詩見志著有鼻雷齊集文祖堯字心傳呈貢人天啓間選貢操履嚴正敦崇實學任太倉州學正頒諸生以日程考其勤惰而進退之人士興起甲申棄官隱蕭寺講學為吳中士大夫所推重爭相延致後還鄉卒於道婁東人構思賢廬祀之王凝命昆明人崇禎辛未進士任福建福州府推官有清操閩俗喜訟多服毒草圖賴凝命嚴法痛懲風遂衰止以與當事不合解綬去後起四川兵備道捍禦流寇以勞瘁卒於官陳國訓字御屛晉寧人崇禎癸酉舉人知奉化縣值賊胡乘龍作亂國訓集鄉兵嚴守募壯士斬獲賊首五日平之御史陳良謨為作頌紀功李東暉字明寰嵩明人貢生崇禎時任武定州同居官清廉考第一丁艱歸里時以便民事宜陳州守置海田一區於學宫州守謂其節比淡臺品方叔度云本朝段縉晉寧人康熙甲子舉人知葉縣公正無私不以絲粟擾民四境清肅盜賊皆為感化丁內艱歸葉人追送數百里後補虹縣甫三月告歸居林下數年卒至今兩地人思之曲靖府明施繼先字汝孝南寧人性沉默不言人過中天順壬午舉人知大足縣潔已愛民備荒禦災民懷其德致仕家居教授生徒手不釋卷著有朴菴集張濂平彞衛人成化辛丑進士知泉州府有風裁改辰州郡多虎患濂焚香祝天引咎自責虎即逺遁陳漢字天章馬龍人正德庚午舉人知黔江縣遷知廣安州養士牧民所至有循良聲歸田後杜門教子不入城市本朝李瀚字海門南寧人康熙庚午舉人任嶍峨教諭猓賊犯境瀚挺身理諭之賊遂退歷阿迷彌勒學正修葺學宫勤課士子擢知南昌縣公正廉明時有黑魚為祟公焚檄驅之患遂息後致仕歸里置義田蠲粟賑饑造船濟衆鄉人德之臨安府明楊升阿述人天順間以貢入太學部撥巡歷四川直言發御史受賄遂命代巡按御史事不附權要能舉其職凡七閲月乞歸王廷表字民望阿迷人正德甲戌進士纍官刑部郎中命勘寧夏台浤之獄不避權貴改四川僉事罷歸里居三十餘年性行惇篤凡有益於鄉者必昌言之與楊慎倡和最多有鈍菴讀史及刪後詩集行世楊廷相臨安衛人嘉靖甲辰進士任大理寺評事歷官湖廣參議所至辨冤剔弊皆有聲尋乞休居林下三十餘年恂恂若素士李繹字作之石屛人貢生嘉靖間任臨武訓導以行誼率諸生餽遺無所問比遷王府官置學田贍子弟殁祀臨武名宧王䕫龍字鳯池石屛人萬厯壬辰進士知巴陵縣多惠政擢御史慨然抱澄清之志風裁為一時冠王元翰字伯舉寧州人萬厯辛丑進士授庶常改工科給事中彈劾不避權貴中要為之側目疏諫靜攝不報掛冠正陽門策蹇歸為王紹徽所誣士論冤之天啓崇禎間兩次起用不就遊金陵卒著有諫草及凝翠詩行世馬一荀字景淑建水人萬厯戊午舉人任慶陽府推官崇禎三年流賊神一魁等掠郡城攻圍甚急荀策勵兵民百計捍禦焚賊壘誅城中內應數十人與賊相距旬日㑹救至圍解總督楊鶴特疏陳其功荀時被察當降調復其職士民立祠祀之本朝楊正石屛人康熙甲子舉人知清鎮縣輕徭役省催科以廉靜為治丁外艱歸邑人肖像祀之服闋知臨安縣多美政署餘姚卒於官貧無以殮兩地人涕泣醵金資櫬歸盧炳石屛人康熙戊辰進士知南昌縣清勤明練剔弊除奸行取吏部尋升文選郎澄叙官方人稱藻鑑擢兵科給事中條奏皆中機宜分校禮閳典試山左所得盡知名士卒於官瞿昂通海人弱冠博通經史中康熙丙子舉人任昆明教諭教諸生為有用之學以卓異入覲授昭平知縣甫半載利興弊除未幾丁母憂歸即不出里居言動不苟鄉人化之澄江府明蘇興字起文陽宗人有異才為文未嘗起草中永樂辛卯舉人知溫江縣政事明决有能吏聲董雲漢字倬菴河陽人正德甲戌進士狷介尚氣節為推官時守與倅多滯獄淹禁郡人咸赴質剖決如流有神明之頌纍官僉事居鄉恬靜過里門必徒步陳表號草池新興人嘉靖癸未進士博學能文任浙江道御史剛介不撓巡按廬鳯清漕運濬河渠致仕歸鑿靈照山麓十餘丈引撒喇溝水由涵洞灌溉田千餘畝初州未設學宫寄籍晉寧登第後倡州人呈請建學勒有碑記席大賓河陽人嘉靖壬辰進士授行人選戶垣歷都給事中遇事敢言後以終養歸遂不出侯𢎞文字爾士江川人好讀書尚氣節中萬厯乙卯舉人知髙平縣升南陽府推官皆報最時流寇四起海內騷動𢎞文有智勇當軸薦之授七省監軍道𢎞文慷慨討賊賊聞其名多讋服解散卒贈太僕寺卿王說命號相巖貢生知萊蕪縣興利革弊建定軍山漕運倉便民輸將清操實政萊民德之萬厯末去任祀名宧雷躍龍字伯麟新興人萬厯己未進士選庶常器識才望一時推重魏璫熾盛龍屛不與交崇禎間官至禮部尚書本朝趙士麟字麟伯河陽人康熙甲辰進士任貴州推官裁缺補容城知縣緝盜衛民有聲行取吏部歷右通政副都御史巡撫浙江開淤河償旗債設法便民浙人德之旋調江蘇巡撫晉吏兵二部左侍郎著有綵衣集敬一録並讀書堂法帖卒祀浙江名宧謝白生字麟一河陽人康熙補行辛酉舉人榜姓張為人倜儻有氣節知肅寧縣多惠政得士民心撫臣特薦之遷知華州後歸里數年卒侯以璋字搢廷河陽人天資厚重寡言笑篤學力行生平自奉甚約以其餘周給貧乏中康熙補行辛酉副榜任蒙自教諭修學宫捐墾荒地為學田遷雲南府教授創建奎文閣規制煥然李發甲字瀛仙河陽人康熙甲子舉人榜姓施任大理教授卓異升靈壽知縣多異政擢御史疏增雲南會試額及澄清吏治直陳東省饑民諸事出為口北道歷福建布政使所至有聲再為湖南巡撫以勞瘁卒於官張義字我由新興人康熙丁卯舉人州舊例有舉於鄉者官徵里下銀五十兩以資公車費義曰吾方進步即纍鄉黨於心安乎峻郤之例遂革後知岑溪縣修學教士息訟拯災多善政士民戴如父母卒於官祀岑溪名宧段如蕙字薰斯河陽人貢生任安寧訓導屢以卓異歷升長蘆鹽法道清釐虧帑數十萬金調河東運使旋擢安徽按察使特加布政司銜辦理營田尋升右通政後出管天津河道事卒於官著有鴛湖等集元江府明馬雲衢字賡宇郡人貢生天啓間任教諭教人以孝弟行已為先升知天河縣有廉能聲邑中番峒稱盜藪肆出劫掠衢設法捕勦盜遂息有餽送暮夜金者力卻之戒其改過後歸行李蕭然大理府明楊緯太和人景泰甲戌進士任户部郎中知黎平府諸務更新力興學校增廣生儒擢山東布政使有賢聲張升字平鎮太和人貢生嘉靖間任巴縣教諭時苦流冦巡撫林見素知其能委督餉運寇平賑流離掩遺骼蜀人德之署昭化縣多善政遷邛州學正修學造士人文以興歸以孝友禮義教化鄉人人稱五峯先生祀邛州名宧黃極太和人萬厯己酉舉人任廣西慶逺府推官時值荒殘極贊守令詢疾苦撫流移掩骸骼給牛種人有起色獄無冤民督兵援黔有功擢大理寺評事轉寺正執法不阿閹黨銜之升工部郎中督理三山釐侵冒權璫益恨以事中之遂乞歸居鄉布素自適薑桂之性老而不改鄉邦重之趙民獻字大藎趙州人天啓辛酉舉人任磁州學正教士先德行歷知閿鄉縣愛民如子升陜西臨洮府同知耿介明斷有逆􅉰聚衆謀亂獻單騎理諭遂解去歸里後鎮靜端嚴著有萃古名言四卷行世卒年九十五鄉人尸祝之楊定國太和人天啓丁卯舉人任邵武府同知清介有才民甚德之升湖廣荆西道歸里孫可望强之官不受閉户清修時為後學講聖賢宗㫖及古文法士林宗之楚雄府明孫學詩楚雄縣人萬厯甲午舉人善古文詞工書法任唐邑教諭升國子監博士轉吏部司務歷員外著四民圖說進呈上嘉其獻納之忠擢四川永寧監軍道倣金城屯田法得省軍餉以疾乞歸終於家馬兆羲楚雄縣人崇禎戊辰進士歷官工科給事中巡視厰庫清出冒濫錢糧四十餘萬土司祿永命爭襲請留撫臣王育德彈壓以制其變復陳御史王肇坤死節事俱奉俞旨後罷官歸里居三十年以壽終姚安府明陳九韶姚安所人萬厯間知天柱縣清靜寧謐民苖愛戴立祠祀之陶珙姚安所人天啓辛酉舉人任太平縣教諭升國子監助教轉工部主事歷郎中知寶慶府所至有聲致仕歸孝友文學為一時冠修郡志著有寄園集行世永昌府明劉漢字天章金齒人正德癸酉舉人任􅺫水訓導再補成都教諸生有法捐資俸以養士俾貧寒者皆能自立尋署郫縣教諭聲望尤著郫人尸祝之胡昶保山人嘉靖丁酉舉人歷官戶部郎中屢任民牧一介不取致政歸屛居山林有直指造廬訪之見四壁蕭然几列麥粥一盂因贈以术昶郤之且答以詩有試向城頭高處望數家猶有未炊烟之句張必煥字徵文保山人嘉靖戊午舉人知江安縣正直無私不畏强禦嘗有老婦訴養豕欲償糧被虎攫去煥遂齊沐告山神曰神享地方祀有虎啖人物而莫之知乎是夜虎銜餘豕入其栅及歸囊無長物壽九十三卒著有存拙稿延明精舍集隸書法帖自任歸録等書人稱五橋先生陳一龍字內潭保山人生有異貌任指揮清慎謙和折衝灣甸屢樹功績王國治保山人萬厯癸卯舉人知新繁縣值奢酋叛以全城功晉刑部郎中有內侍獲譴以千金求宥力郤之以子𢎞祚貴贈戶部尚書本朝王𢎞祚字懋自保山人崇禎庚午舉人歷官戶部郎中督餉大同本朝定鼎擢岢嵐道復留大同理餉務再嵗以才能召仍官戶部郎中是時天下初定圖籍散失𢎞祚精於典故善强記户部特疏委修賦役全書加太僕寺卿遷侍郎晉尚書加太子太保時滇南初入版圖上籌滇條議十餘事會星變求直言上疏剴切後改兵部尚書乞休疏再上得請居金陵數年卒諡端簡鶴慶府明張宗載字一寧郡人萬厯癸未進士知江津縣值採山運餉諸大役事集而民不擾土司楊應龍以兵萬人應調多虛額冒餉宗載俟其成列以實數詰之應龍驚服後詔入為御史封數十上豪貴斂手張向宸字斗南劍川人萬厯甲午舉人孝友端莊任睢州學正士佩其經教署州事有政聲巡按首薦擢蜀敘州府推官在任四載十署府州縣事所至稱廉明土酋奢崇明積年逋賦纍官向宸親往理諭之未返署奢已盡輸納臺憲交薦將擢御史以母老固辭歸何可及字允升劍川人天資敏慧苦志篤學登萬􅔦己未進士知涉縣調臨漳俱有惠政天啓甲子河南同考拔周士美於别房黜卷中薦第一歸獲玉璽於漳河進御前膺重賞兩舉卓異為御史巡漕有能聲升太僕寺卿仍巡浙鹺值海嘯鹽場漂蕩以狀聞蠲免二十餘萬兼題修海防商民賴之歷任九載題請八十餘疏年四十六退居林下事父及繼母至孝友愛昆弟周恤鄉黨以詩文自娛當路欽為典型崇禎癸酉大饑傾儲作糜賑濟州民多賴以活壽七十四卒尹端劍川人賦性剛介動必循理由藩吏任清浪衛知事發指揮蔣維賢以下不法十餘人當道以再來楊震目之端自謂不愛官不愛錢不愛命軍士皆呼為尹青天弟竭亦司吏耿介如其兄任叙南衛經歷纍官通判所至有異政本朝張九賢字心疇郡人博學敦行不茍言笑以副榜歷官六安知州六安有逃故丁千餘民或苦獨纍或困攤賠九賢力請上官悉除之解組歸築濂溪書屋以終老李衍芳字徵逺郡人凝重穎達中康熙癸卯舉人吳三桂反遁入山結廬讀書三桂物色之不可得雲南平授廬江知縣政平事理當事重之使攝無為州平水利均徭役尋丁外艱歸服闋更以母老乞終養遂不復任李含和字順中郡人康熙丁卯舉人砥行好學工詩善書任通海教諭十七年因材化導多所成就遷澄江府教授尋升嘉善知縣有能聲以老辭歸著有金沙詩文等集永北府明談升瀾滄衛人成化丙戌進士知泰和縣升知合州政治廉明稱為循吏羅俊民瀾滄衛人博通經史工詩文以貢生歷知武隆縣再補麻陽為政有聲再崇祀名宧蒙化府明朱璣字文瑞蒙化衛人成化丁未進士任大理評事讞獄無冤歷貴州按察使恩威兼濟綱舉目張尋乞歸鄉人咸矜式焉朱光霽字克明璣之子為人慷慨有大節從父宧遊師王守仁中正德癸酉舉人歷官西安府同知所至以廉明稱乞歸後家徒壁立范元愷字虞賢郡人嘉靖癸卯舉人任京山教諭升知雄縣調名山清慎寡欲一介不取考天下清官最歸家恬淡寧靜時論高之卒年八十二張烈文字元煥蒙化衛人嘉靖癸丑進士知嘉興縣多惠政纍官按察使廉介有為生平博通古今兼長於著述有百氏統要文海流奇傳於世宣大勳字藎孚郡人萬厯癸丑進士居家孝友沉毅多才知黃安縣調蒲圻以廉明稱邑西北盤石湖水漲浸沒民田勳修築堤防綿亘十餘里民不復憂水患名宣公堤沒於官孫釧郡人貢生知珙縣縣係新闢釧建學立師教民紡織百度維新歸里後置義田立祠堂以敦宗族建南薰橋以便行旅人咸德之景東府明楊仕漢郡人萬厯辛卯舉人知銅仁縣撫字有聲歷官慶逺府同知孝義雲南府元楊立義中慶人任騰衝府同知事親盡孝親歿負土成墳奉詔旌表明段澍昆明人洪武丁丑進士事親至孝任監察御史以就養改姚安府教授熊信字以成昆明人永樂辛卯舉人宣德間任兵部主事乞歸終養母歿絶意仕進不謁公門竇闕昆明人五嵗而孤家貧好學事孀母以孝聞撫幼姪成立督學表之王護晉寧人正統間輸粟賑濟詔表其門方玘字公佩景泰間後衛指揮使少時得遺金訪其人還之值嵗饑傾廩賑濟活人甚衆陳大韶字舜舉嵩明人父死京邸韶扶柩歸中途負擔自給既葬哀慕勿哀事母亦以篤孝聞𢎞治間題表後任嘉善訓導王璽字國用呈貢人早失父事母孝中𢎞治壬子舉人任合山教諭母卒廬墓後歷官涪州知州孺慕終身唐佐字朝相晉寧人𢎞治壬子舉人入太學聞父訃哀號走萬里淚盡出血水漿不入口數日卒唐文炳唐文蔚祿豐人正德間父母相繼殁時文炳年十四文蔚十一兄弟廬墓三年刺血和泥塑親像祀之文蔚事兄如事父焉傅良弼字西崖昆明人澄子正德甲戌進士歷吏科給事中性篤孝以生母年老力辭歸養鄉里賢之林春茂昆明人少失父事母以孝聞母殁廬墓三年哀毁泣血屢奉旌表段有學字可仕昆明人嘉靖癸卯舉人以母老終養二十年不仕母卒廬墓盡哀後知中江縣升寶慶府同知皆有賢聲施汝翼昆明人昱子中嘉靖乙卯舉人天性篤孝親殁廬墓有芝草之瑞賑貧乏返遺金鄉人稱之宋應時昆明人父死刺血雜土塑父像以祀廬於墓應時妻死其子文學負土成墳亦廬於墓遇野燒將及拜風而火息又值羣賊剽掠感其孝餽以豚米不納子孫化之世以孝稱甘㫖字汝孝昆明人樂善好施郡中貧乏多所倚賴輸粟助邊授以官弗受嘉靖間滇中嵗饑出粟饘民全活甚衆有司上其事欲旌之力辭優游山水以終其身傅以恭字默菴安寧人嘉靖間貢生任興文訓導生平取與不茍里居後常捐資周恤貧乏鄉鄰德之趙禧字念庭安寧人嘉靖間貢生任教諭造士以德行為先常積穀以賑貧乏有貸者焚其劵及殁人爭來償不忍負孟富號漁溪昆明人以孝聞嘉靖間母亡父老遂不應制舉承顔之暇專力於學父殁廬墓著有漁溪集楊慎為之㸃定畢耕昆明人事親至孝嘗入蜀得遺金不取鄉人貧而貸者輒焚其劵不責償李堯相昆明人善事親撫孤弟堯卿於襁負中弟長亦敬事兄嫂和氣藹然鄉里重之張鳯翽祿豐人事嫡母割股吮疽經兵亂冒刃以救父難事聞給冠帶旌表周良鄉右衛人性孝友兄為千戶早殁二弟欲均養父母卿泣曰兄亡姪孤二弟凉薄孝養之責我當任之遂竭力奉養甘㫖不衰感動鄉人楊世麒字明徵右衛人廩生事母孝母殁哭泣至喪明後當貢期竟不能赴杜惟喬字汝遷昆陽人貢生居父母喪哀毁盡禮廬墓三年墓前麥生九穗瓜結如斗人謂誠孝所致楊坤嵩明人有孝行父卒於官歸櫬廬墓遇賊劫負母而逃安如盤字克堅昆陽人事親以孝聞貢入太學聞父病徒步抵家比卒哀毁盡禮服闋不仕嵗時奉祀如生劉連璧富民人生員家貧盡孝遇死而無主者瘞之孤獨有疾者以藥濟之平生隱德甚多羅廷寶號方塘安寧人萬厯間以異才授山東鄒平縣丞告養歸田施棺槨親戚有喪不能舉者助之恤羈旅力行善事年九十一而終楊士芳昆陽人萬厯間貢生歷官平越府通判告歸養親偕二弟同居共産終身不析族黨有孤貧者為之嫁娶與鄉飲者七次張翥安寧人生員性至孝父殁廬墓有紫芝馴免之異楊恩選安寧人萬厯間任成都衛經歷幼有至性每得蔗菜必先以養親父病醫藥罔效每夜拜北辰求以身代疾甚刲股以進夢神告曰汝父疾已不可起以汝誠孝為延一紀父疾果瘳卒如其夢陳履厚昆明人天啓間從父官京師父卒哀毁骨立扶櫬歸至龍里遇安酋之變賊擁至焚其柩厚兩手抱棺哀號賊以戈擊之死於柩前蘇民生晉寧人天啓間貢生任新野教諭清介自持而以薄俸潤及貧士教人以明經修行為本尋遷蒙自教諭新野人士佩其德教為立石道旁家居建館置田以教孤寒子弟鄉人德之李淳昆陽人兆旗子天性純孝年十五侍父任廬江訓導流寇圍城父攜之守北門城陷父罵賊死淳伏尸哭亦罵賊而死李玉衡昆陽人廩生流冦至舉家避滇池寇掠船母蘇氏先投水衡即隨之抱母尸死妻子婢僕共九人俱投水死胡郁然昆陽人廩生品行方正孝事孀母流冦屠城之前一日母死人告賊至且宜去郁然曰母生我而我棄之何以生為不如與母俱死守母尸不避賊至見殺李方泌昆陽人廩生性孝友流冦臨境同婦攜四嵗子掉舟避難賊掠船夫婦罵賊抱子投水死張潔晉寧人天性孝友母殁哀毁骨立杖而後起後喪父益哀毁里人呼為張孝子周宗德昆明人生員黔國公以國士待之授副將職以醫術濟人事父紹軒母王氏以孝著教育諸弟姪成人凡衣食生産咸周給焉周宗仁昆明人廩生事母王氏能養志兄罹難變産贖之生平多隂德巡按旌之本朝周養元昆明人生員天性純孝流寇入滇父賓士將被害養元哀求願以身代賊感動父子俱獲生母李氏早卒事繼母趙氏備極孝養趙年九十五卒元已七十有六哀慕如生母一堂五世人謂孝子之報謝天正昆明人流寇入滇民間有夜張燈火及偶語者用石灰圈記於門次早按圈屠戮天正時為里正俟賊去後潛拭去全活甚衆張潤昆明人事親養志親疾叩天祈以身代及歿廬墓盡哀嘗避流寇亂周給同難鄉鄰多所全活陳洪範富民人生員素敦孝友遭流寇之變負父避難山中父疾多方救療得痊里中大疫有幼女包氏于氏父母俱疫死無依範收養及笄擇壻嫁之李澄昆陽人貢生父兆殉廬江之變澄聞難奔赴負骨歸葬流寇逼滇奉母避山谷母卒暮夜舁葬負土成墳廬於側康熙初奉委分勘田畝公正寬平又置義冢當道立坊表之楊衍慶昆明人性至孝流冦潰兵肆掠慶負母隨父避之父被掠慶迫救並遭拷縛杖索俱斷賊驚而釋之楊汝翼安寧人順治補行庚子科舉人賦性肫摰善事父母友愛諸弟終身無間餽遺貧乏嵗以為常胡士悅字季凱昆明人廩生四嵗失恃哀痛不食九嵗父病親嘗湯藥祈天願以身代獲愈及父殁哀毁骨立葬祭如禮事兄撫姪兼盡其道宗族交稱施逢泰昆明人事親至孝傭工以養康熙辛酉山大師入滇吳逆潰兵肆掠泰隨父避之方父被藝泰躍出罵賊賊擊殺之賊隨悔而釋其父謝璉昆明人貢生性誠孝吳逆之變奉親避兵香水莊親適遘疾璉冒刃赴府覓藥晝夜往還三百里足踵流血親疾得愈後以子履忠履厚貴贈如其官萬必貴昆明人天性篤孝奉父母避兵山中遇大蛇祝曰吾固當死奈二親何蛇竟去亂定歸貧無立錐傭工以養不缺甘㫖父歿事母愈謹遇疾衣不解帶跪進湯藥母年八十卒負土成墳知縣朱若功欲旌以匾固辭不受周珮養元子吳逆之變奉親避兵於澄江之撒拉村糧絶負米於二百里外胃險畫夜兼行兩足流血母楊氏寢疾二十餘年珮朝夕扶持滌牏浣裙久而不倦友愛昆弟樂善好施世有隱德鄉里推重竇觀光字景儀昆明人貢生性和厚與人交始終如一閭黨有以急難告者勉力相助無所吝鄉人有過輒以善勸導之卒之日哀哭滿道金誥昆明人性孝友竭力養親生平無忤色兄卒事嫂倍謹撫孤姪如己子處鄉里樂善好施楊杞嵩明人生員母久病杞侍湯藥晝夜不倦母卒廬於墓鄉人請歸不從感有白犬守冢諸異陳印瑞昆明人事親以孝聞有謝姓者託以三百金後謝物故訪其子還之舊郡守梅姓遺孫女無依撫而嫁之後以子時夏貴贈如其官楊御乾昆明人業岐黃好施與辛酉壬戌間疾疫盛行合藥濟人嵗施楄柎無算家以此落弗顧也後家止餘古玩藏之數世有友老病絶炊借易薪粟即與之生平行事類如此以子永斌貴贈如其官陳國瑄富民人童年喪親長能自力衣食祖業悉讓與諸弟不肯以一錢自私鄉里親戚有不能棺殮者慨然任之無難色生平恭謹慈善邑人咸愛敬之許瓚易門人竭力養父母有魯奎野賊夜入室執其父瓚挺身捍父力鬬羣賊刺刃陷胸而死張棟安寧人少孤而貧竭力事母甘㫖必供母疾刲股以進友愛二弟嘗傾囊助之屢空自甘涂崇昆明人貢生七嵗失母哀毁如成人事繼母以孝聞業師唐介和貧老無嗣崇迎養於家又倡議言於總督范承勳移建省會學宫並修置祭器樂器實心任事士林稱之後選授廣南府學訓導卒吳寬昆明人父殁暮宿冢旁曉歸養母踰年母亦殁前後廬墓四載兄亡迎嫂姪同居撫姪就傅衣食膏火俱取給焉雍正十三年題旌曲靖府明李驥曲靖衛百戶少失母與弟騏三世同居怡怡相愛當事旌表其門郭藩南寧人生員事親盡力得其歡心凡田廬推讓弟兄人稱孝友徐可繼南寧人秉性孝友父病目以舌舐之愈母尋病目亦舐愈之及父母卒前後廬墓皆盡其哀張浩南寧人家貧事親盡禮親卒鬻子治棺三年不茹葷酒每言及父母輒泣下院道給冠帶旌之謝表南寧人生員性孝友弟詔早卒撫姪得申如己子姪與子俱患痘危篤表抱姪泣告於天曰寧死吾子存吾姪不忍弟之無後也其子果死課姪成進士又置義田義冢有司旌之段尚絅尋甸人生員有孝行居喪力變蠻俗遵行家禮廬墓三年鄉里有感化者張化張文忠尋甸人從弟兄也居家孝友為里黨所推尋甸舊無學嘉靖間化與文忠屢呈請建學不報遂鬻産赴京叩閽得俞㫖知府戴鼇旌其門曰尋陽義人必沙尋甸人有勇力知文墨嘉靖間安銓叛夷類羣附沙獨抗言拒之賊亦不敢加兵沙潛護府民出境甚多泣謂之曰我欲同去恐玉石不分若能為我明於官我不殺賊非丈夫也銓聞使人以毒酒殺之馬欽尋甸人生員安銓之變賊射其母以身蔽之賊感動釋之而去遂得奉母以天年終馮世傑尋甸人生員有氣節安銓之叛傑奉母及弟匿橋下為賊所獲母投水死傑謂弟曰母死不能救豈可茍全性命亦投水而死呂應科尋甸人生員安銓之叛城陷守者皆得罪應科以罪屬無辜又守者素賢乃萬里赴闕陳情願以身代守罪遂從輕典人皆義之伯寧國字肖雲南寧人萬厯間貢生任䕫州訓導署建始縣以仁廉稱事兄極友愛捐置學田以齒德數舉鄉飲賔伯承恩字榮吾南寧人萬厯庚子舉人纍官四川按察使歷任皆有賢聲居鄉和睦周濟族黨置田五十餘畝為諸生試卷費士林稱之馬邦俊尋甸人萬厯間選貢知桂東縣升廣西潯州府通判致仕歸捐宅建學何俊字彥賓越州衛人千戶幼有孝行父病衣不解帶者數月居心仁恕邑人咸慕其德崇禎間撫按旌奬彭之藩尋甸人崇禎間貢生有學識敦品行捐資修學課藝傳經鄉人重之邱為龍尋甸把總東川賊衆攻寨力戰箭中左目龍拔出仍格殺九人賊衆潰散寨民保全張維南寧人丁亥流賊斷其右臂家貧甚力作養親繼母病刲股以救郡縣皆給匾旌之本朝鄒旦宣威人事繼母四十餘年刻不敢懈時或恚怒即跪聽譴責待後母弟備極友愛繆以正南寧人康熙丙午舉人吳逆叛守節不受僞職恢復後授南和知縣丁運亨字達公南寧人康熙己酉舉人事親孝䙝器垢衣必親滌洗吳逆欲收人望强官之不就恢復後授晉寧學正鼎新學宫遷景東府教授查奉璋字髦士馬龍人以孝聞中康熙己卯舉人工書善詩任路南州學正丁外艱歸廬墓盡哀督學蔣泂旌其孝行臨安府元張友直通海人好讀書早喪父事母杜氏寢食不離左右鄉里稱其孝至正間聞於朝旌為慈孝之門董茂春字良卿通海人文彥子以廕任本縣教諭當父死於賊時哀號幾絶事母孝飲食寒燠未嘗一日離母疾籲天願以身代當時有一門忠孝之稱亨祐石屏人天厯初秃堅作亂祐與朱寶翼共守和龍島賊率衆來攻戰艘三百人欲出降祐曰戰亦死降亦死死報國耳衆皆踴躍賊舟將至衆欲迎敵祐曰勿急也無何賊舟蟻附發炮擊之連碎數十舟斬首百餘級賊引去王帑石屏人秃堅之亂朱寶翼與亨祐守至七旬幾不支帑出粟千餘石給衆會救至得免明吳孝先㠄峩人洪武間年十二嵗隨父出遊父為虎所攫孝先取父佩刀斫虎虎死父得生人稱孝童及王師平蜀彪率衆投誠以功授分巡遵義道修學禮士安民靖冦遵人至今感之康熙戊申裁缺家居好善樂施會吳逆叛欲餌以官堅卻之人稱為清節名臣云張鵾羽石屛人廩生康熙乙巳龍韜叛仗節死難學道何起鵬旌其門曰義髙千古曾齡字雙樂建水人性謙和好善於鄉多所利濟理義倉興書院人尤誦之澄江府三國漢李恢字德昂俞元人靈帝建安間劉璋為益州牧益州太守董和貢恢於州恢知璋必敗先主必成乃託名郡使北詣先主於綿竹先主嘉之既定成都以恢為功曹書佐主簿遷别駕從事章武元年庲降都督鄧方卒先主問恢誰可代者恢曰人之才能各有長短是以先零之役趙充國曰莫如老臣臣竊不自揆惟陛下察之先主笑曰孤之本意亦已在卿矣遂以恢為庲降都督使持節領交州刺史任平彝縣先主薨髙定恣睢於越巂雍闓跋扈於建寧朱褒反叛於牂牁後主建興三年丞相諸葛亮南征先由越嶲而恢按道向建寧諸縣糾合圍恢軍於昆明時恢衆少敵倍又未得亮聲息紿諸南人曰官軍糧盡欲規退還南人信之圍守怠緩於是出擊大破之追奔逐北南至槃江東接牂牁與亮聲勢相連南土平定恢功居多封漢興亭侯加安漢將軍後南夷復叛恢再平之徙其豪帥於成都賦出叟濮耕牛戰馬金銀犀革充繼軍資於時費用不乏七年以交州屬吳解恢刺史更領建寧太守徙居漢中九年卒子遺嗣明趙禧字景福河陽人正統丁卯舉人知永從縣有廉惠聲丁艱歸服闋嘆曰祿為養也而親不逮仕復何為遂不仕清修苦節三十年絶跡公庭李蕃字庭茂河陽人正統戊辰進士任戶部主事出視臨清倉及九江鈔關弊絶風清豪吏袖手尋以親老乞歸不事生殖環堵蕭然婚喪多從古禮鄉人化之侯必登字頤真江川人嘉靖己未進士歷官潮州知府時值倭寇擾亂之後地方多警井里為墟掠人取贖者無寧嵗必登首罷一切苛條與民休息而沉幾有雄略善得賊情每談笑指麾而解散之民得更生嘗以事之省經賊巢中賊聞相率羅拜肅隊前驅威德服人類此後升江西參政上官有以事强屬必登者曰登之頭可斷事必不可應也一時交稱之歷官皆得民心居鄉則恂恂焉楊以成字太和路南人貢生任貴陽府通判分署畢節衛著有勞績升同知仍官其地天啓壬戌水藺賊叛成具蠟書告變滇撫發兵西援成督滇兵與戰破之已而賊兵大集成知事不濟令吏懷印趨貴州自以死當賊未幾城陷賊殺其家口十三人獨其弟以榮不死成又將賊中情形函竹付榮潛入滇告變至散納溪為賊所獲得其書遂並以成殺之黔撫以聞贈光祿寺卿建祠祀之武定府明楊堯年和曲人嘉靖以前郡學未設堯年發憤讀書逺寄大理府學歸教授鄉里人皆知學武定人文自堯年開之楊春震和曲人萬厯庚子舉人知湖廣夷陵州力鋤豪紳風節凜然天性孝友聞父病告歸侍藥纍月衣不解帶守喪哀毁骨立不用浮屠士論重之待庶母弟春霖春霽友愛曲至相繼卒震哀悼廢寢食霽妻辛氏守節遺女一人震憐恤倍已出事庶母敬謹歿後葬祭以禮杜門教授生徒著述甚富廣西府明楊洲郡人正德癸酉舉人任國子監助教升四川保寧府同知居官有賢聲處鄉尤能化俗趙鳯翺郡人幼穎異好學及長善事繼母人無間言由嵗貢任資縣教諭講明經學諸生多受其益署縣事清正廉明及遇寇警保固城池嘉靖間入名宦今子孫守其遺法澄江府元段文瑞河陽人父早歿事母盡孝母歿哀毁骨立以手履地行一里外負土營葬凡百五十日始成事聞旌表曰孝義之門授本路學正歷官臨安路總管明王圭字朝玉新興人事親盡孝父歿哀毁廬墓日啜一粥不進鹽菜者三年靈芝産於墓上正統間有司上其事孫佶河陽人隆慶庚午舉人少失父事母至孝母疾親除溲溺母思飲甘露佶夜禱天甘露忽降注碗中奉母獲愈人謂孝感所致鄧漢鼎字夑公河陽人崇禎間貢生孝友忠信讀書淵博為文根極理要所授徒多成名彥嘗避艷色返遺金尤世所難鄉人至今尸祝之本朝李冕字君華河陽人讀書通大義孝友姻睦讓産弟兄好善樂施修橋梁濟貧乏代人贖妻子以全骨肉多行隂德以子發甲貴贈如其官楊浩河陽人幼失父母事伯父母如所生伯父早世無子迎伯母張氏於其家養之張得疾卧牀六載浩奉養不怠張卒哀毁備至閭里上其事於官旌之管一奏新興人自幼醇謹端方臨財不茍事親孝教子嚴嘗捐建文昌宫書舍延師課讀後學多成就一鄉以老佛稱之以子灝貴封如其官陶正發路南人幼失父祖父衰老正發力作奉養問寢視膳無少怠或傭工於外數日必負米錢還省之勤勞備至闔學公舉旌表胡景武江川人家貧充里催一日詣縣悉完所應催賦時方七月縣令怪其速景武曰母老病欲旦夕侍湯藥不得離又恐誤公故稱貸以完及母卒未殮盛暑血流於地武撫膺大慟匍匐吮之既殮而葬號泣不絶哀慟感人縣令察異之召給米一石俾祭其母張綸音字善承河陽人廩生父居宫任趙州學正卒綸年十七徒步千里扶櫬歸力貧養母教弟昌音成名卒又撫孤姪琮有成生平然諾不欺行孚閭里教授生徒多所成就郭上詒字超羣新興人天性孝友父患瘡詒吮之得愈姨母蔣氏寡而無子詒體母志迎養於家喪葬如禮昆弟六人終身同居友愛甚篤尤樂善多義舉施棺掩骨貧有鬻身者為贖還之以子偉貴封如其官郭偉字靖圉上詒子登康熙丙戌進士知鎮平縣歷吏部稽勳司員外生平仁孝和厚父患噎思石榴值冬月偉躬親遍訪竟得之樹上疾尋愈母病目幾盲偉禱於天時以舌舐其目遂復明友愛二弟傪儹疾病躬自扶持嘗代人償債以全骨肉解衣以救凍死者人有醉詈於門不較丁艱歸廬墓終喪以哀毁卒武定府明藍碧元謀人父病刲服救療嵗饑捐穀賑濟仍儲義倉以助貧乏上官旌之尹淮元謀人母病危篤號泣告天求以身代刲股進母尋愈年荒捐米賑濟全活甚衆楊元祐和曲人春震子以副榜任趙州學正端方醇謹博通典故工詩古文詞孫可望據滇迫之官力拒不受士論賢之本朝陳此丹和曲人生員家貧好施事親以孝聞己亥遇潰兵奉母避山中偶相失丹號泣追尋薄暮有婦丐隨行丹曰吾尋母方亟豈能汝顧况男女有别雖患難寧遂茍乎卻之去竟夜不獲母渴甚將所負米囊置路旁覓水澗中比返母坐囊上問母何以至此曰黑夜行荆棘力疲息此實不知為已囊人以為誠孝所感廣西府明趙通本府土照磨成化間昂貴爭襲府職大肆凶虐通不從逆遣其子趙瓊赴京奏聞下其議因改土設流民賴以安李璜師宗人𢎞治間代本州土官至京襲職璜以土官專擅終為民殃遂奏請設流官令土官不得協管州事及抵家知其身必不免遂潛逃師宗設流璜之功也張恩郡人隱居沉默與物無忤嘉靖間賊阿旦為亂監司檄本郡撫之衆舉恩恩慨然往諭賊皆服從以瘴卒當路旌其義為文祭之郭尚賢郡人事親孝父母卒哀毁廬墓足不入室口不茹葷遇虎不傷鄉人有急輒周之有鬻身於人者尚賢知其有母在為贖歸焉趙宸郡人父卒廬墓虎聲咆哮宸不顧虎曵尾去一夕賊入顧視惟氊簔盂箸而已張秉衡師宗人生員性素孝母病目盲秉衡乞以身代一日忽明簡如英彌勒人親喪廬墓三年虎不敢犯屢奉旌表何騰龍彌勒人普名聲之亂負母逺奔不顧家室府州旌之李在恭師宗人本府通判游大勳孫因父流寓師宗在恭自歙縣來尋父遂入籍改姓李中雲南副榜丁亥土賊叛執其父在恭罄家得百金贖父因墮奸人手匿不豫賊賊怒欲殺之在恭求以身代弗許遂以頭撞賊父子俱遇害呂應乾彌勒人生員年十四其母為流寇所掠應乾泣涕尋至賊巢賊感其孝與金帛遣之本朝郉太古郡人幼失母父之楚太古為人牧豕備諸艱苦時思慕哭泣及父歸喜甚承顔順志三十年如一日父年八十五嵗自言不覺鰥居之苦以有太古為之慰也闔郡公舉旌表李根心字所性郡人好善樂施英德令張于宸孤孫為沙夷所虜疊賣為奴根心訪得之變産贖還遣其歸宗百大師復滇疫癘盛行捐三金市藥救治元江府本朝李其紀郡人家貧竭力養親母歿事繼母如生母康熙乙巳值土酋之變紀負繼母逃行一日夜不休得免父歿廬墓三年有虎伏兔馴之應蔣應堂本姓雷元江協兵充副將毛來鳯廄卒鳯一日見其銼草甚艱血流手腕訊其故左右具道其孝養刲股事鳯異之免其役後親歿哀慕之甚刻木為像祀之如生署知府李成才旌其門曰繼美丁蘭郭羽宸河西人生員家貧寄居新平窩泥寨舌耕養母素以孝聞雍正十年八月遭猓逆之變事起倉猝時母病垂危不及走避母驚死宸痛不欲生日夜哀號相繼而殞開化府本朝楊守士郡人性純孝年八嵗父遘篤疾刲股療之及母疾亦然人咸稱異焉昭通府明可童鎮雄人胡氏僕其主為賊所殺可童藏幼主登魁於竹笥負以逃賊追及童張弩向之曰我胡家窮僕也追我何為賊舍之其妻曰我兩人逃死不暇何能顧小主盍棄之童大怒以杖擊妻幾斃遂負登魁匿四川叙州府撫至成立卒報父讎大理府漢隗叔通葉榆人性至孝母好飲江膂水通日入江取水維艱江中忽出平石涉取甚便人謂之孝子石唐段赤城葉榆人有膽略蒙氏時龍尾關外有大蠎吞啖人畜赤城披甲持雙刃赴蠎蠎吞之劎鋒出蠎腹蠎死人剖蠎取赤城骨葬之建塔冢上燬蠎骨以堊塔元楊淵海太和人段氏臣至元間總管段功有寵於梁王淵海逆知其不終屢諫功勸之歸不聽淵海語人曰吾主無生還日矣吾食人食而不同其難乎明年功為梁王所害淵海死之楊保楊名太和人皆段氏臣保授元帥萬戶洪武間兵入大理遣弟知府名探報緩急約翌日日出為期名過時不至保知事不濟即自縊名亦以弓絃縊死國人異之合葬於𢎞圭山下明趙壽趙州人永樂丁酉舉人正統間有蒙化土舍從征麓川有功謀為州上官壽懼為民患要鄉人李松張福海潛赴京師奏革之一州以安松等造廣廈作堵牆百丈居壽以報德楊寧太和人父母繼殁廬墓哀毁採風使題聞旌表楊謫仙寧之孫事母盡孝時稱楊氏二孝子題聞旌表張孝子太和人失名姓至孝傭工養母母殁哀慕如狂既殯猶晝夜號於路數年不輟而死段子澄太和人不納奔女道還遺金中天順壬午解元是科秋試主司得其卷屢感異夢知為端人急拔之任德安府通判以內艱歸不復出居鄉多盛德事人謂太邱彥方之亞洪鈞太和人生員性孝友母殁廬墓三年廬側有澗水盈涸不常鈞居三年水竟不涸人以為誠孝所致黃聚雲南衛人事親至孝親喪廬墓盡哀道府給銀米旌之楊沂太和人事親孝親殁哀毁廬墓以分授田業之半讓諸兄遂老於山中趙友益太和人自少至老無喜愠色與物無忤兄弟子姪有失依者皆為之所鄉人稱其孝友吳讓賔川人州舊無城民苦剽掠𢎞治間讓奮然詣臺司請置州衛建城池往復再三卒如其請史大經雲南縣人為諸生時曾讓貢於友嘉靖間任邛州學正能培植人材歸置義田勇於行義士論重之王守陽太和人家貧事親勉具甘旨四十不娶恐分親之養也終父喪後以母命始娶婦婦不得於姑守陽謂曰為吾婦不善事吾母任汝所適婦亦苦其貧遂去守陽以相地自給得錢即養母每夜嘗四五起視寒溫母身輾轉必捧之以助其力凡母所嗜多方致之吕健大理衛人家貧養親每食必躬進之親偶不懌則深自咎責悅而後已病則嘗藥死則廬墓以誠孝稱楊起雷太和人父久疾凡起卧雷必親扶持四十年不倦事兄起雲亦以友愛稱朱維顯賔川人生員以孝聞父先殁母張氏喪明左右扶持未嘗刻離楊雨太和人充府刑吏或知人之冤輒力爭於庭郡守疑其賄笞之笞已復爭久而察其無他遂見納獄賴以不冤役滿不赴考選太守亷其賢欲薦之潛入雞足山索之不得趙重華太和人年七嵗父廷瑞棄諸生業遊方外後十五年母殁妹嫁遂請途引於郡守覓其父行至武當太子崖上隱隱有字跡後識其父名氏而所書月日與重華尋父出滇月日同覽之慟哭亦附書姓名其後歷走江南無所遇禱於三茅峯夢神語曰汝父猶未死覺而爽然過毗陵被盜僅存途引道遇老僧言其父寓無錫南襌寺使一道人導之至寺則其父果在相抱而慟見者慘然遂奉父以歸鹿門茅坤為作趙氏客遊述楊準太和人父士雲祀鄉賢凖性純孝不忍一日離父雅好學不就功名父卒廬墓盡哀人稱為楊孝子張聚奎字瑞星趙州人生員好讀書負氣節州治有石青硐堪輿家謂有關州治地脈久封閉萬厯間遣中使楊榮開採榮遣其黨張文華至趙聲勢橫暴士民競前拳毆之文華遁訴榮榮上聞遣緹綺械州守草學書等聚奎直前曰毆文華者獨聚奎也遂並逮至京臺垣論救羣閹必欲置之死獄繫三年㑹赦得出已復逮入再赦仍歸硐得永閉州人至今義之鄒良彥趙州人天啓丁卯舉人知榮經縣有惠政丁艱歸里遂不出孫可望破大理屢檄起之良彥投其檄遁去壽八十五將殁書曰忠於君孝於親為天地間肖子仰不愧俯不怍作宇宙內完人投筆而卒楊舟雲南縣人樂善好施賑貧濟困捐千金修文廟按院司道核確以聞加冠帶壽官旌曰尚義敦善楊俊聲浪穹人幼聘杜氏女未嫁而瞽兩姓父母咸議離婚俊聲執義不從竟娶歸情好甚篤時為諸生里人聞神語楊生娶瞽女德行注上考崇禎間以貢生薦廷試知歙縣調臨潼報最擢平慶副使請終養歸迄今子姓蕃衍皆杜出也本朝杜桂印字仙阿趙州人生員父欲𢎞為諸生己亥為雲南潰卒所執欲殺之桂印年方少號泣馬下願以身代兵怒殺之父獲全康熙壬寅撫院袁懋功具題旌表其門鄒應運字名世趙州人少孤性孝友己亥與母兄避兵相失叩天默禱即獲母處又千里尋兄歸事之盡禮母殁蔬食三年祭必哀慟貧而好施見無衣食者解衣輟食周之李偉雲南縣人少失怙恃奉繼母楊氏值寇警躬負入山母疾親侍湯藥未嘗暫離力耕色養五十年如一日撫臣具題旌表龔敏趙州人少孤性篤孝母柏氏命就學必拜母而後去歸復四拜以為常地震覆垣傷母敏號哭以手掘土十指淋血曰母血也啖之將葬㑹賊兵至敏夫婦抱棺大慟賊感動遂去逆藩重其名檄之任堅辭閉門著書博綜古學郡志多出其手守道畢忠吉贈以節孝録蘇士俊趙州人祖時譽前明世職參將沙酋叛力戰死士俊挈家自昆明避兵趙之彌渡遂家焉性好義樂施鳩衆為崇義㑹以周窮乏疾病死亡一日值孕婦入市將娩無所歸士俊導至家令婦服侍産逾月乃遣歸曾拾遺金訪主還之年九十二兩舉鄉飲大賔一堂五世鄉人號為蘇老佛子萬民兆民俱以孝友稱楊燝雲南縣人康熙庚戌進士吳逆叛强之官不受事平授廣西貴縣知縣王佐才趙州人康熙壬子舉人吳三桂反脅以官不受籍其家拘省城者年餘終不屈釋歸奉母讀書山中諭王師復滇授宜良教旋請終養朱籥字奏雅賓川人康熙壬子舉人善體親心以孝聞任石屛州學正和易可親士多化之升武定教授力辭歸建家廟置祭田周恤族中貧困家居二十載里黨奉為典型楚雄府元楊惠威楚路人少孤事母盡孝母疾篤禱神求以身代母夜夢神告曰爾壽當終以爾子誠孝故得延明日果愈壽八十餘及卒惠負土成墳廬於墓哀痛失明有司上聞詔旌表其閭明印嶽楚雄衛千戶性至孝奉母先意承志母病衣不解帶見有尸骸暴露者解衣覆之死不能葬者助以棺正統間征麓川力戰而死王大勳廣通人早失母傭工事父每晨必視父食畢然後出遇主人授食必先投竹器中持歸奉父監司命有司存恤之旌表其門潘浩楚雄縣人家貧母老而善養志中成化癸卯舉人任大理訓導母疾迫禱神得愈遂棄官歸養母殁哀慕廬於墓側朱高楚雄縣人貢生五嵗喪母事繼母徐盡孝父殁家貧竭力營葬三年蔬食水飲不近房帷後喪繼母亦如之𢎞治間任合江訓導分俸於兄及族黨貧乏者鄉人稱之俞沛楚雄縣人生員家貧力學鄉人子弟治禮記者多出其門嘉靖間武定鳯氏亂延及廣通郡人震恐沛與郡守多方捍禦城賴以全延久定逺人貢生以母老不仕敬養終身鳯賊之變有人以三百金倉卒寄託賊平後不見來取跡其人還之封識如故陳于舜楚雄縣人天性孝友父殁善事母嫁娶弟妹得母歡心有姑孀無嗣迎歸養之鄉里有貧鬻其子者為捐金贖之李希綱楚雄縣人貢生父久病侍醫藥寢不解帶者九年任姚安訓導俸祿所入與兄共之周恤親黨各盡其義所著有四禮注一卷俞經楚雄縣人父殁家貧與弟繪緯友愛同居四十年如一日不受私金不忘舊交鄉人頌其高義朱萬元楚雄縣人萬厯壬午順天舉人歷官鞏昌府同知未舉時從豐城李公講學深契性命之旨及李得罪萬元與省郡諸生蔣希堯等偕入京視李獄中世稱其義俞思針楚雄縣人貢生事親篤孝四時蔬果不奉親不敢嘗萬厯間任沅州訓導教士以德行為本及家居族黨婚葬不及者皆周濟之李繼東定逺人貢生萬厯間任大理訓導事親至孝親殁遂不復仕當居喪廬墓時至性所感鳥雀俱馴盜賊逺避院司旌之銘其墓張克儉鎮南人萬厯庚子舉人知榮經縣告歸力耕養親親歿喪葬一準家禮鄉人法之里中婚喪不給者捐資以助郡有驛遞扳纍窮民豪右霸阻水利儉為陳於當道民害以除蘇德馨廣通人性至孝萬厯間以南安貢生任茂州學正早年父溺愛異母弟逐馨於外馨盡孝益篤父遂感化李邦相楚雄縣人家貧甚父殁賣身以葬留妻養母越二年母又殁妻亦願賣身葬姑妻父怒訟於郡守守嘉其事上於道院以聞萬厯間建坊旌表翁𢎞慶廣通人天啓間父早卒事母盡孝家極貧每食必以酒肉母不忍食則跪進之偶缺雖蔬食必竭誠以奉負母避兵得免於難好善慕義不以貧困易心倪可觀南安人父天叙天啓間任大名府通判卒於官觀萬里扶櫬歸葬事母撫弟以孝友稱舉壽官長子元昌能繼父志兄弟友愛鄉里重之周孔徒定逺人生員天性孝友存恤親戚還人遺金多盛德事子昌祚天啓乙丑進士官大理評事事母亦以孝聞包𢎞漸廣通人生員崇禎間流賊破四川兄𢎞策為新都知縣城陷罵賊死漸事寡嫂盡禮為諸姪婚娶傾家資以慰嫂意里人稱之俞觀楚雄縣人崇禎間貢生與弟益皆潛心理學教授生徒而觀尤孝友方正流寇陷城聞其名迫之見不屈投泮水人救之得不死本朝楊三竒南安人順治間有賊十餘人圍劫其家父被執竒年十四奮身抱賊賊持刃向父竒曰寧傷我勿傷我父遂受刃而死父得全陳士驥南安人順治補行庚子舉人吳三桂反檄官之拒不受事平授隆德知縣張肫仁字子任楚雄人康熙癸卯舉人生平尚氣節嚴取與學識堅定剛直不阿吳三桂反脅以官抗不受甘貧守正教授生徒姚安府元趙和姚州白鹽井人天順間父亡和甫五嵗其母王氏改適楚雄倉官後以罪戍邉母偕行與和别去和年十四晝夜思母不置泣涕籲天尋至遼東見其母與俱歸中途遇虎母子俱無恙明高梓潼賜姚州土州同五嵗喪父其母談氏撫育成就賜性孝母病痿痺晨夕稽顙北辰求以身代遂愈後病目幾喪明賜時舐之尋亦愈後復病癰吮之又愈成化間具奏旌表楊道東字載吾姚州人嘉靖己丑進士天性孝友好義樂施貧時見有衣不蔽體者即解衣衣之讀書貫穿經籍登第後卒於京未究其用金鯉姚州人廩生素敦孝友母楊氏病篤多方求救不愈日夜默禱忽夢神授一方治之果驗及親卒廬於墓側一夕忽有玀賊劫掠憫其孝舍之兄鯤舉家遭疫親里斂跡鯉同寢處供湯藥俱得保全萬厯間御史以聞建坊旌表劉九疇姚安所人貢生知綦江縣素性孝友方出仕盡以遺産讓諸弟鄉里重之萬厯間欽賜孝友馳聲匾額李秀白大姚人廩生性謙抑與物無忤早喪父孤貧力學事母張氏至孝及母遘疾將革治療無功焚香祝天願以身代母幾絶復蘇後一載無疾而逝哀毁廬墓御史陳學䕫以篤孝表其門靳時芳姚安所人侍父從儀赴京父在途疾不能乘馬芳背負而行母病癰芳晨夕抱扶歷三十二年如一日家貧訓蒙自給言必準聖賢跬步有繩尺遊其孰者皆有規程即販夫女子皆知其為靳先生居城外環堵蕭然姪仕清九嵗喪父芳撫育成立部使者皆表其門鄉飲三次年八十三卒施光裕大姚人貢生任淮安府教授質實愷悌尤敦孝友推産諸弟甘貧自如著有居敬録省心録謝宗陽大姚人廩生為人朴實訥訥如不出口生平無絲帛甘旨之奉父故廬墓遺産盡以屬弟弟卒撫遺孤周贍宗族好義樂施撫按督學俱旌之著有省身録永昌府明徐訥字敏行保山人年十三父遘疾幾殆訥每夕稽顙籲天願以身代父疾果愈後父殁廬墓哀慟有青蛇繞墓之異詔旌其門胡亢字希賢保山人父殁時亢年甫十二不食三日既葬結廬墓側每哭泣輒有烏雀集樹悲鳴哭止乃散蕭芮字從周保山人監生事親孝及親卒廬墓哭奠哀毁骨立符節字性善保山人平生耿介寡合常與丁貞友善貞病篤以幼兒竝白金百兩託節節受金密藏於丁室中厚撫其子且教之比長挈金授之封識宛然鄰有嫠婦無子迫於飢寒自縊節救之活令家人給衣食歷二十年終不見婦一面婦卒治棺葬之所著有丘圾堆詩一集陸鏞保山人道見遺金一囊拾歸謂妻曰若坐門內視有泣而過者告我已而果有人泣涕至核如數即付之以半謝固辭其人拜天祝頌而去辛淳保山人好義樂善嘗修學宫置學田捐粟濟饑從征交南凡道死者力為埋葬之藺剛字德中騰衝人千戶愈次子正統間隨父征麓川愈纍功升副千戶剛亦當授外所鎮撫乃白父曰吾祖宗世為正千戶中葉而為副今幸父子俱立功若並論祖職可得也愈曰武廕以長我死女兄繼之置汝何地剛曰為子弟當竭力於父兄耳奚以得職為乃偕白靖逺伯伯嘉其孝讓並功於愈為正千戶愈卒兄襲剛友愛有加年八十六而終吳榮字仲華騰衝人惇厚坦直人有爭者咸質平之一日與友藺剛暮歸適一屠兒醉卧道中墜二十金於側榮恐為他人所得拾付剛令遣僕守屠兒俟醒歸之終身不自明張昺字德逺保山人天姿清俊嗜學飭行正統間侍郎楊寧舉為弟子師嘗以千金置義田於蒲縹以資宗族之貧者婚葬孤孀皆有常給鄉人有貸不能償者焚其劵人有犯者不校所著有鈍菴稿周琮騰衝人晚行得遺金歸付其妻仍往拾金處伺之至夜一人來尋詢之得實還之蓋此人稱貨以完逋賦而出子於獄者分謝不受其人祝曰願天壽公夫婦官公子孫後琮夫婦果以老壽終吳潤騰越人貢生事親至孝任溫江教諭奉父同往色養備至父殁扶櫬歸葬服除補上海教諭模範端嚴善於啓迪居鄉二十餘年操履嚴潔不納餽遺友愛庶弟入上海名宦楊茂字延秀騰衝人性質朴好義樂施嘗歸人遺金置義田捐棺具人有貸者力不能償即焚其劵行事率多類此林興祖字宗嗣騰衝人少孤母性嚴事之得其歡心或微愠必曲求慰解母疾檢方書云須虎睛調藥乃愈興祖竭誠籲天適城北得一虎往購其睛合藥母病果瘳鄭永生字壽伯騰衝人嘗結廬東山藝田忽鄰婦有私奔者永生不答馳歸家人問故紿之曰偶攖疾欲藥蓋祕之也時以隂德事教家人年八十七而卒鍾應竒永平人生員天順間姚營叛兵入其家值母病在牀欲兵其母應竒號泣求以身代兵感悟遂獲全丁有虞永平人貢生誠孝友恭事繼母情禮備至督撫旌曰孝行可風後仕至知縣馬鼎龍永平人生員苦志讀書荒年賑饑捐金助餉當道旌之石雷保山人嘉靖丙午舉人性直諒尚氣節任敘州府通判以憂歸遂不仕讀書寶山中力崇正學多所發明里有鬻女者偵之其同年女也贖歸擇配具禮嫁之陳一鶴字內菴保山人隆慶丁卯舉人居家孝友樂善好施置義田以助鄉鄰設義地以埋枯骨嘗讀書光尊寺夜覺有盜入一鶴曰無他物止銀二兩可於窗外接之又有竊其穀者一鶴見而避之不欲識其面其盛德類如此張邦教字敬敷騰越人萬厯丙子舉人事母篤孝歷官思南府通判清正嚴明巡按三薦之以母老堅乞歸養傭作人永平人姓名失𫝊萬厯庚寅為人傭作以逾期不至見逐於主人哀求不納哭而去曰母老無食奈何行未幾倦卧道旁夢一人撫其背曰無傷也某山有竹搖之可得米覺而憶其山舊遊也如言以往果得米似稻而粒長煮粥不稠味甚香美趙之琰保山人初名千里萬厯戊午舉人歷官户部郎中致仕歸遭流寇之亂脅以官三拒之好施濟救饑疫捐建養生院置義田地收贖被虜子女人皆德之張松保山人好行隂德一夕盜入宅松見之不發俟家人睡畢呼出給以銀令其改行有孕婦至松門忽仆地松令婢掃室延入聽其分娩以湯藥調之而去曹汝珍保山人生員性純孝家貧貿易夜則讀書事雙親備極艱苦父患疽親為吮血即愈當道旌之曰篤孝格天沈祥騰越人尚義親賢有人遺寶石於路祥拾歸訪還其主人有遺治喪之金者祥亦拾而還之殷賢騰越人伯凱受世職五十無子賢應襲讓職不居力勸伯父娶妾生弟弟卒又出資助姪成立襲祖職周奕字叔大保山人舌耕養母以孝聞有以丹士術授之者奕曰多金何益卻不受徐一中保山人生員事親至孝母死停柩遇火災一中抱柩哭禱火頓息李思善騰越人事父母孝葬後廬墓盡哀絶跡城市陳世培騰越人世襲指揮明末孫可望據滇其黨楊武至騰迫脅紳士培父夢熊不屈武怒將杖之世培懇以身代竟斃杖下繼而父亦死於賊時人哀之本朝徐崇嶽字石公保山人康熙癸卯舉人公車未第遂樂志林泉詩文博雅吳三桂欽其名强之仕不屈絶跡公門後與修通志所著有造適軒集鶴慶府明楊敍年郡人正德壬午隨父斌之京行至天津為賊所獲欲殺之敍年號哭哀求願以身代賊感其孝竝釋之又恐為衆所害仍以號箭護之出高科郡人生員事親以孝聞又殮葬祭之無依者與弟同居始終無間知府周贊以孝友表其門段忠劍川人性篤孝家貧父宣久病忠傭身以養遇食忍饑奉父至老不變楊全劍川人父繼宗為土官海真所殺全方在襁褓及長知父冤死多方圖報不果乃潛入麗江為土官奏事於京因藉以發其事後海真死於獄全曰吾父讎得報死無恨矣蔣懋官郡人生員父以旅亡扶櫬歸尸血流出號泣而舐之既葬廬墓盡哀詔立坊旌之楊懷玉郡人貢生任安嶽縣丞剛方正直細行必矜居喪蔬食盡禮期功不赴宴㑹舉鄉約敦行四禮鄉人化之楊邦器字德周郡人貢生任眉州學正識學淵博倜儻好義賑乏周急鄉人有爭片言以解在眉以文行飭諸生攝彭山縣以亷著人或嘲之器曰吾豈以小官隳節耶當路聞而重之周演郡人父於仁以貢至京演步從道遇賊抱父號泣賊刃其臂不去賊感而釋之比父以景東訓導歸年八十餘演承歡備至及殁哀毁逾禮部使監司各旌表優恤趙恩郡人廩生父德宏以孝行祀鄉賢恩克繼父孝喪葬如禮家貧事繼母竭力致養婉容愈色巡按吳翰表其宅里曰世敦孝行本朝梁健植郡人生員己亥潰兵入境健植侍其父避賊山中父被執健植向賊叩頭出血願代父死賊遂殺健植而釋其父唐士𢎞郡人早孤事母至孝母病士𢎞籲天願以身代及母殁哀慕動人有姪三月而孤士𢎞撫之成立分産與之郡守旌其門孫如龍郡人性孝友業儒家貧竭力事親父士基有疾如龍每夜告天乞以身代父疾尋愈人謂誠孝所感段尚龍劍川人傭工養親親殁賣身以葬遇兵投河救嫂撫養孤姪本州旌之順寧府明彭懋賢原籍江西寓騰越萬厯間知府余懋學重其經明行修延為賓師遂家順寧余屢為置田宅不受子高運生員好經術篤於孝友父子皆年九十餘世稱長者周重謨雲州人性至孝童年刲股以療母疾有司奬之永北府明談鉞北勝州人成化癸卯經魁知華陽縣父疾求以身代及卒廬墓三年劉思善北勝州人生員天啓初客舍失火拾遺金三百兩次日呼客還之客分謝堅不受州牧旌之蒙化府明薛志廣蒙化衛人有孝行居喪盡禮廬墓芝草生於墓側官仲郡人好義樂善周貧乏助婚喪嘗贖流亡還遺金年近百嵗卒范運吉字用修郡人嘉靖己酉舉人父好為方外遊吉病且少不克從及長好學力行補弟子員以詠白菊詩受知於巡撫應大猷許妻以兄女及登賢書應促其完娶吉誓不見父不肯娶遂書尋父狀負於背遍歷天下跋涉五載辛苦萬狀至楚襄陽行哭於市有知其父者云在武當榔梅園至則已殁吉刺血認尸扶櫬歸廬墓三年方赴京完娶事聞詔旌其門吉慟父殁於外遂終身不仕周中規字元體郡人嘉靖乙卯舉人幼失父勵志讀書母氏紡績以給之足跡不入城市者七年後知彭水縣潔己愛民事母以孝聞馬逸字廷泉萬厯辛卯舉人公正不茍值順寧酋猛廷瑞搆亂大師進勦逸募義勇數百人親率隨征招撫甚衆當事上其功欲授世職辭不受張羲字恆齊性孝友樂善好施精醫學有竒效而不責報遇貧者置銀藥中令病者自檢以暢其鬱人稱長者彭萬昌郡人生員事母孝沙賊之叛奉母避於南山賊追及欲射其母昌以身翼之賊感釋遂負而逃得免於難本朝陳佐才字翼叔郡人以才技隸黔國公標下受辨職自孫可望入滇後遂隱居不仕喜吟咏語多血性豫鑿石為棺鐫詩其上所著有叫天集是何菴石棺等集熊兆鎰字愛鼎郡人康熙己酉舉人有學行吳逆聞其才名强之仕不屈事平授鶴慶府教授勤於考課與修通志後升知靈邱縣所著有自針集環篆軒稿馬參郡人康熙己酉舉人吳三桂反脅以官不受事平授湖廣巴陵知縣李北有郡人康熙壬子舉人吳三桂反欲官之力辭事平任趙州學正端厚周慎不愧師範士論重之范悅郡人事親純孝備歷艱苦親沒廬墓白鳥羣集隱居教授吳三桂反脅以官不就鄉人祀之景東府明陶棨郡人土知府洪子成化間遣入國學萬曆間嗣職以孝義承家文學雲南府唐張志誠善闡人大和間入都學王右軍書法甚精南中人士競師之明張通字仲宣昆明人明經術洪武中任雲南教授講學以開文教張維昆明人操行髙潔言動不茍每於日用處體認天理隱居讀書該通六藝著有詩文𫝊誦人口蘭茂字廷秀嵩明人讀書過目成誦恥為章句學返求六經究心濓洛關閩之微欣然有得乃匾其居曰止軒冲淡簡逺以著述自娛所為詩文皆高古可法李尚文昆陽人博學能文徜徉山水嘗恨滇中乏書乃與子滄至江南購書千餘卷歸教鄉人自號醉樵居士賈維孝嵩明人不求仕進博學強記工詩文尤邃於醫孝親友弟綽有古風著有剩語閒詠藁施銓字文衡昆明人景泰庚午舉人知永從縣有惠政及歸教授門多知名士著有東軒稿朱克瀛字孔淵晉寧人幼穎悟博學能文工詩中景泰癸酉舉人任定州訓導辭歸養母著有清菴集行世子鳯成化甲午舉人知安縣亦以告養歸著有東湖詩集蕭景時字應元晉寧人𢎞治己酉舉人知安陸縣以不能曲事上官告歸作秋雨賦以見志所著有可亭集唐堯官晉寧人嘉靖辛酉解元屢上春官不第遂絶意仕進杜門著書有五龍山人集行世李鼐元字茹初羅次人家貧力學授徒克敦本行邑民重之每有著作多出其手所輯有文章正式靜齊詩行世張鼐字大鼎安寧人天姿高邁才思豪爽中萬曆甲午舉人知蕪湖縣以强項謫復補麻陽工詩詞步趨先民著有詩文若干卷曾祺字無咎安寧人博學多才善誘後學為文起衰振弊不落時趨屢困場屋益肆力理學為詩敏捷雄健常託志於山水竹石問所著有四書管見竝詩文若干卷李舜耕昆陽人貢生敦天性嗜讀書居常以班馬二史自隨著有可吾吟集李暢藻字涵白昆陽人貢生少好學有才望任曲江訓導致仕歸誦讀不輟著有竹龍記録雪山堂集本朝楊泰安寧人幼聰穎力學不出戶庭中前明壬午舉人益加奮勵安貧講學才俊皆出其門著有虎邱溫泉志熊才字參伯昆明人少有雋才為文援筆立就及長研精諸子百家書晚年詩文益邃尤工書畫片言尺牘人皆藏之虞世瓔字虞山昆明人由薦辟授光祿寺署丞歷官通政司右參議工書法供奉內廷蒙眷顧康熙二十一年致仕歸年八十六卒段拱新字捷元安寧人思貢淹貫經史雄於文章總督范承勳延為昆明書院山長一時登甲乙榜者多出其門子昕曦皆成進士其庭訓也王思訓昆明人性穎慧好讀書能文章補縣弟子員屢為學使器重總督范承勳徵修通志康熙丙戌成進士授翰林院檢討督學江西典試廣東著有近體諸詩及四書文稿行世張旭呈貢人康熙壬辰進士家素貧苦志讀書尤工舉業及釋褐官檢討益加刻勵坐卧小室中肆力於古一切聲華蔑如也未幾卒於官未竟其志趙繼普昆明人貢生博學力行任蒙自訓導公慎廉介課士有方文風一振著有雲莊詩文集程振鵾字雲九昆明人嵗貢孝友端方篤於行誼尤嗜學博聞强記著作甚富有嶺雲編啓蒙韻學見聞録數十卷雲間周彝為之序任蒙化府訓導卒於官曲靖府明傅遇高字克升南寧人萬厯戊子舉人任宜陽教諭歷官南昌府通判終養不仕著樂真蛻鳴藏海探珠等集又刋文廟通考有功學校本朝段標麟南寧人幼為人所掠賣能自識其鄉里及歸苦志讀書過目輒記不忘研精諸籍尤工二王書法中康熙補行辛酉科舉人知太湖縣有賢聲擢知灤州以老歸著有蠡屋集朱服遠南寧人貢生性好學積書萬卷日以考定經史為事稱理學名儒所著有聖門言行録石江邇言北學稿南旋草等集臨安府明沈政字行之通海人景泰癸酉舉人歷官太常寺少卿淹貫經史尤長於詩時人比之輞川許登瀛通海人萬厯乙酉舉人官中書性穎敏工古文詞著述甚富有觀海亭等集行世楊忠亮字藎卿石屛人萬厯丁酉舉人歷官固原鎮同知掛冠歸優游泉石以讀書吟咏自適著有素吟草山窗漫言等集葛仲選字淡淵河西人萬厯庚子舉人歷官苑馬寺卿博極羣書精於易象尤留意律吕心解神悟著太律十卷焦學士竑稱其得千古不傳之祕初知嘉魚縣識金學士聲於童子試中引入署教之聲遂以文雄天下蘇經世石屛人貢生性端方動履不茍嗜學强記至老不輟著有中庸集解妻馮氏少有廢疾妻家請罷婚經世卒娶之尤為人所推服云本朝塗大輅石屛人性疏曠嗜學能文府州志皆出其手生平纂輯甚富著有曼衍集鐡船稿林壑雜藝張士𢎞通海人沉靜好學博洽多能對客必具衣冠雖童子不敢忽有叩經史疑義者輒剖晰詳明工書善詩年九十七卒著有鶴嶠文集王芷河西人性穎悟讀書兩行竝下為文立就尤工詩古文詞纂修縣志人亟稱之許賀來字燕公石屏人康熙乙丑進士官庶常讀書中祕學益進纍升侍講以終養告歸著有賜硯堂詩集行世江廣蒙自人家貧嗜學史漢皆經手録教授生徒一方學者多師宗之著有四書語録王孫淡石屛人康熙己卯舉人任鎮南州學正平生勤學淹貫諸書手録至數百帙皆能成誦奬進後學無疾言厲色著有鈍齊文集澄江府本朝管灝字若梁新興人康熙甲戌進士選庶常授檢討好學博文充養縝密後改吏科給事中歸捐修學宫纂成州志謝儼河陽人康熙丁丑進士知仁和縣博通經史涉筆如飛分修通志一時服其淹貫廣西府本朝李佐明郡人勤學好古間集方書買藥濟人所著有五峯詩集萃古名言及古今人物考大理府唐楊竒鯤楪榆人讀書貫穿百家唐與南詔和親南詔遣竒鯤入朝髙駢謂鯤等皆南詔腹心遂鴆之有詩名唐詩載一首云風外波文吹又白雨中嵐影洗還青江鷗聚處窗前見林狖啼時枕上聞元蘇隆字子昌趙州人中統間進士以射策為主司稱賞蜀人楊廷為御史過龍岡訪之贈以詩子仁壽有敏才通諸方語仕龍關驛丞明楊鼐太和人𢎞治己酉舉人任黃州府通判告歸里居四十餘年閉戶讀書手不釋卷所著有南詔通紀何邦憲字宗月賓川人正德辛未進士官給事中歷任知府有龍津集奏疏三卷詩草一卷吳堯獻太和人正德丙子舉人歷知墊江通山二縣清介慈惠致仕歸里吟咏自適所著有樂天集行世子懋舉人歷官知州亦以詩名所著有乘槎南霞集行世尹心堯太和人貢生年十五承父訓得聞陽明良知之學討訂五經研究子史所著井天録傳世高可觀太和人廩生少隨父宦遊燕楚閩越間所至輒親有道講求理學及歸棄舉子業築浩歌園吟嘯自娛著有蒼洱集詠並天下名勝詩編為李中溪所重何鳴鳯浪穹人萬曆乙卯舉人長於詩歷官六安知州入名宦所著有半留亭稿陳眉公評其詩才在王山隂上為之作序本朝萬崇義字宜也太和人貢生任㠄峩教諭又補祿豐學問淵博工詩善書所至振興庠序著有拙菴隨筆郭復虢字子𢎞趙州人貢生博學好古著有石頭吟梅窗講易張雯字雲如趙州人生員性倜儻機敏秋闈被放遂棄舉子業博覽羣書詩文自適所著有鏡道堂雲起臺石碫草等集金元純字鳴初趙州人廩生少有奇童之譽為文發抒性靈試輒冠軍學使謝于道稱其文章器識卓冠全滇聘共衡文時稱得士逺近負笈相從至館舍不能容成材甚衆數竒不遇應貢而卒有遺文若干卷楚雄府明張如鳯鎮南人崇禎壬午舉人性甘恬退好學不倦所著有鏡心篇愈老强學集及枕流野韻諸稿為滇南名宿年六十八夢神人召修仁海國史而卒陳士恪字元敬楚雄縣人崇禎壬午舉人淹貫經史尤長風雅題咏甚富前纂通志與有力焉所著有庸書鴻雪草俞汝諧楚雄縣人廩生天姿雋拔學博詞宏尤長於詩賦為楚郡風雅冠丁希度定逺人生員長詩文屢試冠軍講學萬春山桂香閣著有枕泉詩稿姜維藩字介侯楚雄縣人敦厚周慎為儒林坊表勤學好古所著有浪栖草薩天璟字又宋楚雄縣人廩生素行修飭持身醇厚讀書講學科貢多出其門著有燕攜草本朝李天秩字㑹嘉楚雄縣人康熙庚午舉人屢躓南宫益肆力於文章巡撫王繼文重其才延為書院教習議論開發一時人士多所成就著有文集若干卷薩綸錫字言如楚雄縣人康熙乙未進士選庶常授檢討氣度安詳詩文博雅為迤西甲科之首卒於京永昌府明陶寧字致逺保山人正統間貢生精於詩佳句至今猶傳誦人口與湯琮等㑹咏其詩曰杜宇枝頭百舌吟何人不動惜芳心桃花紅雨梨花雪鋪得春愁一寸深又題菜燈云草堂照破虀鹽夢華屋燒殘肉食心汪城字維翰騰衝人𢎞治辛酉舉人知廣安州值嵗旱城露宿以禱忽夜夢雨已而果應士民為作夢雨亭所著有寧齊行稿易經字入常騰衝人𢎞治辛酉舉人幼孤奉母以孝稱克勤於學為文典實尤工詩句赴㑹試卒於途所著有時軒吟稿易翼之字孔彰經子正德丁卯舉人知長壽縣為政不事苛細與上官不合歸隱龍川江講學至老手不釋卷著有四書音義㑹編春秋經傳㑹編詩話類鈔古今詩評騰司志稿等書行世鄭文燦字國光騰衝人嘉靖乙酉舉人有雋才督學孫石磯張南園俱器重之所著有夢驥賦等稿行世俞焜字溟湖永平人生員博通經史子集不樂仕進歷遊吳楚燕趙兩浙間著有廣叩缶集陳秉善保山人貢生品行端方敦厚為士林重望著有尚書正誤趙千乘字玉涵保山人讀書過目成誦以恩貢生赴京肄業國子監祭酒溫體仁於一日中試以文七藝梅花詩百首一韻皆立就溫竒之除揚州府通判卒於官鶴慶府明李東儒劍川人資性朴茂幼知聲律淹貫史書年十九中嘉靖辛卯解元遊升菴中溪門得博約之教本朝孫桐字我儀郡人幼穎異讀書十行俱下童年補弟子員制義精悍古文詞尤清健詩出入襄陽輞川間晚嵗棄舉子業結茆雞足山博極羣書尤契伊洛淵源理後以母老歸築說石山房於朝霞之麓講學授徒彈琴樂志益精性命之旨著有說石山房集碧磊集驢背集行世李夢頎字贊皇郡人性耽書史尤精易理下筆灑灑千言絶無蹊徑嘗曰文不秦漢詩不漢魏不可云作者晚年悉屛去專研理學匾其室曰與天為徒中設周程張朱四子位正襟危坐驗喜怒哀樂未發前氣象有得輒怡然自喜總督范承勳聞其名徵之不就所著有希顔録自知録及名賢格言小寒山集永北府明張宗楚北勝州人七嵗能吟甫就學善草書舉神童赴京洪武間敕賜翰林院秀才卒於京麗江府明木公字公恕世襲土知府性嗜學於玉龍山南十里為園枕籍經書哦松咏月嘗以詩質於楊慎慎録其詩一百十有四首名曰雪山詩選叙而傳之木青號松鶴公恕之曾孫也能詩善書年二十九而沒子增刻其詩曰玉水清音如輕雲不障千秋雪曲檻偏宜半畝荷含煙翠篠供詩瘦啄麥黃雞佐酒肥皆其佳句也蒙化府本朝陳時霈字解如郡人順治辛丑舉人天性醇厚力學循禮文詞書翰俊逸多姿任路南州學正所著有春生草堂詩集張錦藴郡人貢生性情和藹學問淵贍值明末兵火之後書籍散亡藴手纂四書講義以教後學任景東府訓導教士有方康熙辛未與修滇志有文集隱逸雲南府明郭文昆明人買舟青草湖嘯咏自得自號舟屋都督沐璘聞而造之避蘆中不見一日揮去侍從攜小童幅巾斗酒移棹物色相與論詩文縱談古今訂為布衣交著有舟屋集殷才呈貢人成化間遊北雍屢上書言時事逮歸絶意仕進躬耕自適直指使趙璧同舍生也嘗造其家才於田間揖之留款雞黍璧憐其貧贍之才力卻不受康誥昆明人出著破靴人稱康破靴無妻子獨處一室好讀書性嗜酒有招之飲者即至豫以錢米不受善洞簫書法祝允明居嘗以玉屑和泥置袖中團弄陶作硯堅潤類銅雀瓦人重之名康硯然不可多得閒為一二以貽親識好事者日與之飲俟醉索之或伺其窘急出質則得質必故交否則文人墨客若富家貴族雖購以重價不售也朱璣昆明人隱居樂道工詩鄉里欽其髙致邵忠昆明人溫厚誠信遁跡邱園學士劉翊嘉其隱德贈以詩王琦昆明人隱居安寧山中以詩酒自放閒至城市人競邀之有酒即往醉甚索筆作書淋漓遒健類李北海書畢去不顧處貧有恬然自得之概熊之龍昆明人少穎異卓犖有大志崇禎間以嵗貢入京忽發嘆曰世亂親老何以仕為遂歸養築别業居之承歡之暇歌咏性情陶然於山水間有所著述輒焚去不傳楊文林昆明人以端方範後學夫婦相敬如賓人以梁孟目之每曰修身齊家四字學者於此關甚難透明末以嵗貢例授學正堅辭不出丁焜南字彥冲昆明人器質端凝寡言笑隱居教讀博極羣書尤邃於古嘗謂聖賢理學惟敬惟靜久之自有真得日惟閉户讀書與兄炳南弟曦南相師友終其身不欲以名著郭之建字用皇昆明人當明末不樂仕進居棕樹園習稼圃時袖書密樹中讀之每有所得輒為詩歌童牧趨聽即輟書與語孝弟勤儉皆習而化之楊惟峻昆明人博聞强記工舉子業值沙酋變喟然曰可以隱矣遂絶意仕進居南郭搆室種竹足不履市年七十餘讀書不輟張國正字永和昆明人才識雄博明末流冦入滇聞其賢强以官不受隱居隴畝有就正以道者即終日不倦否則正色拒之雖貧甚不廢嘯咏著有隴畝集本朝唐泰晉寧人少時曾遊董其昌門書畫皆臻其妙及歸放情山水巡撫錢士晉稱為雲中一鶴晚年隱於僧名普荷所著有擔當使者集曲靖府明項瑄南寧人每遊山水輒多題咏𢎞治間以良知之學教後進柴宗儒字師魯南寧人嘉靖間貢入太學不久歸帶經荷鋤且耕且讀所著有居易稿任良弼南寧人性嗜學不慕榮利當事聞其賢奬以冠帶不受人罕得見其面臨安府明濮宗達字兼善建水人成化戊子舉人志尚髙雅不求宦達杜門卻掃不輕與人交著述甚富李元初字復吾河西人萬厯庚子舉人將就選父扶杖送不覺悲悼即隨父歸結廬於邑之普應山終身不出澄江府本朝王佑命字命爾新興人勤學好古博通經史尚氣節舉止端方有司聞其賢召之不至晚年自號種松老人著有菜根齊集行於世年八十餘卒武定府明趙廷琯字仲玉祿勸人原籍昆明中崇禎壬午舉人流寇起遂不赴公車及孫可望入滇凡科日居家者胥迫之官琯曰昆明不可居矣避地祿勸山中誅茆種蔬讀書自樂與牧樵為伍以終其身武恬和曲人或稱武風子善以火炭繪竹箸作禽魚花鳥狀然頗自寶貴性嗜酒有招飲者伺其酣以火炭與箸陳於前而不言恬興發攘臂起頃刻繪數十箸酒盡則止或於酒間以箸相屬則怒拂衣去孫可望入滇恬匿去賊見其箸懸賞購不至繫之來命作箸不應揮斬之無懼色遂縱之自此徉狂市中不知所往大理府明李斯文太和人躬耕不仕有客來訪憐其貧欲以金餽知必不受乃潛置金於牀未曙而去斯文覺追送不及將金置道上遙望謝而旋其操與永昌楊象山齊名董難字西羽太和人嘉靖間從成都楊慎遊寓蕩山為樓以居輯轉注古音所著有韻譜鳯唱集楊賢太和人生員制行端方言無藻飾講學傳經門多達士當應貢曰出固教人處亦可以教人其事均也與其逺涉以求信孰若與信己者處耶遂不出終身趙惟精太和人萬厯庚子舉人少孤事母至孝母殁築風木亭以居當道訪之多不見山水嘯咏怡然以終楊向春號野巖雲南縣人初為諸生習舉子業久之棄去隱深山中究邵子先天之學歷數十年盡悟其祕遂能前知所著有皇極經世心易發微格物篇等書後遍遊名勝自稱孔道人遇袁了凡授以易學至武當不知所終楚雄府明丁大訓楚雄縣人别號五樓山人隱居呂合驛萬厯間姚安太守李贄過必訪之著作散失僅遺仙人骨一絶云五樓峯下紫雲關鶴馭秋風甚日還白骨不隨雞犬去只今遺蛻滿空山姚安府明李黻姚安所人成化間隱於大石淜帶經躬耕不求聞達永昌府明湯琮號礐菴金齒司人正統間與同郡陶寧張志舉程廣曹遇結詩社素心相許隱居樂志以詩名程章保山人萬厯己卯舉人髙尚不仕直指聞其名親詣廬勸之仕答曰自永至京萬餘里及入官或之秦之楚路費不給勢必稱貸非取民何以償之吾不忍為也直指深敬異之為請於朝遙授都察院司務終不出陶庚字星豫永昌人任承天府通判早嵗告歸築室西山吟咏其中屛跡城市郡舉鄉飲禮請庚主之因吟詩曰可笑夷門老賓客等閒卻上信陵車終不出葉奕字靜侯性純篤言行不茍潛心理學不樂仕進中年即棄舉子業以著述為事隱居騰越雪山著孝經演義八卷鶴慶府明高北峯郡人逸其名萬厯間居北峯秀邑村通書史不求聞達性耽竹石尤善琴嘗蓄一鶴每鼓琴鶴輒飛舞案前曲終乃罷李夢明字斂齊郡人少習舉子業隨父東彝遊太學父卒於京明傭役獲資扶櫬歸葬年二十喪妻遂不再娶肥遁林泉棲心經籍生平無謔言躁動鄉人至今稱之王世賢字懷貞郡人少習舉子業一試不利遂棄去隱居山中究心羣籍足跡鮮至城市雲南通志卷二十一之二
