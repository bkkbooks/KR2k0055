body:
  text: 雲南通志卷二十八祥異彩雲南見郡錫嘉名金馬西来山標顯號滇雖荒服祥瑞之呈由来久矣然逖稽前志川湧地震無代無之亦昔人水旱必聞之意歟夫卿雲復旦歌起中天而洪水懷襄君臣咨儆古帝王兢兢業業之思固無時而少斁也今我朝神聖繼作中和位育誠孝昭孚直省屢著嘉祥雲南尤多上瑞乃宵旰彌勤時以天人感召之理訓誡臣工俾知儆惕凡有司土之責者咸思殫心力愛養羣黎集福凝庥共襄至治則自古以来禨祲瑞應之徴俱不可以不察已志祥異周恵王時鳳鳴於西山土人不識呼為碧雞因名其山漢武帝元狩元年五色雲見於白崖遣使跡之置雲南縣平帝元始元年正月越裳氏重譯獻白雉一黑雉二後漢章帝元和中滇池出龍馬四白烏一甘露降雲南縣有神鹿兩頭能食毒草晉武帝泰始八年連理木生建寧泰康元年白龍三見於永昌白虎見永昌南罕恵帝永寧元年永昌螟成帝咸和六年甘露降寧州城内北園榛桃孝武帝泰元十二年甘露降寧州十四年建寧郡枯樹斷折忽然自立相屬梁武帝普通三年建寧地震唐𤣥宗天寳閒越睒天馬生郊代宗大厯四年永昌河中村眢井有火燭天井傍有三角牛四角羊三足雞懿宗咸通十四年永昌雨土僖宗乾符元年彗星見於永昌宋真宗景徳二年永昌地震神宗元豐三年日月交晦星辰晝見元成宗大徳初昆眀有蛟害人後除之六年澂江地大震泰定帝泰定年間大星隕於􅑇嘉縣之黑初山化為石文宗至順三年五月雲南郡縣饑晉寧地震順帝至元三年祿豐蝗至正元年昆眀玉案山下產赤小犬色如火羣吠遍野􅑇嘉縣雨鐵廬舎皆穿人畜多斃三年永昌饑二十五年昆眀大旱二十七年二月昆眀雪深七尺人畜多斃眀洪武十五年五色雲見於永昌太保山經宿不散廣通産嘉禾正統二年騰衝守禦千户所井内夜有兵戈聲一月乃止五年秋七月順寧大雨彌旬山崩水溢衝沒田廬不可勝計八月甘露降於石屏州學宫九年臨安產嘉禾一莖三穂者三畝景泰元年秋澂江霪雨害稼斗米銀四錢四年昆眀姚安大旱民多饑死五年夏鶴慶逄宻鄉產瑞麥一莖數穂者百餘七年晉寧大旱斗米銀七錢天順二年七月金齒司地震壞城成化元年祿豐蝗七年正月順寧地震有聲如雷踰日始寧八年秋姚安大水十年四月順寧嚴霜成凍永平縣大水十九年六月武定大旱𢎞治三年金齒騰衝饑霑益大水李樹結木瓜五年五月大理大水衝斷西門城闗水入城十年永平縣大水淹沒民居數百家十一年六月朔五日臨安大風雨寒甚樵蘇死於道者十數人鳥鵲僵死無算十月浪穹地震有聲如雷十二年雲南縣地震六月景東地震十日夜䝉化地大震地生白毛長寸許文廟獨無冬宜良地震有聲如雷民居盡圯壓死以萬計旬月常震越四年始寧十二月澂江地震官民宇舎傾壞人多壓死月餘乃止阿迷善覺寺鐘自鳴者三日十三年蒙自旱眀年復大旱十四年正月十六日劍川地震聲如雷土城官民廨舎皆圮六月朔大理大雷雨㸃蒼白石二溪水漲漂沒民居五百七十餘所溺死三百餘人秋永昌騰衝大水壞民廬舎人畜死者以百數計浪穹霪雨山崩水溢衝圯民居溺死百餘人七月二十五日夜河西縣大雪雨山崩水溢衝沒田廬無計十五年四月嵩明大風雨城南有龍㧞樓三楹入雲大有年八月騰衝地震十六年春正月騰衝火廵撫副都御史陳金疏奏上特遣重臣一人至滇勅諭畧曰雲南僻在萬里災應有由特命爾前去廣詢博訪旌賢良黜貪暴閲軍馬修城池振舉廢墜通逹幽隱興利革弊務期軍民安靖邉境寧乂少紓朕西顧之憂十七年景東書晦五日行者以炬有司以聞上命南京刑部左侍郎樊瑩行考察法罷黜文武官一千二百員有竒大姚地震白塔中裂再震復合正徳元年雲南縣地震生白毛二年騰衝饑三年騰衝多虎五年金齒城西石上開花六年騰衝地震楚䧺北勝州地震七年滇池水溢蕩析昆陽民居百餘所溺者無計八月庚午金齒騰衝地震辛未大震城堞官署民居傾壞死傷者甚多晉寧大水傷禾八年霑益西闗災燬二百餘家臨安地震有聲如雷三日乃止宜良學宫產靈芝九年鶴慶麗江大疫順盪井地震滷源涸十年䝉化地大震池中水立景東地大震五月武定祿豐元謀姚安鶴慶麗江同日地震官民廨舎傾圯殆盡鄧川地大震六月又震八月乂震九月太和地震踰旬始寧永昌地震十一年六月鄧川雷擊巨蛇長丈餘圍尺許黒雀數萬壞禾苗十一月彩雲見於鄧川二日乃㪚十二年二月彩雲復見於鄧川十三年八月順寧瀾滄江龍鬬湧水髙百丈行者七日不渡賔川大雨雹十七年二月雲南縣嚴霜成凍嘉靖元年五月鄧川一村出異蟲背有大星三十二㸃經月始滅楚雄禾雙穂二年三月趙州華藏山產芝草九莖六月澂江䝉化無雲而雨大水秋騰衝旱新興五色雲見雲州五色雲見三年保山縣民曾銘家雌鷄化為䧺永昌騰越大饑夏騰越多虎五年順寧新生村竹實光瑩如珠霑益大水李樹結木瓜六年武定日暈兩重旁有黒雲如蛟七年雲南縣地震祿豐大水八年八月澂江大雨山崩西浦溪水溢入西街壞屋損稼九年霑益大旱北勝大饑秋騰越大水九月晦有星大如日自東南隕西南十年阿迷地震數次踰月始寧虎入州境噬人六月有龍三見於大理鄧川之間夏河陽多虎十二年秋彩雲見於河陽十三年五色雲見於永昌十四年八月有星隕於昆眀之官渡聲如雷十五年永昌順寧大饑眀年永昌騰越又饑十六年曲靖霑益陸凉馬龍羅平地震八月景東霪雨害稼十七年昆眀地震數日乃止十八年三月臨安蒙自地震半年始寧九月祿豐雲南縣地震十九年二月永昌城中災燬民居三百餘家騰越大雨雹傷禾二十年三月熒惑入鬼夏四月建水有大星隕自西而東光燭民屋二十一年騰越竹多實二十二年三月順寧雨雹如卵秋騰越大水二十三年南安地震二十三年太和上陽諸溪有白物如羊羣跡之不見歷三年乃滅十月朔楚雄五色雲見趙州有黄龍見於三星山二十五年十二月祿豐有紅霞圍日者三秋景東大水二十六年臨安自春至夏不雨螟傷苖騰越饑二十七年騰衝大雨雹昆眀雨雹殺禾稼二十八年三月永昌哀牢山五色雲見武定霪雨水溢山崩永平甘露降二十九年八月永昌大水壞民廬舎人溺死者以百計順寧產嘉禾一莖三穂大如掌三十年三月熒惑入鬼四月有大星隕於南方光燭民居三十一年騰越饑三十二年閏三月永昌騰越地震騰越雨雹如鷄卵四月保山産瑞麥一本三岐富民蝗飛蔽天三十三年通海禦王家營牛産一犢雙頭八足祿豐有星大如日隕於丈廟富民大雨漂沒田廬􅑇嘉地震三十四年河陽產瑞麥三十五年順寧正月至五月不雨景東二月至六月不雨三月霑益晝晦如夜四月霑益大雨雹如卵七月彗星見長數尺月終乃滅三十七年三月楚䧺城中火燬民居數百家五月永平地震三日秋武定大雨雹傷稼永平騰越大水壞民田廬七月鶴慶霪雨水溢三十八年通海西北民家牛產一犢雙頭兩尾八足六月鶴慶漁塘村大雷雨山崩水溢壞民居百餘所死者不可勝計雲南縣大旱九月騰越大雨雹害稼彩雲見順寧東北狀如華盖光焰射人彌月乃散三十九年通海地震有聲如雷壓死數十人二月南寧馬龍木宻所同日地震三月宜良地震武定獅子山有白猿形大肖人值之者多傷集衆射殺之北勝大水十二月永平甘露降四十年楚雄火霑益大水李樹結木瓜南安安竜堡山鳴聲聞數里北勝大饑六月永平五色雲見七月姚安霪雨傷禾四十一年正月五井提舉司界麥秀兩岐或三岐嵩眀李實如瓜大饑十一月河西地震雒馬井有火自空而下大如斗聲若雷十二月諾鄧井災燬民居百餘家四十二年正月永平地震聲聞百里二月霑益陸凉地震四十三年楚雄旱江川大雪雨地震浹旬乃止彗星見西南經月乃滅四十四年正月通海大風抜木數百株水中舟掲入雲中莫知所之冬地震大雨雹四十五年新安所饑冬通海地震大雨雹隆慶元年楚雄大有年雲南縣旱嵩眀大水昆陽產嘉禾一莖五穂凡二百餘本二年新安所大饑三年元江元謀大旱四年安寧大雨浹旬沒官民廨舎十之三二月河陽江川五色霞光見四月䝉化晝晦五年八月通海地震有聲如雷壞城堞官署民居壓死者甚多新安竹華結實如麥六年霑益地震雲南縣久霖山崩五月􅑇嘉大水秋景東水溢沒田廬七月呈貢金勒村田中水湧三丈許雷大震其田成潭今資以溉萬厯元年雲南縣彩雲見如綺元江嵩眀大水二月至八月石屏霪雨湖水漲傾城堞田廬楚雄饑三月曲靖虎入市秋七月晉寧大水二年八月曲靖雨雪河陽大雨湖水溢三年四月朔大理晝晦八月曲靖大雨雪十月霪潦沒禾四年秋晉寧大有年九月騰越地震五年彗星見西南光芒燭天臨安春夏不雨民多殍三月晉寧地震聲如雷六年十二月永昌地震多死傷者七年彗星見武定矣納厰大雨溺死者甚衆八年石屏糓雙穂或三四穂九年二月騰越地震秋臨安北闗有雞雛僅一日冠距羽毛皆具遂能司晨八月彗星見西方光燭地三旬乃沒十一年永昌市火燬民居八十餘所四月癸亥有風起於永昌西北聲如雷拔木無算彗星見十二年四月彗星見慶雲見於騰越七月星隕於賔川有聲如雷十三年六月省城雨雹害稼十四年二月蒙化地震城堞官民居皆圯死傷者衆三月永昌大雨雹趙州甘露降河陽湖溢害稼十一月太白經天十五年騰越饑秋七月地震晉寧螟九月五色雲見於曲靖之西趙州大旱禾盡槁十六年澂江元江地震二月曲靖雨雹晝晦閏六月臨安通海曲江同日地震有聲如雷山木摧折河水噎流通海城垣公署民居皆圯壓死者衆曲江尤甚楚雄旱秋騰越五色雲見十七年省城地震臨安芝草生又生於石屛州署九月騰越北郊榖一莖三穂竟畝十八年彗星見東南經旬乃沒澂江旱十一月五色雲見於䝉化西山十九年􅊹江旱安寧火永昌竹實二月辛卯臨安大風抜木七月騰越地震城圯軍民廬舎皆壞二十年彗星見大理地震騰越大饑二十一年姚安大水豹入臨安南門二月天鼔鳴於永昌自子至寅方止大風拔木十二月省城地震二十二年姚安大疫正月廣西災官署民舎俱燬二十三年姚安大水二十四年姚安火燬民居百餘死傷者甚多八月省城澂江路南陽宗鎮南姚安定逺景東地震雲龍碩鼠長尺餘羣食禾稼俱盡五色雲見於臨安之西賓川大水浪穹饑二十五年大理大疫䝉化旱人多饑死春三月省城雨雹殺麥秋鶴慶大雨雹損禾二十六年夏鶴慶旱蝗七月雲龍彩鳳山五色雲見如綺竟日二十七年夏鶴慶大水無麥民饑五月永昌大水七月夜天鳴雲南東南次日晝晦至午嵩眀路南曲靖地震九月永昌地震二十八年富民楚雄蒙化北勝大水廬舎田禾皆沒賓川饑嵩眀槐無華楚雄西山崩鎭南地震有聲尋甸旱八月大星隕於騰越城尋甸地震經旬乃息冬臨安大雨雹瀘江堤決十月雲南府屬州縣同日地震二十九年省城夏秋不雨大饑􅊹江自二月至六月不雨永昌螟秋七月晦尋甸地震九月省城大雨雪昆陽易門尋甸鎮南產嘉禾一莖三四穂者四十餘本五穂者二百餘本鎮南牛生雙犢冬十一月昆眀羅漢山巖崩三十年浪穹地大震秋順寧東河水鬭水髙丈餘有聲如雷兩岸田畝皆沒移時乃消畦岸間鱗屬巨細皆死冬臨安大水決河堤三十一年臨安正月至六月不雨三月臨安東闗産一豕兩首二身八足一尾廣西有白蝶羣飛蔽天自東而来三十二年六月臨安大水沒田廬秋七月臨安雨雹害稼三十三年芝草生於雲南府署三十四年九月白崖彌渡雲南縣雨雹大如卵入地深尺許禾稼盡傷人畜食敗禾者輒病死廣西大水十一月朔臨安地震若雷城垣官署民居梵宇傾圮殆盡死者數千人數月乃止三十五年有異鳥鳴於省城其聲曰殺二月武定獅山與鷓鴣山鳴南北互應如松濤夏彗星見五月武定地震昆眀田中有一禾二葉其實非榖非稗相𫝊一鎗二旗曰兵秧十一月彗星見西方尾東指其色赤三十六年武定大疫維摩十八寨大水沒民居十二月永昌騰越地震江川大水三十七年正月朔永昌地震至二十六日八月晉寧有五色光見路南河陽俱產白燕三十八年春五色雲見於鶴慶夏省城大旱十二月定逺地震三十九年姚安定逺地震三月姚州大理賔川地震彌渡地震如蕩舟猛卯地震如雷雲南九峯山甘露降於松白如脂四十年二月省城羅次武定曲靖木宻同日地震四十一年八月鎭南禾産雙穂或四五穂四十二年雲南縣大饑六月朔永昌地震二十三日聲如雷鼔冬異星見在西北長三丈光射東南二小星隨之四十三年夏省城大旱景東地震八月朔楚雄姚安鎭南定逺地震四十四年正月省城地震四十五年七月晉寧地震雲龍白虹見於彩鳳山四十六年雲龍三崇山鳴如雷四十七年十二月省城大雨雹雷電交作雲氣黄白四十八年􅊹江姚安廣西安寧富民新興十八寨河西大水二月黑霧見初起似雲其色黄紅變為黒晝晦如夜大風雨如注宜良瓦石皆飄曲靖城堞圯三丈吹一人去地丈餘方墜平彞折木無數哨兵舍吹去數里乙丑夜月變黄黒色星晦無光三月省城產羊一頭如犬三耳八足黒蹄二尾遍身白文廣通鎮南洱海地震甘露降於雲龍七月易門老場西嶽街地䧟五十餘丈傾民居死者二百餘人騰越產牛二首四目四耳富民大水泰昌元年十一月曲靖尋甸地震天啓元年省城自正月不雨至六月新興彌勒大旱元謀地震聲如雷六月猛卯地震十月羅次富民地震武定獅山鳴十二月省城地震二年新興疫二月有黑雲如盖自北来覆省城四月省城地震八月師宗隕霜殺禾冬甘露降於雲龍祿勸生嘉禾三年江川通海河西大疫二月甘露降於大理圓瑩如珠三月雲龍三崇山鳴如轟雷四月雲南縣地震傾城樓堞壞民居五百餘所大理地震聲如吼地裂五區六月定逺大雨震電霧黄紅色水溢壞田禾廬舎溺死三百餘人廣西疫十一月師宗地震昆眀羅漢山崩有流星大如斗色如火自省城東南隕於西北聲如雷四年大理疫祿勸旱十八寨地震廣西春夏不雨六月麗江地震七月武定大雨雪損禾八月武定產雞四翼四足崇禎二年嵗大饑三年秋七月白井大雨水溢壞官民廨舎漂沒人千餘填塞井口四年石屏異龍湖龍見鬚爪鱗甲皆見五年江川大水六年江川大水淹沒城垣九年正月順寧地中出火方廣丈餘夜半上升自卡思凹起北過枯柯壩隕於沙窩寨瘴疫大作七月順寧龍鬭十六年夏武定大旱新興大風霾行人皆仆大鳥集阿迷之田足髙數尺翼倍之六月武定獅山鳴十一月姚安地震有聲河陽馬產一犢有角本朝順治元年甲申四月太白晝見昆眀地震八月復震武定城崩二年乙酉䝉化有雙生者一類人而無肩一類鴨而無掌母子俱亡鄧川牛言三年丙戌正月昆眀地震有聲四月嵗星入於井鬼熒惑守井鬼四年丁亥宜良牛生犢二首八尾南城外雌雞化為雄五月昆眀饑民多疫五年戊子大饑六年己丑趙州雨雹大如卵移時深七尺許屋瓦皆碎傷稼八年辛卯二月䝉化紫燕巢成黄燕逐而居之九年壬辰六月武定獅山地震蒙化地大震地中若萬馬奔馳塵霧障天夜大雨雷電交作民舎盡塌壓死三千餘人地裂湧黒水鰍鱔結聚震年餘乃止十一月彗星見東南形如疋練二十餘日乃滅䝉化有物從東起金光閃爍狀若浮圖聲若巨雷墜於西化煙氣而散十年癸巳羅次地震十一年甲午五月省城湧泉寺龍鬭六月昆明地震十二年乙未三月新興地震城垣民居多圮十三年丙申昆眀竹結實如稻十五年戊戌彩雲見於河陽之西十六年己亥三月大雨雹如卵如拳深二尺許傷牲畜無算四月順寧天鼓鳴姚安鼯鼠遍野定逺蝻蟲食苖十七年庚子冬鴻鴈来雲南舊無鴻鴈至是百十為羣日數過皆西去自後年年皆有不見回十八年辛丑甘露降於安寧文廟古柏上形如貫珠味如飴騰越大饑死者六千餘人臨安有星隕於西方小白蝶羣飛蔽天自東南而西北月餘乃止十一月廣西飛星自東北而西南大如盆有尾色灰白墜時聲如雷康熙元年壬寅鶴慶大水淹沒民田寧州禾遍產雙穂廣西大旱師宗白蝶羣飛蔽天數月方散二年癸卯二月昆眀地震大水景星見和曲東占為天倉自後連年豐稔三年甲辰廣西地震冬孛星見白氣丈餘經月乃散四年乙巳大理蒙化趙州賔川雲南洱海旱五年丙午昆眀大風抜木六年丁未昆眀羅漢山崩數丈八年己酉秋八月景東地震九年庚戌昆眀太華山鳴夏䝉化趙州旱六月羅次祿豐地震城垣廬舎崩塌殆盡九月景東大雨水壞民舎曲靖東南西城門災延燒兵民居千餘所十年辛亥五月昆眀大鳥来大水劍川大鳥来其喙如鋤張則小鳥自飛入喉中礮擊不為動數日乃去十一年壬子七月彩雲見於石屏十二年癸丑元日地震十七年戊午富民大水十九年庚申彗星見光芒亘天數月方滅四月火星守鬼薄積屍氣秋楚雄地大震聲如雷數日不止城垣官署民舎俱壞壓死千餘人地裂湧黑水十月彗星見長如疋練月餘乃滅豹入禄勸城元謀地震二十年辛酉二月朔彩雲見於羅次十月金馬騰輝於滇池二十一年壬戍五月彩雲見於雲南縣之西曲靖馬龍饑十月五色雲見於楚雄之西自午至酉二十二年癸亥夏䝉化有物頭類鴿項有紅毛尾如帚火星亂落炤燿林木無翼而飛日落時見於西山二十四年乙丑四月廣通開化庵地湧清泉二十五年丙寅四月姚安山崩水泛廣通大鳥来足髙四尺翼倍之曲靖夏旱秋水冬地震二十六年丁卯九月姚安地震二十七年戊辰正月彩雲見於雲龍二月劍川大風㧞木三月劍川西山鳴劍湖溢浪穹大雪傷豆麥損林木南寧縣民家産豬一首四耳八足二尾鶴慶地大震四月朔鶴慶大雪傷稼五月劍川地震開化旱七月劍川大雨雪傷稼昆眀彩雲見二十八年己巳四月曲靖李樹菜花皆結豆桃結王瓜九月廣通縣署紫薇生連理二十九年庚午正月朔彩雲見於建水東七月新興河陽大雨水損禾十一月朔太白晝見彩雲見於雲南縣西三十年辛未富民羅次大水六月安寧羅青山崩七月晉寧大水禾有螟三十一年壬申二月蒙化黄霧彌天臨安地震十一月彩雲見於浪穹縣之鳳羽鄉十二月又見三十二年癸酉十二月臨安大水霑益産瑞麥一穂兩岐三十三年甲戍安寧學宫産靈芝三月永昌大雨雪三十四年乙亥正月朔五色雲見於㠄峩之桂峯山石屏星隕光閃爍三十五年丙子正月朔彩雲見於新平團山五色雲見於元謀塔山六月㠄峩地震入月昆眀地震三十六年丁丑富民廣西大水三十七年戊寅昆眀太華山崩馬龍民家產牛一身二首三十八年己卯建水大雨水河堤潰淹沒田廬羅平產嘉禾一本三穂元江龍鬭三十九年庚辰廣西疫霑益大鳥集東門四十年辛巳廣西大水富民地震四十一年壬午三月彩雲見於元江四十二年癸未元江廣西大水四十三年甲申㠄峩產嘉禾一莖三穂至四五穂廣西大水九月五色雲見於河陽四十四年乙酉正月朔卿雲見東方四十五年丙戌正月朔五雲捧日二月元謀地震河西產嘉禾一莖三穂四十六年丁亥三月景星見元江七月鶴慶大水九月雲州祿豐地震四十七年戊子黄龍見於新興官村路南產嘉禾一莖三穂四穂四十八年己丑四月祿豐兩雹大如鷄卵傷麥四十九年庚寅十月彩雲見於元江五十年辛卯劍川麥秀兩岐七月雲龍江水泛漲沒民居禾稼五十一年壬辰正月五色雲見於劍川金華山南竹花結實味甘淡可採以食五十二年癸巳二月昆眀曲靖馬龍霑益尋甸廣西臨安地震八月大水嵩眀藥靈山鳴五十三年甲午昆眀大饑臨安饑十月劍川地震次月又震大雨雹五十五年丙申正月朔慶雲見於河陽東二月晉寧城中火燬民居過半十月祿勸地震五十六年丁酉祿豐大水河溢五十七年戊戌河陽產嘉禾一本三穂至四穂五十九年庚子二月宜良地震富民旱六十一年壬寅正月㠄峩地大震壞民居二月始定祿豐地震雍正元年癸卯正月朔卿雲見於廣西三月十八日石屏文廟成彩雲見新興河西㠄峩各産芝草五色二年甲辰正月昆眀祥雲見五色成鳳形踰時不散秋嘉禾遍產嵗大稔十一月昆眀嵩眀宜良尋甸河陽路南地震四年丙午建水耤田内產嘉禾一莖雙穂至三四穂十一月朔新興彩雲見成龍鳳文歴午未申三時五年丁未建水地南產嘉禾一莖雙穂至四五穂者數畝嵗大收十一月威逺地震六年戊申三月羅次慶雲見七月新興產五色芝八九本為一叢五色鮮妍十月抱母井龍祠産石芝十月二十九日恭逄世宗憲皇帝聖節雲南楚雄武定姚安廣通大姚定邉同見卿雲捧日經辰已午三時次日午時復見絢爛倍常七年己酉三月彩雲見於元謀東南歴已午二時六月彩雲兩見於宜良踰時不散閏七月趙州白崖湧甘泉二水洌而甘大資灌溉十月和曲彩雲見八年庚戌七月阿迷文廟成彩雲見九月朔雲南慶雲見越二日又見九年辛亥六月昭通田生赤蟲長寸許食稻葉旋有羣鴉數千下啄蟲俱盡禾無傷八月昭通東川荍地不種自生暢茂結實農民名曰天生荍雲南通志卷二十八
