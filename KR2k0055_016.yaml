body:
  text: 雲南通志卷十六下師旅考附文宗至順元年正月雲南諸王圖沁及萬户布呼阿固克酬等叛攻陷中慶路仁徳府晉寧州等處托卜嘉自立為雲南王布呼為丞相阿固呼喇呼等為平章等官命中尚卿碩裕實以兵討之又以河南行省平章奇珠為雲南行省平章入番順元宣慰使特穆爾布哈為雲南行省左丞從豫王阿喇特納錫哩由入番道進討四月烏䝉土官禄余殺烏撒宣慰司官吏降於布呼羅羅斯諸蠻俱叛與布呼相應平章特穆爾布哈被害四川行省調重慶五路萬户以兵來救軍至境值羅羅蠻萬餘人亦遇害餘衆遁還事聞詔調江淛河南江西兵二萬命諸王温都斯特穆爾将之與湖廣行省平章托歡㑹兵進討五月羅羅斯權土官宣慰撒加伯阿漏土官阿喇勒州土官徳益叛附於禄余時諸王圖喇萬户呼都克婁沙克哷博囉等皆領兵進討置順元宣撫司統答剌斤軍並進又立雲南行樞密院以哲爾特穆爾知院事塔瑪齊嘉琿為同知副使發朶甘思圖沙瑪及鞏昌等處軍三千人付之四川博囉亦以䝉古漸丁軍五千來㑹六月撒加伯合烏䝉蠻兵萬人攻建昌縣雲南行省右丞伊爾特穆爾拒之斬首四百餘級四川軍亦敗撒加伯於蘆古驛七月圗沁布呼等勢愈猖獗烏撒禄余亦乘勢連約烏䝉東川芒部諸蠻謀令布呼弟巴延等兵攻順元詔遣使督豫王及行樞宻院四川雲南行省亟㑹諸軍分道進討於是四川行省平章托爾楚兵由永寧左丞博囉引兵由青山芒部並進陳兵周泥驛及禄余等戰殺蠻兵三百餘人禄余衆潰遂奪其關隘以通順元諸軍尋又戰七星關六日凡十七戰賊大敗潰去時雲南行省平章奇珠等俱失期不至十一月羅羅斯撒加伯烏撒阿達等合諸蠻萬五千人攻建昌伊爾特穆爾等引兵追戰於木托山下敗之斬首五百餘級仁徳府權達嚕噶齊克酬糾集義兵敗布呼於馬龍州殺其弟巴延獻馘於豫王又戰於金馬山獲伯忽及其弟巴延察爾其黨拜布巴巴延特穆爾等十餘人誅之餘賊皆潰獨禄余猶據金沙江趣進兵討之鎮西武靖王綽斯巴勒與伊爾特穆爾碩裕實同進兵伊爾特穆爾倍道兼進奪金沙江十二月綽斯巴勒伊爾特穆爾等擊敗阿禾䝉古軍於安寧州禽阿固斬於軍前大兵抵中慶賊兵七千猶拒戰於伽橋古壁口兵交伊爾特穆爾左頰中流矢洞耳後拔矢復與戰大㨗遂復行省諸軍皆㑹駐於城中分兵追捕殘賊二年正月哲爾特穆爾博囉敗烏撒蠻兵射中禄余降其民烏䝉東川易良州蠻獠等俱欵附豫王至當當驛安輯人民三月豫王與鎮西武靖王禽雲南賊首及諸将校悉誅之磔屍以徇諸蠻悉降惟禄余追捕未獲四月鎮西王等已平雲南各遣使報㨗上言䝉古軍及哈喇章羅羅斯叛者或誅或降雖已畧定其餘黨逃竄山谷不能必其不反側乞分兵鎮遏餘皆遣還從之九月禄余冦順元路左丞特穆爾布哈禦之雲南行省遣都事那海奉詔往諭禄余授以叅政禄余拒不受反為所害十月䝉古都元帥克哷引兵擊阿固賊黨於靖江路海中山破其柵殺賊五百餘人托卜嘉之弟必瑠圗衮達實舉家赴海死又獲圗沁弟二人子三人誅之禄余遁去順帝至正元年十二月雲南楚勒罕錫里等叛詔雲南行省平章政事托克托穆爾討平之二年十二月賜雲南行省叅知政事布拉三珠虎符以兵討斯可發七年三月雲南王博囉來獻斯可發之㨗二十三年三月蜀賊明玉珍自将三萬人攻雲南梁王奔威楚求救於大理總管段功功進兵呂闔敗玉珍兵於關灘江殺獲千餘級追至回蹬關復至七星關皆大破之元帝紀明玉珍陷雲南省治屯金馬山陜西行省叅知政事徹爾特穆爾等擊敗之禽玉珍弟明二在二十二年二十七年梁王攻大理不克先是梁王忌段功殺之大理舊臣仍立其子叚寳梁王遣使刺之前後凡七攻不克乃講和明洪武十四年九月壬午命潁川侯傅友徳為征南将軍永昌侯藍玉西平侯沐英為副将軍列侯曹震王弼金朝興都督郭英張銓等皆從征雲南授以方畧師至湖廣友徳悉遵上諭分遣都督郭英胡海洋陳桓等率兵五萬由四川永寧趨烏撒友徳等率大兵由辰沅趨貴州十二月辛酉傅友徳率藍玉沐英等進攻普定普安俱下之進兵曲靖元梁王巴咱爾斡爾密遣司徒平章達爾瑪将兵十萬屯曲靖沐英曰彼謂我師疲於深入未有虞心若倍道疾趨出其不意破之必矣友徳然之遂進師未至數里忽大霧四塞衝霧而行阻水則已臨白石江矣頃之霧霽達爾瑪望見大驚友徳即欲濟師英曰亟濟恐為所扼乃整師臨流勢若欲渡達爾瑪悉精鋭扼江岸英别遣數千人從下流潛濟出其後鳴金鼓樹旗幟達爾瑪急撤衆禦之陣動英乃㧞劍督師濟江以猛而善泅者先之長刀蒙盾破其前軍敵氣索退數里而陣大師畢濟友徳麾兵進薄之矢石雨發聲動天地敵衆披靡遂大敗生禽達爾瑪俘其衆數萬悉撫而遣之蠻人大喜曲靖既平留兵戍其地友徳自将北攻烏撒以應永寧之兵分遣藍玉沐英率師西趨雲南癸酉玉等至板橋梁王棄城走雲南省右丞觀音保以城降玉等整衆入城撫定其民秋毫無所犯自出師至是僅百日梁王在晉寧州固納砦赴滇池死之傅友徳自曲靖趨烏撒郭英等已出永寧攻赤水河元右丞實卜斂衆拒守友徳兵至大破之得七星關以通畢節又進至可渡河於是東川烏䝉芒部望風歸附分遣諸将進取臨安諸路十五年正月辛巳威楚路平章閻鼐瑪貝叅政埒克矩布哈等赴曹震營降壬午曲靖宣慰司樞密同知克哷該等及中慶武定澂江三路達嚕噶齊等官俱赴藍玉沐英營降遂置雲南都指揮使司以都督謝熊馮誠署司事閏二月藍玉沐英等進攻大理兵至品甸段世以兵五萬扼下關玉等遣定遠侯王弻率兵出洱水之東趨上關為犄角勢自率衆抵下關造攻具夜半遣都督胡海洋由石門閒道遶出點蒼山後攀木縁巖而登樹列旗幟遲明大軍望之踴躍讙譁敵衆驚亂英先驅渡河水沒馬腹将士隨之斬關而入山上軍亦下腹背夾攻世兵大潰進拔大理城獲世及段寳二孫乃分兵取鶴慶畧麗江破石關下金齒於是徹爾黙色和尼平𬗟等處相率歸附四月烏撒東川芒部復叛傅友徳檄沐英合兵進討大破其衆悉平之九月土酋楊苴等以雲南城守空虛遂相煽叛糾衆二十萬合三十六營兵攻城時城中乏食士卒多病守将馮誠與指揮謝熊嬰城固守俟賊怠輙出竒兵擊之賊不能破遂圍城為乆困計沐英在烏撒聞報馳回至曲靖先遣人報城中為賊所得紿之曰總兵官領大軍三十萬至矣賊驚恐拔營遁至安寧羅次邵甸晉寧江川等處據險樹柵英至與馮誠等合兵剿捕斬首六萬餘級生禽四千餘人諸部復定十六年二月傅友徳率郭英等西討先是沐英自大理還故元右丞布延圗復叛據佛光寨額森布哈陷鄧川髙生圍雲南縣金齒土官髙大恵并額森呼圗克搆麓川夷入冦屠永昌友徳自七星關回兵率郭英等討之破佛光寨布延圗自焚死遂過金沙江攻北勝府下之禽髙生并畧鄧川進平麗江平津等州蠻民降者數十萬户髙大惠逃為白人所殺因置大理指揮使司以周能守之麓川之外有緬國八百媳婦國皆内附於是上遣耿炳文諭傅友徳藍玉等班師留沐英鎮雲南别命列侯王志仇成張龍分赴尋甸各府繕城池立屯堡安輯人民十七年四月以平雲南功進封傅友徳潁國公列侯藍玉仇成王弻子孫世襲陳桓胡海郭英張翼皆為侯十八年正月東蘭州韋富及廣南特磨道復亂沐英討平之永昌李觀亦討段酋平之十二月麓川宣慰司思倫反率衆冦景東馮誠討之失利千户王昇死之十九年二月雲南臻洞西浦擺金擺榜諸蠻叛復命傅友徳率師討平之二十一年正月思倫入冦結砦於摩沙勒沐英遣都指揮寗正擊破之斬首一千五百餘級三月思倫悉其衆號三十萬戰象百餘復冦定邊以報摩沙勒之役英選三萬騎晝夜兼行凡十五日抵賊營遣都督馮誠先出竒兵三百挑之賊以萬人驅三十餘象逆戰指揮張因率騎卒五千餘人為前鋒其渠長跨巨象直前諸軍注矢連發矢中象左膝及脇象仆地渠長走追射殺之諸軍譟而前殺賊數百人獲一象而還英喜曰賊不足平也乃下令軍中置火銃神機箭為三行列陣中俟象進則前行統箭俱發不退則次行繼之又不退則三行繼之詰旦分軍為三隊馮誠領其前寗正領其左都指揮湯昭領其右将士皆鼓勇進賊悉衆出營結陣以待其渠帥把事招綱等皆乗象象披甲背負戰樓若欄楯懸竹筒於兩旁置短槊其中以備擊刺陣既交羣象突而前諸軍擊之矢石俱發聲震山谷羣象股栗走指揮張因千户張榮祖率騎士乗之直𢷬其栅遂縱火焚其寨煙焰張天還復以兵邀擊之殺傷甚衆賊黨有錫喇者亦驍勇復率衆殊死戰左師少卻英登髙望之命左右取其帥之首來左師遥見一人㧞刀飛騎而下率衆更進英督戰益急不移時賊衆大敗斬首三千級俘萬餘人生獲象三十有七餘皆被矢如蝟死渠帥刁斯郎理各中百餘矢斃象背上餘賊潰英率師追襲之賊連日不得食死者相枕藉思倫遁去六月東川蠻復叛命傅友徳為征南将軍沐英陳桓為左右副将軍曹震葉昇為左右叅将討平之九月越州土目阿資反十一月阿資冦普安焚刦府治友徳進擊之斬其渠滿已青二十二年正月阿資退屯普安倚崖壁為砦友徳以精兵促之蠻衆皆縁壁攀崖墜死者不可勝計生禽一千八百餘人阿資遁還越州沐英使都督寗正從友徳合擊大敗之斬其火頭弄宗等五十餘人阿資窮蹙請降初阿資之遁也揚言曰國家有萬軍之勇我地有萬山之險豈能盡滅我輩沐英乃請置越州馬龍二衞扼其衝要又分兵追捕至是乃降二十三年十一月思倫降仍命為宣慰司二十四年十二月阿資復叛平羌将軍何福率兵討之至越州阿資援絶降置寧越堡二十八年正月阿資復叛西平侯沐春平羌将軍何福禽斬於越州三十年九月平𬗟諸蠻刁斡孟逐宣慰司思倫倫奔訴京師命沐春為征南大将軍都督何福徐凱為左右副将軍率雲南四川兵討之三十一年五月沐春進兵擊平𬗟先以兵送思倫於金齒使人諭刁斡孟不從乃遣何福瞿能等将兵五千往討之福等躋髙良公山直𢷬南甸大破之殺其渠刁名孟斬獲甚衆還兵擊景罕寨寨乘髙據險堅守不下官軍糧械俱盡賊勢益盛福使告急於春春率五百騎往救之乘夜至怒江詰旦徑渡令騎馳躪寨下揚塵以警之賊乘髙望見塵起蔽天不意大軍卒至驚懼率衆降春乘勝復擊崆峒寨賊夜潰走刁斡孟乃遣人乞降上以其反覆不之許何福尋禽斬之思倫始得還平𬗟悉定永樂三年八百土酋入冦西平侯沐晟出次䝉自蠻遁去督兵窮追斬其酋以徇四年七月命沐晟以左副将軍同新城侯張輔分道伐安南先是安南國王陳日焜為其臣黎季􅬚所殺日焜之孫陳天平奔愬京師季􅬚卑辭表請天平還國上遣廣西都督黄中等送天平歸季􅬚伏兵殺天平中等引還上怒遣将分道出師晟奉命由野蒲伐山通道先驅入安南奪猛烈棚華關隘築堡駐師以造舟分遣諸将出宣光江口舁舟夜至洮水泝流力戰連舟為浮橋濟富良江與大軍㑹合攻多邦城柵破之遂𢷬東西都及盤灘諸處師宗元江富州維摩諸蠻叛指揮僉事沐昇皆以計禽之五年五月張輔沐晟連敗賊兵所至如破竹黎季􅬚父子走海上追至日南竒羅海口悉就禽械送京師安南平得郡四十八縣百八十六户三百十二萬五千九百遂置交趾各官晟還朝進封黔國公還鎮雲南六年八月交趾酋簡定反命沐晟發雲南貴州四川兵數萬往征之仍命兵部尚書劉儶往贊軍事十二月沐晟帥師與簡定戰於生厥江敗績兵部尚書劉儶等死之七年八月命英國公張輔與沐晟合兵討交趾獲簡定等檻送京師伏誅九年正月命征夷将軍沐晟同副将軍張輔討交趾陳季擴勅雲南及四川等省兵二萬四千隨征季擴簡定所立偽王也十一年十二月沐晟與張輔合兵敗交趾賊於愛子江十二年正月沐晟等師至老撾三關執陳季擴以歸誅之宣徳元年十二月命沐晟為征南将軍同安逺侯栁升等由雲南分道進討交趾叛賊黎利正統二年他郎甸蠻叛都督沐昂討平之十月麓川思任反思任思倫次子也宣徳中與木邦相讐殺因而失官改孟養宣慰司以刀氏代之宣慰使刀賓玉勢弱不能輯諸夷思任遂擁衆叛於麓川侵孟定灣甸大殺掠沐晟以聞至是復侵南甸州命沐晟遣官招之不奉詔三年十二月思任掠騰衝南甸取孟養地刀賓玉奔永昌死思任遂屠騰衝據潞江仍自稱曰法法滇王號也事聞上遣刑部主事楊寧諭之不服四年正月命沐晟率左都督方政右都督沐昂討思任太監吳誠曹吉祥監軍兵至金齒思任遣其将緬簡㫁江立柵而守師不得渡初思任未叛時刀賓玉常遣詣晟晟兒畜之至是晟遣指揮車琳等諭之降思任佯許諾晟信之無渡江意楊寧曰兵未加稱降詐也懼有後悔晟不聴檄寧督餉金齒賊将𬗟簡數挑戰政怒造舟六十艘欲渡江晟不可政不勝憤夜獨率其麾下渡江擊𬗟簡追至景罕寨破其賊柵斬首三千餘級獲象三十餘遂與其子瑛部将顧勇等乗勝深入逼思任上江頃之伏四發政求救晟怒其違節制不遣久之以少兵往至夾象石不進政追至空泥兵疲食盡知晟不力援乃遣其子瑛還曰汝急歸吾死分也遂䇿馬突陣死顧勇等一軍皆沒晟聞敗會春暮慮瘴發燒江上積聚倉卒奔還永昌至楚雄詔問失事状晟懼罪暴卒思任犯景東孟定殺大侯知州刀奉漢等破孟賴諸寨降孟璉等長官司五月以沐昂為左都督征南将軍右都督吳亮為副将軍馬翔張榮為左右叅将進討㨗於潞江五年二月沐昂軍抵隴把去賊巢甚近張榮先令都指揮盧鉞擊賊大敗榮棄符驗軍器遁昂等不能救師還詔切責昂逮吳亮馬翔七月思任屯孟羅大掠據者章硬寨沐昂進克之賊宵遁威遠州土知州刀蓋罕戰威江亦敗之六年正月命定西伯蔣貴為征蠻将軍總兵討麓川以太監曹吉祥監軍兵部尚書王驥提督軍務侍郎徐晞督軍餉時思任遣使入朝謝罪刑部侍郎何文淵上言宜寛其天討大學士楊士竒是之英國公張輔謂思任世職六十餘年屢抗王師釋此不誅恐示弱小夷非䇿上從之侍讀劉球上疏諌請罷麓川專備西北太監王振沮之不報遂命貴驥先赴雲南復以副總兵李安叅将宫聚領川貴兵副總兵劉聚叅将冉保領南京湖廣兵大發兵十五萬轉餉半天下驥薦太僕寺少卿李蕡郎中侯璡楊寧主事蒋琳等為叅謀十一月蔣貴王驥等至金齒分為三道進取會師上江夾攻三日不下㑹天大風驥命縱火焚栅因督衆乘之斬首數萬級賊衆敗走保南甸之沙木籠山為連環七寨驥麾兵直入攻其中寨各哨俱奮大敗之十二月驥等直搗巢穴進攻麓川積薪焚其柵思任乘舟走𬗟獲其妻妾象馬寳玉無算子思機潛匿孟養移兵討之㨗聞詔驥等還㑹維摩州蠻韋郎羅作亂自稱廣新王驥遣指揮萬瑊擊之郎羅懼逃入安南驥檄示福福安南人斬其首來獻驥等班師叙功進封蔣貴定西侯王驥靖遠伯侯璡楊寧俱轉侍郎餘陞賞有差七年十月復命定西侯蔣貴靖遠伯王驥征麓川𬗟甸先是思任既敗走𬗟大軍還復出為冦復命驥等往征起兵如前八年二月蔣貴王驥軍至金齒遣使檄緬縛思任父子至軍前仍進兵騰衝分遣沐昂侯璡等率東路兵徑搗麓川以陳儀領前鋒三千開南牙山㫁賊走路使言𬗟願獻思任欲以重臣往取郭登請行由金沙入𬗟𬗟酋卜剌浪來會頗驕蹇登折之酋氣沮乃叩頭聴命十二月郭登還其國相𬗟剌劄以思任載樓船來獻時有嫉登功者乃議留守沙壩剌劄至貢章不見登遲疑不敢獻驥謂貴曰此紿我過江則絶我歸路也陳儀又自詫知天文以為熒惑犯輿鬼緬可伐驥乃密令蔣貴率師匝江而下大戰一晝夜焚其舟數百艘剌劄竟持思任去貴子雄追之兵敗自刎東路兵克孟養諸寨思機亦潛竄獲其妻子象馬而已驥還仍以㨗聞王振庇之上慰勞如前加驥貴歲禄各三百石命楊寧叅贊雲南軍務十年十二月雲南千户王政奉勅幣諭𬗟甸許以孟養地易思任卜剌浪喜以思任妻孥部屬三十二人付政思任不食垂死政遂斬首函獻京師因以卜剌浪長子銀起莽為孟養宣撫思任二子思機思卜尚潛居其地十一年春改麓川為隴川設宣撫司於隴把降勅赦思機等罪令其來朝不至更命黔國公沐斌侍郎侯璡調𬗟甸木邦兵討之至金沙江遣人招諭機疑懼不肯渡江遂引還十三年三月復議征麓川王驥以原官總督軍務授宫聚平蠻将軍印率張軏田禮方瑛等統漢土兵一十二萬至雲南十二月兵抵金沙江賊柵西岸以拒驥命構浮梁亘千數百尺麾兵悉渡一鼔破之賊斂衆保鬼窟山立三大寨驥乘勝進攻皆拔之又破芒崖山各寨踰孟養至孟那而還諸酋皆震怖謂自古漢人無至此者然思機思卜竟失所在或謂死於亂兵夷衆復立思任幼子思洪為主以状來言緬不能撫其人民願立思氏永當差發時兵力已疲因許之礱石金沙江與洪誓曰石爛江枯爾乃得渡遂班師景泰五年緬執思機送京獻俘誅之正德二年雲南屬夷阿本叛巡撫吳文度討平之七年十八寨夷人出降巡撫洪遠安撫之嘉靖七年尋甸土酋安銓反初仁徳府土官安詳安廼屢亂降為馬頭改尋甸設流官至是知府馬性魯因徵糧繫馬頭安銓妻於獄裸撻之銓遂叛掠嵩明等處進攻尋甸分守叅政黄昭道兵備副使周奎督兵與戰敗績遂陷尋甸執知府雲南鎮巡調各土司兵赴討令武定酋鳯朝文守厰江八年春武定土酋鳯朝文反朝文素與安銓通銓妻又鳯氏也遂自厰口擁兵叛還攻武定陷之殺同知袁俸知州秦健等官十三人遂與銓連兵二萬於㑹城西北門外焚軍民房屋雲南大擾事聞命兵部尚書伍文定自京師出征按察使徐瓚議調各土司兵與衞軍恊力勦撫朝文等戰不勝欲奔東川霑益州營長輔祐追獲斬之安銓亦為其下阿志所獲五月文定至雲南奉㫖處置未盡事宜數月乃還十七年四月勅雲南鎮巡㑹討安南時安南莫登庸父子逐其主篡位上命咸寧侯仇鸞討之兵部尚書毛伯溫叅贊軍務雲南巡撫汪文盛以䝉自縣蓮花灘當交廣水陸衝遣兵處其地以為來歸人聲援十九年六月毛伯溫等至廣西徵集各省兵并檄雲南守臣集兵候師期議雲南兵於蓮花灘分三哨哨各兵二萬一千人以副使倪象賢等監督布政使胡宗明等督餉時黔國公沐朝輔巡撫汪文盛經畫既定馳檄安南臣民諭以大義又諭登庸父子果能納欵歸命亦待以不死而伯溫等駐師近邊登庸聞之大懼遂靣縛詣軍門降三十年元江土酋那鑑反巡撫石簡督兵往剿鑑詐降請官撫諭簡命左布政使徐樾往諭為所殺事聞奪石簡官切責黔國公沐朝弻令戴罪殺賊三十二年巡撫鮑象賢奉命討元江賊那鑑鑑自殺三十六年易門縣夷李向陽與土縣丞王一心作亂稱混天大王以普文為軍師搆黨七千人分佈四掠一心復與武定阿倫通阿倫者鳯朝文養子也朝文既誅其妾瞿氏撫幼子守土盡職後子死子妻索林復署府事而瞿氏有外行忌其婦阿倫潛謀奪嫡挾貲赴京納級指揮使名鳯繼祖陽稱已襲武定知府輿馬冠帶以歸土人附之遂逐索林巡撫敖宗慶奏請討之阿倫潛奔四川㑹理州招集亡命誘索林與講好殺其總管鄭竤等七十人出富民羅次界抄掠又分遣東川營長阿科等兵攻曲靖尋甸諸府四十四年新撫吕光洵至雲南討李向陽誅之復調各土官兵分路剿武定移檄黔蜀巡撫舉兵接應遂破諸夷阿倫北遁兵備僉事張澤追之被執光洵合師急攻賊勢窮挾澤求撫不許死之九月光洵自率師追阿倫至㑹理州斬之并誅王一心等萬歴元年大姚鐵索箐力些夷叛巡撫鄒應龍同黔國公沐昌祚討之七十二村悉平二年二月鄒應龍沐朝輔移兵東征臨安王弄山牳獛等夷平之八月征蕎甸等夷平之四年十二月𬗟酋莽瑞體結諸蠻作亂先是嘉靖初孟養思倫擊𬗟破之殺其宣慰莽紀歲紀歲子瑞體奔洞吾母家後據其地吞併鄰境木邦土舎罕㧞潞江安撫線貴皆附之因遣使招隴川多士寧士寧不從其養子岳鳯毒殺士寧以應之士寧妻罕氏懐印㩦二子多忠多孝奔永昌當事不能救令歸岳鳯襲殺之遂據麓川罕拔復誘干崖宣撫刀怕舉之弟怕文附𬗟怕文不從與戰兵潰奔永昌罕拔取干崖印令怕舉妻罕氏収掌罕氏罕抜妹也并遣人助守其地金騰兵備副使許天琦憤諸夷附𬗟遣指揮侯度持檄招諭至迤西頭目思箇從違未決因刻木二一書天皇帝號一書莽瑞體號率衆拜之乃卜則天皇帝者卓立几上莽瑞體者傾墜於地由是決意向中國瑞體惡其倡諸夷内附大發兵攻之思箇告急時天琦已卒署事副使羅汝芳檄調漢土兵赴援師至騰越思箇潛令頭目領兵萬餘於阿瓦地絶𬗟糧道自督兵伏於戛撒誘𬗟兵入截其歸路請援兵自隴川邀其後迤西兵衝其前又令水兵開江上石閘以衝潰𬗟舟計定𬗟兵果入戛撤思箇堅壁不與戰伏乞塞險隘絶糧道以俟中國援兵至首尾共擊之久之𬗟兵困饑甚以撮金易合米始屠象馬既剥樹皮掘草根軍中疫作死者山積瑞體懼請與思箇和思箇不許復遣使速援兵無何有入賀行者恐為兵興阻移書同事合文止援汝芳不聴乃合掲於巡撫以兵興禍連語怵之巡撫王凝馳檄止汝芳兵不得發思箇困𬗟月餘望援兵不至岳鳯知之乃集隴川夷兵二千兼程援𬗟導之由間道遁去迤西知𬗟走率衆追之𬗟兵大敗生還者十不一二五年廣南儂酋叛巡撫王凝會黔國公沐昌祚撫定之七年莽瑞體復率兵象侵迤西報戛撤之怨中國無援思箇敗奔騰越中途為奴郎都等執送瑞體不屈遇害瑞體遂盡據迤西目兵奔永昌稍安置於内地十年十月岳鳯領𬗟兵襲破干崖土婦罕民降於𬗟時莽瑞體死子應裏嗣岳鳯執遮放頭目刀落恩送應裏又嗾應裏殺罕拔拔有子名進忠應裏欲併其地遣弟應龍伐之自率兵從以灣甸州景宗真為郷導追進忠進忠奔内地應龍躡之遂入姚關十一年正月應龍焚掠施甸進攻順寧二月破猛淋寨防守指揮吳繼勲千户初維垣皆死之是年冬干崖刀怕庚雷弄廖元伯南甸刀落憲盞達刀思定皆陷於緬巡撫劉世曽巡按董裕㑹疏請兵以南京坐營中軍劉綎為騰越遊擊移武定叅将鄧子龍為永昌叅将各率募兵五千赴援副以土兵應裏亦西會𬗟甸孟養孟密蠻莫隴川兵於猛卯東㑹車里八百孟艮木邦兵於猛炎復併衆入犯姚關子龍為壘静待大破之於攀枝花地斬宗真劉綎率兵出隴川猛密直抵阿瓦頭目莽灼及猛密思忠蠻莫思順皆降初綎破隴川以岳鳯有心計厚結之以招諸夷許不死故猛哈思化迤西思威木邦罕鳯等俱殺𬗟使詣綎降進忠亦集其餘衆來奔諸夷望風内附者踵至當事不知日促綎禽岳鳯綎不得已執鳯及其子曩烏等俘解京師諸夷多復叛十三年羅雄州土酋者繼榮叛劉世曽沐昌祚斬之莽應裏陷迤西思威屬部密堵送速二城思威謀復之使來求助遊擊劉天俸募兵五百往陣斬𬗟目多曩長遂復二城金騰兵備李材上其事劉世曽以聞陞材右僉都御史巡撫鄖陽尋下巡按御史蘇酇覆覈時在陣多土兵不知取級既而復往則已腐爛遂以冐功覆奏逮材天俸俱下獄並削劉世曽籍論者寃之十六年四月永昌姚安營兵鼓譟索餉刦同知為質抄掠抵省巡撫蕭彦伏兵擊之殲其魁餘黨平九月應裏攻猛密罕烘率其孫思禮從子思仁奔猛廣猛哈思化復進奔蠻莫據之罕送率其子思華奔騰越十八年應裏進兵孟養以報密堵送速之怨遂破孟拱十一月應裏破猛廣罕烘思禮奔隴川思仁奔雅益十九年應裏圍蠻莫鄧子龍率兵至卜羅思荘𬗟退去丁苴白改夷普應春等叛撫鎮吳定沐昌祚討平之二十年思仁叛犯隴川隴川宣撫多思順有備弗克逞乃同丙測奔𬗟應裏偽立仁於猛密當事者移置罕烘思禮於芒市九月應裏令阿瓦迤西犯蠻莫思化等奔等練山叅将鄧子龍率兵營等練𬗟兵屯遮遨子龍發兵擊之大戰於控哈𬗟退屯沙洲大兵無船不能進相持彌月緬尋退去二十一年十二月應裏遣允墨率兵入據蠻莫思化敗走墨等分道内犯並出隴川多思順奔猛卯二十二年春巡撫陳用賓出駐永昌聞賊大入乃分部以叅将王一麟奪等練中軍盧承爵出雷哈都指揮錢中選張先聲出蠻哈守偹張先䕃出打線一麟擊其前承爵中選擊其左右為賊所誘鼔行而前伏發官軍被截後二營相繼退奔監軍同知姚允升収殘軍晝伏夜行望等練諸山火光知賊已焚巢退去因稱勝而還𬗟竟取道隴川猛卯多俺實導之多思順怨俺乃糾思化并芒市多泰等擊俺殺其子多荒十二月多俺糾思仁丙測由猛卯襲遮放官兵戰卻之巡撫陳用賓以𬗟數入犯築八關於騰衝之邊每四關設一守備戍之又募習夷路者閩人黄襲使暹羅約其王得楞内外夾擊𬗟多俺自遮放敗還不復歸猛卯投木邦據曩義山永昌同知漆文昌計授木邦罕欽令禽之謀洩俺欲奔罷古欽追及於雷聳并其子多烘多曩斬之二十四年二月築平麓城於猛卯大興屯田是時邊事旁午餉費不貲猛卯古麓川地阡陌膏腴多俺既死無主乃議以營兵任屯非營兵而願屯者聴十月𬗟遣思仁丙測等冦蠻莫思化求救叅将吳顯忠率兵擊走之斬丙測二十五年大侯州土官奉赦與弟奉學相攻殺奉學女夫順寧土官猛廷瑞興兵助奉學陳用賓遣叅将吳顯忠往討廷瑞圍急乞降巡道李先著令禽奉學自贖廷瑞乘間遁入觀音山勢復振顯忠再集兵攻之誅奉學執廷瑞送軍門坐先著以受賄縱賊下獄死人咸寃之二十六年諸蠻皆絶𬗟入貢孟養思轟亦棄緬來歸二十七年𬗟攻思轟檄各土司禦之𬗟潰歸九月順大歪轟猛思賢等叛陳用賓同沐昌祚討平之二十八年矣堵十三寨莽亢等復叛陳用賓等再討平之順大始定命雲南撫鎮協討播酋楊應龍巡撫陳用賓駐曲靖黔國公沐叡駐霑益遣叅将謝崇爵等至烏江與賊戰勝之俄而賊兵數萬掩至遂敗還橋折一軍皆沒總督李化龍以賜劍斬崇爵二十九年蠻莫思化子思正乘多思順之喪襲隴川三十年阿瓦雍罕攻思正木邦罕拔子罕􅗩率兵從之正奔騰越當事殺正以止兵三十二年𬗟攻猛密徵兵於思轟叅将王廷光止轟無發轟從之縛獻其使𬗟怒攻轟轟走死都司王萬年救之不及酋長思華據其地三十三年陳用賓遣副将陳寅禽𬗟目多罕復蠻莫界三十五年武定夷阿克反先是阿克有馬頭四十八人鄭舉獨稱豪有力且富于財知府陳典以亷訪収禁之舉以兼金置魚腹中饋典獲免已而復収之如是者再四舉惡其無厭乃與阿克等攻破府城殺指揮金守仁千户王應爵男婦四百五十餘人千户梅應時等力戰死事詳忠烈十二月阿克鄭舉擁推官白明通以兵隨其後直抵會城竟無一卒迎戰明通至城下請以冠帶印信給賊不許明日賊從北門外遶西南而東分道四掠沿村鎮市焚刦一空時陳典以入賀在會城賊索其印甚急許之乃去又明日復來鎮撫不得已以印縋與之始拔營歸攻元謀和曲諸城未一月陷一府三州四縣㑹尋甸夷目大理保楊禮亦屢被官司責辱結連夷目招補阿白者色及夷婦海冲等叛攻破嵩眀署印知事李性先棄印逃吏目韋宗孝學正龍旌死之賊進逼楊林都司汪如淵率土司禄崇功李鳯兵赴救賊退歸攻尋甸殺指揮諸藩裕等巡按御史周懋相候代駐曲靖調霑益土司安紹慶兵檄同知孫台監督自嵩明追賊尋甸屢戰皆㨗三十六年正月左布政使彭應時叅政楊俊臣副使陳裪都司范繼斌等率兵分剿阿克鄭舉是月賊破禄豐知縣蘓夢暘死之六月諸路合兵剿賊阿克等奔東川官兵壓其境土司禄哲縛阿克鄭舉獻軍前左布政彭應時復禽其黨鄭文鄭宗舜叅政楊俊臣率廣南儂兵亦擊敗海冲等得嵩明州各印信惟武定印竟失所在副使羅希益同都司汪如淵督安紹慶兵斬楊禮子成俘妻妾三口遊擊段扆禽楊禮妾及子三人兩路賊俱平俘阿克等九名於京致仕黔國公沐昌祚疏論失事状語及其子叡詔逮叡及巡撫陳用賓都司張名世武定知府陳典推官白明通禄勸知州黄榜元謀知縣毛文彬俱下獄三十八年隴川土司多安明叛入緬巡撫周嘉謨檄兵備副使黄文炳追斬之四十一年二月水西土酋安堯臣與霑益土司安紹慶以讐搆兵堯臣率兵入霑益殺傷甚衆周嘉謨具奏行滇黔兩省㑹問四十八年建水土酋刀舂琪勾交趾兵入犯攻破五邦等地王弄土舍沙源率衆堵截勝之斬其偽侯伯三人天啟元年九月四川永寧土酋奢崇明奢寅貴州土舍安邦彦相繼反兩省羽書交至徵兵於雲南十月巡撫沈儆炌調闔省土兵於曲靖以副使黄士華監紀分道赴援十二月都司李天常率援黔兵四千人至安南衞水西賊将羅應奎偽降誘至疊水舖伏發全軍皆沒天常死之二年正月都司楊明廷将三千人援蜀時烏撒土酋安効良先與邦彦通陷烏撒衞殺指揮管良相明廷兵至畢節効良伏兵阻截眀廷戰敗死之二月霑益土婦設科及土目補鮓柰科李賢期曲等俱叛霑益倘甸松林炎方交水白水六跕堡俱不守併陷平夷衞殺官吏武定夷目張世臣糾小東川賊千餘攻陷他頗補知二堡沈儆炌以便宜起叅将李思忠督兵守武定張世臣來攻思忠與戰大敗之世臣遁東川土酋禄干鍾復反與霑撒土賊合攻嵩明知州王育徳率軍民固守儆炌便宜起叅将袁善督守備金為貴土司沙源等馳救擊走之是時寧州土司禄永命阿迷土司普名聲石屏土司龍在田武定土司吾必奎等俱以巡撫檄率調土兵從征力戰有功設科等復入陸凉州境焚刦各鄉知州郭俊義戰敗被殺四月叅将尹啟易守備李加培周嘉映自交水督兵進霑益安効良率水烏賊至霑拒戰官軍陷沒加培嘉映俱戰死七月亦佐營長安應龍引賊補鮓等陷亦佐縣八月冦越州衞九月圍羅平州三年正月新撫閔洪學至滇遣兵攻羅平復之安應龍走霑益洪學復分遣袁善施翰李思忠沙源吾必奎等率兵討賊漸次恢復五月水西普安賊攻平夷守将袁善擊敗之遁去十一月兵備叅議王英叅将尹啟易以計禽設科李賢誅之四年七月閔洪學檄武舉官李瑗等率兵襲張世臣於他頗斬之武尋平八月新化新平賊首魯魁魯克等伏箐刦掠地方閔洪學檄分守副使胡其慥遊擊劉崇禮搜捕俘斬餘黨悉降立十二哨於其地戍之五年三月烏撒安効良復叛先是設科李賢張世臣等已誅檄安効良縛獻安應龍以自贖効良持兩端見賊勢衰陽為恭順遂以應龍首及烏撒衞所各印來獻勞其使而歸之行至曲靖遇盜被殺㑹黔撫王三善為安邦彦黨陳其愚所詐被害於大方道中水西賊勢復熾効良因以殺使為辭合邦彦崇明等共為三十九營直抵霑益袁善督沙源等力戰五日夜卻之吾必奎堅守炎方以老賊衆袁善乘勝間出與必奎内外夾擊復大敗之賊遁五月安効良復糾水西入冦閔洪學檄布政使謝存仁及袁善等大敗之於馬龍州賊由尋甸遁回假道東川東川奉巡撫檄以木塞路不得通有阿遣馬頭竜戈資者為之鄉導從山路遁歸烏撒事平重犒東川購獲竜戈資誅之崇禎三年黔國公沐天波巡撫王伉巡按甘學濶屯兵曲靖剿安効良設科餘黨雞世昌平之四年王伉統滇黔蜀土司吾必奎等屯兵臨安以討阿迷土酋普名聲初名聲為馬者哨哨頭水烏之亂與沙源吾必奎等俱奉調率兵破賊有功既而隨御史傅宗龍援黔及宗龍以内艱歸名聲亦回授阿迷土知州日益驕蹇後巡按御史趙洪範至臨安名聲率兵迓之戈甲旗幟列數里洪範惡之貽書巡撫王伉謂其養癰伉亦習聞名聲不法時寧州土官禄滉與名聲互訐人傳伉欲剿名聲名聲懼乃詐為禄土官家人訴名聲于伉以覘虛實伉果有即討之言名聲遂反伉奏請檄調黔蜀兵㑹討以右布政使周士昌監軍擊名聲敗之進圍阿迷名聲使人以重賄誘吾必奎復使其下偽約降王伉遣名聲故交荘承差往諭名聲留之佯使人告急且密語左右曰官兵四至皆不慮但從某箐入甚為可憂荘得名聲語歸告伉伉不知為計遂遣将朱永吉往攻某箐伏發必奎賣陣先走全師皆陷士昌歿於陣永吉亦力戰死名聲犯臨安叅将温如珍郤之事聞逮王伉及巡按趙洪範時名聲雖戰勝仍巧詞乞撫當道懲前事不復置討總督朱燮元至自黔以兵威撫定焉五年普名聲死初名聲叛其兵頭何天衢不從反正自効名聲移兵攻之中砲死其妻萬氏擁衆據阿迷州與沙源諸子定海定洲通招定海為贅壻已復殺定海而贅定洲六年巡按姜思睿議撫萬氏所遣輙被殺廣西知府張繼孟單騎入賊營諭以利害萬氏遂降本朝順治二年九月元謀土酋吾必奎反初必奎之先為元謀土知縣久絶不嗣至必奎以戰功得官仍居故地自阿迷賣陣後桀驁益甚㑹黔國公沐天波遣叅将李大贄屯㑹川以防流冦大贄數侵擾諸夷必奎不能堪至是遂聚衆反陷武定禄勸楚雄諸郡縣天波調各土司從大贄進剿十月大贄與土司禄永命龍在田擊破必奎禽斬之元謀平十二月安南土酋沙定洲反初定洲既贅萬氏兼有安南阿迷之衆復併吞夷地南至交岡及吾必奎反天波調定洲赴剿逗留不進必奎已伏誅定洲始至留屯省城外不肯歸聞天波家饒富足定洲心動隂結其左右為内應以是月朔入城辭行率衆襲天波時變起倉卒天波由小竇出西城太夫人陳氏夫人焦氏俱自焚死事詳列女天波遂奔楚雄定洲因盡得沐氏所有據省城刦巡撫吳兆元為題請代天波鎮滇又至禄豐執家居詹事王錫衮置貢院脅之與兆元傳檄各州縣旋聞天波在楚雄自率衆追之是時楚雄新為吾必奎所破金滄道副使楊畏知奉調監軍至楚雄人留之畏知遂駐楚聞定洲西出與天波計守禦之具未集曰公在楚賊以全力聚攻城必破公不如西走永昌使楚得為備賊即西追恐楚襲其後留攻楚又恐公從西來首尾牽制上策也天波從之定洲至楚雄門閉不得入為畏知所紿遂去遣其黨王朔李日芳等分攻大理䝉化陷之屠殺以萬計又圍武定推官陶光印固守攻四十餘日乃去三年定洲復攻楚雄時賊恐畏知截其歸路又聞迤東禄永命龍在田等各自守因不敢至永昌撤兵還竭力攻楚雄楚雄守具已集屢攻不能下畏知視賊懈輒出竒兵奮擊前後所殺甚衆圍數月賊稍稍引去東攻石屏石屏守堅復回攻寧州破之四年正月沙定洲復攻楚雄時定洲既陷迤東諸郡縣又引兵而西分為七十二營每七營各為一大營統之環楚城鑿濠三重為久困計畏知竭力固守經八十餘日糧盡援絶幾不能支㑹流冦張獻忠死餘黨孫可望李定國劉文秀艾能竒率殘兵由遵義入貴州龍在田使人告變且勸其至滇可望因詐稱黔國焦夫人弟率兵來復仇三月可望等入滇賊撤兵往援曲靖乃解圍去孫可望等破曲靖及交水俱屠之執巡按羅國巘聲言欲搗定洲巢穴分兵出蛇花口定洲時自楚雄還省城聞之大懼遂殺故詹事王錫衮於貢院焚南城樓遁走臨安可望知定洲走即由陸凉宜良趨省據雲南五月孫可望分遣諸将徇迤東諸郡劉文秀屠武定李定國屠臨安還至晉寧郷兵拒之復屠晉寧昆陽呈貢歸化八月孫可望自率兵逼迤西楊畏知禦於禄豐之獅子口兵敗被執可望聞其名不殺誘降之畏知曰果爾從吾三事一不用獻忠偽號二不殺百姓三不虜婦女可望皆許之即執箭對誓迤西得免屠戮畏知之力也時沐天波在永昌可望至大理以書招之天波遣子報命可望厚待天波子隂使劉文秀隨之疾馳至永昌㑹天波於北城樓遂㩦之同楊畏知等俱至省五年八月李定國禽沙定洲及萬氏初定洲走歸臨安屯兵佴革竜與萬氏分險自守其下湯嘉賓陳長夀等各據一山立營相去數十里為掎角之勢私通交趾借其援以固結蠻心一日偶集於嘉賓營定國偵得之率兵遽至圍以木城困守三閲月絶其水源諸蠻懼出降者相續遂械定洲萬氏等數百人回省磔於市六年六月姚安舉人席上珍起兵討可望被執不屈死之九年二月大師取廣西明宗室由根奔廣南可望安置於安籠所初可望既禽沙定洲自以無名爵難於號召滇黔聞由根稱偽號廣西遣使請封乃偽封秦王尋以偽将軍賀九儀譖執楊畏知殺之至是由根奔廣南可望安置於安籠吳貞毓等從由根謀通定國以圖可望值定國在廣西不能旦夕相援可望知之遣人殺貞毓等十餘人十四年可望自貴州舉兵入滇先是李定國由廣西還可望聞之遣其将白文選欲先挾由根入黔文選至安籠適定國至遂與合謀送由根入滇文選回可望欲殺之既而釋之至是舉兵復以文選為總統九月李定國劉文秀逆於曲靖之三岔口文選夜率其本部降定國可望大驚欲回兵諸将力爭乃止可望遂密遣馬寳武大定張勝由尋甸間道襲省城潛通其心腹王尚禮為内應自領重兵與定國相持可望将馬進忠以其事密報定國定國與文選疾擊之可望大敗走時馬寳武大定亦密受由根劄紿張勝不由間道反出楊林至則舉火省城及曲靖皆知之悉嚴兵以待勝至省城絶内應又聞可望敗遂焚掠而逃為定國所禽馬寳等同入滇十月可望還貴州旋赴長沙經畧閣部洪承疇軍前歸誠詔封義王十五年命安遠靖冦大将軍信郡王鐸尼由貴州征南将軍固山趙布泰由廣西平西王吳三桂定西侯墨勒根下都統李國翰由四川三路取滇李定國白文選等連營於安籠所七星關雞公背扼險拒守大師自水西潛度七星關繞其後定國等潰敗同由根走迤西十二月大師三路㑹於曲靖迤東各郡皆歸附十六年正月朔大師抵雲南二月兵進迤西追殺王國勲於普淜又敗白文選於玉龍關由根至騰越州李定國復集兵於磨盤石樹柵扼險死拒大師趙布泰吳三桂力戰破之李定國走孟艮由根走𬗟甸白文選走猛緬三月偽将狄三品等投誠禽偽慶陽王馮雙禮來獻奉㫖優叙三品等赦雙禮赴京安置六月命洪承疇至滇南議進𬗟機宜招撫流民偽将王㑹等率屬歸降景東䝉化麗江姚安北勝鶴慶定遠楚雄永昌鎮沅并四川烏撒東川烏䝉鎮雄等土司悉後先歸附九月元江土酋那嵩偽總兵許名臣暗通李定國叛鐸尼吳三桂討平之并獲沐天波之子忠顯十月偽将李如碧馬寳楊國明等悉降十七年正月命吳三桂為總管移鎮雲南十八年正月李定國攻𬗟甸𬗟酋請救吳三桂發永昌騰越等處防邊兵遙應之四月昆明妖人張錡尹士鑣梅阿四等謀叛伏誅五月定西将軍愛星阿公至滇大師凱旋十一月愛星阿公吳三桂領滿漢兵入𬗟師至木邦分兵追白文選於茶山降之并降其黨萬人康熙元年正月𬗟酋殺明宗室及沐天波等數百人大師次𬗟遂獻由根八月李定國死於景線其偽将馬思良胡順都王道亨以定國子嗣興及劉文秀子震來降衆悉平愛星阿公等班師三年吳三桂請討水西土酋安坤安如鼎等兵次水西坤等負固久不下三桂訃禽如鼎坤走烏䝉烏撒追禽之斬於市明年水西等處悉平四年三月迤東土酋寧州禄昌賢新興王耀祖嶍峨禄益王揚祖王弄王朔䝉自李日森李世藩李世屏八寨李成林糾合納樓普率教化張長夀枯木龍元慶倘甸葉向陽葉正昌石屏龍韜龍飛揚路南秦祖根陸凉資洪彌勒昂復祖維摩沈應麟沈兆麟王承祖王義王先任王先倫等謀叛衆至數萬攻臨安陷䝉自嶍峨寧州易門圍彌勒通海石屏宜良等州縣各郡震動總督卞三元巡撫袁懋功提督張國柱發兵討之吳三桂自水西遣王輔臣援彌勒趙得勝援石屏賊遁四月吳三桂自烏䝉回師次第剿嶍峨新興易門等賊七月卞三元張國柱吳三桂分剿䝉自新興邱北等處克之禽王耀祖禄昌賢王朔張長夀李成林李世藩李日森沈應麟龍元慶儂得功悉誅之詔撫其餘黨李世屏普率勢窮來降悉寛其死迤東悉平九月䝉古侵據麗江府屬中甸地西番二寳法王哈馬臨清格丁等挈家來奔十二年十一月吳三桂反初三桂収蓄亡命久謀不軌適命搬移家口逆黨胡國柱吳應期吳國貴夏國相郭壮圖衞璞方光琛方學範等密畫於内馬寳力贊於外張國柱髙起隆王屏藩等應之殺巡撫朱國治按察使李興元不屈械繫於獄雲南知府髙顯辰同知劉崑皆被杖安置復潛通貴州提督李本深為接應雲貴總督甘文焜知勢不可為謀趨守鎮遠扼賊咽喉以徵調援兵力圖恢復比至鎮遠而副将姜義先已從賊文焜父子及筆帖式何善雅圖皆死之三桂遂使吳國貴為前鋒徑冦辰沅至荆江使王屏藩由蜀冦漢中夏國相冦江西又糾廣西孫延齡馬雄廣東尚之信福建耿精忠同反數省騷動上命滿漢大兵討之賊不敢渡江既而四川兩廣次第克復三桂屯兵湖南搜括糧餉滇民困憊引領以望大師十六年吳三桂求援於䝉古割麗江江内喇普地賂之十七年吳三桂死於衡州十八年海朝龍起兵鶴慶田進學起兵永昌討吳賊不克朝龍敗由土番走京師進學死十九年大師取貴州先是郭壮圖等因吳三桂死擁其孫世璠進屯貴州以拒大師及定遠平冦大将軍貝子章泰統征南将軍穆占鑲藍旗叅贊都統喇賽正白旗前鋒統領薩克查巴圖魯正藍旗都統釋迦保正黄旗先鋒統領陜納海鑲白旗副都統蟒紀錄正黄旗副都統陶代鑲紅旗副都統花色正藍旗副都統公圖正白旗副都統宜思孝正藍旗副都統官保鑲黄旗内閣學士兼禮部侍郎薩海署副都統盧崇峻綏遠将軍湖廣總督蔡毓榮江西總督董衛國建義将軍林興珠貴州提督趙賴山西提督周卜世等滿漢官兵由湖廣克辰龍關楓木嶺取鎮遠清平破偽将軍韓天福於平越十一月世藩遁回雲南二十年正月大師克盤江吳世璠遣偽将軍線緎屯兵江西坡阨險以待章泰大敗之賊分兵據黄草壩征南大将軍賴塔統正藍旗叅贊都統勒貝正紅旗叅贊都統希福鑲白旗叅贊都統馬齊鑲紅旗叅贊都統趙璉鑲藍旗䕶軍統領額黒里鑲紅旗副都統洪實錄鑲白旗副都統祖植椿兩廣總督金光祖福州将軍馬九玉等滿漢兵由泗城州奪石門坎㧞安籠所繞出賊後大破之二月賴塔至曲靖全城歸附線緎始遁章泰遂㑹師於曲靖十九日師抵雲南吳世璠遣郭壮圖悉精鋭迎戰大師夾攻大破於呼馬山下賊嬰城拒守大師圍之時滿漢兵數十萬方以糧糗為慮巡撫伊闢布政使王繼文開誠遍諭安集流移動餉召買萬姓踴躍晝夜輓運未幾伊闢卒於軍以王繼文為巡撫田啟光為布政使又命學士佛倫侍郎金鋐等馳至軍中總理糧儲四月賊将馬寳自遵義由尋甸奔楚雄都統希福雲南提督桑格迎戰於呂合禽之時胡國柱王緒王公良李匡等復合潰衆於迤西夏國相髙起隆廖進忠王永清等潛聚於廣南大師分路搜討胡國柱王緒李匡自殺禽髙起隆等俘馬寳夏國相於京餘悉磔於市迤西廣南平八月宣威将軍紀哈里同副都統希福覺羅西布勇畧将軍雲貴總督趙良棟由建昌渡金沙江鎮安将軍都統噶爾漢䕶軍統領佟雅副都統得爾徳翁艾署副都統張長庚由永寧㑹師於雲南十月初八日大師移營逼城賴塔進兵銀錠山蔡毓榮奪重關及太平橋穆占趙良棟王繼文奪玉皇閣遂至東西寺章泰䇿應賊悉力拒守王繼文遣人自鶴慶北勝運紅衣砲至銀錠山晝夜攻擊賊大懼章泰等復書告示射入城中諭以順逆賊皆有離心二十二日賊黨余從龍吳成鰲出降趙良棟王繼文領兵攻得勝橋蔡毓榮攻大東門林興珠攻草海賴塔攻銀錠山並分兵攻近華浦四靣逼城復遣余從龍入城招撫二十八日城中賊亂線緎等擁兵入郭壮圖家殺壮圖心腹郭得勝壮圖及其子宗汾舉火自刎世璠亦自殺線緎吳國柱吳世基何進忠黄明等開門出降城下之日兵不血刃隨磔方光琛方學範於市斬世璠壮圖首級並戮吳三桂屍俱函送京師三十日章泰遣穆占馬齊入城大兵分守各門籍吳世璠家産以聞二十一年以綏遠将軍蔡毓榮總督雲貴命勇略将軍趙良棟回京定遠平冦大将軍貝子章泰征南大将軍賴塔領滿兵暨楚粤山陜各路漢兵陸續凱旋命馬齊為鎮安将軍同䕶軍統領佟雅副都統得爾徳希福留鎮雲南二十三年十月鎮安将軍馬齊領滿兵回京二十七年七月援剿左恊兵丁任二等作亂時楚省兵變副将廖貴一陛見起行任二等遂狹黨噪叛欲肆刦掠奔合楚兵右營遊擊宣起鳯力戰不支總督范承勲遣遊擊陳勲麥良璽及曲靖鎮中軍遊擊張國勲等相機剿撫賊欲出不意攻霑益州承勲預檄千總孫廷標與宣起鳯内外夾攻賊黨潰散禽任二等誅之餘悉令歸伍亂乃定二十九年十一月新平縣土巡檢李尚義誘集土夷數千大肆焚掠總督范承勲檄臨元鎮總兵王洪仁援剿遊擊劉師周合兵討之三十年李尚義被禽自殺餘黨悉平四十五年九月奸民李天極等謀亂伏誅四十六年四月調官兵恊剿貴州三江㺜苗五十七年八月武定府撒甸土酋常應運等挾讐相攻總督蔣陳錫遣官兵討禽之請設兵防五十八年二月命都統五哥副都統吳納哈噶錫等領江寧杭州滿兵二千名駐雲南先是凖噶爾賊策妄阿拉布坦遣䇿凌敦多布襲取西藏殺拉藏罕湯古忒及䝉古人民驚惶奉㫖三路進兵至是五哥等赴滇駐劄以候㑹師進討五十九年五哥吳納哈領滿兵二千名鶴慶鎮總兵趙坤永北鎮總兵馬㑹伯領緑旗兵一千五百名及麗江土司兵五百名進藏六月五哥等至查木道㑹四川兵同将軍噶爾弻前進招撫結敦七月攻取喇里禽藍占巴丹巴招撫工布竹貢八月克取墨竹工卡等處䇿凌敦多布敗走遂復西藏大兵凱旋留趙坤統緑旗兵三百名駐防六十年六月復命五哥吳納哈領滿兵五百名進藏駐防副都統噶錫領餘兵回江浙六十一年六月總兵趙坤領緑旗兵自藏回雲南雍正元年九月副都統吳納哈領滿兵自藏回雲南旋回江寧十月魯魁土賊方景眀等聚衆數百人攻殺猓目施和尚總督髙其倬遣遊擊李化龍領兵捕之景明等逃入土戛方四陳哈巴寨内復遣人招諭之景明及方四等出降十二月苦苦腦兒羅卜藏丹津犯西寧邊界命雲南提督郝玉麟領兵二千名駐劄查木道二年方景眀黨普有才藏匿威遠土州尋逃入困堅箐官軍追殺獲其妻子有才遁走陳哈巴又糾合猓夷刦掠茶山一帶叅将張應宗等率兵進剿八月陳哈巴為官軍追擊自刎死并斬其子阿班野賊悉平苦苦腦兒平提督郝玉麟領兵由查木道回雲南五年正月總督鄂爾泰發兵捕烏䝉土府禄萬鍾鎮雄土府隴慶侯等時東川新歸滇轄而烏鎮二土府與東郡接壤尚隸四川時行刦掠藏匿奸宄為滇黔蜀邊地之患鄂爾泰親至東川檄召萬鍾慶侯出鞫二酋竟不赴質各携印逃至四川官兵追襲其後萬鍾慶侯俱就禽以二土府地改隸雲南滇沅夷賊刀如珍率衆作亂時鎮沅初改土設流署府事威遠同知劉洪度初至如珍等率賊衆數百人刦掠抱母井乗夜至府城焚煅官廨刦課縱囚洪度被害總督鄂爾泰檄副将張應宗領兵討之二月威遠猓黒老胖等結連鎮沅叛夷聚衆肆掠焚煅鹽倉總督鄂爾泰檄叅将邱名揚等領兵追剿前後禽斬三百餘人招撫千餘户時新平江外土賊阿達烏圖白得等亦糾賊數千乘機仇殺楊土舎諸村寨直逼縣城聞大兵至乃遁三月生禽刀如珍等老胖阿達烏圖白得相繼就撫四月茶山莽芝夷賊麻布朋等叛茶山為車里宣慰司所轄其舍目刀正彦素懐不軌欲奪土司世職至是隂煽諸夷為亂總督鄂爾泰檄叅将邱名揚等領兵進剿六月西藏噶隆阿拉布巴等殺康濟鼐其康濟鼐下頭目坡羅鼐帶兵報仇戰闘相持命雲南及川陜二省大員領兵往藏安頓料理開化鎮總兵南天祥領官兵駐防查木道邱名揚遣守備李定海捕莽芝賊擊走之復遣人招撫賊黨多乞降麻布朋遁匿慢了慢五諸窩泥寨官軍捕之窩泥助逆九月李定海兵至倚邦攸樂及江内各山窩泥聚衆數千人刦奪糧運進圍官軍定海連戰兩晝夜退至慢岡賊衆復自四山箐内衝截官軍把總王朝選被害十二月邱名揚至蠻坡賊衆拒戰奮擊敗之賊遁走總兵孫𢎞本親赴倚邦督剿諸寨皆平廉知係刀正彦主使将誅之正彦逃至九龍江外乃遣遊擊雷應萬赴橄欖壩禽捕總督鄂爾泰發兵討法戞土酋禄天佑等初天佑代其兄天祥為法戛土目擅殺東川兵懼罪詐死以天祥妻沙氏管理其地天佑遂烝沙氏為妻私造軍器謀為不軌至是復遣其子刦掠附近居民鄂爾泰檄叅将魏翥國楊國華領兵分道進剿天佑及沙氏屯集三岔口花椒園率賊衆拒敵殺傷兵練官兵奮勇夾攻乃敗走六年正月楊國華攻克石城各隘魏翥國亦攻破花椒園禄天祐等奔潰入九龍箐官軍進攻復遁入多顆落莽芝賊麻布朋就禽二月禄天佑遁入老烏老雪山箐為官軍所獲沙氏跳崖死三月邱名揚遣将弁追刀正彦至猛腊禽之時提督郝玉麟在茶山橄欖壩李阿先等復叛統兵討平之烏䝉米貼土婦陸氏叛初四川磨坡長官司禄永忠早死妻陸氏贅其夫兄永孝謀襲土職未就尋以其地改隸雲南管轄永孝縁事執赴省獄有司并拘陸氏抗拒不出至是副将郭夀域領兵三百往捕之陸氏見官軍至藏匿箐中潛與頭目立之户吞野鷄固跨等謀刦營遣賊黨往四川吞都土千户徳昌砦糾兵助逆於是月十二日攻殺夀域陸氏遁入吞都井底􅋭總督鄂爾泰檄叅将哈元生領滇黔兵討之并檄總兵張耀祖㑹兵進剿立之户吞等於各要隘口設滚木擂石據險拒守四月哈元生領兵直抵吞都攻破蛇腰馬􅋭及門坎山五險屯諸處殺賊數千人墮崖溺水者無算五月官軍追陸氏至羊泥箐獲之并斬立之户吞等野鷄固跨徳昌尋亦就禽時四川雷波土司楊明義密邇米貼與陸氏世為婚姻賊黨多竄匿其地四川副将張瑛檄明義赴營諭之不至其所屬部落復截刦糧運殺傷官兵事聞命四川提督黄廷桂統兵討之并勅雲南總兵張耀祖領滇黔兵分路堵截鄂爾泰調兵三千助之復令哈元生於江外防守七月廣西西隆州八達寨㺜苗顔光色作亂總督鄂爾泰檄副将楊洪領兵赴粤助剿八月顔光色為其下所殺持首出降八達賊寨皆平楊洪等兵回雲南九月四川兵禽楊明義叅將哈元生等撤兵回時四川阿驢土司阿資年幼不能約束夷人然頗效恭順哈元生之赴江外也留之行營候調阿資母見其子久不歸疑有變又聞元生以事鞭撻其頭目乃與阿資妻父拖科覺過等謀襲官軍是月二十二日元生還至阿驢賊衆突出圍之數重千把總死者四人兵亦多被傷殺元生力戰潰圍出總督鄂爾泰調諸營兵㑹川兵往剿賊衆負險拒敵官軍奮勇攻破諸巢穴拖科覺過等俱就禽梟斬七年正月西藏平總兵南天祥領兵回雲南八年八月烏蒙夷賊禄萬福叛先是土府禄萬鍾以事當按訊其季父禄鼎坤覬得代襲其職率子萬福萬貴首先來歸凡所調遣無不用命及事平改土設流授鼎坤守備赴都引見鼎坤失望臨行與其子及頭目數十人密約在烏伺間倡亂㑹東䝉鎮總兵劉起元撫馭不善萬福等遂於是月二十五日集賊衆數千圍府城復引四川凉山蠻數萬踵至遊擊劉崑馬秉倫等力戰死起元潰圍出亦被殺於荔枝河符印皆失其他文武官弁及家口死者甚衆大關魯甸一帶悉為賊盤踞總督鄂爾泰調滇黔漢土官兵分道進剿檄安籠鎮總兵哈元生總統威寧一路中軍副将魏翥國總統東川一路并趣雲南提督張耀祖赴功山居中指畫九月烏賊分掠永善縣吞都土舍木谷四哥乘釁殺阿興土千户安永長鎮雄州逆目施額法漏亦聞風蠢動起於奎鄉叅将韓勲連擊破之又有㓲刀等以逆書要約故土府隴聨嵩妾二禄氏為亂二禄氏不從飛馳各寨諭以順逆賊黨解散㓲刀旋亦就禽鎮雄始得無事是月十一日東川土酋禄良珍禄承爵通於烏賊焚掠村寨進逼郡城魏翥國屢出兵擊之賊勢轉盛道路阻梗郵遞不通翥國遣人閒行赴省請兵鄂爾泰飛檄楚姚鎮總兵官禄往援提督張耀祖分兵䇿應二十一日哈元生領兵至得勝坡賊衆二萬餘迎敵奮擊敗之明日復戰元生臨陣親射死夷目二人官兵乘之餘賊大潰時官禄聞東川賊衆恇怯不前鄂爾泰連檄趣之始於二十八日進東川旋下令閉塞四門堅守不出㑹大軍雲集搜捕各寨夷賊逃竄東川路乃得通十月初八日哈元生同副将徐成貞自得勝坡進兵至以那遇賊二萬餘元生與成貞夾擊斬賊數千人遂由稻田壩過松林直抵烏䝉恢復府治隨遣将於牛欄江邊監造木筏以待東川兵至㑹剿十一月遊擊王先領兵渡江至魯甸適遇哈元生遊巡兵為夷賊數千人圍困内外夾擊大破之時所檄四川兵已抵豆沙關而韓勲既連破鎮雄夷賊復進抵伐烏關為川兵應援偵知大關賊尚衆分三路奪其砦柵諸賊奔潰遂復大關川兵亦於前一日攻克小關因㑹滇兵搜箐殺獲無算大關既復韓勳遣将進取永善哈元生亦檄貴州副将劉朝貴搜剿凉山一帶約至永善㑹合時四川遊擊王谷宰領兵自井底過江轉戰而前斬賊二千餘級亦抵縣城十二月哈元生攻破䑕􅋭獲東䝉鎮印信鄂爾泰令徐成貞署理隨捕禽賊首禄萬福叅将南天章亦先後搜獲禄良珍禄承爵等東䝉悉平時禄鼎坤已授河南歸徳營叅將押解赴滇究訊得實與萬福良珍等俱伏誅軍功陞賞有差逮官禄下獄九年九月命發雲南兵一千名駐防查木道先是查木道原駐雲南兵一千後議泰寧駐兵二千已足遥應西藏遂撤回至是以馬臘奏稱查木道係通藏之要路且與滇省相近仍遣雲南兵一千前往駐劄雲南通志卷十六下
