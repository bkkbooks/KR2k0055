body:
  text: 欽定四庫全書雲南通志卷八風俗風土之剛柔不一期協於中俗尚之豐約不常取範於禮中以導和禮以興讓此秉道齊民所為潛移默運於無迹也滇省地居南徼夷猓雜居氣稟不同趨尚亦異我朝自削平僭亂以來政教洋溢德化涵濡列聖相承治登上理由是太和翔洽井里熙攘皇上善繼善述纘緒之初疊頒訓諭首重孝弟力田睦姻任恤凡所以厚生正德化民成俗之方靡不周詳曲盡由此習勞思善而俗益趨淳和平禮讓之風行比隆於邃古矣志風俗雲南通省自滇以北皆椎結耕田有邑聚西自桐師以東北至楪榆編髮隨畜移徙無常處前漢書有鹽池田漁之饒金銀畜産之富人俗豪汰居官者皆富及纍世後漢書男女勇捷不鞍而騎四時大抵與中國不差犁田以一牛三夫前挽中壓後驅然專於農無貴賤皆耕唐書漢夷雜處田地肥磽相半民氣和柔天時無劇寒甚暑圖經元日祀天地祖先桃符門丞往來賀歲立春日春盤賞春以餅酒相饋元夕賞燈張樂星橋火樹有古風焉次夕攜逰爆竹插香於道相傳可以祛疾二月三日會城逰龍泉觀還憩石嘴莊為臨江之飲歌咏為樂各郡於其勝地效修禊事清明插栁墓祭三月三日謁真武廟於西山羅漢寺或東之鳴鳯山金殿或先期赴易隆中和山行兩日程或負香之襄陽謁武當山往返數月十三日大理開市於演武場集商賈聚四方之貨交易至十七日移城內二十日散市草八日謁東嶽廟四月八日為浴佛會立夏日插皂莢枝紅花於户以厭祟圍灰牆腳以避蛇端陽懸艾虎繫續命縷飲菖蒲酒以角黍相饋六月朔日至六日各郡禮南斗祈年星回節俗謂之火把會在草四五兩日斫松為燎高丈餘入夜爭先燃之村落用以照田祈年以炬之明暗占歲之豐歉街市兒童搗松脂末互相燒灑為戲比户刴生飲酒漢夷同之相傳漢時有夷婦阿南夫為人所殺誓不從賊以是日赴火死國人哀之因為此會焚一云南詔皮羅閣欲并五詔將誘會於松明樓殺之鄧晱詔妻慈善測其謀勸夫勿赴夫不從以鐵釧約夫臂既而果被焚慈善認釧得夫尸歸葬皮羅閣聞其賢欲娶之慈善閉城死節滇人以是日燃炬弔之一云孔明以是日擒孟獲侵夜入城父老設燎以迎後遂相沿成俗未知孰是七夕婦女穿針乞巧以瓜果祀織女星中元祭先於家廟或焚紙衣楮鏹夜放河燈中秋瓜餅祭月九月朔日至九日禮北斗祈年重陽登髙飲茱萸酒以麵簇諸果為花糕親識相酬饋十月祀先墓祭長至相賀各以糍餌相饋臘八日作五味粥草四日祀竈除夕飲分歲酒先少後老煨爐守歲四更迎竈婚嫁仍遵行六禮先求女庚帖隨通媒妁繼請親長之尊貴者向女家致主人意既諾則二姓互相酬拜具啓下定儀將娶則請期納幣而後親迎焉其儀物豐儉各稱其力喪禮舊俗尚奢凡弔客皆宴待且有酬贈致缺費而停喪不舉者今易以檳榔清茶甚便至崇信釋道建齊誦經其風固大概相同也若火葬則夷民行之今亦有卜地以葬者祭祀豐儉隨力竭誠以享惟愚民間有惑於淫祀者宴會舊尚儉約服飾亦崇朴素今會城大邑客民雜處漸以華美相競其餘猶知愛惜土物無替初服焉覆屋各省專用版瓦滇中兼用􅝕瓦相傳滇中多風明初特敕許用日中為市率名曰街以十二支所屬分為各處街期如子日名鼠街丑日名牛街之類街期各處錯雜以便貿遷昔多用貝俗名曰􅚔子一枚曰莊四莊曰手四手曰苗五苗曰索按許氏說文曰古者貨貝而寶龜至周而有泉至秦乃廢貝行泉漢書曰王莽時大貝四寸八分以上二枚為一朋直二百十六牝貝三寸六分以上一朋直五十公貝二寸四分以上一朋直三十小貝寸二分以上一朋直十不盈寸二分不得為朋每枚直錢三是為貨貝繇是觀之漢時錢貝竝行秦亦不能盡廢之也貨殖傳貝五種大貝牝貝公貝小貝不成貝不成貝者不用惟大貝直錢多餘三種皆今所用也然則漢末天下尚用之今所用乃小貝之尤細者晉郭璞贊云先民有作龜貝為貨貴以文采賈以小大簡易則資犯而不過蓋用錢則有檢選用貝則枚數而已故曰簡易則資也秦滅六國惟楚莊蹻王滇秦雖使常頞略五尺道然未嘗屬秦故貨貝之在南中獨不變明嘉靖乙未滇人掘玉案山得大黃布刀製如罄折衡重三錢考之泉志蓋王莽時鑄也然則漢世之泉固嘗行於滇矣天啓甲子又有鋤地得錢者其色盡緑其郭不甚厚其方孔較他錢為巨左右書五銖二字考五銖錢起於漢元狩間劉禹錫先主廟詩有勢分三足鼎業復五銖錢之句是後晉鑄之梁又鑄之皆曰五銖然背所識字磨滅不知何時又滇中凡葬禮皆以古錢入壙中斯錢也果前代通用而今出之土抑亦昔人所殉葬物也明天啓以後銀貴􅚔賤遂滯不行轉發夷方本朝錢法流通久不復用姑備志以存舊俗云通省夷俗不一具載種人雲南府民遵禮教畏法度士大夫多材能尚節義彬彬文獻與中州埒舊志兵民錯居閭閻櫛比野安耕鑿户習詩書民無告訐之風士有干謁之恥曲靖府黽勉耕織兼事商賈習尚儉朴崇信釋教舊志士重亷恥與物和平民少游惰其性易使郡志臨安府士秀而文崇尚氣節民專稼穡盡力田疇衣冠禮度同於中州舊志敬老崇文人多畏法婚禮近古戶習詩書科第人才盛於諸郡郡志澄江府士習詩書科目不替民務耕織力本勤生舊志重穡事不習工商務潛修恥為標榜俗徑以朴性質而淳武定府俗尚剛悍號稱難治建學之後舊習漸遷舊志民朴而儉士質而慤郡志地鮮肥饒咸勤耕鑿文采未足願厚有餘廣西府士知向學民務力田風化既行習俗漸改舊志鮮為商販不慕浮華尚存喬野之風殊有恬熙之樂廣南府苗猓雜居性緩力弱病不服藥專禱鬼神喜食諸蟲刻木為契圖說人盡刀耕不治末業山多磽確歲少豐收沙儂蠢朴無能習俗寬柔易使元江府蠻種繁處淳悍不同緣箐而居尚巫信鬼設流之後風化漸開圖說稍知禮義頗務耕桑夷柔懦而無能蠻猓凶頑而難治開化府刻木為信不習文字不喜搆訟崇巫祀鬼遷徙無常設流之後學校既開習俗漸改漢人稍寄居焉郡志土田多美稼穡易豐野有質朴之風户鮮囂淩之習鎮沅府郡多僰夷信鬼尚巫婦人不施粉澤産子多浴於江舊志力弱性緩風氣近於寬柔火種刀耕人情習於勞苦東川府俗尚戰爭居多板屋明一統志其氣剽悍其性猜疑猓蠻易與為非苗民猶知奉法服食婚喪尚多夷習昭通府改土歸流夷多漢少風氣剛徑習俗凶頑出入佩刀以隨相見去帽為禮居多木棚擊齒乃娶男子十五六歲擊去左右兩齒乃娶普洱府人多頑蠢地寡蓄藏衣食仰給茶山服飾率從朴素崇信巫鬼未革夷風大理府高山大川鍾靈育秀代有人物唐樊綽志居人能農不能賈習俗信儒亦信釋天性質直人多好義明時甲科為兩迤之首舊志家無糜費市無惰民族多白人咸敬神明而重犯法焉郡志楚雄府土壤肥饒士人務學鹽井之利贍於列郡故其人裕而畏法樊綽志地當孔道不慕紛華舊志民習勤勞安於儉約婦人不尚粧飾雖貧恥為妾媵婚喪無越禮之譏文風有日盛之勢姚安府盡力畎畝家有常給氣習既遷人文漸盛舊志士大夫樂談名理民間施豫相尚郡志土瘠民貧服食儉朴永昌府雍闓之畔吕凱等執忠絶域十有餘年守義不與交通永昌風俗敦直乃爾三國漢志男事耕耘女工紡織騰越雖遠隔兩江衣冠人物與郡城竝稱舊志婚喪交際相尚以文服食宴會亦皆有節民淳訟簡安土重遷鶴慶府氣誼相尚有燕趙風操觚摛辭亦以竒勝滇志士習雅飭民風純朴俗尚儉約號稱易治圖說孰序相望紡績時聞農則畎畝維勤士亦虀鹽自勵順寧府男耕女織鮮習文字九種雜居改流之後漸化漢俗舊志士多渾朴人敦古道細民守分畏法崇尚節儉婚娶稱家為禮野無游民恆産不失郡志里有蓋藏鄉無剽劫士習雖陋民風自淳永北府氣習朴野勤於耕織明一統志地界極邊夷有數種人多勇悍俗尚爭競麗江府衣同漢制俗不頮澤板屋不陶焚骨不葬帶刀為飾服食儉約節令飲饋與列郡同舊志地近䝉番好佛信鬼性同北鄙佩弩懸刀設流以後禮教漸興䝉化府士人婚冠皆用家禮民間相尚朴質飲食衣服視列郡為儉舊志士安誦讀俗逺澆漓號稱易治景東府民多僰夷性本馴朴田地舊皆種秫今則悉為禾稻人亦漸習經書土俗民風日改月化舊志士簡民恬風和俗厚男女悉知辛勤士類咸敦禮教雲南通志卷八
