body:
  text: 雲南通志卷十五祠祀附寺觀聖王制祭祀考諸祭法可見雲雷風雨是謂天神山川社稷是謂地祇禦災捍患有功德於民者是謂人鬼非此族也不在祀典國家事神治人一衷於禮所以昭誠敬正人心懷柔百神為民祈福他如忠孝節義咸進而俎豆之亦奬勸名教之意也故酒醴牲牢載諸令甲有司行事者祀典紀之拊鼓安歌民間春祈秋報者羣祀紀之至浮圖老子之宮祝釐禮慶往往在是又况晨鐘暮鼓發人深省乎志祠祀寺觀附焉雲南府祀典先農壇在府城東門外朝雍正五年奉本㫖建壇高二尺一寸方廣二丈五尺祠三楹左右齊房各二左貯農具藉穀右為辦祭所藉田四畝兒分欽定日期督撫率司道各官致祭各府知府主之各州縣知州知縣主之同城文武官員悉陪祭奏樂歌樂章祭畢行耕藉禮通省府屬各州縣方位皆與府同其分防之邱北大關魯甸攸樂􅑇嘉維西中甸俱係經管錢糧十二年布政使陳𢎞謀詳明一體建造社稷壇在府城西門外明洪武元年令天下郡縣置社稷壇每嵗春秋二仲月上戊日祭本朝因之通省府屬各州縣皆與府同風雲雷雨山川壇在府城南門外明洪武元年令天下郡縣置山川壇六年定風雲雷雨及境內山川城隍共一壇春秋二仲月上戊日祭木朝因之通省府屬各州縣皆與府同龍王廟在府城西門內菜海子旁本朝雍正六年奉㫖敕封福滇益農龍王致內府造像輦送至滇建祠以時祭月吉瞻禮關帝廟在府城南門外朝雍正五年奉本㫖敕封三代曽祖光昭公祖裕昌公父成忠公位於後殿每嵗春秋二仲月奉部定期督撫率司道以下官致祭各府知府主之各州縣知州知縣主之同城文武官員悉陪祭城隍廟在府城西門內明洪武二年令有司祭城隍仍前代禮府封威靈公州封靈佑侯縣封顯佑伯三年改今稱廟三楹中祀雲南省都城隍之神左祀雲南府城隍之神右祀昆明縣城隍之神因本朝之郡厲壇在府城北門外明洪武二年令郡縣立厲壇每歲清明日孟秋望日孟冬朔日祭無祀鬼神在府州曰郡厲在縣曰邑厲府本朝因之通省府屬各州縣皆與同旗纛廟在府城內總督箭道後每歲春用驚蟄日祭秋用霜降日祭以督標中營副將主之撫標及各營將官俱陪祭史皇祠在府學宫內受圖制字為書契祖本朝康熙五十八年奉文建文昌宮在府城大西門外有司以時致祭天后宮在府城南門外教場朝雍正十一年奉本㫖每嵗春秋二仲月督撫率司道以下官致祭八蠟祠在宜良縣城西左衛營他州縣亦有金馬山神祠在府城東金馬山麓碧雞山神祠在府城西碧雞山麓羊頭神廟在府城南滇屬井鬼分野故祀鬼宿諸葛武侯祠在府城內五華山有司以時致祭名宦祠在府學宫內通省府屬各州縣皆與府同鄉賢祠在府學宮內通省府屬各州縣皆與府同忠義孝弟祠在府學宮內奉本朝雍正四年㫖建通省府屬各州縣皆與府同節孝祠在府學宫外奉本朝雍正四年㫖建通省府屬各州縣皆與府同報功祠在府城東重關內原建咸陽王廟祀元薩達克齊黔寧王廟明沐英二廟俱在城南本朝康熙三十年總督范承勳巡撫王繼文率司道各官改遷今地合為一祠春秋致祭易今名定逺王廟在報功祠東祀黔國公沐晟崇德祠在府城南祀明布政使張紞巡按御史樊瑩巡撫都御史王恕顧應祥今廢三忠祠在府城南石虎岡舊名二忠祠祀明翰林學士王褘刑部尚書吳雲後燬於兵本朝康熙三十年總督范承勳巡撫王繼文率司道各官改建於城東重關內合祀本朝總督甘文焜易今名甘忠果公祠在府城內祀本朝康熙五十五年建總督甘文焜敕賜徑節匾額御書三賢祠在府城東金馬祠左明巡撫陳用賓建祀漢諫議大夫王褒明僉事劉寅修撰楊慎傅公祠在府城南祀明初征南大將軍潁國公傅友德太史祠在府城西高嶢村祀明修撰楊慎萬厯中布政使劉之龍建後重修復廢本朝康熙二十八年總督范承勳重建置田供祭郭公祠在府城北廣備倉祀明正統間知府郭鎮俗呼倉神董公祠在府城東祀明𢎞治間知府董復羣祀東嶽廟在府城東南嶽廟在府城東南中嶽廟在府城南雲津橋下西嶽廟在府城西北嶽廟在府城南小澤口晏公廟在府城南二十里臨滇池上三聖廟在府城小西門內祀三國漢昭烈帝關忠義張桓侯三義廟在府城南門外教場左火神廟一在府南門外教場一在府北門外教場龍王廟一在府城西南羅漢山下一在府城東白龍潭一任府城北黑龍潭一在昆陽州北海門村牛舌洲上明洪武末敕封惠濟龍王一在嵩明州西十五里嵩境田畝全資各處龍泉灌溉惟此龍泉利潤更溥明知州余化龍詳請以季春辰日致祭若知州弗與祭輒多亢暘五靈廟在府城南門內祀唐葛周三真君及崇寧至道真君清源妙道真君合稱五靈按崇寧真君即關忠義清源真君即隋嘉州太守趙昱唐葛周三真君相傳為周厲王時三諫官棄官遊吳仙去者又有三國漢鎮軍將軍趙雲亦附祀於內為碧山土主大靈廟在府城內城隍廟東即土主廟神為摩訶迦羅䝉氏城滇時建其像乃蜀匠羅都道太所造有天竺僧菩提巴坡以祕咒丹書納像中復以手中菩提念珠一枚種之庭前成樹焉神屢著靈異滇人奉為土神村邑處處奉之獨在官渡者靈異與府廟同白馬廟在府城西南擺渡村相傳祀三國漢靖侯龎統祠山廟在府城南雲津橋北岸漢張渤曽鑿江通水郡人利之立祠祀焉王子淵祠在府城東祀漢諫議大夫王褒文齊廟在府城東祀漢益州太守文齊齊降集羣夷光武徴為鎮逺將軍道卒詔起祠祀之張立道祠在府城西元時立道官雲南最久得土人心立祠祀之彭令遺愛祠在富民縣城東門內令名兆逵本朝康熙間任有惠政忠烈廟在晉寧州城西古土城內祀寧州刺史李毅之女名秀以有守城功唐