body:
  text: 雲南通志卷十九名宦附忠烈粵自疆域肇建設官分理職任有大小權位有重輕莫非上佐元首下育黎庶雖越在萬里一言一念悉稟闕廷也雖逺涖邉氓用休用威視同赤子也士大夫明於致身敬事之義內既厥心外宣乃力方隅未靖則招徠綏輯以懷柔之民夷未和則生養教訓以固結之至政績有成令譽鴻聲一歸之君父而已無與焉斯真不求名而名足永垂者哉歷代以來紀在志乘班然可考世逺風微並存而録之未能悉核也國家夀考作人時雍化美恭逢聖明繼體崇賡揚之烈隆師濟之風灼見克知懋官懋賞用是人思自效各迪有功自此以往茇舍甘棠畏壘爼豆將不勝書兹特登其已歿而留祀郡邑卓有可稱者至於取義成仁致命遂志或忠憤獨激蹈白刃以捐生或名節共完率合門而殉難爰表干雲之概用垂立懦之風志名宦忠烈附焉總部漢陳立字少遷四川臨邛人故金城司馬初為連然長不韋令諸蠻畏之河平間夜郎王興等治兵相攻遣使和解不從刻木象漢吏立道旁射之杜欽説大將軍王鳯曰漢使和解諸蠻王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者復守和解彼得收獵其衆申固其謀黨助衆多雖有孫吳賁育智勇無所施屯田守之費不可量宜因其罪惡未成選任職太守入誅其王侯尤不軌者鳯然之因薦立為牂牁太守立至牂牁斬夜郎王興諸夷震恐降立還郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反立與郡尉長史分將攻之翁指據厄為壘立使竒兵絶餉道縱反間以誘其衆都尉萬年曰兵久不決費不可供引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絶其水道諸夷共斬翁指持首出降後漢文齊廣漢人西漢末為益州太守造陂池通灌溉墾田二千餘頃率厲兵馬修障塞降集羣夷甚得其和及公孫述據蜀齊阻險固守述拘其妻子許以封侯齊不降聞光武即位乃間道遣使自聞蜀平徵為鎮逺將軍封成義侯道卒詔郡人立廟祀之張翕巴郡人永平間為越巂太守政化清平在郡十七年卒人慕之如喪父母王阜蜀郡人元和間為益州太守政化尤異有神馬四出滇池中甘露降白烏見始興學校漸遷其俗阜一作追張喬籍貫失考安帝初為益州刺史元初四年越巂夷封離叛遣中郎將尹就討之敗績詔以兵屬喬五年永昌等三郡夷叛應離衆至十餘萬破二十餘縣焚掠百姓千里無人喬遣從事楊竦擊離等大破之離乞降三十六種皆附喬因奏長吏姦滑激亂者九十人皆減死論諸夷遂定楊竦籍貫失考為益州從事以刺史張喬命討封離竦偵知賊盛未遽進先以詔書示三郡密徵死士懸重賞與離大戰破之斬首三萬餘級獲生口千五百資財四千餘萬悉犒軍士離等惶怖斬其渠帥乞降於是三十六種蠻悉來欵附尋病創卒喬哀之上其功勒銘繪像焉李顒巴郡人初為太尉掾熹平五年益州蠻叛執太守雍陟御史朱龜討之不克朝議欲棄之顒建䇿討伐乃拜顒益州太守遂與刺史龎芝發板楯蠻擊破之獲雍陟歸諸蠻平龎芝籍貫失考益州刺史熹平五年與李顒同討叛夷景毅廣漢人李顒卒後諸蠻復叛以毅為太守復討定之毅初到郡斛米萬錢及至漸以仁恩未期月米價減至數千錢張亮則字元修南鄭人牂牁太守威著南土永昌越嶲夷欲叛畏亮則乃止三國漢董和字幼宰南郡枝江人漢末率宗族西遷劉璋以為牛鞞江原長時蜀土殷富俗尚奢靡和躬率以儉所在皆化後遷益州太守其清約如前與諸蠻從事務推誠心南土愛信先主定蜀徵為掌軍中郎將署左將軍大司馬府事費詩字公舉犍為人建安末為綿竹令先主既定成都領益州牧以詩為督軍從事尋拜牂牁太守還為州前部司馬先主稱尊號詩上疏曰殿下憤曹氏篡竊糾衆討賊今大敵未克而先自立恐人心疑惑昔髙祖與楚約先入關者王及子嬰左就降尚懷推讓今不法髙祖愚臣不為殿下取也遷永昌從事諸葛亮琅琊人建興元年領益州牧六月益州耆帥雍闓殺太守求附於吳又使郡人孟獲誘煽諸夷牂牁越嶲皆叛應闓三年春亮表請南征參軍馬謖進曰用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納之比至南中所至戰捷由越巂入斬闓等獲收餘衆拒亮亮募生致之既擒使觀營陳復縱之更戰七縱七擒猶遣獲獲不去曰公天威也南人不復反矣遂入滇池益州永昌牂牁越巂四郡皆平亮即其渠率而用之或以為疑亮曰若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死喪留外人而無兵必成禍害二不易也又夷纍有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳馬忠字德信閬中人少為郡吏獻帝建安末舉孝廉除漢昌長後主建興元年丞相亮開府以忠為門下督三年亮南征拜為牂牁太守承朱褒叛亂之後撫育恤理甚有威惠八年召為丞相參軍副長史蔣琬署留府事又領州治中從事九年督將軍張嶷等討汶山郡叛羌十一年南夷豪帥劉胄反擾亂諸郡庲降都督張翼討之不克丞相亮亭以忠代之遂斬胄平南土加忠奮威將軍封博陽侯初建寧郡殺太守正昻縛太守張裔於吳故都督常駐平彜縣至忠乃移治味縣處民夷之間又越巂郡亦久失土地忠率將張嶷開復舊郡由此就加安南將軍進封彭鄉亭侯延熙五年還朝加拜鎮南大將軍七年留成都平尚書事後復歸南十二年卒子修嗣張嶷字伯岐南充國人後主建興九年為牙門將屬馬忠討汶山叛羌南平四郡蠻夷輒有籌畫戰克之功十一年又從忠討劉胄戰鬬常冠軍首遂斬胄牂牁興古獠種反忠令嶷領諸營往討招降二千餘人悉傳詣漢中延熙三年除越巂太守嶷之郡以恩信誘諸蠻北徼捉馬最驍徑不承節度嶷自往討生縛其帥魏狼又解縱告諭諸蠻聞之多漸降服以功賜爵關內侯在郡十五載屢著威績邦域安穆乞還乃徵詣成都夷民扶轂涕泣隨之朝貢者數百人晉李毅天水人廣漢主簿太康間罷寧州入益州以毅為校尉持節統兵鎮南中監五十八部明達剛斷蠻民信服事詳師旅考毛孟寧州治中惠帝末西南夷叛會刺史李毅卒孟詣京師求救不見省孟固請曰君亡親喪幽閉窮城萬里訴哀不垂愍救既慙包胥無哭秦之感又愧梁妻乏崩城之驗存不若亡乞賜臣死朝廷憐之乃以王遜為刺史王遜字邵伯魏興人仕郡察孝廉纍遷上洛太守私牛馬在郡生駒犢者秩滿悉以付官云是郡中所産也惠帝末西南夷叛寧州刺史李毅卒城中百餘人奉毅女固守經年永嘉四年治中毛孟詣京師求刺史乃以遜為南夷校尉寧州刺史道遇寇賊踰年乃至外逼李雄內有夷寇吏士散沒城邑邱墟遜披荒糾厲收聚離散征伐諸夷俘馘千計威行寧土遣子澄奉表勸進於元帝帝嘉之纍加散騎常侍賜爵裦中縣公遜以地勢形便分改諸郡皆見施行事詳建置太寧元年李雄遣李驤等渡瀘水寇寧州遜使將軍姚崇爨琛拒之戰於堂狼大破驤等崇追至瀘水赴水死者千餘人崇以道逺不敢渡水遜以崇不窮追也怒囚諸帥執崇鞭之怒甚髮上衝冠冠為之裂夜中卒州人復立遜中子堅行州府事詔允之諡遜曰壯姚崇一作姚嶽姚嶽明帝時寧州裨將軍太寧元年大破李驤于堂狼晉寧至今有祠祀梁蕭紀南蘭陵人武帝子封武陵王大同三年為益州都督建寧越巂叛紀振旅通道撫定夷人徐文盛字道茂彭城人大同末持節督寧州刺史先是州在僻逺所管羣蠻不識教義貪欲財賄劫篡相尋前後刺史莫能制文盛推心撫慰示以威德夷獠感之風俗遂改隋梁睿字持德安定烏氐人開皇間為益州總管討賓平代王謙之亂夷獠畏服夷酋爨震恃逺不睿請以寧州朱提雲南西爨置總管從之梁毗字景和安定烏氐人文帝時以直忤權貴出為西寧州刺史在州十一年先是蠻夷酋長皆服金冠以金多者為豪俊由此遞相陵奪每尋干戈邊境略無寧歲毗患之後因諸酋長相率以金遺毗毗置金坐側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟不相攻擊帝聞而善之徵為散騎常侍大理卿唐韋仁夀京兆萬年人髙祖時擢巂州都督府長史南寧州納欵朝廷歲遣使撫之率貪叨為邊患帝素聞仁夀治理詔檢校南寧州都督寄治越巂歲一按行慰勞仁夀將兵五百人循西洱河開地數千里稱詔置七州十五縣擇酋豪授以牧宰威令簡嚴人皆安悅將還酋長泣曰天子藉公鎮撫奈何欲去我仁夀以池壁未立為解諸蠻即相率築城起廨甫旬略具仁夀乃告以實曰吾奉詔第撫循庸敢擅留南中父老乃悲啼祖道遣子弟隨貢方物天子大悅仁夀請徙治南寧州詔可敕益州給兵護送刺史竇軌疾仁夀功訹言山獠方叛未可以勤逺略遂不遣仁夀歲餘卒爨歸王南寧州西爨白蠻也有才略貞觀間為南寧州都督忠於唐趙孝祖永徽間以左領軍將軍為郎州道行軍總管討南寧白水蠻平之因奏勃弄以西與楪榆洱河相接無大部長好結仇怨明年移兵大破西南夷撫而安之其境遂定韓思彥字英逺鄧州人髙宗時為監察御史巡察劒南益州高資兄弟相訟屢年不決思彥敕厨宰飲以乳二人悟囓肩相泣曰夷獠不識孝義公無乃以弟兄共乳而生耶乃請輟訟至西洱河誘叛蠻降之璽書褒美焉韋臯字城武京兆萬年人貞元初為劒南節度使兼雲南安撫使初西瀘令鄭回為南詔清平官説異牟尋歸唐而無路自致會臯至鎮有威惠招撫境上尋潛遣人求內附臯以聞乃命臯作書諭之遂決䇿歸唐尋請以大臣子弟質於臯臯辭固請乃令就學成都尋屢從臯破吐蕃兵事詳師旅考南詔自是比年貢方物李德裕字文饒贊皇人太和三年為鄭滑節度使踰年徙劎南西川節度使蜀自南詔入寇千里殘敝德裕至建籌邊樓凡山川險要悉圖於上未踰月皆若身嘗涉歷上命修塞清溪關以斷南詔德裕上言通南詔細路至多不可塞惟重兵鎮守可保無虞乃修甲胄器械作雄邊子弟等十一軍築仗義禦侮柔逺等城復卭崍關徙嶲州治臺登以奪盛蠻險舊制嵗杪運內粟贍黎巂州分餉諸戍常以夏至苦瘴毒輦夫多死德裕命轉邛雅粟以十月為漕始先夏而至運饋者不涉炎月逺民乃安郭釗太和間以兵部尚書帥劒南時南蠻攻梓州釗盛兵以備遺書責蠻長王􅓕巔巔以杜元頴侵擾為解因決意遣使入貢天子嘉之元烏蘭哈達蒙古人世祖討南蠻諸國以哈達總督兵事自旦當嶺入雲南境麼些二部蠻長唆火脫因塔裏馬來迎降遂至金沙江合台分兵入白蠻察罕章破其寨柵又攻阿塔剌半空和寨絶其汲道其子阿珠迎擊寨兵退走遂并其弟鄂碩城俱拔之進取龍首關入大理分兵取附都善闡轉攻烏蠻合剌章水城又破羅部府大酋髙升進破押赤城至昆澤擒其王段智興及梁帥馬合剌昔以獻事詳師旅考出師二年平大理三十七部請悉置郡從之賜其軍銀幣授銀印加大元帥還鎮大理博斯呼從世祖征花馬國率兵千人結浮橋於金沙江以濟師中統初論功授益州等路宣撫使賜金虎符薩達克齊沙木斯迪音回回人世祖呼為薩達克齊而不名薩達克齊猶華言貴族也至元十一年拜平章行省撫雲南時宗王圖固勒鎮滇惑於左右至王所具甲兵為備迪音聞之遣其子尼雅斯拉迪音先請曰天子以雲南守者非人致諸國背叛故命臣來安集之且戒以至境當即加撫循今未敢専願王遣一人來共議王聞遽罵其下曰吾幾為汝輩吾所誤明日遣親臣二人至迪音問以何禮見對曰等與尼雅斯拉迪音偕來視猶兄弟也請用子禮見皆以名馬為贄拜跪甚恭觀者大駭乃設宴陳所賜金寶飲器酒罷盡以與之二人大喜過望明日來謝語之曰二君雖為宗王親臣未有名爵不可以議國事欲各授君行省斷事官以未見王未敢擅所授令一人先還稟王王大悅由是政令一聽迪音為十二年奏諸夷未附者多今擬宣慰司兼行元帥府事並聽行省節制又奏哈剌章雲南壤地均也而州縣皆以萬户千户主之宜改置令長並從之十三年以所改雲南郡縣上聞乃教民以禮作陂池以備水旱創建孔子廟購經史置學田文風稍興又相地置鎮每鎮土酋吏百夫長各一人行者或劫掠則罪之有土吏數輩為迪音所黜至京誣其専僭數事帝顧侍臣曰迪音憂國愛民此輩之告誣也命械送迪音既至脫械諭之且與以官職皆叩頭謝誓以死報交址叛服不常遣人諭以禍福約為兄弟交址王大喜乞為藩臣蘿槃甸叛往征之有憂色從者問故曰憂汝曹冒鋒鏑不幸以無辜死又憂汝曹劫虜平民使叛則又從而征之耳師次蘿槃三日不降諸將請攻不許遣使往諭越三日又不降諸將復請攻之又不許俄而將卒有乘城進攻者遽鳴金止之召而叱曰吾奉命安撫不奉命殺戮也無主將命而擅攻法當誅命左右縛之諸將叩首請俟城下之日從事蘿槃主聞之曰平章寬仁如此拒命不祥乃舉國降諸夷聞風翕然欵附夷酋每來見例有獻納悉賜從官貧民秋毫無所私為酒食勞酋長製衣冠襪履易其卉服姓草履酋皆感悅迪音居雲南六年卒年六十九百巷哭葬鄯闡北門交址王遣使齊絰致祭帝思其功詔省臣守其成規不得輒改大德元年贈咸陽王諡忠惠子五人長尼雅斯拉迪音次哈克繖廣東道宣慰使都元帥次呼遜次沙木斯迪音烏瑪喇建昌路總管次瑪蘇庫雲南諸路行中書省平章政事尼雅斯拉迪音沙木斯迪音子纍官雲南路宣慰使都元帥至元十六年遷帥大理以軍抵金齒蒲驃曲蠟緬國招安夷寨三百籍户十二萬二百定租賦置郵傳立衛兵歸以馴象十二入貢十七年雲南省臣撫綏失方授尼雅斯拉迪音行中書省左丞尋升右丞建言三事一謂雲南省規措所造金薄貿易病民宜罷一謂雲南有省有宣慰司又有都元帥府近宣慰司已罷行省既兼領軍民則元帥府亦當罷一謂雲南官員子弟入質達官子弟當遣餘宜罷奏可二十一年進平章政事奏減哈喇章冗官歲省俸金九百餘兩專人督屯田課程歲增金五千兩二十九年卒贈中書左丞相延安王子十二人呼遜雲南行省平章政事實迪雲南行省左丞張立道字顯卿陳留人至元間以王府文學從皇子雲南王和克齊之鎮勸王務農以厚民即署立道勸農官領屯田事元帥布呼丹毒殺和克齊立道潛結義士十三人約共討賊刺臂血和金屑飲之推一人走京師告變事泄呼丹囚立道將殺之提舉張忠者於立道為族兄結壯士夜劫出共走及布呼丹伏誅有旨詔立道等入朝帝曰汝等為我家事甚勞苦今欲事朕乎事太子乎事安西王乎惟意所向立道等奏願留事陛下於是賜立道金五十兩以旌其忠十年三月領大司農事中書以立道熟於雲南奏授大理等處巡行勸農使冒佩金符其地有昆明池環五百餘里夏潦暴至必城郭立道求泉源所自出役丁夫治之泄其水得壤地萬餘頃俱為良田爨僰之人蠶桑未得其法立道教之飼養滇民富庶羅羅諸蠻相率來降收其地悉為郡縣十五年除中慶路總管佩虎符又修建孔子廟置學舍教其子弟擇士之賢者為師迪歲時率諸生行釋菜禮人習禮讓行省平章賽音延齊表言於朝有旨進官十七年入朝請於帝以雲南王子額森特穆爾襲王爵帝從之遂命立道為臨安廣西道宣撫使兼管軍招討使陛辭賜以弓矢會禾泥路必思反煽動諸蠻亟發兵討之拔其城邑徇金齒甸七十城越麻甸抵可蒲皆下之二十二年又籍兩江儂士貴岑從毅李維屏所部户二十五萬有竒以其籍歸有司遷臨安廣西軍民宣撫使復創廟學於建水路書清白訓於公廨以警貪墨風化大行入朝條陳十二䇿帝嘉納焉三可十年皇曾孫蘇克繖封梁王鎮雲南廷議求舊臣為輔者立道遂以陜西行臺侍御史拜雲南行省參政卒於官著有雲南風土記六詔通説若干卷阿嚕唐古特人色爾欽部子也襲為大名路達嚕噶齊至元五年從雲南王征金齒諸部震服六年再入定其租賦平火不麻等二十四寨七年改迪音中慶路達嚕噶齊兼管爨僰軍十年平章沙木斯令阿嚕疆理永昌十一年閲中慶路版籍得隱户萬餘以四千户即其地屯田十六年遷雲南諸路宣慰使副都元帥明年復立雲南行省拜參知政事明年烏蒙蘿佐山白水江蠻叛討平之又明年諸王桑阿克達爾帥諸將征緬阿嚕供餉饋無乏絶二十五年卒贈平章政事諡毅敏子嘉琿中書平章政事請於朝贈其祖色爾欽部太師諡貞獻加贈阿嚕太師追封魏國公改諡忠節克哷西域人世居太原由譯史從沙木斯迪音經略川陜至元十二年立雲南行省署為幕官蠻夷欵服克哷功居多十五年分省大理會緬入冦以戰具資軍士討平之授行中書省左右司員外郎十八年平章尼雅斯拉迪音遣詣闕敷奏邊事世祖愛其才辨拜鎮西緬麓川等路宣撫司達嚕噶齊兼管軍招討使成都烏蒙諸驛阻絶克呼市馬給傳往來便之俄被詔問征緬事宜奏對稱旨賜幣帛及翎根甲諸王相烏塔拉右丞太卜征緬烈率兵船為鄉導拔江頭城振旅而還復從雲南王入緬總兵三千屯鎮驃國設方略招徠其黨由是復業者衆後入覲世祖慰勞之詢以緬國始末擢僉緬中行中書事頒詔於緬宣布威德緬王遣子入貢纍進雲南諸路行中書省左丞大德四年以病卒伊克德濟匣剌魯人至元十七年征鄂端拜雲南行省參知政事二十一年與諸王相烏塔拉右丞太卜分道征緬造舟二百艘進攻江頭城拔之獲鋭卒萬人命都元帥來世英守之圖其形勢遣使詣闕具陳攻守之方隨遣赫德楊林招降不報諸蠻據太公城以厄大兵復遣僧諭以禍福反為所害遂督軍進擊破之金齒等十二城皆降以五千兵戍之後改四川行樞密副使卒趙世延字子敬其先永古特族人居雲中至元二十一年授雲南諸路提刑按察使司判官時年二十有四會烏蠻叛白省臣以軍討之蠻兵大潰請降擢監察御史歷四川肅政廉訪大德間八百媳婦為邊患右丞劉深往討兵敗還棄市於是右丞阿固台當繼行世延言蠻夷宜羈縻而重煩天討致軍旅亡失誅戮省臣藉使盡得其地何補於國今窮兵黷武實傷聖治朝廷第當選重臣知治體者付以邊寄兵宜寢事聞樞密院謂用兵大事不宜以一人之言為興輟世延再疏兵竟罷後官至中書平章政事封魯國公諡文忠額森布哈蒙古克哷氏至元二十三年拜雲南行中書省平章政事時阿郎可馬丁僰夷為變討平之遂立登雲等路府州縣六十餘所得户二十餘萬官其部長定其貢稅邊境以寧張萬嘉努父札呼岱為都總管萬户殁於軍萬嘉努從征討有功授以父官至元間進副都元帥將四川湖南兵征哈喇章時雲南惡昌多興羅羅諸夷皆叛殺掠使者州郡莫能制遂以其兵討之民為之立祠二十年從征緬戰死雲南王命子保童將其軍從征入太公城有功襲副都元帥多爾濟字道明西夏寧州人世祖時為雲南廉訪副使會諸蠻叛僚佐悉稱故去乃獨居守又八月省臣大懼歸符印欲遁多爾濟白於梁王得檄而後出及為雲南廉訪使會行省丞相特們德爾羅織安撫使巴哈喇卜丹將置極刑爭曰生殺之權繫於天子方面之臣而專殺意將何為安撫獲免僰夷與蠻相仇殺省臣受僰賂誣奏蠻叛殺良民亟奏劾廢之年六十二卒於官蒙古岱契丹人世祖時襲父職為隨路新軍總管從攻羅必甸至雲南詔以衆入緬迎雲南王金齒諸蠻伏險為備帶奮擊破之凡十餘戰至緬境征開金齒道奉王以歸遷副都元帥從諸王阿勒台交址至白鶴江接戰奪其戰艦又從雲南王攻羅必甸破之二十九年入覲成宗即位授烏撒宣慰使遷大理金齒都元帥六年討平烏撒羅羅斯賜鈔九年平羅雄叛賊進驃騎衛上將軍雲南行中書省左丞宣慰使都元帥卒於軍至大四年贈龍虎衛上將軍平章政事追封濮國公諡威愍程思廉字介甫東勝州人至元二十六年為雲南行御史臺中丞始至蠻夷部長來賀詞若遜而意甚倨思廉奉宣德意示以禍福諸蠻皆懼服雲南舊有學校而禮教不興思廉力振起之始有從學問禮者劉正字清卿清州人大德元年為雲南行中書省左丞時右丞蒙古圖嚕默色請征緬正以為不可師果無功雲南民歲輸金銀所差官必先重賂省臣乃得遣及至徵收之數每十加二而拆閲之數又如之其迎送饋贐亦如納官之數正疏革其弊給官稱俾土官自輸納夷民便之呼遜沙木斯迪音三子大德間改雲南行省右丞既至條諸不便事言於宗王王不可呼遜與左丞劉正馳還京師有旨令宗王協力施行由是一切病民之政悉罷豪民避徭役往往投充王府宿衛有司不勝供給呼遜按朝廷原額所無者悉籍為民減其宿衛三分之二馬龍酋謀叛隂與外賊通事覺宗王為左右所蔽釋不問呼遜與劉正反覆研鞫反狀盡得竟斬之軍糧支給地里逺近不同吏緣為姦呼遜籍軍户姓名及倉廩處所為更田五番支給吏姦始除先是沙木斯迪音建孔子廟撥項以供祭祀沙木斯迪音卒田為大德寺所有呼遜按廟學舊籍歸之乃復下諸郡立廟學選文學為之師文風大興王府畜馬多悉縱之郊敗民禾稼而牧人在民家宿食民無寧居呼遜度地置草場構屋使為牧所民得以安廣南酋沙奴梗化呼遜遣使誘至待之以禮留數月不遣酋請還呼遜曰汝欲還可納印來酋不得已齎印至呼遜置酒宴勞諷令偕印入覲帝大悅大德五年緬酋負固忽辛遣人諭之曰我老賽音迪延齊平章子也惟先訓是遵凡官府於汝國所不便事當為汝更之緬酋聞遂與使者偕來獻白象一既入帝賜緬酋以世子之號烏蠻等租賦歲煩軍徵索呼遜以利害榜諭諸蠻不遣一卒而租賦咸足俄有為飛語惑宗王者呼遜馳報朝廷遣使臨問凡造言之徒悉誅之呼遜偕使者還覲至大三年卒贈雍國公諡忠簡子二人伯杭中慶路達嚕噶齊庫哩勒湖南宣慰使李京字景山河間人大德五年由樞密宣慰烏蠻尋升烏撒等道宣慰副使兼管萬户時烏蠻等地𨽻雲南行省京方下車會羣蠻不靖按行調發餽給鎮撫周履滇境後悉其見聞為志略四卷以進翰林學士虞集元明善序之支渭興字文舉郃陽人文宗至順庚午進士為雲南行省考試官道便留雲南屢進宣慰副都元帥有惠政能文章所著詩集行於世楊祚字慶之文宗時廉訪僉事有才略所至以興學化人為先務薩木丹巴勒字山堂號飛山子西夏人至正間行省雲南右丞多善政深得軍民之心有遺愛焉張瑾字君錫號玉溪河南人至正間為雲南廉訪副使興學勸農鋤強旌善常行部至澄江辨釋禁獄五十餘人剖決冗案三百餘事人皆頌之明沐英沐晟沐昻以上事實俱詳封建梅思祖江南人洪武初雲南既平命掌布政使司事善於撫輯軍民安之陳迪字景道江南宣城人幼倜儻有志操洪武初任寧國府學訓導歷升雲南布政使時曲靖烏蒙等蠻猖獗迪率兵討之捷聞賜金幣升禮部尚書張紞字昭季陜西富平人洪武初平雲南以紞為左參政升左布政使凡貢賦法令壇祠公署一切典禮皆所規定夷民悅服治行為天下第一特令吏部勿考賜璽書裦勞歷任十七年後升吏部尚書王俊字大用江南合肥人洪武五年任雲南前衛指揮使二十二年升都指揮同知調廣南衛適儂真佑叛帥衆攻之傾其穴擒真佑以獻斬首數千級獲輜畜無算築城設衛而還永樂初以入賀升都指揮使賜文綺犀帶在任三十餘年戎事無巨細多所綜理陳遜福建浦城人永樂間任雲南左參政升右布政使博學有志操卒於官無以為殮都督沐昻經理其喪歸之鄭進善江南婺源人永樂間巡按雲南風裁峻整姦貪膽落婦人童豎知其威名周新廣東南海人先任御史慷慨敢言人目之曰冷面寒鐵永樂間歷雲南按察使執法公平不畏強禦有疑獄剖析立決尋改浙江異政日著以捕治錦衣紀綱之黨千户某為綱所誣奏逮至京抗陳綱罪不少屈上怒殺之周樂江西吉水人永樂間任按察副使以清操著卒於官篋中惟經史數帙殯殮皆寮友為之辦周彥竒江西吉水人永樂間任僉事麓川緬甸仇殺彥竒單騎深入宣布國威諭以禍福各夷俯首而服遂解去張雄江南溧陽人永樂間任雲南都指揮僉事善撫士卒征交址多立竒功後平鐵索蠻卒於軍王善字思舜福建候官人宣德間任參議敦大不苛麓川叛善進兵金齒值歲歉衆議和糴善曰兩者皆病民乃蠲僧寺徭役命出粟數萬石飢民賴之永寧鹽井土蠻爭地讎殺善為剖析俱帖服楊寧浙江錢塘人正統間麓川反寧以刑部郎往諭後從王驥有功升雲南巡撫及麓川平晉刑部侍郎參理軍務寧有才略善撫軍民邉境賴之以安譙明四川睂州人正統間巡按雲南剛明廉介雪寃抑之獄撫木邦之夷窮簷獲庇遐徼安全馮郁浙江安吉人正統間任楚雄知府時征麓川師經楚雄郁調度有方緩急不失後委總督糧儲升本省布政使司參政賴巽江西人正統間任按察使廉公有威執法不撓官吏敬憚卒於官鄭顒浙江錢塘人正統間任按察副使尋升巡撫練達嚴肅政教大行尤善屬文李鉉字大用山東夏津人征麓川有功升雲南都指揮僉事分守洱海姚安公勤惠愛軍民仰之李福字天佑江西安仁人先任瀾滄衛指揮僉事從征麓川有功升雲南都指揮僉事守備瀾滄訓練士卒番蠻不敢犯後升都指揮同知張麟字仲翔江南鳯陽人剛介有才景泰間任都指揮僉事理屯糧區處精當詔奬其廉正老成何楚英湖廣攸縣人景泰間任右布政政績著聞賜璽書褒美沐璘昻長孫璘初蔭父禧千户進襲祖指揮僉事以功升雲南都指揮僉事景泰間進右軍都督同知充總兵官繼斌鎮雲南修廢墜汰冗蠧政務畢舉方思機之未獲也朝廷檄璘捕滅衆議深入璘曰此釡中魚安能久乎深入徒勞非計也宜以兵臨境達尺書於緬內襲外扼擒之易耳緬果以思機及妻子來獻械送京師朝廷遣使勞賚甚厚廣南寇儂應榮叔姪為亂璘遣官授以成算平之木邦陶孟思指構兵璘復調兵平之天順元年升右軍都督六月卒年二十八璘為人端謹恬淡類儒者門無私謁好讀書長吟咏尤工篆籕草書建五華書屋羅書史其中政暇與士人討論古今竟日不倦有古儒將風所著詩文若干卷沐瓚璘弟璘卒代鎮善騎射有膂力景泰間襲錦衣衛副千户英宗嘉其儀容魁偉有祖父風升都督同知充總兵官至鎮修城壘增糧儲禮賢興學禁貪剔蠧祿穀夷及霑益阿賽構亂悉遣兵平之龍川木密麓川諸叛夷俱所平定成化三年協鎮雲南明年改副總兵鎮守金騰未幾卒年四十有二子誠詳見後何純字惟一江西新淦人成化間臨安副使適寇盜充斥純立哨堡嚴捕逮賊皆斂迹加意學校講經義正文體後卒於官王恕字宗貫陜西三原人清正嚴毅德行文章卓然師表成化間巡撫雲南初蒞時即懸示云不攜僮僕單身自來意在潔已奉公豈肯縱人壞事人皆録其辭焚香禮之在任阻貂璫寶玩禽獸之獻止侵漁田土之弊禁參隨擾害絶交址貿易法行中幸威振外夷歷升吏部尚書卒諡端毅朱䁗字錦文江南髙郵人成化間按滇興學校導水利行部至金齒修築諸葛舊堰軍民利之溫琮字廷瑞四川華陽人成化間按滇中官錢能貪橫琮執法不阿能斂手避之風裁特著樊瑩字廷璧浙江常山人成化間按滇繩貪奬廉精勤眀敏時交人越界掠殺方議用兵瑩移諭禍福遂𢎞欵𢎞治十六年雲南晝晦七日復以詔南京刑部侍郎奉勑考察雲南諸吏罷遣千餘人回晉尚書卒贈太子少保諡清簡姚旭字景暘江南桐城人成化間任右參政秉性清剛臨民慈惠漢夷德之後監征蠻軍與大璫忤及賊平議敘有索其資許以節鉞者不聽拂衣告歸囊橐蕭然著詩文若干卷劉釬字伏和江西安福人成化間任按察使用刑明慎蠻僰畏懷時中官遣郭景取捷徑往安南假朝命求賂安南知其詐縱之還遣兵尾後將近邊郭紿其部長請入白守關者脫歸巡撫王恕令釬捕之郭懼赴井死逮治其黨遣人諭安南明示禍福遂退內地以安陳騏字夢初廣東南海人成化間任按察司副使時鎮守太監錢能橫甚命藩臬官五日一揖能復不出令錦衣衛指揮受禮惟騏正立不屈託病即歸能怒一日見叱之曰你這蠻子食蛇慣了故此大膽騏曰豈但蛇即豺狼虎豹也要食能目左右欲毆之騏趨出執法如故沐誠字擇善瓚長子七歲通孝經論語長襲曾祖武襄指揮僉事嫻韜略工吟咏善草書叔父武僖器之瓚卒軍民合辭乞誠繼鎮金騰仍進錦衣衛都指揮使充參將芒市諸蠻為邊患率兵往捕之卒年二十有六沐詳字擇明瓚次子以撫鎮奏授錦衣衛指揮僉事鎮守金騰時孟密蠻思楪侵擾木邦詳入其地撫諭懇切思楪悔懼歸侵疆遣使納貢成化二十一年蒲酋阿林莽邱連結作亂詳以計縛莽邱斬阿林還捷聞賞賚甚厚二十二年干崖作亂討之尋以他事詿議罷歸滇城卒年三十有二賀元忠吳縣人𢎞治間由監察御史任金騰兵備未久即去行李蕭然郡人聚百金於驛為贐元忠正色卻之送者號泣元忠亦泣下而去後人目其亭曰郤金亭何琛字廷獻四川成都衛人𢎞治間按滇卓有操守權豪屏息時征叛蠻將官擅殺冒功琛劾奏得旨治如律人咸快之張誥字汝欽江南華亭人𢎞治間巡撫雲南興水利建倉厫儲兵食革弊政時有濬河之役給糧不時驕兵鼓噪誥撫諭遂定民賴以安席書字文同四川遂寧人𢎞治十六年雲南晝晦七日敕大臣考察雲貴諸吏書以部郎上疏言致災之由係朝廷不係雲南在大臣不在庶官上時事千言正德十二年任右布政使霑益土舍構亂贊剿有功趙鑾字廷振湖廣江陵人𢎞治間任安普僉事訟牒旁午剖決如流土官桀驁難治者立置於法剿平箐寨境內乂安郭緒字繼業河南太康人𢎞治間以左參議守金滄時思祿據金沙猖獗緒單騎往撫至孟賴去金沙僅二舍夷咸驚曰漢官亦能至此發兵環之緒拔劍示將校期以冀日渡江祿聞遣使請命緒宣敕諭先敘其勞次伸其冤後責其叛祿伏泣稽首請歸侵地及還力卻饋遺事聞升四川參政王槐字應貞山西陽曲人𢎞治間任金騰兵備以嚴率下強橫斂手歷八年如一日王一言字行之四川內江人𢎞治間任臨安兵備凡城池軍旅糧餉之事井井有條軍民利病悉興除之姚祥字應龍廣東歸善人𢎞治間任金滄副使剛直明練所至覆核均徭役禁私派吏以冒賄得罪者百餘人民甚戴之林俊字待用福建莆田人𢎞治間以按察使駐鶴慶有元化寺以活佛惑衆歲時爭以金塗其面俊命焚之父老言不可犯恐致雹損稼俊令積薪伺之果雹即止已而無驗遂焚之得金數百鎰悉輸於官代民償逋毁邊方淫祠三百六十餘所學宫傾壞撤其材新之並創築趙州城一時貪墨望風解綬衛官虐軍者置之法民得休息後歷官刑部尚書諡貞肅周熊字應文陜西長安人正德間按滇執法不少貸一時貪墨望風解組張璞字仲美湖廣江夏人正德間按滇剛正不阿凡夷險悉皆涉歷時鎮守太監梁裕濫取物貨民不堪命璞盡釐革之裕與鶴慶貪酷同知敖英構謀誣奏劉瑾受裕賂逮璞下獄卒後贈太僕寺少卿范鏞字鳴逺陜西臨洮人正德間巡撫雲南時大司馬王瓊專擅不附已者輒搆以事鏞獨不附瓊銜之時富民典史髙詔先任御史以劾瓊謫官鏞薦之瓊益憾遂誣鏞擅委都司奏逮下獄欲加重罪久之得降調嘉靖改元詔録用鏞已卒賜祭復其官唐龍字虞佐浙江蘭溪人正德間按滇先是中璫錢能為鎮守有厮養錢寧者滇人也始丱性機警為能信用指揮盧和附能門下言相人術一見寧謂當大貴私結之寧拜和為父後和以寧寵冒升金齒參將挾讎勘死平民四人燬尸以滅其迹又強奪生員妻事發坐斬寧為和奏辨下鎮巡覆鞫正德十一年審囚使者至寧隂囑出和獄且使楊金齎書於龍龍堂裂而還之曰和詐為耳一日使者語龍曰和獄以無尸當末減龍折之曰四人無尸蓋和燬之耳此而末減則天下酷吏紛然燬人之尸吾實不能從也縱今日富貴立至其如三尺何使者語塞即令械和送獄一時咸稱唐直指中流砥柱土官鳯朝明被奏革職隂遣使劉宣董溥載金寶賜寧脅鎮撫求為題襲龍至巡撫首以此來會龍不可駁還其封客有為朝明者曰鳯氏持萬金伺半歲矣龍正色曰即萬金一芥耳斯言何為其人慚而去朝明復哀求寧寧令宣溥詐冒滇人保舉得內批襲知府實寧詐為之部檄下臬司時沈仁輔為按察使鞫間按治如律龍備言鳯氏及朝明罪惡與不當襲狀執奏於朝下部時驗封司郎中蘇天秀如龍原議覆奏得旨朝明仍降土舍刑威以正至今稱焉陳察字元習江南常熟人正德間按滇每行部青驪布袍周行箐棘訪民間得失彰善疸惡監司守令懾服墨吏望風解綬去時中官請𣙜礦銀以佐度支費察持不可曰此兵端也彼睹其利未睹其害竟罷議金齒帥挾中貴人暴而囓人察劾治如律世宗初疏言金齒騰衝地極邊徼既統以巡撫總兵等官可無事鎮守中官復行兼理因劾太監劉玉都督沐嵩罪詔並罷還王倬字用檢江南太倉人正德間任按察使時閹鎮貪橫夷孽竊發倬匡濟之力居多且有操持羣議不能搖聶賢字承之四川長夀人正德間任金滄副使以祛姦釐弊為務時大理有指揮素貪虐諂媚貴官賢至徐勸誘使盡吐其私賄還故主然後繫之獄聞者快焉平世用字德中四川內江人正德間任瀾滄兵備副使築城有捍禦功卒於官何孟春字子元湖廣郴州人正德間任巡撫博雅冠一時政務簡靜時有石言之異禱於神石裂蟒飛亦異政也劉節字介夫江西大庾人正德間任金騰兵備廉正有威臨事果斷與軍民恩義相洽時兩鎮閹貪甚節以法繩之力為裁抑權貴側目亦不敢犯革鎮之議自此始未幾遷廣西按察使纍官南京吏部左侍郎顧應祥字維賢浙江長興人嘉靖間兩次撫滇博大軒豁不事苛察文章行誼一時推重滇人祠祀與王恕何孟春並王啓字景昭浙江黃巖人嘉靖間以右副都御史撫滇建書院治城郭復永昌府治諸所擘畫毅然不為浮議所搖鮑象賢字復之江南歙縣人嘉靖間任副使豁達練事備兵臨安畫安南之役其功尤偉後升兵部左侍郎蔣宗魯字道父貴州普安人嘉靖間任巡撫精明嚴毅弭盜愛民時東川土目阿堂弒主自立患蔓三省宗魯至陽調各兵而隂以土兵敗賊於野馬川設竒用伏阿堂授首先任臨安兵巡平元江那鑑之亂民賴以安吕光洵字信卿浙江新昌人嘉靖間兵部尚書兼右都御史巡撫雲南時方多故竭忠宣力誅鳯繼祖於武定斬王一新於易門殲髙欽於姚安昆陽荍甸黠賊以次芟除邊境乂寧徐瓚字朝儀浙江永康人嘉靖間任左布政安銓之變瓚言於巡撫歐陽重謂賊敢稱亂以我軍非敵耳不如以夷攻夷為便重從之調元江蒙化鎮沅等夷兵以漢軍佐之分統進剿瓚居中理餉立招降旗隂誘脅從又裂小旗千餘大書同心協力各保身家八字於上諭令聽撫於是歸降者衆已而鳯朝文叛與安銓合衆焚劫進圍省城瓚諭以朝廷恩威冦退請降瓚即夕遣使掣回官軍厥明合擊賊俘獲萬餘簡釋無辜民深德焉毛鳯韶字瑞成湖廣麻城人嘉靖間按滇時閹鎮為害滇人苦之韶至抗疏斥罷後復以僉事道分巡金滄尤多惠政陳學夔字子諧廣西宜山人嘉靖間按滇時滇民苦勞百計拯濟首懲貪婪未幾遷去王諍字子孝浙江永嘉人嘉靖間按滇旌廉懲墨鋤豪恤弱暢布威德為諸巡方者冠歷升大理丞巡撫貴州右僉都御史薑龍字夢賓江南蘇州人嘉靖間任瀾滄兵備立哨設守盜賊屏息楊慎有蜻蛉謠頌之孫繼芳字世其江西進賢人嘉靖初任提學副使剛介有識甄别無爽會有撓之者竟投劾去唐胄字平侯廣東瓊山人嘉靖間任金騰兵備改提督學校教士有法振拔孤寒纍官其部侍郎王惟賢字士官四川中江人嘉靖間任分巡金滄僉事從歐陽南墅講學經盡多實政清郵傳酌操軍蘇里甲滇民有遺思焉楊最字殿之四川射洪人嘉靖間任副使渾朴清貞吏胥凜凜厯太僕卿抗言廷杖死萬厯初贈官諡忠節李樂字仲和湖廣瀘溪人嘉靖間任金騰兵備副使剛正不撓劾貪婪將吏四人除阿坡巨盜軍民稱快王春復福建晉江人嘉靖間任金騰兵備副使慈恕廉介時與諸生講學尤恤邊軍創設義倉飢民獲濟張輻字文衡浙江山隂人嘉靖間任金騰兵備副使廉明樂易值阿思諸夷讎殺或請征之輻曰撫之不從用兵未晚乃遣兵往諭果從命未幾力懇致仕去楊守魯字允德湖廣長沙人順天籍嘉靖間兵備臨元討鳯繼祖其功居多後調提學張佳印字肖甫四川銅梁人有文武才嘉靖間任提學僉事邉務多取決之討鳯賊時守禦尤力陳善字思敬浙江錢塘人嘉靖間以副使督學教士嚴整歷左右布政鑿水洞以通灌溉平徭役清金儲多所建立著有滇南類編吳檄字用宣江南桐城人髙才能詩文嘉靖間由樞曹任金騰兵備副使雍和風雅士民咸沐其化有兵部稿行於世鄒應龍字雲卿陜西長安人嘉靖末劾嚴嵩隆慶間任巡撫歷官以才望推糾彈不避權貴至滇毅然以恢廓自任鐵索箐寇狂猘單騎督征俘馘無算犂穴設所瀾滄宴然徐栻字世寅江南常熟人隆慶初任按察使創行條編積弊遂革民甚戴之徐中行字子與浙江歸安人隆慶間任左參議以詩文與王世貞李攀龍輩稱七子政治尤為精敏僚屬紳士以邀其奬掖為榮滇風為之蒸變朱奎字季文江西南昌人隆慶間任瀾滄兵備副使修建書院講堂積儲備賑士民德之鄒光祚字承卿江西饒州人隆慶間任金騰兵備副使治河堤置義田修學宫遷去士庶思慕不忘胡心得字元靜浙江德清人萬厯間任金騰兵備性嚴重無他好不攜妻子惟一蒼頭侍緬犯干崖南甸刀森與武生嶽大成為緬間諜心得計擒致森杖斃大成衆心稱快陳大賓字敬夫湖廣荆州人萬厯間任巡撫力行鄉約保甲盜賊寢息夷民安樂至改建院署不勞民力官吏遂不敢以工役妨農方沆福建莆田人初左遷安寧提舉清釐鹽弊商民感戴復工文章萬厯間轉督學品隲公明王凝字道南湖廣宜城人萬厯間任巡撫時內地兵戈方息緬警復聞邊將又多喜事凝一切以鎮靜待之後以其數年經畫書檄彚為一册曰西寺貽稿在任時和年豐召書院諸生於署樓課藝親為評隲士民至今懷之吳定字子德河南安陽人萬厯間巡撫雲南入滇時三宣以蠻莫為辭紛馳告急乃便宜用鄧子龍於對簿間使帥兵西出子龍至而蠻莫歸滇人安枕後丁改煽虐道阻不通討平之晉秩加恩賚陳用賓福建晉江人萬厯初巡撫雲南有雄略用兵如神甫下車察滇形勢即題設蠻哈守備未幾緬賊入寇用間諜檄暹羅國襲其後牽制之設八關二堡於三宣要害以戍緬并議屯田又猛卯蠻勾緬構亂檄木邦滅之築平麓城復擒多罕平阿克建學築城績難悉舉以功晉右都御史兼兵部右侍郎諡襄毅廕一子周嘉謨字明卿湖廣景陵人萬厯間撫滇值諸蠻變亂用兵七日而克淡泊靜鎮滇人德之吳應琦字玉華江南桐城人萬厯間按滇性朴茂而政簡易興學宫盡甃土城以石至今賴之董裕字惟益江西樂安人萬厯間按滇性簡靜少所酬應惟以安民為事人多感之李忠臣陜西涇陽人萬厯間任副使道敦大簡重修學宫通鹽市笞墨吏建城池為百姓保障邵以仁字子任貴州普安人萬厯間任兵備副使寬簡持大體一時幾於刑措永昌立祠祀之馮應鳯字邦瑞浙江山隂人萬厯間按滇甫下車值凶歲民間朝夕不給又有緬警應鳯寬不急之徵核無名之費督有司賑濟飢民戒邊地勿弛備禦由是民無轉徙邊患漸消周懋相字弼甫江西安福人萬厯間按滇楊禮等煽亂於尋甸懋相連破之逆黨就擒滇境以安其他實心實政逺邇感慕許天琦字大正福建晉江人萬厯間任金騰兵備副使性方毅初視事見三宣六慰土府諸司悉受緬約束深為嘆息遂一意招徠宣諭威德嘉與更始諸夷稍通未幾卒漢夷思之蕭彥字思學江南涇縣人萬厯間撫滇二載諸所條奏皆西南長計會姚營兵鼓噪授計設伏竟殲凶渠釋脅從歷官户部侍郎方良曙字子賓江南歙縣人萬厯初任左布政使仁明慈恕應務如流濬滇池以溉民田時滇寇新撓困於軍食良曙調給無乏初至庫貯空虛暨數歲富埓諸省又振興理學踐履篤實滇士師之王續之字大卿四川南充人萬厯初任參政分守臨元長材豁度念硐人採山之苦悉除逺年逋課民用蘇息謝肇浙字在杭福建長樂人萬厯間任右參政博洽多才彈壓迤西郡邑士民德之有滇略四卷刻於葉榆郭棐字篤甫廣東番禺人萬厯間任右布政使誠心直道會滇西寇蠢動餽運未嘗乏絶清虛冒之餉省不資之費著有炎徼瑣言李先著山東人萬厯間以參政分守臨元道不染不撓後以猛廷瑞事被逮死於獄滇人為之流涕李渭字湜之貴州思南人年十四父授以母不敬及思無邪二語即書之壁而服膺焉後遊蔣道林之門道林問所得渭以取豫言行處著力為對道林曰此亦硜硜小人耳渭竦然復以父意為宗以必為聖人為主萬厯間由粵東副使來任左參政與滇人士講明理學與旴江羅汝芳同官羅兼談性命而渭一意實踐郭良字復吾福建惠安人萬厯間任僉事分巡安普渾朴精詳咨詢利弊而興除之署學政取士公明去滇之日行李蕭然羅汝芳字惟德江西南城人萬厯間任屯田副使晉左參政才識敏練尤喜講學開永昌沙河灌田四千餘畝署金騰道緬莽瑞體大舉攻迤西思箇堅壁請救汝芳募商人熟入緬者悉偵其險要虛實更密檄諸夷絶緬糧道斷歸路緬人大困屠象掘草以食死者山積可刻期盡殲會有聳巡撫王凝阻之者遂檄汝芳勿妄動因憤恨而罷緬隨遁去後遂猖獗許宗鑑字應衡福建晉江人萬厯間任臨安兵備副使兵火之後與民休息築河堤置學田辨寃獄禁刁訟歲旱步禱輒應去日民鐫石志思焉李材字孟誠江西豐城人萬厯間以按察使管金騰兵備道才猷敏達暇則講學復刊修身為本四字流布尤喜談兵升巡撫鄖陽僉都御史馬鳴鸞四川內江人萬厯間任分巡兵備道建書院置學田著有功績李文續字德延四川宜賓人萬厯間由參政歷按察使性耿介質任自然略無文飾僚宷宴會一言近戲則正色嚴辭四壁蕭然客坐之外他無長物陳洙字伯訓福建長樂人萬厯間任提學副使遴選公明賑濟寒士滇之服教感德者久而不衰晉參藩槖中圖書數卷而已劉伯燮字元甫湖廣孝感人萬厯間任提學副使考課學業曠廢者自赴聽責行誼可嘉者禮遇之士多成就鄧原嶽字汝髙福建閩縣人萬厯間任提學僉事敏練通達所拔皆名士尤善奬掖手注文選梓行於滇以教後進張喬松江西新喻人萬厯間以參議道守金滄威惠並行捐資建文峯塔於永昌南山以培學宫文運丕振方萬山字仰之江南歙縣人萬厯間任按察使時兵燹之餘凋疲未起萬山秉公肅憲核濫冒汰首功慎讞決釋纍獄隴川弗靖旋就削平運籌劻贊之力居多公餘寄情山水尤加意作人梓課藝改學宫人文蔚起張堯臣字希夔四川內江人萬厯間任分守安普左參政晉按察使調停稅璫不茹不吐因鄉試屆期提學適缺代司試事品隲悉當王應期字國正湖廣襄陽人萬厯間任兵巡安普副使守羅婺除沙寇不致延蔓馭吏嚴明修持憲法漆文昌江西瑞州人沈毅有謀略為永昌撫夷同知緬酋連年入寇猛哈思化皆助之時議欲加兵巡撫蕭彥令文昌往撫乃單騎入酋壘宣朝廷德意諸夷讋服或稽首聽命遂築關堡興屯田親履原隰相度地勢悉中機宜緬人不敢內窺以功遷廣南知府萬厯間擢金騰兵備副使騰永之民皆尸祝焉沈警炌字叔永浙江歸安人萬厯末巡撫雲南先是貢金為纍破家者衆警炌以疆場多虞力請減除遂得免閔洪學字周先浙江烏程人天啓間土寇作亂貴州道塞自福建布政擢撫雲南至任委布政謝存仁及參將袁善督漢土兵屢破安效良於霑益滇境獲安朱燮元浙江山隂人天啓間貴州安邦彥作亂巡撫王三善陷歿遂以燮元總滇黔楚粵蜀五省軍務駐劄貴陽定水西之難危而復安歷任兵部尚書袁善字復虛昆明人初任順蒙守備升撫標中軍轉松潘參將纍著軍功尋以事罷天啓初值水西安酋之叛賊至霑益欲襲省城巡撫沈警炌以便宜起用善駐兵松林相機剿捕賊隨撲滅滇賴以安升右軍都督僉事卒贈都督同知廕一子薑思睿浙江慈溪人崇禎間巡按慎刑撫叛加惠士民王世德浙江永康人崇禎間任巡撫清慎自矢除弊懲姦一切政務必親為理以勞瘁卒於官王景四川華陽人崇禎間任金滄道剔蠧釐姦不遺餘力建月城樓重修蒼麓書院何閎中字絅卿湖廣黃岡人學問淵博性量寬和崇禎末任瀾滄兵備捍患禦災功績甚著卒於洱海士民戴之楊文嶽四川西充人崇禎間任右布政有才幹旬宣兩迤政績甚著捐資築昆陽州城官至兵部侍郎本朝洪承疇字亨九福建南安人前明萬厯丙辰進士沈毅有智略順治十六年滇黔未定以大學士為七省經略督師討平之入滇嚴飭士卒有匿民間子女者繩以重法解散投誠兵丁疏奏滇民疾苦發帑賑濟全活甚衆還朝卒贈少師諡文毅李天浴字敬兹順天人康熙七年任雲南巡撫廉明勤慎事無大小一秉乎禮除貪暴裁冗費屬吏凜然無敢犯法者時吳三桂奏請遷徙滇民天浴力疏止之民賴以安甘文焜奉天正藍旗人康熙七年任雲貴總督駐劄貴陽體國愛民時吳三桂逆節已萌僭侈踰法文焜獨持大體多所裁抑及三桂叛變起倉卒文焜令其妾盛氏自盡攜幼子急趨鎮逺以圖恢復比至則鎮逺守將薑義先已從賊文焜知勢不可為遂殺其幼子北面再拜自縊時筆帖式何善賜祭雅圖各棄家從文焜死之葬諡忠果李興元奉天人原籍順天遵化州康熙十年任按察使方正執法嚴抑藩兵不許違禁取利凖折民間子女吳三桂叛守節不屈杖之下獄復安置蒙化尋遇害戮及家屬興元二孫尚幼時昆明人胡溥寓蒙化匿之蒙士左世光家得免後廕同知趙良棟陜西寧夏人康熙十九年授雲貴總督時攻逼大師圍雲南久不下良棟馳至督諸軍進之三日賊潰納欵良棟斂兵不入城即日率所部趨曲靖秋毫無犯有古良將風蔡育榮奉天正白旗人湖廣總督康熙十九年授綏逺將軍同諸軍恢復雲南賊平後改授雲貴總督時逆氛初靖流離載途育榮招撫散亡給牛種勤耕作籌滇十疏設施各有條理士民至今德之范承勳字蘇公奉天正黃旗人康熙二十五年任雲貴總督滇黔經吳逆亂後庶事草創承勳沈毅剛明到任期月察吏安民撫夷弭盜整飭營伍銷禍未萌建學宫置經籍制禮樂器纂修通志凡所規畫無不動中機宜巨細悉舉在任六載威惠大行許𢎞勳字元功奉天遼陽人康熙二十五年任按察使秉臬廉慎無所撓枉二十七年楚北兵譁滇姦卒張麻子等思乘機為變期以三鼓發𢎞勳偵其謀亟白督撫戒譙樓徹夜無三撾捕斬亂首十數人兵民帖然消變方萌厥功甚偉謝于道字存峩浙江鄞縣人康熙癸丑進士二十六年以部郎任提學道學識淵粹是時聲教雖通士習文體尚多厖雜于道以宗匠持衡破格造士每試召諸生面教之環繞座前所定髙下藻鑑不爽賞拔多成名士自是滇南文風彬彬焉石文晟字絅菴奉天正白旗人康熙三十三年巡撫雲南豁達多才為政務舉大綱先雲南屯賦仍前明舊額科重軍户病之文晟疏減十之六設立義倉以惠窮兵添建號舍以恤舉子鄉試解額特疏增廣撫滇七載士民戴之劉蔭樞陜西韓城人康熙丙辰進士四十二年任按察使方正不阿論囚平恕晉本省藩司值旱減價糶粟民不苦飢濬六河疏海口葺學宫增號舍政績甚多後遷貴州巡撫分部雲南府元阿爾噶里室蒙古人任晉寧州州同念切民瘼政先教化境內大治明賀安字朝宗湖廣安化人洪武間任雲南前衛指揮持重有為築城浚隍皆所董治張觀字國賓山西太原人洪武間任嵩明知州簡直不擾新附之民安其撫字考最升鳯陽知府趙幹山西平陽人洪武間任歸化知縣尋調武定府石舊縣升嵩明知州敦大不苛夷民安之後升户部郎中鄧思謙字克讓湖廣桂陽人永樂間任祿豐知縣居官廉能歷九載如一日治署橋梁驛郵市肆皆其創建郭鎮順天宛平人正統間任新興知州值大溪水溢民不聊生鎮設醴祭河安流如故後知雲南府勤於其職凡倉廩學校皆所修葺卒於官滇民祀於廣備倉旁新興亦立祠祀之黃守純字惟一籍貫未詳正統間任昆明知縣撫字有方舊縣治狹陋遷而大之無絲髮纍及閭左陳文友字希賢四川長夀人正統間由呈貢知縣調昆明處心樂易政舉大綱有循良之稱何詵四川蒼溪人正統間任富民知縣有才幹多所建設丁貴江南金壇人正統間任晉寧知州勤慎有才凡學宫壇廟修葺一新水旱祈禱輒應民謠曰旱莫忙公行香雨莫惱公請禱陳穀太和人正統間任晉寧學正先是學在州北甚僻陋穀奏遷於州南訓誨生徒不倦士皆奮勵邵昱貴州永寧人景泰間任晉寧知州廉介有為九年秩滿耆民走萬里赴京請留復任三年遷廣西平樂知府廖芳字廷舉籍貫未詳成化初任昆明知縣亷敏有能洗滌蠧害凡有興作不擾於民石泉字彥清湖廣長沙人成化間任祿豐知縣倜儻不羈區畫有要縣當迤西孔道里民困纍盡心調劑力役均平龎詢籍貫未詳成化間任楊林知縣愷悌宜民疏浚河渠至今利賴董復字德初浙江會稽人𢎞治間以御史任知府宦績茂著有祠在郡左張鳯字應時江西宜春人𢎞治間任知府剛明果斷令行禁止案無留牘余紀字文理籍貫未詳𢎞治間任昆明縣丞操守廉潔綽有能聲當道有難事輒令綜理皆立辦歷官至府同知聶詔籍貫未詳𢎞治初任昆明教諭時方建學嚴立科條盡心啓迪後人咸稱聶先生云李必昻福建浦城人𢎞治間任祿豐知縣清介自勵聽斷如神歲飢請蠲賦以蘇民困邑人感之喻敬四川內江人𢎞治間任晉寧知州亷能有為從前廢墜無不修舉張升山東濟陽人𢎞治間任昆陽州州同增學址練民兵理州政如家事常以私財代官租後因運糧過滇池舟覆溺死士民如喪父母葉元字本貞江西廣信人正德間任知府廉介有為不畏權貴闢異端革汚俗時廣西師宗未靖元督糧到州計擒賊衆地方敉寧卒於官家無長物吳便字廷言浙江山隂人正德間任知府精於法律一切疑獄多所裁決髙公韶字太和四川內江人正德間以御史言事謫富民典史有惠政置館延師教民子弟風俗一變尋知大理府威惠併用吏畏民懷晉參政官至侍郎兩地士民咸廟祀之陳陽字健夫江西新淦人正德間以刑部郎中忤劉瑾左遷昆陽州州同築土城以資保障時課諸生政多卓異州人祀之廖立仁籍貫未詳嘉靖間任昆明縣丞攜一僕徒行之任省約安恬未幾以憂去邑人裒金送之卻不受王梁四川廣安人嘉靖間任宜良知縣寧靜悃愊民安其政王拱仁四川南部人嘉靖間任三泊知縣嚴明整肅修城開渠民甚賴之郭治江西泰和人嘉靖間任嵩明知州當兵燹之後立科條嚴軌範文章政事卓然可觀吳世珣山西保德人嘉靖間任馬龍州州同署嵩明州事剛果嚴明安賊叛臨陳制勝略無畏怯賊平撫瘡痍給牛種多善政黃潛福建晉江人嘉靖間任嵩明州州同愛民如子清節著聞遷學築城運餉皆有功又議調軍改路等十事上之當道黃原道四川巴縣人隆慶初任知府剛直明斷門無私謁獄無淹繫百廢修舉王新民貴州石阡人隆慶初任易門知縣為政寬平以憂去民不忍舍建祠祀之樂頌江西臨川人隆慶初任嵩明知州操持清約築石城革里甲議徵白米禁易牛毛民蘇困纍張祥鳶江南金壇人萬厯初任知府學問淵邃督書院諸生課藝時加品隲政事明決無停牘無寃民洪邦光字世龍福建同安人萬厯初任府同知署理他郡獄訟錢糧悉得其平所過肅然後升本府知府刑清政簡士民安之李藎字臣忱四川成都人萬厯初任推官博大開朗振興文教習俗一變署臨安府時有牳㹒之役軍興旁午劑量挽運餽餉不乏召入為御史張志臯字汝諧貴州永寧人萬厯初任昆明知縣才局恢宏鋒稜不露處省會劇邑自郡伯以上無不獲其心在任四年豈弟之聲騰於衆口錢貴四川峩睂人萬厯間任富民知縣簡重廉平邑人有李義者為盜所誣獄既成貴廉得其冤白於臺司得釋義以重賄謝貴叱去在邑以蔬圃自給卒於官士民哀之沈應昌四川保寧人萬厯間任宜良知縣清丈田糧改建學校稱循吏焉劉儲湖廣興國人萬厯間任晉寧知州精明豁達繕城郭建橋梁置屯堡善政悉舉田一井涪州人萬厯間任呈貢知縣大興水利民感其德立祠祀之夏可漁涪州人舉人萬厯間任歸化知縣有清德後升昆陽知州百姓歌之曰公來涖止清慎而勤公今陟矣民奚以寧祀報德祠劉大縉籍貫未詳萬厯間任歸化知縣清於刑勤於政教士愛民邑人祀於報德祠伍佐湖廣新化人萬厯間任安寧知州發姦摘伏人不敢欺歷官九載清慎如一日民歌曰伍州牧明如燭王朴貴州清平人萬厯間任昆陽知州政持大綱撫蠻息叛士民悅服先任大理通判亦有惠政黃宏廣東順德人萬厯間任昆陽知州律已以廉養民以惠又能辨晰疑獄下無寃民尹鴻漸蒙自人萬厯間任昆陽訓導正已率士訓迪有方陳紀字惟修四川內江人萬厯間任三泊知縣拊循有方姦辨奪民田租稅不人按法論罷邑有礦山民苦逋課白臺司封之有父子訟獄者愀然曰是令失教罪匪獨在民遂懲其子勸導其父民感泣父子相愛如初翟唐順天長垣人萬厯間由御史左遷嵩明知州除姦剔弊拊循孤弱循聲表著鄭邦福字洪疇江西上饒人萬厯間任嵩明知州慈祥而清瑩精心名理脫離言詮人莫窺其底藴遷部郎官至京卿費經虞四川人崇禎末任昆明知縣薄征省訟重士勸農勘覆吾必奎叛黨全活數百人曲靖府明王政籍貫未詳洪武初任知府創制定法甚便夷民劉璧江南鳯陽人洪武初任曲靖衛指揮築城建署廣開屯田指置皆有條理方用江南全椒人洪武初由總旗纍官至指揮使隨沐英入滇開設陸涼衛即掌衛印修城池建公署興屯田安民禦寇著有嘉績永樂間調征交址遂留守交州王正江西人永樂間任知府惠愛得民心郡設學校自正始王式江南合肥人天順間任霑益知州有惠政民夷交頌之焦韶四川灌縣人𢎞治間任知府興學平賦弭盜招亡郡産嘉禾民歌之曰一本兩穗嘉禾滿田太守焦公其德格天羅環江西吉水人𢎞治間任馬龍知州時始改流官勤職愛民夷俗漸變竟卒於官戴鰲浙江鄞縣人正德間任尋甸知府建學作人化民變俗龎嵩字振卿廣東南海人嘉靖間由應天治中出知曲靖府清節自持政先化導立各鄉社學師夷猓有弗率者必以誠感去後人彌思之文溶廣西鬱林人嘉靖間任南寧知縣慈惠藹然人稱賢令李珊江西臨川人嘉靖間任馬龍知州政無煩苛安銓之變挺身抗敵城賴以全去時軍民泣留張秉正直隸滑縣人嘉靖間任羅雄州州同剛正自持不昵羣小嘗請設流官卒如其議林斌福建莆田人嘉靖間任尋甸知府除姦宄任良能徭役均平盜源弭息民為立祠王尚用江西安福人嘉靖間任尋甸知府創書院修學宫平賦役同通判蕭時中清丈田地除浮荒請改折民至今便之胡光江南徽州人隆慶間任府同知興廢舉墜剖決明敏夷民畏懷盜賊屏息署蒙化府事建書院多惠政梁棟貴州人隆慶間任亦佐知縣有循良績後離任民扳轅留之敖翔四川人萬厯間任府同知外剛方而內平恕庭無請謁貪吏望風畏之孫台貴州人萬厯間任府同知著有實政大理保之變監霑益兵卒於行間尹耕莘陜西人萬厯間任推官為政廉明豪強斂迹卒於官囊槖蕭然夏鐸山東人萬厯間任府教授厭士習記誦日與講性命之學一時生徒咸變舊習栗廷用湖廣松滋人萬厯間任陸涼知州奉法循理吏民畏懷李遇春福建閩縣人萬厯間任尋甸知府以興革為己任濬渠道築河堤置義田寢征調嚴閉那石岡等礦厰分四十三寨以安夷民人皆德之鄧繼逺廣西全州人天啓間任陸涼知州政務不擾以便民為事出入惟馭一騎食粗衣布潔清自矢臨安府元巴哈張萬嘉努之子至元間廕任臨安宣慰司同知忠厚嚴明卓有德政朱寶籍貫未詳鎮守石屛千户天厯初圖沁反郡縣皆陷寶同州人亨祐率驍騎五十餘人夜襲宣慰司奪印符以歸據異龍湖島率衆同守州民賴以保障明萬中字惟一湖廣黃陂人洪武十五年從宣寧侯金朝興下臨安領兵四出時蒙自蠻阿也引石屛馬黑奴通海觀音奴寧州吉台諸蠻梗化中以兵定之升臨安衛世襲指揮同知尋升雲南都指揮從征安南冒炎瘴卒王執籍貫未詳寧州衛指揮洪武十五年從宣寧侯下臨安與萬中俱留鎮會石屏馬黑奴搆煽諸部屯兵海東為七營以待執偕中乘夜襲破追至異龍湖又破之師還擊之西山又擊其逸蠻於楊知州莊斬馘無算任暹永興人洪武間任通海知縣改遷縣治威愛得宜黃德四川江津人洪武間任嶍峩知縣革創之初一以寬大沖和馭之李善河南人永樂間任建水知州勞心撫字民懷其德徐文振字聲逺威逺人正統間任府同知善撫其民任滿當去民上疏乞留晉本府知府王驥字博德四川滎昌人正統間任石屛州學正立教整肅身無忒儀州士為之一變召為監察御史鄭洪範浙江黃巖人正統間以御史左遷阿迷知州強直自遂吏畏民懷詹英貴州衛人正統間任河西縣教諭性剛直不畏權勢時靖逺伯王驥三征麓川英劾其老師費財疏載藝文志傅厚籍貫未詳正統間任河西知縣居心仁恕撫字有方邑人祀之任彬四川蒼溪人景泰間任石屏知州遷學宫置社學立童子師會土酋刀諒毒殺吏目髙秉權彬當勘訊諒隂行賄彬叱拒之竟正諒罪以貧不能歸遂家石屏蔣良字希玉廣西全州人天順間任河西知縣政務寬厚不喜聞人過有訟者輒引至前諭以孝弟仁信皆解去賴英江西人成化間任知府有惠政建藏書閣購經史以便諸生講習尋升布政司參政左明善四川富順人成化間任知府亷明有為民皆畏愛交人寇邊榜諭以禍福即遁去黃時中字宜之湖廣麻城人成化間任阿迷知州時初設流百務肇舉中善於撫綏得夷民心王朝祿四川江津人𢎞治初任通海知縣修學舍增倉儲以縣當衝要里甲夫馬為纍請更協濟於河西著為例民頌其德蕭鸞廣西人𢎞治間任嶍峩知縣編置糧差備極勤勞陳瀾南泰州人𢎞治間任蒙自知縣有識苦寇擾築城保禦民賴以安朱琉字德嘉四川瀘州人正德間任知府明敏持正時郡中多盜賊琉窮其淵藪剪除殆盡民賴以安陳允諧福建莆田人正德間任建水知州持躬儉約惟以恤民省費為事盡裁常例州民賴之汪金字汝礪江西貴溪人嘉靖初任知府性醇謹維持綱紀不為苛細創置學田士類頌焉錢邦稱湖廣蘄水人嘉靖末任知府慈恕得民除一切陋例尋常詞訟為之勸息歲儉設粥救飢捐俸完民逋賦升苑馬寺卿去後民歌頌之何文俸字東海福建閩縣人嘉靖間任石屏知州單車赴任豈弟宜民操守廉潔陳仲晦麻城人嘉靖間任石屏州知州治海口建六閘軍民稱便王聘字士卿南充人嘉靖間任寧州州同善於撫字迎母就養母卒哀毁骨立徒步扶櫬歸囊無長物周世用貴州人隆慶初任蒙自知縣清亷愛民去任行李蕭然個舊錫户以金二百為贈堅卻之昌應時字廷佐福建莆田人萬厯初任知府性坦直不屑趨承時集諸生評隲文藝藻鑑不爽士林仰之牛可麟河南祥符人萬厯間任知府秉性朴直政尚寬和訟斷一成確不可易許莘字師尹北直大名人守杭州鞏昌皆有聲萬厯間左遷府通判興學育才臨民慈愛尹東周山東人萬厯間以元江通判署石屏州事裁革各欵緡錢以紓民困州人祀之曽所能四川涪州人萬厯間任石屏知州政務恤民置社倉修陂塘民甚利之蕭廷對字觀我江西泰和人萬厯間由國子監助教出知石屏操守亷潔政尚寬平重農築堰置三社倉儲粟備荒興學課士創建城樓治績最著朱繼夔四川瀘州人萬厯間任寶秀巡檢才識練達長於發姦條議建毛木哨以防剽掠置社倉以儲菽粟有裨地方寶秀民人德之楊翹瀛貴州人萬厯間任通海知縣有才力建縣城民得安堵王鍈清平人天啓間任知府平訟獄練鄉兵郡人德之秦懋觀浙江仁和人天啓末任知府先此任者多以賄聞懋觀至土酋普名聲以千金獻不受巡撫王伉索名聲賄不應誣以叛將討之懋觀歷辨其枉不聽名聲兵薄城下懋觀登陴責之相持兩月及伉被逮遂解去遷右參政顧慶恩江南吳江人博學能文天啓間以澄江通判署石屏政尚寬大崇重文教纂修州志改創磚城後遇賊攻得資堅守至今賴之蔣恆盈廣西全州人天啓間任嶍峩知縣遷學宫培育人才撫綏夷民政績甚著熊啓宇字六開江西南昌人崇禎末任府推官李定國破臨安宇被執罵賊不屈賊義釋之賊屠城橫尸二十餘萬宇率殘民瘞之後歲飢乏食設法炊粥以賑者兩月全活甚衆李猶龍字慕慈湖廣蘄州人崇禎間任石屏知州值普名聲叛攻圍臨安州有土人倡亂立斃之境內肅然率民固守賊不敢犯城賴以安朱統鐩字司烜江西南昌人崇禎間以府通判署石屏州事恤民疾苦異龍湖有水壩魚梁壅塞水道鐩令拆去更築堅堤數百丈以砥之湖水東流淤田復墾捐給傭值合州永食其利建祠祀之周之相貴州人崇禎間任河西知縣寬賦均役弭盜安民闔邑頌德張一愷廣東電白人崇禎間任嶍峩知縣識力過人值土司交訌波及縣民愷排難解紛請兵鋤暴乂賊劫近村親督鄉兵擊斬三百餘級民賴以安本朝鄭相江南江寧人貢生以中書隨征入滇順治十六年委署石屏州事甫下車旬月撫流亡勤撫恤捐金賑濟適偽總兵髙應鳯叛遂被害老幼皆垂涕澄江府元固納蒙古人任澄江路總管首建學宫教民禮義明胡思西安右衛指揮從征雲南洪武十四年西平侯沐英委理府事翦除餉寇撫定夷民勞績甚多髙恂陜西人洪武中恂父斗南任新興有惠政以老乞歸舉恂自代由給事中知州事從征交址有協贊功王彥字士俊江西安福人由刑部郎中言事左遷雲南都司斷事正統間升知府招流移剔姦弊創設三關募民守之有保障功魏鑑江夏人天順間任新興知州歲荒賑飢全活甚衆在任九年始終一節饒欽字汝恭江南祁門人成化間任知府清介不滓力卻路南土官之賂巡撫王恕特薦不報尋以入覲請歸魯厚四川內江人成化間任路南知州創社學以教子弟增重樓於州城之外禦暴賴之朝必登字汝吉四川宜賓人𢎞治間任通判時澄守貪暴人情洶洶必登以亷佐之屬邑之民充板橋江川驛籍者苦於奔應多破産逃亡乃白上官徵銀解驛民困以蘇政暇與諸生講易尤長於詩攝篆廣西曲靖尋升武定同知皆有惠政歷升本省右參政唐臣字堯佐四川營山人正德間任知府誠慤清謹自奉薄而厚恤民政暇手不釋卷延諸生討論築四街城設東溪鋪尋升兩淮運使檄至已卒劉傑山西臨汾人正德間任知府明敏果斷謹斛量定商稅均里役稱平政焉童璽字國信福建連城人正德間任知府始至以郡治弗利改遷於暘溥山移學於郡治舊基仍以舊學為仰山書院郡東北有溪每值霖潦為害璽築堤東谷障之北流築郡城樹譙樓移屯倉政績最多皮日偉湖廣長沙人正德間任江川知縣奏免雜徭民懷其德計朝聘字莘夫四川成都人嘉靖間任知府值歲不登捐俸賑民寬徭省刑開田三千畝王良臣字天民陜西寧羌人嘉靖間任知府才識練達吏事明敏别郡疑獄多受成焉在郡禮賢崇學設樂舞拓文廟鄒國璽字南華四川新津人嘉靖間任路南知州築壩開河士民永食其利徐可久字有功廣西馬平人隆慶初任知府遷郡治於舞鳯山簏築磚城開河道復義倉社學後升本省瀾滄副使文嘉謨四川茂州人隆慶間任陽宗知縣每單騎遊厯境內凡地理河道加意修補築炒甸堰塘濬大衝堤壩民有父母神君之頌林焜章福建莆田人萬厯間任知府清慎豈弟置義學六所以訓生童遇有姦盜化以亷恥不事鞭笞凡有勾攝即付告人不遣隸卒嘗手題於屏曰不怒不嗔和平養蒼生福勿欺勿慢忠直報聖主恩丁憂去士民思之柳芳陽四川宜賓人萬厯末任新興知州愛民課士𠞰捕夷賊士民立祠祀之郎文煥浙江孝豐人天啓間任知府養士愛民剔弊釐姦河陽有額外夫馬重為民困條議革除勒石永禁張維山西蒲州人天啓間以推官改授河陽知縣居官清正除火耗絶請託與知府郎文煥亷正相得民受其福李以袞浙江縉雲人崇禎間任知府崇文行重學校謹倉庫修城池增置炮樓二十座防禦多資至今賴之周應貴州興隆人崇禎間任通判有膽略知府李以袞致政歸應攝府篆適寧州土酋祿昌文部目李蒿鵲王尊等率衆焚掠至郡東市應委僚屬守城單騎詣之諭以大義詞氣嚴正賊衆畏服解去武定府元安慈武德將軍與子弄積俱有功於武定明董旻字子仁江西樂平人成化中官都給事以直言忤旨謫石舊知縣奉職公勤明於折獄片言而決人無寃抑時土酋猖獗賊盜蜂起旻練民兵防禦使逺近相為保聯遂至萑苻絶警土人不敢跳梁後以循良茂著超擢布政司參議張敬江西清江人𢎞治中任和曲知州存心慈愛政善民安州人感戴鄧世彥湖廣人隆慶間任府同知值土酋鳯繼祖倡亂世彥贊畫盡心挽運無誤用能以次𠞰平民鮮失所又創建府治城垣樓櫓地方賴以保障兵燹之後瘡痍未復彥招集流亡寬釋脅從省刑薄斂善政甚多一時漢夷帖服條議改設流官至今頌其功德劉懋武扶溝人官生萬厯間任知府多善政郡人為建生祠王應期湖廣人萬厯末任知府值土酋沙大金作亂應期出竒制勝討平之胡其慥湖廣人天啓二年任知府阿反張世臣作亂慥竭力捍禦抗詞請救城賴以全郡人與前守王應期共立祠祀之名二惠祠趙紓山西人天啓間任知府廉正剛方不避權幸修學崇文旌揚孝弟禮待髙年民知齒讓勸農息訟善政多端涖政三載逺近皆呼為趙青天升蒼梧道民懷其德立石建祠紓立命毁之去之日攀轅卧轍有送至數百里外者廣西府明賀勳字世安湖廣湘鄉人成化間任知府時初設流官勳至建城垣修學校立廨舍惠農通商正風俗弭盜賊後升參政仍兼府事張黻江西吉水人成化間官後府經厯以疏救林俊謫為師宗知州有惠政後以王恕之請復為南京左府經歷孫久江西吉水人𢎞治間任彌勒知州設流之初多所創建制土司安反側民賴以寧華剛貴州都勻人正德間任彌勒知州明察剛毅有為有守十八寨賊首阿勿等聞其名畏之輸納逋稅期月之間政令大行張佐湖廣武昌人正德間任彌勒知州持躬亷介政平訟息平十八寨運籌有方民不知擾解一經山西交城人嘉靖間任知府恬靜亷潔在任七載清白無瑕比歸土舍昻齊追送白金力卻之許佲號虢田河南靈寶人嘉靖間任知府實心惠愛剔蠧釐姦民皆稱為許父臨去以一籬樁植於衙中枯木自活埀隂繁茂辜用琥江西南昌人嘉靖間任知府攜一僕自隨清慎恬淡革土司常例省里甲夫馬靖盜息民豪猾斂迹涖任四載民無欺罔庭無訟獄以養母致仕民咸思之李嵩號肖梧四川內江人嘉靖間任師宗知州甫下車嘆曰以數十家窮夷當一荒州其何以堪雖然官守有常吾知奉職已爾去弊興利愛民如子自奉淡泊粗糲妻子衣布升任士民保留在任九載賢聲茂著比升大理同知民追送百里外泣涕之聲徹於道路戴時雍字逢堯江西浮梁人隆慶間任知府改築磚城約已省刑勸農課士民懷其德蔡應科龍溪人進士萬厯間任知府崇儒愛士獄無寃民丰裁不露姦宄潛消吏民愛戴厯久不忘陳忠字良甫直𨽻獻縣人萬厯間任知府亷潔幹練建永惠壩開東西兩河附近田地盡為膏腴修築三鄉城於沿江渡口設哨兵又令戍卒墾荒且耕且守道路以寧錢秉元江南吳縣人萬厯間任知府省事愛民捐俸買彌勒州古城田資諸生膏火多惠政民懷思之張光宇字懷谷山西太平人萬厯間任知府秉公直敦風化興學勸農增修堤壩升山東轉運使百姓如失父母蕭以裕江西清江人萬厯間任知府課士傳經講論無倦遷學宫於三台山麓創鶴麓書院事關學校靡不殫心省刑薄斂善政甚多又修志類若干卷土酋普者輅騷擾江外親率師擒之諸夷畏服蔣時極廣西全州人萬厯間任通判廣西為曲臨澄三郡交界夙多賊藪時極威名素著諸土司聞來防守皆傾心往迎於百里外申號令明賞罰不煩兵甲夷民讋服李啓湖廣人萬厯間任彌勒知州約已惠下勤恤民隱築堰壩興水利民食其福張繼孟字太巖陜西扶風人崇禎初為御史以剛直出為知府正直嚴明興文講武會普名聲死其妻萬氏復猖獗議招撫往者輒被害繼孟單騎入賊營諭以利害萬氏遂降升浙江鹽運使郡人肖像祀之髙梁楷思恩府舉人崇禎間任知府剗去煩苛悉歸寬恕修復永惠壩水利惠政甚多民間肖像祀之王勵精陜西扶風人崇禎間任通判莊儉仁恕折獄明敏歲大旱自責禱雨米價騰貴毁所繫銀帶易粟減價賣市中富民感激爭出粟價遂平廣南府明王道廣廣東番禺人隆慶間任知府亷靜不擾民蠻相安元江府明程本立字原道臨海人洪武初官周府長史以纍謫他郎甸長官司吏目會諸夷煽誘為亂西平侯沐英布政使張紞檄本立往撫諭之諸夷帖服三年入為翰林與修髙廟實録晉僉都御史金川門失守遂自盡嘉靖初立祠新化州祀之後崇祀於雲南學宫汪輔雲南後衛指揮同知嘉靖間署府事政務便民有控訴至者訓以禮讓至軍事以嚴御之毫不敢犯纍官貴州總兵都督僉事李先芬籍貫未詳萬厯間任新平知縣始建縣治築城鑿池庶務齊舉士民感之建廟以祀秦元穗廣東人崇禎間任新平知縣才學兼優寬猛相濟詳請遷移縣治築建磚城外艱歸民祠祀之大理府漢杜軫蜀郡成都人舉孝亷為建寧令風化大行漢夷悅服纍遷尚書郎明趙彥良字明善浙江烏程人洪武間任通判剛介有文學修大理志要先任劒川州判興革得宜州人思服張鐸籍貫未詳洪武間任推官以亷稱鄭祥江南合肥人洪武初調大理衛指揮使增拓舊城經畫之功居多賴鎮籍貫未詳洪武十五年征雲南以功升大理衛指揮同知二十年調洱海衛訓練士卒守禦有方略與楚雄袁義齊名蘇守正籍貫未詳洪武間任趙州知州學校祀典壇壝一切皆其開創後卒於官諸葛伯恆籍貫未詳洪武間任趙州吏目亷謹有文學秋毫不擾於民月俸不舂而食布政張紞薦之官至參政賈銓直隸邯鄲人正統初任知府甫下車以郡中利弊詢父老凡徭賦水利盜賊之類一一得之以次綜理民皆樂從升本省參政何宗魯四川酆都人景泰間任浪穹知縣剛直不苛歲飢出粟全活甚衆蔣雲漢字天章四川重慶人成化間任知府亷以約已仁以恤民製文廟樂舞器日進諸生誨之去任行李蕭然官至福建布政使吳晟江西弋陽人𢎞治末任知府恢洪直諒人不忍欺一日雨行輿夫忽蹶傾其輿晟不動色喚食奩取糕食之曰汝飢耶聽訟獨斷吏不得為姦時召諸生稽其本業戒嬉遊後遷參政士民遮送泣下李秀實湖廣永興人𢎞治間任太和知縣丰采凛然豪強斂手讞決疑獄罪者咸服楊樊貴州人𢎞治間任太和知縣以能稱時廨宇傾圮擬修之費約千金工以萬計樊曰姑已之待明年人莫喻其意春正月即諭民應造版籍各令投狀樊察舊事吏算里書應索民數千金疲於候命者萬人樊乃親督造寫毫末不遺仍借此佐廨宇之役人役力一工畝科石一片民視往昔減半費皆樂于赴功帑不支而事竣吏胥不得索一錢後升知府周憲湖廣安陸人正德間任知府剖決如流升九江兵備副使方宸四川新繁人正德間任同知清白自持時太守重罰鍰宸每升堂蹙眉而出人服其亷升知府喻河廣西人正德間任通判通敏有才略時洱河泛溢沒民田地乃令民間各具草束遂自乘舟探河尾淺處卓木為城以草障瀾疏泄之因著為法三年一濬杜翔四川崇慶人正德間任浪穹知縣鑿渠灌田以興水利任轍四川巴縣人嘉靖間任知府誠心撫字嚴於馭吏時方有檄貨大青督責日至屬吏欲擇其尤者為獻轍曰此非可繼之物汝不虞為民禍耶擲而絶之尋以憂去在郡僅旬月後民有隱憂則相謂曰安得任公蔡紹科浙江黃巖人嘉靖間任知府有便民四事省里甲治道塗立市肆作宫室人感其德至今猶稱之髙鏞公韶子嘉靖間以御史左遷尋任大理同知倜儻有風節重修文廟濬泮池製備祭器樂器有功學校周昆四川永寧人嘉靖間任通判讞獄明決時監司以法繩下羣吏恐怖會有寃獄衆莫敢辨昆獨再三爭之監司疑其納賄昆抗執不回其寃乃白侯問貴州清平人嘉靖間任太和知縣通敏多才舊例府縣供億之費皆里甲治辦多為在官者侵奪費常十倍問欲為永逸之計自祭器燕几及屏幛薪水之細皆繕治而區分之擇吏主出入民不知費纍遷苑馬寺卿龍翔霄湖廣武陵人嘉靖間任太和知縣熟諳吏治決訟如流他郡邑有疑獄或難事悉委之太和倉有積粟吏虞紅朽獲罪霄令舂粟得米出陳易新民免困纍而積貯之數無虧上官下其議行于闔省後遷南京兵部主事劉璧四川雅州人嘉靖間任太和知縣亷介慈惠捐修祠典愛惜民力民頌不衰朱官貴州安莊人嘉靖間任賓川知州實心愛民建書院修津梁升楚雄府同知莫天賦浙江海康人萬厯初任知府慷慨有為嶽鳳之變城守戒嚴人情洶洶適天賦覲還調度有方百姓安堵升按察副使莊誠四川成都人萬厯間任趙州知州以興廢為己任凡典禮器物整飭不遺麗江瀾滄二土司構訟各懷金行賄誠執使封金聞於當路俱置之法永平汰兵作亂所過殘掠誠百計周防賴以無事清浮糧釐差發疏水利修舉鄉射禁食毒草凡利民生全民命者無不力行州志之修自誠始張名式湖廣人萬厯間任趙州州同亷靜寡欲才識髙明運餉卻金清田築堡卓有政聲劉延齡四川綿竹人萬厯間任雲南知縣發姦摘伏人無遁情四境恬然民不見吏陳輔江西廣昌人萬厯間任鄧川知州履畝均田能清影射金錢毫無染指常真傑廣西恭城人萬厯間任鄧川知州至誠仁恕築堤開閘減金價惠政甚多周憲章貴州思南人萬厯間任雲龍知州平段進忠之亂消林養中之變建州城立州治創廟設學招撫流離清田畝定里甲裁冗減課經畫盡善楚雄府明朱守仁江南徐州人洪武間任知府撫民勤政招集流移授以田土均賦役建學校鋤強梗境內大治袁義廬江人羽林右衛指揮同知從征雲南洪武間沐英遣守楚雄時蠻夷叛逼義積糧髙壘調兵力戰蠻遂遁去授楚雄衛指揮使墾田築堰修城郭建橋梁區畫久逺之計入覲上惜其老令醫為染其鬚髮俾仍撫治以威逺人後徵還厯官都督僉事卒賜祭葬馬良山西黎城人正統間任楚雄知縣鯁直不阿政尚簡易凡有益於民者行之必力鞏圭江南貴池人正統間任黑鹽井副提舉侃直任事秩滿父老遮留不忍别計澄江西浮梁人景泰間以御史來守郡興學育才釐姦剔弊盜賊逺遁民賴以安升廣西按察司副使鄒慶貴州思南人景泰間任鎮南知州以亷能稱闢街衢立公廨興學校弭盜安民後升姚安知府邵敏湖廣湘隂人少以孝聞成化間任知府勤恤民隱初郡民不諳絲枲敏為市桑麻木棉教士女紡織政事咸舉纂修郡志李純廣西桂林人成化間任鎮南知州潔已恤民恥為阿私修理壇廟百廢俱舉後升南昌知府鄒傑湖廣京山人成化間任廣通知縣清謹惠和布衣蔬食始終如一建學置田積粟備荒後邑人以兵燹飢困賴賑濟焉吳永廣西平樂人成化間任黑鹽井提舉井有蛟為害民患衝決永于北門作石壩鑄鐵牛鐵索各七鎮之害遂息虎臣陜西麟遊人慷慨有氣節成化末貢入太學上書諌萬歲山棕棚登眺事憲宗竒之授􅑇嘉知縣始至黜姦崇良招撫夷猓次年委勘景東土官讎殺事夷投賄力卻遂中毒死邑人懷之范璋浙江餘姚人𢎞治間以工部主事忤權貴謫吕合驛丞尋升楚雄知縣卜遷學宫於勝地引蓮池水以灌泮池誨勵諸生多所成就蔣哲貴州衛人𢎞治初任廣通知縣剛介亷明沐國公家人有恃勢作威者哲按治如法卒於官百姓哀之董朴湖廣麻城人正德間任知府課農桑立哨堡建學舍增祭器尤勤於講學諸生有貧不能婚葬者捐資助之升江西參政祝𢎞舒四川溫江人嘉靖間任知府因俗為治尤篤意文教易五顯祠為龍岡書院卜遷學宫以當形勝䇿勵諸生人文崛起武定鳯朝文之亂區畫城守逺近避亂者歸之賊不敢入其境李邦表四川定逺人嘉靖間任知府操守亷介久而不渝建聚奎樓聚徒講學懲姦正俗境內肅然戚慎江南宣城人嘉靖間任知府清介不染不畏強禦卒於官囊無餘財寮屬醵金以殮傅昻江西金溪人嘉靖間任府同知亷明剛正嘗收軍儲洞知賠納之苦議請減徵事垂成而昻以遷去遂不果行識者憾之劉名弼直隸長垣人嘉靖間以通判署楚雄縣事仁恕清慎創建義學克成厥功邑之人文蔚起皆其力也區元晉廣東新會人嘉靖間任鎮南知州政治循良好士愛民修建廟學何應和廣東東莞人嘉靖間任南安知州單騎赴任出不乘輿暑不張蓋撫民以仁禦盜以信境內肅然後以終養歸踰年有安龍之變州人咸曰何公在當不至是茍詵四川華陽人嘉靖間任南安知州性剛操潔值州境安龍堡夷賊肆掠渠魁數十人皆勇悍狡黠撫剿俱不能致詵出竒攻入巢穴伏兵格殺之立哨於要地調官卒守禦民感其德立祠祀焉董宷四川人嘉靖間任定逺知縣亷明公恕催科不擾額賦得完自宷始越民表貴州宣慰司人嘉靖間任定逺知縣清直慈敏均徭役革屯弊扶弱抑強多惠政後升任湖廣軍民泣送之吳習貴州赤水衛人嘉靖間任廣通知縣仁恕公亷不畏強禦不濫科徵凡公署橋梁靡不修飾張大亨廣西全州人弱冠領鄉薦謁選候長安邸中嚴嵩初入相為其大父門人遂引疾歸終嵩任政府二十餘年不出及罷相始出判端州隆慶初擢楚雄府同知攜一蒼頭一稚子灑然甚適也於吏事迎刃而解芟除九場巨憝郡民依依如孺子之慕父母比代守者入覲以經費不給中道歸家黃袍四川南充人隆慶間以定逺知縣署鎮南州修建土城買置義冢地張九歌山東曹州人萬厯間任知府亷明剛斷有倚勳勢於部內誅求者力裁抑之卒不得逞後以憂去侯文才四川營山人萬厯間任知府郡人不知紡織文才始教之蠶桑勤者賞惰者罰布帛之利以興顧閔貴州清平人萬厯間任楚雄知縣年尚少性術慈厚見刑非其辜者惻然哀憐之實畝清賦平徭恤惸尋遷趙州知州尹為憲湖廣武陵人萬厯間任鎮南知州推誠孚衆戢盜興賢重修磚城為一方保障何居穀福建晉江人任府通判萬厯間署鎮南州愛民造士修學宫置祭器經書士林德之李翹四川大邑人萬厯初由雲南府通判升南安知州視民如子常均貢賦利民州人肖像偕溫可貞殷輅為三賢祠祀之溫可貞廣東東莞人萬厯間任南安知州沈毅多謀時鎮莊民施成信等乘武定之亂脅黨肆掠貞率士民設方略誅之邊境獲寧殷輅廣東博羅人萬厯間任南安知州奉母至孝風動一州尤多惠政與溫李齊名劉之範四川富順人萬厯間任廣通知縣建城郭靖盜賊舉孝行培風水涖任八載清正仁亷愛民如子三薦七奬行取評事羅廷璠江西新建人崇禎間任知府下車備詢疾苦一切與民休息興學除姦政聲大著後卒於任郡人肖像關聖祠姚安府周小卜楚莊蹻將戰死蒙氏立祠祀之漢韓説與司馬相如同開益州領弄棟蜻蛉諸縣有賢聲唐梁積慶慶一作夀髙宗咸亨間為姚州道行軍總管值姚州蠻亂討平之明戴都江西人洪武初以指揮守禦姚安姚僅土城仍唐舊制甚闊難守都撤而小之易以磚石至今恃為保障岑斌浙江錢塘人洪武間征雲南有功升姚安千户千户所公署其所營繕尤得士卒心及卒無不痛悼為之立祠髙宗壽豫章人永樂間任姚州知州剛果明鋭練達老成修祀典興學校建橋梁勤撫字升陜西鳯翔知府郡人至今思之吳潤江南武進人永樂間任知府居心平恕政治循良白鹽井滷竭課虧潤為奏豁逋課竈丁皆深德之馬自然字性之四川內江人成化間任知府誠心愛民時大石淜水散溢民不均惠乃築堤開東西二閘以時啓閉利賴實多劉昻字廷舉山東海豐人成化間以給事中謫姚州州判均徭平賦民甚德之任𢎞四川南充人𢎞治間任知府正大寬洪拓先師廟及門廡齋泮尋升左參政王嘉慶字佑之四川內江人𢎞治間任知府秉性剛果不避權勢興利除害建東西南三城甃石橋以通鎮逺蜻蛉諸渠之水民不病涉黃澍福建候官人正德間任知府開朗平恕創建棟川書院課士讀書又嘗伸理寃獄一郡頌為神明楊曰贊字堯臣江西揭陽人嘉靖間任知府剛方廉潔斷事明允時苴卻蠻荼毒民人流移者衆贊白諸當道除之又議設守備督營兵為守禦長久計尋以家難棄官歸民立石頌其功趙良華字居實四川眉州人嘉靖間以員外郎任知府亷明剛直初吏廨在府外華遷之以便防間卒於官士民悲悼王鼎字汝調河南汝州人嘉靖間以御史任知府嚴明清慎修城池飾學校禁婦女不得市易惟事桑麻立保甲以察盜賊姚俗稱治陳祥麟字伯仁福建莆田人嘉靖間任知府力清利弊鄰郡重獄未決者咸委質焉姚人頌為青天以憂去何朂字毅夫湖廣枝江人嘉靖間任知府平易寬仁修築夾口壩注水以濟大石淜之不及遂為永利王德純字一之湖廣羅田人嘉靖間以御史任知府剛明正大不事煩苛新棟川書院修儒學遷養濟院意篤士民惠周無告趙澍江西安福人嘉靖間任知府練達典故州所丁糧徭役凡舊事之偏駁者悉為釐正至祭器射圃經理井然去之日姚人遮道泣送趙恆福建晉江人嘉靖間任知府有才識尤善聽訟曲直莫逃其鑑著有春秋録疑莫相廣西全州人嘉靖間任姚州知州才敏行潔安鳯之變倡大義聚民得萬餘人晝則張旗鼓以示威至夕登陴共守夜不解帶賊憚而不敢入後升四川僉事周希尹廣西宜山人萬厯間任知府通才潔守務敦大去煩苛禮貌待人毫不假借一時土官奉法惟謹建尊經魁星諸閣修南中書院甃大石淜諸閘不費公帑不煩民力士民德之童述先湖廣沔陽人萬厯間任推官署府事自武定變後民力凋瘵述先革軍民火耗及所解公費積弊米鹽各稅減白井沙滷課五百金民困以蘇周良士湖廣邵陽人萬厯間任姚州知州坦衷潔操朴誠慈愛不輕色笑不設畛域平減差徭攘夷僰交訌之禍出姚人水火之中尤亷幹風厲不為時局所阻勘審最詳主持亦確姚人德之楊之彬湖廣麻城人萬厯間任姚州知州慈衷潔守敏才卓識省獄訟平賦役蠲苦丁復鹽市修學宫一郡利弊盡為釐舉其大者開拓城郭功尤茂著吳崇德字東臯江南虹縣人萬厯間任白井提舉慈祥不苛恤竈以完課易貝以便民竈户居民咸德之孔元德貴州威清衛人崇禎間任知府姚境地土曠逺旱潦不時各淜瀦水艱於全濟元德親行擇地捐俸添築豐樂淜聚水溉田遂增穀千餘石民生永賴後升兵巡安普道永昌府漢鄭純字長伯郪人明帝時任西部都尉為政清潔化行夷貊君長皆獻土珍頌德美天子嘉之以為永昌太守純與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斤以為常賦夷俗安之後圖形東觀曹鸞巴人桓帝時任永昌大守時黨錮甚嚴鸞乃上書曰夫黨人者或耆年淵德或衣冠英賢此宜股肱王室左右大猷者也而久被禁錮辱在囹圄謀反大逆尚蒙赦宥黨人何罪獨不開恕乎所以災異屢見水旱洊臻皆由於斯宜加原宥以副天心帝怒殺之馮灝廣漢人建和間任永昌太守政多異績三國漢王伉蜀郡人章武元年任永昌府丞有保境功諸葛亮表為永昌太守封亭侯霍弋字紹先南郡枝江人章武末為太子舍人後主踐阼立太子璿以弋為中庶子璿好騎射出入無度弋援古規諫後為參軍庲降屯副二都督又轉護軍統事如前時永昌郡夷獠恃險數為寇害乃以弋領永昌太守率偏軍討之斬其豪帥破壞邑落邊境遂得寧靜遷監軍翊軍將軍領建寧太守晉孫辨江陽人永昌郡從事太安元年上南中形勢七郡斗絶應復置寧州以相鎮慰冬十月復置寧州元段阿堅大理人以都元帥守永昌威德並著明葉學則江西德興人博雅善詩歌洪武間常應召對十八年以奉訓大夫命為永平社學師始開文教胡淵定海人掌金齒司事初李觀建郡城於太保山下觀卒洪武二十八年淵拓而上之金滄副使材俊創名宦祠淵首與焉胡琛淵子字廷貢文雅有度繼掌金齒司事興學勸農安邊勵俗父子皆有賢聲胡志琛子儀度嫻雅有祖父風正統初襲父職從征麓川提鋭卒為前鋒有功升雲南都指揮僉事尋升都督僉事還金齒在鎮二十餘年外輯內寧人民安堵陳升籍貫未詳金齒司指揮使正統十一年麓川平兵部侍郎侯璡奏調騰衝司掌印築城濬池墾闢田野軍民利之毛福夀山西人正統間任騰衝指揮通水利立社學隨征麓川擒賊子思機叛酋畏懼以功升都督同知晉南寧伯郭本字道充廣西融縣人天順間以監察御史左遷永平主簿剛直亷介拓縣治綏流夷常言永平小邑不宜冗員後召還遂上疏請裁主簿不復設嚴時泰浙江餘姚人嘉靖二年永昌初復府諸事闊略人心未安泰來為守立法定制修輯署宇綏柔瘡痍控制蠻夷撫馭卒伍勸學課士政務畢舉著有専城録一卷童蒙正銅梁人舉人嘉靖間任知府和易有為歷任九載如一日擢福建鹽運使戴希灝廣西柳州人嘉靖間任府同知愷悌亷明絶請託卻夷金興水利勤講課在任八載遷長史去行李蕭然士民泣留遮道孫衣貴州清平人嘉靖間任保山知縣杜喧寨餽送愛民而嚴吏後升雲南府同知李輻字文輿江西吉水人嘉靖間任騰越知州涖事勸敏備禦嚴整終輻之任守城者終日不敢弛其為武衛見憚類此會採寶石於猛密夷酋素聞輻威望對商人曰委官得如李公來必不欺擾我土未久去官士民思之沈祖學浙江人隆慶間任騰越知州修坊表建義倉立書院均里甲崇學校纂州志修髙崙險道善政頗多戈中和四川南充人萬厯間任知府政務安靜時緬蠻於金騰沿邊市牛鹽意在窺覘中和謂當遏其漸乃請於巡撫力禁之陳嚴之福建人萬厯間任知府亷威逺播崇重正學以破緬功升兵備道張元諭浙江浦江人萬厯間任知府亷介方正上官有索庫羡者諭以庫簿示之遂止禁火葬及婚喪奢侈挽以儉朴陳師字思貞浙江錢塘人萬厯間任知府嚴禁通夷並治材官悍戾以靖軍民操守皭然不滓宋儒四川峽江人萬厯間任府同知亷介愷悌禮士愛民征阿波堵魯凹力阻殺降去任之日士民遮送不絶楊文舉四川南充人萬厯間任保山知縣敏才雅量勸課諸生築城臺以便守禦行取給事中尋典試雲南所拔得人杜可教四川德陽人萬厯間任騰越知州清亷惠愛禦緬有功士民感之李之仁貴州人萬厯間任騰越知州先年屯徵俱衛屯官解年例科𣲖苦不可支之仁察釐宿弊條議歸州乃獲完額而民免纍董獻䇿籍貫未詳任騰衝衛參將萬厯間隴川多安民叛五年未平獻䇿隨兵備黃文炳討之身先奪寨擒其渠帥而還鄧子龍字雲卿江西豐城人萬厯間任永昌參將持重多謀慷慨任事緬人犯掠施甸焚殺極慘子龍追及於攀枝花大敗之斬景宗真以靖灣甸擒罕虔父子以開耿馬捉莽裕以平阿坡築建關城多其指畫能詩工書有古名將風鎮姚關闢清平洞平丁苴白改夷後升邊帥屢立戰功有枕戈集行世劉綎江西南昌人父為總戎綎不假恩廕自立武功萬厯間以遊擊領騰衝守備事擒嶽鳯曩烏緬人不敢窺邊招思忠莽灼逺夷傾心志在滅緬功已垂成為宵人中阻扼腕而去平播竹征關白功業甚著纍功至大帥勇略雄才推為名將吳顯忠浙江山隂人萬厯間任騰衝參將協贊漆文昌屯田之議將兵平順寧騰衝各處叛夷殱多俺平麓川其功居多陳文籍貫未詳萬厯間任騰衝衛指揮衛地歷年既久拋荒逃糧最為民纍文建議請照安寧易門等州除膏腴照舊承納外凡衝壅崩塞乾薄之地議為常年災傷折色減作三錢屯困始蘇貽惠無窮劉鼎臣籍貫未詳萬厯間任騰衝指揮僉事建八要六害之議蘇屯田積困軍人賴之鶴慶府明林遒節福建莆田人由刑部主事厯官瀘州知州正統間鶴麗土知府髙倫暴虐靖逺伯王驥奏革之即薦遒節為流官知府撫治夷民廟壇驛堡多所修建規制一新甘鳳廣東南海人正統間任劍川知州政務威嚴而待士甚厚胡信江南丹徒人天順間任知府耿介清儉有興學造士之功王珉浙江錢塘人景泰間任知府多政聲凡三載有麥秀兩岐之瑞張海山東德州人成化間以太僕卿忤中貴出為知府愛民教士卓有政績後升府尹賀從政湖廣湘鄉人先知順州成化間升廣西知府尋改鶴慶公慈平恕郡人至今稱焉劉珏四川內江人𢎞治間任知府有惠政民夷信服歲凶盜起珏捐金賑濟以活飢民盜賊由之解散致仕歸劉讓江西吉水人𢎞治間任劍川知州能除民害頌德不衰孫偉江南靖江人嘉靖間任知府威輯強暴去之日民號泣不忍離馬卿河南林縣人嘉靖間任知府修築堤壩水利均平與諸生談經講性多所造就姚大英貴州烏撒衛人嘉靖間以永昌府推官攝府事清介不染毁淫祠清吏弊人心悅服方啓念湖廣巴陵人嘉靖間任劍川知州恤民疾苦有愷悌聲越民牧貴州人嘉靖間任劍川知州以才能稱百廢備舉去任之日士民歌思桑荆初四川永寧人萬厯間任知府剛果嚴密鋤暴扶良修學之功尤著祁汝東浙江山隂人萬厯間任知府愷悌亷明先是北衙礦課纍及里甲會江盈科以恤使至汝東與謀極力丐免盈科特疏請蠲民賴休息余廷檟浙江鄞縣人萬厯間任知府革弊除姦法無假貸緩催科輕礦課民賴以蘇涖事期月以勞瘁成疾聞猾胥乘間壞法猶力疾逮治及卒百姓傷之為立哀思碑鄭恩湖廣當陽人萬厯間任府經厯惠愛及民不事敲撲諸所豎立卓然有聲李光芬四川忠州人萬厯間任順州知州性淡泊有才幹創州城社學墾田增賦有古良吏風升永昌同知陳開泰字茹連廣東三水人崇禎初以南京户部郎中任知府愷悌亷靜歲飢賑粥全活無算文廟災竭力鼎建罷羡耗卻陋規賑水災遷副使備兵威清士民遮道泣送劉璧山東夀光人任同知周知民間疾苦聽斷執法人不敢干以私以下三人年任未詳張廷俊浙江鄞縣人任同知均水利訓社童嚴寇賊惠政實多于大節北直任邱人以御史任推官清直自持涖政三年豪惡屏迹官至山東按察使順寧府明余懋學貴州人萬厯間任知府時郡初設流凡城池官署學宫祠廟錢糧賦役皆所經營裁定尋升金騰道李忠臣貴州永寧人貢生萬厯末任知府立政寬大節儉持身而樂於施與治迹與余懋學媲美郡人建余李二太守祠祀之永北府元章吉特穆爾麗江人從世祖征大理屢戰有功賜名特穆爾升北勝知府兼管麗江宣撫司事撫治有方民夷咸服髙祥斌字廷理大理人任北勝知府明玉珍寇境斌率兵破之生擒品甸偽王以功升雲南行省中書右丞麗江府明髙賜鶴慶人元為義兵萬户洪武間歸附從征佛光寨招諭未附者輸金助餉授通安州同知有惠政夷民德之蒙化府明蘇海鎮太和人洪武間以經明行修辟授蒙化學正忠信化俗劉童福建人永樂間任蒙化知州以惠政為夷民感慕許尚陜西人萬厯間任府同知清慎嚴明愛民禮士繩姦緝吏境內肅然劉作沛廣西馬平人萬厯間以提舉署府事置田養士易里甲為條編蒙民便之閔廷桂湖廣常德人萬厯間任知府仁心仁政尤多材藝吏畏而民懷之段銓陜西臨洮人崇禎初任定邊知縣廉潔剛方博治經史憫邑文教未興廣勵不倦去任之日行李蕭然士民感之景東府明張吉餘干人成化間以工部郎中疏劾李孜省及僧繼曉等上怒謫景東通判景地居雲南絶徼俗鄙戾吉教以禮義民有罪者薄責之約無再犯土知府見吉不攜家欲為置妾不聽遺以銀器復不受心敬吉遣其子棨就學由是夷民嚮慕漸有中土之化吉益自勵作慎獨窮理改過求仁四針置座右忘其身之在蠻也忠烈附總部元仁通多爾濟之子至順元年正月雲南諸王與萬户伯忽等叛仁通率官兵拒之殁於陳馮文舉四川什邡人初舉鄉試授漢川學正達嚕噶齊燕僚佐以一手致酒舉不受隱去次科登進士第任雲南儒學提舉至元間明玉珍攻雲南城將陷文舉謂其妻曰某受國恩愧不能退賊今有死而已爾光州馬中丞孫女也其從之乎馬曰夫以義亡妾生何益遂焚香北面拜俱縊於學宫巴咱爾斡爾密梁王明師入滇達爾瑪既敗王聞之奉其母嘉僖率妻和托沁等百餘人乘舟趨昆明池謂行省右丞魯爾等曰我宗室無降理仰藥死妻子皆死之婁爾塔坦蒙古人雲南行省右丞既進毒於王即自殺從死者幾二百人明方政全椒人正統間官左都督麓川思任叛陷騰衝據潞江朝廷命黔國公沐晟率政等討之思任斷江立柵師不得渡政造舟六十艘破其柵斬首三千餘級逼思任於上江而諸軍無繼之者頃之夷兵四集政以旗牌求救不至乃遣其子瑛曰汝急歸吾死今日矣瑛牽裾不釋政拔劍叱之乃躍馬突陳賊為披靡馬躓為賊攢刺而死事聞贈威逺伯諡忠毅時都指揮同知顧勇陳翊侯義江洪等皆同時戰死徐樾字子直江西貴溪人嘉靖間任左布政元江那鑑叛尋詐降撫臣以大吏往撫樾行被殺贈光祿卿張澤字義甫江南桐城人嘉靖間以兵備道督兵討鳳繼祖敗績被執罵賊而死贈光祿寺少卿周士昌四川內江人崇禎間任左布政土酋普名聲叛巡撫王伉疏請會剿令士昌監軍遇伏發力戰死朱永吉字飛之廣西桂林人精天文術數初客黔投傅宗龍幕中安邦彥圍黔永吉解圍有功後隨宗龍至滇崇禎間滇撫王伉討普名聲題授遊擊屢破賊衆為名聲所憚後因吾必奎通賊永吉身被重傷伏發力戰死偏將趙能馮忠葬於路側趙能亦自刎事平題請廕一子世襲百户羅國巘四川宜賓人崇禎末任巡按沙定洲陷省城不為屈行法自如流寇至國巘巡視被執至省縱火自焚死朱壽宗室崇禎末以部院徵兵雲南孫可望至曲靖被執不屈械繫二十餘日強以官復大罵不食可望殺之題詩於壁云丈夫徑骨傲千秋青史丹心一片留金碧有磷隨我化江山多故倩誰收煙塵已暗中原路風雨仍翻徹夜愁寧使忠魂歸見帝肯教含垢對深讎與僕三人同遇害楊畏知陜西寶雞人崇禎庚午解元特授金滄副使土酋吾必奎叛陷定逺畏知奉檄來援遂駐節楚雄繼值沙定洲陷省城沐天波西走定洲追至援兵潰散畏知募民為兵雖在倉卒而措置得宜間出兵勝之兩年之內沙賊環攻者百次畏知坐城樓賊發巨炮擊中冠幘不為動賊疑為神解去後孫可望至迤西畏知率民兵禦於獅子口兵敗赴水為可望兵所得素重其名願共事討賊迤西得免屠戮畏知力也後竟以忠直為可望所殺楚雄立祠祀之本朝閏洪標河南人任提標前營遊擊康熙十九年在安南衛沙子哨與吳賊對敵奮勇先登以身陷賜恤陳而死事聞廕林宗珍福建人任提標後營遊擊與賊戰於安南衛沙子哨奮勇衝鋒被飛石中其額遂歿於陳賜恤事聞廕魏翥國字爾臣昆明人從定西藏剿魯魁平法戛歷任督標中軍副將雍正八年烏蒙祿萬福叛奉檄援東川途次為萬福之叔祿鼎明刺傷左股負創馳保東城時已報升臨元總兵矣旋以創劇賜祭還省遽卒事聞葬贈恤廕一子分部雲南府明蘇夢㿩籍貫未詳萬厯間任祿豐知縣時鄭舉等叛從武定寇祿豐夢㿩率民兵力戰至元旦方朝服祝釐賊衆擁至被執不屈死之男萬民為父上疏贈光祿寺少卿廕子立祠龍旌趙州人萬厯間任嵩明州學正武定賊陷嵩明被執罵賊而死贈國子監博士韋宗孝籍貫未詳萬厯間任嵩明州吏目楊禮等攻嵩明城陷宗孝闔門死之詔贈本州同知廕一子入監王信四川宜賓人崇禎間任呈貢知縣普名聲叛鎮撫令信為監紀敗績罵賊而死事聞豫贈廕夏祖訓字仲有浙江秀水人崇禎末任呈貢知縣流賊破城死之本朝髙顯宸直𨽻灤州人康熙九年任知府立品剛方涖治嚴肅吏胥不敢肆其姦吳逆叛抗節不從遂杖於市戍永昌衛服毒而死事聞贈太僕寺卿廕一子入監時同知劉崑江西南昌人亦以抗節不從同受杖戍騰越恢復後以原官起用曲靖府明郭俊義山西平陽人萬厯間任陸涼知州涖政嚴明苞苴屏絶有膽力天啓間設科入境焚劫俊義率鄉勇家丁禦之歿於陳周嘉映字伏龍中衛人天啓間以武舉署霑平守備值霑益諸蠻謀不軌時正發兵援蜀嘉映以密書告變謂藺州之患逺在千里霑益之患近在目前宜早為之備語泄蠻深恨之後從參將尹啓易討賊馬躓為賊所害焦潤生字茂慈江南上元人崇禎間任知府流寇陷城不屈而死臨安府明邵鑑江南夀州人臨安衛左所百户正統間征上江刀招罕寨力戰死於陳遊大勳江南婺源人崇禎間任府通判好士恤民以才略著普名聲叛大勳督土舍王顯祖及郡人趙定周往禦營壘未立賊突至土兵奔潰勳正色當之遂遇害定周亦死之朱家梁江寧人崇禎間任寧州知州沙普焚劫罵賊殉難單國祚浙江會稽人崇禎末任通海典史管本縣驛務值沙逆兵破縣城坐堂上持印罵賊被殺既死而印猶在手握拳透爪縣人葬於諸葛山下陸九衢保山人任嶍峩訓導丁亥流寇攻破縣城九衢衣冠坐明倫堂罵賊遇害本朝郭維賢籍貫未詳任阿迷州吏目康熙四年祿昌賢叛兵掠布沼維賢奉命往撫賊衆劫之罵賊而死武定府明袁俸四川人任府同知嘉靖間值鳯朝文之亂一門全節以殉秦健廣西馬平人任祿勸知州鳯朝文叛健監守汛地賊攻圍急遂遇害常存仁府教授髙心府知事張成府照磨劉瑀祿勸州吏目俞伯官巡檢俱以上五人籍貫未詳死鳯朝文之難金守仁指揮王應爵魏守恭張斗俱千户萬厯三十五年阿克鄭舉叛城陷俱死之立義烈祠祀焉楊于陛四川劍門人任府同知善談理學建書院於署左每延士子課文講學崇禎四年普名聲叛巡撫王伉令陛為監紀賊破營死之髙其勳字懋功馬龍人武舉襲指揮以才能升沐鎮中軍吾必奎反授參將命守武定後沙定洲叛攻武定勳竭力守禦城陷仰藥死廣西府明徐道興河南睢陽人崇禎間以都司經厯署師宗州性廉潔不受民一錢郡多逋賦道興激勸有方積逋皆完聞流賊屠曲靖嘆曰力薄兵微不能抗賊吾死分也爾士民何罪而罹此慘乎各率家逺避勿顧我士民欲道興同行興厲聲曰社稷之臣死社稷封疆之臣死封疆吾志決矣言罷鬚眉奮張衆皆泣去左右止一僕以白金二錠囑之曰白金二錠囑之曰此朝廷俸物也念汝勤苦多年以一酬汝其一俟以一酬汝其一俟賊退置棺斂我僕擲金大哭力請從死歷一日夜哭力一請日從夜死忽見塵起興曰賊至矣爾不即去我與爾皆無遺不即皆去無我遺與骨爾之過也僕叩頭泣血狼狽出城賊闖入中堂興大罵賊猶迫其出迎賊首興愈怒以手中酒杯擊賊曰吾朝廷命官豈從賊求活者耶罵不絶口遂遇害元江府本朝沈洪浙江人新平縣典史署揚武壩巡檢事雍正十年猓賊叛竭力堵禦被殺丁珏浙江人原任揚武壩巡檢丁憂解任委管青龍厰務猓賊叛圍困不屈死之王昌陜西寧夏人撫標千總擊猓賊於喇博坡歿於陳汪自貴四川華陽人督標把總擊猓賊於阿者奮勇赴敵死之洪先開化府人臨元鎮把總與賊戰於户東山後歿於陳以上五人事聞俱賜祭葬贈廕賞恤有差威逺本朝劉𢎞度湖廣廣濟人任威逺同知雍正五年夷賊叛死之事聞賜祭葬贈廕賞恤昭通府本朝劉鎮寶江西彭澤人任烏蒙府通判雍正八年逆夷祿萬福叛陷府城死之陳天錫本姓龎會稽人任烏蒙司獄祿逆之叛見鎮將不戰憤願捐軀妻張氏請先死手刃之遂自刎劉懋美陜西金縣人任烏蒙府知事祿逆叛亂遇害賽枝大山東青海衛人署恩安縣與劉鎮寶同死事葉祚徽浙江人任烏蒙魯甸巡檢與劉懋美同死事李焜昆明人康熙戊子五經舉人任烏蒙府教授慷慨有才幹凡修學建城均田上官皆委任焉祿逆之變死于學宫劉崑字玉巖四川保寧人屢立戰功歷任東烏鎮遊擊祿逆之叛崑力禦敗之次日賊大至衆寡不敵血戰逾時體傷力竭遂血書詩一首於壁而死有淋漓鮮血透征衣報國丹心總不移之句妻張氏聞變手刃二女同妾自殺止遺三歲孤子馬秉倫陜西寧夏人任東烏鎮遊擊祿逆之叛挺身擊賊歿於陳楊天階開化人任東烏鎮右營守備同劉崑拒賊于阿堡户後以救護總兵劉起元陳亡李發早昆明人武舉任東烏鎮中營千總同劉崑拒賊于鐵爐山小天底隨救劉起元陳亡邰士竒陜西人任東烏鎮千總駐防魯甸聞祿逆之變即調土兵協官兵赴郡救援土兵與逆夷通羣起圍之士竒力戰不支跳巖死馮志英昆明人任鎮雄營把總奉調赴烏考驗值祿逆叛同劉崑拒賊隨救劉起元陳亡周世美籍貫未詳任東烏鎮右營把總隨馬秉倫忿激殺賊歿於陳張必𢎞威寧人東烏鎮左營把總祿逆之變護守鎮署賊攻圍勢急出署衝殺陳亡王國卿尋甸人魯甸外委把總隨千總邰士竒赴援力戰不支跳巖死以上五人俱賜題請贈廕賞恤有差祭葬普洱府本朝章倫浙江紹興人試用州同雍正十年委辦攸樂城工事竣回至慢蚌村值猓夷叛被圍倫正坐罵賊遂被害陳天申湖廣武陵人普洱鎮把總猓賊叛戰於通關哨死之以上二人事聞賜祭葬贈廕賞恤有差大理府明蕭時顯崇禎間任府同知加意民瘼留心政治任滿因道阻寄寓大理沙賊破城自縊段見錦任府教授沙賊陷城死於學宫魏崇治任府司獄沙賊陷城死之楊明勝任府經歷沙賊陷城同子一甲死之王士傑任太和縣丞有治才沙逆圍城盡心捍禦死於城上以上五人籍貫俱未詳楚雄府元董文彥通海人天厯間任威楚路知事中慶鎮將敗狐叛攻威楚官吏皆遁彥獨死守城陷被執罵賊不屈賊截其耳啖之彥嚼血噴賊遂遇害事聞賜諡莊愍廕其二子茂春為通海教諭時中為祿豐主簿姚安府明田本山西太原人洪武間任姚州知州行已剛方聽斷明決夷賊自久等叛死之永昌府明李朝籍貫未詳任把總萬厯間討緬寇戰死巡撫陳用賓檄建忠義祠祀之劉廷標字霞起福建上杭人崇禎末任府通判署府事流寇入滇傳檄永昌廷標賦詩畢從容自縊而死王運開字子朗四川峽江人崇禎末任推官署金騰道流寇至滇運開與劉廷標謀守瀾滄江拒賊時迤西震動人心已散乃與廷標對酌歸即自縊死其弟運閎隨兄至永時走騰越聞兄訃同劉廷樞赴永殯殮如常弔者哭閎曰此吾輩布帛菽粟事何哭為尋寇脅官閎閎走潞江至中流出手字一行付僕曰吾兄弟豈可作兩樣人耶躍入江死讀其字曰得我骨同吾兄合葬題曰峽江兄弟之墓數日得尸沙岸顔色如生鶴慶府明陳敬廣東增城人洪武十四年舉賢良官禮部郎中左遷雲南曲靖府經歷署劍川州事鄰寇來攻力戰死雲南通志卷十九
