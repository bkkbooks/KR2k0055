body:
  text: 雲南通志卷二星野附氣候善言天者必有驗於人固已而學士大夫每難言之豈非以人道邇天道逺非所知耶滇之星野諸家聚訟紛紛自唐一行井鬼之論與班氏符而何承天郭守敬劉基皆守之亦可謂定論矣天下事非有確知灼見而偶據傳聞遂生異説豈往聖郭公夏五之意乎兹於躔度分杪悉依前志所載至於氣候寒煖則因地勢為移易可考而知也因附書焉志星野井宿步天歌井八星近列河中靜一星名鉞井邊安兩河各三南北正天罇三星井上頭罇上横列五諸侯侯上北河西積水欲覓積薪東畔是鉞下四星名水府水府東邊四星序四瀆横列南河裏南河下頭是軍市軍市團圓十三星中有一箇野雞精孫子丈人市下列各立兩星從東説闕邱兩箇南河東邱下一狼光蒙茸左畔九箇彎弧弓一矢擬射頑狼胷有箇老人南極中春秋出入夀無窮鬼宿步天歌鬼四星冊方似木櫃中央白者積屍氣鬼上四星是爟位天狗七星鬼下是外厨六閒栁星次天社六箇弧東倚社東一星是天紀井鬼躔度攷東井八星輿鬼四星南方朱鳥七宿之首與目也按古厯法井宿赤道三十三度三十一分黄道三十一度三分鬼宿赤道二度二十分黄道二度二十一分本朝厯度井宿三十一度鬼宿五度皆屬未宫漢天文志起井十六度唐志起井十二度晉志與費直皆同唐志蔡邕起井十度明起井九度一十八分四十一杪本朝起井初度葢以赤道分天之中亘古不易黄道為日月五星之常道不能不因嵗差而變易也論分野者惟以赤道為準井鬼之星於分為秦於野為雍梁二州為巨蠏宫為鶉首未宫井宿則雨水昏中鬼宿則春分昏中北極出度攷雲南北極出地二十二度四時之日皆出卯入酉其間微分初刻正刻耳與京師出寅入戌出辰入申之不同者以京師北極出地四十度强故也雲南表景度分春分四度五十一分夏至十九分秋分與春分同冬至十二度十三分井宿昏旦攷鬼宿同六月旦在卯七月旦在辰八月旦在巳九月旦在午十月旦在未十一月旦在申十二月旦在酉十一月昏在卯十二月昏在辰正月昏在巳二月昏在午三月昏在未四月昏在申五月昏在酉星野攷辨周禮保章氏以星土辨九州所封之域其後星經散亡惟漢地理志載分野始詳而鄭康成十二次之分大率因之晉天文志云班固取三統厯以十二次配十二野及費直周易分野蔡邕月令章句後魏太史令陳卓定羣國所入宿度固已詳言之矣而舊志載滇分野雜引星經卒無定論其曰太白主益州葢太白秦分神主華岳華山屬少隂萬物由此而化生故金星位焉又少昊為白帝治西岳上應井鬼之精下鎮秦之分野故天官書曰秦之疆也候在太白太白主秦晉巴蜀羌髳諸國梁雍以西之地皆屬焉是太白主益州之説葢通秦蜀而言非専為滇言之也又曰北斗第二星主益州星經以五亥夜候北斗第二星乙亥為漢中丁亥為永昌己亥為巴郡牂牁辛亥為廣陵癸亥為犍為觀象玩占曰北斗一星主秦二星主楚三星主梁四星主吳五星主趙六星主燕七星主齊則北斗第二星非専主益州分野明矣司馬遷曰觜觿參益州東井輿鬼雍州班固則曰秦地東井輿鬼之分其界盡於西南牂牁越巂益州固去遷未逺若以史遷之言為然不當輒有異同而唐志亦曰東井輿鬼鶉首也西南盡犍為越巂益州之地東至牂牁則滇之當主井鬼已有確據而志滇者猶以迤東為觜參迤西為井鬼得非襲乎星經之説而未攷乎分野之實耶夫分野之定起於井鬼唐一行以山河兩戒論星野謂南河北河分夾東井為天之闕門主闗梁所以界天之南北也故北河曰北戒為北戌衡星南河曰南戒為南戌權星兩戒之間七曜之中道出焉春分昏中兩河當於午位就此時之中星觀之井在赤道之北黄道經其内恰值嵩髙之上以是知天之髙者惟北辰而井與北極最近地之髙者惟崑崙而秦蜀滇與崑崙為近故定分野者必以此為準矣又天漢經井自井而向西北參觜次之畢昴次之婁胃奎璧室又次之此由西北而漸下之大略也自井而向東南南河次之輿鬼弧矢次之栁星張翼軫又次之此由東南而漸下之大略也故天官家以黄河内外水之歸東海者為北河以長江内外水之歸南海者為南河因水勢南北分合為星野南北所主此又自天漢而斷之也夫南河北河兩星列井南北於此求之秦在西北則黄道所經之井即秦分野蜀在秦西南則近參之井即蜀分野滇又在蜀之南則近鬼之井即滇分野是滇在井鬼之間明矣且天狼弧矢在井鬼南主南夷之地占南夷者必於狼則志滇分野者亦必於井鬼此又象之可據者也雖天道渺茫非可臆測而以雲漢與地勢揆之亦概可識矣世有甘石當必辨之又考四川成都井鬼分野入參一度順慶參井松潘疊溪觜參東川屬參今東川改𨽻雲南則以南詔次鶉首之位推之滇之迤東連參入井迤西則連井入鬼云氣候附雲南全省滇南地列坤隅得土冲氣省會之區地勢開濶四時協序氣候尤和環拱之澂武楚姚諸郡無祁寒溽暑大略相同兩迤迢隔寒熱各殊北鄙風髙故麗江大寒有長年不消之雪南維地下故元江大熱有一嵗兩穫之禾普洱鎮沅時有炎蒸瘴癘鶴慶永北亦多飛雪嚴霜至迤東之曲靖東川昭通較省會為寒開化臨安廣南廣西較省會為熱迤西之順寧䝉化景東則微熱大理永昌則微寒雖有不齊非甚懸絶諺云四時多似夏一雨便成冬可因是以知其概云雲南府岡巒環繞川澤渟泓溝瀆通流原田廣衍風雖髙而不烈節雖變而長温所屬州縣約略皆同曲靖府土曠風多霜繁霧重氣候微寒榖宜晚稻臨安府四序恒温不裘不葛至河底沿江則炎熱如蒸夏秋有瘴雖屬郡治氣候大殊澂江府地鄰省會土厚川平氣候温和無大寒暑武定府氣候之和差類首郡惟所屬元謀縣炎熱有瘴與府頓殊廣西府山曠多風氣燠少雪花木長茂禾黍並登廣南府地少雪霜山多嵐霧三時瘴癘至冬始消氣候頗類元江元江府地多瘴癘沿江炎熱雖届隆冬猶如春月離城髙處即覺微凉一郡之中氣候頓别地宜耕種一嵗再收開化府春夏多炎隆冬無雪較元江差覺平和鎮沅府初春即熱隆冬不寒山嵐瘴癘亦時有之東川府四序寒而多風夏月積雨即類初冬至碧谷壩小江可可江邊則又大熱有瘴昭通府風氣之寒較甚東川灌溉不乏流泉而種植最防霜霰榖宜晚稻多藝荍麰普洱府地處炎荒山多溽暑雪霜罕見嵐瘴時侵大理府蒼山積雪盛夏難消洱海長風春冬更烈地髙氣涼近郡皆然惟賔川彌渡則勢就平夷煙村稠宻炎熱倍甚物産較多楚雄府山髙野曠土厚風和四氣同功最宜穀麥惟西北微寒東南微熱又稍異焉姚安府四氣和平寒暄不極雲開日暖雨過風涼然土氣瘠薄六榖之餘不滋他産永昌府山川曠逺原隰寛平氣候温和土宜禾稻至風髙雨涼與大理無異鶴慶府山髙多雪氣肅風寒一雨即冬盛夏無暑厥土稍薄物産無多順寧府寒燠不齊沿江多熱平壤則和水温土厚五榖易成所屬雲州則地氣炎蒸時有嵐瘴永北府壤接吐番地髙風冷三冬多雪盛夏始温順州永寧氣候略似麗江府地近吐番多寒少熱夏猶積雪不産禾稻頗有邊塞之氣蒙化府土厚風和霜雪少侵種植易茂但泉源不廣灌溉難周糓惟荍麰易熟景東府地僻林深氣頗温燠霜雪希有草木不凋雲南通志卷二
