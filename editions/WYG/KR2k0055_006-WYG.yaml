body:
  text: 雲南通志巻七學校附書院書籍義學滇南建學肇自漢時張盛受業長卿尹許執經中土滇之文風由此漸啟然地居天末百蠻雜處椎魯寡文即向者志學之士家鮮藏書欲其博綜今古窮源探本勢有未能我朝聖相承敦尚正學尊崇先師追王五代俎豆馨香教澤洋溢西南學者益勃然奮興思誦法聖賢講肄經術而節制重臣廣宣徳意復置四庫書於華山書院俾得肆力討求今皇上又加意膠庠優恤師儒増其品秩以隆表率且諭學者濯磨文體必衷理道自茲以往士將明體達用蔚為國華金碧蒼洱之區不且彬彬然追踪鄒魯矣乎志學校書院義學書籍附焉後漢章帝元和中蜀郡王追為益州太守政化尤異有神馬四匹出滇池河中甘露降白烏見始興起學校唐元宗開元三年盛邏皮立孔子廟於國中元世祖至元十九年命雲南諸路皆建學以祀先聖二十九年四月設雲南諸學校以蜀士充教官先是至元六年中書省定學制頒行之命諸路府官子弟入學上路二人下路二人府一人州一人餘民間子弟上路三十人下路二十五人願充生徒者與免一身雜役以譯寫通鑑節要頒行各路俾肄習之成宗大徳五年定生員散府二十人上中州十五人下州十人元貞元年命有司割地給諸路䝉古學生員廩餼明洪武十八年令雲南所屬生員有成材者從便選貢永樂十年雲南左叅政吕明善請設武定尋甸廣西三府學從之上曰學校風化所係人性之善蠻夷與中國無異特在上之人作興之耳六月癸亥賜國子監琉球國雲南四川官民生懐得等一百三十六人夏布藍衫靴縧正統二年増雲南儒學師生廩米十年令提學官教官考選生員年四十以上不諳文理者廩膳十年以上送吏部六年以上送附近布政司増廣十年以上送本布政司直𨽻送本府俱充吏六年以上竝鄙猥殘疾者悉黜為民雲南貴州免考十四年令揀選軍戸送學習武舉業景泰二年令雲南貴州軍民生兼考補廩膳照例科貢天順六年命廷臣舉有學行者提督學校以邵玉任雲南學政成化十七年設廣西府學隆慶二年設武定府學萬厯四年定廣西四川雲南等處凡改土為流州縣及土官地方建學校者令提學嚴查果係土著之人方准考充附學不許各處士民冒籍濫入本朝順治十八年准雲南省土司應襲子弟令各該學教訓俟父兄謝事之日回籍襲職其餘子弟併令地方官擇文理稍通者送提學考取入學先是順治四年直𨽻各省分大中小學大學取生員四十名中學三十名小學十二名又定直省各學廩生府學四十名州學三十名縣學二十名衛學十名増廣生額數同九年定每鄉置社學擇文義通曉行誼謹厚者充補社師免其差役量給廩餼優贍提學按臨查考又題准刋立臥碑置明倫堂之左永為遵守至十五年定童生額數取進大府二十名大州縣十五名小學四五名康熈六年設開化府學竝教職九年定各州縣童生中學十二名小學七八名二十二年定雲南土司子弟竝土人應試附於雲南等府三年一次共考取二十五名二十五年以社學冒濫令提學嚴行查革五月頒御書萬世師表匾額於學宫三十一年設師宗雲州新平定邊元謀五州縣教職增馬龍州寧州呈貢縣入學額照中學例取進十二名三十四年頒御製先師孔子及顔曾思孟贊於學宫立石四十一年頒御製訓飭士子文於學宫立石五十三年詔天下學宫升朱子木主於十哲之次五十五年進宋名臣范仲淹於先儒之次雍正元年崇封至聖先師五代王爵各直省府州縣建崇聖祠二年六月增雲南各州縣歳科試取進文童額數昆明宐良南寧通海河西河陽太和浪穹保山楚雄十縣安寧晉寧尋甸建水石屏新興趙州鄧川劍川騰越十州各五名呈貢蒙自雲南三縣陸涼霑益寧州阿迷賓川五州各三名和曲州四名黑白琅三井准其設學俱照小學例各取進八名分定遠縣訓導駐黑井大姚縣訓導駐白井姚州訓導駐琅井増祀明儒羅欽順本朝儒臣陸隴其於東廡先儒之次三年十一月詔天下地名姓名有同至聖先師諱者即改為邱字讀作期音十二月頒御書生民未有匾額於學宫設威逺同知取進童生額數二名未設教職附元江府學考課五年設東川昭通府鎮雄州永善縣教職取進童生額數東川昭通各十名鎮雄永善各八名七年設普洱府學分元江府訓導駐其地取進童生八名雲南府廟學在五華山右元至元間總管張立道建兼置學舎平章沙木斯迪音拓之後廢明洪武初西平侯沐英因舊址建廟學景泰間巡撫鄭顒建成徳達材二坊天順五年都督沐瓚以次興修𢎞治十五年巡按何琛建講堂聚奎樓増置號舎嘉靖十年建啓聖祠敬一箴亭及視聽言動心五箴碑萬厯元年巡撫鄒應龍鑿泮池十八年知府易以㢲重修殿廡四十年巡按鄧渼提學黄琮以縣學廟附於府四十三年巡撫周嘉謨提學張䦔遷建明倫堂崇禎元年知府王紹旦建文昌魁星二閣丁亥燬於兵遷建於長春觀本朝康熈二十九年總督范承勲以規制未協同巡撫王繼文請仍改建今地合府縣廟學為一始置祭器樂器悉依闕里規制三十四年巡撫石文晟建御製至聖先師及四配贊碑亭五十八年教授侯以璋建魁星樓易舊魁樓為桂香樓祀文昌雍正四年總督鄂爾泰増備祭器十二年總督尹繼善巡撫張允隨督學呉應枚布政使陳𢎞謀重修并易琉璃瓦添備祭器樂器昆明縣廟學舊在府學西北𢎞治十六年巡撫林元甫巡按陳天祥建嘉靖十七年巡撫汪文盛以地卑濕遷於府學東南萬厯四十年合於府宫本朝康熈二十三年總督蔡毓榮請以呉三柱偽殿改建廟學二十九年復附府廟富民縣廟學在縣臥雲山麓舊無學附於羅次明萬厯四十八年知縣韓位甫請專設學校天啓二年巡按楊春茂題建移府學訓導一員董之崇禎中設官建廟於郭外丁亥燬於兵本朝順治十八年知縣李展翮於縣治内西北建廟竝啓聖祠康熈二十一年諸生楊繩祖等呈請遷於察院之廢署殿廡門坊一新四十七年知縣謝天璘復詳請改建今地雍正十二年知縣楊體乾重修増置祭器樂器宜良縣廟學在縣治正南雉山明𢎞治間始設學正徳四年知縣余志剛建廟於城西教場之左萬厯八年知縣沈昌印改建城東北天啓四年知縣楊述明遷今地本朝康熈六年知縣趙映斗教諭馬任大建啓聖祠及鄉賢名宦祠旋遭兵燬二十八年知縣高士朗教諭王佐才增修大成殿兩廡啟聖祠魁星樓及左右齋房五十五年署縣黄澍移左丈許重建大成殿雍正十一年知縣朱干重修羅次縣廟學在縣東北隅明萬厯二十一年巡撫陳用賓始請設學遂於邑西北隅建廟年久傾圮本朝康熙六年知縣李澦訓導陳起鯤遷於縣東羅陽書院就舊宇修葺三十二年知縣彭䡄移建今地三十八年知縣梁衍祚増修置俎豆樂器四十八年知縣謝曾祚重修竝移魁星閣於左雍正八年知縣任溫増建桂香閣於右晉寧州廟學在州治南明洪武十六年建廟於州治北之陽城堡正統七年遷今地𢎞治十七年知州喻敬鑿泮池丁亥燬於兵後署州錢象坤知州謝正及通庠重建本朝康熈四十一年知州秦采改建大成殿啟聖祠五十二年署州任中宜増修鑿池樹坊規模始備雍正十二年知州鄒永馥重修呈貢縣廟學在縣治東北明𢎞治七年建嘉靖二十二年知縣何溫遷於學基之左明末兵火僅存大成殿本朝康熈二年知縣趙申禧仍遷舊基四十三年知縣劉世熼重建規制悉備雍正九年教諭趙公亮重修安寧州廟學在州治北元大徳中建隨因兵燬明永樂元年知州李智明重建宣徳中土知州董福海重修後復燬修本朝康熈八年知州張在澤學正張經世同紳士建雍正五年州紳士建魁星閣十二年署州鄒永馥重修禄豐縣廟學在縣郭外西山麓舊無學附於安寧州明隆慶元年邑人王昱始捐貲建學於縣治之北萬厯閒燬於兵學道黄廷寳守道汪克用遷建今地復為土酋焚燬本朝康熈十一年知縣郭迪階訓導楊芳魁重建雍正二年知縣魏寳國建崇聖祠五年教諭董昌建魁星樓鑿泮池十一年知縣陳齊庶重修昆陽州廟學在州治南明永樂元年建於月山左𢎞治十五年災正徳二年知州林昕即慈照寺改為之萬厯元年知州潘槐改建寳山門外十三年知州紀汝中改建拱極門外李官村天啟六年知州陶學修遷鳳儀山左崇正七年巡按姜思睿建造新城署州事本府通判王允中移建州治後旋遭兵燬本朝康熈元年知州童復晊仍治舊城遂建於今地五十一年署州劉自唐拓址重建五十五年署州王克剛建東廡五十六年知州何大寵建西廡雍正四年知州臧珊建大成門名宦鄉賢祠五年署州李文炯修魁閣八年知州劉際平建崇聖祠易門縣廟學在縣治東明萬厯二十五年廵撫陳用賓題建旋以地勢卑狹改遷城南三十三年仍移於舊址明末兵燹傾圮殆半三本朝平滇後知縣李元禄訓導呉紹玉重修康熈十四年知縣姜其垓拓地重建嵩明州廟學在州治北黄龍山元至正閒建於州治西明嘉靖中知州狄應期遷於黄龍山右萬厯中知州余化龍遷於宗鏡寺前明末傾圯知本朝康熈九年學正李攀龍建黄龍山左四十年州馬絳遠建啟聖祠四十二年知州雷御龍改建魁星閣明倫堂五十七年知州汪煚建尊經閣雍正十一年知州張浩移建今地規制悉備曲靖府廟學在府城東門内水閘口明洪武十七年建永樂景泰間先後重修萬厯七年巡按劉維建進賢樓明末悉燬本朝順治十七年教官楊克猷李維鉉改建於舊衞基址康熈四十年知縣胡麟徴移建水閘原址知府周元功胥琇總兵陸進忠率紳士重修四十六年知府張道源樹左右坊建魁星閣五十年總兵馬天寵知府李雯建文明坊鑿泮池雍正五年總督鄂爾泰重修十三年知府王雲銘同知孫光祖署縣張浩倡建魁閣於東南隅南寧縣廟學附府廟霑益州廟學在州治南州舊在今之宣威明嘉靖二十八年巡撫顧應祥巡按林應箕建於舊州治南天啟七年移州治於交水建今地後遭兵燬十本朝康熙六年知州王作楫學正黄世椿修復五一年知州呉節民率紳士重建雍正十一等年知州杜思賢金文宗先後重修陸涼州廟學在州治西舊衞址明嘉靖二十一年建於衞左歲久傾圯本朝康熈八年署衞守備張名弼教授栁志沈遷今地五十五年知州杜珍移近南數十武以大成殿為崇聖祠雍正十二年知州呉柄重修置祭器樂器馬龍州廟學在州治南明嘉靖二十一年建於州治西南歲久傾圯本朝康熈六年知府李率祖重修雍正三年知州黄士傑改建今地以舊大成殿為文昌宫雍正十二年知州周銓建崇聖祠魁星閣羅平州廟學在州治東南隅明萬厯十五年府同知黄宇建州治北後燬於兵本朝康熈七年知州王𢎞勲學正尹嗣陟即其址重建十一年知州張偀復修增置祭器三十一年知州孫士正始遷今地三十九年知州張含章建啟聖祠及明倫堂尋甸州廟學在州治西北舊為府學明正徳九年知府戴鰲建嘉靖六年燬於兵十一年遷於府治南隆慶二年復遷於府治東北遷本朝康熈八年改府為州四十年署州任中宜改於城西玉屏山麓五十二年地震傾圯雍正三年知州崔乃鏞詳請遷建於西北舊址置祭器樂器十三年知州陳齊庶重修平彞縣廟學在縣治左即舊平彞衞學明正徳九年建衞治右本朝康熈七年總督卞三元遷建衛治左二十七年裁衞歸府改為書院三十四年設平彞縣改為縣學三十八年知縣任中宜増建啓聖祠明倫堂竝門坊學舎宣威州廟學在州治南倉坡州舊有霑益州學久圯題本朝雍正五年設州八年巡撫沈廷正建臨安府廟學在府治西元至元二十二