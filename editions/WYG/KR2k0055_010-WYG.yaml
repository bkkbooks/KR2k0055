body:
  text: 欽定四庫全書雲南通志卷十一課程鹽法税課錢法厰課夏書任土作貢梁紀銀鏤不載鹽絺草昩初開固多遺利滇屬梁州之南鄙井産鹽山産五金雖舟楫不通牽牛服賈者往往叩闗而至於是定為經制以佐邦用豈非因天地自然之數而整齊利導之者歟夫水土金穀互有盈虛惟人事能補造物之偏而後利用厚生交相資藉而不匱今恭逢聖聖相承仁民育物足以感召天和比年來醴泉出而瑞穀生山澤饒而礦金裕地不愛寳人不愛情誠大順之休徵也奉宣德意者視物産之滋息察羣情之趨嚮為之調劑變通以宜民而阜用斯美利溥於無窮矣志課程鹽法漢越雟郡定莋縣出鹽蜻蛉縣有鹽官益州郡連然縣有鹽官見漢書地理志及南中志後漢越巂郡定莋縣有鹽坑積薪以齊水灌而後焚之成白鹽見後漢書郡國志注鄭純為永昌太守與哀牢夷人約邑豪歲輸布貫頭衣二領鹽一斛以為常賦夷俗安之見西南夷傳三國漢昭烈帝定益州置鹽府校尉較鹽鐵之利見蜀志唐南詔覽瞼井産鹽最鮮白惟王得食取足輒滅竈昆明城諸井皆産鹽不征羣蠻食之見南蠻傳元文宗至順二年雲南行省言亦乞不薛之地所牧國馬歲給鹽以每月上寅日啖之則馬健無病比因伯忽叛亂雲南鹽不可到馬多病死詔令四川行省以鹽給之見文宗本紀明洪武十五年置黑鹽井鹽課提舉司鹽課司阿陋猴井鹽課司琅井鹽課司白鹽井鹽課提舉司鹽課司安寧鹽井鹽課提舉司鹽課司五井鹽課提舉司諾鄧鹽井鹽課司山井鹽井鹽課司師井鹽課司大井鹽井鹽課司順盪鹽井鹽課司鶴慶軍民府劎川州彌沙井鹽課司麗江軍民府蘭州井鹽課司武定軍民府和曲州只舊井河頭井草溪河尾井五井鹽課提舉司歲辦鹽二十七萬二千一百三十七觔零又折棉布七百二十段黒鹽井鹽課提舉司歲辦鹽五十七萬二千三百四十觔零安寧鹽井鹽課提舉司歲辦鹽七十七萬二千六百八十觔零白鹽井鹽課提舉司歲辦鹽二十一萬七百二十觔零永樂間五井安寧兩鹽課司歲辦無定數黑鹽井歲辦鹽六十一萬六千三百七十觔白鹽井歲辦鹽三十三萬四千三百一十四觔正統三年令雲南中鹽客商免納引紙九年令雲南鹽課司每竈户添撥餘丁二人免其差役專一採薪煎鹽鹽課不許擅除成化十九年奏准正統十四年以前客商中鹽未支者雲南每引給資本鈔二十五錠正德八年議准安寧鹽井提舉司折色課銀每引徵銀九錢以備邊軍支用嘉靖八年題准雲南鹽引合置流通簿一本每年差人赴部齎領仍赴南京户部印編歲額無閏五萬六千九百六十五引召商開中巡撫酌量井鹽美惡定擬價銀收布政司聽户部支用令雲南巡撫於布政司叅政叅議定委一員專管鹽法三十年令雲南巡按御史兼理鹽法三十三年題准將白安伍彌沙蘭州舊河尾等井鹽課革去成色虛數盡折紋銀其五井提舉司額辦布疋原解大理府搭放官吏俸鈔今將折俸另處補給其漂布每段折銀四分五釐每銀一兩折鹽一引俱作正課及續增新增加辦加閏復開河頭等井每歲共該銀四萬三千三百三十四兩六錢零無閏只該銀四萬五兩六錢零著為定額三十五年題准將雲南安寧井原額引鹽摘發琅井帶辦八十七竈鹽每引折銀七錢三分輪發三十六竈每竈每月領滷二百一十桶折納銀一兩六錢八分零安寧井實在鹽每引減折徵銀四錢五分順盪井給商本色鹽每引徵銀八錢備邊折色鹽每引徵銀一兩實徵鹽課無閏該鹽四萬七千三百八十二引一百四十九觔一十四兩九錢共銀三萬五千七百一十九兩一錢三分零遇閏該鹽五萬一千三百三十一引六十二觔六兩零共銀三萬八千七百六十兩七錢零俱解太倉其山井並新開石門闗三井鹽課本提舉司照舊徵納萬歴六年雲南歲辦鹽一百八十一萬七千八百七十七觔五井提舉司棉布每段折銀四分五釐歲解太倉鹽課銀三萬五千五百四十七兩三錢七分遇閏該銀三萬八千五百二十八兩九錢七分天啟三年改安寧提舉司為琅井提舉司駐琅井安寧鹽課附州徵解本朝順治年雲南歲額鹽課銀一十四萬六千一百九兩三錢六分十七年題准雲南不行部引按井給票徵收鹽課題准雲南各井以出鹽多寡定經制課程各隨商販照例抽税康熙元年題准黒井鹽課九萬六千兩琅井鹽課九千六百兩景東井鹽課三百二十兩以上遇閏加課銀八千八百二十六兩六錢六分零不除小建白井鹽課銀二萬八千五百六十兩安寧井鹽課一千九百八十兩雲龍州五井鹽課銀四千七百六十三兩七錢阿陋猴井鹽課二千九百二十三兩二錢彌沙井鹽課四百兩只舊草溪井鹽課二百六十二兩四錢六分以上遇閏加課銀三千二百四十兩七錢八分零扣除小建三年題准黑井鹽增徵税銀三千兩備城工用遇閏加銀二百五十兩四年吳三桂以藩下家口食鹽不足議每月增煑黑井鹽十二萬五千觔加課銀二千兩十年封閉只舊草溪井其課銀歸併黑井辦納二十一年巡撫王繼文以起發吳逆家口後食鹽人少奏減黒井歲課銀二萬四千兩定以每月煎鹽五十萬觔以三十萬觔給竈自賣抵作工本以二十萬觔運省賣價完課銀八千兩二十四年雲南歲額鹽課銀一十五萬二百三十八兩七錢二分六釐三十一年黑井蛟蜃横發漂没鹽柴無補免停工缺煎課銀一萬四千四百兩三十二年免黔屬普安州等處虧空行銷黑井鹽課銀一萬九千餘兩三十三年免鹽課銀五千七百餘兩先是黔屬普安州等處逺食滇鹽商竈賠累總督范承勳請改食川鹽減滇省每年課額雍正元年復開草溪只舊井二年於鎮沅府地方開按版井於威逺地方開抱母井巡撫楊名時以鹽課充溢民食有賴請加各井龍神封號奉㫖勅封靈源普澤龍王春秋致祭三年於普洱府地方開磨黑井元江府地方開猛野土井九年以攸樂夷人每年認完烏得土井鹽銀二千兩定為正課通省總數黑井白井琅井雲龍井安寧井阿陋井景東井彌沙井只舊草溪井按版井抱母井麗江井磨黒井猛野井烏得井共一十五井額煎鹽共二千七百二十八萬七千四百三十六觔徵正課共銀二十七萬八千三十九兩七分正額盈餘共銀二萬二千六百七十五兩一錢六分五釐額外盈餘共銀二萬五千六十一兩七錢六釐以上雍正十年題定其欵項載各井内黑井産井五區大井東井復隆井以上係舊井新井尾井附雍正二年新開沙滷井雍正八年新開府以上五井坐落楚雄屬定逺縣地方距省三百六十里舊設提舉司提舉一員鹽課司大使一員竈丁二百丁新設復隆井鹽課司大使一員雍正九年設新井竈丁五十丁額煎鹽八百二十三萬二十四觔徵課銀一十二萬六百五十兩二錢二分雍正九年題定原額鹽五百六十四萬觔徵課銀九萬二百四十兩額徵公費銀四百八十兩竈丁編公費銀四十三兩六錢分商税銀一百三十一兩三錢五窩滷銀七十二兩八兩附徵窩滷銀一十附徵省店鹽税銀三千五百二十五兩帶銷鹽二十四萬觔伐柴不敷鹽二十四萬觔増薪鹽三十五萬四觔加增各役工食鹽六萬觔五千四百兩加增鹽三十萬觔徵課銀舊額加增鹽一百五十萬觔辦課二萬四千兩康熙五十五年井滷日出有數等事鹽道詳明督撫批准黒井止辦加增鹽三十萬觔每百觔課銀一兩九錢徵銀五千七百兩黒井運赴省店行銷原額鹽價内撥補銀一萬一千二百八十兩白井幫補銀四千兩雲龍井幫補銀三千二十兩雍正二㫖覆年遵務利弊等事題准白雲二井不幫黒井於黒奏鹽井之新井煎鹽一百萬觔賣價歸公數内撥抵黒井加増鹽三十萬觔每百觔減價一錢實徵課銀五千四百兩於鹽務盈餘歸公數内撥補銀三百兩五年酌減鹽價議增薪本等事題准新井鹽價定為正課於鹽務盈餘歸公數内撥補銀七千二十兩運赴省店行銷鹽觔每百觔減價二錢加增鹽三十萬觔減銀六百兩於白井額外沙滷鹽價内撥補雍正九年請定畫一章程等事題請自雍正十年為始將一切費税窩滷並帶銷加增鹽等項合前原徵課税統為正課歲定黒井額鹽六百八十三萬四觔每百觔賣價二兩八錢徵課價銀一十九萬一千二百四十兩一錢一分二釐除歲給每百觔煎鹽薪本役食器具等銀九錢七釐五毫八絲共銀六萬一千九百八十七兩七錢五分三毫三忽二㣲運鹽脚價每百觔八錢數内銀三錢九分二釐四毫二絲共銀二萬六千八百二兩三錢一釐六毫九絲六忽八㣲實正課銀一十萬二新千四百五十兩六分遇閏照加小建不除井鹽一百萬觔徵課銀一萬五千兩㫖覆雍正二年遵等事奏明黒井地方與大東復三井奏鹽務利弊相連産井二區新井尾井煎鹽一百萬觔每百觔賣價二兩七錢徵課價銀二萬七千兩除歲給每百觔煎鹽薪本役食器具銀一兩共銀一萬兩外造入鹽務歸公册内送部查核雍正五年酌減鹽價議増薪本等事題請每百觔減價二錢於白井額外沙滷鹽價内撥補仍足銀一萬七千兩定為正課歸入實徵册内報銷自雍正十年雍正九年請定畫一章程等事題請為始各歸各款白井沙滷改為正課新井不敷課銀無項抵補每年煎鹽一百萬觔照二兩八錢賣價徵課價銀二萬八千兩除薪本役食銀一萬兩運鹽脚價數内銀三千兩實正課銀沙一萬五千兩遇閏不加小建不除二百兩一錢六滷井鹽四十萬二十觔徵課三千分正八年二月内雍聖澤逺敷等事詳明自本年六月初一日開煎起至九年五月底止試煎一年雍正九年請定畫一章程等事題請自雍正十年為始歲煎鹽四十萬二十觔每百觔賣價二兩八錢徵課價銀一萬一千二百兩五錢六分除歲給每百觔煎鹽薪本役食器具銀一兩二錢共銀四千八百兩二錢四分運鹽脚價八錢共銀三千二百兩一錢六分實正課銀三千二百兩一錢六分遇閏照加小建扣除正額盈餘銀二千二百四十兩一錢一分二釐㫖覆雍正二年遵等事奏明額鹽每百觔秤頭鹽二十奏鹽務利弊觔賣獲銀兩及提舉解繳鍋息歸公廣南府解交鹽規道庫收銀合平等項共銀五萬一千三百五十二兩一錢一分二釐除歲添給運鹽脚價内不敷銀三萬二千八百三十七兩七錢三分提舉支銷公費蓆索等銀三千三百八十九兩四錢二分二釐兩院書吏鹽菜銀二千四百兩包納曲靖過税銀八十四兩省店委官養廉商役工食及奏銷飯食文武舉貢卷資緝私差費等銀五千六百一十五兩八錢撥給養廉賞兵銀四千七百八十五兩四錢七釐六毫九絲六忽八㣲餘銀二千二百四十兩一錢一分二釐移解藩庫備公額外盈餘銀二千六百六十兩雍正二年奏銷鹽課案内造報省店鹽觔回潮零收躉發鹽價並收買餘鹽出息銀兩移解藩庫備公行鹽統運㑹城總店聽嵩明晉寧昆陽呈貢宜良南寧霑益馬龍陸凉羅平尋甸平彜河陽路南江川廣西彌勒師宗廣南會澤宣威等府州縣小販民人齎持現價赴店買運行銷各地方官無考成白井産井五區觀音小石井舊井喬井界井灰尾井坐落姚安府屬姚州地方距省二百七十里舊設提舉司提舉一員鹽課司大使一員竈丁一百丁新設白石谷鹽課司大使一員雍正九年設額煎鹽六百六十一萬九千三百一十六觔徵課銀七萬六千四百六十四兩二錢九分雍正九年題定原額鹽二百三十七萬三千二百一十六觔徵課銀二萬八千八十四兩額徵公費銀四百九兩二分九釐商税門攤銀一百二十兩革菜門攤銀二十四兩銀四千兩加增鹽二十五萬觔課康熙五十五年井滷日出有數等事鹽道詳明督撫兩院批准白井加增鹽每百觔課銀一兩六錢㫖覆