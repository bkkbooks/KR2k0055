兩四錢上下壩皮硝厰坐落禄勸州地方年該溢額歸公銀二十兩遇閏加銀一兩六錢六分七釐曲卑撒喇烏皮硝厰坐落禄勸州地方年該溢額歸公銀三兩遇閏加銀二錢五分以上各厰溢額課項雍正六年總督鄂爾泰為酌勻公件等事題報歸公附無額厰課倭鉛厰委官經理卑淅倭鉛厰坐落羅平州地方塊澤倭鉛厰坐落平彞縣地方雍正七年總督鄂爾泰巡撫沈廷正為詳請鉛題明事合疏具題開採雍正八年題報抽收課每年變價四五千兩不等每百觔抽收課鉛十觔無定額龍樹等厰底母餘息雍正八年總督鄂爾泰為底母餘息以充公用事題明將龍樹等厰所出底母賣給各銀銅厰民以供煎煉出底之厰與各厰需底衰旺不一所賣餘息儘收儘解不為定額個舊錫厰錫票税銀雍正二年總督高其倬於遵㫖查奏銅觔利弊案内摺奏明個舊錫厰錫税錫課外各商販錫出滇九十觔為一塊二十四塊為一合毎合例繳税銀四兩五錢年收税銀二千七八百三千餘兩不等原無定額銅觔餘息各銅厰於額例抽收外豫發工本收買餘銅各厰每觔三四分以至五六分不等雇脚發運省城賣給官商及加耗運供鼓鑄照定價每百觔九兩二錢核筭除歸還銅本運脚厰費等項外所獲餘息儘數歸公但年辦銅觔衰旺不一餘息盈絀不常原無定額白銅餘息媽泰白銅厰并新開大姚縣茂密白銅子厰發紅銅到厰賣給硐民點出白銅每一百一十觔抽收十觔照定價媽泰厰毎觔三錢六分茂宻厰毎觔三錢變價以充正課外所獲餘息儘數歸公但白銅售價遲速不等硐民採煉多寡不一原無定額爐墩小課茂密白銅厰爐多寡不一厰委每爐每日抽白銅二兩六錢六分以資厰費雍正二年查奏銅觔利弊事案内准其於厰費項下開銷此項歸公採煉多寡不一原無定額白龍金釵銅礦箐等厰銀課各銅厰撤出之鉛㣲有銀氣煎出銀課多寡不一厰委每兩約抽收銀六分一錢不等以資厰費雍正二年查奏銅觔利弊事案内准於厰費開銷此項歸公緣各厰衰旺不一原無定額寨子山等厰石緑礦課各銅厰㣲出顔色綠礦厰委毎一百二十五觔抽二十五觔每百觔變價一兩五錢以資厰費雍正二年查奏銅觔利弊事案内准於厰費内開銷此項歸公緣厰綠衰旺不一原無定額白龍厰石青礦課厰銅夾有顔色青礦厰委每一百觔抽收六觔每觔約變價三錢以資厰費雍正二年查奏銅觔利弊事案内准於厰費内開銷此項歸公緣厰礦衰旺不一原無定額雲南通志巻十一
