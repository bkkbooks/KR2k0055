body:
  text: 雲南通志卷十田賦民賦徴屯賦附額禹貢梁州田下上賦下中三錯地磽斂薄況滇為梁之裔境哉由漢迄宋或羈縻或棄之蒙段元始全𨽻版圖設官分職與中土等苐文獻無徴田賦莫考明以屯養兵草萊漸闢而計田制賦猶不及中土一大縣也迨自南中多故兵戈相尋我朝先後戡定土曠民稀殊恩疊沛賦以見熟起科除荒徴解復因屯糧過重減而均之優恤邊黎曠古未有我皇上登極之初蠲賦免逋撫綏備至其從前報墾田地特諭詳加查核杜增賦之弊清維正之供徂隰徂畛徧歌雨公而慶多稌矣夫土穀為國家厚生之本而勸課乃父母斯民之責矧滇民處萬山中刀耕火種之外别無生計培養而安全之是在司牧者加之意而已志田賦元世祖至元間立雲南軍民屯田中慶路民屯四千一百九十七戸田一萬九千六百二十四雙軍屯七百九戸田二千八百三十五雙曲靖路民屯二千二百四十戸田四千四百八十雙仁徳府民屯八十戸田一百六十雙軍屯一百戸田四十雙臨安民屯二千三百戸田四千雙軍屯二百八十八戸田一千一百五十二雙澂江民屯一千二百六十戸軍屯二百九十五戸梁千戸翼軍屯凡七百人田三千七百八十九雙三十年梁王遣使詣行省言以漢軍屯田烏蒙後遷於新興州武定路軍屯一百八十七戸田七百四十八雙烏撒路軍屯一百一十四戸東川路民屯八十六戸㑹通民屯二戸建昌民屯一百四戸軍屯一百八十戸㑹川路民屯四十戸徳昌路民屯二十一戸軍屯一百二十戸大理金齒等處民屯三千七百四十一戸軍屯六百戸共軍民田二萬二千一百五雙威楚路民屯一千一百一戸田五千五百五雙軍屯三百九十九戸田一千五百九十六雙又威楚提舉司所領民屯三十三戸田一百六十五雙鶴慶路民屯一百戸田四百雙軍屯一百五十二戸田六百八雙十年以張立道為大理等處巡行勸農使洩昆明池水得壤地萬餘頃皆為良田十九年籍雲南新附戸自烏蘭哈達鎮雲南凡入籍民戸四籍民田民以為病至是令已籍者勿動新附籍之定雲南税賦用金為則以貝子折納每金一錢直貝子二十索二十三年免雲南從征交阯蒙古軍屯田租三十年免雲南屯田逋租萬石成宗大徳三年雲南省嵗入糧數二十七萬七千七百一十九石九年命巴延徹爾董雲南屯田事仁宗延祐二年立烏蒙軍屯先是雲南行省言烏蒙乃雲南咽喉之地别無屯戍軍馬其地廣濶土脈膏腴皆有古昔屯田之蹟乞發輝和爾及新附漢軍屯田鎮遏至是從之調四川軍二千人雲南軍三千人共五千人屯田一千二百五頃置總管萬戸府隸雲南省五年詔還所侵順元宣撫司民地泰定帝泰定元年免雲南秋糧三分四年以瑪固斯為雲南行省平章事提調烏蒙屯田文宗至順三年雲南饑詔蠲本省田租三年明洪武十八年雲南諸蠻平增置衞所開屯戍守悉以腴田給軍并歸附之衆十九年西平侯沐英請置屯田從之英奏雲南土地甚廣而荒蕪居多宜置屯田令軍士開耕以備儲蓄上諭戸部曰屯田之政可以紓民力足兵食邊方之計莫善於此英之是謀可謂盡心矣然邊地久荒榛莽蔽翳用力實難宜緩其嵗輸之粟使彼樂於耕作數年之後徴之可也見續文獻通考損按英後先鎮雲南十年嵗較屯田增以為賞罰墾田至百萬餘畝自永寧至大理每六十里設一堡留軍屯田子春亦鎮雲南七年大修屯政闢田三十餘萬畝二十年命普定侯陳桓静寧侯葉昇往雲南總制諸軍就於定邊姚安等處立營屯種二十六年上各省實徴税糧總數雲南布政司田土原無數目實徴夏税麥一萬八千七百三十石秋糧米五萬八千三百四十九石按學菴類稿明食貨志洪武時詔許雲南以金銀海貝布漆朱砂水銀折納秋租永樂五年增置按察司僉事一員盤量屯糧成化十三年增置按察司副使一員專管屯田𢎞治十五年上各省實徴税糧總數雲南布政司田土共計三千六百三十一頃三十五畝夏税麥三萬三千七百八石一斗八升七勺零秋糧米一十萬六千九百一十三石一合零嘉靖四十一年雲南都司原額屯田一萬八百七十七頃四十三畝三分見額屯田一萬一千一百七十一頃五十四畝一分八釐零糧三十八萬九千九百九十二石三斗三升三勺零萬厯六年上各省實徴税糧總數雲南布政司田土共計一萬七千九百九十三頃五十八畝八分零夏税麥三萬五千五百六十七石二斗六升一合五勺零秋糧米一十萬七千一百二十三石三升七合一勺零二十一年築八闗二堡於三宣要害戍緬竝議屯田二十四年猛卯酋多亨勾緬搆亂巡撫陳用賓平之築平麓城議屯田四十八年戸部以遼餉不支兵部馬價工部器械不足增雲南地畝銀一萬六千一百六十四兩本朝順治十七年命吳三桂為總管移鎮雲南乞沐氏勲莊與之十八年編遺漏錢糧寧州土官禄昌賢養兵莊糧三百六十石每石折徴銀三錢歸寧州曲靖府安置土官恭黙田一千六十二畝科秋糧二十三石六斗二升條銀十一兩七錢九分歸霑益州鐵索營土軍屯墾嵗輸租米二百石一斗四升歸洱海衞尋甸四十八哨嵗徴秋糧一百六十一石五斗歸尋甸府臨安納樓司五畝地方中則田七百六十九畝七分科秋糧二十四石差發銀一百兩條編銀二十三兩零歸建水州編衞所職田每畝三斗照軍糧起科并編衞所軍舍丁差覆准鎮雄府嵗納荍四百六十石烏蒙府嵗納荍三百石折徴銀三百兩題准雲南衞弁職田向係收租准俸不納税糧嗣後各歸衞所編入戸口俱以本七折三徴收其田係每畝一斗九升至三斗者照軍糧例起科三斗至五斗者概以三斗為額總計雲南布政司田土五萬二千一百一十五頃一十畝六分九釐零田賦銀六萬一千七百四十八兩九錢五分三釐零糧一十二萬三千九百一十七石九斗三升四合九勺零雲南平彞等衞所屯田四千一百二十二頃四十六畝八分七釐零屯賦銀三萬九百八十三兩五錢六分四釐零屯糧五萬八千四百八十石二斗二升五合七勺零康熙元年覆准普洱等十三處嵗徴糧米編入元江府經制四年覆准雲南苗渠求附田土編入新添衞照例科糧不得仍稱土司五年免迤東被賊州縣新荒錢糧覆准浪媽等六寨嵗徴銀二百七十兩米三百石歸入元江府經制覆准雲南各土司係邊方世職其錢糧完欠不必照流官例考成七年覆准瓦渣土司四十七寨額徴苗糧四百二十四石銀六百六十八兩歸臨安府二十年免雲南本年分夏税二十一年巡撫王繼文奏准雲南金汁等河積水灌田數十萬頃自亂後堤壩傾頹田畝荒蕪議令捐修俾民歸墾輸賦二十四年總督蔡毓榮議以吳逆原請沐氏勳莊田地變價歸併附近州縣照民糧起科二十七年總督范承勳奏請二十一年至二十七年逋欠屯糧分年帶徴上念滇民遭吳逆困苦悉行蠲免三十年巡撫王繼文請正衞所田地先是并衞所於州縣其田地有遠近相錯官民未便者至是悉行改正三十二年巡撫王繼文奏請勲莊荒田五百八十餘頃免其變價三十三年免雲南通省地丁錢糧三十四年減衞所糧額巡撫石文晟以衞所軍田糧額數倍民賦累年逋欠請減照河陽縣上則民賦起科竝給民為業四十三年免雲南通省地丁錢糧四十九年免雲南通省五十年分地丁錢糧并厯年逋欠雍正二年巡撫楊名時奏准民丁額銀攤入通省地糧上納其軍田有無主影射者令自首報墾攤抵最重軍丁七年免雲南通省八年分地丁額銀十年總督髙其倬奏准昭通兵米自外運入艱難遣官招募農民一千戸到昭通開墾每戸給田二十畝為業按年收穀麥作價扣還工本起科徴米以充兵食巡撫張允隨奏准各府州縣兵多米少者將應徴條銀折收糧米以資軍食米多兵少者將應徴税糧折解以抵兵餉杜輕齎招買之弊雲南布政使司民賦原額田地七萬二千九百八十八頃三十二畝七毫五絲四忽五微九塵係康熙三十年舊志額數内尚有荒蕪於墾復科徴之年歸入成熟數内新增墾復及清丈額外田地一萬四千四百八十頃七十八畝七分七釐一毫三絲六忽二微八纖一塵二𣺌九漠内除永善縣西媽基等處民田地六頃一畝一分撥歸四川屏山縣管轄又新增四川貴州撥歸田地一百四十七頃五十七畝六分五釐九毫二絲八忽二項内成熟田地已經歸入實徴項下其近年報墾田地俟限滿科徴之年歸入成熟數内又雍正四五六七八十等年自首抵補軍丁田地一百五十一頃二十九畝五分一釐七毫一絲八忽七微七纖九塵一𣺌九漠實在雍正十年成熟民沐田地七萬九千七百三十二頃七十三畝二分五釐三毫一忽四微九纖二塵六𣺌四漠原成熟地三萬五千七頃四十畝一分三釐七毫二絲六忽八微二纖九漠内除西媽基等處民地四頃一十六畝割歸四川屏山縣管轄外實該地三萬五千三頃二十四畝一分三釐七毫二絲六忽八微二纖九漠地新增四川屏山縣割歸永善縣副官村成熟民六頃四十四畝五分五釐三新增貴州威寧州撥歸宣威州成熟陸地一十頃五十五畝四分一釐七毫一成熟夷地一千六百六十八頃四十七畝一分釐三毫成熟不分等則地一千七十六頃六十八畝四釐一毫一絲二忽四纖七塵七𣺌免丈認納夏税夷地三頃九十二畝外成熟免丈夷地照納夏税七原成熟田三萬九千七百三十七頃四十八畝分六釐一毫八絲八忽八纖一塵一𣺌内除西媽基等處民田一頃八十五畝一分割歸四川屏山縣管轄外實該田三萬九千七百三十五頃六十三畝六分六釐一毫八絲八忽八纖一塵一𣺌新增四川屏山縣割歸永善縣副官村成熟民田七十七頃六十四畝七分九釐新增貴州威寧州撥歸宣威州成熟民田四十頃一畝三分二毫二絲八忽折夷田一千二百八十頃九十三畝六釐夷地田五十七頃三十六畝四分四釐六毫四絲六忽五微四纖三塵七𣺌五漠成熟清丈實田七百五十九頃三十五畝六分二釐五毫不額外淤出田三頃七十八畝五分四毫成熟分等則一例起科田五頃六十八畝六分五毫糧外成熟免丈夷田照納秋實徴夏税本折麥三萬一千五百九十六石四斗三升二合一勺二抄二撮六圭七粒三顆七粟實徴夷地免丈照納夏税麥三百三十石七斗七升八合八勺八抄四撮七圭一粒四顆實徴抵補軍丁夏税麥折米三十六石三斗一升八合六勺三抄五撮二圭八粒八粟照每年折徴之例每石折銀八錢共折徴銀二十九兩五分四釐九毫八忽二微二纖四塵六𣺌四漠實徴夏税本色荍八百五十九石四斗七升五合八勺四抄八撮實徴地畝荍折銀二千一百二十五兩一錢九分六釐二毫七絲九忽四微八纖外除永善縣西媽基等處割歸四川屏山縣應徴銀一十二兩三錢八分實徴新增夷地二十五段照納夏税折色六錢麥二十八石二斗折徴銀一十六兩九錢二分實徴新增貴州威寧州撥歸宣威州本色無耗荍一百八石四斗三升三合三勺六抄折該米五十四石二斗一升六合六勺八抄實徴秋糧本折米一十一萬八千三百二十二石三斗二升三合一抄三圭八粒六粟外除永善縣西媽基等處割歸四川屏山縣應徴米七石五斗五合實徴抵補軍丁秋糧米三百一十九石三斗五升一合三勺二抄八撮九粒一顆五粟照每年折徴之例每石折銀八錢共折徴銀二百五十五兩四錢八分一釐六絲二忽四微七纖三塵二𣺌實徴元江臨安宣威鎮雄秋糧無耗米八千一百五十六石三斗一升五勺一抄五撮四圭四粒實徴師宗州秋糧無耗折色五錢米二十四石八斗實徴新增夷田一十六段照納秋糧折色七錢米三十一石七