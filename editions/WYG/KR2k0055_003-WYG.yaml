body:
  text: 雲南通志卷四建置粤稽封建易為郡邑勢分今古而制與時宜自彩雲南見漢開不賔博南蘭津已頌徳廣矣然唐仍羈縻葆就宋竟畫斧分疆即元明廣設府路徧置官司半猶土酋世守我國家聲教覃敷湛恩汪濊雕題鑿齒納土輸誠與侯甸采衞共登版籍何其盛也於是邑小則裁倂以省冗員地大則添設以重守土因革損益之閒布置周詳規模宏遠豈非聖人首出庻物斯萬國咸寧哉志建置雲南通省建置唐虞為南交昧谷之交夏商為梁州之域周合梁於雍又為雍州邊裔戰國時楚頃襄王使將軍壯蹻略地伐夜郎西至滇池遂自王其地號滇國見後漢書按史記作楚威王時文獻通考云若莊蹻自威王時將兵略地屬秦陷巫黔中郡道塞不通凡經五十二年豈得如此淹久史記謬誤范書為正秦時通道置吏莊氏猶世王滇史記秦使常頞略通五尺道諸國頗置吏焉漢武帝建元中始通西南夷置犍為郡尋罷西夷獨置南夷元狩元年始通滇國元鼎六年置牂牁越巂諸郡元封二年以兵臨滇滇王降置益州郡昭帝始元元年立鉤町侯亡波為王新莽時改犍為郡為西順牂牁郡為同亭越巂郡為集巂益州郡為就新貶鉤町王為侯蠻夷盡反越巂夷任貴自立為卭穀王會莽敗漢興誅貴後漢先武建武二十七年哀牢夷内附封為君長明帝永平十二年分益州郡置永昌郡三國漢先主章武元年分犍為屬國置朱提郡後主建興三年諸葛亮南征平四郡改益州郡為建寧郡分建寧永昌郡為雲南郡分建寧牂牁為興古郡俱領於益州刺史見蜀志後主傳晋武帝泰始二年分益州置梁州七年又分益州之建寧永昌雲南興古四郡為寧州統縣四十五太康三年復廢寧州入益州立南夷校尉以䕶之監五十八部蠻族惠帝太安二年復置寧州晋書永昌從事孫辨請復置寧州從之即以南夷校尉李毅領刺史竝轄牂牁越巂朱提三郡按宋書載太安二年又分建寧以西之七縣别立為益州郡懐帝永嘉二年改益州郡為晋寧郡分牂牁立平夷夜郎二郡五年分興古之東立西平郡分永昌雲南立東河陽郡分牂牁朱提建寧為平夷夜郎二郡本永嘉二年置當是再分朱提建寧以益之耳又分朱提為南廣郡成帝時失年分興古為梁水郡按晋書王遜傳遜以地勢形便上分牂牁為平夷郡分朱提為南廣郡分建寧為夜郎郡分永昌為梁水郡又改益州郡為晋寧郡事皆施行蓋總遜為刺史時其前後建置如此非諸所改置俱在永嘉二年也又分雲南為興寧郡分東河陽為西河郡成帝咸康四年分牂牁夜郎朱提越巂四郡為安州八年又罷并寧州以越巂還屬益州省永昌先是惠帝太安元年李特起兵於蜀尋僭號漢益州郡縣皆沒於特其後李雄又分漢嘉蜀二郡立沉黎漢原二郡李壽又分寧州之興古永昌雲南朱提越巂河陽六郡為漢州郡縣沒於李氏者四十六年而江左仍遥置之穆帝永和二年桓温滅蜀復有其地改平夷為平蠻郡簡文帝咸安二年益州復沒於苻氏孝武帝太元中復為晋有宋時為寧州領郡十五宋志州領建寧晋寧牂牁平蠻夜郎朱提南廣建都西平西河東河陽雲南興寧興古梁水凡十五郡内按建都郡志載晋成帝分建寧立晋志缺載齊時為寧州鎮領郡三十其南廣梁水建寧晋寧雲南西平夜郎東河陽平蠻興古興寧凡十一郡名與宋同其建平南牂牁西河陽西阿平樂南朱提北朱提宋昌永昌九郡廢置無考又齊武帝永明二年置南犍為郡五年置益寧郡鬱林王隆昌元年置西益江陽犍為永興永寧安寧六郡海陵王延興元年置東朱提郡明帝建武三年置安上郡共十郡註云皆無民戸梁武帝大同中置南寧州太清二年爨瓚竊據牂牁興古等郡事詳雜紀及封建陳時地没於爨蠻隋髙祖開皇中瓚子震翫遣使朝貢命韋世冲以兵戍之置恭州協州昆州又置牂州六年改越巂郡為西寧州十八年又改為巂州煬帝大業初廢恭州協州隋末謝趙諸蠻分據其地俱詳見雜紀唐髙祖武徳初遣使至南中招降其部落復置南寧州漢夜郎地元年開南中因故同樂縣置治味又置昆州恭州協州復析協州為靖州隸戎州都督府三年以牂牁首領謝蠻地置牂州以牂牁蠻别部置充州隸黔州都督府四年以漢雲南縣地置姚州雲南郡又置姚州都督府領州十三唐書地理志註以古滇王國民多姚姓因置姚州都督并置州十三又置西濮州尹州曾州西平州隸戎州都督府置矩州隸黔州都督府復置總管府於南寧州五年僑治益州七年復以南寧州為都督府又分置西寧州南雲州南龍州西宗州西利州西豫州以弄棟地置裒州八年改南寧州為郎州復治味改恭州為曲州太宗貞觀元年罷郎州都督府三年改西豫州為縻州以爨𢎞達之子歸王為南寧州都督以東謝蠻地置應州以南謝蠻地置壽南州四年又置琰州改壽南州為莊州皆隸黔州都督府八年改西寧州為黎州南雲州為匡州西平州為盤州十一年改西濮州為髳州南龍州為鉤州西宗州為宗州西利州為微州以莊州為都督府尋又以西趙酋地置明州隸黔州都督府二十二年分郎州地置麻州二十三年徒莫祗蠻儉望蠻皆内屬以其地置傍望求邱覽五州隸戎州都督府髙宗麟徳元年移姚州都督府於弄棟川咸亨三年昆明蠻十四姓率户内附以其地分置殷州總州敦州隸黔州都督府調露元年復廢姚州武后垂拱四年復置萬歲通天二年昆明夷内附以其地置寳州𨽻黔州都督府中宗景龍二年罷莊州都督府元宗開元五年復以郎州為南寧州十五年復置殷州本咸亨三年置㝷廢至十五年復置又有哀牢别種其先自號六詔蒙巂越析浪穹鄧睒施浪蒙舍開元之末蒙舍詔漸强并吞五詔尋以功策授雲南王天寶元年置姚州邆州守捉使九載蒙舍僭國號曰大蒙徳宗興元初蒙舍改國號曰大理貞元二年復置殷州按殷州屢置屢廢貞元二年節度使韋臯表請復置十年蒙舍歸附改國號仍曰南詔十三年置浪川州隸戎州都督府節度使韋臯表置宣宗大中十三年復叛改稱大禮昭宗天復二年鄭買嗣簒立僭號大長和國後唐明宗天成三年趙善政立改國號曰大天興尋楊干貞廢善政自立改國號曰大義寧後晋髙祖天福二年段思平立國號大理宋初仍為大理國太祖乾徳三年王全斌平蜀欲以兵威取滇進滇地圖太祖鑒唐之禍以玉斧畫大渡河曰此外非吾有也由是雲南不通中國為段氏竊據哲宗紹聖元年髙昇泰立號大中國三年段正淳立號後理國元憲宗三年命太弟與兀良合台征雲南五年諸部悉平得五城八府四郡三十七部立萬户府十有九設大理都元帥府仍録段氏子孫世守其土世祖至元四年立大理等處行六部七年改善闡萬户府為路又倂大理上下二萬户府為路立軍民總管府領録事司一縣一太和府二永昌騰衝府領縣一永昌領永平州五鄧川蒙化趙州姚州雲南州領縣二鄧川領浪穹姚州領大姚八年分大理國三十七部為南北中三路改威楚萬户府為路立總管府領縣二威楚定逺州四鎭南南安開南威逺州領縣一南安領廣通十年立雲南行中書省見元紀按地理志置雲南行省在十三年十一年改北路為武定路軍民府領州二和曲禄勸州領縣四和曲領南甸元謀禄勸領易籠石舊十二年籍師宗彌勒二部為軍立廣西路十三年改善闡為中慶路領録事司一縣三昆明富民宜良州四嵩明晋寧昆陽安寧州領縣八嵩明領楊林邵甸晋寧領晟貢歸化昆陽領三泊易門安寧領禄豐羅次改南路為臨安路領二縣河西䝉自千户一捨資州三建水石屏寧州州領縣二寧州領通海嶍峨改中路為曲靖路總管府又改茶罕章宣慰司為麗江路立軍民總管府改仁地萬户府為仁徳府領縣二為美歸厚又立巴的甸為烏撒路十四年立廣南西路宣撫司十五年以烏撒路為軍民總管府十六年升中路為澂江路領縣三河陽江川陽宗州二新興路南州領縣三新興領普舍硏和路南領邑市十八年復廣西路軍為民領州二師宗彌勒二十一年改烏撒總管府為宣撫司二十二年罷麗江路總管府立宣撫司領府一北勝州七順州浪蕖永寧通安蘭州巨津寶山州領縣一巨津領臨西省合剌章金齒二宣撫司為一治永昌立臨安廣西道宣撫司二十三年立鶴慶路軍民府領縣一劎川二十五年立元江路領二部步日馬籠升曲靖總管府為宣撫司領縣一南寧州五陸凉越州羅雄馬龍霑益州領縣六陸凉領芳華河納羅雄領通泉霑益領交水石梁羅山改烏撒宣撫為宣慰兼管軍萬户府見元紀按地理志升烏撒宣撫為烏撒烏蒙宣慰司在二十四年以金沙江西通安等五城隸察罕章廢金沙江東永寧等五城以北勝施州為北勝府二十六年省雲南大理中慶等路州縣二十八年立金齒等處宣慰司都元帥府又立東川路改立曲靖等處宣慰司管軍萬户府雲南曲靖路宣撫司所轄地廣民心未安改立以鎮之成宗元貞二年乞藍蠻平以其地為雲遠路軍民總管府大徳二年立雲南諸路道肅政㢘訪司四年立烏撒烏蒙等郡縣置維摩州英宗至治二年置寧遠州泰定帝泰定二年蒲戀來附置順寧府文宗至順元年置順元宣撫司麓川路軍民總管府順帝至正三年立永昌等處宣慰司自憲宗時至此累朝建置互見元史帝紀及地理志按至元十三年賽典赤以改定雲南諸路名號來上凡為路三十七府二屬府三屬州五十四屬縣四十七其餘甸塞軍民等府不在此數三十一年雲南行省復上所定路府州縣上路二下路十一下州四十九中縣一下縣五十前後不合蓋數十年之内更置非一也兹惟據年代可考及現在雲南者具列於編此外附見卷末歴代州縣闕疑之後明洪武十四年遣將平滇十五年改諸路為府以中慶路為雲南府改行省為布政使司正統十一年改麓川為隴川設宣撫司於隴把名勝志明分為四道其迤西者曰金滄道曰洱海道領大理永昌鶴慶蒙化楚雄武定永寧姚安鎭沅順寧麗江景東等府迤東者曰安普道曰臨元道領雲南臨安澂江尋甸廣西廣南曲靖元江等府其土官之有分地者長官司一曰者樂甸禦夷府二曰孟定孟艮軍民宣慰司六曰孟養車里木邦老撾緬甸八百大甸宣撫司三曰干崖南甸隴川禦夷州四曰鎮康灣甸大侯威遠禦夷長官司二曰芒市鈕兀軍民指揮使二曰瀾滄騰衝又其餘長官廵檢之分地小而雜處中邊者不可勝記成化十二年更置臨元瀾滄金騰曲靖四道十五年改木邦宣慰司為孟宻安撫司隸灣甸嘉靖元年復永昌府治洪武十五年置府二十三年省府入金齒衛設指揮使司景泰中設鎮至是以廵撫何孟春言仍罷鎮置府改金齒指揮使司為騰越州仍置騰衝衛萬厯十九年設新平縣改直隸新化州隸臨安府二十五年改順寧為流府二十六年改大侯為雲州屬之終明之世為府二十領州三十六縣三十二又分置各衛所附焉本朝順治十六年收雲南入版圖分邑置州各如舊尋裁通安寶山蘭州巨津四州臨西一縣歸麗江府康熙四年裁新化州歸新平縣五年以北勝州隸大理府六年以臨安府屬教化王弄安南三長官司地置開化府八年改尋甸府為州隸曲靖府廢維摩州以其地分隸附近府州裁順州歸鶴慶府歸化縣歸呈貢縣三泊縣歸昆陽州又裁陽宗縣歸河陽縣亦佐縣歸羅平州􅑇嘉縣歸南安州三十四年設平彝縣於舊平夷衛三十七年改北勝州置永北府雍正二年改威遠土州設直隸同知四年改隸四川之東川府歸雲南設會澤縣隸焉五年分霑益州地置宣威州改者樂甸長官司為恩樂縣隸鎭沅府又改隸四川之烏䝉鎮雄二府歸雲南六年降鎮雄為州以米貼地置永善縣俱隸烏