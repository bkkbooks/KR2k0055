置永寧州後升為府領長官司四本朝因之為永寧軍民府裁四長官司歸永北府綂轄麗江府古荒服極邉地白狼王所居接壤吐蕃漢兼屬越巂益州二郡後漢兼屬永昌郡隋屬巂州唐初為越析詔地貞元中蒙氏據之置麗水節度宋時為麽些蠻醋醋所據段氏不能制元憲宗三年濟金沙江征大理麽些負固四年討平之立茶罕章管民官至元八年改為宣慰司十三年改置麗江路立軍民總管府二十二年罷府置宣撫司於通安巨津之間領府一州七縣一明洪武十五年改麗江府㝷改麗江軍民府分順州北勝永寧浪蕖四州屬鶴慶府仍領州四通安寶山蘭州巨津縣一臨西本朝仍為府裁四州一縣入焉雍正元年改土設流隸雲南布政司麗江府建置表蒙化府古西夷極邊地楚屬滇國漢為益州郡地後漢屬永昌郡三國漢為建寧郡地唐屬姚州都督府蒙氏嘗築城居之因號為䝉舍詔六詔中惟䝉舍詔居諸詔之南亦稱南詔開元二十六年皮羅閣兼倂五詔遷治大和城改其城為陽瓜州天寶七年以鳳迦異為州刺史九年南詔反遂沒於䝉氏宋時為段氏據置開南縣元憲宗七年置䝉舍千户隸大理上萬户府至元十一年改䝉化府十四年升為路二十年降為州復隸大理路明洪武初仍為州屬大理府正綂間復升為府本朝因之康熙六年裁䝉化衛入府雍正七年裁楚雄府屬之定邊縣入焉景東府古徼外荒服地蠻名景董後易為東一名柘南又名猛谷後為昔樸和泥二蠻所居莊蹻王滇漢武開西南夷諸葛亮定益州皆未涉其境唐䝉氏立銀生府後為金齒白蠻所奪移府治於威楚歴鄭趙楊段之世俱莫能制元中統三年平之以所部隸威楚萬户府至元十二年置開南州仍隸威楚路明洪武中改為景東土府設景東衛嘉靖中設流官本朝因之康熙二十六年裁景東衛屯賦倂府景東府建置表滇自秦漢以來歴朝建置各殊按地以稽多不相合大抵黔蜀邊疆與滇錯壤如牂牁越巂二郡普安建昌諸路所屬半在黔蜀自有明分滇黔為兩省而前代之建置於滇者已多不在畫疆之内矣今惟取確有定在者列之於表至名存而地莫可考者附載於左庻不至久而竝失其名爾漢置益州郡領縣二十四闕疑凡七雙柏毌掇同勞勝休同瀨來唯牧靡牂牁郡領縣十七闕疑凡十一鐔封江鄨西同竝都談柏談毌斂漏隨夢槀進桑毌單越巂郡領縣十五在滇者四闕疑一姑復犍為郡領縣十二在滇者二闕疑一朱提後漢分益州郡置永昌郡共領縣二十五闕疑凡七皆仍前漢舊名三國漢分建寧永昌置雲南郡分建寧牂牁置興古郡其領縣與後漢同晋分益州置寧州領郡四共領縣四十五闕疑凡二十二存䣖南新定永修雲漢泠邱其雲平等永壽縣雍鄉涪寧興同瀨十二俱仍前漢舊名六朝宋仍為寧州領郡十五建寧晋寧興古雲南西平梁水牂牁平蠻西河東河陽興寧夜郎朱提南廣建都共領縣八十一闕疑凡六十萬安二萬壽古晋樂西丹南安有東復古復新寧西安成昌南興建新豐常談樂新廣談經臨利永漢陽臨南秦麻晋昌遷安雲豐江應遂安縣温江漢都陽名晋綏三十俱仍晋舊義成其存䣖等南齊為寧州鎮領郡三十建平西益江陽永興永寧西河陽南犍為西阿平樂東朱提南朱提北朱提南牂牁宋昌益寧安寧安上永昌犍為其建寧等十一郡仍宋舊名共領縣九十五闕疑凡六十五綏寧遂驃封寧綏雲安麻雅城安永永暖江不建西寧犍新西城南穀邑其安上等江陽四武陽仍綿水宋益寧廣同瀨四十縣俱漢晋舊名梁陳隋仍為寧州隋復置昆州其郡縣不能盡考唐置戎州姚州瀘州三都督府屬南寧等羈縻州九十二闕疑凡六十八謻湯羅望英徳聲奏勤武龍咸悅瀘慈武鎮歸武南唐嚴連南徳徳播為扶朗洛信移居筠炎志馴盈騁武昌浪川連播陵衛鉗于哥靈碾異滈陵切騎五袖品徃從舍牱和利納范鄧薩野共鞏洪郎晏奉日南順眉鄧峩洛諾浙思淯能高宋長寧定又置黔州都督府屬牂州等羈縻州五十一闕疑凡四十九琰峩蒍蠻勞羲鴻殷濡福琳犍鸞邦令清充莊那普暉寧都功總敦候亮晃龍樊延稜訓應明添茂卿勳雙城襲整寶懸姜撫水思源逸南平自唐迄宋為䝉段所竊據其所改立已附見於表外此皆不可考元置雲南諸路行中書省凡路三十七其在今境者已分别於表其在黔蜀蕃緬者雖不屬滇存以備考孟傑路普安路建昌路普定路徳昌路會川路䝉憐路䝉萊路平緬路木連路䝉光路謀黏路六難路孟隆路木朶路䝉兀路又府州縣今不在滇境者凡二十六亦存以備考柏興府孟愛等甸軍民府通西軍民總管府木來軍民府建安州永寧州瀘州禮州理州闊州卭部州隆州姜州昌州徳州威龍州普濟州武安州黎溪州永昌州會理州麻龍州中縣瀘沽縣閏鹽縣金縣雲南通志卷四
