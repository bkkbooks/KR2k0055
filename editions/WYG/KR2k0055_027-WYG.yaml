body:
  text: 雲南通志卷二十七物產地載神氣庶物露生聖人利𨗳之以盡其性難得之物非所貴也昔唐蒙以蒟醬開夜郎張騫因笻竹通大夏豈所謂惟徳繄物者耶眀代取㸃蒼石於大理千夫邪許踣仆道路賴巡撫蔣宗魯奏而罷之我國家務徳勤民不貴逺物滇南闔境自正供常稅外别無採辦凡前史所謂光珠翡翠一切珍竒玩好之屬雖省會通衢亦不數覯也於是即其日用所需與耳目所及者備著於篇使辨方物而察土宜者得以覽焉志物産通省舊志云物產多同土俗畧異概書虞贅摘舉慮遺今以通省同產者總列於前各郡縣特產者分列於後庶無繁雜迭見之失云榖屬稻凡百餘種約以紅稻白稻糯稻概之麥有小麥大麥燕麥玉麥西方麥數種黍有黄黍白黍紅黍長芒蘆粟灰條數種稷有黄稷紅稷黑稷數種豆有黄豆白豆紅豆菉豆飯豆豌豆羊眼茶褐青皮大黑小黑蠶豆數種益部方物畧記佛豆秋種春斂即蠶豆也粱有飯糯二種荍有甜荍苦荍二種麻有脂麻青麻火麻胡麻數種稗有山稗糯稗二種蜀黍即髙粱産呈貢雲南縣者佳草子米似稷而㣲細郡縣夷玀廣種多食食貨鹽詳載鹽法油有菜油蘇子麻子脂麻胡麻桐油蘆花子油數種酒有燒酒白酒黄酒數種花椒蔫葉小粉蜂蜜蠟有黄蠟白蠟栗蠟三種布氊姚安者佳金銀銅鐵錫鉛水銀滇產五金其来舊矣苐時出時竭亦難專指定在茲附於食貨之後蔬屬薑宜良者佳芥葱昆眀者佳韭蒜薤茴香青菜白菜種来自安肅者佳蘆菔俗呼蘿白有紅黄白三種又一種胡蘿蔔菠菜萵苣莧有紅白二種又一種馬齒莧芹菜苦蕒麥蘭蔓菁蓴大理浪穹者甚香美蕻建水者佳蓳旱芹也胡荽一名香菜茼蒿莙薘樹頭菜石屏者佳茄瓠雲南縣者佳葫蘆芋蕨竹筍永北者佳茭筍蒲筍冬瓜絲瓜王瓜南瓜金瓜苦瓜土瓜山產土人掘以濟食菜瓜稍瓜倭瓜俗名八稜瓜銀瓜稨豆豇豆金豆俗名紅豆又百日豆薯蕷俗名山藥紅薯雲板薯甘露子秦椒俗名辣子蒟蒻俗名鬼廟香蕈出廣西者佳木耳白森鷄葼舊志云鷄以形言葼者飛而歛足之貌說本楊慎或作蟻㙡以其產處下皆蟻穴通雅又作鷄堫以六七月大雨後生沙土中或松間林下鮮者香味甚美土人鹹而脯之經年可食若熬液為油以代醬豉其味尤美出臨安䝉自者佳菌有青頭羊肝胭脂羊奶鷄冠松毛一窩蜂黄羅傘紅羅傘术莪等十數種果屬梅有山梅鹽梅二種杏李有荆山麥熟苦李數種桃舊志以富民為最今滇池海口者甚佳梨省城晉寧者佳棗賔川者佳栗石榴黑鹽井者佳阿迷州又一種白石榴胡桃大理漾濞者佳松子瓜子大理彌渡者佳榛子木瓜西瓜郁李香櫞橘賔川者佳柑又一種佛手柑橙柰柿葡萄麗江者佳林檎花紅銀杏枇杷元江者佳甘蔗梧實落花生臨安者佳羊棗橄欖元江者佳櫻桃山樝通海者佳餘甘錐栗楊梅鎻梅多榹俗訛榹為衣救軍糧山野彌望綠葉白花紅子極繁五六月熟酸甘可食荸薺茨菰菱角蓮子藕臨安者佳芡實花屬附草牡丹有紅黄紫香粉紅數種茶花竒甲天下眀晉安謝肇淛謂其品七十有二豫章鄧渼紀其十徳為詩百咏趙璧作譜近百種以深紅軟枝分心卷瓣者為上優曇花葉如婆羅而有九絲花如芙蓉而開十二瓣遇閏則多一瓣天女花花似玉蘭而白過之暮春始開香甚清逺蝴蝶花色黄緑相閒形如蝴蝶春夏盛開大理上闗一株樹大花繁更為滇省之冠其花首尾相䘖垂下如串下有蝶泉梅花有紅梅白梅硃砂玉剪緑蕚照水數種又大理上闗唐梅寺有唐梅一株桂花有丹桂金桂銀桂三種又有月桂四季開花夏秋結子杏花桃花有綘桃碧桃芙蓉桃夾竹桃數種李花梨花海棠丁香有紅白二種杜鵑有五色雙瓣者永昌䝉化多至二十餘種梔子扶桑有五色芙蓉有深紅淺紅二種茉莉產元江者花較茂盛蠟梅有磬口雀舌二種石榴有四季開者海石榴有紅黄二種櫻桃有紅白二種紅為苦櫻白子甘可食繡毬有紅白紫色三種紫薇薔薇有五色者玉蘭茄蘭荼䕷唐棣即郁李地棠木槿海紅即淺紅山茶自十二月開至二月與梅同時故一名茶梅金梅花開黄色與梅同時故名又以垂條似栁一名迎春栁山丹俗名映山紅辛夷刺桐一名蒼梧樹髙數丈花開丹紅形如鸚嘴俗又名鸚哥花元江産者尤多小桃紅木香有黄白二種粉團有紅黄白三種佛手花夜合七里香瑞香仙人掌葉肥厚如掌多刺相接成枝花名玉英色紅黄實似小瓜可食金剛纂花黄而細土人植以為籬又一種形類鷄冠以上俱木本蘭有七十餘種雪蘭為勝蓮有紅白錦邉三種又二色蓮紅白中分芍藥有紅紫白數種菊有九十餘種水仙素馨山野蔓生家園廣植蘂紅花白質秀香清亦有四季開者舊志即南方草木狀所謂耶悉茗也稱其種来西域又滇畧云南詔段素興好之故名通雅云南漢劉鋹之姬曰素馨葬處生此人以名之鳳仙俗名金鳳玫瑰地湧金蓮開花者勝鳳尾龍爪鷄冠有髙足矮足百鳥朝王數種玉簪秋海棠剪紅羅魚子蘭十様錦萱迎春報春凌霄石竹五色錯雜凡十餘種金錢鷺鷀毛罌粟有五色虞美人扁竹類萱花一名菉葱花十姊妹西番菊西番蓮西番錦水丁香一名紫茉莉金盞銀臺長春佛手向日葵又有蜀葵冬葵旋葍百合石斛山礬燈籠花燈盞花仙鶴花宛如飛鶴鷺鷀花蝴蝶戲珍珠花白色花開如蝴蝶狀中有圓珠數㸃故名以上俱草本芭蕉有鳳尾象牙美人數種元江又産緬芭蕉公芭蕉二種吉祥草通草蒲草用以織蓆又一種虎鬚蒲象鼻草虎鬚草鳳尾草魚眼草薜荔即香草菖蒲蘋藻荇葦蘆茅燈心草鐵線草火草紫草夏枯草蓼草虎掌草馬鞭草青蒿木屬附竹椿松有油松杉松細松數種柏有側柏團柏合掌茨柏四種梧桐楊桞白楊槐有黄白二種栗有板栗毛栗黄栗白麻青剛數種花栗棠梨楸楠黄楊俗名萬年青水冬瓜楮柞樟梓冬青樗柘紫榆桑檀檜椶櫚檆觀音栁樹髙數丈葉如茴香花開茄色羅漢松綿木皂角樹無花果樹紫竹攢竹水竹苦竹觀音竹鳳尾竹慈竹䈽竹猫頭竹實心竹東坡竹龍竹筋竹藥屬茯苓姚安者為上尋甸武定楚䧺者次之何首烏香附賔川者佳沙薓土人薓蒙化者佳川芎苦薓當歸臨安者佳地黄天門冬富民者佳麥門冬防風桔梗白芷柴胡前胡安寧者佳半夏呈貢者佳南星黄連麗江開化者佳黄芩乾葛升麻貝母白芍赤芍白豆蔲逺志石菖蒲威靈仙天花粉富民者佳牛膝蓁艽黄精猪苓澤蘭重樓常山薑黄大黄大理者佳細辛麻黄香薷木通紫蘇荆芥薄荷大理者佳蒲公英骨碎補草決明益母草豨簽草榖精草龍膽草木賊草菊花金銀花臨安者佳紅花旋覆花絲子車前子史君子金櫻子五味子青箱子枸杞子補骨脂薏苡臨安者佳萆麻子覆盆子蒼耳子石楠藤瓜蔞仁牽牛葶藶大理者佳楮實枳實枳殻陳皮青皮賔川者佳地骨皮桑椹桑白皮桑寄生厚朴石膏滑石麝香羽屬鷄鵞鴨鴿雀鷹鳩烏鴉燕鵲鵪鶉鷓鴣鷺倉庚一名黄鸝雉鸚鵡鸚鵒俗名八哥畫睂白鷴灰鶴錦鷄鸛鸕鷀俗名水老鴉鷗鳬俗名野鴨拖白練黑頭公秧鷄啄木冠鴛鴦鵁鶄子規一名杜䳌隼鷂鶺鴒十様錦巧婦天白了哈唎鷄毛屬馬牛羊犬豕貓驘驢獐麂兔鹿麋猿猴虎豹熊豺狼獺狐狸麢羊野猪蝟䑕有飛䑕黄䑕竹䑕鼫鼠鼷鼠諸種鱗屬附介屬鯉鯽鰷白魚黑魚金魚油魚鮎鰌鱔蟹龜鱗鯉俗名穿山甲蟲屬蠶熱地多產繭織土紬蠭蝶蟬螢蟋蟀蠅蜘蛛蝙蝠螽斯蚊蝱蚱蜢蜉蝣蜻蜒螳螂蛇蜥蜴鼃蝦蟆蝌蚪蠐螬蝸牛蟻蚯蚓雲南府香糯出富民太華茶出太華山色味俱似松蘿而性較寒塘頭布出晉寧塘頭極細宻烏帕鉛粉銀硃黄丹俱出昆明石綠出易門有無不時五色花石出嵩明彌䧺山大如豆五色錯雜取漬盆中作玩舊志可為器皿誤焰硝出易門今無拐棗形曲如拐琪花產晉寜天王廟冬花開三色落不沾塵巨竹出易門蕎甸山節髙數尺芸香草出昆明有二種一名五葉芸香能治瘡毒入夷方者攜之如嚼此草無味便知中毒急服其汁吐之自解又一種名韭葉芸香能治瘴瘧鏡靣草和敝簔煎酒服能治月閉金線魚出滇池金線洞金色細鱗長不盈尺味極鮮美曲靖府茶子叢生單葉子可作油棉花石燕出響水類燕有文䧺大雌小遇風雨則飛能療目疾馬蹄香木瓜梨圓松油蝦出陸凉臨安府藕粉出建水沙糖出建水寧州淡豆豉出阿迷能治傷風紋布出通海莎羅布出建水石青出寧州阿迷㠄峩新平膽礬紫石出石屏可作硯花石出通海勝沉香出河西柚扶桑花􅝄鷄出通海杞麓湖鷄身鴨掌上巳前來重陽前去花魚澂江府土青青皮香出河陽靛出新興蔓胡桃出江川形如扁螺味似胡桃椶皮仙茅出河陽蘆甘石䆲䆡魚一名鮊鮮出河陽撫仙湖凡山麓水涯之石洞曰䆲䆡魚出水涯石穴土人挾巨笱汨水承洞口而取之鱗細味美長五六寸腹多腴乾亦不空舊志訛康郎楊慎以為漮䆡謂其乾而中空未確青魚出舊陽宗眀湖味極佳膽可療目碌魚出江川星雲湖似鯉而首巨極肥美俗呼為大頭魚紫蠏出舊陽宗武定府眀礬出元謀礪石出金沙江龍腦石出獅子山有花紋質㣲脆酸角形似牙皂味甘酸梭羅木五色石斛出祿勸普渡河石壁紺紅者佳巖羊出祿勸州鯖魚廣西府鷄腿竹產山谷間每節上大下小可為杖透眀魚出瀘源洞口其大如指額有肉角色白無鱗蓄水盆中臟腑俱見廣南府雲竹千張紙木實也形似稨豆其中片片如蟬翼焚為灰可治心氣痛草果元江府㯽榔一名仁頻樹髙數丈旁無附枝正月作房四月開花一房百餘實大如核桃剖乾合蘆子石灰嚼之味香美且寛中消脹蘆子產山谷中蔓延叢生夏花秋實土人採之日乾収貨蔞業家園遍植葉大如掌纍藤於樹無花無果冬夏常青採葉合㯽榔食之味香美降真香荔枝僅數本味酸肉薄宻多羅樹髙數丈實從幹生大如冬瓜色似楊梅香甘逈異抹猛果形如木瓜熟於夏月味酸酸角蘇木麒麟竭舊志木髙數丈葉類櫻桃脂流樹中凝紅如血為木血竭又有白竭今俱無鱗蛇膽舊志有黄黒二種長丈餘具四足能食鹿春夏在山秋冬在水土人取食之其膽治牙痛解諸毒黄為上黒次之今俱難得孔雀白鷴泥滑滑即竹鷄能辟壁蝨矮鷄俗名夷鷄足短而鳴長黄魚肉金色味甘肥開化府馬金囊即紫檳榔嚼之飲水味甘除熱可治瘡毒薑黄攀枝花蘇木桄榔可為麵濟食一名董棕粉椶竹鱗蛇膽出安南長官司與元江產者同鎭沅府南棗娑羅布白鷴東川府木棉漆降真香菊花薓出巧家葉似菊花性同人薓法落海出法戛治心痛鷓鷄昭通府笻竹一名羅漢竹方竹二竹皆出鎭䧺山中普洱府茶產攸樂革登倚邦莽枝蠻耑慢撒六茶山而倚邦蠻耑者味較勝蘆子甜筍石青出白龍厰盧薈神黄豆稀痘藥中用之大理府感通茶出太和感通寺蘆子出雲龍州紙有青紙粉紙二色墨靛俱出太和胭脂出雲南縣紅布出雲南縣㸃蒼石出蒼山麓白質黒紋有山水草木之狀可制為屏玩紅花乳扇酥油髙河菜出蒼山髙河泉莖紅葉綠味辛香五六月採之不可多得龍女花太和感通寺一株樹髙數丈花類白菜相傳為龍女所種黒竹出浪穹色黒可為簫管工魚一作公魚出洱海如鰷而鱗細長不盈尺楊慎稱為魚魁螺蛋出趙州楚䧺府響石出文殊山聲清越可為磬越瓜霍香班竹青魚出黒井味佳姚安府木槵一名菩提子圓浄可為念珠木羅布即橦布也橦木皮可為布錦鷄白鷴永昌府縹􅏩布堅厚縝宻類綿紬碁質堅色潤琥珀水晶菜玉墨玉硃砂寳砂海金砂寳石俱出猛緬若水晶墨玉諸品尤貴且逺者舊志載於永昌物產内盖因其由永昌而来實未考其所自出姑存其名雲母石催生石作盃飲酒可治產難紫英石白茄飛松子波羅蜜實大如梨味甘㣲酸董椶麻竹其質綿軟可絞䋲織屨花斑藤出髙黎貢山外色斑中實可為杖排風藤蔞葉產與元江同硫黄黒藥阿魏沒藥乳香兒茶冰片哈芙容即鴉片神黄豆青花豆可治瘡象時魚出瀾滄江雷鳴始出味鮮美竹䶉出騰越鶴慶府石耳形如木耳生感極清之氣久食延年數珠菜生江中形類念珠海棠果出劒川類花紅而小味酸榧子出劒川能烏鬚山驢青銅魚出漾工江細鱗長不盈尺夏月始出蝦米出劒川較他產者尤細膩順寧府蘆子出雲州漆猩猩果色紅味酸子即酸棗仁班竹出雲州濮竹即南中志所謂節相去一丈可受一斛者今產不過去二三尺受升合而已藤竹杖鷄血藤出雲州熬膏治血症蛤蚧綠鳩長鳴鷄矮犬毛深足短即竹書所載短狗脆蛇見人則斷人去復續取而乾之可治腫毒永北府石花菜鹿茸麗江府無芒麥出寳山穂無芒而實圓和尚蒜氆氌出江外自然銅產無定在亦不常有花馬石青石漆葡萄出江外荆花紫金錠以雪山水和藥為之故敷腫毒竒效旄牛舊志作氂牛尾可作纓琵琶猪䝉化府石黄出石母山自然銅有無不常白鹻出舊定邉縣能去垢乳扇酥油棉花紅花人面竹節如人面錦鷄沙溝魚大僅如指美同滇之金線水蜈蚣冬月出漾江中味肥美景東府娑羅布羊肚布織文如羊肚青紙石風丹生石上能療瘡毒仙茅苦子淨瓶蕉布子而生本大末銳形如浄瓶孔雀竹䶉雲南通志卷二十七
