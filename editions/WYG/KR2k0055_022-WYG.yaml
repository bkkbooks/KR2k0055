body:
  text: 雲南通志卷二十二列女民秉五行之秀氣以生而女徳獨鍾坤順故古來賢娃淑媛史不絶書即在僻壤偏隅亦必有懐清履潔之操足以砥礪風俗敦崇壼教者滇為西南夷地自星回一節羣弔阿南幾與五日靈均寒食介子竝傳千古嗣是以還聞風興起代不乏人至我聖朝闡揚善類不遺幽隠詔天下有司所在節烈必以上聞表厥宅里且祠於頖宫之門外九隆三竹間棹楔之在門閭者相望春秋從祀蓋蒸蒸焉録其事記其言不亦與共姜髧髦之誓伯姬下堂之誡後先輝映於風詩史𫝊間哉志列女雲南府晉李毅女名秀父任寧州刺史光熙元年寧州諸蠻叛攻圍州城㑹毅病卒州人以秀明達有父風推領州事秀奬勵戰士嬰城固守城中糧盡炙鼠拔草而食伺稍怠輒出擊破之城賴以全元段功妻名阿􅗩梁王郡主功官雲南平章梁王忌而欲鴆之􅗩知其謀以告功不信遂遇害􅜵服喪矢死哀其夫作詩詳見雜紀馮文舉妻馬氏文舉四川什邡人任雲南儒學提舉氏隨任明玉珍攻雲南城將陷夫謂之曰某受國恩有死而已汝光州馬中丞孫女也其往從乎氏曰夫以義死妾生何益遂焚香北面拜俱縊於學宫皇甫璇妻楊氏桑知州妻李氏景縣尹妻王氏俱昆明人以節旌表明李仁山妻楊氏昆明人年十八夫卒生女未踰月翁憐之諷令更適氏嗚咽㫁一指曰指續則嫁竟不能强洪武間旌表嚴士良妻吳氏福建候官人洪武二十二年隨夫戍滇年二十夫卒撫孤苦守四十餘年宣徳間旌表孫彬妻謝氏江南人夫為廣南衞軍永樂初氏隨戍交阯清化衞生子敬夫卒氏守節久之有詔復安南國歸廣南同戍者强敬遯海而南潛歸吳下氏諭之曰汝父占戎籍汝私還勾牒必至是自罹罪也且滇吳萬里浮海叵測萬一不幸而葬魚腹而父其為若敖之鬼乎乃與敬匿神祠中聣同戍者過盡循故道歸孀居五十餘年壽八十八終敬後以軍功授本衞百戸李暘妻黄氏昆明人年二十二夫卒守節四十年奏聞旌表盧英妻短氏昆明人夫任右衞指揮氏年十九夫卒守節終身劉潤妻趙氏昆明人夫任後衞指揮卒氏年少誓死不二張翃妻胡氏左衞人夫卒㫁髮自誓姑遘疾至再竭誠龥天醫藥輒效趙宣妻朱氏右衞人年十九夫卒誓死不二時南寧伯毛福壽征麓川回在滇謀欲娶之氏曰善為我辭必欲相强惟有死耳卒不能奪守節五十七年壽七十六終屢被旌奬方玘妻曹氏後衞人夫早卒矢志守節後以子矩貴贈夫人大學士李東陽有可貞堂記詔旌其門南村婦昆明人嘉靖間鳯賊之變被驅奔竄至南壩河自知不能前行掩袂投河而死竟不知為誰氏女閻厚妻金氏昆明人夫為郡諸生氏年二十五夫卒無子號痛殞絶口鼻血流家人將屬纊厥明復甦遂竭力養繼姑厯四十餘年徐昂妻顧氏昆明人年二十夫卒撫二孤曰行曰言行以舉人任合江教諭卒於官婦鄭氏年二十七守志如姑御史表其門曰雙節楊氏女名齊姑昆明人夫姓名失傳許聘未嫁夫卒守節終身萬厯時有司兩旌其門良朝元妻郎氏昆明人夫為郡諸生氏年二十夫卒撫遺腹子後亦夭折矢志不移紡績自給壽九十終廖忠妻梅氏昆明人年二十四夫卒甘貧守節撫二子應和應奎俱成立孫宙妻浦氏烏撒衞舉人浦仲良女夫昆明人氏從夫宦京師夫以上林左監丞卒於官二子方在襁褓剪髮置棺忍死扶櫬歸既葬慟哭不食死於墓側周維新妻閔氏昆明人年二十九夫卒撫諸子教以文業辟纑佐膏火苦節五十餘年臺使旌其門後以子作樂貴封宜人劉體仁妻孟氏昆明人夫任保寧府通判卒於官氏匍匐間關扶柩歸里訓課諸子紡績度日後以子文徵貴封安人又贈恭人淑人楊東明聘妻陽氏名羅平姐昆明人年十五許聘未嫁而夫卒女哀慟欲死以救得免後母欲嫁之竟自縊死事聞建坊祠祀今永清門内烈女坊猶存周允惠妻王氏昆明人年二十九夫卒守節至九十九嵗終萬厯四十二年撫按司道咸旌表之姜愷妻吳氏昆明人事未詳萬厯四十五年巡按御史吳應琦以節婦具題建坊旌表王宓妻時氏昆明人年二十四夫卒無子僅一女含悲忍痛謹事舅姑後翁姑相繼殁女成人遣嫁畢即自縊死具題旌表張翿妻胡氏昆明人家甚貧氏年少撫孤終身不易壽七十終王僎妻段氏昆明人年二十五夫卒子萬年在襁褓養姑教子守節三十餘年劉悌妻常氏昆明人年二十六夫卒家徒四壁矢死不二以女紅自給名其孤曰大節厯六十餘年節既成立為諸生娶嚴氏節尋卒家道益替嚴亦甘貧守節撫其子舉於鄉鄉人稱雙節云陳爰諏妻王氏昆明人夫任吏部主事卒於京氏扶櫬旋里遇安賊之變罵賊而死年甫十七崇禎十年長子履忠成進士具疏陳情詔建坊旌表魏昇聘妻姓氏失傳昆明人許聘未嫁㑹其夫以罪遣戍騰衝父母謀為女别嫁有成説矣女乃潛出自投水死覔之不得姻家將訟諸官屍尋浮出漁者見之事乃明秦春妻王氏昆明人年二十二夫卒囊無尺帛矢死不二厯四十三年壽六十五未及旌而卒吳鑰妻戴氏昆明人年二十七夫卒紡績自給守節終身李光憲妻張氏昆明人年二十四夫卒撫遺子養舅姑守節四十餘年張翔妻朱氏昆明人年二十一夫卒守節勤苦持家嚴肅事翁姑克盡孝道崇禎十七年具題旌表入祠沈國英妻孫氏昆明人與夫事孀姑張氏惟謹氏年二十四夫卒茹苦守節撫幼子林成立孀居六十年壽八十四終其姑張氏亦孀居六十五年壽九十三終杜久徵妻白氏昆明人年二十二夫卒遺子甫二嵗氏守節撫孤子年十九亦亡氏大慟曰未亡人為有遺孤耳今子死我生何為遂自縊死沐天波母陳氏江南人沙賊之變天波自省奔迤西士民奉氏至朝陽庵聞其媳焦氏自焚笑曰若能如此吾無憂矣亦自焚死沐天波妻焦氏江南人沙賊之變滇民奉氏至金井庵其姑陳氏遣人問計對曰吾家累世重臣身為命婦當死宗廟遂舉火自焚時幼女在旁抱之同死沐天波女名瑞貞甫十齡許配劉文秀子劉子痘殤天波謂女曰汝壻死矣我將往弔及至文秀第家人馳報瑞貞自縊死遂與文秀子合葬毛從讓妻劉氏昆明人年二十四夫卒氏矢志靡他撫子義成立娶魏氏年甫十八義復卒遺孤禹一嵗人以魏年少恐難守魏聞而嘆曰吾姑不忍負吾舅而守吾夫吾獨忍負吾夫耶誓死撫孤事姑倍謹一門雙節人以為難林東橖妻李氏昆明人早年喪夫守節五十二年撫五子成立趙廷璧妻黄氏昆明人流冦陷曲靖氏有妹適曲靖蔣氏城陷被執投井死氏聞之泣曰吾妹見賊而後死何若先死之為愈乎遂自縊薛之蕃妻楊氏昆明人流冦至恐被辱與夫泣别率二女同縊死楊順成妻舒氏昆明人流冦潰兵肆掠氏恐為所汚以毒物塗身剪髮垢面自炙成瘡為隣婦所嫉訐其患處非真遂被執欲汚之氏抗節不從自縊而死王重光妻段氏昆明人光卒矢志守節舅姑亡鬻産以葬教二子力學有成崇禎間旌表入祠艾龍光妻簡氏昆明人夫病百法醫療無效及亡事姑盡孝守節四十年崇禎間題請入祠程世勲妻蕭氏世勲後衞人官百戸嘉靖間督師討鳯繼祖之亂亡於陣時蕭年十八矢志冰霜孝事孀姑李氏撫育襁褓子道南埀五十年而終竇康續妻謝氏昆明人年二十九夫卒守節五十五年教子雙桂成名陶希哲妻禄氏昆明人年二十六夫亡柏舟自矢以紡績撫二子成人至八十嵗而終吳承祚妻繆氏昆明人夫死無子甘貧守志垂五十餘年李文徵妻熊氏昆明人年二十五夫亡苦志守節撫子成人至六十七嵗而終羅必舉妻張氏昆明人年二十而寡家甚窘堅志守節撫幼子偉成人孀居五十三年方袍妻俞氏昆明人年三十而寡子幼家貧矢志守節夜僅一燈紡績督四子環讀皆成名屢奉旌奬劉傑妻吳氏昆明人傑鄉薦任河間府青縣學博卒於官吳年二十八扶櫬歸葬訓子成立至九十一嵗而終完嗣昌妻太氏昆明人聘而未娶氏年十六夫病篤氏往侍湯藥不三日而亡即守制不回事舅姑二十餘年舅姑殁祭葬以禮苦節六十六年施于身妻嚴氏昆明人于歸甫七月于身以公車北上不第授仙居令值流冦猖獗道路阻絶嚴毁容㫁髮率婢鍼黹以養翁姑沙賊陷滇翁姑相繼殁拮据殯葬兼為夫弟冠婚授以家事時兵戈搶攘恐不能自全屢以死計因婢防視得免迨後氏髮皓然于身忽歸夫婦不能相識觀者咸為嘆息施堯心妻龍氏女全妹二姑適劉惟馨媳蔡氏施于朝妻金氏施于國妻姪女二姐施堯明女適周文英小妹施堯道女適段恪姪媳傅氏施于聘妻孫女海長于國女孫媳朱氏施濬妻俱昆明人龍氏于歸七年而寡流冦入滇龍與媳女等自縊死時堯道女適歸寧人勸其隨父母潛避不可曰既為段門婦禍亂從夫禮也乃隨夫恪駕舟昆池匿蘆葦中冦兵搜海恪被殺氏投海死人傳施氏十烈賀彭妹施于聘撫外家賀姓女隨傅氏縊死嚴賔妻徐氏媳白氏嚴似祖妻羅氏嚴佩祖妻施氏嚴侍祖妻女嚴氏適李門孫女嚴氏適萬門嚴氏適張門壽貞二妹姪媳韓氏姪孫媳何氏姪孫女淑貞表姪媳胡氏俱昆明人徐氏尚書嚴清之季媳也年二十三夫卒苦節自守年六十四值流冦入滇召諸婦女訓之曰我家世受國恩今冦至得死所矣遂舉火自焚鄰里救止之乃别徙一室與媳白氏等相繼投繯死嚴敦培妻任氏昆明人在母家聞姑闔門死慨然曰我其從姑地下乎亦自縊死楊思義妻陳氏昆明人嚴賔佃戸聞田主闔門殉節隨夫投井死范立朝妻王氏曽孫女性存昆明人朝平涼知府流冦至王氏堅欲盡節子若孫以年老固留不可曰我受誥封不死為不忠汝等留我不孝與曽孫女性存懸梁繩㫁赴菱角塘死徐盛妻邵氏女徐氏昆明人流冦入滇邵恐受汚自縊死女投雲津橋河中郭崶妻葛氏昆明人崶楚雄訓導沙賊叛與楊畏知倡義守城及賊攻楚雄葛曰我先死勿致君累庶可盡心為國遂投井死范應貴妻胡氏昆明人以夫刑部員外封宜人流冦至避兵皇經館為賊執紿賊曰我取金鐲與汝賊得鐲甚喜氏急投井死賊從井上以亂石擊之撈起頭盡碎施堯敘妻傅氏昆明人敘庠生傅聞賊將至即以死自誓及城潰遂與姪媳黄氏焚死施于京妻黄氏京欲殉難黄曰亦妾願也乃與其子濂隨叔姑舉火自焚楊歸儒妻王氏媳王氏楊徳溥妻王駟驤妻趙氏俱昆明人王氏年三十夫歸儒卒守節教子厯三十餘年流冦入滇氏同媳王氏内姪媳趙氏避祠山廟後祖居夾牆中為賊所獲紿賊曰樓上多財物賊不及覺遂抱孫女啓後門與二婦投水月庵水塘而死劉援妻楊氏昆明人夫亡守節教子成立流冦入滇與妯娌子婦闔門自縊死李為龍妻尹氏昆明人居孀二十四年流冦至勒寡婦配軍氏持刀自殺董邦昌妻王氏妾何氏媳段氏董夢桂妻女董氏孫女董氏二婢俱昆明人流冦入滇避兵蘇家村聞冦刼掠懼為辱王與妾何氏等聚一樓積薪焚死解從富妻李氏解從應妻唐氏俱昆明人流冦至李與娣唐恐被辱同扃戸分左右縊死時以樓板合葬野田中有樹挺然出墓後一本雙枝人謂雙烈所致楊達儁妻羊氏昆明人流冦初入滇氏即為盡節計繳線為繩二一授其女一佩身及冦至同女扃戸自縊死邵愈謙妻阮氏昆明人名端通書史年十八歸邵次年流㓂入滇闔家航昆池避亂為賊搜獲氏已編髮聨衣於晏公廟前自沈而死賊大感悔邵氏一姓俱得生全舟中几杌上寫詩三首一曰烟波杳渺浩無涯肅羽哀鴻集淺沙風吹碧浪千層逝那箇雲邊是阿家二曰珊珊環珮已飄零汨汨濤聲不忍聽雁逝長空猶有懼魚潛水底豈無驚白楊夕照何堪挹青冢凄風自足鄰欲識此心何所似翹首西山月一輪三曰家室飄摇歎陸沈涉險乗航意未申繡闥緑窻惟夢到葬入江魚不染塵王璛妻朱氏昆明人流冦至同羣婦避地窖中賊覺盡牽出氏持刀立㫁己首賊大驚曰吾未見敢死如此婦者盡釋羣婦而去朱運昇妻王氏妾陳氏俱昆明人流冦至同避昆池中賊搜海俱赴水死施于鎮妻楊氏昆明人于鎮守越州將出征微有逡巡意氏促之行鎮猶未果氏慷慨自縊死楊嗣昌妻孔氏昆明人昌為郡庠生氏歸六年值流冦徵丁昌以代弟死安籠遺一子一女氏矢志苦守丁亥冦勒寡婦配軍氏聞之急投井中數日以水淺得不死遂削髮毁容後子亦死只一女相依苦節五十年而終薛大觀妻楊氏媳孟氏薛之翰妻女夢雲靜玉婢蘭馨俱昆明人流賊肆掠大觀舉家至城北龍泉觀楊誓不茍活遂與媳孟氏等相攜赴潭中死金應斗妻張氏昆明人年二十八夫亡撫四子皆成名孀居四十五年避兵羅母黄毛箐潰兵至張厲聲罵賊投河死徐大妻竇氏女大姐昆明人潰兵肆掠竇與子學中并其女闔門自焚死任允升妻趙氏任允元妻薛氏任允元女大妹任允中妻瞿氏任熙女黒姑婢玉書王媽媽俱昆明人流冦之亂趙氏等避兵羅母五道河為賊所覺相與投水死土人鐫碣識之曰任氏一門八女死節處八女者合丁焜南妻任氏而言也丁焜南妻任氏丁炳南妻金氏丁炳南妹小姑俱昆明人同避兵五道河聞賊至俱自縊死羅綺妻張氏妹羅氏昆明人避兵羅家營勢漸急張懼不能保對夫曰人生名節所關萬一有失雖生猶死遂偕小姑自縊死熊才妻司氏昆明人流賊至偕姻家李氏匿夾牆中一婢為賊執逼指藏金婢曰問主母方知賊出招黨司與李計曰事急矣遂各抱幼兒女從後門投南壩盤龍江而死張耀妻李氏昆明人同司氏投盤龍江盡節李舒秀妾李氏舒秀昆明人氏原籍大興年二十九舒秀卒氏撫孤守節艱苦備嘗及流冦入滇子被擄有欲奪其志者氏剪髮刺面卒能自全後子貴迎養壽八十二嵗而終高遇説妻何氏妹高氏姻家黄氏俱昆明人流冦至何泣拜翁姑曰婦生恐失身死恐失養幸有夫在可無憂也翁姑止之不聽與姻家黄氏并姑姊縊死一室中李祚昌妻謝氏昆明人流賊之變夫被潰兵拷炙氏厲聲罵賊賊欲殺之閉戸自縊死張翹妻周氏昆明人夫亡守節二十六年賊兵肆掠氏恐受辱投井死周祚興妻楊氏楊氏弟婦羊氏周謙妻高氏俱昆明人流冦入滇舉家避兵于石鼻村楊年方少且有身謂祚興曰事急矣妾懼不免願一死以釋君累祚興泣止之不聴遂與弟婦羊姪婦高潛至一室同縊死康熙二十七年巡撫石琳表其門朱鼐妻張氏朱霞妻冦氏俱昆明人避兵官渡木龍村賊至妯娌同縊死楊三畏妻陸氏楊偉妻汪氏俱昆明人同避兵複壁中賊覺被執窺二婦皆少艾欲牽之陸紿之曰待我梳洗同去賊喜甚陸櫛沐竟即抱子投井中汪亦相繼投井死山崙妻趙氏媳王氏山應星妻女二姐三姐山嶷妻沈氏女二姐徐錫衮妻山氏山崙妹女大姐王彝妻山氏嶷長女山姓同居楊氏俱昆明人流冦至趙與娣沈氏等共十人避複壁中賊將覺懼為所汚相繼投繯死施于鐄妻胡氏施濎妻嚴氏俱昆明人流冦之亂胡抱幼女同姪媳嚴縊死胡棨妻莊氏昆明人以兵亂先縊其幼女遂自縊嚴敏培妻丁氏女錫慶昆明人避兵變於北山丁聞敏培被擄同女縊死嚴永培妻楊氏昆明人流賊肆掠氏投雲津橋河而死嚴恩培妻湯氏昆明人避賊海子村賊至逼之氏大罵不從遂被害夏思禹妻余氏媳馬氏夏思周妻張氏昆明人賊至避夾牆中聞鄰家拷掠知不免同縊死何誥妻王氏何詔妻江氏俱昆明人王氏許聘未嫁流賊之變父送歸夫家尚未成禮避兵石鼻村潰兵至氏投深崖得免夜抵桃園村潰兵又至復跳深箐己亥正月氏從容言於舅姑曰媳必死始免舅姑累次日同娌江氏投繯死蘇騰吾妻陳氏昆明人騰吾明末副將卒陳年二十七孀居四十五年流冦兵亂懼為辱乃與妹陳氏并其媳何氏等同時縊死程其信妻陳氏其信任州牧入贅陳門氏能詩年六十八值流賊之變同姊呼媳袁氏姪媳何氏曉以大義何袁慨諾下樓相繼投繯氏代姊題絶命詩於樓壁云風風雨雨幾朝昏四十年餘𦂳閉門今日殘軀勒謝帛留將冰雪贈兒孫復自題云任是彭殤總一坵饒將花誥亦蜉蝣辭明幸有知心侣何事依依更下樓懸二繩於梁分左右縊死蘇應昌妻何氏騰吾長媳程黙卿妻袁氏其信媳八月姐陳氏婢年十七見主母欲殉節誓與同死三易其繩而絶尤為􅃤烈卜國泰妻全氏卜其昌女卜氏俱昆明人全氏年二十八流冦兵至與小姑卜氏同時自縊死楊嗣緒妻段氏女大姑昆明人己亥兵亂段恐被辱呼女同縊死趙從耀女長妹昆明人流冦時潰兵入室從耀被拷掠女聞之縊死夾牆中從耀不得已指以夾牆有物賊毁牆見女披髮睜目伸舌吞賊狀賊驚釋去陳王烈妻梅氏昆明人夫亡氏年二十六守節十五年己亥潰兵肆掠梅急投井以救得甦恐終不免於辱復以頭觸井而死嚴可富妻高氏宜良人年二十七夫卒以女紅給諸子讀書墓祭歸道拾白金八十餘兩訪其主還之其子鎮娶汪氏未幾卒汪亦年二十七生遺腹子容矢志如姑皆壽終鄉人稱為嚴氏雙璧大學士李東陽作𫝊謝遷為記巡撫都御史王啓為贊李華妻王氏宜良人少通孝經列女𫝊年二十一夫卒子甫三月撫之成立厯五十餘年子入仕籍陳湧川妻程氏宜良人年十九夫卒守節訓子成立年八十五終藍彬妻萬氏宜良人年十九夫卒無子紡績以養翁姑及翁姑殁身營殯葬如禮年八十五終周贇妻趙氏宜良人年十八夫卒子徳芳甫數月氏矢志育孤既長為娶妻生一子徳芳又卒氏撫其孤荼苦自甘年八十終凌懋妻孫氏晉寧人年二十四夫卒巨家慕其賢競謀委禽氏號泣截髮竟不能奪撫子克温舉於鄉詔建坊旌表蘇震妻段氏晉寧人年二十一夫卒守節其姑欲奪之氏潛入暗室㫁髮自縊姑覺救之乃生自是閉門紡績以養其姑號泣至喪明焉唐鋂妻陳氏晉寧人年二十七夫卒家貧無子姑欲奪其志氏泣涕不從姑病嘗藥姻戚不輕見守節六十年嘉靖間巡撫表其門王綸妻史氏晉寧人年二十夫卒苦節終身奏聞旌表蕭必達妻任氏晉寧人年二十六夫卒家貧未能舉喪子甫一嵗姑年七十氏紡績養姑越二年姑殁兩喪在堂拮据殯葬苦節五十餘年撫子成立萬厯二十九年奉㫖旌表趙輈妻段氏晉寧人年二十夫卒截髮自誓撫孤養親夫墓碑豫刊己姓氏以表同穴守節五十八年萬厯三十三年奉㫖旌表胡道明妻王氏晉寧人郫縣令如春女年十九夫卒家貧無子矢志堅貞孝養舅姑守節六十六年萬厯四十五年旌表入祠李名奕妻蘇氏晉寜人夫病日夕龥天求代藥必親嘗夫卒氏年二十五以死自誓毁容見志時翁姑年老二子尚在襁褓家窘紡績以給守節四十九年萬厯四十八年奉㫖旌表楊大韶妻孟氏晉寧人年十九夫卒矢志養翁姑苦節五十餘年瞿鳴鸞繼妻孫氏直𨽻高陽人大學士孫承宗孫女子華任通海教諭迎養至晉寧州遇流冦欲引去氏罵賊不辱為賊所殺被七刃以死李志恭妻王氏夫為呈貢諸生早卒二子皆幼有諷氏改適者泣曰吾與二孤相為存亡耳後二孤皆為諸生氏以壽終萬厯二年奏聞旌表張䕫龍妻趙氏呈貢人流賊之亂氏同三女及媳張氏避冦於城東石硐為亂兵所得顧女與媳曰毋見辱惟一死耳伺間女與媳環拜而縊氏觸柱死趙芑女名淑姐安寧人夫姓名失𫝊女年十四許聘未嫁鳯賊之亂慷慨自誓以衣蔽面投河而死詔建坊旌表趙文秀妻楊氏安寧人夫卒青年撫孤志操堅貞事聞旌表王璽妻李氏安寧人年十九夫卒痛哭求死母知其有遺腹以嗣續曉之乃止後生女不易其志厯四十年萬厯十五年奉㫖旌表陳孟章繼妻田氏安寧人夫任南京户部主事氏年二十一夫卒號呼欲絶刺面毁形事翁育女厯四十年萬厯三十一年題表入祠陳應賢妻董氏安寧人教授董維女年二十六夫卒子幼家貧紡績佐讀事繼姑朱氏以孝聞厯艱茹苦五十餘年崇禎十二年奉㫖旌表羅天文妻洪氏安寧人沙酋之亂豫以利刃藏身後為賊所獲夫逡巡隨後賊欲殺之氏紿之曰此非吾夫也將入賊營氏遥囑夫曰君自歸我不相負遂出所藏刃自刎死張維樞女安寧人夫姓名失𫝊流冦至氏年二十一隨夫避羅扆島中為賊所獲欲汚之誓死不從賊怒刺死於巖下羅肇龍妻楊氏安寧人其母居昆明聞流賊至授以一繩期同死賊至氏即將母所授繩自縊其母先殉節死傅爵妻姜氏三泊人年二十一夫卒撫其子教以義方士民嘉之白於臺使旌表王衢妻陳氏禄豐人年十六夫卒伯叔憐其無子欲奪其志氏赴水死賴鄰婦急救復甦奏聞旌表王氏禄豐人夫姓名失𫝊早嵗夫卒家貧苦守事翁姑三十餘年及翁姑殁營葬事畢即自縊於墓上事聞詔建貞節坊王業元妻許氏禄豐人早嵗夫卒貞節自勵阿克之亂禄邑受禍最慘氏乗賊未至先自刎而死事聞詔入忠節祠王錫衮妾尚氏禄豐人錫衮死沙賊之亂氏恐受汚與錫衮弟婦俱自縊死周氏女禄豐人幼明慧有識年十五值沙賊之亂慮為所獲謂鄰婦曰女子身自完豈可委身待辱乎遂閉門自縊陳梁妻劉氏昆陽人年二十二夫卒人欲奪其志氏堅執不移終養翁姑撫兒成立年逾八十萬厯時臺使旌其門李士馨妻耿氏昆陽人年二十三夫卒㫁髮入棺勒名夫墓石守節終身有司旌之高甫妻趙氏昆陽人年二十餘夫卒㷀居撫孤永矢靡他厯四十餘年臺使旌其門卒祀於祠李兆旂妻洪氏昆陽人崇禎間隨夫任廬江訓導流冦陷城夫與幼子俱死氏號呼尋夫與子屍僅得夫首領及左臂長子澄徒步負骨氏衰服杖行撫按聞而憫之助金歸晨夕哭拜至終身焉督學使旌其門吳國慶妻閔氏昆陽人年二十三夫卒苦節自守流冦陷城罵賊而死張文彩妻王氏易門人夫早卒氏年少堅志守節奉姑教子厯四十餘年足不履閫外詔建坊旌表宋廷相妻梁氏易門人年十八夫卒苦志守節萬厯三十年旌表劉琛妻邱氏楊林所人年二十二夫卒守志不渝遺腹三月生子緒撫之成立成化間旌表鄭儒妻洪氏嵩明人夫中𢎞治戊午舉人計偕卒於京訃至氏屢自縊以殉姑救免守節甘貧與姑同寢食閾不踰衣不彩督課幼子成立羅江妻李氏嵩明人夫任南昌府推官遘疾氏每嘗藥而進繼以割股夫卒扶柩歸哀痛喪明適有冦至抱遺像投水母姊救免焚刼一空益勵苦節嘉靖間旌表楊鈞妻李氏嵩明人夫任永安州知州苦節自甘卒於官氏痛哭幾絶攜幼子扶櫬還里至廣陽堡遇冦恐為所辱遂赴水死永安人思鈞之清高氏之節為建雙節祠於江干本朝傅景明妻唐氏昆明人年十八夫卒堅守苦節厯五十六年事姑撫子孝慈兼盡康熙三十年具題旌表熊卜尚妻梁氏昆明人年二十餘夫卒有數月遺孤氏剪髮毁容堅操撫子遭吳逆之變流離萬狀厥志不渝厯四十六年如一日康熙三十二年具題旌表辛有耕妻湯氏昆明人年二十二夫卒孝養孀姑喪葬盡禮撫育子女皆成室家貞心苦節鄉里稱之戴高妻戌氏昆明人年二十一夫卒刺喉噴血幾絶遇救而甦敬事翁姑嘗割股以療姑疾課諸子皆成立郝翔妻蔡氏昆明人年二十二夫卒自縊以殉姑救免後遭冦亂復投水死姑倩人撈救復甦貧無立錐女紅養姑姑病焦渴食不下咽氏覔乳哺之三年及殁勉力營葬撫二子皆成立以上三人康熙四十四年具題旌表劉國正妻沈氏昆明人年二十一夫卒子賔甫二嵗有勸以他適者輒誓死家貧甚作飯以奉翁姑而糟糠自啜翁姑相繼殁殯葬如禮教子成立張良翰妻陳氏昆明人夫為易門廪生氏年二十八夫卒三子俱幼家貧日夜紡績以養孀姑姑病侍湯藥坐卧不少離及殁哀毁愈至教三子皆成立以上二人雍正元年具題旌表楊玉龍妻丁氏昆明人年二十五夫卒子旵曔皆幼翁姑欲遣嫁之氏截髮見志翁姑殁竭力殯葬後子曔亦卒氏與媳撫孤孫苦節三十五年雍正五年具題旌表成于朝妻王氏昆明人年二十八夫卒三子皆幼氏誓死守節家甚貧紡績以事翁姑及殁拮据殯葬如禮王珍妻初氏昆明人夫為邑廩生氏年二十六夫卒子尊賢尚幼矢志堅貞織絍以養翁姑教子為諸生張應坤妻完氏昆明人年二十七夫卒子鈞甫三月氏哀毁不食翁姑泣曰如張氏一綫何乃復食後翁姑殁殯葬如禮撫子成立謝履恭聘妻李氏昆明人年十六許聘未嫁聞夫訃請於父母欲歸謝氏奔喪弗許絶粒不食父母乃聽歸謝氏撫姪崶為嗣孝事翁姑教育嗣子後崶舉於鄉楊桂柏妻王氏昆明人年二十七夫卒二子朝元朝棟俱幼氏欲以身殉姻戚勸以姑老子穉乃止孝事孀姑撫育二子後朝元亦卒媳王氏矢志守節如姑王應舉妻陳氏昆明人年二十八夫卒二子皆幼氏痛絶復甦家貧拮据營葬有勸以改適者以死自誓工紡績養孀姑表以上六人雍正九年具題旌林之秀妻李氏昆明人年二十七夫卒甘貧守節孝事孀姑撫二子成立孫五人有抱孫者五世一堂壽至百嵗人以為苦節之報雍正十一年具題建坊旌表嚴崑妻尤氏宜良人年二十三夫卒子應昌甫三嵗氏矢志育孤紡績自給康熙五十年具題旌表陳黼扆妻倪氏妾李氏女陳氏宜良人順治十五年流冦據滇聞布大兵至賊奔宜良氏同妾女避亂東山瀑崖聞夫死路南與妾女俱奮身跳崖死徐大聘妻陳氏妾楊氏宜良人順治十六年與大師入滇潰兵四至氏妾避兵紅石崖其夫為冦所擄氏與妾亦被執恐見汚同投大赤江死僅存幼子璘以上五人雍正題五年具旌表保亮妻楊氏宜良人姑殁翁老兩目昏盲佐夫盡孝氏年二十夫卒僅遺一女氏矢志不二撫姪為嗣翁以壽終喪葬皆如禮雍正九年具題旌表劉遇平妻郎氏羅次人年二十餘夫卒子甫三嵗氏號痛欲絶姑繼殁翁娶繼姑趙氏氏敬事之未幾翁及繼姑又殁皆勉力營葬守節三十五年雍正九年具題旌表黄玥妻唐氏晉寧人夫為諸生年二十一夫卒子夢祥甫兩月矢志堅貞事姑克修婦道守節五十二年康熙四十四年具題旌表姚俊妻趙氏晉寧人年二十六夫卒日夜悲痛粒勺不入口或以翁姑老子幼責之乃節哀復食勤紡績供甘㫖教子讀書翁姑繼殁守節五十四年壽八十雍正九年具題旌表陳其敬妻楚氏呈貢人年二十六夫卒時舅姑年皆六十餘紡績以養遺孤甫三嵗宅後有桑一株故夫手植每撫桑以哭桑為之枯雍正三年具題旌表楊攄妻蘇氏安寧人貢生蘇恩女年二十三夫卒誓死不二事翁姑克盡婦道子居業甫五齡撫育成名康熙四十五年具題旌表王養正妻洪氏昆陽人年二十一夫卒有遺腹五月氏誓死以守後生子名順天撫育成立苦節四十七年順天長娶楊氏與夫同事孀姑甚謹順天尋卒楊年二十五效姑守志訓子來賔為諸生厯三十二年俱於康熙二十四年具題旌表吳澄淮妻楊氏易門人年二十六夫卒養姑課子取給機杼間苦節特著雍正三年具題旌表但齊賢妻王氏易門人年二十五夫卒撫子襄成立襄又卒堅志守節三十一年雍正四題年具旌表蒲葉盛妻李氏嵩明人年二十四夫卒姑老子幼茹苦守節躬事紡績奉姑教子後子易藩舉於鄉張𢎞任妻蘇氏嵩明人遇姑與夫疾俱割股療冶弗愈夫卒時氏年二十六堅貞自誓事翁孝謹撫子成立康熙三十三年具以上二人題旌表李朝宰妻段氏嵩明人年二十八夫卒子甫六嵗氏躃踊幾絶以子幼勉為撫育辛苦以養舅姑守節三十九年雍正九年具題旌表王之賢妻陳氏昆明人年二十八夫卒哀慟絶而復甦敬事七旬孀姑跪奉湯藥親滌溺器撫成二子苦節四十六年傅曰仁妻劉氏昆明人年二十九夫卒勉力營葬終喪後仍縞衣素食惟以紡績為事奉祖姑撫孤子克盡慈孝守節厯四十四年羅鴻漸妻王氏元謀諸生王鼒女年二十五夫亡能知大義養老撫孤姑殁喪葬俱盡禮遇忌辰雖薄物必哭奠守節厯四十五年次子一萃舉於鄉於崇惠妻李氏昆明人于歸後值兵燹奉姑匿山谷間食盡隨夫數十里負米供饔飱踵至流血年二十八夫亡事姑益謹撫二子俱成人守節厯四十五年錢元妻雷氏昆明人年十九夫亡親族勸之再醮氏不從孝養舅姑久而不懈舅姑殁喪葬如禮守節厯四十八年張其能妻楊氏昆明人武縁令楊葉女幼適張見夫清貧即遣回僕婢躬操井臼年二十九夫亡欲以身殉翁勸諭乃止翁殁拮据殯葬盡哀盡禮次子誠舉於鄉旋卒氏與孀媳趙氏撫孫苦節四十年戴國詔妻張氏昆明人于歸未久夫染病卧床二載氏竭貲醫治夫亡年二十八家計日窘而奉養老姑甘㫖無缺姑殁事繼姑亦甚謹教子桂讀書為諸生守節厯四十五年閻俊妻劉氏昆明人夫家貧甚氏紡績以供菽水克盡婦道年二十九夫亡奉姑撫子備著辛勤守節厯三十二年張玉龍妻李氏昆明人年二十九夫亡養舅姑以孝聞教子力田不失本業守節厯四十年葉政妻郭氏昆明人明指揮郭啓元女夫貧罄奩贈以佐膏火體無完衣終無怨言年二十九夫殁撫育三孤俱成立子本朝順治三年值沙賊之亂恐為賊所汚誘三出閉門自焚死後向高妻任氏凌雲妻陳氏即其孫媳曽孫媳也三代相繼守節皆氏之風烈有以啟後云葉向高妻任氏昆明人以賢孝聞年二十六夫亡值流冦入滇連嵗荒歉竭力女紅奉舅姑以肥甘己則糟糠充腹舅姑殁喪葬俱如禮守節四十六年葉凌雲妻陳氏昆明人年二十五夫卒姑老子幼家無寸産氏紡績養姑拮据喪葬終身不茹葷血守節五十九年宋裔良妻紀氏明晉寧百戸紀檜女年二十七夫亡人有以無子諷其改適者氏毁容拒之依堂姪士璋家讒言搆釁氏輒斥不聽與士璋母唐氏和睦終身守節四十五年宋裔超妻唐氏昆明人年二十九夫亡矢志靡他夫之叔宦遊遇兵燹歸貧甚舅姑邀至家中共爨數十年氏能體舅姑之心敬以事之與娣紀氏同甘苦紀氏死為之殯葬成禮氏守節六十年現年八十九嵗萬鵬程妻楊氏富民人年二十六夫執父喪以毁卒氏欲自盡親鄰以姑老子幼力止之家既貧寠送往事居勤勞艱苦厯三十七年教子軸成諸生毛翰妻劉氏安寧人年二十八夫卒子甫八月苦志守節敬事翁姑凡祭祀賔客必誠必潔守節四十三年教子成諸生曹琛妻施氏安寧人年二十八夫卒家貧紡績以養翁姑姑殁事繼姑尤加敬愛飲食必親嘗衣服皆手自縫紉及翁姑相繼殁哀毁號慟聞者淚下苦節四十二年李懐城妻吕氏嵩明人年十六于歸適姑病篤奉湯藥者三月晝夜不懈年二十一夫亡紡績課子足不出戸守節厯五十七年李國榮妻蘇氏嵩明人事翁姑以孝聞翁病劇嘗糞卜之年二十六夫亡荼蘖自甘撫子成立守節厯四十六年題以上十九人雍正十三年具旌表續編已具使題旌表者列於正編其經府州縣及布政申詳巡撫衙門查核的確將來陸續具於題者列續編陳湛源妻黄氏昆明人夫為諸生氏年二十二夫卒涕泣謂姑曰子婦不孝適陳門五載一無所出有死而已姑曰汝死則吾身更何所託乃繼姪為嗣躬織以養姑姑殁喪葬如禮守節十五年而終鄒近泗妻邢氏昆明人年二十八夫卒親族勸之改適曰家貧如洗何所恃而守氏曰吾能忍饑寒不能忍恥紡績度日撫孤成立守節三十五年鄭士長妻吳氏昆明人年二十九夫卒自縊以殉母救得免士長本楚人客死無田宅賃房以居子甫五嵗氏晝夜紡績以供衣食遂至兩目皆眊守節三十七年劉嘉彦妻陳氏昆明人年二十九夫卒力貧守志孝事翁姑翁姑殁哀泣痛絶感傷行路撫子成立苦節二十七年許天麟妻温氏昆明人年二十六夫卒家貧不能具含殮鬻嫁時粧奩以營喪事葬畢入房自縊姑救之得不死值凶嵗姑病翁失明氏拮据以供藥餌姑殁喪葬如禮有所遺敝盧一區以夫弟年幼推以與之守節三十年教子文級成諸生康茂才妻宋氏昆明人夫為撫標兵氏年二十九夫卒家貧甚紡績撫孤苦節厯四十八年許珍妻尹氏昆明人隨夫徙居河陽年二十九夫卒子幼家貧茹荼自守三旬九食冰操特厲撫子成立壽七十二終王雄妻黄氏昆明人夫為撫標兵氏年二十九夫卒子甫嵗餘日夜紡績以養七旬衰姑姑疾焚香告天願以身代及殁拮据以襄殯葬守節二十五年王永徳妻曹氏昆明人年二十九夫卒家貧紡績養姑姑殁營葬撫二子成立守節三十一年蔣徳宣妻劉氏昆明人夫病割股以救年二十三夫卒苦節撫孤教子元克繼醫學壼儀備著馬成龍妻張氏昆明人夫為撫標兵年二十九夫卒家徒四壁姑嗣殁竭力營葬辟纑度日饘粥不繼苦節二十四年李春榮妻韋氏昆明人年二十四夫卒子甫一嵗矢志撫孤奉養祖姑及孀姑備極勤勞喪葬以禮守節三十七年吳徳榮妻王氏昆明人夫為督標兵氏年二十四夫卒養七旬孀姑克盡婦道喪葬如禮遺孤尋卒氏泣曰夫死子喪寧惜餘生但念蒸嘗無主勉留殘息敝屋一椽紡績自給厯四十二年何一貞妻符氏昆明人年三十夫卒遺三子皆幼未幾伯仲皆亡僅存季子惠親族慮不能守以言探之氏泣血自誓撫惠成立守節五十六年胡汝英妻孫氏昆明人年三十夫卒事姑克孝撫二子成立守節至八十二嵗而終楊芬妻趙氏昆明人于歸九月而芬卒氏年十九勵志守節厯六十四年繆汝恩妻章氏昆明人汝恩中鄉薦卒於京氏鬻産歸櫬以葬撫四子成立守節五十餘年包光昌妻高氏昆明人夫卒氏年十七剪髮結夫髮遂就縊以救得免守節六十四年而終邱成章聘妻金氏昆明人氏年十八將嫁前三日夫暴病死氏聞欲往奠父母未允其請氏志在必往於是聽之遂盛裝登輿至邱門上堂拜見舅姑及長幼諸親繼喚其家婢僕出叩畢入室更縗麻詣靈前哭拜如禮撫棺又哭至柩旁坐久之又拜靈易素服拜别舅姑諸親而歸次日除夕猶奉父母酒元旦拜祖宗拜父母畢易白衣僵卧不語不食父母苦勸終不開目至初九日方卒洪濯妻孫氏昆明人夫卒時年三十嵗三子士勲士清士英年甫數嵗當吳逆變亂之時家又極窮績麻度日口食不充荼苦萬端撫育三子成立守節五十七年每遇舉旌之時氏輒不許曰守節撫孤婦人分内事也豈樂以此自見哉卒年八十七嵗楊偉妻陽氏昆明人年二十二夫卒剪髮自矢孝事翁姑竭力供甘㫖而自食藜藿守節四十三年教子文元為諸生李坦妻張氏宜良人年二十八夫卒家貧如洗紡績縫紉以事翁姑苦節五十二年鐵峻聘妻馬氏宜良人年十八許聘未嫁夫卒女欲往赴喪父母止之令兩幼子伴女在家而夫婦同往弔女紿兩弟出外登樓閉門服素衣投繯死李孟祥妻文氏呈貢人年十八夫卒子軫甫數月氏事舅姑撫幼子拮据卒瘏未幾軫又卒復撫孫瑞麟成立守節六十二年壽八十終張拱紳妻羅氏安寧人年二十六夫卒有孤尚在襁褓撫之成諸生孝事翁姑姑殁奉繼姑及晚年目盲事之尤謹守節二十九年曲靖府元雅克特穆爾妻托克托氏䝉古人其夫任副樞密梁王命率兵於曲靖以禦明師兵敗於白石江馳歸氏閉門不納曰爾受梁王厚恩兵敗不死何以見王乃鴆其二男一女命侍妾曰我死舉火焚屋勿令辱我遂飲鴆而死明王子臣妻趙氏南寧人年少守節正統二年有司奏旌其門陳蕃妻任氏曲靖衞人嘉靖間夫客死他郡氏年甚少生女甫周嵗訃至朝夕呼號至廢寢食翁姑令其改嫁氏紿之曰媳既失所天但得葬夫不敢以子母重累翁姑也數月夫骸至氏縞衣攜女撫柩悲痛葬於漏澤園遂負女投於瀟湘江三日方得其屍女猶約於背督學趙維垣聞之達於臺使乃檄所司售地合葬旌其門曰貞烈仍建祠於墓立碑於祠復二丁以奉香火楊威妻王氏南寧人適威貧甚出荆布易書勉夫力學嘉靖乙夘夫舉於鄉旋任楚辰溪令氏年二十一夫卒於官扶櫬歸葬一子繼殞苦節自矢事聞旌表朱愷妻馬氏曲靖衞人夫任本衞千戸早卒子茂未襲亦繼卒遺孫臣尚在襁褓氏曰予喪所天託之於子子今復喪猶幸有孫茍寧死弗顧朱氏祀其斬乎遂撫臣及長娶同衞陸林女時家計甚窘朝不給夕里戚憐助臣得襲如祖官未幾臣復以疾卒或以家貧無依諷奪陸志泣告曰夫亡恨不速死為祖姑在耳矢志不移紡績供養越數年氏卒陸苦節彌堅先是嘉靖八年有司表氏為貞節至是本府月給陸米五斗表其門曰雙節曹撑妻陳氏南寧人夫卒氏年甚少翁姑逼其再醮割髪自誓甘貧守節六十五年奉文旌奬李士升妻周氏南寧人夫隨父任早卒訃至氏繪己像於夫之右每日悲泣哀毁而死李元靜妻楊氏南寧人年少夫卒長子蕃華甫九嵗次子維華甫六嵗家微族弱恐人奪其志停夫柩於堂者十年常服衰絰朝夕上食教二子習儒業皆為諸生張神武妻吕氏南寧人天啟三年奢酋水藺叛夫陣亡氏年二十二聞訃躃踊哀毁昏死者數祖姑力救始甦生女方二嵗苦節自厲監軍巡按交奏夫忠婦節奉詔旌奬林宜春妻伯氏南寧人年二十九夫卒子得蘭得芷俱幼父母諷以他適氏以死自誓教二子讀父書俱成名家法甚嚴子婦雖宴居不敢有惰容年八十一終里黨重之王民瞻妻朱氏南寧人貢生廷詔女崇禎間翁宗堯任四川平武令攜其夫同往氏還母家紡績自給辛苦五年性至孝父母疾刲股以救流冦將屠城遂與父母弟妹共死燕山壁下錢大用妻莊氏南寧人九江通判器宇女夫任千戸流冦入滇夫語之曰吾分當守城汝可逺避氏曰寧在城同死耳及城陷攜幼女投井死夫後亦罵賊被殺段尚雲妻周氏南寧人流冦之亂為賊所執欲汚之誓死不從奮身投井賊提其髮氏以爪傷賊手至於流血賊怒以石擊之而死王家冠妻潘氏霑益人流冦入滇氏年二十七與同鄉婦俱為冦獲至海家閘氏度不免奮身投水死越數日屍立浮水面容色如生俞嘉言妻王氏陸涼衞人夫任本衞指揮使流冦入滇奉調赴越州防禦氏聞賊至州境恐被辱遂率妾方氏及幼女同赴井死阮元聲妻杜氏馬龍人夫以稽勲郎典陜西試卒氏隨翁居曲靖流㓂陷城氏罵賊而死皇甫信妻魏氏羅平人夫任銅梁知縣氏封孺人流冦陷城夫及子俱被害氏聞而泣曰夫死於忠子死於孝吾死於節亦復何恨遂投井死馮世傑母李氏尋甸人嘉靖七年安銓之亂攜二子一女匿迎恩橋下為賊所獲盡攫其簪珥褫其衣服氏泣曰婦人行則蔽面夜則擁燭一旦罹此逆凶生復何為遂投橋下自沈二子亦相繼投水死李萬年妻李氏鳯梧所人夫任本所千戸氏于歸年夫病瘋疾盡賣粧資調治夫卒盡哀矢志苦守聞安賊臨城恐身被玷自縊於家王愛妻徐氏木密所人夫及姪王立俱與安銓戰死氏欲以身殉姑泣止之忍死事姑壽八十九臺使旌其門袁謙妻蘇氏鳯梧所人夫任本所指揮早卒氏守志不渝後遇安銓亂為賊所逼以刀引決賊感而釋之得保其宗張濬妻馮氏平彝衞人夫為諸生早卒氏守節終身嘉靖七年旌表李文妻戴氏平彝衞人年十九夫卒遺一女尚幼姑强欲嫁之乃自縊而死嘉靖間有司旌其門張武臣妻曹氏平彝衞人夫任本衞指揮早卒氏撫二孤誓死苦守董祖舒妻李氏平彝衞人天啟二年霑益土酋叛城陷時其夫在省考選氏謂家人曰吾輩女流寧死不可受辱遂與長幼七人闔門自焚死繆昌運妻譚氏平彝衞人年二十二夫卒子以貞甫三嵗氏守節撫孤值流冦之亂家族罹難貞年十嵗被虜氏冒死尋之遇賊㫁其右手死復甦子為冦棄城下冦去母子獲聚辛勤教子後舉於鄉守節凡四十八年而終本朝浦聨泗妻劉氏霑益人年二十四夫卒一子二女俱幼氏哀毁骨立孝事翁姑訓育幼子苦節三十八年雍正四年具題旌表吳傑妻吕氏平彝人夫客死廣南氏矢志守節事姑盡孝逺涉千里扶夫櫬歸教子峯成名康熙三十七年具題旌表臨安府元張友直妻杜氏通海人杜林之女年十八夫卒誓不改節教子成立壽八十二終至正間旌表明邢奎妻江氏建水人正統間隨夫戍廣西南丹衞年二十七夫卒廣人留之不能攜孤五人負骸歸葬家貧甚苦守教子後以子幹貴封安人陸華妻薛氏建水人夫為臨安土官氏年二十夫卒守節撫孤景泰間旌表高源妻王氏建水人年二十四夫卒子宏甫四嵗氏紡績撫養成人以壽終趙寧妻王氏建水人年十九夫卒一女尚幼父母令其改志誓死不從苦守四十餘年後女適徐杲亦早寡勵節如其母焉曽麟妻曹氏建水人年二十六夫卒孝事舅姑撫育幼子矢志不移成化間旌表萬𫝊妻張氏建水人年二十二夫卒無子誓死不二紡績以養舅姑終喪後乃痛曰夫殁無嗣所以不死者為舅姑耳今吾事畢矣遂自縊於寢室家人救免苦節六十餘年曽祥妻賈氏建水人夫中𢎞治壬子舉人早卒氏守貞撫孤厯五十年子孫相繼成立奉㫖旌表邢思明妻藍氏建水人年二十七夫卒無子人勸其再適氏乃自縊鄰人救之不死壽六十餘終繆忠妻劉氏建水人夫早卒力貧守志子昇娶王氏昇卒亦與姑同苦節當道復其孤養之馬敏妻楊氏建水人年二十八夫卒撫孤終老馬良妻周氏建水人年二十四夫卒子喪苦節終身張顯妻蔡氏建水人年二十夫卒子坦甫四嵗同妾趙氏年十九守節撫孤後坦長娶譚氏尋卒譚年二十守志如其姑鄉人稱一門三節彭景妻金氏建水人夫病革託以老母幼子及卒守貞不負夫託鄉里賢之何儼妻王氏建水人夫中正徳壬子舉人氏年二十五夫卒於京二子俱在襁褓家貧如洗誓不改節貴族有屬媒覘其意者斥拒之諸姑以為言即欲求死教二子甚嚴巡按旌其門萬昂妻王氏建水人年二十三夫卒養姑撫子至親罕見其面有老媪誘言以探其意氏引刀㫁指其節凜然李松妻歐陽氏建水人年二十七夫卒遺孤僅三嵗家貧取給紡績撫育成人壽六十四終王璠妻趙氏建水人夫早卒氏年甚少哀毁幾絶苦節以老孫孟麒聘妻胡氏建水人許聘未嫁夫遘危疾女年十二私割股煎湯告於母使療之數日夫卒即欲自盡賴母救得免竟歸夫家守志五十餘年院道奬勵月給以廪張實妻李氏建水人年二十二夫卒子甫二嵗遺腹復生子氏撫二孤守節厯四十年葉翠妻楊氏建水人年二十四夫卒欲自盡家人防之得不死朝夕哀號嬰病託孤於兄而卒劉錕妻朱氏建水人年二十七夫卒無子力貧守節紡績自養壽九十一終朱湧妻梁氏建水人年二十夫卒無子苦節終身邢思義妻高氏建水人年二十六夫卒無子悲號幾絶與一老婢紡績自給壽八十終吳浩妻沈氏建水人年二十四夫卒子在襁褓守節撫之成立李櫄妻高氏建水人夫病革時以子女皆幼囑其鞠育氏許諾及卒守貞撫孤成立婚娶胡鋭妻葉氏建水人年二十三夫卒養姑育子終無異志曹鼐妻葉氏建水人夫卒欲即死不得截耳置棺中聞者悚然家貧善事姑撫弱女冰蘖之操聞於當道累加奬恤毛鶴妻黄氏建水人夫卒號痛幾絶獨居一室足不越閫限守節五十餘年余洪妻徐氏建水人夫任訓導卒於官氏芳年扶櫬歸葬苦節撫孤親鄰罕見其面華玉妻普氏建水人夫任指揮卒於兵事貲裝殆盡氏守貧育孤以壽終趙士貴妻李氏建水人夫卒家貧紡績育孤為郡諸生鄉人嘉之蔡仁妻吳氏建水人夫卒氏年少無子人勸之嫁剪髮誓死善養舅姑以終任官妻李氏建水人年二十餘夫卒守節課子每聞旌表輒不肯與謂為婦人分内事壽八十終伍應祖妻劉氏建水人年二十二夫卒子幼甘貧事姑撫子成立督學旌其門楊文光妻馮氏建水人夫為郡諸生氏年十七夫卒無子剪髮入棺以死自誓或以舅姑為言乃紡績以養及殁喪葬如禮守節凡四十年奉㫖旌表李完妻曽氏臨安衞人夫任本衞指揮早卒氏以死自誓撫孤子仁成立仁卒撫孫中珍中珍卒又撫曽孫五十餘年齋蔬自守嘉靖二十五年旌表其門子婦樊氏孫婦趙氏皆孀居守志人稱世節云譚敷惠妻李氏建水人年二十餘夫卒甘貧養姑守志不二厯五十餘年學使旌其門張國相妻陳氏張國卿妻王氏俱建水人事未詳郡守奬以一門雙節曹氏女建水人曲江生員曹某女已字良家有武弁養馬曲江强欲聘之女不從夜自縊死劉世皥妻李氏建水人崇禎四年普酋之亂度不能免同媳曹氏孫女惠姐科姐啟姐闔門死節巡按題請旌表沙鎔金女建水人年十七未適人普酋之亂人民盡移城内獨女不肯出門託言腹痛卧牀父母不能强隨投染布缸死夷女六姐建水人以拒暴客死崇禎十一年院司旌表節烈立碑於西城道左紅衣女姓氏失𫝊建水人流冦陷城同女奴避亂木堆中為賊卒王福所獲女紿賊尋藏金見一井即投入女奴亦從之賊驚去亂定後此賊竄籍建水嘗與人言之蘇秉鈞妻陳氏石屏人年十九夫卒子甫嵗餘教之成立始終一志李瓊妻蘇氏石屏人夫卒氏年尚少苦節訓子鄉人稱之楊雲鸞女石屏人見父乏嗣誓不字人父病割股以救年六十八終鄉里罕見其面州人呼為孝貞女奉㫖旌表王家相妻楊氏石屏人年二十七夫卒矢志事姑教子䕫龍登進士萬厯二十二年旌表楊鼎妻何氏石屏人年二十五夫卒躬操機杼事孀姑吳氏形影相弔吳年八十三氏年五十九一門雙節詔旌其門楊忠國妻王氏石屏人夫中萬厯癸夘舉人氏年二十八隨夫赴京謁選夫病割股救之不起萬里持喪歸葬事聞旌表壽九十七終王佐女石屏人年甫十二為賊所劫欲汚之女紿賊入室中室有井即投入死賊咋舌而去李茂妻周氏阿迷人年二十八夫卒子女各二紡績撫育底於成立苦節特著王勛妻趙氏阿迷人年二十夫卒撫孤子就學後子婦皆卒再撫遺孫成立人以為難楊本妻范氏阿迷人年十五夫卒無子父母不能奪其志守節六十餘年嘉靖間監司表其門段文斐妻王氏阿迷人夫卒氏年少撫孤貞操特著楊愫妻萬氏阿迷人年十六夫溺水死氏聞訃自縊其母救免遂自誓守節天啟間院道奬勵楊懋學妻湯氏阿迷人年二十夫卒遺腹生子延嗣氏撫之成名孝事舅姑崇禎十一年建坊旌表張暐妻李氏寧州人年十九夫卒誓死不二苦節事姑𢎞治五年建祠旌表楊誥妻尹氏寧州人夫為諸生氏年十九夫卒無子守節不渝壽八十終正徳十六年建坊旌表祁㑹妻張氏寧州人年二十一夫卒舅姑欲奪其志氏㫁髮自誓終始不渝壽七十六終嘉靖八年旌表孫應鵬妻戴氏寧州人年十八夫卒事姑甚孝以節壽終事聞旌表王紳妻張氏寧州人年二十四夫卒撫育三子成名壽八十餘終崇禎五年旌表王世昌妻董氏寧州人夫中崇禎癸酉舉人任泌陽知縣死流賊之難氏聞訃欲自縊因有子女甘貧勵節教子成立壽七十七終喬玥妻許氏通海人年二十一夫卒守節自誓教子成名宣徳元年旌表楊以榮妻沈氏通海人年十九夫卒遺腹五月利其産者謀令改嫁氏抱兒向靈號慟乃自縊鄰婦救免守節四十五年𢎞治三年旌表喬楫妻曽氏通海人夫卒子甫二嵗剪髮毁容誓死不二善事祖姑守節厯五十餘年事聞旌表東欽妻盧氏河南光山人翁任御史以事謫戍通海衞未至卒有司迫其夫行氏偕至通海未幾夫征和泥殁於陣氏日夜號痛勵志自守有張姓欲求聘氏不從自縊於室救之復甦張乃謀於其夫之妹紿之從已逺避海外氏佯許之至海畔投水死迄今死處水清如練者數尺嘉靖二十三年旌表孫汝材妻段氏通海人年十七夫卒家貧無子有勢家謀娶之以死自誓守志終身嘉靖二十八年旌表趙華妻孫氏通海人夫卒撫孤廷相及長娶張氏年二十廷相亦卒張撫其遺腹子守志如姑人稱雙節萬厯四十年旌表台生妻黄氏通海人年二十夫卒甘貧守節養孀姑撫幼子宗族欲奪其志不從天啓五年旌表劉經妻張氏通海人夫患疫龥天代死夫卒依孀母陳氏閉門紡績有求聘者輒抱遺孤痛哭矢志不從天啓六年旌表郝孟陽妻孫氏通海人年二十三夫卒悲號欲殞以有三月幼子誓死守節事聞旌表趙來憲妻李氏通海人年十九夫卒遺腹生子民保氏㫁頂髮誓死守節年七十餘鬢髮俱白獨所剪處黒如少時事聞旌表闞登庸妻台氏通海人年二十二夫卒遺孤甫半嵗有富豪欲奪其志氏齧指自誓百結其衣教子成立事聞旌表楊藩妻劉氏河西人年十八夫卒無子守節而終嘉靖間旌表王維新妻杜氏河西人年十九夫卒守節厯四十年萬厯十年旌表葛阜妻夏氏河西人夫為諸生氏年二十五夫卒守節厯五十餘年耿應東妻王氏河西人年二十一夫卒守節六十餘年事聞旌表黄氏女河西人未字遇賊於河邊賊逼之躍入河死督學大書完名全節四字於死所石壁崇禎十六年旌表張志聘妻耿氏河西人許聘未嫁夫卒氏矢志守節歸事舅姑克盡孝道壽七十餘終奉㫖旌表禄萬鍾妻薛氏㠄峩人貞節守義景泰間旌表其門余必明妻楊氏㠄峩人年二十三夫卒子甫一嵗家貧姑老紡績以養姑殁殯葬如禮子文允長娶畢氏年二十二允亦卒有議婚者畢以死自誓守節如姑天啓間旌其門曰雙節杜存愛妻王氏㠄峩人崇禎十一年土賊入境被執至石山嘴氏奮身投巖頭面皆破痛罵不已賊大怒分裂其屍學使旌其門趙署妻張氏䝉自人守節八十二年撫育孤孫年至百嵗以節壽聞萬鑟妻王氏蒙自人年二十夫卒父母迎之歸欲奪其志毁面不從撫育二子後俱死復育其孫及其曽孫以禮自持老而彌篤三尺之童罕見其面兩為當事所奬段繼母江氏䝉自人夫早卒育其孤繼苦節不渝為繼聘萬氏未娶繼忽盲萬氏父母欲令改適萬不從卒歸段門事夫甚謹繼卒從姑守節而終楊日華妻向氏蒙自人夫早卒時有王重儀者挾兵勢欲娶之氏不從舅姑懼禍乃歸之母家卒為所迫屆期來迎沐浴自縊死李秀實妻談氏䝉自人年二十五夫卒於軍氏扶櫬歸葬矢志守節奉姑教子終始不渝當道旌之張廷祚妻李氏䝉自人嘉靖三十六年土賊逼城夫兄廷佩與賊戰死夫赴兄難亦死氏年尚少或勸其改節氏矢志不移苦節撫孤年九十餘萬厯間奉㫖建坊書死義張廷祚妻李氏貞節之門勅有所天率同胞以死難揮戈生氣猶存求原裒遺骨而立孤崩城餘烈可想之語胡啓愚聘妻樊氏新安所人千戸惟卿女夫為諸生家貧弗克娶祖母欲奪而嫁之女聞泣曰從一而終婦之道也聘即大義定矣胡可更耶乃自縊家人解其屍惟抱胡生原聘物時年二十一隆慶三年巡按旌其門杜雲漢妻吳氏蒙自人年二十一夫卒安貧守節壽八十五終萬厯二十年旌表本朝鄒岱妻謝氏建水人夫因慟母嘔血病甚氏年二十兩次割股救之不起堅欲身殉人勸以翁老孤幼遂毁容茹素事翁訓子孝慈並著康熙四十七年具題旌表萬璚妻邵氏建水人夫為諸生遭父喪嘔血死氏年少哀痛不欲生以姑老子幼甘貧養姑教子成名康熙四十九年具題旌表王璽妻張氏建水人夫為諸生年二十夫卒堅志撫遺腹子成人雍正元年具題旌表許爾成妻李氏石屏人夫為諸生早卒三子皆幼氏苦志教育次第成名康熙三十年具題旌表楊蘭芳妻湯氏石屛人年二十一夫卒孝事舅姑教子成立守節終身康熙四十八年具題旌表顧王紀妻劉氏寧州人年二十四夫亡截髮自誓勤苦操持教子錫瓚為諸生守節四十三年雍正十三年具題旌表陳堯妻官氏通海人年十六嫁甫七日而姑殁氏哀毁逾禮後夫又卒遂勵志守節四十年雖至戚罕見其面事繼姑克盡婦道教二子涵浩皆舉於鄉雍正元年具題旌表李修妻譚氏䝉自人康熙四年土酋李世藩叛夫被害氏年二十一攜兩幼孤逺遁艱難萬狀後二子又卒媳熊氏官氏俱矢死靡他一門三節康熙四十八年具題旌表李金聲繼妻熊氏蒙自人貢生熊軾女年二十五夫卒子渭飛士璁俱幼氏欲以身殉前子璋救之不死善事孀姑撫育諸子守節三十年李玉聲妻官氏䝉自人年二十六夫卒子士珩士瑛俱幼矢志守貞衰姑以喪子悲甚氏同其姒熊氏朝夕承顔曲為解慰辛勤紡績課子成名守節三十年以上二人俱雍正二年具題旌表續編余天培妻曹氏建水人年二十三夫遊學卒於外訃至氏慟絶俟櫬歸葬畢遂自縊以殉鍾仁妻師氏建水人年二十夫卒子甫嵗餘氏矢死靡他耕織度日養葬衰翁夫卒時藁葬荒野竭力為夫更卜塋域以禮改葬焉陳王明妻趙氏建水人年二十夫卒子幼氏甘貧守節織絍以養翁姑每夜深猶聞機杼聲曹希彬妻劉氏建水人年二十八夫卒堅貞矢志勤儉持家課子秉直為諸生張孔聲妻楊氏河西人年二十八夫卒子幼忍死以奉翁姑撫子成立壽七十六而終張世儒妻張氏河西人年二十九夫卒守節事繼姑極其誠敬姑失明氏每夕焚香為姑祈禱未幾姑目復明人皆謂誠孝所感澂江府元三姑姓氏失𫝊新興人兩嫂一姑為元兵所虜行至團山不肯前皆被殺碧血流處湧出清泉州人甃石為井建廟其上至今禋祀不絶明王安壽妻李氏河陽人正統初夫應貢卒業成均任養利州州同前後十餘年氏居家孝事舅姑後夫卒於官氏以無子守節葬祭翁姑如禮壽八十四終李全妻張氏河陽人年二十夫卒遺腹生子亦卒厯五十餘年守節不渝𢎞治間旌表李君霑聘妻張氏河陽人許聘未嫁而夫卒有姚琰者復聘之氏潛往夫墳自縊獲救誓死不嫁𢎞治間學使旌表李愈祥妻黄氏河陽人年二十夫卒撫二子以節終𢎞治間學使旌奬杜誼妻楊氏河陽人年二十夫卒子祥雲甫一月撫育成名壽八十七終正徳間巡按旌表楊永延妻董氏河陽人年二十九夫卒堅貞自誓撫子女成立嘉靖二十五年旌表江淮妻方氏河陽人年二十二夫卒守節不移撫育二孤嘉靖二十六年旌表楊涇聘妻秦氏河陽人許聘未嫁而夫卒父亦隨亡女誓死事母終身不字有求婚者甚力女引繩欲自縊後無敢言者嘉靖間院道旌奬李宣妻陶氏河陽人年二十八夫卒事姑撫子年逾八十嘉靖間撫按旌奬陳必安妻王氏河陽人年十八夫卒子天輔幼守節教子成諸生嘉靖間巡道旌奬潘雲龍妻張氏河陽人年二十六夫以貢赴京卒於道氏守志不移撫育遺孤以至成立嘉靖間院道旌奬徐麟妻王氏河陽人夫卒氏年少守貞教子成立隆慶間巡道旌奬速大用妻陳氏河陽人年二十四夫卒守節撫孤厯四十餘年隆慶間巡道旌表王守業聘妻袁氏河陽人許聘未嫁夫出逺遊不知死所有求婚者女不從嫂强之女自投於河母奔救免遂閉門不見其嫂茹蔬紡績志操彌堅萬厯間旌表李春暉妻吳氏河陽人年二十夫卒矢志守節孝事孀姑萬厯間巡按旌其門李向陽聘妻施氏河陽人許聘未嫁夫從親宦遊卒於外父母再擇配女誓死不從竟以處子終事聞旌表劉開熙妻師氏河陽人年二十四值流冦之亂與夫攜幼子避難其夫驚散氏為賊所執脅以威堅不受辱母子俱被害王士奇聘妻陳氏江川人許聘未嫁而夫卒守貞不字成化二十年建坊旌表韓宗長妻張氏江川人年二十夫卒事舅姑撫幼子壽九十終嘉靖二十年院道旌表陳俊妻顧氏江川人年十九夫卒撫孤守節壽九十終賀璽妻程氏江川人年少夫卒守節厯三十餘年朱震春妻張氏江川人年少夫卒守節養姑訓子厯五十餘年陳幼學妻業氏江川人出適甫嵗餘夫卒遺姙三月誓死守節生子薦允撫之成立其小姑陳氏未嫁夫亦卒誓曰我未歸而夫亡命也吾不忍再適以玷先人遂終身守節焉萬厯間俱奉㫖建坊旌表羅存徳聘妻張氏江川人許聘未嫁而夫卒誓死守節終身不字壽九十三終事聞旌表謝君用妻王氏江南淮安人洪武二十三年從夫戍新興州其子仁并姪禮義過采石遇盜度不能兩全乃棄其子攜二姪來新興夫卒氏守節四十餘年撫姪成立知州陳恕重其節白當道旌之張某妻楊氏新興人夫名失𫝊氏年二十三夫卒守志養姑節孝雙全嘉靖間建坊旌表王良富聘妻張氏新興人年十四許聘未嫁而夫卒女聞訃哀號求弔不得遂自縊聞於官令合葬時天啓六年也墓産連理樹樵者刈之復生周士彦妻白氏新興人年二十七夫卒家貧無子人曰無子何依氏泣曰夫婦之義豈以子之有無異哉獨居守節族人憐之立嗣承祧徐石麟妾楊氏路南人年十六歸徐徐卒妻嫁氏撫其孤矢志不渝孤又亡復撫其孫成人年八十餘終本朝吳士徽妻陳氏河陽人年二十夫卒紡績撫孤誓死不渝守節四十二年康熙三十年具題旌表徐禧麒妻趙氏路南人年二十二夫卒氏堅志守節課子致逺為諸生孫之楷舉於鄉康熙三十四年具題旌表速世勲聘妻陳氏新興人許聘未嫁而夫卒氏聞訃閉門自縊父排戸救之得不死自是朝夕哀號剪髮明志卒歸夫家孝事翁姑備執婦道守節五十一年雍正元年具題旌表李居謙妻奚氏河陽人年二十二夫卒子尚在襁褓氏矢志守節三十年訓子璋舉於鄉題雍正三年具旌表譚陳堯妻官氏路南人夫少孤伯父母撫養成立氏年二十八夫卒子未週嵗氏欲自盡伯母止之終身敬事夫之伯父母如翁姑撤簪珥不御未嘗笑見齒雖至親姻戚不踰閫與言趙元彦妻李氏路南人年二十四夫亡紡績養姑足不踰閾遺腹生子教之成立守節厯三十四年具以上二人雍正十三年題旌表續編常文樸妻聶氏新興人年二十七夫卒無子屢以死殉親黨救止之勵志守節撫姪以繼夫後孝事舅姑持身以禮苦節三十八年莊高取妻郭氏新興人年二十四夫卒敝衣糲食竭力甘㫖以養翁姑姑疾藥必親嘗而後進撫二子皆為諸生段揚祖妻周氏新興人夫卒氏少年守節事祖姑及姑養葬盡禮夫卒時有弟尚幼令同二子就外傅夜則篝燈佐讀後皆為諸生鄉里賢之羅奇翠妻戴氏新興人年二十六夫卒遺孤三人家窘甚脱簪珥以養翁姑及殁殯葬成禮教子瑄為諸生族黨喪無措者常出女工所得助之莫高妻王氏新興人年二十八夫卒家貧甚紡績以養孀姑課子弗輟後為諸生姑之母乏嗣亦迎養之及殁葬之盡禮人以為難鄭文灼妻段氏新興人年二十七夫卒欲自盡夫兄止之曰吾無子幸吾弟有一綫之脈賴汝存之乃止晝夜紡績苦無油常炷香以取光教子甚嚴終身未嘗入寺廟後夫兄及姒殁喪葬盡禮族黨稱之李世發妻徐氏新興人夫卒氏少年守節時姑殁翁年逾八十竭力奉事得其歡心撫孤成立壽七十終武定府明張節聘妻李氏和曲人年十八許聘未嫁而夫卒誓不更字嘉靖七年鳯酋之亂途遇一男子執其手即以刀自㫁之而死今東郭外有旌節碑記李含英女名五娘和曲人志在養母不適人鳯酋之亂刎頸盡節成乃貞妻李氏和曲人鳯酋之亂為賊所執撞地而死州守為之立墓何天相妻高氏和曲人萬厯三十五年阿克之亂城破夫令同走避難氏知無所避乃曰今日之事有死而已先投八嵗女於井次及幼女繼以身見者無不痛之夏某妻趙氏和曲人夫名失𫝊阿克之亂城陷自縊死張韜妻俞氏和曲人年二十夫卒守節養姑四十年如一日楊春霽妻辛氏和曲人性貞靜通經史年二十一夫卒堅志守節集古今烈女事作小囊佩之壽八十五有疾卻藥不進曰六十四年清白可隨夫子遊地下矣含笑而卒居之敬妻趙氏元謀人崇禎末吾賊之叛城陷投井死魏守恭妻胡氏禄勸人夫為千戸逺出萬厯三十五年阿克之亂氏聞城陷率二子望闕叩首遂自縊死本朝陳璿妻李氏和曲人年二十七夫卒子甫二嵗氏堅志苦節事翁姑以孝聞後子亦病卒又育諸孫成立守節六十二年雍正九年具題旌表錢溶妻何氏和曲人年二十八夫亡堅志不渝奉姑孝謹教子啟賢成立守節厯二十九年楊又清妻何氏元謀人年二十八夫卒氏血淚交流目遂失明堅志苦守厯五十年撫四子成名雍正九年具題旌表廣西府明趙理妻張氏郡人年二十五夫卒遺三子俱幼守節五十餘年萬厯元年巡撫旌之郭尚賢妻趙氏郡人初父母已許婚尋欲改盟更許豪家氏恥背盟自縊得救竟如其志適郭善事舅姑姑病劇兩割股療之萬厯二十一年撫按旌之至今名其里曰賢孝街趙信妻楊氏郡人年二十七夫卒力貧守節有司旌之暨希妻周氏郡人年二十二夫役臨安隨知府朝覲卒於道遺一子大器氏聞訃死而復甦紡績撫孤境遇不堪志節愈勵有大姓屢欲奪之竟不能移及大器應貢仕陳留隨任就養年五十六終大器以謁選尋父柩歸合葬云羅賢英妻楊氏郡人流冦至同村民避難石洞中夫出為賊所執翁繼出又被執逼令負所掠物拷聲聞洞中氏聞之急出語賊求代翁負賊喜得少婦遂釋其翁氏隨賊至環翠橋投河而死趙覺妻召氏郡人夫卒欲以身殉慮親戚見阻居喪若無戚容衆異之及將葬夜傍夫柩自經死衆始驚歎遂同穴葬焉楊大謨妻段氏彌勒人夫為黒舊哨戍卒萬厯三十二年㓂至奮勇殺賊死於陣氏撫其孤以節自持翁姑欲奪其志遂自縊天啓元年旌表元江府明王諍妻黄氏郡人早嵗夫卒訓遺孤以儒業厯四十餘年萬厯十年督學旌其門楊徳先妻馬氏郡人夫卒氏年少矢志守節壽八十終何源清妻李氏郡人年十八夫卒痛毁欲絶父母翁姑曲慰之竟飲毒死何源深妻曽氏郡人年十六夫卒守節終身馬宗範妻白氏郡人年十六夫卒守節五十餘年李儒妻楊氏郡人年二十三夫卒剪髮毁容願以死殉其姑寛慰之乃拮据襄事修婦職刲股以痊姑病撫遺腹子希聖為嵗貢生守節三十七年楊氏女名曩察郡人母孀居無子女堅志養母誓不適人勢家欲强娶之以死拒獲免壽八十終本朝王徳逺妻張氏新平人夫為新㠄營兵撥入普威營挈氏偕往鎮沅夷叛夫死於陣氏抱孤兒投火死雍正五年具題旌表丁珏妾吳氏貫未詳夫原任揚武壩巡檢氏隨任雍正十年猓賊叛夫被圍不屈死氏為賊所虜義不受汚遂被殺事表聞優卹入節孝祠仍建坊旌續編艾張顯妻楊氏子艾瓊珍妻艾氏孫艾馨妻陶氏孫女老妹郡人雍正十年同避猓逆於甘棠箐楊氏聞夫被害夜回村與媳艾氏等同時自縊艾國用妻陶氏艾國梁妻林氏郡人雍正十年避猓賊於箐見其夫俱被害妯娌二人回村自縊死艾承顯妻曽氏子艾瓊居妻朱氏郡人雍正十年遭猓變避於腊冬村旁岩内賊勢漸逼姑媳同時自縊艾奇名女月止四妹郡人俱未字雍正十年逆夷肆掠二女見父兄逃散同自縊死陳萬言妻車氏子陳璠妻鄧氏孫女玉花郡人雍正十年猓變鄧氏見夫被殺先將三嵗女玉花縊死繼隨姑車氏自縊於打連村箐内姚春先母何氏妻艾氏郡人雍正十年猓變何氏見夫被殺遂自縊艾氏見姑死亦自縊李從龍母馬氏馬氏女二妹三妹郡人氏孀居守志撫孤已成立雍正十一年猓變見子被擒遂自縊時女二妹年十五三妹年十三見母死兄擒亦同時自縊死丁一鵬姪女丁妹郡人幼失父母育於堂叔家年十六未字雍正十一年猓變全家逃散伶仃一女投崖死楊守恕妻袁氏新平人年三十四雍正十年遭猓變夫妻子母六口俱為賊執賊將殺其夫氏跪求身代及夫被害恐受辱伺間置未滿十齡楊如岡等四幼子投繯以殉舒鳯翮女馮妹新平人年甫十五遭猓逆之變目擊父兄被難奮身投水死舒鵬翮女金玉父為明經殁後母喻氏挈之依其叔鳯翮年十六遭猓變繼馮妹投繯死開化府本朝王大周妻李氏郡人年二十五夫卒矢志守節撫孤成立雍正三年具題旌表鎮沅府明罕氏威逺人土知州刀遜妻事未詳明嘉靖間旌表東川府本朝禄永明妾禄氏郡人二子應龍應鳯先後襲土知府皆為安氏謀殺衆議承襲不決氏遂繳印請改設流官康熙三十七年奉表㫖給贍養終身雍正七年具題贈恭人其墓昭通府本朝劉崑妻張氏四川人夫任烏䝉遊擊氏隨任雍正八年八月禄賊叛其夫力戰死氏聞即抽刃顧兩女易璋可璋曰我為命婦汝為宦女義不可辱於賊揮淚而自刃之謂妾吳氏曰汝尚可無死當撫孤以存劉氏吳泣曰願同死子不能顧也亦自殺氏遂自刎死越八十日賊平始獲屍容顔如生楊天瑎妻聞氏夫任烏䝉守備禄賊叛拒賊於阿堡戸力戰死氏聞先令二女自縊隨亦自刎陳國政妻李氏夫任烏蒙千總禄賊圍城氏同二女俱自縊陳天錫妻張氏夫任烏䝉司獄禄賊之叛氏與夫同死難以上四人及劉崑女妾吳氏事孝聞贈恤有差俱入節祠仍建坊旌表隴慶侯母禄氏烏䝉土府禄天倫次女雍正五年慶侯襲鎮雄土府以匿奸革職改土設流夷衆欲搆亂禄氏諭之曰我祖宗千百年來以忠誠著績今日之事宜安氣運不可妄動衆始解散及八年烏䝉賊叛煽誘鎮雄諸夷禄氏復飛馳各寨申諭大義情詞激切至欲自殺衆咸感悟氏身率屬夷環守州署協濟軍糧城賴以全總督鄂爾泰建坊旌之曰閨壼忠臣題請封安人給官田二十畝以奉祀事大理府漢曼阿娜妻名阿南楪榆人元封間其夫為漢裨將郭世忠所殺欲妻之南曰能從我三事乎一作幕次祭故夫一焚故夫衣易君新衣一令國人徧知禮嫁郭皆如其言於六月二十五日聚國人張松幕置火其下阿南俟火熾乃焚夫衣遂躍身入火國人哀之後每嵗是日燃炬相𫝊為弔阿南又名星回節唐鄧睒詔妻名慈善鄧川瞼人開元間南詔欲併六詔為一因星回節召五詔宴㑹松明樓慈善止夫勿行不聽乃以鐵釧約其臂而别及至南詔火其樓各詔妻尋夫骸不能識獨慈善認釧得夫骸以歸南詔異其慧以幣聘之善以夫未葬為辭乃歸治葬事竣堅閉其城南詔發兵圍之三月食盡盛服端坐竟以餓死南詔悔旌其城曰徳源元段功女名羌娜一名僧娜大理人至正間其父為梁王所害娜志在復讎後將歸阿黎氏出繡旗示弟寶曰自我省事之日即聞父寃欲復讎於梁王専待汝長成繡此旗今七年矣我歸借兵夫家汝亦提父兵來㑹此旗為符咏詩而別明楊和妻施氏楊璘妻趙氏楊謙妻張氏皆太和人夫亡守節有司奏聞成化二十二年詔旌其門曰二孝三節楊一清周洪謨各為序記以表之何偉妻趙氏太和人夫以母病覔藥溺水死氏大慟亦死之詔旌其門楊汝為妻陽氏太和人年少夫卒撫幼子柟以女紅自給家人罕見其面柟登進士嘉靖間旌表張守綸妻陳氏太和人夫中嘉靖庚子舉人卒之明日氏隨自縊督學旌之宋良臣妻郭氏大理衞人夫任本衞千戸氏年二十八夫卒子應甫四嵗甘貧守志撫子承襲應亦以孝聞撫按兼旌之周鳯妻袁氏大理衞人夫任本衞指揮卒氏守節撫其子瑞娶徐氏瑞卒徐亦撫其子之晃守節如姑撫按旌為雙節崔喬遷妻李氏太和人夫為諸生早卒氏矢志不二嘉靖間監司旌奬劉君寵妻懐氏太和人早年夫卒家貧苦節觀風者崇奬焉楊洪妻釧氏太和人年二十將嫁而夫病危父母欲改嫁不從竟歸楊侍湯藥踰月夫卒氏遂自縊嘉靖間郡守旌其墓趙文振妾劉氏太和人夫任通判卧病氏事之甚謹踰年如一日既卒氏送葬歸自縊嘉靖間郡守旌奬王汝為妻楊氏太和人㕘議楊南金女年二十六夫卒環土於室四十年家人不見其面甘貧撫孤嘉靖間督學旌奬邵麟妻李氏太和人年二十五夫卒家貧辟纑自給撫二子皆為諸生嘉靖間監司旌奬沈秋妻楊氏太和人夫卒衣不周身内族襚以紵衣氏曰夫子生不受人憐遂以敝服殮入謂其有黔婁妻之風甘貧育子以勤苦終嘉靖間督學旌奬王文妻奚氏太和人年十八嫁甫三月夫客死於外氏以節自誓夫之弟欲得其産迫之嫁氏不從生遺腹子幹勵志撫孤足不履閾幹長娶張氏家失火延及隣居時失火禁甚嚴幹畏法赴火死産業一空張亦矢志守節如姑教季子邦泰嘉靖己酉舉於鄉人以為姑婦賢節之報趙鐸妻楊氏太和人年二十五夫卒人欲奪其志矢死撫孤壽八十二終楊濟妻張氏太和人年二十七夫卒守志終其身嘉靖間有司旌其門楊永茂妻周氏太和人年二十夫卒無子甘貧守志齋居數十年隆慶間監司旌奬陸彦妻陳氏太和人年二十八夫卒無子守節三十三年卒之日遺言以其産為陸氏祭田楊模妻陽氏太和人年二十夫卒於外歸櫬之日悲痛齧棺齒為之落守節以終奚相妻韓氏大理衞人夫任本衞千戸早卒氏守節不移鄉人重之謝應寵妻楊氏太和人年十九夫卒子甫一嵗堅志守節紡績以養翁姑有勸其他適者正色拒之以節壽終沈應選妻陳氏太和人年二十七夫卒止一子甘貧矢節備厯艱辛撫子成名年七十五以子鯨貴受封趙璘妻王氏趙州人許聘未嫁有土官願納白金五百償其夫聘資又以黄金五十餽其父父欲改字氏不從竟歸趙嵗餘夫患疾不愈病中遺命更嫁氏盡髠其髮納夫袖中曰以此矢同穴夫既卒父母舅姑强之嫁不從有富豪强委禽氏聞拊胸嘔血死嘉靖間監司旌奬劉繼文妻鄒氏趙州人年十六嘉靖間箐賊掠白崖氏走水田中賊於崖上張弩以恐之氏曰寧射死必不從賊遂射之貫顱而死胡洪妻馮氏趙州人年二十七夫卒遺孤顯宗甫十七日甘貧誓節鄉人稱之時啓東妻鄒氏趙州人年二十夫病割股以救未幾夫卒無子甘貧守志舅姑殁力營葬亊冰霜之節終始不渝金印妻李氏趙州人夫病氏割股進之及卒守節四十三年馬明輔妻舒氏洱海衞人夫任本衞百戸氏年十九夫卒孝養舅姑撫子承襲守節厯六十餘年張課妻劉氏雲南縣人歸寧偕夫行遇賊於途避入蔡姓家賊追及之氏以身捍門賊欲劫之厲聲罵賊賊加刃於頸曰速殺我我不受辱也刃矛交集數創後猶裂裳塞痛捍門不移竟死門間其夫獲全天啓五年有司上其事祀於祠張氏雲南縣人夫姓名失傳賊李萬春掠其鄉氏被虜欲汚之不從罵賊而死胡濬妻奚氏鄧川人夫任中前所千戸氏年二十二夫卒姑憫之令改嫁氏曰娶婦以養母也母無他子誰適為養姑不能奪其志天順三年詔旌其門阿旻妻陶氏鄧川人夫為本州土舍氏年二十六夫卒撫孤守志三十餘年𢎞治間旌表楊冕妻孫氏鄧川人年二十五夫卒守志不二壽百有三嵗當事旌其門楊儼妻尹氏鄧川人夫卒氏年少守節撫子九齡齡卒其妻亦守節如姑楊敬妻秦氏鄧川人年二十四夫卒撫二幼子後卒又撫二孫壽七十終張先翼妻楊氏鄧川人年二十三夫卒欲自縊衆救之因齧指自誓有司旌其門艾自新妻何氏鄧川人夫為選貢生氏年二十六夫卒苦節教子萬厯間院道給米旌奬楊一鶴妻段氏鄧川人年二十六夫卒守節教子克成夫志萬厯間旌表李昇妻楊氏浪穹人年少夫卒矢志撫子友蘭以逸才應選嘉靖間巡按旌其門後氏卒友蘭廬墓盡哀劉廷弻妻李氏浪穹人年二十夫卒欲以身殉衆謂二孤在遂忍死守節五十年撫孤成立嘉靖時臺司旌之楊鑑妻李氏浪穹人年十八夫卒遺子甫一嵗矢志守貞艱危不易課子及孫皆成名隆慶時巡按旌奬楊燦妻李氏賔川人年二十四夫卒舅姑老紡績以供聞有求娶者毁容㫁指年五十終張奇學妻王氏賔川人姑病割股救之夫病又割股崇禎十五年遭兵變被執知不能免負三嵗子投井死楊渭妻陽氏雲龍人年少夫卒子寅佐甫八嵗氏矢志守節忍死茹荼孝養公姑撫育弱息後氏病子寅佐龥天請代刲股進羮學使旌曰母節子孝本朝趙應龍妻黄氏太和人年二十九夫卒守節六十餘年撫孫士傑成立康熙三十年具題旌表陸萬頃妻楊氏趙州人順治十五年氏年二十五賊兵至欲避無門引刀自刎死越數日顔色如生時際明妻王氏趙州人廩生王曰都女順治十六年氏年二十與夫及舅姑避兵楊栁沖夫為賊所執將殺之氏出以身禦賊曰釋我夫我願從去賊果釋之氏顧夫去逺度可脫遂引刃自刎死血噴賊衣賊亦為之流涕楊朝棟妻蘇氏趙州人廩生蘇濬女年十九夫卒矢志守節順治十六年避兵莊西穴中為賊所逼自刎而死題以上三人康熙元年具旌表李應和繼妻楊氏雲南縣人年二十夫卒撫前妻子成立壽七十一終康熙二十四年題具表旌胡大業妻侯氏鄧川人夫為諸生氏年二十二夫卒子舜正甫二嵗氏欲以身殉夫姑囑之曰有藐孤在勉留撫之氏從姑訓茹荼自甘撫子成名守節四十六年趙履祥妻卞氏鄧川人年十九夫卒氏哀痛欲絶親鄰勸以翁姑年老無依且有遺腹宜留身以存趙嗣氏忍死勉從後生子撫教成立苦節五十四年以上二人雍正九年具題旌表曽㫤妻趙氏賔川人年二十夫卒無子誓死守節事翁姑孝謹翁姑殁夫弟二人方童稚拊恤備至各成立受室撫姪為嗣守節三十餘年雍正三年具題旌表楊潤妻趙氏太和人夫為提標兵氏年二十九夫卒子在襁褓上有祖姑及翁姑皆衰邁氏紡績以養喪葬皆竭力成禮苦節厯四十年雍正十三年具題旌表倪昌賢妻鄒氏鄧川人年二十六夫卒子幼人有欲奪其志者氏峻拒之居止數椽田無半畝女紅自給辛勤教子雖饑寒不出貸鄉里親黨無從識其面厯四十二年雍正十三年具題旌表續編楊知敏妻雷氏雲南縣人年二十三夫病劇氏刲股救之不愈遂囑以養親教子而卒氏矢志以養孀姑未幾子殤姑憐其青年欲嫁之氏舉剪自截其耳姑驚慟乃令撫姪為嗣苦節終身楚雄府明俞汝諧妻仇氏楚雄縣人夫為諸生氏年二十四夫卒欲自縊以殉戚屬防救得不死窮年閉戸惟一老婢相依雖至戚罕見其面孀居五十三年萬厯三十年旌表張大治妻謝氏楚雄縣人年二十五夫卒氏冰霜自矢内外咸稱之萬厯三十三年建坊旌表吳東岫妻謝氏楚雄縣人年二十九夫卒苦節四十五年撫育諸孤咸有成立萬厯三十四年巡按旌奬謝應舉妻陳氏楚雄縣人年二十七夫卒苦節四十五年萬厯三十四年巡按旌表丁大受妻羅氏楚雄縣人年二十八夫卒守節壽八十七終萬厯三十五年巡按賜粟旌奬施宏猷母蘇氏楚雄縣人夫名失傅氏年十九夫卒守節翁姑憐其少勸之嫁輒痛哭誓以死撫孤成名萬厯三十七年旌表丁雄妻趙氏楚雄縣人年二十五夫卒守節教子厯五十年萬厯三十七年旌表王定邦妻孫氏楚雄縣人年二十九夫卒治家嚴肅日以忠孝節義訓迪二子承寵承憲後俱死國難氏壽八十三終萬厯四十年旌表陳世武妻童氏楚雄縣人年少夫卒矢志守節壽七十終萬厯四十年道府旌其門喬惟嵩妻安氏楚雄縣人年二十六夫卒守節四十八年萬厯四十一年巡按旌奬戎妻伍氏楚雄縣人年二十七夫卒守節壽八十八終張時詔妻仇氏楚雄縣人年十八夫卒子甫彌月撫之成立萬厯四十三年巡按旌奬裴泰妻陳氏楚雄縣人夫任百戸氏年十九夫卒族人逼嫁之以死自誓苦節訓子應章襲職孝事翁姑終始如一壽八十終李銓妻楊氏楚雄縣人年二十六夫卒守節時翁姑老子幼拮据孝養殯葬兩喪皆能如禮鄉里賢之羅綱妻李氏楚雄縣人年二十九夫卒子幼苦節自誓壽八十一終天啟三年院道旌奬張延妻潘氏楚雄縣人年二十四夫卒子洪烈甫四嵗守節六十二年天啟間以子貴封二品夫人建坊旌表壽八十五終姚汝諧妻謝氏楚雄縣人夫中崇禎庚午舉人卒無子氏志操貞勁苦節三十餘年巡按旌奬徐承惠妻王氏楚雄縣人年二十六夫卒姑老子女俱幼氏誓死靡他竭力孝養姑病年餘衣不解帶親嘗湯藥殯葬皆拮据如禮守節四十四年子國琦以孝稱崇禎十一年當事旌表王象乾妻卜氏楚雄縣人夫卒守節四十餘年恪遵夫命撫育三子崇禎十五年巡按旌表謝天彝妻王氏楚雄縣人年二十九夫卒守節教子成名厯宦有聲壽八十二終王俊妻嚴氏楚雄縣人年二十八夫卒無子甘貧守節厯四十二年麥稠妻杜氏楚雄縣人年二十九夫卒誓死守貞父母不能奪養翁姑撫幼子苦節持著壽九十終郜敏妻戴氏鎮南人年十八夫卒守節壽七十終萬厯二十八年院司旌奬衞宜妻揣氏鎮南人年二十三夫卒於戍氏矢志守節壽八十終周瑀妻徐氏鎮南人年二十五夫卒氏甘貧守節壽七十五終萬厯四十七年道府旌奬段熙妻陳氏鎮南人年二十夫卒氏守節不二壽七十八終天啓二年院道旌奬楊大名妻李氏鎮南人孝子翹棟母也年二十夫卒矢志守節教二子成名壽七十終母節子孝鄉里稱之楊時泰妻何氏鎮南人年二十七夫卒守節養姑教子成立壽至百嵗陶濂妻梁氏南安人夫舉𢎞治乙夘鄉薦第一卒時家如懸罄子幼無依氏荼苦自甘守節教子撫按旌其門楊淮妻陳氏南安人年二十二夫卒守節力貧教子不出閨門四十餘年萬厯間巡按旌奬鞠以和妻楊氏南安人年二十三夫卒無子矢志守節撫姪為嗣生孫七人壽九十一嵗終天啓元年院道旌表楊璪妻羊氏南安人年十八夫卒氏㫁髮矢志撫孤成立守節四十餘年天啓間有司旌其門楊煥袍妻陽氏南安人年二十值沙賊之亂劫掠的禄村夫與翁皆被殺氏為賊執罵聲不絶冒刃而死滕秀宗妻金氏定逺人年二十夫卒誓不二志撫二孤年踰八十而終嘉靖四十五年旌表包遇景女定逺人未許聘值鐵索箐冦劫掠執之女誓不受辱為賊所殺隆慶六年院道表其墓王海妻錢氏定逺人年二十八夫卒守節撫子友義為廪生厯四十餘年萬厯間巡撫旌奬周國正妻張氏定逺人年二十夫踰垣失足死氏䑛其血情極哀慟踰三旬自縊以從周孔徒妻孟氏定逺人年少夫卒守節四十年教子昌祚成進士天啟間建坊旌表周如盤妻陸氏定逺人年十五夫卒悲涕不已願以身殉至夜死於屍側天啟間建坊旌表孟宗聖妻温氏定逺人年二十餘夫卒守志不二事姑最孝教子有方其子知性充選貢以母老不仕色養終身氏壽至百嵗天啟間院道旌奬陳士心妻東氏定逺人性誠孝翁吉甫遘病禱神願以身代疾篤割左臂進之翁疾愈後夫有疾復割右臂以救亦愈天啟間院道旌奬李大中妻張氏定逺人吾賊之亂兵至劫掠氏恐為所汚投河死蘇蘭妻董氏廣通人夫為諸生氏年二十六夫卒撫二幼子孝事其姑嘉靖七年鳯賊之變負姑逺避免難壽七十五終楊循正妻趙氏廣通人年十八夫卒誓志不二課耕力織自養三十餘年嘉靖二十五年知縣吳習表其墓何景妻馬氏廣通人年二十夫卒守節壽九十終天啟六年院道旌奬馮天祥妻毛氏廣通人孝事翁姑翁失明氏朝夕龥天誠動鬼神雙眸復炯後夫染疫癘割股療之而愈楊世恩妻韋氏徐光鼎妻萬氏俱廣通人崇禎五年野賊破城焚屋氏等不受辱韋赴烈焰死萬投深池死俱奉文旌表段元臣妻王氏廣通人崇禎五年野賊破城為亂兵所獲氏不受辱投水死楊忠蕃妻陽氏廣通人年十八夫卒守節事姑撫遺腹子成立鄉黨重之何本洪妻李氏黒鹽井人年二十二夫卒撫遺腹子光祖長娶媳李氏生子憲五嵗光祖亦卒李年二十三姑媳雙節著聞天啟元年院道旌奬楊伯堅妻李氏黒鹽井人年二十五夫卒子甫三嵗苦節三十年崇禎六年道府旌奬景同春妾趙氏琅井人春無子納為妾亦不孕春殁妻繼殁氏為立嗣殮如禮葬前一日自縊死家人哀之同穴葬焉本朝陳所養妻羅氏趙州人夫楚雄縣人氏年二十九夫卒子甫一嵗氏守節撫孤巨細一規於禮厯數十年足跡不履外庭雍正三年具題旌表謝泰來妻金氏鎮南人年二十四夫卒甘貧守節紡績以養翁姑事繼姑尤加愛敬撫孤偉為諸生設家塾以教宗黨子弟之貧者康熙五十七年具題旌表張天琯妻孟氏定逺人夫為諸生氏年少夫卒養姑撫子守節三十六年雍正三年具題旌表袁尚義妻李氏楚雄縣人年二十四夫卒奉事翁姑生養死葬備極辛勤待諸子姪咸有恩禮三代同居守節三十九年為宗族母儀雍正十三年具題旌表白璋妻王氏楚雄縣人夫為鎮標兵氏年二十九夫卒子甫一嵗孝養孀姑紡績教子守節四十四年雍正十三年具題旌表姚安府明高惠妻譚氏姚州人夫早卒守節終身成化元年有司旌奬陳友忠妻魯氏江南人隨父戍姚安所年二十八其夫戰死交阯子甫二嵗人勸之嫁以死自誓守節六十餘年成化三年旌表劉濟妻胡氏姚安所人成化間夫卒無子誓死守節有司旌之靳志妻趙氏姚安所人生子七嵗夫卒守節及子又卒撫其幼孫𢎞治元年郡守旌其門徐淮妻龔氏姚州人夫為諸生早卒氏守節四十餘年課二子皆成名萬厯四年有司旌奬蔡銓妻張氏姚安所人年少夫卒子甫七嵗守節終身萬厯八年院司旌奬徐化妻陳氏姚州人夫嵗貢卒氏甘貧守節教子體震成名萬厯三十二年旌表壽八十終高守臣妻陳氏姚州人年二十六夫卒守節訓子奉文旌表郭之瑜妻何氏姚州人年二十五夫卒守節訓子崇禎十三年臺使旌之劉襄妻高氏姚州人明末流冦遣張虎陷城氏懼被辱抱幼子投井死王經妻張氏大姚人夫為諸生早卒氏年少子鳴鳯甫三嵗舅姑在堂生事寥落氏苦節自矢後鳴鳯官縣令清節自持人以為母教𢎞治元年巡按御史楊銓作柏舟堂記以紀之施經綸妻張氏中屯所人夫卒於官臨訣託以養父母氏扶櫬歸有欲奪其志者泣謝曰翁姑老矣違夫重託何以相見地下誓死靡他逾二十年而終張震妻王氏白鹽井人年二十夫卒撫子世榮成立娶婦李氏後世榮亦卒姑婦相倚守節不變嘉靖五年提舉以雙節表其門席上珍妻封氏白鹽井人明末張虎刼掠入境其夫被執不屈死氏出走亦被執於治東土主廟方入廟見深井欲投不得紿守者曰汝閉廟門我安逃乎賊信之氏遂投井死今名其井曰節井本朝魯達道妻李氏姚州人孝事翁姑年二十八夫亡女紅自給教子如曽成人守節三十六年王希孔妻張氏白井人年十九夫亡事舅姑以孝撫姪為子教之成立守節七十年倪光捷妻王氏大姚人年二十九夫卒族人勸之改適誓死不移撫孤子成立夫之叔嬸殁無子氏出貲為之殯葬且撫嗣姪成人人以為難守節三十六年以上三人雍正十三年具題旌表永昌府元黄善妻張氏名藥師郡人夫早卒家貧守志撫育遺孤定大徳間氏年七十一尚無恙定赴京訴其母之貞操詔旌其門明夏寧妻葉氏郡人年二十六夫卒紡績以養孀姑教子讀書成人洪武間旌表李勤妻張氏郡人年二十六夫卒生計蕭然竭力養孀姑撫幼子壽八十七終洪武間旌表宋氏金華人夫姓名失𫝊任閬中守洪武間被誣死獄中氏與其姑及子皆編戍金齒子死途中氏奉姑以行有題郵亭壁歌云妾心汪汪淡如水寧受饑寒不受恥幾回欲葬江魚腹姑存未敢求先死前途姑身少康健辛勤奉姑終不怨姑亡妾亦隨姑亡地下何慚見夫面嘉靖十六年御史隂汝登立祠以祀三十二年御史黄中刻其詩於祠張思仁妻王氏山陽人隨夫戍金齒氏年二十六夫卒父母欲嫁之氏曰夫死逺方其父母老其子幼女即不肖寧忍負乎卒不能奪宣徳五年旌表梁貴妻邵氏山陽人隨夫戍金齒年二十五夫卒攜孤收夫骨歸葬養其翁姑宣徳間旌表李某妻季氏郡人夫名失傳早卒氏有色居板橋村景泰末都督毛勝鎮永昌遣人娶之時勝勢炎灼聞者震懼父母皆勸氏不應坐卧以刀自隨曰再來即自刎勝不能屈竟以節終白浩妻閃氏郡人夫卒家貧子幼且罹多艱苦節堅持父母不能奪天順六年有司旌其門謝定妻住氏郡人天順間夫罷任四川開縣令僑寓不歸翁姑皆八十餘氏紡績以養之病篤躬滌汚穢及卒惟一小室鬻五金以葬人勸往求其夫曰彼不吾顧矣遂不食死巡撫陳用賔為之𫝊朱鑑繼妻徐氏郡人年二十夫卒遺腹生子初其夫娶王氏生子五嵗而王卒至是氏誓死守志紡績以養舅姑撫育二子壽七十三終俞富妻阮氏俞祥妻黄氏俞本合肥人明初籍金齒從征安南兄弟俱戰死阮年二十黄年十九俱誓死守節學士汪諧表其堂曰貞節傳芳胡來覲妻陸氏郡人年二十一夫卒守志七十年成化六年旌表吳貴二女鞏昌人長曰貞烈次曰貞潔其父任永昌指揮卒於官子繼卒無嗣二女間關走闕下哀求得移檄鞏昌取吳雄者嗣之二女竟誓守女節以終後合葬於郭外旌其墓曰吳氏二貞閃訓妻馬氏郡人年二十夫卒父母欲奪其志誓死不從事舅姑撫二子壽七十四終早正妻郡人阿昌羅板寨百夫長早正娶羅古寨土舍女為繼室三年正病妻事之謹一日語妻曰我欲殺汝妻驚泣問故曰我死必矣兄死弟妻其嫂我阿昌俗禮也汝將與小叔為妻因此欲殺汝妻以有一女誓守節正不許妻不敢近未幾正卒妻大慟不食而死朱正學妻張氏郡人姑病篤醫藥無效自分必死氏拭穢而嘗之以慰姑曰醫言無害也姑聞之喜遂愈梁毅女名留姐永昌衞人年十六一日父母俱出外女獨居有俠少往挑之女大怒逐之泣訴於母遂自縊戈諫妾韓氏無錫人夫為永昌府舉人任東昌府通判時納氏為妾後官僉事卒氏守節自誓或憐其少欲奪之氏自縊於私室監司旌其門趙璿妻鄭氏郡人年二十五夫卒嫠姑在堂幼子在襁日事女紅以給人勸改節鄭剪髮自矢厯五十年蔣希賢妻袁氏郡人年二十二夫卒無子止二女痛夫幾絶或欲奪其志氏誓曰生飲蔣家水死葬蔣家墳遂蔬食布衣辟纑供食厯四十二年劉儀妻李氏郡人年二十四夫卒無子而貧苦節不移鄉人欲上其事辭曰夫亡守志禮也何足異壽七十八終族人憐而葬之袁必通妻張氏保山人年二十九夫卒矢志不移後子熙亦卒遺二孫俱孩媳陳氏節行如其姑氏守節五十餘年陳亦守節四十餘年楊椿妻張氏金齒衞人夫中嘉靖壬午舉人氏年二十五夫卒翁姑垂白子幼家貧氏勵志守節厯四十餘年勉治三喪哀痛成病壽六十四終劉傑妻毛氏保山人年二十六夫由貢生任湖廣枝江教諭服闋攜家謁選至正定病大作氏百計救之刺血疏神竟不起泣訴於巡撫得郵符與幼子麒扶櫬歸艱窘備至壽至五十四終後子麒嘉靖甲子舉於鄉閃應華妻穆氏保山人年十九夫卒一子方在襁褓翁姑俱老氏拮据紡績至夜分聞雞而起以供朝夕苦節四十年瞿爵妻朱氏保山人夫為諸生氏年二十三夫卒無子食貧守節養其舅姑嘉靖間旌表潘承志妻邵氏保山人夫為諸生嘉靖間氏年二十三夫隨父任卒於桃源二子方稚氏茹荼撫孤竟夜紡績課讀時三喪竝集勤劬勷葬後子允孚為諸生孫一桂登進士官御史守節厯五十三年周科妻張氏保山人年二十九夫卒一子方幼族人利其家貲諷之改適不從既而百計恐之皆不為動以死自誓教子成立守節四十四年孫良材登進士官吏部萬厯四十六年建坊旌表陳大猷妻馮氏保山人年二十五夫卒其父欲更嫁誓死不從翁姑垂老賴以奉養撫孤姪如己子以節終孔宗明妻劉氏保山人年二十三夫卒紡績養翁姑茹貧撫子節操凜然王重光妻段氏保山人夫卒守節孝事翁姑鬻産營葬教子力學至夜分不寐屢經表揚祀節孝祠陳溥妻趙氏易源鼎妻龍氏李達妻席氏俱保山人夫早卒守節撫孤為鄉里所重陳謨妻田氏保山人年二十三夫卒二子俱幼族人逼之嫁不從堅志苦節壽九十餘終劉遇曉妻張氏保山人年二十八夫卒氏守節不二撫子成立壽九十三終周士玉妻楊氏保山人年二十夫卒剪髮自誓其家甚貧晝夜紡績苦節三十九年尹先哲妻戚氏保山人年二十四夫卒家貧誓死守節撫子成人壽八十終子元媳張氏孝養誠篤時稱一門節孝巡按御史旌其門朱廣運妻戚氏保山人流冦之亂為賊所執氏紿曰吾有私蓄請入取之賊信其言氏入舍即投井死邱世第妻陸氏保山人流冦之亂氏年少同夫負子避兵為賊所執氏紿之曰待我解子與夫惟命是從賊信其言即自刎死周運泰妻吳氏保山人為流㓂所擄義不受汚奪刀自刎死朱絃妻閃氏保山人遭流㓂之亂自縊死其妹適丁長祐亦同時盡節石應岷妾徐氏田氏俱保山人夫中萬厯乙夘舉人厯官貴州威清道流冦至永昌與威清不相聞正室丁氏謂徐田曰事已不測爾等將若何皆曰惟有死耳遂同自縊王聖修妻水氏保山人年二十一夫卒誓死守節時舅已七旬孝養備至子在襁褓紡績教讀以至成立苦節二十年流冦兵亂母子皆被擄氏恐被汚乗間誘其子出即觸柱而死王啓龍妻吳氏保山人夫任總兵流冦之亂氏與妾周氏將自縊人見而救之氏正色曰君與吾夫厚宜速我死今反相救豈欲我等為蠻婦乎遂與周同縊死姜成徳妻楊氏保山人流冦之亂縊死其幼子亦自縊張世彦妻鄧氏保山人年二十三夫中崇禎己夘舉人計偕卒於京子烈方二嵗氏堅志守節貧困不移撫子成立壽八十三終郡守旌其門谷天生妻楊氏騰衝衞人正統三年思任冦邊舉家出避金齒夫從征中嵐瘴死氏痛哭遂自縊於柩旁詔旌其門復其家張榜妻頓氏騰衝衞人夫為諸生病劇氏年二十五涕泣不食豫置衣裝以俟一女甫七嵗貯一簣以畀之夫卒遂飲毒母以他藥救解夜分復自縊死正統間旌表黄桂妻梁氏騰衝衞人夫為諸生氏年二十四夫卒不御簪珥養姑教子姑殁殯葬薦祭皆如禮年七十餘貞操如一日正統間旌表華松妻林氏騰衝衞人夫任後所千戸早卒氏年十七矢節養姑撫遺腹子復春襲職未幾亦卒再撫孤孫以存華氏林鳯妻閻氏騰衝衞人年二十夫疾割股以進弗愈謂曰吾度不免汝少奈何氏泣曰所不能從夫者以二子在襁褓耳敢有他志夫卒杜門深居孝事舅姑及相繼殁勉勷葬事天順間旌表吳璽妻張氏騰衝衞人年十八夫卒氏執節不二教子有成天順間旌表張晟妻鄭氏騰衝衞人夫為諸生氏年二十一夫卒矢志守節撫子邦教舉於鄉壽八十終常應學妻梁氏騰衝衞人年十八嫁甫六月夫卒氏撫膺痛哭隨自縊死鄉人哀之陸緒妻王氏騰衝衞人夫為諸生早卒氏守節不渝厯三十餘年趙萬善妻陳氏騰越人夫為諸生病革時氏多方調治不愈及卒自縊家人救之得不死遂割耳以見志督學使屢奬之岳松妻陳氏騰越人早寡矢志不移養姑教子嘉靖間臺使旌之陳大道妻汪氏騰越人年二十二夫卒撫孤守節終始一致楊啟陞妻李氏騰越人年二十一夫卒氏守節教子二十餘年鄧文妻黄氏騰衝衞人夫任千戸氏嫁年餘而夫卒守節不二婦姑相依為命者五十餘年譚惟光妻沈氏騰衝衞人夫任千戸氏年二十八夫卒父母欲奪其志氏誓死守節撫孤崇本襲世職巡按嘉奬之壽八十終吳宗堯妾原氏劉氏俱騰越人夫任延平府同知卒二氏抱屍號痛俱服毒其姑救之三日後原自縊劉殮原畢入卧内亦自縊啓視笥中殮物無不豫備事聞建坊旌表林某聘妻段氏騰越人年十七許聘未嫁而夫卒女守節不字壽八十二終事聞旌表劉秉璧聘妻陳氏騰衝衞人年十五未嫁而夫卒矢志守貞誓不再字紡績自贍壽六十終張本妻胡氏永平禦人年二十八夫卒氏與妾陳氏同志守節厯六十餘年巡按奬其雙節楊廷詔妻謝氏永平人年二十夫卒無子矢志守節養姑盡孝壽七十終丁烈妻張氏永平人年十八夫卒遺腹三月家貧守節教子成立奉㫖旌其門壽至八十終吳氏永平人夫姓名及氏行實俱失傳與張氏同時旌表貞節吳承祚妻繆氏永平人夫卒無子守節不二以女紅自給厯五十五年廖惟熹妻吳氏永平人事舅姑以孝聞夫卒守節終身鄒天涯妻董氏永平人流冦至氏被擄至玉皇閣下投井死李煒妻董氏永平人王自奇兵亂被擄不從投井死本朝張鳯翺妻童氏保山人年二十九夫亡孝養舅姑喪葬盡禮撫遺腹子成諸生守節四十四年龎徳俊妻王氏保山人年二十八夫卒夫叔欲奪其志氏以死拒之撫孤子成立旋殁媳改適氏復撫孫備嘗辛苦守節厯四十五年范紹文妻黄氏保山人年二十八夫亡甘貧守志孝養孀姑苦節厯三十九年鶴慶府明許喬遷妻樊氏郡人年十八夫以鄉舉卒於京舅姑欲奪其志剜目割鼻憤恨成疾壽六十終郡守以詩輓之李醜妻里氏郡人年二十三夫卒一子懐抱一子遺腹後皆卒氏不易其操守節五十餘年當事旌之龎大治妻陶氏郡人夫中嘉靖乙夘舉人氏年二十二夫卒無子有姑在堂家貧甚氏躬績養姑有令其他適者矢死不從姑年八十殁喪葬如禮郡守表其門劉旌妻張氏郡人夫為諸生氏年二十三夫卒有遺腹㫁髮誓志守節四十餘年楊從宜妻李氏郡人夫為諸生疾篤以父母幼子囑之氏遵遺命㫁髮守貞當道表揚奚賔妻彭氏郡人年十八夫卒子甫二嵗有欲奪其志者泣血自誓守節多年人鮮見其面子女婚嫁辛苦拮据貧而且賢當事旌之李時若妻李氏郡人年二十一夫卒子富春甫二嵗氏矢志守貞紡績教子春有不率輒齧其臂泣曰爾父偃蹇以殁爾若此我何面目見爾父於地下春悔泣遂肆力於學氏病篤春嘗糞龥天衣不解帶氏病尋痊當事旌曰節孝李廷璋妻邵氏郡人年二十二夫卒子鳯鳴尚在襁褓中氏冰霜自矢割耳守節鳯鳴後為大使孫男數人氏口授經書俱成名當事旌之楊嗣光妻阮氏郡人明末隨夫任陽宗學官因兵亂回鶴至洱海亂兵四至避石洞中為兵所獲氏激烈不受辱奪刀自刎死段廷實妻尹氏劍川人夫中嘉靖乙酉舉人氏年二十六夫計偕卒於京無子氏以死自誓守節三十餘年直指旌之羅雲鳯妻段氏劍川人夫中嘉靖庚子舉人氏年二十六夫卒無子守節終身張周聘妻張氏劍川人夫苦學早夭時尚未歸欲往殉父母嚴守之氏伺稍懈詣夫冢自縊因合葬徐文宗妻張氏劍川人夫為諸生氏年二十二夫卒遺腹生一子撫之成立壽七十四終李樂道妻楊氏劍川人夫為諸生事繼母孝氏事繼姑如其夫夫疾篤氏呼龥求代及卒自縊以從楊桂生妻李氏劍川人年少夫卒矢死靡他孝事翁姑撫子成立撫按建坊表之順寧府明猛紲妻易朶猛朋妻易喬俱郡人洪武間以相夫成名西平侯上其事皆贈恭人奉禄妻猛氏郡人土司猛雍女夫任大侯土官嘉靖間父惑於後妻欲使改嫁土舍奉誥㑹氏歸寧誥以木邦兵攻大侯掠其夫氏素衣獨居一樓父諷其服飾之陋女曰夫存亡未可知欲與俱死何心改服乎父約奉誥將逼之氏佩刀自防數月父乃餌以毒氏恨不見夫留緬書一紙詞氣甚悲巡撫王啓遣官奠且為之贊曰牝雞悍兒女怨猛虎亂夫家散嗟嗟何日見夫面君不見祭家姬雍家先血濺又不見劉家母王家翻受禪吁嗟女兮豈不欲效雙飛燕破鏡難成片一紙緬書流血撰黄泉路上見夫面夜梅郡人僰婦也萬厯間木邦侵境兵勢甚勁郡中男子與之敵者皆北婦手持尺劍敗其黨百十餘騎自是木邦兵不敢犯猛卿妻陶氏雲州人年二十六夫卒哀毁欲絶救而獲免教子成立節操凜然朱錫命妻羅氏雲州人萬厯間氏年二十八夫以殺賊陣亡氏誓死靡他撫孤就學辟纑飲血以勵其志子朝英由選貢作牧新興閭里榮之永北府明譚本仁妻姚氏瀾滄衞人年二十九夫卒守節訓子臺司旌其門李喬妻范氏瀾滄衞人夫任本衞指揮氏年十九夫卒撫育孤子守節終身巡撫旌其門李鍾元妻蔡氏瀾滄衞人夫為廪生氏年十八夫卒守節萬厯間建坊旌表壽八十四終盧蕙妻甯氏瀾滄衞人夫任思州府經厯銅苗作亂氏被擄投河而死建坊旌表本朝袁佩環妻阮氏郡人年二十九夫卒絶粒不食者數日戚長以姑老子幼勸止之遂紡績針黹以養孀姑必誠必敬撫子為諸生康熙五十七年具題旌表宋振麟妻趙氏郡人夫卒氏年少茹苦守節養孀姑育孤厯三十一年雍正九年具題旌表楊大妻馬氏郡人年二十六夫亡茹蘗自甘養親教子竭盡心力守節厯二十七年麗江府明高長妻木氏郡人名藥師能土知府木森女夫任通安州土州同氏年二十夫卒撫孤成立五十四年節操之堅一洗夷習木青妻羅氏郡人夫任土知府氏嫁十年夫卧病竭力調治卒不起方在閔凶適有蕃冦慨然曰彼以我新遭喪子在襁褓婦人無能為耳乃親擐甲躍馬先士卒一鼓克敵邊鄙以寧事姑盡孝教子以忠勤稱誥封恭人年五十一終叅藩謝肇淛紀其事蒙化府明董朝儀妻羅氏郡人年二十七夫卒遺子應元紡績教子成名正統間郡倅旌其門趙奴宣妻楊氏郡人夫早卒氏守節不以貧家婦缺菽水於舅姑撫子成立景泰六年旌表左綱妻張氏郡人夫任土知府生子琳瑛夫旋卒氏肅清内政潛弭外侮勵志冰霜始終如一二子相繼承襲成化三年旌表唐齡妻胡氏郡人夫任百戸氏年二十夫卒遺腹七月生子政撫育承襲成化間有司旌之左明理妻張氏郡人夫為諸生早卒氏守節撫孤三十餘年成化間有司旌之劉崇學妻陳氏郡人夫卒氏年少孝姑育子操履端嚴𢎞治六年有司旌之馮士傑妻詹氏郡人𢎞治間夫卒氏年少家貧守節終身鄉黨稱之官愍妻雷氏郡人夫中正徳庚午舉人早卒氏年少守節撫子慶倪鞠育教誨後任訓導楊謙妻薛氏郡人夫卒守節教子剛成名嘉靖間巡撫提學交相旌奬饒允泰妻廖氏郡人夫任榮昌令萬厯間氏年二十九夫卒撫育三子成立閨範嚴肅有司旌奬楊仁海妻左氏郡人沙賊破城被執不屈罵賊自投於井賊復出之猶罵不絶口賊碎其面釘殺之王維漢妻張氏舊定邊縣人年二十三遇流冦潰兵至被執不辱遂被殺周國輔妻陳氏舊定邊縣人猓賊屠城氏被執不受辱賊剖其腹而死本朝芮翊周妻楊氏郡人家貧如洗氏竭力相夫以奉翁姑翁姑相繼殁夫以哀毁卒一子尚在襁褓氏日禱於天冀保孤兒以存夫後果獲成立苦節三十二年楊之藩妻袁氏郡人年二十八夫病刲股以救不愈氏堅志守節三十七年以上二人題雍正九年具旌表續編徐奮翼妻陳氏郡人夫為廩生氏年二十九夫卒不食數日以二子幼忍死撫孤紡績度日子稍長晝則令出就外傅夜則篝燈課讀學業不進輒痛哭責之曰爾如不才何以見先人於地下長子敬學為諸生苦節三十八年王肇興妻姚氏郡人許聘未嫁夫病沈綿兩姓父母皆欲另議婚氏誓不他適夫病尋愈遂成婚生三子氏年二十九夫卒奉事翁姑甚謹教子柄為諸生壽六十九終孫某聘妻徐氏郡人夫名失𫝊年十四許聘以翁父俱殁不能嫁娶康熙十三年偽弁孫龍韜徵糧於蒙聞其美遺以金帛遣悍卒登門逼娶母兄無計女自度不免因紿曰少待梳粧遂扃戸取孫姓聘物洱海紅布纒身自縊死合郡驚視顔色如生各捐金殯葬康熙二十九年同知陳文成復以禮改葬豎碑紀烈景東府明阿曩郡人土知府陶瓚祖母正統間麓川叛冦壓境阿曩諭瓚率衆禦之斬馘無算賊悉遁總兵上其績封淑人褒賜甚厚劉藻妻陳氏郡人夫卒氏年少守節終身誓死不二本朝續編王應天聘妻毛氏名正瑩郡人許聘未嫁雍正五年鎮沅夷賊之叛其夫從征至谷麻染瘴而卒氏聞赴井死雲南通志卷二十二
