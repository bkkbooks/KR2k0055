body:
  text: 雲南通志卷二十上選舉進士科舉人薦附武辟賢才之生何地蔑有稽之往册若吕凱執忠謝恕效節皆滇産也迨明以制藝取士而楊文襄毛給諫傅忠壯諸人氣節勲名輝映史書豈惟風氣之益開抑澡身浴徳拜獻以成其信者自命固不茍耳我朝加意邊逺屢廣解額猶復旁招曲引徴辟賢能類不越乎黌宫培育徳造有成之輩南中人士修之家獻之廷踵相接也夫膠庠為人材所萃詩書陶淑之久雖一器偏長猶足以分猷助化况於英偉卓越與氣運人文相繫属者時間出於科目之中不尤巋然為儒林望乎爰列近代迄今滇士之登進於兩闈者具錄其名以備考鑒志選舉武科辟薦附焉元皇慶二年詔天下以冬十月行科舉郡縣興其賢者能者充貢三年二月會試京師合格者共三百人蒙古色目漢人南人各七十五名蒙古内雲南一人色目内雲南二人漢人内雲南二人明洪武二十二年始命雲南選貢送應天府鄉試永樂九年雲南始開科洪熙元年定雲南鄉試額十名會試分南北中卷雲南為中卷宣徳四年令貴州就雲南鄉試七年増雲南鄉試額五名正統二年令開科不拘額數五年定鄉試額雲南二十名景泰元年令開科不拘額數七年復定鄉試額雲南三十名成化三年増額十名十年復増五名𢎞治八年増額五名正徳五年増額五名嘉靖十六年始令貴州另自開科定雲南鄉試額四十名萬厯元年増額五名四十三年増額二名自後增減不常或増一名或仍舊額崇禎十五年増額七名至五十四名本朝順治十七年雲南初定首舉鄉試照舊額取中五十四名是科各省鄉試俱照舊額減半康熙二年定雲南鄉試照舊例減半中二十七名外加額五名五年始開雲南武科鄉試額中二十七名八年加額三名二十三年加額三名定㑹試南北中卷雲南仍属中卷議准雲南舉人願就敎職者就本省考試解卷禮部閲送吏部補授三十五年巡撫石文晟請増鄉試額文武各十五名三十八年太和殿告成増額三名武鄉試仍四十二名四十四年増額三名五經卷額三名四十七年巡撫郭瑮請増鄉試額五名五十年増額九名本科加額三名五經卷額一名議准兵丁中有能通文理者一體入武鄉試五十二年開萬夀恩科額六十名五十三年准文生入武鄉試武生入文鄉試定會試額畢三塲者二十名内取一名雍正元年開恩科加額十名㑹試遺卷雲南欽取二名其癸卯正科以甲辰二月補行令各府州縣學㧞貢生員中有文行兼優者選入監肄業每六年舉行一次寜嚴勿濫四年加額三名五年詔各直省府州縣貢生生員内有居家孝友行止端方才堪辦事而文藝可觀者督撫學臣保舉送部引見七年命鄉試文武闈不用藩臬入塲以守巡二道員為提調監試官八年命新科進士自考選翰林部曹外發往鄰省觀政給以公費十年加雲南鄉試額九名十一年摉㑹試遺卷雲南欽取二名進士元至治辛酉科王楫昆明人州判至順庚午科李近仁昆明人宣慰副使至正戊子科李郁昆明人知事甲午科段天祥昆明人都事庚子科李天祐昆明人都事明洪武甲戌科張信榜李忠昆明人知縣丁丑科韓克忠榜楊慶昆明人太常博士段澍昆明人御史永樂甲申科曽棨榜張文禮寜州人敎授壬辰科馬鐸榜楊榮太和人庶吉士戊戌科李騏榜洪誠昆明人知府楊斌太和人知縣甲辰科邢寛榜楊春太和人僉事宣徳庚戍科林震榜張淑昆明人僉亊癸丑科曹鼐榜劉瑩姚安人御史正統己未科施槃榜馬經陸凉人知縣壬戌科劉儼榜劉鍇臨安人僉事黄鐘曲靖人戊辰科彭時榜李蕃河陽人主事景泰辛未科柯潛榜王惟善嵩明人羅晟臨安人僉事甲戌科孫賢榜楊緯太和人布政朱祐曲靖人天順丁丑科黎淳榜田宣前衛人曽瑄臨安人給事中庚辰科王一夔榜楊繹太和人叅政杜亨太和人知府周銓曲靖人知府陳輊曲靖人僉事甲申科彭敎榜邢幹臨安人知府成化丙戍科羅倫榜張政大理衛人知府譚昪瀾滄衛人知州文澍金齒司人知府李珉霑益人御史孫偉曲靖人知府己丑科張昇榜許暠昆明人知縣張璁平彛人副使壬辰科吳寛榜趙璧昆明人副使楊一清安寜人大學士楊仲綸太和人知縣乙未科謝遷榜李㵝左衛人知縣金章中衛人僉事唐瑢左衛人郎中楊傑大理人觀政張西銘寜州人御史戊戌科曽彦榜張翬中衛人知縣韓昂前衛人知縣李華大理人知府丁㫤蒙化人知府羅珦臨安人晟之子知府辛丑科王華榜趙弼太和人太僕寺丞王杲臨安人叅議張濓越州人知府甲辰科李旻榜李宗儒昆明人主事夏暹右衛人布政張志淳金齒衛人侍郎丁未科費宏榜滕檳金齒衛人郎中朱璣蒙化人按察使𢎞治庚戍科錢福榜金冕中衛人少卿王璟建水人知府癸丑科毛澄榜方矩後衛人叅議王應奎太和人知府張斆大理人主事丙辰科朱希周榜張繹建水人副使己未科倫文敘榜陳鍾後衛人少卿楊南金鄧川人叅議壬戌科康海榜張雲鵬大理人僉事喬瑛臨安人知府陸經鶴慶人郎中乙丑科顧鼎臣榜毛玉昆明人給事中馬文金齒衛人知府陸芸金齒衛人知府正徳戊辰科吕柟榜劉洙臨安人都給事胡潔曲靖人少卿辛未科楊慎榜劉欒中衛人金罍趙州人何邦憲太和人知府甲戌科唐臯榜傅良弼昆明人給事中羅江嵩明人推官楊九齡鄧川人觀政王廷表阿迷人僉事董雲漢河陽人僉事雷應龍蒙化人御史丁丑科舒芬榜胡廷禄右衛人副使楊士雲太和人給事中周臣洱海人助敎辛巳科楊維聰榜葉泰後衛人郎中楊宗堯太和人觀政楊珮太和人知府繆宗周臨安人左布政張鳯翀寜州人西銘子御史朱珮鶴慶人按察使葉瑞臨安人主事嘉靖癸未科姚淶榜孫繼魯右衛人都御史張素安寜人都御史陳表前衛人都御史孔禧永昌人丙戍科龔用卿榜陳常道呈貢人副使黄鳯翔右衛人知府唐錡中衛人僉事施昱廣南衛人光禄寺卿李元陽太和人御史知府鄒堯臣趙州人叅政楊僎臨安人叅議己丑科羅洪先榜錢世賢左衛人副使陶㢘曲靖人知府唐時英平彛人侍郎壬辰科林大欽榜段承恩晉寜人知府賈文元大理人主事趙汝濂太和人副都御史張合永昌人副使李啟東楚雄人郎中席大賓河陽人都給事乙未科韓應龍榜劉輔前衛人郎中朱文質前衛人僉事髙崶大理人叅議張拱文太和人叅議馮良知臨安人知府張祐永昌人御史戊戌科茅瓚榜萬文彩臨安人左叅政繆文龍霑益人叅政吳蘭霑益人司業辛丑科沈坤榜霍薰永昌人知縣甲辰科秦鳴雷榜嚴清後衛人尚書楊廷相石屛人叅議丁未科李春芳榜楊經右衛人知府梁佐大理人叅議李遇元臨安人按察使邵惟中永昌人太僕寺卿楊鑰劍川人郎中庚戍科唐汝楫榜楊一和太和人知州趙周太和人叅議吳崧永昌人副使癸丑科陳謹榜李元泰中衛人副使郭斗右衛人左布政張烈文蒙化人按察使己未科丁士美榜張橋右衛人僉事楊應東太和人僉事侯必登澂江人叅政壬戌科徐時行榜楊柟太和人主事皮汝謙蒙化人通判彭富鶴慶人右副都御史乙丑科范應期榜龔廷璧建水人主事許鎡石屏人副使楊道東太和人隆慶戊辰科羅萬化榜楊言大理人給事中王恩民臨安人都御史偰惟賢姚州人辛未科張元忭榜李選太和人叅政阮尚賓太和人運使蘇湖太和人知縣李東太和人光禄少卿王來賢臨安人左布政尹廷俊蒙自人運使蕭崇業臨安人都御史鐵篆保山人推官陳彛典騰越人員外羅星劍川人評事萬厯甲戌科孫繼臯榜趙以康浪穹人副使朱道南臨安人知縣石元麟永昌人郎中查偉鶴慶人苑馬寺卿孫健鶴慶人副使丁丑科沈懋學榜何文極太和人郎中向僎臨安人僉事葉祖堯臨安人瑞之孫知縣吳堯弼鶴慶人副使庚辰科張懋修榜劉順徴右衛人郎中朱運昌後衛人都御史孫愈賢大理人御史史旌賢雲南縣人副使塗時相石屛人太僕少卿癸未科朱國祚榜劉文徴右衛人太僕卿薛繼茂永昌人御史張宗載鶴慶人御史丙戌科唐文獻榜張弋昆明人主事侯康永昌人知府顧紳鶴慶人知縣己丑科焦竑榜邵年齊晉寜人主事朱思明後衛人布政包見捷臨安人侍郎莫與京鶴慶人知縣壬辰科翁正春榜朱化孚安寜人按察使蘇兆民太和人知府王夔龍石屛人御史孫學易楚雄人布政使謝得申曲靖人推官乙未科朱之蕃榜佴祺臨安人御史戊戌科趙秉忠榜楊師程安寜人御史王致中太和人叅政楊應登阿迷人副使辛丑科張以誠榜趙曰亨安寜人布政王元翰寜州人給事中潘允中永昌人郎中朱世昌曲靖人主事甲辰科楊守勤榜施堯化廣南衛人郎中金本髙昆明人叅政楊若予太和人郎中陳龍光石屛人左布政潘一柱永昌人御史丁未科黄士俊榜段尚錦臨安人行人陳鑑石屏人副使陳于震蒙化人知縣庚戌科韓敬榜陳爰諏呈貢人主亊傅宗龍昆明人尚書趙琦寜州人知府張法孔寜州人布政石應嵩永昌人主亊于發藻河陽人知府李聞詩鶴慶人知府陶珽姚安人副使癸丑科周延儒榜張正道寜州人行人張讚通海人主事宣大勲蒙化人知縣楊掄鶴慶人光禄寺卿梁州彦鶴慶知縣楊棟朝劍川人光禄寺卿丙辰科錢士升榜夏啟昌臨安人提學周良材永昌人郎中吳宏業河陽人太僕寺正卿楊芳盛鶴慶人侍郎羅杰劍川人星之孫刑部觀政己未科莊際昌榜賀文明左衛人雷躍龍新興人尚書段髙選劍川人知縣何可及劍川人太僕寺少卿天啟壬戍科文震孟榜王錫袞禄豐人侍郎徐天鳯晉寜人主事廖大亨建水人都御史李柱明阿迷人主事戈允禮保山人侍郎李希揆曲靖人主事李大受鶴慶人郎中楊應宿鶴慶人知府陳竒猷劍川人御史乙丑科余煌榜蕭運泰昆明人萬永康建水人文彩孫郎中閃仲儼永昌人少詹周昌祚定逺人崇禎戊辰科劉若宰榜馬兆羲楚雄人給事中龔彛順寜人副使胡璉騰越人員外阮元聲馬龍人員外辛未科陳于泰榜王凝命雲南人副使陳璽安寜人僉事王士章河西人知府李思恂河西人知縣楊繩武彌勒人尚書甲戌科劉理順榜陶文彦浪穹人知縣朱國昌臨安人太僕卿萬民表阿迷人知縣陳我徳楚雄人知縣李可棟劍川人主事胡璇騰越人丁丑科劉同升榜陳履忠雲南人御史台汝礪臨安人主事張垣通海人知州庚辰科魏藻徳榜嚴似祖昆明人檢討曽髙捷賓川人員外廖履亨建水人知縣張一甲石屛人僉事張宜河西人推官左廷臯蒙化人癸未科楊廷鑑榜龔鼎永昌人楊永言昆明人知縣本朝康熙甲辰科嚴我斯榜趙士麟澂江人吏部侍郎庚戍科蔡啟僔榜車文龍昆明人楊燝雲南縣人知縣魏殿元石屛人癸丑科韓菼榜萬肅石屛人永康孫徐達乾楚雄人給事中闞福兆通海人乙丑科陸肯堂榜許賀來石屛人侍講戊辰科沈廷文榜盧炳石屏人兵科掌印給事中王翰宜良人庶吉士甲戌科胡任輿榜管灝新興人吏科掌印給事中劉凌雲安寜人知縣丁丑科李蟠榜段曦安寜人御史謝儼澂江人知縣趙宸黼澂江人士麟子庶吉士庚辰科汪繹榜董玘通海人檢討曽昕臨安人員外王孫熊石屏人知縣段昕安寜人主事癸未科王式丹榜謝履忠昆明人左諭徳馬汝為元江人知府丙戌科王雲錦榜趙士英昆明人庶吉士王思訓昆明人檢討陳時夏昆明人見任營田觀察使郭偉新興人員外己丑科趙熊詔榜陳守仁石屛人見任知縣謝履厚昆明人檢討李應綬澂江人庶吉士知縣張揆亮澂江人敎授壬辰科王世琛榜張旭呈貢人檢討周彬昆明人見任知府鄒啟孟澂江人敎授癸巳科王敬銘榜張漢石屛人知府林鶴來建水人見任敎授馬瑛新興人敎授湯一中呈貢人敎授乙