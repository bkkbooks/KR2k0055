body:
  text: 雲南通志卷二十五仙釋附方技自青牛西去白馬東来羽客緇流盛行中土矧山峙老君地隣天竺漸染最乆服習尤深者耶夫釋老之學自東周後漢以還時有盛衰而終莫能廢則以其道要乎致虚守寂葆性全真内可淡嗜欲之私而外可郤身名之累雖與儒者修身淑世之道㫖趣不同而願力之堅深精神之凝一固有不甚懸殊者茲編所錄類多翛然出世吐棄一切適志清虛游神冥漠誠得其沈靜髙眀之意而踐之綱常倫敎政事民物之間安見二氏之必無與於儒術㢤至於曲藝専長茍臻超絶利濟一時亦未可没而不𫝊也志仙釋方技附焉雲南府唐道清郡人楊氏子精硏内典有苦行感現觀音大士逺近化之䝉氏號融通大義法師化日有彩雲出火中舌根不壞色若蓮花覺印郡人號脫空戒律精嚴母亡廬墓刺血寫經學道於五臺飛錫滇池結茅以居名曰樂道晚歸五䑓沐焚而逝三日異香不散其焚化處相𫝊獲舎利數百產芝三蕚元蓮峯禪師名宗照劍川段氏子祝髮受具遍歴諸山了逹祖乗至正間遊晉寧東山謂似曹溪遂建盤龍寺居焉一日沐浴書偈云三界三途何佛何祖不破便有能破便無擲筆而逝門人塔全身於寺師以八月十九日生至今中秋滇人禮之大雲不知何許人或云少以羲經登進士居長安邸中夢大士拊其背曰子於空門大有宿縁覺而白光滿室香氣襲人因棄官禮天覺和尚祝髮遊天臺山習止觀晚年入滇棲三泊大雲山創華嚴寺因號大雲緇流聞風屨滿蘭若中統間還大都不知所終無照曲靖普魯吉人父仕元生照於安寧離襁褓即暝目趺坐髫年依本郡虎邱寺雲巖薙髮後詣天目謁中峯本眀言下契悟嗣臨濟二十世還曲靖搆菴棲息菴有龍湫墮葉觸波必遭風雨照安禪制之龍徙去遂即其地創正法寺尋入昆眀梁王建佛嚴寺於太華山以居之示寂後得舎利纍纍於靈骨門人建塔寺左迦羅姓趙氏通唐梵諸書大徳間昆眀池有蛟化為羙少年挑淫婦女父老請治之羅遣黒貌蠻奴擒至以水噀之化為蛟斬之蠻奴即大黑天神也後不知所終蘇忠先安寧人事母極孝性喜飲放逹不羈家貧力學諸子百家無所不究負母入岱晟山中結廬耕食自娱得異人授役龍術松材村田苦無水即鑿龍泉清冽異常灌溉山田凡數十頃一日元使者齎金帛往召蘇應諾欵使者於山中至夜半屋宇四圍俱金龍繞現有吞噬狀使者駭而逃焉里人稱為真隠先生云眀劉真人名淵然贑州人年十六師趙元陽授大丹訣能呼風致雨洪武間被召擢右正一永樂初遷左正義尋謫滇居北山龍泉觀洪熙初召還賜號長春真人賀真人名以正昆眀人神采秀發超然物表師劉真人盡得其秘被召歷至靈演法左正一賜號洪濟真人劉真人號可成洪武間居祿豐之南隅有仙術城中苦無水真人為掘大井於東街水清冽而甘邑人利之西河有水怪渡者多遭沉溺真人以符籙除之其害乃已後奉詔詣京禱無不應封降魔真人趙護太和人家世習降龍法𫝊至父賜洪武間召入京賞賫甚厚遣還護迎父至滇會滇池孽龍為厲滇人詣護求治之護坐海口演法龍去患除楊用廣號雷谷餘姚人遇異人得五雷法永樂初以事謫宜良祈禱輒應八十餘容如少年一日謂門人曰三日後雨雪吾脫塵凡矣至期果然梁道士不知何許人居易門有道術易門艱於泉梁以蠟為三龍置隙地俄湧三泉其上泉之龍止一目今泉中魚亦一目又有廟在石澗山梁檄神一夜移之布張昆眀人有異術甞為一嫗作豫修齋嫗持所寫文示張一見盡焚嫗曰書此數日矣今卒然何以辦此張曰具十筆硯一夜可成嫗潛窺見十人皆同貌五皷書畢張於送神時伏地不起諦視惟衣冠在地而已後又有人數見焉直指使以為妖欲收之乃趨黔國公家乞白布一丈坐其上令兩徒掖之走少頃抵安寧黔國請其術張畫門於壁以手叩之門啓中有宫室甚麗黔國疑不入俄而無有其幻異類如此甞欲以術傳僧鐵峯峯不受遂示蛻於􅞼山之虛凝菴已而鄉人復遇於大理劉士寛江西人幼而目盲年十六遇異人以金鎞投之遂眀因授其術年八十餘自蜀入滇齒髪不衰入夜篝燈兀坐不睡其談尊生以養氣為主年九十忽見數軰入稱青城山使者迎為觀主遂逝是日太平寺僧夢寛取茗十餘斤且言欲入蜀僧異而訪之始知已死張善信通海人寓安寧因誦經有省後遇異僧攜至天竺示以蓮臺善信見為火坑不敢渡僧貽土一撮水一瓶以歸久之大悟宗㫖居二十餘年化去人取土塑像傾水於地遂湧甘泉至今不絶永亨字道隆昆眀人住山三十餘年頓悟宗㫖化後舎利無數雲山和尚昆眀人幼祝髪精戒律宣徳間召至京演菩提妙義授僧錄司左覺義遣歸大學士金幼孜作詩送之古庭昆眀丁氏子七嵗出家禮慈宗名善賢復禮百巖改名善堅御史張某見而竒之曰此子三十年後當佩祖印隨入金陵謁無隠令看萬法歸一語晝夜叅求忽閱圓覺經至身心俱幻遂劃然自釋再走金臺返滇省喟然曰目前境界非我能畱死去生來安可息也復遊貴州尋入蜀脇不至席心地發眀時年止二十三耳正統間叅無際授印記𫝊臨濟二十三世號古庭旋歸滇開堂歸化寺法侣雲集𢎞治六年示寂塔全身於寺東所著有山雲水石集淨輪號大巍郡人俗姓康得法古庭倡無際宗風成化中卓錫都城創萬福寺道法大振别號竹室有竹室集真圓昆陽楊氏子幼祝髪為普照寺僧後叅無際得法每入定甞至數日父母殁廬於墓側豫知寂期眀太史楊慎為著松風菴記豁渠姓鄧内江人年二十遇異人授以無為之㫖遂棄去諸生一日玩壇經有省聞道川拈金剛經頌瑩然眀徹及入青城山耳邉甞有報將然事者語同叅玉峯峯曰修行被鬼神勘破乃落靜境耳時有内監邀渠供養至之夕内監夢神責云汝以劣相妄希大道覺而告之渠遂辭蜀入滇至大理李元陽館於三塔寺為落髪因寄玉峯云太湖落髪一佛出世以渠初號太湖也晚益超悟甞謂在雲南所得是相外消息在嶺南所見是相内光景再抵武陵叅道林凡宇内名山無不遊歴後不知所終如慧號寳峯蜀賈也入滇以五利起家已而變起室中遂祝髮於大德寺禮佛三十載履跡穿石直指李柄親叩法要逺近来謁者無虛日慧不勝煩乃攜徒無礙入伏牛山臨化作偈遣徒謝衆而去段頭陀晉寧人朱顔白髪徉狂市中毎食松栢葉有叩者輒為囈語時出一二言根極㣲妙偶過南闗指市廛云某處至某處當火既而武定難作如其所指李破罐不知其名居於宜良巖泉山石洞常攜破罐入市凡有所得無論鹽米蔬果俱入罐中煨食若無所得即拾鵝卵石煨食人問之曰芋也取食果芋每於龍泉洗罐翻裏向外洗淨仍翻如故因呼曰李破罐後不知所終徐道廣昆眀人嘉靖時修真於楚䧺之元真觀能書符咒水除􅑂役使鬼神禳災祈雨時黔府瘟疫醫不能療遣使求符遇道廣於烏龍寺方食活鱣即以鱣血書二符使笑之道廣起擲一符於水田中忽見鱣百餘以首捧符使始驚訝持符入府每夜見符上火光燭屋疫遂止其餘靈異不可殫述後封雷霆都吏提脚道人姓名不傳萬厯初至滇住北郭外龍王廟以䋲提左足趾而行佯狂笑謔人不能測天明入城乞食晚歸其所有門卒思窘之日未晡即欲閉門道人已至甞披一衲終嵗不滌亦無垢又時至蓮花池吐腸出洗一夕至塚間化去葬廟側滇人有遊武當者遇於南巖宫衣服顔貌如舊云萬卉安寧州龍應寺釋子童年即瞽甞背誦華嚴經八十一卷㴞㴞如湧泉時有獨契禪宗之號本源昆陽甸頭村人萬厯二十九年棄家為普照寺僧遂遍謁名山歴吴楚閩粤東至普陀落伽山北渡青徐燕冀出邉塞轉而至秦由秦入蜀登峩眉山經一十三載後歸結庵碁盤山息止觀御史傅宗龍慕其戒行往迎之住錫普賢寺念碧雞闗下數十里紆廻曲折雨苦泥濘募工自夏家窰至省障水築堤修橋梁成坦道行旅便之其生平功行類此年九十四坐化本鐵字定堂嵩眀李氏子年十四謁道心薙髪誠實精進遍歷名山三十餘年大有所得歸至曲靖有按察唐豫夢神僧次日見鐵與夢相符為重修東山梵刹謂人曰此禪師再来人也後至本郡清水塘建勸善樓至雞足建寂光禪寺居十有八載諸方僧謂之當代宗師一日謂衆云撒手歸来路不迷靈機煞活在全提㡬回力盡心圓處坐脫孃生鐵靣皮端坐而逝昌容號權實昆眀趙氏子七嵗出俗十九圓具掩闗六年後叅余山和尚得法更號定峯開堂說法僧徒雲集容自幼究心内典時有靜會每經行林下機之所觸即成吟咏示寂之日索筆留偈曰不作凡不作聖圓明一㸃無虧無賸書竟趺坐而逝有嘯獅山語錄行於世釋禪號本無昆眀人俗姓張名初俊性頴悟博渉經史萬厯間落髪召至京授以僧錄司左善世賜紫衣銀鉢如鳩摩羅什歸與副使馮時可友善後卓錫麗江府請建悉檀寺著有風響集老子註解楞嚴懺禪師頌諸集行世讀徹號蒼雪呈貢人俗姓趙戒行堅苦有才名崇禎間遊江南住華山與董其昌陳繼儒吴偉業唐宇昭軰友善有金陵懷古詩云石頭城下水淙淙西望江闗合抱龍六代蕭條黄葉寺五更風雨北門鐘鳳凰已去臺邉樹燕子仍飛磯上峯抔土當年誰敢盜一朝伐盡孝陵松示寂後江浙名士以詩唁者甚衆吴偉業一章曰說法中峯語句真滄桑閱盡剰閒身宗風實處都成教慧業通来不礙塵白社老應空世相青山我自笑詩人縱教落得江南夢萬樹梅花孰比鄰其愛惜如此吳中至今誦之羅國珍安寧人崇禎間以敗木破瓦架屋於永安橋側日拾暴骨瘞之遇人輒令念佛父亡廬墓哀毁骨立一日往辭州守曰某日道人欲回去人嗤其癲至期黎明坐橋中念佛闔郡往觀有讚其生西方者國珍頓足曰即此便是言訖而逝大千河南人崇禎間住淨蓮寺山苦無水師拜經百日泉忽湧出值嚴霜烈日甞露坐山野間有飯之者隨多寡輒盡或數日不食亦不饑本朝靈藥湖廣人天童法嗣順治十八年来滇住富民之九峯山時荆榛翳蔽野獸逼處人不敗入藥卓錫於此虎豹潛踪清泉湧出乃開山建寺八載功成留偈而逝無語迤西人住富民靈芝寺誦經靜室冬不爐夏不扇者三十餘年時趺坐山巔雉鳥羣集土人所供衣食咸分給貧乏康熙二十年忽聚衆告曰老僧来年此日與衆别矣至期果沐浴而逝室中異香三日不散溥畹號蘭谷江南人戒行精嚴康熙四十二年入京請梵本藏經来滇建樓貯之𠡠賜名報國寺幷經滇人多敬禮之御書詩匾開壇講曲靖府唐阿闍黎段姓人呼段長老幼得驅龍術不事符牒凡請禱立應人有自逺方来迎者但令先往其人抵家彼已先在坐矣明鏡中長老正統間住南寧真峯山苦行四十餘年夜甞以念珠撒地一一探之仍掐貫成串竟夜不寢侍者問何苦如是曰不苦不真吾以伏魔耳一夕有盜入室勒取衣鉢欣然與飲食遣之比曉尚旋繞廊廡間相率膜拜還其物乃慰之歸後以建寺卜地得一龍潭祝曰爾借我地爾亦有功次日泉果遷於山巔今泉溜樹杪繞寺廊焉所菴名真澄郡人張氏子年十五慕玉龍發光和尚思見之適園中柿熟欲取作供甫登樹遽墮地昏昏入夢中赴光座下光曰汝事辦否曰已辦及甦猶仆墮處遂悟生死不在色身乃禮光受五戒年十八謁古梅於曲江為薙髪且令遍恭天下名師澄至北都歴叅諸㝛久之至千佛寺依徧融遂嗣融後甞往来五臺創寺雞足每開講多所發明大千大同人七嵗出家来滇居南寧玉龍庵庵苦乏水師䖍拜山㘭中得水一泓年五十餘徹夜誦經虎常守户後百嵗無疾而逝道蓮字白齋蜀人也初来郡住朗目山苦行自持採山蔬自給幷日而食山下人有布施者則曰吾不湏此爾當以之孝養父母守戒律絶世故居山足不至城市土人呼為碧眼神僧朗目大師號慧光郡人李氏子萬歷間得法於嶽禪師次叅徧融䝉印可居桐城金谷岩跪誦華嚴經三十年忽悟曰佛祖寧為一家設乎遂出世旋至京師請藏歸住普照寺講楞嚴未畢忽辭衆端坐而逝上聞賜金立塔於朗目山之髙峯惟敬號梵庵貴州人俗名洪上於崇禎十年與兄洪中避亂来尋甸鍾靈山時寺僧欲創一庵有數人同夢二獅登榻及旦二洪至坐榻上願祝髪於此遂留主庵庵名音吼甞有虎至惟敬馴服之不復咥人樵牧見之不避惟寺中有吉㓙將至則虎為之吼本朝道瑞蜀人俗姓王年十三祝髪於奉聖禪院初名景瑩㓜即留心宗㫖其師一日講楞嚴至七處徴心八還轉見問其師曰心是何心見是何見師不能答遂徧叅諸方得悟上乗順治間至郡住府東山報恩寺建大悲閣奉大士像開堂說法夀七十三端坐而逝海航字濟舟馬龍人孔氏子㓜不茹葷二十得度戒行髙潔通宗門要㫖開律堂於覺照庵逺近宗之康熙十五年八月初四日集衆示偈曰虚空非大我身非小要知靣目眀月皎皎端坐而逝臨安府明姚成郡人少孤磊落不喜章句慨然慕冲舉術人勸之娶不應俄遇異人飲以酒香氣馥郁仰觀天表若有所見遂能言風雨隂晴及休咎事雜以滑稽人咸異焉手搴一芭蕉葉四時皆有青色又晨起戲為人致書燕邸此暮果持手扎而歸居無何失其所在王盤通海人日與羣兒嬉戲元夜以一竹竿令羣兒閉目騎之風聲盈耳至一大郡銀花火樹駭人心目夜半歸謂之曰適往江南觀燈耳風揺頭姓名無考𢎞治間至石屛敝廬垢席坐卧不常狂呼嫚語人不能測有問者輒揺頭因呼風揺頭一日湖内有船欲覆乃以手作扶掖狀遂得濟比登岸跡之不知所往温成號大機魯人叅禪見性居府西指林寺化時年一百二十畔富新興人幼不茹葷依天常寺受戒遊通海渉秀山相水􅍺乃於東北石筍叢起處以杖穿之水隨下洩法建通大乗能詩文正徳間為石屛諸天寺主號悟機和尚沐浴端坐而化慧心號玅空通海馬氏子祝髪秀山不識文字惟反觀㝠坐常禮觀音大士十年如一日忽感甘露灌頂之異遂通諸經過目能誦遇禱雨黙然危坐靈雨應之後至省城建笻竹寺居焉無竆和尚嶍峨蔡氏子母戴氏夢日輪當空有娠及生不茹葷甫離襁褓便知趺坐長而出家落髪遍歷名山說法開堂聲重京國化於武定之獅山楊善哉眀末寓三泊雲龍山一佛殿旁居常裸體或數日不食或一日數食喜看書每冬浴澗中夏日圍爐人問道輒云善哉善哉故人以名之居三載遊府城普菴寺先日云將歸去次日告寂桂輪河西人初不知書後遊京師受三昧法戒忽頓悟精解内典崇禎間為皇堂都講衍大乗經賜紫衣鉢杖號毘尼和尚年八十餘無疾而逝本朝李金階字建白郡庠生生有異質目光射人性篤孝嗜學精於易親殁蕭然有出塵志避跡山中一日有道士求濟建白以鹽與之既去鹽復在故處追之不及歸而漸狂或長卧經月不食或一餐斗粟不飽或雪中赤身卧石上久之遂能前知言多竒中城南有石洞伏蟒傷人建白居之患遂絶除夕題詩有眀年辭别舊家鄉之句隔嵗果卒劉可成寧州人年三十𨼆華盖山結廬古塚旁僅容膝能前知禍福多隠語使人自悟有以非義之物進者輒呵拒之晚年辟穀日飲酒雖履霜卧雪無寒色年七十鬚髯復長齒落更生一日書偈云亥時閉子日開七十餘年去復来遂坐化越七日香軟如生澂江府眀黙然新興人幼入空門苦心叅悟年八十端坐說偈曰寂寂寂空空空還元妙認祖宗回光照本来同呀眀月與清風乃示寂李熹吾新興人遊江湖學道七十餘年至廣通羅川寺見羣蜂旋繞中殿欲止熹吾開襟呼曰来来来盡納之須臾不見謂人曰吾其逝矣沐浴具衣冠辭衆坐化是日兩迤知識莫不見之本朝鐵道人趙姓河陽人少孤未婚娶慕太乙皇極之理學之數年一日忽癲狂行歌市中數日不食亦不饑性喜鐵取鐵釧約兩臂鐵篐為腰帶鐵箸鑽匙及刀劒之類咸繫之身約百餘觔行路鏘鏘然人飲之酒醉則枕鐵而臥無所苦皆呼為鐵道人後遊彌勒蘇氏家言禍福多竒中一日蘇他往語其弟曰汝兄出我欲歸不及别矣沐浴瞑目而逝其弟哭曰吾兄供師三載竟不待其回而一言訣别乎有頃復開目曰趣兄回我待之次日蘇回合掌致謝而逝黄天順新興人不婚娶徉狂行乞有遺以衣履者盡著之旋脫於道上每出羣兒環繞捶擊無怒色能吞銀銅瓦礫或戲與巴豆丸者服數十粒無恙康熙二十七年按察許宏勲贈以金不受拾零星小塊嚥之後不知所在武定府眀補鍋匠無姓名不言以啞子稱永樂間常憇獅山往来村落間業補鍋有從學者不索謝但令負擔前行數載人不識也一日於南門外獅山道上㨂柴枝作三字云要南下安然而逝土人異之收棺木未瘞越三日屍不見傳啞子又在省城補鍋邉遁正徳間住獅子山土婦鳳氏往謁不為禮且曰汝不修行當為厠蟲矣鳳怒夜遣人刺之至則為巨人所縳雞鳴更使徃視亦被縛懇請於遁乃以法釋之因拂衣去鳳又使人邀之業渡金沙江矣遥顧使者曰若主真當變蟲竟去牧童郡人幼時牧牛山中與同儕對奕忽遇異人教之棋遂無敵以此名於一時後遍遊江湖回至黔西逆旅間忽遇前人呼之偕去王来豫號景雲精通元理煉丹祿勸仙臺山後屍解去本朝真一吳人幼業儒不偶流俗欲遍歴海内名山遂薙髪雲遊至滇住元謀法林寺手不釋卷工書法於釋典多所闡發廣西府眀唐風子瀘人知書事父孝朝為人傭暮則歌咏父亡走山中妻餽食不顧好與兒童戲人以風子呼之嚴冬大雪卧石上蒸汗如雨衣敝以䋲綴牛馬骨披焉或食鐵及瓷瓦齒聲楚楚好事者趨謁叩禍福皆不答有時謾語又切中其隠㣲一日取刀刈草頃之客有乗騎来者唐取草飼馬且曰不聽吾言故至此馬為淚下崇禎末嘗語人云滿眼皆沙又云水来矣沙難留矣乙酉以後始悟所謂沙者指定洲水指流寇耳丁亥為寇卒所執逼令速殺刄至其頸白氣湧出元江府眀月光道人正徳間雲遊至郡結茅金鰲山麓兀坐不言日啖菜根少許如是數年忽不知所在人往覓之見壁間書一絶云壺中夜夜種金蓮劍光飛過赤霞天蓬莱此去無多路只在山人拄杖前始知其仙矣陳羽士嘉靖間棲東山玉皇閣神氣俊爽目光如電呼嘯風雷無延晷刻郡甞旱輿至城中甘露隨注居二十年蛻化去大理府後漢楊波逺時地莫考相傳為東漢人唐永徽中常騎三角青牛遊蒼洱間後遇迦葉波於三陽峯下以石案設供具石長廣丈許逺止以一手持之後不知所終石今存唐沖舉仙棲蒼山鶴雲峯四十餘年常坐一石或時與人奕一日辭衆曰當以明日行矣次午果登石乗雲而去夀海姓周氏南詔時三年不雨請天竺僧白胡師禱之雲布無雨師以竿撥雲雨隨竿注不能遍及師曰汝國必有聖僧盍往求之或告南天祠有其人王召不赴與師往謁乃夀海也師見海即拜王驚問對曰吾師也王視其額上有五字印遂禮敬之因請雨救民海曰昔湯旱七年以身代犧六亊自責天乃雨此人君有道格天之騐今王殺及無辜天地閉鬱不知悔罪何從得雨王乃悔懼誓不虐民已而果雨道安河東瞼人住大常寺嘗欲建浮圖有洪水自蒼山漂木石至工遂成羅筌島有蛟為害及安建寺於上害遂息化之夕室有毫光五彩及茶毘頂骨現奄室利伽訶阿六梵字人以寳瓶盛其骨化為水或謂為文殊化身云惟中姓張氏傳荷澤正𣲖建法滇中自是衲子知有曹溪矣李成眉人稱李賢者初建寺蕩山祝曰寺若久佛當從室中至次辰五華樓佛像已在殿中南詔重建崇聖寺時成眉為司廚侍者殿成南詔謂衆曰殿中三像以何為中尊衆未及對賢者厲聲曰中尊是我王怒其不遜流之南甸無何坐化甸人茶毘瘞之塚時有光商人以為寳也啓其骨貨之富人購造佛像光如故王聞而異之遂迎奉於崇聖寺作中尊青牓葉榆人姓楊氏每講經時有雨花之異施頭陀葉榆人通禪悟勤禮誦宗家以為得觀音圓通心印其法嗣皆以道行聞於時小澄南詔時雞足山僧也與二僧同住一菴澄入城乞食南詔王問其識何法門澄云能令死者生極樂國或願生入棺中試之王如言屬澄起棺開視則誠死矣王代懇丐活澄許之其人復甦言所生境界與澄言同後還舊庵問食於二僧二僧曰汝在城乞食許久不裹糧来反欲食耶逐之澄遂走叩迦葉石門門訇然中開澄入二僧追至門已閉如故乃大悔恨焚身門外焚處生柏二株或謂澄迦葉化身也張建成喜州人唐時入覲過成都大慈寺適寺鐘新成僧戒曰擊鐘一聲施金一兩建成連扣八十僧驚問故曰南使張建成也僧嘆曰佛法南矣遂為更名成化受心宗而歸白伽師南詔時尊為國師時天旱饑饉師衣食萬衆皆取給室中盖神化也五代午正和尚往下闗東津梁寺段思平興復曽豫知之宋無言和尚李氏子甞持一鉢入定鉢内火光出則晴白氣升則雨一日講法華經有老人来聽聽畢乗風雷去衆驚問之曰洱海龍也慈濟洱海東北有危石懸立峻壁下臨深淵濟日拜佛其上至今呼為禮拜石元照本夙有慧根遍恭名宿嘗詣天目謁中峯將至峰語其徒曰當有客自雲南来汝持鏡迓之本至見鏡曰師敎我矣徒問故曰吾名照本師令我照見本来耳徒白峯峯竒之留數年盡得法要日贈以歌序嘗語趙孟頫謂雲南三僧皆堪負荷照本其一也妙觀和尚至元間講華嚴經感金甲神現像之異集楞嚴纂要註十卷又誦金剛經有白光如輪久而不散作金剛方語集觧一卷又有華嚴心鏡元談輔翼及外集諸書皆發明宗旨茶毘日舍利瑩然圓護大理人號念菴初號無念遊大方見中峯和尚中峯以羅什捧鉢永嘉無念無生之㫖叩之答曰我之無念異乎所聞什師過在絶念不起永嘉過在任念自起二皆有偏念也我之無念則心體靈湛寂然不動如鏡鑒象如燈顯物未甞毫髪隱也中峯深肯之為作無念字說甞夢神授書法凡書字右腕洞如水晶因號為玉腕禪師崇聖寺佛都二大字竝石刻證道歌皆其手書眀無極名法天太和感通寺僧洪武癸亥走閒道入覲獻白駒一山茶一上臨軒納之茶忽開一花上喜親為詩紀之勑翰林院學士賦詩以賜厚慰遣還詩載大理志楊黼太和人自號存誠道人孝友慈和甘貧力學園中桂樹盤結如樓黼巢居其上日註孝經硯水自溢母卒葬畢即隱雞足山凡二十年卒之日凡親友之家皆見其登門作别或又見於安寧道中焉崇禎壬午河西李元祺赴選得大理訓𨗳以便道詣武當有僧来謁自稱大理府學楊黼浼祺寄語於家祺許之及至下闗見黼南去數呼不應抵任問諸生方知為永樂聞人因為立碑表其里曰桂樓先生故里芮道材少業儒從劉真人習棲神煉氣之術曽殄峩崀蛟除䝉化祟宣徳初召見賜都紀馳驛歸創棲霞觀居之尋屍解髙娘一名谷女趙州白崖人年十三尚不能言其兄從征東川相距二千里一日谷女忽開口欲餉其兄家人喜其能語試裹飯與之躡其後至盤陀石入水洞而去未㡬歸道軍中亊甚悉更命送新衣易舊衣皆不爽遂日送餉以為常一日忽謂家人曰兄回矣遂騎常所牧白豬豬化為象乗雲而去今盤陀石水洞猶存陶浚瀾滄人性㢘勤精道術祈禱神驗不受人財忽語人云上帝召我為三天門置簿都史遂端坐而逝大空名興徹洱海人初師雞足定堂誓立禪永不坐卧後往孤鳥寺叅天竺掩闗蕩山學楞嚴於邱光禪師每定三日光訊曰得法喜乎曰如是如是翹一足立無欹斜晚住獅子山一日報衆為别香烟既盡聞空中佛聲漸向西去寳月燕人棲趙州白崖之小王寺每人市輒暫憇於張姓者之家因求寄居張不解月歸語其徒大光遂逝是日張婦產一男額有頂珠左臂肉隆起如念珠痕光往視兒一見如舊識三嵗殤又生於千户侯家狀如前甫六嵗千户令就館以待襲職兒曰我前世為僧但願出世一日忽失所在寳菴大理人長身修髯始居淨土山繼入雞足歴九載每入塵市常依祠廟置瓢神案人以食食之後至白崖忽謂衆明日虫蝗寺示寂行至塔所趺坐說偈曰吾三十年寂而常照照而常寂奄然順化大智燕人行脚至白崖每至人家見雞即索食謂其多食蟲蟻當為度脫一日遍街衢謝衆衆隨之至義塜地閉目端坐向西口吐白氣如虹而逝拜經和尚名興宗郡人成化間住黔省永祥寺樓誦法華經每字一拜如此者四十年當膝處版為之穿年七十刻期鳴鼓告衆而逝雪軒趙州人遊貴州永寧創菴以居題曰夢縁坐山十四年戒行髙潔禮部差錦衣舍人蕭興訪取赴京不知所終道菴太和人叅古庭和尚築室於水目九峯之閒因聞水聲大悟再見古庭庭喜之曰居士這回穩坐家中也曰某自来不出外古庭曰家中事若何曰倒却四壁古庭肯之有鐵壁銀山都放倒叮嚀珍重莫狐疑之句海慧號印光葉榆楊氏子童年出家心源洞徹遍覽大藏宏建法幢遂開雞足𫝊衣寺闡揚宗教為諸名徳所推後開堂感通寺百廢俱興李元陽與為方外友寂觀號法界印光髙弟也苦行三十年叅方至燕徧融和尚許其入室回滇至響水闗遇虎手摩其頂虎逡廵而去寺僧怪之觀曰心宇㤗定尚不見生死安知有物我吾視此亦猶蝘蜓耳年九十無疾而逝周禮號徹庸雲南縣杜氏子十一嵗入雞足山師徧周和尚周先一日夢白蓮花生於殿墀明日禮至稍長篤志宗風禮觀音文習靜二十年聞水聲大悟慧解無礙後叅大方印可於天童宻雲和尚歸妙峯山開堂以棒喝傳宗人謂滇南自古庭後二百餘年祖燈再熖實自師始著有語錄雪山夢語洪如號無住定逺人鄧氏子初習靜白雲山聞鉢聲有悟崇禎間叅天童和尚愈徹性源開堂雲南縣水目寺著有蒼山集苦海慈航集本朝學蘊號知空洱海人九嵗辭父母入雞足寂光寺薙髮戒行精嚴博極羣書慨然曰文字之學不能洞逹性宗乃徃叅無住和尚無住示以㫖要久之苦無入處後至玉霖軒禮萬佛名經忽大悟覺身脫落内外圓眀如一輪皎月自謂快爽難以喻人復叩證於無住無住深許之著有語錄草堂集年八十無疾登座示衆而終李炳陽名徳全江西金谿人早年頴悟遽有飄然出世心徧遊諸名山至滇過雲南縣得天一山遂棲託焉精修苦行二十餘年一日歩松隂下見二童子授以勑曰上帝召汝歸遂沐浴而化楚䧺府唐王載元張眀亨南詔時棲威楚之五樓山載酒峯頭長吟狂嘯時人未之知也一夕酒酣有道人乗風而至神采煥發二子迓之曰先生能劇飲耶道人顧笑問其姓名曰無心昌道人促膝傾觴淋漓醉卧已而起别曰眀年秋風起塞上吾當再来及期二子登眺以俟四顧凄然湏臾道人至攜醇酒一瓢命二子飲張不善飲惟王子飲之道人歡甚吟曰將得五樓眀皎月換来一頃玻璃風吟畢而起白雲在天彌空佳氣道人曰時當行矣騰空而上王子隨之張子踴躍無措伏地大呼道人曰子仙骨已成遲一劫耳張子遂化鄉人瘞之塚上流光掘視得石如水晶是夜夢張語曰吾功行尚缺當以骨救瘡痍試之果效遂名仙人骨云後有謂昌無心乃呂字也遂名闔闗灘閣曰呂閣李阿召大理人居七局村養一黒牛日飲池水肥澤異常因得滷泉白蒙詔開之是為黒井賜官不受求為僧賜紫袈裟井民至今立祠祀之元李賢定逺人黒井鳳山坊舊無水賢往丐豆腐索之至再人曰物值㡬何但水難得耳賢笑云何不蚤語我即詣山叩地甘泉湧出源空郡人三嵗能誦佛號入紫溪山為僧常遊螺髻山有虎伏崖下又遊九重巖經月絶粒一日端坐而化茶毘日祥雲羃焉眀正玉廣通人嘗入定於仙羊山古樹下出神去本朝讀禮號見月楚雄人明崇禎間祝髪雞足遍歴諸方至江南華山依三昧和尚囑紹律宗衲子康熙十五年入寂姚安府元慶禪師居郡妙光寺山舊無泉師以杖卓巖谷之隂泉隨出焉眀張三丰天目人寓郡之文昌宮年餘後去之平越以隻鞋留挂壁間長二尺題曰三丰鞋今平越府有三丰脫影崖浴仙池回生樹遺跡本朝楊和廷名濟丹事母極孝順治乙酉值沙賊變奉母来姚居玉皇閣時杜朝明據姚流寇遣其將張虎屠城和廷日端坐誦經兵入㧞刀砍之已復還視完軀朗誦如故惟坐上木魚痕深寸許遂加敬而𫝊其事永昌府唐無言和尚姓李氏生時不哭兩手皆拳垂髫猶不能言後有僧語其父母命造觀音像則能言像成果語拳亦隨開掌有文曰無言因以為名年十五依圓淨法師精研律論融貫教乗手書大乗般若經千餘卷茶毘之日得五色舍利遂於棲賢寺旁建塔奉之道超段氏子童丱出家戒行清苦嘗於巖閒入定有異鳥䘖花糜鹿馴卧之異年四十五示寂謂其徒曰切無茶毘三年後當葬我於西山之陽及期啓視顏色如生衆歎異之遂為立塔眀志登馬氏子結庵龍泉門外有盜十二人夜入寢室登禪定不動盜周視左右見案上蔬食羅列皆新炊者盂箸亦如其人數盜驚駭登徐云昨已知諸君至故囑徒豫備耳勸令飽餐仍為開說果報因縁妙義羣盜悔泣羅拜而出黄甬騰越人入佑聖觀行持符籙驅邪治疾皆有神驗𢎞治間旱兵備趙烱延術士能禱雨者指揮陳儀以甬對烱延問甬甬對曰不必懸旛驅雷但竭誠必有感也烱率闔屬齋戒數日天雨如注甬自此戒行益嚴人呼為松溪煉士祖復號立禪姓朱氏系出晉藩萬歷初遊匡廬茅山薙髪為僧精修禪定脇不至席者五十年後遊滇至楚䧺值旱為請雨積薪自焚雨立沛民徳之未㡬入永昌寳臺山足不履户外數年一夕說偈而逝薛繼茂郡人别號青羊道人事蹟詳見郷賢任貴州廵按時有道人来見曰公宜急告歸眀年秋風起吾當至永昌一晤未㡬茂果歸道人如期至日與講修煉法後引一青羊入茂家道人與羊忽不見茂無病而卒鄉人有自大理来者見茂與道人同行問何之曰蒼山一遊因寄語其子牆内有丹書小劍小印小旗各一宜善藏之及抵永其家方治䘮郷人𫝊其言果有前物始知茂尸解去不二頭陀姓任少為永昌郡吏素好道甞過一坊下見字紙數篇書隂府律皆其所犯者遂棄家雲遊至應天府趺坐市中遇廵城御史責之命都綱安揷一古寺内此寺常有妖白晝傷人不二至寺趺坐夜半見蛇長數丈口如盆自上而下欲吞之不二端坐自若叱曰吾在此爾宜速去不去將誅汝頃之蛇頓入廊下遂隱不見人以此感動捐萬金修徳普寺居之甞見其髪有五色光後坐化去海闊福建人雲遊至永居沙木和石牌寺晝夜趺坐戒行精嚴獨居數十年髪白轉黑齒落更生面若童顏一百三嵗圓寂於城東劉家庵蓬頭道者字洞元不知何許人崇禎間雲遊至永趺坐市中無所求人與之錢隨給貧乏後歸東山寳鼎寺每於盤石上靜坐山禽翔集其身人以此異之本朝警秀字補樵永昌周氏子年十一遭亂被掠至江南為宦家子心厭富貴遂於南嶽山福嚴寺為僧好學能文初師原直後從見月和尚及主徳山忽思親遂歸永而父母已逝乃作告墓文履霜咏復返徳山所著有湘煙集倚鳴禪師語錄徳潤字香谷姓俞氏隨父宦於滇每有出世心遂於騰越雲峯山出家行頭陀行建刹接衆募縁施粥以濟饑民掩埋枯骨以免暴露後遊昆眀坐化於長樂寺鶴慶府唐贊陀啒哆尊者西域僧也自摩伽國来又號摩伽陀結茅於郡之峯頂山郡地舊為澤國贊陀欲通道莫由徘徊岸側見一女浮匏於水語陀云能呼匏至前水當得洩陀呼之不至女以為行力未至言已不見陀遂入山後石室靣壁十年女復至曰匏可呼矣浮匏令呼之果至陀乃卓錫象眠山下擲念珠於水俄山石迸開凡百餘孔水遂奔洩眀寳山劍川人姓張祝髮於雞足山持行精嚴後行脚中州北僧藐其懦山隻足懸立山門七日夜人驚異之叅訪有得還山坐化圓道郡人李氏子幼讀書通文理後祝髪雞足山有苦行直叅不二真宗晚入龍華山禪定圓寂之日弟維方敎授廣西忽有僧趺坐泮池謂門役曰吾鶴人也與爾師有舊可一面乎維出視之則兄圓道也問所自来曰赴晉寧蟠龍會耳俄失所在誌之則脫化日也太和楊湜韓渥為之𫝊張道裕劍川人自幼潛修好道遇異人授以靈術心悟眀通能致風雨大理旱邀裕禱雨裕語来使曰爾先往吾次日来使抵榆裕已先一日至矣禱雨輒應太史李元陽與為友本朝阿哈哈摩尼西域僧也住錫鶴慶開拓東嶽宫有定力每夜趺坐一龕喃喃持梵呪晨起輒取井泉灌其體自頂及踵雖嚴寒必日三焉鶴髪童顏歩履如飛或叩以𨗳引術笑而不言人施之金輒用以周貧乏神色清潤年已百餘嵗矣順寧府本朝洪鑑號希有蜀人甫二嵗即失所怙恃依一友得竒疾就大士前作誓曰願疾愈為佛弟子身强拜而起汗流浃背病體霍然遂詣華嚴寺薙髪復過妙峯山叅徹庸庸示以指要歸而精思累月遂契真如順治初入鬱宻山有虎来廻環吼視作搏噬狀希有曰汝獨無佛性耶虎長嘯去年七十九趺坐而逝眀通號大安蜀人童年祝髪勇猛精進得摩訶迦葉苦行之𫝊眀末遊滇住錫郡西華藏寺刀耕火種自食其力者數十年年九十六猶日行百里迅速如飛素與猛峒余姓善一日謂衆曰明早俟余某至老僧即徃水目山鑄鐘去次日沐浴未定余果来談笑作别而逝永北府眀周草窻瀾滄衛人結菴東山下精勤道術工於水墨卒後數日有人自省中来遇草窻於路寄回朱履一隻人始知為脫化云䝉化府漢孟優䝉化人世居巍寳山與王帥孟獲兄弟也素懷道念常徃来於瀾滄瀘水閒得異人授長生久視方藥諸書隨處濟人後主建興三年丞相亮南征軍中誤飲啞泉者輒手足四禁而不語或謂優有良藥使人往求之優進仙草立驗武侯驚異之與語人天運會深有契焉後入峩嵋山不知所終子孫於元時賜姓猛眀王旻蜀之華陽人永樂初寓居䝉遇異人授道術能役鬼神召致風雨鄧川孽龍為祟請旻制之旻至而龍遁去成化甲午豫知化日應期不爽䝉化人咸以為尸解云方技附雲南府眀黄拱斗字文極晉寧人性頴異多讀書旁及百家技藝無不精究初以計偕遊京師遇隱者授觀象之秘及歸每月豫書雨暘風雷及地震妖異之事無不符合將卒先知某年月日時遍别親識盡焚其書不𫝊於世陳鳳典河南新野人受異人𫝊有接骨神術流冦攜入滇呼為老神仙凡腸出骨折苟存餘息者能醫治甚至易骨縫腸割肌取鏃皆人所驚見者後卒於騰越江天水昆眀人精數學竒中如神居羅漢山蝙蝠洞眀末沙酋將叛天水豫告親友曰某年某月為始此地當作戰塲四十年豈可居此危險中乎遂𨼆去卒如其言郭寓民字螳川安寧人少業儒繼業醫能察標本精􅍺訣以意用方所治輒得效人有延者昏夜必趨視藥不計值樂施與岐黄術中卓品也受冠帶榮身卒年九十有七本朝段䋕安寧人庠生凡天文地理隂陽律吕之書靡不詳究著述甚富尤精岐黄之業留心濟人多有竒驗曲靖府唐阿馬龍納垢酋之後隱居山谷撰爨字如蝌蚪二年始成字母一千八百四十號曰韙書爨人至今猶習之占天時人事亦多應驗閑珊居集霑益烏蠻也精卜筮之學其法用竹四十九枝或以雞骨代之占算輒應眀傅秉忠江西人寓居郡城精天文豫推算来年水旱豐歉絲毫不爽善祈禱應驗如神其弟秉安亦精其術後徙居武當山趙汝隆郡人精太素􅍺知人窮通夀夭用藥隨取草木與之無一不痊有官病齒衂日流血數升諸醫束手隆摘苦蒿令細嚼立愈有貴人餽人參盡分送人合藥年九十六終有人遇於碧雞闗西寄語家人勿慟始知尸解去郭元谷尋甸人有神鍼術凡為人治病按穴針之莫不竒效或有患腸腑疾者谷針其頂門入數寸腸立下敷以神膏有頃針起腸収而疾愈張神卜尋甸人精數學觸物能知其終不失時刻與人言初若不經意後悉驗人遂以神卜呼之臨安府眀闞仁字靜齋通海人㓜業儒旁通醫理邑中有少年持茶花行秀山中本無他恙仁遇之令其速歸歸果不起其父兄請故答曰耳色青小腸已斷其竒驗類如此鍾士昌字汝樸通海人敏慧絶倫善書盡及北遊兩都筆墨益妙天啓間試畫品中書本朝何慥字百庸石屛人先世精岐黄至慥而術更神一日有卲某者行市中吐血數斗而仆氣已絶矣慥見其血色曰未死也以獨參湯灌之而愈王師復滇前鋒賴將軍舌本腫出不能縮曰心氣亟熱也久則飲食不下死矣炙銀器灼之腫消再投以湯劑立愈其生平立起沉疴隔垣如見類如此入西山有道者素無疾病寢不能興慥診之曰六􅍺純隂為鬼所盜當午刻死竟如其言又嘗為劉某診曰尺􅍺有怪徴後嗣其有厄乎是夕其孫果溺水死年九十餘豫營夀藏先期與親友别至期而逝澂江府本朝葉文波河陽人原名覲光少應童子試有星士推曰君當因名而入庠旋因名而被黜葉未之信後學使見其名為更覲光果得入泮次年學使為鄭覲光怒其同名黜之文波遂棄家遊中州遇前所識星士盡得其術遂返澂終身不娶居肆中以星命隱日得錢數十即下簾與友談皆㣲玅洞逹性命之㫖常以忠孝勸人蕭然自得一日詣一逹官曰願與一棺吾明日辭公去矣至期沐浴更衣與親友叙别端坐而逝永昌府眀潘爛頭永昌人㓜隨長春真人學法其頭常爛人以爛頭呼之有疾痛徃求者即以頭上血書符無不立愈水旱祈禱輒應相𫝊其頭因誤召神為天君所擊云王琚騰越人正統間王驥討麓川數載糧餉會計未眀乃出令有能總之者陟三級琚進詣驥命總之日中上其數驥甚喜及班師時授世職百户辭曰小夫賤役非親矢石敢冒此職且世之耶竟不受鶴慶府眀李徳麟郡人精方􅍺能治竒疾逺近就醫者屨滿户外會洱河東有窶人求治麟飲之藥半載方瘳不責報後麟以他事過洱東見渡口船將發趨欲同舟有婦傾水濕其衣方怪之夫出則前窶人也驚曰此再生我者叩留止宿未㡬前舟覆麟獲免人謂隂徳所致陳洞天逸其名居羅陋川遇異人授以黄白之術丹成以濟竆困人多徳之有丹藥遇瞽者投少許光眀如平時逺近踵門求濟限為之穿晚嵗以其所得注洞天秘典一書多屬前賢未發之㫖人爭購之因號洞天先生云麗江府元麥宗通安州麽些人生七嵗知文字及長凡吐番白蠻諸種書契無不通曉兼識鳥語夷中稱為竒人雲南通志卷二十五
