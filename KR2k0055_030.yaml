本雅州蕃牙郎號任判官者所為遂呼至成都詰其敢虛聲動搖西蜀狀將斬之以徇任震恐伏罪乞以舉家數十口繫雅州獄身自入蕃窮問智髙指實逾月不至請舉家為戮安道久之乃許任如期至得小雲南書言智髙至南詔復謀為亂為南詔所殺安道乃釋任而奏其事初雍州之捷朝廷未知智髙存亡故未盡賞戰功至是乃命加賞將吏厯日表試士王伯厚詞學指南載宋重和戊戌以代雲南節度使大理國主謝賜厯日為表題試士觀此則重宣之際宋人未嘗無意於雲南特力不及爾指南載詞學題名戊戌中式者為崔嗣道字文彬張守三人南詔藏書宋乾道中南詔使者見廣南人言其國有五經注春秋後語三史加注張孟押韻集聖厯諸書吕東萊曰唐太宗帝範十二篇五代喪亂書遂缺今上征雲南僰夷始出以獻舊十二篇始復完范成大桂海虞衡志云乾道癸已有大理人至橫山議市馬出一文書字畫有法所須文選五臣注五經廣訓諸書及浮量缸器並碗諸物其後云古人云察實者不留聲觀行者不識詞知已之人幸逄相謁言固未同情慮相契吾聞夫子云君子和而不同小人同而不和今兩國之人不期而會者豈不習夫子之言哉續寄短章伏乞斧伐短章有言音未會意相和逺隔江山萬里多之句素馨段素興者宋慶厯中嗣位性好遊狎廣營宫室於春登堤上多種黃花名繞道金稜雲津橋上多種白花名縈城銀稜每春月必挾妓載酒自玉案三泉溯為九曲流觴男女列坐鬬草簮花以為樂時有一花遇歌則開遇舞則動素興愛之命美人盤髻為飾因名素興花後又訛為素馨三淨神宋時雲南有鄭姓者兄弟三人皆從征苖蠻死後敕封為靈王廟在靖州㑹同縣韓貞女元末保寧有韓氏女年十七明玉珍兵亂懼為所掠乃冒男子混處民間既而被虜居戎伍中七年人無知者復從玉珍攻雲南邂逅其叔父贖之歸蜀人稱韓貞女云軍屯明洪武制外衛軍七分屯種三分操備蓋以七人所種之穀飬三人也但初一軍授田二十畝種榖三石二斗嵗徴榖五十石入屯倉每月支榖二石嵗支榖二十四石為家小糧支三石二斗為種榖是徴五十石入倉其實在官止二十二石八斗後宫吏為奸屯倉既逺漸不可知七分軍嵗納穀五十石益困每告訐皆云莫可改後都指揮張麟精審其弊遂奏改名曰與除謂以家小喫榖二十四石其種穀三石二斗皆與軍而除其嵗徴之榖也然榖之納亦多弊遂照例以米四斗折榖一石使嵗納米九石一斗二升於是軍不困而官易徴當時便之籽粒明洪武初西平侯沐英請置勳莊除國賦為籽粒莊民不𨽻有司本朝順治十七年吳三桂疏乞以家人管莊與有司抗禮莊民亦橫暴之甚至靡熙二十四年允憲臣徐元文請以勳莊還民乃不受害三農周禮三農有兩訓先鄭云山農澤農平地農後鄭云原與隰及平地楊慎謂先鄭之說為是山農南方之刀耕火種巴蜀滇南之雷鳴田澤農廣東之葑田雲南之海簰諺所謂車水栽秧撐船割榖者也建文遺事建文名允炆明太祖之孫故懿文太子之子也太祖崩以皇太孫即位改元建文諸王皆以叔父行據方鎮元年七月燕王棣舉兵反六年燕矣犯京師至金川門谷王橞啓門納之須㬰宫中火起皇后馬氏崩帝倉卒間忽內臣舁一篋至且述髙帝遺命曰後有急即出此啓之得度牒三曰應文應賢應能僧服如之於是帝及御史葉希賢吳王教授楊應能並為僧編修程濟為道人從宫中隧道出期從亡諸臣史仲彬郭節馮㴶廖平金焦黃直程亨梁良玉王資等自秦淮水關出諸臣稱帝曰大師云師至鎮江㑹於史仲彬家至襄陽主廖平家遂行明年乃永樂元年師入滇居永嘉寺惟應賢應能及程濟徙二年師去滇入蜀又入楚入吳至史仲彬家一宿入天台三年復入蜀郭節黃直迎居於大竹縣之善慶里四年三月入滇居西平侯沐晟家明日去明年有言建文匿晟所者使使察無跡是年師結菴於白龍山六年師在白龍山金焦郭節黃直來七年去滇入蜀居善慶里八年三月還白龍山在菴憔悴夏月患痢不能出山覔膳適史仲彬偕程亨郭節訪至建文相對大慟各獻方物仲彬獨豐留一月彬讀行建文曰汝逺來固當久留因問其子之年嵗能幹欲為官否彬對曰必不敢相與唏噓久之始行主臣慟哭失聲七月師避偵者他去九年有司毀白龍山之菴是年應賢應能更結庵於浪穹師居之十年師在浪穹三月應能卒四月應賢卒十一月㴶㴶黃直來十一年師南行至蠻甸十二年帥在浪穹十三年師去滇入衡山還至馮㴶家不遇歸值㴶及黃直於途俱病師留視之二人卒葬之乃還十四年師在浪穹十五年别築室於鶴慶山中史仲彬來白龍舊處庵毀問僧徒不知何之史私泣曰彬不逺萬里來得見一面死且瞑目不則得一音耗歸家亦安凡值寺觀靡不拜禱尋歷數郡幾兩月餘一日在鶴慶忽遇一比丘指引乃得至師處留彌月歸郭節之弟子了空來云節已卒十六年師至黔來往於鎮西廣順之間十七年在黔十八年入蜀登峩嵋十九年去蜀入粵十一月還鶴慶二十一年去滇入楚二十二年入吳遇史仲彬因至其家二十三年太宗崩仁宗立明年為洪熙元年師渡海登普陀巖遂還鶴慶仁宗崩宣宗立師憮然曰吾其免夫時出亡二十五年矣涉厯遍天下恆以滇為家先是太宗永樂八年使給事中胡濙劉傑御史史濡工部尚書嚴震太監鄭和假他事往來南中物色之一日震忽遇師於清水關道上相持而哭師曰何以處我對曰上自行臣計之熟矣是夕震至驛亭自縊死是時偵者頻至師作四愁詩以自傷最後命濙駐湖南偵師凡七載始報命太宗夜召入寢殿問狀濙對曰某固在然天命人心去之已久無能為也不若姑置之度外在陛下成就聖德在彼獲終餘年太宗頷之自後遂罷四出之使者宣德元年師在鶴慶使程濟往河南視王資金焦未至而資焦卒二年師在鶴慶八月麓川冦至師去滇三年在道聞史仲彬獄死哭之五月從西陵入陜十月至漢中四年五月還浪穹庵燬仍還鶴慶五年師在浪穹為文哭從亡諸臣之死者且命程濟各為之傳藏山巖中六年二月師去滇歷秦蜀楚吳越踰嶺至桂林凡六年而後還是年宣宗崩英宗立明年為正統元年師欲東歸年六十有二矣遜國初為僧十二年學易五年觀佛書疏楞嚴法華署曰文和尚又二年蓄髮為道士講老莊又七年復為僧又二年復蓄髮為道士未幾又為僧時從亡諸臣略盡師每一念及輒悲感纍日不食故有東歸之志程濟力諌阻之乃止三年師有主庵之弟子應知遁去師慮迹露與程濟急行入粵西居橫州之山寺四年濟請師還滇不許五年復入黔至貴州之金筑司題詩羅永庵之壁上㑹有同寓僧竊詩詣思恩土知州岑瑛所自詐言是建文帝者械入京同寓諸僧俱逮遂及師時程濟已九十餘髮盡白負槖以從九月師至北京御史鞫他僧坐誣妄論斬英宗使舊時中官吳亮來視師言亮常䑛食子鵝肉事亮伏地哭不能仰視歸而自縊或曰吳誠非亮也詔迎師入大內帝在滇常賦詩曰牢落西南四十秋蕭蕭白髮已盈頭乾坤有恨家何在江漢無情水自流長樂宫中雲氣散朝元閣上雨聲收新蒲細栁年年緑野老吞聲哭未休又題羅永庵壁云風塵一夕忽南侵天命移四海心鳯返丹山紅日逺龍歸滄海碧雲深紫微有象星還拱玉漏無聲水自沉遙想禁城今夜月六宫猶望翠華臨閲罷楞嚴磬懶敲笑看黃屋寄團瓢南來瘴嶺千層迥北望天門萬里遙款段久忘飛鳯輦袈裟新换衮龍袍百官此日知何處惟有羣烏早晚朝命程濟作圃因作歌曰菜色青兮菜根辛兮菜兮菜兮似豫情兮又有淡菜歌云老菜根老菜根名固賤用何尊種鋤和尚走灌溉道人奔長雖新地力成實舊天恩休厭淡莫嫌村嚼來滋味勝雞豚虧他日日飽黃昏聊將性命存師既入宫宫中人皆呼為老佛以夀終葬西山不封不樹楊益字用謙安寧人明永樂中以貢入太學先是成祖夜夢赤龍扈從若扶掖之狀次日視朝畢獨見益以國子監隨朝著赤氈衣於藍衫內上大恱欲以卿二待之冡臣謂非例遂授兵科給事中歷工科嘗召以對奕上時手撫之恩遇篤至洎仁宣二朝乃出守漢中調成都多惠政告歸炎徼紀聞明田汝成炎徼紀聞叙猛密猛飬事與他書異附論曰猛密猛飬之亂譬如蔓草樹以中官灌以閣輔日益滋長雖欲芟刈不可得矣麓川之役舉朝皆以為非謂王振專權逞忿而李文達公賢亦云麓川初叛不委沐晟而遣别將遂至喪師此皆失實思任抗王師殲大將釋而不誅辱國益甚振之罪惡通天若主征麓川義正言順不可非也三原王公恕言亦與文達略同溢美文過謂家狀所䝉未知國史所𫝊竟何稽也其叙諸夷附論曰堪輿乍分函夏之地黎首蠢蠢與鳥獸無異五帝三王聖賢遞作奬掖以仁義陶鎔以禮樂而匡弼以刑罰然後人知衣冠之華飲食之美而彛倫之重其在四裔魑魅之與遊豺狼之與居仁義禮樂之教刑罰之政曽未目覩猶如函夏之初何怪其俗之醜惡也夫四隅之地西北為首東北次之東南又次之西南其最後者也周初封箕子於朝鮮即為嘉域而淮徐之區擯為外地太伯端委以治吳猶不革斷髮文身之習秦開百粵而漢武帝以閩夷叛亂徙其民於江淮間空其地其時固薦莽狐兔之墟也乃今聲華文物與中州等矣武帝遣唐䝉通夜郎元始拓土然直羈縻之而已我朝列於郡縣而西洋海國亦皆賔貢蓋氣化漸開則人文漸被若旋風漸拂首西北而終西南焉知滇僰之地不將有聲華文物如閩廣之交者乎又焉知八百車里緬甸諸夷不有列郡縣置官吏之日乎民謡王恕再來天有眼錢能不去地無皮明成化間能以太監鎮守淫虐民不堪命王恕至能虐焰少挫深不便之乃以金寶廣賂權要遂召恕還故民謡如此永昌遺碑南國録稱永昌城西北五里俗名大寺山寺廢無孑遺矣明𢎞治間掘得石碑甚宏麗因碑隂載常住財貨之繁懼鎮守者生事輒碎之近復得一小碑文雖不足觀而可證永昌之為郡在元已盛與金齒逈絶又可見當時貨財殷阜非今日所及也禮斗滇俗九月朔至九日民間禮斗極䖍潔滇略載明正德甲辰永昌地震民居多覆死傷無算惟真武觀屹然不動禮斗人居其下無一傷者緬字宛委餘編云甲戌余從典屬國所以旅􅋙全文合象胥九譯而書之爨蠻亦有字形如蝌蚪阿町所制也昔滇有緬字生凡徼外貢夷至則召而譯其文有緬字館在布政司東南為講習之所今已圮楊慎逸事楊慎戍永昌遍遊諸郡所至攜倡伶以隨蠻酋欲求其詩翰不可得乃以白綾作裓遺諸妓服之酒後乞詩楊欣然命筆醉墨淋漓揮滿裙袖酋重價購歸楊後知之更以為快又慎在滇中有懷歸詩星橋南望沉犀渚雪嶺西連抱洱河關塞渺茫魂夢隔山川迢遞别離多汀洲春雨搴芳杜茅屋秋風帶女蘿心事未從詹尹卜生涯聊聽焚童歌後暫歸瀘已七十餘而滇士有讒之撫臣王昺者昺俗戾人也使四指揮以鋃鐺鎖來慎不得已至滇則昺已墨敗然慎遂不能歸病寓禪寺以沒又永昌張志淳為太常卿時與新都楊廷和交善一日廷和偕弟廷儀暨二三僚友集志淳宅分韻賦石榴詩客有得張字者難之志淳子含方七嵗在側曰何不用張騫故事坐客皆驚明日廷和亦攜子慎來慎年與含相若互相辨論各不能屈遂訂為終身交後含舉鄉薦不仕慎亦謫戍永昌復與含詩文倡和以埀老焉摹禹碑碑即南嶽岣嶁山祝融峯韓昌黎恨未之見者楊慎得衡山墨本釋之中有四字未詳夢黃衣魚首人曰此南瀆衍亨也因重摹於巨石上較湖廣本尤妙其詞曰承帝曰咨翼輔佐卿洲渚與登鳥獸之門參身洪流而明發爾興久旅忘家宿嶽麓庭智營形折心罔弗辰往求平定華嶽泰衡宗疏事裒勞餘伸禋鬱塞昏徙南瀆衍亨衣制食備萬國其寧竄舞永奔金梅明陳綸養子翀閩人也與綸親子􅙆交相愛並試弟子員學使者察其閩籍黜之翀不得已歸閩登嘉靖辛卯省試􅙆亦厯官中原遇於逆旅悲喜交集􅙆宅有金梅甚茂後忽枯一枝心異之未幾翀訃至逾年復枯一枝􅙆大異之俄而卒人竒其事作金梅𫝊虎瘞流寇孫可望使賀九儀沉嚴起恆於江有虎入江負其尸於岸以爪穵土埋之有見之者告其家人比至虎猶守其墳旁見人始徐徐搖尾去異蹟天樂南詔時有僧王左梨者以功行稱㸃蒼玉局峯月望夜每聞天樂南詔謂左梨曰安得致此曰臣能取之至日豫候其地天樂果至雞鳴時但見羣鶴翔空而下有玉琵琶龍吟筝竹笛方響之器世人不得其音藏之於庫天開明正德中楚雄王某者居山谷中秋初夜起星月朗徹忽見西南方天開旌旗前導中為元武神向北而去移時方合望夫雲相𫝊昔有人素貧困遇蒼山神授以異術忽生肉翅能飛一日至南詔宫攝其女入玉局峯為夫婦凡飲食皆能致之後問女安否女云太寒耳其人聞河東髙僧有七寶袈裟飛取而還僧覺以法力制之遂溺水中女望不至憂鬱以死其精氣化為雲倐起倐落若探望之狀此雲一出洱河中即有雲應之颶風旋起舟遇即覆人戒停泊俗又呼為無渡雲耕者入潭昔有人耕於麗江之野忽風雨暴至捲入龍潭俗𫝊尚見其人及牛犂旋繞其中眢井永昌施甸長官司舊廣夷州也地名鐵毛嘴有眢井深窅莫測明𢎞治戊午冬有莊指揮出獵縱一鶻搏雉雉復騰起聞井中嗚嗚有聲徐察之人聲也莊命引繩下曵之乃一婦人衣觸風皆碎氣息僅存徐飼以粥逾月乃言其為大理楊拱妻張也從夫貿易於施甸夫素惡婦紿以歸寧至井邉縛手足推入尋下大石有崖蔽之得不死俄而繩索漸斷掬水以飲經四十餘日既而髮脫殆盡莊以白於直指直指杖其夫而歸張於母家金塔在橄欖壩內髙十數丈飾以金逆夷刀正彥築時有塔存與存塔亡與亡之誓其本朝雍正八年五月十三日壩內電掣雷轟塔倒圯次日戮正彥於市紀功碑隋開皇中史萬嵗擊南寧行數百里見諸葛亮紀功碑銘其背曰萬嵗之後勝我者過此萬嵗令左右倒之其碑趺志曰萬嵗不應仆吾碑萬嵗駭重立其碑而去哀牢古碑明正德間永昌人於哀牢山掘地得古碑段中庸撰文略曰夫人諱福則伽宗胄裔之嫡女也事君子也樂其道而不淫逮下妾也用其能而不妬又曰月出雞鳴照哀牢之名縣鴻飛滇渚下潯陽之長江餘文俱零落不可識壁上遺詩明成化中趙州畢鉢羅窟絶壁上有詩云懸崖萬仞沒躋攀樓觀參差烟靄環一派水流蒼石隙數聲猿嘯白雲間堪嗟蕭史乘鸞去定是王喬駕鶴還唯有靈橋髙略彴幽禽惆悵對空山不注姓氏然其他人不能到竟不知為誰筆也兵書明臨安王得民買屋城外天井中鑿魚池三尺許得大石板起其下有小方塘四周磚甃中有小几几上燈一盞書一册開視兵書也末載採戰引魂二方得民試之殊效其引魂方於婦人則呪一物與食其婦夜即至於女子則得其生時呪之無不驗其弟恩民為諸生聞而借觀得之即棄書水深處兄大恚然無如之何其後恩民成進士位中丞人謂棄此書之功也浚泉亭在獅山之巔明御史劉維所建也亭成欲作賦一篇以表之夜夢衣百結者來恍惚似婦人告維曰公欲寫賦於此甚善但此處吾用力甚多公寫賦後幸為寫金剛經一卷維覺薰沐寫經楷書古健寺僧奉為異寶銅佛昔李某耕田得一銅佛像僅徑寸沈之水中立雨炙之則晴雖值隂雨其家常晒麥世𫝊銅佛為贊陀所遺佛言蘭州鹽井有佛像獵者逐鹿鹿奔匿佛座下引弓欲射佛作言曰鹿有胎殺之不祥獵者驚異舁至鶴慶因名活佛青神五代時趙善政居浪穹天馬山下其山左澗有水右澗無水有樵青神者善鬼法衆樵謂之曰若能分水於右澗乎青神曰不難以斧柯觸石澗水湧出與左澗均人居在右者咸利之遺蹟尚存白馬神南詔豐祐之女進香崇真寺歸至城西見乘白馬人攝去尋之不得王告於僧贊陀曰此山神也乃設燈照之果在蒼山下僧怒欲行法移山於河神懼願獻寶珠王從之謡神明太祖方有睿謨尚未發衢童即謡於道窮究之云有老人泄其事於童子蓋後湖土地也上怒謫雲南憑於昆明進耳山寺中人往祈夢竒驗不可殫述比於閩之九鯉鐘神省城麗譙之鐘其聲洪逺相𫝊初鑄時有異人董其冶既成辭去戒曰俟我行百里乃叩當聞百里南行二十里遂叩今聲止此耳又一日叩鐘無聲有羽士云鐘神入於滇池未幾池上人來言每夜鐘鳴池中乃命羽士以符籙攝之鳴如故今其下範銅為神恆以鐵索繫之蓋當時所厭勝也東城古鐘臨安城建自明洪武十六年城東南維起髙樓俯視瀘江懸鐘其上徐伯陽云金為水母母鳴子戀故少水患鐘製髙八尺聲洪逺特置司鐘按鳴不時城中人物大盛其製廢瀘江水時溢矣土主神曲靖真峯山一僧功行神異明成化間黔國公過宜良有一人皂冠緋衣迎謁道旁左右不見公問此中有神祠否對曰有土主廟禱嗣甚靈時公尚無嗣乃禱焉久而無應欲毁之夢告曰當有積功纍行者生君家勿以嗣晚為虞也後內人有娠一日坐㕔事見僧人入俄而不見內報生子已而詢之僧以是日坐化其子號繼軒敏達邃學多所樹立土主石印在新興王乞城土主廟相𫝊地中有石堆屢散屢聚地主怪之夢神語曰我土主也石下有金及印可取祀我民得金與印搆廟祀之禱無不應廟數焚石印無恙飛來梁元昆陽上知州達魯花赤建大悲寺時方營造忽一木自空而下以為梁尺寸不差後知自卧龍岡飛來土人呼飛來寺以此索鼓神明萬厯十六年保山知縣尹從淑涖任吏胥潛移廟鼓於縣尹實不知夜夢長髯神索鼓驚寤跡之吏以實對還鼓於廟威靈坊明萬厯壬寅貴州都勻府商民郭仲明自江南買貨至宣城縣客邸遇一人方巾皂服狀類儒者相見甚歡商叩其姓曰姓尹問何往曰往雲南遂與偕行至荆門州尹對郭曰晚有小盜須加豫防郭是夕警戒得無恙至白馬渡之次日又曰此舟伏水賊可速易他舟次日未易舟者果被劫而郭無恐語言厯歷響應郭逾加禮抵滇省尹曰豫往澄江任不克久聚君貨畢肯顧我乎郭許諾别後郭貨獲利數倍閲四月到澄訪問無尹姓之官心甚疑異夜夢尹告曰吾本郡城隍候公久矣并囑廟祝明日故人至當具茶以待次晨郭偹香燭往謁神廟司香者告以所囑郭再拜瞻仰將所獲之利建竪石坊以彰靈異題曰威靈顯赫今坊現存寧伯妃有廟在劍川其神𫝊為慈善最靈異舊稱祠前有池妃出浴土人見之妃曰勿泄授爾異術惟所欲曰願得呼風雨妃授以杖此人遂得祈禱之術非所禱之家雖隔垣不雨天妃楊光祿掄明萬厯癸丑進士官行人奉使歸里至關嶺道拾一香囊上書天妃二字抵家患病疑其為祟䖍祀之及痊入京即有册封琉球之役領敕有天妃册一道乃航海者所崇奉之神豫泄其兆耳石上衣褶唐永徽間有一老僧美髯戴赤蓮冠衣袈裟持鉢至蒙舍細奴邏家乞食時奴邏父子耕巍山下姑婦往餉見僧乞食遂食之再炊往饁僧坐不去持饁中道僧已先在復向乞食姑婦驚怪又食之返而復炊持饁具至巍山則見僧坐磐石前有青牛左有白馬朱鬛右有白象各馴伏上覆雲氣雲中有二童子一執鐵杖於左一執金鏡於右姑婦驚喜再供之僧問何所願姑婦不知所對僧曰奕葉相承姑婦趣奴邏等至但見五色雲中一人持鉢而坐倣佛見二童子惟餘磐石上衣痕及象馬牛之跡乞食僧南詔蒙邏晟時有一僧持錫杖鉢盂牽一白犬乞食開南郡窮石村村素有盜善殺人僧犬為其盜食僧曰汝村盜吾犬村衆詈僧為誣僧乃呼犬犬遂嘷於衆人之腹中衆謂妖執而殺之解其支體須㬰復生又殺之焚其骨為灰盛以截竹棄之江心須㬰僧裂竹而出形體復完執栁瓶著屧履向山而去村主王樂等走馬追之不及射之箭落皆變蓮花始稽首服罪村衆自是棄刀弓務農業今洱河東有上滄湖産蓮花菜是其蹟也化蝶僧南詔酋龍出兵以一異僧自隨每化蝶回國亂其宫龍妻以書告之龍答云若來令宫人背上繡一蝶僧復來宫人繡之龍見衣蝶命斬之刑者七次首不斷自云用茅乃斷人見其化黑鵬飛去神僧石在通海秀山之半神僧李畔富拂衲而遊尸解去人得石一塊可三尺餘僧像伏一龍宛然如生白衣道士明萬厯丁巳省城有道士白衣垢面右手掌皮肉臭壞幾欲脫每至人家募銅錫鑄白衣大士像且云常入隂司報人間淑慝事以詿誤為冥府所罰壞此手人家所行隂事俱能歷歷道之不爽蹤跡莫能測舍人顧錫之與遊一日偕至城隍廟忽不見尋至廟右有賞善罰惡之神旁立一塑像折其右手厥形類焉錫之為修整遂不復見谷女唐初髙氏女年十三尚不能言其兄從軍東川三月不歸谷女一日忽語嫂曰兄缺食我往餉之家喜其開口戲應之曰汝將襄飯去谷女果行家人笑躡其後至盤陀石下入水洞而去覔之不得衆方驚怪未已谷女忽至謂家人曰兄一旅之衆皆已飽矣且言軍中地形事勢其嫂不信謂東川距此二千餘里安得即至不知其有神力也乃以衣授之曰汝送與兄取其垢衣來自是送餉日以為常谷女常牧一白豬一日謂家人曰軍回矣遂騎白豬化為象騰空而去巫女明初段寶詣金陵歸款時有巫女歌曰莫道君為山海主山海笑諧諧園中花謝千萬朵别有明主來寶數日卒泉女阿迷州有石泉甚清若偶濁則主兵戈泉本朝順治丙戍年水忽濁沙定洲惡之令人鑿其有裸形女子從水中出罵之定洲懼乃止龍女供齊易門小龍泉有僧苦修力田以供香火常出耕至暮歸則厨饌已具僧異之一日歸早見一美女烹饌僧至投入潭水而去馬判元馮夢弼為雲南宣慰司令史嘗因公差抵一站曰暮站吏止行問其故閉目搖手不敢言馮怒不從夜行至大溪忽見一物如屋烏剌赤下馬跽泣若告訴狀呼問何物亦閉目搖手不敢言馮乃下馬祝之其物轉入溪中腥風臭霧觸人口鼻比曙抵前站站吏驚曰今夜馬判上岸麻線何以得過問馬判何物曰螞蝗精也後夢弼官至禮部尚書方言官人曰麻線站役之牧馬者曰烏剌赤緑衣判官祿豐星宿河流經民居明洪武間有陳巡檢者挈家之任道過河上其婦偶出竟不歸疑墜水以任滿復過其地請羽士劉可成薦之可成投牒水府水忽泛溢婦援岸而出問之云為緑衣判官所攝語畢復死羽士以法袪除之其祟乃已金索怪元大定四年洱河有水怪牛首豬形金精短項興水為患大理有道者募段氏黃金百鎰為索治之索成即日移於浪穹寧河明宣德間漁人李應捕魚網得金索旁有漁者謂可旋得旋斷李貧甚收金索將窮驚動其怪連舟俱沉至今為害瘴母瀾滄江在順寧東南四十里嵗五六月江中有物色如霜光如火聲如析木破石觸之則死或云瘴母文選謂之鬼彈內典謂之禁水此惟江邉有之郡治絶無交頭瘴景東蒙化山多有瘴西至永昌殆甚瀾滄潞江水皆深緑不時紅烟浮其面日中人不敢渡瘴起於春末止於秋杪夾堤草頭相交結不可解名交頭瘴時則行旅皆絶江岸居民色多黃瘠早死惟婦女不染也辛巳進士葉瑞臨安人為諸生貧甚好飲酒一日醉卧窰溝中夜深聞有數鬼曰大水將至恐淹死辛巳進士相與舁至諸天寺大門及覺則身在寺門大水果漲翌日記所言為笑以巳年無春榜也後中明正德庚辰進士以車駕南巡至辛巳始殿試赤文人楊向春謁巡按歐陽重重書一梅字令之占而不言所占何事春曰梅有兩人字而下有母字公將舉兩子後生者男赤文人也後嵗餘歐公復見曰子云信然所言赤文人隱語也今可得聞乎曰是兒生以天赦日當名赦保公服其神命晰其義曰赦從赤從文人即保字歐公歎曰其驗乃爾乎又布政徐樾將征那鑑迎春問之時正署文案見春至置筆而進之穎脫於管春前揖曰不利公宜勿往樾不應後竟䝉難如所言杜甫後身明嘉靖閒永昌有請乩仙者久不至及降問之乩云時在龍泉門外觀杜子美蹴踘故遲遲耳人趨視之則張含也左氏春秋孫清愍公繼魯幼有疾夢漢夀亭侯授以左氏春秋覺而即愈讀之遂成誦虎榜大理趙汝濂應嘉靖壬午鄉試與友詣進耳寺途遇一道士拉趙松下袖中出一札云此虎榜也趙閲之無名歎曰名不可求乎道士曰汝端人也乃遍檢衆名指第三者云某德行劣可易與汝即穵補改趙汝濓三字復用三圖書鈐於上遂别去後揭曉日填榜至三名監臨疑未定提調進曰此仕宦之子夙有才名監臨曰如此則私矣乃命穵去取次卷填即趙汝濓也用印三顆鈐之一如道人所補云天榜明嘉靖甲子郡士赴省試見雲霧中神人馳驟云齎天榜問鶴慶幾人曰無請少留查次科曰留下莫查是年果驗及丁卯入彀者劉臣莫讓仁查偉三人李林甫明永樂間趙州雷擊死一夷人硃批其背曰木子唐朝一佞臣罰他十劫在牛羣而今逃脫為夷士霹靂來尋化作塵火烙字曰李林甫孟繼祥明嘉靖中定逺縣民孟繼祥事母甚孝且䖍奉關聖朝夕無懈貿易廣東失利不能歸族人以為死逼其妻改嫁暗受聘儀約於嵗暮強之妻設靈守哭誓不再適繼祥在廣因值殘臘念其母妻悲咽昏睡夢關帝諭曰吾憫爾孝義欲歸可瞑目攀吾刀柄繼祥拜謝如命但覺耳內颯颯風聲將旦命繼祥釋手開目則身在獅子山塔下矣踉蹌歸家皆疑為鬼繼祥道其故母妻相對痛哭是日即逼嫁其妻之日也困捨宅為廟終身䖍奉關聖不怠王純心臨安人登嘉靖辛酉鄉試年三十餘病死一晝夜心微熱未敢殮即時託生於妻弟家見其母妻弟婦也急趨出聞房內哭聲又至河南陳州一臣室見一貴人皓首盛服焚香祈嗣既生知河南嫌其逺又奔出復聞哭聲至㕔前見黃蜜果摘其一食之竟回家中大呼而蘇妻孥驚視但聞口內蜜果香後任綿竹知縣又三十年而卒猛廷瑞明廬陵郭子章撫黔一日中夜其夫人問子章曰猛廷瑞何人子章大咤曰爾婦人安知猛廷瑞且中夜問何為夫人曰適夢有人粧束如廟中金甲神來謁云我猛廷瑞也過此欲見中丞不得近故來謁夫人耳章曰汝盍問所由來夫人曰吾固問之渠曰吾為巡撫陳用賔寃死訴帝得請今歸耳章心異之不敢語人逾月而用賔被逮之報至趙弼太和人明成化間知邯鄲縣其母在堂家信久不至值生日繫思甚切忽風飄一黃紙落案前取視乃其母以是日禱於觀音之章也降乩州本朝初江寧人鄭相署石屏州為叛將所殺人祀之降乩云為本州城隍之神遇有疾者乩方輒效州紳謝君符築巖北山為躬耕之計山下田髙苦旱鄭降乩指方向鑿之果得泉以資灌溉銀變曲江龍泉寺奉觀音大士像明萬厯二十九年有苖姓者為寺供灑掃夢老人拊其背告曰摟下有白金數餅汝取為焚修費苖覺與婦共掘之果得銀三十一錠攜遁去路遇其女與一錠女以償負債者出之則鉛矣追苖夫婦詰其故苖啓視三十錠皆成鉛鐵因封識復埋於故處狗頭人順寧府大江浮來一尸人身狗頭無尾有髮形軀雖小手足與人無異兩頭鹿博物志云雲南郡出荼首其音為蔡茂兩頭鹿也以四月中取其胎可治蛇毒永昌間有之魏宏南中志曰雲南郡有㸃蒼山上有神鹿一身兩頭専食毒草又名食毒鹿白騾唐明皇將封泰山南詔進白騾甚偉潔上親乘之柔習安便不知登降之倦禮車復乘而下至山坳休息未久有司言白騾無疾而殪上嘆異之號曰白騾將軍有司具櫝纍石為墓在封禪壇角端宋寧宗嘉定十七年元太祖特穆真征東印度至鐵橋石門關前軍報有獸一角形如鹿而馬尾色緑作人言曰汝主宜早還左右皆懾獨耶律楚材曰此名角端蓋旄星之精能四方言語好生惡殺聖人在位則斯獸奉書而至且能日馳萬八千里靈異如鬼神不可犯也帝即回馭石門關在麗江府東印度蓋指南詔也越睒犀犀生越睒以陷牢取之每殺震雷暴雨梁祚魏國統云西南有犀三角夜行如炬照數百步或時脫角則藏於深密處不令人見王者貴其異以為簪能消除凶逆越睒馬越睒之西多薦草産善馬世稱越睒駿如羔嵗中組莎縻之飲以米瀋七年可御日馳數百里中盧縣城南有石穴出馬謂之馬穴漢時有數百匹馬出其中馬形小三國時陸遜攻襄陽得馬數十匹送建業蜀使至有家在滇池者識其馬毛色云其父所乘馬對之流涕越巂牛越巂國有牛割取其肉牛不死經月如故牛石明天順間烏牛夜見於姚安府東十五里忽泉水湧出利灌溉後人見而射之牛化為石泉遂涸金牛棋局觀音山村民楊姓者業陶瓦每見窰側有白雞白象掘之尺許得二釜相合中有金牛二棋局一置牛於倉上明晨視之𨼆𨼆有犂形其榖畫取之夜復溢棋局金光射目黑夜著之亦明家遂巨富後為大盜劫去舞象劉恂有親表曽奉使雲南緬中豪族各家養象負重致逺如中土之畜牛馬也蠻王宴漢使於百花樓前入舞象曲動樂作優倡引入象以金羈絡首綿繡纒身隨拍騰踏異物志曰象之為獸形體特詭身倍數牛目不踰狶鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致逺行若邱徙唐咸亨二年周澄國遣使上表言訶伽國有白象首垂四牙身運五足象之所在其土必豐以水洗牙飲之愈疾請發兵迎取象膽隨四時在四腿春在前左夏在前右如龜無定體也鼻下有爪可拾針肉有十二般惟鼻是本肉陶真人言夏月合藥宜置象牙於藥旁南人言象妬惡犬聲獵者裹糧登髙樹搆熊巢伺之有羣象過則為犬聲悉舉鼻吼叫循守不復去或經五六日困倒其下因捕獲之耳後有穴薄如鼓皮一刺而斃胸下有小骨灰之酒服令人浮水出沒多食其肉令人體重古訓言象孕五嵗始生神象普洱入思茅古道甚險普本朝康熙二十年車里有神象出普夷人跡之自而返象從一髙嶺奔行人步追之遂成通道即今之班鳩坡也今普藤河畔有象足跡大如斗石羝羊在姚安東一里許昔䝉氏時有女於此牧羊一羝餂土驅之不去掘地遂得滷泉名曰白羊井即其地立聖母祠其井即白鹽井也犢異順寧府里長俸文家畜一牸甚瘦好鳴二年忽産一犢牛頭牛蹄渾身白毛青腿脊上微有鱗甲角生頂中如芝菌然光耀炫月雞犬狂呌文駭而殺之又永昌府夷民家産一犢夜中有光燭欄民以為怪殺之次早見身有肉鱗其色青藍邉末淡紅每鱗之內皆有細毛蠅蚊不敢近猩猩永昌郡有猩猩能言其血可染朱罽色鮮不黯或曰若刺其血問之爾與我幾許猩猩曰二升果足其數若加之鞭箠而問之則隨所加而得至於一斗其說出華陽國志今永昌郡絶無此彼中人言蓋出三宣徼外古貢道自永昌遂以為永昌産耳虎骨在昆陽州土主廟昔白虎浮滇池來噬人無數居民苦之摩迦羅大黑天神忽現形縳之蹲於座側今虎骨一具尚存義犬呈貢縣村民畜一犬甚馴其妻往山採薪幼女隨之不及俄大雪薄暮負薪歸女與犬俱不見明晨邀村人尋之見女卧大樹下犬偎依其旁得不死咸驚異焉聞諸官事本朝雍正十一年十一月白花鼠武定府白花山以鼠得名相𫝊山有鼠白而大望之若牛土人視之則鼠也身有白花故名夜行山間昧爽歸穴至山頂雞鳴化為石土人祈年禱病四時祭之鱗鼠在雲州有鱗甲千百為羣殘食田苖數年一出嗽金鳥魏明帝時昆明國貢嗽金鳥鳥出燃洲形如雀而色黃羽毛柔密常吐金屑如粟此鳥畏寒乃處以辟寒臺宫中爭以鳥吐之金飾叉佩故宫人相嘲曰不服辟寒金那得聖人心背明鳥三國吳黃龍元年越巂之南獻背明鳥於吳形如鶴止不向南巢常向北多肉少毛聲音百變聞鐘磬笙芋之聲則奮翅搖頭時以為祥吳人訛呼為背亡人以為不及百年當有喪亂之事後鳥不知所在金縷鳥唐初哀牢人細奴邏耕於巍山數有祥異社會之日白國主張樂進求率部衆祭孔明鐵柱柱頂故有金縷鳥忽飛下集細奴邏左肩相戒勿動八日乃去衆駭異以為天意所屬進求乃以女妻之因讓國焉奴邏自稱竒嘉王是為南詔貞鳥者本朝康熙九年有二大鳥巢祿勸補山前大樹上雄鳥為獵人所傷雌鳥飛鳴尋覓其聲至哀次年春一鳥來自山後始棲於枝漸近於巢往來飛舞狀若狎之是鳥拒不與伍鳥乃飛去明日率數鳥來是鳥拒如前土人呼為貞鳥鵰卵唐時漁人於洱河岸得鵰遺卵收之有頃卵破出嬰兒漁人驚異不敢加害嬰兒能食即解種種伎倆長而為僧居萗模莊人呼為萗模師能呼風致雨驅役鬼神指使如意義能以符呪化水石為酒食千百人皆醉飽南詔憚之師輒化為鵬飛集髙真寺不知所終松雀石屏南箐邱多松有鳥名松雀喜食松子隨風飛墜即生松樹不假人力壁龍師摩矣南詔酋龍之母母隨酋龍出征至羅浮白城建一寺南壁畫一龍是夜龍動幾損寺後畫柱鎖之方定賈龍省城沙浪里有龍湫相𫝊龍昔出遊變形為石委其鱗甲於石間有賈人憩石上見甲胄一具如龍鱗乃服之忽腥風起湫中水族迎之而入有頃龍至覔其甲不得走入水中水族不能辨相率拒之賈遂為龍據其湫鄉人識之呼為貨郎龍紫溪龍明成化甲辰楚雄太守邵敏自南都來路過洞庭舟中夢一方巾藍袍人來謁曰紫溪龍王也及抵都祀龍其像儼如夢中所遇飾廟䖍祀之青葱寰宇記云滇池黃津江有大蛇名曰青葱好食人又有大蛇伺鹿過盤繞而吞之吞畢復繞樹其角骨鑽皮而出蛇創甚殆死瘥更吞之金鯉明隆慶六年七月十六日舊歸化縣白馬勒村有牧童見田中水湧髙丈許雷聲大振驚告其主往視之田悉成潭有金鯉𨼆見其中今饒灌溉之利羊魚昔有人善吹笛牧羊於桃樹江畔忽見龍女迎牧羊者驅羊隨入其羊皆化為魚因號為羊龍潭白髮魚舊𫝊見滇池中戴髮無鱗狀如婦人白而肥竹中魚明隆慶未隴川有白夷夫婦入山伐竹剖其中有水水中有生魚六七頭持歸烹食夫婦皆化為虎殘害人畜不可計百方阱捕竟不能得墜魚明天啓甲子三月祿勸民施魁家以屠豕為業忽空中墜一鯉遊於盆中魁懼縱於河越三日大風復墜一魚於州民楊名家跳躍不已狀如鯉而尾團以瓦覆之逾時不斃名亦縱河中後昆明有鄉民十餘輩入山中見大魚徑五六尺在林臯內各以杖擊之分食其肉歸家數日悉死蠶字明嘉靖二十七年昆陽訓導任鉞家有蠶生子布成不仁水火拜告天地八字次夜又布成一州之大可不慎之八字書法端楷是年滇池水溢蕩析民居八蠶吳都賦云鄉貢八蠶之綿注云有蠶一嵗八育雲南志云風土多暖至有八蠶言蠶養至第八次不中為絲止可作綿故云八蠶之綿李商𨼆燒香曲云八蠶繭綿小分炷獸熖微紅隔雲母又唐書云自曲州靖池至滇池人水耕食蠶以柘蠶生越二旬而繭織綿縑精緻太和祈鮮而西人不蠶剖波羅樹寶狀若絮紐縷而幅之今滇人不知蠶桑尺帛寸縑仰給於江南所織綿布亦不足供惟賈人是需而所謂波羅實者亦不知其種類矣野桑南詔𫝊云永昌之西野桑生石上其材上向兩屈而不直取以為弓不筯漆而利名曰暝弓珊瑚樹洱河八月望日有珊瑚出水面漁人往往見之世傳海龍獻寶波羅蜜樹如荔枝樹稍大皮厚葉圓有黃紋小枝附樹身上花出大如斗一枝含數實皮亦似荔枝有刺類佛手螺髻之狀肉如蜂房近子處可食與熟瓜無異而香美過之子如肥皂核大亦可煼食味似豆春生秋熟交人珍之今臨安屬縣亦有塋樹楊榮太和人明永樂中官庶吉士一日方盥水中照見頭上有樹宛如其先塋樹狀榮心惡之寄書其家令伐去榮遂卒於京邸樹頭酒南史云南海頓遜國有酒樹似安柘榴採其花汁停甕中數日成酒甘美舊志云樹頭酒樹類棕髙五六丈結實大如李土人以麵納罐內以索懸罐於實下倒其實取汁流於罐以為酒名曰樹頭酒或不用麵惟取汁熬為白糖其葉即貝寫緬書用之談用之詩云昔年南去得吳嬪頓遜杯前共好春南州見物志亦載其事今緬甸軍民宣慰司有此木煤出昆明山中土人掘地之丈得之狀類梁柱櫰棟或如大樹皆條理有文燒火熖異於他煤間有於煤中得銅鐵佛像及砧臼諸器者質皆柔腐易化不知何代物也異竹竹譜曰棘竹駢深一叢為林根如椎輪節若束針亦曰笆竹城固是任篾筍既食鬢髮則侵釋曰大者二尺圍肉甚厚實南中夷人破以為弓枝節皆有刺種以為城卒不可攻萬震異物志又云種為藩落阻過層墉或卒崩根出如大十石物縱橫相承如繅車一名笆竹見三倉筍味落人鬚髮今廣南騰越夷中皆有刺竹如譜所云夫竹比君子而夷落乃為荆棘華戎不同貫即物有然者矣又曰筋竹為矛稱利海表􅚙仍其餘刃即其杪生於日南别名為篻釋曰筋竹長二丈許圍數寸至堅南土以為矛其筍未成竹時堪為弩絃見徐忠南中奏劉淵林云夷人以史竹葉為矛即是筋竹豈非一物而二名者滇中有筋竹葉差小於他竹堅而且直戍卒取以承槍甚美利也又曰䈏與繇衙厥體俱洪圍或纍尺䈏實衙空南越之居梁柱是供釋曰交州廣志云由衙竹亦有生於永昌郡為物叢生又曰竹之堪杖莫尚於笻磊砢不凡狀若人工豈必蜀壤亦産於邛一曰扶老名實縣同釋曰笻竹髙節實中狀若人刻廣志云出南廣邛都縣張騫𫝊云於大夏見之出身毒國始感卭杖終開越巂越巂古身毒也張孟陽云邛竹出興古槃江縣山海經謂之扶竹生尋伏山去洞庭西北一千一百二十里黃圖云華園有扶老三株如此則非一處賦者不得専為蜀地之生也竹舟華陽國志云南方有布芾竹長百丈圍三丈餘可為大舟筍味甚美蒟醬按蒟緣樹生其子如桑椹長二三寸色正青乃本草中之所謂蓽撥也但醬法不傳舊志謂即雞葼醬誤矣雞葼産蒙自者佳明孝宗時光祿寺以雞葼進御上食而美將復取輒止近臣請故上曰朕索後必豫儲以待所費多矣蒙肚花出景東山中生樹皮上如蘚土人採以用蠱欲人醉死則醉往採欲人淫死則淫往採欲人狂爭死則狂爭往採其毒發一如其狀明嘉靖丙寅千户陳祺奉命往景東賜知府陶金金帛祺善書金厚款之請書匾額及醉墨瀋涴其錦袍金恚以蒙肚毒之歸發狂死後雷擊其樹今無和山花南中集有和山花歌序曰樹髙六七丈其質似桂其花白每朵十二瓣應十二月遇閏輒多一瓣俗以為仙人遺種在大理府上關和山之麓土人因以其地名之今樹已為火焚娑羅花在會城土主廟其本類大理和山花佛日盛開其色白微帶黃異香芬馥非同凡花臭味中出一蕊如稗穗垂出瓣中每朵十二瓣遇閏輒多一瓣相𫝊髙僧以二念珠入土一珠出樹不知大理所𫝊仙人遺種者又出何典故且不獨和山有之也今廟中樹亦已不存蔓胡桃酉陽雜俎曰蔓胡桃出南詔大如扁螺兩隔味如胡桃或言蠻中藤子也又油㸃草葉似莙薘每葉上有黑㸃相對雞鳴枕諸葛亮入南中從征者冬暮思歸乃各與一磚曰卧枕此即抵家從之果然不用命者終莫能歸又嘗用炊釡自隨不炊自熟以防不時之需紅藤杖唐白樂天紅藤杖詩云南詔紅藤杖西江白首人時時攜步月處處把尋春徑健孤莖直疏圓六節勻火山生處逺瀘水洗來新粗細才盈手髙低僅過身天邉望鄉客何日拄歸秦醒酒石大理石屏有山川雲物之狀唐李德裕以為醒酒石鐸鞘鬱刃唐異牟尋遣清平官尹輔酋等七人謝天子獻鐸鞘鬱刃狀如殘月有孔旁達出麗水飾以金所擊無不洞夷人尤寶之月以血祭鬱刃鑄時以毒藥並冶取迎耀如星者凡十年乃成淬以馬血以金犀飾鐔首傷人即死浪人所鑄故一名浪劍毒槊南蠻有毒槊無刃狀如朽鐵中人無血立死言從天而下入地丈餘祭地方掘得之銅鼓驃國進樂有銅鼓唐咸通未冀州刺史張直方因葺城池掘得一銅鼓捨於延慶寺以代木魚僖宗朝休靄守髙州鄉野牧童聞田中蛤鳴欲進捕之一蛤躍入穴中掘而取之得一銅鼓其上隱起多鑄蛙黽之狀豈鳴哈乃銅鼓之精耶匣劍昆明梁王墓甚多皆元朝王子也相𫝊明嘉靖間板橋之北一村民每夜見墓有光疑為寶掘之無物惟一劒置破匣中民取歸夜光燭天四鄰謂火發趨救之至則寂然民疑劍為怪恐伐冢事露遂裹劍藏山麓小池劍得水如生物漸透土入山坎遂成巨津其洞深杳探之𨼆隱有聲人不敢入蠻錦琴囊宋蘇子瞻嘗於淯井監得西南夷人所賣蠻布弓衣其紋織成梅聖俞春雪詩云朔風三日暗吹沙蛟龍捲起噴成花花飛萬里奪曉月白石爛堆愁女媧大明廣庭踏朝賀雉尾不掃黏宫鞾宫中才人承聖顔捧觴稱夀呼南山三公免責百姓喜斗酒十千誰復慳子瞻以歐陽公尤知聖俞者因以遺之歐公家舊畜琴一張乃寶厯三年雷會所斫距其聲清越如擊金石遂以此布為琴囊二物歐公謂真余家寶玩云娑羅緞博物志云驃國並不養蠶收娑羅木子破其殼中柔白如栁絮細織服之曰娑羅籠緞貝蠡貝蠡大者可容數升南蠻吹以節樂今之梵樂用吹和銅鈸釋氏所謂法螺赤土國吹螺以迎隋使是也梁武之樂有童子伎倚歌梵貝琥珀南蠻記寧州沙中有折腰蜂岸崩則蜂出土人燒治以為琥珀常見琥珀中有物如蜂形元中記言楓脂入地為琥珀列仙傳云松柏脂入地千年化為茯苓茯苓化為琥珀韋應物詩云會得老茯苓元是寒松液蚊蚋落其中千年猶可覿今泰山出茯苓而無琥珀益州永昌出琥珀而無茯苓然此物實自外國來或言龍血入地為琥珀或言虎死時目光淪入地之所為故又名虎魄廣志哀牢縣有虎魄生地中其土及旁不生草深者八九尺大者如斛削去外皮中成虎魄初如桃膠凝堅成也丹砂逸周書王會篇曰卜人丹砂西南之蠻丹砂所出卜人蓋今之濮人也又曰湯令伊尹為四方獻令尹曰臣請正南甌鄧桂國損子産里百濮九菌請令以珠璣玳瑁象齒文犀翠羽菌鶴短狗為獻遺文白狼王歌漢永平中益州刺史梁國朱輔好立功名慷慨有大略在州數嵗宣示漢德威懷逺夷白狼王唐菆等慕化歸義作樂詩三章詣輔請獻於朝輔遣從事史李陵與犍為郡掾田恭上之帝嘉恱事下史官録其歌焉其逺夷樂德歌曰提官隗構魏冒愈渭罔譯劉脾旁莫支留徴衣隨旅知唐桑艾邪毗䋠推潭僕逺拓拒蘇便局后仍離僂讓龍洞莫支度由陽雒僧鱗莫稚角存譯曰大漢是治與天意合吏譯平端不從我來聞風向化所見竒異多賜繒布甘美酒食昌樂肉飛屈伸悉備蠻夷貧薄無所報嗣願主長夀子孫昌熾又逺夷慕德歌曰僂讓皮尼且交陵悟繩動隨履路且棟雒聖德度諾魏菌度洗綜邪流藩莋邪潯螺藐尋瀘灕菌補邪推辟危歸險莫受萬栁術疊附德仍路孳摸譯曰蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不逺萬里去俗歸德心歸慈母又逺夷懷德歌曰荒服之儀梨籍憐憐阻漢邪犂莫碭粗浴罔譯傳微是漢夜拒蹤優俗仁雷折險龍倫狼藏幢扶路側祿息落服淫理瀝髭雒捕茝菌毗懷藁匹漏𫝊言呼敕陵陽臣僕譯曰荒服之外土地墝埆食肉衣皮不見鹽榖吏譯𫝊風大漢安樂攜負歸仁觸冒險狹髙山岐峻緣崖蟠石木薄發家百宿到雒父子同賜懷抱匹帛𫝊告種人長願臣僕按白狼今麗江也西南夷諸國獻表僰夷西南際海通佛代阿育大秦等國大抵皆奉佛漢書撣國獻幻人自言海西人海西即大秦撣國西南可通唐地理志有自南交經雲南永昌入西天竺道路至彼又有阿羅陀阿羅單國亦其屬宋不通滇乃自廣州浮舶奉表元嘉七年西南夷阿羅陀國遣使奉表曰伏承聖主信重三寶興立塔寺周滿國界城郭莊嚴清淨無穢四衢交通廣博平坦臺殿羅列狀若衆山莊嚴微妙猶如天宫聖主出時四兵具足導從無數以為守衛都人士女麗服光飾市㕓豐富珍賄無量王法清整無相侵奪學徒游集三乘競進敷演正法雲布雨闊四海流通萬國交㑹長江渺漫清淨深廣有生咸資莫能消穢隂陽調和災厲不行誰有斯美大宋揚都聖王無倫臨覆上國有大慈悲子育萬物平等忍辱怨親無二濟乏周窮無所藏積靡不照逹如日之明無不受樂猶如淨月宰輔賢良羣臣貞潔盡忠奉主心無異想伏惟皇帝是我真主臣是阿羅陀國王名曰堅鎧今敬稽首聖主足下惟願大王知我此心久矣非適今也山海阻逺無緣自達故遣使表此丹誠所遣二人一名毗紉一名婆田今到天子足下堅鎧微蔑誰能知者是故今遣二人表此微心此情既果雖死猶生仰惟大國藩守曠逺我即邉方藩守之一上國臣民普䝉慈澤願垂恩逮等彼僕臣臣國先時人衆殷盛不為諸國所見陵迫今轉衰弱鄰國競侵伏願聖王逺垂覆護并市易往反不為禁閉若見哀念願時遣還令此諸國不見輕侮亦令大王名聲普聞扶危救弱正是今日今遣二人是臣同心有所宣啓誠實可信願敕廣州時遣舶還不令所在有所陵奪願自今以後賜年年奉使今奉微物願垂哀納又阿羅單國治闍婆洲元嘉七年遣使獻金剛指鐶赤鸚鵡烏天竺國白疊古貝葉波國古貝等物十年阿羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安穩三達六通為世間道是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山村邑聚落次第羅匝城郭館宇如忉利天宫宫殿髙廣樓閣莊嚴四兵具足能伏怨敵國正豐樂無諸患難奉承先王王法治化人民良善慶無不利處雪山隂雪水流注百川洋溢八味清淨周匝曲屈順趣大海一切衆生咸得受用於諸國土殊勝第一是名震旦大宋揚都承嗣常勝大王之業德合天心仁䕃四海聖智周偹化無不順雖人是天護世降生功德寶藏大悲救世為我尊王常勝天子是故至誠五體敬禮阿羅單國王毗沙跋摩稽首問訊其後為子所篡奪十三年又上表曰大吉天子足下離淫怒癡哀愍羣生相好具足天龍神等恭敬供養世尊威德身光明照如水中月如日初闕文間自䝉普照十方其白如雪亦如月光清淨如華顔色照耀威儀殊勝諸天龍神之所恭敬以正法寶梵行衆生莊嚴國土人民熾盛安穩快樂城閣髙峻如乾他山衆多勇士守護此城棲閣莊嚴道巷平正著種種衣猶如天服於一切國為最殊勝吉楊州城無憂天主愍念羣生安樂民人律儀清淨慈心深廣正法治化供養三寶名稱逺至一切並開氏人樂見如月初生譬如梵王世界之主一切人天恭敬作禮阿羅單跋摩以頂禮足猶如現前以體布地如殿陛道供養恭敬如奉世尊以頂著地曲躬問訊忝承先業嘉慶無量忽為惡子所見施爭奪遂失本國今惟一心歸誠天子以自存命今遣毗紉問詢大家意欲自往歸誠宣訴復畏大海風波不達今命得存亦由毗紉此人忠志其恩難報此是大家國今為惡子所奪而見驅擯意頗忿惋規欲雪復伏願大家聽毗紉買諸鎧仗袍襖及馬願為料理毗紉使得時還前遣闍邪仙婆羅阿蒙大家厚賜悉惡子奪去啓大家使知今奉薄獻願垂納受又元嘉十二年闍婆婆達國王師黎波達陀阿羅跋摩遣使奉表曰宋國大主大吉天子足下敬禮一切種智安穩天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入於涅槃舍利流布起無量塔衆寶莊嚴如須彌山經法流布如日照明無量淨僧猶如列宿國界廣大人民衆多宫殿城郭如忉利天宫名大宋楊州大國大吉天子安處其中紹繼先聖王有四海閻浮提內莫不來服悉以兹水普飲一切我雖在逺亦霑靈潤是以雖隔巨海常遙臣屬願照至誠垂哀納受若䝉聽許當年遣信若有所需惟命是獻伏願信受不生異想今遣使主佛大陀婆副使葛抵奉宣微誠稽首敬禮大吉天子足下陀婆所啓願見信受諸有所請惟願賜聽今奉微物以表微心賜驃國王敕唐德宗敕驃國王雍羌書曰卿性𢎞毅勇代濟貞良訓撫師徒鎮寧邦部欽承王化思奉朝章得睦鄰之善謀敦事大之明義又令愛子逺赴闕廷萬里納忠一心禀命誠信彌著嘉想益深今授卿檢校太常卿並卿男舒難陀那又元佐摩訶思那等二人亦各受官誥往至宜領之此所以表卿勳勤申朕恩禮敬受新命永為外臣勉思令圖以副遐曯今有少信物具如别録想宜知悉也冬寒卿比平安官吏百姓等併存問之遺書指不及多驃國詩唐元微之白樂天皆有驃國樂詩元詩云驃之樂器頭象駝聲音不合十二和縱舞跳趫筋節硬繁詞變亂名字訛千彈萬唱皆咽咽左旋右轉空傞傞俯地呼天終不㑹曲成變調當如何德宗深意在柔逺笙鏞不御停嬪娥史館書為朝貢𫝊太常編入鞮靺科古時陶堯作天子遜遁親聰康衢歌又遣遒人持木鐸遍採謳謡天下過萬人有意皆洞達四嶽不能施煩苛盡令區中擊壤塊燕及海外覃恩波秦霸周衰古官廢上堙下塞王道頗共矜異俗同聲教不念齊民方薦瘥傳稱魚鱉亦咸若茍能效此誠足多藉如牛馬未蒙澤豈在抱甕滋黿鼉教化從來有源委必將泳海先泳河非是倒置自中古驃兮驃兮誰爾何白詩云驃國樂驃國樂出自大海西南角雍羌之子舒南陀來獻南音奉正朔德宗立仗御紫庭黈纊下塞為爾聽玉螺一吹推髻聳銅鼓一擊文身踊珠纓炫轉星宿搖花鬘抖擻龍蛇動曲中王子啓聖人臣父願為唐外臣左右歡呼何嫻習皆尊德廣之所及須臾百辟詣闕門俯伏拜表賀至尊伏見驃人新獻樂請書國史傳子孫時有擊壤老農父暗測君心閒獨語聞君政化甚聖明欲感人心致太平感人在近不在逺太平由實非由聲觀身理國國可濟君如心兮民如體體生疾苦心慘悽民得和平君愷悌貞元之民若未安驃樂雖聞君不歡貞元之民茍無病驃樂不來君亦聖驃樂驃樂徒喧喧不如聞此芻蕘言黃華老人詩金翰林王庭筠四絶句原在黃華山嘉靖間僉事崔官攜帖至榆李元陽重摹之其詩曰王母祠東古佛堂人𫝊棟宇自隋唐年深寺廢無僧住滿谷西風栗葉黃手挂一條青竹杖興來自挂百錢遊夕陽欲下山更好深林無人不可留挂鏡臺西挂玉龍半山飛雪舞天風寒雲直上三千尺人道髙歡避暑宫帝遣名山護此邦千家瑟瑟嵌西窗山僧乞與山前地招客先開四十雙今碑在大理三塔寺竹枝詞滇中詩人明永樂間稱平居陳郭郭文詩有唐風三子逺不及也其竹枝詞云金馬何曽半步行碧雞那解五更鳴儂家夫婦久離别恰似兩山空得名又登碧難山太華寺一聮云湖勢欲浮雙塔去山形如擁五華來一時間筆詠信天翁詩明楊林蘭廷瑞信天翁詩云荷錢荇帶緑江空唼鯉含鯊淺水中波上魚鷹貪未飽何曽餓死信天翁信天翁水鳥也食魚而不能捕俟魚鷹所得偶墜者拾而食之滇中水次有此詠鸚鵡詩金齒湯琮明正統間人常題鸚鵡云翠閣香閏帶緑隂忽聞靈舌囀嬌音總將懷袖溫存意不稱雲林自在心籠絡反因毛羽誤矜誇休羡賦辭深隴山烟雨春雛小莫遣虞羅著意尋人稱為湯鸚鵡三句詩彭綱清江人明𢎞治中督學雲南詠刺桐花云樹頭樹底花楚楚風吹緑葉翠翩翻露出幾隻紅鸚鵡刺桐花雲南名鸚哥花形酷似之彭詩本四句命吏寫刻遺其一句復誦之自覺意足乃不更改蘆笙吟稗史云宋乾德中牂牁入貢詔見詢問地里風俗令作本國歌樂一人吹瓢笙名曰水曲即今蘆笙也豫在大理見之嘗作蘆笙吟五解其詞云蘆笙吟蘆笙吟可憐一寸匏能括四海音蘆笙吟蘆笙吟可憐一節蘆能通四海心昔我聞蘆笙乃在盤江河河邉跳月歌令人元鬢皤今我聞蘆笙乃在開南橋短歌和長謡從夕至侵朝悲亦不在聲歡亦不在聲昔聲與今聲不是兩蘆笙平十八寨詩寨在巴盤間為盜藪明正德庚辰巡撫何孟春集兵𠞰之有白蟒自寨中飛出又有怪石賊每聞兵至則祭以徼福兹祭之忽作聲賊知其必殪相率號哭已而羣醜就戮孟春賦詩紀之詩云石不受祭蟒猶知退爾賊爾玀如何無畏石祭聲悲蟒飛避威爾賊爾玀如何無思玀維賊首為惡滋久妄大自驕維固是負賊本猓雛亦廣有徒寨以為居硐以為逋鳴呼爾玀毒同於蟒鳴呼爾賊頑匪石狀彼蟒改圖吾無難誅此石路隅今常儼如爾衆其伏天地維育爾賊其縮昆蟲何蹴而弗事菑畬而弗供征輸而専意劫刳而竟違招禍以干吾戈鈇嗚呼爾寨可終居乎爾硐可終逋乎又云石有聲賊當滅白蟒去黑玀磔庚辰秋半兆先決壯士當場氣何烈巡按御史親持節既得虎子塞虎穴江流改盤山失嵲正德十五年十月磨崖碑為誰設此石鳴聲得昭雪都堂此時刻石勒垂誓將來柱母折黑玀宗子頭已截玀黨再來玀種絶楊慎遺詩楊升菴丹鉛録曰元天目山釋明本有九字梅花詩滇南唐錡以為不佳屬豫作一首乃口占云元冬小春十月微陽回緑蕚梅蕊早傍南枝開折贈未寄陸凱隴頭去相思忽到盧同窗下來歌殘水調沉珠明月浦舞破香山碎玉臨風臺錯恨髙樓三弄呌雲笛無奈二十四番花信催又詩話云余嘗登眺山寺見雨霽虹霓下飲澗水日射其旁如盻睞得句云渴虹下飲玉池水斜日橫分蒼嶺霞自謂切景張愈光云斜字猶未稱渴字後一年偶閲莊子日中方睨衍義云日斜如人睨目遂改作睨日對渴虹字始稱愈光曰渴虹睨日古今竒句也又漁家傲詞自序云宋歐陽六一作十二月鼓子詞即今之漁家傲也元歐陽圭齊亦擬為之専詠燕京風物豫流居滇雲草載遂以滇之土俗擬兩歐為十二闋雖藻麗不足儷前賢亦紀井州故鄉之懷耳其調有云四月滇南春迤邐八節常如三月裏共傾浴佛金盆水五月滇南風景别清凉國裏無煩熱雙鶴橋邉人賣雪六月滇南波漾渚東寺雲生西寺雨水樁斷處餘霞補松炬熒熒宵作午蘭舟桂楫喧簫鼓又云八月滇南秋可愛紅芳碧樹花仍在又云十二月滇南娛嵗宴家家玉餌雕盤薦皆實録也滇人謂虹為水樁嵗暮蒸白粲搗為丸以雕盤盛之薦於祖禰楊慎婦詩詞升菴久戍滇中婦黃氏寄一律云鴈飛曽不到衡湘錦字何由寄永昌三春花栁妾薄命六詔風煙君斷腸曰歸曰歸愁嵗暮其雨其雨怨朝陽相憐空有刀環約何日金雞下夜郎又一絶云懶把音書寄日邉别離經嵗又經年郎君自是無歸計何處青山不杜鵑又黃鶯兒一詞積雨釀春寒見繁花樹樹殘泥塗滿眼登臨倦江流幾灣雲山幾盤天涯極目空腸斷寄書難無情征鴈飛不到滇南升菴别和三詞俱不能勝并載於此其一云夜雨滴空階傍愁人枕畔來鄉心一片無聊賴淚眸懶揩狂歌懶裁沈郎多病寬腰帶望琴臺迢迢天外懷抱幾時開其二云霽雨帶殘虹映斜陽一抹紅樓頭畫角收三弄東林晚鐘南天晚鴻黃昏新月絃初控望長空披襟誰共萬里楚臺風其三云絲雨濕流光愛青苔繡粉牆鴛鴦浦外清波漲新篁送凉幽芳弄香雲廊水榭堪遊賞倒金觴形骸放浪到處是家鄉六言詩鄧渼郴州人明萬歷中巡按雲南詩云地控雙關金碧雲開兩迤東西盈尺海波瀰瀰四時草色凄凄峯頭半起雲彩江曲初生月牙荻岸蘆州相向碧雞山下人家細雨斜拖白綀春風自翦紅羅感此驚心濺淚故園歸去如何沙木和邉月白花橋關下雞鳴風遞一聲畫曉星殘幾㸃松明又有日出髙原烟水雷鳴初澍田疇注云滇俗瀦水處皆稱海子呼雲為雲彩初生月曰月牙畫角為畫曉松炬為松明髙田為雷鳴田謂雷鳴雨沛始得種也拖白練鳥名翦紅羅花名沙木和花橋關俱地名南中行記漢陸賈傳載崇文總目益州記漢李膺撰載後漢書注哀牢𫝊晉楊終子山為郡上計吏進哀牢𫝊孝明竒之召在蘭臺見論衡南中志一卷晉常璩撰附於華陽國志南中草木狀一卷晉襄陽太守稽含撰開西南夷事狀十卷唐貞元十四年韋臯進呈叙開復南詔之由雲南紀五卷貞元十年袁滋使南詔元和十三年上之雲南行紀二卷唐長慶三年韋齊休從韋審規使雲南紀往來道路及見聞序謂雲南所以為唐患者以開道越巂耳若自黎州之南清溪關外盡斥棄之疆埸可以無虞不然憂未艾也及唐之亡禍果由此雲南志十卷唐咸通中樊綽撰以南蠻程途山川城鎮名號諸蠻族類風俗物産纂為十門南蠻紀十卷樊綽撰南詔録三卷唐乾符五年南詔請通好辛讜遣從事徐雲䖍復命使回録所見聞上之雲南别録一卷唐竇滂撰叙南蠻族類及風土雲南行記一卷竇滂撰西南備邊録十三卷唐李德裕撰大略謂成都藩翰西南備禦不可少弛於是纂兵將糧械之數城鎮種落之名嵗計經用之目並以太和六年為斷及諸郡故實外夷情狀煩碎畢書益州記唐李充撰雲南風俗記一卷宋崇文總目地理八十三部八百四十七卷始於山海經終於雲南風俗記至道雲南録三卷宋天禧元年辛怡顯撰淳化五年以西蜀李順與南蠻結連詔募命官士庶通邉事者往黎巂界招撫時怡顯自薦請行至道元年訖事而歸是書備載始末紀古滇說原集一卷宋張道宗撰其書始自唐虞訖於咸淳滇之方域年運謡俗服叛紀載事蹟一一備詳南詔紀行元郭松年撰雲南志略四卷元大德五年李京奉命宣慰烏蠻始下車㑹羣蠻不靖巡行鎮撫屢周雲南始悟前人紀載之失悉其見聞為志略滇載記一卷明楊慎撰載九隆世族及張蒙鄭楊段髙七氏名號起滅之顛末蓋取諸白古通元峯年運志而删正之雲南通志明李元陽修雲南志草明包見捷修未刻滇志明劉文徴修其去取本志草作以上諸書今滇中皆散失不備以其皆為滇也故竝識之明滇人集丁嵩永昌人著有橫峯樵唱滕檳金齒衛人著歸田録楊士雲太和人著咏史黑水諸集朱鳯晉寧人著東湖集朱克瀛晉寧人著清庵集朱化孚安寧人著賁幽吟王元翰寧州人著南嶽草唐堯官晉寧人著五龍山人集馬繼龍永昌人著海樵集賈惟孝嵩明人著剩語閒吟稿孫繼魯昆明人在獄著飯碗集以獄無紙筆取飯碗畫壁也施銓昆明人著東軒稿楊忠亮石屏人著素吟草山窗蔓言麗江土知府木公著萬松吟玉湖遊稿等集木青著玉水流音木增著雲邁等集雲南通志卷三十
