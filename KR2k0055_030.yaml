body:
  text: 雲南通志卷三十雜紀殊方異蹟軼事遺文兩爨多三竹之裔六詔悉九隆之後滇之開國事多不經且自漢唐以還畔服靡常蒙趙段楊遞相竊據不受命於中朝故九爽十瞼制異周官隗構支留文須重譯外此之幻異弔詭者不可悉數也夫八方異俗咸垂山海之經百物殊形並鑄夏王之鼎則都薈細碎賅而存之未始非博覽者之一助云志雜紀殊方妙香國即今大理古初國屬天竺水居陸之半為羅剎所據好啖人有張敬者為巫祝羅剎憑之一日老僧自西方來敬家託言欲求地藏修敬以告羅剎問需幾許僧身披袈裟手牽一犬指曰但欲吾袈裟一展犬一跳之地羅剎諾僧曰既許合立符劵遂就洱水岸上畫劵石間於是僧展袈裟縱犬一跳已盡羅剎之地羅剎失措欲背盟僧以神力制之不敢背但問何以處我僧曰别有殊勝之居因於蒼山上陽溪化金屋寶所一區羅剎喜盡移其屬入焉山遂閉僧乃鑿河尾泄水之半是為天生橋至今洱水島上有赤文如古篆籒云是買地劵鶴拓當洱水初泄時林藪蔽翳人莫敢往有二鶴日從河岸行人尾其跡始得平地故大理又名鶴拓今南橋作雙鶴示不忘也金馬周宣王時西竺有國曰摩揭提王曰阿育生三子長福邦次𢎞德季至德王有神驥一其色如金三子皆欲之王意欲與季而患其爭乃以轡私授至德縱驥東馳命三子曰捕獲者主之三子各部衆追至滇池上長子意馬飲滇池伺而邀之不獲仲子意馬至甸中亦不獲至德追至東山松林以轡邀之馬見轡而就遂獲焉王思滇逺恐不得歸遣舅氏神明統兵以援將歸哀牢夷阻道不返既殁福邦為碧雞山神𢎞德為巖頭山神至德為金馬山神今安寧有龍馬跳澗山並草溪井龍馬河即其所經之地石上蹄跡深尺許竹王漢初一女浣衣遁水有三節大竹流入足間推之不去聞內有啼聲持歸破之得一兒育於家長以才武雄諸夷捐所破竹於野生竹成林遂以竹為姓自號竹王王與從人嘗止石上命作羮從者白無水王以劒擊石出水後漸驕恣武帝開西南諸種侯王皆服乃斬竹王置牂牁郡後封其三子名竹王三郎今通海有竹王祠九隆哀牢有婦人一産十子九隆其一也其九子曰眉附羅曰牟苴亷曰牟苴諾曰牟苴酬曰牟苴篤曰牟苴託曰牟苴林曰牟苴頌曰牟苴閃九隆長而黠驁嘗有天樂奏鳯凰棲五色花開之祥衆遂推為酋長餘詳封建白國白國之先有西海阿育王奉佛惡殺不茹葷腥又稱白飯王傳至仁果以慈信治國國人戴之漢元狩間常羌治滇池仁果治白崖兩國角立帝嘉仁果而惡常羌册仁果為滇王仁果子孫不尚采染不殺生命仍號白國𫝊世十七至龍祐那不變其舊諸葛亮定南中封祐那於其故地又移南中徑卒青羌萬餘家於蜀為五部所當無前號為飛軍分其羸弱配大姓焦雍婁爨孟量毛李為部曲置五部都尉號五子故南人言四姓五子也晉罷寧州置南夷府統五十八部夷族都監行事每夷供貢南夷府入牛金㫋馬動以萬計其四姓子弟仕進必先經都監夷人大種曰昆小種曰叟有桀黠能言議屈服種人者謂之耆老又有夷經南人言語雖學者亦半引其語與夷為姓曰遑耶諸姓為自有耶犯法者輒依之藏匿與夷至厚者謂之百世遑耶恩若骨肉為其逋逃之藪故輕為禍變恃此也俗尚巫鬼好詛盟拔石結草官常以盟詛要之諸葛亮乃為夷作圖譜先畫天地日月君長城府次畫神龍生夷及牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫牛羊負酒齎金寶詣之之象以賜夷夷甚重之許致生口直又與瑞錦鐵劵每刺史校尉至齎以呈詣昆彌國唐書一曰昆明西南夷也在爨蠻之北以西洱河為界其俗與突厥略同相傳云與胸奴本兄弟國漢武帝得其地入益州部其後復絶諸葛亮定南中亦所不至唐武德四年巂治中吉𢎞緯使南寧因至其國諭之入貢新唐書義云土歊濕宜粳稻隨水草畜牧夏處髙山冬入深谷今瀾滄衛永寧通安浪蕖閒當是其地風俗亦略同大理志乃謂昆彌為白崖非也諸葛亮伐南蠻戰於洱海之南白崖姚巂入滇古路何言不至耶其實昆明以地得名昆彌之為昆明聲相近而訛耳建寧國在那州彌渡三國漢時龍祐改稱𫝊十七世至張樂進求唐永徽中讓國於蒙氏兩爨楚令尹子文之後受姓班氏西漢末食邑於爨遂以為氏三國漢時諸葛亮南征辟爨習為官屬晉時有興古太守爨琛與將軍姚嶽共破李驤於堂狼又有梁水大守爨亮叛降李雄為寧州刺史尹奉所誅自後南北分爭寧州道絶爨氏以方土大姓自王蠻中宋元嘉中晉寧大守爨松子反寧州刺史徐循討平之其後爨龍顔仕宋為龍驤將軍爨雲仕魏為驃騎大將軍皆封侯梁太清中南寧州刺史徐文盛因侯景之亂召募羣蠻數萬人赴荆州西爨爨瓚遂據有牂牁興古等郡朝廷不得已以為寧州刺史瓚死子震玩分統其衆隋開皇中玩遣使朝貢未幾叛史萬嵗擊之事詳師旅考唐武德初以玩子洪達為昆州刺史時益州刺史段綸遣使俞大施至南寧治共範川誘諸部皆納欵貢方物兩爨始定貞觀初洪達死以其子歸王為南寧州都督居石城襲殺東爨首領蓋聘及子蓋啓徙共範川天寶中有兩爨大鬼主崇道者與弟日進日用居安寧城左聞章仇兼瓊開步頭路築安寧城羣蠻震騷共殺築城使者元宗詔南詔皮邏閣討之師次波州歸王及崇道兄弟千餘人泥首謝罪赦之俄而崇道殺日進及歸王歸王妻阿奼烏蠻女也走父部乞兵相仇於是諸爨亂阿奼遣使請皮邏閣求殺夫者書聞詔以其子守隅為南寧州都督皮邏閣以女妻之又以一女妻崇道子輔朝然崇道守隅相攻討不置阿奼訴皮邏閣為興師營昆州崇道走黎州遂虜其族殺輔朝收其女崇道俄亦被殺諸爨稍離弱閣邏鳯立召守隅並妻歸河睒不通中國阿奼自主其部落嵗入朝恩賞蕃厚閣邏鳯遣昆州城使楊牟利以兵脅西爨徙户二十餘萬於永昌城東爨以言語不通多散依林谷得不徙又爨蠻之西有徒莫祇蠻儉望蠻南有東謝蠻南謝蠻西趙蠻等皆隋末唐初分據滇中地者六詔一曰䝉舍詔在諸詔之南故又稱南詔一曰蒙巂詔一曰越折詔或謂麼些詔一曰浪穹詔一曰鄧睒詔一曰施浪詔各受唐爵為諸州刺史屬於姚州都督府受劒南節度使節制南詔至皮邏閣其勢寖强遂賂節度使王昱密求合六詔為一朝廷許之初蒙巂詔巂輔首死無子弟佉陽照立佉陽照死子照原立喪明子原羅質南詔皮邏閣欲并其國故歸其子原羅衆果立之居數月使人殺照原逐原羅遂有其地越析詔有豪酋張尋求蒸其王波衝妻因殺波衝王昱召尋求至姚州殺之部落無長以地歸南詔波衝兄子于贈持王所寶鐸鞘東北渡瀘邑於龍佉河才百里號雙舍使部酋楊墮居河東北皮邏閣樹壁侵于贈不克閣邏鳯自請往擊楊墮破之于贈投瀘死得鐸鞘故王出軍必雙執之浪穹詔其王豐時死子羅鐸立羅鐸死子鐸羅望立為浪穹州刺史與皮邏閣戰不勝挈其部保劒川更稱劍浪詔皮邏閣遂有浪穹之地後鐸羅望死子望偏立望偏死子偏羅矣立偏羅矣死子羅君立貞元間南詔擊破劍川虜羅君徙永昌凡浪穹邆睒施浪總謂之浪人亦稱三浪邆睒詔其王豐咩初據邆睒為御史李知古所殺子咩羅皮自為邆川州刺史移邆川治大釐城皮邏閣襲敗之復入邆睒與浪穹施浪合兵以拒既戰大敗皮邏閣奪邆睒咩羅皮走保野共川後死子皮羅鄧立皮羅鄧死子鄧羅顛立鄧羅顛死子顛文托立南詔破劍川虜之徙永昌施浪詔其王施望缺居矣苴和城有施各皮者亦八詔之裔據石和城閣羅鳯攻虜之而施望缺孤立故與咩羅皮合攻皮邏閣不勝皮邏閣以兵脅降其部施望缺以族走永昌獻其女遺南詔丐和皮邏閣許之望缺渡蘭江溺死弟望千走吐蕃吐蕃立為詔納之劍川衆數萬望千死子千旁羅顛立南詔破劍川千旁羅顛走瀘北三浪悉滅先是又有時傍矣川羅識二族通號八詔時傍母皮邏閣女也其女復妻閣羅鳯初咩羅皮之敗時傍入居邆川州誘三浪千餘勢稍張為閣羅鳯所猜徙置白崖城後與矣川羅識詣吐蕃神州都督求自立為詔謀泄被殺矣川羅識奔神州都督送之羅些城封民國䝉舍詔僣稱蒙氏始興曰細奴邏亦名獨邏消九隆五族牟苴篤之三十六世孫也其父曰龍迦獨將細奴邏自哀牢避難逃於蒙舍耕巍山之麓細奴邏素有神異孳牧繁息部衆日盛唐髙宗永徽四年代張氏立國築城巄􅬗圖山國號曰封民上元元年細奴邏死子邏盛炎嗣睿宗太極元年死子炎閣嗣未幾死弟盛羅皮嗣元宗開元十五年死子皮邏閣嗣唐賜名歸義天寶七載死子閣邏鳯嗣代宗大厯十四年死子鳯伽異先死孫異牟尋嗣憲宗元和三年死子尋閣勸嗣元和四年死子勸龍晟嗣元和十一年為其下王嵯巔所弒弟勸利嗣穆宗長慶三年死子豐佑嗣宣宗大中十三年死子世隆嗣即唐書避元宗廟諱改書為酋龍者也僖宗乾符四年死子隆舜嗣昭宗乾寧四年鄭買嗣密令豎臣楊登弒之子舜化貞嗣天復二年亦為買嗣所弒蒙氏遂滅自細奴邏至舜化貞十有四世歷一百五十年又滇考載閣邏鳯時僭稱大蒙國異牟尋改號大理世隆又改大禮至隆舜始改封民並存以備考長和國鄭買嗣僭稱買嗣鄭回之後世為蒙氏清平官弒主自立後梁太祖開平四年死子仁旻嗣後唐莊宗同光四年死子隆亶嗣後唐明宗天成三年為楊干貞所弒自買嗣至隆亶三世歷二十六年天興國趙善政僭稱善政寧比佉逸塝人為鄭氏清平官干貞弒主皆善政協謀干貞欲自立恐有變陽推善政立之天成三年為干貞所廢幽死立甫十月義寧國楊干貞和村人為鄭氏東川節度使既廢善政遂自立後晉髙祖天福二年通海節度使段思平起兵討之干貞出走永昌自縊死立十年大理國段氏之先白人也至段儉魏與鳯伽異敗鮮于仲通於西洱河䝉氏擢為清平官易名忠國六𫝊生思平為通海節度使楊干貞忌之思平隱姓名為獵者以一犬自隨至品甸投宿主人有一㦸生牛革四疊入夜風忽吹㦸洞貫牛革思平驚曰是何銛利豈神㦸耶及明以犬易㦸又得神驥於葉鏡湖飢摘野桃剖之核膚有文曰青昔思平析之青乃十二月昔乃二十一日今楊氏政亂吾當以是曰舉義乎遂借兵黑爨三十七部皆助之至洱河是夕夢人斬其首又夢玉瓶耳缺鏡破懼不敢進其軍師董迦羅曰三夢皆吉兆也公為大丈夫去首天子兆也玉瓶去耳為王王者兆也鏡中有影如人有敵鏡破則無影無影則無敵也乃決明旦引兵欲渡莫知所從見江尾一婦衣白披纓而浣者指曰人從我江尾馬從三沙矣爾國名大理從之得濟既逐楊氏而有蒙國遣人於江滸覔白衣婦不獲掘地中得白石大士一座遂改國號曰大理立八年後晉出帝開運二年死子思英嗣叔思良廢之自立思良立六年後周太祖廣順元年死子思聰嗣立十八年宋太祖開寶元年死子素順嗣立十七年太宗雍熙元年死子素英嗣立二十四年真宗大中祥符元年死子素亷嗣立十四年乾興元年死姪素隆嗣立五年仁宗天聖四年避位為僧𫝊國素亷之孫素貞素貞立十五年慶厯元年死孫素興嗣立五年慶歷六年為諸大臣所廢思良之後無可立者乃更立思平曽孫智恩之子思亷思亷立三十一年神宗熙寧八年𫝊位於子亷義亷義立六年元豐三年為其臣楊義貞所弒義貞篡位凡四月嶽侯髙智升遣子升泰起東方兵其滅之而立亷義之子夀輝夀輝立二年逼於髙氏元豐五年避為僧更立思亷之孫正明正明立十二年哲宗紹聖元年亦避為僧國人奉髙升泰立之而段氏中絶升泰立二年紹聖三年死子泰明奉父遺命立段正明之弟正淳髙氏世為相時波斯崑崙諸國來貢大理者皆先謁泰明稱國主焉正淳立十三年徽宗大觀二年避位子正嚴嗣立四十年髙宗紹興十七年避位子正興嗣立二十五年孝宗乾道八年避位子智興嗣立二十九年寧宗慶元六年死子智亷嗣立六年開禧元年死弟智祥嗣立三十四年理宗嘉熙三年傳位於子祥興祥興立十四年淳祐十二年死是嵗即元憲宗二年也子興智嗣立一年為元所滅自思平至興智二十七世歷三百十七年元世祖既破大理禽興智及髙泰祥泰祥不屈欲官之嫚罵不受斬於五華樓下臨刑曰段運不回天使其然為臣死國職也吾事畢矣時烈日當午雷電大作風沙愁慘觀者萬人莫不灑泣世祖曰忠臣也命收葬之未幾設都元帥府赦興智封摩訶羅嵯管領諸蠻卒以其弟段實繼之纍授行省參知政事諸郡總管實𫝊段忠以從征功授宣慰兼軍民萬户府忠𫝊段慶封宣武將軍授雲南省參政慶𫝊段正正𫝊段隆隆𫝊段俊俊𫝊段義義𫝊段光初為蒙化知府元大德中梁王以宗室鎮善闡與段氏分域搆隙大破光兵光將髙蓬守羅那關梁王密招之不從乃賂庖人剌蓬以其首獻王更戮庖人以自解至正十十年段功繼為總管明王珍寇雲南梁王奔威楚諸部悉亂功進兵於吕閣敗玉珍於關灘玉珍收餘䘐再戰殺段氏驍酋鐵萬户屯古田寺段氏火之珍軍亂死者什七八追至回蹬關大敗之玉珍母自蜀寄軍中書言務得南中功獲之使楊淵海更其辭今早還募人將書往其臣陳惠曰吾以一命救萬人書至玉珍默默遂遁歸功追至七星關大挫其衆梁王德功以女阿􅗩妻之功夫人髙氏寄樂府一章促之歸其詞曰風捲殘雲九霄冉冉逐龍池無偶水雲一片緑寂寞倚屏幃春雨紛紛促蜀錦半閒鴛鴦獨宿好語我將軍只恐樂極生悲冤鬼哭段功得書乃歸既而復往左右譖於王曰段平章此來大有吞金馬咽碧雞之心矣盍早圖之梁王密召阿􅗩命曰親莫若父母寶莫若社稷功今志不滅我不已脫無彼猶有他平章不失富貴也今付汝孔雀膽一具乘便可毒殪之􅗩澘然受命夜寂私語功曰我父忌阿奴願與阿奴西歸因出毒具示之功曰我有功爾家我趾蹶傷爾父為我裏之爾何造言至此三諌之終不聽明日邀功東寺演梵至通濟橋馬逸因命蕃將格殺之阿􅗩聞變失聲哭曰昨暝燭下才講與阿奴雲南施宗施秀烟花殞身今日果然阿奴雖死奴不負信黃泉也欲自盡梁王百計防衛阿􅗩作詩愁憤而死詩曰吾家住在雁門深一片閒雲到滇海心懸明月照青天青天不語今三載欲隨明月到蒼山誤我一生踏裏彩吐嚕吐嚕段阿奴施宗施秀同奴歹雲片波潾不見人押不蘆花顔色改肉屏獨坐細思量西山鐵立風瀟灑平章從官員外楊淵海亦題詩於壁曰半載功名百戰身不堪今日總紅塵死生自古皆由命禍福於今豈怨人蝴蝶夢殘滇海月杜鵑啼破㸃蒼春哀憐永訣雲南土綿酒休教灑淚頻是日飲藥卒功有子寶女羌奴羌奴志復父讎將適建昌阿黎氏以繡旗遺寶曰我自束髮聞母稱父寃恨非男子不能報此旗所以識也今歸夫家收拾東兵飛檄西洱汝急應兵會善闡因作詩二首曰珊瑚勾我出香閨滿目澘然淚濕衣氷鑑銀臺前長大金枝玉葉不芳菲鳥飛兔走頻來往桂馥梅馨豈暫移惆悵同胞未忍别應知含恨㸃蒼低何彼穠穠花自紅歸車獨别洱河東鴻臺燕苑難經目風刺霜刀易塞胸雲舊山髙連水逺月新春疊與秋重淚珠恰似通宵雨千里關河幾處逢及寶為總管明玉珍復侵善闡梁王遣叔鐵木的罕借兵大理時寶已長答書云殺虎子而還喂其虎母分狙栗而自詐其狙公假途滅虢獻璧吞虞金印玉書乃為釣魚之香餌繡閨淑女自設掩雉之網羅況平章已亡兄弟罄絶今止遺一獒一奴奴堪再贅華黎氏獒又可配阿􅗩妃如此事諾必借大兵如其不可待金馬山换作㸃蒼山昆明池改作西洱池時軍來矣書後附以詩云烽火狼烟信不符驪山舉戲是支吾平章枉死紅羅帳員外空題粉壁圖鳯别岐山祥兆𨼆龍遊郊藪瑞光無自從界限鴻溝後成敗興亡不屬吾梁王見而恨之時明太祖開基金陵遣其叔段貞奉表歸款寶死子明嗣未幾死叔世權國事明兵定善闡世遣張元亨馳書請依唐宋故事潁川侯傅友德辱其使進師禽世踏衷彩錦被名也吐嚕可惜也歹我也押不蘆北方起死回生草名肉屏駱駝背也鐵立松林也皆夷語大中國髙升泰僭稱後理國段正淳僭稱西南外徼驃古朱波也自號突羅朱闍婆國人曰徒里拙在永昌南二千里東鄰真臘西接東天竺西南墯和羅南屬海北南詔屬國十八曰迦羅婆提曰摩禮烏特曰迦梨迦曰半地曰彌臣曰神朗曰偈奴曰羅聿曰佛代曰渠論曰婆梨曰偈陀曰多歸曰摩曳餘即舍衛瞻婆闍婆也凡鎮城九曰道林王曰悉利移曰三陀曰彌諾道立曰突旻曰帝偈曰達梨謀曰乾唐曰末浦凡部落二百九十八以名見者三十二曰萬公曰充惹曰羅君潛曰彌綽曰道雙曰道甕曰道勿曰夜半曰不惡奪曰莫音曰伽龍睒曰阿梨吉曰阿梨闍曰阿梨忙曰達唐曰求潘曰僧塔曰提梨郎曰望騰曰擔泊曰祿烏曰乏毛曰僧迦曰提追曰阿末邏曰逝越曰騰陵曰歐咩曰磚羅婆提曰祿羽曰陋蠻曰磨地勃繇彌臣至坤朗又有小崑崙部王名茫悉越俗與彌臣同繇坤朗至祿羽有大崑崙王國王名思利泊婆難多珊那川原大於彌臣繇崑崙小王所居半日行至磨地勃栅海行五月至佛代國有江支流三百六十其王名思利些彌他有川名思利毗離芮土多異香北有市諸國估舶所湊越海即闍婆也十五日行踰二大山一曰正迷一曰射鞮有國其王名思利摩訶羅闍俗與佛代同經多葺補邏川至闍汲八日行至婆賄伽盧國土熱衢路植椰子檳榔仰不見日王居以金為甓廚覆銀瓦爨香木堂飾明珠有二池以金為隄舟楫皆飾金寶驃王姓困沒長名摩羅惹其相名曰摩訶思那王出輿以金繩牀逺則乘象嬪史數百人青甓為圜城周百六十里有十二門四隅作浮圖民皆居中鉛錫為瓦荔支為材俗惡殺拜以手抱臂稽顙為恭明天文喜佛法有百寺琉璃為壁錯以金銀丹彩紫礦塗地覆以錦罽王居亦如之民七嵗祝髮止寺至二十有不達其法復為民衣用白㲲朝霞以蠶帛傷生不敢衣戴金花冠翠帽絡以雜珠王宫設金銀二鐘冦至焚香擊之以占吉凶有巨白象髙百尺訟者焚香跽象前自思是非而退有災疫王亦焚香對象跽自咎無桎梏有罪者束五竹捶背重者五輕者三殺人則死土宜菽粟稻粱蔗大若脛無麻麥以金銀為錢形如半月號登伽他亦曰足彈他無膏油以蠟雜香代炷與諸蠻市以江豬白㲲琉璃罌缶相易婦人當頂作髙髻飾金珠琲衣青娑裙披羅段行持扇貴家者旁至五六近城有沙山不毛地亦與波斯婆羅門接距西舍利城二十日行西舍利者中天竺也南詔以兵彊地接常羈制之夷亦有美俗一切借貸賖傭通財期約諸事不知文字惟以木刻為符各執其半如約酬償毫髮無爽如有不平赴酋長口訟以石子計其人之過酋長因而訓之使改不改則死惡殺酋長侵伐則從以為死乃分之當然有紀律所過不犯一草閨門嚴婦人既嫁壻有言其婦外窺者婦父母親戚掘地縳而埋之以為辱宗夫死不嫁自稱鬼妻種藝紡績有織大布者機闊八尺口誦佛號乃織一梭婦人敬夫進食必叩頭至地人敬酋長雖在暗室聞過必跪舉手加額兩酋爭戰既久勝負未分有僧入陳止之遂罷戰而歸吐蕃明劉文徴曰吐蕃在雲南鐵橋之北一名古宗一名西蕃一名細腰蕃在唐常冦雲南南詔不能勝讓之為兄後劒南節度提南詔兵搗其巢穴斬首數十萬永斷鐵橋自是不復為滇患至明太祖平雲南遂裂吐蕃為二十三支分屬郡邑以麗江控制古宗永寧北勝控制諸蕃麗江北境復與蕃接近者木氏屢以兵捕蕃拓地嵗增差發大麥有差南國録稱其𫝊世獨久其俗無地理風水隂陽吉凶之選而自唐至今千餘年有土有官云交址明劉文徵曰交址唐堯宅之漢州之逮吳割據亦然宋不競始失迄元之强大亦不能郡縣如漢也永樂初破交址立布政司以復漢舊尋又棄為外國豈地合散自有數抑人謀之不臧也永昌有指揮自交址厯三世而家藏大珠獨異等伍則凡所以失民心而不可復者其以是耶今黎民竄於海濵尚據數郡莫氏之境與廣南富州接又有交岡者介於滇交之間蓋彼亦裂而為三矣交人皆左袵蓬跣長技在銃與象臨安諸土司足為扞蔽尚未煩內地備禦也永昌外夷明劉文徵曰唐書永昌南有茫天連茫吐薅大睒茫昌茫鮓茫施皆樓居無城郭有金齒銀齒漆齒三種以漆及鏤金銀飾齒寢食則去之今芒市長官司大伯夷以榴皮及藥染齒使黑初無金銀鏤飾及寢食脫去之說永昌郡𫝊尾濮穿空以安其尾廣志濮有折腰劖脣九州記哀牢渠帥耳至肩三寸南夷志穿鼻蠻在柘東以徑寸金環穿鼻中隔下埀過頤又有長鬃棟鋒皆謬妄不經雖永騰徼外僰夷盡境耳目覩記所絶無也若水世𫝊黃帝長子昌意德劣不足紹承大位降居斯水為諸侯娶蜀山氏女生顓頊於若水之野有聖德二十登帝位承少皡之政以水德王藤渡普渡河金沙江巖險水汹不可舟楫以藤絙縳於兩岸樹上絙上架一木筒渡者以繩縳身繫於筒上兩手握筒緣藤溜而過所謂渡索尋橦是也俗名溜筒南中山水後漢書越巂郡青蛉縣有禺同山俗謂有金馬碧雞今以姚安為古青蛉而姚安競無禺同且云有金馬碧雞則禺同又似在會城矣又前後漢書青蛉屬越巂弄棟屬益州而今青蛉弄棟同係姚安亦未確又前漢書云益州郡滇池縣大澤在西滇池澤在西北有黑水祠銅瀨縣談虜山迷水所出東至談藁入涅俞元縣池在南橋水所出東至母單入溫行千九百里懷山出銅牧靡縣南山臘涂水所出西北至越巂入繩過郡二行千二十里秦臧縣牛蘭山即水所出南至雙柏入僕行八百二十里葉榆縣葉榆澤在東貪水首受青蛉南至邪龍入僕行五百里律髙縣石空山出錫東南盢町山出銀鉛弄棟縣東農山母血水所出北至三絳南入繩行五百一十里賁古縣北采山出錫西羊山出銀鉛南烏山出錫母掇縣橋水首受橋山東至中留入潭過郡四行三千一百一十里勝休縣河水東至母掇入橋來唯縣從􅞼山出同勞水出徼外東至糜伶入南海過郡三行三千五百六十里越巂郡臺登縣孫水一曰白沙江南至會無入若行七百五十里遂久縣繩水出徼外東至僰道入江過郡一行千四百里青蛉縣臨池灊在北僕水出徼外東南至來唯入勞過郡二行千八百八十里應劭曰青蛉水出西東入江也牂牁郡句町縣文象水東至增食入鬱又有盧唯水來細水伐水都夢縣壺水東南至麋伶入尚龍溪過郡二行千一百六十里西隨縣麋水西受徼外東至糜伶入尚龍溪過郡二行千一百六十里母斂縣剛水東至潭中入潭今山川猶昔而名之相仍者十無一二矣漢初闢滇察地脈以載形方考據最核夫地從中國名從土人以古史較今志而流峙宛在目中固不必問諸水濵矣辟諸葛亮表益州郡有耽文山澤山司彌瘞山婁山龍山皆未詳所在永昌郡𫝊曰朱提在犍南千八百里治朱提縣川中從廣五六十里有大泉池水千頃名千頃池又有龍池以灌溉種稻與僰道接多猿羣聚鳴嘯於行人徑次聲聒人耳有堂狼山山多毒草盛夏之月飛鳥過之不能去溫泉東坡詩紀所經溫泉天下七處以驪山為最滇中寧州白崖曲江德勝關浪穹宜良鄧川三泊江川羅次曲靖所在皆有不止數十處而安寧為最凡溫湯皆有硫磺氣而安寧則無舊有人見其竅出丹砂數粒乃知其下有丹砂故泉甲於他處明楊慎稱為天下第一湯𫝊聞徽州黃山溫泉亦類此後周王褒溫湯銘曰白􅈨上徹丹砂下沉華清駐老飛流瑩心乃知溫泉所在必白􅈨丹砂硫磺三物為之根乃蒸為暖流耳樂些溟海永昌志載驃國南盡溟海北通南詔樂些城界東北距羊苴咩城六千八百里楊慎謂溟海即今滇海又謂樂些即杜詩所謂和親邏些城今作麼些其字雖異地一也音一也按羊苴咩城今大理府古南詔所都既東北距大理六千八百里安得以滇池為南履蓋驃國即緬甸僰夷之域南盡大海自阿瓦江頭暹羅浮海而東或通閩粵唐書以南海為溟海而用修承訛遂以為滇海耳又按麼些今為麗江府在大理西北驃國亦不應越大理而北通麼些則謂樂些為麼些者亦非也今臨安府南有麼些勒巡檢司外通沅江老撾諸裔驃國北履其殆是乎崑崙别宫名山洞天福地記云第三西城洞天周回三千里名太元總真之天在梁州西王母所居崑崙之别宫魚湖洞在姚州西銅牆神異經云西南裔外老壽山有宫以黃銅為牆后稷葬處山海經云西南黑水之間有都廣之野后稷葬焉爰有膏粟膏稻膏黍膏稷百榖自生王質爛柯山九州要記在巂州昆明縣軼事莊豪史記前漢書皆云楚威王使莊蹻略滇因以其衆自王後十餘嵗秦滅之按楚自威王後懷王立三十年至頃襄王之二十二年秦昭襄王遣兵攻楚取巫黔中郡若蹻自威王時略地至此凡經五十二年豈得如此淹久其後十五年頃襄卒考烈王二十五年幽王十年王負芻五年而楚滅十五年而秦亡何止十餘嵗乎范曄後漢書云頃襄王時莊豪王滇或云豪即蹻也舊志官師本史漢首稱莊蹻又取後漢書謂豪為蹻裔其實范曄書與注皆無此說明正德間巡撫議祀莊蹻或言蹻與跖並為盜遂止按韓非子曰莊王欲伐越杜子諫曰莊蹻為盜於境內而吏不能禁此政之亂也蓋楚有兩莊蹻一莊王時大盜一莊王裔孫為將軍平滇自王者總之頃襄王為是威王為非莊豪為是莊蹻為非遷固既訛頃襄為威王又惡知不訛豪為蹻作滇志當以范氏為正今仍舊志而附辨於此詔却鸚鵡後漢興平元年蠻夷獻鸚鵡三詔曰往者益州獻鸚鵡三枚夜食三升麻子今米價騰貴此鳥無益有損可付安西將軍楊定國令歸本土石坪三國漢建興三年孔明南征句町北望雲凝如蓋恐有蠻兵潜伏密訪其境就雲之團聚處掘土尺餘遍地皆石其形如盤孔明占云石為雲根雲為文彩千餘年後必有闕方是域而文明儼中州者元至正十年建州為石砰令羅撒巡鎮明太祖易坪為屏琴經三國漢諸葛亮南征嘗撫琴滇人有願學者乃著琴經一卷琴之始及七絃十三徽之音意於是滇人始知琴南詔奉聖樂唐貞元中驃王雍羌聞南詔歸唐有內附心異牟尋遣使楊加明詣劒南西川節度使韋臯請獻夷中歌曲且令驃國進樂人於是臯作南詔奉聖樂用正律黃鐘之均宫徴一變象西南順也角羽終變象戎夷革心也舞六成工六十四人贊引二人序曲二十八疊舞南詔奉聖樂字舞人十六執羽翟以四為列舞南字歌聖主無為化舞詔字歌南詔朝天樂舞奉字歌海字修文化舞聖字歌雨露覃無外舞樂字歌闢土丁零塞皆一章三疊而成舞者初定執羽簫鼓等奏散序一疊次奏第二疊四行贊引以序入將終雷鼓作於四隅舞者皆拜金聲作而起執羽稽首以象朝覲每拜跪節以鉦鼓次奏拍序一疊舞者分左右蹈舞每四拍揖羽稽首拍終舞者拜復奏一疊蹈舞抃揖以合南字字成遍終舞者北面跪歌導以絲竹歌已俯伏鉦作復揖舞餘字皆如之惟聖字詞末皆恭揖以明奉聖每一字曲三疊名為五成次急奏一疊四十八人分行罄折象將臣禦邊也字舞畢舞者十六人為四列又舞闢四門之舞遽舞入遍兩疊與鼓吹合節進舞三退舞三以象三才三統舞終皆稽首逡巡又一人舞億萬壽之舞歌天南滇越俗四章歌舞七疊六成而終七者火之成數象天子南面生成之恩六者坤數象西南向化凡樂三十工百九十六人分四部一龜兹部二大鼓部三胡部四軍樂部龜兹部有羯鼓揩鼓腰鼓雞婁鼓短笛大小觱篥拍板皆八長短簫橫笛方響大銅鈸貝皆四凡工八十八人分四列屬舞筵四隅以合節鼓大鼓部以四為列凡二十四居龜兹部前胡部有筝大小箜篌五絃琵琶笙橫笛短笛拍板皆八大小觱篥皆四工七十二人分四列屬舞筵之隅以導歌詠軍樂部金鐃金鐸皆二掆鼓金鉦皆四鉦鼓金飾蓋埀流蘇工十二人服南詔服立闢四門舞筵四隅節拜合樂又十六人畫半臂執鋼鼓四人為列舞人服南詔衣絳裙襦黑頭囊金佉苴畫皮鞾首飾抹額冠金寶花鬘襦上復加畫半臂執羽翟舞俯伏以象朝拜裙襦畫鳥獸草木文以八彩雜華以象庶物咸遂羽葆四埀以象天無不覆正方布位以象地無不載分四列以象四氣舞為五字以象五行秉羽翟以象文德節鼓以象號令逺布振以鐸明采詩之義用龜兹等樂以象逺夷恱服鉦鼓則古者振旅獻捷之樂也黃鐘君聲配運為土明土德常盛黃鐘得乾初九自為其宫則林鐘四律以正聲應之象大君南面提天統於上乾道明也林鐘得坤初六其位西南西南感至化於下坤體順也太簇得乾九二是為人統天地正而三才通故次應以太簇三才既通南吕復以羽聲應之南吕酉西方金也羽北方水也金水恱而應乎時以象西戎北狄恱服然後姑洗以角音終之姑故也洗濯也以象南詔背吐蕃歸化洗過自新臯以五宫異用獨唱殊音復述五均譜分金石之節奏一曰黃鐘宫之宫軍士歌奉聖樂者用之舞人服南詔衣秉翟俯伏拜抃合南詔奉聖樂五字唱詞五舞人乃易南方朝天之服絳色七節襦袖節有青褾排襟以象鳥翼樂用龜茲胡部金鉦掆鼓鐃貝大鼓二曰太簇商之宫女子歌奉聖樂者用之合以管絃若奏庭下則獨舞一曲樂用龜兹鼓笛各四部與胡部等合作琵琶笙箜篌皆八大小觱篥筝五絃琵琶長笛短笛方響各四居龜兹部前次貝一人大鼓十二分左右餘皆坐奏三曰姑洗角之宫應古律林鐘為徴宫女子歌奉聖樂者用之舞者六十四人飾羅綵襦袖間以八采曵雲花履首飾雙鳯八卦綵雲花鬘執羽為拜抃之節以林鐘當地統象嵗功備萬物成也雙鳯鳴律吕之和也八卦明還相為用也綵雲象氣也花鬘象冠也合奉聖樂三字唱詞三表天下懷聖也小女子字舞則碧色襦袖象角音主木首飾巽卦應姑洗之氣以六人略後象六合一心也樂用龜兹胡部其鉦掆鐃鐸皆覆以綵蓋飾以花趺上陳錦綺埀流蘇按瑞圖曰王者有道則儀鳯在鼓故羽葆鼓棲以鳯凰鉦棲孔雀鐃鐸集以翔鷺鉦掆頂足又飾南方鳥獸明澤及飛走翔伏鉦掆鐃鐸皆二人執擊之貝及大鼓工伎之數與軍士奉聖樂同而加鼓笛四部四曰林鐘徴之宫斂拍單聲奏奉聖樂丈夫一人獨舞樂用龜兹鼓笛每色四人方響二置龜兹部前二隅有金鉦中植金鐸二貝二鈴鈸二大鼓十二分左右五曰南吕羽之宫應古律黃鐘為君之宫樂用古黃鐘方響一大琵琶五絃琵琶大箜篌倍黃鐘觱篥小觱篥竽笙塤箎搊筝軋筝黃鐘簫笛倍笛節鼓拍板等工皆一人坐奏之絲竹緩作一人獨唱歌工復通唱軍士奉聖樂詞雍羌亦遣弟悉利移城主舒難陀獻其國樂至成都韋臯復譜次其聲以其舞容樂器異常乃圖畫以獻工器二十有二其音八金貝絲竹匏革牙角金二貝一絲七竹二匏二革二牙一角二鈴鈸四制如龜兹部周圜三寸貫以韋擊礚應節鐵板二長三寸五分博二寸五分而平背有柄係以韋與鈴鈸皆飾絛紛以花㲲縷為蕊螺貝四大者可受一升飾絛紛有鳯首箜篌二其一長二尺腹廣七寸鳯首及項長二尺五寸面飾虺皮絃一十有四項有軫鳯首外向其一項有絛軫有鼉首筝二其一形如鼉長四尺有四足虛腹以鼉皮飾背面及兩肩如琴廣七寸腹闊八寸尾長尺餘卷上虛中施關以張九絃左右一十八柱其一面飾彩花傅以虺皮為别有龍首琵琶一如龜兹製而項長二尺六寸餘腹廣六寸二龍相向為首有軫柱各三絃隨其數兩軫在項一在頸其覆形如獅子有雲頭琵琶一形如前面飾虺皮四面有牙釘以雲為首軫上有花象品字三絃覆手皆飾虺皮刻桿撥為舞崑崙狀而彩飾之有大匏琴二覆以半匏皆彩畫之上加銅甌以竹為琴作虺文橫其上長三尺餘頭曲如拱長二寸以絛繫腹穿甌及匏本可受三升大絃應太簇次絃應姑洗有獨絃匏琴以斑竹為之不加飾刻木為虺首張絃無軫以絃繫頂有四柱如龜兹琵琶絃應太簇有小匏琴二形如大匏琴長二尺大絃應南吕次絃應應鐘有橫笛二一長尺餘取其合律去節無爪以蠟實首上加獅子頭以牙為之穴六以應黃鐘商備五音七聲又一管惟加象首律度與荀朂笛譜同又與清商部鐘聲合有兩頭笛二長二尺八寸中隔一節節左右開衝氣穴兩端皆分洞體為笛量左端應太簇管末三穴一姑洗二㽔賔三夷則右端應林鐘管末三穴一南吕二應鐘三大吕下托指一穴應清太簇兩洞體七穴共備黃鐘林鐘兩均有大匏笙二皆十六管左右各八形如鳯翼大管長四尺八寸五分餘管參差相次製如笙管形亦類鳯翼竹為簧穿匏達本上古八音皆以木漆代之用金為簧無匏音惟驃國得古製又有小匏笙二製如大笙律應林鐘商有三面鼓二形如酒缸髙二尺首廣下鋭上博七寸底博四寸腹廣不過首冒以虺皮束三為一碧絛約之下當地則不冒四面畫驃國工伎執笙鼓以為飾有小鼓四製如腰鼓長五寸首廣三寸五分冒以虺皮牙釘彩飾無柄搖之為樂節引贊者皆執之有牙笙穿匏達本漆之上植二象牙代管雙簧皆應姑洗有三角笙亦穿匏逹本漆之上植三牛角一簧應姑洗餘應南吕角鋭在下穿匏達本柄觜皆直有兩角笙亦穿匏達本上植二牛角簧應姑洗匏以彩飾凡曲名十有二一曰佛印驃云沒䭾彌國人及天竺歌以事王也二曰讃娑羅花驃云嚨莽第國人以花為衣服能净其身也三曰白鴿驃云答都美其飛止遂情也四曰白鶴遊驃云蘇謾底哩謂翔則摩空行則徐步也五曰鬬羊勝驃云來乃昔有人見二羊鬬海岸强者則見弱者入山時人謂之來乃來乃者勝勢也六曰龍首獨琴驃云彌思彌此一絃而五音備象王一德而蓄萬邦也七曰禪定驃云掣覽詩謂離俗寂靜也七曲唱舞皆律應黃鐘商八曰甘蔗王驃云遏思略謂佛教民如蔗之甘皆恱其味也九曰孔雀王驃云桃臺謂毛彩光華也十曰野鵝謂飛止必雙徒侣畢會也十一曰宴樂驃云龍聰網摩謂時康晏會嘉也十二曰滌煩亦曰笙舞驃云扈那謂時滌煩睯以此適情也五曲律應黃鐘兩均一黃鐘商伊越調一林鐘商小植調樂工皆崑崙衣絳㲲朝霞為蔽膝謂之裓襔兩肩加朝霞絡腋足臂有金寶環釧冠金冠左右耳璫絛貫花鬘珥雙簪散以毳初奏樂有贊者一人先導樂意其舞容隨曲用人或二或六或四或八至十皆珠冒拜首稽首以終節其樂五譯而至德宗授舒難陀太僕卿遣還開州刺史唐次𫐠驃國獻樂頌以獻蒙鄭趙楊段僞號僞諡蒙氏細奴邏自稱竒嘉王僞號髙祖邏盛炎僞號興宗盛邏皮自稱威成王僞號太宗皮邏閣失號諡閣邏鳯歸吐蕃立為東帝僞諡神武異牟尋吐蕃立為日東王僞諡孝桓以父鳯迦異未立死追諡悼惠尋閣勸號驃信帝僞諡孝惠勸龍晟僞諡幽勸利僞諡靖豐佐僞諡昭成世隆僞諡景莊隆舜僞諡宣武舜化貞僞諡孝哀買嗣僞諡威德仁旻僞諡肅文隆亶僞諡恭惠鄭趙善政僞諡惠康聖楊干貞僞諡肅恭素段思平僞號太祖思良僞諡慈素順僞諡應道英僞諡昭明素亷僞諡宣肅素隆僞諡秉義素貞僞諡聖德素興僞諡天明思亷僞諡孝德號興宗正淳僞號中宗正嚴僞號憲宗正興僞號景宗智興僞號宣宗智廉僞號享天智祥僞號神宗祥興僞諡孝義閣邏鳯降吐蕃始改元長夀異牟尋改元曰見龍曰上元尋閣勸改