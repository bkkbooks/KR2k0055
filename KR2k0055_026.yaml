body:
  text: 雲南通志巻二十六古蹟附塚墓天地無心而呈象而耳目所及表為神竒人事日出而更新而成毁不常垂為法鑒是以世閱今而成古蹟歷久而不磨尚論者溯厥由来多識者資其聞見凡屬方隅名物之賾悉羅編摩紀乗之中也滇居南裔後服而易叛憑髙騁眺歴代之城壘蠻族之堡屯猶有存者記其處核其事籌邉控逺之規宛在目前矣至泉石景物幽勝殊瑰昔之人構建題識於其間雖多漂零剥落什不存一而流風未泯則故實可徴也若夫生有爵號及名行足稱者體魄所歸英爽如在亦考古者之所必及志古蹟塜墓附焉雲南府昆眀縣附郭金馬闗城在城東七里元梁王築址存廢昆州在城西闗内即舊益寧縣隋置尋廢唐武徳元年復置後廢官渡廢縣在城東南二十里有古碑相𫝊蒙氏摩訶嵯與三十七部會盟立秦臧廢縣在城西五里漢置屬益州郡晉屬晉寧郡宋齊因之後廢唐復置屬昆州天寳中沒於南詔建伶廢縣在城西北八十里漢置屬益州郡晉屬建寧郡永嘉中改為晉寧郡後沒於蠻穀昌廢縣在城北七里一名苴蘭城莊蹻王滇時築漢置縣後廢址尚存旁有玉女城元時梁王所築漢學基在城内漢元封元年帝使司馬遷南畧昆眀二年使韓說開益州授經敎學故𫝊其基梁王宫在城内元末梁王巴咱爾斡爾宻建眀初改岷王府今廢宸章閣在學宫内元建以藏璽書名御書閣後改曰宸章明沐晟重修敬思堂在城内眀洪武二十五年西平侯沐春建僉都御史河南程本立有記棲鳳亭在城内眀時黔國公沐崑建水雲鄉在城西湖上眀黔國公别業一名西園有樓名簇錦前賢題咏最多海莊在城西南髙嶢山下眀修撰楊慎謫滇僑居於此上建碧嶢精舍又有停舟煙舎在官渡俱慎遊憇之所遺址尚存梵字塔在城東地藏寺周遭皆刻梵書上覆以閣昔人拆其頂黒氣直射而出因封之如故白塔在城東三里通衢中元萬慶寺塔也今寺廢塔存穿心塔在官渡俗𫝊有螺為魅建此鎮之其處有山皆螺殻積成居民平地掘井深二丈餘惟見螺殻竝無雜上東西二寺塔在城南一里許相𫝊唐尉遲恭建妙音講寺塔在大西門外相𫝊唐尉遲恭建元延祐間有番僧講經於此適蟊食禾僧掘一坑匝繞講經七次蟊盡入坑移塔於寺後鎮之梁王堆在城外老崔橋歸化寺諸處昔有人發之得古匣一孔聖遺像碑在學宫尊經閣内唐吴道子筆黔寧王碑在城内昭靈觀河南程本立記諸葛碑在城東二里舊漢營唐廣徳初鳳迦異築拓東城得之其文曰碑即仆蠻為漢奴蠻懼嘗以石搘之金蟬闗碑在城西羅漢山眀楊慎書王褒移金馬碧雞文於上藏真帖石碑在學宫尊經閣内本朝康熙三十年改建新學總督范承勲出家藏唐僧藏真所書千字文真蹟摹刻石上嵌之壁閒牛井在羅漢山巖下眀嘉靖初有趙道人修煉於此苦無水以牛載汲垂二十餘年一日牛忽死其處即湧一池味甚甘洌雖盛暑不竭優曇花樹在城内土主廟中髙數丈枝葉扶疎每嵗四月花開如蓮有十二瓣嵗閏則多一瓣相𫝊南詔盛羅皮時有僧菩提巴波自天竺来以所攜念珠分其一種之今枯富民縣梨灢城在城東三里元置千户所於此蒲團草在城西南五里距靈芝寺數十武眀建文帝經過以蒲團趺坐於此至今草下垂留蒲團跡土人立石誌之宜良縣八古城一在城東陳家渡一在城東五百户營一在城東北彌沙龍一在城東南竹瓦村一在城西巖泉寺一在城北城北村一在城北江頭村一在城北街子諸葛營在城南門外自小石嶺至中營地址方五里羅次縣古城有三昔時諸蠻所築皆距城二十餘里各周二百餘丈一曰赤城在城南一曰黑城在城北一曰白城在城東北隅白城内有聖化寺本朝康熙五年重修此寺磚瓦上有宣光字乃元順帝太子立於建昌年號也今城廢址存押赤城在城東南二十里舊為烏蠻所居元烏蘭哈達攻羅部進據其城及征交阯還復駐軍於此大饗士卒羅部城在城北二十餘里昔蠻酋恃險處黄龍寨在城西北二十五里相𫝊梁王屯糧於此至今山頂石如米形可愈瘧疾月影池在城南二十里月影庵内月晦時池中有影晉寧州天女故城在城西五里晉太興初寧州刺史李毅病卒衆推毅女秀領州事城盖秀所築古土城在城西北五里隋刺史梁毘築有九門十二衢今廢滇池廢縣在城東十五里漢置屬益州郡梁以後縣廢大甫廢縣在城南二十里元至正間置後廢晉寧廢縣在城西二里唐武徳中置䝉氏廢為陽城堡龍馬跡在城東三里海溪山晉㤗元中寧州刺史費統上言滇池有二龍馬一黑一白出入水中居民董聰見之呈貢縣伽宗城在城西二十里宋時大理髙智昇令上官伽宗築因名小古城在城北五里許髙丈餘相傳梁王屯兵於此歸化廢縣在城東南二十里地名大吴龍昔吳氏居此後為些莫徒蠻所有元割大吳龍安江安淜地置縣築土城眀嘉靖中易以石本朝康熙七年省入呈貢故址存鄒元標碑係元標手書在歸化城内安寧州河東州城在城東南葱䝉卧山之東唐時置州於此土人稱為華納城江東城在城東南二十里段氏所築元初廢又北有青籠城皆蠻酋恃險處今為村安寧所城在城南眀洪武中築今州之南門即所城之北門蒙氏城在州學後故址尚存三泊廢縣在城南三十里元至元十三年置眀因之本朝康熙八年省入昆陽州雍正三年以其地歸安寧址尚存禹碑原碑在南岳岣嶁山峯皆蝌蚪古篆眀修撰楊慎摹鐫於州東法華寺石壁王仁求碑在城南葱䝉卧山有漢人城舊址碑尚存清禪塔在城西北十里曹溪寺之右即聖水三潮處祿豐縣巔裒城在城南唐蠻酋阿裒所築即今古城驥琮籠城在城東北姚林山其地炎瘴惟烏雜蠻居之遷徙不常元至元十二年割安寧千户之碌琫化泥及驥琮籠三處置縣俗名碌琫後易為祿豐諸葛臺在城西三里武侯征孟獲凱旋駐軍於此聚米山在城北法泥白夷村相𫝊武侯南渡軍士乏糧蠻酋追之就山邱聚米為堆以紿蠻人昆陽州巨橋城在城東堡子屯宋時髙氏築元設巨橋萬户府即此大小石城俱在城北三十里其石環圍如城本朝康熙三十三年按察使許宏勲鐫大石城壁曰湖天鎻鑰小石城壁曰雲莊柘東龜城在城北平定鄉唐開元間南詔盛羅皮遣張建成入朝時築見南中志望水廢縣在城西二里唐貞觀十一年改南籠州為鈎州領望水唐封二縣後廢河西廢縣在城西河西郷元至正閒置尋省入州古柏在城西門内城隍廟大數圍髙十餘丈𫝊為宋時髙氏植易門縣阿烏砦在城北八十里四圍峭壁莫能攀躋向南有石門瀉出清流危磴盤旋僅容一騎昔酋長阿烏據之石柱在城西三十里黎崖山山形如馬首夷賊每出刼擄必祭此山明萬厯中廵撫鄒應龍按部至此時自甸末至㠄峩二百里閒諸夷皆叛應龍殺一賊竝馬首瘞之𥪡石柱於上表曰此後賊不祭自是叛者悉附村民神而祀之於柱後建八角亭今亭廢柱存嵩眀州舊金城在城内黄龍山昔時漢夷雜處漢人築城居焉址存集興籠城在城南十五里相連有梅堂阿葛籠䝉琮籠白籠諸城周迴數十里俱南詔時楊祐所築今皆為村落畧有其基楊林廢縣在城南四十里雜蠻枳氏車氏斗氏麽氏故地城東門外羣石如羊形故又作羊林唐時有羊林部落即此地元憲宗七年立楊林千户後改為縣眀成化中省入州址存邵甸廢縣在城西四十里雜蠻車氏斗氏舊地原名束甸後以束為邵元憲宗七年立邵甸千户尋改為縣眀成化中省入州城址尚存蠻盟臺在城南里許昔為漢人居後烏白蠻强盛漢人徙去盟誓於此因名又傳武侯南征與蠻酋盟所築旁有盟泉武侯祠竝碑曲靖府南寧縣附郭靖州故城在城南十五里唐置俗名南城址尚存龍和故城在城西南十五里唐開元中南詔閣羅鳳遣楊牟利以兵脅西爨徙户二十餘萬於永昌東爨以言語不通得不徙自曲靖州石城升麻昆川南北至龍和皆殘於兵廢越州在城南六十餘里本唐恱州其川名魯望後為爨蠻所據號普麽部元憲宗時内附立千户所後改越州明洪武中越州渠長龍阿資叛傅友徳擊破之尋廢州置衛今城尚存廢協州在城東北二十里隋置唐武徳八年析置靖州天寳末俱徙治戎州遂廢廢味縣在城西十五里三岔驛漢置舊名共範川唐為南寧州治故城址猶存石城廢縣在城北二十餘里唐貞觀四年置莊州領縣七十城其一也武侯閣在城北迎恩門外李元禮碑在城南一里上刻篆書漢光和五年閏四月十五日漢李元禮等字餘莫辨𫝊為李膺遭黨錮流其妻子門人於此爨府君碑在城南十餘里為興古太守爨府君立石城碑在城北二里許昔段氏破楊干貞與三十七部落會盟立本朝康熙十八年營兵於土中掘出碑字猶存八塔在城東五臺山下相傳諸葛武侯建雙井在城化闗外一井兩竅𫝊武侯所鑿霑益州西平廢州在城東二里唐武徳四年置貞觀中改名盤州元至元十三年改霑益州領交水石梁羅山三縣眀洪武十五年改遷州治舊址存石梁廢縣在城東五十里本磨彌部酋所居元置縣眀洪武時廢址存羅山廢縣在城東南一百二十里平夷鄉舊磨彌部東境夷名落蒙山元羅縣眀永樂初廢址存交水廢縣在城南二里舊名陬籠城元至元十三年立為縣屬霑益州眀永樂初廢置交水稅課局天啓三年築城今局廢城存盤江廢縣在城南九十里晉元帝末年爨亮據盤南刺史王遜討之不克遜卒刺史尹奉募外夷刺殺亮盤南平割興古盤南地置盤江南如南零三縣後廢址存陸凉州木柵羲城騎思籠城俱在城東南中涎澤上今廢鹵昌城在城西南五里許舊州城在城東北二十五里如本朝康熙初州城圯而衛城堅完故後裁衛歸州因移州治於衛城内今舊州城址尚存河納廢縣在城西南八十里地名菜村元置陸凉州領芳華河納二縣眀永樂初省入州芳華廢縣在城西四十里本落溫部之地蠻名忻歪又名部封元初置千户至元中改為縣眀永樂初省入州馬龍州尚灒城在城東南四十里又有廢耶城皆蠻所築魯婆伽嶺廵司故城在城南黄土坡眀洪武十八年建舊有廵司今裁城存馬龍所故城在城北里許眀永樂二年置存本朝康熙二十年所裁城廢麻州在城北里許唐貞觀二十二年置永徽二年朗州白水蠻反寇麻州朗州都督趙孝祖討平之即此律髙廢縣在城東漢置後廢晉咸寧元年分建寧郡修雲俞元二縣復立律髙縣梁末廢元以其地置馬龍州西安廢縣在城東二十里晉末析律髙縣地置齊曰西中縣為興古郡治梁末廢通泉廢縣在城西南四十里盤瓠後内垢之孫易􅑍分居其地元初置易籠百戸至元十三年改為通泉縣屬馬龍永樂初省入州方圓塔在城西南羅甸村一方一圓俱元梁王建義象塚在城北闗外眀天啓四年安效良叛至馬龍景東土兵統象馬逆戰大破之一象奮勇衝陣被流矢死廵撫王伉立碑建坊表曰忠勇義象羅平州漏卧廢縣在城南八十里漢置蜀漢建興二年分建寧牂牁立興古郡領漏卧宋為興古郡治齊仍屬興古郡梁末廢土官寨一在城北十里一在城東淑龍山林木猶存梁王堆在城南二十里凡數處相𫝊梁王屯糧之所方圓塔在城西六十里竜甸村元梁王建一方一圓上有篆文尋甸州仁德府故城在城東五里元至元十三年置領為美歸厚二縣眀洪武十五年改尋甸府成化十五年遷今城北一里址存鳳梧所故城在州東城内眀嘉靖六年建本朝康熙五年裁城存木宻所故城在城東南七十里眀洪武二十三年建本朝改置木密守備仍管守禦事今裁城存尋甸故城在城北一里明成化十五年築土城後徙魯兀山下嘉靖十二年遷今治歸厚廢縣在城西一百三十里地名易郎南籠舊屬