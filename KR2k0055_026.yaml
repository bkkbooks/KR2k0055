舊址尚存洞中水流不竭諸葛井在城東二十五里哀牢山上有二穴相去一寸五分各圍三尺許形圓如盌水可飲千人夜有火光孟春月居民視井水盈涸以占嵗之豐歉相𫝊武侯鑿以濟軍者萬箭樹在城東北四十里天井山北段氏時濮蠻為盜出沒於此行者射其樹以厭之箭集如蝟騰越州諸葛城在城東髙黎貢山分水嶺舊𫝊武侯所築一夜而成羅宻城在城北二十里舊為蠻酋所居濠塹猶存又州西二里平原中有西源城遺址相𫝊為段氏所築順江廢州在城南二十里元至元十一年置尋廢至正七年酋長樂孫求内附立宣撫司尋又廢古勇廢縣在城西一百里元至元中置尋廢越甸廢縣在城東北四十里元至元中置尋廢尚書營在城北三十里眀靖逺伯王驥駐兵處鎮夷石堆在城西南三十里矣羅山後髙丈餘武侯屯兵處黄牛石在城西北二百五十里馬回闗山旁壁上土人逺渉險阻必祭而後行永平縣博南廢縣在城南後漢置其地今名江東村諸葛寨在城北三里武侯駐兵之所石塔在城西潞江西岸相𫝊武侯征孟獲時建有大樹裹塔隂周十餘畞鶴慶府廢守禦所在城北四十五里眀洪武二十年置本朝康熙五年裁諸葛寨在城南一百四十里羅陋村武侯駐兵處松桂營在城南六十里眀潁川侯傅友徳征佛光寨駐兵於此清虚閣在城北八里眀知府馬卿建吴堂作記閣跨白龍祠山麓山亘數十里最髙一峯名金山有泉下注為白龍潭贊陀石洞在城東十里石寳山頂之隂昔西僧贊陀啒哆自西竺来栖此一盌水在城東南大城坡頂昔䝉氏軍過此渇甚斫地得水象跪石在城北八里石如狼牙昔元世祖自麗江乗一白象至此象跪不行因名劒川州望徳城在城南三里周五百丈段氏所築今名水寨村又東北段氏里有城即元世祖入大理駐師處羅魯城在城南十五里唐時築今名瓦窰村千光如来像在城南三里水寨村䝉氏征麽些渡金沙江遇水逆流取以刻像號千光如来順寧府守禦所故城在城西南二百里矣堵十三寨之中右甸川之西山麓眀萬厯間廵撫陳用賔築為郡城藩蔽周二百丈有竒今遺址尚存慶甸廢縣在城南八里元天厯元年置眀洪武十五年廢孟獲遺寨在城南一百八十里孟獲為武侯所縱南走慶甸今有遺址聚書樓在府東城内土知府猛寅購經史子集建樓貯之又名萬卷樓諸葛碑在猛𬗟之邦鳳山碑文蘚剥多不可辨中阿山銘眀正徳中有人於中阿山鋤田得一石方尺許上有鐫文曰襟滄江帯錫河為崑崙山冢子厥名中阿餘尚有十數字剥落難辨武侯石柱在右甸逹丙里田畦間相傳武侯製以懾服羣夷者觀音接路在城北阿魯司泥山當兩山路絶處宋祥符中一夕風雨忽成坦途𫝊為大士顯靈三台相井在三台山東北百里舊志謂武侯平蠻軍至此苦無水見一老嫗指地得泉味甘冽因呼為觀音井亦名三台相井江流佛像在城東四十里眀嘉靖中土人漁於蘭滄江忽見江水逆流視之乃銅觀音像遂奉於萬慶寺雲州大侯州故城在城南即州舊治與雲夢接壤土名大侯寨眀正統三年改為州土酋奉氏世為知州萬厯間有奉赦奉學弟兄不相能分上下二衙赦居大侯為上衙學居下衙去大侯南十里不受制於赦雲夢土官猛廷瑞學婿也助學搆兵二十五年討平之改雲夢為新州赦守大侯如故後赦子奉光復抗命二十六年再討之改為雲州州舊係土城三十一年遷於大栗樹鎭為今州治故城存猛氏寨在城東一百二十里上有龍馬泉溫泉永北府廢順州在城西一百二十里唐時地名牛睒南詔徙諸浪人居之與羅落蠻雜處元初内附至元十五年置順州屬麗江路明洪武十五年改屬鶴慶府萬厯二十八年築土城本朝康熙八年省州入府三十八年以其地改屬永北府蒗蕖廢州在城北八十里地名羅共羅落麽些蠻世居之元至元九年内附改為州眀天啓中廢㟍峨舊縣在城南三十里㟍峨村䝉氏時築遺址尚存祭鋒臺在城南二十里武侯征南時祭劒於此石壁觀音像在城東山石壁間唐吳道子筆麗江府通安廢州在城東三里昔名三睒濮繲蠻所居其後麽些蠻葉古年奪據漢為定苲縣地屬越嶲郡唐改定苲曰昆眀屬巂州天寳後為越析麽些詔元憲宗三年内附中統四年以麥良為三睒管民官至元十四年置通安州屬麗江路眀因之本朝省入府寳山廢州在城東二百四十里漢越巂郡西境後漢屬永昌唐為麽些蠻所據元憲宗三年内附名其寨曰茶罕忽魯罕至元十四年置寳山縣尋陞為州屬麗江眀因之本朝省入府址存廢蘭州在城西南三百六十里漢益州郡西北境後漢永昌郡地唐屬南詔為盧鹿蠻所居元憲宗四年内附𨽻茶罕章管民官至元十二年置蘭州屬麗江路眀洪武十五年改屬鶴慶後仍歸麗江本朝省入府址存巨津廢州在城西北三百里舊名羅波九睒西鄰吐蕃麽些大酋世居之元憲宗三年内附至元十四年於九睒置巨津州屬麗江路以鐵橋為南詔吐蕃交會之大津渡故名眀因之本朝省入府址存臨西廢縣在城西北四百六十里巨津廢州之西蠻名羅裒間居民皆麽些二種蠻元至元十四年置臨西縣以西臨吐蕃故也𨽻巨津州眀洪武十五年改屬麗江府正統二年為番人所據僅存一寨今名他照和村鐵橋址在廢巨津州北一百三十里為南詔與吐蕃交會處鐵橋之建或云吐蕃或云隋史萬嵗及蘇榮或云南詔閣羅鳳異牟尋歸唐時斷以絶吐蕃橋南有鐵橋城為吐蕃十六城之一嘗置鐵橋節度於此橋所跨處穴石錮鐵為之冬日水清猶見鐵環大匱寨遺址在廢寳山州東唐麽些蠻兄弟七人居之曰大匱曰羅邦曰羅寺曰礙塲曰卞頭塲曰當坡羅塲曰當郎將元世祖南征至大理俱内附芝山洞在城北雪山西南麓林木幽異巖畔有洞旁建解脫禪林眀熹宗賜名福國石鼔在城西七十里金沙江邉相傳武侯南征立以鎭土番蒙化府巄􅬗圖城在城西北巄􅬗山周圍四百餘丈昔細奴邏築此城以居今尚有所遺石柱又府東梅子箐山頂亦有城基周圍十六門其規模又倍於巄􅬗焉䝉舎故城在城北十五里古城村張氏讓國䝉詔築城以居今舊址猶存定邉廢縣在城東南一百里唐時為濮落蠻所居地曰南㵎元初於南澗置定邉縣𨽻鎮南州尋廢眀初復置縣𨽻楚䧺府本朝雍正七年省入䝉化府䝉化廢衛在府東城内眀洪武二十三年置本朝康熙六年裁金牛山寨在城西南十里昔䝉氏屯營之所遺址尚存䝉氏寨在城北二十五里孤峯陡峻有三濠皆深丈許今尚有瓦磵雷石之類鐵柱在城東箐口北一里髙七尺徑三尺相𫝊武侯南征時鑄上有建極十三年壬辰四月庚午朔十有四日癸丑鑄十九字按建極乃南詔酋龍僣號恐年久剥落當時添補之也盟石在城北二十里唐時張樂進求遜國細奴邏邏祝曰我當得國劒斫入石果入三寸今石上猶有劒㾗石箭在瀾滄江廵檢司北二里有石長七尺徑二寸上銳如鏃下圓如幹相傳武侯所遺景東府玉筆城在城西景董山眀洪武中建衛城復於山巔别為小城周圍三十餘丈東開一門本朝康熙九年建營於此名玉筆城景東廢衛在城西北五里眀洪武二十三年置本朝康熙二十六年裁城址猶存塚墓附雲南府隋爨王墓在府東十五里題曰昆明隋西爨王之碑成都閭邱均撰文洛陽賈餘絢書丹碑今無存唐河東刺史王仁求墓在廢三泊縣南二十里有碑銘嵗久剥蝕元梁王墓有二一在府西進耳山王名博囉一在安寧平頂山咸陽王薩達克齊墓在府東五里眀王忠文公禕墓在府東二里地藏寺後都督沐璘墓在府西北十餘里普吉村都御史李純墓在府西玉案山贈光祿少卿毛玉墓在府西十里班莊村兵部侍郎孫清愍公繼魯墓在府西北里許光祿少卿施昱墓在府西十里朝宗山贈刑部尚書嚴暠墓贈刑部尚書嚴鍈墓俱在府東六里歸化寺前吏部尚書嚴恭肅公清墓在府東北羊腸村後都御史朱運昌墓在府東十里麥沖山麓兵部尚書傅忠壯公宗龍墓在府西十里棋盤山下廵撫四川都御史馬乾墓在府西北普吉村叅將沐詳墓在呈貢縣東南十里洛龍河贈吏部尚書楊情墓贈吏部尚書楊福山墓俱在安寧州太保山都御史張素墓在安寧州西二十里巃嵸山曲靖府元梁王墓有八在府東羅漢山諸處眀光祿少卿胡潔墓在府東六十里廢越州城北廵撫陕西都御史唐時英墓在府北五里白石江上布政使朱家民墓在府西十五里王家屯吏部主事李希揆墓在府南十五里任烈婦墓在府西五里有碑臨安府元董莊愍公文彦墓在府西一里羣節墓在府北白鶴舖元末盜起回回羅壘丹等四十一人隱居山谷中盜脅之不從俱被害身首異處經宿復合衆異之叢葬於此眀江孝子墓在府北一里孝子不知何處人任本府通判有孝行天順庚申卒葬於此題臨安别駕孝子江惠墓副都御史王恩民墓在府西十五里南京操江僉都御史蕭崇業墓在府北白鶴山贈吏部侍郎包萬化墓吏部侍郎包見捷墓俱在白鶴山都指揮僉事萬城墓在府東五里回龍山郭夫人虚墓在河西縣西五里普應山縣令廣西全州蔣良之妻疾終厝於此扶喪歸縣人慕良徳政為營虛墓有叅政宋應登撰蔣公郭夫人虚墓碑澂江府漢漢興亭侯李恢墓在府西五里宋丁連然君墓在江川縣北三十里北山上覆臣石有耕者坐於上石忽動耕者驚異啓視之上勒丁連然君神道按宋史太宗時有交王丁連然来朝疑即其人元右丞相伊喇墓在府東三里缺摩山臨安路總管段文瑞墓在府東北重珠山武徳將軍閈里伯墓在路南州南紫玉山眀御史王昭墓在府南官南山洪武間流寓武定府元行省叅政安慈塚在府東北三十里龍三藏烈婦墓在府南舊和曲州名氏不可考廣西府眀叅政李公墓在府北山麓委勘事卒葬此建有廟名籍無考光祿大夫太子少傅兵部尚書楊䋲武墓在彌勒州南玉枕山大理府漢白王墓在府北十五里無為寺後唐天寳戰士塜即萬人塜一在府南龍尾闗東一在趙州北唐天寳中鮮于仲通李宓伐南詔戰亡士卒閣羅鳳収葬之御史杜光庭墓在府西南玉局峰下光庭流寓南詔以文章教䝉氏之民卒後䝉學士爨㤗葬之於此段赤城墓在府南二十里赤城誅蟒除害人徳之為之立墓五代悼康墓在浪穹縣南山根村南詔趙善政偽諡悼康歿葬於此元安撫瑪蘓庫墓在府東龍佉里咸陽王第五子治鶴慶大理二路眀大軍封在府西南一塔寺後潁川侯取大理時斂亡卒而封之翰林李元陽墓在府西北三塔寺右都御史趙汝濓墓在府南龍尾闗麓汝南王妃墓在府西北雪山永樂閒封王於大理妃姓丁氏叅政鄒堯臣墓在趙州象山給事楊志墓在鄧川州南六里正統中從戎卒葬此兩忠墓在浪穹縣潛龍庵旁建文從亡臣葉希賢楊應能葬處御史趙昇墓在賓川州棑栅營楚䧺府元金牌司墓在廣通縣羅苴甸西山𫝊為元時亞中大夫威楚開南等處總管髙禾成葬處眀副使楊文烈公畏知墓在府北三里姚安府戰國楚小卜墓在府西北楚莊蹻之將平定滇中戰歿葬此永昌府漢陽遷亭侯吕凱墓在府東金雞村哀牢夫人墓在府東哀牢山三國漢孟優墓在府南八十里地名猛波羅唐杜光庭子墓在騰越州南龍鳳山光庭將子入南詔子卒葬此其名無考王狀元墓在府北大寺山其名無考元騰衝府知府髙㤗墓在騰越州南龍鳳山騰衝府知府孟光墓在騰越州北千峩寺左眀戸科給事中陳以仁墓在府南龍泉門外圓通寺後洪武中謫戍金齒卒葬此都督僉事胡誌墓在府西九隆山戸部侍郎張志淳墓在府南黄竹山贈光祿少卿薛繼茂墓在府東南三十里桃花屯東河邉三忠墓在府東闗坡孫可望入滇通判劉廷標推官王運開竝弟