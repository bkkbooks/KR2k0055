雲晃河曰雲籠在司東二十五里曰白蓮在司北六十里中挺一峯土官居其麓下有白蓮池曰剌朋在司西百餘里其水曰安樂河源出騰衝經南甸迤邐治北折而西百五十里入檳榔江境內甚熱四時皆蠶有白㲲布白蓮花竹大如兔而肥舊額徵差發銀五十兩南甸宣撫司舊名南宋在騰越南半個山下其山巔北恆有霜雪南則炎瘴如蒸元至元二十六年置南甸軍民總管府領二甸明洪武初刀貢猛本姓龔江南上元人因隨師南征住南甸改姓刀以招撫曩猛功授騰衝千户永樂中其弟貢蠻入貢改升南甸土知州正統八年刀樂硬以麓川功升宣撫司傳至刀樂臨以平嶽鳳功升宣慰司轄部有羅部司莊小隴川皆百夫長分地知事謝氏居曩宋悶氏居盞西屬部直抵金沙江與孟養地犬牙相錯萬厯二十一年巡撫陳用賓檄知府漆文昌建關置堡於司西北今不復存自刀樂臨襲後厯傳至樂啓樂啓傳子樂保樂保傳兄呈祥本朝平滇呈祥投誠授宣撫世職呈祥死子啓元襲啓元死今子恩賜襲其地有丙弄山在司東十里又東五里蠻千山土目憑險阻居其上沙木籠山在司南百里上有關立木為柵南牙山甚高延袤百餘里官道經之上有石梯夷人據此為險其水曰小梁河源出騰衝赤土山麓西南流經南牙山下曰南牙江至干崖為安樂河而合於太盈江有孟乃河在司東南七十里即騰越龍川江之源俗與木邦同婚娶用穀茶二長筒雞卵五七籠為聘客至以穀茶供奉手拈而食之産紅藤孔雀呌雞舊額徵差發銀一百兩今納差發銀十一兩遮放副宣撫司隴川之二也明正統元年多懷們從征猛卯夷有功授遮放副宣撫司孫思談於萬厯中從征蠻莫緬瓦隴川纍功益以隴川地領隴川多俺為同知居猛卯多茶為副使居遮放沿至多爾忠賢本朝平滇爾忠投誠仍授世職爾忠死子賢輔襲輔死子世祿襲世祿死今子多量襲盞達副宣撫司干崖之二也明正統四年怕便以從征麓川功授盞達宣撫司賜名刀思忠傳至思官以木邦罕氏勾緬破城為緬所獲兄思權襲以平猛廷瑞功賜繡衣傳至思韜本朝平滇思韜投誠授副宣撫世職思韜死子思鉉襲思鉉死子思琳襲思琳死今子思弼襲潞江安撫司蠻名怒江甸元隸柔遠路明洪武十五年曩壁法內附授長官司職永樂九年升安撫司賜姓線氏傳九世至線有功崇本朝平滇有功投誠仍授世職有功死姪崇毅襲毅死子國勳襲國勳死子于陛襲于陛死今子朗襲額徵差發銀八十兩芒市安撫司蠻名怒謀又曰大枯睒小枯睒即唐書所謂芒施蠻也元中統初內附至元十三年立芒施路軍民總管府領二甸明洪武十五年置芒施府正統九年放定正隨征緬有功授芒市長官司萬厯初放福與嶽鳳聨姻十一年導緬寇松坡事覺擒福正法立其舍目放緯領司事轄於隴把緯傳珀珀傳廷臣以入貢加授安撫司職傳子國璋國璋傳愛衆本朝平滇愛衆投誠仍授安撫世職愛衆死子彌高襲彌高死子天球襲天球死今子仁襲其地川原曠邈人稍脆弱男子以石榴皮染齒使黑婦人分髮直額為一髻垂於後跣足衣皮西南有青石山又有永貢幹猛二山皆高廣陡絶夷長所居其水曰芒市河麓川江皆流至緬地合大盈江曰大車江自騰越流至司境匯於緬中蒲甘城地産香橙橄欖芋蔗額徵差發銀七十兩猛卯安撫司明萬厯初有猛密頭目思化敗緬於送速緬逐之入居蠻莫朝廷嘉之授蠻莫宣撫司思化死子正嗣緬潛師深入挾取正首而去後又立正之弟忠改姓衎授安撫司職數被緬侵勢不能支因安插於猛卯卒為緬所虜殺舍目瓏襲瓏傳瑾瑾傳珍珍傳瑄本朝平滇瑄投誠授猛卯安撫司世職瑄死子珌襲珌死今子志襲孟連長官司由姚關東南行十九程至其地又七程至孟艮其東為車里西為木邦蠻名哈瓦慓悍好劫自古不通中國明正統中平麓川始來歸萬厯間其長刀派真有叔刀派漢娶於車里因以車里殺派真而奪其官十二年率車里來貢十九年又勸緬入貢派漢死弟派金嗣天啓二年阿瓦破之會洞吾代阿瓦阿瓦退其差發額銀四十八兩稱本朝雍正八年總督鄂爾泰奏據土司刀派夷呈仰皇賴洪福安享太平年年豐稔情願自雍正七年為始上旨每年納募乃厰課銀六百兩以充兵餉奉各抒誠效孟連地處極邊總督鄂爾泰化導有方俾順貢納厰課孟連土司厰課每年六百兩為數太多著減半收銀三百兩以昭朕柔逺至意其雍正八年已解司銀六百兩著將一半即準作辛亥年正課飛永平縣縣丞元時有馬氏世為土副使明初馬鎖歸順授縣丞沿至馬一騆一駿一騄騄傳渥相本朝平滇騄投誠仍授世職傳至燕以父子同惡濟於雍正五年革職氏施甸長官司莽鳳溪長官司莽氏把事張氏甸頭土巡檢司莽氏水眼土巡檢司莽氏統中楊霖從征麓川授世職打牛坪土驛丞明正騰越州龍川江驛土驛丞王氏百夫長刀氏永平驛土驛丞李氏打牛坪土巡檢蒙氏氏土官二一正千戶一副千户右甸守禦千戶所蔣保以上十二土官舊志開載今久革除人峨昌諸夷山縣有十五喧二十八寨併大僰蒲其蠻長或以百夫長稱或以千夫長稱或以實授百戶稱皆奉命令復徭役但性勇悍不能驟格又為市獪所誘漸習姦偽耳考其見於尺籍者敢頂上下喧罕氏旱納喧線氏石册寨施甸東山寨下騰場寨金齒東山寨甸頭寨保場甸烏邑寨七莽氏皆副千夫長也古里喧旱氏蕩習喧孟氏蠻雲喧旱氏西牙喧線氏渡艮邑寨木瓜郎寨阿思郎寨南窩寨周册寨信邑寨瓦窰寨七莽氏北衝寨羅明寨羅古寨羅板寨四旱氏潞江寨左氏皆百夫長也蠻岡喧帚氏錦邑寨老姚寨交邑寨牛旺寨山邑寨五莽氏皆實授百戶也蒲縹寨莽氏火頭也外此以喧稱者尚有崩戛喧賓氏蠻雷喧旱氏空廣喧罕氏蠻寬喧幸氏剌倫喧旱氏蠻養上喧蠻養下喧刀氏以寨稱者尚有枮柯寨明邑寨茶山寨乾海子寨其十五喧皆存惟二十八寨中有裁革者有歸併者有更名者蠻長或以土舍稱或以總旗鄉導稱不能悉記老附録民宣慰使司其夷佩雕爪為飾俗呼撾家即撾軍古越裳氏自周以後不通中國明永樂三年以方物入貢始置軍民宣慰使司嘉靖間緬人破其東之纜掌亦名南掌蓋老撾屬部地之最荒遠者貢本朝雍正七年南掌國遣頭目叭猛花等奉表進賞賚遣還其地東至水尾界南至交址界西至八百界北至車里界自司西北六十八程至省城其人服食類木邦但性獷悍身及眉目皆黥繡花其長一代止存一子承襲絶不育女居髙樓見人不下部屬見之所至有等限使客亦然其國人稱至尊必曰天旺其産海貝犀牛乳香訶子木邦軍民宣慰使司舊名孟都一名孟邦相傳蜀漢時木鹿王苗裔元至元中立木邦軍民總管府領三甸明初內附改木邦府後改木邦軍民宣慰使司徵差發銀一千四百兩明永樂間罕賓從征緬正統中罕蓋從征麓川有功益其地在六慰中分土最廣萬厯中緬誘執罕拔襲取木邦拔子盡忠奔內地緬追至姚關焚順寧而去十一年官兵破緬立盡忠子欽欽死其叔罕􅗩約邏羅攻緬緬恨之遂以三十萬衆圍其城請救於雲南援兵不至城陷緬以猛密司禮領之司禮憑恃瓦夷差其目海慶據控尾求猛搻寨又與召依坎換象干戈相尋焉其地東為孟定南為猛密西為緬甸北為芒市自姚關渡喳哩江十二日至其地夷類數種男子皆衣白文身髠髮摘髭鬚修眉睫婦人則白衣桶裙耳帶金圈手帶象㻿其産響錫胡椒甸軍民宣慰使司夷名景邁世傳其長有妻八百大八百各領一寨因名八百媳婦國元初征之不下後招附置八百等處宣慰司明洪武中來貢乃立八百大甸軍民宣慰使司其地東至車里界南至波勒蠻界西至大古剌界北至孟艮府界自姚關東南行五十程至其地有南格剌山下有河南屬八百北屬車里平川數千里轄部廣逺其産巨象及安息白檀諸香民皆僰夷刺花樣於眉目間見客則把手為禮好佛惡殺一村一寺一寺一塔塔以萬計敵人侵之不得已出師得其仇而罷名慈悲國嘉靖間其酋刀氏為緬所逼避居景線名小八百緬以其弟莽應龍居景邁城為一臂萬厯十五年刀氏請兵恢復未許後竟為緬有孟養軍民宣慰使司俗名迤西有香柏城與蠻莫同襟金沙江孟養居其上流南至底馬撒江連西洋北極吐蕃西通天竺東南鄰於緬山曰鬼窟號稱險要夷人據為硬寨小有釁則治兵相攻其土下濕夜寒濱江為竹樓以居一日數浴元至元中始置雲逺路軍民總管府明洪武十五年改雲逺府十七年改孟養軍民宣慰使司嵗輸差發銀七百五十兩正統間宣慰刀賓玉勢弱思任敗之於麓川奔永昌死後為思洪所據自上狀願當差發靖逺伯王驥許之礱石金沙江上曰石爛江枯方許渡雖授金牌終無印信凡通文書但稱金沙江娜婢而已成化中思仁子祿以祖母琭帶及諸珍物賂鎮守太監錢能能召見飲食之思祿稍稍縱橫𢎞治初重給土酋金牌信符偶忘孟養久廢止按舊籍頒給思祿遂謂天朝復其官職以符牌號召諸夷略取旁邑自廣會猛密叛木邦參政毛科檄思祿兵攻孟密思祿以羸兵數千應科為猛密所敗思祿大怒遂越界過金沙江攻猛密取蠻莫等十七寨科又勸巡撫金獻民請兵大舉征思祿上不許會思祿亦遣人奏言為鄰惡詿誤願入蠻莫十七寨贖罪得比米魯仍乞以一子為宣慰如故朝議遲疑不決思祿遂據孟養自立萬厯八年緬擒宣慰思箇幽死據其地舍目奔永昌十二年思義來歸十三年思威敗緬於密堵殺緬目多曩長十七年思逺貢象方物賞以金幣授宣慰十八年緬報密堵之役復攻孟養逺率其子昏奔盞西緬以頭目曩甕據之其後思轟送款於朝與蠻莫思正結為唇齒共據長江以抗緬三十年緬追思正轟率兵象倍道馳救之至則正已被殺三十二年緬復襲迤西轟走死緬以頭目思華據之及華死妻怕氏領其地緬中他目更番戍守連年發其兵從征數疆悍不可縻云轟之夷目日放思祖有千戶人不敢歸安插干崖由吐緬甸軍民宣慰使司蠻名阿瓦元世祖至元中蕃三討之後於蒲甘緬王城置邪牙等處宣慰使司明洪武二十六年緬酋南速來朝二十七年始置緬甸宣慰司以其長普浪剌為宣慰永樂元年緬甸那羅塔遣使來貢三年四月又來貢始給金牌信符命中官楊瑄往諭之七月那羅塔謝恩入貢四年緬甸與孟養刀木旦仇殺敕行人張列持節往諭那羅塔遣使乞宥許之十五年建緬甸館宣德五年麓川思仁及緬甸莽得喇各遣使上言木邦罕門占據其地命黔國公沐晟內官雲仙諭之退地正統初麓川思仁遁緬許緬以孟養之地緬酋卜浪剌獻思仁並其妻子𢎞治元年緬甸來貢且言交址侵其地遣編修劉戩諭交趾罷兵嘉靖初孟養思倫糾木邦罕烈擊緬破之殺其宣慰莽紀嵗莽人赴闕訴命永昌知府嚴時泰等往勘思倫夜縱夷兵鼓譟焚驛舍時泰等僅以身免時值安鳳之亂不遑問外事也莽紀嵗有子生於雪中其體有光滿室因名瑞體紀嵗為孟養所殺瑞體奔洞吾母家洞吾酋養為已子及長與養母通洞吾酋死遂據有其地以計滅擺古東破纜掌西取土亞又攻景邁服車里囚思箇誘罕拔號召三宣為西南雄長及瑞體死應裏繼之屢為邊患侵掠諸土司事詳師旅考其地東至八百界南至海西至孟養界北至猛密界自司東北三十八程至雲南省城其山曰小豹江曰金沙江濶水惡緬人據以為險其俗柔詐慓悍居屋廬陸乘象馬水濟舟筏其文字進上者用金葉寫之次用紙次用檳榔葉謂之緬書男子善浮水綰髻頂前用青白布纏之婦人綰髻頂後不施脂粉事佛敬僧有大事則抱佛説誓或詣僧誓之然後決其産象犀馬椰子白㲲布兜羅錦樹類棕高五六丈結實如掌土人以麵納罐中以索懸罐於實下劃實取汁流於罐以為酒名樹頭酒或取汁熬為白糖其葉即貝葉用寫緬書有石油自石縫流出惡臭而黑可塗毒瘡古迹有江頭城至騰衝十五日太公城在江頭城南十日馬來城在太公城南八日安正國城在馬來城南五日蒲甘緬王城在安正國城西南五日所謂緬中五城也千里其東為車里孟艮府蠻名孟掯在姚關東南二界南八百界西木邦界北孟連界自古不通中國明永樂四年來歸置孟艮府編差發黃金十六兩其地東接車里南接八百西接木邦北接孟連後為木邦兼併嘉靖間附於緬與景邁莽應龍相表裏然亦未敢背也其長名怕詔居層樓有妻數百晡時乘象出浴於江浴畢罽服羅拜其長解約臂金鐲授者當夕其官師曰司祿刀猛卒伍曰􅞫些出入以象名曰象馬兵革犀利男女俱警捷沃野千里最稱殷富地多虎農者於樹杪結草樓以護禾衣皆套頸鵝毛為褥雲南知府趙渾曽以撫夷入其地其長偃蹇無禮後無至者撫司有磚城無戍樓産花果瓜蔬與中國同猛密宣南牙山峙其北摩勒金沙二水環焉山髙田少米穀最貴又多地羊鬼為行人祟北距驣衝一千里一由木邦錫波入一由孟卯至猛廣入一由邦抗魯祖渡莫勒江過南牙而入一由蠻莫入明永樂間木邦宣慰罕賓以征八百緬甸功授以猛密十三處其所部有寶井為木邦利府陶孟思歪領之陶孟者猶華言頭目也木邦宣慰司罕揲以其女曩罕弄妻思歪罕揲死其孫罕穵立嗜酒好殺曩罕弄遂以猛密叛木邦成化初南寧伯毛勝守雲南猛密寶石許得自貢不關木邦太監錢能尤利其珍賂曩罕弄遂怙勢無忌略地自廣十六年太監王與索猛密寶石不得因疏猛密木邦罪請征之曩罕弄大懼會有江西人周興五者逋猛密因為曩罕弄計遣人賚金寶賂政府求釋罪且請授官政府許之遂授意都御史陳宗往撫之宗至猛密曩罕弄恃有內援益倨傲不出迓宗且要宗過南牙山就見坐講宗不得已從之曩罕弄乃曰我猛密之於木邦猶大象之孕小象也今小象長成軀倍大象矣寧能復入大象腹中乎宗曰然遂以所侵木邦地畀之為設安撫司以歪子孫世其職木邦人詣宗訴辨宗輒笞止之狀聞政府大喜遂以宗撫雲南尋遷刑部尚書曩罕弄既立盡奪木邦地罕穵奔猛正由是孟養諸酋大不平遣大陶孟倫索提兵衛罕穵聲言必滅猛密會𢎞治改元副使林俊稍割猛密地還木邦曩罕弄懼不敢逆命遂與木邦並立為世仇矣嘉靖初思奔思溷爭立緬人殺奔立溷溷遂以地附萬厯十二年溷改名思忠率思化思服齎偽印來歸遂升為宣撫忠死十六年緬攻猛密忠母罕烘弱不能支率其孫思禮從子思仁奔猛廣而猛密失十八年緬復攻猛廣罕烘思禮奔隴川思仁丙測奔工回而猛廣又失二十年思仁叛投緬緬以思仁據其地在騰越西蠻哈山下山如象鼻行者蠻莫宣撫司地纍足自布嶺三日至其地田土饒衍風俗與隴川猛密同東有等練山環以那莫江直走金沙當緬人水陸之衝為隴川右臂舊為猛密分地後酋長稍強擅而有之明萬厯初以思順為宣撫時思順陷在緬猛密頭目思化入據其地西北去州五日程距髙黎貢茶山長官司在騰越州山極高而寒五穀不蒔其人強獰喜鬭舊屬孟養明永樂三年孟養糾上江刀孟永叛夷目早章不附五年請命賜印授章為茶山長官司十五年章舉頭目早甕為副傳至早玉授正長官其北與麗江野人接境明末副長官早大宸所部為野人殺掠無孑遺奔入內地惟正長官早鄧所部尚存其地南至南甸西至里麻官司其東接茶山西北皆野人有整冬溫冬里麻長二山部夷皆蛾昌蠻舊屬孟養明永樂三年孟養土目早信有拒賊功六年頒印世授長官萬厯中刀思慶襲早奔副之沿至思虎為野人所掠盡棄其地與把事李廷高奔赤石坪副長官堪信亦被殺無噍類焉兀長官司蠻名也兀自古不通中國明宣德七年鈕始歸附東至元江界南至車里界西至威逺州北至臨安思陀甸自司北十六程至雲南省城民皆倭泥類蒲蠻男子綰髻於頂白布纒頭婦人白晳盤頭露頂以花布為套頭見人無拜禮額徵差發銀四十兩以上各土司俱舊志所載本朝未經授職鶴慶府土通判元時高惠直為總管子賜為土千戶傳至高海歸明以征佛光寨有功授千夫長沿至高玉贈明威將軍子藩臣以功授指揮僉事傳至應星本朝平滇應星投誠仍授世職應星死子彥襲康熙二十二年改土通判彥死今孫浤襲在城驛土驛丞元末田宗為府判明洪武十五年歸順以從征普顏篤佛光寨有功授土驛丞沿至得惠傳泰年泰年傳珍死本朝平滇珍投誠仍授世職珍死子世祿襲世祿今子生蕙襲觀音山土驛丞明洪武十六年郭生歸附從征佛光寨有功授驛丞沿至郭維藩傳升升傳朝鎮朝鎮傳朝柱鼎本朝平滇朝柱投誠授世職朝柱死朝鎮子鼎襲死子紹儀襲紹儀死今子斌襲觀音山土巡檢明初王友德歸順以名同潁國公去德字擒獲大松坪賊楊奴等授土巡檢沿至王之和傳欽欽傳印兆襲本朝平滇印兆投誠仍授世職印兆死今子天受土知府董賜原係安寧土知州明洪武開滇俾署鶴慶府傳子仲以同知授知府沿至高倫正統間以淫暴革除明初有董信以征普顏篤有功授知事傳至土知事董祿𢎞治六年革除正德七年祿之孫從賢仍襲前職傳至堂蔭復革除劍川州土州判明洪武初趙保歸順以功授土千戶沿至趙震本朝平滇震投誠授世職康熙二十二年改州判震死子元麗襲雍正九年以遺失號紙革職順寧府雲州大猛麻土巡檢明洪武初有土舍奉健者大侯州土知州之分派也四傳至恭於萬厯二十五年以征大侯奉學有功尋改大侯為雲州授恭土巡檢恭傳詔詔傳朝宣朝宣傳新命本朝平滇新命投誠仍授世職新命死今子召寶襲猛緬長官司其先奉布明洪武初開闢猛緬土地招集民夷世為土舍四傳至奉厯於萬厯中以從討猛麻奉供仇殺有功授長官司奉厯死子升肆虐為頭目奉墮所殺弟奉鼎奉星爭立鼎奔孟連星恃耿馬而木邦猛邜從中助兵巡撫周嘉謨檄金騰道為之解紛令鼎星分食其地以其母陶氏護印鼎傳姪寶以沙定洲之叛赴援加宣撫司子國珍襲本朝平滇國珍投誠仍授宣撫司職國珍死子聖襲改為長官司聖死今子廷徵襲賜姓猛氏授土土知府元時蒲蠻長孟佑之後內附知府至猛閧明初歸附仍授世職六傳至猛廷瑞以助奉學搆兵革職改設流官大侯州土知州奉氏其先奉維從靖逺伯王驥建功世為大侯州知州明萬厯中奉赦與弟奉學爭持不睦學恃女夫廷瑞據雲夢頻年搆兵赦憤激赴省繳印而還陳用賔馳檄解諭不聼發兵討平之改大侯為雲州設流官議以奉赦憤兵繳印罪非叛比準其子國佐為土州判傳子昌應本朝開滇以不換號紙停襲巡檢司罕存明萬厯間與奉政同授今絶猛撒土阿林寨土巡檢楊氏莽水寨土巡檢莽氏右甸守禦所千戶蔣氏段氏皆久裁永北府永寧府土知府明洪武十四年土官卜都各吉以所轄部民來歸授永寧州土知州卜都死子各吉八合嗣永樂三年令香羅革甸瓦魯之剌次和四部畨夷火頭板必他布郎吉分阿只苴等入朝嘉之升永寧為府授各吉八合中順大夫賜鈒金花帶鐫四字曰克篤忠誠更以香羅革甸瓦魯之剌次和為長官司授板必他等副長官後八合老病子卜撒襲為四川鹽井土官喇馬非所侵父子俱被殺卜撒妻訴於鎮守逮喇馬赴京道死因疆理其地以卜撒弟南八嗣其職正統中鹽井諸蠻侵據之土官不能治乃請設流官同知經厯各一治署於浪滄衛握郡符遙治之沿至銓死子鎮麒襲本朝平滇鎮麒投誠仍授世職傳子阿庭錕庭錕死子錦輝襲錦輝死子錫逺襲錫逺死弟錦先襲錦先死今子有威襲康熙三十八年改屬永北府北勝州土知州元末高斌祥為北勝土知府纍官雲南行省左丞明洪武中改府為州二十二年斌祥子高澤以軍功授知州澤孫昶以征麓川功加府同知仍管州事昶曾孫崙以征安鳳功進階朝列大夫崙曽孫世懋以征順大功授四品服世懋死弟世昌襲世昌死子斗光襲本朝平滇斗光投誠仍授同知世職子贊巸襲三十八年改州為府設流官贊巸死子勳改授北勝州土知州勳死今孫耀龍襲土州同元末章吉特穆爾為北勝土知府明克大理以部民及順州民降納所握印及麗江宣撫司印三珠虎符西平侯沐英令其子觀音奴從軍因兵逃伍乃降為州同與高氏翼居州治左右沿至成文傳永永傳柱國柱國傳興國佐本朝平滇興國投誠仍授世職興國死無子庶兄國襲佐國死今子法祖襲順州土州同元時子日為土知州至子輿歸明授州同沿至如壁傳一龍一龍傳天錫以軍功加銜遊擊進階知州傳子祿祥賢本朝平滇祿祥投誠仍授州同世職祿祥死子大襲大賢死子玠襲玠死今子肱襲的明初歸附從征有功授土知州蒗蕖州土知州阿屬浪滄衛久裁革麗江府土通判其先麥宗西域人宋理宗末始入麗江通各方語土人推為酋長子阿良元時為麗江路軍民總管傳至木得明洪武初入貢歸附後以克石門寨功授土知府賜姓木又從吉安侯征巨津捕阿奴聰於吐蕃斬偽元帥朱保及沐西平征景東定邊咸在行間得死子初襲值白交山及偽平章賈哈喇麓川思任之亂咸有戰功賜金牌誥命改麗江軍民府令世居西郵捍吐蕃每有征調但輸兵餉而兵不出以重邊守沿十三世至木增代有封贈錫豫增在任值北勝蠻亂以兵擒首逆高蘭又值遼左軍興輸餉二萬於戶部天啓二年陳言十事下部議可嘉其忠誠加參政晉大僕卿賜璽書榮其先世增死子懿襲無本朝平滇懿投誠仍給土府印懿死子襲死嗣弟柚襲柚死子垚襲垚傳子興興死無子弟鍾襲以土人控告於雍正元年改為通判鍾死今子德襲土照磨木目本府人明初從征麓川有功授本府照磨沿至木苴剌未襲而死世絶通安州土州同高賜元時為義兵萬戶明兵平南賜從征佛光寨招諭未附者以軍儲餉師授州同後革除州土知州羅克元時為萬戶明洪武中率衆來歸蘭以軍功授土知州其後有羅牙者從木初征刀於孟亦著戰功後革除蒙化府土知府元時左青羅為順寧府同知傳至禾為九部火頭順寧司通事明洪武中歸附仍其職後官兵征高大惠等遣禾招諭降之因授蒙化州判永樂中升知州子左伽正統中納米升同知後從征麓川纍功升大理府土知府仍掌州事尋升州為府遂實授知府沿至近嵩傳子星海本朝平滇星海子世瑞投誠仍授世職世瑞死子嘉謨襲嘉謨死今子麟哥襲舊定邊縣土縣丞明洪武初蠻長刀思良叛阿魯捐助糧餉奮勇效謀擒獲思良授土縣丞沿至阿天明傳廷相廷相傳應鯤應鯤傳志經本朝平滇志經投誠仍授世職志經死子世忠襲世忠死弟世勳襲世勳死今子抱琛襲授驛丞久革漾濞驛土驛丞尹義明初從征佛光寨除景東府土知府元時阿只魯為逺幹府開南州管理統威逺州及案板母龍猛統三甸明初兵至楚雄只魯子俄陶遣通事薑固宗阿袁等納款獻印并鎧仗馬匹乃改逺幹開南為景東府命陶知府事賜姓陶後因緬目思可伐來侵戰敗奔白崖調神䇿衛鎮其地是為景東衛尋從大兵剿寇有功頒賜金帶鐫誠心報國四字及銀幣甚厚陶死子幹襲幹傳瓚偕衛兵攻麓川者張羽牙殺奉撒等晉階大中大夫沿及陶金攻鐵索米魯那鑑安銓鳳繼祖烏撒諸役皆以兵從金傳子淞淞傳子明卿明卿傳子璽璽傳子爾鑑爾鑑死無子以淞孫垐襲子本朝平滇垐投誠仍授世職垐死孫濋襲濋死無今垐次子大鑑襲土知事明洪武中把事薑固宗齎本府金牌印信降尋以象馬入貢又從攻􅑇嘉功得冠帶子嵩於宣德中升猛緬正長官後改本府知事沿至可久傳述望述望傳啓賓本朝平滇啓賓投誠仍授世職啓賓死無子叔顯望襲顯望死今子啓武襲三岔河土巡檢明時楊勝為把事宣德中以饋餉攻麓川者張羽牙功得冠帶𢎞治中於三岔河哨設巡檢司以當賊寇之衝授勝子祥土巡檢後以一碗水九窰坡二哨多寇并令鈐之沿至國翰傳子𢎞緒𢎞緒傳弟𢎞仁承本朝平滇𢎞仁投誠仍授世職𢎞仁死子承文襲文死今子可昌襲保甸土巡檢明宣德中陶暹為頭目貢象入京授土巡檢後從征馬龍他郎甸者張羽牙等寨皆有功升縣丞管巡檢事傳子華華死曽孫煋襲沿至承宣本朝平滇承宣投誠仍授世職宣死子增襲增死子舜舉襲舜舉死今子瑜襲板橋土驛丞明初阿賽為俄羅鋪村長以諳夷語迎送得賓旅心授土驛丞後有功加巡檢銜傳子阿哀哀傳子徐徐傳弟漢賜姓雲漢死弟滄孫必高襲必高死子騰襲騰死子聨極襲本朝平滇聨極投誠仍授世職聨極死子振宗襲振宗死今子雲仍襲種人附白人古白國之支流也舊訛僰為白遂稱為一類其實不相通雲南諸郡皆有之習俗與華人不甚逺又謂之民家子爨蠻爨氏事詳雜紀唐書自曲州靖州西南昆州曲軛晉寧喻獻安寧距龍和城通謂之西爨白蠻自彌鹿升麻二州南至步頭謂之東爨烏蠻以烏白為號無姓氏其稱爨者從主姓耳漢初有白國王其夷為白人後有爨王則為爨人猶廣南夷號為儂人之類爨蠻之名相沿最久其初種類甚多有號廬鹿蠻者今訛為玀玀凡兩迤之內依山谷險阻者皆是名號差殊言語嗜好亦因之而異大略寡則刀耕火種衆則聚而為盜男子椎髻摘去髭鬚左右佩雙刀喜鬭輕死婦人披髮衣皂貴者飾錦繡賤者披羊皮耳穿大環剪髮齊眉裙不掩膝以臘月為春節竪長竿設橫木左右各坐一人以互落為戲病無醫藥用夷巫禳之巫號大覡皤或曰拜禡或曰白馬取雛雞雄者生刳取兩髀束之細剖其皮骨有細竅刺以竹簽相多寡向背順逆之形以占吉凶或取山間草齊束而拈之略如蓍法有夷經一皆爨字狀類蝌蚪精者能知天象斷陰晴民間皆祭天為臺三階以禱其部長正妻曰耐德非所生不得繼父職若耐德無子或有子早夭始及庶出者無嗣則立其妻女死以豹皮裹尸而焚葬其骨於山非骨肉莫知其處多養死士名曰苴可厚贍之每兵出則苴可為前鋒軍無行伍紀律戰則蹲身漸進三四步乃揮標躍起人挾三標發其二必中二人其一則以擊刺不發也又有徑弩毒矢飲血即死以射禽獸去其射中之肉而食之部夷稱部長曰撒頗華言主人也夷性憨而戀主諸酋長果於殺戮每殺人只付二卒攜持至野外掘一坑集其親知泣别痛飲徹夜昧爽乃斬其頭推坑中復命更使二卒勘之乃許其家收葬雖素昵者欲殺即殺之出令勿敢丐者其家人亦莫敢怨憝用法嚴誅求無厭每蠻長有慶事令頭目入村寨計丁而派之遊行所至闔寨為供帳無少長皆出羅拜馬前鄰寨在數十里內者皆以雞黍餽無以應誅求往往潛出他郡劫掠所得頭目私分之官府檄下督責則縛數人應命其現在種類附列於後白玀玀男女兩截衣裹頭跣足婦人耳帶銅環被衣如袈裟以革帶繫腰喪無棺縛以火麻裹氈舁於竹椅前導七人擐甲胄執鎗弩四方射名禁惡止殺焚之於山既焚鳴金執旗招其魂以竹簽裹絮少許置小篾籠懸生者牀間祭以丑月草三日插山榛三百枝於門列篾籠地上割燒豚每籠各獻少許侑以酒食誦夷經羅拜為敬婚姻惟其種類以牛馬為聘及期聚衆訌於女家奪其女而歸性窳惰淫湎信鬼畜蠱以手量裙邊投麥於水驗其浮沉以當占卜在雲南澄江臨安永昌者漸習王化同於編氓其在蒙自定邊尚稱頑梗在曲靖者於夷為賤種在江川大理姚安皆稱撒馬都在楚雄為灑摩在永昌為撒馬朵大抵寡弱易治黑玀玀男子挽髮以布帶束之耳帶圈墜一雙披氈佩刀時刻不釋婦人頭蒙方尺青布以紅緑珠雜海貝硨磲為飾下著桶裙手帶象牙圈跣足在夷為貴種凡土官營長皆其類也土官服雖華不脫夷習土官婦纒頭綵繒耳帶金銀大圈服兩截雜色錦綺以青緞為套頭衣曵地尺許皆披黑羊皮飾以金銀鈴索各營長婦皆細衣短氈青布套頭其在曲靖者居深山雖高岡磽隴亦刀耕之種甜苦二荍自贍善畜馬牧養蕃息器皿用竹筐木盤交易稱貸無書契刻木析之各藏其半市以丑戌日葬貴者裹以臯比賤者以羊皮焚諸野而棄其灰在路南者能為乳酪雜樵蘇鬻於市腥穢侏􅍣若鹿豕然在安寧祿豐者多負鹽於途在南安者以草為衣加於氈毳大都性多鷙悍好攻掠而武定荍甸尤為凶頑鶴慶四十八村又號海西子亦其種多暴鐵索箐賓川州赤石崖螳螂古底舊稱淵藪自萬厯初芟蕩以來至今寧帖撒彌玀玀男挽髮如䯼長衣短裩婦短衫短裳滇池上諸州邑皆有之拙於治生不敢為盜賊居山者耕瘠土販薪於市住水者舉家捕魚僅能自給妙玀玀皆土蠻官舍之裔或稱火頭或稱營長或稱官娜與黑白諸種迥異耳帶圈環常服用梭羅布婦女衣胸背粧花前不掩脛後長曳地衣邊彎曲如旗尾無襟帶上作井口自頭籠罩而下桶裙細摺在阿迷者為諸種所敬憚其喪則合寨醵金為助在蒙化麗江鶴慶騰越楚雄姚安平彛新興永北王弄山者不著其種類止曰玀玀所居茅舍中堂作火爐父子婦姑圍爐而臥懼箠撻而不畏死祭以羊豕捶死不殺在姚安者性狡悍好為盜賊在新興者居昌明里力田為生在騰越者專資射獵永北又有號玀玀者與四川建昌諸猓同類純服氈毳男女皆跣足每踏歌為樂則著皮屨男吹蘆笙婦衣緝衣跳舞而歌各有其節又稱猓落蠻男鵲帽襞積衣婦三尖冠以採樵耕藝為事在新平者又稱白腳玀玀以白布束其脛故名阿者玀玀衣服大略與黑玀同婚喪如白玀但耳環獨大在東偏則江川諸邑有之西則賓川有之通海者婚以牛為聘壻親負女而歸耕山捕獵性好遷徙乾玀玀婚嫁尚侈諸種人所不及喪以牛皮裹尸束錦而衣之以薪每食插筯飯中仰天而祝以為報本好勇喜鬭殺人償之以財有讐怨雖父子兄弟推刃不顧多不通華言食貨貴鹽蒜魯屋玀玀服飾類黑玀别為一種恃矛盾性尤猙獰好馳馬縱獵獨臨安魯郭村有之撒完玀玀居蒙自縣明月諸村在黑白二種之外勤於耕作捕蟲豸及鼠而食海猓玀尋甸有之亦名壩猓玀以其居平川種水田而得名也土人以平原可墾為田者呼為海或呼壩故名與漢人相雜而居居處飲食衣服悉如漢人惟與其同類仍作夷語居家儉朴情性和純且知讀書阿蝎猓玀師宗有之樹皮為屋身披羊皮種植穀荍野麻不知尊卑長幼葛猓玀彌勒有之性獷悍以死為勇好獵亦帶耳環骨簪俗同黑玀但男子著麻衣婦人袍裙稍短羅婺一稱羅武俗又稱羅午本武定種古以名郡今楚雄姚安永北羅次皆有之男子髻束高頂戴笠披氈衣火草布其草得於山中緝而織之粗惡而堅緻或市之省城為囊槖以盛米麥婦女辮髮兩綹垂肩上雜以硨磲瓔珞方領黑衣長裾跣足居山林高阜牧養為業有屋無牀榻以松葉藉地而臥婚姻喜慶之事結一松棚為宴葬用火化腰刀長鎗行坐不釋嗜酒好鬭狡猾難治摩察黑玀玀之别類在大理蒙化者執木弓藥矢遇鳥獸射之無不獲所逢必劫遇強必拒在武定者一曰木察習稍柔善僰夷一名擺夷又稱百夷蓋聲近而訛也性耐暑熱居多卑濕棘下故從棘從人滇之西南曠逺多濕僰夷宅之種類數十風俗稍别名號亦殊其俗稱宣慰曰昭華言主人也其官屬有叨孟昭録昭綱遞相臣屬叨孟總統政事兼領軍民多者數十萬少者則數萬昭録亦萬餘人賞罰皆任其意昭綱千人遞減至十人又有昭録調遣統數千人以行其近侍名立者亦領數百戶皆聽其使食其賦取用無制節上下僣奢微名薄職輒繫鈒花金銀寶帶官民皆冠箬葉纍金玉珠寶為高頂上懸小金鈴遍插翠花翎毛後垂紅纓貴者衣紵絲綾錦以金花金鈿飾之以坐象為貴象首十數銀鏡為絡銀鈴銀釘為緣象鞍三面以鐵為欄藉重茵懸銅鈴鞍後象娜一人銅帽花裳執長鈎制象為疾徐之節招搖於道相見合掌為敬敬於已者則跪拜有所論則叩頭受之雖貴為叨孟見宣慰莫敢仰視凡有問對則膝行而前三步一拜退亦如之賤見貴少見長皆然侍貴人之側或過其前必躬身而趨筵宴則貴人上坐僚屬以次列坐於下有十客則令十人齊行十客之酒酒初行樂作一人大呼一聲衆人和之如此者三既就坐先進飯次具醪饌有差食不用筯每客一卒跪坐側持木瓶盥悅凡物必祭而後食樂有三曰僰夷樂緬樂車里樂僰夷樂有箏笛胡琴響盞之類歌中國之曲緬樂者緬人所作排簫琵琶之類作則衆皆拍手而和車里樂者車里人所作以羊皮為三五尺長鼓以手拍之間以銅鐃鼓拍板與中國僧道之樂無異鄉村宴飲則擊大鼓吹蘆笙舞牌為樂無中國文字小事則刻竹木為契如期不爽大事書緬字為檄無文案城池因高山為寨無倉廩租賦每秋冬遣親信往各甸計房屋徵金銀謂之取差發每屋一楹輸銀一兩或二三兩其法殺人與姦者皆死竊盜一家皆死為寇一村皆死道不拾遺軍民無定籍每三五人充軍一人正軍謂之昔剌猶言壯士昔剌持兵器餘負荷供餉每二十萬戰者不滿十萬師行軍在前夷長在中餉饋在後進退不一而號令不紊倚象為聲勢每戰以繩自縛象上悍而無謀鋸桑為弩革為胄銅鐵雜革為函勝則驕惰爭功負則逃竄山谷驛路無郵傳一里半里許構一小草樓五人守之千里有報聞在旦夕公廨與民居無異雖宣慰亦止竹樓數十間上覆以茅用陶瓦者輒有火災民間器皿多以陶冶孟艮等處則有漆器甚精其長用金銀硨磲琉璃等器其下亦以金銀為之凡部長出象馬兵戈及木榻器皿僕妾財寶之類皆從動輒數百人隨處宴樂小民苦之男貴女賤雖小人視其妻如奴僕耕織貿易徭役皆婦人任之非疾病雖老不得息凡妻生子貴者以水浴於家賤者浴於河三日後以子授其夫耕織自若頭目之妻百數婢亦數百少者數十庶民亦有數十妻無妬忌之嫌舊俗不重處女及笄始禁足今則此俗漸革矣官民皆髠首黥足有不髠則酋長殺之不黥足則衆嗤之曰婦人也婦人綰獨髻腦後以白布裹之窄袖白布衫皂布桶裙貴者錦繡跣足凡子弟有職名則受父母跪拜人死用婦人祝於尸前親鄰相聚少年百數人飲酒作樂歌舞達旦謂之娛尸婦人羣聚擊碓杵為戲數日而後葬葬則親者一人持火及刀前導至葬所以板數片瘞之其人素所用器皿甲胄戈盾皆壞之懸於墓側是後絶無祭掃之禮在祿豐羅次元謀者男帶黑布帽窄袖白衫婦著桶裙好樓居釜甑俱以陶瓦俗尚奢侈孟春作土主會稱貸以炫其飾又有鞦韆會男女雜坐信鬼好訟見人多所忌諱掘鼠及蝦蟆以敬賓客葬有棺少哀戚在江川路南者構竹樓臨水而居樓下畜牛馬婦人耳帶大環婚用牛祭用羊知蠶桑勤於耕織性柔畏法見人退讓在臨安者男青白帨纒頭著革屨衣有襞襀婦人白帨束髮纒疊如仰螺好鬼喜浴極寒猶然山居構草樓家人狎處稍以帷帳間其臥處喪衣緋架木置尸其上弔者各散紅布緞一方召拜禡誦夷經三日以簟裹而舁之山妻不更嫁名曰鬼妻其食糯米蜻蜓在蒙自者插雞尾笠端出則捕獵居則紡績在阿迷者為滇莊佃民習同蒲人新化納樓溪處大略皆同在十八寨者性險好殺畜蠱餌毒捕魚食鼠焚骨而葬又有髠者曰光頭僰夷蓋習車里之俗額上黥刺月牙所謂雕題也見流官盤膝坐舉手加額為敬男女先通而後娶葬不復顧或夢亡者昧爽至冢上設一石祝之曰勿再返也在順寧者冠青而鋭其頂耳環踏屨好衣素婚嫁用牛貧不能具者傭女家三年喪有棺斂封葬以石為人佃作性懦弱在劍川者言語侏􅍣所居瘴癘棺如馬槽以板為之惟農業陶冶是務懼訟信鬼在騰越者火炙肉食不求其熟或取蜂糟而食之習緬字器用粗磁在曲靖者號白腳僰夷男婦俱短衣長裳茜齒文身戴笠跣足在鎮南者男子短衣婦桶裙跣足婚禮夷歌侑食人死令親者捉刀尸傍晝夜守之親朋以酒奠捉刀人呼死者之名灌諸口中如是三日而葬每村置樹以為神六月草四日集衆燃炬譁而賽神所居在山巔在姚安者濱水好浴腰繫竹籠捕魚婚用牛羊至女家以水潑女足為定籜葉為尖頂帽擅土布羊毛之利在元江者能為鬼魅以一帚繫衣後即變形為象馬豬羊貓犬立通衢或直衝行人稍畏避之即為所魅入腰中食其五臟易之以土昔有客言曽臥病醫巫勿效禱於大士夢一女子於其脅下出二小兒漸成老人女子叱之乃去病遂已知者遇其所變物以一手捉之一手挺拳痛捶之必復為人奪其帚而縻之即哀求以家資之半丐脫食中多置毒藥中之必不治估客娶夷女者欲出必問還期或一二年或三四年女即以毒餌之如期至更以藥解救亦無他若不爾必毒發而死所許還期即死日也與外人交易爽約失信及私窺其妻女者必毒之信實朴厚者纍出入亦無傷其地髙原曠野土産檳榔種蒔如中國農桑葩時殺犬灑血汙之玀黑順寧有之亦蒲僰之異派其俗與僰人不甚相逺蜂蛇鼠蛤無所不噉然勤於耕作婦人任力男子出獵多居山箐間㹒喇一名朴臘婚喪與猓玀同而語言不通蓬頭跣足衣不浣濯臥以牛皮覆用羊革氈衫在寧州者強悍專務剽掠在石屏州者良善畏法為編民在王弄山者一名馬喇首插雞羽男子服紅經白緯衣婦女衣白墾山種木棉為業普特以漁為業性耐寒舟不盈文而炊爨牲畜資生之具咸備又有泅水捕魚者丹鬚蓬髮竟沒水中與波俱起口囓手捉皆巨魚今滇池旁碧雞山下有此種類窩泥或曰斡泥男環耳跣足婦衣花布衫以紅白錦繩辮髮數綹海貝雜珠盤旋為螺髻穿青黃珠垂胸為絡裳無襞襀紅黑紗縷間雜飾其左右既適人則以藤束膝下為識娶婦數年無子則出之喪無棺弔者擊鑼鼓搖鈴頭插雞尾跳舞名曰洗鬼忽泣忽飲三日採松為架焚而葬其骨祭用牛羊揮扇環歌拊掌踏足以鉦鼓蘆笙為樂食無筯以手摶飯勤生嗇用集貝一百二十索為一窖死則囑其子我生平藏貝若干矣汝取某處窖餘留為來生用臨安郡屬縣及左能寨思陀溪處落恐諸長官司景東曲靖皆有之在南安州又曰和泥男子剪髮齊眉衣不掩脛飲酒以一人吹蘆笙為首男女連手周旋跳舞為樂死以雌雄雞各一殉葬阿迷州稱阿泥鄧川州稱俄泥糯比元江有之即阿泥之别種風俗與阿泥同黑鋪元江有之其俗與阿泥同而言語微異性巧慧善作宫室編竹為器一切牀几棹凳備極精巧漢人莫能及男多黧黑女微白上下相接皆有禮畜養山羊不食羊肉夷中之最善者拇雞蓬頭椎髻標以雞羽形貌醜惡婦女尤甚挽髻如角向前衣文繡短不過腹項垂纓絡飾其胸遷徒無常居多竹屋耕山食荍暇則射獵捕食猿狙佩利刀負強弩毒矢伺隙剽竊性狠惡父子兄弟怒則相殺多居寧州及王弄山麼些即唐書所稱麼些蠻今麗江之夷總稱麼些而永北祿豐亦皆有其類俗不頮澤自古已然男子以繩纏頭耳帶緑珠婦人布冠好畜牛羊勇厲善騎射挾短刀少不如意鳴鉦鼓相讐殺婦女投場和解乃罷俗儉約飲食疏薄嵗暮競殺牛羊相邀請一客不至則為深恥正月五日登山祭天人死以竹簣舁至山下無貴賤皆焚之力些迤西皆有之在大理名栗粟在姚安名􅭟有生熟二種男囚首跣足衣麻布衣披氈衫以毳為帶束其腰婦女裹白麻布善用弩發無虛矢每令其婦負小木盾徑三四寸者前行自後發弩中其盾而婦無傷以此制服西番土人在武定府境男衣絮襖腰束皮索飢則緊縛之繫刀穹婦披羊皮氈毳姻親以牛羊刀甲為聘新婦披髮見姑舅性剛劣不能華言有爭者告天煮沸湯投物以手捉之屈則糜爛直者無恙耕田弋山寅午戌日入城交易土獠其屬本在蜀黔西粵之交流入滇亦處處有之而石屏嶍峨路南較多男子首裹青帨服白麻衣領上綴紅布一方婦人冠紅巾衣花繡性悍戾在嶍峨者樵蘇自給在路南者為人佃種屋廬與僰人同在新興者居西山之麓服食婚喪習同白玀以孟冬朔日為嵗首怒人男子髮用繩束高七八寸婦人結布於髮其俗大抵剛狠好殺餘與麼些同麗江有之其在鶴慶府維西邊外過怒江十餘日有野夷名子自古不通中國於本朝雍正八年相率到維西將虎皮二十張山驢皮十張麻布三十方黃蠟八十斤充貢願永為年例扯蘇一名車蘇在楚雄臨安諸處居於山巔無陶瓦木片覆屋耕山種荍麥皮履布衣器以木擺錫為飾新平亦有之山蘇在臨安諸處潛居深山板片為屋種荍稗為食能制竹器入市易米出常持弩射禽炙食種麻為衣男子披髮跣足婦人挽髻蒙頭諸夷惟此種最苦儂人其種在廣南習俗大略與僰夷同其長為儂智髙裔部夷因號為儂樓居無椅凳席地而坐脫履梯下而後登甘犬嗜鼠婦人衣短衣長裙男子首裹青花帨衣粗布如絺長技在銃蓋得之交址者刀盾鎗甲寢處不離日事戰鬭王弄山教化三部亦有之蓋廣南之流也沙人習俗多同儂人慓徑過之在廣西者屬於隴氏在富州者屬於李氏沈氏維摩水下地遼濶諸夷互爭以強力相兼併又有青龍六詔者猙獰尤甚地産老杉生懸崖千丈間伐之多無全材堅逾蜀産羅平州亦有沙人器用木婚喪以牛為禮蒲人即古百濮周書與微盧彭俱稱西人春秋傳與巴楚鄧並為南土本在永昌西南徼外訛濮為蒲有因以名其地者若蒲縹蒲甘之類是也男裹青紅布於頭繫青緑小縧繩多為貴賤者則無衣花套長衣膝下繫黑藤婦人挽髻腦後頭戴青緑珠以花布圍腰為裙上繫海貝十數圍繫莎羅市於肩上永昌鳳溪施甸及十五喧二十八寨皆其種勤耕種徒跣登山疾逾飛鳥今漸弱而貧其流入新興祿豐阿迷鎮南者椎髻跣足套頭短衣手帶銅鐲耳環銅圈帶刀弩長牌飾以絲漆上插孔雀尾婦女簮用骨短裳緣綵婚令女擇配葬用莎羅布裹尸而焚之不知荷擔以簍負背上或傍水居不畏深淵能浮以渡在蒙自及開化十八寨皆號野蒲桀驁勝諸夷在景東者淳朴務農在順寧沿蘭滄江居者號普蠻亦曰朴子蠻性尤悍惡專為盜賊不鞍而騎徒跣短甲不蔽脛膝馳突迅疾善鎗弩男子以布二幅縫合挂身無襟袂領緣婦人織紅黑布搭於右肩結於左脅以蔽其胸另以布一幅蔽腰見人不知拜跪寢無衾榻拳曲而臥古宗一作狜猔西番之别種滇之西北與吐番接壤流入境內麗江鶴慶皆間有之男子辮髮百縷披垂前後經年不櫛浴櫛必以牲祭披長氈裳以犛牛尾或羊毛織之婦人以青白磁珠與硨磲相雜懸於首其食生肉蔓菁牟稗西番永北一帶凡在金沙江者皆是辮髮雜以瑪瑙銅珠為綴三年一櫛之衣雜布革腰束文花毳帶披琵琶氈富者至三四領暑熱不去住山腰以板覆屋俗尚勇力善射有緬字經以葉書之祀神逐鬼取而誦焉性暴悍隨畜遷徙又有野西番者倐去倐來尤不可制峨昌一名阿昌性畏暑濕好居高山刀耕火種婦略女以紅藤為腰飾祭以犬占用竹三十三根如蓍嗜酒負擔覔禽獸蟲豸皆生噉之採野葛為衣無部長雜處山谷聽土司役屬今永昌羅右羅板羅明三寨皆其種舊俗父兄死則妻其母嫂後羅板寨百夫長早正死其妻方艾自矢不失節遂餓而死其俗乃革縹人婦女以白布裹頭短衫露其腹以紅藤纒之莎羅布為裙上短下長男女同耕哈喇男女色深黑不知盥櫛男子花布套衣婦人紅黑藤纒腰數十圍産子竹兜盛之負於背又有古喇男女色黑尤甚種類略同哈杜亦類哈喇居山言語不通略似人形耳緬人有數種曰老緬曰得楞子曰阿瓦如猛别雍會普浣洞吾擺古皆其類大抵各以其地得名性貪利好鬭食不用匙筯長於鳥銃其火藥必得麥麵傳之迅疾無聲其法祕不傳人俗好佛男女俱以布盤其首色黑類哈喇擺古最逺而強結􅞫以象牙為大環從耳尖穿至頰以紅花布一丈許裹頭而垂帶於後衣半身衫袒其右肩遮些綰髮為髻男女皆貫耳佩環性喜華彩衣盤旋蔽體飲食精潔戰鬬長於弓矢恃象銃稍與緬同孟養一帶多其種類羯些子種出迤西孟養流入騰越環眼烏喙耳帶大環無衣遮腹下以布一幅米肉不煮而食勇健執鎗刀敢戰喊聲如吠犬地羊鬼短髮黃睛性姦狡嗜利出沒不常與人相讐能行妖術用器物易其肝膽心腎為木石遂不救又置蠱飲食中如元江所為喇魯性悍居崖穴衣麻布捕山禽野獸為食賦役俱無苗子有九種黔省最多在滇則宣威鎮雄亦有之多是花苗居水濱不畏酷暑多田羅陳蔡四姓形狀類黑乾夷蒙布為冠飾以綵絨短衣無襟腰連細摺短裙至膝跣足節序擊銅鼓吹呐叭歡聚賽神書契數目字迹並六十甲子皆如漢制餘不同親迎壻步行迎婦歸始置酒待客母家三日後以牲畜送壻家以為粧奩壻家答以牛馬布匹即凖財禮厚款送歸死則氈裹舁而焚諸野婚配各以其類不通諸夷黑乾夷宣威有之男椎髻頭纒麻布耳帶大銅圈垂至肩穿麻布短衣跣足女衣套頭衣毛褐細帶編如篩盤罩於首飾以海貝硨磲等物衣領亦然褶裙亦用毛褐居深山密箐婚配不用媒妁男吹笙女彈口琴唱和相調悅而野合歸語父母始用媒聘迎婦歸死則裹以氈舁而焚諸野此夷中之最賤者狆人平彛有之習俗儉約男女皆事犂鋤短衣長裙構樓而居甘犬嗜鼠病不服藥惟務祭鬼習俗大約與沙人同苦蔥臨安元江普洱皆有之性儉居山崖種荍稗度日男女混雜不知禮義衣服多同糯比喇烏臨安景東有之男如玀夷衣用棉布女裝如窩泥短衣桶裙山居亦務種植男善伏水取魚麥岔和曲有之娶婦以牝牛為聘吹笙飲酒擔柴荷簣治生勤苦羅緬祿勸有之耕種山田肩挑背負採薪揀菌貿易鹽米卡惰元江有之性頑鈍喜歌舞男女多茍合遇婚娶通媒妁之日議聘金多者或至百金娶後子孫猶有代祖父償聘金者故娶妻之家見婦生女喜不自勝若生數子即以為大纍葬皆火化黑濮所居多在威逺普洱江界之間其人多黑色男女皆徒跣不勤洗滌語言稍似西番耕山力穡頗知紡織多作竹器入市交易男子剃髮為辮短衣著褲善操弩矢女子單衣僅長尺前不扣合以彩布為桶裙其裙蒙乳以至下體又用五色燒珠與海貝排串為飾束於臍下兩耳穿孔環以銀銅錫婚聘惟以牛銀喪服白布葬即除之其喪皆用木槽嫚且南中諸志紀皆所不載姚安有之尚丑為正月性好飲而蕩男婦作歡嗚葉吹薪彈篾弄枯則皆音節流暢合夷曲而雜和之其聲喑然咿然亦可聽飲竟月而忘返不知節用過此則終嵗飢寒惟尋野菜充腹而已性亦疑畏戛喇永昌騰越內外境俱有之耕種類阿猖形狀似猓玀凶悍善鬭婦女斜纏錦布於腰居山巔戶不正出迎屋山開門遷徙無常不留餘粟卡瓦夷中之頑梗者也永順東南辣蒜江外有之貌醜性惡亦耕種有寨落紅藤束髮纏腰披麻布持利刃梭標於要路竊伏劫掠行商必結伴多人兼有保護者乃敢過今守禦戒嚴此風漸止商賈凡出騰越入木邦貿木棉者必經其地呼為卡利瓦有生熟二種生者劫掠熟者保路小列密雲州有之刀耕火種精於射獵遇雀鼠則以弩取而炮食之利米順寧有之男子好衣皂面黃黑善弩獵每射雀得之即為生噉女子分辮赤足出外常披花布以蔽其身􅸥人麗江界內有之披樹葉為衣茹毛飲血無屋宇居山巖中大猓黑雲州有之黑陋愚蠢所食荍稗即為上品其餘樹皮野菜藤蔓及蛇蟲蜂蟻蟬鼠禽鳥遇之生噉不葺廬舍崖居野處與野人同類也小猓黑習尚與大猓黑同但形狀差小野人居無屋廬夜宿於樹巔赤髮黃睛以樹皮毛布為衣掩其臍下首帶骨圈插雞毛纒紅藤執勾刀大刀採捕禽獸茹毛飲血食蛇鼠性至凶悍登髙涉險如飛逢人即殺在茶山李麻之外去騰越千餘里無約束二長官為所戕賊避之鎮淮關內舊志稱尋甸巖谷野蠻以木皮蔽其身形貌醜惡男少女多持木弓以禦侵闕雲南通志卷二十四
