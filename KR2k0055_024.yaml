body:
  text: 雲南通志卷二十四土司附種人滇固西南夷也漢時始置郡縣隋唐置羈縻州顧自都督刺史太守外皆如諸葛武侯之治因其渠率而用之自元及明始廣設流官治以中土之法然明初土司猶三百二十餘人末年存者不及其半蓋皆憑恃險阻豕突狼奔覆族隕命耗矣我國家底定西南土司奉命者世襲有罪者革除靡不服教畏神洗心滌慮而雕題鑿齒卉服穴處之民亦知襲衣冠習文字何翕然丕變歟至於南掌獻琛夷奉賮尤為曠古未有豈非聖人在上德澤涵濡無逺不屆而阻深暗曶咸獲昭蘇哉若其風土俗尚服食居處有不同者别而録之以備象胥之紀亦徵王會之盛也志土司種人附焉雲南府羅次縣鍊象關土巡檢元時李為防送千戶明洪武中從征歿於陳録其子阿白為巡檢傳十一世至李文秀廉本朝平滇文秀投誠仍授世職文秀死子廉傑襲傑死叔昆秀襲昆秀死子廷傑襲廷傑死今子清臣襲祿豐縣南平關土巡檢元時李喜怒為土官明洪武中子李矣以宣諭各蠻升巡檢六傳至李印以征阿克死於陳無子以李矣次子李羅綺之第六世孫李惟賢襲惟賢死子楚南襲本朝平滇楚南投誠仍授世職楚南死無子公舉以嫡支李印之同祖弟惟白襲惟白死子文南襲文南死子天渥襲天渥死叔秀南襲秀南死今孫育俊襲昆明縣赤水鵬土巡檢阿喇馬丹明洪武中從征陳亡録其子馬速魯麻為巡檢久裁歸附至楊正授土羅次縣土知縣楊大用明洪武中知縣世其官傳至似震於準本朝順治十七年投誠仍授原職後以無軍功不世襲兩迤諸土官先經投誠授職後復革除者皆以此開滇率衆為鄉導討安寧州土知州董節明洪武中董定有功尋以入貢授奉訓大夫安寧土知州久裁宜良縣湯池土巡檢明正統中馬娜以通事偕使臣入三宣導諸蠻貢方物録其子為巡檢久裁巡檢洪清水江土巡檢李保明永樂中以通事授土熙中李賢入貢進將仕佐郎久裁曲靖府平彝縣土縣丞元末龍海為土官明洪武中歸順改其地為越州以海知州事及海子阿資叛伏誅其地分屬霑益陸涼永樂初資子祿寧詣闕奉貢詔授寧土縣丞與亦佐沙氏分土而居傳至海潮以功加土州判沿至自明子濶闊本朝平滇濶投誠仍授世職康熙八年裁縣安插於越州濶死子絪乾襲絪乾死弟納乾襲二十四年改平彛土縣丞納乾死一清襲一清死今從弟藏珍襲土知事楊光初為騰衝守禦千户所吏目明正統三年思任屠騰衝獲光去二年後光自麓川脫歸以賊情形告因以金帛令結麓川百夫長刀烏猛期與合兵圍賊攻江東西刀剛貢曩諸寨皆下之奪其浮橋大軍得以畢濟麓川定論功改守禦千户所為指揮使司升光府知事遷曲靖府久革南寧縣白水關土巡檢李檜芳明初以行伍從指揮李觀克大理烏撒有功授世職至承恩絶霑益州土知州元時安舉宗為曲靖宣慰使明初開滇有祿哲妻實卜與夫弟阿哥歸順卜授烏撒土知府哥授霑益土知州傳至九鼎世絶以烏撒安紹慶繼實祿哲七世孫也紹慶死次子紹良襲兼署烏撒府事及死以長子其爵襲烏撒職次子其祿襲霑益職其祿傳重鎮重鎮傳安民本朝平滇安民投誠仍授世職安民死子世基襲以橫暴為其下所訐改其子于蕃襲雍正四年于蕃以不法革職遷置江寧於其地置宣威州明正統中以討思任功改麓川為安插宣撫司恭項隴川改宣慰司為宣撫司以項為之後與其下刀木立搆兵焚司治項奔省城鎮撫發兵討之木立懼自縊死朝廷以民既不與恭氏不可復令守土而又不可沒其前功遂仍以項為宣撫司安置曲靖世其官傳至恭默以其地歸霑益州職除征麓川有功又從松韶關土巡檢李英明正統中從大兵解赤水圍世其官傳至舒和世絶沿及資曹以陸涼州土知州阿納明初內附授知州軍功升府同知傳至資世守以罪戍邊職除馬龍州土知州沙氏常氏皆久革羅平州土知州者洛元時阿邦龍少為酋長後叛誅之以其地與施氏元末施宗施秀以荒淫廢事洛本霑益土舍襲據其地明初歸附授土知州萬厯十三年者繼榮叛巡撫劉世曾討誅之改羅雄為羅平設流官遂革者氏世職洪武中設尋甸軍民府以土司尋甸土知府安氏明安氏領之裁為美歸厚二縣宣德間改為仁德府領高明馬龍二州復為美歸厚二縣以安氏世襲知府事成化十三年安暘安乃爭襲內亂遂改尋甸府設流官降安氏為營長嘉靖六年知府馬性魯以徵糧繫安暘孫安銓之妻於獄裸而撻之銓怒遂叛攻尋甸討誅之革其職易隆土驛丞奄索初為尋甸把事洪武中從征有功授土驛丞世襲至奄榮世絶平彛縣左縣丞沙普額明初歸附領縣事後降縣丞傳至運泰職除臨安府納樓茶甸土副長官司明初普少歸附授副長官歷傳十一世至普率本朝平滇普率投誠仍授世職康熙四年率附王祿叛官兵討之乞降赦之以子向化襲向化死子仁襲仁死今子天民襲虧容甸土副長官司元時阿附為鐵容甸部長明洪武中歸附賜姓孫授正長官司傳九世至孫大昌永本朝平滇大昌投誠授副長官司世職大昌死子祚襲永祚死今子世基襲納更山土巡檢明洪武中龍嘴以開荒有功給冠帶管理地方尋授土巡檢傳子龍政沿至龍統龍升龍天正在本朝平滇天正投誠仍授世職天正死子在田襲田死今子躍襲思陀甸土副長官司遮比明洪武時授副長官傳遮虧虧傳習習傳宗宗傳白白傳祥沿至李秉忠本朝平滇秉忠投誠仍授世職秉忠死承爵襲承爵死世絶左能寨土副長官司舊有土官獵豆傳至龍勝安龍上登素桀驁不聽道府鈐束革職本朝平滇有吳應科投誠以非滇志所載下臨安府考其世系其先有吳蚌頗為左能土官生鋪且鋪且生應科歷代相傳因授世職後無人承襲武中他有授副長官傳廷落恐甸土副長官司明洪圭廷琇及陳國誥為溪處錢覺平所殺沿至國賓本朝平滇國賓投誠仍授世職後無人承襲溪處甸土副長官司束克明初歸附授副長官越數代無姓不知冠𢃄自知府陳晟授以趙姓沿至恩洪恩禧恩忠叛本朝平滇恩忠投誠仍授世職康熙四年附王祿伏誅職除瓦渣鄉土副長官司明初阿因歸附授副長官沿至錢覺耀於本朝康熙四年同恩忠叛斬之教化三部副長官司荍乍明洪武初授職傳至張澤無子撫龍得勝為嗣生明明生長夀復龍姓名升本朝平滇龍升投誠仍以張長夀為名許之授世職康熙四年附王祿叛誅之以其地為開化府設流官安南副長官司元時以蒙自縣地近交址以僰蠻捨資為安南道防送軍千户明初土官那由以其城歸附授副長官正德六年那代作亂誅之職傳至阿乍王弄山土副長官司阿額明洪武中授烏珀烏志得烏騰鳯烏高舉後不知所終萬厯三十八年有土人沙源以所部兵斬賊有功委掌王弄山萬厯四十三年從征交址源擒偽勝智侯及阮文美等又以安南地畀之令阻截交路後赴援破安效良於嵩明遂授宣撫司源死子定洲謀叛據會城李定國擒斬之其黨王朔遂有巨弄山安南之地本朝平滇朔投誠授世職康熙四年朔與祿昌賢叛官兵討之朔自焚死以其地屬開化石屏州里長龍在田明崇禎間普名聲叛田領鄉勇征戰以功授守備後調湖廣授都督尋故子韜於康熙四年附逆族誅普氏明天啓中普名聲以功授宣阿迷州土知州原慰司以其子祚逺襲土知州後名聲作亂死其妻萬氏贅沙定州竊據滇省李定國擒斬之李阿則者州之土目也子本朝康熙四年定洲之黨王朔反攻臨安阿則遣思敬與官兵夾擊平之遂授土知州世職阿則死子思敬病廢孫廷樞襲廷樞死弟廷正襲廷正死子純襲雍正四年以侵盜錢糧革職安置江西州土知州元時普捷為㽛町路宣慰司明初開滇寧有弄甥者迎師有功賜姓祿授土知州沿至普奉以專橫伏法遂降州同以祿世仁為之後傳祿紹先討嶽鳳有功復土知州傳至祿華誥討羅平有功加秩至運同華誥傳子厚厚傳子溥溥傳弟洪洪傳姪永命永命傳叔傳弟昌賢同本朝平滇昌賢投誠仍授世職順治十七年降州明年以舉首梅道人等謀逆復原職康熙四年以叛伏誅李者祿投誠準土州判本朝康熙十九年復滇有世襲州判者祿死占鰲襲占鰲死雲鰲襲雲鰲死實寶襲至國勳世絶停襲嶍峨縣土知縣元時阿只為阿僰軍民總管明初祿羡歸順授土縣丞尋以功升知縣𢎞治間專任流官而以土官巡捕沿至祿益叛遁江外等本朝平滇益投誠仍授世職康熙四年與祿昌賢叛職除土主簿王添祥明永樂間從征麓川有功授主簿沿至王烈傳弟然然死無子叔揚祖襲本朝平滇揚祖投誠仍授世職康熙四年與祿昌賢等叛伏誅職除蒙自縣土知縣元總管阿只孫明初以蒙自歸附授土知縣傳陸欽陸榮陸剛陸仁𢎞治時改設流官職革縣丞李世屏其父日芳係明時目把李輔舜子附土沙定洲竊據蒙自日芳死子世藩世屏附祿昌賢叛平之俘世藩世屏降充大理軍吳三桂叛授偽總兵襲本朝復滇復繳偽劄投誠止授蒙自土丞不準世澄江府新興州土州判人本朝康熙十九年復滇新興州土王鳳授偽遊擊職迎至廣西路投誠隨剿石門坎馬别河黃草壩皆有功授土州判世職鳳死子迪吉襲迪吉死今子遴襲河陽縣安插土官刀門俸初為鎮康土知州明正統中從討麓川克上江深入灣甸直搗緬地纍功升孟定知府以其子刀斑線為鎮康知州後門俸入貢思氏餘孽思笑糾木邦攻鎮康殺斑線掠其金牌印信復攻孟定門俸次子刀孟不能支挈家奔永昌時王驥班師未久不能復征因安置門俸於澄江襲至刀宸子韜守本朝平滇韜投誠止給劄管理西南二門土軍防府城仍準世襲沿至廷俊裁革江川縣關索嶺土巡檢李實明宣德元年以地險設巡檢於嶺上因以實為之七傳至振文於崇禎十三年督弓兵築寧州城後沙賊破城合家死難統中以新興州鐵爐關土巡檢王爵初為通事明正從討麓川功授巡檢後建關於鐵爐山授世職五傳至王先榮本朝平滇投誠授世職康熙四年同王耀祖叛削除州秦普明洪武中歸附授州同永樂中路南州土知升知州傳至祿普及福無子至成化中設流遂失其官武定府土知府鳳氏其先弄積妻商勝明初倡衆歸附授土知府其三世孫阿英始改姓鳳英子朝文及孫繼祖叛平之改流官授鳳厯府經歷後每朔望夷目咸稽首於其幕知府劉寅慮為後患密請於巡撫陳用賓以他事殺之萬厯丁未阿克自稱鳳氏裔作亂官兵擒斬之和曲州金沙江土巡檢李安吉娜明初以部尉從觀音保降後從沐英攻烏撒及征越州纍功授巡檢後絶耳山巡檢劉保山亦以觀音保部曲歸附諭烏撒摩永昌越州功授巡檢世職尋裁廣哀之子僰夷也明元謀縣土知縣阿吾元土知縣初歸附令招諭縣民仍世襲土知縣後改流革除其裔吾大用於安銓鳳朝文之變有殺賊功至天啓中有大用曽孫必奎以從討安效良纍功守備後復叛斬之廣西府土知府昻氏明初普德歸順授彌勒州土知州尋升廣西府知府成化中昻貴以不法革職設流改調土照磨高仁義為姚安府土同知高賢族兄從定西伯蔣貴攻麓川纍功授姚安府照磨賢死子高貴襲于仁義為從子而官居其上以為嫌因調廣西世職巡緝沿至齊嵩世絶以親支文啓襲後革除師宗州土州同其先有普恩者元時為武德將軍世襲知州明初阿的歸附授州同傳至孫瓏哥遂以瓏為姓沿至瓏耿遣李璜赴京請襲璜竟請改土設流職除維摩州土知州資氏世領州事設流後資高資金相繼作逆州治為墟資金後為家奴所殺祀絶廣南府土同知元時儂郎恐為宣撫有二子長布哈次正祐明初布哈子郎金歸順授土同知死無嗣正祐襲後以罪死至洪熙