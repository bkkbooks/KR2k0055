body:
  text: 雲南通志卷十六上兵防附師旅考兵者國之大事而邊防尤要昔武侯南征不留兵不運糧規模粗定夷漢相安蓋亦隨時制宜未可因是而置詰戎設備於不事也元以前兵制無考明設衛所軍分屯戰寓兵於農其後搜閲不時積玩成習衛田半入兼併武辨難供任使逮招募興而又訓練無素不足以弭冦而轉致滋冦胥失之矣我國家廢屯衛而為招募雄師徑旅雲布星羅又日討軍實而申警之靡不有勇知方干城邊徼間有不逞草剃禽獮如行無事良由措置得宜而聖主訓飭將校之勤優恤戎行之厚更有以作其氣而致其忠也今者南交稽首越裳來貢邊防寧謐軍中有投石超距之樂百蠻有賣刀買犢之風是兵可百年不用矣然可一日不偹也哉至於歷代以來南中陳師鞠旅勝敗得失可當兵鏡故詳紀之俾後有考志兵防師旅考附焉漢制刺史郡守皆典兵武帝置犍為郡又置西夷都尉後平西南夷置牂牁越巂二郡以益州刺史領之後漢明帝割益州西部六縣為永昌郡置西部都尉三國漢昭烈帝初設庲降都督改益州為建寧郡後主分建寧永昌更置雲南郡又分建寧牂牁為興古郡以庲降都督綏南中郎將總其兵晉武帝初分益州置寧州又罷寧州入益州置南夷校尉成帝時分寧州置安州又置護南蠻校尉皆以太尉司徒大將軍大都督遙領之隋文帝初置昆州後置益州總管領其兵唐髙祖初仍為昆州復置檢校南寧都督寄治越雟太宗置首領大將軍髙宗初置郎州道行軍總管後又置姚州都督於昆明弄棟川𤣥宗始置劍南節度使領兵事遙制之後為䝉氏竊據宋太祖以玉斧分疆後悉為假氏所據兵制無考元世祖初置元帥府及總管分大理為南北中三路又分中慶路為三十七路并設宣撫安撫萬户及千户諸管兵官明洪武十六年設鎮守雲南總兵官掛征南將軍印以黔國公沐英領之駐省城轄通省衛所土司天啓二年設中軍參將一員旗鼓一員衛所兵制詳後正統五年設巡撫雲南等處地方贊理軍務都御史駐省城隆慶四年加銜兼建昌畢節設中軍一員天啓二年設旗鼓一員成化十二年設曲靖兵備道駐曲靖督曲靖尋甸二府衛所上司兵臨安兵備道駐臨安督臨安澄江廣西廣南元江五府衛所土司兵金騰兵備道駐永昌督永昌順寧二府衛所土司兵瀾滄兵備道駐洱海督大理楚雄姚安䝉化鶴慶景東麗江永寧鎮沅九府衛所土司兵各道或副使或僉事領之天啓二年各設中軍一員嘉靖二十四年設霑益守備洱海守備四十五年改設臨元參將駐臨安萬厯三年改設順寧守備十二年改分巡安普道為兵巡安普道駐省城督雲南武定二府衛所土司兵十三年設永騰參將駐永昌設姚關守偹四十八年設隴把守備荍甸守偹天啓二年設武尋參將駐武定設倘甸守偹衛所兵制都使司洪武十五年設雲南都指揮使司都指揮使領衛二十守禦千户所十九土守禦千户所一都指揮同知管操都指揮管屯都指揮經歷都事斷事司斷事司獄各一員各衛所三分馬步旗軍一萬七千五十四名七分屯軍二萬八千三百九十名舍丁一萬六千七百三十六名軍餘一十四萬四千九百一十二名各衛指揮使同知僉事皆世襲員數多少有無不一惟掌印操屯俱考選各一員經歷一員則二十衛之所同其知事鎮撫千户所及馬步旗軍屯軍舍丁軍餘各員名多少不一俱詳各衛下洪武十五年設雲南左衛指揮使司指揮使三員同知三員僉事十一員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所六正副千户二十三員百户四十三員三分馬步旗軍一千二百八名七分屯軍一千六百九十八名舍丁五百三十七名軍餘一萬五千八百五十四名雲南右衛指揮使司指揮同知五員僉事五員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所六正副千户二十員百户五十九員三分馬步旗軍九百八十四名七分屯軍一百九十四名舍丁三百八十五名軍餘一千九百一十九名雲南中衛指揮使司指揮使一員同知五員僉事五員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所六正副千户十三員百户五十七員三分馬步旗軍七百九十五名七分屯軍一千二百七十五名舍丁六百七十一名軍餘一萬八百二十名雲南前衛指揮使司指揮使三員同知二員僉事六員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所五正副千户十三員百户五十一員三分馬步旗軍九百九十八名七分屯軍五百二十名舍丁一百二十名軍餘二千三十名雲南後衛指揮使司指揮使二員同知二員僉事四員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所五正副千户九員百户三十三員三分馬步旗軍六百二十五名七分屯軍八百一十九名舍丁六十三名軍餘一千五百四十二名楚雄衛指揮使司指揮使三員同知四員僉事九員經歷司經歷一員知事一員鎮撫司鎮撫三員干户所五正副千户十九員百户五十二員三分馬步旗軍七百七名七分屯軍五百三十三名舍丁四百三十二名軍餘九千六十五名永昌衛指揮使司指揮使二員同知二員僉事六員經歷司經歷一員鎮撫司鎮撫二員千户所八正副千户十一員百户三十七員三分馬步旗軍一千一十八名七分屯軍三百名舍丁四百五十四名軍餘二千七百八十九名十六年設大理衛指揮使司指揮使二員同知五員僉事十一員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所十正副千户六十九員百户二十九員三分馬步旗軍六百三名七分屯軍一千一百四名舍丁二百九十名軍餘一萬三百一十四名十七年設洱海衛指揮使司指揮使四員同知二員僉事七員經歷司經歷一員知事一員鎮撫司鎮撫一員千户所六正副千户二十五員百户六十五員三分馬步旗軍一百二十三名