李猛逐太守雍約以應蜀冦李特南夷校尉李毅討斬詵睿走依五苓夷猛以箋降毅惡其言不遜誘殺之二年五苓夷帥于陵承詣毅請恕睿罪毅許諾及至殺之諸夷遂反奉建寧太守馬恢為刺史毅出軍救恢及聞其情乃殺恢光熙元年三月五苓夷圍寧州毅病請救未達卒毅女秀明達有父風衆推領州事奬勵戰士嬰城固守城中糧盡炙鼠拔草而食伺夷稍怠出兵掩擊破之愍帝建興四年五月平夷太守雷照殺南廣太守孟桓帥二郡叛降李雄明帝太寧元年春正月李雄使其將李驤任回冦臺登將軍司馬玫死之越巂太守李釗漢嘉太守王載以郡叛降於驤五月李雄遣李驤冦寧州刺史王遜遣將姚嶽拒戰於堂狼大破之二年十二月梁水太守爨亮益州太守李逖以興古叛降李雄三年五月征西大將軍陶侃以寧州刺史王堅懦弱不能禦冦表零陵太守尹奉代之徵堅還奉殺爨亮降李逖夷境乃安成帝咸和二年正月寧州秀才龎遺起義兵攻李雄將任回李謙等雄遣將羅恆費黑來救刺史尹奉遣裨將姚嶽及朱提太守楊術援遺戰於臺登嶽等敗績術死之八年正月李雄將李壽陷寧州尹奉及建寧太守霍彪降之咸康二年十月廣州刺史鄧嶽遣督護王隨擊夜郎新昌太守陶協擊興古並克之五年三月鄧嶽伐蜀建寧人孟彥執霍彪以降宋文帝元嘉十八年十二月晉寧太守爨松子反寧州刺史徐循討平之隋文帝開皇十七年南寧夷爨玩反以史萬歲為行軍總管討平之初爨玩遣使朝貢命韋世冲以兵戍之置昆州以玩為刺史至是復叛萬歲自蜻蛉川經弄棟水過諸葛武侯紀功碑渡西洱河入渠濫川破其三十餘部諸夷大懼請降萬歲欲以玩入朝玩賂萬歲因舍之明年復反蜀王奏其受賄縱賊除名爨玩懼入朝上戮之沒其子洪達等為奴唐太宗貞觀二十二年遣右武衛將軍梁建方討松外蠻酋帥雙舍拒戰敗走殺獲十餘萬餘悉諭降因遣竒兵掩西洱河蠻其帥楊盛大駭欲遁去使者好語約降乃納欵軍門建方振旅而還髙宗永徽二年白水蠻與大小勃弄蠻酋相誘為亂大勃弄楊承顛冦麻州都督任懷玉招之不從以左領軍將軍趙孝祖為郎州道行軍總管與懷玉往討大破之斬白水酋儉彌干等三年孝祖兵西入太勃弄酋長歿盛率衆迎戰大敗斬之執楊承顛餘屯皆降咸亨三年正月姚州蠻冦邊殺長史李孝讓等以太子右衛副率梁積夀為姚州道行軍總管討平之調露元年永昌蠻復叛上命李義總師討之敗績郎將劉惠等戰死中宗景龍元年六月吐蕃及姚州蠻冦邊姚巂道討擊使唐九徵敗之吐蕃以鐵絙梁漾濞二水通西洱蠻築城戍之九徵毁絙平城建鐵柱於滇池勒功四年十二月姚州蠻反監察御史李知古擊降之因聚斂誅掠羣蠻怨怒引吐蕃攻殺知古姚巂路絶𤣥宗開元元年十月姚巂蠻冦姚州都督李䝉死之三年十月巂州蠻冦邊驍衛將軍李元道伐之十七年二月巂州都督張審素討西南夷破之克雲南昆明城二十六年南詔盡併五詔地天寶八載十月詔特進何履光率十道兵以伐雲南初安寧城有五鹽井人得煮鬻自給至是遣履光以兵定南詔境取安寧城及井復立馬援銅柱乃還九載十月南詔反陷雲南郡時鮮于仲通領劍南節度使卞忿少方略故事南詔嘗與妻子謁都督過雲南太守張䖍陀私之多所求丐閣羅鳯不應䖍陀數詬靳之隂表其罪由是忿怒反發兵攻䖍陀殺之取姚州及小夷州凡三十二十載四月劍南節度使鮮于仲通自將出戎巂州分二道進次曲州靖州閣羅鳯遣使者謝罪願還所虜得自新且城姚州如不聽則歸命吐蕃恐雲南非唐有仲通怒囚使者進薄白崖城大敗引還大將王天運為南詔所殺死者六萬人閣羅鳯斂戰胔築京觀遂北臣吐蕃會楊國忠以劍南節度使當國掩其敗狀復募兵擊之以上三事本紀與南詔傳年數不符茲從本紀十三載六月劍南節度留後李宓將兵十萬擊南詔為閣羅鳯所誘深入糧盡士卒飢疫引還適吐蕃論綺里徐兵至內外夾擊宓沉江死軍悉潰前後死者二十餘萬人國忠更以捷聞閣羅鳯因取巂州㑹同軍破越析代宗大厯十四年十月南詔異牟尋與吐蕃併力率衆二十萬入冦一趨茂州踰文川擾灌口一趨扶文掠方維白壩一侵黎雅叩邛崍關發禁衛及幽州軍往禦大敗之斬首六千級禽生捕傷甚衆顛踣崖峭且十萬異牟尋懼更徙羊苴咩城德宗貞元四年吐蕃冦寧州邠寧節度使張獻甫敗之五年劍南西川節度使韋臯敗吐蕃於臺登北谷克巂州時勿鄧大鬼主苴夢衝數為吐蕃侵獵兩林都大鬼主苴那時遺韋臯書乞兵攻吐蕃臯遣將劉朝彩出銅山道吳鳴鶴出清溪關道郭英俊出定蕃柵道進逼臺登城吐蕃退壁西貢州據髙為營苴那時分兵大破青海臘城二節度軍於北谷青海大兵馬使乞藏遮遮臘城兵馬使悉多楊朱節度論東柴大將論結突梨等皆戰死執籠官四十五人鎧仗一萬牛馬稱是進拔於葱柵詔封苴那時等皆為王十年正月南詔敗吐蕃於神川來獻捷先是南詔苦吐蕃婪刻無厭清平官鄭回因說異牟尋復歸唐異牟尋善之諸蠻頗得其語白於韋臯臯遣諜者遺之書吐蕃疑之責大臣子為質異牟尋愈怨乃遺臯書决䇿內附臯護使至京帝嘉之賜以詔臯令其屬崔佐時持至羊苴咩城時吐蕃使者多在佐時大宣詔書勸異牟尋斬吐蕃使復南詔舊名異牟尋皆從之吐蕃因與回鶻戰殺傷甚乃調南詔萬人異牟尋欲襲吐蕃陽示寡弱以三千人行許之即自將數萬踵後晝夜行大破吐蕃於神川遂斷鐵橋溺死以萬計俘其五王獻捷京師七月異牟尋攻吐蕃復取昆明城以食鹽池又破施蠻順蠻並虜其王置白崖城因定麼些蠻隸昆山西爨故地破茫蠻掠弄棟蠻漢裳蠻以實雲南東北十二年二月吐蕃寇巂州刺史曹髙仕破之十三年五月吐蕃復冦巂州髙仕又擊敗之十六年七月韋臯克吐蕃末恭城吐蕃大臣以歲在辰兵宜出謀襲南詔閲衆治道將以十月圍巂州軍屯昆明及西貢川異牟尋與臯相聞臯命部將武免率弩士三千人赴之亢榮朝以萬人屯黎州韋良金以二萬五千人屯巂州吐蕃引衆五萬自曩貢川分二軍攻雲南一軍自諾濟城攻巂州臯以巂州實往來道扞蔽數州嚴兵以守别遣將襲擊降其帥又取末恭城於是虜氣衰軍不振退至鐵橋南詔毒其水人多死吐蕃苦唐詔掎角亦不敢圖南詔乃屯三瀘水復城悉攝悉攝吐蕃險要也南詔與臯部將杜毗羅狙擊之十七年二月南詔等夜絶瀘水斬吐蕃屯卒吐蕃保鹿危山毗羅設伏以待又戰吐蕃大奔於時康黑衣大食等兵及吐蕃大酋皆降獲甲二萬首又合鬼主破之於瀘西吐蕃乃戍納川故洪諾濟臘聿齎五城欲悉師出西山劍山收巂州以絶南詔臯遣將郉毗以兵萬人屯南北路趙昱以萬人戍黎雅州異牟尋謂臯曰虜聲取巂州實窺雲南請進軍羊苴􅫗及吐蕃破麟州臯督諸將分道出或自西山或由平夷或下隴陀和石門或徑神川納川與南詔㑹九月臯敗之於雅州克木波城前後凡克城七焚堡百五十所斬首萬級生禽論莽熱獻於朝獲鎧甲十五萬圍昆明維州不能克乃班師憲宗元和十一年五月雲南蠻冦安南時黃洞蠻屢叛雍管閒連歲被兵南詔清平官王嵯巔遂乘釁東冦文宗太和三年十一月南詔陷邛戎巂三州十二月冦成都時西川節度使杜元穎治無狀障候弛沓相䝉南詔豐祐與王嵯巔乃悉衆掩卭戎巂三州陷之入成都止西郛十日將還乃掠子女工技數萬引而南南詔自是工文織與中州埓上遣鄂嶽襄鄧忠武軍及右領軍衛大將軍董重質追擊之蠻復冦梓州又冦蜀州六年南詔掠驃國民徙之拓東武宗㑹昌六年九月南詔冦安南經略使裴元裕敗之宣宗大中十二年南詔陷安南都護府時經略使李琢苛墨自私夷人不堪結南詔將段酋遷陷都護府號白衣沒命軍南詔發朱弩佉苴三千助守然歲猶朝貢十三年十二月南詔陷播州時宣宗崩使者告哀㑹豐祐亦死坦綽酋龍立恚朝廷不弔恤又詔書仍賜故王以草具進使者而遣還遂僭號建元懿宗以其名近元宗嫌諱絶朝貢乃陷播州懿宗咸通元年十月安南都護李鄠克播州十二月南詔冦安南時李鄠屯武州為蠻所攻棄州走以王寬代之二年八月南詔冦雍州九月冦巂州時蠻兵攻雍管經略使李𢎞源兵少不能拒奔蠻州南詔亦引去詔殿中監段文楚為經略使數改條約衆不悅以胡懷玉代之南詔知邊人困甚剽掠無有不入冦杜悰當國為上謀遣使者弔祭示恩信并詔驃信以名嫌冊命未可舉必易名乃得封上乃命左司郎中孟穆持節往㑹南詔陷巂州遂止不行三年二月以蔡襲為安南經略招討使發諸道兵二萬屯守南詔憺畏不敢出㑹詔左庶子蔡京經制嶺南忌襲功欲阻壞之乃言南方無虞武夫幸功多聚兵耗餽運請還戍兵襲執不可願留兵五千纍表不報即極陳南詔伺隙久有十必死狀朝廷不省十一月南詔攻交州進略安南襲請救發湖荆桂兵五千屯雍州詔襲按軍海門襲請濟師以山南東道兵千人赴之四年正月南詔攻益急襲録異牟尋盟言繫矢上射入其營不答俄而城陷襲闔宗死者七十人幕府樊綽取襲印走渡江督荆南軍入東郛苦戰斬南詔二千級是夜蠻遂屠城蠻兵兩陷安南所殺十五萬人有詔諸軍保嶺南五年正月南詔冦巂州西川節度使蕭鄴率屬蠻邀於大度河敗之三月南詔冦雍州官兵敗嶺南西道節度使康承訓不知所為有小校率勇士三百人夜縋城出燒其營蠻大驚解去六年五月嶺南西道節度使髙駢及南詔戰於雍州敗之南詔復冦巂州刺史喻士珍貪獪掠兩林東蠻口縛賣之以易蠻金蠻至開門降盡殺戍卒士珍遂臣於蠻時駢代康承訓為節度使以選士五千渡江敗林邑兵於雍州擊南詔龍州屯蠻酋燒資畜走酋龍遣楊緝思助段酋遷共守安南以范胒些為安南都統趙諾眉為扶邪都統七年六月高駢克安南時駢次交州戰數勝楊緝思出戰敗還走城士乘之超堞入斬酋遷胒些諾眉上首三萬級安南平進駢檢校刑部尚書仍鎮安南十年十二月南詔陷嘉州先是酋龍遣清平官董成等十九人詣成都節度使李福將庭見之成等請以敵國禮見福怒命武士捽辱之械繫於館俄而劉潼代福節度即挺其繫表縱還有詔召成等至京師賜物良厚慰遣還國至是酋龍遣使楊酋慶等來謝釋囚定邊節度使李師望欲激蠻怒幸有功乃殺酋慶等既而戍士怒師望貪殘欲生食之會召還以竇滂代之滂尤不法酋龍怨殺其使率衆入冦竇滂遣兖海兵五百往戰一軍皆覆酋龍乃身自將督衆五萬侵巂州攻青溪關諸屯皆退保北涯復攻黎州濟江襲犍為破之遂陷嘉州十一年正月南詔陷黎州入自卭崍關圍雅州復擊卭州遂進攻成都次眉州西川節度使盧耽畏援軍未集請降大使通好以紓其深入詔遣太僕卿支詳為和蠻使耽與故瀘州刺史楊慶復共修守備又選悍士三千號突將日隸於軍二月蠻四面攻城耽遣李璹張察率突將戰城下俘斬二千級蠻攻益力耽多方禦之上遣東川節度使顏慶復為大度河制置劍南應接使兵次新都博野將曽元裕敗蠻兵斬二千級大將宋威繼至又與蠻戰斬首五千南詔還屯星宿山威進戍沱江蠻聞鳯翔山南軍且來乃迎戰毗橋不勝趨沱江為伏士所擊城中出突將夜火蠻營又王師奪升遷梁蠻大敗酋龍知不敵夜撤營南奔至雙流江無梁計窮將赴水死或止之曰不如僞和以紓急乃來請三日梁成而濟十四年坦綽復冦蜀絙舟大度河以濟刺史黃景復擊郤之衆循河而南夜桴上流夾攻瀕水諸屯景復敗走還黎州設伏以待蠻躡追之為景復所敗㑹蠻踵來還攻大度河仆旗息鼓請曰坦綽欲上書天子白寃事戍兵信之不戰橋成而濟黎州陷遂攻雅州擊定邊軍卒潰入卭州成都大震坦綽遣使者四十人齎驃信書遺節度使牛叢欲假道入朝請憩蜀玊故殿叢欲許之楊慶復諫曰蠻無信彼禮屈辭甘詐我也因斬其使留二人報書詈辱之坦綽至新津而還僖宗乾符元年十二月南詔冦黎雅二州入卭崍關掠成都成都閉三日蠻乃去詔河西河東山南東道東川兵伐之二年正月髙駢敗南詔於大度河時駢由天平軍徙西川節度使鎮成都至鎮不淹月閲精騎五千逐蠻至大度河執酋長五十斬之收卭崍關復取黎州南詔遁還召景復責大度河之敗斬以徇戍望星清溪等關南詔懼遣使者詣駢結好而踵出兵冦邊駢斬其使答曰我且將百萬衆至龍尾城問爾罪酋龍大震自南詔叛天子數遣使至其境酋龍不肯拜使者遂絶駢以其俗尚浮屠法故遣浮屠景仙攝使往酋龍與其下迎謁且拜乃定盟而還駢結吐蕃尚延心嗢末魯耨月等為閒築戎州馬湖沐源川大度河三城列屯拒險料壯卒為平夷軍南詔氣奪酋龍恚發疽死後梁太祖乾化四年十一月南詔鄭仁旻冦蜀蜀王建大破之自是南詔不復犯邊宋太祖乾德三年正月王全斌平蜀欲以兵威取滇進滇地圖太祖鑒唐之禍以玉斧畫大渡河曰此外非吾有也由是雲南不通中國為段氏竊據元憲宗二年命太弟呼必賚征雲南以烏蘭哈達總督軍事三年九月次忒刺分三道以進烏蘭哈達率西道兵由晏當路諸王綽哈阿齊拉率東道兵由白蠻太弟由中道乙巳至滿陀城留輜重十月丙午過大度河又經行山谷二千餘里至金沙江乘革囊及筏以渡摩沙蠻主迎降十一月辛卯遣三使入大理招段興智皆被殺丁酉師至白蠻打郭寨其主將出降其姪堅壁拒守攻拔殺之不及其民庚子次三甸辛丑白蠻送欵十二月丙辰兵薄大理城大理國主段興智微弱國事皆決於相髙泰祥屢戰不勝時東路兵亦至皆登點蒼山視城中城中大懼泰祥徵兵三十七部有來援者皆為元兵阻敗始與興智謀出避外郡圖興復興智奔善闡泰祥奔統矢命大將額爾固濟巴圖爾追之以大理拒命將屠其城用詞臣姚樞言乃裂帛為旗書止殺之令分號於衆兵入大理人民安堵己未西道兵亦至命姚樞搜訪圖籍辛酉南出龍尾城次趙瞼癸亥獲髙泰祥於姚州欲官之不屈因斬之而用其子高瓊高長夀等四年春太弟班師留烏蘭哈達經略雲南地哈達率衆攻合剌章水城屠之前次羅部府大酋髙升集諸部兵拒戰又大破之進至善闡興智率衆固守城際滇池三靣皆水既險且堅哈達選饒勇以炮摧北門縱火攻之皆不克乃大震鼓鉦進而作作而止使不知所為如是者七日伺其困乏夜五鼓遣子阿珠潛師躍出亂砍之遂大潰至昆澤段興智及其渠帥馬合剌昔皆降餘衆依阻山谷者分命裨將伊埒托卜伊津等掩其左右圍既合哈達與阿珠率善射者二百騎四靣進擊又攻纖寨拔之至乾德哥城哈達病委軍事於阿珠環城立炮以草填塹衆軍始集阿珠已率所部搏戰城上城遂破五年哈達率師平烏蠻諸郡凡出師三年平大理五城八府四郡烏白等蠻三十七部兵威所加無不欵服六年哈達以雲南平獻捷授銀印加大元帥還鎮大理以劉時中為宣撫使赦段興智領諸蠻從合征交趾屠其城經車里所部悉降之世祖至元元年舍利畏叛諸部竝起信苴日討平之時東爨舍利畏倡言䝉古處北吾等處南聲教所不及何以服從之㑹都元帥布呼丹專制不善撫輯於是東方諸蠻竝起應之衆至三十萬上聞變命大理總管信苴日與大將合兵討之衆皆解散惟舍利畏遁入巖箐未獲至十一年信苴日遣人詭為商旅執贄往見殺之十年二月雲南羅羽酋長阿旭叛詔有司安輯其民募能捕斬阿旭者賞之十三年羅槃甸叛雲南行省平章贍思丁率師往討降之事詳名宦十四年四月𬗟蒲甘夷冦金齒沙木斯鼎遣呼圖等攻敗之時金齒千額總管阿禾內附𬗟怨之遣蒲甘大將釋多羅伯級攻其地欲立寨騰越永昌之間㑹大理路䝉古千户呼圖克大理路總管信苴日總把千户托多爾海奉命伐永昌之西騰越蒲驃阿昌金齒未降部族駐劄南甸阿禾告急呼圖克等晝夜行與𬗟軍遇一河邊其衆約四五萬象八百馬萬匹呼圖克軍僅七百人𬗟人前乘馬次象次步卒象披甲背負戰樓兩旁挾大竹筒置短槍數十於其中乘象者取以擊刺呼圖克下令賊衆我寡當先衝河北軍親率二百八十一騎為一隊信苴日傍河為一隊托多爾海依山為一隊戰良久賊敗信苴日追之三里抵寨門旋濘而退南靣賊萬餘繞出官軍後信苴日馳報呼圖克復列為三陳進至河岸擊之又敗追破其十七寨逐北至窄山口賊及象馬自相蹂死者盈三巨溝日暮呼圖克中傷遂收兵明日追之至干額不及而還捕虜甚衆軍中以一帽或兩靴一氊衣易一生口其脫者又為阿禾阿昌邀殺歸者無幾十月雲南省遣都元帥尼雅斯拉迪音率䝉古爨僰麼些軍三千餘人征𬗟至江頭城招降磨欲等三百餘寨以天熱還師十五年詔以雲南境土廣遠未降者多僉軍萬人進討十七年二月達喇布爾罕以雲南行省軍攻定昌路禽總管谷納殺之十九年三月烏䝉民叛詔諾特和和羅蘇默率䝉古漢人新附軍討之二十年十一月諸王桑阿克達爾右丞台布參政伊克德濟將兵征𬗟克之先是尼雅斯拉迪音請益兵征𬗟上以精兵萬人屬之進討又發四川軍萬人命約爾哈領之同進又詔信苴日同右丞拜達勒迎師信苴日至金齒病卒尋敕僉亦奚不薛及播思叙三州兵并發羅羅斯等軍䝉古新附軍復發征日本重囚同征𬗟九月大軍發中慶十月至南甸台布由羅必甸進軍桑阿克達爾命伊克德濟取道於阿昔江達鎮西阿禾江造舟二百下流至江頭城斷𬗟人水路自將一軍從驃甸徑抵其國與台布軍㑹進攻江頭城拔之獲其鋭卒萬餘人命都元帥袁世安戍之隨遣使諭降𬗟酋不聼據太公城以拒大軍復遣僧諭以禍福反為所害遂督軍水陸並進擊破之十二月雲南施州子童為亂詔參知政事阿哈巴克實帥兵合羅羅斯托里實克討之二十一年正月建都王烏䝉及金齒一十二處俱降先是建都為𬗟所制欲降未能至太公城既破乃相率赴大軍降各分兵戍守置邦牙宣慰司於蒲甘城命雲南王克哷移鎮緬桑阿克達爾等振旅還遣使進𬗟珍珠珊瑚異綵及七寶束帶四月雲南行省進破江頭城所得童男女八千人并銀器幣帛二十二年九月烏䝉叛命四川行院伊蘇德勒將兵討之馬湖總管汝作以蠻兵三百為助降西崖門酋長阿者等百餘户十月烏蒙蠻夷宣撫使阿䝉叛詔討之二十三年十月調招討使張萬為征緬副都元帥額森特穆爾為征𬗟招討司達嚕噶齊千户張成為征𬗟招討使並虎符敕造戰船將兵六千人征𬗟以圖們岱為都元帥總之二十四年八月以李海拉蘇為征𬗟行省參政將新附軍五千探馬赤軍一千以行仍調四川湖廣行省軍五千赴之召能通金齒白夷道路者張成及前占城軍總管劉全並為招討使佩虎符從征以圖們德爾為都元帥將四川省兵五千赴緬省仍令其省駐緬近地以俟進止既而雲南王與諸王進征蒲甘喪師七千餘𬗟始平十二月鎮南王托歡將兵征交址克之先是正月發雲南兵同江淮江西湖廣三省䝉古漢劵軍及海外四州黎兵討交址置征交址行尚書省鄂囉齊平章政事烏瑪喇樊楫參知政事總之並受鎮南王托歡節制十一月雲南省右丞阿嚕兵次交趾木兀門其將昭文王以四萬人守之阿嚕擊破之獲其將黎石何英鎮南王次思明程鵬飛與鄂囉齊等從鎮南王分道並進阿巴齊以萬人為前鋒烏瑪喇樊楫及程鵬飛等遂趨交趾所向克捷鎮南王次界河交趾發兵拒守前鋒皆擊破之次萬劫諸軍畢㑹十二月鎮南王次茅羅港攻浮山寨破之以諸軍渡富良江次交趾城下敗其守兵陳日烜與其子棄城走敢南堡復走入海鎮南王以諸軍追之不及引兵還交趾城諸將以糧盡師老宜全師而還鎮南王從之二十五年三月鎮南王次內傍關賊兵大集以遏歸師遂由單已縣趨盝州閒道以出次思明州命阿嚕引兵還雲南鄂囉齊以諸軍北還日烜遣使來謝進金人代已罪二十九年八月詔布敦䝉古勒默色以軍征八百媳婦國成宗元貞元年二月雲南行省平章額森布哈言敢麻魯有兩夷未附金齒亦叛服不常乞調兵六千鎮撫金齒從之二年三月元江賊捨資殺掠邊境梁王命集賽台等討降之雲南省臣額森布哈征乞藍拔瓦農開陽兩寨其黨答刺率諸蠻來降乞藍悉平大德元年九月八百媳婦叛冦徹里遣額森布哈將兵討之四年五月緬王為其弟阿撒哥也等所殺其子窟麻剌哥撒入逃詣京師詔䝉古圖嚕默色率師問罪蠻賊與八百媳婦國通其勢張甚䝉古圖嚕默色請益兵又命薩察固爾等將兵萬二千人征之仍令諸王庫庫節制其軍七月𬗟賊阿撒哥也弟者蘇等九十一人各奉方物入朝自言殺主之罪始罷征𬗟兵十二月遣左丞劉深等征八百媳婦時深倡議世祖以神武一海內今上嗣立未有武功而八百媳婦國助𬗟為逆請征之左丞相哈喇哈遜御史中丞董士選諌不聽詔深及哈喇岱鄭祐將兵三萬人往討五年二月以劉深哈喇岱為中書右丞鄭祐為參知政事皆佩虎符立征八百媳婦萬户府二設萬户四員發四川雲南囚徒從軍五月敕雲南省分䝉古射士征八百媳婦兵既出取道順元遠冒烟瘴士卒多死驅民轉餉溪谷之間一夫負粟八斗率數十人佐之數十日乃達死者又數十萬人中外騷然而深復脅求水西土官之婦蛇節金三千兩馬三千匹土官宋隆濟因苗民之怨遂結連蛇節率苗獠反破楊黃寨進攻貴州知州張懷德力戰死因困劉深於窮谷中梁王庫庫率兵救之賊稍却七月遣薩察固爾等將兵征金齒等國時征𬗟師還為金齒所遮士多戰死又連接八百媳婦諸蠻相效不輸稅賦賊殺官吏故皆征之薩察固爾等圍緬兩月城中薪食俱盡勢將出降將校髙慶察罕巴哈受其重賂以炎暑瘴疫為辭輒引兵還詔誅之免薩察固爾為庶人十一月上因劉深敗始悔不用哈喇哈遜董士選之言乃遣劉國傑楊賽音巴哈等率湖廣四川兵分道進討别敕梁王以雲南兵接應六年正月增劉國傑等軍是月劉深等以糧盡不能至八百媳婦國而還宋隆濟蛇節率衆邀擊輜重委棄士卒殺傷殆盡二月罷劉深等官時烏撒烏䝉東川芒部及武定威楚普安諸蠻因蛇節之亂皆以供輸煩勞為辭乘釁起兵攻掠州縣復詔伊蘇岱爾䝉固岱等將兵㑹劉國傑討之賊兵徑利且多健馬官軍不利國傑令人持一盾布釘其上俟陳合棄盾佯走賊來追馬遇盾皆仆國傑鼓譟趣之賊大敗既而餘冦復合要戰國傑不應數日度其氣衰一鼓破走之追戰數千里播州安撫使楊賽音巴哈出播境連與賊遇破之前駐蹉泥賊騎猝至賽音巴哈奮擊先進大軍隨之賊遂潰乘勝逐北殺獲不可勝計遂降阿苴下笮龍望塵送款者相續十一月劉國傑裨將宋光率兵大敗蛇節七年三月罷雲南征𬗟分省誅劉深笞哈喇岱鄭祐時㑹赦當免哈喇哈遜曰徼名首釁喪師辱國不誅深無以謝天下遂伏誅四月劉國傑楊賽音巴哈大破賊於墨特川蛇節降隆濟遁去遂誅蛇節餘黨相繼平八年春雲南順元同知宣撫宋阿珠生獲隆濟來獻斬之十年四月雲南羅雄州軍火主阿邦龍少結豆溫匡虜普定路諸蠻為冦右丞汪維能進討賊退據越州諭之不服遣平章伊蘇岱爾率兵萬人往捕之兵至曲靖與維能合從諸臣錫保齊伊哷濟達等進壓賊境獲阿龍少斬之餘衆皆潰命伊蘇岱爾留軍二千戍之武宗至大二年十一月八百媳婦及大小徹里諸蠻作亂威遠州谷保據木羅甸詔遣雲南右丞薩濟固爾威往諭之薩濟固爾威受谷保賂復進兵攻劫谷保弓弩亂發遂敗還三年正月復遣薩濟固爾威招撫八百媳婦四年五月八百媳婦與大小徹里蠻冦邊命雲南王及右丞阿固台以兵討之仁宗皇慶元年九月罷征八百媳婦大小徹里蠻以璽書招諭之時朝議主用兵侍御史趙世延曰蠻夷事在羈縻先朝用兵不已致亡失軍旅誅戮省臣今當選重臣知體者付以邊寄兵宜無用章再上事乃罷延祐六年二月雲南闍里愛俄永昌蒲蠻阿入剌等並為冦命雲南省從宜𠞰捕十一月木邦路帶邦為冦敕雲南省招捕之英宗至治三年十月入番順元及靜江大理威楚諸路猺兵為冦敕湖廣雲南二省招諭之十一月雲南開南州大阿哀阿三木台龍買六千餘人冦哀卜白鹽井詔凡有罪自首者原其罪十二月雲南車里于孟花腳等蠻為冦詔招諭之泰定帝泰定元年六月雲南大理路你囊為冦十月雲南車里蠻為冦遣鄂爾多奉詔招諭之其酋塞賽子尼靣雁搆木子刁零出降十二月雲南猺阿吾及至閙為冦行省督兵捕之二年四月僰夷及搜雁遮殺雲南行省所遣諭蠻使者詔追捕之五月車里陶剌孟及大阿哀蠻兵萬人乘象冦陷多羅等十四寨木邦路蠻入廟率僰夷萬人冦陷倒入漢寨命邊將嚴備之六月開南府阿只弄哀培蠻兵為冦命雲南行省督所屬兵捕之七月威楚大理諸蠻為冦雲南行省請出師不允遣伊埒穆爾丹等使大理布延實哩等使威楚招諭之十二月元江路土官普山為冦詔戍兵捕之三年正月元江路總管普雙叛命雲南行省招捕之五月岑世興及鎮安路岑修文合山獠角蠻六萬餘人為冦命湖廣雲南行省招諭之八月寧遠州洞蠻刁用為冦命雲南行省備之四年五月元江路總管博碩坐贓免遂結蠻兵作亂敕復其舊職七月博碩復叛十月開南州土官阿齊拉率蠻兵為冦命雲南行省招捕之致和元年五月大理怒江甸土官阿海你冦樂辰諸寨命雲南行省督兵捕之雲南通志卷十六上
