body:
  text: 欽定四庫全書雲南通志卷二十九之一藝文大易垂象於坤為文滇居西南坤之位也宜乎文明炳蔚矣乃太沖賦蜀都邛竹蒟醬咸紀滇産而著作之盛無聞豈風氣之開固自有待歟我國家重熙纍洽聖祖仁皇帝削平僭逆文教誕敷世宗憲皇帝垂念萬里邊方訓諭諄摰今皇上即位洪慈厚澤無逺勿屆謨誥所頒煌煌乎儷日星而昭雲漢丕顯丕承於斯為盛宜恭冠藝文以為裔土之光至於漢唐以還誥諭獻訥之作紀時述事之章及昭代公卿大臣之訏謨逺猷下逮文人學士之吟咏擇其有關治道人心風俗者各以類從編諸簡册庶昔人所云幽思絢道德摛藻掞天庭者不獨在華陽錦水間也志藝文本朝御製聖祖仁皇帝諭各省王貝勒大將軍將軍督撫提鎮等敕康熙十七年兹據大將軍簡親王等報稱逆賊吳三桂已經身死良由三桂數年以來構兵倡亂荼毒生靈罪大惡極故天命殛之當日準其遷移原欲保全安插始終寵眷不意其包藏禍心輒行反叛背纍朝豢養之恩逞一旦鴟張之勢橫肆凶逆擾亂地方元凶既服天誅脅從宜施寬典凡在賊中文武官貟兵民人等皆朕赤子素受國家恩飬必非甘心從逆或心存忠義不能自拔或勢被迫驅懷疑畏罪陷身逆黨朕甚憫焉其各體朕寬大好生之心翻然悔悟爭先來歸朕必優加恩賚論功敘録爾等其即宣布德意廣示招徠務使懷忠抱義之士順天命以圗全審事機而建績撫綏戡定早奏蕩平以副朕嘉與維新之意故敕諭湖廣總督蔡育榮敕康熙十八年自逆賊吳三桂背恩反叛遣發大兵各路征𠞰平定地方撲滅賊寇湖南廣西福建等處以次恢復餘賊逃潰盤據水陸險隘希圗抗拒如此殘寇雖無煩速𠞰不久自當殄滅但朕軫念民生急於拯救令其得所故欲掃除餘孽以靖地方今賊既敗遁負險不便專恃馬兵若用緑旗步兵之力則滅賊甚為有益况我緑旗官兵較之賊甚強爾世受國家厚恩理宜戮力行間立功邊陲殫心為國以圗報效爾當各率所屬緑旗官兵平定辰沅恢復雲貴其遣發官兵幾路前進作何調度始能恢復著詳議具奏如爾盡力報效克取辰沅恢復雲貴朕必不拘成例從優加恩爾率官兵前進則滿洲大兵亦即相繼進𠞰接運糧餉不至匱乏此事關係重大著詳加酌定具奏故敕諭湖廣總督蔡育榮第二敕康熙十八年兹以大兵進𠞰雲貴各路緑旗官兵必須專責一人總轄調遣始克允濟特授爾為綏逺將軍總轄常德武岡等處所有各省調撥官兵及湖廣全省緑旗官兵聽爾酌量調度前進底定地方總督董衛國周有德提督桑格趙賴周卜世俱聽爾節制商酌而行一切平定雲貴以及𠞰撫各項事宜惟爾專責至楚省見任文職官貟聽爾遴選賢能帶赴軍前調用如有能備芻糧克濟軍機及官軍有能首先奪關冒險直入擊敗賊衆者爾即開列勞績具疏奏聞論功加等議敘如有臨陳運糧違誤者副將知府以下各官即以軍法從事其以上各官指名飛章參劾從重治罪水陸兵將不相習者爾即具奏酌行更調爾定期進取恢復地方將破賊事宜密行知會廣西陜西等處王將軍提督等齊乘機會而行爾須嚴督兵將相機前進力行𠞰除毋得遲延坐失時會仍嚴加偵探母致踈虞大兵一到抗拒不順者戮之有先被賊脅從即時迎降者俱免誅戮有能擒殺賊渠投誠者分别升賞須嚴禁兵將申明紀律經過地方毋得騷擾百姓歸順良民加意撫恤爾膺兹重任宜攄忠竭力籌畫周詳剿撫兼施早奏膚功以副朕簡擢至意欽哉故諭恢復雲南詔康熙二十年朕纘承丕緒統御寰區仰惟天地眷佑之庥祖宗付托之重聖祖母太皇太后慈訓之殷蚤夜孜孜勤求化理期於兵革寢息海隅乂安不意逆賊吳三桂負國深恩倡為變亂隂結姦黨同惡相援抗違詔令竊據疆土滇黔閩浙楚蜀關隴兩粵豫章之間所在驛騷肆騁痡毒三桂僣稱偽號逆焰彌滋負罪尤重朕恭行天討分命六師𠞰撫並施德威互濟或縶頸於闕下或駢戮於師中擒捕誅鋤以次收服乃三桂既膺神殛逆孫世璠猶復鴟張踞六詔之一隅延殘喘以拒命朕惟賊患一日不除則民生一日不靖策勵將士屢趣師期於是虎旅協心進逼城下賊衆計窮勢蹙通款軍門約日獻城凶渠授首師克之日市肆不擾邊境晏如捷書既至上慰郊廟社稷之靈下抒中外臣民之憤神人胥悅遐邇騰歡念自變亂以來軍民荼苦如在水火披堅執鋭卒嵗靡寧行齎居送千里相望被兵之地既罹於鋒刃供億之衆復困於征輸朕憫恤民艱不忍輒加額賦間施權宜之令用濟征繕之需意在除殘事非獲已而身處宫寢之內厪懷閭閻之依中夜屢興旰食不暇惄焉思治八載於兹今羣逆削平疆圉底定悉翦歷年之蟊賊永消異日之隱憂用是蕩滌繁苛維新庶政大沛寬和之澤冀臻熙皥之風所有事宜開列于後於戲體覆載好生之德秋肅必繼以春溫法帝王更化之模義正尤期於仁育誕告天下咸使聞知恢復雲南恭晉徽號詔康熙二十年朕惟帝王纘承鴻緒首重尊親顯號洊加彝章具在矧式遏禍亂耆定厥功實稟誨肓之恩應極尊崇之典比者逆賊吳三桂反叛煽動地方朕夙夜靡寧肆張天討仰承聖祖母昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣太皇太后聖母仁憲恪順誠惠純淑皇太后懿訓次第翦滅克奏蕩平上慰宗廟之靈下拯生民之厄非藉慈庇曷克臻兹用晉休稱載揚盛德謹告天地宗廟社稷於康熙二十年十二月二十四日率諸王貝勒文武羣臣恭奉册寶加上聖祖母昭聖慈壽恭簡安懿章慶敦惠溫莊康和仁宣太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣𢎞靖太皇太后聖母仁憲恪順誠惠純淑皇太后徽號曰仁憲恪順誠惠純淑端禧皇太后禮既備於兩宫澤宜敷於四海所有應行事宜開列於後於戲慶洽宫闈聿展因心之孝恩覃中外丕昭錫類之仁布告天下咸使聞知訓飭士子文康熙四十一年國家建立學校原以興行教化作育人材典至渥也朕臨馭以來隆重師儒加意庠序復慎簡學使釐剔弊端務期風教修明賢才蔚起庶幾棫朴作人之意乃比來士習未端儒效罕著雖因內外臣工奉行未能盡善亦由爾諸生積錮已久猝難改易之故也兹特親製訓言再加警飭爾諸生其敬聽之從來學者先立品行次及文學學術事功源委有敘爾諸生幼聞庭訓長列宫牆朝夕誦讀寧無講究必也躬修實踐砥礪亷隅敦孝弟以事親秉忠貞以立志窮經考義勿雜荒誕之談取友親師悉化憍盈之氣文章歸於醇雅毋事浮華軌度式於規繩最防蕩軼子襟佻達自昔所譏茍行止有虧雖讀書何益若夫宅心弗淑行巳多愆或蜚語流言挾制官長或隱糧包訟出入公門或唆撥姦猾欺孤凌弱或招呼朋類結社要盟乃如之人名教不容鄉黨弗齒縱幸脫禠撲濫竊章縫反之於衷能無愧乎况乎鄉會科名乃掄才大典關係尤巨士子果有真才實學何患困不逢年顧乃標榜虛名暗通聲氣夤緣詭遇罔顧身家又或改竄鄉貫希圗進取囂凌騰沸網利營私種種弊端深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便已作姦犯科則異時敗檢踰間何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠爾等故不禁反覆惓惓茲訓言頒到爾等務共體朕心恪遵明訓一切痛加改省爭自濯磨積行勤學以圗上進國家三年登造束帛弓旌不特爾身有榮即爾祖父亦增光寵矣逢時得志寧俟他求哉若仍視為具文玩愒勿警毁方躍冶暴棄自甘則是爾等冥頑無知終不能率教也既負栽培復干咎戾王章具在朕不能為爾等寬矣自兹以往內而國學外而直省鄉校凡學臣師長皆有司鐸之責者並宜傳集諸生多方董勸以副朕懷否則職業弗修咎亦難逭勿謂朕言之不預也爾多士尚敬聽之哉山川考諭康熙五十八年朕於地理從幼留心凡古今山川名號無論邊徼遐荒必詳考圗籍廣詢方言務得其正故遣使臣至崑崙西番諸處凡大江黃河黑水金沙瀾滄諸水發源之地皆目擊詳求載入輿圗今大兵得藏邊外諸番悉歸王化三藏阿里之地俱入版圗其山川名號番漢異同當於此時考證明核庶可傳信於後大概中國諸大水皆發源西南大幹內外其源委可得而縷晰也黃河之源出西寧外枯爾坤山之東衆泉流出沮洳渙散不可勝數望之燦如列星蒙古名敖敦他拉西番名蘇羅木譯言星宿海也是為河源滙為查靈鄂靈二湖東南行折北復東行由歸德堡積石關入蘭州岷江之源出於黃河之西巴顏哈拉嶺七匕勒哈納番名岷捏撮漢書所謂岷山在西徼外江水所出是也而禹貢導江之處在今四川黃勝關外乃褚山古人謂江源與河源相近禹貢岷山導江乃其流非源也斯言實有可據其水自黃勝關流入至灌縣分數十岐至新津縣復合為一東南流至敘州府會金沙江今之金沙江源自達賴喇嘛東北烏捏烏蘇流出烏捏烏蘇譯言乳牛山也其水名母魯烏蘇東南流入喀木地又東南流經中甸入雲南塔城關名金沙江至麗江府亦名麗江至永北府會打衝河東流經武定府入四川交界至敘州府合岷江流經夔州府入湖廣境由荆州府至武昌府與漢江合漢江源出陜西寧羌州北嶓冢山名漾水東流至南鄭縣為漢水入湖廣界東南流至漢陽縣漢口合岷江此諸水在東南大幹之內故源發於西番委入於中國也瀾滄江有二源一源於喀木之格爾㺬欒噶兒山名欒禇河一源於喀木之齊魯肯他拉名敖母禇河二水會於又木多廟之南名拉克褚河流入雲南境為瀾滄江南流至車里宣撫司名九龍江流入緬國瀾滄之西為哈拉烏蘇即禹貢之黑水今雲南所謂潞江也其水自達賴喇嘛東北哈拉腦兒流出東南入喀木界又東南流入怒夷界為怒江入雲南大塘隘名潞江南流經永昌府潞江安撫司境入緬國潞江之西為龍川江龍川江之源從喀木所屬春多嶺南流入雲南大塘隘西流為龍川江至漢龍關入緬國此諸水在東南大幹之外故皆流入南海也又雲南邊境有檳榔江者其源發自阿里之岡底斯東打母朱喀巴珀山譯言馬口也有泉流出為牙母藏布江從南折東流經藏危地過口噶公噶兒城傍合噶兒詔母倫江之南流經公布部落地入雲南古勇州為檳榔江出鐡壁關入緬國而岡底斯之南有山名郎干喀巴珀譯言象口也有泉流出入馬品母達賴腦兒又流入郎噶腦兒兩湖之水西流至桑納地岡底斯之北有山名僧格喀巴珀譯言獅子口也有泉流出西行亦至桑納地二水合而南行又折東行至那克拉蘇母多地與岡底斯西馬珀家喀巴珀山所出之水會馬珀家喀巴珀者譯言孔雀口也其水南行至那克拉蘇母多地會東行之水東南流至厄納忒克國為岡噶母倫江即佛家所謂恆河也佛國紀載魏法顯順恆河入南海至山東之渤海入口應即此水矣梵書言四大水出於阿耨達山下有阿耨達池以今考之意即岡底斯是唐古忒稱岡底斯者猶言衆山水之根與釋典之言相合岡底斯之前有二湖連接土人相傳為西王母瑤池意即阿耨達池也又梵書言普陀山有三一在厄納忒克之正南海中山上有石天宫觀自在菩薩逰舍是乃真普陀一在浙江之定海縣海中為善財第二十八參觀音菩薩説法處一在圗白特今番名布達拉山也亦為觀音化現之地釋氏之書本自西域故於彼地山川頗可引為據也禹貢導黑水至於三危舊注以三危為山名而不知其所在朕今始考其實三危者猶中國之三省也打箭爐之西南達賴嘛所屬拉李城之東南為喀木地達賴嘛所屬為危地班禪呼圗克圗所屬為藏地合三地為三危耳哈拉烏蘇由其地入海故曰導黑水至於三危入於南海也至於諸番名號雖與史傳不同而亦有可據者今之圗白特即唐之突厥唐太宗時以公主下降公主供佛像於廟今番人名詔詔者譯言如來也其地猶有唐時中國載去佛像明成化中烏斯藏大寶法王來朝辭歸時以半駕鹵簿送之遣內監護行內監至四川邊境即不能前進而返留其儀仗於佛廟至今往來之人多有見之此載於明實録者爾等將山川地名詳細改正具奏世宗憲皇帝聖諭廣訓序雍正二年書曰每嵗孟春遒人以木鐸徇於路記曰司徒修六禮以節民性明七教以興民德此皆以敦本崇實之道為牖民覺世之模法莫良焉意莫厚焉我聖祖仁皇帝久道化成德洋恩普仁育萬物義正萬民六十年來宵衣旰食祗期薄海內外興仁講讓革薄從忠共成親遜之風永享升平之治故特頒上諭十六條曉諭八旗及直省兵民人等自綱常名教之際以至於耕桑作息之間本末精粗公私巨細凡民情之所習皆睿慮之所周視爾編氓誠如赤子聖有謨訓明徴定保萬世守之莫能易也朕纘承大統臨御兆人以聖祖之心為心以聖祖之政為政夙夜黽勉率由舊章惟恐小民遵信奉行久而或怠用申誥誡以示提撕謹將上諭十六條尋繹其義推衍其文共得萬言名曰聖諭廣訓旁徴逺引往復周詳意取顯明語多直朴無非奉先志以啓後人使羣黎百姓家喻而户曉也願爾兵民人等仰體聖祖正德厚生之至意勿視為條教號令之虛文共勉為謹身節用之庶人盡除夫浮薄囂凌之陋習則風俗醇厚家室和平在朝廷德化樂觀其成爾後嗣子孫並受其福積善之家必有餘慶其理豈或爽哉朋黨論雍正二年朕惟天尊地卑而君臣之分定為人臣者義當惟知有君惟知有君則其情固結不可解而能與君同好惡夫是之謂一德一心而上下交乃有心懷二三不能與君同好惡以至於上下之情暌而尊卑之分逆則皆朋黨之習為之害也夫人君之好惡惟求其至公而已矣凡用舍進退孰不以其為賢而進之以其為不賢而退之惟或恐其所見之未盡當也故虛其心以博稽衆論然必衆論盡歸於至正而人君從之方合於大公若朋黨之徒挾偏私以惑主聽而人君或誤用之則是以至公之心反成其為至私之事矣孟子論國君之進賢退不肖既合左右諸大夫國人之論而必加察焉以親見其賢否之實洪範稽疑以謀及乃心者求卿士庶民之從而皇極敷言必戒其好惡偏黨以歸於王道之蕩平正直若是乎人君之不自用而必欲盡化天下之偏私以成大同也人臣乃敢溺私心樹朋黨各徇其好惡以為是非至使人君懲偏聽之生姦謂反不如獨見之公也朋黨之罪可勝誅乎哉聖祖仁皇帝御極六十年用人行政邁越千古帝王而大小臣僚未能盡矢公忠往往邀朋結黨聖祖戒飭再三未能盡改朕即位以來屢加申飭而此風尚存彼不顧好惡之公而徇其私昵牢不可破上用一人則相與議之曰是某所汲引者也於是乎逺之若凂曰吾避嫌也不附勢也爭懷妬心交騰謗口以媒蘖之必欲去之而後快上去一人則相與議之曰是某所中傷者也親昵者為之惋惜踈逺者亦慰藉稱屈即素有嫌隙者至此反致其殷勤欲借以釋憾而修好求一人責其改過自新者無有也於是乎其人亦不復自知其過惡而愈以滋其怨上之心是朝廷之賞罰黜陟不足為重輕而轉以黨人之咨嗟嘆息為榮以黨人之指摘詆訾為辱亂天下之公是公非作好惡以隂撓人主豫奪之柄朋黨之為害一至是哉且使人主之好惡而果有未公則何不面折廷諍而為是陽奉隂違以遂其植黨營私之計也書曰豫違汝弼汝無面從退有後言當時君臣告語望其匡弼而以面從後言為戒夫是故一堂之上都俞吁咈用能賡歌揚拜以成太和之運朕無日不延見羣臣造膝陳詞何事不可盡達顧乃默無獻替而狡獪叵測蓄私見以肆為後言事君之義當如是乎古純臣之事君也必期致吾君於堯舜而人君亦當以堯舜自待其身豈惟當以堯舜待其身亦當以臯夔稷契待其臣孟子曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊夫以吾君不能而謂之賊則為君者以吾臣不能亦當謂之忍語云取法乎上僅得乎中茍不以唐虞君臣相期待而區區效法僅在漢唐以下是烏能廓然盡去其私心而悉合乎大公至正之則哉宋歐陽修朋黨論創為邪説曰君子以同道為朋夫罔上行私安得為道修之所謂道亦小人之道耳自有此論而小人之為朋者皆得假同道之名以濟其同利之實朕以為君子無朋惟小人則有之且如修之論將始終其黨者則為君子解散而不終於黨者反為小人朋黨之風至於流極而不可挽實修階之厲也設修在今日而為此論朕必誅之以正其惑世之罪大抵文人掉弄筆舌但求騁其才辨每至害理傷道而不恤惟六經語孟及宋五子傳注可奉為典要論語謂君子不黨在易渙之六四曰渙其羣元吉朱子謂上承九五下無應與為能散其朋黨之象大善而吉然則君子之必無朋黨而朋黨之必貴解散以求元吉聖人之垂訓亦既明且切矣夫朋友亦五倫之一朋黨不可有而朋友之道不可無然惟草茅伏處之時恆資其講習以相佽助今既登朝涖官則君臣為公義而朋友為私情人臣當以公滅私豈得稍顧私情而違公義且即以君親之並重而出身事主則以其身致之於君而尚不能為父母有况朋友乎况可借口於朋以怙其黨乎朕自四十五年來一切情偽無不洞矚今臨御之後思移風易俗躋斯世於熙皥之盛故兼聽並觀周諏博採以詳悉世務且熟察風俗之變易與否而無知小人輒議朕為煩苛瑣細有云人君不當親庶務者信若斯言則臯陶之陳謨何以云一日二日萬幾孔子之贊舜何以云好問好察此皆朋黨之錮習未去畏人君之英察而欲蒙蔽耳目以自便其好惡之私焉耳朕在藩邸時坦易光明不樹私恩小惠與滿漢臣工素無交與有欲往來門下者嚴加拒絶聖祖鑒朕居心行事公正無私故令纘承大統今之好為朋黨者不過冀其攀援扶植緩急可恃而不知其無益也徒自逆天悖義以陷於誅絶之罪亦甚可憫矣朕願滿漢文武大小諸臣合為一心共結忠悃與君同其好惡之公恪遵大易論語之明訓而盡去其朋比黨援之積習庶肅然有以凜尊卑之分歡然有以洽上下之情虞廷賡歌揚拜明良喜起之休風豈不再見於今日哉雍正二年五月上諭四川陜西湖廣廣東廣西雲南貴州督撫提鎮朕聞各處土司鮮知法紀所屬土民每年科派較之有司徴收正供不啻倍蓰甚至取其馬牛奪其子女生殺任情土民受其魚肉敢怒而不敢言莫非朕之赤子天下共享樂利而土民獨受向隅朕心深為不忍然土司之敢於恣肆者大率皆漢姦為之撥制或緣事犯法避罪藏身或積惡生姦依勢橫行此輩粗知文義為之主文辦事教之為非無所不至誠可痛恨嗣後督撫提鎮宜嚴飭所屬土司愛恤土民毋得視為魚肉毋得濫行科派如申飭之後不改前非一有事犯土司參革從重究擬漢姦立置重典勿姑容寬縱以負朕子惠元元遐邇一體之至意特諭雍正三年三月上諭各省督撫周禮稱惟王建國體國經野孟子亦言仁政必自經界始疆界所關誠為至重從來兩省交壤之地其界址多有不清雲貴川廣等處為尤甚間有一省之內各州縣地界亦有不清者每遇命盜等事則互相推諉礦廠鹽茶等有利之事則互相爭競甚非息事寧民之意朕深知此弊今特降諭旨與各省督撫其共矢公心勿存私見詳細親查如與鄰地界有不清者則兩省各委賢員公同勘定若本省內地界有不清者即委本省賢貟勘定地皆朕土人皆朕臣此盈彼絀悉在朕版圗之內無容分視也雖地界或間有難定之處但平心勘畫即使稍有不協然一定之後久逺得以遵據永無推諉爭競之處於地方大有裨益矣其舉行此事宜於農隙之時所派官員不得私受請囑收取餽送及科派百姓騷擾經過地方如有發覺定行重治其罪諸督撫各慎為之雍正五年八月上諭雍正二年冬髙其倬在雲南總督任內時奏稱向來本營之兵即拔補本營之千把其營中兵丁非親即友恐難破除情面稽查約束若有志者欲立體統規矩而同輩之千把又羣起而哂笑之請將雲貴二省考定拔補之人調取外營一員與之對換其同城之營仍不準調換等語彼時朕降諭旨覽髙其倬此奏料理甚屬合理若應行之於直省該部確議具奏若有不盡善處亦不可迎合朕意隨經兵部議稱本營兵丁拔補本營千把實有流弊不可不亟為革除應照髙其倬所請令各省一體遵行等語朕因內外大臣之議僉同是以準行嗣後即有人奏稱此事於千把總甚不便者朕恐其惑於屬下微貟自便其私之議論故如此陳奏曽密批申飭之乃數年以來朕留心遍加體訪始知將此處兵丁用為他處千把實有未便之處蓋兵丁平日所管汛地其情形險阻素所深知及用為千把諸事有駕輕就熟之益若用往他處則初到之時一切茫然必待學習而後通曉此辦理公事之當籌及者也至於微貟末辨安土重遷盤費居址措置匪易若令調換至數百里外必至拮據艱難有室家之纍此又私情之當籌及者也朕思若以本營之兵丁即為本營之千把誠不能免於牽制瞻徇若於同城之中更換營頭如係左營則用為右營前營則用為後營又如撫標鎮標之同城者亦可互相更換如此庶於公事有益而於私情亦便其地方只有一營者或應於就近調補或應仍照從前舊例以上諸條如何方為妥協著該部定議具奏朕辦理天下政務惟期事事妥協使人人均受其益至於前後互易之名朕所不辭將此曉諭中外知之雍正五年十二月上諭向來雲貴川廣以及楚省各土司僻在邊隅肆為不法擾害地方剽掠行旅且彼此互相讐殺爭奪不休而於所轄苗蠻尤復任意殘害草菅民命罪惡多端不可悉數是以朕命各省督撫等悉心籌畫可否令其改土歸流共遵王化此朕念邊地窮民皆吾赤子欲令永除困苦咸樂安全並非以煙瘴荒陋之區尚有土地人民之可利因之開拓疆宇增益版圗而為此舉也今幸承平日久國家聲教逺敷而任事大臣又能宣布朕意𠞰撫兼施所在土司俱已望風歸向並未重煩兵力而願為內屬者數省皆然自此土司所屬之夷民即我內地之編氓土司所轄之頭目即我內地之黎獻民胞物與一視同仁所當加意撫綏安輯使人人得所共登衽席而後可副朕懷也但地方遼闊文官武辨需員甚多其間未必盡屬賢良之輩且恐官辨等之意以為土民昔在水火今既內附已脫從前之暴虐即略有需索亦屬無傷此等意見則萬萬不可著該督撫提鎮等嚴切曉諭不妨至再至三且須時時留心訪察稍覺其人不宜苗疆之任即時調換並嚴禁兵丁胥役之生事滋擾務俾政事清明地方寧謐安居樂業共享升平倘有不遵朕旨絲毫苛索於土民地方者著該上司立即參劾重治其罪即係平日保舉之人亦不可為之容隱果能據實紏參朕必宥其失察之愆嘉其公忠之誼該督撫提鎮等可共體朕心各盡懷保邊民之道雍正六年十一月上諭雲南等省所有苗蠻㺜獞種類甚多殘忍性成逞凶嗜殺剽掠行旅賊害良民又或販賣人口捉當勒贖所以為內地貧民之害者不可枚舉而衆苗之中又復互相讐殺爭奪不休於其所轄土民則任意傷殘草菅人命此皆天下所共知者自朕即位以來內外諸臣條奏苗蠻不法者不可勝數而邊省督撫提鎮等又復屢屢陳奏朕念普天率土之民皆吾赤子豈肯令邊省蒼黎獨受苖人之侵擾而苗衆繁多朕亦不忍聽其獨在德化之外是以從封疆大臣之請𠞰撫兼行而切加訓誨務以化導招徠為本不可脅以兵威或致多有殺戮屢頒諭旨甚明今幸數年之內苗人陸續歸誠者甚衆將來可望地方寧謐但官辨士卒跋涉於深林密箐之間歷險峻之區染瘴癘之氣而苗性狡獪反覆當用兵之際往往詭詐負嵎出其不意以致官兵受傷亦間有之事夫辨兵受國家多年教養之恩雖臨陳捐軀義不避難但以蠢然無知之苗蠻而致損我義勇之士卒若計算得失不足相抵朕心深為憫惻除已降旨賜恤賞賚外其雲南貴州四川𠞰撫苗蠻之官辨兵丁從前若有預借銀兩俱免其還項陳亡之官辨兵丁著照陳亡例加倍賞給銀兩俱交與鄂爾泰嶽鍾琪各於所屬額兵查明動支公帑遵旨賞賜務俾均霑實惠以副朕優恤辨兵之至意雍正七年正月上諭朕治天下以實心實政為務不言祥瑞屢頒諭旨甚明今據雲貴廣西總督鄂爾泰摺奏雍正六年十月二十九日恭逢萬夀令節雲南四府三縣慶雲呈現光燦捧日經辰已午三時之久又奏摺內引孝經援神契之語曰天子孝則慶雲見朕之事親不敢言孝但自藩邸以至於今四十餘年以來誠敬之心有如一日祗此一念可以自信而鄂爾泰援引典籍以慶雲為朕孝所感朕每承天眷昭示嘉祥感激慶幸之中益加警惕茲逢慶雲之瑞實愈增朕心之敬畏鄂爾泰公忠體國實為不世出之名臣數年來節制滇黔等省化導所屬官吏人人奉公盡職懷忠君親上之心是以於朕萬夀之辰天賜慶雲於滇省正所以表著該省官吏敬恭協和之忱悃也此則朕心深為嘉恱者俟鄂爾泰題本到日另降諭旨今諸王大臣等奏請宣付史館朕之允行者非欲誇示於衆也蓋以天人感召之理捷於影響該督正已率屬有忠愛之丹誠則該省受福迎祥有光昭之瑞應朕願內外大小臣工均以鄂爾泰為法且願逺近各省官民等聞風慕義興孝勸忠人人共受上天之福祐乃朕心之所謂上祥大瑞也雍正七年六月上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及𠞰撫苗蠻等事其一應軍需皆動用公帑備辦秋毫不派及於民間而糧餉轉輸亦有資於民力今藏地苗疆俱已寧謐朕心嘉慰特沛恩膏著將庚戌年甘肅額徴地丁銀二十七萬七千六百八十四兩零四川額徴地丁銀三十一萬六千三百兩零雲南額徴地丁銀一十四萬一千六百兩零貴州額徴地丁銀七萬四千二百兩零廣西額徴地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戌年額徴錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均霑實惠如有奉行不力被不肖有司暗飽私囊或被姦胥土棍強紳劣襟包攬侵蝕者朕若訪聞必將通省大小官貟分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘迫而莫能支不肖者又將橫取而無所檢束矣是以酌定以錢糧耗羡均給各官為養亷之資此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一並蠲除是民雖邀額外之恩而官員轉有拮據之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種多於耗羡之數於吏治民生均無禆益常見庸劣之地方官每以蠲免錢糧為不便於己心懷悵怏即此意也著於庚戌年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徴收耗羡將此永著為例雍正七年十月上諭據鄂爾泰奏稱雲南趙州白崖地方於本年閠七月平地忽湧甘泉二股田地得藉灌溉此皆皇上之至誠足以感召天和協應地靈等語王大臣等亦稱皇上勤恤民隱是以甘泉昭宣上瑞等語是內外臣工皆以滇省醴泉歸美於朕朕實不居也夫君臣上下本為一體設人君有乂安百姓之心而其臣不能宣布德意以成善治或上官有撫字羣黎之念而其民不能感化以成善俗皆不足召天和而徴瑞應也鄂爾泰以公忠之心行撫綏之政至誠所感能使吏服其教民懷其惠所屬之境康阜恬熙而滇省官民又實能率從鄂爾泰之訓導移風易俗和氣致祥是以數年之中疉見慶雲醴泉之瑞此蓋上天恩賜以表著賢臣之善績也昔張堪之麥秀兩岐魯恭之蝗不入境彼郡邑守令有循良之化尚足感召嘉詳况節制三省化民成俗者乎又如范仲淹之治青州廣施惠政溪澤忽湧醴泉此皆載在典籍信而有徴者并非朕褒揚鄂爾泰為創見之論也且如鄂爾泰總督雲貴則兩省連嵗豐收今年兼轄廣西則粵省更慶登稔又如田文鏡總督河南李衛總督浙江兩省境內屢嵗俱獲有秋今年田文鏡兼轄山東李衛兼轄江南而山東江南並稱豐熟似此年穀順雨暘時若又豈非共覩共聞之祥瑞乎凡督撫大臣加惠一方以致感格天心賜以上瑞此皆督撫之力朕不敢以為功而任用之得人與否則朕之責也即如田文鏡之在河南清正無私而李紱蔡珽謝濟世等結黨朋謀肆行陷害若非朕洞燭其姦被其搖惑則凡忠誠任事之臣皆郤顧而不前矣即鄂爾泰亦不過謹守繩墨以求免衆人之謗議而已何能展布施設毫無瞻顧以成此善政善教乎是以諸臣將慶雲醴泉之瑞歸功於朕實與朕無涉若謂朕能推心置腹以信用鄂爾泰使得盡展才猷悉心教養以成風俗之美受上天之恩此則朕所不辭者雍正十三年八月上諭數年以來雲南地方屢有用兵籌餉之事民力挽輸未免勞頓朕心深為軫念今聞元江普思等處軍務告竣用是特沛恩膏將本年通省地丁錢糧全行蠲免俾滇民均霑實惠若諭旨到日有已徴在官者凖抵明年應納之正賦著該督撫藩司董率州縣官員敬謹奉行毋使胥吏土棍人等侵蝕中飽以副朕加惠滇民之至意今上皇帝上諭文以載道與政治相通故二帝三王之盛在廷敷奏及宣諭衆庶之言皆為謨為誥炳著六經西漢治猶近古人心淳朴故見於文者原本經術指事類情質實曉暢猶有周人之遺降及魏晉以文滅質漸就浮靡六朝尤甚姿態益工意格益陋文運所關非淺鮮也朕思學者修辭立誠言期有物必理為布帛菽粟之理文為布帛菽粟之文而後可行世垂久若夫雕文選詞以炫一時之耳目譬猶摶土揭木塗飾丹鉛以為器物外雖可觀不移時而剝落曷足貴耶國家纍洽重熙之日務學積文者正宜沐浴教化爭自濯磨漸進於大雅勿尚浮靡勿取姿媚斯於人心風俗有所裨益至於古人臨文原無避諱誠以言取足志一存避諱之心則必輾轉囁嚅詞不逹意嗣後一切章疏以及考試詩文務期各展心思獨抒杼軸從前避諱之習一概掃除尤宜禁者鄉會兩試考官每因避忌字樣必摘取經書中吉祥之語為題遂使士子易為揣摩倩人代作臨場抄寫以致薄植之少年得以幸取科名而積學之老生無由展抒底藴嗣後凡考試命題不得過於拘泥俾士子殫思用意各出手眼以覘實學特諭雲南通志卷二十九之一欽定四庫全書雲南通志卷二十九之二歷代御製唐明皇敕雲南王蒙歸義書敕西南蠻大師特進蒙歸義及諸夷首領等卿近邊境不比諸蕃率種歸誠纍代如此况卿等更效忠赤朕甚知之頃者諸夷之中或有攜二相率自討惡黨悉除即日蕃中應且安帖然則臨地外境亦須有預人無逺慮必有近憂卿可思之豈虛語也所有蕃中事意使者且知之秋涼卿及百姓並平安好遣書指不多及復敕雲南王蒙歸義書敕蒙歸義吐蕃於蠻擬行報復又嶲州鹽井本屬國家中間被其內侵近日始復收得卿部蕃落亦因具知吐蕃惟利是貪數論鹽井比有信使頻以為詞今知其將兵擬侵蠻落兼擬取鹽井事似不虛國家與之通和未嘗有惡今既如此不可不防卿與達奚守圭部落團練候其有動方可出兵必無事蹤亦不可先舉巂州相去道里稍逺若有警急復須為援並委卿與逹奚守圭計會無失事宜卿於國盡誠在邊為捍委寄得所朕復何憂秋中漸涼卿及首領百姓並平安好今故令內給事王承訓往一一口具遣書指不多及敕安南首領巋州刺史爨仁哲書敕安南首領巋州刺史爨仁哲潘州刺史潘明威獠子首領阿辿和蠻大鬼主孟谷悮姚州首領左威衛將軍爨彥徴將軍昆州刺史爨歸王南寧州司馬威州刺史都大鬼主爨崇道升麻縣令孟聘卿等雖在僻逺各有部落俱屬國家並識王化比者時有背叛似是生梗及其審察亦有事由成都府不平處置有失或朋讐相嫌經營損害既無控告自不安寧兵戈相防亦不足深怪也然則既漸風化亦當變俗有須陳請何不奏聞蕃中事宜可具言也今故遣掖庭令安道詣彼宣間並令口具有不穩便可一一奏聞秋中已涼卿及百姓以下并平安好遣書指不多及文宗敕南詔清平官書敕段琮傍段彛琮獨棟楊遷趙文竒蒙善政李守約等各藴器能夙懷忠義宣功爾室贊理本邦禮樂具修車書必會勵抒忠之節操披嚮化之誠明亟涉道途逺遵識者威儀就列同慶於三朝筐篚充庭有勸於萬里道光殊俗禮慕華風克成君長之賢深見佐臣之美勞忠可尚鑒寐寧忘勉守令圖用慰遐矚得前巂州録事參軍陳元舉男播狀稱父及弟妹等二十七人自太和三年沒落在彼未蒙追索詳其語旨切在感傷朕思骨肉之情人倫所及家鄉一異音耗兩忘生死莫知幽明同怨為人君長深用軫憂今與豐佑書中具言其事卿等職當毗贊義重君臣執之何補於良圖歸之尤重於交好想同參議用解幽寃今賜少信物具如前數明太祖初諭雲南詔朕聞順天者昌逆天者亡古今定論禍福常理也朕起自草萊削平羣雄戡定禍亂今已七年中夏既安四夷多附絶無強凌弱衆暴寡所以臣順於我者得遂其生共享和平之福惟爾雲南王某乃元君遺派受封西南孤處遐荒猶未臣服以若所為非貽患於大理之民必自致喪身滅姓於大理之手二禍之機必有其一不可逃者何也蓋雲南土地人民本大理所有自漢通中國稱臣朝貢至唐宋皆受王封其來久矣昔因爾元滅其王而統其地及今百年無有復其故物者邇來元祚傾覆已盡爾尚力據其地不還大理自王果欺人乎欺天乎人雖可欺天不可欺禍患之報將不旋踵至矣今特遣爾親族威順王親往開諭如果上順天理下契人心即奉貢來庭不然朕當别遣使者直抵大理仍賜唐宋所封舊號令彼為王合兵加討悔將何及復諭雲南詔自有元失馭羣雄並起聲教異為蒸黎各擅是致廢興疉疉民不聊生朕秣馬厲兵於江左控弦三十萬以觀諸雄久之羣雄無成乃命大將軍平元都肅靖中外奠安黎庶邇年以來士不彎弧馬牧平原農耕有餘人皆樂福惟爾西南諸夷密邇聲教恃險弗庭納逋逃匿有罪坐受西川之任肆毒中華凡我朝臣孰不忿恨是以特興問罪之師今雲南既平諸夷服從故詔諭以更生之思所有事宜條列於後於戲知天命者福臻昧天理者禍至信如四時速如影響播告諸夷想宜知悉諭征南將軍潁川侯永昌侯西平侯敕舊嵗命爾等率甲士三十萬南征諸夷兵臨普定如風行草上所以去後還致有小疵及至入雲南之域擒首帥於曲靖之西敗烏蠻於可渡之北席捲豪英長驅於碧雞金馬來云已駐牂牁未幾捷音摧堅敵於點蒼山下而撫金沙邏邏心悅者其金齒不戰而率土以歸於是雕題之蠻聞知即遣使入貢以再而獻生口檄從百夷之種威來八百之邦將軍其勞至矣然功並亘古勳著彤庭英風遍播於中外丈夫至是豈不以顯父母揚名者耶今也勤勞既多欲勞以酒肉奈山川嶮逺速不及赴特以朕心勞之故兹敕諭諭雲南平詔朕荷上天眷佑海嶽效靈祖宗積德自即位以來十有五載寰宇全歸於版籍惟西南諸夷為雲南梁王所惑恃其險逺弗遵聲教特命征南將軍潁川侯傅友德副將軍永昌侯藍玉西平侯沐英率甲士三十萬馬步並進罪彼不庭大軍既臨渠魁盡獲雲南已平詔告天下臣民共知於戲福民永已聖賢之為逆天違命根禍殃民身家被罪惟西南諸夷應之故茲詔諭再諭潁川侯傅友德永昌侯藍玉西平侯沐英敕雲南之地稽古之典氣厚風和人民尚兵上古以為遐荒中古禹迹所至以别水土故地屬梁州之域自漢隋唐三代皆中國所統曩元既有其省數出名臣望重者鎮之今將軍等率精兵前進不踰百日而取之若非名望重者守之愚下之輩未可託也今特命汝南侯梅思祖平章潘允明二大臣暫署雲南承宣布政使司布政使事定之後除官替回故茲敕諭諭雲南等處承宣布政使司左參政張紞敕唐虞之制外樹州牧侯伯撫奠民居人樂雍熙載諸方册雖不備述簡略見焉當是時賢良並出所命皆仁所以君有易位而法令不更諸侯列土千載而不異以其誠信相孚上下亦然也吁今之人不然導善弗從縱欲如流之趨下朕起寒微出望外而統天下竭氣語疲精神諭人為善從者罕焉是其難治也且如內而中國外而四夷今九州十二牧官既命數違號令未見其人西南諸夷自生釁端發兵除平命官撫守爾張紞者首行今五年矣言出則諸蠻耳入令布則誠信相孚奠安黔南亦五年矣今年來朝不待考而朕知功居考內出九州十二牧守首惟紞為最復命仍治黔南汝往欽哉世宗諭新設永昌府知府嚴時泰敕金齒僻處遐方因無流官撫治風俗頽壞軍民困窮而又外夷不時侵擾為地方之害近因雲南鎮撫等官奏請如洪武年間事例開設府治銓除流官以為經久之計今從其請將金齒司所屬永昌金齒二千户所夷民並附郭各里百姓仍舊設立永昌軍民府僉舉爾出身科甲素有才幹故特升爾往知府事賜以璽書蓋重其事也夫新府之設與舊郡不同外夷之治與內地殊異非徒賴以撫安而實資以控制爾須稽考制度創造衙門宣布條章立為一定規矩後人有所遵守其轄立州縣長官司及各屬衙門俱照都御史何孟春原擬計度人民户籍多寡地里逺近照舊為州為縣為長官司等另行奏請銓除降印並騰衝司或改為州為縣為衛如金齒司亦聽爾奏請舉行凡府中一應該行之事當備之物合用之人一一悉如內地若力有不給則設而不修勢有未可則留以待後順其土俗之宜施以安利之政歸附者安之使得其所流移者招之使復其業仍須時常戒勉所屬諭以大義開其善端使其遵守法度謹守地界辦納糧差撫恤夷民所屬土流官吏軍民人等敢有倚勢刁潑違法傲慢者爾須嚴加禁革輕則會同問擬如律照例發遣重則奏聞區處爾受茲専城之寄尤宜亷公仁恕奉法循理慎重行事務使軍民脫往時剝削之苦感今日撫摩之恩地方寧靜永保無虞庶稱朝廷委用至意爾其欽承勿怠勿忽故敕奏疏隋請略定南寧州疏益州總管梁睿安定逺撫長駕王者令圖易俗移風有國恆典南寧州漢牂牁地近代分置四郡戶口殷衆金寶富饒二河有駿馬明珠益寧出鹽井犀角晉泰始間以益州曠逺分置寧州至偽梁南寧刺史徐文盛被湘東徴赴荆州屬東夏尚阻未遑逺略土民爨瓚遂竊據一方國家遙授刺史其子震相承至今臣禮多虧貢賦不入每年貢獻不過數馬其處去益路止一千朱提北與戎州接界彼人苦其苛政思被皇風伏惟大丞相匡贊聖朝寧濟區宇闢土服逺今正其時幸因平蜀士衆不煩重興師旅押獠既訖請略定南寧自盧戎以來軍糧須給過此即於蠻夷徴稅以供兵馬其寧州朱提雲南西爨並置總管州鎮計彼熟蠻租調足供城防倉儲以靖肅蠻夷裨益軍國今謹建南寧州郡縣及事意如别有大都督杜神敬昔曽使彼具所諳練今并送往唐奏省罷姚州疏蜀州刺史張柬之襄陽姚州古哀牢之舊國絶域荒外山髙水深自生人以來洎於後代不與中國交通前漢唐蒙開夜郎滇苲而哀牢不附至光武季年始請內屬漢置永昌郡以統理之乃收其鹽布氈罽之稅以利中土其國西通大秦南通交址奇珍異寶進貢嵗時不闕劉備據有巴蜀嘗以甲兵不充及備死諸葛亮五月渡瀘收其金銀鹽布以益軍儲使張伯岐選其徑卒勇兵以增武備故蜀志稱自亮南征而國以冨饒甲兵充足由此言之則前代置郡其利頗深今金銀鹽布之稅不供珍竒之貢不入戈戟之用不實於戎行寶貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之漢以得利既多歷博南山涉蘭滄水更置博南哀牢二縣蜀人愁怨行者作歌蓋譏漢貪利而使漢人為蠻夷之所馳役也今減耗國儲費用日廣而使陛下之赤子身膏野草骸骨不歸老母幼子哀號望祭於千里之外於國家無絲髮之利在百姓受終身之酷臣竊為國家痛之往者諸葛亮破南中使其渠率自相統領不置漢官亦不留兵鎮守人問其故亮言置官留兵有三不易大意以置官夷漢雜居猜嫌必起留兵運糧為患更重忽若反叛勞費更多粗設綱紀自然久定臣竊以亮之此䇿妙得羈縻蠻夷之術今姚府所置之官既無安邊靜寇之心又無諸葛亮且縱且擒之技惟知詭謀狡算恣情割剝貪叨劫略積以為常扇動酋渠遺成朋黨折支諂笑取媚蠻夷拜跪趍伏無復慙恥提挈子弟嘯引凶愚聚會蒱博一擲纍萬劍南逋逃中原亡命有二千餘户見散在彼州專事掠奪姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協并為羣蠻所殺前朝遣郎將趙武貴討擊貴及蜀兵應時破敗噍類無遺又使將軍李義總往征而郎將劉慧基在陳戰死其州遂廢臣竊以諸葛亮稱三不易其言卒驗至垂拱四年蠻郎將王善寶昆州刺史爨乾福又請置州奏言所有課稅自出姚府更不勞擾蜀中及置州後李稜為蠻所殺延載中陳琛請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾於今不息且姚五十七州巨猾逰客不可勝數國家設官分職以化俗防姦無恥無厭狼籍至此今不問夷夏負罪並深道路劫殺不能禁止臣恐一朝驚擾為禍轉大伏乞省罷使隸巂府嵗時朝覲同之番國瀘南諸鎮亦皆廢於瀘北置關百姓自非奉使入番不許交通往來增巂府兵選擇清良宰牧統之為便雲南通志卷二十九之二欽定四庫全書雲南通志卷二十九之三元諫伐西南夷疏御史中丞陳天祥寧晉八百媳婦乃荒裔小夷取之不足以為利不取不足以為害而劉深欺上罔下帥兵伐之經過八番縱橫自恣中途變生所在皆叛既不能制亂反為亂衆所制食盡計窮倉皇退走喪師十八九棄地千餘里朝廷再發四省之兵使劉二拔都總督以圖收復湖南湖北大發運糧丁夫衆至二十餘萬况當農時驅此愁苦之人往回數千里中何事不有比聞西南諸夷皆重山復嶺陡澗深林其窄隘處僅容一人一騎上如登髙下如入井賊若乘險邀擊我軍雖衆亦難施為或諸蠻逺遁阻隘以老我師進不得前旁無所掠將不戰自困矣且自征伐倭國諸夷以來近三十年未嘗有尺土一民之益去嵗西征及今此舉何以異之乞早正深罪仍下明詔招諭彼必自相歸順不須逺勞王師與小醜爭一旦之勝負駐兵近境多市軍糧內安外固漸次服之此王者之師萬全之利也茍欲罷不能亦當詳審成敗算定而行彼諸蠻皆烏合之衆必無久能同心捍我之理但急之則相救緩之則相疑以計使之互相讐怨待彼有可乘之隙我有可動之時徐命諸軍數道俱進服從者懷之以仁抗敵者威之以武恩威兼濟功乃易成若復舍恩任威深蹈覆轍恐他日之患有甚於今日者也明陳言征麓川狀略河西縣教諭詹英貴州衛嘗謂邊夷抗命實天討不容大將領兵當神明是務夫兵凶器也為將者不能重其事惟求己之利益必其取勝而成功者難矣曩因麓川思任背逆天兵已殄滅子思機又敢抗違朝命皇上命將出師往正其罪何期總督等官不體朝廷之心茍安貪利行李二三百扛用夫五六百人聲勢喧閧沿途勞擾將帶紵絲絹匹密散富熟之家下綱垂釣狼貪漁取有司土官行李成隊好馬雙牽轉送别官加倍索取各處都司官見潛將賄賂先行所獲有餘貪得無厭故違祖訓擅用閹刑以進為名盡留自用醜行遍揚於南詔名節大壞於邊方及至行軍全無紀律大軍一十五萬俱從一日起程路滑泥深難為士卒且如軍糧一事又不設法轉輸每軍一名運米六斗奔走往來搬運催促不得少停如此之勞何以養鋭有因自縊而死視之略不經心嗟怨之聲盈於道路領命用兵者豈當如是哉指以馱糧坐派有司一千餘馬不知此馬何施坐轎卧轎山轎涼帳暖帳雨帳左右贊襄官吏百端阿承罷困下人無所控欣比臨賊境各不周慮探其險易虛實賊衆有無輒至金沙江邊賊人進抗猛烈調令副總兵參將等官領兵攻圍不克賊用木石擂打將駱都指揮等官軍殺死俱將頂皮割去賊子肆頑不知何所郤將來降漁户誘繫解作生擒蓋因主將無謀致有此患捐中國生靈遺邊夷笑計窮事拙只得班師已將地方分與木邦緬甸抗違之罪付之無可奈何抑聞古之為將者與士卒同甘苦故能成功今不知此慮欲希僥幸豈將兵者之所為哉竊詳靖逺伯王驥以布衣升伯爵子孫世襲有官何乃忍此總兵官宫聚由先代勳爵纍升都督挂印總戎自合寢食不安以除邊患豈知此二人者同流合汙既無運籌帷幄之才又無克勝破敵之智玩法怙終損兵失利原其情犯死有餘辜昔唐元宗時南詔有警御史李宓將兵十萬擊之楊國忠隱其敗更以捷聞後范祖禹引管子之言堂上逺於百里堂下逺於千里君門逺於萬里言壅蔽之害深也皇上深居九重豈知此情此弊臣不避勢要威權冒犯天顏乞將王驥宫聚等官拏送法司明正其罪先差密切亷幹之官前途盤閘各官行李上解天怒下慰士心復永昌府治疏巡撫何孟春郴州臣聞消變於未萌者䇿之上消變於將萌者䇿之中變成而後救斯無䇿矣切見雲南地方俱有諸夷然西至大理東至臨安皆是府衛相參事體有定則賦役有常制故民雖未冨猶得粗安惟金齒一司實古之哀牢夷地漢之永昌郡自元以上皆為府治其後元務逺略創立大理金齒等處宣慰使司都元帥府於銀生崖甸其地在白夷蒙樂山下去今金齒司南千餘里其夷歿後金鑲二齒而葬故因得名與永昌府絶無干涉後元以其地不可守改為金齒衛移入永昌府共治元末道梗流官多缺止有土官通判在任洪武十五年於指揮王真處降附十六年春附近諸夷忿王真立衛鎮守不恤衆乃共推已退土官知府高某引麓川思可發夷兵數萬來攻生擒王真盡夷其城而去本年十月雲南指揮李觀請復立永昌府金齒衛招撫安輯十七年閏十月朝廷降到永昌府印又續發南京各處軍充實軍伍府衛相參軍民安堵二十二年十二月李觀病故後指揮胡淵以舊城夷毁改築新城因欲自尊假以民少糧不及俸為名於二十三年十二月初八日奉革永昌府改衛為金齒軍民指揮使司兼管軍民彼時淵以築城有功意在專制又以指揮俱長單掌印尚無考選軍政可使世世專有此土卻將永昌府之民并入永昌金齒二千户所尚有附府良民無二編立東西太和六軍等里徑屬本衛原本府所屬施甸等縣續立鎮夷等州俱革為長官司百夫長等衙門惟永平一縣乃古博南縣民不可革遂概隸指揮司統屬彼時淵恃有功不欲與府頡頏訖成私計然親承屠城之慘深結夷民之心故需索少而糧差額輕軍民和而調發事簡又以府衛所有專供一司故夷民安財用足後來承乏儘意貪剝近城寨分已不如前其後因麓川反叛加以徴調夷民漸困及景泰末都督毛勝因隨征麓川知金齒司指揮供給甚多遂營幹鎮守有內臣見毛勝得利遂接踵前來由是廣占夷田以為官莊大取夷財以供費用然名目尚少猶可支持相承到今日增月盛典馬典軍費以萬計磕頭見面亦要數千過江子粒等錢無時得了白米馬料等户無日不徴加以跟官小人百樣生事害人積棍一時縱橫取索椎髓剝肉倡言不恤夷民畏死不敢不從由是強者為盜弱者逺逃如近城鳯溪一長官目今止數家二代不襲可見矣比之宣德正統間環城萬里之夷民十亡八九比之成化𢎞治初二三百里之夷民亦減六七所不能逃者赤身裸體食草鋤山氣息奄奄死亡無數而上下交征略不為異如施甸夷民害極欲變正德十年三月城門曾晝閉矣騰衝軍士逼於拜見正德十一年太監曾被攻矣及今木邦起兵奪占孟定府又起兵入隴川臨芒市又起兵入灣甸州其州去永昌所老姚寨僅四十里矣即今孟養又起兵過金沙江鑿山開道由茶山直抵騰衝猛密又來要求宣慰矣臣訪於耆老皆言自平麓川後今經八十年並無夷人敢如此侵犯良由金騰二司附近夷民被害不過各逃往彼處以欣其怨彼各得招懷以益其強既知二司之虛弊又悉其貪殘且又年年下番哄誘寶石月月設計欺騙金銀遂使逺夷生凌侮之心興兵試作變之漸若不早計誠恐變生蓋附近夷民為二司藩籬皆抱恨切骨則藩籬撤矣附郭軍民為地方根本皆疾首痛心則根本病矣藩籬根本皆隳大變固應不逺臣叨授巡撫之寄憂如焚灼博采廣詢共言惟是復府治設流官以撫安於內則外變自息及考之前數年巡撫官固有憂先於臣具本二三次陳奏矣緣該部只照常行雲南鎮守衙門勘報殊不知鎮守衙門於近夷日取之財必千必萬於逺夷嵗通之利莫考莫稽既圗利身誰肯為國一承行勘轉加唬嚇聲言治其妄告倒説為伊解釋各差官上寨逼要不願復府結狀更督令科派備禮所以夷民則畏懼益深蓄怨益切二司則剝削愈肆聲勢愈張非徒無益於弭亂更以促發其禍機今幸皇上入承大統聖譽昭升率土普天更新視聽延頸企踵想望太平臣用敢罄竭愚誠冀消禍變伏願聖明俯垂睿鑒不惑羣議斷自宸𠂻免行鎮守衙門勘報乞查前後奏詞以察事機將金齒司所屬永昌金齒二千户所夷民并附郭各里百姓仍舊復立永昌軍民府統治再乞敕吏部精選川湖貴州有守有為進士出身知府一員舉人出身通判一貟推官一員經歷司經歷照磨所照磨司獄司司獄各一員令其領印作急到任其所轄歷州縣長官司合屬衙門俱候知府到日計度人民户籍多寡地里逺近照舊為州為縣為長官等司另行奏請銓官降印其騰衝司亦原係府治後改為騰越州騰衝守禦千户所彼時州隸永昌府所隸金齒衛後因比照金齒改為軍民指揮使司今其為害亦與金齒相同若金齒復為府衛騰衝亦合復州或為府將司改為衛軍民相參管理其大小事例亦比金齒次第舉行若其公廨房屋臣已訪得空間官田房屋甚多官至即備並無勞費如此則近便夷民可以自安逺地夷心自然畏服而變可坐消矣然不止潛消禍變於將來又可廣垂利澤於永久臣請略節陳之原兩司皆是指揮千百户等官凡經收錢糧皆先取以阿奉權勢因而竊入私家花費及至盤查則認借充盤隨後竊去花費事發之後監追至死無處賠納為此守巡官無法可治將金騰官銀多解大理府庫收貯今復府治則免貯庫於大理既可省五日護送又可以答應緊急其利一也又凡承委撫夷勘問詞訟徴收錢糧各一事不知一字不識凡地方詞訟錢糧不能辦集今復府治則承委有人諸事易辦其利二也又驛課巡司缺官不報各買求署掌現今館驛日日打乾二兩而供應在外稅課徴商倍常而課程無聞災異常見不申呈吏員久役不起送今復府治則官無虛曠館驛可蘇稅課可減啇賈可通災異可警吏役可正其利三也凡元宵煙火料絲燈皆於操處出銀五十兩製造永昌所卻又遍行科派夷寨春牛芒神天下同制今要多造兩頭承奉分派夷民各壇祭祀惟衣冠與祭有胙今要買補二倍分送跟官光棍牢子等人今復府治則此費自絶其利四也又金齒魚利比之大理不及然東湖各塘壩河池所出市不缺買南北河道竹木之來嵗不缺入而魚課之徴抽分之利通入私門今復府治則財用自足其利五也往時官舍軍民之家有不得已乘喪嫁娶者皆在夜中惟恐人覺自今指揮等官稟過官府任行嫁娶或父母喪後三五日或半年白晝嫁娶鼓樂喧闐誇示市廛衆皆欣慕納賄請求以為榮耀人心全泯風俗盡移今復府治則此弊可無風俗還舊其利六也夫能消禍變之大創永久之利如此適遇聖明在上庶政維新又如此儻又畏首畏尾不一陳之豈非天下後世之罪人哉臣但恐欲專地方之權以取利幸地方之變以邀功曲加阻撓臣請逐件折之若曰永昌府係我太祖髙皇帝時所革只當遵守不宜更復則胡淵革府之時府學亦革為足食倉矣何自正統以來列聖又因臣下之請復照府學事例立學到今乎若曰金騰地接外夷規畫已定忽復府治恐兵弱不能控守則見今臨安接界於南安比之諸夷之離金齒尤近南安地盡於南比各夷之宣慰更強以臨安府衛顧足以控制強大之安南而金齒不然正以司治貪汙是以起其欲變耳若以永昌府衛相參加以騰衝有不能控制數宣慰司窵逺之夷乎若曰民少不勾僉一府之皂隸門庫糧少不勾供一府之官員俸糧則查今隱占白米戶之丁力足勾二府之皂隸門庫私納白米之石數足勾一府官軍俸糧矣何况三十寨之秋糧各民里之賦役乎若曰未嘗有例緩求其宜則見今雲南大理蒙化景東楚雄臨安曲靖俱有府有衛即其例矣且內唯臨安大理二府土地民户財産田畝與金騰等其餘府分逺不及况今夷民困極大變將興救焚拯溺少或遲延則禍亂必作救之不及矣豈容緩乎其餘區處細微事務曲折非本內可悉者臣已悉與布按二司官晝夜計算經畫停當決可弭患於將萌垂澤於永久如或一有不效臣甘萬死以謝妄言之罪伏望聖恩憫念俯賜允從則地方幸甚生民幸甚奏罷屏石疏巡撫蔣宗魯普安臣準工部咨照依御用監題奉欽依事理依式照數採取大理石五十塊見方七尺五塊六尺五塊五尺十塊四尺十五塊三尺十五塊等因案行金滄道分委大理衛太和縣督匠採取據耆民段嘉璉等告稱嘉靖十八九年曽奉勘合取大屏石難尋崖險壓傷人衆及至大路行未百里大半損缺衆復採補沿途丢棄所解石塊二年外方得到京至三十七年取石六塊見方三尺五寸自本年六月至十一月始運至普淜小孤山因重丢棄在彼且自大理至小孤山止有三百餘里以半年行三百里未免有違欽限徒勞無功乞轉達奏請量減數目尺寸等因又據石匠楊景時等告稱原降尺寸髙大石料難尋且産於萬丈懸崖難以措手縱使採獲勢難扛運等因俱批行布政司會議為照雲南地方僻在萬里舟楫不通與中州平坦不相同先年採取三尺石自蒼山至沙橋驛陸運祗五程勞費踰四月供給不前所過騷擾軍民啼泣今復取六七尺者其難十倍况值上年兵荒民遭飢窘流離困苦實不堪命應請量減尺寸通詳巡撫蔣宗魯巡按孫用會題議照錫貢方物為臣子者均當效忠民瘼艱難凡守土者尤宜審度前項屏石臣等奉命以來催督該道有司親宿山場遵式取進匠作耆民人等俱稱産石處所山洞坍塞崖壁懸陡三四尺者設法可獲其五六尺者體質髙厚勢難採運且道路距京萬有餘里峻嶺陡箐石磴穿雲盤旋崎嶇百步九折豎擡則石髙而人低橫擡則路窄而石大雖有良策委無所施今大理抵省僅十三程尚不能運至何由得達於京師是以官民憂惶計無所出議將採獲三尺四尺者先行進用五尺者一面設法採取六七尺者或準停免以蘇民艱實出於軍民迫切之至情萬非得已冒罪上聞陳言開採疏巡撫陳用賔晉江臣用賓荷國厚恩見陛下數年來為國用不足勞心焦思恨不能為陛下分憂共念取金則解取石則解取象則解大工興則濟工東師興則濟餉無一事敢拂聖意即百姓輸將千愁萬苦之聲臣等程督千艱萬難之狀亦不敢聞蓋慚無回天之力而一意於終事之義也但滇南民力竭矣尚冀陛下垂慈庶幾民有息肩之日乃今開採新命其裨國用也甚微其誤國用也甚大不但大誤國用而且大妨邊計臣等不得不攄悃陳言臣等之言非敢方命實欲請命求國用邊計兩者俱得以便督行惟陛下少垂察焉蓋滇環向皆夷非腹裏比漢土錯繡赤子龍蛇雜居不堪重賦通省稅糧不及中州一大縣之半先臣奏開礦廠益以鹽課並奏留各部事例銀兩充兵食之需行之數十年矣然其所入有限所給無窮一遇兵興輒請四川南京協濟萬歷二十二年蜀中當事奏討原借餉銀奉旨雲南以後兵餉自處不得再借臣等長慮郤顧急為自完於山澤礦鹽未盡之利督令各官盡行開挖煎驗於舊額五萬二千七百二十二兩之外增出三萬八百八十三兩共計八萬三千六百餘兩而官兵月餉嵗該一十二萬九千六百有零入不彀出臣等復於各處稅銀清之又於兵之可緩者銷之二十三年四月內臣等具疏奏聞其開挖礦廠與舊額新增之數一一見於限兵處餉疏中經户兵二部議覆奉有明旨允行矣邇來礦脈漸衰在在請閉又新舊貢金給發幫貼工價大約嵗該六萬與助工東餉一切採石買象不急之需俱難措處臣等只得於兵食汰省將各項通融於礦鹽額課內支用蓋是山澤靡有遺利而各場無有不開之礦亦無有無課之礦矣今千户張國臣奏內所稱朝陽洞灰窯廠沙木和梁望山中嘴洞白松坡陸涼州瀾泥坑表羅廠慕萊廠等處胥係臣等督官開挖數內即有一二未開如灰窯廠則見今議開以補各廠消乏之數如慕萊廠則在夷地不可開矣不則前日之所已閉者若土民李拱極江應秋等乃平素革逐攪擾礦廠之棍徒也頃接邸報奉有聖旨允差尚膳監太監楊榮督率原奏官民前來會同臣等撫按照例開採解進綸綍一頒臣等敢不遵奉苐前項廠硐先已開採定課入額復與張國臣等再開進交則雲南額課應否報罷十三萬兵餉安出貢金價值數萬安出濟工濟餉及朝廷不急之需安出此其煩聖慮者一金礦臣等未之前聞即貢金亦買自他省若寶井出産寶石則猛密猛告地也三十年前已折入𬗟見為思仁盤據臣等議復尚未有便其地乃不毛煙瘴之墟漢人入者十有九死張國臣奏往開採不知自己能率土民李拱極等往採乎抑欲臣等聚數千之兵與之偕往乎國臣等無班超三十六人之雄臣等未敢保其徑入若欲臣等集兵以威脅取必開邊釁此其煩聖慮者二展轉思維俱無一可臣等請為陛下計莫若將張國臣原奏嵗解銀萬餘兩就責任臣等撫按督行各該府縣畢智竭力截長補短於官四民六之例稍為酌議嵗輸內帑一萬之入寶井俟臣等恢復猛密之日令彼夷酋任土作貢雖未敢必實為至願至於差遣官貟悉免入滇如此可仰副皇上開採之意而雲南貢金兵餉等項亦可取給內夷外夷之釁永可坐消䇿不尤得乎儻陛下以成命難收開採之使業已出京乞敕令內臣楊榮前來與臣等商議每嵗解進程限而原奏張國臣等撤回免其開採此於邊計猶未甚失若以臣等謬言為不足信則此舉輸於陛下者能有幾何其耗蠧滇省之礦利者不可勝計必至上誤貢金下釀邊患兵困於無處之餉則兵變夷爭於垂涎之利則夷變亡命之徒聚于中狂逞之夷發於外滇雲不免多事黔蜀必至騷然此時且必請內帑以靖邊疆而何有於一萬之入哉臣等職司封疆安危願陛下以國用邊計兩者權衡使歸於當也罷採寶井疏陳用賔臣惟雲南之有緬其為中國患舊矣彼其挾封豕長蛇之勢敢與我抗小則蠶食諸夷大則寇邊即先年麓川之役王師百萬三勞南下卒莫能大創邇年以來緬醜不敢飲馬金沙窺我蠻莫此豈臣之力能制其死命哉良由我皇上以封疆之事一以委臣臣因得以展布四體內則綢繆牖户之修治以不治外則聨絡逺交之計以夷攻夷又嚴禁中行之輩不使播弄於中外彼緬欲乘無隙自救不遑故狼煙弛警三宣亡恙耳乃本年二月內緬醜阿瓦其酋雍罕結連木邦等夷擁衆十餘萬直犯蠻莫蹂三宣而抵騰越之墟其執詞曰開採漢使令我殺思正以通蠻莫道路吾為天朝除害焉耳彼時邊疆將吏奉臣令聲正酋致寇敗北之罪殲之徇衆使瓦酋而果無他則當如臣檄捲甲盡回阿瓦乃留兵據守蠻莫何為哉狡緬之假獻井而思啓疆藉追思正而垂涎蠻莫姦謀蓋畢露矣夫蠻莫何地也三宣之藩籬也三宣騰永之垣牖也騰永全滇之門户也蠻莫失必無三宣三宣失必無騰永全滇之禍當自開寶井啓之欲開寶井則蠻莫不可復欲復蠻莫則寶井之役不可開此不兩立之勢也欲覬寶井則藩籬必撤欲保藩籬則採買當報罷此不兩全之理也夫天下之事一則精神專而事成二則羣枉開而事敗今為陛下之巡撫者任一將以整飭兵戎為陛下之督稅者又任一將以總理採買司兵戎者當惟邊疆是計有警必報賊入必擊司採買者當惟寶石是問警不欲報賊不欲擊其勢必至掣肘掣肘不已必至壅閉壅閉不已必至弛備一至弛備則緬騎可以長驅由蠻莫徑抵三宣如入無人之境騰永一帶恐非陛下有矣陛下肯使數年懷柔之邦祖宗金甌之業一旦以採井壞之耶臣知其非陛下意也夫寶井何足寶哉不過一土屑耳石為重乎土地為重乎以無用之土屑壞萬里之封疆以採買之虛名賈邊疆之實禍臣又知陛下不為也臣受陛下之恩渥矣封疆安危在此一舉若坐視不言是臣誤封疆而負陛下也望我皇上鋭發乾斷將寶井採買之役亟賜罷免舊將侯顯忠令速回籍無再起釁使邊疆將吏得一意講求戰守計圗所以復蠻莫之䇿緬去不追緬入必拒庶幾邊事無掣肘之虞而南服猶可保全乎條議兵食疏巡按周懋相安福臣聞天下之患發於逺者不足畏發於近者為可畏發於我之所戒者不足畏發於我之不戒者為可畏發於戒而有備者不足畏發於戒而無備者為可畏滇西防緬南虞交然逺在三千里外即有侵犯驅之即已非以其逺耶戒耶或有備耶乃尋甸武定自安鳯殄滅後改土設流民不見兵戈者四十餘年邇者克舉首難陷武定而肘腋殘逼會城而腹心危攻尋甸破嵩豐而肩臂傷白骨撑野赤燧漫天內地之慘百年未見非以其近耶不戒耶無備耶若復不戒復無備是後之視今猶今之視昔也臣慨於中久矣取其切要兵食可備善後者條為十事以聞其一設武備以嚴防禦夫不素練不可以應倉卒滇之兵自永騰順雲臨元諸營外餘郡並未設兵遇警惟調土司兵勇而土兵又多散處號召難齊往往坐視盜賊猖獗束手而無計苦無練兵故耳今查武定所轄四十八馬附近者猶得以文法羈束其餘或分布江邊或參錯江外箐林深谷隂巖峻嶺既有險要可憑而與江外諸夷結好連姻武定之變實始於斯謂宜於環州虛仁等處設守備一員兵五百名防守外與會鹽守備聨絡隄防內與郡城官兵鼎足屹峙此以防之於境也武定城池雖復而無兵控守與無城同宜暫增兵千名設逰擊駐鎮虛仁尋甸款莊三營皆聽調度節制尋甸與東川僅隔一山孤城可虞宜增兵五百名設守備防控普渡東川咽喉省城要害宜擇指揮一員提兵三百名守之此以防兩郡也其在會城自廣西營兵百名外應再增九百名以軍門坐營中軍統之與管操都司兼同衛軍操練視武甸為左右臂而會城居中運之首尾相應內外相聨以消睥睨俟反側盡安方可漸議減撤也其二清隱占以廣訓練臣查全滇軍數三分馬步旗軍二萬七千八百三十八名數非少也且勿論外郡即會城六衛實在請糧旗軍五千四百九十九名汰革事故在外軍非乏也乃操不踰千而夷寇臨城未有一軍登陴而守者此無他荷戈持戟皆疲癃老弱之卒而精鋭豪猾冒厮役牢步之名至其散糧也在各衙門跟役皆得循例告給而城操各軍隨大班支散者多為管屯各官以兑支敷軍空名與之有終嵗而不霑半菽者勞逸相懸苦樂頓異無怪乎私役愈衆城操愈虛也謂宜除堡軍扛擡走遞及分發哨守外其應役者量留若干其餘與馬軍盡入城操年終更番以均勞逸自非護表等項公差不許預告另給以均苦樂至臣衙門無久駐省城之時與撫鎮異惟巡軍餘丁應留巡守以防册卷餘聽都司臨期撥送出巡外郡照舊入操在外衛所聽駐劄各道一體查發操練庶尺籍不為空名糧餉不為虛糜矣其三復汰折以實行伍兵制以三分入操七分治屯兵農相兼善矣滇中額有土軍不支口糧嵗赴操守往者金價無措有謂軍多頂虛費議行汰革取口糧以充金價者此權變之計耳委官以多汰為能有汰老弱及户族至舉衛所城操哨守之軍而半汰之夫老不能逐隊獨無子弟乎弱不能追敵不可俟其長乎祖軍尺籍即逺在萬里人隔數代勾單一至甚有丁盡户絶纍及業主與甥壻者又何論户族乎查會城六衛汰軍僅一百零十名而在外衛所前汰其半豈汰之法可行於外衛所而不可盡行於六衛耶詰及城操無人輒以汰軍對已據汰軍告詞及衛所申呈批行查議憚於逺覆苐曰金價無措成規難易而已夫金價誠難處矣今礦厰量開即目前未盡見課而將來未必無資何必撤見在行伍之人奪其應得之糧以充之乎折操之議起自盧承爵彼謂軍不赴操操不以實不若折操銀五錢猶可濟急需耳夫入操不以實操官之過也令之折銀舉其操而廢之不因噎而廢食乎聞此時軍與官通納不及半故復汰軍免土軍折銀毋拘成心憚更改最急之務也其四重兵備以修邊防曲靖臨安瀾滄金騰四兵道設居四陲而前撫臣蕭彥復議將分巡安普道更駐兵巡專理雲南武定兩郡以補四兵備之空法至密矣以臣所遍歷有一可練可用之士乎夫兵備謂以兵為備也無兵安備今宜令於所轄衛所軍士挑選精壯勇敢者多或六七百少不下三四百名置之標下選中軍統之分營練習武藝教演戰陳衣甲器械必堅聽於局料內動支製給比照選鋒例於故絶名糧老弱半糧內計處以恤其情無事更番下班以均其勞有事分營策應以齊其力操賞錢糧酌議計處苐不許借為吏書賞賚以灰壯士勇敢之氣行之一年而兵威不振漢夷之心不懾臣不信也其五復北營以壯威武省城教場舊設北關之外後移南關當商民輻輳之地況目前勢必增兵此等烏合與闤闠錯雜而居能保其不橫恣姦奪否何則地近而勢逼也若復營房於北有數利焉城西北負山民煙稀少立營屯聚可固城守利一也邵甸小甸等處皆為夷賊出沒要路據險瞭拒可扼賊衝利二也且其地廣衍既便馳驅而兵士得就其隙地以借樵蘇其利三也與商賈居民不相混擾絶姦宄搶奪之端其利四也此可守復營之永利矣其六核田畝以充儲糈滇中屯糧總三十八萬七千有竒嵗完六分其中兌支甘認樂從敷軍種種名色皆列完數猶有不可勝詰者夫地非加縮也應支之官軍非加多也且故絶逃亡應除俸除糧者無論如景東瀾滄等衛之甚即諸衛所亦消耗十三四矣乃田畝多而餉不足官軍減而食無餘何也巨姦豪猾餌誘於前紈褲之子踵襲於後以一嵗所入浮於所出支剩有餘混稱拖欠即參罰亦故事耳今去萬曆十二年清丈弗逺圗册具存宜遴委覆核如某官故絶職田若干畝某軍逃絶屯田若干畝見在何處何人頂種改附有司徴收仍總計逐年所入若干所出若干應放若干悉力清查綜理其支放有餘者變價解司以充兵餉屯伍官侵逋數多及占為私業者重行參究示警庶田不淪沒而餉可漸充矣其七嚴屯徴以飽軍腹屯政之弊百孔千瘡其徴也既不可窮詰其放也又漫難核稽甚有城倉支矣屯倉復支本色支矣折色又支者有通同吏胥套押揑印票混百石如大理衛軍書王嘉慶等之為者屯田道駐劄省城其在外衛所徴收數目不過嵗取完欠以備奏報各道明知其弊而嫌於越爼亦聽其自廢自理而已謂宜以六衛屯糧徴比收放責屯田道在外衛所聽各駐劄道查比徴收官軍支放格册該道印鈐逐月填注季終報屯道以備彚核此非分屯田之權實所以助屯政之成則武辨不敢欺冒而三軍且宿飽矣其八寬文法以綏土夷夷蒲僰混處內地種類雖殊其嗜好其椎髻其侏􅍣不通漢語其工弓弩而習剽掠其不習文字木刻為契同也彼實逼處我郊坰之間其改土設流者即芟除既久服習漸深然其戀戀故主之心有老死傳子孫而不能忘者管甸通火視為利窟指一科十魚肉弗厭姦商黠民移居其寨侵占田産倍索利息稍不當意羅告托詞不才有司乘之以上下其手左右其袒彼夷民畏城市如陷穽見差役即魂銷宿怨深怒業結鬱而不可解矣如武定之難由鄭舉深憤管甸馬一龍馬化龍等之侵奪有司不為伸理遂假阿克為鳯裔以惑故夷一夫猖逆而方百里內外蜂起蟻附此非激之使然哉除武尋所屬諸馬未叛及乞降者業已撫定外一應改土設流郡邑俱宜曠蕩文法嚴禁科斂平息爭訟劑量賦役使夷民安我之約束至土司統轄夷民征調即赴應寬其小過敘其功勞時其替襲釋其株連公其好惡使有所慕而為善彼見其長之俯焉遵順也不愈堅其向化之心哉其九創鄰夷以絶邊釁武尋境界金沙江江外通安會里黎溪戈備等處則與武定境接東川則與尋甸境接在蜀為屬體之毛在滇為剝膚之害至七州諸夷納叛賊質子助兵入寇飽飫而歸東川祿哲等受叛賊重賄提兵相助圍尋甸郡城者再此豈復知有法紀威靈哉今鄭文久獻江外渠首次第縛出或可漸為結局而梟獍難馴睥睨猶在謂宜合兩省之力擒首惡置之法使江外羣夷弗敢復反夫然後沿江郡邑或有安枕之日也其十重鹺司以足課額雲南産鹽去處僅有黑白安五四提舉司全滇兵餉大半仰給於斯邇來以援納途開提舉官席不暇暖額課多虧夫以一銅臭子捐千金資輒稱五品大夫資格極矣當事者又為之計日而扣償其途已窮而萬里間關其途更窮上之人授之以索償之路又限之以索償之期於是取見面勒常規不顧正課盈虧蓋其計畫無復出耳四提舉每嵗納選二貟嵗僅二千金所利公家甚微而四井邇年以來嵗虧額以萬計所苦遐方甚巨合無塞援納之途仍照往制於通判知縣等官升轉彼其前途尚逺人知愛惜竈民無科索之擾額課庶幾其充足乎以上十議皆邊鄙之剩談惟是滇南事體與它藩殊積漸已成偏重難挽參差抵牾即撫臣有不得盡行其法者非仰藉天語叮嚀曷由使萬里遐荒食足兵強逺至邇安乎請巡撫兼制東川疏巡按鄧渼南城竊照滇中四面皆夷西鄰緬甸南界交岡皆悍夷也東北接壤黔蜀一二土司皆服我冠裳受我約束者然緬甸尚有三宣為藩籬而交岡以越在九長官司之外亦未敢公然入犯惟是蜀之東川逼武定尋甸諸郡僅隔一嶺出沒無時朝發夕至以故談滇事者憂不在逺而在門庭之內矣乃其酋長祿夀祿哲兄弟安忍無親日尋千戈而其部落以劫殺為生不事耕作在蜀既以所轄遼逺法紀易踈在滇又以非我內屬號令不行目無漢法久矣往者鳯克大理保之亂隂相結約遣助兵馬罪已不可勝誅賊既敗走開門納叛要挾重賂方許解獻按情定罪不在逆克等下止以大亂初平諱尋兵端幸稽天誅不謂志氣愈驕寇劫日甚先是臣以三月盡入境經過馬龍州地方士民泣訴以近日龍順成餘黨構引東川夷賊入境抄害該州軍民四十八屯蓋無一得免者前抵烏龍箐則近日添設官兵一百營屯在烏問之亦以防守川賊然以衆寡不敵俄而有報殺死客商者有報拒傷官兵者臣聞之不勝切齒批行該道查議間旋據尋武等郡申報各悍夷擾害情形到臣除陸續批行查議及一面防禦外該臣看得東川土官所以敢於稱亂縱令部落蠶食我境內者以前日藏納叛酋得志於我狡焉思逞賊衆強盛一也自恃隔屬無復嚴憚二也窺我虛實兵力不繼三也始猶竊伏林莽今則跳梁村落矣始猶嘯聚不常今則屯據彌甸矣即使我素無兵革之擾猶不堪其戕賊矧乃尋武兩郡新遭兵燹瘡痍未起流散未復一二殘民拮據舊業誅鋤荒穢僅延殘喘孶畜幾何盡為賊有場圃一空饔飱無望譬則尩羸病夫復遭捶楚言之傷心於斯時也將分布營兵阻其出入乎而自尋至武方六七百里間蹊徑四通於此防禦於彼入勢不能遍守也將調集漢土官兵一鼓而翦之乎計非旬日不能辦聲息既露鳥舉獸駭兵聚則賊散兵散而賊又復聚矣且奈之何將贏糧除糗深入其阻一舉而殲乎則林箐深密重關峻嶺彼逸我勞有害無利而此時兵餉匱竭司庫如洗萬萬不能為無米之炊也將借助於鄰省為大創之舉乎比聞蜀中連嵗兵凶自治未遑安暇及逺又勢有不行已將坐視而不為之所乎心則何忍以故臣與撫臣計之惟有嚴督官兵驅逐出境稍紓目前之急而不能終禁其將來也縱收一路之勳而不能盡塞其岐徑也所恃者獨有陛下之威靈耳威之若何則改敕滇撫兼制東川之議是已前日撫臣具疏請而未及其詳部臣以事關兩省始謀宜慎故未即覆允今地方事勢危急撫臣既難於啓口臣若復噤塞匪惟負陛下負地方抑非樞臣之意矣臣竊以為是説果行有三利亦有三不足疑請借前箸籌之新敕初宣夷人喪膽體統既正窺伺潛銷此利在滇者也蜀道二千鞭不及腹借我近力釋彼逺慮此利在蜀者也不費斗糧不勞一卒折衝樽俎制勝無形此利在兩省之邊民者也議者或以此疆彼界各不相踰詢謀未周慮成矛盾不知東川乃不毛之地鳥語侏􅍣梗我王化向來隸蜀僅同羈縻此雖兼制亦是虛聲非割其疆土人民而歸之我也於蜀無損於滇有益撫臣公忠謀國豈分封畛旦夕入佐中樞則滇人即吾人而何嫌猜之有焉此不足疑一也或又以夷方土酋利在安靜十羊九牧慮生事端不知東川在諸夷中最稱桀黠難治舊制蜀中雖設通判一員管府事實未親履其地土官專制自如縱許滇省兼轄猶虞猝難馴伏邊吏茍以得免侵擾為幸寧復求多此不足疑二也或者又以各省直疆界相連犬牙相制一允所請援例紛紛不知東川與蜀隔絶而距滇伊邇其驕縱不道又各土夷所未有者異時黔撫以楚中協濟兵餉隔屬不便查催請得兼制湖南湖北卒蒙廷臣覆允兼聽舉劾况東川原無道府有司事權更置而禍生肘腋又不獨黔中之害而已他省事體原殊詎得比例瀆請此不足疑三也滇省延袤二千里土府居其十四調停費力又豈求益鄰境自取多事彈丸土司即令取一與一在蜀無所靳在滇亦無所利况所請止節制乎撫臣近日條議請增安普道敕蓋亦不得已而為此説然道臣權輕邊夷素不知司道為何官且同一兼制也何分院道而事體斷斷非撫臣不能彈壓者若併增道敕則尤稱便利矣議恤録名臣疏巡按毛堪吳縣竊惟致身者人臣之分也旌賢者明主之典也故骨鯁言事之臣不難捐生立名則社稷賴之鞠躬任事之臣不難違衆特立則封疆賴之乃有功在社稷封疆而死未霑殊恤生反遭竒禍如原任給事中毛玉原任雲南參政李先著其人者豈非聖世之缺陷事哉臣謹按雲南毛玉右衛人登𢎞治己丑科進士官吏科左給事中嘉靖甲申年議大禮廷杖身卒隆慶元年贈光祿寺少卿夫人臣犯顏極諫至於血塗丹地魂沉青瑣斯亦慘矣彼所爭者朝廷之典禮所補者聖明之闕失忠肝義膽既與日月爭光徑骨香名又與乾坤並立在先帝褒嘉遺直業已薄贈其官在朝野嘆息孤忠猶謂未酬其烈蓋本官天鍾正氣寧舍生以成仁身任綱常務轉圜而悟主居諫垣十五載每言人所不敢言閉夜臺九十年惟死彼之得其死所謂大忠之當亟録者此也李先著錦衣衛籍山東人登萬曆丁丑進士歷升雲南臨元分巡參政於時適有順寧猛廷瑞與大侯奉赦構隙讐殺當事者以本官原任瀾滄兵備素為夷人所信服委同金騰副使邵以仁參將吳顯忠提兵勘處掎角而進本官以猛酋無大罪且生靈塗炭可憫堅議撫之酋持千金請命本官謂不受金酋不信遂以金發充兵餉酋遣子送印為聽撫之質而金騰路乖其撫議徑襲擊廷瑞反誣搆本官被論逮繫竟死於獄夫人臣不貪啓疆之功以全生靈之命且使狡酋不信撫臣之屢檄而取信守臣之一言此其宣布威惠人安封圉為何如哉而貪功之徒乘間而下石害能之輩操斧而尋柯三木囊頭天地且為黯慘一腔熱血鬼神亦為鑒憐彼接踵而逮同夕而殞者洵天道之好還而家户有祝郡邑有祠者尤人心之不死蓋本官一塵不染百折莫撓柔逺來椎髻之夷掩骼無鬼磷之哭救荒則瘡痍色起品題則多士從風疏水利則赤地成疇憫貧寒則青襟徼福徒失貴臣之心致干雷霆之怒功而見罪貞而被誣所謂大冤之當亟伸者此也近該禮部公議諡典考訂别白取其事功崇隆節義彪炳至重也期於耳必徴目聲必副情至核也而要以闡幽光維風教體聖明旌德之盛心存三代不泯之直道至嚴也若玉之杖而死先著逮而死所謂社稷之臣誠死社稷封疆之臣誠死封疆事功崇隆節義彪炳孰加焉二臣身雖往而忠耿不磨志未酬而風勵滋逺芳名光於俎豆公論定於蓋棺耳目之真情實之孚孰加焉國家旌一言事之臣而骨鯁者益勸旌一任事之臣而盡瘁者益奮匪徒昭雪既往實以風示來茲裨聖德而存直道又孰加焉蓋以滇之孤僻而有如玉之以身徇國以仕於滇之間關而有如先著之以身徇職真貞元之門值而麟鳯之偶出者逺聽之臣咸為追悼而况於廟堂之上乎臣觀風茲土從公咨訪在玉則身死之日貧無以殮今其子孫不能具饘粥臣檄雲南府修其坊表量給祭田在先著則一棺尚滯淺土煢煢遺嫠無以糊其口臣捐資助葬復檄提學道祀之名宦庶臣所可為者罔敢弗既厥心也若夫旌直揚清之典非聖明留意孰鬯此久鬱之公論乎皇上崇尚風化綜核事功超出尋常萬萬先後忠諫之臣如楊繼盛豫諡贈廕近且豫祭矣如劉臺贈官與玉同又廕一子矣大聖人之作為寧不足磨勵一世激發人心哉然死於戍者已蔭死於杖者獨遺非法之平也有罪者尚世衣錦之官而有功者竟斃錦衣之獄非所以示勸也臣有慨於中義不容默行據帶管學道按察使袁茂英呈詳前來特為題請伏望聖明不遺荒逺一視同仁敕下該部再加會議將毛玉豫諡補廕以表直臣李先著即未敢遽議諡典先行贈秩録廕以表勞臣庶大忠可慰大冤可雪公道明而人心勸臣節風而聖治有光矣請蠲貢金疏巡撫沈警炌歸安臣奉命撫滇數月以來日孶孶焉惟弭盜安民是急顧四郊多壘大盜縱橫征剿之文與招撫之檄交發互馳筆幾為秃而反側難馴期以弭盜而盜未必弭也戒諭有司釐剔弊蠧蕩滌煩苛念念思與民更始而天災流行霪雨為虐登城一望四野沮洳期以安民而民未必安也盜未弭則添兵添餉勢不能免民未安則焚林竭澤困不能支况可以遼餉故有每畝九釐之加派耶滇土府土州土縣壤地千里小者數百里所輸僅差發銀二三十兩多者五十兩或百兩而止其流官州縣得數百金遂了一州一縣之額若嵗入有一二千金者便以名城巨邑稱矣譬之一貧家析薪數米常懼不能糊其口一羸夫朝饔夕飱常懼不能必其命今欲少留涓滴以活滇人之命則惟有請蠲貢金一節而已夫皇上取金於滇豈以金為滇之所産耶不知商民裹糧重繭逺覔之秦隴近覔之巴蜀甚有至京而反用髙價易之以進者至於金價之所從來尤有不忍言者或取之汰軍或取之摉括或取之閭閻或取之商民之賠纍吮血摧膚呼天搶地皇上不得而知也如以為必不可缺則隆慶以前原額止二千兩隆慶四年始增三千時以撫臣曹三暘按臣許大亨之奏穆宗皇帝慨然停止萬曆十年增金一千時以撫臣劉世曽按臣董裕之奏我皇上亦慨然停止則知金可有可無之物也以可有可無之物蚤為停止而况又加之遼餉之急耶惟盡行免解或止解原額二千停止續添三千少留滇民餘力以供九釐之加派少留滇餉萬一以救多凶多懼之危疆臣度眼前光景金價決無所出來嵗貢金決不能辦臣惟有與地方諸臣席藁以待斧鉞爾已自貢金增後首尾三十餘年兩臺為百姓請命連篇纍牘一切不報最後得此疏乃奉德音裁舊額之溢與民更始公回天之力雖會時之可為而滇人並受其福良非偶然今録於志以識盛事劉文徴識請滇路粵蜀並開疏巡撫閔洪學烏程臣戒裝於武林聞黔警隨具通粵一疏齋沐拜發一面兼程馳至湘潭滇役自粵來者言富州廣南之間炎瘴正熾必霜降後可行不得已同新按臣暫駐兼臣前疏恭候廟裁久之不得部覆疑是僻縣抄傳遲漏之故乃煌煌君命致久宿於草莽臣之寸衷萬萬不敢即安以九月初自衡永折而之粵經桂平蒼梧遡潯江而上以十月十八日抵南寧而臣之滯於道塗既八閲月矣自此以進再十日可自養利入龍英土界再四十餘日可脫廣南而出臨安臨安望省城五百里而近臣之受事殆有期也土司一帶不獨攀葛懸崖之艱觸瘴衝嵐之苦與夫裹糗露宿飲食啓處之大不堪已也褻漢官之威儀而損朝命之靈重履虎探穴輕以身試不測之淵中間關係實在國體臣念之凜凜亦既幾經躊躇而竟出於此直無如封疆之不可棄畏此簡書何耳雖然臣入矣全滇各員以千百數今而後復有踵臣而問途者乎今日之滇如在井底人之脫離慶若更生其視入之也殆甚於從井自黔警以來數聞出滇者矣未見有捧檄而入者也而况行道之竒難加諸部議之未決人觀望次且何憚而不裹足恐臣等雖入而路終於未通各官終不來此垂危垂絶之孤滇必非臣一手一足之所克撑終於不可為也或謂粵之外尚有蜀會川一徑不知蜀之有徑何妨兩存今宇內各省靡不四通八達滇之受病正以靠黔一線至此為窮蹙耳且臣於粵蜀籌之至熟彼此得失亦略相當自金沙趨建昌計程半月可達誠不若粵土司界中逾數旬之逶遲然蜀止會川一隙而粵田州歸順泗城安隆在在可走蜀之東川方煽逆弄戈而粵諸酋素號恭順即撫臣何士晉止慮一田州近語臣已俯首就戎索是粵之與蜀各有利害各有難易其交難專倚政其不容偏廢者矣以蜀言之建昌會川之間營哨旗列特向非通塗或名存實亡夫馬廩糧多所缺略今亡者應議修復缺者應議添加若會川以南數站原無營哨則煩從新規畫俟臣履任會蜀委官相度隨宜措置應自非難乃盜賊出沒須於要害設兵置防必我兵力足制賊死命庶以備非常而護行李克稱周行也至粵中所疑不過謂土酋不欲我據其腹心我於其地張官置吏召夫養馬非所安耳今但於所經應泊去處量建公所即募土人看守我往來其間過而不著不異遽廬而又徒御供億一切自備秋毫於彼無涉彼又何嫌何難而不帖以相從通行之後商賈熙熙攘攘彼更從而利之矣此路在滇界十之七八在粵止二三於滇無閡於粵亦可行也惟滇行粵中粵費出額外不容不協濟而數未易酌今議該省驛傳道特置滇差簿用印鈐記分發州邑各一本必真正勘合火牌方淮應付登注不得徇情濫應嵗終道核而彚其數而滇償之滇輪蹄止有此數兩路分行所協濟於粵應不多金也臣與粵撫一一從長面相商確别無窒礙建昌雖臣撫屬兼轄事干創始須蜀為政伏乞皇上俯允臣議敕下兵部行二省各該撫按刻期料理共期為滇造命俾滇無路而有路庶朝廷無滇而有滇矣抑臣更有請焉滇去長安萬里雜職小吏除滇缺者例給以火牌腳力蓋恤其逺也至長吏以上則否今粵蜀新闢險逺艱危殆什百於昔矣夫必長雇馬必買喂其費不資彼寒儒筮仕何從辦此就雞肋之難拋苦資斧之未措倚道傍徨廢然而返繄豈無人情固可念倘皇上加惠逺疆曲憐逺吏特敕該部於新選滇中郡邑等官量給應付使稍省內地之資糧用充新路之腳價是亦為入滇者勸駕而通路之當併及者也條滇黔事宜併莊田照舊歸有司疏閔洪學今之為滇寇者內夷曰補鮓曰設科曰張世臣所謂腹心之疾不能一朝安者也外夷曰安效良曰祿千鍾曰尹王保所謂肘腋之憂朝不保暮者也至於黔之寇曰水西顧滇門户在黔滇與黔實共安危亦不得以門庭之患作膜外視者也試思此諸寇者有一焉不誅鋤勘定滇能安枕乎又思欲平寇需幾許兵幾許餉幾許文武將吏而滇有之乎或見滇師平師羅搗亦佐以為所向無前不知漢士數萬衝鋒實止三四千並暫時呼集非常川可恃之兵也或見東那西湊滇餉茍延旦夕不知已括底倒囊各兵歷過之糧尚半年未支也或見監軍有人統兵有人不知各手握四五篆實不免顧此失彼也或見祿千鍾二月獻賊之後爪吻暫匿張世臣亦赴府投降不知二酋鼻息仰於水烏未可認賊作子也或見阿九已授首補鮓安應龍已逃不知二叛見遁普界捲土重來夢寐不忘如近日平彛大犯情可概見憂未歇也至安效良桀驁由來已久方藺州未叛一年之前干戈先尋矣彼狼子野心寧真俯首帖息就我牢籠不過彼以誤我我因以愚彼今情見勢窮恐禍機猝發東川霑益普安一時雲擾滇必不能四面應接此目前大危也又水西緊壤泗城臣初欲用泗城為牽制水西之計乃頃者滇師長驅黔境既四百里連拔其三叛營轉戰殆十餘日而泗城未以一旅來會其不為我用可知泗城不為用恐安南不能久持必折而入於賊滇黔一線自此永斷將來恢復便無處下手此又目前大憂也臣亦既遍集士馬統以諸將以參將尹啓易駐交水以參將袁善駐平彜以參將施翰駐越州衛分兵馬龍以逰擊李思忠駐羅平往來師宗又盡發武尋兵之在城者於各隘以守備金為貴駐倘甸以名色守備李瑗駐補知各所統一二千多不過三四千苦未足捍大敵而此數萬兵之糈安出乎臣又檄普安州署印同知劉世龍收拾餘燼遴其精鋭成一軍就以本官領之駐新普之間使東望安南西望平彜相為呼應臣所謂不宿滇兵而用土者以客兵地利不習饋運不繼勞逸之勢不如未能持久不若以本地官募本地人守本地方食本地米無攜散之勢無匱乏之憂他日滇師大舉因之為東道主固策之便者而黔路方梗普兵之糈滇不得不按月暫給又安南孤城久困城中至易子而食臣齎千三百金分發賑救冀為皇上延此孑遺以待恢復乃滇不能自活呼呼吸吸救死不贍又有餘資以給黔乎竊計西南數省粵既無事之國身在井上蜀非無事而兵力餉力皆十百于滇黔之危蹙雖與滇埒顧地近路活呌呼可立達朝廷亦以全力赴之屈指兩年來西南用兵費皇上數百萬金錢遴用文武道將不下百十數而滇所承受幾何耶豈雲南獨非王土官於雲南者獨非王臣興言及此臣心碎矣滇至冤至苦矣若不及今將前後紙上所題允之餉一一如數立刻解發文武將吏不亟遴選殊異趨促來滇臣無米必不能炊一手一足必不能撑持雖廟堂之上無棄滇之心乃不幸而有其事矣按臣二月將行部臣固止之謂兵事方亟呼吸安危疆事視巡方孰重按臣以為然數月間隨事商訂幸未有失一段孤苦危迫情狀惟臣與按臣身閲之共嘗之而廷臣或未盡悉者此臣所刺心泣血而不能已於籲呼者也皇上未忍棄滇接濟極救寧待臣詞之畢耶抑臣猶有請焉朝議以援黔倚重鎮臣將莊田仍歸管業矣若謂有鎮臣則援黔立效有莊田之歸則鎮臣立奮袂而起不知援黔者鎮臣自有之心不待賞而加勸其有志而未逮者鎮臣直無如之何又非賞之能勸也兼滇飢饉之後繼以師旅地方在在殘破人心處處動搖臣遍飭有司加意拊摩多方懷集恆慮莫挽樂生之趣猝成瓦解之形奈何更以莊田一事遍騷而駭亂之鼎已沸而加薪焉獸已驚而又為驅焉此煢煢蚩蚩者非轉死溝中則羣噪揭竿耳正恐黔難未紓滇禍已烈矣夫莊田為滇民患苦其搏噬楚毒之狀前撫臣周嘉謨按臣鄧渼之疏蓋詳言之臣亦何必再言惟昔猶太平無事之日今乃戎馬倥偬之秋昔不難解之於倒懸今何堪再驅諸鼎鑊憶鎮臣今年春曽移牘于臣謂莊租起解迂回布政司非便欲徑赴該鎮交收臣韙其説見在舉行是莊田仍歸管業鎮臣之意初不及此今乃以此畀之非所為愛鎮臣以德也鎮臣持重不擾其御左右不少假借但厮役之衆安能一一防間兩迤之廣安能一一伺察莊田貽害固有不期然而然者臣始未敢深言伏望天語丁寧將總鎮莊田容有司照舊徴收以成鎮臣之美以奠瀕危之疆一舉而兩利之矣直陳天下受病疏給事中王元翰寧州頃者伏覩皇上斷自宸衷沛發明詔割愛改使日月重輝乾坤再造大聖之作為超出尋常萬萬國家太平之祚端在此矣顧在上轉移甚神而在下積弊未滌恐非所謂上下勤恤共迓天庥也臣敢以時事最切者為皇上陳之一曰責法令之行祖宗立國規模超軼近代至今承平日久兵紀頽廢也而強不如前代財用罄竭也而富不如前代虛論日滋也而功業不如前代乃天下猶晏然者凡以祖宗法制盡美如犬牙掎角用是有亂端卒無亂形也邇年以來各衙門茍且遷就之私牢不可破一事之來漫無成畫及事覆敗也又無以歸其咎一官之缺衆為射的明知奔競也猶姑以應其求至有昨日之令今日廢閣而弗問矣今日之請似昨日之令而實非矣凡此總起於顧皮面耳皮面公行法令盡廢尚知有朝廷乎臣愚以為責行者此也二曰專會推之權國家罷中書省設六曹曺各專司祖宗慮為至逺邇年來凡遇大僚銓部缺則九卿卿二皆得執筆各推一人名曰會推夫會推之行也豈無心切急公內不避親外不避讐者乎此以示公反以濟私使天官柄衡者反旁觀畫諾不如罷衆人會推使權總歸吏部其舉之而當也我得以考其眀舉之而不當也彼不得以分其罪况乎要津之地神通畢聚一開分散之門大啓鑽刺之路所係非淺臣愚以為專一者此也三曰慎名器之重國家勵世磨鈍惟此名器故繁纓小物也孔子惜之郎官卑僚也明帝難之何況制誥之詞人得片言以為榮者今長篇濫美敘及家世之私瑣屑斐亹大非簡重之體皇命不既輕乎天子稱卿止內閣六卿憲長而已今南部卿二俯而卿之甚至總戎武辨亦冒而卿之此陵夷之漸大非稱謂之體也王言不既褻乎至若京堂之濫尤可駭異舊制臺省遷轉一內一外內者固優外者非得罪清議亦不為劣兩年以來科臣內轉猶止五貟臺臣內轉業已二十餘貟一時京堂濟濟至藤棍為之價髙其間固多才品卓犖素厭人望者亦有借資俸為詞不得不轉者其必欲得京堂者為其去開府近也然節鉞之寄必兼採聞望之隆壅塞溷濫甚非制也况今日以茍且得官焉知他日不以茍且誤國臣愚以為當慎重者此也四曰廣賜環之詔國運之盛必曰野無遺賢以遺之則朝廷不得用小人進禍亂隨矣頃讀恩詔起廢一款有除永不敘用外一語竊以為過也夫諸臣同一建言得罪謫遣有分别總因觸犯聖怒有輕重今聖怒既霽天度自恢何忍使覆載之中有棄物哉如其人而不肖也則亦已矣如其人而賢也乞敕吏部分别起用盡展其能不然以有用之才使之枯稿巖穴甚為盛世惜也臣愚以為當推廣者此也五曰嚴奏辨之妄國家設科道專司言責天下之利病百僚之姦邪咸令其以白簡從事一人之耳目難遍豈無一二風聞過當近年來一經論劾必紛紛辨擾一辨未已繼以再辨再辨未已參以詛詈如此必令言官不彈一人乃為快乎夫刑賞聽之朝廷是非聽之公議若盡待揭辨而後明豈言者俱屬鑿空辨者遂無可議乎惟此風不已小臣倣效有上書自頌其功者矣又有上疏指缺欲自升其官者矣壞士夫隄防損朝廷威重臣愚以為當嚴禁者此也抑往古國家長治久安必其元氣厚而不削神氣張而不弛元氣在一人之天機皇上既自為轉動願永豎勿易臣不憂元氣之不厚神氣在臣僚之精神今日乃無人提掇恐灰頽積漸臣實憂神氣之不張乃提掇精神則又在吏部與都察院耳自李戴溫純二臣去國懸缺未點聖意淵逺為慎重其官必慎重其人但此官最為喫緊況朝覲在即外察不逺銓臣憲長尤不容遲也臣逺方下土念亂熱衷雖不識時務亦不敢托拾浮詞如一得可採伏望皇上簡發施行或於士風吏治不無禆益矣陳滇患孔殷維桑慮切疏王元翰臣惟天下大勢猶人一身京師心腹也中原肩脊也滇黔手足也手足受病心腹為之不寧焉頃者雲南土酋阿克鄭舉􅊳發破州屠邑殺知縣焚會城可謂烈矣而臣策其無能為也其志在挾復故物虜掠飽即揚去耳尋甸夷孽大理保等通謀馮險至圍郡城殺指揮刃土官可謂慘矣而臣䇿其無能為也其志在效鳯賊所為以得官耳今據撫臣陳用賓捷報疏則官兵甫集賊克即棄武定遁之克梯龍三藏矣蓋不走江外而走克梯意者江上有兵截其歸路若腹背受敵旦晚授首而大理保等聞克賊敗遁亦必破膽奪氣亦一戰可下此么麼小醜原無足比數之賊當未叛之先一縣令足制其死命即長驅之日猶一鼓可殲其烏合今一旦猖獗使二百年來生聚樂土倐忽灰燼地方之破壞者不可卒復生靈之遭戮者不可再生如之何哉近聞臨安澄江新興嶍峩一帶羣盜蜂起劫搶城市燒掠村屯晉寧與河西等州縣至土封城門出入幾斷大小凜凜莫必生命而衆口同辭咸怨參將張名世謂前河山交址之役抄奪土司捆載巨萬屠民抵賊殺人如麻而江右與四川兩省人民被害尤多嗟嗟凡此無辜赤子身為良民既苦有司驅迫化為賊盜其有真賊盜又為將官庇護反戮良民此盜之所以日多也臨安一路之賊皆名世一人釀成之耳若乃全省招亂之由則弊政公行一方皆不祥之氣天日遼逺小民無控訴之門監司上官也嫌逺多從規避甲科正途也選任竟無一人紀法蕩弛因循養亂誠非一朝一夕之故矣而其最為害者莫如貢金𣙜稅兩者滇池不通舟楫貨物有幾乃大稅之外有小稅正稅之外有私稅朝廷得十有司攘五府庫收全百姓賠半髓骨俱罄追剝無已是以室室空虛人人喜亂聞會城劫焚之日多乘閧縱火蓋有不盡出于賊首者故今日大可慮者誠在此不在彼也皇上試思民不堪稅而後焚採監今採監既焚矣而徴𣙜不罷貢金不能如數而後請減例乃請減矣而例更增離心結怨使賊酋借為師名即二賊撲滅而虐政不湔滇之為滇未可知也我皇上富有四海何難捐毫毛之利撤去𣙜稅并復貢金原額為滇民續殘命乎明詔一布歡聲如雷此無所驅彼無所借賊必有縳而獻之者若猶冥頑悍鬭則元氣已固人心不搖更遣一名將提兵搗巢如總兵劉綎威名素為諸蠻憚服使其將師壓境不出一月可懸數賊之首於藁街矣若雲南去京萬里往來之途僅僅黔中一線倘中原稍有緩急則鞭長不及馬腹滇黔兩省必斷為異域如唐宋故事臣計滇省西有金沙江可一葦直通四川馬湖東有西粵路由普安至田州不過添設數驛途平水便可以達金陵可以達荆襄計莫便於此者或以兵興暫歇事定之後亟宜嚴限疏闢勿空為話柄則入滇之道中由黔東由粵西由蜀水由江四途並進百脈貫穿此梗彼通諸酋不剿而自失其負固之勢矣首參魏璫疏給事中楊棟朝鶴慶今日之天下中外亟稱多事矣東北之烽燧未除西南之咽喉復梗而物怪人妖風霾地震種種不祥之狀天之以亂徴告也無非欲皇上翻然修省以成安攘之治然陛下自登極以來視朝講學起廢用賢堯兢舜業之念誠足以超絶前代而鞭駕後王又何事足修省不意有妖穢不祥之戾氣凝結肘腋如憲臣楊漣所參之魏忠賢者夫忠賢種種罪狀漣疏臚列甚明臣不敢再為掇拾以瀆天聽獨計忠賢一刑餘微賤小人耳何以仰承皇上之知遇而故惓惓念及之又破格而寵賚之至如此其極也蓋以皇上幼沖之日忠賢以服役之小節效有微勞實非其本心也其希望有今日也久矣然使稍知敬畏邀雨露之涓滴偷狗馬之餘年詎非忠賢不世之奇遇奈何目不識丁腹饒有劍寖假而結客氏以固寵寖假而布爪牙以恣焰內而宫禁儕類惟所生死矣外而朝廷臣民盡皆側目矣至於阻褫老成禁閉正直知有一己之喜怒不知有主上之天下與祖宗之法制據其狺狺欲逞之狀誠有臣子所不忍言所不敢為陛下聞者乃忠賢自明之疏曰孤臣戅直而陛下之慰忠賢也曰勤勞績著任事過直又曰是欲屏逐左右使朕孤立於上嗟嗟使忠賢而得為戅直則古之亂臣賊子皆得以戅直自鳴又使忠賢在陛下左右而始不為孤立是畜豺狼於几席而置蜂蠆於腹掌間也豈可不大為寒心耶且其溪壑無涯之欲搜括之術漸及留都藉明旨以恣盜行假傳造以攫公帑如龍旗如蠢袋據所頒式樣工料挾要銀五十六萬夤緣之姦黨仗為冰山巨萬之金錢盡入私槖裁減或多則羣小必向而訴曰曽於內邊魏公處費了許多使用稍不稱意又私相計曰必急走北京魏公處弄得一嚴旨下來夫宫禁何地也票擬何事也宵小且大言無忌敢於玩弄是陛下密邃之處為忠賢壟斷之所詎可謂無外人之知覺也今近而中國逺而四夷孰不知朝廷之上有一惡璫魏忠賢者是可豫奪生死人也是得竊票擬之權而大臣小臣惟所斥逐也從此而趨羶赴臭者邀外分之求耿介忠直者灰任事之念邊疆自此日蹙盜賊自此蜂起宇宙無光兩間若晦詎非忠賢一人為一世釀禍作祟哉惟祈陛下以楊漣一疏逐一省覽敕下法司嚴加勘問並查織造各項錢糧有無冒破尅減情由如果情理未真則諸臣當伏妄言之罪如曰研究得實則或誅或遣自有聖明英斷並有祖宗三尺在恐不能為忠賢貸也如此則閣臣必不求去小臣必不紛囂人情之惶惑盡消東西之戡定立待萬世而下將頌聖天子一番勇斷一番振刷而朝野臣民且共欣躍於清明之化理矣題復漕臣科臣疏御史何可及劍川為漕吏寃抑未白微臣隱默難安謹具實上聞仰祈聖鑒俯賜昭蘇事慨自逆璫竊用國柄生殺豫奪惟意欲為兵馬錢糧一手握定又遍布其羽翼散處中外而在京在邊幾成凶豎之世界矣臣適以儹運之役遭其逆黨崔文升李明道盤據漕河恣行威福魚肉文武將吏無所不至臣性戅拙恥與共事彼方叱馭至通臣先疾驅而南彼方期會於津門臣先星馳於淮上從茲恨臣日深伺臣日密臣幾自危人人為臣共危之然臣惟知殫犬馬之勞辦米粒之事躬催八千餘艘儹至關通抵通之日值我皇上撤回二豎之日十數萬官旗聞命自天歡聲若雷人人俱有性命之慶如潞河一區黃童嬉而白叟遊無不途歌巷舞再生堯舜之世也臣今謝事有日伏蒙皇上不以臣轉輸罔效加之罪譴又命巡鹽兩浙臣可無言漕然一時共事道臣及各縣官有無辜而遭二豎之冤抑者臣既深知而不一揭其覆盆以剖白於今日非所以仰體憐才之聖心好生之大德而忠於皇上之職分也其一為原任天津兵備副使楊廷槐臣於去嵗正月至天津料理凍船催空復載深得道臣協心之助祗以強項不屈見忤於李明道遂抹殺其生平誣以門户而削奪橫加矣其一為原任江西崇仁縣知縣崔世召拮據服官頗著能聲該縣漕米亦久徴貯水次祗以免運遼糧不饜官旗之欲揑稱未完然六月初旬已報開行崔文升漫無稽查輒併糾參削奪既非其辜提問禍且未已矣其一為原任直𨽻淮安府沭陽縣知縣今故何大進該縣漕糧業經推官秦育秀盤驗足數米之有無插和臣竟未聞亦未確有證據祗憑貪辨展印橫索之口羅織成疏削奪不已又行提問致何大進懼禍叵測隨畢命於投繯此又二百數十餘年漕中未有之變局未有之奇冤也當今聖明在御日月之照無冤不洗雨露之濡無枯不澤有如三臣其死者已齎志沉幽不能起九原而肉白骨被奪者雖垂首甘廢猶幸撥雲霧而覩青天臣既為皇上耳目又明知局中始末臣若不言無有知而代之言者臣此時不言後若有知而代之言者臣愈不能解於隱忍而不忠之罪更大故不避謝事已久終冒昧言之况道臣楊廷槐訪册已經列名啓事料亦不逺苐據其守正不阿挺然於惡豎烈焰之日無俟咨訪當速優起至崔世召何大進雖僅么麼邑令而受折有據處非其辜奪者豫之死者恤之匪獨昭曠蕩之皇仁亦所以信漕之功命也抑臣因有感於起廢之宜先無如諸臣交章所薦者何也皇上自有起廢之旨閲茲四月時非不久薦牘幾滿公車屈指正人君子儘自不乏今各疏具在御前某係某所同薦某係某所獨薦用所薦之人明示汲引之公因所薦以核其所薦之人又杜濫舉之端其於起廢思半過矣臣非專言薦舉而廢咨訪也蓋訪册之注雖公而登之薦剡尤昭然與天下共見銓部持此用人啓事益為有據耳臣今陛辭在即不能與酌議之末而臣有所知焉能知而不舉如科臣章允儒陳熙昌陳良訓楊棟朝吳國華正氣獨持錚錚有聲梧掖臺臣姚應嘉蔡國用喻思恂劉廷佐吳之仁田景新陳以瑞風采素著凜凜不愧柏臺或以恥附姦樞或以力誅逆璫或以地方波及或以無端旁午皆受門户之橫誣遭逆璫之榷殘者也其科臣楊棟朝人知以參忠賢緹差被處不知更有留都不拜逆祠乃其被處之故若一味恬介從來不解趨炎臣與科臣同里知其生平最真故特指出以附於不避內舉之義伏乞皇上省覽將楊廷槐即與優起崔世召酌量議復何大進仍恤以原官併免提問科臣陳希昌等乘時擢用楊棟朝應同不拜祠諸臣揚其風節或起以南垣或優以北省統祈敕下該部施行雲南通志卷二十九之三欽定四庫全書雲南通志卷二十九之四奏疏本朝一恭報克復雲南省城疏巡撫王繼文奉天竊照賊首吳世璠逆渠郭壯圗方光琛等自知罪大惡極死據孤城仰仗皇上聖德𢎞仁天威廟算逆魄既褫悉伏誅殛自此梟獍餘氛掃除盡淨遐陬邊徼悉仰照臨無不望闕呼嵩歡聲雷動矣所有大將軍固山貝子征南大將軍臣賴塔發到偽金印金册金匣金池併偽銀印等件臣謹一面遴員押解送部查驗銷燬并克復省城日期情形均聽大將軍固山貝子等恭疏報聞外臣率同雲南布政司以下及臣標員文武各官入城閲視城池宣布皇仁浩蕩撫恤被脅難民但向因賊糧久匱飢民相食今見飢殍載道枯骨盈衢羣逆凶殘一至於此其有氣息奄奄猶可全活者臣謹率各官共圗捐賑以副皇上軫念滇民至意至於一切賊遺銀米并軍器炮藥等項容臣詳慎次第嚴查另疏題報請修河壩疏王繼文謹照雲南省城外東南舊有金汁等河從松華壩借水於盤龍江自嵩明州流入昆境繞城之北過雲津土橋趨入昆池兩岸築堤髙二三丈不等而水流其中蜿蜒六十餘里有壩有閘又有過水涵洞蓋以積水灌田而城外數十萬頃皆藉此河之利民生國賦均有攸賴焉自變亂之後沿河之堤埂壩閘未經修葺日久傾頽上年大兵困逆周圍壕塹不得不拆毁挑挖以致水利阻塞灌溉不通田畝荒蕪居民失業而昆明額賦莫可徴收自克城至今臣多方招徠而流離之衆見此附郭膏腴咸成棄土未免從倚他方趦趄不返哀此殘黎欲歸則無資生之䇿不歸則有溝壑之虞臣不得不早為之計也夫以滇省軍餉取給外省頻經請撥仰厪宸衷而昆邑應徴之賦可耕之田豈可坐視拋荒聽其虧額臣愚以為河壩不修則殘黎勢難歸業荒田不墾則額賦無從徴收臣檄令地方官踏勘估計需用樁木閘枋灰石各項材料并匠作人夫等項約需銀萬餘兩查全書內開載嵗修松華壩額銀八百兩每年十一月中起工至次年三月初止往例可稽似當亟議興修以復民業然動支原額銀兩萬不敷用值今財用艱難工程浩費何敢於額外輕議請動正項錢糧臣議於通省官員及各屬土司酌行捐助甫定之區人方拮據非有以鼓勸之恐難必其樂輸伏查捐納各例業奉停止臣不敢復為陳請惟是紀録一欵既無礙於名器又可鼓其急公合無仰籲皇恩敕部酌議捐銀若干準與紀録仍比照各省往例量減額數庶衆擎易舉便於興修至工竣之日臣造册送部照例敘録則河壩固而水利可通俾四散之民咸圗歸計漸次開墾將見生聚寖昌而昆邑糧賦可以望其復舊矣請補行鄉試疏總督蔡育榮奉天竊照滇省地方初復亟宜修舉廢墜收拾人心今兩迤之庶民未盡復業而士為民望惟勸士乃可以得民即一切修舉之中有政體所當先輿望所甚切者莫如興賢大典我皇上誕敷文治前此用兵之日猶復雅意掄才海內儒林爭相鼓舞獨滇南久阻聲教士氣鬱而未抒今既出之沈淪重瞻天日深山窮谷之士莫不引領觀光昨嵗辛酉賓興既格於會城未復若復需之下屇甲子同各省一例舉行恐與目前收拾人心修舉廢墜之意殊有未協當此普天同慶而於遐荒新復之地尤宜特沛殊恩伏祈皇上俯念滇人士八載無聞三科未舉準以明年癸亥八月特行鄉試仍照順治十八年辛丑補庚子科之例暫行廣額俾才智之倫競赴功名之會榛蕪之境早開棫朴之光於以黼黻太平風示邉徼誠滇省今日之急務也酌定全滇營制疏蔡育榮滇省東接東川西連猛緬北距蒙番南逹安南四圍邉險而中間百蠻錯處如猓玀僰民野苗等種類繁多最為叵測故無在非險要之地無地不需控馭之兵臣等量地設防從長布置務使無事分扼要害有事掎角相援然後可經久而無患如迤西舊設三鎮內鶴麗一鎮逼臨西域控制金江獨當一面自應復設仍駐鶴慶永順一鎮守在天末地交緬甸并屬要區自應復設仍駐永昌查永順鎮兼轄之騰越一協順雲城守一營今遵部議復設無庸更議鶴麗鎮江汛綿邈緊隘甚多設兵二千四百僅足濱江守禦二郡彈壓其他要汛勢難兼顧查劒川州逼近石鼓一帶地方界接蒙番為迤西籓籬要地應設協守副將一貟守備一貟千把總六貟兵一千名駐劄劍川聽鶴麗鎮兼轄扼迤西之門户壯鶴麗之聲援所最急也永北一鎮原由楚姚蒙景改為鶴麗永北既又由鶴麗分為永北彼時楚雄設有援剿前鎮洱海設有援剿後鎮故永北鎮與北勝協同駐州城今援剿鎮營既裁則楚雄乃迤西九府咽喉且左有蒙化景東右有姚安接通建會而楚屬南安等處又係野賊剽劫之鄉誠為喫緊應以永北鎮改為楚姚蒙景鎮移駐楚雄控制姚安景東蒙化以北勝協改為永北協仍駐北勝州控制永寧土府并歸鶴麗鎮兼轄以一邉汛之事權而資環江之調度其洱海當迤西孔道楚姚蒙景鎮統轄四府鞭長不及若非另設官兵則一路塘汛虛懸而地方廣野無備應設參將一貟守備一貟千把總六貟兵一千名駐劄洱海聽楚姚蒙景鎮兼轄為表裏之捍禦通內外之呼吸又最急也迤東舊設四鎮內開化一鎮向以羈縻之域改為節制之區叢山深箐接通交址最稱邉隘亟賴重兵自應復設仍駐開化臨元澄江一鎮當四逹之要會控三府之遐陬苗蠻錯雜難防野賊出沒為患自應復設仍駐臨安查開化鎮向無兼轄協營臨元􅊹江鎮兼轄之元江一協新嶍守備一營今遵部議復設無庸更議曲尋武霑一鎮向駐尋甸控制曲武二府霑益一州復因汛廣隘多土司黠悍故武定仍設援剿左鎮曲靖仍設援勦右鎮今既奉裁則曲靖乃黔楚通衢滇中東北門户應將曲尋武霑鎮移駐曲靖但自曲至尋一路險僻自易隆抵普安衛數站要衝而尋城密通東川有樹撒秧田功山矣吳打烏等十數隘口俱關利害雖有兼轄之尋霑遊擊一營而霑汛荒廣猶苦兵單計合鎮營之兵不能兼顧武定查武定接通建會有他頗普度撒馬等隘而祿勸則連撒甸猓玀元謀則通金江有矣資等隘亟須守險且武汛上至祿豐接楚雄之塘下至安寧接雲南城守之塘若不另設官兵何以分汛應亟設參將一員守備一員千把總六員兵一千名駐劄武定并聽曲尋武霑鎮兼轄謹東北之藩籬為曲尋之指臂又最急也廣羅一鎮原駐羅平控制廣西廣南均屬要地但前六鎮既已難裁故臣等於無可裁之中仰遵廷議酌量裁此一鎮惟是各鎮勢難兼併而一州二府未便聽其甌脫且羅平路通黔粵汛接安籠四境遼濶彌勒十八寨為土夷之藪時有跳梁應改設協守副將一貟守備一員千把總六員兵一千二百名仍駐羅平兼控廣西其廣南瘴癘之區直接泗城思恩等處而皈朝皈順富州一帶儂人野類叛服不常且由皈朝以逹架村直通交址協兵未能兼制應設遊擊一員守備一員千把總六員兵八百名駐劄廣南聽羅平協兼轄此又視鎮兵較減而於各地必需者也以上除六鎮暨原設協營之外凡應改設增設官兵皆臣等身在地方審量形勢萬難缺少使其間稍有可輕可緩之處又何敢縻有用之餉妄置無益之兵且雖有增設之名而較之滇省舊日官兵已多減省亟請皇上俯鑒邉圉初復非比腹地承平既久可以輕議裁兵之時務期布置萬全特允臣等所請早定經制於以建威消萌久安長治無難矣籌滇第一疏請蠲荒蔡育榮竊照滇為逆踞歷有八年土地人民豈能依然如故一自天戈南指凡我遺黎踴躍趨事各各飛芻挽粟以供數十萬之師豈果力無不逮與彼其黽勉急公亦冀幸新恩之不旋踵而下也今弊政悉與革除康熙二十年夏稅已蒙蠲免皇上沛如天之仁宜邉疆獲更生之樂矣無如積患既深療治匪易去嵗軍需頓急遍行召買米價日貴賠纍日多故召買已倍於正供而運費更浮於米價每運米一石輒費至二三石不等每協夫一名月需工食銀十數兩不等民之困敝已極米亦摉括無遺數月之間斗米三兩無從購買頃者麥秋既屇而去冬播種失時收獲十無四五額稅之外尚不足供運糧之需迄今民無粒食野有餓殍臣觸目憂心救時無䇿從來兵燹之後繼之飢饉未有如全滇今日之甚者也我朝順治十六年開闢雲南蒙世祖章皇帝蠲免錢糧復發帑金賑濟滇之父老猶有能言之者今日之引領待命固急於開闢之時然蠲賑出自皇上特恩臣亦知其軍需浩繁何敢冒昧以請惟是滇屬變亂之後拋荒田地死徙人丁在在有之目下開墾乏人牛種未備逃亡無勾補之法生聚非旦夕之功照額取盈萬不可得此包荒之禁率土同遵而除荒之例惟在滇為尤亟也查自逆賊踞滇按地加糧按糧徴兵或迫於桁楊或驅之鋒鏑播虐萬狀民不勝其苦而委廢田園展轉溝壑者已過半矣及我大兵深入以來築壘穵壕環營列柵近郊阡陌悉作戰場遍野榛蕪徒堪牧馬凡兩迤之往來大路桑麻久廢雞犬無聞重以逆賊四散潰奔如馬寶夏相國尤廷玉王緒胡國柱等所至輒屠其人火其居掠其子女慘蔽天日逮諸逆服辜之後所餘者荒丘蔓草白骨青磷已耳乃又以殺氣未除蒸為疫癘民之死於刀鋸死於凍餒與死於疾病者又何可勝計耶夫有人斯有土未有户口既非而田疇無恙者臣受事之始即通飭各地方官勸諭九死一生之民勉以輸將絶其覬覦今二十年秋糧二十一年夏稅暨兩年條編銀兩凡係成熟之地現在之丁民既不遺餘力矣其各府州縣衛所申報無徴地丁紛紛請命軍民涕泣呼籲殆無已時臣猶恐其以熟作荒以現在為死徙嚴行布政使田啓光分行確勘開造實在拋荒實在死徙清册并取其印結委無虛揑情弊若復按原額追呼則滇民既無賑恤之恩而反得包賠之纍勢必使未復業者聞風裹足已復業者馴至逃亡將見賦額愈虧地方何時得有起色臣按目前形勢揆之善後事宜相應亟請皇上下令蠲除解此日之倒懸培全滇之元氣容臣陸續招徠開墾隨墾隨報照例起科缺額人丁仍俟編審補額從此田疇漸闢户口漸充屈指三五年間可復承平之舊是所損者少而所益者實大也籌滇第二疏制土人蔡育榮滇省漢土交錯最稱難治治滇省者先治土人土人安而滇人不足治矣然非姑結之以恩而能安亦非驟加之以威之所得治也查土人種類不一大都喜剽劫尚格鬭習與性成其土目擅土自雄爭為黠悍急之則易於走險寬之乃適以生驕故從來以夷治夷不惜豫之職使各假朝廷之名器以懾部落而長子孫然武不過宣撫宣慰司文不過同知知府悉聽流官節制無敢抗衡故安於並生而不為大患自吳逆構叛悉徴土兵濫加土秩偽總兵副將偽參遊都守遍及諸蠻甚或充偽將軍偽監軍狂逞無忌逮我大兵深入各土司先後歸誠亦既震懾於天威而罔有越志矣然而驕縱既久馴服為難如馬之既軼而復歸也如鷹之久揚而初附也則所以謹其銜䇿制其飢飽者不可不亟講也先是大將軍等鼓舞招徠各照偽銜換給劄付彼一時之權宜已耳今滇中一切弊政悉與革除若土司而加之總副等官弊政之大者也顧獨因之可乎夫恩不自上出則玩小人而乘君子之器則驕此輩狼子野心居為固有竟欲使監司鎮將相與頡頏而地方有司不敢望其項背反常甚矣尾大堪虞查土官應否需用武銜業準部咨行查仍令照舊換襲土職是廷議下反經之令已為躍冶之防臣無庸復贅矣然其投誠之始以有所挾而得之者今廓清之後尚未拱手而還之朝廷非所以示德威昭臣服也臣愚以為滇省土司亟宜請旨追奪武銜其大將軍等所給銜劄無分文武槩行追繳惟祈皇上特沛恩綸各照舊襲職銜量加一等服色使知更始之會皇上自有非常之恩而非前此倥偬之時可以徼幸而僭竊者既奪其囂凌之氣復牖以章服之榮有不畏威而懷德者乎此制之安之之一大關鍵也若夫善後事宜有當亟請睿懷者臣并縷悉為皇上陳之往者逆賊用土兵之力一任土人邀截道路搶掠莊村俱置無問土人有犯俱不關白流官土官徑自處決土人知有土官而不知有國法久矣則請著之令曰無萌故智勿悖王章其犯罪至死者械送督撫明正其罪務使土人遵朝廷土官不得擅威福此其一也土司各有土地人民而其性各不相下往往爭為雄長互相讐殺一不禁而吞併不已叛亂隨之故明沙普之禍可鑒也則請著之令曰各守常度母相侵犯其有稱兵構釁者殲厥渠魁搗其巢穴務申鋤強扶弱之義用遏亂萌此其一也土司踐土食毛宜如手足之捍頭目故往者冦盜竊發俱土著人摉捕或一土司有犯即令衆土司環而攻之匪直分義宜然亦取其熟於山箐易為力也則請著之令曰一乃心力備我聲援其有事而徴調不赴或觀望遷延者立逮而置之軍法一面奏聞如果著有成勞仍準論功行賞使彼樂為我用而控縱在我矣此其一也土情多詐未始不可以信孚土性至貪未嘗不可以亷格臣仰體皇上懷柔至意開誠布公信賞必罰革餽遺之陋習禁採買之煩擾亦既駸駸向化矣彼其強凌衆暴鬭狠操戈豈盡天性然與良由教化未明徒議招討無益也臣請以欽頒六諭發諸土司令郡邑教官月朔率生儒耆老齊赴土官衙門傳集土人講解開導務令豁然以悟翻然以改將見移風易俗即為久安長治之機此其一也土官以世系承襲不由選舉其祖父勢利相傳其子弟恣睢相尚不知詩書禮義為何物罔上虐下有由然矣我國家八法計吏三年考績土官皆不預焉不肖者無懲間有一二賢者亦無以示勸欲其奉職守法也得乎臣請著為定例嗣後土官應襲者年十三以上令赴儒學習禮即由儒學起送承襲其族屬子弟有志上進者準就郡邑一體應試俾得觀光上國以鼓舞於功名之途古帝舜敷文德以格有苗由此志也其土官於嵗終開列所行事實申報督撫察核具題不肖者降革有差賢者增其秩或賜之袍服以示優異使知以朝命為榮辱自不以私心為向背此又其一也兩迤土司之中昔為沙普併吞繼為吳逆殄滅者變亂之後其枝裔各回故土土人俱戀戀以主事之歷有年矣今使付之有司編入里甲則漢夷雜處必有隱憂若以歸附鄰近土司無論必不相安尤恐所附者益強大而難治臣請稽其宗𣲖取其鄰司保結果無虛冒準其一體報部照襲原職按其原管之地責令供辦糧差斯安置得宜葛藤自斷興滅繼絶固曠世之殊恩亦衆建而少其力之意也此又其一也總之今日之土司非猶夫承平日久之土司臣熟察情形悉心籌畫所當大為防間曲為調劑者有如此皇上明鑒萬里如果以臣言為不謬伏冀按臣所請特頒天語飭行斯遐荒之觀聽一新而夷俗之身心交戢矣籌滇第三疏靖逋逃蔡育榮竊照叛逆既除根株宜靖皇上下寬仁之令凡逆屬舊人及副將以上悉令進京參將以下分插四省是於容保庶頑之中寓肅清邉境之意甚盛典也但先是賊兵四出原不盡在圍城之中各路陸續投誠多在賊黨解擕之後其間觀望而逃匿者正不乏人逮馬寶等四散潰奔則鳥駭鼠竄之徒又不知凡幾矣廟堂之上早已洞鑒及此故逆藩旗下官兵等事一案部議如有遼東舊人隱避山林者則令督撫招徠具題又恩詔普頒凡受逆賊偽劄畏死逃避今來投首俱著免死臣宣布皇仁曉諭招徠越今半載未據一人投首而在省已經起發者不無中路逃脫留滇未經起發者輒復多方展遁追蹤愈亟匿影愈深非必其仍為負固也大都迫於疑畏展轉遷延恐山箐之間久而為萑苻之藪則清之宜亟也又有征兵奉裁將辨不能復制一經遣發乘間兔爰頗多觖望之私已絶懷歸之念無衣無食不兵不民脫有便利可窺豈甘枵腹自斃則清之宜亟也更有八旗苦獨力等竟不隨師凱旋潛逃滇境或甫出境而拐帶行裝馬匹尋復逃回故時下滇省逃人獨多於别省雖屢獲解絡繹在途而林莽潛蹤正復不少頃者左衛哨邀劫餉鞘遺有清字箭枝足知此輩跳梁必為地方大患則清之宜亟也然清之之法行之郡邑衛所地方則甚易行之僰夷苗猓地方則甚難臣自受事以來通􅊾各鎮協營嚴飭諸路塘汛無分衝僻一體盤查并責各村寨頭人互相譏察更行各有司編立保甲按户挨查雖在窮谷深山亦無不入牌甲之煙户煙户既清姦宄無容身之地矣特以無所容而遁歸夷穴勢所必至又或一經逃出即便趨赴土司既無保甲可以稽查更無塘汛為之盤詰此輩蹊徑漸熟氣類漸親則土司誠今日之逋逃藪也夫以苗蠻叵測之性當叛亂之餘若復聽其藏匿罪人招納亡命則今日梗捕亡之令即為異日萌作亂之機可不亟為之計乎臣遍諭諸土司各令清查境內懸首報之賞嚴容隱之罰亦既各分責成稍知禁令矣但此事關係甚大土人情志無常必祈皇上特降明綸使知勸戒凡滇省暨黔省土司首解逆屬舊人暨八旗逃人至三十名逃兵至五十名者準其加職一級六十名百名以上遞加升賞其所首解之人除逃人照例歸旗外餘仍仰冀聖恩免其誅僇母使其以畏死之故轉而竄入生苗野夷之中則根株永靖矣如果一無容隱即令具結存案如既不首解又不具結或具結之後别有拏獲供在某土司潛住者立逮該土司正其罔上之罪功罪一定逋逃未有不清者也至見在駐鎮八旗逃人仍祈敕下鎮安將軍隨逃隨即移知督撫立行追捕母致久而流入土司難於緝獲且逃人之姓名與逃出之月日俱有檔案可據則旗丁指逃擾民之弊不禁而自絶矣籌滇第四疏議理財蔡育榮滇省叢山密箐賦稅無多每嵗供兵俱仰給於協濟煩司農之籌畫纍驛站之轉輸而逺道﨑嶇未能朝發夕至一有未濟兵心皇皇故籌滇莫先於籌餉也今制兵嵗需餉七十餘萬重以駐鎮大兵嵗又需餉二百餘萬國家戡亂之餘正在度支告絀乃必分數省之財力歷數千里之險逺以供此一隅亦甚難乎其繼矣是以因滇之利養滇之兵斯挽運不煩而緩急足恃臣周咨博訪進羣議而折衷之務審時地之宜畫經久之法則可因利於滇而以佐協濟之不及者有四焉一鼓鑄宜廣也銅鉛滇之所自出非如别省採辦之難而滇人俱以用錢為便業準部行開爐鼓鑄矣今省局設爐十座蒙自局設爐十六座祿豐局設爐三座大理下關局設爐七座鑄錢無幾又米炭一時騰貴出息無多嵗約得銀四萬餘兩稍俟年豐榖賤息且倍之若令按局添設更行量地添局嵗獲錢息何可勝計臣請省局蒙自局各設爐至二十座祿豐局設爐十座大理下關局設爐十五座再請於迤東之臨安曲靖等府迤西之楚雄姚安永昌等府酌量開局約可設爐三四十座各委府佐一官董其事專責藩司總其成委官嵗獲息一萬兩以上者作何紀敘其有耗費工本尅剝匠役廢壞錢法者作何處分并請著為定例以示激勸凡銅鉛悉令委官就各厰自行採買每百斤不過銀四兩母許分行州縣辦解苦纍小民至民間應納條銀槩以銀七錢三為則制營兵餉宜令銀錢各半兼支官俸役食及本省一切經費俱給全錢銷算則錢之用日廣錢之息未有不日贏者也再查蒙自一局前此吳逆鑄出偽錢專發交址以易交條銀兩蒙自迤南二百里即交江之蠻耗設有關口又水路二百里至地名壩灑立市賣錢交人喜於得錢蒙局因以為利自大師恢復滇省嚴行禁止久矣臣思安南素稱恭順若因其所利便而使本朝錢法通行蠻貊之邦尤見一道同風於斯為盛合無請設蠻耗巡檢一員領貯蒙局制錢聽交人赴官平買母許民間私通貿易致啓釁爭或請敕部行文安南國王將每嵗需錢若干納價若干預行報部準令一年二次委官赴蠻耗納價領錢隨到隨即發回既俯順乎夷情仍無傷於國體於以通錢法柔逺人兩得之矣一礦硐宜開也滇雖僻逺地産五金先經廷臣條議開採部覆將可否開採之處令督撫查明具題誠重之也臣愚以為雖有地利必資人力若令官開官採所費不資當此兵餉不繼之時安從取給且一經開穵或以礦脈衰微旋作旋輟則工本半歸烏有即或源源不匱而山僻之耳目難周官民之漏巵無限利歸於公家者幾何哉是莫若聽民開採而官收其稅之為便也今除全書開載蒙自楚雄南安新平之銀錫等厰易門之三家老銅厰定逺之苴先鐵厰仍應照額徴課無庸置議外查呈貢之黃土坡昆陽之子母營羅次之花箐尋甸之迄曲里建水之魯苴沖老鶴塘石屏之飛角甸路南之泰來廣通之火把箐定逺之大福山和曲之白露順寧之老隂坡俱有銅厰易門之新舊縣馬龍之紅路口尋甸之白土坡石屏之龍朋里路南之小水井陸涼之三山大姚之小東界武定之只苴馬鹿塘蒙化之西窰俱有鐵厰羅平之塊澤河建水之清水溝姚安之三尖山俱有鉛厰尋甸之歪沖建水之黃毛嶺判山廣通之廣運南安之戈孟石羊趙州之觀音山雲南之梁王山鶴慶之玉絲順寧之遮賴俱有銀厰鶴慶之南北衙金沙江則有金銀厰或封閉有年或逆占既開尋復荒廢目今固米珠薪桂用力為艱然有此自然之利而終棄之良可惜也宜請專責臨元洱海永昌三道各按所屬親行察驗分别某厰可開某處厰不可開報部存案一面廣示招徠或本地殷實有力之家或富商大賈悉聽自行開採每十分抽稅二分仍委亷幹官監收務絶額外誅求額內侵隱之弊凡有司招商開礦得稅一萬兩者準其優升開礦商民上稅三千至五千兩者酌量給與頂帶使知鼓勵又嚴禁别開官硐嚴禁勢豪霸奪民硐斯商民樂於趨事而成效速矣蓋官開則必𣲖取民夫民開則自雇覓礦夫民夫各有本業或力不能深入礦硐往往半途而廢且恐𣲖夫擾民朝廷未見其利而地方先見其害也若礦夫多係遊手無籍有膂力而無衣食之人彼知利不專於官而與民共之未有不趨赴如市者礦夫既集礦稅自盈且豫此輩以逐利之途而漸息其非為之念是以理財而兼弭盜之一法也一莊田宜變價也故明沐氏世鎮滇省置買莊田厥後沐氏淪亡凡據滇者必貪之以為利本朝開滇之始撥給逆藩遂致地為藩莊民為藩役藏姦納叛有由來矣既奉旨悉歸有司給民耕種將數百年來之錮弊一旦掃除人心共快然而民賦之外另徴莊租則莊之名猶未革也查各莊額載籽粒原係折色銀兩自吳逆暴斂每銀六錢徴米一石勒令運解民不堪命兹已蒙恩悉除弊政則嵗入本自無多且小民一種莊田便屬官家佃户夫既非其己産安肯為久逺計乎臣查各省廢藩莊田俱經變賣滇當更始之會尤宜照例而行况滇人變亂數年多無恆産未有不喜於得業而勇於急公者也今撫臣見委道貟按莊文勘臣請俟勘明册報之日敕部速行變價按地則每畝可變銀四五錢至一兩有竒按糧則每石可變銀十兩至二十兩有竒各按等則而髙下之令納價免租與民田一例辦糧當差永除莊田名色約可得銀數萬餘兩其有逆中投入與賣入各莊之産一趨逆勢一受逆價既入莊册即係官田但除霸占者還民其餘應一體變價以佐軍需凡此所變價銀仍請酌量留滇永作錢本是固非一時之利而善後之長䇿也一荒地宜屯墾也屯田之法一以增賦一以節餉利莫大焉其在今日格而未行者以官兵防禦地方無分身畎畝之術耳惟是滇居天末地方所出幾何聚數萬之兵以取給於民則物力之贏絀不齊也天時之豐歉難定也自非豫為之備其勢不可以久且滇之物價無不與內地相什伯兵丁一月之餉尚不敷半月之需一人之糧豈能饜父母妻子數人之口窮愁日久必氣阻而心離夫豈邉境之福哉臣是以鰓鰓為慮亟請屯墾者非必如故明之分别衛所聚屯而居有事則荷戈無事則秉耒也查兵丁之有父兄子弟餘丁者十常五六請將附近各鎮協營無主荒田按實有父兄子弟餘丁之兵每名酌給十畝或二十畝臣會同撫提臣督率鎮將營辨設法借給牛種聽其父子兄弟餘丁及時開墾漸圗收獲以贍其家俾在伍者無俯仰之憂有田園之戀斯兵心固而邉備無虞矣三年之後仍照民例起科應納條銀抵充月餉應輸夏秋二稅抵給月糧計所省糧餉實多而於操練征防仍無貽誤其間或有死亡事故即擇其同伍之殷實者頂種注册毋使拋荒稍俟國用既充民門生聚既廣前項所墾田賦悉歸有司或準永逺作營田嵗抵額餉均有禆益至於投誠兵丁安插為民者既鮮恆業迄無生理徒置之不兵不農之間求其翻然為善也得乎宜令有司量撥荒田給令墾種為業起科之後編入里甲承辦糧差將見賦額日增姦回日化是又一舉而兩利存焉者也以上四事有益於國家無損於民滇之言興利者率不外此仰冀聖明採擇下令舉行則滇餉漸充而邉疆永賴矣籌滇第五疏酌安插蔡育榮頃準部行凡逆屬真正家僕舊人俱撤回其滇省别省投靠之人釋放為民奉有俞旨欽遵在案即古聖王泣罪祝網之仁不是過矣若投誠副將以上無分新舊悉令進京參將以下亦無分新舊安插四省者以彼為逆賊濟惡之人務使離逆賊舊踞之地斯根株靖而萌蘖不復生矣臣思投誠副將以上偽總兵等亦既犯順有年皇上不殺而遷置之固其厚幸即偽參將以下凡係領兵助逆者既獲更生之樂何辭易地之難自當逐一清查分别起發無容置議矣惟是偽參遊都守之中有外省客民阻留邉境賊執其人籍其資給一偽劄羈縻之者有土著居民為賊按户抽兵尋復按兵給劄而籠絡之者更有偽將軍總兵副將當賊兵潰散之後未便孑身投誠遂不論是兵是民坐給一劄倉皇投報希邀率衆反正之功者凡此偽劄實係虛名既非領兵助逆之徒或並未嘗食賊糧充賊伍今乃與領兵助逆之輩一槩驅而去之似非皇上矜全之至意也臣查此輩或有丁徭田賦見需供辦不便虛懸或有廬墓家園無從變鬻不甘委棄或有父母妻子未能攜帶不忍分離將使有家之人悉變而為無籍之人豈地方之福乎又或無衣無食不保朝暮或衰老殘廢不逺死亡一涉長途殆無生理是既生之而復死之也自奉遷移之令紛紛泣訴各鎮協營屢屢具詳即撫提臣亦目覩情形咨臣區畫臣思桀犬可以吠堯况本非逆賊之瓜牙均係朝廷之赤子亦何足為滇患而必使滇之户口加少為哉且邉疆初復亟宜安定人心乃數月來人心皇皇俱以迫於遣發遂成展轉逃竄又或遣發之後乘間兔爰以致官差四出捕亡騷然靡有寧宇啓番夷之窺伺滋山箐之叢姦尤當亟議變通以副朝堂息事寧人之意者也臣請將偽參將以下果曽領兵助逆者仍陸續遣發以符四省安插之部行其查明偽給虛銜委未領兵助逆及虛加偽遊都守實管偽千把總事者取具各鎮協營保結存案俱照偽千把總之例免其遷移以符雲南所立新人準其為民之廷議此輩居滇日久深識地理習知夷性置之行伍可以控苗蠻誰無鄉黨各有室家安於田里可以供賦役其有客民自願還鄉者給以印照聽其回籍事竣之日造册送部查考既以止目前之紛擾仍無貽日後之隱憂矣籌滇第六疏收軍器蔡育榮滇省賊遺炮位藥鉛硝磺一切器械俱經查收題報見在分撥各標營為守禦之需即投誠兵丁帶歸原伍什物亦已行據各標營册報入額矣其自標營而外無分漢土自宜盡銷兵革馴致太平而臣竊鰓鰓為慮者痛定思痛之民非必勇於賣刀買犢留一不仁之器即為強凌衆暴之階脫遇年飢彼且有所挾而易於為盜此其一也逆中先後潰散投誠册內無名與投誠而自願歸農之兵豈無原給賊械未必盡行投繳其留之不無叵測或私賣夷地則益長其凶頑此其一也土人讐殺成風所恃者標弩環刀已耳然且出入必以自隨乘間輒行搶掠大為民害自吳逆構叛悉徴土兵給與軍器及各項火器甚多土人得未曽有獷悍益甚其潰奔也各各帶歸夷穴投誠之後曽無一繳至軍前者未奪其逞凶之具何以盡消其不軌之心此又其一也臣咨諏所及衆論僉同已通行臣屬之文武衙門曉諭各軍民互相稽查自行首報並通飭各土司及各投誠偽土將軍土總兵等一體清查然而衆志難齊夷情多詐猶恐涓涓不塞漸成江河若復徹底摉求又慮地方驚擾合無亟請嚴綸誥誡使知警惕并祈敕部酌頒嚴例務俾漢土同遵臣非不知私藏軍器之條律文甚晰但邉疆初復自與承平內地不同亟宜思患豫防尤貴因時立法嗣後民藏兵器與非兵而擅帶兵器行走者俱以賊論漢人私賣兵器及硝磺鉛斤與夷人者以通賊論各土司私藏軍器火器不即投繳者罪亦如之其有私造軍器火器並擅差舍把出境私買硝磺鉛斤及見成軍器火器者以謀叛論奏請勦除滇黔一例而行仍責成該管鎮道府不時稽查按季取結存案一有失察嚴加處分如是則凶器既除雄心自息一以弭盜患一以遏亂萌久安長治道不外此籌滇第七疏議捐輸蔡育榮臣聞積貯者天下之大命况滇省山多田少一嵗之穫僅供一嵗之需民鮮蓋藏官無餘積雖界連黔蜀粵西三省而水不通舟山不通車從無告糴鄰封借資商販之事一遇軍需緊急則摉求易盡接濟為艱或罹水旱災傷則內之無可摉求外之無從接濟兵與民皆坐困而始歎補救之難晚矣自非豫為之防其何以有備而無患故講求積貯之法惟滇省為尤亟也臣受事以來惟以積榖重農日與吏民孜孜勸誡而流亡未盡復業田地尚多拋荒小民方汲汲為旦夕之謀豈能遽餘三九之蓄即今倣常平義倉故事嚴督有司實心舉行奈無素封之家可以勸輸無有力之人可以贖罪有司又以官貧榖貴告苦告艱雖勉力奉公其捐積不過三五石十數石而止何補於籌滇之萬一哉自古王道無近功是必行之三五年而後可責其成效目下亟需積貯用備不虞專恃此則空虛姑待之則迂緩甚矣臣查國家未用兵之先各省恤災修城曽開捐輸事例事竣即行停止總在因時制宜非一止而不可復行者也即用兵時各案事例所以亟議停止者謂四方既經底定不復需餉緊急揆之時勢宜停且納粟而拜官而還職而遷秩者實繁有徒名器不容冒濫揆之事理又宜停耳若生貟俊秀捐納監生固係承平舊例監生捐納而免其坐監免其考職則事例儘有可行之條一案當日廷臣條議原非僅為一時利便之謀至見任官貟捐納加級紀録或遇因公受過準其抵銷均有禆乎公家實無傷於政體其他可行之款正復不一今滇省倉廪未實府庫未充欲使初定兵民有恃無恐莫如酌開事例早裕邉儲合請敕部於先後諸例之中擇其條款之可行者酌為滇南定例亟賜頒行惟是萬里遐荒米價數倍於他省而崇山峻嶺運送艱難故前此事例𢎞開惟滇省捐輸獨少必將各欵應輸之數視往例酌減十之二三斯足鼓舞急公而收效自速但得捐輸米十萬石分貯兩迤郡邑之間每嵗出陳易新無憂紅腐遇有征調本省額糧未敷則酌動以濟兵年飢則平糶以濟民如此三五年門緩急足恃稍俟民殷物阜更何憂積貯之難此在今日不可不加之意也抑臣更有請者全滇郡邑城垣自罹兵燹率多倒塌誠恐外番生隙苗猓生姦亟宜壯我金湯用資守禦各屬屢請及時修葺勢難緩待者一也各鎮協營官兵舊有營房兵民不相雜處後悉將營房毁棄占住民房甚至城內有兵無民成何景象若不將制兵另行安插百姓終無棲止豈能復業則議建營房勢難緩待者又一也當此國用浩繁瘡痍未起上糜公帑下借民力並難舉行臣請將事例定為銀米兼輸米以備積貯之需銀以供修城之用誠為兩便其營房或令地方官捐造照例邀紀敘之恩庶廢墜舉而財不傷邉備修而民亦不擾矣籌滇第八疏弭野盜蔡育榮滇省自恢復之後流亡漸集耕鑿方興從此謹邉防恤民隱馴致太平無難矣乃滇人猶竊竊為慮者以魯魁山野賊未除終非久安長治之䇿也夫野賊之為滇患歷有年矣其初係新嶍阿蒙土人嘯聚窮山為盜因其來如猋犬去若飄風出沒不常居止無定故名為野原非土人之外别有此種野人及其嘯聚多年自成種類遂於土司之外另有此種野賊其倚魯魁為狡窟者魯魁在萬山之中跨連新嶍蒙元景楚之界綿亘廣逺林深箐密其內則新平新化元江易門􅑇嘉南安景東一帶地方賊皆可入其外則車里普洱孟艮鎮沅猛緬交址一帶地方賊皆可出故防之甚難而勦之亦不易也故明時流冦入滇沐氏勳莊之人趨附入山賊黨愈熾剽劫鄉村殺虜人口殆無虛日小民畏賊如虎相率納以保頭錢嵗以為常保頭錢者保其不來劫殺耳自本朝開闢滇南賊始稍稍斂戢然而索保未已警息時聞納保懼死於法不納保懼死於賊滇人無告之苦莫此為甚兹據南安州詳報康熙十年十月野賊出劫本州郭三郎村經前督臣甘文焜具題部覆賊係三百以上將地方文武官處分後有緩征務在獲醜之語因定期於十一年秋進勦是時兵權悉在吳逆包藏禍心養冦自重詭言蒙番入犯調兵北勝將此案俟之來年及來年叛作而勦之説遂寢今滇省雖無案可考而從前野賊情形可槩見矣逮吳逆既叛郭壯圗雖授賊首勒昻為偽守備尋與改名楊宗周尋復授為兩新偽忠順營副將而以其頭目普為善李尚義方從化為偽都司每年按季額納皮盔銀兩縱賊四出每村給一木刻𣲖定保頭銀十數兩二三十兩不等豬羊雞酒索取無厭稍有不遂劫殺從之於是流離之民暨相近野賊之民樂於附賊為盜八年之久招集亡命愈多全滇各府州縣村莊聽其索保者十之八九至康熙二十年二月大兵入境逆賊潰散野賊乘機肆行搶掠凡兩迤之男婦子女耕牛騾馬財物虜入賊巢無算仍將人口勒銀取贖其在逆中之流毒如此及大兵已抵雲南城下楊宗周乃呈繳偽印偽劄普為善李尚義方從化亦各呈繳偽劄遣人投誠大將軍貝子因換給楊宗周兩新土副將銜劄普為善等各給土都司銜劄令其約束夷衆督辦兩新年額錢糧一年以來亦既震懾於天威而罔有越志矣然而賊情難料後患宜防故為籌滇計者多不主撫而主勦謂撫乃目前之便安勦則一勞而永逸也臣思勦則必遣土司督土人嚮導前驅遏絶後路以彼習知地理度山穿箐較捷便於制兵而制兵出邉隘分防尤必慎簡精鋭方可直搗賊穴今各土司新經歸附衆志未齊制兵多係投誠及新募之人方在訓練未便輕舉又滇省飛芻挽粟已久正民力殫敝之時稍息殘黎徐圗辦賊非失計也且彼方革面輸糧無復為非之事而我以懲前毖後頓興問罪之師似非朝廷昭示遐荒信服蠻貊之意臣復咨撫提臣會議與臣所見略同已行臨元楚雄二鎮臣暨元江新嶍等營將備按野賊出入隘口分布設防使懾於兵威而不敢復逞臣更開誠布公諄諄告戒飭令洗心滌慮安分守法據報逆中竄入之徒悉已解散回籍從前被虜未回人口亦經陸續查出逐一開報送交新平收養諭令難民認領寧家是彼既無跋扈之形我不妨暫為籠絡之計稍俟一二年間土人情志已孚我兵訓練已熟彼果回心向化則莫非天家赤子可以不事征誅如其故智復萌一有蠢動容臣一面題報一面調集土司選撥官兵分道進討奪其巢穴斬其根株仍擇其可以駐兵之處移兵坐鎮永除後患是則久安長治之䇿也籌滇第九疏敦實政蔡育榮滇省界在邉荒甫離兵燹逈非承平內地可以優遊坐理之時一切整頓地方撫綏民生務以實心而行實政如其因循茍且粉飾太平非皇上責理於臣與臣率屬以報皇上之至意也自受事數月以來周咨利病悉力興除總期上下一心勤求治理無如官斯土者或緣瘴癘易侵接踵報故是以荒殘難起觸目灰心率多旦夕求去之思否則守邉俸為待遷之計滇吏之實圗有造於滇者幾人哉是非申嚴課績之條特著考成之令大加振刷逐事講求未易起積隳而成長治也夫所謂實政者一在復丁田前此死徙人丁拋荒田地業據勘明題報矣使徒覬蠲除之令不為補救之謀長此土曠人稀成何景象又或侈語招徠而漫無安撫揑申開墾而攤𣲖包賠從何時得庶且富耶則所以闢榛蕪謀生聚者之力行宜亟也一在廣樹畜滇人既幸更生而無以謀生其勢不可以久務因時地之利為開衣食之源今以無主荒山勸民種樹近郊隙地給令灌園但使瓜壺棗栗之微各得其養雞豚狗彘之畜無失其時安在絀之不為贏而剝之不易復耶則所以課種植稽畜牧者之力行宜亟也一在裕積儲滇在萬山之中産米無多運糧未便臣前疏請開捐事例用實倉廪亦以官兵交瘁之區常平義倉雖經修舉未能責效於旦夕耳然使以常平義倉為故事而虛報捐積塞責一時又或不知貴粟重農馴致耕三餘九何以有備而無患耶則所以勸積榖實邉儲者之力行宜亟也一在興教化滇人陷溺數年所習見者皆滅理亂常之事幾不知孝弟忠信為何物矣今既如長夜之復旦反經定志全在此時臣已飭行有司各設義學教其子弟各以朔望講約闡揚聖諭以感動其天良各選年髙有德之人給以月廪風示鄉里但人情率始勤而終怠其或作輟不常安能久道化成而保民無邪慝耶則所以革民心興民行者之力行宜亟也一在嚴保甲滇當反正之初逃兵逃人暨逆藩舊人之竄伏者正復不少臣前疏請責土司稽查之法業蒙睿鑒允行尤須嚴督有司肅清內地但使深山窮谷城市鄉村無一脫漏牌甲之人自無一容留姦宄之地特恐奉行不善反以編設擾民又或徇編設之名一報册結便為了事漫無督察是有治法無治人其能以虛文收實效耶則所以清逋逃弭盜賊者之力行宜亟也一在通商賈滇南道路險逺舟車不通商賈罕至吳逆時遊棍夤充稅官市棍夤充巡役物無大小地無逺近或一地而兩稅或二三十里一稅到處摉求甚於截劫操竒贏者裹足不前有由然矣今蒙恩悉除弊政臣已嚴􅊾所司悉照經制額稅徴收其餘痛加禁革仍申嚴塘汛母許借名盤詰隂肆誅求并會飭滿漢官兵母容短價強買然而市㕓未集百貨未通一粟一絲其價皆什倍於他省軍民困苦長此安窮誠使有司加意招徠多方撫恤悉剔稅中之弊永除額外之徴安在日中熙穰之風不可復見於天末耶則所以清關市鼓悅來者之力行宜亟也一在崇節儉仕途之奢儉吏道之清濁係焉儉或不致於大貪奢則未能有小亷者也自吳逆剝民之財逞已之欲其屬共溺於膏梁文繡鬭其驕侈釀成僭亂是奢儉尤關於治忽明矣今滇吏萬里之官以裘敝金盡之身當土瘠民貧之地非守己如寒儒而欲保其為良吏得乎夫人無兩用之心豈有一心於聲色貨利而又能一心於官守民依者臣常誡諭庶司約口腹習浣敝減騶從絶饋遺止宴遊屏玩好固己懲紈袴之習遏佚豫之萌矣然人情率易放而難收安必勉然者之幾於自然長以官瘠為民肥之地耶則所以惜物力砥官方者之力行宜亟也一在除雜𣲖雜𣲖之禁率土同遵獨滇吏恃在邉圉罔思顧畏滇民惟知陋例習以為常故往日各地方有當月里長有值日里長凡有司日用心紅紙張油燭柴炭一切供應食物及答應往來差使慶賀節令生辰皆取給焉乃至各衙門雇募胥役取用夫匠無一不𣲖諸里甲又有上司各行有司採買雞豬牛羊米豆布匹細及檳榔蔬果之類有司指一𣲖十短價剝民民之痛切難支莫此為甚臣已痛加禁革有犯必行糾參然而耳目難周法久易玩非藉賢有司共凛國法實體民艱又安能弊絶風清以養地方之元氣耶則所以守禁令蠲科斂者之力行宜亟也一在恤無告鰥寡孤獨王政攸先况以全滇湯火遺黎復遭潰賊殺虜疫癘流行之慘或父兄盡歿幼而無依或子女皆亡老而無養或失其婦或喪其夫甚有一户族而僅存孤寡一二人一村屯而止遺婦女老幼十數口者仳離號泣之狀不忍見聞臣雖倡率有司量行賑恤然而壺餐之德曽不終朝使地方官無同其憂患之心無曲為生全之法此煢煢而待斃者將安恃耶則所以續民命回天和者之力行宜亟也一在止濫差州縣差人下鄉上司差人下州縣等一害也夫錢糧案件各有限期軍民如或抗違有司何難申究有司如或遲誤司道府豈憚揭參而必恃差催以佐其風力乎况滇省陋例督撫衙門貟役竟得與有司分庭抗禮司道亦擅設承差公然凌厲有司一奉差牌索人夫索供應索規禮甚至咆哮公堂鎖拷經承溪壑既饜取一回文銷差而已曽何禆於公事徒有害於官民臣於受事之初即已嚴行禁止仍設稽差印簿令地方官按季登報積弊漸除然非奉行之官各以息事寧人為念行之既久保無陽奉隂違及其事發而後處分隨之地方之驛騷已甚矣則所以省差催息民害者之力行宜亟也凡此十事在腹地或視為迂緩在邉疆則最為亟切臣既董勸兼行正各官黽勉從事之時非請天語特頒何以發其震動恪恭之氣即其間已有通行定例尤必請部行申飭特示勸懲凡邉俸已滿二年即按十事考其實迹果其田疇既闢户口既增樹畜既蕃積儲既裕化民成俗靖盜弭姦市肆殷盈奢侈不作正供之外纖悉皆除無告之民全活甚衆官差足迹終嵗不及州縣鄉村是為真正循良督撫臣查明奏聞部臣核實請旨優升以示鼓勵如其以十事為具文閲二年之久而迄無成效亦聽督撫臣題報分别處分斯邉吏爭自濯磨共勉於實心實政而殘疆自此起色矣籌滇第十疏舉廢墜蔡育榮竊照殘疆初復必其百廢具舉而後庶績咸熙臣前疏捐修城垣捐造營房之請俱從整理地方起見見準部覆遵行乃更有定制久湮關乎治政之大亟宜修復者又有原無定制易於病民與雖有定制不可以久急宜斟酌變通以免廢墜者敢縷悉為皇上陳之如郡邑之有學宫所以興賢育才至重也滇自吳逆毁棄先賢瀆亂宫牆飲馬泮池屯軍文廟八年之久僅存斷瓦頽垣已耳重以潰賊四奔所至焚燬其在圍城之內則又半為析薪今自省會以迄府州縣衛學宫在在皆廢當此大告武成之後正皇上誕敷文德之時若復聽其蓁蕪不為整頓非所以昭示遐荒振揚聲教也臣雖勉力捐資倡率大小各官以及地方紳士共圗修葺然而物力凋敝甚費經營竊恐未易觀成遽難經始自必特行鼓勸之典使各出其好義終事之誠夫乃羣力畢趨而成功自速合無請敕部議如地方官有能獨任興修勿煩旁助勿動民力捐銀一千兩以上果於一年之內煥然重新者及大小各官捐助銀一百兩以上作何分别敘録頒示遵行仍俟通省告成將各捐修數目職名動用工料價值核實題報斯文治重光而太平有象矣如官僚之有衙署所以臨民出政至重也滇自吳逆移駐之初省城大小衙門悉被逆屬占為私第將奉命而臨兹土者驅之城外僦居關廂失蠻貊之觀瞻毁朝廷之體制莫此為甚今恢復之後城內衙門基址茫然無可追尋臣與撫臣暨各文武官辨不得不住賊遺房屋為一時權便之計然衙門之規制未備殊礙關防僚屬之居處既分恐荒職掌倉厫監獄不能附近未便稽查如有茍且因循非聖明百度維新之至意也惟是瘡痍未起財用未充創建之難又非目前所敢輕議臣思賊遺房屋業經撫臣造册報部例應變價入官但滇省必無承買之人有司更無求售之法與其日久傾廢何如酌撥為衙門之兩便乎如蒙睿鑒允行除逆藩偽府外容臣與撫臣酌量大小從公分撥聽各官自行捐資修改永作衙署餘者徐圗變價分晰報核斯創建不煩而規模永定矣凡此二事臣所謂定制久湮關乎政治之大亟宜修復者也若夫通省稅糧既有成額其間本色折色起運存留應有定制乃全書開載則有九錢一石七錢一石及五六錢一石不等之例謂係本色則既分列銀數於米數之上謂係折色則又仍列米數於銀數之下本折似無一定官吏因以作姦米賤則徴折米貴則徴本罔上行私有由然矣况稅糧嵗額無多不過以本地之糧供本地之兵故從無起運之纍前此大兵進勦責令隨地運供事出權宜故不敢自惜其力今底定之後留滇大兵暨督撫兩標官兵并駐會城一郡之米不敷一嵗之用不得不令兩迤各郡運省接支然各郡同一額糧誰宜留給鎮營誰宜挽輸協濟民間謂非成例告苦告免率藉口於勞逸不均而𣲖撥之間吏胥尤易於操縱臣所謂原無定制易於病民者此也合請敕部按滇省全書九錢七錢等米三錢二錢等麥確定本色折色行臣曉諭各屬軍民以杜有司私擅改徴之弊仍請敕下撫臣按通省制營嵗需兵糧若干將各鎮營同城及附近二三百里內稅糧照數撥給餘米及不係官兵駐劄並與營鎮窵逺地方之米每嵗照省城時價報明户部改徴折色解省專責糧道就近買米供支大兵以免殘黎逺運之苦先將𣲖定撥給折解數目造册報部著為定例或俟大兵全撤之後將折解者仍徴本色聽各屬貯倉以備邉儲再俟二三年倉廪既盈永行折解充餉斯國計民生兩有攸賴矣又如站夫工食各省雖或多寡不等要在足糊其口長養在站應差偶有逃亡截曠募補法至善也滇省非民稠之地别無應募充夫之人往例悉由里民𣲖出赴站而食用之貴常數倍於他省故里民幫貼之費亦往往數倍於工食夫役之為民病也久矣今兵燹之後募夫尤難里民多衣食未充更無幫貼站夫之力是必一夫之工食足以贍一夫而後上不誤公下不纍民乃自省城以至平彝各堡所有額設工食每夫止日給銀三分不足買米一倉升以彼背負肩擡櫛風沐雨度山越嶺尚不謀終日之飽豈遑顧及妻孥此往彼來蹙頞相望勢必夫逃站倒岌岌堪虞臣所謂雖有定制不可以久者此也合請敕部俯鑒時艱大破成例酌量增給各夫工食斯用其筋骨不致肌其體膚所費無多而所全於民命者大矣至黔省站夫其困苦視滇尤甚今每名每日止給食米一升草鞋銀一分五釐并祈一例酌增永著為例是尤黔民疾痛呼天延頸以待者也分定增兵疏蔡育榮看得滇省邉徼兵力單薄仰荷廟謨準增兵六千九百名或於緊要營汛內兼併或另立營汛防守誠措置金湯奠安磐石之碩畫也臣凛遵成命密咨會商雲南撫提去後今準撫臣王繼文提臣桑格各咨覆到臣咸稱逐汛添兵零星分散兵力仍屬單薄莫若斟酌緩急審度控制使蠻苗衆類不能測其一定之用是積威控逺之法議照舊時援勦四鎮之例量設援勦二營於四應之地駐劄無事則養威訓練有事則隨處䇿應是部議所謂另立營汛防守也提標官兵駐劄大理緊接鶴麗鄰近金江實屬扼要且控制通省責任重大不拘何處有事即當發兵翦除三營將卒不敷調遣應仍設前後二營鶴麗鎮尤為極邉重地緊接蒙番應添設中營再添兵六百名為今日之先務此部議所謂緊要營汛內兼併也撫標之兵亦屬單少等因前來臣覆加籌酌滇隅要隘環連數千里非逼鄰外國即控馭蠻方若以準增之兵零星均布則勢分力弱非扼要制勝之䇿撫提二臣所議允協機宜惟援勦四鎮舊係總兵今當節省之日不便仍設總兵應設援勦左右二協每協分為二營設副將一貟遊擊二員守備二員千總四員把總八員兵二千名以左協駐尋甸州右協駐省城用供迤東緩急䇿應則防守者各得其汛可無調遣之憂而四應者另有徑旅可收電擊之效矣提臣駐劄大理獨當一面三營官兵實屬襟肘應仍復設前後二營每營照設遊擊一貟守備一員千總二員把總四員兵一千名足其五營之數則迤西緩急可資䇿應而鶴麗騰永一帶皆可壯其聲勢矣鶴麗一鎮為第一要隘見設制兵雖如鎮額然止左右二營勢力輕弱今應添設中營增中軍兼管中營遊擊一員守備一員千總二員把總四員增兵六百名共成三千之數則沿江隘汛可資防維矣撫臣制居省會與臣同城然臣總制兩省緩急有當躬行之處撫臣即膺居守之責見設兵一千五百名難藉防禦應增兵三百名將辨仍舊則思患豫防之計均有攸賴矣此臣等僅就準增兵六千九百名議設議併量為居重馭輕之法若照邉隘均攤增置則此兵未足以敷分布也營制既定除應用副遊守各官甄選才技優長人地相宜之員另疏保題千把各官一面委補任事併所需馬匹甲械亦俟另疏請項製備外兵丁祗遵部議招募其募得兵丁各以收伍之日開支糧餉使獲養贍而供操防至於撫提二標鶴麗鎮標所增兵丁馬步戰守各照該營制額其援勦二協非株守一隅之師祈恩全準戰兵馬三步七庶營制雄整而呼吸可資實用臣從封疆起見非敢故為破例之請也請移援協駐防疏總督范承勳奉天看得滇南界居荒服苗猓雜處在在需兵經前督臣蔡育榮密題於準增兵六千九百名數內設立援勦左右兩協每協兵二千名以左協駐尋甸州右協駐省城用供迤東緩急䇿應欽奉俞旨遵行在案臣到任以來悉心籌畫相度形勢即檄行雲南布政使李世昌按察使蔣寅確查詳報復與撫臣王繼文新任提督臣萬正色面加商確查迤東一帶有曲靖府屬之羅平州與黔省之普安安籠等處粵省之西隆州地方接壤界連三省夷藪逋逃走險最為要隘雖設有廣羅一協駐劄羅平分防羅平廣西師宗彌勒等汛廣南一營駐劄廣南府分防廣南廣西等汛然而山箐叢雜苗猓黠悍地廣汛多不足分布且臣有兩省封疆責任黔省為滇中上遊要害各種苗類不馴更覺兵單滇省既設有援勦營制似宜以控制䇿應為務今議將右協駐省官兵二千名移駐羅平州分兵防汛其原駐羅平之廣羅協副將帶領官兵酌量移駐廣西府與廣南營互相掎角添設分防各處險汛既可聯絡黔鎮兼能控扼粵隘庶乎逺近得宜指臂易使而此兵不為徒設矣再查左協官兵二千名既照原題駐劄尋甸其曲尋一鎮汛居大道界接川黔之東川威寧逼處猓穴應將該鎮原分駐尋甸州官兵撤回酌撥川黔交界緊要汛地加添防守則滇省西北庶無兵單之虞而巖疆可以鞏固矣再查兩協原係援勦戰兵不應有戍守之責然見駐地方烏容優遊膜視其羅平尋甸兩處州城內外汛防應責令分汛專管如或别有緩急調遣仍照舊制責成合併聲明土夷歸誠懇請授職疏范承􅈴看得滇省地處極邉苗猓錯雜其有在全滇之中而山勢險逺林箐深密為滇民腹心之患者則有魯魁一山其地接壤千里內包各種夷猓多屬化外之人號為野賊不知始自何年見今夷目則土名勒昂而改名楊宗周也此輩嘯聚窮山招集亡命乘機搶掠并索取近山保頭錢議勦則潛遁無迹稍懈則復行竊發已非一日矣經前督臣蔡育榮於籌滇疏內題明部議作何撫勦不致滋蔓聽伊酌行在案臣到任以來凛奉嚴綸撫恤土司母容擾害屢次宣布我皇上威德於聲教未迄之地因遣土辨李踴雷等持諭入山招撫而楊宗周等既畏威靈震疊又感聖化懷柔遂遣目具呈情願傾心向化輸誠并籍所有把守口岸目兵分晰造册齎投前來臣見其意雖在自新但招撫事關重大一面批行雲南司道詳查確議一面與撫臣石琳提臣萬正色等公同會議遣委臣標左營遊擊莊一虎臨安府知府黃明及臨元鎮臣馬山會委中軍遊擊郭玉明協同於十月二十一日前至新平縣地方招撫楊宗周率領夷目普為善方從化李尚義等及各大小目兵數千人來迎稽顙聽命歡聲雷動宗周照夷俗斫雞向天立誓據譯供稱情願真心改惡從善嚴戢土人不許出沒為非及再取保頭錢并願與朝廷出力拒守口岸等語取有甘結在案該府將隨帶捐備銀牌綢縀等物頒犒大小夷目訖兹據布政使李世昌等會詳稱魯魁夷猓性頑種别從來不入版圗今宗周等逺慕聖化相率投誠環跪誓天刑牲表信一切緝盜安夷保固隘口悉任擔承具結投報應請量授世襲微職以昭鼓勸楊宗周合無授以土縣丞普為善方從化李尚義合無授以土巡檢之職前來臣復批駁確議且令恪遵本朝制度照各土司一例剃髮驗明取結具報後據詳稱行府轉行新平縣親到宗周所轄地方傳諭目民一齊剃髮望闕謝恩訖具結詳覆無異臣思魯魁野賊議勦議撫迄無定畫今宗周等果肯革心向化俾數百年未靖之孽一旦消弭數郡縣耕鑿之民得以安堵是皆我皇上天威遐鬯以致窮荒不毛之裔效命恐後也查魯魁鄰近臨屬新平縣界應否將楊宗周量授以新平縣土縣丞普為善原住了味地方在新平縣界方從化原住結白地方在元江府界李尚義原住楊武壩地方在新平縣界各有隘口責任應否量授各地方名色土巡檢之職仍豫世襲統𨽻附近有司俾土蠻世服厥職各有子孫繫念咸知慎惜名器不肯復蹈前非是亦羈縻逺夷之一道也惟是夷猓情性無恆目前雖已重誓剃髮歸誠往後倘有跳梁越分臣等仍當整勵兵馬嚴加防範不以今日之請授微員而敢弛日後之備禦也至宗周等所住地方確查委係深山窮谷並無平坦之處可以建設城池其夷目土兵把守要隘亦聽自行開墾瘠薄山地刀耕火種以資養贍免其開報稅糧合併聲明軍糧豁免萬姓歡呼疏范承勳恭惟我皇上秉聖神濬哲之德敷唐虞恭已之化永清大定府庫充盈念以天下為家兆民如子比年以來霈發皇恩蠲免直省錢糧至數十餘萬考從古帝王蠲租賑恤之典未有盛於我皇上者也厚澤深仁四海九州罔不淪肌浹髓即雲南一省僻處遐荒軍屯之賦倍重於民其歷年逋欠原屬正供但以額重民貧地土多有拋荒以致上納愆期故臣於署撫篆時止請分年帶徴未敢邀恩望外孰意上諭特傳將康熙二十一年起至二十七年拖欠軍屯銀米盡行豁免而且上厪宸衷軫念逺民邇年供億之勤勞歷載運送之况瘁恩綸渙發臣等立速欽遵星夜刋刻宣布頒發逺近闔省軍屯百姓扶老攜幼望闕焚香叩首感激皇上隆恩真如天無不覆地無不載伏願寶厯與天并永聖躬萬壽無疆俾此荒服編氓相率招徠復業生生世世竭力辦賦當差報答皇恩萬口同聲無異既據各府州縣申據該司轉詳前來臣等見民情如此踴躍感激不敢不據以入告進呈編輯全書疏巡撫石琳奉天臣看得全書上關國課下係民生奉旨令詳察細閲有無應行更改增刪明白確議具奏仰見我皇上愛民為念四海為家誠恐沿習既久有不便於民之處更改增刪為萬世不易之章程也臣安敢不兢兢矢慎以仰副宸衷惟是滇南僻處邉陲禹貢列諸要荒之服宋祖棄諸玉斧之外我朝定鼎無逺弗屇自順治十七年歸入版籍其賦役大概準諸明朝之制而因襲之後因吳逆鎮滇剛愎自用擁兵加賦以致民不堪命今幸聖政維新重覩天日臣接部咨行司道府會議前來臣又採訪輿情考稽舊籍其亟應議減刪除者有八焉一全滇屯官田畝之糧過重宜減也按明初沐氏鎮滇置設衛所將三分軍為差操七分軍為屯田即徴租以養軍又有名為官田者給指揮等官為俸食聽其招佃收租計官屯田地每畝科租自二斗至四五斗不等較民賦之每畝三四合至五六七八升不等者則十數倍矣蓋當年以軍養軍原非上倉糧米猶之佃民之納租於田主也逮我朝開滇以來兵威震疊將明時指揮等官裁為廢辨軍餘改為編民其時吳逆暗握邉權按昔日之租額改為正供之糧額相沿至今積逋愈多每年業將未完分數職名疊次册報題參降革罰俸勒限嚴催在案計自康熙二十一年起至二十六年止新舊帶徴共計未完丁折銀六萬二千九百八十餘兩未完米麥穀豆一十三萬四千五百七十餘石差榭交催法盡計窮究竟完報無幾豈真官吏罷玩軍餘抗逋者乎總緣屯官田地與民田接壤相攙其地利髙下天時雨澤人力播種事勢皆同而糧賦輕重各異况雲南原係山土瘠薄之區刀耕火種之地較之蘇松膏腴田地所稱財賦半天下者額重亦不至此大為官民交困今議將新舊裁併屯賦錢糧除草場地租馬場人丁學租照舊徴收外其實在田地照分歸州縣民賦上則例起科計實徴銀一萬九千四百九十三兩零正耗米二萬三千七百二十一石零正耗麥三千四百一十六石零於全書內更改者也一黑白二井鹽課過重宜減也查全滇鹽政考內鹽井有九除阿陋等六井年該課銀一萬六百四十九兩三錢六分井小課少辦納猶易不議外查明時黑井額課二萬六千六百餘兩白井一萬五百餘兩琅井二千四百餘兩此辦課之舊額也自投誠偽總兵官史文開報黑井課銀九萬六千兩每斤徴銀一分六釐白井課銀二萬八千五百六十兩每斤徴銀八釐琅井課銀九千六百兩每斤徴銀六釐此係明末亂時額外橫加較原額不啻數倍矣滇之竈户從井汲滷始方鍋煎其柴薪背負肩挑人力工本所費既繁又復加以重課則竈困矣行鹽之商率皆朝謀暮食之人非若淮浙巨商挾重資而行運也且駝運於崇山峻嶺腳價倍費豈能捐本而賤賣則鹽價貴而夷猓遂有經時不知鹽味者矣即如浙鹽課價上則每斤不及二釐下則不及釐許又如附近之川鹽每斤只完稅六毫八絲同一鹽課何與滇省之課輕重懸殊若此也又查山東福建四川貴州廣西等省雖省分大小不同鹽課多寡不一而滇省僻處天末環夷褊小之區不惟不能與小省之課同例而且倍多於大省此滇民之甘心食淡地方官之不能督銷者職此故也今議以黑白二井照琅井每斤六釐之例黑井除減川額外嵗徴銀三萬三千八百四十兩白井徴銀二萬一千四百二十兩琅井徴銀九千六百兩并阿陋等六井徴銀一萬六百四十九兩三錢六分共課銀七萬五千五百九兩三錢六分遇閏加銀六千二百九十二兩四錢四分零於全書內更定者也一開化府之加糧過重宜減也按開化僻處萬山界連交岡猓夷環雜向𨽻臨安府轄九土司中之王弄安南教化三長官司地也明時分𨽻蒙自阿迷師宗維摩等州縣於康熙四年土酋王朔等作叛吳逆勦平編為八里委署臨安知府曹得爵勘丈額田七百五十九頃三十五畝六分零不照民田科則每畝科米一斗六升三合共科正耗米一萬二千八百石四斗五升三合零載入全書查通省民糧惟河陽縣上則田每畝徴米八升一合零為滇省最重糧額矣今開化比河陽又加一倍昔年未設府以前在蒙自等州縣每畝不過二三升及改府之後驟加如許同是此項田地不過改州𨽻府何致今昔懸殊夷民苦纍今議將開化府錢糧除人丁條編差發課程商稅等銀照舊徴收外其原額田酌量改照河陽縣之例共徴本米六千二百一十三石八斗一升二合一勺九抄每石仍帶耗三升於全書內更改者也一元江府新增糧米過浮宜減也按元江舊置土府地處極邉四面環夷種類逈别地皆﨑嶇山谷田畝免丈每年認辦米一千九百三十石二斗一升零地畝銀二百二十兩一錢九分零附額徴花斑竹差發二項共銀六百二十一兩一錢七分零商稅銀三十五兩二錢自改建流府編為六里其時官兵駐防糧運不繼吳逆遂令暫為設法於額糧之外新增米四千七十石二斗一升零田錢地講銀五千五十三兩二錢三分六釐茶商稅銀一千六十四兩八錢普洱無耗秋米一千八十四石浪媽等六寨地租銀二百八十五兩查元江屢遭殘破之後煢煢孑遺何能辦納驟加數倍之糧遂致荒殘愈甚今議將該府夷糧除原額銀米商稅照舊徴解外其新增銀米各減一半實徴新增并原額米共四千五百六十五石二斗二升零地講浪媽并原額差發等銀共四千六百一十兩四錢九分零於全書內改正者也一通海縣夷糧及南安州附徴裁併􅑇嘉縣條編宜減也查通海縣六寨田地五十七頃七十二畝零額徴糧一百六石五斗九升三合每石科銀三兩七錢六分有零較該縣民賦實重二倍夷民困苦難堪今照議新定民例科則實徴銀一百一十二兩六錢二分零米八十三石二斗九升零麥二十三石三斗零以昭畫一􅑇嘉縣原額田四十八頃八十八畝三分零共徴秋糧一百三石五斗六升四合零每石編銀四兩二錢四分零共徴銀四百三十九兩三錢九分零較全滇之額固屬偏重今既歸南安州附徴應將􅑇嘉縣條糧照該州每糧一石編銀一兩四分零之例實徴條銀一百七兩六錢七分零米一百三石五斗六升四合零均應於全書內刪改者也一麗江土府失額銀米宜免也查麗江界連吐番古稱荒服原額米七百七十四石一斗三升零麥一千六百三十九石五斗六升零地畝銀二百七十五兩三錢五分零外認納條編銀五百三十兩一錢後因蒙番出犯將該府所轄金沙江外中甸地方復占其中甸等處額徴米一百四石六斗八升零麥四百五十八石五斗一升零已於康熙十年題豁免徴逮吳逆反叛又將金沙江以內喇普地方割送蒙番該秋糧二百石編銀六十六兩四錢三分久經無徴該土官賠補將來賠纍無窮且未便將無地之糧仍載全書况中甸業經免徴則喇普亦應援免今議應於全書內刪除者也一建水州無藝之徴宜革除也查明時設臨元參將一員將日用等物𣲖諸夷民計嵗𣲖村寨年例銀九十二兩及子花檳榔核桃松子木耳乾笋麻子油月柴每年變時價銀二百三十四兩四錢一分零又𣲖馬料八十石一斗零糕糧二石原非正供錢糧實係私𣲖橫徴因吳逆摉查投誠知府范應旭呈報邀功遂編入額豈可因仍陋弊今議應於全書內刪豁禁革者也一無徴之場課宜豁也查新平縣明直銀場易門縣老場銅厰自明至今開採年久今苗斷礦絶商匠逃散課稅無徴官民賠纍不堪經臣援詔具題部議未允但礦厰非同田地有耕有獲錢糧易辦此乃全憑造化有無難必今既硐老山空而課稅不免節年俱係各官捐賠但年復一年焉知不𣲖纍小民豈可以賠補之項刋載全書今議將新平之明直場課銀三百三十兩九錢六分遇閏加銀二十七兩五錢八分易門之銅課銀二兩老場爐課銀二十一兩六錢一併於全書內除免者也以上各欵如屯賦之太重乃明時之相沿但時異勢殊軍既為民衛所既併州縣而壓欠嵗積官民交纍又加鹽課之過重商竈困於徴輸夷民苦於淡食又如開化之加糧元江之新增乃吳逆邀功橫徴麗江之喇普失額銀米係吳逆割送蒙番以及建水之私𣲖亦係吳逆摉查貽纍通海南安二州縣之重糧又新平易門之明直老場荒廢賠課今當更造全書聖諭諄諄惟恐一夫不獲其所此正邉境黎民猶解倒懸之日也臣遵旨會同經管錢糧諸臣再四參酌敬陳各條恭候聖裁以垂永久再照石羊等厰嵗有額課但苗礦之有無難期永逺今雖造報似未應刋入全書仍照舊每年將抽獲之課造册報銷可也請豁免加增鹽課疏巡撫再任王繼文見前看得黑鹽井月增課銀二千兩向緣吳逆自秦入滇官兵家口不下數十萬食鹽衆多行銷稍易因而題請加增原非行鹽舊額逮全滇恢復之後民多流散户口寥寥課額虧欠難徴於康熙二十一年經臣會疏具題將月增課銀二千兩遵奉俞旨減除今於奏銷康熙二十七年各鹽井課稅案內準到部文仍令將此項銀兩自二十九年照舊徴收查滇省自平定以來仰荷皇恩遐播商民安享太平固已有年但逆屬家口盡行起發投誠人員已經安插各省見今户口所增無幾食鹽甚少行銷實難見在月額銷鹽四十七萬斤徴課七千八百餘兩尚苦歷年鹽壅課逋商受催比官罹參處嵗不能免曽經前任撫臣石琳於全書案內將課重價貴情由題請照琅井課則議減在案今若將此項課銀照舊增收則增課勢必增鹽鹽愈壅而有司無地疏銷即仍不增鹽價愈貴而窮民益難買食商民滋纍較深各官徒受參處國課仍然虧欠究無禆益是現在之額專望議減而已豁之銀萬難加增兹據布政使于三賢驛鹽道王照詳據各該府州縣并商竈軍民紛紛籲訴會詳前來所當仰體皇上愛養商民至意據實入告伏乞敕部查議將此項銀兩照前豁免則井竈商民均沐皇恩永永無極矣籌請屯荒減則貼墾疏王繼文看得滇省每年額糧通共米麥等項二十六萬餘石而屯糧實居其半歷年供撥兵糈關係甚巨苐屯田一畝之科幾納民田十倍之徴是以拖欠逃荒年甚一年臣自再涖兹土以來訪求民隱圗布聖澤惟此屯田一項最為滇民苦纍近蒙皇上沛無疆之德將康熙二十一年起至二十七年止屯賦纍欠錢糧盡行蠲免一時老幼咸懷再生從前重困始得暫釋但額賦豈容再寬輸將已無遺力臣再四籌維有老荒重額田賦一項小民終年畏棄已成廢土若使減則貼墾尚可藉補虧懸行據布政使于三賢署糧儲道事永昌道參議畢忠吉議將前項老荒田地凡係連年見納軍糧之人承墾者將屯田地之上中二則六年後悉改為民田地之下則起科屯田地之下則十年後改為民田地之下則起科以補賠纍之苦其不係見納軍糧之人承墾者六年後將屯田地之上中下則悉改為民田地之上中下則起科仍令地方官量借牛種及出陳米石務使力耕有成至於民間荒廢田地其上中二則倣照豫省六年後係中則者照下則納過三年再歸中則係上則者照下則納過五年再歸上則之例起科其下則田地請於六年後減半三年再照本則起科并承墾後即為已業用備貼墾事宜臣伏見皇上愛民至德有加無已凡重農廣粟之例莫不一一舉行必使四海無不獲之夫九宇有蓋藏之富今滇省田地本屬磽薄屯民尤困追呼若以拋荒不墾之田補其重額難支之纍及民荒田地一槩極力勸墾不但正額可以充實新賦亦可稍增矣請減屯糧疏巡撫石文晟奉天為密陳屯糧之重仰祈睿裁以廣皇仁事竊查滇省屯政因明初沐英世鎮雲南將帶來官兵分作十分以三分差操七分屯糧即以七分屯糧之租養三分操軍此即古之寓兵於農原非上倉糧米可比逮我朝定鼎順治十五年闢滇吳三桂遂將昔日之租改為額徴之賦及後變亂之時罔恤民艱任意坐𣲖使各軍紛紛逃散因而遺纍存下典鬻賠納苦難殫述幸賴皇上天威殄逆民得以安但浮糧過重仍困輸將計恢復之後自康熙二十一年至二十七年屯銀米榖等項歷年拖欠此非軍户敢於頑抗亦非各官不善催科總因糧額太重血比難完業於康熙二十八年內經前督臣范承􅈴署巡撫時特疏題請分年帶徴隨蒙皇恩特頒上諭朕念雲南百姓前曽供億王師繼又遷移叛屬家口運送勞瘁本年正賦輸將尚屬艱難復令帶徴逋租必致益滋困纍著將歷年所欠屯賦七萬一千二百餘兩米麥等項十萬七百餘石盡行蠲免以示朕軫念民生至意欽遵在案則彼時題請帶徴早蒙皇上睿鑒中矣况各衛所久經裁歸有司是在前日猶存軍户之名在今日則無軍民之别一切徭役自應一視同仁乃查通省民賦上則田糧最重者莫如河陽縣每畝八升一合八勺三抄其餘五六升以至四五合而止上則地稅最重者亦莫如河陽縣每畝五升九合二勺一抄其餘三四升以至三四合而止及查屯田每畝則有七斗二升六斗八升五斗六升至四斗五六升不等屯地每畝亦有三斗八升至一斗五六升不等夫軍民田地阡陌相連肥磽相若天時人事耕鑿播種亦無不同何至輕之屯額比至重之民賦尚有四五倍之數若較輕額則屯賦之與民賦竟有十倍之重所以屯軍終嵗勤動所收之榖不遑贍顧父母妻子惟事納糧而究竟不能以一畝之出全完一畝之額數康熙二十八年臣叔石琳撫滇時曽於奉旨編輯全書案內將此屯糧重困敘入瀝陳未經部覆而以後督撫臣未敢覆請者蓋以國用浩繁豈容遽議輕徭况各省屯糧皆重尤不便獨為請減是以前撫臣王繼文不得已於康熙二十九年有屯荒減則貼墾之請也但浙江等省屯軍現今領運且有船隻行月漕截等項給贍滇省屯軍則無此項贍養兼之衛所既裁軍即是民則與别省逈異况此軍係沐氏帶來官兵並非發遣有罪之軍所納正供似應與民一體矜恤臣於康熙二十二年守開化時早已深悉今撫兹土見煙竈相連林林總總生聚實繁大非昔日氣象此雖邇年以來前督撫臣撫綏之功實沐皇上柔逺洪恩所致惟此一項因吳逆作亂時各軍多半逃竄殲逆之後前此逃丁或遭兵火或戀他鄉間未回里以致遺糧賠纍本以最重之糧又復包賠逃户日復一日重復更重故於康熙二十八年以來嵗嵗不清每遇奏期各官俱愛功名竭蹶借墊者有之以欠揑完者有之遇一升遷事故便束手無䇿百計哀求逢人募助洵不可悉數也臣自入境以來目覩荒蕪田地甚多百姓甚衆及抵任後披閲各屬詳驗報墾無幾隨行飭催旋據百姓紛紛具呈熟糧額重無力開墾懇請題減復批司道查詳所議僉同總欲為民請命臣思減賦薄稅非臣子所敢輕議祗因多寡之數甚是不侔苦樂之形異常各别若不據實上達負百姓即負我皇上矣况滇省僻處遐荒係外域觀瞻之地不得不冒昧陳請如荷聖鑒將此屯糧悉照河陽縣則例起科則不特現在軍餘易於輸納即未墾荒産臣自鼓勵各地方官加意勸墾亦無有不踴躍樂墾者也仍將墾過數目隨即具報按年科徴是減賦於今日安知不增賦於將來也理合恭疏題請請廣中式解額疏石文晟為遐方文教大開盛代賓興宜廣乞恩題增解額以溥皇仁以𢎞雅化事該臣看得滇居天末昔以士子甫離兵燹不暇詩書文教未盛今蒙皇上右文教養兼摯雲蒸豹變實繁有徒邇來入闈應試者數至二千餘人及查中式不過二十七名而止此係國家定制臣何敢冒昧瀆請但查禮闈會試卷分南北而南北卷中又將四川雲南分為中左四川取中四十二名雲南取中二十七名同一中左取額懸殊故致生貟王思訓等之援情環籲也隨批司道會議兹據布政使于三賢提學道副使張倬等查覆前來臣思人文之繁盛實由聖治之休隆况荷聖恩俞允前督撫所請添設學官增加童額則子襟既已衆多中式亦應稍廣相應請照四川之額每科遴取四十二名以勵邉地人材至文武並重久荷皇上一體掄才自宜並請洪恩一例廣額者也臣謹會同雲貴督臣王繼文合詞具題應否俯允伏乞睿鑒敕部議覆施行臺灣善後疏通政趙士麟河陽竊惟目今國計之大者莫過臺灣善後一䇿往者羣醜肆逆海宇沸騰皇上聖䇿風行神謀電發端拱宸陛蕩滌萬古薄海內外罔不臣服此千古之盛烈也而又睿慮所周不遺一物英斷所及逺過百王臣之至愚何能仰贊髙深萬一然芻蕘之言至人擇焉故不揣固陋敢披陳之臣備員通政有臣同官今僉都御史臣陳汝器向久在閩中臣咨詢之言臺灣情形甚悉臺灣乘風揚帆一日可至否則越日甚近耳其地方千里之廣土著之蕃人四十餘社雖所處逺近不同然皆可漸馴而化也漢人户口則號稱殷庶厥土膏腴五榖無不可藝産佳錫山林林木甚蔚取鹿於野取魚鹽於海不可勝紀誠沃區也夫澎湖一隅耳明時曽守之况臺灣之大哉臣愚以為宜倣廣東瓊州例而變通之安置流官設一府兩縣以治其民設一總兵以鎮臺灣設一副將以鎮澎湖以千里所産供駐防之需芻茭糗糧不可勝用即稍稍協濟餉亦無幾若是而沿海守汛之兵可減如明時倭人紅毛飄突之患可以建威而豫消勸農桑設學校數年後不特休養生息之衆堪埓為外藩即詩書禮樂之化亦可漸興而比美於內地一統無外之宏規孰大於是若不籌所以善後恐承平日久巨鯨大鯢復窟於其間又煩廟堂之區畫矣但流官資俸與直省不同三年即與升遷文移之往來不宜拘以程限遲速則人人樂趨且無尾大之慮如臣言可採伏祈皇上睿鑒施行賑濟齊飢疏御史李發甲河陽竊照山東六府被災特重我皇上宵旰焦勞勤恤民隱手諭在廷大小臣工即發帑金百餘萬兩截留漕米五十萬石復遣八旗官員親赴濟兖東青登萊等府按名賑濟不使失所德音一沛山左之民歡聲雷動仰見我皇上天地為心睿鑒周詳不遺纖悉臣何敢再瀆天聽惟是六府之內地方千里正中原腹心襟帶之區數百萬生靈實為我國家之元氣臣聞自入夏以來隂沴異常麥秋無望蓋至槐頭栁莖水草榆皮無不攫取爭啖老弱幼稚者半為尫瘠少壯強勇者乞食他鄉又聞白晝通衢已有剽人而奪之金者矣彼其茍延旦夕之命而計緩須臾無所依賴不暇顧惜耳又聞賣妻鬻子止博百錢搗葉磨根難充一飽甚有人相殘食之慘此情真大可憫也凡此赤子飢餓迫之於前死亡繼之於後即慈母不能保其子而謂此蚩蚩者能坐以待斃乎哉臣又聞山東之民有就食江南者矣有就食江西者矣有就食湖廣者矣有就食河南直𨽻者矣一離井里皆成餓夫目無故舊身鮮分文日則行乞街市夜則投宿寺宇甚至地方不能容留有驅之曠野驅之境外者矣當此顛沛流離啼飢號寒之際若不豫為補救則轉瞬隆冬凍餒來嵗青黃不接不填於溝壑即聚於萑苻此一定之理必然之勢也我皇上至德涵濡聲靈赫濯萬無狂逞潢池之事然從古致治保邦在於幾先母待事後未雨綢繆之計不得不鰓鰓過慮也臣愚以為亟請皇上敕下該部遍諭各省督撫司道府廳州縣等官凡遇災民入境著各該地方官加意查明著緊存恤勉給饘粥併令安置得所再有養至來年秋成送回復業凡若干名者從優分别奬勵則已逃者可望還鄉待斃者得蘇殘息庶幾上慰皇上己飢己溺之懷再如河南湖廣浙江江西山西陜西福建直𨽻及江南之邳泗盱徐等州縣間有水旱災傷已經各督撫彚報業蒙皇上發粟煮賑蠲免錢糧各省災民均霑曠典猶慮其中有逃散就食者亦宜行令所在官司加意查明勉捐存養俱俟來秋沿途各官捐助路費送回復業如此則我皇上如傷懷保之仁得以廣被無告流移困苦之衆不致相煽為非民命存亡盜賊生息舉判於此我國家所以杜絶株萌培養元氣億萬年無疆之厯服在是矣雲南通志卷二十九之四欽定四庫全書雲南通志卷二十九之五奏疏本朝二請題免白土軍丁銀疏總督髙其倬奉天滇省丁銀額重小民苦於輸將前臣等會疏題請經部議準將民丁丁銀攤入地糧完納並查無主影射者將軍丁之最重者量加攤除當即檄行布政司清查在案兹據署理雲南布政司印務按察使江芑詳稱滇省山多田少無主影射田土寥寥無幾以之攤抵軍丁尚屬不敷更有太和縣白土軍丁一項係前明萬厯年間因賓川州鐵鎖箐夷人作亂暫令賓川州趙州雲南縣太和縣四處民人撥防大理府城池遂立太和所名色至我朝順治十六年已將賓川州趙州雲南縣三處土軍俱準復歸民籍惟太和縣土軍二百五十二丁又鄧川州土軍二十六丁浪穹縣土軍二十五丁每丁派銀一兩報入徵册嵩明州土軍一百二十一丁因嘉靖年間安酋作亂挑撥州民協幫尋甸守城名為鳳梧所編出土軍一百二十一丁每丁納銀一兩俱係州民並非承種軍田之丁再查鶴慶府土軍一百零八丁亦因鐵鎖箐夷人作亂將太和縣民撥守鶴慶禦又分防劍川浪穹隨編為鶴慶土軍伊等在劍川浪穹開穵久荒田地納糧編丁禦官復科使費一百零八兩裁禦歸府竟將一百零八兩之私派編作人丁一百八丁每丁納銀一兩載入正賦是伊等已納錢糧丁差復納此額外土軍之丁銀重纍難堪至騰越州土軍丁三百七十三丁上納丁銀三百七十三兩其立名受纍情由與鶴慶土軍事同一例以上太和縣嵩明等六府州縣共編土軍丁九百零五丁查屯丁每丁納銀六錢二分二錢八分不等獨此項土軍每丁納銀一兩其賦重倍於屯軍且軍民各有一差獨此軍既當民差又當軍差是役之重又加倍於軍民詳請題豁臣覆查無異伏思滇省六屬之白土軍丁銀九百餘兩以明末之流弊重役纍民臣何敢壅於上聞所當題請豁免伏乞皇上睿鑒施行籌酌魯魁善後疏髙其倬為詳籌永逺寧謐之策以除野賊積患事竊照雲南魯魁野賊為害地方情節及各大頭目現就拘繫𠞰捕經臣另疏詳奏在案若不趁此剿捕既施之後詳籌調劑雖目前暫安難期永逺寧貼欽惟我皇上聖神文武中外乂安乃猶宵旰孜孜勤求治理臣荷封疆之寄千載一時何敢因循故轍茍了目前仰賴日月之燭照不避紛更之小嫌謹隨地方形勢就臣愚昧所知籌酌數端冀得永除野賊之患稍靖地方所有各條謹臚列於後一雲南厯來野賊頭目平時皆居元江新平之間若一經生事官兵剿捕則遁入威逺土州及普洱茶山等處蓋因素係伊等瓜分討保之地夷民嵗嵗納銀如同租户甚至井鹽挨日收課商茶按馱抽銀客賈猓民任其指使供給食米傳報聲信官兵所向賊已早知消息賊衆所潛官兵難得蹤迹所以查拏不易剿捕頗難今雖加懲創目下暫安若不趁此安營設防為經久之計空虛之地廣袤二三千里內通哀牢外略異域無兵控壓必仍為野賊暗占每年索保可得萬有餘金以此招養賊黨必將復聚為患臣細籌形勢應添設普威一營置參將一貟守備二貟千總四貟把總八貟兵丁一千二百名令參將帶兵五百名駐劄普洱令守備一貟帶兵三百五十名駐劄威逺又守備一貟帶兵三百五十名駐劄茶山其餘汛地量分千把帶兵防守內制野賊外控土司再加以貟辨得人整頓不怠則此一方野賊之患自可消弭矣一野賊巢穴根株全在元江協新嶍營所轄之地向來營制新嶍一營止屬臨元鎮管轄與元江協無屬故元新兩界之間一有事端未言𠞰捕先爭交界互相推卸遲誤事機比及用兵又復參差前後呼應不靈臣請將新嶍一營及所擬新設之普威營一併皆歸元江協管轄仍令臨元鎮統轄則聫絡一氣功過相關於調遣巡防均屬便利矣一威逺土州之地包魯魁哀牢西南一面厯來為野賊逋逃之藪野賊敢於恣肆者固由文武玩愒然亦以有此威逺一路可逃及威逺土官可恃也威逺土知州刀光煥平日苛索多端夷民苦纍此次又隱藏野賊通風餽食令其實報屢檄不遵經臣一面摺奏拘拏一面發藩臬二司秉公詳審容臣另行具題外威逺土州應請改土歸流一則雲省門户堅完再則夷民如出水火其地請設撫夷清餉同知一貟兼管鹽井經厯一貟兼管司獄事井大使二貟分管按板抱母及各處土井煎辦鹽斤再猛班地方離威逺三百餘里應設巡檢一貟就近辦理民事令各貟盡革土司厯來苛派項款與民休息自此以漸化導整頓則厯來野賊棲託之藪可漸變成內地而夷民永逺得免土司苛派之苦再查威逺乃極邊瘴癘又係初闢之地各貟請照例揀選調補以三年為滿如果稱職請照麗江府改流之例保題升用以示鼓勵則新設之貟益加奮勉矣一楊方普李四姓土官向係招出賊目授以土職原期約束夷人安靜地方今既不能約束族舍反聽藉勢為非聖朝名器何可濫加查李姓土職久因犯罪革除外此次糾衆騷擾者皆方普二姓族人及其項下夷猓方普二姓土巡檢先事不行鈐束事後不能捕擒甚屬溺職查方紹祖普成忠皆屆請襲之年現在請襲應請永逺停其承襲以示懲創又土縣丞楊世恩此次野賊之內無伊宗族一人亦無伊屬夷猓又親率土練隨官兵深入𠞰捕應仍留其世職以示奬勸一各處既擬設官添兵則俸薪兵餉以及役使等項均需支給雲南嵗嵗借他省之協濟豈容更增繁費查威逺之新開按板抱母二井前於遵旨覆奏鹽務利弊事案內計一年可出鹽三四百萬斤請以所出之鹽分銷各屬可以平減通省鹽價今黑井已經加腳減價白井已有沙滷分銷景彌雲阿四小井其價原不過昻惟琅安二井之鹽消售於臨安等處者其價稍貴今又有新經查出麗江之井可出鹽息二千二百餘兩將此減抵其價亦平除於鹽政內另行具題外查按板抱母二井從前為野賊及土官土棍所踞不但無分釐歸公兼之野賊騷擾商販亦裹足不前今經驅除整頓商販流通計一年約可出鹽四百餘萬斤可獲息銀二萬餘兩以充兵餉可以不用另行請增再普洱一帶又報出土井數處向亦因野賊阻撓擅利自肥今現陸續清查整理可將所出一併添助創設之費至兵米一項元江威逺普洱皆産米之鄉應就近籌撥可也一施和尚之姪膩勒糯利糯片等向來亦非安靜之人此次施和尚被殺膩勒等皆隨官兵奮勇􅊧捕賊黨頗為盡力應寬其既往但若縱令仍各居逺寨漫無稽查亦恐將來滋事臣請將膩勒糯片糯利等并其妻子皆令移入元江府城居住凡有出入皆報明文武官庶該管各官得以稽查拘束而夷目本身家口俱在城中知所顧畏必不敢為非矣一威逺土官刀光煥及其犯事子弟將來若仍令留居故土必致鼓惑滋事請將其家口移至省城安插臣酌量料理給以恆産俾令得所則萌蘖不滋釁端俱息矣一向來元新一帶猓夷習於討保之風其頭目每年所得成千纍百名曰年例錢其後生每年出外一次亦各得三四十兩名曰鞋腳錢且所到之處醉酒飽肉滿意而歸利之所在趨之若騖更兼元新各寨多係各目故居其餘零星小寨亦各有頭腦耳濡目染以為徒手可以致富常思起而效之若不嚴加防範難必其故態不萌查各野賊出入有地討保有時九龍江口是其入土司之要道請於九龍江口相近厄要之處及各渡口俱設汛盤查或江外之猓夷欲往江內江內之猓夷欲往江外者皆令該管官給以印票載明人數如山海關之例往還按數稽查即茶山客商及官辨所差兵役俱一例盤查以嚴出境滋事之弊再元江新平所屬村寨俱令地方官倣保甲大意編立里甲記其人户名口厯來野賊討保必在秋成之後請每年令地方官於十月十一十二正月四個月之內不時親往稽查如出外者多必係索保務行跟究懲處不令稍有脫漏則要路之出入既嚴地頭之稽查又密形格勢禁自不敢為非行之既久積習漸除餘患自消矣一威逺土州向來土官不容夷人應考恐其入學與之抗衡又同族為婚者甚衆倫紀未明除同姓為婚已飭該管官諭禁臣又與撫臣楊名時嚴飭各員勤講聖諭加意化導以變猓俗請再於威逺設立義孰數處令夷人子弟有志讀書者入孰誦習先暫令於元江附考請敕學臣就其粗通文義者量於元江額外取進二三名以示鼓舞俟人文漸盛再請設學庶猓俗自變文明日啓矣一威逺土州向來差發甚少其田土所出盡為土官苛𣲖入已今臣已令大理府同知佟世蔭守備楊國華將其田畝及各項錢糧逐一清查凡有土官額外苛𣲖之項行令盡數裁革其應增納正額亦令酌照地之肥瘠更定賦額以資經費再查得威逺普洱九龍江等處土田之美大勝雲省腹內之地其山頂多水其禾一年兩熟然猶拋荒甚多者一以土夷人少不能遍耕再因野賊騷擾嵗無寧宇若使土田盡闢不但軍糈足資更可化為樂土其間尚有可開設州縣之處但目下人户稀少江邊煙瘴未消未可驟言應籌之以漸臣已與撫臣楊名時令各地方官加意勸誨本處夷民廣行耕植又令招徠别處願墾誠實之民赴彼墾種請照雍正元年定例旱田十年升科庶人煙漸盛嵐瘴自消居民愈多則賊風愈息矣以上十條臣就一得之愚籌酌調劑謹會同雲南撫臣楊名時提臣郝玉麟合詞具題伏乞皇上睿鑒敕部議覆施行耕藉田謝恩疏總督鄂爾泰滿洲欽惟我皇上仁育蒸民孝先天下三推開九推之首禮重貴農千畝為百畝之倡情通報本特舉躬耕大典表正羣生欽頒壇祭鴻儀曉兹兆庶以天子而親耒耜孰敢不勤於耕本至尊而潔粢盛誰能不興於孝自督撫以及郡縣衛所盡屬守土之司由京畿而逮東西朔南通行藉田之禮此誠百王未有之曠舉實為萬世不易之隆規也臣等身任封疆職司表率雖滇黔在萬里之外僻近蠻荒而苗猓處異類之儔咸知耕鑿仲春方屆陽氣正舒吉亥既臨土膏初動彼其之子皆秉耒於東郊乃如之人同俶載於南畝豈獨山農石户固訝所罕聞即使縉紳士夫猶茫然失據於是敬宣僚屬相與遍諭農人俾知聖天子本此仁孝之思躬先迪勸咸願爾億兆體其誠敬之意同慶屢豐帝曰百工欽哉豫一人為天下臣民祈天而永命民曰皇恩大矣我百姓願元后父母壽考以無疆臣等無任激切屏營之至請添設東川府流官疏鄂爾泰為請設流官以安邊圉事竊照東川一府奉旨改歸滇省一切事宜應另為措置庶漢夷相安地方寧謐臣於去冬赴黔審理凶苗川販事畢由威寧而抵東川雖城垣傾圯人户蕭條然覩其山川察其形勢按其疆畝查其厰地固膏腴之府物産之區也東至烏撒西至會川南至尋甸北至烏蒙西北至會理東西廣四百二十里南北袤三百七十里周圍延袤一千七百餘里前有金沙江後有牛欄江復有五龍納雄馬鞍雲弄諸山羣峯環峙坡阪宜蕎原隰宜稻田髙水活旱潦無恐緣歸流之後仍屬六營盤踞諸目逞凶嵗遇秋收輒行搶割故改土三十年仍然為上酋所有仰荷聖主仁威雖各加整飭共知惕栗但地方遼闊營長火目侵占田畝私派錢糧甚至縱夷劫殺綁虜平民實非一知府一經厯所能遍理查巧家一營逼近烏蒙去府窵逺厯遭烏酋踐踏應立一縣將馬書弩革米糧壩以扯汛等處歸并管轄者海地方素通烏蒙暗行不法應將縣典史移駐者海將革舍阿固伙紅等處歸併管轄歹補地方亦離府治百里山深箐險應設巡檢一貟將五龍卑七法戛等處歸并管轄則補地方逺在江外亦設巡檢一貟將阿木可徂普毛杉木箐等處歸并管轄如此則凡緊要地方俱有職員分理墾田開厰協理有人而營長火目改立鄉約保長一體編甲稽查嚴密漸染亦易二三年後東川將為樂土矣如蒙聖恩俯允所設縣治並請欽賜佳名知縣巡檢并懇敕部鑄給印信以專職守臣更有請者東川改土以來於康熙五十九年間題請照中學例嵗試取進文武童生各十五名建造文廟學舍春秋祭祀其教職諸事令知府暫行兼攝補廩出貢部覆俟數考後另疏題請查知府有地方民社之責何能兼司訓迪自應添設教授一員給以印信專司學校其應試文武童生現在無多各取進十五名徒滋混濫應請暫照小學例各取進十名俟後人文漸廣再議加額并應補廩出貢及新設縣治亦添設教職之處一並題請庶開導用勤觀摩斯奮俾羣知入學為榮進身不易或亦鼓動邊夷之一道也至建造衙署添設書役工食應將何項動給俟酌妥估計另行造册具題合並聲明臣謹會同署理雲南巡撫臣楊名時合詞具題伏乞皇上睿鑒敕部議覆施行請添設維西營制疏鄂爾泰看得中甸一區為雲南西面藩籬延袤二千餘里應設官兵以資控制經前督臣髙其倬題明俟川雲兩省各遣大貟將巴塘中甸所屬之地會查明白然後酌定添設官兵確數今阿墩子等處既奉旨歸滇地方更為遼闊應於適中處所安設一營餘量地方之大小要隘分防設汛以專責成臣查中甸雖地大民衆但天氣寒冷不能種植維西一帶天氣和暢又內接鶴麗鎮劍川協之汛防外通西藏實屬緊要之區應於維西建立大營設參將一貟帶千總一貟把總一員兵丁四百名駐劄控制中甸地方亦屬緊要應設守備一貟帶把總一貟兵丁二百名駐劄防汛中甸之格咱地方乃通裏塘之大路應設兵五十名防汛奔子欄渡口設有船隻應設把總一貟帶兵五十名駐防其宗喇普二處係塔城關之大路應各設兵五十名防汛阿墩子雖為要路而地隘民稀難容多兵應設千總一員帶兵一百五十名駐劄防守阿墩子以外之浪滄江有溜桶船隻為通西海要路應設把總一貟帶兵五十名駐劄防範以上計設參將一貟守備一貟千總一貟把總四貟馬一步九戰守各半兵丁一千名方足控禦蒙番彈壓地方其備辨兵丁統屬於維西營之參將而參將仍聽鶴麗鎮統轄則聲勢聫絡呼應得靈但既議設兵必須籌餉查雲南鶴麗鎮設兵二千八百名較各鎮多兵四百名者原為接壤蒙番防汛金江而設是以沿江之石鼓阿喜一帶安設汛兵一千六百名之多又劍川協設兵一千名亦因界連番地之故該協之拖枝汛離維西僅二十里今維西既安大營中甸各處又已設兵則鶴劍俱為內地鶴鎮沿江及劍協之拖枝等汛可以不必多兵應於鶴麗鎮抽兵四百名劍川協抽兵二百名共抽兵六百名尚少兵四百名前督臣髙其倬曾有援剿兩協裁增之議援剿左右兩協原每協設馬二步八合戰兵二千名除撥歸楚姚景蒙東川等處兵丁外每協尚有馬兵三百二十名步兵一千一百七十名與原設馬二步八之制不符應於兩協內共裁馬兵一百名步兵一百八十名改為馬一步九戰守各半兵丁四百名撥歸維西營餉銀移彼就此已敷給放其所設維西營官辨亦應於內地酌量裁調查援𠞰兩協原係每協分為二營設副將一貟遊擊二貟守備二貟千總四貟把總八貟經前督臣髙其倬於請酌增楚姚鎮兵等事案內業已裁去左協遊擊一貟守備一貟千總一貟把總二貟又裁去右協遊擊一貟千總一貟把總二貟今應裁右協守備一貟兩協千總各一貟把總各二貟撥補維西營是維西營止須另補參將一貟所有備辨均毋庸另設一轉移間內外之營制俱宜而兵餉不致增添庶於邊疆有益臣謹會同吏部尚書以總督管理雲南巡撫事務臣楊名時駐劄大理府雲南提督臣郝玉麟合詞具題伏乞皇上睿鑒施行請設烏蒙府文貟疏鄂爾泰為欽遵上諭請設文貟事竊照烏蒙鎮雄既經奉旨改土歸流并歸滇省管轄除應移鎮安營裁調官兵添設之處現在另疏具題外所有應安設文貟駐劄各地方總理分理之處臣隨悉心籌畫廣詢博採務求妥確今據永昌道賈擴基東川府知府黃士傑威寧府知府楊永斌署烏蒙事正大營同知耿覲謨署鎮雄事尋甸州知州崔乃鏞候補知縣朱繡等會同武貟屢經踏勘次第詳報到臣臣按其情形察其險要復與各貟會商確議酌定規模仰候聖裁謹議得烏蒙鎮雄緊相接壤地方千有餘里而烏蒙地勢尤廣請仍設為府治查烏蒙地界有上方下方之别其上方扼要之地為天砥而烏蒙小烏蒙魯甸女補奎米貼等處皆屬上方土府舊治并無城郭查天砥去舊治七里軒敞寬平可建城垣應設知府一貟總理郡務其下方扼要之地為大關坉而小關豆沙壩鹽井渡梅子溝以及水旱十八站等處均屬下方去府窵逺應設通判一貟駐劄於此分理郡務又米貼地方去府治西北三百里去大關坉東南四站踞金沙江之上流扼大小涼山之喉項控馭險要應設知縣一貟駐劄於此總理縣務又魯甸地方係祿鼎坤舊地分轄諸夷總領各目地接東川夷猓雜處應設巡檢一貟駐劄於此以司門户以察往來又鹽井渡地方逺通川省近接鎮雄商賈叢集課賦攸關姦販狡夷往來出沒亦應設巡檢一貟駐劄於此以司鹽務以察姦宄又設經厯一貟同駐府城供知府調遣設司獄一貟專管監獄設知事一貟佐通判稽查設典史一貟備知縣調度兼理獄務又於府治設教授一貟縣治設教諭一貟分司訓迪此烏蒙應設之官制也至於鎮雄較烏蒙稍隘請改為州治查鎮雄地界總計有三股一為彝良八火頭一為威信十三白勒一為母享七火頭而烏通山居三股之中乃總會之地背山面河為土府舊治亦無城郭今請稍移而南建立城垣設知州一貟總理州務設吏目一貟以董馘囚其彞良地方為八火頭之最曠土荒田可備開墾鹽井礦厰可資食貨而夷猓雜居頑梗盤踞號為衝繁應設州同一貟駐劄於此分理州務其威信地方為十三白勒之最通川省之門徑傍烏蒙之藩籬總天篷諸寨之要隘握白水三江之咽喉應設州判一貟駐劄於此藉為後障其母享地方為七火頭之最逼近永寧路通商賈緊接州治呼吸相關應設巡檢一貟駐劄於此以為內藩又設學正一貟以司訓誨此鎮雄應設之官制也以上烏蒙一府應設文官十一貟鎮雄一州應設文官六貟俱歸烏蒙府管轄現今兩處各需貟任事臣看得順寧府知府陸世宣雖到任未久然操守謹飭才具強幹且籍𨽻四川熟悉土夷情事曲靖府通判徐德裕辦事精勤不避勞怨屢經差委皆有條理候補通判蘇暻年力精壯堪以佐理廣通縣知縣杜思賢才具明晰辦事老成昆明縣縣丞張浩炎方驛驛丞許燮俱辦事能幹相應請旨將陸世宣調補烏蒙知府徐德裕補授鎮雄知州蘇暻補授大關通判杜思賢調補米貼知縣張浩升補彞良州同許燮升補威信州判均屬人地相宜陸世宣杜思賢係對品調用蘇暻係命往人貟張浩許燮係請補佐二官俱無庸送部引見徐德裕俟赴新任辦理就緒再給咨赴部引見其經厯知事巡檢典史等官臣已另行選擇咨部調補各教官聽撫臣考驗選補府州縣文武童生暫照小學例各取進十名俟人文漸廣再議加額此二處實係邊方要地所設各貟請以三年為滿果能稱職保題升用以示鼓勵各貟缺俱於本省揀選調補至於應徵地田錢糧人民户口并各貟管轄界址建造衙署官俸役食以及鹽井銀銅各厰作何調劑之處俱現已委貟分勘清查確估俟册報到日聽撫臣另行具題所設府州縣三治并請欽賜佳名以昭聖化各貟應給印信統請敕部鑄給以示信守臣謹會同雲南撫臣朱綱合詞具題伏乞皇上睿鑒敕部議覆施行恭報慶雲疏三省總督鄂爾泰為恭逢聖誕慶覩祥雲事雍正六年十月二十九日恭逢萬壽令節臣率在省文武官貟人等在五華山朝賀畢坐班至辰刻共覩五色卿雲光燦捧日經辰已午三時至十一月朔絢爛倍常凡呈現兩日臣尚以為省城所見其他郡邑未必同然隨經行查去後適據楚姚鎮總兵官張應宗呈報恭逢皇上萬壽本職率同在城文武大小官貟以及合郡紳耆兵民人等恭詣龍亭朝賀坐班仰見上天垂象卿雲滿布祥光五色擁護日邊從辰至午燦爛非常初一日午時煥麗更勝文武兵民咸稱厯來未覩齊祝萬壽無疆所關盛朝祥瑞理合具文呈報又據雲南布政使張允隨詳稱查據楚雄府楚雄縣廣通縣姚安府姚州大姚縣定邊縣等處先後呈報恭逢皇上萬壽聖節喜見卿雲五彩擁護日邊經辰已午三時於十一月初一日午時又復光華照耀衆目齊觀不勝歡忭此從古未有之殊觀曠代罕聞之盛事幸生聖世得覩其祥伏祈轉詳各憲等情到司伏查省城乃全滇之會楚雄為西迤之中欣逢五色祥雲正當萬壽令節此誠嘉徵上瑞罕見稀聞理合詳請祈轉奏等情到臣欽惟我皇上功參化育德備中和至誠昭格於幽明敬天法祖深仁廣沛於遐邇懷德畏威四表被光華時徵上吉八方荷丕冒疊見竒祥前此璧合珠聫羣識天心之昭監嗣聞河清海晏盡知地祗之效靈若夫慶雲之瑞正值聖壽之辰則實從古迄今未經再見者也臣謹按黃帝有景雲之應虞舜有卿雲之歌瑞應圖曰慶雲者太平之應孝經援神契曰天子孝則慶雲見春秋感精符曰南至有雲迎日年豐之象再考雲南通志漢武元狩元年有五色雲見於白崖遣使迹之置大理屬之雲南縣雲南由是得名其後厯晉唐宋元史不再書至明洪武嘉靖間五色雲見於永昌其餘或一二見半屬彩霞亦不移時而散惟我聖祖仁皇帝二十一年五月彩雲見於雲南縣十月五色雲復見於楚雄府是年雲南悉平厯數從前要皆太平寧謐時和年豐之兆至於恭逢聖誕呈現三時厯現二日稽諸簡册從來未有如今日者也此蓋伏遇我皇上大孝格天與穹蒼而協撰至明如日並雲漢以昭回先天後天合德而自呈符驗陽月良月應時而迭著庥徵非霧非煙霱霱皇皇文垂有爛如紈如綺繽繽郁郁瑞靄無邊覩盛事於五華鵷鷺貔貅宛在蓬萊之島紀嘉辰於六詔山川城郭畢收圖畫之中兒童引領以稱竒父老駢肩而志喜屢豐豫卜願大有遍一十五州衆口同聲祝吾皇臻萬八千嵗臣無任踴躍歡忭之至相應恭疏題報伏祈皇上睿鑒施行請添設普洱流官營制疏鄂爾泰為逆夷已靖謹籌建置事宜仰祈睿鑒事竊照雲南元江府所轄車里茶山地方幅􅊷遼闊至二千餘里擺夷窩泥等狡詐獷悍反復靡常今橄欖壩逆夷凶頑橫肆雖復仰仗天威𠞰撫兼施悉已平定但極邊瘴癘之區逼近交緬莽撾諸外域若不設重兵彈壓設專司調劑恐革心不易善後終難臣等詳求一勞永逸之計細籌分防厄要之宜看得車茶十二版納原俱隸宣慰司管轄該土司刀金寶自以不能兼顧以致屬夷肆橫據請分設流官實於地方有裨應將思茅普藤整董猛烏六大茶山及橄欖壩六版納歸流管轄其餘江外六版納仍隸宣慰司經管劃清界址造册達部查普洱距元江府八跕原止設通判一貟並非正印請於普洱設知府一貟鈐束化導并管徵解錢糧地方諸務設經厯一貟看守倉庫禁獄兼司緝捕思茅接壤茶山係車茶咽喉之地請將普洱原設通判移駐思茅職任捕盜經管思茅六茶山地方事務從前販茶姦商重債剝民各山壟斷以致夷民情急操戈查六茶山産茶每年約六七千馱即於適中之地設立總店買賣交易不許客人上山永可杜絶釁端客商買茶每馱酌納茶稅銀三錢令通判管理試行一年之後徵稅若干定額報部再臣等原議橄欖壩擬設知州一貟今查橄欖壩本地煙瘴實甚未便駐兵緊接橄欖壩之攸樂地方以髙瞰下最為厄要亦且涼爽現議於攸樂設遊擊一貟駐劄防範文職設同知一貟與之同城分理地方事務並管各版納鹽井督煎辦課亦俟試行一年之後徵課若干定額報部設鹽課司大使二貟一駐猛烏兼管烏得鹽井一駐整董兼管磨者鹽井同知通判經厯司鹽大使等貟俱隸普洱府屬轄如此則府治既定官守釐然矣普洱改設府治除原有通判一貟外應添知府一貟同知一貟經厯一貟鹽大使二貟再普洱所屬原有生童從前皆赴元江府考試今既改府當另設學校教職應於元江府學調撥訓導一貟董率啓迪前在元江府入學者撥歸普洱府學其童生入學名數照滇省小學事例俟人文漸盛之後另請廣額又邊方營制所以建威消萌最關重大車茶一帶舊隸元江協管轄屬臨元鎮節制汛地遼闊額設兵丁一千名實不能兼顧雖後添設普威一營兵丁一千四百名然自普洱以外鎮沅威逺恩樂等處俱經改流創設府州縣制若再以六大茶山並各版納地方悉令管轄固屬地廣兵單難以分布即便添兵仍歸臨元鎮節制亦屬鞭長不及萬難控馭臣等原議擬將元江協副將改設普洱恐猶不足以壯聲勢而濟緩急也今悉心酌議請將元江協並普威營俱行裁汰即添設一鎮分為中左右三營元江協亦改為一營遊守千把俱照營制共設兵三千二百名元江鎮沅普威車茶等處俱令統轄分汛防守總兵帶中軍遊擊一貟守備二貟千總二貟把總四貟馬步兵丁八百名駐劄普洱與知府同城元江營遊擊一貟帶千總一貟把總二貟馬步兵丁五百名駐劄元江左營遊擊一貟帶千總一貟把總二貟馬步兵丁三百五十名駐劄威逺左營守備一貟帶把總一貟馬步兵丁二百名駐劄鎮沅與知府同城千總一貟帶馬步兵丁一百名駐劄恩樂與知縣同城右營遊擊一貟帶千總一貟把總二貟馬步兵丁五百名駐劄攸樂與同知同城右營守備一貟帶把總一貟馬步兵丁二百名駐劄思茅與通判同城千總一貟帶兵一百五十名駐劄慢顙兼防橄欖壩把總一貟帶兵五十名駐劄猛養千總一貟帶兵一百名駐劄倚邦內撥兵二十名護守磨者鹽井把總一貟帶兵五十名駐劄慢林兼防小猛崙把總一貟帶兵五十名駐劄猛烏把總一貟帶兵五十名駐劄整董其猛旺等小汛渡口十處共安兵一百名所議新設之鎮應裁元江協副將一貟普威營參將一貟除元江普威原有守備三貟千總六貟把總十二貟今安設一鎮四營應添總兵一貟遊擊四貟守備一貟千總二貟把總四貟議設兵三千二百名除元普二處原有兵共二千四百名外需添兵八百名查大理城守營原設守兵一千名並無馬兵一切巡查差遣俱有未便且守兵例不拔補把總該營兵丁亦無進身之路應減去二百名改設馬戰兵八十名步戰兵一百二十名守兵六百名共八百名照雲南城守營之例提標五營額兵四千名內馬兵一千名步戰兵三千名原與馬二步八之營制不合今應於馬兵一千名內減退二百名充入步伍於步兵內減退四百名改為守兵嵗計節省銀共六千一百兩有零又臨元鎮營制額兵二千二百名止該馬兵二百二十名今有馬兵二百四十名亦應減去二十名充入步伍以昭畫一歲可節省銀三百七十兩有零是提鎮兩標兵數無減差遣如常而所節省銀兩每年可敷四百兵之餉即可招兵四百名此外尚應添兵四百名查西藏用兵滇省共派出三千名欽奉聖旨著額外添補三千名臣因不需多兵止合招補一千五百名業經咨部在案今洛龍宗之兵三千名先已撤回前留察木多之兵一千名亦現在檄撤所有額外招補之兵自應陸續裁汰以符舊額請即將此新招額外兵丁就近酌撥四百名歸入新鎮標下以足其數至歸流版納應徵錢糧秋米等項統容確查分晰造册報部新附地方得人最要必須精明強幹熟悉情形而又廉謹老成之貟始可以任撫綏而資控制所有新設文武各貟另疏題補再修建城垣衙署兵丁房屋等項飭行確估一面興工動用銀兩另行報部核銷合並聲明臣謹會同雲南撫臣沈廷正駐劄大理府雲南提督臣郝玉麟合詞具題伏乞皇上睿鑒敕部議覆施行報南掌國進貢疏鄂爾泰為聖德逺屆外國輸誠謹恭疏題報仰祈睿鑒事雍正七年六月二十九日據雲南臨元鎮總兵官邱名揚呈稱雍正七年六月十一日據汛防猛灑目兵康天錫蘇鳳彩等稟報五月初六日老撾南掌國王子島孫差叭目五名先目十二名後生八十名備象二隻進貢天朝懇求總督轉達理合稟明本職即差千總亶國鑑並思茅土目刀興國前往江壩一路接應照管來差頭目人等撥備兵夫護送前來等情又據前委協辦軍務之元江府知府遲維璽報同前事並準撫臣沈廷正扎臣隨會檄雲南布政使張允隨備辦犒賞供應等項令知府遲維璽照管來省並檄總兵官邱名揚如土目土兵內有願留在思茅等候者水土不服亦不必相強仍照常供應去後續於閏七月初一日據總兵官邱名揚知府遲維璽呈稱探得老撾進貢人等於六月初三日到內地整歇地方於七月初六日到關坪地方至閏七月十五日據南掌國蘇嗎喇薩提拉島孫差頭目叭猛花叭猛臘叭細禮松發帶先目人等捧銷金緬字蒲編表文一道赴車里思茅地方軍營投見備極誠懇隨即勞慰賞賚伊等合掌叩頭於二十日職帶頭目叭猛花等自思茅出普洱會同元江府知府遲維璽就公所整肅威儀示以體統復又從優賞賚隨令通事詢問據稱小的們南掌地方接連車里邊界去年有橄欖壩擺夷多事逃至南掌猛灑地界官兵追到並不擾害村寨並不妄殺一人又聽得漢人們説天朝皇帝仁明海外逺人無有不服黃河水清了數月我南掌主子説黃河再不聞清今黃河水清一定是大聖人掌天下因此差來進貢備象二隻蒲編金字表文一道懇求總督奏達見我主子逺來的心等語又問來差金字表文為何寫在蒲葉上據稱小國沒有紙敬天敬佛才用蒲葉寫金字若文書用芭蕉葉寫字其餘俱竹片子寫字這蒲葉金字進貢皇帝與敬天敬佛一樣等語差目內有不服水土者留在思茅等候大頭目等令元江協把總陳綸等率兵伴送隨知府遲維璽赴省聽候等情臣於閏七月二十六日行至江西坡地方據報該叭目等已於閏七月二十日抵省即兼程回省於八月初二日到署來使郊外逺迎俯伏道左於初三日臣隨肅整威儀排列軍容令伊等進見內叭目三名先目六名後生十五名列次叩頭臣傳通事奬勞來使跪稟云南掌小國離天朝最逺聞得黃河水清知大聖人治世小國數年以來安享太平年年豐熟通歡慶沐皇上洪福國主感戴不盡特備土産象隻進貢以展下情祈賜轉奏親叩闕廷等語臣即愷切開示宣布皇仁嘉奬恭順隨加犒賞令其回寓靜候訖臣伏查老撾係俗名南掌係國號方言以水為南以象為掌因水上出象故名南掌即古之越裳氏僻處雲南之極西與交址緬甸交界其人民繁庶疆域遼闊亦與兩國相等頭目名叭者職分極大該國止設五六人今來使首名叭猛花即係掌兵者先目亦係有職人貟後生其土兵也自周成王時獻雉之後數千百年未聞入貢雖元明之初名屬內附然皆迫於壓制並非出自諄誠未有不加兵威不事招致而自效恭順萬里逺來如今日者也兹蓋恭遇我皇上光被四表寧及萬邦聲教無所不通囊括無雷之國懷柔鮮有不至包涵出日之鄉重譯來朝聖人興而萬方作覩梯航致貢文德盛而四夷咸賓敬備鳳闕之威儀不數貢獒於西旅上供鸞輿之鹵簿寧等獻翟於南淮不同赤雀蒼烏徒勞跋涉大異橦花蒟醬空耀珍竒較玉帛於塗山何須誅防風之後至比共球於商代豈必責荆楚之來王斯誠我聖主德無不屆逺無不來風動時雍固無間於外域者臣查雲南向無外國進貢成例而該國敬備表文方物遣使來朝出於至誠據大頭目一名叭猛花次頭目一名叭細里松發并先目二名先臘鮮先籠後生五名波罕醒愠醒惰波亥莫博歪等懇祈親叩闕廷情詞諄切臣謹會同雲南撫臣沈廷正合詞題報恭候諭旨臣即委貟將該貢使伴送至京以昭盛事伏祈皇上睿鑒施行平烏蒙謝恩疏鄂爾泰伏念苗猓之性比於犬羊即不激成亦時反覆總兵官劉起元之罪猶不在僨事而在辱國以全鎮之兵加以所轄三營軍有鎗炮賊只標弩以一當十非關弱強無論未事之先首告造謀者有人密報聚衆者有人劉起元責懲怒罵既不究察亦不防備罪不容於誅即果變起倉猝原無知覺亦當整兵力戰或據險待援勝則賊降敗則自盡猶不失為死事乃並不一戰妄欲招安直至逆猓重圍凶橫益甚猶妄意魯甸不反仍同遊擊江仁賄買賊目欲保全家口奔赴東川致盡被殺於離城二十里荔枝河地面於是賊勢愈熾謂官兵伎倆不過如此以致東城猓屬羣起附和肆布流害人心惶惑據奔逃兵丁客民備述形狀莫不痛心切齒在鎮將之罪即總督之罪此臣之所以慚惶忿恨而刻難自寬也雲貴邊隅盡屬苗猓獷悍愚頑不服約束每有藐官虐民殺兵奪炮而互相隱諱以為老成者凡兹前事人所習聞臣自叨荷殊知寄以重任殫心籌畫矢志清除不量已力不恤人言並非好大喜功實亦隱憂逺慮計五載以來仰賴天威凜遵訓示雖難言條理已少具規模今烏蒙一變儼若不支惟聖明可寬臣之罪天下誰諒臣之心將懦者得以藉口強者亦樂於安身謂苗猓原不應懲創謂邊疆原不必開闢皆鄂爾泰好事皆鄂爾泰啓釁竊恐因循瞻顧復蹈前轍日復一日官復一官數十年後或有事征𠞰則力倍功半猶未可以圖寧事有原因誰實貽戚臣即骨化形銷無辭負恩誤國言念及此寤寐難安故烏蒙逆猓務期立速屠滅俾聲威逺震免生夷心以堅衆志庶此一反覆轉可以謀寧謐慮不止為烏猓事實攸係諸蠻此臣之所以懇請解任督師不欲旁貸者也兹蒙聖恩原宥慈諭屢頒臣自知淺陋不能仰體天心冒昧無辭悚惶倍切至於遊擊汪仁知縣賽枝大等倉猝遇害纍及妻孥著臣查明具奏加恩賞恤捧讀恩綸感深存殁臣現查烏蒙文武各貟內有效死盡命者有奔逃被殺者有牽纍遇害者有衝突茍活者有在外無恙者有因逺幸免者其效死盡命時則遊擊劉崑馬秉倫把總周世美等忿激殺賊各帶重傷陳亡又司獄陳天錫見鎮將不戰於先二日即手刃其妻妾自刎於官署此四貟者忠義凜凜堪膺賞恤如遊擊汪仁守備楊天階千總李發早邰士竒把總張必𢎞王永福外委千總王起鰲王國卿等係奔逃被殺俱無可矜憐如通判劉鎮寶署知縣賽枝大教授李焜知事劉懋美巡檢葉祚徽係牽纍遇害俱堪賞恤如守備金必信巫茂崇千總王家彥蔡之斌把總卜貴汪玉丁蕃劉士俊賴君翼等俱初係奔逃繼衝突茍活者俱應革職究擬因現在軍前效力贖罪俟事竣再議如烏蒙知府陳克復永善知縣杜思賢因公在省署經厯胡珚教諭趙霐先委辦差千總蔣功成養病住威把總李龍施𢎞義差接家口俱在外無恙如典史厲錦巡檢魯進修把總陳聫科鄧又禹俱因逺得免其該鎮兵丁現出隨營者已一千二百餘名仍有陸續投到者尚無確數至於遇害諸文貟多未攜帶妻孥有遊擊劉崑之妻張氏見劉崑傷亡逆衆凶橫遂顧謂二女曰我為命婦汝為官女豈可辱賊乎惟一死以報君恩遂殺其二女時有子僅三嵗張氏囑其生子之妾吳氏汝尚可勿死撫此子以存劉氏後語畢即自殺妾不受亦自殺及恢復烏蒙後􅊧獲劉崑之子並乳母婢僕共五口臣聞信隨令護送至省親視撫養劉崑尚有胞弟武生劉峨義子武舉劉類先俟事少定當資送回籍仍咨明四川撫臣囑加意照看以為忠義者勸其遊擊汪仁之妻並子女僕婢等遊擊馬秉倫之妻並僕婢等又守備巫茂崇之妻把總汪玉之妻及兵丁家口各男婦等共􅊧獲五百餘人現已分養周恤均勿令失所雖大節有虧生死俱無關輕重而至仁普冒鄙賤皆不外生成臣實切感傷亦愈深慚愧謹奏按疏內楊天階李發早邰士竒張必𢎞王國卿五人後復查明俱係死事另疏具題一體賜恤賜書謝恩疏鄂爾泰為恭謝天恩事雍正八年十一月初三日郵差齎捧頒賜臣欽定詩經傳説彚纂二部春秋傳説彚纂二部御纂性理精義二部抵滇臣隨郊迎至署恭設香案望闕叩頭謝恩祇領訖竊惟厚風俗以正人心教莫先於風雅尊天德而崇王道義最著於春秋總皆淑性之書無非會理之要故啓心傳者只十六字而衍妙緒者遂千萬言均為百世之津梁豈獨羣臣之模範欽惟我皇上大孝通神至誠贊化憲章聖祖表彰聖籍知聖聖之相承闡揚心法追溯心源仰心心之是紹遡自開基仁厚化始二南欲知祚永商周功推三頌豳堂觥酒十五國之遺事猶存鎬邑鼓鐘八百年之餘音如在至於體元居正為臨御之大經法祖尊王尤國家之要典三綱已定專藉微言九法既明用伸大義雖四傳黨同伐異均堪以熄邪思就諸家略短取長皆足以維王迹不辭彚粹之力開天以啓蒙用成纂輯之功牖民而覺世逮至周程張邵逺接洙泗之心傳下及遊謝吕楊近窺濂洛之寶笈既幸宋賢崛起得朱子以集其成復覩元儒嗣興至明初而會其説名為性理裒然成編統曰大全亦稱美備然醇駁相間不免於小疵攟托太繁或鄰於寡當欲求精義端賴睿裁兹者仰蒙聖賜自九重而下錫巋然三書爰是俯竭臣愚從五夜以研求豁如一貫三百諷咏美刺具而知賞罰所由生一字褒誅榮辱分而覺興觀之咸備繹風人之旨無非本天理以導人情秉素王之權亦惟藉書法以開至性按其篇簡雖多寡之攸殊原其指歸只萬一之各正倘冀合同而化先須分類以求臣箋愧康成解慚杜預趨庭未學豈曾問業於西河執簡末由寧望贊辭於東魯問天人祕奧罔敢曰知探性命正宗志焉未逮念忠臣孝子思婦勞人凡正變貞淫藐焉乾坤中處要期體胞與於西銘觀五禮六樂八伐九征即中外安攘任其動靜互根總願渾隂陽於太極叨承聖主時聞歌鹿鳴之三受賜天王豈止錫彤弓者一惟一人達天窮理書正月而同歌萬壽無疆將四海率性怡情紀有年而恆聞農夫綏慶臣無任激切屏營踴躍歡忭之至謹具疏恭謝天恩伏乞皇上睿鑒施行請添設烏鎮辨兵疏鄂爾泰為東蒙蕩定威鎮安平請增營添兵以垂久逺事竊照烏蒙一鎮舊制中左右三營領兵二千八百名而威寧鎮雄東川三營又各兵一千名分布聲援原不甚單弱祇緣鎮將庸劣疏於操防兼因姦賊蓄謀出乎意外遂致變起倉卒搖動三邊今雖仰賴天威剋期𠞰滅惡首凶黨盡數就擒然種類繁多邊隅險逺善後事宜尤不敢不熟慮臣查大關永善舊係左右兩營汛地皆緊接川蠻而甕