滯沾爭似此翁長坦腹更無些事上眉尖卧石鴈宕分來一片山搜竒謝客未經攀偶從西域逢東谷别有靈湫祕此間小龍湫驚濤澎湃瀉空來立石分明灔澦堆聞道三巴通禹鑿曽從蠻落把天開小巫峽送客還金陵張以恆一聽驪歌倍黯然臨岐無物贈君還飽餐十九峯頭雪好過江南六月天交水史申義見前屋連菰荇水拖嵐樹杪漁舟出兩三一片清波皴玉冷絶憐煙景似江南板橋驛十里寒山草樹雕津亭風起酒痕消瞢騰記得來時路秋雨秋煙過板橋煉洞曉發黃元治見前青林窈窕白霜寒未到雞山已百盤行過拈花頭一寺老僧無語種春蘭平山盧詢見前平山一帶野雲長煙雨孤村暮色蒼六幅南宮圖畫裏不須好景説瀟湘撫署亦可園雜詠二首甘國壁見前碧雞金馬鎖雙關坐擁貔貅撫百蠻較射歸來明月上鶴鳴庭院自間間古柏隂中結一椽四時佳景足流連到來人盡疑非屋只道維舟花岸邊題大理石十首高其倬見前南徼提封帶百蠻家家家在翠微間點蒼石最諳鄉土不繪平原祗繪山層巒疊嶂者林角才聞布榖聲東風蚤已促春耕吹來朝雨仍吹去更放前溪一崦晴山雨初霽者峰峰拔地並千尋膚寸生雲便作霖都入太虛容載內不齊吹萬付無心羣山傑立者記取風光何處似秣陵春雪未晴時誰知濕靄濃雲裏中有梅花一萬枝雪意未晴者一白廬峰三百里曾騎生馬到其間於今卻曳紅藤杖偎小屏風看雪山雪峯千仞者幾縷晴煙抹翠微東臯巗壑是耶非天涯自白年年鬢緑遍鄉山春又歸碧岫微煙者水清石瘦便能竒恰是東坡居士詩况復雨餘雲破處更當江上月圓時水石雲月者白雲橫鎖碧山深似有仙源徑可尋擬覔漁舟問消息且憑流水洗機心雲山有徑者燒痕漸沒草痕新淺碧輕黃染未勻最是年光剛好處溪山消息入初春淺緑微黃者山影一痕眉倒暈水光萬頃練平鋪惠泉亭畔煎茶後憶得峰頭看太湖孤嶼平湖者勸農八首天章垂象麗昭回萬里宸心念草萊行者勤農頻奉詔尚書親為課耕來千畦碧毯稻初抽龍尾車鳴澮水流從識太平真氣象緑簔黃犢遍青疇栁外烏烏拍手歌耕餘小憩坐坡陀誰知不按宮商處一段中聲近太和荷筥嘻嘻婦逐姑饁耕南陌走相呼破衣敗笠偏珍貴堪入風謡與畫圖高墾山巔下水湄白頭田父跪陳辭五風十雨三時順始是殘年飽飯時隴畝今年異昨年東隅荒棄種西偏刀耕爭敢遺餘力滇土原多歇歲田力穡今年倦入城疲氓怕聽打門聲但教守令平徭訟不下衙階已勸耕漫因作苦輒嗟吁勞力原非賤丈夫説與青箱呈種事耕犁天子歲親扶登安阜閣望金馬碧雞山鄂爾泰見前碧雞金馬神仙窟踏月梯雲結構牢欲躡塵蹤訪靈迹漢廷舊已薄王褒西郊觀禾四首青梭白板度紅旓一抹黃雲海樹交料是田家炊豆粥濕煙細縷挂林梢荍麥登場稻偃塍茅綯初引架溪稜坡田水牯蕭間在米熟行將問老能手鐮腰索正匆匆賽鼓偷撾拾穗童笑問老農親向説今年尤較去年豐對掌千家枕水居誰從海上見鰩魚果蔬麻菽皆熙景不比尋常當喜書二色蓮又名鴛鴦合樹駢花紅白各半殆異種不恆有也盆池中得二本羣尤以為瑞因作二截句志之濯錦籠煙乍見疑兩般顔色一莖垂吟花莫泥漁洋叟不似紅兒對雪兒阮亭句花似紅兒對雪兒漢臯雙女並肩長又見徐娘半面糚若使霍家池上有不應水底鬭鴛鴦次韻秋海棠四截句古屋牆根一抹勻朱絲半軃泥苔茵誰能更憶香霏閣叉手齊吟八月春秋海棠一名八月春香霏閣昌州郡守花時延賞所也猶憶春前睡起遲捲簾側卧挹仙姿碧雞坊底今重面不似南充乍見時南充樊亭看海棠豈知更有碧雞坊放翁句也滇碧雞坊在城南二里雨泣煙愁舊是家香肢無力倚屏紗阿誰重按宣和譜寫入秋窗沒骨花宣和畫譜徐熙有沒骨海棠意惟秋海棠雅稱斯品耳一髮輕紅淡欲沉雨餘庭院和愁吟秋娘莫恨梅花約許聘西廊白玉簪燕子崖聞猿按察馮光裕代州矗矗青山漠漠雲中間一線劈天分行人已不堪回首更對哀猿叫日曛滇南雜詠三十首督學吳應枚烏程迎年治具盍朋簪圭竇光微屋宇深待覓氍毺姚楚遠清香滿地灑松針新正元旦民間採松針鋪地以代氍毺名曰松衣姚安楚雄出花氈紅章白質燦然可觀挂簽五彩當門揚對幅雙題比户封晨起炷香酬祖德家家街植兩科松歲首鏤彩紙或結成毬懸門額名曰挂簽斫松枝髙丈餘夾植門外插香松上以迎祖考潑眼花光處處皆不留缺地巧安排緣塍緑鯁金綱纂壓瓦黃森石斛叉金綱纂緑色無枝葉似仙人掌而方刺密有毒用代籬落金叉石斛性喜燥植屋上更茂盛梯田百級計雙耕曲直高低地勢成芒種未過秧出水山農日日聽雷鳴梯田以高下形似名候雷雨而栽故又曰雷鳴田傭工力作不計畝計工謂之曰雙亦耦耕之意碩果何曾墮雪霜樹頭數載歷青黃餉君佛手柑如斗漉取珠槽半甕香佛手柑有歷四五年者取以釀酒味香辣井滷煎熬抵海沙釜形半破或如瓜年來鹺政清於水無復心驚普洱茶迤西率多鹽井煎熬成塊普洱産茶舊頗為民害今已盡行革除矣斤斧難施旦旦樵山根緑樹達山椒無端野燒燔空起遮莫來年好種荍山多雜木今歲燒荒明年始可種荍所謂火種也寺前白塔卓三錐禪室叢叢徑委蛇繞盡周廊多古碣黃華手拓老人碑大理府城多古剎三塔寺最大寺中有金黃華老人王庭筠所書四絶句碑字極蒼古榆城士女競喧豗蒼雪三春凍未開鳳眼洞連三塔寺邀儂十八趕街回季春十有八日榆城大集百貨皆至鳳眼洞在三塔寺東螺髻層層辮髮旋黃金耳墜一窩圓孽龍枉羡丰姿美新製盤雲哈噠氈舊傳洱海有孽龍能攝人今榆城婦女多戴哈噠氈帽製類雨兜以避龍祟云經傳白馬字全訛鳥迹蟲書少磔波垂老夷人知佞佛齊將鈴鈸佐咿唔僰夷誦白馬經以祈福文字支離不可辨識蒼龍互脊稜稜碧峻極中峰未許攀薄暮濃雲深護頂凌晨積雪滿煙鬟點蒼中峰高入雲表終年積雪春間氣暖日亭午雪漸消傍晚黑雲蓋山頂明晨起視積雪滿山次日復然十九峯凹十八溪溪溪溪水漾玻璃崖隂定有潛蛟卧噴出清流灌稻畦點蒼山有十九峯峯隂十八溪陂田藉以灌溉宛轉紅牆緑樹縈感通佳處試茶鐺望中洱海開奩影照出山腰玉帶橫感通寺在大理府城西産茶曉望蒼山白雲如帶橫束山腰土人呼為玉帶雲到小雲南一水通飄揚血色綺羅叢莫教擔雪街頭賣剩取璚漿染大紅雲南縣俗名小雲南土産細布名洱海紅以雪水染色更鮮艷雞足名山古道場西來迦葉意茫茫半空雲影明於鏡法界三千照佛光雞足山在賓川州東乃迦葉道場寺院最多林巒深秀山頂白雲橫空照見人影洵竒觀也百丈奔湍勢擊撞鐵絙貫石駕成杠驅車徑歷鞦韆板懸度遙連澑筒江滇中鐵索橋最多惟保山縣跨瀾滄江者長三十餘丈車馬往來裊裊浮動澑筒江接滇境懸繩兩岸以渡人馬西連孟緬障南陲百戰雄風劫後棋獨有方塘一泓水至今人説易羅池永昌府界西連孟定緬甸等處乃蒙段用兵之地易羅池在府城西龍泉門外俯龍泉地湧琲珠荇帶穿流過水亭成巨浸茭蒲渺渺一湖煙龍泉亦名噴珠在永昌府城西門外水從地湧瀦而為湖宛然江鄉風景掃除伏莽靖蠻煙爨僰輸誠授一門里日暮魯魁山下路何人敢索保頭錢魯魁山在普洱境內舊為夷猓出沒之所今已成通衢矣剁生盤冷佐椒馨佳節星迥回味薦腥醉爇松明照田畔要憑炎火逐蝗螟六月二十四日為星迥回節切生豬肉雜椒薑食之燃炬以多為勝攜照田塍云可避蟲迤東西處處皆然春溫藹藹四時花當暑無煩御葛紗間憩栁陰思解渴賽紅爭劈蜜瓤瓜滇南之花四時不絶炎夏亦同春令指西瓜辨其紅白以為勝負謂之賽紅偕張覲臣撫軍吳穎庵學使倪穟疇張南華兩總裁遊近華浦和南華即事口占原韻十八首總督尹繼善滿洲雨歇寒流亂野溪晴雲遙指碧峯西無波不覺扁舟小短纜徐牽過栁堤遍地西成眼乍明歡歌聲裏午風清年豐自有田家樂莫認兒童竹馬迎一望高低盡海田今秋收穫倍常年秧雞茭笋爭投送笑説農家味更鮮落葉蕭蕭拂面飛韶光轉眼已全非披裘尚覺寒侵骨野老人多未授衣婦子嬉嬉列短壖嘉禾搬載滿漁船自來邊地農桑貴緑栁黃花不值錢寶藏爭傳出永昌纏絲瑪瑙閃金光盛朝不尚珍竒貢琛獻無煩逹上方纏絲瑪瑙質白絲紅宛轉如繪金光閃似水晶俱寶石也邊隅生齒今繁盛簇簇嬰孩裹繡綳村媪山農齊襁負馬前羅拜乞題名按試迤東經過村堡男婦抱孩童㩦紙筆環拜乞名每至擁擠不前列炬光回學海澄煥文燎火證元燈藜蒿寨是芙蓉鏡不用扶鸞事可憑臨安府學泮池深廣名學海面煥文山山頂藜蒿寨夷人所居每當大比於六月星迥回節視池中火影卜鄉薦多寡歷科不爽竒觀第一推閻洞鬼斧雕鎪未易成真向七條橋上過仙枰坐隱聽濤聲臨安閻洞舊名巖洞今名雲津洞深二十餘里廣二十餘丈石乳凝結千態萬狀內有大河清流奔駛浮橋橫互凡七最深處有石楸枰一石坐具二云係飛仙遊戲處嗚咽蘆笙和口琴依稀聲調雜南音新腔草稈何許打莽伏於今盡革心蘆笙口琴猓人樂器其音悽以怨打草稈曲調名男婦皆能歌之蓋取撲滅醜類之意陂隂雨後擷蒙菱土鬯匕玉版應甘拜下風蓴滑菌香雞跖美嘗君兼味耆皆同雞菱土鬯匕産蒙自者佳味極鮮美燃香走病拜黌宮指按碑文義未通笑向兒夫問何字悔教雞卜驗維熊臨安人於元夕炷香拜學宮謂之走百病就香光中摸索碑字以占一年休咎雞卜用雞骨為卜夷俗也巧聨花串理殘糚金步搖垂綴耳璫小繖避人窺半面一窩雲繞瑞香香阿迷彌勒等處婦女出門率持小綵繖線穿瑞香成串盤髻上云仿宮粧也萬頃昆池萬疊山澄波倒影照雲鬟華峰削出芙蓉面仰止心殷未許攀流水無心解送迎湖邊置酒趂初晴塵機到此都消盡惟有清風滿樹聲參差掩映一房山楓葉蘆花隔水灣既説江南相似好臨風何事憶鄉關穟疇有憶家山句不辭前席再稱觥對景還期為寫生南華工畫誰識詩中先有畫湖山點染任縱橫曲曲回廊徑轉幽風帆過影逺來舟煙波更有極深處坐看遊魚共泛鷗亭有煙波深處使節天南仰斗星文光一色接青冥試看海上筵開日面面蓬山拱翠屏縱目軒窗遍十洲欲窮千里又登樓倚闌不敢頻回首東北蠻煙未盡收别院清幽一草堂臨淵興羡已相忘池魚自任間遊泳密網何人復舉綱時有獻小魚者古樹蒼蒼古寺宜西風謖謖動虬枝扶疏自作干霄勢不逐柔楊到地垂人醉詩成罷詠觴迥回舟水面晚風涼揚帆漸覺湖光遠一路寒山翠夕陽回首依依仔細看暮雲遮斷碧峰寒煙凝遠浦人歸去秋水長天色一般羣峯拱向五華開指點長松天半栽佛手香中人笑語風吹孤月自東來清光如晝豁雙眸難得同心夜泛舟好景分明看不盡此行誰説夢中遊南華舊夢遊滇補遺本朝登繡嶺大覺寺放雪樓七言律吳應枚見前誰從峻嶺駕危梯千仞蒼山勢欲齊晃眼雪光當檻落蕩胸雲影拂簷低塵纓有客能餐勝覺路何人為指迷萬疊林巒成繡錯登臨我亦羡巖棲石峯古剎七言律古寺懸崖磴道回石林陰鬱起雲雷風吹黑水排空立地湧青蓮逐瓣開高岸千檣森轉向平疇萬騎剨爭回一峯倚閣供題句誰遣飛仙弄逸才雲南通志卷二十九之十四
