考拔除應添各貟并烏蒙鎮標現在各貟缺一面另疏具題恭候聖旨外臣謹會同雲南巡撫臣張允隨駐劄大理府雲南提督臣哈元生貴州巡撫臣張廣泗駐劄安順府貴州提督臣楊天縱合詞具題伏乞皇上睿鑒敕部議覆施行雲南通志卷二十九之五欽定四庫全書雲南通志卷二十九之六奏疏本朝三修濬海口六河疏鄂爾泰為報明修濬海口大修六河並請定章程酌留需費以興水利以濟民生事竊以雲南省會向稱山富水饒而耕於山者不富濱於水者不饒則以水利之未講或講之而未盡其致斯不能受山水之利而徒以增其害也故籌水利莫急於滇而籌滇之水利莫急於滇池之海口其上流為昆明呈貢晉寧昆陽四州縣下流為安寧富民二州縣一水所經為六州縣所係疏通則均受其利壅遏則均受其害故於滇最急滇池之源來於北城之盤龍江經城之東而流於南會呈貢晉寧之水瀦而為池折而西流至昆陽州界復北折而倒流由石龍壩至於安寧富民之北而入於金沙江此滇池之形勢也滇池即昆明池土人名之為海海之大周圍三百餘里環海之田資以灌溉號為膏腴者無慮數百萬頃每五六月雨水暴漲海不能容所恃以宣泄者唯海口一河而兩岸羣山諸箐沙石齊下沖入海中填塞壅淤宣瀉不及則沿海田禾半遭淹沒明𢎞治時巡撫陳金開渠濬沙築壩鑿石民困以蘇自此遂有嵗修大修之例而不知海口之內有牛舌灘洲二處梗塞其中致海口內外不能通暢萬厯初復興修作亦只於牛舌洲之左豹子山之下竭力疏濬其根未清故其患未息至今嵗修嵗壅殊非長策臣委令糧儲水利道黃士傑親往查勘令將海口河道溯源窮流逐一修濬務期利興害除毋為茍且補苴之計嗣據黃士傑回報勘得海口一河南北兩面皆山俱有箐水入河每雨水暴漲沙石沖積而受水處河身平衍易於壅淤如北有白塔臘龍二箐水合瀉入河名洱宗閘壅淤之患猶小南有瓦泥箐邢家園二水屬呈貢縣轄名普安閘有羅武箐一水屬晉寧州轄名清水閘有天自芭蕉二箐水屬昆明縣轄名新村大閘皆直瀉河中每疏濬於農隙之時旋壅塞於雨水之後不穵則淹沒堪虞開穵則人工徒費沿海人民時遭水患皆甚苦之行至平定哨一閘係雲龍箐水歸河之道正值水陡流急之處相度形勢咨詢輿情咸稱閘南宜開子河一道引普安清水新村等閘諸水同至平定哨閘入河則泥沙石子不能停住一勞可以永逸復行至海口駕船循視見有舊埂一條沉埋橫塞其中埂外龍王廟前有牛舌灘又側而下有牛舌洲俱阻攔出水不能直泄詢諸土人此從前築埂以濬海口之遺基也其一灘一洲自古所有原未議修隨於大海近崖處用竹竿試探水深八九尺出海口外於龍王廟左海門村試探水僅深二尺五寸於龍王廟右近豹子山之牛舌洲試探水則止深九寸皆因三重壅塞不能暢達以阻海口出水之咽喉因令各為丈量牛舌灘長五十七丈上廣十丈中廣十六丈下廣九丈頂高一丈牛舌洲長五十八丈上廣九丈中廣十三丈下廣九丈頂髙一丈二尺應將此一灘一洲并前一埂盡行穵去則海口疏通沿海田地自無淹沒之虞等情臣復博訪確查即分委昆明呈貢晉寧昆陽等四州縣照議督修其所用人夫即令四州縣按名發給口糧并鹽菜等項雖佚道使民歡欣不怨而急公往役體恤宜優於是各州縣人民皆踴躍從事於雍正七八兩年農隙之時興工所有海口河道洱宗普安清水新村等閘壅淤處所悉已疏濬所有老埂牛舌灘牛舌洲等處盡行穵出悉已寬深所有平定哨閘南新開子河一道悉已修通復因晉寧舊河水陡流急阻回新河之水並新建逼水壩一座新河悉已暢流歸入大河又於海口外之石龍壩兩岸山腳俱新築堤埂保障河基悉已堅固所需物料并人夫口糧鹽菜等項合計銀五千六百三十餘兩臣已設法辦理現今四州縣沿海沿河及近海口內外居民既免淹沒并涸出膏腴田畝甚廣現在飭查另册具報此在省河道之大宗也至於四境之內河道甚多條分派别各有源流而其最大者莫如盤龍江由嵩明州邵甸里之黃龍冷水二洞及黑龍潭曲折三十餘里至省城東北盤繞於城之東南西三面至西北而入於海故曰盤龍江據委姚安府知府臧珊原任廣西臨桂縣革職知縣劉永濬查勘估報盤龍江修濬河身河尾炮砌石岸壩閘並應增開各子河新築各堤岸應需物料人夫口糧鹽菜等項共估計銀三千二百三十餘兩其次如金稜河自元時咸陽王薩達克齊以郊田多水少乃引盤龍江水於松華壩鑿河一道溉田甚廣名為金稜河俗稱為金汁河據委永昌府同知甘士琇昆陽州知州劉際平查勘估報金稜河自松華壩至海尾約六十餘里應添修石岸及新開泄水石閘二處需物料人夫口糧鹽菜等項共估銀四千三百九十餘兩又次及銀稜河其源出於城北二十餘里龍泉觀之黑龍潭會白龍潭水經商山麓亦繞城東南曲折入海今開通子河並岔河分入盤江據委安寧州知州楊若椿查勘估報銀稜河即銀汁河自黑龍潭至馬村通計上下流約二十餘里蒜村一瓦水白龍寺文殊寺等閘並兩岸堤埂俱應加修需物料人夫口糧鹽菜等項共銀四百一十六兩其次如寶象河在城南二十里其源有二一自屼山小龍潭至板橋之東一自黃龍潭至板橋之西於明隂寺前二水會流由官渡以至海約八十餘里據委通海縣知縣臧在莘元謀縣知縣樊好仁查勘寶象河至小板橋分為三支一曰猓羅一曰官渡一曰舊門溪堤埂壩閘俱請酌量砌炮石岸加築髙三四尺不等需物料人夫口糧鹽菜等項共估銀一千一百四十餘兩其次如海源河據委麗江府知府靳治岐查勘海源河自海源寺至海約二十餘里兩岸土埂俱宜寬修班莊上下暗洞並沙河堤埂應修築髙厚需物料人夫口糧鹽菜等項共估銀二百五十餘兩其次如馬料河據委署嵩明州知州張浩查勘馬料河自黃龍潭至海約七十餘里有白營村豬圈壩上壩溝清明溝以及橋梁二道除人夫照例外所需物料共估銀四百九十餘兩又次如明通河其河由三元石閘引注為金稜河之分派據委澄江府知府王鐸署晉寧州知州章倫查勘明通河自白沙橋至海尾三十餘里兩岸堤埂甚屬低矮河身窄狹應修寬券石橋二座砌過硐二處需物料人夫口糧鹽菜等項共估銀四百一十餘兩又據委試用知縣以下羅仰錡查勘馬溺白沙二河其源來自放馬橋至海約二十餘里應請兩岸加髙二三尺河身深寬三四尺需物料人夫口糧鹽菜等項共估銀五百二十餘兩以上各河共估銀一萬八百七十餘兩復經委布政司糧儲水利道親勘確核據報無異所有應需銀兩臣已於查出各項田地變價銀內動用令及時辦料興工另疏題明外臣查海口六河並各支河皆足以資灌溉而備蓄泄獨因淤塞日久開濬少難以致水不注海田僅通溝髙地惟望雷鳴下區則憂雨積此稻糧豐歉之故實人民苦樂所關如果山潤以水水艮以山俾彼此相資互得其用則旱潦可為轉移荒瘠早施補救人力既盡天必垂憐此臣之所以由近及逺厯日積年務期通行成效勿敢怠忽勿敢遺忘者也惟是既興工作宜定章程庶可以經久而不致廢墜查雲南府原有水利同知昆明海並六河以及各支河巡查濬修是其職分應請鑄給關防重其考成勤則奬敘惰則參罰其昆陽州為昆明下遊海口在焉距省百里同知難以兼顧請於昆陽州添設水利州同一貟駐劄海口常行巡察遇有壅塞不時疏通設或沖塌立即堵築亦請鑄給關防照設書役以專責成至於通省各府州縣皆有水利原無專貟諉卸因循託辭藉口若將同知通判州同州判經厯吏目縣丞典史等官加以水利職銜凡境內河道溝渠責令專理除雲南一府仍歸糧道管轄其餘各屬在迤東者統歸迤東道管轄在迤西者統歸迤西道管轄仍令各該府查勘驗報各該道考察詳明聽督撫二臣核酌勸懲則不二三年將通省水利有興無廢而克濟民生殊匪淺鮮矣抑臣更有請者昆明之六河昆陽之海口及臨安之三河所關尤巨嵗修銀兩不可不酌定查各項正歀固不應擅那即各項盈餘亦未便濫費惟鹽道衙門嵗有合稱銀一千五六百兩不等並不在正額盈餘額外盈餘及各項積餘之內而鹽道張無咎絲毫無隱請即以此項撥作嵗修之用昆明六河酌定八百兩昆陽海口酌定二百兩臨安三河酌定三百兩用則報銷仍造册送部不用則存貯並撥餘銀兩統數積存以備大修之需似於水利民生更有裨益除將通省水利並達川粵河道已竣未竣現勘加修各大略彚敘題明外所有修濬海口大修六河並請定章程酌留需費情由臣謹會同雲南撫臣張允隨合詞具題伏祈皇上睿鑒敕部查議施行興修水利疏鄂爾泰為全滇水利己未興修彚敘陳明仰祈睿鑒事竊惟地方水利為第一要務興廢攸係民生修濬並關國計故無論湖海江河以及溝渠川澮或因勢疏導或盡力開通大有大利小有小利皆未可畏難惜費忽焉不講者况雲南跬步皆山田少地多憂旱喜潦且並無積蓄不通舟車設一遇愆陽即頓成荒嵗從前市米一石有價值十兩十五兩之年前事後鑒敢不預籌是以臣自涖任以後仰體我皇上愛民務本之至意即詳飭通查令凡有水利母得膜視并博採輿論合看繪圖務期矢此恆心用資綿力但於治有小補庶幾慮可少寬志未嘗不如此乃迄今六載雖亦次第舉行然興修已竣而獲水之利者僅半已修未竣已竣未妥並應修未修委勘未確者居半現無成功何論久逺用深歉仄切望羣材此應了未了事所當分晰開明陳請聖鑒者也除昆陽海口及盤龍江諸河興修情由已另疏具報外查雲南府屬嵩明州之楊林海又名嘉麗澤納龍巨南衝二河之水並受四面山河各水會聚成淀出河口入車翁江達金沙江因河彎迂曲去水甚緩停留沙石壅塞咽喉每將海邊四十八村已成田畝半行淹沒厯為民患臣詳加察訪海水深止二三尺若改疏河道由丁家屯龍喜村開穵二里許直通河口使新舊兩河並瀉水勢暢流不獨四十八村可永免水潦而周圍五十餘里草塘均可開墾成田隨於雍正五年秋委貟會勘並先將厯年阻撓之襟棍二人枷示河干限以工完釋放於是各士民歡呼踴躍情願出夫僅資給口糧並未多費於雍正六年春報竣從此田畝嵗收並涸出田地一萬餘畝再府屬宜良縣窪地多淹髙地無水旱潦不均有需調劑臣先於雍正七年據前任知縣邢恭先詳稟飭諭興修隨於八年春報竣續復委貟覆勘所開河共五道一在城東北五里五百户營之南開長約五里已通池江一在城東三里龍王廟北舊多積水開長約四里亦瀉於池江一在龍王廟南為北來諸水所會開瀉水河約十里水不為害一在城南二十里地名乾墩子緣地無水池一望平衍廢為棄土於池江邊決一水門開河一道引肥水灌田現已獲濟惟自江頭村起所開引河一道地形漸髙水勢難上殊無益灌溉徒費人工復議自胡家營北接舊河另開一道約長五六里甚有裨益現飭於農隙興工約明年春可竣又臨安府有瀘江一水來自石屏州之異龍湖合塌沖象沖二水及六河九洫皆會於瀘江以赴巖硐伏流十餘里出阿迷州入盤江而硐口硐底石埂十三重阻水不能直瀉每遇夏秋暴雨奔湍四潰田廬淹沒土人稱有神物憑巖欲伐巖石輒有風霾砂石必中傷人經委前任知府張無咎鑿石疏河椎鑿不能入強入不寸許旋果風起砂飛炮礫從空擊下斷工人一指臣據報謂神以庇民豈以虐民總制奉天子命除患濟民而神弗許是神不靈隨通以誠告以正遣張無咎以文祭畢復督工鑿石應手而碎十三重立盡復將自瀘江至巖硐堤岸八百一十丈自塌沖二河至三河口堤岸四千三百七十五丈并造橋丁樁穵淺諸件一併築修於雍正八年四月內報竣現已有利無害禾稻倍收再府屬之建水州查自南莊十六營以下暨獅子口郭衣村等八處田地甚多苦無活水但雨澤稍遲即秋成失望前任知州祝宏以附近南莊之李浩寨山腹中有過泉一道細流不息入地無蹤曾竭力開穵不能疏通稟報臣令以穀粳填入向下尋流約三十里流出於州屬之老鼠窄知為此泉無疑遂穿鑿地道伐木為廂穴中水湧勢甚湍激隨復開溝導水儼成大渠並酌定規條令挨次引灌而該地田畝皆賴以豐收於雍正七年四月報竣府屬之阿迷州離城里許有小河一道厯來不通舟楫該署州漆扶助遵檄疏濬自水泉下繞州城由祿豐鄉直達盤江計三十二里現可行舟於雍正七年八月報竣府屬之蒙自縣有縣壩一區圍繞城外平坦寬闊可成沃壤因灌溉無資遂棄為曠土查有城南學海據壩上流亦經淤塞若濬深數尺建閘築堤開溝引水即可以肥田雖工程不易舉而衆願速成該知縣王廷諍於雍正七年興修八年冬報竣又曲靖府屬之尋甸州城南平川沃壤皆可墾土成田緣尋川一河會尋甸嵩明兩州之水每夏秋積雨一望汪洋加以馬龍州河水又會於七星橋下衝激尋川之水逆流泛濫即附近熟田亦嵗被淹沒土人謂自古相傳捍禦無策臣熟籌博訪就其山形水勢及逺近髙低欲使尋川河順流直瀉必先使馬龍河不爭水道欲使馬龍河不爭水道必須另開子河俾尋甸嵩明之水皆得暢流並可免衝激不至泛濫今於雍正七年春面諭升任知州崔乃鏞查勘督修隨於是年十月興工八年春報竣共用工三萬七千有零約可涸出田地二萬餘畝但大河中流有整石四十餘丈務須開鑿而施力殊難復議另濬沙河十五里以收全功現委迤東道遲維璽就近督修又澄江府城南之撫仙湖延袤百餘里中流深處可百餘丈以受各山之水亦名為海由寧州入阿迷注盤江會流以達粵境每雨多水沙宣泄不及則附郭之河陽並江川寧州三處利害共之惟海口一河尚堪疏泄而山溪水漲推砂滾石壅積易而通暢難明巡按薑思睿曾建牛舌梅子箐二壩撼兩山之衝激遏砂石之壅淤今石壩傾頽更無可恃據該知府王鐸詳請興修臣隨發銀委辦計石工一百七十六丈零首尾寬深堤壩堅固又增築逼水壩六墩以固石壩以滌岸砂於雍正八年興工九年六月報竣河陽田新涸出三千餘畝舊田遍種現獲豐收又楚雄府屬之鎮南州舊有水塘築堤積水以資灌溉名干家壩因傾廢百年水無停蓄一遇亢旱種插並難臣面諭該知州金鑑確勘詳覆其水來自北山龍王廟及多蕨厰等處兩旁坡巖壁立四季泉源不竭會流箐口兩山回環儼如門扇基址天成蓄水成塘可灌數十里田畝隨發給銀兩令築壩建閘全用大石并將外口開穵寬深毋得省工惜費於雍正八年六月興工掘出千家壩舊碑一版復指其缺略示以堅完於九年三月報竣據稱不獨可灌千家并可以周萬户矣又東川府雖倚山臨川不通河道種稻田者無多餘半為荒土而城北蔓海一區寬長二十餘里地本肥饒因積水難消棄置已久自割歸滇轄臣經發銀數千兩令前任知府黃士傑於雍正五年開河三道一從馬五寨至魚洞二十里為左河一從瓦泥寨至水城二十里為中河一從拖落村至魚洞二十里為右河建石閘二座木橋四座水消田出業招民承墾劾守羅得彥又從馬鞍山開河一道約長十里以濟蔓海從梅子箐開河一道約長十里會合中河及知府崔乃鏞接任於九年正月加修旋據報竣其餘如嵩明州之寬郎河效古日足二里田畝同資灌溉因分水不均里民爭控飭令開子河一道俾兩里均平九年四月報竣宣威州舊少水田僅資蕎麥知州漆扶助於雙龍山泉會合處建石閘一座於戈山河口建石壩一座左右各開渠一道於嘉惠落水洞旁建石壩一座開渠一道截流引水均可墾田俱於九年八月報竣祿勸州地僻土寒穀難成熟惟正東東南等村可以種稻內有馬家莊等處田髙缺水舊有水溝一道久經壅塞前任知州賈秉臣請從山腰紆折鑿石成渠匯復溝水可灌田數千餘畝於雍正四年八月內發價飭修不數月報竣大理府洱海之海口為附郭之太和及趙州鄧川三州縣水利所關因壅塞多年每遇雨水泛濫海田多傷據前任同知佟世蔭等詳明興修水得暢流田禾攸賴於雍正四年內報竣又雲南縣有團山一壩舊立閘三道引梁王山泉灌溉田畝嵗久傾圯難資引灌因開修溝閘並濬清海尾赤河尾業經報竣浪穹縣因湖水泛濫疏濬鳳羽河等處築堤四十餘丈廂木匱五十架業經報竣但補苴一時尚非逺計現復委勘加修永昌府城外有南北兩河田畝攸賴因壅塞已久嵗損禾苗據該鎮府等倡率兵民用夫一萬餘亦於雍正四年內報竣以上各件工有大小時有遲速或給發承修或騰那濟事或奉行官吏加意急公或本地士民出夫協力並未動項皆已完工內有仍需加修者亦不過增補其各屬地方如堤壩墟埂溝洞渠塘等類隨時疏築各有稟詳事件零星俱無庸開敘此外如臨安之建水石屏俱受廬子溝之患嶍峨之城垣田廬俱受練江猊江之患曲靖之西瀟湘南寧之落水洞羅平之西北一河新興之玉溪路南之蠟甸和曲之紅土田趙州之彌渡雲南縣之馬安鄧川之苴彌浪穹之寧湖皆應疏濬開鑿俾有利無害祿豐縣之宜重修廢橋定邊縣河之宜建石堤永北府之羊保山宜建石壩順寧府河之宜建鐵索橋皆應乘時料理庶力少功多至於通粵河道最關緊要非止便客商實欲資糧運臣於雍正七年春即發銀飭修已由阿迷州以下開至八達共一千五百里造船試行直至土黃有旱路二跕亦經置備車牛並蓋棚店下船至剝隘則徑達粵江因委總理之被劾原任廣南府知府賈秉臣草率粉飾並未徹底開通故雖勉強行舟河路尚屬危險現復委貟確勘妥議增修又嵩明州之河口經尋甸東川由牛欄江達金沙江周環川江復扺昭通以通舟楫雖工程不易亦人力所能現委試用知縣以下趙世綸等備細估勘繪圖覆奪若得川粵江河舟通滇會則片帆可達吳楚又不止尋常水利事矣以上各件臣已切囑司道並詳諭各官實心措辦所需工費請於變價銀兩內酌量動支敢或藉端侵冒及茍且塞責者立即揭參以為膜視公事者戒惟衆志若一期在必行庶百務無難皆克有濟且各為地方貽永逺利賴之善迹以仰副我皇上厪念邊方之盛心亦所以自求福而與有榮幸事也所有全滇水利己未興修彚敘陳明緣由相應會同雲南撫臣張允隨合詞題明伏乞皇上睿鑒敕部查照施行委貟赴昭辦理開墾疏署三省總督高其倬見前為報明動項委貟開墾昭通田畝仰祈睿鑒事竊照昭通地方新經綏靖兵糧民食俱關緊要昭通田土肥腴宜於稼穡開墾一事實為先務業經督臣鄂爾泰創始料理瀕行諄諄以尚未竟其事為臣言之臣查昭通一郡四面環山兵米自外州縣運往轉輸不易若本地耕穫有資於軍糧甚便且田疇漸廣則民户日增可以填實地方可以移易猓習事屬有益既不可緩而轉瞬春耕時又將屆臣隨一一酌指檄令布政司葛森糧儲道黃士傑議詳商同撫臣張允隨批定并遴委楚雄府知府儲之盤帶領候補府州之顧維鑄錢煌學習進士黃士鑑試用胡珚前往昭通專辦墾務令昭通府廳縣亦行協同辦理又令附近昭通之尋甸等各州縣招募習於耕種之農民一千户限於正月二十日以內到昭令委貟儲之盤等將昭通所有之田詳細查看分為水旱生熟四項凡其處水道田塍俱皆現成曾經種過稻穀而現今拋荒者此種之田用力少而成功速當年墾種即可收成令作為熟水田其地有水可引宜種稻穀而從未經種者作為生水田至於只可種植雜糧不能開為水田者作為旱田亦分生熟二項俱令一一查明除今年已招墾之七百餘户仍令將原墾之田照舊給令耕種外其餘田土俟新招墾户到昭之時每人給以田二十畝此給田之處先儘熟水田給墾熟水田給完再儘生水田給墾生水田又完然後以旱田給墾但旱田厯來猓户種者居多又須將旱田之附近新經安插之猓民住處者先儘給猓民餘剩者給墾户耕種其兵民從前已給田今凡兵户現實有人墾種者亦令每户給以二十畝令其種植所給與兵民猓户之田俱令於分給之始即立清界限以杜將來紛爭影射之葛藤其田按年陸續收其稻穀照時價計算扣還工本扣清之後即令起科納賦納賦之處仍即令輸米以供兵食以省運費其田給與執照永逺為業至招往之墾户臣查自各州縣前往招通道路﨑嶇今天時正值寒冷之際沿途食物稍貴臣又酌量計其在途之時每墾户每站大口給銀五分小口給銀三分俾添買柴火食物使之踴躍前往爭先應募不誤春時墾耕之期再昭通又有一種土人類於熟苗向來昭通猓人多不種稻皆令此種人為其佃户納租供食其人勤於耕種性甚淳良今已不屬猓户正可資以力田在彼既喜於安業在官又可省多費臣亦令辦墾各貟酌量給田令墾照民納穀總之此開墾之事田畝分定之後即令辦貟分往田間朝夕看視勸戒以分墾户之勤惰臣亦不時查察以考辦官之勤惰務期於來年二月之內一例開耕儘力墾種期於秋成之後所收穀石即有益於當年之兵食所有赴昭辦理數貟臣亦酌量給與日用盤費此開墾各項之用約需一萬數千兩臣先請於開墾捐納項內動用俟墾户陸續按年扣還原數其項欵細數難以預計容臣辦定造報具題送部查核臣謹先將委貟開墾昭通田地動項辦理緣由會同雲南巡撫臣張允隨合詞題明伏乞皇上睿鑒敕部查照施行酌籌滇省糧賦疏巡撫張允隨奉天竊查滇省各府州縣兵多米少之處挽運維艱兵少米多地方米難久貯俱應實心籌畫因時變通務期兵民有益臣先經與司道再四斟酌并行令妥議去後兹據布政使葛森會同署糧儲道黃士傑詳稱查滇省額徵民屯稅秋米石共二十一萬九千石四斗七升零額設制兵共四萬七千九百八十名嵗需銀八十六萬九百四十一兩六錢零嵗需米一十七萬二百七十二石八斗零以額米供支外尚餘米四萬八千七百二十七石六斗七升零以制兵通盤計算米則支放有餘但駐防兵多之各府州縣所徵稅秋糧米不足供支應將徵條銀通融折收糧米以資軍食駐防兵少之各屬所收糧米足以供支仍應照舊輸納米多兵少之各屬將糧米折解以抵兵餉民免挽運之勞米無紅朽之虞昆明縣附居省會駐扎重兵人煙輻輳日食浩繁所徵糧米雖不足搭放應仍將附近各州縣糧米運省供支毋庸議改其廣西廣南鶴慶永昌永北曲靖尋甸羅平南寧太和南安鎮雄保山新平文山會澤等府州縣俱駐有官兵除將各該府州縣額徵稅秋糧米搭放外仍有不敷會計撥運採買不免滋擾請將廣西等十六府州縣所徵條編銀兩內除軍舍丁差并差發馬場魚課照舊徵收及存留錢三俸工應於各府州縣中最逺之里分輸納銀兩外尚該銀二萬一千七百九十六兩零照數全折請以每銀一兩折收京斗米一石徵貯各該本倉備放少有不敷亦撥運無多至米多兵少及無兵之阿迷寧州路南雲龍雲州鎮南通海蒙自永平姚安元謀等十一府州縣額徵秋米全數折收并蒙化府雲南大姚二縣額米改半折收二共米二萬五千七百六十六石零請以每米一石折銀一兩撥抵廣西等府州縣條銀二萬一千七百九十六兩零解司充餉外尚餘銀三千九百七十兩有竒應貯道庫照以一兩折給普洱鎮兵糧安寧晉寧呈貢昆陽宜良富民河陽新興江川等九州縣稅秋糧米俱撥運省倉支放石屏州額米撥運臨安府倉十二關額米撥運大理府倉嵩明宣威霑益馬龍平彞邱北彌勒臨安建水嶍峩元江恩樂趙州賓川鄧川浪穹劒川騰越順寧楚雄廣通景東麗江武定和曲祿豐師宗河西等二十八府州縣雖各駐有兵以各處所徵糧米搭放并協運鄰倉供支所徵條銀毋庸改折又麗江邱北之新墾建水之猛弄新增米石係屬夷糧永行折徵業於奏銷册內登明毋庸另議至昭通永善駐有重兵額米不敷搭放經署三省總督髙其倬會題動支司庫銀兩委貟赴川採買挽運接濟條銀毋庸改米維西營分防之阿墩浪滄二汛兵米不敷題明以二兩一石動支司庫正項折給條銀毋庸改折至維西額米不敷兵食原係酌撥鶴慶麗江倉米加給腳價運供除三站不給腳價外每年約需腳價銀一千二百兩有竒向於報部輕齎盈餘銀內動支今停止輕齎應於司庫備公銀內動給再普洱攸樂威逺鎮沅等各駐有兵額米不敷支放别無附近可撥今以銀一兩折給不敷買食又當量為加增但無項可動今查有永行折徵之易門祿豐羅次定逺并裁歸蒙化之定邊等厯係以米一石折銀八錢徵解兹各屬既以每米一石折銀一兩亦應照以一兩徵收內除題定之八錢解司充餉外所餘二錢通計該銀一千七百五十餘兩作為加添普洱鎮兵丁折給不敷之用至中甸駐防兵丁每年需米一千八十石內除額徵米七百三十三石零不敷米三百四十七石零查該倉節年存米足供四年之用應於舊存米內添撥動支後有不足另行酌議詳請再查道庫尚存節年輕齎銀一萬五千九百八十八兩零請於本年採買供支以癸丑年為始停止採買仍每年將改米改折府州縣於奏銷册內分晰登造詳請題達計倉儲之盈絀因時變通不以為額總期於國計民生均有裨益相應合疏具題籌酌普思元新善後事宜疏尹繼善見前為敬陳邊地垂久事宜仰祈睿鑒事竊照普思元新一帶自雍正十年逆夷悖叛擾害邊疆仰蒙皇上天威逺播訓示周詳選將調兵嚴搜痛𠞰人民咸得安堵地方悉已敉寧經臣具疏題報在案但邊境險逺界連外域處處深山蜜箐在在蠢猓頑苗撫綏固應詳籌防範尤當嚴密一切營汛建制事宜亟須乘此平定之後以為一勞永逸之圖臣與撫提諸臣悉心商酌因地制宜量為增改逐條臚列為我皇上陳之一攸樂營汛官兵宜移駐思茅也安營設兵務期有用天時地利均要得宜查攸樂為普鎮右營孤懸瘴地僻處萬山水泉微細食用艱難兵丁多係單身最易逃走人人視為畏途更難招募自攸樂至思茅相距甚逺在在深山險箐塘汛兵孤勢難存立一遇有事聲氣隔絶思普之兵不能及時應援即太平無事而煙瘴甚盛水土惡劣兵丁多致傷損其存活者亦皆疾病纒綿筋力疲弱難以彈壓地方臣在京時荷蒙聖諭令將三省事宜與大學士鄂爾泰悉心商酌鄂爾泰即以攸樂營基未妥囑臣另籌臣細查形勢與撫提諸臣再四斟酌攸樂一營必須改移雖前經同知郭倫議詳改建於攸樂箐口已據報完城工五分旋遭兵火究之與攸樂相去不逺煙瘴亦盛終非長策查思茅地方髙爽水土和平北接普威南控江壩實為形勢之要自宜將攸樂一營撤歸思茅將右營遊擊移駐統領並將攸樂同知亦移駐思茅與遊擊同城改為思茅同知換給關防將思茅通判一缺裁汰車里江外各猛地方係宣慰司管理所有錢糧責成徵解其攸樂茶山一帶總屬同知管轄錢糧俱隸徵收庶控制得宜兵民均有裨益一普洱郡城宜添知縣一貟以資治理也普洱居滇省極邊之地幅貟甚廣料理需人原設知府一貟事無巨細俱係知府管理雖設有經厯僅可備供差遣知府遇公事出並無印官在城或遇緩急别無一貟幫助非所以重地方也應添設知縣一貟駐劄府城所有倉庫錢糧户婚田土監獄事務悉歸經管再添典史一貟以備任使知府得有餘力專司總理庶佐理分任各有其人彼此相資緩急有賴至新設之縣仰請欽定佳名鑄給印信以重職守一普鎮三營兵丁宜酌添也普洱全境縱橫綿亘約計六七千里額兵二千四百名除親丁公費及分布塘汛外存城之兵甚少前嵗猓賊猖肆兵力單弱守戰不能兼顧及調兩迤官兵逺路奔馳而賊勢蔓延地方已遭荼毒是設兵不足猶之乎無兵也但增兵太多又慮山路險逺糧運維艱今再四斟酌每營必須添兵一百連原額計算每營各九百名三營共二千七百名庶極邊遼闊之地可以守禦有資矣一三營汛地宜籌酌妥當也查普鎮中營原設等角通關哨兩大汛左營原設抱母鎮沅新撫恩樂四大汛右營原設猛旺思茅兩大汛又中營原設整董一小汛左營原設猛班三圈二小汛右營原設猛旺倚邦猛烏慢林猛養五小汛凡小汛兵丁每處或四五十名或二三十名離營窵逺散碎零星平日徒作踐夷人有事即先遭殘害況多分小汛大營兵單欲調動則前出後空欲分應則顧此失彼前車之鑒厯厯可指是兵勢散而無濟不如合而可恃也應將三營之整董等小汛一並撤歸大營以壯聲威以收實用至於三營大汛又有當詳加斟酌者中營通關哨一汛界在把邊阿墨兩江之中實係元普咽喉應撥中營守備一貟把總一貟外委把總一貟帶兵二百名駐劄又把邊渡口亦關緊要應於通關哨兵內撥出外委把總一貟帶兵五十名駐劄遊巡江崖等角一汛接壤元界之里仙江實係夷猓出沒之地應撥外委把總一貟帶兵五十名駐防此外尚有兵六百五十名遊擊一貟千總二貟把總三貟外委千把四貟隨總兵駐劄普城又左營遊擊原駐威逺守備分駐鎮沅今查威逺地方煙瘴甚盛鎮沅為適中之地風俗強悍較威逺緊要應將遊擊移駐鎮沅與知府同城以千總一貟把總一貟外委千把二貟兵三百名隨遊擊駐劄以把總一貟外委把總一貟帶兵一百名駐防恩樂內抽撥三十名令外委把總帶領分駐三家坡防守以把總一貟外委把總一貟帶兵一百名駐防新撫內以隊目一名帶兵十名於界牌安哨稽查其威逺地方以左營守備一貟把總一貟外委把總一貟帶兵二百五十名駐防內以把總一貟帶兵一百名分防抱母井其左營原貼防攸樂兵丁一百五十名令千總一貟外委千總一貟帶領隨總兵駐劄普城又右營原駐攸樂今擬撤歸思茅應令遊擊一貟千總二貟把總二貟外委千把四貟帶兵五百名駐劄思茅查猛旺一汛距思茅二百里若原有攸樂一營自宜於此處設汛以聨聲勢今攸樂既撤則猛旺亦可不必設兵惟由普藤猛旺茶山直抵九龍江一路飭令各土辨沿途按站設立土塘遞送公文又班鳩坡係思普咽喉應撥把總一貟外委把總一貟帶兵一百名駐劄班鳩坡保固道路此外尚餘兵三百名令右營守備並把總一貟外委千總一貟帶領隨總兵駐劄普城統計總兵帶遊擊一貟守備一貟千總三貟把總四貟外委六貟馬步兵一千一百名駐劄普城則官貟兵丁力量充足無事可以壯聲威有事可以供調遣仍令各營汛備辨每月撥兵五十名於連界各路彼此會哨一次換旗巡防不許騷擾多事庶營勢謹嚴兵力整齊可以緩急足恃矣一普洱地方遼闊宜慎選土辨管束以專責成也民人錯居皆有鄉保約束夷猓雜處務須土目稽察內地之土目必當削其事權而邊境之土目又必使有專責查江外各猛地方已有宣慰司刀紹文及土辨刀細悶納保守以為藩籬雍正十年逆夷蠢動江內江外到處煽惑是時刀紹文年尚幼稚未經承襲紹文之母刀氏同土辨刀細悶納力拒妖言率衆堵剿辦理糧運保固江防實屬深明大義懋著勤勞仰懇聖恩應否比照烏蒙案內隴慶侯之庶母二祿氏四川沙罵土司沙氏之例給與封典並賞給刀細悶納土守備職銜以昭奬勵至江內之六版納及茶山整董烏得白馬山六困一帶幅員遼闊山深箐大且煙瘴甚盛既不能處處設兵在在置官若不令土目分管漫無責成地方難以寧謐今通盤籌畫除猛烏易武小猛養舊有土辨召匾乍虎叭干無容另議外查普藤土千總刀猛比深明大義始終效順隨師搜𠞰厯著勤勞應賞以土守備職銜將猛旺及糯龍等二十四村賽責令管理其茶山倚邦一帶均係窩泥查有倚邦土辨曹當齋為人誠實隨師𠞰賊勤勞素著應將倚邦茶山責令管轄整董亦屬扼要之區自土辨召第於叛案內拿解地方無人鈐束查有土目召音隨師奮勇甚屬出力應給土把總職銜管理整董再猛臘地處極邊與外域接壤最為緊要彼地頭人召糯極力堵禦辦運軍糧甚屬急公效順應賞給土千總職銜以示奬勵責令保守邊境至白馬山六困整控一帶原係土辨刀輔國管理查伊兄刀興國不法律應連坐但興國謀叛輔國實不知情一聞蠢動即報思茅文武協同守城又著伊妻防護倉糧以資兵食後經發往效力贖罪輔國奮不顧身實心出力擒獲賊首並將白馬山一帶夷民全數招安甚有功績應賞還土千總職銜仍令管理地方必能格外感恩以圖報效再攸樂營汛既撤其三十六寨需人管約據宣慰司刀紹文及各土辨公保叭龍扛管理窩泥寨喇鮓匾分管蒲蠻寨俱皆誠實可用宜令管理其餘叭目火頭俱擇勤慎老實者分派充應仍不時嚴加稽察果能實心效力自當酌加奬賞如有多事滋擾即當拿究另行更換此並非以久經歸流之地而反責成土目蓋地方總係流官管轄土目不過分查地方惟以土目管土人仍以流官管土目庶窮山僻壤瘴癘險阻之區莫不各有責成各有約束地方文武止須提綱挈領彈壓撫綏則事不煩而民不擾似亦治理邊夷之要道也一普洱府治宜改建石城也普郡地處極邊接壤外域實中外之咽喉滇南之門户既設鎮府必資城郭現在雖有土城一座但土性浮鬆一經淋雨易於傾塌殊非久逺鞏固之計且易啓蠢類覬覦之心應請改造石城方足建威消萌其思茅土城應再修葺堅固並於四面添築炮臺鎮沅城垣亦日久圯塌應一並修築則捍禦有資邊疆永賴矣一官貟販賣私茶兵役入山擾纍之弊宜嚴定處分也思茅茶山地方瘠薄不産米穀夷人窮苦惟藉茶葉養生無如文武各貟每嵗二三月間即差兵役入山採取任意作踐短價強買四處販賣濫派人夫沿途運送是小民養命之源竟成官貟兵役射利之藪夷民甚為受纍前經升任督臣鄂爾泰題明禁止兵役不許入山臣等又將官販私茶嚴行查禁但不嚴定處分弊纍不能永除請嗣後責成思茅文武互相稽查如有官貟販茶圖利以及兵役入山滋擾者許彼此據實稟報如有徇隱一經察出除本貟及兵役嚴參治罪外並將徇隱之同城文武及失察之總兵知府照苗疆文武互相稽察例分别議處庶官貟兵役不敢奪夷人之利而窮黎得以安生矣一攸樂一帶之鹽課宜寬免也查磨者烏得整董猛烏四鹽井皆在極邊瘴癘之鄉與普洱府治相隔甚逺春夏水發味淡惟秋冬可以煎鹽為數有限附近山多箐密夷人罕事耕種專藉此鹽零星負賣易米資生雍正七年間於籌畫普洱建置事宜案內題請添設大使二貟駐劄猛烏整董督煎辦課仍以瘴盛不能往井將大使裁撤令夷人認課銀二千兩自夷人認課之後獲利輕微生計不贍雍正十年間逆夷叛擾塞井毁竈附近諸夷奔逃四散井地一空是以雍正十年十一年分課銀無出經撫臣張允隨會題請免現據鹽道張無咎具詳設法招徠尚在畏懼不前無人煎辦臣思課額虛懸總於國帑無益錢糧有限不如恤惠窮夷仰懇聖恩將原定認納課銀特賜豁除仍賞夷人煎售庶各安心復業而兵火之餘得以生計有賴矣一就近歸並村寨以便管轄也地方界限最宜劃清若隔裂窵逺勢必稽察難周如元屬善政里豬山者鬼布林臘猛三鄉及上下猛緬猛松左戛又惠逺里之磨鋪薩等糯那阿扇那補怕南害等寨地近普攸距元十跕二十跕不等相隔遙逺難以管轄應將前項村寨歸並普洱管轄仍選委土辨目就近分管又查元屬惠逺里之西薩猛列地方離元江五百餘里去威逺甚近應改屬威逺管轄又有鎮沅府屬之壩朗壩木壩癡三寨去鎮沅九跕去元城止二百里應割歸元江管轄不但稽查甚便即一切上納錢糧充應夫役不致有逺路奔走之苦矣一威逺宜歸鎮沅管轄也查鎮沅一府户口無多止轄恩樂一縣事務簡少威逺附近鎮沅向設同知一貟經厯一貟不隸府轄聲勢殊不聨絡應將威逺地方改歸鎮沅府管轄原設之同知改作鎮沅府分防威逺撫夷清餉同知一切刑名錢穀事務照大關同知之例仍令辦理由府稽察核轉換給關防以昭信守其原設經厯一貟應行裁去改作鎮沅府知事一貟仍隨同知駐劄威逺以供任使一應養廉役食衙署等項俱應仍舊毋庸增減其威逺生童向附元江府學今威逺既議改歸鎮沅應將附入元江府之生貟歸入鎮沅府學嗣後生童俱歸入鎮沅府學考試以廣造就再鎮沅府屬之新撫地方為元普咽喉自恩樂至普洱中隔六跕運糧解犯往來必經必需專貟料理應請設新撫司巡檢一貟鑄給印記駐劄新撫稽察逃盜賭博專司巡緝及往來運解事務庶佐理統轄各有責成治理得收實效矣一元江營制宜酌量增改也查元江四面夷疆幅貟遼闊實屬居中扼要之所從前設遊擊一貟兵丁八百名營制單弱汛地零星難資控制兹當地方大定之後自應亟為籌畫以期永固邊圉請將該營遊擊裁去改設參將一貟添設守備一貟把總二貟兵丁四百名拔外委把總二貟同原設之守備一貟千把總六貟外委千把總六貟兵丁八百名分為左右二軍仍隸臨元鎮兼轄其參將一貟帶左軍守備一貟把總二貟外委千把三貟兵丁五百名駐劄元江府城防守彈壓分布塘卡他郎地方乃元普鎮威通衢實屬要區原經建城設汛但汛兵單弱今應以右軍守備一貟帶把總一貟外委把總二貟兵丁三百名與他郎通判同城駐劄又阿墨江口乃元普咽喉應以把總一貟帶兵五十名防守渡口與他郎通關哨相為連絡又因逺地方甚為厄要應以外委千總一貟帶兵五十名防守與他郎大汛相為犄角又邦轟一汛路通元新應以千總一貟外委把總一貟帶兵一百名防守內以外委把總一貟帶兵三十名分防谷麻江渡口又老烏山為元新等處出入要隘應以把總一貟帶兵五十名駐防內以隊目一名帶兵十名輪流更換稽察南戛渡口又馬鹿塘乃省會咽喉為揚武壩青龍厰適中之地應以把總一貟帶兵五十名防守又永豐里之豬街地方四面通達甚屬緊要應以千總一貟外委把總一貟帶兵一百名防守並令不時酌撥兵丁於壩罕一帶遊巡稽察其各汛應設塘卡各令照界安設仍令各照地界按期遊巡會哨則布置謹嚴聲勢連絡庶無零星單弱之虞其原設之土戛汛瘴癘甚盛難以駐兵界牌新寨歸普洱鎮設汛防守白土坎相去豬街不逺壩罕汛亦與豬街連絡磨沙河與老烏山聲息相通均毋庸設汛又元城長亘臨江無險可恃應於東南各築炮臺一座西北各築炮臺二座以施鎗炮其他郎城已新築炮臺素無大炮查於敬獻芻言等事案內業將省城存局得勝發貢大炮酌撥八位分發元江今應令存貯元城四位分貯他郎四位庶資守禦一新平官兵防汛亦宜增改以資彈壓也新平一縣界在萬山內控魯魁外連哀牢地廣兵單夷猓凶悍最為緊要查新嶍營原設參將一貟守備一貟千總二貟把總四貟外委千總二貟外委把總四貟兵丁一千名實屬不敷且存城兵丁僅止一百八十餘名更為單薄應酌添兵丁二百名把總二貟同原設把總分為頭二三司並照拔外委把總二貟仍隸臨元鎮兼轄以參將一貟帶守備一貟把總二貟兵丁四百名駐劄縣城居中彈壓其縣屬之腳底母地方為元新門户野賊出沒之所應以把總一貟帶兵五十名駐劄與元新各汛彼此連絡又舍疊龍一汛在哀牢半山甚為緊要應撥把總一貟帶兵丁一百名駐劄防守又錯納賈一汛向係猓賊出沒小徑應撥外委把總一貟帶兵五十名駐劄又漫干壩一汛為恩樂太和厰斗門鄉出入門户且與從前各猓賊舊巢緊接實屬要區應撥千總一貟外委把總一貟兵丁一百五十名駐劄防守內撥兵丁三十名以隊目帶領前往太和厰分防巡哨以衛厰民又舊哈一汛居哀牢要區且與楚姚之界牌汛相為表裏應撥把總一貟外委把總一貟帶兵一百名防守又揚武壩一汛駐劄魯魁山底甚為緊要應撥兵一百名令把總一貟外委把總一貟帶領防守又嶍峩縣城原設千總一貟外委千總一貟帶兵一百名防守今應照舊又塔龍一汛接壤丁癸二鄉並易門之馬頭等處最是藏姦應撥外委把總一貟帶兵五十名駐防又化念一汛係新平魯魁門户應撥外委千總一貟帶兵五十名防守又俄爽一區為魯魁出入小徑與臨安石屏河西曲江等處相通地既偏僻又無營汛故從前野賊得以任意往來應撥外委把總一貟帶兵五十名駐劄堵截其原設之新化州樹哺拉灑沖亞泥壩黑泥哨歇塔圖等汛均可不設庶汛地皆居扼要足資防禦而亦無零星單弱之虞矣一元新土目宜禁止擅管地方以杜擾纍也查元江新平均屬內地凡稽察村寨約束夷户俱應地方官自行經理非同普洱邊方僻逺必須設立土目以資稽察乃元新村寨向被各土目私行霸占有某處屬某土目項下名色分疆劃界竟成世業以致不法土目科派索保恃強欺弱無所不至夷民畏其威勢莫不羣聽指使有呼輒應及前嵗野賊猖肆各土目項下之人又多附和隨從彼此推委不能約束若不亟為清理不特夷民世受苦纍兼恐因循日久漸難鉗制應嚴禁各土備辨目以後不許霸占村寨一切稽察約束事務俱令地方官管理不許仍存某人項下名色各村寨原有火頭即如內地鄉保應令文武地方官會同查明務擇誠實守法者充當應更換者更換其土備辨目只令聽候地方官差遣調用不許向各村寨一毫滋擾如各土備辨兵仍有霸占村寨擅行索保私養後生仇殺生事及藏匿盜賊玩法為匪者即嚴拿正法地方官徇縱失察題參議處如各土備辨目果能安分守法毫不多事差遣無誤盡心效力者於年底令地方官核實具報分别奬賞庶夷民得安耕鑿永沐國家休養生息之宏仁而土目削其事權亦免尾大不掉之後慮矣再元江府城原設漢捕六名此輩需索滋擾實屬朘民之蠧應行裁革以靖地方一調用鄉練宜用文武印牌也查土練皆係百姓並非土目私人非奉官調不應擅動厯年調用土練大抵土目自傳木刻者俱多行之日久恐正偽不分姦徒易於鼓惑應請嗣後調練務以地方文武會銜印牌為憑不許土目擅自私調並遍行曉諭大小村寨鄉管頭人如有土目不奉印牌以木刻小票擅調鄉練即赴文武衙門具報以憑嚴拿照擅調官軍律治罪如鄉管火頭通同隱匿一併究處地方文武失於覺察並行參究則土辨目無權可操實屬防範之要道也一臨安府屬石屏州之寶秀地方宜築土城以資捍衛也寶秀界連元新為臨屬咽喉猓賊出沒要區前嵗逆夷悖叛先遭蹂躙應於寶秀築土城一座於扼要之處設立炮臺撥給炮位以資守禦又寶秀向於臨元鎮標撥把總一貟帶兵五十名駐劄未免單弱應於該鎮標內添撥兵五十名共一百名令千總一貟外委一貟帶領駐防則寶秀可獲安堵即臨安石屏亦皆資捍禦矣一防汛要地宜籌捍衛也查普思元新形勢遼闊設汛之處大抵離城窵逺地居扼要若止撥兵駐劄而不設險防範猝遇有警汛兵多者百餘少者數十不比大營究屬單弱難以守禦應於現議設汛處所擇其尤關緊要者或築土堡或建木城汛兵駐劄其內庶防守有資賊人不敢覬覦其各塘汛辨兵應近則按季一換逺則半年一換以免攜帶眷口之纍且勞逸得均可以輪流操演至增兵設汛各處均宜建造衙署營房以供棲止統俟委貟同前議應建應修城垣炮臺一併確勘估計詳核另題以上一十六條就臣等愚昧之見斟酌調劑以副我皇上慎重邊疆奠安黎庶之至意其普洱一鎮元江新嶍兩營現添兵丁共九百名應照馬一步九添設但各標鎮協營額兵均難抽撥而悉行招募又多糜費臣等悉心籌酌查滇省督臣衙門向有隨丁名糧一百分撫臣衙門向有隨丁名糧八十分經前督臣鄂奏明在案今軍務全竣賞費無多臣等養廉儘足敷用應按照營制將臣標隨丁內撥出馬二步八兵餉一百分撫臣親標隨丁內撥出馬一步九兵餉八十分以充普洱等處新添兵餉又查雲南竒兵營原設馬兵一百八十名步兵四百八十名守兵三百四十名與滇省各營馬一步九之制不符且滇省跬步皆山無需多用馬匹應將竒兵營照例改作馬一步四守五營制其減出餉乾銀兩亦撥作新添兵餉是雖有減撥之名營伍仍係充實錢糧又可節省其餘不足之數另行招添合併陳明是否有當臣謹會同雲南巡撫臣張允隨雲南提督臣蔡成貴合詞具題伏乞皇上睿鑒敕部議覆施行社倉條奏陳𢎞謀見前奏為酌通社倉借本以資接濟事竊照社倉之積貯原備民間之緩急必使逐年漸增斯可廣行接濟我皇上厪念民依洞悉利弊惟恐奉行不善致滋𣲖纍特頒訓旨誥誡周詳臣仰體聖懷於滇省社倉悉心籌畫實力勸捐惟期積少成多庶幾有備無患祗因土田瘠薄出産無多所捐終屬有限自奉行至今通計一省捐積穀麥等項止有七萬餘石其中一千石以上者僅二十餘處此外皆數百石數十石亦有全無社穀者每遇缺乏籽種青黃不接之時夷猓窮民無處借貸漢姦劣紳乘機盤剝重疊科算最為民害雖嚴行示禁而民間緩急之需終不能免是滇省社穀尤宜多貯而捐輸既不能多所宜另籌增添者也臣查各屬俱有常平倉及官莊等穀除每年存七糶三外存貯尚多可以酌量暫撥以作社本除舊有社本一千石以上已敷接濟毋庸議外其未及一千石者均於該處常平官莊等穀內動撥五百石或八百石作為社本令社長一體經管出借窮民秋成照例加一升息歸於社倉項下積貯庶各屬社穀均可由此漸增而地方窮民每年得此輕息之穀以供籽種免重利盤剝之害所納加一之息仍積存以為該地緩急接濟俟積有一千石社本仍將原動常平等穀歸還本欵一轉移間似於倉儲民生兩有裨益臣為邊方積貯起見用敢繕摺奏請伏祈皇上訓示臣謹奏雲南通志卷二十九之六欽定四庫全書雲南通志卷二十九之七記元大理行記郭松年商州中慶距大理城西顧里有千歷府治一曰威楚州四曰安寧鎮南雲南趙州縣三曰祿品安邊白巖皆三府支屬鎮南而西有雌嶺即大理之境出行七十里有甸焉川原坦夷山勢回合周二百餘里乃雲南州也州西北十餘里山麓間有石如鏡光可鑑面舊名鏡州張氏進求時州北龍興和山忽五色雲起蕭索輪囷終日不散人以為祥州居雲之南因改今名又西行三十餘里至品甸按唐史嘗置波州亦名清子川其川澤土壤不減雲南而種蒔為不及爾甸中有池名曰清湖灌溉之利逹於雲南之野湖西官道中有石焉紋如古篆號曰地符行人謹避莫敢踐之又山行三十里至白巖甸其地形南北袤大小略與雲南品甸相埓居民湊集禾麻蔽野縣西石巖斬絶其色如雪故曰白巖赤水江回環曲折經於其中甸西南有古廟中有鐡柱髙七尺五寸徑二尺八寸乃昔時蒙氏第十一主景莊王所造題曰建極十三年壬辰四月庚午朔十有四日癸未鑄土人歲歲貼金其上號天尊柱四時享祀有禱必應或以為武侯所立非也又山行四十里至趙州甸即趙瞼也山形四周回抱有藏風之勢川澤平曠故家喬木猶有存者神莊江貫於其中溉田千頃以故百姓富庶少旱虐之災出州治十五里路轉峯回茂林修竹蔚然深秀中而建峯神廟在焉凡水旱疾疫禱請有徴州人賴之州之北行約數百步地極明秀蒙昭成王保和九年有髙將軍者即此地建遍知寺其殿像壁繪於今罕見意非漢匠名筆不能造也出寺門東北行一里餘有髙原號澄城其地空而不耕乃世祖駐蹕之所也近歲州宷建一佛宇遇旦望焚香祝壽蓋以報聖恩之萬一焉州行三十里至河尾關即洱水之下流也架木為梁長十五丈餘穹形飲水睨而視之如虹霓然順流而下約一里許有石門巨石橫楣號石馬橋為羣波爭道之地懸流奔注雲濤雪浪聲聞數里河尾橋之西有關焉北入大理名龍尾關即蒙氏之所築也西厄蒼山東屬洱水其髙壁危構巋然猶存入關十五里山壑濃秀望之蔚然前陳者乃點蒼之奔衝也諸峯羅列前後參差有城在其下是曰太和周十有餘里夷語以坡陀為和和在城中故謂之太和昔蒙歸義王皮羅閣自蒙舍徙河西乃築此城後閣羅鳳以張虔陀讒構乃殺之陷唐鮮于仲通兵因自結於吐蕃受鍾王刻石記功明不得已而改號蒙國大詔立德化碑使蜀人鄭回製文其碑今在即唐代宗大歷元年也又北行十五里至大理名羊苴咩城亦名紫城方圓四五里即蒙氏第五主神武王閣羅鳳贊普鍾十三年甲辰歲所築時唐代宗廣德二年也自後鄭趙楊段四氏皆都其中是城也西倚蒼山之險東挾洱水之厄龍首關於鄧川之南龍尾關於趙瞼之北昔人用心自以為金城湯池可以傳之萬世及天兵北來一鼓而下良可嘆哉此非在德不在險之明驗歟故大理之民數百年間五姓守固值唐宋五季衰亂之世嘗與中國抗衡宋興北有大敵不暇逺略相與使傳往來通於中國故其居室樓觀言語書數以至冠昏喪祭之禮干戈戰陳之法雖不能盡善盡美其規模服色動作云為略本於漢自今觀之猶有故國之遺風焉若夫點蒼之山條岡南北百有餘里峯巒巖岫縈雲戴雪四時不消上則高河竇海泉源噴涌水鏡澄徹纎芥不容佳木竒卉垂光倒景吹風噓雲神龍所宅歲旱祈禱靈貺昭著派為一十八溪懸流飛瀑瀉於羣峯之間雷電砰轟煙霞暗靄功利布散皆可灌溉洱水則源於浪穹涉歷三郡渟滀紫城之東北自河首南盡河尾波濤二關之間周圍百有餘里內則四洲三島九臯之竒浩蕩汪洋煙波無際於以見江山之美有足稱者然而此邦之人西去天竺為近其俗多尚浮屠法家無貧富皆有佛堂人不以老壯手不釋數珠一歲之間齋戒幾半絶不茹葷飲酒至齋畢乃已沿山寺宇極多不可殫紀中峯之下有廟焉是為點蒼山神亦號中嶽中峯之北有崇聖寺中有三塔一大二小大者髙二百餘尺凡一十六級樣製精巧即唐遣大匠恭韜徽義所造塔成韜義乃去中峯之南有玉局寺又西南有上山寺凡諸寺宇皆有得道者居之得道者非師僧之比也師僧有妻子然往往讀儒書段氏而上有國家者設科選士皆出此輩今則不爾而得道者戒行精嚴日中一食所誦經律一如中國所居灑掃清潔雲煙靜境花木禪房水㶁㶁循堂厨至其處者使人名利之心俱盡此大理之大觀南遊則永昌騰衝北走則鶴慶麗江周行數千里皆莫若此也明建布政使公廨記布政張紞富平公廨廣三十七丈袤百丈十步有竒段氏時稱東府元為行省皇明洪武壬戌戡定雲南就置布政使司屋宇階庭雖有成迹但歷歲已久柱傾苴漏者屢矣紞備員以來旅拒烏合之徒內訌而外叛兵既未休飢疫隨之日不暇給者凡五年歲丙寅始克儲材明年冬撤其堂而新之正六楹楹圍五尺棟九架而衍其前脊髙四尋簷殺脊之半以強越二年再治材且因且革門寢暨經歷司始成其外門兩廊均未易也初令有司計木之數與巨細若戶力之盈朒差而賦之轉致不立期一從其便其興徙也較四州十一縣夫之壯者每一州縣均作三四番每番期十日乍作乍輟不敢妨其務不敢竭其力遷就數逾年而迄未畢功如是乎其艱且滯者何哉蓋兵民之役有征有屯有築有餉其大者如此其小者未可枚舉故不得已為是迂拙之政誠不忍更督促之也竊嘗論之雲南於古為荒外不治之地山林幽阻民俗草昧各種各部如蜂蟻然無教令等威之制無宫室服用富厚之資生理既不足繫其心又竒險可以容惡是以樂縱恣而安悖亂茍束之以法而強之以不能彼不狺然相噬則觖然而長往矣昔在漢晉雖嘗設官亦即其要會而領之隋唐間頗置州郡皆不過羈縻而已固未嘗如中國閭井其人也元得其地因俗為治撫之為宜然其弗靖者猶爾也是以志烈之士非不欲草剃而禽獮之顧其勢有所不行亦噤齘久之乃已徐而思之有如耐飢渴習霧露乘高走險殊死而不顧者乃其所長然而性多荒惰暗於事幾素無節制之可守雖則易合亦復易離智者察此則知所以制之矣必有人焉才兼文武而道濟方域曰德曰威曰廉曰信兼此四者而事不定人不安吾不信也故當無事則宜蕩佚簡易寬小過守大綱如班定逺之言或有蟊賊則乘其未滋霆衝電激指的而中之以懲其餘斯亦攻心伐謀之大端夫如是良怖急者可牀下伏矣敬告來哲誠不知所以裁之新築騰衝司城記侍郎侯璡澤州仰維皇上纘承列聖嗣登寶位四夷八荒莫不梯山航海稽顙稱臣述職納貢書曰萬邦黎獻共惟帝臣易曰聖人作而萬物覩正兹時也越五歲麓川酋長思任偵邉守緩馭遂肆倔強戢孴犬豕侵軼疆埸蹂躪氓夷雲南守臣以聞上乃敕廷臣曰蠻夷禽獸不可以中國道理處自古但羈縻而已復申命守臣謹封域戒斥堠嚴備守需招徠俾賊去逆效順轉禍為福仍守彼土庶全草木命實皇上好生之德同天地之涵育不忍加兵蠻夷者誠以兵凶戰危一壓境壤脅從罔逭殃及無辜也蠢兹思任負固恃險執迷頑梗愈作跳梁蟻聚蜂屯乃粗我南甸乃突我干崖乃犯我騰衝叛釁弗庭適守帥臶以事聞上軫念邉民悉吾赤子遘賊荼毒匪加兵殛之得以猖獗獷悍不可附也不得已出師命兵部尚書王驥行便宜事總督戎務定西伯蔣貴充總兵簡偏禆統虎賁羽林驍騎各鎮士馬十有五萬徂征之分路並進窮搗賊巢設竒制變鼓譟齊鳴士氣賈勇左右夾功斬殺賊孽噍類無遺賊既敗衄惟子思機狼狽夜潛遁匿孟養時正統辛酉十有二月十三日也凱旋獻捷朝廷嘉之凡同征將士升賚有差逮壬戌七月上以麓賊平諗無西顧矣但雲南遐荒去京萬里百蠻雜處叛服不常自昔雖有武臣鎮臨特乏文臣以佐耳乃敕兵部左侍郎侯璡刑部右侍郎楊寧迭更參贊戎務用靖邉夷時兵部尚書靖逺伯王公復總軍旅仍行便宜事節制雲南諸司偕前總兵都督沐昻同璡洎雲南方面官僉謂騰衝去鎮二十有二程山川限隔險厄懸絶夷獠環處甲於西陲實諸夷出入要害地舊有千戶兵防禦力不支為賊竊襲今復其地茍非鎮靜曷克懾逺夷固疆圉垂永久哉乃請於上可其奏改立騰衝軍民指揮使司調都指揮李升控守以兵乙丑十月秋官楊公代璡參戎務奉敕偕總兵鎮守官黔國公沐斌等帥雲南將士萬五千城築故址乃度地理民數教士卒築方城周匝七里三分匪㥇匪博容民居也前昻後偃因形勝也可規可隅便守戍也丙寅十月璡再奉敕統兵五千用砌城垣然兵燹草創甎料艱就乃與都指揮李升教將士鑿石城西山距七里去墜盈尺得石堅美用工寡成就多殆非人力強作實天道保民默造耳第匠作未備工促三月竁劵四門臺高二丈五尺洞濶丈四尺髙丈六尺邃七尺廣十二丈與城稱越明年丁卯總兵官黔國公沐斌鎮守左監丞郝寧參將都督僉事方瑛偕璡奉敕統兵萬五千駐操騰衝振敡威武復調木邦緬甸干崖隴川芒市灣甸鎮康夷兵涉金沙江進孟養令伐賊子時率領士卒雲南都司指揮李升李友李福楊濬司韶給足軍餉布政司左布政賈銓按察司副使鄭顒僉事張清因暇日復督將士修城垣鑿伊淢㽛屯田斯役也總帥諸公綜其事方面諸官董其務將士工師力其役值天日冬霽瘴候頓弭人心協和樂趨事工罔覺倦苦建城門樓四座髙四丈有竒廣六丈四尺重簷三滴三間轉五亘三十八楹剫用材木楩楠豫章悉域此三十里皆矗直精微城墉四面連雉髙二丈六尺復勵西山石包城經營是歲庚戌月己酉日落成戊辰年甲寅月甲午日然而樓櫓棽麗悚蠻狄之觀瞻城池髙深保軍民之無虞誠足壯封疆士旅之氣剫夷醜窺覘之心矣既而賊子就擒邉氛靖息民庶安堵班師振旅留兵戍守將告厥功咸謂豫宜述大概始末命工鏤石以紀歲月云南壩閘記布政陳文廬陵雲南古滇國其城瀕於滇池乘髙而望之則商山在北左金馬右碧雞支壠蜿蜒環抱數百里其間遠村近落良疇沃壤彌望無極惟窊闕而池浸焉南壩池之上流距城五里許其源出東北闕償昧樣邵甸諸山凡九十九泉或沸而流或營而瀦或激而波或澮注而溪焉或山夾而澗焉攸焉汨焉會於盤龍江至松華壩則岐為二河一繇金馬之麓過春登里一繇商山之麓過雲津橋皆趨於滇池蒙段氏時過春登者堤上多種黃花名繞道金稜河過雲津者堤上多種白花名縈城銀稜河嘗築土名為二堰於河之要處障其流以灌田凡數十萬畝元時雲南平章政事賽典赤復增修之民甚賴焉今所謂南壩即縈城銀稜河之所流也然因此為堰不過興一時之利而於經久之計則未聞也惟我有明混一區宇雲南恃逺弗庭洪武壬戌黔寧王時為西平侯奉命率師平之留鎮其地定以經制昭以威信厚以惠利俾兵民並力於田畝耕穫不違其時而南壩之修歲有恆役後定邉伯繼領鎮事思𢎞前緒謀造石閘以蓄泄為經久利方儲材命工值邉境多事未就其志景泰癸酉今總戎繼軒公乃圗成於參贊恩菴鄭公議定而後會焉時布政司左使賈公按察司按察使李公暨二三同志皆力相也既而上其事於朝亦不易其初議乃計舊儲之材增以十倍而凡富人之樂助者亦不拒之仍擇將校之有智計者田凱李振郭進董其役其條畫之善用度之宜則沐鄭二公自主之於是甃石為閘而扄以木視水之大小而時其閉縱又因其餘材相閘之西為廟以祀神之主此閘者其東為亭與廟相值而春秋勸省耕穫則休於其中於景泰甲戌八月十有二日始役而以明年三月一日卒事其所用之工力合之凡八萬二千九百有竒既成雲南之兵民無少長皆悅曰自今以始田不病於旱潦而吾農得以足食者誠二公賜也願紀其事於石置諸亭以傳悠久二公皆不能止也乃以記丐於豫豫謂沐公為定邉之孫黔寧王之曾孫也學兼文武崇德象賢拜右軍都督同知握征南將軍印以總戎事鄭公以經綸之才𢎞逹之識廉方公正之操參贊其事纍升至僉都御史兼巡撫之寄相濟同道以綏靖此方又能興歷代之遺利以成纍世欲為之志使兵民蒙惠於無窮實君子之事也烏可以不記昔羊叔子杜元凱相繼鎮襄陽皆能修政立事以成晉業歐陽文忠公稱其功名蓋當世而流風餘韻藹然被於江漢之間至今人猶思之蓋思元凱以其功叔子以其仁故二子所為雖不同然皆足以垂不朽此乃異時同道同得人心者也今二公以道相濟而同時出治余竊以謂沐公以孝鄭公以德歟蓋善繼人之志者孝之大善成人之美者德之推行仁始於孝立功本於德視古人奚逺哉余言雖不足以永二公之孝之德然兵民少長之心實欲紀以傳也重建雲南按察司署記大學士商輅淳安本朝洪武丙子設雲南按察司於時即昆明縣治為之因陋就簡幾八十年於此矣中間雖時加葺治然不過易朽以堅拓而新之良有待也成化丙戌新安莊君歙奉命總憲是邦公務之暇顧而嘆曰外臺綱紀之地而隘陋若此可乎况邉方寧靖時可有為若復因循誰之過耶遂偕僚宷謀諸鎮守太監錢君能總戎黔國沐公琮暨巡按御史請以雲南中衛及貢院改本司而以本司為貢院以圓通寺西空間官舍改為中衛諸公稱善乃合辭具疏以聞上可之事既下同心協謀相度區畫掄材任人咸稱厥事沐公及錢君首捐白金為倡一時在位皆以俸助而經營提督之責則都指揮萬僖方明專任之始事於庚寅之三月而落成於是歲之十月其材木甎甃之需悉出於公採辦興築之役弗勞於民凡建前後堂經歷司照磨所儀門正門東西吏廡廨宇獄禁以至廩庾庖湢通三百三十餘間傑棟崢嶸重門軒豁真憲府哉莊君述興造始末走書徴記於豫惟雲南古邉徼之地周以前不及職方歷漢唐宋迄無定屬我朝太祖髙皇帝誕膺天命統一寰區而雲南悉心歸附列聖相承仁漸義摩衣冠禮樂與中州等而按察風紀之司所賴以詰姦激貪鋤強禁暴使所居弗稱曷以重威是宜莊君倡之同寅和之鎮守總戎玉成之由是規制一新吏民改觀端本澄源誠非小補莊君可謂知所當務者矣繼自今綱紀益振政令益明使一方之人曉然知惡之不可為法之不可犯則柏臺清峻無愧於興建之功憲職修舉不負於付托之重蓋一舉而衆美備矣故記海口記巡撫陳金應城滇池在雲南會城之南周回三百餘里諸山之水皆歸焉自南流而西折歷安寧富民入金沙江源廣末狹若倒流然滇之名所由始也濱地之田無慮數百萬頃皆膏腴沃壤畝入可六七石顧下流地勢頗髙加以兩山沙石雨水衝入衆流之會日溢焉故汜濫瀰漫而膏腴沃壤浸沒十之八九民甚苦之𢎞治己未巡撫李公若虛慨然有志疏濬豫時為左布政司使承命偕按察使陳君敬都指揮僉事孫君輔往視之得其所以泛濫瀰漫之故歸白於公而東作方興其事已後時無能為矣庚申冬豫受巡撫寄水患滋甚軍民懇乞疏濬者日急辛酉夏乃會鎮守劉公明逺總戎沐公鎮之及藩臬諸君相告曰滇水為患久且大矣禦災捍患非吾輩分外事僉曰公憂思及此地方之福軍民之幸也其共圗之遂伐木於山採竹於林取海簰於水成鐵具於冶攻器物於肆俱命官董之按察副使曹君玉實督率而經理之未幾曹又為撫夷之務所奪爰會劉沐二公起借六衛軍餘安寧晉寧昆陽三州昆明呈貢歸化易門四縣民夫二萬有竒各委官分領而提督其事則按察司僉事范君平也壬戌正月望豫偕劉沐二公詣海口神祠竭誠告祭翌日詣下流灘廠築壩障水自壩而下至青魚灘凡若干里以衛州縣官夫畫地分工照界疏濬以一丈五尺為則不及數者因地勢也青魚灘至石梁河皆橫石乃相度地勢於青魚灘左石梁河右各新開一渠廣三尺許水從此泄而橫石不能為河流之礙至黃泥灘黃牛嘴平定鋪白塔村等處以及官莊上下欄水亂石凡阻塞河流者悉平治而盡去之未幾范歸視司篆以副使毛公科代之又於河之兩崖環築旱壩十有五座以欄榭兩山水衝流壅塞河道之患各設壩長一壩夫十守之軍民夫匠各給以糧糧皆取諸屯倉及贖罪之數無濫費也三月十有六日毛因二匠告完且軍民布種者急於得水移文於余而障水之壩拆焉水得就下其聲如雷不數月而池之水十已去其六七不復昔之泛濫瀰漫矣地土盡出而所謂膏腴沃壤者不復昔之浸沒矣乃命雲南知府張鳳指揮魏閏查勘退出田地前後約百萬有竒將有主而入賦者給之主與賦俱無者查給附近軍民與主有而賦無者驗數升科焉通計賦之增者若干石查濵海州縣衛所遞年虛賠之數而盡補之蘇軍民之困也患之消利之興惠之及於人者蓋亦大且溥矣藩臬長二李君詔王君辨僉以事之首末皆豫所究心者爰恪恭請豫記之或者問豫曰元賽典赤鑿金汁渠引松華水以溉滇城東西之田至今滇人仰其利而廟祀之公濬滇池之水而田之出者動以數百萬計較之賽典赤之功不大乎豫曰不然賽典赤鑿渠引水滇人以享百世之利豫濬水出田特今日事但恐將來又復淤塞水復泛濫而田復浸沒則又不逮賽典赤者多矣今豫將有去志後之繼其事者憂民之憂利民之利而加之意焉見河流壅塞即督工濬之見旱壩毁損即督工修之俾兩山沙石終不入河下流滔滔終無阻礙使泛濫瀰漫者不復再見而膏腴沃壤不復淹沒黃雲靄於隴畝嘉榖如茨如梁則將為滇人子孫億萬載無窮之利而豫生平志願足矣夫復何言問者唯唯而退遂併書而記之二忠祠記副使彭綱清江我太祖皇帝既受天命統萬國元宗室巴咱爾斡爾密猶稱梁王據雲南弗庭皇帝若曰彼為其主耳我其來之洪武五年壬子命翰林待制王禕往命下衆危之公怡然就道既至則曰天既訖元命我天子神聖文武四隩九州悉主悉臣罔有內外惟爾雲南尚阻聲教天子命使臣輯寧邦家幡然改圗迪簡天庭身名俱全䇿之上也不聽數日又謂曰吾將命逺來非獨為中國計亦為雲南計自天地構難盜名字據土地若陳友諒張士誠明玉珍輩非不強盛不四五年卒膏斧鉞元君走死子孫作賔庫庫特穆爾屬或俘或竄而天下遂定於一此非人力乃天命也今不忖德力順天命而欲以一隅之地抗天下是左右為謀之過也即迷不復天子命將率偏師駐昆明之上而飲其水當是時王之將佐利王以為功者不少矣巴咱爾斡爾密猶豫未決然雅敬公命其員外郎賈寬改館而羈縻不遣久之漠北使至責雲南匿南使公見執嘆曰雲南禍其在此矣尋遇害瘞公於地藏寺北時六年癸丑也八年乙卯上復命湖廣行省參知政事吳雲往先是巴咱爾斡爾密遣其徒鐵知院等三十餘人使漠北為我師所獲械京師至是上釋之命與公偕行至雲南之沙糖口鐵知院等謀以使命不逹中道被執罪必不免乃説公欲令易服辮髮改制書詐為元使共紿梁王公責以大義示以禍福以死自誓衆知不可奪且慮公泄其事遂殺之巴咱爾斡爾密聞之遣人具棺槨殯公於給孤寺十四年辛酉興師問罪巴咱爾斡爾密兵敗死之雲南平後王公子紳來求其葬處墟已平詢得其處立表識焉吳公子黻以其事白於朝許馳驛奉柩歸葬於湖廣江夏之金口鎮黻國子生始王公被留既久死後又得能文章者銘之故其事盛傳於世正統間得贈翰林院學士奉議大夫諡忠文立祠於雲南府城東有司歲時致祭吳公墓在江夏雲南人罕知而黻後為交址縣令殁於官不克陳乞𢎞治辛亥巡撫右副都御史常山王公以二公死節同而恤典異具請吳公得贈資政大夫刑部尚書諡忠節改祠額為二忠秩祭如前噫是固聖朝教忠之典哉而吳公之節遂與王公同不朽矣是舉也今南京兵部尚書太原韓公時為布政左使左僉都御史莆田林公時為按察使實倡始焉祠稱忠文凡數十年改二忠又十有四年而未有記𢎞治甲子春巡視雲南地方南京刑部左侍郎兼左僉都御史三衢樊公以二公鄉先生恐後無所考屬綱書其事綱以復於巡撫都御史應城陳公巡按御史聊城耿公曰是缺典也不可不補王公初諱偉尋改褘又改湋字子充浙之金華人學於前學士黃公縉之門以文章雄天下北遊無所遇束書南歸大業日隆有以名聞者授江南儒學提舉司較理改侍禮部轉起居注同知南康府召議踐祚儀改判漳州徴修元史拜翰林待制吳公諱雲字友雲毗陵宜興人以能詩授較書郎改渭南縣丞升刑部郎中尋升尚書改湖廣行省參知政事祠一區中為明宫前為二門益前為大門後為齋屋翼以兩廂外為工祝居烹宰所垣其四周翼然煥然表於厥土先後相繼而備焉者也嗚呼二公之死豈不深可慨哉嘗觀宋景濓和王公詩其小序云今朝廷敷大惠於天下庶幾遐方君長稽首闕下而吾子亦當還矣時十二年七月十一日然則是時中國猶未知二公之死也雲南既平未聞有以二公為言者豈畏罪者故諱其事耶將别有所為耶抑適事之晦而一時因循不及舉也耶死可慨也死而不見知尤可慨也人不見知而幸二家子弟能知之異時守臣能彰之則其實之不可泯者也是為記永昌名宦鄉賢祠記按察林俊莆田𢎞治初上用言者崇重聖學撤文昌祠而正之移檄邉庠咸悉意指今年春監察御史侯官林君塘來按滇更令正之及慮久而後復謀所以處之者維鄉賢天下學校皆有祠而滇學獨缺遂即其祠為之及名宦以義起也永昌既異祠師生以考證請乃偕參將定逺沐君詳參政豫同邑方君守同官泰和蕭君蒼采郡志洎所聞諸士夫者於鄉得一人焉漢署太守吕凱有執忠功名宦得八人焉漢太守鄭純有服夷功明靖逺伯束鹿王驥有平蠻功刑部侍郎錢塘楊寧有興學功指揮僉事壽州李觀有歸義功都指揮使定海胡淵有開屯功淵之孫志有靖邉功監察御史髙郵朱暟有障海功教授臨川余榖有師範功其他勤己惠人咸可表著於學校與有力焉故取而祠祀之其位首凱次純次驥次寧次觀次淵次志次暟次榖餘容以俟智者嗚呼褒異前哲為世道關係不細是所增入宜加意矣亦盍敬慎之哉楊氏二孝三節記大學士楊一清安寧江隂縣簿太和楊鋋既致仕將歸其鄉詣豫求記其家二孝三節豫曰吾滇南文獻之著稱大理大理之著稱太和太和之望曰楊氏則吾知之矣二孝三節未詳也可得聞乎鋋曰鋋叔祖諱寧時謐其字痛父明輔翁早逝事母崔極孝母病嘗糞知其劇乃焚香籲天祈以身代母病頓愈後延一紀餘而終廬墓三年為從父𢎞道後事所後如其父母其廬墓時每旦必歸省省畢不入私室即赴墓所從父母相繼殁又廬墓六年手植松柏數百株慈烏白鶴羣集馴擾人謂孝感所致叔父宗白事生母趙氏養母張氏伯母施氏旦夕供甘旨罔缺有疾憂形於色延醫禱神無不曲盡三母安之咸躋上壽比卒治喪葬禮而哀有司先後以聞詔下旌其孝行豫曰休哉孝乎三節云何曰鋋伯祖母施氏早喪夫時雍於官邸扶柩歸治葬如式孀居四十年志操堅定親戚以其少無子慫慂改適乃以刀截髮卒守志終其身祖母趙氏早寡欲自鴆以殉族姻勸之以四孤尚幼汝死誰為鞠之乃悟矢心無他訓諸子以成立叔祖母張氏亦早寡其母迫再醮乃閉室自縊諸親先後破牖入救之得不死撫嗣孤以成即宗白也有司上其事詔旌楊氏三節之門豫聞而嘆曰節乎休哉夫子之孝婦之節乃天理民彝之不容自泯者顧世教衰民不興行食稻衣錦之流滿天下夫死骨肉未寒而俯首他人者皆是也朝廷厲風教故凡以孝事上聞輒褒異其門閭然一歲一省恆不數人或至連數郡無一人者二孝三節萃於一門何楊氏之多賢也國家道化人文之盛於是乎徴而楊氏世澤之敷遺餘慶之昌衍豈直大理之望而已哉孝節有堂故太子少保禮部尚書西蜀周公序之宗白事後出故不及書余鄉大夫也併為書之鋋楊之宗子觀夫是請而其孝可知也已系以詩用備太史氏之采焉詩曰有髙者門烏頭雙起錫獸銜鐶石獅蹲趾門誰所家巍峩若兹二孝三節天子旌之天理常存人心不死彼氓昏昏聞風顙泚珠聨玉萃輝映後先僉曰休哉楊氏多賢人中之傑女中之式以裕後昆引之無斁新建永昌府治記大學士楊廷和新都永昌古哀牢之地置郡自漢永平始歷代多因之元務逺略創立金齒大理都元帥府於銀生巖甸其地去今治千餘里是所謂金齒也後以逺不可守改為衛移就永昌府仍冒金齒之名其實非也我朝洪武壬申省府以其名併入金齒永昌兩千戶所改金齒軍民指揮使司永平縣亦隸之領之者衛官尚未有鎮守內臣及武臣也景泰中始有之朝廷悠逺文教疏濶上下交征日朘月削盡民之所入及地之所産不足以供溪壑之欲而民日益困戶口衰耗盜賊繁興君子小人咸相嗟怨往往言於所司欲復府治前此巡按屢以上聞輒下守臣勘報各阿所好因而庇之虛喝夷民以必不可復之狀甚矣永昌之重不幸也嘉靖改元巡撫都御史何公孟春遂謀於鎮守總兵沐公紹勳巡按御史羅君玉席君春連章請革鎮置府議上報可遂改為永昌軍民府永昌人聞之室家胥慶相與語曰而今而後庶幾以生矣我有田畝我食我力無豪奪我者也我有男女我婚我嫁無脅誘我者也我有官守我師我帥無鄙夷我者也不圗今日復為幸民此新天子之賜諸守臣謀國之忠我子孫百世之利也未幾何公召為吏部或有鼓扇頑民欲害其成者都御史王公啓繼亟以興革之原禍福之幾榜於道路仍督藩臬重臣往殿之捕首事數人置於法反側復靖御史傅君桂按部至永昌其土民具言府治未建人心且將惑傅君即日審勢定址計財料工以內鎮守舊治改為之王公特檄參政鄧君相副使蕭君乾元董其事兩閲月而成一如他大府之制法所宜有罔或不備永昌至是真大幸矣布政黃君忠遣人來請豫記夫天下之事謀之在同成之在斷而運之在機自永昌之人病於兩鎮之虐也凡有憂民之心者孰不欲更之而議或不協又泥於時勢之難為固有獨倡而無和欲執而不能者聖朝更化百度維新何公首主其議王公成之而鎮守巡按藩臬諸君又式克相之是以一興革間而惠流逺徼功施無疆信乎運乘其機而謀與斷皆善也抑余徴之漢事永昌太守鄭純為政清潔夷俗安之書於史傳至於今誦之不衰此則近日守臣建議慎擇牧守之意亦後來者所當知也府之復其事為重故詳記之若夫經營之役固在所略云重修蒙化府儒學記侍郎張志淳永昌曩蒙守正嘗遣使來問樂則賢之日訓導振之復遣弟子登仕持狀來告學校之成而徴記則又賢之按狀學建永樂中時蒙尚為州向震景泰改元始升府成化改元始易向離今嘉靖癸未雲南按察副使太倉薑公龍始闢門於左守尋闢門於右請丕舉學事是故殿則丹楹刻龍肇以金飾凡瓴甋塈榱咸斫而礱之加密石焉聖賢像皆更新建龕置帷帳之類凡金工繪工髹工色工罔弗飾殿之下唐陳戺級廉隅欄楯率增崇而殺密有等兩廡廊而大矣而服甓服圬服石服采精而衷華而軌罔弗稱故櫺星之門以木則易石故尊經之閣設前則移後門之東西增室三檼則曰厨曰庫有所矣閣之東西增室三檼而置巨匱於中則禮樂之器可儲矣泮池益深廣池橋益髙大而石坊有表門之外設樹樹東西設石而騎過有禁左闢之道故有成賢義路之表載刻石記之右闢之道更頖宮曰養士更儒學曰禮門俾與左適下至周繚之垣罔弗度則廟學於是乎舉矣禮樂諸器皆考經定制軌物章采故無而創者什九有而葺者什七則器數於是乎備矣乃又若殿門諸表自大成素王文廟成賢養士義路禮門鯤化之屬皆守書題不敢忽心畫於是乎虔矣工以癸未十月肇興以甲申七月告成財以兩計者二千有竒而民不與經理越歲而振之帥弟子能勤之不遑訓導崇智又能佐之不二是故士悅而興工傮而藝民趨而和役大而不勞工成而不費咸守事是事而無間也君子曰甚矣兹舉之善而狀不誣也哉守先問鳳簫編磬於豫其蓄心於斯也久矣可不謂豫乎夫事豫則立立則固固則著其有循也已守又好善經術士受易書春秋三經於專門可不謂學乎夫學則明明則智智則用心衷衷則循而整豐而制動而不擾而得民與士殆其末已今覩斯舉於振民育德設教於和會咸勤見仕於畢務戒事致用而咸罔不契焉則經之教直文云乎哉然綦而上之教之大直斯舉云乎哉傳曰教若川然有原以邛浦而後大兹則知邛而幾浦矣猶未大也可不務乎守姓左氏蒙産國初逺鎮郡守率用所産俾世後多以教廢而蒙獨以教興近見蒙所出士似有灼知義利之辨而絶異環滇之士之仕者於戲是豈無所自哉新建尋甸府城記張志淳嘉靖十二年春尋甸府城成雲南巡撫都御史顧公巡按御史楊公命布政使胡君范君具幣以按察僉事劉君狀遣使走千里授志淳俾記諸石按狀城在舊治之右踰一澗內築以土外甃以甓漸殺與土凖以丈計周五百三十有竒尺計崇一十有九厚二十有五下硺石厚五之一開四門南曰朝宗北曰拱辰東曰啓明西曰寶成凡並門及睥睨馬面墩臺皆甃令甓如城凡甃皆先抉土乃椓木木竪乃納石石實乃瀋灰以沃俾久不陷東南二門尤地卑而沮洳工力數倍於西北又開三隧以泄水而注之池池即澗水為之也城內通衢四縱一橫三皆逹城下前一衢置府所與學中因舊衢以通於西北二門後一衢列行臺與守巡之署而倉廩城隍廟皆在焉軍士之屋三百四十檼徙雲南前衛指揮四人千戶五人百戶十人土軍二百四十人撮官軍舍餘共四千四十有竒官皆授地宅軍皆授屋室於城內宅田之軍授田如制民間田以舊治地易之不足則益以官田又不足則償之以官價俾各有居業府舊在雲南東北幾二百里外接四川內鄰武定霑益諸夷宋無紀元仁德遺址在今城之東五里其遷於舊治莫考厥時領為美歸厚二縣我朝洪武中廢縣改今名以安氏世襲知府統之成化甲申革置流官癸卯築土為垣嘉靖丁亥安氏裔孫銓作亂入之遂刜嵩明鏺楊林齦木密膊馬龍構武定鳳朝文直逼雲南爇西門市舍雲南大震戊子三月徴兵四集始殲之時按察使徐君集議謂築城復縣立千戶所以兵守之總兵黔國沐公洎前巡撫藩臬皆是之乃遣按察副使歐陽君往相度歸言舊治隘不可城亂後民多死徙不可縣唯築城置所以舊治之左何見村為宜遂以疏聞報可是戊子十月也將事事尋民胥怨謂村地苦磽狹又鑿井不泉害將以生乃羣訴於巡撫都御史胡公公云此大事也可拂民乎遽命覆議而民情牢不可破公即以憂歸自是寢不復議者幾三年矣辛卯五月巡撫都御史顧公至聞之亟命按察僉事劉君從尋父兄子弟往質之皆實再引示所擇今地皆懌又别遣參議朱君往覘之益符遂以歸報則又有持異説以搖之者公乃率提學僉事王君都指揮樊泰及六衛指揮往則尋父兄子弟已數百人迎伏道左曰今生我也乃陟山降原遍歷舊地與何見村與新所議地皆曰惟茲可以永生生矣遂以改地之狀及增漢軍監土軍設吏目備官守洎前疏所遺者悉以聞行徴軍民會役命左布政使髙君慮財用計徒庸輸餱糧用僉事劉君議合千戶所於城北坎位則俾知府劉秉仁率僚屬告始事於城隍用牛一羊一豕一二月役者至則以指揮王章同知府領提調陳仲武領東門胡紹領南門周瑀領西門張略領北門蘇綱領中城皆佐以千百戶二人給以廩餼嚴以勸戒申以賞罰示以裒次乃斬木於海尾甸沙伐石於石灣麥沖陶土而填煅石而灰峙楨幹鳩編菅架廬舍引泉以陶濬河以運於是築之畚者虆者鍤者救者舂者甃之抉者㧻者鑿者圬者納石實者瀋灰而沃者繕之斧者斤者鋸者斷者削者執尋引而審面曲直者冶者墁者黝者堊者施丹漆而設色者取材之肩者負者舁者駢牛而車曳者筏而浮舟而挽者執雜役而奔走者持旌斾而巡視者罔不力而主地之官復聨以什伍之法均以老稚之宜定以作息之節是故六月土城成九月四門立時久旱飢而始有年役者請穫稻未返適御史楊公至下令趣之民趍歸如流城樓並作公私咸備前所命都指揮金章馮立各率所統畢至越癸巳二月甓城訖工是故金湯言言兵衛嚴嚴物類啿啿民心杅杅婦女懙懙老稚欣欣蠻夷雎雎士庶修修大山長谷離逖之氓趨觀仰嘆者粥粥而馮馮矣計役日二千人歷一年又一月共人八十萬米一萬二千石羡餘四千兩茲惟顧公始之中之終之亦惟左布政使范君按察使蔣君參政祝君謝君副使初君輩先後殫心協力故期年之間而地為改觀人為更新夷為讋服治為興起郡為增重而氣化人事交孚以升也狀之所具如此志淳苐撮其要以書而於其敘功績之詳謀猷之逺經畫之細悅以使民忠以為國之懿尚弗克盡也獨念成化丁酉志淳試場屋策問尋甸之亂莫可誰何朝廷創設巡撫選極名臣而隆其任亂本始拔今未五十年而産禍滋大顧如此無亦是務乎夫恃斯城者怯忽斯役者慆逺斯土者盤夷斯民者荒均非所以久之也鑒往而懼承今而惕心為民之心而不渝於久此則諸公所同願尋民所同仰亦天人所同歸矣髙朗顯融令聞長世奚翅光昭於茲石通海縣三節祠記巡按毛鳳韶麻城按盧烈婦傳盧河南光山人適同邑庠生東欽欽父旭任御史以纍謫通海戍卒於途有司録其家以往盧與欽奉姑行姑亦卒至通海籍欽征和泥卒於兵無子盧誓守奉祀有張姓者謀娶之盧縊於室獲救復強致聘具盧詈之棄其物於門外三日哭不食適夫妹東氏自海外來張言必娶之東勸盧避其家盧佯許之隨至海畔紿東先行赴水死時明洪武辛亥秋七月二十八日也越嘉靖丙戌冬憲使魯溪戴子讀其傳而嘉之曰卓哉盧之烈也可以風矣抑盧之烈也其東氏之遺也乎盧之死也以念夫也夫欽之死以代父也父旭之死以承君也父先之而子象之夫刑之而婦隨之易曰地道無成而代有終也此之謂也婦以夫死曰烈子以父死曰孝臣以君死曰忠三者天下之大節也東氏兼之可以風矣乃立祠於湖上凡三間中題曰明御史東先生旭傍曰旭子庠生欽曰子欽烈婦盧氏前為中門又前為大門匾曰東氏三節祠之門外又為坊曰表勵風俗君子曰父之忠子之孝因婦之烈而顯焉家之不可無教也如是越庚寅夏聚峯毛子按通海戴子以告曰執事采風可以記矣毛子嘆曰世變風移雖賢者猶不免計利害為身謀而東氏父子夫婦各秉節守義於流離顛沛之際甘死不悔三綱賴之以立君子可以觀人矣東氏殁百四十年蹤迹泯泯戴子乃獨搜其事於遺簡而揚之海隅之外立祠以風邦人使夷俗一變君子可以觀政矣碧嶢精舍記修撰楊慎新都滇海西斥舍舟登陸俗曰髙橋稽之古志橋實曰嶢以山形似秦嶢關受此稱爾髙嶢與碧雞相望如箭括毛沂東鎮氏有别廬在其下精舍之顔隸古定曰碧嶢他日有客憖獻疑於楊子曰茲嶢也沂知之沂號之如俗不知何易諸己諸楊子曰無易仍爾也君子期人以雅不以俗待人以博不以陋昔者孔子之作春秋也經書善稻吳名則伊緩也經書太原狄名則大鹵也經書蚡泉狄名則矢胎也榖梁子曰號從中國名從土人范寧曰物類地形當從中國至於人名則從本俗楊子讀而詮之曰大哉孔子辨物正名奧哉穀梁啓藴發隱號從中國故去大鹵伊緩矢胎而從太原善稻蚡泉也名從土人故介葛盧戎曼子皆不易矣慎往年執簡史局綢書藏室見洪武中有請以春秋兩漢地名驛詔既從其請史復書其事皇祖之謨春秋大復古之意也慎自執戟於滇每慨物類與地形名失之陋俗若􅨻㟽而為祿脿吕閣而為吕合金浪巔之為丁當丁瀾滄江之為浪愴江也不止嶢之為橋耳方言既訛郡志踵謬豈君子雅俗而博陋之心為盛世一統而同文之義乎東鎮於春秋專門其學而又以世族閥閲子明習當世兹名也固雅俗博陋之濫觴辨物正名之拳石與因注而志之若夫臨睨眺聽之美薈蔚清冷之興卷中能賦者則備矣逰點蒼山記楊慎余自為僇人所歷道塗萬有餘里齊魯楚越之間號稱名山水者無不逰已乃泛洞庭踰衡廬出夜郎道碧雞而西也其於山水蓋飫聞而饜見矣及至葉榆之境一望點蒼不覺神爽飛越比入龍尾關且行且玩山則蒼龍疊翠海則半月拖藍城郭奠山海之間樓閣出煙雲之上香風滿道芳氣襲人余時如醉而醒如夢而覺如久卧而起作然後知吾向者之未嘗見山水而見自今始嘉靖庚寅約同中溪李公為點蒼之逰二月辛酉自龍尾關出天生橋夜宿海珠寺候龍關曉月兩山千仞中虛一峽如排闥然落月中懸其時天在地底中溪與豫各賦一詩詩成而月猶不移洵竒觀也下山乘舟至海門閣小飲壬戌復行入關由溷溷亭而升覺真菴北折入谷口觀寶林寺山茶因叩圓海寺瀹茗煮泉坐於萬松之隂已乃拄杖下澗度石關至鶴頂寺松竹蔭軒洱波在席相與趺坐酌酒時夕陽已沉西山缺處猶露日影紅黃一線本細末寬自山而下直射洱波僧曰此即鴛浦夕陽也餘波皆碧獨此處日光湧金時有鴛鴦羣浴今則網罟太密此景時有時無不常然也豫曰但觀涌金流采已自勝矣癸亥北循山坂至金相寺廢址有唐碑為髙僧講經處盤山腳而西至松蘿巖石洞幽勝相與酌酒賦詩暮投感通寺樓篝燈夜坐聞寺僧誦等字中溪曰六書中轉注實非考老而宋人妄擬後世學者遂沿而不改此不可無述願公任之豫遂操筆書轉注之例約千餘字彚為一編中溪題其額曰寫韻樓寓此凡二十日而後去茲寺有髙皇帝詩十八章鐫碑山門院凡三十六今存者僅半耳三月乙酉北行五里有寺曰玉局內有昭文祠土人祀唐御史杜光庭之所西南有一溪疊崿承流水色瑩徹其中石子粼粼青碧璀璨宛如寶玉之麗其名曰清碧溪緣山麓北行二里至天臺有諸葛武侯畫卦石土人於石上建八塔以識武侯之迹云東行一里至𢎞聖寺有浮屠髙二百尺規制嚴整考之野史為隋文帝敕建者或曰阿育王北行二里至點蒼神祠即唐書載使臣與南詔設盟處也翠微有巖異香酷烈豫二人不能上令人候之果然廟後有問俗亭俯瞰城郭樓觀海波萬頃澗松縈雲巖雪映日酤酒更酌村人薦米纜食而甘之既醉既飽下山北行二里抵三塔寺宿寺有七樓八殿皆中溪重加修建者有書樓在焉因流連纍日芒鞋藜杖相與入瀑布溪懸流百尺其承流處有石如盤盤中有一石為瀑流所激跳躍如馬聲如雷鍧石壁上有朱字詩為濺沫所塗逺不可辨憶當時題刻懸構千仞之上非大力不能也壬辰登帝釋寺松蘿蒼翠因止宿焉夜中靜默聆丁東琳琅如琵琶笙簫又如琴瑟有頃而寂舊聞茲地夜聆天樂故名其峯曰應樂中溪曰豈山腹空洞萬竅遞響耶豫曰如此則不應有作止也僧曰世傳空洞隕石上有帝釋像今所奉者是已帝釋為天王中最尊故有天樂隨之豫曰六合之外聖人存而不言此亦世外事不可以臆見度其是非也癸巳北度兩澗至無為寺寺有汝南王碑聲如玉磬清越可聽因以木擊之歌少陵春山相求之詩聞北岡有元世祖駐驆臺後人屋之方至其處大雨忽至遂趨屋下避雨軒窗洞豁最堪逰目則見滿川烈日農人刈麥豫曰異哉何晴雨相兼也中溪曰此點蒼十景之一所謂晴川溪雨者是已每歲五月溪上日日有雨田野時時放晴故刈麥插秧兩無所妨世傳觀音大士授記而然西上里許有寺曰救疫山泉甘冽疫則飲之可以已病寺因得名北去四里登鶴雲寺有仙女池沖舉石相與坐嘯久之又北六里許至石雲寺沿溪而西過獨木橋升寶華寺其地多花卉紅紫膠轕乃移枕簟以息中溪弟仲春叔期季和豫煮樽酒於叢薄中忽從滴乳巖旁出不覺驚喜拍手大笑因引滿盡醉是夜卧草庵殊覺快適甲午同上悉逹場遙見瓦屋懸構於蒼煙之上扁曰中溪小隱時已入夏猶圍火而卧晨起窺石洞猱緣細路下臨百仞比歸頗有垂堂之悔出山因以相規云丁酉至陽溪歷遺愛寺觀舍利塔入溪三里有一石門如圓月者羅剎洞也世傳觀音大士閉羅剎於其中云又西行八九里至出佛洞巖壑幽絶可以結廬又西六里為洞天山層巒疊嶂望之蔚然顧道路﨑仄且空山無人乃旋轡出谷宿遺愛寺中溪謂豫曰不見廬山真面目只緣身在此山中必須東泛洱水卧數溪峯庶盡點蒼之變耳己亥逰上關水月樓泛舟遵島嶼而南至金榜寺搖落無僧又南閲青巔寺前巨人迹已乃南泛有巖飛出水面曰雞額山維舟山隒徒步而升石磴盤旋可三百武則見削壁卷阿正向點蒼十九溪峯盡在几席山巔積雪山腰白雲天巧神工各呈其伎豫曰此非點蒼真面目乎微公幾失此竒觀矣相與訂約結社以終餘年經營其地約二十畝可為蔬圃草間得柱礎石古瓦知為寺場也往來久之僮僕於灌莾中得一石洞簷牙戶牖大類人居中可容二榻喜不自勝曰此可免結廬之勞矣酌酒相慶戀戀不能去舟人催促豫二人相向惆悵恐不能復來勉從入舟則天光澄淨波紋沄沄遵巖壁而南壁下石窟有深有淺皆漁家婦子居之生事蕭條身無完衣指豫舟中几案食器互相問詰蓋素所未見也豫二人不忍其窮各解衣投米問其男子何在曰欠課為官家所繫其情可悲也又南至鐵雨巖云是羅剎欲背盟逃逝大士雨鐵以止之是其迹也巖面如蜂房蟻窩大者棲鶻鷂小者巢蝠鴿聞舟人喧驚出而羣飛又南至赤文島云是大士買地劵字如蠡篆不可辨識瞑色欲來河水浮緑乃舉棹西向洱水龍祠辭舟登閣自念放逐以來得此佳逰真如隔生事矣中溪與豫賡和詩若干首彚為一帙題曰蒼山雜詠云定逺縣儒學記楊慎雲南楚雄府屬曰定逺舊未有學提學副使仰齋胡公建議請於朝始命建學盛舉也經始於嘉靖二十六年孟秋釋菜於二十七年長至學成宜有記縣之官司請於胡公公乃猥以慎嘗從事秉筆後屬為記之慎參按圗經域志定逺在漢為越巂郡地三國時諸葛忠武侯征南中營於此唐武德中置西濮州貞觀中更名髳州後訛稱牟州宋世淪於段髙二僭夷至元立牟州千戶至正改為定逺州本朝因定逺之名而降州為縣百七十年而始建學皇明文治之遙聲名之盛多士生斯時斯地亦厚幸矣嗚呼漢之斥土名取越巂者以斯地實越巂水以彰休盛然特以闢土服逺言爾國家以綱常為治禮樂為教雲南雖去神臯萬里而氣厚風和君子道行已於洪武初元榮被天言之褒矣咨爾多士涵泳聖澤豈可憬彼自棄乎矧髳濮之名已見牧野其歸仁應化已兆於武王永清之世而武侯之過化則淡泊明志之真道寧靜致逺之心學諸士子獨無興起乎夫學亦多説矣肇始於六經發揮於諸子更僕未可終而走也獨舉武侯淡泊寧靜之一言者以古者建學立師必本其地望希賢懷古恆首其儒先武侯之在定逺固名宦之稱首巨擘亦後學之指南元龜也藏焉修焉息焉逰焉亦可以為成人矣由是而之焉以希聖敢謂無其人乎敬書以俟若夫建學諸與有勞者皆列其名銜於碑之隂連然新井記楊慎安寧為漢之連然縣據班氏地理志有鹽官焉今其遺井四曰大界曰洪源曰河中曰石井也嘉靖己酉奉敕理鹽法雲南布政司參政平崖李公以濬新井之議白於巡撫都御史箬溪顧公巡按御史石海林公乃檄下安寧鹽課提舉張右銘及同提舉姚文而銘實專董其役不一歲而井成李公名之曰連然新井稱從漢舊績則新矣又亭其上以蔽風雨下緻石為疊澀以亷之以遏淫潦蓋其地濵螳螂川勢宜爾也是嵗十月李公復按其地謂右銘曰盍碑之樂石乃屬詞於慎嗚呼山海天地自然之利也惟不私其有而公之人則是順天因地虞廷之阜財中庸之寶藏也若國專禺策之富民隱覆盆之憂官𣙜而私病上肥而下瘠開利孔懸罪梯是管啇而已桑孔而已豈聖朝設官之意哉繄惟李公之創是舉也俾茲一泓之饒庸補四泉之乏實以阜吾民非朘民以阜財也易曰井收勿幕有孚元吉又曰損上益下民悅無疆此二志者今之謂矣嗣茲職者宜鏡茲雲南右布政使羅湖劉公參政雲阿譙公參議龍巖趙公賔竹王公按察副使仰齋胡公雲門周公石庵郝公臨溪張公漸庵郭公僉事泉陂孟公劍峯黃公同議而協之贊行部而觀厥成例得牽聨逰雞足山記知府李元陽太和葉榆水東陸行八十里至白石庵見一山聳出平頂南向餘三方各有山一支蓋一頂而三足故名雞足由白石菴至河子孔過福緣寺不由洗心橋以路迂也福緣一名接待由此上傳衣寺謂此山乃佛大弟子飲光迦葉守佛衣以俟彌勒補位山頂故有迦葉石門洞天因以傳衣名寺此寺世有髙僧天機創於前海慧葺於後故巨麗不衰也先君與僧徹空建庵名淨雲院院旁庵所結構皆清幽觀玩久之就宿與瞽僧劫空夜話覺從逰者衆有妨靜賞屏去大半由傳衣西南經萬松庵少憩西至華嚴寺主僧真圓有戒德其徒皆率教一山所不及也與談久之由此北行里許至龍祥寺又西南行直趨放光寺約四里皆由岡脊行澗谷舂淙岩壁在望逢人皆云此路甚有眼界如由右路則低陷無此景物矣乃知此有二路貴在人擇取耳至放光寺為常年放光之地上直迦葉石門以風水向背言之此為胸臆之穴餘諸庵院皆在山之肩臂矣舊為灌莾所據嘉靖丙午余與壻吳階州懋來逰從大頂下瞰見之因謀於山僧圓惺以田金與之閲十年乃落成余弟元春元期元和各鑄一銅像奉安焉惺有信力勤儉種植之利足以垂逺矣余三度來逰皆在冬春不見光相此來正當六月詣巖殿致禱俄頃見兜羅綿雲緬平一白宛如玉地有大圓光倚立玉地之上外暈七重每重五色環中虛明如鏡凝觀者各見自身現於鏡中毛髮可數舉手動足影亦如之衆人同上唯見己身不見旁人僧云攝身光也有頃光沒風起壑中雲氣散盡林巒改色鮮妍奪目復出一光大如虹霓然虹霓半缺不圓此光圓瑩如水晶映物僧謂此光乃佛現也極難得遇須臾乃收同遊有老者云昨見平雲上現二銀船檣柁皆具往來江村沙浦之中如人掉之但不見人然則光怪非一狀也寺西北六里有化麓等七寺皆大梵剎遊人罕至余昔歲曽逰今倣佛在目不能再往遂登袈裟殿此殿有伽藍神甚靈余初年來逰只單騎入山僧多不識是夜此殿鐘不扣自鳴三聲僧起視之重門皆閉不見人謂其徒曰土主報鐘必有異也曙色初升余至寺門僧迎見顧其徒曰鐘鳴以此也余詢之信然殿北巖龕為楊黼修行處又西上兜率菴為行僧萊關主所建集僧煉魔今道月居之不失其舊庵北石下出冽泉上下諸庵皆賴之以食又上鐵瓦殿主僧圓成所建殿後有袈裟石青石白泐如袈裟之制髙僧圓清卓庵於其側余玩坐至夕卧不解衣人言此處五更見日出驗之信然蓋雖無雞漏然四望沉黑東方未明之時已見紅光如火焰假寐有頃乃見紅日徑丈許躍然而起須臾即漸減小矣此與衡嶽日觀峯相似凌晨脫鞾著屐上猢猻梯手攀足躋時覺石動而未嘗落足每近手膝嘗點胸後人之帽嘗觸前人之履然有欣快而無勞苦也梯盡處有大悲閣僧曰且止此處風軟可以四望過此則風徑不可久立矣如其言班荆而坐蒼洱塔廟在空濛中如世外壺天五百里外山川皆在足下即未登仙亦足豪矣既至大頂普光殿見工作精好大愜豫懷俯仰今昨追維存殁昔時玉溪石大參簡卓庵王僉憲惟賢髙泉謝大參東山野庭羅部使瑤賔巖何大參鏜皆相繼登頂以書抵余曰大頂無殿其補作之余如諸公命僅建一殿以塞責不圗今日恢宏至此恨殁者長往存者不再見矣江山千古登眺須臾勝迹既留音容在目因鐫石以記之出殿而西行於剛風灝氣之中歷虎跳澗仙碁石過一草庵西南至拜佛石下臨千仞可坐不可立余正德間嘗築室讀書今故屋在焉回思往事宛如昨日人已衰頽尚能此住耶辭僧下臺至曹溪水水上有曹溪庵庵前小坐回望拜佛石令人有飄然逺舉之想又東有八功德水水出飛崖下僅容一瓢四時不竭世傳羅漢修行處留此聖泉理或然也東行有石竅故老云異人以呪術收蛇在中故一山無蛇又前至迦葉門即尊者守衣入定之洞天也俗呼華首門聲之訛也髙下有一門皆倣佛城門之狀以今觀之若頑然一壁耳野史載唐時有神僧小澄者訶門訇然中開入已復閉其語雖若不經及觀記傳所載洞天福地皆在人境肉眼不識也嘉靖間有一僧自逺來徑投石門結草庵以居自約苦行住三年滿而後去期滿之夕夢石門忽開中有多僧延之使入見殿宇金碧門上各有金字對聫惟正殿有金鎖不開右堂衆僧皆默坐左堂如齋厨設供謂僧曰汝勿去得乎僧曰吾有願欲遊名山尚未得住也言已而寤猶記對聫識而藏之世傳竹林寺在匡廬余昔逰匡廬老僧指曰此處遇隂雨之日忽見一寺金榜曰竹林寺廊下有看經僧庭中有幡竿歷歷如白晝移時乃面石壁一無所有其事大率相類迦葉門岩半有金雞泉僅容一碗日有異鳥飲之鳥來必雙至二十雙而止四時皆然鳥無增減水無盈縮嘗有僧貼壁結樓取泉自供夜夢神人曰此是金雞泉爾不宜見擾明日而樓災遂不復搆余與客藉草坐茶罷遂遵舊路而至玉皇閣一名聖峯寺寺僧天心有禪味遂過宿明日歷海會庵觀音庵寂光寺千佛閣乃至龍華寺此寺殿閣宏麗寺旁庵院十餘所因止宿遍觀焉又東里許至石鐘寺乃一山總會處寺東稍南有茶房有瀑布水正東有鉢盂寺北行里許為五華寺一名小龍潭東五百武為羅漢寺一名大龍潭東北三十里有二洞皆名迦葉洞一在山麓二月土人作會一在山腰草木蒙蔽非土人指示不得其處二洞各深百餘步竒石萬狀雕鏤巧妙如人為者余昔逰四方凡有洞必不逺百十里皆進焉觀於此洞余昔所見皆不足言矣至此為鄧川界遂由此趨上關而回路人云初入闕子孔上一路至石洞林樾雄深正對巖面其石上有古人朱篆至今不滅余倦不能往假我數年更卜重逰耳布政司題名記布政曾存仁吉水昔司馬溫公以為名為戒直以與為利者例論後世事涉於名君子類指為口實愚又以為過方雲南布政先後題名凡三十嘉靖乙巳春門廊不戒於火石隨以燬至是修復故事合前後羣公姓名履歷併刻一石仍虛左以俟來者時在位諸君子相與諗於豫曰名之必題於石何也曰匪石榮名惟名能為石之輕重耳失今之方嶽視古諸侯君國子民於是乎寄以豫輩列官於兹儼然古諸侯之任人之望之將徒以君子之名豫之乎抑以實相責備也夫人以君子之名豫我而不思所以自勉非也以君子之名自勉而不務進於古人實勝之善非也是故勤宣明德邁迹勳庸以業乎其官於是乎官有著政人有公評以徼靈於國家固將得附於君子矣况尤有進於此者乎若二三其德慆淫是即以僨其官於是乎政有遺慮民罔攸塈以干罰於國家且將得罪於君子矣况尤有甚於此者乎故曰匪石榮名惟名為石之輕重也曰必題前諸君子何也語有之不習為吏視已成事則前之注措謂非吾今之凖繩乎吾誠師其意不襲其事考其迹觀其用斟酌損益與道為歸有不淑者必以為鑒則前乎吾者孰非吾師資之地吾可使其名泯滅不傳耶曰必虛左以俟後何也後之君子吾不得與之翺翔矣顧土地人民朝廷之所寄也吾今亦惟為其力之所能為焉耳吾力之所不能為時之所不可豫為勢之所不得為皆不能無賴於後之君子審時度勢以償吾欲為未酬之志吾可不虛左以俟之乎夫章往而待來尊道而求友大公以合衆實心以為民凡以君子之道待人而因以自勉焉者若徒為夸毗為比昵將易之所謂同人於宗而羞吝承之雖列名於石夫奚榮曰是則然矣以司馬公之言例之得母汲汲於名之嫌耶曰公之所謂戒者名勝之名也若實勝之名公固嘗言之所謂居是官當志其大捨其小先國家之急而後身圗是也嗚呼是言也豈徒為諫官之訓固我有官君子之龜鑑也誠相與加勉將人之視之為麟鳳為金石夫何嫌名之有耶創建廣通縣學記提學張佳印銅梁國家略定南中議禮制度建學張官聲教四達楚雄屬邑曰廣通縣者故無學士皆附郡學云國家垂二百年來教化淪被人士蒸蒸相望皆言附他學不便先是知縣吳習從生員王化輩請尋上議當途可之出帑藏若干緡並邑之士民所輸者易土舍隙地建明倫堂東西齋大門二門規制草備會吳尹遷去廢閣經年嘉靖丁未李公來尹茲邑嘆曰凡建學者非為血食夫子與其諸弟子哉不首廟廡而亟所緩譬治家者先寢處而略家廟豈理哉公意雖甚毅邑事故簡帑無羡鍰又切循拊不欲勞民乃捐俸先倡邑之人士感激公義各輸助有差計得二百餘金諸所不給公多注措經營盈縮如治其廬先文廟次啓聖祠次兩廡次戟門次櫺星門次泮池次敬一亭次聚奎樓他如厨庫省基供案几筵靡不畢舉工告成前學使胡公堯時請兩臺疏入得設官如制云余嘗考先王之制因五方異俗立寄象鞮譯之職然後逺民安業而司徒之教興焉修明齊一有物上崇簡絀有等春夏秋冬有術乃論秀而升於天子宜古之材彬彬然盛矣按廣通本西南徼外路睒地前代自為聲教各以兵力相雄長無禮樂絃誦之化所謂五方中之雕題者非耶今廣通之士前後舉制科者四前後貢者五倍之見為學宫弟子者二十倍之而黌序巋如遊習有所日出而鐘鼓和鳴師儒揖讓陳説先王之教趨蹌仁義之途使椎編之民環視踴聽共被華風伊誰之力哉余行部廣通見學舍炳麗特異他所初不知建學自公始因求建置無記師儒遂以記請嗚呼自建學至今幾二十年邑之籍是稱士者若干人何當時踴躍請建於前卒不能伐石以記創置者之本末於後乎董子曰正其誼不謀其利此千古士則也余方以名檢磨礪士子豈宜不逹建學本意而重負余教哉李公名第字道升别號三溪四川銅梁人余之先生也令廣通九年有惠政遷阿迷州守尋致仕歸逰安寧溫泉記張佳印嘉靖丙寅十二月草三日余校士安寧畢將欲觀湯池先遣一力拏舟螳螂川厥明徑鹽井觀之鹽官令竈丁以皮囊汲鹵水據晉常璩南中志云連然縣有鹽泉近志乃謂唐武德間因阿寧始掘地得鹵者非是觀畢屏輿從出大界村乘舟順流北行一里東望龍寶寺隱叢竹中亦蕭逺可喜舟子報郡吏馳騎率鼓吹追余亟遣去舟中望一山峻插東北隅兩峯如削凹其中如筆架形土人因以名山一名岱晟山一名坎山昔僧張善信有異術除妖坎山即此又北行五里徑石淙渡故郡人楊少師一清築精舍讀書處詩文具集中一時名家則李長沙東陽陸上海深李北地夢陽最稱傑作沿兩岸土人引水溉田堰壩鱗次舟過若決呂梁水車髙翻濺珠成雨似瀑水飛灑空中又北行五里水回折作曲瓠形螳螂川多直北流至此周繞二里徑龍山下山川窔窕松石參差最為佳境東岸一帶巖石􅚱砑上鐫曹溪夜月四字稍下紅石削起鐫赤壁天成四字皆楊太史慎題也行半里七洞臨水飛巖峭立五彩絢雜洞口重扃大似雕藻再行半里至溫泉乃艤舟登其亭飯罷觀溫池而浴之池水皓潔纎毫不隱四面壁起不煩甃甓中二石光膩勝玉碧色奪目華陽志云水神祠祀亦有溫泉顧祠今廢矣浴罷風乎亭上一峯對峙命觴相矚覺兩腋間習習風舉余嘗浴驪山香陵渝峽諸泉類多穢氣逆人鼻楊太史品茲泉為海內第一湯似非溢美時日且午聞西岸有聖水一名海眼泉潮應子午卯酉之候亟渡而西登陸陟其所古木參雲水自竇中出盈盈溝澗土人謂此午潮至遂名曰聖水三潮不云四者子夜故不及見耳余曾觀泉華清宫下水出左右二竅應朔望不爽自是造化氣數茲泉無足異者又披荆榛南行一里至曹溪寺寺在龍山之麓土人一名蔥山草徑盤歷可肩輿上無甚斗絶郡志云髙八百丈周遭七十里誣矣寺殿固山層構中有楊太史碑文不減王簡栖頭陀之作第四級殿宇閎麗佛像莊嚴前行十弓許一樓顯敞右植木蓮花樹青蔥可玩俯視螳螂川清漣如帶稍東一園鑿山石作几形桃杏薔薇屏架繁雜道上曝麯蘖數石余呼僧笑曰僧家有是哉僧叩首若請罪狀余曰昔支道林好養鷹駿惜爾無大韻也觴山寺右一泉㶁㶁鳴亂莾間循泉散步南行一里許下有龍洞造其門下視深黑不測寒氣逼人投石其中逢逢成響七八疊而後止又西南步行可三里至龍潭乃水源處有二穴穴口多小魚山樹蓊鬱如蓋坐樹下飲水甘之俯瞰平疇如波文可愛指顧太華纍纍逺近竒峯錯列杖舄下問之皆夷名甚辱茲山也由東南下山復登舟逆水行夕陽既下萬峯盡紫西望虎邱山寺與太極諸山碁布相屬復繫舟登岸里許至寺襟帶螳螂枕藉虎邱信一靈境前殿榜曰妙果禪院殿制古麗畫壁精工非時師可及相傳為唐殿余觀之多元制也出山門南望郡中煙樹萬家暮靄如罩遂從陸歸時列炬在門矣返署中追憶斯逰操舟順流左右山色應接不暇躍足振衣登髙睇逺而梵宫鐘聲洞口松濤所至竒出令人忘歸惜哉絶域往往好逰之士無因振策於煙水空翠之間茲逰蓋萬里竒蹤也遂秉燭記之武定府改土設流記同知鄧世彥湖廣雲南古靡莫地自哀牢內附不常我國家混一區宇中國其地赤子其人如武定設軍民府治隸土官知府流官同知佐焉因俗易政相忘於治鳳氏守官樂土與國同休可也鳳英謀孽朝文煽亂索林竊位釀禍逆祖再叛據城殺官奪印厪朝廷逺慮大兵𠞰滅法當族誅當道憫思堯稚年先逃省會冠帶之議改未決民夷聽撫前訴激者謞者叱者吸者小恐惴惴大恐縵縵其發若機括不輕因籲衆悉造於庭曰巨魁截餘黨附衆生矣若此者何居咸仰天噓嗒不言悟曰勢重莫反當先之如改設何庭叩震地曰旦暮得此其所由以生乎彥亦惴惴自任若有真宰而不得其朕夜條二十事胥此意也當道悉允行上其議於朝欽升劉公宗寅知府事添設推官談君經建捕盜館於撒甸丕變有日降思堯聽襲經歷給莊田一百所莊戶以次編入圗籍不假之巡捕不期月遐邇相目曰昔苦其五曰抄曰殺奪其妻不育其子驅之為盜今樂其一曰安為是而有瘳也請言其瘳耕者食畜者羣行不必偶出入無禁屈者伸寡弱無凌暴父母妻子相聚見交賀曰而今而後知流官之便於民也夫川竭而谷虛邱夷而淵實改設行而寧謐亦勢也難乎其議矣此議生於人心陳以臆見謀於通判某知州某某等決於司道某公等主之者前院吕公光洵劉公思問今院陳公大賔劉公應賢也四公不自有其功歸之朝廷吁亦奚功純朴不殘孰為犧樽白玉不毁孰為圭璋土治相安孰為改設今日之功鳳氏積纍之罪也罪罪而功名焉二十事其侈説與以為是而必行則俗惑於辨以為非而必去則政敝於矯今種種之民訓行鄉約親親長長甘食易服樂俗安居將至老死而不惑且知法之無所用也嗚呼星星之焰涓涓之流毋決防而撲易因勒二十事於石時隆慶元年十有一月也阿迷州通靈洞記巡撫鄒應龍長安夫物有祕而必彰事有開而必應幽贊神明存乎其人阿迷郡名輿地創始音稱之美孰敢議之頃豫以綏逺無良致勤甲士懾郡氓心實惴惴思無道以永戢蓋往愆會羽書暇偵報郡南有嵓穴數處舊為逋者藪豫乃輕騎率帳下士縱獵其場大搜之山溪埆嶨步行且艱至一洞懸石萃嵂詭譎周回樹根盤拏虯結條上造霄藤蘿纒挂覆如蓋圗畫所不能盡也下有水涌出分兩派注之溪會歸盤江焉洞門橫可容三四人豫去戎服佩珥俯僂入列數炬前𨗳初入壁逼仄下則水石交砌足踧踖徐捫壁登一石磴力躡之上頗寬敞懸石柱數四垂者倚者植立者變態疊出地皆沙石水痕鱗次氣蒸蒸如鬱再歷十數步則一孔豁然透天日心目即爽朗又旋繞之如經數堂宇一處更髙廣仰視之狀如龍盤鳳翔鐘鼓懸列紆舒屈曲珠纍乳滴浸淫蜿蜒鬼怪駭異真竒境也南崖下黯渺漂涾火燭之則見橫流洶涌波驚浪躍決如奔馬淵淴濆瀑杳不可測志所謂以石投之深而雷鳴者也遂由故道出距巖而立反顧醒然如得問其名曰龍洞左旁石有標題曰南洞咸謂距此有洞三皆無此竒豫俯而思之景與心會乃進郡守羅子星謂曰此洞名無謂夫有物有形名以形立斯為稱情茲洞也在治之南地為離方冷然中空靈源貫注一竅天開殆猶人之形合以神通造化也曷不以通靈名之造化之祕今其章乎郡之以靈名著茲非開先乎羅守欣然對曰唯唯夫郡名迷實未迷也迷以形靈以神也然人之靈非山川不鍾山川之名非公不彰造物固有待焉今郡醜跳梁干紀越常是迷人也田畝蕪於宵警行道梗於剽掠是迷塗也髙山流水佳賞者希是迷津也公身率諸大夫士迅掃氛祲自是士民安堵而樂業家鄒魯而身孔孟山川生色萬古常新所謂發蒙解惑未足喻也山川效靈自今伊始名烏可仍舊哉辭未及終時前軍鼓譟震天歡聲如雷搜者執俘凡一百一十有竒遂繫之後乘豫厚賞搜者整轡言旋命掌書者記之橫山水洞記布政羅元正鄱陽去會城而西幾三十里為龍院諸村村凡八村之田凡若干頃田稅嵗輸縣官凡若干石村故枕山而帶水水即滇池也池低村地勢隱起差具傾倚狀可立上遊走丸以故池水不可逆引而仰溉村之負山而田者無論愆陽即旬日不雨土脈輒龜裂嵗輒不登中歲他境稔而茲境不厭半菽民苦之村迤西三十五里為白石崖崖故有泉其山形隱起則又髙龍院諸村什九度崖泉可引而東以灌然橫山牆立於前岸然峭阻先是議鑿山之凹為渠引泉踰山而東乃其山石脊而土麓石堅不可鑿議鑿其麓自西以跨於東五十有八丈村農合力率作紛若蟻之營垤踰嵗訖無成績方伯敬亭陳公以省耕至問焉衆告之故公曰茲吾事而以疲若等吾為若成之乃謀諸同寅計其費可三千金移議御史臺報可公檄掾尹德先何獻榮劉得先後繼董茲役曰德先汝往視疏鑿相度規畫以樹爾功洞髙五尺廣二尺斷木如髙廣之數以支顛圯功成徐易以石發帑儲如議數授之上下其工之直以廩焉曰獻榮汝往卒德先功曰得汝其嗣德先獻榮以督諸役之力者不力者已又檄舍人袁應登佐掾以轄羣工應登簡工之不習者請以礦夫代功可其請召朱正輩二十人以屬應登余時參藩政同公往視指授向道分東西鑿鑿幾半而道不值豫當入賀行念前功恐或棄之者公請於撫軍曹公雲山巡按許公保宇僉曰政在利民毋惜費毋憚勞其往督諸掾役毋隳前功各捐贖金佐工諸掾役競奮如命道果值實隆慶壬申之二月十一日也遡始事庚午凡二歲易掾董役者三掾以直盡告者五告即議發先後五發帑凡百有十金而訖功敬亭公曰吾可休矣公與時不甚合久欲乞歸會水洞未成而未決也明日遂謝事去獅岡陳公繼公愈益振策諸掾役尋以成功報靈竅朗闢洞中可偃蹇行公復趣掾尋源引白石崖溝山腰連山奄互得泉二十二道蜿蜒縈紆四千一百八十三丈廣盈尺深踰咫泉抱山而東赴若帶而綰若白龍挾雨偕山勢俱來若玉虹下飲潛入洞口而東出噴薄淪漣堰瀦而渠分村之耕者需濡稼者需溉植者需滋畦者圃者需潤不雨而澤不禱而免於旱稿民甚便之而德諸公之功乃歌曰橫山之麓可屋可田白崖之泉可引可沿山麓可鑿伏流潺湲茲麓既闢不淤不顛溉我稼穡充廩盈廛我公之績億萬斯年曷俎豆之以輸我虔鄒公名應龍長安人曹公名三暘宜興人許公名大亨安肅人皆起家進士敬亭公名善浙江錢塘人獅岡公名時範閩長樂人同嘉靖辛丑進士傅公祠記提學馮時可華亭傅公諱添錫字佑之系出錢塘於宋髙宗時為望族逮頴國公友德為明佐命臣生四子公行三當元季天下擾攘傾側父子奮身而出各圗雲臺業遂相失焉公長身瑰瑋矯矯若雲龍為經生即有聲尢工詩詩格髙不作大歷以後語暇即談兵以穰苴司馬自負每籌策天下事慷慨中窽揚眉裂眼人不能難一日忽語同學生曰吾仰測渾儀旁察方輿江淮間欎鬱薄層霄成龍文五彩者其天子氣耶遂棄去間關投謁髙皇帝被杭偽帥潘允明兵執詣帥帥欲臣屈公環以兵公曰聖主出矣若不日且茹肝無臣我我翹然男子非若臣也鬚蝟張目光炯炯射賊聲震行幕允明與諸卒皆辟易不敢兵俄報明李武靖公破富陽餘杭兵壓允明營明謀拒敵公嘆曰明天子天授神兵百萬批搗磔裂卻掃千里前茅至此無完卵矣且縮甲可幾福毋以身試刃允明雖駭公言亢而與其黨計以為然乃釋公縛偕偽員外方彝身往策干武靖武靖與公語良久竒公因納允明欵武靖不煩一矢獲甲十餘萬大悅還薦公拜明州訓𨗳公之官至則招其豪傑詣金陵上事時僧機先黠有謀引倭襲明州因詩通公公得機先狀以請州乃設備誘縛機先用功升知大名府元兵犯大名公涖任甫七日備未具不敵綰璽還請就司寇法詔報曰傅某有殊績郡新造非爾咎其安置雲南之永平公配于氏擕以往明年抵永平又明年拜大理衛知事未幾普安賊安乃叛公督兵與戰不利或勸公逸公曰爾何餒悖失策往吾守大名不完郛皇帝不以膏斧使衣冠待罪德甚厚非畢命枹鼓曷報免胄捕賊死之土人以葬驛後公生寬寬生瑄瑄生易庵公澄澄教諭江安有公風生工科給事中良弼以蹇諤著正德十六年部使者秦公請於朝立祠祀焉故制粗朴不足妥靈歲月既久漸即毁墜至萬歷十祀而公七世嗣侍御公來按黔黔人德侍御公念無能報謀新公祠業欲請會中丞承天劉公聞之曰偉哉傅氏明德逺矣其亟新焉以風永永吳郡馮時可以督學行郵拜瞻公祠徘徊悵慕者久之念闡幽發潛以佐佑人倫實學使職因為之序次其事辭曰隱非絶俗為元約身出非祈榮為明致身裔夏大分君臣大倫皎然星日矩我襟紳偽師鴟張公執公臣咄嗟造次海鷗其人抽矢如蝟攢戟若筠片語單詞狂狡革嚚惜哉鴛鷟圗不麒麟滇池恩遣萬里含辛重關蒲塞毒草蘭津蠢爾安酋蹈藉我闉公備持矛曰敢逡巡支糜朝原魂依夕磷古有傑士公真其倫纍纍者邱韡韡者神何以表之厥廟維新我鼓淵淵我舞侁侁靈之來兮若吟若呻驂虬翼鸞駕空絶塵豐我稔黍澤我人民雲洞深秀天梯嶙峋倘佯其間靈爽常存汛舟昆明池歷太華諸峯記副使王士性臨海余以辛卯春入滇滇迤東西花事之勝甲於中原而春山茶尢勝其在昆明者城中園亡論外則稱太華蘭若焉余時隨監郡諸大夫入省以上巳日道出碧雞關去會城三十里而遙蓋跂指之矣乃問途為太華之逰循關右箐斗折而南五里至高嶢舊有楊太史用修海莊已廢又一里許適有髙臺曲池層樓翬榭前用五色杜鵑棚之題構方新也至此遂俯昆明池余視步無餘皇乃買漁舟一葉命騶人踦跋臯陸獨挾一二黃頭郎汛焉池一望五百里瀦西南隅俗號滇海滇去海逺水頃畝即稱海下高嶢輕洲淺渚蒲葦颯沓長過人又稱草海海長草餘里草中津港以千數往來繫罜䍡而漁余蕩槳其中不復知非山隂道上也草窮且挂席出水海水不及余東海一汧澳而風力差足畏滇中鎮日咸西南風春風較狂掠余帆墮水中乃回棹泊焉易筍輿而登漸霽盤桓上數里及太華山門蕊宮琳宇輝煌金碧倚山隆起擬於紫霄碧雲之間余右陟飛磴歷龍藏東下黔寧祠覽其世像出文陛前兩墀山茶八本高三丈萬花霞明飛丹如茵列繡如幄逰倦坐其下神悚悚復王疑入石家錦步障也廊右繞出縹眇樓觀海危檣一粟水勢黏天顔以一碧萬頃然哉夕陽西下太華踞其東倒影半浸已素月復流光於上山影為藻荇據之更勝也是夕宿僧榻漏下月色入戶宿鳥驚棲聒人耳余旅思轉深矣質明緣崎岸磧歷而南逺見山頂室廬嵌空一如罨畫輿者云羅漢寺也以有石像比邱而名稍近之一村落居河之麋漁者織束楚以家旁置官署焉寺敞數千步絶壁上仰視之如欲墮者盤辟而升計四五曲入寺問南北庵寺後樹金馬碧雞碣摩碣乃入南庵邱亭香宇咸嶄岩簷覆之承以瑤臺趾半懸外北入南出過一剎廟復間一亭臺廟為雷神為龍伯為大士為玉虛師相雜以釋道亭為回瀾為望海又有趙羽士之塔文殊之巖咸傍海岸時而驚濤拍空飛沫可濺佛身也路回則轉北庵躡級而上過朝天橋謁老君廟入真武宫最上升玉皇閣如鵲巢燕寢懸度飄搖雷祠龍井跆藉足下益又勝也二庵者南疏朗北幽嵑南庵橫截山麓而過金鋪緑房足稱近水樓臺北庵摶扶搖以上層層各十丈轉山椒斗大崖則宇一字焉人側身而度鳥道爾然北庵雖髙僅見草海白蘋紅蓼楚楚有致若南庵面東南水海風帆雪浪日月出沒其中故大觀也下山邑令棹蘆舟以迓稍具舲艇欲放中流以五兩尚顛復穿荻蒲披魚梁鳴榔擊汰而歸睨西山頂上丹堊之麗適當李昭道得意筆也時水淺舟膠不及過杏花村余行滇中惟金瀾二江橫絡其他多積窪成海如洱海通海楊林海是不一海焉非獨滇也惟滇流如倒囊腹廣而頸隘且逆鹵北流故稱滇云昔漢武帝欲取昆明乃習戰長安鑿池以象之至劫灰出於人世麻姑云東海復揚塵也信如斯言則此真滇池者不知幾更劫灰矣雲南通志卷二十九之七欽定四庫全書雲南通志卷二十九之八記修建五華書院記參政黃琮海陽黃子以己酉之夏督學於滇至則聞所謂五華書院者以試事方棘日僕遫兩迤間不及一詣比冬始往觀焉遙岑面拱翠澤胸羅真不減白鹿衡麓之勝而頽梁落棟鞠為茂草令人徘徊歎息久之會時有道署之役弗克並舉越明年庚戌秋乃檄雲南府委官鳩度因其舊修之制弗協者更之己以丙舍不足辛亥復相左右町疃及城隍之餘地益之迄壬子春莫告成為屋百七十有二修者半創者半於是五華之上宫牆翼翼而山川之勝亦若為改觀矣黃子曰昔讀槖駝氏言深以促耕督織為病然古者田畯田正職主勸相而循良之吏多循行阡陌止舍鄉亭至榆薤蔥韭雞彘之細各為課籍何也儻亦民飢己飢民事己事有不忍坐視至此歟夫學士之田也有庠序以聨之有科舉以勸之而又為書院以課督之與催耕促織何異顧海內自白鹿衡麓等四書院外在在有之寧獨不以為病實以為利至於滇則余又以為亟焉滇故百濮之餘也自漢元和中有神馬白鳥之瑞始開文學之風其後亂於唐棄於宋湮於勝國存者能幾至有明而始建諸學校至今上而始增科舉之額滇之於學其亦地之甌脫田之災畝也其耕當倍力故所謂勞來而輔翼之者當倍篤且也車書內向皇風逺翔二百餘年於茲矣而蟊賊潰訌冦攘竊據無時無之興師問罪撲而旋起者何以故豈非教道衰而彝倫斁愛人易使者少而犯上作亂之萌無自消歟則庠序之外復於書院課督之夫亦世道人心之慮有不得不然者或曰科舉興而士為辭章之學今將以辭章課之則亦利逹之媒已耳於世道何禆焉噫結繩逺而文契繁圗書呈而爻象著賔興起而為今日之科舉風會之流有自來矣且安見今之科舉而不為昔之賔興耶夫口誦格言力探祕義得於心而筆之辭此孰非古三物中六藝之學而古人兼習其事今人直抉其精其於入道之門似尢簡徑若乃六德六行雖先王教人本旨要令從六藝中尋求服習涵濡而自得之實非課程可及何也教之可得而指學之可得而循者皆文也子曰博學於文約之以禮聖人之望於人者約禮顧所日與從事者何嘗脫然離文故文之於學宇宙之日月燈光也文斯辨辨而後不可欺不可欺而後可責以不自欺不自欺則誠誠之至聖之至也學之事盡矣余安見夫今之科舉不為昔之賔興也者顧誠與欺為何如耳惟諸生審處焉是役也經始協謀藉雲南太守彭君憲范之力蓋有文翁遺意而料材課工則廣南衛知事李枝陽鎮沅府經歷徐可迪分理書院事雲南府學訓導賀繼芳皆有功興作者例宜並書追贈光祿寺少卿張公忠烈祠碑記知州楊春震武定有升沉而無明昧者日月也即有時昧而明者自在也有古今而無顯晦者忠烈也即有時晦而顯者自在也光祿亞卿張公死節甚偉其有功於世教甚大雖崇禋祀未樹貞珉誠缺典也今上御極之四十有三年直指公按滇核公祀典廟主及死事顛末鄭重特至檄下屬震紀事之役深幸忠烈之靈今始昭揭宇內即固陋何敢諉焉謹按羅婺郡乘及父老曾耳目者傳聞甚悉公諱澤直隸安慶人由明經選擢異材晉雲南僉憲因武定鳳賊繼祖叛大司馬吕公光洵受節鉞進𠞰公督兵由尋甸進時同事者失期公以孤軍深入被圍絶餉百計突圍莫出公乃北向再拜曰滅此朝食臣之夙心計不從心惟知授命願同睢陽作厲鬼殺賊此孤臣萬一之報乎祝畢欲自裁祖率鐵騎馳入叩首請曰自作不靖固知死亡無日幸天賜明公願少緩須臾倘徼恩撫招以保數世餘業公亦無不利焉公乃厲聲叱曰狗獠犯順天討不容奉命而來有死無二頭可斷也心可剖也烏知其他偵聞當事者咸欲姑許為出公計公乃密揭司馬其略曰澤不職不克先事伐謀臨危制勝陷圍辱命罪也何辭僅有一死以自贖耳賊惟恐職之死者乃賊之自為計也豕性難馴狼心叵測如為職故招撫之燎原焰天終必不免且果招撫之而罷討是曰縱寇抑或陽許而隂討之始許而終討之是曰挾詐縱冦者不武挾詐者非誠堂堂天朝安可蹈此惟懇置職膜外一意進𠞰永除滇南噬臍之患雖死之日猶生之年從此無心天日不必更念孤臣當是時繼祖求撫不已公罵愈厲乃及於難吕公進𠞰之計始決四道並進冦持久糧盡計窮走匿青雞羅山我師圍之兼以隂雲霾霧賊遁無路説者謂張公之靈顯云賊黨懼甚斬祖首乞降遂平司馬公以公死節事聞上哀悼贈公光祿寺少卿敕守臣建廟立主合前後死事者凡七人每春秋郡守祠之專享者惟公同知袁俸知州秦健次之知事髙心照磨張成吏目劉瑀巡檢俞伯官又次之招安罵賊而死者諸生楊忠惠教官常存仁附焉丁未克舉之變一燬再燬廟主䆮失其故矣惟時視篆二守袁君及和守葛君擇善地移廟而新之方議具實表揚以鑒來祀時兵憲王公奉直指公之檄適至乃知忠義在人根於秉彝遂不謀而合乃爾嗟乎公之被圍也朝而允撫夕而脫難竟必死以殉夫豈一死塞責者哉若曰除他寇十不如除鳳寇一以他寇逺而易與鳳寇近而難制他寇之患在皮膚鳳寇之患在心腹公以死除之使深根固蒂之強寇犂庭掃穴無噍類焉使魔宫鬼窟復見堯天豈非公一死之故致之耶故為嚴將軍頭烈則烈矣無補於蜀亡為稽侍中血忠則忠矣無救於晉亂乃司馬之揭可以配秀實之笏求撫之罵可以續常山之舌精忠大節照耀古今雖與日月相輝映可也寧獨曰有顯無晦云乎新建松華壩石閘碑記提學江和鄱陽萬歷戊午嵗滇水利憲副朱公請於御史南海潘公言滇城東北郭故有松華壩邵甸之水走盤龍江者使東注於河河曰金稜土人呼曰金汁由金馬麓過春登里七十餘里而入海沿河支流以數十遞而下涵洞如級田以次受灌不知幾萬畝也而是壩獨槖鑰之非壩則小暵易涸而河不任受蓄小漲易溢而河亦不任受㵼蓄㵼不任則腴田多蕪而民與糧逋河資壩所從來矣第壩故支以木築以土而無閘勢若堵牆遇浸輒敗嵗修費閫司樁錢不資有司草草持厥柄力龎而功暇僅同築舍蓋費於壩者尚付之烏有况其不至於壩者也於河奚資焉而反以病豫謂壩而不閘蓄㵼何恃即木而匪石終漂梗耳與其終糜多錢而民無利也孰與合數歲之費而甃以石通以閘自閘以往若牛舌尖中馬頭皆衝流也胥石乃固矧地與石鄰夫以畝科至便計也木樁之額纍嵗可問非他索也良吏經紀能吏分勞功者賞否者罰事成設以守時其翕縱而周防之如漕閘然此百世利也爰捐助銀一百六十餘金潘公遂捐一百金撫軍河源李公亦捐二十金迄新撫軍歸安沈公按臺南昌楊公至申請如前三公皆如議交給以費藩司嘉興施公閫司金陵尹公扣徴停穵木樁之逋負者又得四百十九餘金計若巨若細悉從金出而世鎮沐公又慨然以近閘石山任其採取於是吏人各如檄起程募健伐堅創閘口髙一丈餘長三丈餘廣一丈七尺牛舌尖中馬頭髙一丈三尺長三十六丈六尺皆選石之堅厚者長短相制髙下相紐如犬牙如魚貫而鈐以鐵灌以鉛閘倣諸漕扁以巨枋啓閉如式東西兩涯之間駢岷壁屹水龍若控經始於萬歷四十六年孟秋至四十八年仲春告成乃名曰松華閘計費凡八百七十七兩有零匠作田夫五萬七千餘數力取諸隙績底以漸故功成而人安焉時與三司諸大夫登壩上觀壁如屹立地有安流而天不能災是嵗大稔諸父老咨嗟嘆息曰朱公再造我也歸之朱公朱公不有某幸睹成事謬為記略而申以銘朱公名芹蜀富順人進士政務興革利民多若此楊公名繼統秦南鄭人其與有勞者書之隂銘曰湯湯金稜邵甸遡源建瓴忽分東西決川壩枳而東如龍飲泉爪攖翼張百道蜿蜒割流膏野萬畦濡霑土耶木耶昔何闕然蕭葦捍衝嵗糜金錢自公之來嘉與更始亦有施尹悉賦成美楊公成之動有經紀稟成諸臺規茲永利金石巖巖當其射激閘門言言時其啓閉閉視其沍水弗外泜啓視其漲水弗內潰畚授於農農隙乃至工食於官官厚其餼再閲春冬經始勿亟乃奏厥功乃立安既於乎都哉河肇咸陽洪源自公明德廣逺人代天工匪河無田匪閘無河毋恃絶纜毋易逝波其流可穿其堅可磨蟻穴必窒如避黿鼉有泐必新毋仍斧柯百爾君子保障𢎞多庶綿斯澤礪山帶河新建重關記郎中施堯化昆明我明令於臺使者巡行郡國諸大利大害所在許一切便宜釐舉海南潘公按滇之三閲嵗激濁揚清威惠覃洽先是有金稜河石閘之役奠河流於濤險奪民命於波臣甃石安瀾嵗免衝齧滇之被大美而日食其力者惟公之賜業歌明德矣頃相繼持斧者復奉簡書計旦暮可弛擔負而公則念滇介遐服首城巨會勢尤居重馭輕城故無外郛亦惟相沿以至今日也前需之後後復視之前異日者驚在門庭莫救堂奧之安藩籬不固隨召腹心之侮豈非築舍滋棼民難慮始乎邇者鳳酋狶突至躪內地前事可鑒利害較然因檄所司其議地可保障城守者必役毋罷鳩庀工材寧糜公帑規度逺近務廣崇墉上下和懌百堵皆興計捐金錢三千餘緡鼎建戍樓凡八楨幹畚築丹艧塗暨陴垣弩穴巍然井然經始於嵗之三月落成於嵗之九月諸邦伯大夫相與經營拮據嘉賴成績屬書其事余因遡成周盛時肅慎貢其楛矢越裳重譯獻雉尤以申畫郊圻慎固守封動色相戒下逮列國楚人伐莒莒潰入鄆春秋譏其無備公惟亟申畫謹修備以有茲役也險固既設我之神氣常張於以銷亂無形則保邦要道也雉堞星羅守望碁布居平不啓戎心猝有窺關者亦可折箠而笞實禦夷長策也貿遷輻輳半處市廛蔽扞森嚴歸者雲集養閭閻之物力寓招徠之逺圗抑又通商惠民便計也萬里炎荒每憂鞭長不及一隅無蠢邉陲奠安用拓國家全盛則尤車書無外大順也洵一舉而衆善集矣説者曰衆心成城人和足恃其亦未睹於設險守國之議乎故重門禦暴蓋取諸豫支傾持危適際夫蠱鳴豫凶而裕蠱吝分介綦微而維挽從之愚暗成事智睹未萌所從來矣夫人臣任事惟患無鋭然必往之心耳以委卸滋因循因循成頽廢墐戶不塞風雨飄搖天下事大率近是公於滇既為河防而隄之又為牖戶以衛之豐穰嵗登於南畝守備日壯於金湯其所為計安一方者擘畫不遺餘力使後之人盡如公之事不避難治先虞覆也行見廢者興仆者起衆效劻勷底定之略邦鞏磐石帶礪之基滇民尚亦永利哉爰宜書之以告來者公諱濵廣東南海人中萬歷辛丑科進士其按部諸善政業多誦之口碑紀之郡乘茲不具載是役也中丞沈公警炌以後時至謀斷同心共𢎞逺略其經理則右轄施公爾志程督則憲副曽公守身楊公為棟趙公性粹都閫尹公啓易暨廣南守邵君建封昆明令汪君從龍咸與有勞焉法得並書本朝新建昆明書院碑記總督蔡育榮奉天從來地方之治在風俗風俗之厚在教化教化之興在詩書其所以鼓舞而作新之者是又在上之人加之意爾滇雖僻在天末漢夷雜處然其山水清逺人才文物歷代不乏曩罹逆變征斂無時閭閻塗炭詩書煨燼小民疲於供億紳士竄於山林百姓十載無絃誦聲余奉揚天討提師壓境之日烽煙千里滿地干戈泮藻黌宫鞠為茂草心竊傷之當是時惟撫軍王公與余同慨然余尚膺楚任雖有志而未逮也及蕩平之後奉命駐滇草昧經綸庶務交瘁凡設立營制招集流亡綏輯土司會計兵食防禦盜賊澄敘官方諸大政莫不竭心而計之悉力而行之皇帝二十有二年補行辛酉科及二十三年甲子科鄉試滇中雖取士如額然求其學行純粹才品卓越者寥寥無幾由兵燹之後鼓舞作新者無其人而涵育薰陶者無其地無惑乎士未知學民未知義也因與司道諸君計之曰滇人士廢學久矣自余與撫軍初入滇時見學宫闕狀共嘆人才放失厪懷者久之間嘗覽其形勝鸚鵡碧雞之巃嵸昆池煙水之浩渺亦洋洋乎大觀也及夷考其人物自有明楊文襄嚴恭肅傅括蒼諸公而後蓋代之士邈焉寡儔聖明御世海宇澄清災沴潛消山川炳煥其鬱蒸之氣當必有如文襄恭肅諸公者起而應之余欲捐俸以建書院俾寒困有志之士誦習其中育人才以報天子不亦可乎僉曰善於是擇於城南郭外東西兩寺之間買地一隅厥位面陽匪喧匪寂前殿三楹祠文昌帝君中構一閣為􅊰貫之所後廳五楹為憩息之地兩廡各構三十厦為諸生棲止之區鳩工庀材始於甲子之冬落成於乙丑之春顔之曰昆明書院付雲南府昆明縣兩學司鐸者掌之更為置田三百畝嵗收租一百二十石計口以給諸生之肄業者亦付司鐸者典其出納並勒諸石以志不朽是舉也雖出自余與撫軍王公入滇之初念然尢賴司道諸君共成之要莫非興教化厚風俗期至治之同心也然則滇人士之誦習其中者其亦思昆明為首善之地敦孝弟以立其本存忠信以厚其基服禮義以嫻其身尚廉恥以致其行出而得志則楊文襄之芳躅可步也即處而淑身亦鄉黨之善人不失也凡若此者皆教化之所由興風俗之所由厚也將由此而兩迤六詔家敦孝友戶列詩書野老矢何力之歌郊童賡不識之頌地方久安長治之道詎不在於是乎此又余與撫軍之深有望於滇人士者也若或植黨羽而逐凌囂假棲止而競趨謁借呫嗶以竊升斗豈特滇人士之蒙其羞歟即典守者亦不得辭其咎也改建雲南省城府縣學宫碑記總督范承􅈴奉天雲南有學始於漢章帝元和二年其説存其地未可深考自漢以下歷時興替亦未有定所逮元而建置始可考焉至於有明人文之盛競於中土咸曰學校為之也及考其學校何地則在五華山之西麓間嘗登覽其概平岡爽塏蟠互城中為省龍正脈有從蕪草廢垣中指數之曰此舊日俎豆之區也詩書禮樂之所萃也余得其始末輟為慨然曰建學古今所同世治未嘗不興世衰未嘗不替其興替之故非地為之而若與地有攸係焉我皇上作興文教薄海內外百度維新豫沗涖茲土於今五年思所以移風易俗仰贊文治之盛未始不熟籌其當而人才聲教尚有鬱而未宣之象夫豈前代之規模當啓而今茲之風尚難循與適兩庠士子合詞來請謂當日府縣原屬一學向以變亂思遷今當急為合建上應文明之會其言甚正與余愛育人才振興聲教之本懷深有合契者因商於中丞王公暨司道諸君咸以為然且曰乘時改建於象為革革之上六曰君子豹變其文蔚也改作而且由舊於義為復復之詞曰復其見天地之心乎舉大事而協占於易旦晚興作烏容緩余曰唯唯是誠不可緩即繕疏奏聞制曰可擇日肇事諸公共襄乃績基不再卜有五華之舊址在材料移舊添新不支帑不徴調人情所奮隂若助之始於庚午之冬訖於辛未之夏兩庠合一悉仍古制殿廡門堂齋舍祠宇諸所具備咸中程式於其成用釋菜禮則禮器樂舞之更新者皇皇濟濟陳於堂之上下羣大夫分獻趨蹌士庶之觀者圜橋門如堵莫不歡呼而進祝曰革而新新而舊合天道也得地靈也順人心也三善具而人文風化翕然丕變可操盤匜而與山川之神歃之矣余曰唯唯否否余之為是舉也非形家者言也古先王立學以為教習之詩書絃誦範之道德行誼使之明其體逹其用淑其身心以行於倫常日用之間而推之君臣上下人民事物之際無不具本末而善經權學之既成然後興其賢者能者庸之以位論之以才别之以任抒其夙昔之所抱而遺巨投艱實有效於天下國家所以人品既正風俗亦純後世寖失其意竟以科第利祿為念於是舍其在己之可恃者而覬覦造物之私遂以形家之三吉六秀與五經四子相輔而行其刺謬甚矣且即以形家論之亦自有本山川得位則天地中和之氣絪緼磅礴鍾乎人必有聰明正直之資孝弟忠信之德不偏不駁少成若性長而涵濡於聖賢之道處則品行端恪出則政事詳明凡榮膴私利之習非所志已此所謂山川之育秀也而豈假其靈焉遂可不耕而刈不狩而獲哉今與諸師儒約躬教責者本先王之制為品節條理勤勤開導而勸勉之下之執經者懲省惕厲舍其舊而新是圖立志須髙積學須大一稟聖賢之訓而虛誠恭遜以副師長之所期無容以利祿之心自卑其建立則上為名臣下為俊乂將見人才聲教頡頏中原其發祥正未有艾山川之光又重乎人矣是則豫改建之本懷也至工作之若干經費之若干總其程者有人董其役者有人别記之新建雲濤寺及新溫泉碑記巡撫石琳奉天宇宙間英竒瑰偉之氣不鍾於人物則鍾於山水而人物之生又藉山水為之苞孕焉滇地界域外博大不如中州雄放不及秦楚韶秀不逮吳越然其冥壑激湍往往發為幽怪大抵亦蜀粵之流亞歟惟是脈近崑崙發舒未暢以故鍾育於山水者十之九而著於人物者十之一余嘗讀有明名臣傳慨然慕楊少師文襄之為人知其出於滇也及建節金碧之間弭棹滇池樂其汪洋灝瀚窮尾閭之所泄則自西而北滙為螳螂川蜿蜒奔注逹於瀘入於江而朝宗於海矣連然當川之腰膂文襄石淙實據其勝山水有靈為生異人洵矣夫上下數里中有溫泉曹溪虎丘皆濵茲川與石淙盤互拱揖溫泉之勝甲南荒昔賢品藻既詳獨泉南數百武巖洞八九嵌空玲瓏莫可窮詰誠羣真祕府也志乘既不備載土人命名又頗不典有文之者或曰弱流曰雙柱曰雨花巖玉壺天醉醒石亦不過隨地因時託物比興而未嘗有所切指也地去會城不足齎糧政暇與制府范公迭逰交贊一時藩臬諸君子共愜欣賞僉謀所以剃茀榛而顯靈閟者會泉南數步復出一湯滮池瑩靚殆與碧玉舊泉相映發似造物者特祕斯珍為今日開生面范公而下咸出緡錢襄厥事而臬使許君尤力任規畫謂非立招提不足恃以久逺於是卜地巖洞之中脈絡融結之區創寺曰雲濤以奉乾竺先生募禪僧主事經營而若亭若軒若室次第畢構參差乎泉石映帶乎林巒仰而睇則露棟雲窗飛革松筠之表俯而視則雪淙雨瀑瀺灂階除之側而穴岫蔽虧虯猊潛駭歘吸萬態有時春疇數騎秋波一艇或指為塵壒之壺嶠未必不疑鬼神之創闢矣夫滇自未立國以來有是川即有是泉有是巖洞宜乎竒材輩出奈何落落數千百年僅篤生一石淙也其無待歟或尚有待歟俱未可知抑宇宙英竒瑰偉豐於山水而不得不嗇於人物乃爾耶工甫就訖會余叨聖恩遷制兩粵瀕行再履斯境延佇久之不能無有望於後之人待山水而興者如前之有石淙也若夫逸豫之吟窮攬之勝如昔人之所以修禊雅集傳為美談非余之所篤好也爰記數語鋟諸巖阿以志一時聚散之迹爾惡敢言文重建表忠祠記知府丁煒晉江臨陽地鄰交趾郡城西半里許舊有表忠祠祀故明永樂時征簡定之變前後死事諸公嵗以春秋二仲上辛致祭載在祀典明季沙逆倡亂祠毁于燹迄今未有修復者嵗時有司臨祭率拜謁于荒碑蔓草間廟貌之不修非所以妥忠魂肅祀典也嵗庚午太守黃公遷蜀東憲副適際內艱賦歸有日煒以攝篆交代居有頃黃公謂煒曰不榖之謀修表忠祠也屢矣屬以簿書期會之不遑因循以迄於茲今行矣設復委之後人安知頽廢之不仍此日也今將重建以畢斯願榱杗瓦甓塈茨之費具矣君其樂觀厥成乎煒心韙之諏日既合工作用興乃即祠舊址構堂三楹以妥諸公神位外戟門一懸以祠額周圍翼以垣墻納諸舊碑而堵之經始於七月告成於十月黃公趣煒言記事以文麗牲之石煒則謂自有天地以來日月有時而薄蝕陵谷有時而震崩惟此忠義之氣歷億千萬祀而不可磨滅上以是風勵則四維張下以是自命則大節立諸公之死也事在永樂初年而祠祀之興則萬歷八年巡按劉公維始奏立焉逮我興朝百度維新惟祀典之載在舊章者因而不革夫非風勵之旨千聖同揆乎今黃公於去臨之日亟以建祠為事既上以體天子作忠之旨而下以嘉勵臨人士之心者義至𢎞巨今而後謁斯祠者為封疆臣則思其所守薦紳襟𥚑則思其所立感祀事之不廢則思朝廷之激勸而謀所以報覩諸公之死在三百餘年之前歷昭代而其氣若新則思所以不朽祠祀之修豈特無廢典禮云爾哉諸公為兵部尚書愍節劉公俊節愍陳公洽掌交址布按二司事尚書忠宣黃公福參政劉公昱都司吕公毅參政馮公貴侯公保都督黃公中知府劉公子輔易公先知州忠節何公忠死其事及崇祀始末具載舊碑茲不具論今建祀黃公名明字龍光以武功蒙特恩改授臨安知府升四川分巡川東道按察司副使與煒同為閩之晉江人煒既記其事復為樂章以迎送神其辭曰昔在明初撻伐張日南稽首歸版章諸公奉命綏逺荒文則旬宣武則揚蠢爾服叛不可常狼奔豨突滋陸梁積尸晝見天無光諸公仗節殉封疆後先騎龍逰帝鄉亦越中葉祀典彰惟茲臨陽控交岡廟寢奕奕神乃康妖氛煽虐榱桷戕靡安靡侑慙蒸嘗赫赫昭代崇忠良守臣祇事再肯堂神其來格歆祼將荔枝為籩桂為粻苾芬在御醑盈觴靈既降兮翩翶翔福我人民夀而臧金枝翠葆且徜徉莫漫回車兮使我心愴蘭隱君祠堂記侍讀李澄中諸城庚午冬余自滇南奉使回至楊林遲客聞其地有蘭先生者諱茂字廷秀號止庵明洪武時人少有大志不就乃潛心理道淹通經史凡黃冠緇流醫方卜筮星歷風角之書靡不窮究其奧鄉里稱為賢會王尚書驥征麓川先生授以方略遂成功若要麓川破船往山上過居人至今猶傳其語所著有元壺集鑑例折𠂻經史餘論安邉策條止庵吟稿聲律發蒙山堂雜稿等書行於世四方學者多師事之年八十卒於家有司以狀聞從祀鄉賢今其墓尚在蘭氏子孫衰微矣余與諸子覓其隧道抔土傾圮宿草榛莾墓碣剝蝕過半慨然有風流銷歇之悲焉夫北邙之冢其為石馬秋風者何限士君子鮮有回車太息憑弔其軼事者先生終老家食能於三百餘年人亡風微之後使萬里羈客徘徊嘆息而不忍去謂非其流風餘韻有以廉頑立懦而能然哉余捐金為之倡首俾里人新其墓碣並葺其祠後之人倘有踵余之後聞風而起復事修葺者此物此志也雖先生脫屣富貴委骨於陳根藂蒨之中豈復有形骸之見區區以祠墓為重輕而余之徘徊感嘆蓋有出於不自知其然者乃知懿德之好千古同情初不以時代間隔也甘忠果祠堂碑記總督蔣陳錫常熟丙申冬陳錫奉使滇黔入覲天子出歸里門丁酉仲春始逹黔境即拜於忠果甘公祠下三月入滇公之子都御史國璧撫治茲土已二年矣即以公之祠請碑記於余余聞之泫然流涕曰陳錫何足以紀公之碑哉公之大節在史館功德在封疆御祭賜諡恩榮在廟堂之上名宦專祠遍於滇黔之境精忠亮節光於日月之際陳錫後生小子何足以紀公之碑哉昔蘇文忠公八嵗即知范文正公十有五年而不得一見其後三年乃識公之仲子丞相堯夫又十七年與公之季子德孺同僚於徐以公之遺稿見屬為序文三年乃成嗚呼以蘇文忠公之忠蘇文忠之文願挂名於文正公之文字中得托於門下士為疇昔之幸其文必俟三年乃成誠重之至而慕之至也嗚呼陳錫何人而敢紀公之碑哉然逮公之殁四十有六年而陳錫謬膺茲土又與公之子都御史交最久知最深則陳錫之於公猶子也顧以不文辭其何能已於孝子之情乎故不辭抆淚而為之紀謹按公諱文焜字炳如遼東瀋陽人也纍世武功曾王父以下贈如公官公由禮部啓心郎嫻儀節見知世祖章皇帝册封東粵髙麗不辱命今上即位擢大理少卿順天府尹巡撫直隸逾二年而總督雲貴革除協夫諸弊政殲凱里渠魁下蠻寨數十處勞來拊循備至及丁太夫人憂奉旨慰留請給假歸葬又逾年再抵任乃殉節焉方其在給假之時吳逆包藏禍心部議雲撫攝篆勒令督標五營官兵俱調赴滇吳逆日以小恩小惠要結兵將禍亂遂成及抵任兩月而三桂反公犒軍調餉逆黨脅從無應者貴州提督李本深謀襲貴陽公疾馳至鎮逺欲傳檄三楚合兵扼險而守將江義從逆抗拒公下馬北向稽首遂自殺康熙癸丑冬十有二月八日也公飛章入奏曰城存臣存城亡臣亡當貴陽聞變之日公慷慨辦一死矣公之妾盛氏縊於貴陽子一人筆帖式二人從公死鎮逺訃聞上心震悼自蕩平之後恤典稠疊哀榮備至天章御筆棹楔豐碑煒煌穹壤上之所以褒公者曰舍生取義曰為國捐軀又曰永為臣子之型嗚呼公不朽矣方三孽負嵎蹂躪邉陲珍殺善類不可勝數公所罹者凶渠首難殉之則華膴攖之則糜碎一時偷生茍活從跋扈而署偽官者纍纍相望莫不靡然澌滅轉瞬同盡公乃與雲漢爭光久而彌著其關於世道人心所係豈不大矣哉公之子七人其四子國城從公於黔亦死之六子皆貴顯都御史公又能歷官著聲克承父志簡在聖心我皇上之推恩死事超邁前古而天地剛正清淑之氣亦萃於公之一家嗚呼公以不從逆而死一死足以禠逆桂之魄而忠義之士俱激昻奮迅從風而起以是知逆桂之無能為也都御史作公新祠既成陳錫又得再拜於公之祠下既不敢以弇鄙固陋之文拒都御史之請庶幾紀公之盛德大業將以訓有位示來者是則公之志也夫是則孝子之志也夫學博李又山鄉飲記提學張謙武昌古先王化民成俗之道無一不周鄉飲酒其一也蓋古者興賢能於鄉將行鄉飲酒之禮則以致政居鄉士大夫之有德者為賓宰與鄉人恪恭將事拜至拜洗拜受拜送辭讓之節繁以昭德也後世或視為文具則有德者不為所致而虛偽者得以竊附風斯靡矣豫奉命校士滇南每以此義風勵有司昆陽李生映持其家乘一册來謁謂其父從嶠君其州大夫曾舉為鄉飲賔乞豫一言記之豫因周咨博訪以核其實如君洵可謂克副斯典者矣君家世忠孝祖兆旗明末司訓廬江流寇殘廬江率厲諸生登陴扞禦城陷以身殉難父澄歷萬里險阻負骨歸葬白州府以廬江死節狀聞於朝賜祠曰靖忠崇祀鄉賢長洲韓宗伯曾為澄作孝子傳紀其行甚悉從嶠號又山忠臣孫孝子子也善事父母暨伯叔父母友于兄弟人無間言一經傳家振鐸於廣西郡之彌勒州首以忠孝訓士植其根本其直諒忠告兼能任其郡州之政時有署郡驟欲勘民田民駭而思竄勢岌岌矣君抗言止之令皆得自首而民免流亡又士林有躍冶者君虛衷指陳仁義以導之悉皆感化學使者至見君道氣迎人臚列其行誼將用薦剡而君林泉念切力請歸田日與諸子及昆弟從子修舉家禮訥言而敏行將所謂有德者非耶其飲其鄉也奚忝焉且聞其近益自強力摩挲卷軸無間晨夕是又希蹤古之耄而猶學者也賢者殆不可測哉爰為之記遷建麗江府學記知府楊馝奉天山左聖人鄉也先大夫撫其地余時為兒童嬉戲語以陳俎豆弗知也比長就學亦惟呫嗶從事所為聖人之道志當世之務者茫乎未曉通籍後日習吏牘抑又未遑遜志焉及待罪東昌益近聖人居登闕里之堂宗廟百官備瞻美富心竊向往然後知獲上治民順親信友由明善以要於誠者雖簿書鞅掌要未可以一息弛良以聖人之道範圍天下而不過曲成萬物而不遺固無人不可學無地不當學者也甲辰嵗自曲靖調守麗陽甫下車首謁文廟見其地勢卑隘規模淺陋所以妥先聖舍生徒者均未有當焉乃稽創造於諸生對曰麗舊無學土酋木氏慮民用智而難治因如秦人之愚黔首一切聰頴子弟俱抑之奴隸中不許事詩書康熙辛巳春曲阜孔公興詢來判府事見麗民質甚美力請建學以造士木氏猶然撓之事幾寢會執政知孔公能委刺劍川乃得出囊俸招劍工伐麗木購民地布置經營閲三載訖工禮樂器畢具而麗始有學當是時酋勢方熾建學為最拂意事地勢之不暇擇規模之不及宏所必然也諸生之言如此余因作而歎曰孔君此舉可謂知先務而無愧於聖人之裔矣夫國家治教休明道化翔洽興賢育才百年於茲矣麗固邉鄙然披氊荷毳之夫維皇降𠂻厥有恆性習俗儇詐長民者機智使然耳被以禮樂詩書之澤明君臣父子之倫未有不蒸蒸向化而油然親其上者必以不事詩書錮其智而益其愚豈聖天子廣勵學宫之意哉向非孔君則麗民且不知有學尚何卑隘淺陋之足病然卑隘淺陋至今日又大不可語竟而諸生退余以履任方新不及舉明年諸所役作各就緒廣文萬咸燕率諸生以遷建學宫請余曰是余夙志也遂議遷於府治北正大爽塏風氣攸聚工甫興而委理鹺政之檄至乃囑廣文董其役經始於乙巳季秋落成於丙午仲春自大殿及兩廡戟門櫺星門率循舊制柱棟瓦甓易朽益新環垣鑿池𢎞敞壯麗丹漆粉堊煥然為一郡偉觀工垂成皆願有記抑余聞之十室之邑必有忠信惟士者民之倡師儒者又士之倡誠倣昔人經義治事之遺意以誘訓諸生讀古人書學古人之道皆設誠於內而致行之使數年鬱勃之氣暢於事業發於文章為信友為孝子為忠臣為長民上不負天子下不負所學庶幾逰聖人之門而無愧若余固兩逰聖人之鄉而未聞夫子之道猶幸繼聖人之裔而同此勸學之誠也是可與麗人士共勉也開巖洞碑記綿州知州王立憲建水少保大司馬西林鄂公奉命來制斯土也視三省如其家心民心務民務雖邉徼異域茍有濟於民聞於公者罔不切肌膚聳骨髓不為不已為之不底於成以不朽於後世不已矧其託宇下者乎臨安去會城不五百里古㽛町國也崇山大澤宅其中長江巨河環其外每夏秋溪水漲溢望如海故以建水名水大而能利民亦能害民者莫甚於瀘江其發源也則始於石屏之異龍湖合塌沖象沖暨六河九洫諸水皆會於瀘以奔赴巖洞巖洞者所稱石巖山之水雲門也洞前虛敞可坐數百人登巖以望洋洋乎浩浩乎利田疇資灌溉地肥饒民殷富者不恃有此川哉然當其水勢泛渙決墟防沒田廬又往往為民患揆厥所由則巖洞實障之瀘水從衆流來合東至於巖洞伏流十餘里出阿迷入盤江以為歸宿此其性也而巖洞之前石磴磷峋縱橫洞口細流則峽道曲入洪濤則湍波四潰復多石埂橫截中流者十有三重惟伐石鑿埂使無壅遏順流而下則水利興水患息矣自少保公至召我郡縣告之曰瀘水之患溢臨境巖洞之障厥宜屏刋乃石斷乃埂民害除農力省功惟速志惟猛我憂以紓而汝是警屬吏聞命者咸唯而退故老相傳洞口有神物憑上動一拳石者輒大風驟起煙霧迷離咫尺不相見所擊砂礫飛數十步外能中傷人以故鮮有過問者雍正八年正月十七日郡守東萊張公無咎與總鎮張公應宗州牧祝公宏既奉少保公命往疏河甫至令伐巨石錐鑿不能入強入之獲未寸許忽風起砂飛石擊工人手落其一指衆皆驚散諸君子相顧錯愕聞於少保公公曰神庇吾民者也吾惠吾民而神不許謂神何唯子之誠不足以感神故神弗靈吾其祭以文通以誠神必許我汝敬往哉太守乃齎文以祭祭畢雲開煙斂天大晴霽光色照耀於是督工鑿石而向之剛者柔堅者脆應手而伐輒得大塊或數尺或數十尺不一月而十三重埂盡拔而去自此水湧沙流河身丈餘無復避礙巖洞遂不為患下流既疏然後上流得肆其力於是溯衆水所經按一江所入凡河之淺者深之滯者通之岸之低者崇之薄者厚之壘浮沙者易以茅塊堆淤淖者運於逺邱又復伐木為樁編竹為䉭以為兩岸之障聳如壁平如削堅如石滑如漆風雨不能摧波濤不能入魚鱉不能損功成之日計程不二百里計地不三萬丈䉭數千樁數萬工數億官勤勞役奔走上無懈心下無惰志而後得以有水利無水患雖積雨經旬連隂纍月而沿流循渚堤以永固禾以永豐嵗書大有矣於是郡人士咸相向慶曰此少保公生我也願記一言以貽我子孫使後之飲若水者知源服若疇者識德爰歌以記之詞曰雲門鑿瀘川濬龍湖來阿迷進逹盤江往而迅水安流榖豐潤恬河伯熙田畯囷倉盈鱗介牣億姓歡百神順官辨康吏治振古禹稷翼堯舜理水土欽且慎今其誰維公僅紅優曇花記按察常安滿洲雍正庚戍夏至日制府少保大司馬公宣於衆曰西方老客見紅優曇花否相殊碧玉色並緋桃豈鬘持天女伴亦假胭脂粧耶宜各有記述以代酬贈公乃首唱為詩諸君子迭相賡和余既覩花之竒又備覽篇章之盛因不自揣爰為之記原夫滇南土候無嚴寒酷暑四時皆有春意花木之得所天也宜也其最著者茶則七十二種鄧渼稱其十德為天下第一扶桑則五色爛熳杜鵑則百本爭妍其餘水陸草木與中州互有異同而優曇之竒逸又異於諸品為天下所無考貝葉經載此花曰優曇鉢羅曰優鉢羅一字增減未知是一是二大理志靈鷲山之旁為和山有樹髙六七丈幹似桂葉似枇杷花似玉其香入暮轉清開十有二瓣以應十二月值閏增一瓣世傳為仙人遺種又苴蘭志段蒙樂誠魁時有僧自天竺來以念珠一串埋城中土主廟生樹髙二十丈葉叢茂每嵗四月花開如蓮瓣數與和山不異土人視花瓣之多少以占嵗名之曰娑羅樹夫貝葉經所載頗與此花不甚相逺今由苴蘭與大理志觀之要亦不過異其地因以殊其名耳且聞兩迤之間所在多有然則此花之竒且繁也即以滇作一大香國觀可也夫優曇在衆香國已為嘉祥乃今制府軒中所開以殷紅特聞則尤為希世之瑞從來造化之機常肇於微而物理之徴當以類究昔王處回得旌節花種因之擁旌仗節唐尚書省古槐夜聞音樂聲省中遂有登台鼎者江都芍藥如圍金帶韓陳諸公相繼入相然則優曇之紅豈無故哉且草木雖無知之物而靈根異卉常與善氣相迎余觀公奉命來制三省愷悌為懷胥萬姓而欲偕之大道與慈氏之寶筏慈航無以異故優曇以佛種靈苖與愷悌之至性相感通特標其異必有徴也余願公之益懋乃德爾至其詩悠然神逺足為花神長色和者咸各發攄藻彩余亦為數絶以賡之世之慕紅優曇花而不得一見者讀公與諸君子之詩當亦恍然如坐香國中已東川新建石城碑記巡撫張允隨奉天東川巖邑也在萬山中東界黔西通蜀北鄰昭通南接曲靖之尋甸蓋三省要害地歷漢唐宋元明屢煩征討叛服不常我朝仁漸義摩率土向化土酋祿氏願削土職同於腹裏然環土為城與羊馬牆等猝有緩急不可恃以為衛鳥聚星散民實苦之夫聖人立制所以定萬物之命而建萬世之基易著重關擊柝書稱慎固封守詩美築城伊淢月令孟冬壞城郭戒門閭渠邱城惡春秋譏之故雖有山川之險斥堠之嚴亦必髙其墉濬其壕謹其管鑰啓閉間遇冦攘姦宄郊野之衆可以入保斯民無鋒鏑之憂國有金湯之固也東川自康熙三十七年改土為流然猶隸於蜀蜀以其僻且逺因陋就簡城猶仍土塢之舊今上御極之四年改歸滇省於是正田賦定課程勸農桑清姦匪次第舉行民有起色八年秋烏逆叛遂窺東川土城庳不可恃民恐甚幸獲保全而石城之建不可緩矣請於朝報可九年春三月涓吉因舊土城址甃以磚石鳩工庀材凡一年告竣周六百九十九丈基厚一丈三尺髙一丈二尺加垜五尺餘門樓四各兩層髙二丈七尺炮臺八四門東曰綏寧西曰豐昌南曰藩甸北曰羅烏總制大司馬鄂公題執事者繪圖請記於余余曰壯哉是城南倚靈壁北臨蔓海東跨雲龍西北控金沙具江山之勝而又馬書弩革諸峯巒環抱拱向城無論大小要在得地利資控禦耳守是城者當仰體聖天子眷顧邉疆覆載無私之意飬民以田里樹畜教民以尊君親上修其武備作其忠勇城雖三里勢逾百雉東足以捍黔西足以衛蜀南顧居全滇之吭北眺作昭通之臂屹然為三省屏蔽寧特保障東川一郡已哉是役也役匠六萬九千役夫一十二萬所需磚石竹木牛車挽運諸費甚夥計用帑銀三萬二百兩有竒物備而工多力勤而勢固董其事者知府崔乃鏞與有勞焉例得書福山泉碑記張允隨福山泉廣通舊乾海資也崇山圍之有田二千餘畝地以乾名志無水也既無水何以田曰耕以雨栽以雨苖而秀且實亦以雨蓋不徒恃地而尤恃天也雨偶愆可若何則曰無如何也滇之田類是者皆呼曰雷鳴田不獨廣邑一乾海資矣今天子重農貴粟講求水利燕趙黍田也濬而宜稌秦隴陸地也疏而為澤滇豈獨以山國異哉余撫滇每以農事飭有司在盡人之力以通地之窮比嵗農利灌溉年多順成亦既有效矣廣通令楊登以乾海資之嗇於水也徘徊周視於山後五里許得泉三股發源福德山麓欲導之而阻於山請示於余余勉之乃出資鳩民鑿山腹七十丈寬三尺髙增其一水㶁㶁入於洞逹於溝引於田蓄泄有法工役不擾業是田者皆喜曰乾海資不乾矣請易名申到下其議於司司上其名曰福山泉遡其源也並請記以勒石余曰此牧民者常職耳何必記雖然有可風者三史啓令鄴引漳水而魏富白公在漢引涇水而民饒地無論肥瘠顧人力何如耳滇所在多山田苦無水司牧者茍皆能營度而補救之無諉地利無任天時無徒責勞於民是瘠者可肥而歉者可豐也傳又曰政如農功日夜思之思其始而成其終楊令果知此意也凡牧民之政其勤如探源毅如鑿山收效如登百榖又何往而不治夫奉宣德意有司事也先公後私民之分也服其疇食其利尚思國家所以任吏治重農功嘉惠黎元無微不至忠敬之心油然以生乎是為記修建文山書院記知縣徐本仙蘄水取諸賁而得文之原取諸大畜而知山之用邑之以文山名也詎淺鮮耶賁之彖曰文明以止人文也明者文止者山火發土凝日華嶽麓文在山也大畜之彖曰君子以剛健篤實輝光日新其德篤實者山輝光者文納縣象於安敦山而文也顧茲名焉烏可以無學乎且夫茲地之昉於洪荒者越數千年隸版圗僅七十餘載初顔其郡曰開化有開必先臣我多遜謹厥始歟今復加以縣治命曰文山聲教暨訖華實兼綜成厥中要厥終歟顧茲名焉烏可以無學乎記曰古之教者家有孰黨有庠州有序國有學七年小成九年大成夫然後足以化民成俗近者悅服而逺者懷之邑初設余首肩其任循名責實捐資百五十兩置義館六椽學田一所師課蒙習以企絃歌之十一至乃於學也濶而修之於田也增而廣之是在後之同志者縣治之設也在雍正八年春三省制軍少保鄂公之請也文山之名我皇上實命之縣令小臣徐本仙仙楚中人家於黃州之蘄水縣始任茲地以雍正八年五月念四日設學在雍正九年夏五月昭通書院碑記總兵徐成貞漢陽昭通之有書院也郡之官辨民夷感少保大司馬鄂公之德蒸蒸向化俾子弟日誦習其中歷百世而思慕之不忘也昭通於古為荒服名竇地甸漢為牂牁郡地唐時烏蠻仲牟由之裔曰阿統其十一世孫烏蒙始強因號烏蒙部宋封阿杓為烏蒙王元至元間置烏蒙路明初以土酋阿普效順使世其職洪武十六年改烏蒙軍民府隸四川其地界黔蜀滇之間雖每嵗量輸租賦而剽掠劫殺鄰境受其荼毒無嵗無之蒹以巖箐深阻遣兵役搜捕輒藏匿不出符檄徴發視同故紙急之又恐至走險生變故歷來嘗務為掩覆含垢莫可如何雍正四年公來節制滇黔奉命以東川歸滇轄東川去烏蒙不及百里公因長寨之役親巡視東川檄烏蒙土酋出鞫從前剽劫之由是時土府祿萬鍾與鎮雄土府隴慶侯皆以童年襲職震公威名為漢土諸姦牽誘各逃匿川境冀得幸免公遣將追捕萬鍾慶侯皆就擒憫其稚幼無知題奏貸其死遣配江西諸凶目皆伏誅其脅從黨羽概從眚釋各令自新而以其地請隸滇省先是萬鍾有叔祿鼎坤涎土府職束身來歸凡所驅遣罔不用命及事平公請設流官而以鼎坤授守備職詔令鼎坤赴都引見鼎坤恚且懼就道時與子萬福及其黨謀已去後當復倡亂以為復歸巢穴之計及至都授河南參將賜帑萬金於雍正八年六月抵任大喜過望遣人馳赴烏蒙止其謀而萬福等已於八月二十五日反自魯甸悔禍無及矣遂破烏蒙府戕總戎劉起元并煽誘東川鎮雄威寧各土酋凶焰甚熾公赫然震怒遣兵致討余時同總兵哈元生參將韓勳奉公命協力一心不三旬復烏郡不七旬入大關不九旬收永善自魯甸以往涼山鼠􅋭等數百寨盡平公乃下令凡避賊逃亡及被脅從者概令招撫悉豫安插於是良懦遺黎殘喘餘生歸而完聚者得數萬戶公復給以田土助以耕牛資以榖種俾得各安其業而間田餘土荒廢尚多乃公之誠上動天鑒凡未經布種之地盡生荍麥觀者咸相歡慶名曰天生荍苞頴方茂蟊螣叢生忽有烏鵲蔽空而至捕啄殆盡禾無一損嵗乃大熟於是童叟欣欣廛市攘攘煙火萬家吠鳴千里殷庶之象宛然內地矣貞等仰承我公化民成俗之心興賢育才之意爰建書院擇子弟之野處而不匿其秀者敦致宿儒以訓誨之使知我公所以改土歸流之意蓋去其椎髻易以衣冠去其巢窟易以室廬去其戈矛易以揖讓去其剽掠易以謳吟誠千萬世型仁講讓之􅈴非僅一時除殘禁暴之績也烏蒙郡舊號公奏請皇上賜名昭通今書院告成亦即顔之曰昭通書院而並書其本末以告來世其亦公之志也夫大理府新建試院記督學吳應枚烏程滇去京師九千餘里僻在西南極邉沐盛朝重熙纍洽之治即猺猓㸑僰咸知嚮風駸駸乎人文日盛余雍正癸丑春奉命視學此邦與方伯陳公𢎞謀先後蒞止方伯甫抵任承兩臺德意慨然以興行教化為已責整飭紀綱百廢具舉凡頖宫文廟書院義學缺者新之圮者補之設法修建不遺餘力與余實有同心余嵗試兩迤按歷之處集諸生宣布聖訓圜橋傾聽煥然改觀士氣亦倍奮而其幅員廣逺稱人才淵藪者東推臨安西則莫盛於大理大理古南詔都會地轄四州三縣鶴慶麗江景東蒙化永北五郡暨新設之鎮沅咸附屬焉應試生童幾及萬餘輩衣冠輻湊為全省辨冕向者嵗科兩試輒以太和縣署為校士場府史挈文卷吏胥持管鑰徙而之他所棘闈席舍闕焉未備非所以昭體制肅關防也方伯亷知其事請於督撫兩臺敕令以郡中之故錢局改為試院并取各郡嵗修試院之資為改作費規畫盡善尅期興工觀察雷公之瑜暨太守陶君之倬司馬蔣君大成相度經營更新易舊委附郭邑令董其成事未竟遽以升任去新尹唐君世梁力襄厥事自門庭堂廡以及庖湢井廄釐然悉備工方竣而余按試適至相其形勝左揖蒼山右臨洱海聚川嶽靈秀之氣與風簷樺燭相輝映俾七府生童薈萃其中抽祕思騁妍詞炳炳麟麟必有文經武緯之士挺生傑出上副聖朝興賢育才之巨典以表大憲栽培造就之盛心厥功豈不懋哉是役也經始於癸丑仲冬落成於甲寅仲春官無廢事民無廢財工鮮創造之艱吏免遷移之纍舉數百年之廢墜不數月而振興之澤施七郡業垂千古誠得為治之大體者矣余心服方伯之因地制宜措置精當樂與諸生童求厥寧而觀厥成也於是乎書重修彌勒州學宫記吳應枚今天下聲教四訖無逺弗屆凡遐陬僻壤靡不漸被滇雖僻處天末距京萬里而雕題鑿齒之俗悉為敦詩説禮之鄉蓋沐浴德化者久矣至推立教之原必始於膠庠而後逹於里黨暨於薄海內外此國家崇儒重道於學宫之建尤亟加意夫固以人才之淵藪風化之根柢胥由乎此也雍正壬子冬余膺簡命督學滇南陛辭之日天語煌煌恪恭遵奉飭兩迤教員凡學宫有歷年久逺宜加釐整或規制未備應行增修者悉令呈報舉行親加驗閲癸丑夏巡試廣西率諸生首謁府庠莊嚴巨麗大異舊時遂援筆志之貞珉以示鼓勵而彌勒紳士進為余言州學創自前明經數百餘載棟宇漸就剝蝕瓴甋不能堅完官斯土者率以吏治糾紛無暇兼及茲州刺史張君景澍鳴琴化理政有餘間捐俸以為首倡學博偕州之紳士踴躍從事爰令擇吉庀材鳩工前大成殿後崇聖祠暨東西兩廡或因而仍之或廓而大之莫不施以丹堊輝以金碧櫺星則易石坊周垣則設戟門以及泮池之浚深照壁之培髙精而𠂻華而軌罔不相稱又從堪輿家度地宜為建三層奎章閣於學宫後建桂香閣於學宫左建塔於學宫案山以培文峯鎖水制煞部位安詳萃川嶽之鍾靈為學宫之拱衛不踰年間而工告竣請記於余余聞是邑之役落成甚速不勝心喜皆由此邦士子能敦崇正學而倡道得法董率有人是以鼓舞樂從易於襄事自茲以往尤望諸生瞻仰宫牆愈凜義路禮門之訓將見炳炳麟麟人文蔚起庶不負國家建學儲材之至意余於諸生有厚期焉重修通海縣學宫記吳應枚嵗壬子余奉命督學滇南癸丑蒞任遍檄迤東西凡學宫應行修舉者悉令開報設法釐整以仰副聖天子崇儒重道之盛心經過地方必親加相度務期完固永久毋取粉飾一時仲秋按試臨安道由通海齋肅詣學周視大殿規概僅存兩廡祠宇不免風雨剝蝕而服甓服圬服石服采迄無一就詢厥所由皆因本學既鮮儲費是邑又地瘠士貧遂致因循廢事瞻拜之下惄焉久之爰集闔邑之紳士再三勸導率先捐俸以為之倡是邑向有紳士優免一宗奉文均攤紳士環請捐輸以助修葺余旋代白之方伯陳公𢎞謀方伯公喜建學之為盛舉也已據邑令丁君沄所請批飭豫支應優免銀三年約計共得七百餘金自是而工作具舉隘者以闢圯者以堅卑暗者易而為宏厰朴陋者易而為華采廟貌峩峩堂舍秩秩不踰年而告成功甲寅秋再至其地巍乎煥乎大改舊觀仰而瞻則雲榱霧棟秀山環峙儼若列屏也俯而睇則縈階繞砌北海澄泓宛如襟帶也東白馬西黃龍兩坊遙聳隱有拱揖之勢舉山川靈淑之氣鬱鬱蔥蔥於斯薈萃歷覽全滇學宫形勢之勝殆未有過之者余於是顧而喜喜而不禁期望之轉殷也夫是役之興功成迅速且不難改轅易轍取舊制而光大之諸生沐盛朝培養久矣茲者仰宫牆之峻整瞻坊表之聿新可知因循廢事等於暴棄繼自今共相奮發振荒廢之頽風勉於鼓舞作新之化釋椎魯之舊習澤以詩書禮樂之華行見鐘鼓式靈人文蔚起於以敦崇正學黼黻休明庶不負余嘉與維新之厚望也諸生勉乎哉醒亭記布政使陳𢎞謀臨桂醒之為言警也以此名亭志警也人醉則昏醒則明警而覺之使無即於昏也曰子之不勝杯杓也蓋自生而已然子固常醒者也而焉用警曰有是哉物之足以醉人也獨酒乎哉適於玩好而志為之移矣昵於聲色而神為之蕩矣推而制事應物遇人聽言茍有所偏即有所惑是亦醉也奚必酒曰然則何以不銘諸座右曰斯亭蓋飲後憩息之所也吾以為不時之提撕且使為吾客者亦有所觸於目而警於心焉故以名亭總兵趙得勝援屏事略記知縣何其偉石屏順治十六年大師平定雲南隨地設鎮援𠞰總兵趙得勝劉稱最驍勇知名康熙三年貴州土酋安坤反上命吳三桂計之諸帥皆從時滇鎮空虛各土司潛通煽亂比聞坤負固未能猝拔稱且敗沒於是各酋猖獗李日芳叛蒙自祿昌祚叛寧州王克猷叛新興王朔叛開化新平嶍峩所在騷然臨鎮總兵閻興邦與日芳戰敗雞街僅以身免龍韜者屏酋也欲取屏城為巢穴使其黨龍飛揚扼海東以絶聲援三月十六日率衆來攻呼噪動地炮聲日夜不絶紳士孫光祈謝君符倡率居民悉力拒守從城上飛矢石傷賊甚衆賊益憤日治攻具必得城而甘心焉警至水西三桂趣得勝赴援乃簡壯士五百人偕其將平雲艾介馬疾馳凡十日抵通海龍韜聞救至遣趙有才伏山谷擊之以軍旅嚴整不敢近遂先騎還報韜攻益急於四月八日試吕公車髙與城平往來如飛蒙以革矢石不能入守城者皆失色先得勝恐城陷晝夜兼行將抵屏城尚無一知者是夜二鼓兩騎貫賊營趨城下大呼趙總兵救至城中聞之大喜亟縋上具食食頃果見石赭坡旌旗隱隱蔽山而下須臾得勝腰刀辨胄跨馬疾呼知賊在凖提閣趨圍之我軍置纛於垣賊從垣上抵禦得勝援刀叱其衆踰垣而入爭相砍殺賊大潰城中亦開門鼓噪奪馬牛器械無算韜遁走追及阿泥山斬之俘龍衮龍圗以獻於是父老爭拜馬前曰趙公活我遂為立石東門外當是時賊酋羣起郡邑為墟水西之師不能遽返臨鎮既已敗衄獨屏城困守彌月援無蟻子賊日滋蔓危在呼吸而提兵三千里外旬日馳赴以五百勞勩之卒當蜂聚方張之寇出其不意夜半驀然而至黎明遂已破賊解重圍而救急難使屏人安全保聚以有今日者伊誰之力哉按祭法以勞定國則祀之如趙平二公雖千秋血食吾屏可矣乃山河帶礪不以銘勳而平蠻片石又為利數弓地者竊去志乘紀事亦不詳其姓名可傷也余為詢諸父老目見其事者遂追書之新建五華書院碑記總督尹繼善滿洲滇處西南極邉衣冠文物差不逮中土而山川瑋麗韞玉陶金人才亦輩出會城舊有昆明書院為諸生講習所因規制未備廩給難繼諸生裹糧負笈未能周遍我皇上覃敷文教無逺弗屆雍正十一年特諭天下督撫建立書院給帑千金永為膏火資余適於是時奉命總制三省駐節斯土爰與撫軍熟籌審𣙜為經久計斯上副九重栽培鼓勵之盛心下收多士引掖觀摩之實效乃就五華山址新建官廨闢講堂增學舍飭藩司購買官莊嵗入租榖為修脯餼廩之需遂逺聘明師於江南而集學使所取前列諸生並通行各屬舉報文行兼優之士嚴加考驗拔其尤者收入書院肄業復酌定條約日有課月有試訓誨有程勤惰有别委教員專司稽察出納之事又慮道逺難致書籍手訂制藝古文詩賦各種刋成數卷令諸生以時誦習規模具備煥然改觀諸生感沐皇仁歡欣鼓舞不獨在院肄業者汲汲孜孜力圗進取即未與其列者聞風奮發駸駸乎有日上之勢夫功不專則業不精教不嚴則率不謹舉一事而不慎厥始則不足以圖厥終余沗居封疆重任環顧彼都人士皆吾子弟造就期望之懷至真且切自蒞任以來仰賴廟謨蠻氣滌淨武備既裕文治宜興矧欽奉恩綸敢不和衷籌畫為經久之規條嗣自今聲教暨訖風氣日開將見椎髻侏􅍣之俗家絃誦而戶詩書不難抗衡中土是聖天子德澤殷流實足衣被萬世後之官斯土者尚其加意滋培永行遵守庶幾無負聖朝作人之雅化云爾所有書院田地及嵗入米銀備列如左一雲南府經管富民縣田七十畝秧田一十九區昆明縣經管田五百四十九畝一分九釐地二十二畝每年除納條糧公費外共收租息京斗米二百一十四石五斗八升二合八抄一圭八粒五顆五粟一宣威州經管田三千七十二畝七分五釐八毫三絲鎮雄州經管田五千三百二十八畝九分九毫九絲易門縣經管田一百四十三畝二分五釐元謀縣經管田二百九畝一釐三毫六絲會澤縣經管田八百七十三畝九分八釐又雍正十三年增置河陽縣田九十四畝四分三釐一毫一忽一微地七分九釐六毫八絲又地四坌又增置路南州田五百二十三畝五分九釐一毫五絲地四百六十三畝二分七釐九毫一絲每年除納條糧公費外共收租息變價銀一千五百六十八兩一錢二分九釐一毫五絲六忽五微四塵一督學撥給未載全書學租每年銀二百一兩五錢八分三釐七毫補遺本朝滇南育嬰堂碑記總督王繼文奉天天地有始終萬物之能不得不留造化之不足者待羣生之自為補救帝王有長養萬物之道不能不留隱微之難周者望臣庶之代為成全故動靜立體上下定位寒暑迭運隂陽互遷天地資始資生之能事畢焉矣道之以德齊之以禮省其刑罰薄其稅斂帝王長民長物之仁恩視此矣然而倫類紛紜賦稟錯雜其間壽考者幾何夭折者幾何榮昌而枯悴者又幾何此非天地帝王之欲區别於大同之中而亦非天地帝王所得大同於區别之內何也理勢使然也惟是大德曰生蒸民為最大寶曰位生齒為先則人也者繼天地以含生奉帝王以治世甚不得與凡類齊觀而聽其夭折枯悴也已我皇上御極以來仁民愛物老安少懷熙熙穰穰總總林林普天率土莫不與被堯舜之澤安享富庶之休而滇南更沐湛恩蠲租免賦減刑輕糧凡所以遂民生者靡不周詳而備至是我皇上以立帝王之極者體天地之心臣工敢弗以體皇上之心者重生民之命乎滇之民固朴而淳而貧夫寠子往往有棄子女勿育者夫父子至性也生死至切也人孰無心而忍於割父子之愛忘生死之關其殆有大不得已而隱𠂻無告者乎是可哀已且以嬰兒之甫具生機旋歸死路道旁狼籍宛轉咿唔保赤子之謂何而顧使黃口罹此慘毒也抑又可傷已使於此而膜置之其何以慰天地帝王之心乎此育嬰堂之所由亟亟也育嬰之會首自京師以及江浙諸省振興有年兹命雲府張府尹博採其式折衷而損益之因地制宜量入計出俾諸嬰既得其養復得其所推幼幼及幼之懷全生生不已之道酌成全補救之術輔天地帝王之功於是商於大中丞石公會同司道在省文武各官共捐資治産以期永久欲望後之仁人君子同道相繼而共期其永久雖然自有此堂而滇之嬰得育也幸矣若滇之民各自育其嬰而無育乎此堂也更幸矣堂之育嬰與自育其嬰而不育於堂何去何從諒必有辨之者余又日望之矣是為記堂中置買撥給捐捨田地通計十六頃五十四畝八分掩骼會碑記巡撫石文晟奉天竊思天覆乎上地載乎下凡昆蟲草木莫不霑造化洪恩况人為萬物之靈雖貴賤攸殊貧富各别至溘焉長逝時不同此臭皮囊乎何富貴之人黃腸長扄而貧寠遺軀無力殯殮竟有棄諸荒郊蔓草之中甚至充魚腹飽狼腸者不少良可傷也若夫郊原暴骨纍纍不絶致令扇風洗雨戴日披霜試聽黯月魂呼凄風鬼泣仁人君子能不惻然動念乎所以雒陽哀哭廣漢敷仁營舍停棺射聲播惠古之人行之急耳茲逄聖天子德邁唐虞仁符天地掩骼之政於康熙二十四年頒行寰宇久各欽遵第恐守土之吏始勤終怠因與少司馬王公時加檄飭各捐置水田八十畝陛地數畝并於會城設一掩骨會焉然欲為悠逺之謀必貴有善全之策乃為之遍勸諸人捐俸緡以置産收田租以買棺共襄盛舉焉又慮乏人董理則銀租出入保無冒開之弊爰委雲郡丞以司其事隨於嵩明路南二屬據里民呈請售賣因先為置買外嵗收租粒存貯會外以佐厥需逮後或再能覓購當再為勒石庶可行之勿替兼垂示永久歟矧今制府巴公賦性慈祥惠政仁風漸次廣被其感發人好善之念知必較前更篤樂施續置將見源源不已則以之瘞遺骸而澤枯骨不亦可傳諸千萬祀乎故不辭方伯劉君之請而為之記會中捐置撥給田地通計六十三頃六畝一分六釐五毫雲南布政司題名記布政使張允隨見前今上御極之六年春以允隨承雲南布政使缺視事後堂皇東西北三面碑版立者陷壁者一一著手摩挲無所謂題名云考省志嘉靖間吉水曾公存仁纍官左右布政有題名記署經屢遷石碣毁久矣距今幾二百年官未嘗一日乏人而履斯任者某也賢當師某也碌碌當置某也闒茸而狼藉當鑒皆無由識其姓名以搜討其事迹然則題名之有無詎無關於重輕歟滇自元至元十年始設行中書省明洪武十五年改雲南布政司居然一方嶽矣而自上國視之如駢拇附贅我國家聖聖相承聲教訖於無外數年來滇之疆宇尤加式廓土田戶口兵防學校諸大政日新月盛經而分綸而合皆於藩藏其成絶域之玀酋𤏡爨既諸種人蒸蒸然于于然回面請吏陵陽臣僕而化權一攬於藩又其地南控交緬西扼烏斯北據巴蜀上遊東撫黔中項背稱雄藩焉居是官者其體國經野辨五地施十二教與中土同其籌邉柔逺審時度務而張弛協宜與中土異僅以會計勾稽考年考月畢乃事雖不至為人所鑒然已不足師而可置矣君子居其位則思盡其職職盡矣不名之名名也愈逺職之未盡而大書深鍥以自表暴能禁人不指其名以相訾謷乎題名之刻無乃可已而不已者歟雖然前之人有賢者余實師之碌碌者姑置之闒茸而狼藉者凛凛乎鑒之合衆人以律一身所謂責於己者重以周也遑為名計哉爰臚列前諸君子而殿以余名并虛左方以俟繼起者景東創建試院碑記吳應枚見前事有勞一身以安千萬人之身者即毅然行之而不嫌於創顧經始難善後更難使論議有餘經費不足縱能便益一時未必能垂法久逺若景東之建立考闈則異是景郡處省會西南萬山中幅員廣衍人文不亞於蒙鶴嵗科兩試舊附榆城相距十七舍山坡險峻跋歷囏厄而新設之鎮沅恩樂及威逺等處又距景二三百里取道開南更為遼逺往返動經月餘余於嵗試時目擊生童黧面繭足用殫力瘁思有以佚之而志焉未逮景丞徐君樹閎治郡六載政通人和與余素未謀面而所見適相合創議改書院為校士所時方伯陳公承制府尹公中丞張公德意方廣開義學以化誨夷鄉為亟務爰善厥請逹諸兩臺兩臺以事屬創舉慮其妨民而滋擾也體察至再遂允行先是郡之紳士聞徐君之有是請也耄者感而泣壯者奮而趨幼者歡而舞咸以為集一次就試資可作將來永久計齊心合力踴躍赴功不俟終日工費悉備徐君復偕鎮沅守章君元佐各率屬捐俸補苴不煩民不動帑相與悉心經畫鳩工庀材新其舍館籌其供億行有㣥居有儲棘垣席舍釐然井然堂堂皇而軒軒爽銀川前縈筆峯左峙洵足以攬山水之精華壯文章之氣概矣是役也於兩臺得創制周詳愛民愛士之實意於方伯得樂善不倦之誠於徐君得見義必為之勇一舉而數善備焉余不敏幸得從事其際即炎熇載道千里馳驅懼不獲仰酬聖天子簡畀隆恩敢有越志歟夫移風易俗教學為先景鎮二郡介居猓𤏡間地僻而人情朴茂薰陶涵育之功尤不可緩無如道逺費繁赴科者往往畏難中沮什不得一二使者奉命掄才振興文教乃職分中事可諉為異人任乎矧規模既定經費已充後之蒞斯土者尚其不憚辛勤因已成之基而加以培養俾蠻煙瘴雨之鄉敦詩説禮冠蓋相望庶幾毋負各當事協謀創始之苦心是則余之所深幸也夫新建大關石城碑記同知張垣滏陽大關為昭郡分防地東接鎮雄西連永善北逹四川筠髙兩邑形若縱帶綿亙將五百里􅋭有硬底紅蛇之險嶺有雪山關腦之雄加以黃水老里渡鹽井諸河奔流繞注於其間此誠滇蜀之咽喉而控制所必先也世宗憲皇帝御極五年烏蒙易土歸流升任總制大學士少保鄂公特題通判分防重撫綏也顧舊治設在雄魁八年夷變更以通判駐魯甸而於大關增設同知當事以舊治之燬於兵而水源缺乏也議改定城基焉而總鎮徐公始創移建養馬壩之議久而未決經總制大司馬尹公巡撫大中丞張公更委迤東道今升粵西觀察使黃公新太協今署開化鎮崔公郡太守徐公復行會勘而議始定大方伯陳公念夷疆要地詳建石城為鞏固萬全計發帑委辦尅日興修余奉檄經營度始隨髙下形勢所宜平淤瀦芟草萊定基一里九分周圍三百四十二丈厚一丈二尺頂殺之城身崇一丈連女墻雉堞一丈五尺有竒闢四門東曰景雲南曰昭德西曰擁翠北曰安化門臺加城高各三尺臺上俱趓樓五楹咸髙二丈四丈是役也用丈石以數千計甎數十萬計灰斤百萬計匠夫供作十萬計而車牛石腳之雇運不與焉於雍正十二年七月十五日動工十三年九月朔日即工相助經畫者為今左營逰戎蕭公而董率規理身任其瘁者則鹽井渡巡檢王子名景周之力獨多云落成之日余及同城寮友擕酒榼登西城樓開軒四顧見玉屏倚後河水縈前向之所謂蔓草荒煙者曾不復覩而樓堞參差儼一雄關巨鎮矣余因之重有感焉大關為烏蒙邉鄙地向隸土司祿氏時雖守職羈縻勿絶而夷人恃其險阻攻盜劫習剽掠漢土之民入而不可復出者比比也今聖天子神武遐宣無逺弗闢使千百載蠶叢﨑阻之區慕化歸誠建關置守襟帶河山成我捍衛是足以握滇蜀之樞而永消反側矣斯城之設顧可忽乎哉爰記其顛末勒之於石使後之司土者有所考焉雲南通志卷二十九之八欽定四庫全書雲南通志卷二十九之九表唐賀破吐蕃表同平章事權德輿略陽伏以聲教所被遐邇大同蠢茲西戎尚有遺類或犯亭鄣且稽靈誅陛下睿算無窮天威逺震以夷裔感恩之衆佐藩隅制勝之臣地取以多方纍獻捷事皆前定必稟聖謨斬將搴旗出於料外堅城便地盡落彀中通荒服會朝之途絶餘孽窺覦之隙奉威懷之命以律而臧兼夷夏之師在和而克此皆陛下神武潛運妖氛永清由是成擒自當盡敵臣等謬當樞近愧乏廟謨幸覩成功不勝大慶請築羅城禦南詔表節度使高駢渤海臣聞仗鉞擁旄顯受專征之寄殿邦守土必尊共理之規冀勵節以輸忠須興利而除害伏以臣當道山河雖嶮城壘未寧秦張儀收蜀之時已曾版築隋楊秀守藩之日亦更增修堅牢雖壯于一隅周匝不過於八里自咸通十年以後兩遭蠻寇攻圍數萬户人填咽共處池泉皆竭熱氣相蒸其苦可哀斯弊可恤臣前年赴任之日才過劍門料蠻賊奔逃不敢回顧先遣走馬入府放出城內户人莫不歡呼稱見蘇息臣今欲與民防患為國逺圖廣築羅城以示雄閫將謀永逸豈憚暫勞臣深受國恩實思忠藎儻允所奏乞宣付宰臣僉議又築羅城成表高駢西川境邑南詔比鄰頻遭蠻蛋之侵凌益以牆垣之湫隘兼是戎兵同行剽劫賊路不能控扼軍營罕習干戈遂使蒸黎枉遭塗炭臣初到統押便與經營更議逺圖以防後患嚴設武備廣築羅城遂乃相度地形揣摩物力不思費耗只繫安危趣十縣之人丁抽八州之將較分其地界受以城基運土囊而子來持石杵而雲集金湯既設鐵甕如堅控地道之莫能徒云入寇縱雲梯之強立無計登陴白露屋凌空躋攀莫及青城山對峙形勢不如覆瓦煙青甃磚苔碧縱蠻再至無計重圖皆仗陛下之睿謀使微臣之創制露布唐姚州道破諾沒弄楊虔柳露布臨海丞駱賓王義烏臣聞北極列象六合奉天子之尊南面乘乾一統成聖人之業是知衣裳所會義有輯於殊鄰霜露所均誠兼育於異類故塗山萬國誅後至者防風丹浦一戎緩前禽者就日然則陳弧矢以威天下法雷霆而震域中四時行焉天道不能去殺五兵備矣王業所以勝殘雖事切救焚茍順時而濟物恩深祝網不獲已而用兵伏惟皇帝陛下登翠媯以握圖居紫微而正象元功不宰混大始以凝神至道無名佇華胥而得夢闡文教以清中夏崇武功以制九夷環海十洲通波太液之水鄧林萬里交影甘泉之樹反踵穿胸之域襲冠帶以來王奇肱儋耳之酋奉正朔而請吏逆賊蒙儉和舍等浮竹遺嗣沈木餘苗邑殊禮義之鄉人習貪殘之性日者皇明廣燭帝道遐融頗亦削左袵而被朝衣解椎髻而升華冕而豺狼有性梟獍難馴輒敢亂我天常變九隆而背誕負其地險攜七部以稽誅騷亂邊疆寇攘州郡用是三門授律長驅無戰之師五月渡瀘深入不毛之地去月二十一日軍次三朏崑崙鎮前後捕得生口知守促山羌傍山連結十部蠻首徒五萬衆此山即南郡中之巨防也岡巒千里西通大荒之郊溪谷萬重南極炎洲之境聳喬林而插月隂靈有假道之標拔崇巖以隱天陽鳥無回翼之地峯危束馬路絶懸車賊據臨岱之形垂建瓴之勢徴風召雨蝟起蜂飛驅雜種以挺災封狐千里肆沈黎而作孽雄虺九頭臣以為制敵以權柔逺者理或存於德教伐叛以義決勝者不必在於干戈於是廣播皇恩恭宣帝澤申之以安撫曉之以存亡信重蠻陬無負黃龍之約賞隆漢爵不渝白馬之盟地接冉駹詞屢殫於諭蜀俗通槃瓠聲不輟於吠堯臣遣左三軍子總管寧逺將軍前守右驍騎萬安府長史折衝都尉上柱國劉會基率檢校果毅驍騎尉井陘縣開國男劉元暕等銜枚逺襲卷甲前驅偃危斾而設潛兵疑從天落乘間道而掩不備若出地中又遣右三軍子總管明威將軍行右武衛翊府中郎將上柱國高奴弗率左武衛天水府折衝都尉張仁操等陟南山之南衝其要害之路又遣左一軍子總管前右金吾衛翊府左郎將上柱國孫仁感率衛尉府右果毅都尉王文雅等凌北山之北絶其飛走之途賊首領楊虔柳諾沒弄諾覽斯等振螳螂之力距轍當輪縱蚊蚋之羣彌山滿谷劉會基高奴弗孫仁感等並忠勤克著智略逺聞識明君之重恩輕生有地提太阿之雄劍視死無時彎弧而凶黨土崩舉刃而妖徒瓦解雖危苕沸鼎未窮梟首之誅救死扶傷猶致析骸之爨二十二日臣遣副總管兼安撫副使定逺將軍前左驍騎翊府中郎將令狐智通率右武衛良將壯府左果毅都尉韓惠德等擁貔豹之雄順天機而左轉遣管內安撫副使朝議大夫使持節守銀州刺史上柱國宜春縣開國男李大志率前左武衛靜初府右果毅都尉上柱國陳𢎞義等驅象犀之卒乘地軸以右回又遣行軍司馬朝散大夫守巂州都督府長史上柱國梁待辟率守右金吾衛宜昌府果毅都尉閻文成等總投石拔距之材蹈中權而拊其背又遣前守右威衛龍西府果毅都尉康留買等騰躍鐵噴金之騎犯前茅而扼其喉臣等率守左衛清官府左果毅許懷秀等橫玉弩以高臨縱金鉦而直道玄雲結陳影密西郊赤莖揮鋒氣衝南斗揚塵埃而匝地白日為之晝昏掃氛祲以稽天滄溟為之晦色兵交刃接鳥散魚驚自卯及申追奔逐北斬首千餘級轉戰三十里激流膏而為泉似變萇𢎞之血委亂骸而擠壑若泛鱉靈之尸既而照盡高舂雲昏乙夜賊乃收集餘衆保據重巖臣度彼遊魂慮其宵遁使三軍齊進四面合圍二十三日乘魚爛之危啓蛇形之陳揚麾誓衆仗節訓兵一鼓先登賞必懸於芳餌九攻按律罪無赦於嚴誅五部雄才三河俠少或生居燕地尤工即墨之圍或家本秦人早習昆明之戰叱吒則江山搖蕩慷慨則林壑飛騰舉鵬翼以揚威耀犀渠而賈勇澄氛廓祲回夏景以潰春冰滅迹掃塵若霜風之捲秋籜戰踰百里時歷三朝前後生擒四千餘人斬首五千餘級諾沒㺯楊虔柳等殞元行陳懸首旌門蒙儉和舍等委衆奔馳脫身挺險雖復刑以止殺丁壯咸伏於誅夷禮不重傷班白必存於寬宥昔魏臣賊蜀徒聞蒟醬之奇漢使開邛才通竹杖之利豈若膺紫泥而弔伐指丹徼以臨戎一戰而孟獲成擒再舉而哀牢授首斯蓋皇威逺暢廟略遐宣奉元猷以配天徒知帝力掩皇輿而闢地豈曰臣功不勝慶快之至謹遣某奉露布以聞破蒙瞼露布駱賓王臣聞七緯經天星墟分張翼之野八紘紀地炎洲限建水之鄉西距大秦雜金行而布氣南通交址枕銅柱以為鄰俗帶白狼人習貪殘之性河淪赤虺川多風雨之妖水積炎氛山涵毒霧竹浮三節肇興外域之源木化九隆頗作中原之患年將千祀代歷百王鄭純之化不追孟獲之風愈煽故三年疲衆徒聞定筰之譏五月出師未息渡瀘之役然則大人拯物上聖乘期法乾坤以握樞體剛柔而建極知仁義不能禁暴設刑網以勝殘知揖讓不可濟時用干戈而靖亂伏惟皇帝陛下祥螭載玉拓地軸以登皇道契寢繩掩天紘而踐帝玄雲入户纂靈瑞於丹陵蒼籙升壇薦正圖於翠渚垂衣裳以朝萬國崇玉帛而禮百神昭儉防奢露臺惜中人之産宣風布政明堂法上帝之宫致羣生於太和登品物於仁壽四神踐雪五老飛星君囿祥麟樂班文於先樂女牀鳴鳳咏歸昌於帝梧四隩同文五風異色豐林萬里才疏苑囿之基層城九重未浚池隍之域六合照臨之地候月歸琛大罏覆載之間占風納賮蠢兹蠻貊敢亂天常橫赤熛以疏疆背朱提而設險山林萬仞巖邑千重望秦阜以相傾崤陵失四塞之阻對梁山而錯峙劍門成一簣之峯自謂絶壤幽荒中外足以迷聲教憑深負固江河可以逃靈誅殊不知玉弩垂芒涵水無九嬰之沴瑶階舞戚洞庭有三苗之墟臣等謬以散材忝專分閫白招乘候順秋帝以揚旌絳節臨邊遲夜郎以礪劍雲開巂穴斾轉邛山峻坂九折之危盡忘襟帶滇池滿江之固曾失藩籬惟逆賊設蒙瞼等未革狼心仍懷豕突陸梁放命旅拒偷安地接祠雞竟無心於改旦山多神鹿終未見於擇音臣以大帝宣威有征無戰明王仗順先德後刑𢎞聖澤於中孚緩天誅於大造庶南熏感愠仰雲闕以翔魂東律和音扣轅門而頓顙祝禽疏網徒開三面之恩毒虺梴妖逾肆九頭之暴鳩集餘衆蟻結凶徒儋耳椎髻之徒千里霧合鑿齒雕題之孽一呼雲屯疊石菌以開營拒巖椒而峻壘崇巒切漢若登藏寶之山絶壑憑霄似瞰封泥之谷去前月十七日連營布陳據險揚兵東西三十餘里馬步二十餘萬聚蚊蚋而合響聲若雷霆縱蛇豕以為羣氣衝宇宙臣遣中郎將令狐智通等擁拔山超海之師當其步陳遣銀州刺史李大志等驅躍景騰雲之騎乘其馬軍遣巂州都督府長史行軍司馬梁待辟等領徑卒三千絶其飛走之路遣臨源府果毅馬仁靜等勒精兵九百斷其潛伏之軍臣率行軍長史韓餘慶等負霜戈而直指掃雲陳以長驅庶令斬馘七擒將士挾雷公之怒伏尸百里土酋識天子之尊於是三略訓兵五申誓衆先登陷敵無遣大樹之功後拒亂行必致曲梁之罰楚人三户蜀郡五丁氣擁玄雲精貫白日喑鳴則乾坤搖蕩呼吸則海嶽沸騰列旗影以雲舒似長虹之東指橫劍鋒而電轉疑大火之西流刃接兵交洞胸達臆自辰踰午魚爛土崩沸殘息於層峯更切守陴之哭積員顱於重阜殆成京觀之封唯賊帥未悟傾巢之兆敢懷拒敵之心猶率馬軍平川轉鬭驚塵亂起六合為之寢光殺氣相稽四溟為之變色副總管某某者忠惟徇國義則忘軀臨危而貞節逾明制敵而機謀獨逺丹誠自守雖九死其如歸白刃交前豈三軍之可奪投袂則妖徒霧廓搴旗而逆黨冰摧於是乘利追奔因機深入困獸猶鬭如戰廩君之魂窮鳥尚飛似驚杜宇之魄斬甲卒七千餘級獲裝馬五千餘匹僵尸蔽野臨赤坂而非遙流血灑途視丹徼而不逺首領和舍等並計窮力屈面縛軍門寬其萬死之誅𢎞以再生之路惟蒙瞼脫身挺險負命窮山顧巢穴而靡依逃晷漏其何幾况妖徒革面徼外非復他人部落離心舟中皆為敵國瞻言梟首指日為期凡所歸降隨事招撫與之更始復其故業首丘懷戀疑臨舊國之墟安堵如歸似入新豐之市然後班師遜水振旅禺山建鴻業於武功暢元猷於文教庶荒陬襲中邦之禮邊疆息外寇之虞華人祝堯兆皇基於千歲蠻歌頌漢美王澤於三章宜與夫天帝前星廣賜秦公之册坤元益地遙開王母之圖蓋示有云曾何足紀斯並元謀廣達妙略遐覃一戰而荒景肅清再鼓而邊隅底定豈臣等提戈擐甲克全百勝之功仗節揚麾能通九變之策謁藳街而獻捷大帝成規聞杕杜以勞還小臣何力不勝慶快之至謹遣行軍司馬朝散大夫守巂州都督府長史上柱國梁待辟奉露布以聞軍資器械别簿録上破吐蕃露布節度使韋臯萬年劍南西川節度使同中書門下平章事臣臯等言臣聞兵應者勝義者王師直為壯曲為老多助之至四極爰輳貞觀則同羅擊延陀開元則九姓殄默啜曰商莫不來享犯漢雖逺必誅德鳳翔呼河源武節憺呼月骨率寧人之有指先元戎之啓行用信威光祖宗不以賊遺君父恭惟皇帝陛下宣昭義問敉寧武功纘八葉之鴻圖奮四征之雄略懷梟鴟銷祲沴稟仰太和剪鯨鯢清郊原掃除羣穢王猶允塞我武惟揚奇幹善坊各修貢職條枝若木咸順指令邈積石之遐陬有吐蕃之醜類侵敗王略倍姦齊盟乘邊將之騁兵瞰戎亭之虛候為蛇豕食上國盡盜河湟帥蝥賊搖我疆再驚畿甸騎壒敢於深入鑾蹕至於親屯撊然授兵協以謀我尚納汙而含垢姑通使以結和清水之盟未乾好畤之師已聚指涇靈而徼賂閣鹽夏以搗虛夷德無厭弗悔袵金之禍楚氛甚惡輒興衷甲之謀蠢爾為讎整居匪茹維時南詔慕化中朝先零之質諸羌雖嘗并力麇人之率百濮罔不離心頓顙於邊受命於吏燕貉輸致騎之勤晉戎成掎角之勢彼既失鐵橋之險我遂克莪和之郛盍竄匿於龍荒復虔劉於麟塞戕我守將墮我陴隍修戈矛與同讎靡室家不遑處臣等請奮其旅以殲乃讎鳳翔振武靈武之騎獵其西邠寧太原涇原之兵震其北率山南熊羆之較暨東川貙虎之師烏蠻撓其腹心回鶻搗其肘腋衆素飽矣一大治之諸將陳洎等統五萬軍出十一道濟師西皓之半䇿勳北陸之初蕩平七城斬馘萬級獲鎧械十五萬計燔堡壘百七十餘遂賈勇而圍昆明將決勝而定青海偽東境五節度大使論莽熱釋朔方之衆援維州之域九攻九卻之計窮七縱七擒之威速連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解拂廬魚潰甌脫兔奔谷靜山空自就焉耆之僇區殫域滅汔聞智盛之降斯皆廟謨淵深神斷天造明見萬里運奇掌上之兵守在四夷制勝目中之賊勒功滇池之柱植表赤嶺之碑一怒安民文之勇也三軍用命克何力焉臣等承帝之明敵王所愾開逺門謁候坐收西極之舊封紫薇殿受俘重覩崑丘之茂績臣等無任慶快激切屏營之至謹遣某官奏露布以聞碑元平雲南碑學士程文海建昌國家繼天立極日月所照罔有外內雲南秦漢郡縣也負險弗庭乃憲朝踐祚之二年歲在壬子我世祖聖德神功文武皇帝以介弟親王之重授鉞專征秋九月出師冬十二月濟河明年春歷寧夏夏四月出蕭關駐六盤八月絶洮踰吐蕃分軍為三道禁殺掠焚廬舍先遣使大理招之道阻而還十月過大渡河上率徑騎繇中道先進十一月渡瀘所過望風欵附再使招之至其國遇害十二月薄其都城城倚點蒼山西洱海為固國主段興智及其柄臣高泰祥背城出戰大敗又使招之三返弗聽下令攻之東西道兵亦至乃登點蒼臨視城中城中宵潰興智奔鄯闡追及泰祥於姚州俘斬以徇分兵略地所向皆下惟鄯闡未附明年春留大將烏蘭哈達經略之上振旅而還未幾拔鄯闡得興智以獻釋不殺進軍平烏蠻部落三十七攻交址破其都收特磨溪洞三十六金齒白夷緬中蠻國皆相繼納欵雲南平列為郡縣凡總府三十七散府八州六十縣五十甸部寨六十一見户百二十八萬七千七百五十三分隸諸道立行中書省於中慶以統之大德八年平章政事伊遜德勒建言所領雲南地居徼外歷世所不能臣先皇帝天戈一麾無思不服今其民衣被聖明同於方夏幼長老少怡怡熙熙皆自慙其往陋非聖武不殺之恩不及此惟點蒼之山嘗駐蹕焉若紀聖功刻石其上使臣民永永瞻仰於事為宜中書以聞制曰可以命詞臣臣文海再拜稽首而言曰世祖皇帝之德大矣譬如天地之無不持載無不覆幬而生生之意恆寓於雪霜風雨寒暑變化之中物之蒙之者薰然而溫灑然而濯翕然而同靡然而順有不自知其然而然者故其功烈之崇基業之廣貫三靈而軼千古夫以大理之昏迷旅拒虐我使人若奮其武怒俾無遺育可也而招徠綏輯終釋其主弗誅嗚呼微天地之德孰能與於斯乎今陛下建中和之政凡以繩祖武厚生民無所不用其極中外欽承無逺弗屆是以藩方大臣於錢穀甲兵之外惓惓以光昭令德為請其知為政之本也已漢世宗從事西南夷天下為之騷動蜀民咨怨諭之諄諄鑿池涖習再駕而後取之其視今也孰愈穆王周行宇縣必皆有車轍馬迹焉初非疆理天下也而世猶誦之至今視跋履山川灑濯其民而納於禮義之域孰愈彼碧雞金馬與夫點蒼皆其山之望者也漢使祭之唐季盟之夫各有所畏焉耳今也鐫未始磨之崖紀無能名之績桓桓炳炳與世無極豈惟足以震百夷榮千古其餘光所被山川鬼神實嘉賴之嗚呼盛矣哉臣事先帝蚤受眷知今復待罪禁林發揚蹈厲職也不敢以荒落辭謹再拜稽首而系之以詩曰於皇惟元載地統天大噫小噓曰寒以暄粵西南陬水駛山􅍶風霆流形氣交神州跂息蠕蠕勾萌鮮鮮谷飲巢居燕及跕鳶繄誰之恩聖祖神孫武烈文謨湔祓生存既有典常被之服章我吏我民我工我商萬國一家孰為要荒點蒼蒼蒼禹迹堯牆井鉞參旗終夜有光威不違顔作善降祥嗟爾耄倪視此勿忘賽平章德政碑提舉趙子元榮祿大夫雲南諸路行中書省平章政事賽公平烏孫國師之後早遇太祖功聞五朝政事舒徐德量寬大至元甲戍帝以南方未定召公囑之曰雲南勝地極在遐荒自朕親臨率兵歸附迄今役屬二十餘年撫恤之心雖切而下民之志未安今欲得人以革其弊公奉天子命鎮諸外藩以納蘇拉迪音烏呼納為斷事官楊璉為左右司郎中塔瑪丹為員外郎梁增侯瑞為都事所司之土東接宋境西距蒲甘北抵吐蕃南屆交址地方千里者五總隸一百餘州凡二十餘路皆公所攝是歲七月抵大理下車風動神行詢父老諸生安國便民之要中慶大理兩設提舉令王榮午趙子元充其職中慶首建文廟歲祀於春秋二丁仍收置儒籍識者度公之心皆為學校之事似乎寬緩公臨事之始而先之者何也殊不知國家政事典則綱紀法度軍旅刑穀之事未嘗不自文學始今公先其所當為而為之使南方之人舉知風化公可謂得治之本矣繇是省徭役招散亡恤鰥寡備水旱禮賢士削冗官建屯田制楮幣設路食以待勞民薄征稅以廣行旅飢寒者得以衣食流散者得以撫綏凡興利除害之事知無不為與夫建省堂築驛館導水治橋興市井皆候農隙悅以使民民忘其勞凡結怨於己者公悉以恩待之當時號為易治十二年冬羅槃甸蠻自昔聲教之所不及者據險恃愚屢逆使命公乃徂征薄於城下我師四圍其勢欲破謂諸將曰力攻不如德降諸將曰蠻夷不可以仁義化乘勢而攻殄無遺育必無後顧之憂公曰不然我聖主好生惡殺之心臣下體而行之職也數日城果下諸酋長各齎金馬幣帛以貢公命僚佐郎中楊璉安諭以西餘城和泥諸部望風屈膝十三年秋遣使齎檄招誘廣南溪洞是時儂士貴及左江李惟屏右江岑從威等二十人各執土物納欵公以新降不受降者拜首再三僅受以領其意及歸濃賞厚祿以旌其勤是歲廣中降者八十餘州籍四十萬户東招靖江南開廣道不勞一矢而安定十四年春蒲甘遣大將蘇都爾貝副以禆將五人士卒象馬以萬計剽掠金齒飛書求救公命萬户忽都總管段信苴等釋圍而蒲兵始解自後蒲甘不敢犯邊金齒得以安堵皆公之良計也初昆明池口塞水及城市大田廢棄正途壅抵公命大理等處巡行勸農使張立道付二千役而決之三年有成噫嘻公今之治南詔亦猶昔之治西秦也長安之人曾勒碑以記其德公之用心可謂至矣經綸既緒凡有功於王事者公遣使聞奏朝廷莫不稱旨擢阿嚕與納蘇拉迪音為雲南諸路宣慰使都元帥楊璉為宣慰使副都元帥烏呼納和尼齊阿實克巴實為招討使阿嚕為宣撫使總管段信苴等特加恩賜張立道為中慶總管各賜虎符金銀符宣敕者二百餘人以旌其功吾嘗論名實之辨而有感於公公能開疆闢土於不毛而不能勒勳於銅柱使南方之人感恩於肺腑而不能繪像於公朝此公之所能者實也公之實迹已昭著於宇宙雖紀之金石歌之聲詩未足以發明其萬一而公之名雖三尺之童亦知之又何待豫之揄揚而後顯哉然國人不起甘棠之詠似有愧於召公黃童不為騎竹之迎豈無慙於郭伋吾儕小人舍本逐末釣名干譽視公寧不愧耶邦人父老感公之德銘之琬琰以示不忘銘曰公實在己公名在人己既無歉人何足詢為政以德澤民以仁南方生齒親之若親逺人向化臣其未臣昔號難治公來舉醇豐功偉迹南詔西秦垂之金石永示無垠明黔寧昭靖王祠堂碑王奎見前王諱英字文英姓沐氏鳳陽之定逺人元季天下難作王在童稚喪所怙恃時皇上龍飛鳳陽往拜于門上奇而育之既長機敏過人數從征伐終日侍側無戲色亦無惰容𢎞量孝恭出於天性上益奇之壬寅授帳前都尉出鎮鎮江卓有聲績甲辰除廣武衛親軍指揮軍府肅然尋加昭勇大將軍廣信衛指揮使軍府益律戊申春正月上即皇帝位改元洪武既定鼎命王從征福建擒元平章陳友定三月復王姓鎮建寧三郡三年升鎮國將軍僉大都督府事四年升榮祿大夫同知大都督府事時天下兵樞交擁治出聲生稱上意旨中宫尤屬望焉九年乘傳繇陜西抵熙河布德澤康逺人事有不便更張以聞明年副寧河王總大兵征蕃部西渡黃河略川藏耀兵崑崙轉戰千里俘獲萬計班師論功封西平侯開國輔運推誠宣力武臣階仍榮祿大夫勳柱國食祿二千五百石賜鐵劵勳在盟府上曰朕昔子汝無異汝父汝今世有茲爵守乃宗祧以賁乃祖父無忘朕命敬之哉又明年八月拜征西將軍將兵征西番降元萬户克實克嘉勒粲副使舒多爾濟阿烏都二人卒二萬雜畜二十餘萬平朵甘納琳七站地數千里十三年以陜西兵征和林元國公托和齊等略以集乃渡黃河回賀蘭涉流沙偵報去穹廬五十里王分為四翼自以驍勇衝其中堅銜枚夜薄其營托和齊愛租全部皆降明年引兵出古北口襲公主山長寨平四郡過驢駒河獲知院李宣還京副征南將軍統兵征雲南不浹十辰雲南底定夏王與征南分兵東平烏蠻餘寇諸部謂王師東下復叛夷孽二十餘萬圍雲南城幾不支王聞以鋭師萬人馳救之寇拔營宵遁時曲靖永昌皆失守王次第復平之事聞詔征南班師王留鎮二十一年春平摩沙勒斬首千餘級三月緬思倫以三十萬衆寇定邊東川廣西往往遙應之王率諸衛兵三萬禦之尅日會戰蠻用象王分軍隊下令曰聞吾炮聲大衆齊入初風從賊來炮發風猛助順乘風縱炮象皆股栗三軍夾擊之聲震山谷殺其首將刀斯郎斯郎理蠻師大奔斬獲萬餘人盡獲其象馬軍實思倫遂附秋七月東川平冬十月廣西平誅者滿矣獻俘五千餘人明年平越州阿資冬朝京師賜宴奉天殿賜金銀楮帛繒綵以萬計尋還鎮上諭曰汝在朕無西南之憂二十四年阿資復叛王親擊之有詔命王還滇以僉都督何福為平羌將軍討之阿資來降秋遣使招八百八百入貢明年夏王薨於正寢軍民罷市巷哭訃聞上哭之慟追封黔寧王諡昭靖王在鎮十年初內訌外攘人流卒亡內無宿儲外絶餉運王分軍墾田九十七萬畝且耕且戰招撫攜二敬賢納士不吝賚豫民始知有生雖連歲用師而陽春煦育之意常寓於霜露冰霰之中遐逖曶暗皆覩天日山川草木相生懋豫與嘉賴之其功德之盛古所未有也民夷念王不置合辭請于朝建祠報可俾王之子今西平侯纂其任從民望也又按祭法古之通祀者五曰法施于民曰以死勤事王兼有之載祀百世此其肇歟祠作于薨之後二年十月乙未成於明年六月己卯凡為楹若干行馬列戟不侈不踰遵憲章也既成享咸請紀於石以垂無極因作迎享送神之詩俾歌以樂焉大明麗天萬國明赤符飛騰䇿六丁惟王翊運天降精身薄日月騎斗衡挾矢張弧掃欃槍助帝駟伐基隆平氣壓崑崙蕩滄溟出入星緯無留行徑涉滇海縻長鯨長鯨既殲波浪腥龍蛇走陸殺氣橫噓陽吹隂孰敢嬰文經武緯光晶熒手揭元會歸虞庭上騎箕尾為列星帝錫侈封王黔寧河山帶礪分漢盟堂堂遺像夾兩楹神光夜夜飛爽靈肸蠁布瀉通杳冥棽麗颯沓從兩旌倐焉如雲摶紫清八衝鏘然韻流鈴春秋報事垂千齡定逺王神道碑大學士楊士奇廬陵王諱晟字景茂自少氣宇闊厚聰悟過人高皇帝重之既冠授後軍都督僉事升授左都督時惠襄繼昭靖鎮雲南薨王嗣封西平侯仍鎮雲南王承父兄之後秉誠殫慮益𢎞逺圖先是麓川不靖王適至奏發兵平之太宗皇帝臨御之三年八百蠻酋侵邊王先後追擒其酋誅之四年安南叛命王佩征夷副將軍印率雲南兵分道進討寇首逺遁於海王合征夷將軍兵追至日南州俘無遺械送京師安南平六年春班師入朝封黔國公賜誥劵玉帶金幣上親製詩褒嘉還鎮雲南十七年富州蠻酋積逋賦不入命王討之王使人諭以禍福蠻遣子詣京師謝罪悉償所逋仁宗皇帝嗣位重王勳德命佩征南將軍印正統三年麓川思任發擾邊侵掠諭之不下乃命弟昻及都督方政等率兵前進乘夜渡江破賊柵斬首三千餘級獲象三十餘政奮勇獨進賊伏兵四發政力戰死之王曰是雖偏將失利固吾總帥之過旋師將駐金齒圖再舉會有旨命還鎮王至楚雄以疾薨訃至京上為之輟朝賜恤典追封定逺王諡忠敬夫人臣生有茂勳死有榮名無愧於銘矣乃為之銘曰天啓皇明于淮之右配天與地篤生帝后二聖至仁作民父母心存萬方包含遍覆矧孤在里靡攸怙恃二聖矜惻曰其豫子鞠之誨之勞劬備周以長以成有偉才猷帝有恩言爾復爾氏懋乃樹立華乃先祀嗚呼昭靖盛德豐功皎日之誠持孝與忠嗚呼忠敬纘乃烈考維孝之執維忠之蹈發軔都府簡在宸心夙夜弗遑秉其慎欽往綏滇人幾五十年率考之行敷帝之恩俾食俾衣免其寒飢重學崇師導之尊卑平其政令時其作止人戴惠慈淪骨浹髓有或弗慧以諭以誨洊誨弗悛式劉以戒交人悖凶披猖為狂違天毒氓軼我邊強奉詔出師往行天討桓桓疾馳雷驅電掃富良飛渡如履坦途兩師窮追縛寇海隅解縱脅從宣布教條爰整師旅凱歌歸朝飲至䇿勳上公錫爵嘉寵元臣龍章輝灼滇人之思瞻望斾旌帝不忘逺申命南行祗事五朝鞠躬小心奉國忘家志如堅金寸棘未翦躬不寧處過自偏裨豫躬引咎終於王事德善孔多顯顯華褒千歲弗磨沐氏子孫奕奕象賢篤忠與孝永光其傳定逺忠敬王廟碑尚書王直泰和古之人臣有大勳勞於國者生則疏爵以貴之於其終也則必有廟祀之禮焉所以崇德而報功也然非子孫之賢而能備其制成其禮者蓋鮮矣我國家之臣之有大功者鳳陽沐氏其一也沐氏之先曰黔寧昭靖王早受太祖髙皇帝罔極之恩長而奉命征伐功烈赫然著在西土於是封西平侯作鎮雲南既薨而進王爵享廟食長子春嗣侯薨而王繼之王諱晟字景茂自少聰悟過人博考諸書髙皇帝甚重之命為後軍都督僉事益祗勤不懈加授特進榮祿大夫左都督俾襲侯封仍殿南服王念夷性無常先王戡定之不易必有以大鎮撫之然後能讋伏其心而各有寧宇先是諸蠻逐麓川宣慰而分據其地乃請發兵討定焉正其封域而疆理之置木邦孟養孟定三府鎮沅威逺二州干崖潞江灣甸大侯者樂五長官司徴其貢賦有常數又置騰衝千户所於潞江之西以臨之而諸夷莫敢不服太宗文皇帝即位之初八百蠻酋出寇掠為邊患王曰是不可不治不治則將愈肆即以聞且發兵問罪而自率衆繼進及蒙自縣蠻聞王來皆退走王督兵窮追獲其酋戮以徇上嘉其勇決賜白金降璽書勞勉安南叛朝命征夷將軍率師討之而以征夷副將軍印授王為左副俾率雲南四川諸軍分道而進王經野蒲伐山通道先驅入安南奪猛烈棚華關隘築堡駐師以造舟分遣諸將出宣光江口奪澳沕寺沙舁舟夜出洮水引兵泝流鏖戰富良江自旦達暮賊因稍引卻明旦將復戰王下令曰天兵伐叛當出萬全命盡括軍中舟聨為浮梁以濟師與大軍會合攻多邦城柵破之遂搗東西都及盤灘困牧嚕江仙侶等處所至如破竹賊不能支遂潰寇首黎季犛父子窮蹙挈家屬走海上於是將佐皆集督率諸軍追至日南州竒羅海口悉就擒械送京師安南平得郡四十八縣百八十六户三百十二萬五千九百他物不可勝計還朝上以王功多賜號顯忠輔運推誠宣力武臣特進榮祿大夫右柱國封黔國公食祿三千石賜誥劵玉帶金幣命子孫世襲既大宴上親製詩寵之還鎮是冬安南復叛推陳季擴為首元帥鄧容副之上獨命王為征夷將軍以兵往伐師入其地季擴等懼遁乂安海島王追至占城境上擒送京師誅之既還富州蠻酋頑不供賦者纍年有司亦請以命王王左右皆曰此易與爾以兵急攻平其地可也王曰威服不如德服使人以禍福諭之蠻感悅即遣子謝罪京師而盡輸逋賦蠻中帖然仁宗皇帝嗣位以王勳戚之賢而久勞於外召至京師命兼太傅待之禮益隆佩以征南將軍印遣還王頓首辭讓上曰朕託卿鎮靜一方此豈為卿重哉宣宗皇帝及太上皇繼位所以褒賜皆特厚正統初會川黎溪及馬龍他郎甸諸蠻相繼作亂王皆命弟都督昻往平之及麓川思任發反侵掠騰衝南甸諭之不下事聞命王率兵致討師至潞江王諭諸將曰兵以謀勝今逼瘴月豈用武之時然衆已集若賊畏威服罪則當為請於朝復諭之不從王乃命弟昻及都督方政以兵進然猶以敬慎為戒王整兵未發政等夜渡江破賊柵斬首三千餘級政乘勝獨進遇伏力戰死時春已半王慮瘴發非利遂旋師將駐金齒會有敕令還鎮息兵俟時而動至楚雄疾作勢且甚謂弟昻曰吾父子兄弟受朝廷恩大矣吾不能報爾素忠謹其勉率子孫篤盡臣道以無負國家又曰逆賊逋誅而偏將不返吾甚恨之爾毋忘此寇言訖而逝王文武忠孝克纘先王令緒而在鎮既久敷布天子仁義之澤以綏靖一方凡其言行施於父子兄弟賓友僚佐之間未嘗違乎道德隆位重祿好賢容衆記人之善忘人之過蠻夷干法不忍加誅若用兵行師非遇有罪不輕戮一人信賞必罰威行惠施是以將士用命所向有功至於講武事修戎器理屯田治城戍勤恤民隱興利去害建學立師以教導其人使歸於善尤孶孶不倦公事之暇手不釋卷進退從容有典有則凜然仁人君子之風蓋所謂説禮樂而敦詩書者也至於薨人無貴賤愚良莫不哀慕正統四年三月十八日也享年七十有二訃聞上震悼罷朝恩恤尤厚追封定逺王諡忠敬而命子斌襲封黔國公弟都督昻總其軍昻薨斌仍出鎮雲南請於朝曰先臣紹臣大父遺烈受爵命膺綏靜之寄效征伐之勞思竭力成功以報殊遇而未克如志今蒙追錫王爵加以美諡實與臣先大父同此莫大之恩也臣願如先大父立廟供祀享以彰上賜而畢臣志詔曰可於是作廟於昭靖廟旁制度儀觀之盛足以致其孝經始於景泰元年八月初三日而以景泰二年十月十五日訖工既備物行禮而告諸廟矣將勒文以紀其成而黔國公謝世上念沐氏世勳且有世澤於雲南而黔國子幼以今都督璘賢可以任繼述詔佩征南印仍總諸軍鎮兹土蓋都督昻之孫王之從孫黔國從子也深惟廟碑未建何以彰王之功德而成黔國之志乃因金齒儒學教授余穀來京師屬豫文豫惟聖王之制廟祀以報功德之臣蓋欲與國咸休厚之至也王之令德豐功世濟其美廟而祀之蓋宜矣國家有億萬年太平之慶王亦享無窮之祀奚可無文以著不朽故為序次其事而系以銘俾刻焉銘曰天佑聖明篤生賢輔四征不庭混一海宇遂開雲南昭靖之功師武用宣以啓王封世臣大家譽望赫奕忠敬繼之克纘戎績茀被炎荒瘴癘之區近悅逺懷罔有不孚太宗烈烈南交致伐風行草偃左將之傑乃執其渠至於海隅再涉鯨波以訖天誅夙夜匪躬用熙帝載位與時升業已久大髙牙巨纛作鎮茲邦山川邈遐千里相望皇闡大猷綸命時至惠綏撫摩惟一其視乃寢干戈乃正典常以此仁愛馴彼暴強蠻或不恭敢肆無道緩其獮剃恢我文告飢則有食寒則有衣是孰使然敷政其宜相維先世匹休儷美仁義忠孝允作臣軌何天弗遺亟殞將星哀此下人雨涕曷勝當寧悼嗟追錫顯爵加以美諡先王是若作廟巍巍昭靖焉依命服煒煌穆穆令儀春殷秋髙以享以祀鼓鐘既設復有牢醴王之格斯子孫之思亦軫民艱降福孔怡麗牲之碑礱彼貞石載德有文垂耀無極蟠螭在滇穹龜負之後千萬年永永弗隳大理八蠟廟碑知府李元陽太和夫五穀者人之司命先王制為蠟祭以報穀也其神八故曰八蠟一曰先嗇神農也二曰司嗇后稷也三曰農田畯也此聖神開穀之原者也其曰郵表畷曰水防曰水庸此利於穀所當謹者也曰貓虎以祛豕鼠曰昆蟲以息蟊賊此害於穀所當祓者也蓋莫不有神以司之建亥之月致祭以報萬物息老休農又各宴會其祝曰土反其宅水歸其壑昆蟲無作草木歸其澤其樂則吹豳頌擊土鼓是為蠟也昔者子貢觀於蠟曰一國之人皆若狂未知其樂孔子曰百日之勞一日之澤非爾所知也故順成之方其蠟乃通謹宴會之財也今兩河關陜山之東西皆有蠟廟獨南中闕如嘉靖辛酉郡丞江公涖止大理謂人曰吾昔為滋陽令蓋見諸郡邑皆有八蠟廟焉對者曰兹典其有待乎夫事無倡罔濟滇之有蠟其自公始乎會歲飢米價騰湧未遑營作丐者二千餘人公乃募民之有餘穀者數百家使以次施濟施者無大費而丐者全活君子以謂損有餘補不足天之道也公又謂賑不可為常欲米價常平其惟社倉乎遂以贖鍰買穀貯之令民間主其糴糶不足又取岸沙之可耕者履畝升科以益之明年彭公以提刑憲使分巡金滄謂郡丞曰事神治人其道互用吾觀子之賑而倉也知子有裕民之志矣盍為八蠟廟以祈年乎丞曰宿願也遂上下原隰選地於北郭浮屠之原鳩工伐木輦石陶甓糾胥吏之惰者得十九人權量之欺者三十許人俾量罪具材作廟以蠟焉郡之縉紳相賀曰治人者食於人治於人者食人謂其不能兼也今食於人而思所以食人詩曰彼君子兮不素餐兮其斯之謂與分巡名謹三山人郡丞名應昴攸縣人雲南平諸夷碑御史趙汝濂太和兵部尚書都察院右都御史兼理軍務紹興吕公開府雲南之又明年為嘉靖丙寅土酋鳳繼祖以武定叛劫殺自恣惡焰薰逼公召羣公而諗之曰賊祖黷亂國經往者務為姑息以致諸夷倣效漸不可長於是奏聞天子降旨俞允命至之日主餉督兵各奉其職戎器既備師徒既簡禡纛滇池分哨而進列陳如雲呼聲動地逢賊於武定我師奮勇衝突虜營矢鋒雨集炮聲雷鍧百里之內原草為赤公乃協於元戎參於臺史躬涖大軍親壓敵境藩臬大僚矢謨先後文武閫帥闞如虓虎熊羆十萬縱橫轇轕兵鋒筍束行伍篦密飛鳥不過蟭螟不通賊乃計窮奔逸泳江入蜀衆謂賊既過江地涉别省茫茫林箐無迹可攻公力排羣議定䇿造舟羽檄星馳戒令速發憲臣聳聽將士誓死金炮掀天旌旗蔽日履險如夷直趨薑堡招徠嚮導圖寫地形望影揣情知賊不逺公運籌遙授警戒軍中將士翻然抖擻介胄是夜果有三千餘賊衝劫官營我師有備擒斬百餘大呼追逐墜崖落澗者無算遂乘勝尾賊至會里寨公又飛檄指示幾微恐有伏賊道旁乘隙比軍入葛可山賊果有伏我軍先覺遂大破之直搗蒲桃村毁賊營千餘間斬伐林箐一十三處繇是刮野掃地莽翳如濯鬼無隱迹物無遁形四面夾擊不容線罅逆賊繼祖與惡黨卞大才阿方等一時授首先是繼祖之黨姚安則有欽鈞易門則有王一新首尾相應將為禍階公以通幽洞冥窮神觀化之力早知其然用兵方半即縛姚鈞兵功初成隨斬一新四凶既除諸夷膽落餘黨降者釋之復業凱歌而旋萬姓歡迎山川草木蔚有佳氣奏捷上聞飲至論功粵稽往事元江興師無成而罷東川用武竟非我功遂使氈裘生心狂夷攘臂殆非所以示天下也我公涖止申明國法誅削羣凶不一而足甲子之夏斬僭號二賊於昆陽秋斬奚本等三賊于祿納冬擒者索于新化州乙丑誅虧遮於尋甸昔之蜂屯蝟集者既一掃而空乃今深根固蒂者又一戰而拔自此當寧無南顧之憂揆之武侯在漢勳著南征今日駿功誠不多讓昔周宣之世方叔元老克壯其猷詩人歌功乃列於雅而我公希有之績歌詠未作非甚闕典歟濂與闔郡文武官屬縉紳士人采托實迹會衆合詞撰詩一通勒石於點蒼山庶垂警于無窮以俟太史氏之采録云詩曰天挺哲人加志窮民職大司馬不私其身位髙任重夙夜惟寅曰此南服寇壤與鄰聖人在上四夷來賓乃爾小醜敢云不臣爰聲其罪爰整其旅彼凶僭號何如腐鼠一擒雙孽無煩再舉其時伊何孟夏載暑是歲之秋楚雄告憂螳斧蝟鋒掩縣乘州曾不逾時亦既翦劉沍寒之節有豕載嘻一麾斃之遂傾其穴乙丑之年羣盜蟬聫禍延尋甸一郡騷然運籌得當弓不張絃以俘其醜弔此顛連我公王佐皇風是播視金如土賤貨猶唾除凶翦亂風掃電過奈何頑酋不知悔禍罪釁滔天海山非大公用震怒歷告羣僚是決不悛合覆其巢爾整師徒爾備弓刀載爾糧糗忠藎是昭歲臨丙寅夾鐘之月禡纛滇池公秉其鉞紀律嚴明飇火奮越旌旗獵獵誓師喋喋雄風燮燮駭電霅霅軍威所吞千里震懾既與寇逢衝擊先登怒厲激發飇起雷騰矢風簇雨戟火流星羽騎奕奕戰象稜稜聲動天地響破岡陵賊魄既褫莫敢回視扶傷而東泳江潛寄我乃造舟直窮其地彼酋既藏我師如鷙越歷再旬檢搜畢至賊冒萬死奮其蟲臂欲當我車千骸並棄殪彼二酋獻馘於轅大憝既除餘凶雞豚俘鈞於姚斬新易門西南頑梗獮剃無垠洞見千里一翳不存天威逺屆國勢斯尊往者征夷半途而散綱紀為弛夷乃屢叛古昔出師孔明在漢天威七擒廟謨神算千年誰追我公繼之通幽觀化神算無遺重泉匪敖九地非疑凡所指授動中機宜聿成峻功奚啻六奇我公體道文章之師我公逺猷虎臣之儀允文允武千載一時揆古無讓可無詠詩列郡安枕人孰不思吾儕土著桑梓於斯勒詞山石永鎮諸夷附南詔德化碑南詔清平官鄭回恭聞清濁初分運隂陽而生萬物川嶽既列樹元首而定八方道治則中外寧政乖必風雅變我贊普鍾蒙國大詔性業合道智覩未萌隨世運機觀宜撫衆退不負德進不慙容者也王姓蒙字閣羅鳳大唐特進雲南王越國公開府儀同三司之長子也應靈傑秀含章挺生日角標奇龍文表貴始乎王在儲府道隆三善位即重離不讀非聖之書嘗學字人之術撫軍屢聞成績監國每著家聲唐朝授右領軍衛大將軍兼陽瓜州刺史洎先詔與御史嚴正誨謀靜邊寇先王統軍打石橋城差詔與嚴正誨攻石和子父子分師兩殄凶醜加左領軍衛大將軍無何又與中使王承訓同破劍川忠績載揚賞延于嗣遷左金吾衛大將軍而官以材遷功由幹立朝廷照鑒委任兵權尋拜特進都知兵馬大將二河既宅五詔已平南國止戈北朝分政而越析詔餘孽干贈恃鐸矟騙瀘江結彼凶渠擾我邊鄙飛書遣將皆輒拒違詔弱冠之年已負英斷恨兹殘醜敢逆大隊固請自征志在掃平梟干贈之頭傾伏藏之穴鐸矟盡獲寶物並歸解君父之憂靜邊隅之祲制使奏聞酬上柱國天寶七載先王即世皇上念功旌孝悼往撫存遣中使黎敬義持節册襲雲南王長男鳳迦異時年十歲以天寶入朝授鴻臚少卿因册襲次又加授上卿兼陽瓜州刺史都知兵馬大將既御厚眷思竭忠誠子弟朝不絶書進獻府無餘月將謂君臣一德內外無欺豈期姦佞亂常撫虐生變初節度章仇兼瓊不量成敗妄奏是非遣越巂都督竹靈倩置府東爨通路安南賦重役繁政苛人弊被南寧州都督爨歸王昆州刺史爨日進梨州刺史爨祺求州爨守懿螺山大鬼主爨彥昌南寧州大鬼主爨崇道等陷煞竹倩兼破安寧天恩降中使孫希莊御史韓洽都督李宓等委先詔招討諸爨畏威懷德再置安寧其李宓忘國家大計躡章仇詭蹤務求進官榮宓阻扇東爨遂激崇道令煞歸王議者紛紜人各有志王務遏亂萌思紹先績乃命大軍將段忠國等與中使黎敬義都督李宓又赴安寧再和諸爨而李宓矯偽居心尚行反間更令崇道謀煞日進東爨諸酋並皆驚恐曰歸王崇道叔也日進弟也信彼讒構煞戮至親骨肉既自相屠天地之所不祐乃各興師召我同討李宓外形中正佯假我郡兵內藴姦欺妄陳我違背賴節度郭虗已仁鑒方表我無辜李宓尋被貶流崇道因而亡潰又越巂都督張虔陀嘗任雲南别駕以其舊識風宜表奏請為都督而反誑惑中禁職起亂階吐蕃是漢積讐遂與隂謀擬共滅我一也誠節王之庶弟以其不忠不孝貶在長沙而彼奏歸擬令間我二也崇道蔑盟構逆罪合誅夷而卻收録與宿欲令讐我三也應與我惡者並授官榮與我好者咸遭抑屈務在下我四也築城收質繕甲練兵密欲襲我五也重科白直倍稅軍糧徴求無度務欲敝我六也于時馳表上陳屢申冤枉皇上照察降中使賈奇俊詳覆屬豎臣無政事以賄成一信虔陀共掩天聽惡奏我將叛王乃仰天嘆曰嗟我無事上蒼可鑒九重天子難承咫尺之顔萬里忠臣豈受姦邪之害即差軍將楊羅顛等連表控告豈謂天髙聽逺蠅點成瑕雖布腹心不蒙矜察管內酋渠等皆曰主辱臣死我實當之自可齊心戮力致命全人安得知難不防坐招傾敗於此差大軍將王毗雙羅時等揚兵送檄問罪府城自秋畢冬故延時序尚佇王命冀雪事由豈意節度使鮮于仲通已統大軍取南溪路下大將軍李暉從會同路進安南都督王知進自步頭路入既數道合勢不可守株乃宣號令誡師徒四面攻圍三軍齊奮先靈冥祐神炬助威天人協心軍羣全拔虔陀飲鴆竂庶出走王以為惡止虔陀罪豈加衆舉城移置猶為後圖即便就安寧再申衷懇城使王克昭執惑昧權繼違拒請遣大軍將李克鐸等帥師伐之我直彼曲城破將亡而仲通大軍已至曲靖又差首領楊子芬與雲南録事參軍薑如之齎狀披雪往因張卿讒構遂令蕃漢生猜贊普今見觀釁浪穹或以衆相威或以利相導儻若蚌鷸交守恐為漁父所擒伏乞居存見亡在得思失二城復置幸容自新仲通殊不招承劫至江口我又切陳丹款至於再三仲通拂諫棄親阻兵安忍吐發唯言屠戮行使皆被詆呵仍前差將軍王天運帥領驍雄自點蒼山西欲腹背交襲於是具牲牢設壇墠叩首流血曰我自古及今為漢不侵不叛之臣今節度背好貪功欲致無上無君之討敢昭告於皇天后土史祝盡詞東北稽首舉國痛切山川黯然至誠感神風雨震霈遂宣言曰彼若納我猶吾君也今不我納即吾讐也斷軍之機疑事之賊乃召卒伍􅏌然登陴謂左右曰夫至忠不可以無主至孝不可以無家即差首領楊利等於浪穹參吐蕃御史論若贊御史通變察情分師入救時中丞大軍出陳江口王審孤虛觀向背縱兵親擊大敗彼師因命長男鳳迦異大將軍段全葛等於邱遷和拒山後贊軍王天運懸首轅門中丞逃師夜遁軍吏欲追之詔曰止君子不欲多上人况敢凌天子乎既而合謀曰小能勝大禍之胎親仁善鄰國之寶遂遣男鐸傳舊大酋望趙佺鄧楊傳磨侔及子弟六十人齎重帛珍寶等物西朝獻凱屬贊普仁明重酬我勳效遂命宰相倚祥葉樂持金冠錦袍金寶帶金帳狀安扛傘鞍銀獸及器皿珂貝珠毯衣服駝馬牛鞻等賜為兄弟之國天寶十一載正月一日於鄧川册詔為贊普鍾南國大詔授長男鳳迦異大瑟瑟告身都知兵馬大將凡在官僚寵幸咸被山河約誓永固維城改年為贊普鍾元年二年漢帝又命漢中郡太守司空襲禮內使賈奇俊帥師再置姚府以將軍賈瓘為都督僉曰漢不務德而以力爭若不速除恐為後患遂差軍將王兵各絶其糧道又差大軍將洪光乘等神州都知兵馬使論綺里徐同圍府城信宿未踰破如拉朽賈瓘面縛士卒全驅三年漢又命前雲南郡都督兼侍御史李宓廣府節度何履光中使薩道懸遜惣秦隴英豪兼安南子弟頓營隴坪廣布軍威乃舟楫備修擬水陸俱進遂令軍將王樂寬等潛軍襲造船之師伏尸遍毗舍之野李宓猶不量力進逼邆川時神州都知兵馬使論綺里徐來救己至巴蹻山我命大軍將段附克等內外相應競角競衝彼弓不暇張刃不及發白日晦景紅塵翳天流血成川積尸壅水三軍潰衄元帥沉江詔曰生雖禍之始死乃怨之終豈顧前非而忘大禮遂收亡將等尸祭而葬之以存恩舊五年范陽節度安祿山竊據河洛開元帝出居江劍贊普差御史贊郎羅于恙結齎敕書曰樹德務滋長去惡務除本越巂會同謀多在我圖之此為美也詔恭承上命即遣大軍將洪光乘杜羅盛段附克趙附于望羅遷王遷羅奉清平官趙佺鄧等統細于藩從昆明路及宰相倚祥葉樂節度尚檢贊同伐越巂詔親帥太子潘圍逼會同越巂固拒被僇會同請降無害子女玉帛百里塞途牛羊積儲一月館穀六年漢復置越巂以楊庭璡為都督兼固臺登贊普使來曰漢令更置越巂作援昆明若不再除恐成滋蔓既舉奉明旨乃遣長男鳳迦異駐軍瀘水權事制宜令大軍將楊傳磨侔等與軍將欺急歷如數道齊入越巂再掃臺登滌除都督見擒兵士盡虜於是揚兵邛部而漢將大奔回斾昆明傾城稽顙可謂紹家繼業世不乏賢昔十萬橫行七擒縱略未足多也爰有尋傳疇壤沃饒人物殷湊南通渤海西近大秦開闢以來來聲教所不及羲皇之後兵甲所不加詔欲革之以衣冠化之以禮義十一年冬親與竂佐兼總師徒刋木通道造舟為梁耀以威武喻以文辭款降者撫慰安居抵捍者繫頸盈貫矜愚解縛擇勝置城裸形不討自來祁鮮望風而至且安寧雄鎮諸爨要衝山對碧雞波環碣石鹽池鞅掌利及牂牁城邑綿延勢連戎僰乃置城監用輯攜離逺近因依閭閻櫛比十二年冬詔候隙省方觀俗恤隱次昆川審形勢言山河可以作藩屏川陸可以養人民十四年春命長男鳳迦異於昆川置柘東城居二詔佐鎮撫於是威懾步頭恩收曲靖頒告所及翕然俯從我王氣受中和德含覆育才出人右辨稱世雄髙視則卓爾萬尋運籌則決勝千里觀釁而動因利興功事協神衷有如天啓故能攻城挫敵取勝如神以危易安轉禍為福紹開祖業𢎞覃王猷坐南面以稱孤統東偏而作主然後修文習武官設百司列尊敘卑位分九等闡三教賓四門隂陽序而日月不愆賞罰明而姦邪屏迹通三才而制禮用六府以經邦信及豚魚恩霑草木厄塞流潦髙原為稻黍之田疏決陂池下隰樹園林之業易貧成富徙有之無家饒五畝之桑國貯九年之廩蕩濊之恩纍沾蠢動珍帛之惠遍及耆年設險防非憑隘起堅城之固靈津蠲疾重巖湧湯沐之泉越睒天馬生郊大利流波濯錦西開尋傳祿郫出麗水之金北接陽山會川收瑟瑟之寶南荒渀湊覆詔願為外臣東爨悉歸步頭已成內境建都鎮塞銀生於墨觜之鄉候隙省方駕憩於洞庭之野蓋繇人傑地靈物華氣秀者也于是犀象珍奇貢獻畢至東西南北煙塵不飛遐邇無剽掠之虞黔首有鼓擊之泰乃能驤首邛南平眸海表豈惟我鍾王之自致實賴我聖神天地贊普德被無垠威加有截春雲布而萬物普潤霜風下而四海颯秋故能取亂攻昧定京邑以息民兼弱侮亡册漢帝而繼好時清平官段忠國段尋銓等咸曰有國而致理君主之美也有美而無揚臣子之過也夫德以立功功以建業業成不記後嗣何觀可以刋石勒碑志功頌德用傳不朽俾逹將來家世漢臣八王稱乎晉業鐘銘代襲百世定於當朝生遇不天再罹衰世賴先君之遺德沐求舊之鴻恩改委清平用兼耳目心懷吉甫愧無贊於周詩志效奚斯願齊聲於魯頌紀功述績實曰鴻徽自顧下才敢題風烈其詞曰降祉自天福流後孕瑞應匪虛正祥必信聖主分憂遐荒聲振襲久傳封受符兼印兼瓊秉節貪榮構亂開路安南攻殘西爨竹倩見屠官師潰散賴我先王懷柔伏叛祚不乏賢先猷是繼郡守詭隨貶身遐裔禍連虔陀亂深豎嬖殃咎匪他塗豕自殪仲通制節不詢長久徴兵海隅頓營江口矢心不納白刃相守謀用不臧逃師夜走漢不務德而以力爭興師命將置府層城三軍往討一舉而平面縛羣吏馳獻天庭李宓總戎猶尋覆轍水戰陸攻援孤糧絶勢屈謀窮軍殘身滅祭而葬之情繇故設贊普仁明審知機變漢德方衰邊城絶援揮我兵戎攻彼郡縣越巂有征會同無戰雄雄嫡嗣高名英烈惟孝惟忠乃明乃哲卭瀘一掃軍羣雙滅觀兵尋傳舉國來賔巡幸東爨懷德歸仁碧海效祉金穴薦珍人無常主惟賢是親土宇克開煙塵載寢轂擊犁坑輯熙羣品出入連城光揚衣錦業留萬代之臺倉貯九年之廩明明贊普揚于之光赫赫我王實賴之昌化及有土業著無疆河帶山礪地久天長辨稱世雄才出人右信及豚魚潤深瓊玖德以建功是謂不朽石以刋銘可長可久雲南通志卷二十九之九欽定四庫全書雲南通志卷二十九之十銘明銅漏銘布政張紞富平雲南古西南夷地勢既偏晷度必差故觀天之器當極精緻則民事早晚所關始免疑滯更譙銅漏先總兵官黔寧昭靖王屢嘗致意而工不稱事嗣侯襲總方面既得良冶遂繼先志克成兹漏銘曰羲和授時以象觀天天有二曜與天周旋太陽主晝太隂主夜盈縮永短寒暑代謝何以則之置此嘉量水注箭浮時乃無妄勿輕杪末歲功所起差之毫釐謬以千里支干縱橫隂陽消息天人合視此為則四民之業各守程矩利爾出往安爾寢處東作西成不愆不忘庶績咸熙家用平康藩臣施政能知其要九功斯勸兹器之妙書唐責南詔坦綽書節度使牛叢京兆詔王之祖六詔最小夷也天子録其勤合六詔為一俾附庸成都名之以國許子弟入太學使習華風今乃自絶王命且雀蛇犬馬猶能報德王乃不如蟲鳥乎比成都以武備未修故令爾突我疆埸然毗橋沱江之敗積胔附城不四年復來今吾有十萬衆捨其半未用以千人為軍十軍為部驍將主之凡部有疆弩二百鏄斧輔之徑弓二百越銀刀輔之長戈二百掇刀輔之短矛二百連鎚輔之又軍四面面有鐵騎五百悉收芻薪米粟牛馬犬豕清野待爾吾又能以旁騎略爾樵采我日出以一部與爾戰部别二番日中而代日昃一部至以夜屯月明則戰黑則休夜半而代凡我兵五日一殺敵爾乃晝夜戰不十日懵且死矣州縣繕甲利兵掎角相從皆蠻之深讐雖女子能齽齘薄賊况強夫烈士哉爾祖嘗奴事西蕃為爾仇家今顧臣之何恩讐之戾耶蜀王故殿先世之寶宮非邊夷所宜舍神怒人憤驃信且死復報南詔坦綽書牛叢竊以詔國自為背叛積有歲年乃祖出於六詔之微非是西夷之長禹會塗山之日不得預萬國之名舜受方嶽之時不獲見五年之幸我大唐德宗皇帝仁沾動植信及豚魚子育兆民君臨四海憫其傾誠向化率屬來王遂總諸蠻令歸君長仍名詔國永順唐儀賜孔子之詩書頒周公之禮樂數年之後藹有華風變濁穢蠻貊之邦為馨香禮樂之域豈期後嗣罔效忠誠纍肆猖狂頻為妖孽自四五年來侵凌我疆土圍逼我城隍蓋以始務含容不虞搪突遂令凶醜以害生靈况乃毗橋喪師沱江敗績夫何今日不改前非妄設姦欺詐言朝覲輒舉螳蜋之臂大興豺豕之心仍構狂詞乃云假道昔先代帝王之治也豈嘗外蠻貊以剃之是必天怒鬼誅殞身喪國因其褻瀆示彼誡懲况天設尊卑國分大小小當事大卑不犯尊豈有興動蠻師甲兵侵凌天子藩屏是必坦綽數盡之歲殄滅之秋不然何以不恤其民妄動於衆一旦天子赫怒諸侯會兵長驅渡瀘之師深入鑄柱之境必不七擒七縱即須翦蔓除根當此之時後悔何及坦綽今既離彼巢穴犯我封圻當道已排比戰場點齟戈甲雄師十萬驍騎五千即遂鼓行併令擒戮所差王保誠四十人送書並已囚縶候於軍前用以釁鼓今發遣酇龍假首遷二人特此報書貽韋臯書南詔王異牟尋異牟尋世為唐臣曩緣張虔陀志在吞侮中使者至不為澄雪舉部惶窘得生異計鮮于仲通比年舉兵故自新無由代祖棄背吐蕃欺孤背約神川都督論訥舌使浪人利羅式眩惑部姓發兵無時今十二年此一忍也天禍蕃廷降釁蕭牆太子弟兄流竄近臣橫汙皆尚結贊隂計以行屠害平日功臣無一二在訥舌等皆册封王小國奏請不令上達此二忍也又遣訥舌逼城于鄙敝邑不堪利羅式私取重賞部落皆驚此三忍也又利羅式罵使者曰滅子之將非我其誰子所富當為我有此四忍也今吐蕃委利羅式甲士六十待衛因知懷惡不謬此一難忍也吐蕃陰毒野心輒懷搏噬有如偷生實汙辱先人辜負部落此二難忍也往退渾王為吐蕃所害孤遺受欺西山女王見奪其位拓跋首領並蒙誅刈僕固志忠身亦喪亡每慮一朝亦被此禍此三難忍也往朝廷降使招撫情心無二詔函信節皆送蕃廷雖知中夏至仁業為蕃臣吞聲無訴此四難忍也曾祖有寵先帝後嗣率蒙襲王人知禮樂本唐風化吐蕃詐紿百情懷惡相戚異牟尋願竭誠自新歸款天子請加戍劍南西山涇原等州安西鎮守揚兵四臨委回鶻諸國所在侵掠使吐蕃勢分力散不能為強此西南隅不煩天兵可以立功云明與鶴慶知府董賜書潁國公傅友德宿州大丈夫之處世也當磊磊落落出羣不羈然後能拔淤泥脫塵埃䇿勳當時垂名竹帛飄然而立於凡品之上亦猶騏驥伏櫪鸞鳳棲柵其始也雖與駑駘同豢雞鶩共食無異於彼一旦遇伯樂振羽翮終能馳騁於長途而翺翔於雲表也昆明古西南夷去中華萬餘里因元之季天下鼎沸天朝受命海內維新梁邸以元餘孽保據其地弗遵聲教者十有四載天兵南下問罪討惡余忝弔伐之任受鉞專征辛酉冬戰於曲靖之墟大破其衆擒其總戎轉開烏撒遂平諸部梁邸計窮出奔而殞其他豪傑或降或叛或就誅戮或被囚執者相半矣于時足下以前安寧知州來見於稠人之中余目而異焉遂加盼睞仍試以事繼而招降撫順綏輯遺黎頗著誠款達官貴人咸稱其能於是乃復其任使保妻子焉壬戌春烏蠻構釁流毒邊境余與諸將分兵致討時有大理起到土官高生等悉寓桂城欲俟途平俾令朝覲而閫帥不仁失於撫字致令驚疑接踵而遁及至本土遂為仇讎舉兵相向攻我城邑殺我吏士日甚一日轉加昌熾閫帥莫制矣足下介在羣凶之中確守歲寒之節斥其姦謀誅其來使獨挾妻孥冒刃入滇復與列較分守城壘投放矢石城之所以存者與有功也副將軍西平侯聞難來赴誅鋤芟刈羣蠻復定余至滇西平侯備述其事余甚嘉之然此豈古人所謂不遇盤根錯節何以别利器歟抑士之始遇驥之始知歟余征大理足下又率鄉曲子弟五百餘人為師前道招徠劍麗降伏西蕃威聲頗振有功必報古之道也奚新舊為乃奏天子授足下以專城之任任足下以牧守之官保障大理為滇外户恩亦至矣榮亦甚矣此正持盈守成之時也可不勉歟古人有云贈人以言余深慕之余雖武臣數聽教于君子矣足下其宜訓兵務農嚴紀律著恩威母暴橫而欺良母縱驕逸而墮前功上下相承共寧斯土以副國朝任用之意䇿勳垂名不其偉歟茲因師旋留言以誡惟足下勉之牒唐回雲南牒髙駢見前我大唐聖皇帝德配二儀光齊兩曜仁霑動植聖役神龍煦萬國若青天養兆民同赤子東鄰若水西屆流沙北通隂山南抵銅柱莫不貢琛而納賮航海而梯山請混車書願為臣妾是知卑微螢耀不敢並於太陽齷齪蹄涔焉能踵於神驥且自九夷八狄七戎六蠻雖居要荒盡遵中國縱外夷驕倨豈中國等倫且以蠓蚋之飛騰不離溝瀆欲追鸞鳳之羽翼擬接熛霄雲南頃者求合六詔併為一藩與開道途得接邛蜀賜書習讀降使交歡禮待情深招延意厚傳周公之禮樂習孔子之詩書片言既知大恩合報忽窮兵再犯朗寧重陷交址兩俘邛蜀一劫黔巫城池皆為灰燼士庶盡為幽冤轉恣胸襟罔知悛革吞越巂之舊地圍相如之故城凌犯不休貪殘轉甚昔交址都護不間理兵朗寧元戎未解誅寇受以侵欺容其殘暴某比者親征海裔克復龍編駕三千之師勦十萬之寇南定縣全軍陷沒如乾鎮匹馬不回羅和一空嘉寧俱盡贊衛假酋遷斬首騎將麻光亮亡軀李善龍面縛軍前張詮生擒陳上沉白衣沒命之衆如赤日消冰殺朱弩佉苴之軍若紅爐燎雪諾眉就戮思縉自裁董譯龍之恓惶范昵些之窘沮江橋則盡底焚燒采筏則從頭覆沒波封瓦解扶耶大隳容易誅鋤若髙原之縱燎等間撲滅如順坂之走丸收復城池掃殄妖孽仗睿謀之果斷資神術而追擒掩韓信滅趙之功吞樂毅定齊之䇿其於勝負詔國洞知昨日來鎮西川移從汶水仗節單車大開城門放出人物固無疑阻直擬誅鋤前詔王遣張棟成等揚言和好身才入境兵已繼來侵欺大國熒惑元戎戮僕之儀須依古典已軍令處置詔國先後俘獲約十萬人今獨送杜驤妻言是沒落杜驤守職本在安南城陷驅行故非沒落星霜半代桎梏幾年李氏偷生空令返國杜驤蚤殁不得還鄉今則訓練蕃兵指揮漢將鐵衣十萬甲馬五千雍交合從黔蜀齊進昔時漢相有七擒七縱之功今日唐臣蘊百戰百勝之術勳名須立國史永書且杜驤官銜李瑶門地不是親近但王室疏宗天支逺泒而已李氏並詔國木夾並差人押領進送朝廷訖故牒代髙駢回雲南牒節度書記胡曾邵州牒前件木夾萬里離南一朝至北開緘捧讀辭藻煥然奬飾過多欣慰何極實以乍同邊鎮才到藩籬且按此朝之舊儀未悉彼國之新制不知鶴拓惟認苴咩尚呼南詔之佳名當見大朝之美號要從微耗且是所宜伏承驃信王化風行君德雲被雕題屈膝鵙舌折腰卉服來庭毳裘入貢蓋以深明豹略精究龍韜波伏西天草偃南土者然侵軼我華夏無乃不可乎將謂我皇帝有所負於彼邦邊臣有所負於彼國慮彼直我曲獲罪於天是陳木夾申懷用貯榮報及批回示已見事根止於囚繫使人放歸彼國始乎小怨終此深讐吞噬我朗寧虔劉我交址取我越巂犯我益州若報東門乃及再四夫物居中者尊也處外者卑也是以衆星拱之北辰百谷趨之東海天地尚不能違而况於人乎我國家居天之心宅地之腹四方八表莫不輻輳亦猶北辰之與東海也誠知土地山河歸於有德雖云有德亦須相時苟無其時安可妄動明公博識多聞豈不見仲尼乎仲尼之聖踰堯舜顔子之賢過夔龍六合茫茫無立錐之地者蓋無其時也適使仲尼生於秦末乘胡亥之亂用顔回閔損為宰相子路冉有領將軍子貢宰我充行人子夏言偃典書檄雖六合鼎沸可期月而定也當此之時劉項只可都頭韓彭不過部將耳聖人雖有帝天下之德而無帝天下之時終不妄動及子路欲使門人為臣以為欺天乎及自歎曰鳳鳥不至河不出圖吾已矣夫止於負手曵杖逍遙倚門告終而已王莽不識天時苻堅不知􅔦數妄恃強富爭帝乾坤莽以百萬鋭師來襲後漢光武以五千之衆破於昆陽堅以六十萬精兵寇于東晉謝玄以八千之卒敗於壽春豈不為欺天罔地所致者也國富兵強何足恃也周王杖箠於岐山漢祖脫褐於泗水我髙祖起自隴州蓋明公只知其一未知其二見其形未知其兆也今與明公陳之望審參焉昔周王承公劉之德遇殷紂之暴刳剔孕婦塗炭生靈剖賢人之心斷朝涉之脛三分天下而二歸周文王率諸侯而朝之至武王觀兵孟津八百諸侯不期而會尚曰彼有人焉未可圖也退歸修德觀乎聖人去就豈容易哉及微子去比干剖箕子奴民不聊生皇天厭之國人棄之武王方援旗誓衆一舉而滅紂者蓋天奪殷而與周也我皇之宵衣旰食肩堯踵舜父事三老兄友百僚推赤心於比干腹中懸白日於微子頭上諸侯合德百姓歡心天下有人聖如周王家有姬旦户生吕望者乎漢祖承帝堯之德遇秦皇無道併吞六國恃宇宙一家焚燒詩書坑滅賢哲築長城于紫塞造阿房於皇州鬼母哭蛇人臣指鹿民不聊生皇天厭之國人棄之是以陳勝一呼天下響應漢祖西入五星都聚者蓋天奪秦而與漢也我皇方崇詩書任賢哲卑宫室恤黔黎野無歌鳳之人朝有問牛之傑天下有人英如漢祖家有韓信户生張良者乎我髙祖承元元之德遇隋煬荒淫徭役不均徴斂無度竭民生之財産為巡幸之資糧虎噬羣賢猱蒸庶母浮沉遼海疏鑿汴河今年東征明年西伐民不聊生皇天厭之國人棄之是以我髙祖應天順地奄有四海者蓋天奪隋而與唐也我皇方淡薄聲色杜絶巡逰夢卜宰輔倚注藩屏思成垂拱惡習干戈皇天方贊國人方歡天下有人雄如唐祖家有敬德户生玄齡者乎僕雖自絳紗素耽黃石既探師律亦識兵機奉詔鎮壓三巴撫安百姓思敦禮樂恥用干戈每傷虞芮之爭田念姬周之讓路茍不獲已即須訓戎且蜀地闊數千里郡列五十城户口至多士卒之衆可以揮汗成雨吐氣成雲蓋緣從前元戎皆是儒者有昧見幾而作但守升平之元規雖分帝憂不教民戰是以彼國得以深入無備故也僕示之以三令教之以八陳鼓聲而進鉦動而退甘與之共苦與之均義等塤篪情猶瓜葛説禮樂而敦詩書務耕桑而聚穀帛使家藏甲胄户貯干戈賞罰並行公私共貫既識三略便可七擒不唯喝倒不周亦可劈開太華況彼國自長慶以來騷擾益部殺人之父孤人之子掠人之妻鰥人之夫焚人之廬舍使人暴露翦人之桑麻使人寒凍蜀人怨恨痛入骨髓僕乘其衆怒之勢示其報怨之門抱雞搏狸不繇人教乳犬敵虎自是物情既仗宗廟之威靈兼統華夏之精鋭若乘流縱棹下坂推車豈勞心哉僕官是宰衡位當侯伯披堅執鋭雖則未曾濟河焚舟平生所貯彼國將帥之強弱邦國之盈虗坐可酌量何煩詢誘且六合之外舟車不至聖人不言彼國在聖人不言之鄉舟車不及之地縱主上英哲人臣俊乂亦猶燭龍銜耀只可照於一方春雷振聲不能過於百里天與不取談何容易夫天有五賊見之者昌彼國縱曉六韜未嫻五賊而欲泥封函谷水灌晉陽何其謬哉五賊者夏桀張羅殷湯祝網是以仁而賊不仁也殷紂剖生人周文葬枮骨是以德而賊不德也齊國厚徴薄貸魯國厚貸薄徴是以恩而賊不恩也項羽殺義帝漢髙祖舉哀是以義而賊不義也陳後主驕奢隋文帝恭儉是以道而賊不道也能行五賊兼曉六韜方可奪人山河傾人社稷我朝未有五失而彼國徒自陸梁以此推之興亡可鑒何勞逺離庭户始識安危久習韜鈐方明勝負而妄要姑息不務通和回示荒唐一何乖戾罔念孔顏之知命翻效莽堅之覆車交址喪亡可知人事新都失律足見天時若望降尊便希抗禮但百谷不趨東海衆星不拱北辰則不可議也茍未如是則不可改圖昔管仲入周不受上卿之禮蘇武在北無虧中國之儀事有前規固難更易況小不事大春秋所誅若彼直我曲恐招天殃既彼傲我謙何患神怒見已訓齊士卒調集糗糧或玉露垂槐金風動栁建鼓數里命車指南涉巂弔民渡瀘會獵繼齊魯之夾谷紹秦趙之澠池便是行人豈遺佳䇿皇帝聖旨已具前緘奉聞臣下不復多談恐乖忠告謹牒難漢開西南夷難蜀父老司馬相如見前漢興七十有八載德茂存乎六世威武紛紜湛恩汪濊羣生霑濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定笮存邛略斯榆舉苞蒲結軌還轅東鄉將報至於蜀都耆老大夫縉紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之牧四夷也其義羈縻勿絶而已今罷三郡之士通夜郎之塗三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之纍也竊為左右患之且夫邛笮西僰之與中國並也歷年滋多不可記已仁者不以德來強者不以力并意者其殆不可乎今割齊民以附外夷敝所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕嘗惡聞若説然斯事體大固非觀者之所覯也余之行急其詳不可得聞已請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功夫非常者固常人之所異也故曰非常之原黎民懼焉及臻厥成天下晏如也昔者洪水浡出泛濫衍溢民人升降移徙崎嶇而不安夏后氏戚之乃湮洪塞源決江疏河灑沉淡災東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎來茲且夫賢君之踐位也豈特委瑣齷齪拘文牽俗循誦習傳當世取説云爾哉必將崇論竑議創業垂統為萬世規故馳騖乎兼容并包而勤思乎參天二地且詩不云乎普天之下莫非王土率土之濱莫非王臣是以六合之內八荒之外浸淫衍溢懷生之物有不浸潤於澤者賢君恥之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而逺方殊俗之國遼絶異黨之域舟車不通人迹罕至政教未加流風猶微內之則時犯義侵禮於邊境外之則邪行橫作放殺其上君臣易位尊卑失序父兄不辜幼孤為孥係縲號泣內嚮而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨盩夫為之垂涕況乎上聖又焉能已故北出師以討強寇南馳使以誚徑越四面風德二方之君鱗集仰流願得受號者以億計故乃關沫若徼牂牁鏤靈山梁孫原創道德之塗垂仁義之統將博恩廣施逺撫長駕使疏逖不閉曶爽暗昧得耀乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沉溺奉至尊之休德反衰世之陵夷繼周氏之絶業天子之亟務也百姓雖勞又惡可以已乎哉且夫王者固未有不始於憂勤而終於佚樂者也然則受命之符合在於此方將增泰山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩旨聽者未聞音猶鷦䳟已翔乎寥廓之宇而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來失厥所以進喟然並稱曰允哉漢德此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙因遷延而辭避教本朝丁祭教總督鄂爾泰滿洲竊惟至聖先師萬世之師表也冠帶集圜橋天子有臨雍之典春秋屆仲月上丁修釋萊之儀內則命夫胄子三公外則寄於有司羣牧典綦嚴也誰敢懈焉本部院前涖南藩職司秉鬯恭逢丁祭親齋沐而宿黌宫先令儒官較簿書而正祭器乃知牲或已經宰殺既失告全致潔之心物豈盡屬肥鮮更乖博碩蕃滋之義且或常供不充夫額數任先後以那移珍品不給於豆籩致菹鹽之雙疊兼聞各學亦有同風罔知共竭精誠但解奉行故事甚或尊罍未備疇詳犧象之形琴瑟雖陳莫辨敔箎之狀觀者如牆如堵任彼咆哮祭者似醉似癡頽如聾瞽一尊才薦滿庭之燎火無輝三獻未終兩廡之燈光已滅於是㽅鉶與簠簋悉憑顛倒几筵鹿共榛菱似遇摩空鸇雀分甘奪膬半由承祭之家人拍地喧天遑問糾儀之齋長駿奔髦士霎時怒髮衝冠輿隸膳夫一片雄心染指凡此之類罪豈勝誅皆由約束之不嚴亦以躬行之未善不思主爵則身膺一命幸得窺聖人門墻分獻則職任半氊原以司泮宫爼豆平時未知化導已蒙尸位之譏臨事不克恪恭難免曠官之咎於是飭郡守州牧縣令等職兼以誡教授學正諭導諸員各矢乃心以襄大典預期三日牲牷皆供乎餼牽先事一朝品物盡陳於頖璧齋戒沐浴來觀習樂試歌舞於明倫堂前科量潔清退服寢衣斂精神於尊經閣畔庶幾必誠必信斯夙夜之惟寅無怠無愆知神人之咸格是並申之條約用以頒諸學宫一既奉肇聖五王不惟簠簋豆籩照數增設即牲牷亦應各增其四有議共牲者其説不可從考之典禮惟配享有可以共牲者專主無共牲之禮書云文王騂牛一武王騂牛一其明徴也自三代至漢唐皆不聞有共牲之説惟後漢有赤帝青帝共一犢白帝黑帝共一犢議者非之唐開元時五品以上室異牲六品以下共牲豈有王爵而可共牲者乎其各照數增一為五可也一祭牲祭品皆有定額一豆一籩罔可缺遺況牲取親割以告虔也取其血毛以告全也可既宰而入學門乎豕曰剛鬛注謂其豕肥則鬛剛羊曰柔毛注謂其羊肥則毛細而柔弱此博碩肥腯之所由稱也可以瘦瘠不堪之羊豕而飲之灌之以充牲牷乎既宰且不可瘦瘠且不可況可缺其額而肥吏胥之槖囊乎月令曰犧牲毋用牝又曰命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗注曰上帝且歆享之況羣神乎嗣後各官俱須先三日親至學視牲牷如法然後稽其數使人牧之以待先一夕親割吏雖姦其何所施乎一丁祭先數日集樂舞生演習精熟先一日與祭官親同往觀不得草率從事一丁祭先一夕凡與祭官齊集學宫齋宿不得有一員私宿本署一丁祭之日庭燎燈燭務須光明如晝以俟祭畢後已除神前燈燭之外即官員不得各自張燈一丁祭之日櫺星門內不得容一間雜人所有事宜止許學書幹辦及小心謹慎門斗二人或四人照管燈燭其官員僕從人等一概於門外伺候萬無使僕從人持燈夾墊相隨上殿及上兩廡之禮君師一體幸勿自取罪戾以貽失禮之愆也一丁祭之日既不容一間雜人自無有搶奪祭燭及祭品之人倘或仍有潛匿門內乘空搶奪者以盜賊論即時擒獲解司以憑盡法重究一學宫之地聖賢靈爽所依不惟丁祭宜修治肅清即平時尤宜灑掃潔淨近每見黌宫以內栽瓜種菜學圃成澆灌之場曝被晒衣諸生絶往來之路甚至丹楹刻桷徒供蝙蝠棲遲鳥革翬飛盡是鼪鼯巢穴蛛塵百斛廟貌埋埃垢之中鼺糞千箕腥穢聞宫牆之外皆已安之若素久且習為固然甚至先儒先賢兩廡之神牌倒置鄉賢名宦兩祠之神位傾頽非其子孫有誰咨問加之朽蠧若罔聞知凡爾學官所司何職即諸門斗多亦奚為嗣後教官不時巡察務令門斗分班輪流值日掃除學宫之內不得容一毫塵垢庶亦無忝厥司也慎哉毋忽徵滇士入書院教鄂爾泰國家最重者惟人才人臣最急者亦惟人才使者奉命總制三省凡三省文武吏賢者能者必以聞於朝進其秩厚其糈寄以指臂託以心膂人才蓋綦重矣舉子上公車者使者必助其資斧飭其有司以速其駕士子入棘闈者使者必省其號舍給其卷資豐其供具優其禮貌以鼓其氣而一時登賢書者皆知名士赴禮部者中式十人選大令就博士者又數十人皆前此滇省所未有而使者不惜費不憚勞孶孶矻矻不已者凡以為人才計也書院者儲才之區也使者初來滇滇舊有書院使者分為三舍課其優拙以髙下其廩餼而士亦皆能自奮丙午賓興得之書院者甚多士亦宜知淬礪矣己酉之役售者寥寥售不售何足以定士然使者竊憂之慮其應上者之鮮實心而操之無具故奇才異能之士未嘗數數覩也夫使者之求才甚急士之應知者甚緩或有為之解者曰滇僻處遐方周秦漢魏六朝唐宋之書多未見十三經草一史有至老不識其名目者於此而欲求奇才異能之士是猶語盲者以日月而詢聾者以鼓鐘也勢必不能使者聞而嘆曰是誰之過使者之過也學者力不能致經史及前古歷代之書而為之上者又不思代為致之是更歷數千百年後欲求一奇才異能之士而終不可得也使者先已置草一史諸書於院中學者尚未及讀至是復取架上十三經及周秦以來之書若干部各用圖書印記注之簡册貯之書院掌之學官傳之永久又將招致四方之善讀書而能好古者以充學舍厚其廩餼而以時親課讀之安知不有奇才異能者之出其中也夫滇之山川秀麗如太華昆池碧雞點蒼之屬甲天下比年以來卿雲見於天醴泉出於地神龍天馬行於海上嘉禾異闕遍於南中而老撾來朝莽緬慕化車里江外符塔闕歸漢之謠八仙海邊應烏蒙必了之讖凡諸嘉祥無遐邇靈蠢莫不效異爭奇若欲表見於聖世而不甘後時況秀而靈者惟人人之秀而靈者惟士而獨可使滇讓美於天下哉因取全闈落卷遍觀之適羽書旁午刻無寧晷暫以中輟及三邊胥靖每乘夜分餘間挑燈批覽輒漏下四五共得五十二卷如玉之在石未名一器而礱以錯之小大皆可各得其用既定乃拆號書名下郡縣各送至省集於書院使者之心其視滇子弟猶吾子弟也有能讀吾書者吾即以賢子弟待之衣食必周寒暑必恤家室之薪水書齋之膏火必繼倘汝曹果以賢子弟自為方且望其專心致志窮經究史使得為奇才異能之士為聖天子儲才得人計而肯聽其紛馳外務以汨沒其心思乎古之學舍往往數千人至不能容今就風簷試藝殘笥剩簏中得五十二人豈遂足空其羣使者已面語學使者吳公既有孫陽之能自能得駿以會於金馬碧雞之地其郡縣及廣文知有學問優通者或天資髙妙能記誦頴悟過人者即會同保送如吝惜資費者使者自能償之不得謂此地無人以沉淪佳士也士患不讀書耳倘肯潛心院中如董子下帷足不窺園日取十三經草一史次第讀之自可開拓心胸推倒豪傑毋自畫也讀書之法經為主史副之四書本經孝經此童而習之者外此則先之以五經其次如左傳之淹博公榖之精微儀禮之謹嚴周禮之廣大爾雅之辨晰毫芒大至無外而細入無間此十三經者闕其一即如手足之不備而不可以成人者也至於史則先史記次前漢書次後漢書此三史者亦闕一不可讀本紀可以知一代興亡盛衰之由讀年表世家可以知大臣創業立功之所自讀列傳可以知人臣邪正公私即以關係國家得失利害之分讀忠孝節義隱逸儒林文學方伎等傳可以知各成其德各精其業以各造其極而得以或顯當時或傳後世之故讀胸奴大宛南夷西域諸傳可以知安內攘外柔逺綏邊恩威各得之用讀天官歷律五行諸書志可以觀天而並可以知天人相感之原讀河渠地理溝洫郡國諸書志可以察地而并可以知險要之機讀禮樂郊祀儀衛輿服等書志可以知典禮掌故之因革而有所參訂讀藝文經籍等志可以知七略九種四部六庫著作之源流而有所考稽讀平準食貨諸書志可以知出入取豫制節謹度之大要而有所規鑒讀刑罰兵營等志可以知賞罰征伐懲惡勸善討罪立功之大法而有所折𠂻此讀史之大要也且善讀史者不僅以史視史凡詔誥奏疏檄諭論䇿之屬文之祖也樂章歌詞之屬樂府詩歌之祖也屈原賈誼司馬相如揚雄等傳所載騷賦之屬詞賦之祖也故熟於三史則文人詩人騷人一齊俯首矣況不止三史乎必待讀經既畢而後讀史則史學太遲惟讀左傳而以史記副之讀公羊榖梁儀禮周官爾雅而以前後兩漢書副之十三經與三史既讀此外如家語國語國䇿離騷文選老莊荀列管韓以及漢唐宋元人之文集與三國志晉書以下諸史參讀參看擇其尤精粹者讀之其餘則分日記看天資絶人過目成誦者看即是讀其不及者原不能盡讀博覽強記有十三經三史為之根本餘皆一以貫之讀固為要看亦有功必欲汝曹全讀非人情不可強也經莊重史間雅莊重者難讀間雅者易讀讀經以淑性讀史以陶情朝經暮史參錯互讀則有體有用內外兼該相濟而不相妨相資而不相紊然後反求其本而約之於至一之地則本之身措之世無所往而不當出之言為經術之言行之事為經濟之事建之功業為經天緯地之功業夫而後乃可藉手以報曰臣為國家得人矣此使者之所厚望於天下而不能無望於二三子者也近奉天子命準入都陛見事竣將復來其毋以使者之去為疑今來署篆者為前任髙部院與使者有同心撫軍張都院又能成使者志使者已定其規模屬之兩公仰該府文到即送至省縱使者已行兩院知使者意其於諸生必有加禮慎無卻顧不前負使者並負兩院適以自負也至如借書院為納交聲氣之地觴酒酬酢慶賀往還遊蕩門外招搖市中是尤不肖之甚貽羞書院恥笑士林此使者之所深惡毋過吾門也使者之所望於二三子者非獨為書院計為滇計也為國家得人才計也得人才於天下不難而得之滇且得奇才異能者於滇滇之榮國之光也使者獨有厚望焉二三子其何以副使者之望行矣其毋忘使者言也他日使者又至矣檄漢開越巂諭巴蜀檄司馬相如見前告巴蜀太守蠻夷自擅不討之日久矣時侵犯邊境勞士大夫陛下即位存撫天下安集中國然後興師出兵北征胸奴單于駭怖交臂受事屈膝請和康居西域重譯納貢稽顙來享移師東指閩越相誅右弔番禺太子入朝南夷之君西𤏡之長常效貢職不敢惰怠延頸舉踵喁喁然皆向風慕義欲為臣妾道里遼逺山川阻深不能自致夫不順者已誅而為善者未賞故遣中郎將往賓之發巴蜀之士各五百人以奉幣帛衛使者不然靡有兵革之事戰鬭之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邊郡之士聞烽舉燧燔皆攝弓而馳荷兵而走流汗相屬惟恐居後觸白刃冒流矢議不還顧計不旋踵人懷怒心如報私讐彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯處列東第終則遺顯號於後世傳土地於子孫行事甚忠敬居位甚安逸名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野草而不辭也今奉幣役至南夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不逺哉然此非獨行者之罪也父兄之教不先子弟之率不謹寡廉鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使曉諭百姓以發卒之事因數之以不忠死亡之罪讓三老孝悌以不教誨之過方今田時重煩百姓已親見近縣恐逺所溪谷山澤之民不遍聞檄到亟下縣道使咸喻陛下之意無忽三國漢答益州渠帥雍闓檄太守呂凱不韋天降喪亂姦雄乘釁天下切齒萬里悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啓行上以報國家下不負先人書功竹帛遺名千載何期臣僕吳越背本就末乎昔舜勤民事隕於蒼梧書籍嘉之流聲無窮崩於江浦何足可悲文武受命成王乃平先帝龍興海內望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河冰火滅冰泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩未萌受遺託孤翊贊季興與衆無忌録功忘瑕將軍若能翻然改圖易迹更步古人不難追鄙土何足宰哉蓋聞楚國不恭齊相是責夫差僭號晉人不長況臣於非主誰肻歸之耶竊惟古義臣無越境之交是以前後有來無往重承告示發憤忘食故略陳所懷惟將軍熟察焉本朝戒飭州縣檄三省總督尹繼善滿洲為戒飭實心愛民事德惟善政政在養民民者邦之本也聖主深仁厚澤愛養元元雖窮邊僻壤海澨山陬莫不食德飲和淪肌浹髓而猶宵衣旰食無一時不念切民依無一刻不心勞民事命官分職告誡諄諄凡大小臣工荷朝廷養育之恩受地方民牧之寄皆當殫心竭力布化宣猷而尤與民最親最切者莫如州縣夫州縣者固小民呼為父母者也既曰父母則恩勤懷保宜加意撫綏誘掖提撕宜多方教導民力有限何忍重耗以朘其脂膏民命堪矜何忍濫刑以殘其肢體害吾民者姦匪亟宜嚴禁而緝弭擾吾民者吏胥亟宜稽查而防範他如鹽政夫役之宜整理河渠溝洫之宜疏通水旱倉儲如何預籌風俗人心如何董正為民父母均屬責無可辭苟非實力經營實心化誨揆之父母斯民之義能無愧心本部院仰荷皇恩屢膺重任新承簡命統制苗疆切念夷猓愚頑閭閻窮苦甫經兵火之後正須安集撫綏茲當蒞任之初敢不叮嚀告戒凡爾州縣念念須為百姓勿計身家事事須凛官針無忝職守循謹方為良吏不在恃智逞才清廉固是好官尤須惠人濟物以如保赤子之誠行豈弟慈祥之政多用一處心力即多一處蒙庥用到十分工夫亦只收五分效驗此本部院服官以來身體力行不敢一日稍懈不敢一念自足者竊願與良有司共勉之也嚴禁招買檄尹繼善為嚴禁招買之弊務絶招買之源以蘇民困事為政之道在首除民纍滇省纍民之事莫甚於招買本部院仰體聖心勤求民隱竊以治病務去其根除弊務清其源若招買之源不清日久不無流弊而欲清招買之源尢當先清平糶之纍夫平糶原係美政而行之不善最易纍民每見地方官之平糶者止圖出陳無論米價貴賤即行混糶並不計算買補任意減價徒使姦商衙蠧私販囤積而鄉村窮民不能均沾實惠及至秋成買補所存糶價不敷官難賠墊遂皆攤泒里民短價招買加以不肖官吏網利營私里胥頭人層層尅剝此種積弊受纍無窮本部院與撫都院同心啇酌當青黃不接之時如果米價昻貴方許開倉平糶只照市價酌減所賣價值存待秋成之後按照時價平買還倉不許泒之里民如有盈餘不必歸公遇價貴不敷之年通融彌補則既不纍官又不纍民根源既清招買之事庶可永逺停止連歲仰荷天麻雨暘時若頻書大有倉儲之缺欠固宜補還民力之艱難尤宜體恤苐恐不肖官員或假公濟私借名招買仍前攤泒貽纍民生合行示禁自今以後招買之事嚴行禁止招買之名永逺革除本部院早作夜思不過為億萬窮黎愛惜膏血凡百有司身膺民社何忍使眼前赤子困苦顛連倘仍有玩法營私暗行招買或買補倉穀短價纍民者法令具在斷不姑容查議捐助窮員回籍檄尹繼善為崇厚道以廣皇仁事雲南一省地處極邊宦遊之人家鄉萬里每於身故之後旅櫬難歸婦子無依飢寒可憫又有罷官離任囊槖蕭條無力還鄉羈留異地凡此窮途之苦均同無告之人伏念我皇上愛養臣工體恤備至扶櫬回籍者有給勘合之條微員無力者有幫盤費之例官斯土者同為僚友休戚相關目擊顛連何忍視為膜外心期古處亟宜推廣皇仁仰布政司即轉行各屬詳細查明除貪贓枉法及在此入籍者不議外其有身故之後靈柩家口不能回籍及革職離任休致告病實在窮苦乏費不能歸家者無論文武逐細造册由司轉報本部院與撫都院先行捐助以為之倡各司道率同所屬共襄義舉合力捐資定為章程永逺遵守庶使生還故里天涯無淪落之孤蹤魂返鄉關邊地無飄流之枯骨是亦敦氣誼厚風俗之一道也禁止呈送土物檄尹繼善為禁止呈送土物事各屬地方土産食物呈送些微以通上下之情原非餽遺可比收受何遽傷廉但邊省之出産有限屬員之薪俸無多呈送食物各處應酬不特所費不資更且於民不便如果品樹木小民藉以養生乃當未熟之前文武差役即行占定及至成熟量給價值恣意採取而兵役人等亦遂假公濟私借端滋擾派取人夫逺路運送地方之纍不可勝言本部院心求民隱事本人情豈肻於口腹之微故為矯廉之舉但以供一日之匕箸費屬員數月之養廉為一刻之嘗新奪窮民合家之衣食似此無益有損之事儘可減除自今以後通省各屬凡舊例應送土物概行禁止不許呈送地方文武如再有指名採買恃強混占短價病民及縱容兵役假公滋擾者一經訪聞定行嚴參重處各宜凜遵勸民樹藝檄巡撫張允隨奉天為盡地力以厚民生事無曠土斯無遊民務農桑乃足衣食此天地不易之常經黎民當盡之職業也滇省山多田寡户鮮蓋藏漢雜夷居民習啙寙我皇上如天之仁霑濡萬彚凡屬在宥罔不養欲給求滇南逺在萬里尤煩宸衷軫念官斯土者各皆仰體聖心加意撫恤滇民之氣象固已日新月盛矣然生齒既繁當思所以養育而養育之方總不外於用天之道因地之利蓋各省之陰晴寒暑雖有不齊而雨露之滋潤則無不齊五方之燥濕剛柔雖有不一而原隰之發生則無不一滇民每嵗除夏麥秋禾外不過種蠶豆黃豆荍麥髙梁之屬以資生年值豐稔比屋猶慶盈寧一遇歉收閭閻能無飢饉此非滇地磽瘠之故而滇民偷惰之故也夫民生在勤地道敏樹如北方之果蓏江南之桑麻要皆彌望青蔥不使隙地間曠是以一歲之所出足供一歲之所需本都院歷任滇中東西兩迤情形備悉凡府州縣城內外及村莊鎮市周遭曠土殊多皆堪開墾或栽果蓏或藝桑麻各因地土之所宜不惜勤勞以用力果能相習成風自然遞年奏效以其所有易其所無尺布寸錢皆於身家有補積日纍月何患富厚無期况官又無賦稅之徴求民何惜手足之胼胝也合行勸諭為此牌仰該府官吏轉飭各屬遵照嗣後無論府州縣城及鎮市村莊凡有曠土原為某甲某乙之地即令某甲某乙開墾種植其有官地之無礙墳塋田畝者或許一人具呈或數人公具一呈均分種植該地方官酌給印票以杜日久爭端但凡民樂與圖成難於慮始全在該地方官善於開導俾之踴躍從事每於歲底巡行考課以種藝之勤惰分别賞罰行之數年力無不盡則地利無不開江南之桑麻北方之果蓏未有不於滇省兼收其益者本都院即將以該地方栽植多寡定該管官政治修廢矣勉之慎之大計後申飭各屬檄張允隨為申飭事國家設官分職期展經猷考績程能用昭激勸既身登於仕籍寧自薄其功名然或砥勵於前而苟且於後或振作於始而怠惰於終豈皆飾詐以沽名多由量盈而器小故居之無倦實心為實政之原而謙則有終立事即立身之效凡兹古訓悉屬官針我皇上誥諭臣工必循端而竟委講求吏治務夕陽與朝乾如果念茲在兹斯為可久可大滇省舉行計典本都院與督部堂敬體聖天子澄敘官方之盛心舉劾一秉大公注考兼參輿論其才守兼優而猷為克著既為羣僚之冠合登卓薦之條其餘守非不足取才非不可觀或以資序尚淺而姑遲嵗時或以功績未彰而尚須建樹薦舉有待期望彌殷獨是常情忽逢旌拔便志滿而氣驕豈必殊尤輒矜能而伐善既矜且伐則輕肆日滋復滿而驕則乖張漸露於是業隳於方立功敗於垂成從惡如崩易就下流之勢中道而廢遂辜上進之階縱使幸增爵秩於目前必不能免糾彈於轉盼此本都院不能不為已卓薦者慮也至於才非卓越希登薦剡而未能政本平庸免罹彈章而自喜謂後此之三年尚逺覺當前之怠氣忽生政事因循精神頽墮始則置民社於度外繼則滋利欲於胸中本朴誠而或易以姦欺本廉謹而或變為貪墨道無中立依違即退入重淵仕止一途蹉跌則敗同覆水此本都院又不能不為未卓薦者防也是則計典初過防慮更多用是躊躇合行申飭為此牌仰該府官吏并轉飭所屬遵照已卓薦者當念盛名難副物望難酬勤以服官匪懈倍嚴於夙夜卑以自牧虛懷益著於勞謙庶幾不棄前功兼可頻邀顯擢未舉薦者當反求諸己毋終讓於人因此激厲之心鼓其奮迅之氣保民如保赤念念誠求臨事若臨深時時懍栗恪恭奉職何怵他人我先黽勉奮庸不妨後來居上若夫為山九仞終虧一簣將欲誰尤臨淵羡魚不如結網斯為可取本都院不持成見悉屏偏私因人之重輕為重輕任物之好醜為好醜苟劣聲稍著決不因上考而少存袒護之心倘嘉績既聞亦不因中考而猶存阻抑之意陟者忽黜沉者轉升祗秉公平時行甄察尚其努力庶免噬臍整飭學宮丁祭檄布政使陳𢎞謀臨桂為特飭整理學宫慎重丁祭以崇先聖事地方風化起於學宫官司職守莫先祭祀案查滇省學宫祭典屢蒙大憲諄切申飭又經前督憲鄂釐定禮文祭器考訂位次頒發條約圖册精詳周至允宜恪遵以盡職守乃細訪所屬奉行惟謹者固亦有人而漫不經心任其荒廢者亦復不少如殿祠廊廡則上漏旁穿牆壁櫺忩則東傾西塌庭除有人畜之穢几案皆鳥鼠之蹤木主欹斜龕橱塵積印官教官熟視之若無覩也春秋兩祭奉行故事几百供陳委諸僕隸先事既不躬親臨時復不省視以致羸瘠之牲宰汚濁之葅醢蒙垢之粢盛含蛀之栗棗種種不堪雜然並進執事漫無告誡宿齊不復舉行不過五鼓排班勉強一拜任聽書役隨從竊取祭品攘奪燈燭拜獻未終几筵狼籍豆登未撤燎炬無光他如禮文之苟簡執事之錯謬樂舞之生疏登降進退之愆忒有非指數所能盡者特行申諭為此示諭合屬守令教官知悉各宜凜遵前督憲頒行條約整飭學宫壞者葺之闕者補之剝落者丹艧之欹科錯亂者排正之龕几不時拂拭殿庭不時掃除蕪蔓不時翦刈人畜作踐不時防禁務使廟貌煥然庭除修潔蔗以妥聖靈而肅觀瞻至於臨時致祭務須恪遵典禮祗奉章程牲牷必肥腯品物必豐潔省牲省器一一躬親同宿祭所必誠必敬自官司以逮奔走內外皆祗肅之人自降神以及撤饌始終無懈怠之志該屬試思里巷小民於尋常祠廟猶知設法興修豈民社之司師儒之長反不如里巷小民乎賓客往來尋常燕饗猶須致敬盡禮豈躬承大祭任意褻越反不如尋常燕饗乎况修葺整理為費幾何齊宿省視為勞幾何是可茍也孰不可苟也本司職任旬宣志在敦崇典禮學宫重地丁祭巨典一任玩忽罪干不敬言之不無過激心切望於遵行願與各屬共勉之查設義學檄陳𢎞謀為查設義學以興文教以變夷風事滇南越在遐荒夷多漢少土田澆瘠居民窮苦多有俊秀子弟苦於無力延師又夷俗不事詩書罔知禮法急當誘掖奬勸俾其向學親師薰陶漸染以化其鄙野強悍之習是義學之設文教風俗所係在滇省尤為緊要也我國家棫朴作人聲教四訖歷任各大憲留心文教加意風俗各屬仰承德意建學延師所在多有但查各屬從前義學或止為成材而設而蒙童小子未能廣行教讀或止設在城中便於附近漢人子弟而鄉村夷猓未能多設義師夫蒙養為聖功之始則教小子尤急於教成人興學為變俗之方則教夷人尤切於教漢户今欲使成人小子漢人夷人不以家貧而廢學不以地僻而無師非多設義學不可除會城書院本司議將奉發帑金置産垂久業蒙兩憲準行外所有各屬義學合行通查為此牌仰該府同知提舉官吏遵照牌內事理即便轉行所屬州縣各將本地方有無義學或訓成材生童或訓夷猓幼童或幾處或在城在鄉係何時何官建設其中有無藏書有無公田租息講堂書舍若干間現在聘何人為師年需束修若干來學生童若干文課每月幾次夷童若干有無助給餼廩膏火并將各該地方四鄉應設義學幾處其教習夷童應用何等人為師年需束修若干一并妥議詳報至尚未設立之州縣及止設立在城一處而四鄉適中之地尚須增設者該地方官悉心籌畫設法妥議詳請舉行或倡義捐設或將地方何項陋規作為義學之用如無項可動亦將應設之處所需若干具詳請示即從前已有義學而日久頽廢或田租被人侵隱或因近日地方有事廢弛未開者亦即確查據實具報以憑核奪本司猥以迂拙謬任旬宣時承兩憲以教養二事諄諄提命欲勤宣德意以盡職守而耳目有限心力未周該屬職在親民文教風俗責任更專願各實心籌畫以期有成幸毋視為迂泛也查設義學第二檄陳𢎞謀為查設義學以興文教以變夷風事人性皆善無不可化誨之人漢夷一體無不可轉移之俗有地方之責者果能因土制宜隨方設學而又區畫長䇿垂諸久逺加意振興不致徇名鮮實有始無終則化導既久觀感必多文教漸興風俗漸易裨益地方非淺鮮也滇省夷多漢少鮮事詩書義學之設視他省為尤急在鄉義學乂視在城為尤急本司蒞任以來訪知各屬原有義學未盡舉行義學原有公田多被侵隱是以通查各屬舊設義學之處舊有義學之田如原無義學即將應設地方應需費用通盤籌畫或撥公項或查隱墾或由捐給如無公項隱墾又力不能捐亦即將需費確數詳侯核奪今據各屬陸續覆到其通盤籌畫議定成規者寥寥無幾而潦草率覆掩飾一時者則指不勝屈有覆稱夷多漢少無庸設學者有覆稱公項不敷舉行不繼並不將公項若干如何不敷之處議及者有覆稱舊無公項現在量捐並不將應設幾處捐給若干作何經久之處議及者有覆稱舊無公項統俟核奪並不將何處應設需費若干聲明請示者有覆稱各處建蓋義學需費甚巨因而全不議及設學束修者有覆稱膏火不繼不能設立而反將束修設學之處全不議及者並不細繹原行不過奉行故事如以此事為迂闊不近人情不妨據實回覆或以為煩瑣有纍地方尤不妨立請停止如止為無力捐設起見原行令無項可動即將應設之處所需之費詳俟核奪並非令該屬人人捐設也何乃支吾躲閃答非所問令人不可解説除飭駁外合再明白通飭為此仰該官吏遵照來牌內事理即將該屬在城義學幾處每處需費若干原有公項若干田畝若干田畝坐落何處何人經收除條糧外年收租息若干或市擔或京擔曾否敷用或城鄉可以通融敷用如原無義學何處應設需費若干何項可以撥充如無項可充作何捐置公産如不能捐即將置産需費若干報奪至於學舍或附近空屋或公所庵院皆可開設何庸另建鄉間蒙師即本地生員皆可教讀何事逺訪在城者固宜實力舉行在鄉者更宜廣為設立成材之學固宜勤為會課蒙童之館亦宜設法振興已經赴學者作何振作奬勵未知向學者作何引誘招徠務須籌畫善後不徒粉飾一時仍將設學地名館師姓名注明漢童夷童若干書舍間數開館日期田畝租數造册申報備案其從前已經議覆批定者毋庸復詳其未經議覆及已覆未協飭駁另議者再繹節次批檄逐一議覆不必仍以無力捐建便爾草率回覆立等彚核請院示奪毋再率忽至於知府耳目切近何處應設何項可充如何振興如何善後就近稽察設法更便逐處經理籌畫不難乃奉到止一轉行詳到止一據轉徒煩案牘於事何益總之夷方化導非旦夕之可期邊俗振興舍司牧其何賴不聽其夷終於夷惟使之人自為教起化於今日而收效於將來斯邊地之急圖而撫夷之本務也思之勉之飭查節孝檄陳𢎞謀為飭查節孝以廣皇仁以勵風化事治化之旁敷必先激勸閭閻之大義端賴表彰我皇上御極以來廣勵倫常崇奬節孝尤恐窮鄉僻壤側陋單門即有芳規或多遺逸屢頒諭旨至再至三邇來嵗底彚題俱荷恩旨山陬海澨苦節幽芳從前未經表揚者莫不仰邀曠典滇省僻在西南夷多漢少雖未能户敦詩禮人篤倫常而沐聖化之涵濡被憲仁之深厚愚夫愚婦原具知能僻壤窮鄉豈無節義在宦門士族式化無愆且不忍任其埋沒而村婦寨民至情勃發安得不急為闡揚本司到任以來檢查案卷舉報寥寥或係邊地愚夷不知節孝之足重或係地方官吏忽視表彰為緩圖或襟棍垂涎而論阻於宫墻或胥吏需索而事阻於苛駁以最關風化之要務而漫不經心以通行表揚之盛典而歷年沉擱屢奉憲催視同浮泛合行酌定册式開明條例通行飭查為此牌仰該府官吏文到轉飭所屬州縣并儒學教官確加採訪通行曉示凡有貞節婦女不論已故現存不論兵民夷猓符合年例者務令確查舉報查取册結由學分案具詳務於九月內到司以憑核實轉請題旌毋得遲滯有誤題報之期發潛德之幽光闡芳徽於天末各該屬諒有同心務須秉正持公多方搜討採閭黨之公評合宫牆之彞好一經核實迅即轉詳若奉到止一轉行詳到止一據轉吏胥任意需索而約束不聞教官藉事居奇而漫無察禁致使半生苦節若罔聞知邊野芳蹤永無上達不但虛本司諄諄採訪之衷懷亦大乖該屬勵俗維風之職守至本司衙門書吏敢有暗行需索陋例者立即密稟以憑盡法究處毋得瞻徇勉之啓本朝徴刻滇詩啓檢討王思訓昆明蘭津南渡篇什初興司馬西征人文踵至一章頌體祀隆縹碧之雞十卷賦心客過孫原之水盤蛇頳木桓溪則僰道裁歌筰馬髦牛常璩亦華陽作志白狼逺徼悉奏風謡赤虺炎河盡登露布王仲初宫詞百首南中之辨真者七篇劉須溪詩統全書滇國則補完其半集􅌢弓插矢行號兵車花髻珠纓詩傳驃樂金枝玉葉羌奴解咏珊瑚雲片波潾阿􅗩長吟吐嚕彼當荒逺之代已傳藻麗之辭迄乎勝朝遂多作者遡文襄之遺烈集著石淙考恭肅之流風詩名冰玉操雕龍繡虎之技豈惟西嶨中溪擅雲蒸霞蔚之才不獨𢎞山半谷張維蘭茂既倡大雅於巖阿木氏麥宗且播新聲於髳濮況夫鄯闡之龍川􅞼嶺氣象沈雄楪榆之洱海蒼山煙雲杳靄昆池習戰動漢主之旌旗瀘水觀兵峙武鄉之壁壘國開花馬邈矣波衝臺築撫蠻巋然㽛町箄船直下健兒驚鹿茤之雷畫笛橫吹老伎奏龜茲之曲史萬歲功名蕭瑟祗緣爨玩明珠髙千里經畫周詳不受李瑶木夾鐵橋銅柱江山剩百戰之場金齒銀坑溪硐扼九隆之險天寶之沈戈盡紫骨葬龍關元和之賜印猶黃册封鶴拓雨餘蝸蝕摩挲元禮之豐碑月出雞鳴倣佛哀牢之古縣元太弟革囊安在浪湧金沙傅潁川犀甲何如煙銷白石枯松焰烈竟灰鐵釧之妃埀栁篇成空老玉珂之客問梁王之宫殿則鴛鴦别館處處斜陽尋黔國之樓臺將禾黍孤村年年舊燕增城下嫁還同窮塞之琵琶文節難歸誰射上林之鴻雁凡茲感慨盡入豪吟在昔名流類多傑構徒以歷年兵燹都堙於戈船樓櫓之間萬里風塵不達於天祿石渠之內遂謂南荒西徼原不生才長使騷客詞人難消斯恨今欲合前賢時髦律以三唐輯舊咏新詞分為兩集付諸剞劂雖非金碧之全身播厥寰區稍露蒼華之真面廣加搜採藉以表彰望我同人共勷其事家藏祕笈自製佳章凡有片羽之投勝得百朋之錫俾知列賈浪仙於流寓柘東原風雅之名邦祀王逸少為聖人滇紀祇荒唐之陋説謹啓雲南通志卷二十九之十欽定四庫全書雲南通志卷二十九之十一文漢移金馬碧雞文諫大夫王褒蜀郡持節使王褒謹拜南崖敬移金精神馬縹碧之雞處南之荒深溪回谷非土之鄉歸徠歸徠漢德無疆廣乎唐虞澤配三皇黃龍見兮白虎仁歸徠歸徠可以為倫歸兮翔兮何事南荒也論晉西南夷論宣城太守范曄順陽漢氏征伐夷狄有事邊逺蓋亦與王業而終始矣至於傾沒疆陲喪師敗將者不出時嵗卒能開四夷之境款殊俗之附若乃文約之所沾漸風聲之所周流幾將日所出入處也著自山海經志者亦略及焉雖服叛難常威澤時曠及其化行則緩耳雕腳之倫獸居鳥語之類莫不舉踵盡落回面而請吏凌海越障纍譯以內屬焉故其録名中郎校尉之署編數都護部守之曹動以數百萬計若乃藏山隱海之靈物沉沙棲陸之瑋寶莫不呈表怪麗雕被宫幄焉又其賨幏火毳馴禽封獸之賦駢積於內府夷歌巴舞殊音異節之技列倡於外門豈柔逺之道必足於斯然亦云致逺者矣蠻夷雖附阻巖谷而類有土居連涉荆交之區布濩巴庸之外不可量極然其凶勇校算薄於羌狄凌暴之害不能深也西南之徼尤為劣焉故關守永昌肇自逺離啓土立人至今成都焉贊曰百蠻蠢居仞彼方徼鏤體卉衣憑深阻峭亦有别夷屯彼蜀表參差聚落紆餘岐道往化既孚改襟輸寶俾建永昌同編億兆宋髙駢破南詔論翰林學士范祖禹華陽蠻夷自古迭為中國患由秦以來未有得志於南蠻者也蓋以瘴毒險阻不得天時地利所恃者人和而已而民從征役皆知必死如往棄市則是三者皆亡矣秦發閭左戍五嶺而陳項起秦遂以亡漢初吕后欲誅趙他士卒不能踰嶺武帝擊越發兵江淮因巴蜀罪人等放棄之蓋不可以中國之師涉其地也遂滅南越以為九郡元帝卒罷珠崖光武遣馬援擊交址最為有功然三年而後克士卒死者什五六乃得一女子之首其難也如是唐太宗欲討馮盎而用魏徴之策卒招懷之明皇之末李宓敗於雲南死者二十萬自是以後南詔盛強至於懿宗陷安南圍成都中國首尾疲於奔命其後龎勛之亂起於桂林之戍黃巢之冦本於徐方之餘唐室之衰宦者蠧其內南詔擾其外財竭民困海內大亂而因以亡矣夫蠻夷非能亡中國也而中國之亡蠻夷常為之資是以聖王不重外而輕內不勤逺而忘邇恐征伐不息變生於內而搖其本也易曰髙宗伐鬼方三年克之髙宗賢王鬼方小夷也以賢王伐小夷三年乃克言用兵之難也唐自開元至於咸通南鄙之師皆由邊臣貪利邀功以啓羣蠻自我致冦大為國患非髙宗不得已之伐也十年而克亦速矣哉傳明石淙楊文襄公傳尚書雷躍龍新興公諱一清字應寧號邃庵其先世為滇之安寧人父景以化州同知致仕攜居巴陵少穎敏能屬文有司以竒童薦為翰林秀才憲廟俾內閣擇師教之與李文正東陽前後登庶子黎淳門年十五登北闈鄉試即以經術為人師十九成進士明年父喪解官卜葬京口遂即丹徒家焉服除授中書舍人職務清簡弟子日益進凡經公指授者皆取髙第顯名朝廷久之遷督學政力祛宿弊凡請託一以嚴絶之士大夫始有譁者久而服其公且明也丁母憂歸服除改督陜西學政尋遷憲副公乃益自振勵創正學書院選英俊其中躬自教督所識李夢陽以文學名天下狀元康海吕柟名士馬理張璿輩皆與焉公資警敏能為文詩與書多慕效李西崖其功力差相伯仲也好談王霸經世大略材猷足法以是聲譽籍甚用超晉太常少卿尋晉南太常卿遷都察院右副都御史督理秦中馬政西蕃故饒馬必仰給中國茶飲以去其羶酪疾先是髙帝著為令以蜀茶易蕃馬資軍中用久而寖弛茶多闌出為姦人利而蕃馬不時至公乃請重行太僕苑馬官而嚴私通禁盡籠茶利於官以服致諸蕃馬馬大集牧政用修給軍者日益稱足時李文正當國劉公大夏為大司馬皆善公而材之會邊陲告警陜議遣將劉公言兵難遙度即遣將以不時往楊中丞在彼可用也敕公巡撫陜西兼理經略邊務公益選練士卒創築二城以為固援又劾貪庸總兵武安侯鄭宏及不職諸校尉數人去之適吐蕃數萬騎入寧夏乘勝直趨固原烽火通於內地時總兵曹雄軍隔絶不相聞公慮其失策乃從帳下輕騎僅五十趨之衆為公危請勿往公不聽星馳抵雄軍為之調度復張疑兵以脅吐蕃吐蕃移犯隆德會伏炮夜發響應山谷吐蕃以為大兵至宵遁塞外邊人士以郭汾陽比之大司馬復議延綏甘肅寧夏等鎮兵散無統請設都御史總制之上報可遂命公總制諸邊開府固原尋晉右都御史公乃具疏極陳戰守之策請修濬牆塹以固邊防增設衛所以壯邊戍經理寧夏以安內附整緝韋州以遏外侵悉許之公督諸鎮士馬飽騰每按部旌旗戈甲耀原野間吐蕃不敢駐牧近地公又謂河套即古朔方地唐張仁願築三受降城自是無冦警請因險而牆之聨絡相應可制敵而障全陜於數百里外廷議韙之於是大發帑金數十萬使公治築工未竟為權閹劉瑾所阻以是移疾乞歸里工亦罷其成者在要害間僅四十里耳邊人至今賴之公既歸瑾復入讒語坐公冒餉逮下詔獄李文正及王文恪力爭之始得致仕歸公歸京口治私第得唐許刺史丁卯橋舊址圃之以詩奕飲酒自娛顧名聲日益盛適慶藩置鐇叛詔起公提督軍務合總兵官涇陽伯神英西討以中貴人張永監其軍公馳至關密諭公故部將仇鉞時亦被劫事叛王者俾乘間捕執之遂悉誅縛其首逆何錦周昻等永亦旋抵壁上見公竒之公見永軍政之嚴相得歡甚初永與逆瑾侍潛邸爭寵不相下時頒賞諸部曲百餘人瑾之姻族毫不見與公固勸之始勉給一二乃顧謂公曰公無慮吾豈畏瑾者哉公曰固也苐今權臣內而大將外公誠貴上誠重公保無中變乎永曰然則奈何公曰公宜亟歸乘上之見嚮聲瑾罪而誅之此千載一時也永悟歸密疏發瑾諸謀反狀蓋公草也瑾因伏誅上因進永柄司禮焉方永之入也留公節制諸軍陜之軍吏氓士額首頌公勿歸顧朝議之趨召且迫也遂馳赴召拜公户部尚書論平叛功晉太子少保賜白金彩幣尋晉吏部尚書公於時政最稱通練而性廓大不飾邊幅愛樂賢士大夫與共功名朝有所知夕即登薦以是桃李遍域中嘗再帥關中麾下自偏裨起為大將封侯佩印者纍纍也時大盜起躪中原公調悉機宜疏前後凡數上復薦用副使吳廷舉等力討平之再晉少保兼太子太保蔭一子錦衣千户中貴谷大用陸誾援張永例請封其弟姪伯爵詔報可公力疏止之不報給事中王昻論選法弊於公有所指摘上為謫謪公力請寬之給事中竇明及御史孟津等或以言事或與鎮守中貴忤諸繫詔獄者公上書求釋上亦間有所寬也乾清宫災公應詔陳言至指及乘輿出無定期止無常所且置番僧戎種於宫廷諸干成法事因自劾乞罷歸上為溫旨慰留以原官兼武英殿大學士直內閣會災異公復自劾因極陳時政得失中有狂言可以惑聖聽匹夫得以搖國是禁廷雜介胄之夫京師鮮藩籬之託語甚激切上弗省是時張永坐間廢江彬錢寧方幸用聞公疏弗善也於是使所私優人臧賢輩蜚語上前譏刺公又嗾故諸生朱大周者誣訐公公乃上書乞骸骨疏至再四上始賜敕褒諭纍數百言給夫廩逾常格以歸公歸其客日益進凡所摹畫朝事億度無爽時目之為智囊云宸濠之變公度鎮江扼江南諸鎮之吭能備可禦三吳失茲要害吳越潰莫支矣於是捐資募諸壯士復遄促臺使者調金山鎮海諸衛軍環備內外無慮數十萬武宗南征聞其備禦有策特幸公第為宴樂者逾兩日旦暮賡咏篇什古今無儷焉時左右有導上幸浙江者公從容諷諫乃不果行世宗嗣大位廷臣爭言公可大用詔遣官賜金帛存問久之三邊總制缺詔公以少傅兼太子太傅改兵部尚書兼左都御史涖之溫詔褒諭以古吉甫方召唐之裴郭宋之韓范稱美之故相行邊蓋自公始也公之鎮凡諸軍吏幸公再涖有恩德又起自台輔將士愈自飭勵旌旗壁壘色彩為新上以舊勳凡有所條請靡不報居未一載復召入為吏部尚書兼武英殿大學士既陛見即晉少師兼官如故又以獻皇帝實録成晉太子太師謹身殿大學士時首輔費文憲宏也會張文忠孚敬桂文襄蕚以議大禮得上意驟貴為宫詹兼學士而諸詞臣皆心鄙之以故詞林諸榮秩如講幄典試教習庶常皆不得與張桂於是深恨費文憲屢疏攻之去公復薦起𢎞治中故輔謝文正遷居首輔文正至則公已用陜捷加特進左柱國華蓋殿大學士秩居文正上矣公猶疏讓文正願居其次上弗許以是公居首輔文正亦旋謝病歸公既以敏練見知一時士大夫皆崇仰之上益禮重公賜御書和章及金幣牢醴無虛日復賜銀印記二一曰耆德忠正一曰繩愆糾謬所言邊務國計事無大小上悉傾聽之顯陵之不果遷則公力諍功居多也是時張桂益貴幸入內閣上之傾嚮且過於公桂文襄以構王文成守仁亦與張文忠相釁隙上以王文成諭公欲知其人公謂其有精忠大節可大用桂文襄密聞而銜之於是張文忠遂疏謂三楊以後姦人占據揆地往復去來其人日輕勢日重乞下嚴諭俾勿詭隨便己意如往昔蓋指公也公亦奏辨乞歸上兩為溫旨以解之於公尤厚張桂於是益思構公矣先是公議散館留陸粲等數人為翰林上難之張文忠密疏言此曹皆費宏所植而一清成之勿留便於是陸粲等為給事中公弗聞也故粲給事省中時有建白公輒擊節稱嘆謂而家敬輿不過粲內感公國士知禮部侍郎徐縉以次當柄用素謹事公又為粲座主時時以上意語粲謂厭張桂粲思有所論列未發也會武定侯郭勛帥營務頗貪橫公奏對常盈庫出入計語頗侵之因薦用故中貴人張永同為提督永遂發勛貪汚迹俄而永暴卒中外頗疑中勛毒言路遂擊勛勛故以大獄事感張文忠每嚴事之於桂不爾桂亦密疏攻勛且謂張實庇之上於是下諸給事御史擊勛章於公且諭以孚敬私勛必曲救令勿聽公偶泄之縉縉亦語粲也給事孫應奎疏論張桂亦及公上是其論公上疏辭優詔勉慰至張桂疏各有策勵語公復上辭章謂今之持論多尚紛更臣獨勸以安靜多尚刻削臣矯以寬平欲變法臣謂宜守法欲生事臣謂不如省事用人則謂才難當惜斷獄則謂罪疑惟輕以故齟齬參差願賜骸骨避賢者路蓋指張桂也粲於是果疏劾張桂罔上行私諸罪狀上乃責張孚敬桂蕚負君忘義令孚敬以原職回家創悔資後用蕚革保傅大學士銜以尚書致仕而罪粲不早言逮下詔獄杖謫荒裔居二日復榜示朝堂明張桂功罪且令中外勿得更加齮齕張文忠陛辭上乃密諭公謂孚敬可還之閣否公言上欲還孚敬固當第渙汗大號甫揚廷而遽改之非所以示天下信少遲孚敬至家而後召之便張文忠聞益憾公且疑粲疏公所授也於是張桂同事詹事霍文敏韜有齒寒之懼上疏力攻公因自劾乞歸上諭留公疏辨乞歸上亦溫諭留之而意已移矣張文忠至天津上使人以璽書召還復職公遂乞休益切上未許也張文忠回見公愈偃然自負且謂公若吾在韜必不敢有是言公笑頷之霍文敏以省母給假因復為桂辨寃攻公益力上報文敏遂切責公非大臣體公謝以不職自陳上乃俞致仕豫金帛令馳驛歸既而霍文敏亦私心悔之矣公歸會進大學衍義不與公名上覽之不悅謂修是書實肇於楊一清又嘗序諸後可獨遺乎命補列名仍遣官齎賜金帛於其家群議祀禮不一上復念公顧謂左右朕誤放楊一清歸若在彼能無決乎諸仇公者聞益懼公復用乃嗾永門下之怨永及公者誣奏公嘗受永金玉乃薦用永又謂永既死復以金百兩乞公為志銘乃詔奪公官命巡按御史追公所受永金如所誣數尋亦罷追或請公奏辨公則謂久當自白奚辨為顧亦大恨為孺子所賣鬱鬱以終又四年上念之復其官又十五年乃贈太保諡文襄則公所謂久而自白也公所著詩文有獻納稿及綸扉奏議玉堂前後集行於世凡所撰述則以石淙繫之蓋不忍忘先世故居也李文正費文憲霍文敏諸公皆為石淙賦以頌美之故世稱公石淙先生云劉太僕傳尚書傳宗龍昆明太僕卿劉公文徴字懋學雲南後衛人父體仁嘉靖中仕蜀新繁令遷保寧别駕所至清約惠愛衙齋種蔬自給蜀人稱劉青菜云以勤瘁卒於官家赤貧子七人皆刻勵尚學公其季也幼從諸兄讀書即能灑然貧困中又從旴江羅公汝芳逰聞聖學益廩廩暗修弱冠舉孝亷絶迹公府萬厯癸未登甲第為新都令邑當天府孔道逹官貴人冠蓋相望里甲疲於奔命公力行條編法悉令歸農時有清丈之役躬歷阡陌九則維均丹書其籍藏諸庫至今經界榖祿無絲髮愆差三殿肇興取材於蜀邑當辦大木三公獨任其勞三入藺州得美材以獻民間若不聞采木之令者賦租手為較量稍溢錙銖即還畀民聽訟則令訟者持檄呼被訟者片語解紛終日不抶一人纍月不罰一金茅茨千家與長吏相依為命每以公役至成都兒童連手爭覿其面曰是新都劉侯耶入為比部主事光廟儲位未定一夕有並封侍嫡之旨與同官六人伏蒲固爭首事者欲沐浴席藁公曰此舉不過各辦臣忱庶幾主上知舉朝有同心耳甚無自標置為名也時稱西曹六君子焉纍遷郎中出知廣西梧州府以內艱奔歸服闋補浙江紹興府約己裕民一如所以治新都者篤誠敬持惇大列屬同風郡大治時山隂令屏山楊楷會稽令吳中翁愈祥俱有惠政郡人祭酒陶望齡為三賢之詩曰東陽海壖國潮濤日舂撞錢塘為長雄帶以東西江厥宅有三山種山居中央左戢而右龜煙雲所起藏三江何縈紆三山何低昻山髙擊大鼓皂蓋朱幡雙朱幡者伊誰貌瘦眼有芒共云劉寵孫重佩太守章太守坐聽事群吏爭蹌蹌中有二尹賢二尹翁與楊清心等無疵盛德俱有望金石同懸鳴椒蘭並畦芳煦人似三春映物如三光曩者捕妖人僉細乘時狂赤舌或燒城訛火將焚岡官能靜其紛制使燎弗揚曰雨而獲雨曰暘而獲暘吾民固無知乃爾動穹蒼向惟虞歉收茲乃憂無箱明年大述職聖人處明堂太師采聲詩聽我三賢章又曰古循良之政多得諸資具非關學也於公乃見學問中政事矣夫豈弟可以性近通敏可以材呈擔荷可以氣奮若夫不言之化不怒之威至靜之動至和之守非三者所能辦也遷按察副使分守浙右三府郡民焚香遮送數十里郡之龍山有祠祀漢太守劉祖榮宋太守范希文遂即其旁創公生祠肖像祀焉初山隂朱閣學家居悉公治郡狀至是當國有汲引意公一日行部嚴州與同官閩中李開藻同登富春釣臺超然逺覽曰諫議不拜謂故人為天子也今故人為宰相何不髙舉為引疾乞身徑歸遺公費數百緡在官郡守遣吏越數千里齎送至里舍公笑卻之居六年朝議特拔清恬用為儀表以原官起公備兵威清公逡巡難進或有勸公不出需後命當得京卿者公幡然曰是有意擇官也乃強起時苖患棘甚道路禦人無虛日公先以計擒通賊土目羅國權繼討花蔑抵拱河頭諸􅋭盜魁蠟業阿袍皆就縛安定之間賊不敢窺者數年量移四川右參政備兵松潘當番虜肘掖地故不毛本色仰給川西諸州縣金錢取諸司帑率多愆期士不宿飽東路羊洞生蕃跨連千里素不受縻漳臘有土韃數千火落亦之部落也往時鎮守納其槖駝名馬許駐牧內地生齒漸繁窺伺叵測公首重本色又括茶稅糴青稞麥數千石濟其不給多置軍仗火器轉輸不絶番人偵於墩卒墩卒曰兵使者積糗如山治兵甲如林將出師特未知所向耳會建南兵事竣公受臺使者檄核所糜金銀之數歸而申警將吏曰番虜二憾負固久不討今糧械已足又建南所餘儲需甚多不日禡纛其秣厲以俟羊洞生番震恐乞命因熟番以請降者六十餘寨土韃聞風徙幕北去一夕而盡凡積贖鍰數百緡貯之别駕之廨後代公者為某君盡攫以去臺使者劾某君乃暴其狀不然世不知公有留贖鍰事也遷亷憲總臬全蜀􅉰寇自隴右流劫川北一路無寧宇會兩臺諸司一時俱乏人公從宜發鎮逺營兵勦之賊匿山中月餘無所見乃露檄撤兵密有指授賊聞兵退果出至半途伏兵起盡殪之事聞賚白鏹紀録於是選郎胡汝政擬以京卿召公公聞之曰京朝詎貴近廉訪豈卑乎君恩到處重如餘生無宦情何乃上書幕府遂封印登舟撫軍饒景暉力挽之不可移書令藩臬大夫詣衙齋勉留又不可乃以狀聞謂公崇雅黜浮素節一生無改亷頑立懦清風百世可師讀者以饒公為知言歸自蜀遁迹卻掃臺使者按部式其廬欲一見不可得久之日益貧青黃之交稱貸而後舉火熹朝登極大搜在野起南鴻臚卿三疏立辭上嘉其清望加太僕卿致仕丙寅六月卒前太宰閔公洪學鎮滇稔公清修與直指朱公泰正合辭請恤疏云通籍四十年轍迹之歷幾遍而橐恆垂里居十餘載蒲纁之徴數臨而卧不起又云家徒四壁案擁一經蓋實録也疏入賜祭葬如例禮部議贈官與諡贊曰近世士大夫以亷自命致通顯者多矣然𠂻服抵牾初終乖舛情縈雞肋色動豆羮欲以砥障流靡豈不難哉余家城南與劉氏比屋而居者屢世而太僕公夫人為先慈姨母以是知公最真每望晨突不煙知公瓶中無粟家人甚病而公泊然若將終身以余耳目所覩記公蓋天下一人而已使公入秉衡軸以風勵天下即毛玠楊綰何多讓焉惜乎強半謝病所用於世者十僅二三然范丹為令以塵甑稱劉寵為守以一錢聞趙清獻鎮蜀以琴鶴名公可謂兼之公不朽矣本朝王端簡公傳修撰繆彤吳縣康熙十三年歲在甲寅秋九月豫告大司馬思齋王公以疾薨於江寧踰年賜葬三茅山之陽又踰年吳中受業弟子繆彤為立傳傳曰公諱𢎞祚字懋自號玉銘晚年繫思髙堂因號思齋其先陜西三原人太子太保吏部尚書贈太師端毅公南京户部尚書康僖公裔也既以順欽公從戎至滇之金齒司遂占籍即今永昌府云曾祖良弼公祖崇正公並傳隱德父瞻雲公中萬厯癸卯鄉試歷官蜀楚著賢聲兩祀名宦常榜署齋曰體認天理處繼晉秋曹以議減總河劉公獄去國天下惜之癸卯生公公生而岐嶷性純孝沉毅寡言有才智讀書目十行下講經世大略即具廟堂之度焉十四補弟子員庚午舉孝亷丁丑中副車名動京師當事亟用公壬午遂由薊州牧升户部郎督餉大同我朝定鼎擢公岢嵐道用制府吳公孶昌議復留大同再歲以才能召仍官户部郎中是時草昧初闢圖籍散失天下户口田畝錢榖多寡出入損益之數莫能核公精典故善強記凡諸州郡所上策即纖細無不明晰宰執重倚公特疏久任公竭志纂修賦役全書及成御製敕諭頒行天下今各藩司遵守瞭如指掌者公所定書也公謂百姓不苦於正供而苦於雜派雜派者墨吏之便於民無便者也法令不立則吏不知畏吏不知畏法則民不得安閭閻菽帛之輸朝廷悉知自以艱難成節儉朝廷版籍賦稅之事小民悉知自以燭照絶侵漁故裁定賦役一凖萬厯間法例晚末苛細巧取悉芟除之規模典則巋然一代章程諸臣工咸拱手推讓以為能用是加公太僕寺少卿正卿遷左右侍郎又晉公尚書加太子少保旋加太子太保上御南苑諸臣侍特召公問天下錢榖出入之數公從容舉要領對言簡事明敷陳中綮上喜目之曰此真司農也又上論國計謂安民生必首絶私徴講強兵則首嚴冒餉至於水旱災傷則蠲恤宜速又曰今拯救民生之要莫若稍寬徴輸之期朝廷寬一分小民即受一分之賜明暢愷切天下頌之又籌滇南事萬里如見經畫井然諸條議上莫不拊髀稱善悉見施行因滇黔阻化王師蕩平公始知親喪日月而元配周夫人亦相繼去世哀毁躃踴泣絶復蘇即欲不俟命而奔天子慰留再四勉以墨縗視事辛丑請歸葬築廬墓側上諭所司優議恤典公父母以及元配一品夫人皆豫祭葬事竣趨還朝改刑部尚書未幾復調户部會星變求直言上疏曰星辰有定次今異星忽見則天失其常矣坤道主靜今忽地震則地失其常矣六卿有定制今更易太煩則人事失其常矣挽回天地之變首在率循人事之常中外以為名言漕糧例自通倉運入京議者謂於水次支散可省車輛費萬計公曰水次支給則受者負載艱勢必減值而售米狼戾在外京倉支給雖有糶者顆粒皆在內此昔根本深計不當以小利變法也其諳於大計類如此會有主裁州縣存留與變漕糧官運為民運者公固爭不得遂以兩議上並如公指無何以失察吏胥報罷上悉公忠詔留尋補公兵部尚書庚戌引年乞休疏再上得請馳驛給俸長安士大夫賦詩祖道以為榮至金陵感疾疏辭俸不允僑卜秦淮之上攝靜調養爐香甌茗坐擁圖書間與二三隱逸楸枰詩話味道參禪以怡恬淡當事每有政務難決者輒往就問指畫井井無不佩服然公雖退其忠君愛民之心殷殷不置咸望東山再起而公則翛然道履或命筍輿陟牛首雨花棲霞祖堂之勝以舒襟抱因登三茅峰棲心髙寄玉函金軸無不探覽得趙文敏手書九天生神章真迹摹勒於石而傳焉甲寅疾甚手遺疏馳上方俞旨慰問而公薨震悼輟朝賜祭葬諡曰端簡朝野聞公訃莫不揮涕慨噫云公智畫深長不露威采咨決大事無詭隨亦無便給徐折衷以理可否適宜聞者悅服所謂古大臣風公無遜焉居恆念與瞻雲公逺退食之暇往往涕沾臆居金陵手輯永思録數卷讀者悲動今上御極初邀覃恩請以廕廕猶子璋蓋公篤行敦修實其天性云讀書宦且老不輟於古人嘉言懿行輒亹亹無倦公子瑜官京師手書清慎勤訓誡之格言諄誨郵迹相接聞者得其片語共當針銘今繕部君砥礪官方克振家學人亦以端簡公望之公於文藝鑒拔獨精乙未充讀卷官首舉史公大成卷臚唱第一丁未會試總裁妙選超越是科得人特盛而彤亦幸在選中以公見知故習公益深公大節偉行在史册千載傳之亦奚藉文以傳但彤蒙一日之知又辱為史官紀媺揚休其職也即不文烏能辭若世系與生卒年月及生平言行足為人師者别有述特傳其功業大端有關民生國計者如此昆陽州李孝子傳尚書韓菼長洲自史傳列孝義以敦本勵俗公卿大夫宜由此其選也顧不少概見而閭巷之士或卑冗小官行修於家者多有或湮沒而不彰余故及所見聞而核其不誣者頗論著之若李公蓋可述焉公諱澄字仲瀾號果峰雲南昆陽州人拔貢候選知縣父兆旗明末廬江訓導流冦攻城急分守北門城陷不屈與幼子淳俱死公奔喪匍匐宵晝行忘寢食數經賊中幾死得收骨以歸葬訖白州府父死狀以聞於朝崇祀鄉賢更特祠曰靖忠公每晨詣祠必泣如初喪者終身本朝順治丁亥滇中亂公奉母洪避山谷箐篁中母疾革囑曰我不欲終於斯可移置我淨地公負母行數十里至甸頭之香雲寺而絶時四望無煙哀號復負以行至祖塋去寺四十里矣母故藏棺城北慈照寺復奔寺猝遇賊爭欲殺哭告之故賊義之不殺也時兄源㴶已先死於賊公益慟遂發病嘔血公兄弟八人晚惟存兄演事之如嚴君事必告而服其勞召之必在側飲食必共兄亦友愛至今州中美其家法公有德於鄉歲戊子州多故山猓乘間入城劫官舍有告幕府民反者遣總兵往兵之公道行忽被執總兵者呵曰亂民耶趣斬之公色不動力言山猓飢寒跳梁不關平民不惟民不可殺猓亦不可勦撫之便會州守至如公言罪止魁而撫其餘一州以完至今德之私諡之曰孝穆嗚呼公之事止此矣無他竒行也然如是亦足矣滇於古百濮近六詔地非三代之教所加然使家喻户曉率如公豈出鄒魯下哉余又聞公先有尚文者以滇處天末少書籍來江南購萬餘卷歸而公之髙祖雯巖以南京刑部郎守銅仁課第一訖罷官亦購書萬餘卷自號一蠧居士後訓導死於忠而孝穆繼以孝母亦其讀書之助耶然以余所聞士大夫有擁卷軸至多而子弟一無稱焉抑又何也公之子從綱方以舉人上春官汲汲乎惟懼其父之不傳亦可謂孝余既得其事甚審為之傳俾藏於家以待史之徴孝義者且語從綱子故藏書家其復蠧焉可乎楊刺史傳知州陳淳冀州公諱春震字起蟠其先江西臨川人也父一山公性沈靜多竒計連不得志於有司嘉靖間雲南鳳氏屢叛吕光洵受命撫滇且勦冦先是鳳繼祖結連會理姚安諸土司勢甚狂逞舊撫敖宗慶進討不效僉事張澤陷賊中洵募士能佐軍者一山公實仗劍從謀多祕密人無知者賊平洵酬之官一山公謝曰吾不為功名來官何為遂飄然去隆慶丁卯客楚雄有李公者竒其狀以女妻之即公母太宜人也居無何楚士忌一山公才遷姚之武德衛庚午刺史公生隨移居武定刺史公五歲時端凝敏慧不同恆兒眉心有灸痕如一目光采映發郢客見而異之伺一山公他出負去一山公歸散金募士訪數年不獲萬厯癸未一山公逰武昌泊舟荆門入市間步遇童子挾笈行兩相熟視兩相留連兩若有不解狀近見童子眉心灸痕輒淚下童子叩所以公語之故曰吾父也相持痛哭郢客懼不敢出刺史公泣言明發耿耿未嘗置懷日惟私涕絶口不敢言被略事且述郢客教以詩書及珍愛意甚悉一山公傾囊酬郢客始擕公歸滇是時見者聞者莫不髙一山公之不校而服公之明哲保身且不負郢客教訓之義云於時刺史公年十有四矣讀書刻苦文自成家十六補郡庠作諸生十三年文行為多士模楷每試必第一嘗習靜獅山大士閣風起燈滅俄見童子執燈至燈復燃視之已失所在至今有塑童燃燈之謠二十九以恩拔入太學出陶少廣先生門先生雅重公庚子夏促之曰子才髙勿小就歸應省試若售五名後吾不敢相天下士矣是科果滇闈第三人辛丑赴銓部試少廣勸勿小就如前公曰某非急功名顧父年髙冀一命備祿養娛親爾試第一例得州缺適一山公患疾家報至皇遽歸侍湯藥衣不解帶者纍月次年三月一山公卒祭葬遵家禮不用浮屠人咸服之甲辰十月授湖廣彞陵州知州乙巳從都門上任停車鄭衛間微行偵彞民利害王宦名撰者張江陵姻家也官吏部左侍郎休沐家居恃勢而橫民罹其害者傾家殞命咸切齒而避其鋒州守奉命拱手稍拂即中以他事排去之公廉得撰惡款二百餘條并其黨與姓名衙胥附撰者悉識之乃發檄之任王親郊迎厚餽遺公辭受一規于禮首謁宋守歐陽文忠公祠出金亟為修治外一切俱不視惟日偕紳士論文飲酒而已二十餘日後民詞積數百紙吏莫能測公因讀法旋署召諸吏立堂下集訟者環跪聽判不終日裁決已盡各心服曰三眼神君也吏胥附王氏者悉屏去數與王抗禮不為下王日偵公私欲巧中之公剛直不染王亦無如公何復欲試公才令人投一詞揑事而繁其説審質間又持一册為僧乞募緣引公揮筆聽訟如故訟決而文亦成又一尼持白紙跪堂下問不應援筆判曰準還俗免使僧敲月下門也尼果叩頭去王聞之亦嘆服焉適江中詰得王私鹽若干船公決意懲之將鹽半貯庫半犒捕役草王氏狀家人環跪泣諫叱曰為天子命吏敢自恤乎且彼翼而食人如畏權避勢藏頭縮尾是吏而奴也吾豈效之汝勿復言下令曰凡被王宦害者許首告不五日控者數百人公列撰諸不法狀申詳撫按捕一切惡黨羈獄中具揭科道各衙門時撫按皆江陵舊人欲寢其事兵備王某力持不可撫按不獲已會疏奏聞直指奉旨勘實詔奪撰官黜撰黨舉人二名生員五名發戍者七人城旦者十人彞民稱快公慨然曰民患既除仇讐莫解明哲保身固如是乎即告骸骨歸里署中僅有書五箱公曰此亦彝陵物去時封留之百姓攀卧號泣如失父母旋將所遺書持送至滇數月後撰抑鬱死民為謠曰活我彛民死彼王撰好箇青天胡止年半至今稱道不衰萬厯三十四年公抵家土人鄭舉邱相魯求通往來公察二人有異志絶之告太守陳典早為備典不能用丁未果陷府城公先已攜家赴安寧獲無恐前太守劉懋武王應期胡其慥皆大有德於武公倡士民立祠以彰其賢公有弟二人春霖春霽悉庶母金氏出公友愛曲至為霽娶妻辛氏戊申霖卒公悼甚廢寢食手為文志之甲寅霽又卒遺一女公撫愛倍己出事庶母金氏關氏極敬謹相繼卒葬祭各如禮戊申後不問外事惟以崇奬後學為己任甲寅秋評諸士文語龔正曰若能受言乎正請命者再公令同長子元祐課藝獅山别業教之曰為文須苦思刻求一日一悟愈悟愈竒若今日寫昨日文字是自暴棄也天不借昨日殘霞敗雲以成今日人可拾他人土羮陳飯以腴己身乎乙卯正登賢書元祐誤中副車童子楊玉瓚故人子石振響失依公給衣食收入家孰中訓誨瓚響並入泮食廩餼啓迪多人戊午次子元升生公建書室三楹於居室之側擇鄉黨子弟俊者教之器馬國正為最後易名乾登崇正癸酉榜歷官至四川巡撫以節著人咸稱公有陶少廣之藻鑒而馬中丞有公之風概焉天啓壬戌厭居城市聞有勝地輒命駕往偶思元謀舊治莊田數𤱔頗幽僻兼欲探方山雷應之勝十月抵官莊疾作家人請歸笑曰爾懼吾死非正寢乎謂曰吾生平雖無大善喜亦不愧科名好撫幼弟成吾未成之志勉之遂卒崇正間王撰有姪名維章者備兵雲南章舊名某即所黜生員之一乃改行力學復應童子試得售或以報復諷章章曰起蟠公未染吾邑一錢吾敢以私仇公乎倘非公則吾止於紈褲耳何由致此置不問尋擢滇方伯土人楊應瑞以田土控揭志構禍也章亦不問且語武司李秦炫奎曰起蟠公後人何如奎以長元祐副榜次元升諸生對章曰書香有繼斯文之幸須青目之奎退而告人曰楊公一無欲而感人若是嗚呼孰謂廉吏不可為哉蓋公生平公正服人心如此余始奉命刺祿時聞公氣節數追嘆獨恨未詳久之公孫澤先以公狀來故得悉其顛末焉夫武郡向為夷區自隆慶改土設流迄今甫百二十年而人文漸起幾於家絃户誦諸父老莫不感公首倡文學以詩書教子弟以禮義率鄉邦之功嗟乎奕世猶將興起公之為人蓋可思矣寧僅廉吏云乎哉李烈婦傳按察黃士傑長泰烈婦名桂姐姓李氏平彞庠生長吉女也年十六適馬龍州庠生楊景雄克盡婦職夫妻相敬如賔者八年會夫病且篤氏割股以救竟不起氏哀毁骨立痛翁姑孱老侍養無人躬織絍以奉髙堂雖甘旨不備頗得歡心值姑有疾貧不能購醫藥復割股以療輒愈逮後翁殁姑媳煢煢貧苦益甚室廬不足蔽風雨朝夕饔飱不給閭里咸矜憐之有勸之再醮以養其姑氏峻拒之諸人謀於姑許可氏知不免因將衣裙縫紉乘姑外出扄其門懷夫木主而投繯焉時年二十四嗟夫世之丈夫能從容就義者不可多覯矧巾幗中有此豈不足以表當時風後世哉事聞於官主婚逼嫁者各坐以法州人士欽其節聞於督學使者旌其墓曰烈骨留香余向奉命牧是邦訪其事甚悉表懿行以挽頽風闡幽光以勵末俗有事茲土者之責也爰傳其始末以為化民成俗之一助云贊漢西南夷傳贊太史令司馬遷龍門楚之先豈有天祿哉在周為文王師封楚及周之衰地稱五千里秦滅諸侯唯楚苗裔尚有滇王漢誅西南夷國多滅矣惟滇復為寵王然南夷之端見蒟醬番禺大夏杖邛竹西夷後揃剽分二方卒為七郡南夷君長贊蘭臺令史班固扶風楚粵之先歷世有土及周之衰楚地方五千里而勾踐亦以粵霸秦滅諸侯唯楚尚有滇王漢誅西南夷獨滇復寵及東粵滅國遷衆由王居股等猶為莫户侯三方之開皆自好事之臣故西南夷發於唐蒙司馬相如兩粵起嚴助朱買臣朝鮮由涉何遭世富盛動能成功然已勤矣追觀太宗鎮撫尉陀豈古所謂招攜以禮懷逺以德者哉晉西南蠻傳贊同平章事劉昫歸義五方異氣所稟不同維南極海曰蠻與戎惡我則叛好我則通不可不得使其瞻風唐南詔列傳贊失名唐之治不能過兩漢而地廣於三代勞民費財禍所由生晉獻公殺嫡賊二公子號為暗君明皇一日殺三庶人昏蔽甚矣嗚呼父子不相信而逺治閣羅鳳之罪士死十萬當時冤之懿宗任相不明藩鎮纍叛南詔內侮屯戍思亂龐勛乘之倡戈橫行雖囚渠殲夷兵連不解唐遂以亡易曰喪牛於易有國者知戒西北之虞而不知患生於無備漢亡於董卓而兵兆於冀州唐亡於黃巢而禍基於桂林易之意深矣西南夷傳贊别駕司馬貞河內西南外徼莊蹻首通漢因大夏乃命唐蒙勞深靡莫異俗殊風夜郎最大邛莋稱雄及置郡縣萬代推功明毛給諫玉遺像贊修撰謫戍楊慎新都蚤捷甲科職司諫議性戅而剛色溫而厲冠服峩峩威儀棣棣抗疏清時直節徑氣奮弗顧身獨立不懼仁成一朝名香百祀鐘鼎勒勳汗青書事嗚呼先生誠有以繼忠鯁於往哲而激謇諤於當世頌明平雲南頌王景常聖天子之御大歷服也維清緝熙載􅏡武功蕩攘群雜混一函宇於是偃武修文與民休息雲南弗庭遣使招之遇害洪武十四年秋皇帝若曰天厭元德土宇瓜分朕奮起淮甸為生民請命鏖戰鄱陽江漢以清捲旗東指吳會電掃皇天眷命正位宸極爰整六師北定中原河南山東不戰而下元君北跳九鼎南遷秦晉景附蜀關洞開兵不頓刃今雲南蕝爾之地喘息相保梁王巴咱爾斡爾密戕虐我信使憑陵我郊保若不及時蕩一何以答上天之眷慰黎民徯來之望哉乃命潁川侯臣傅友德西平侯臣沐英永昌侯臣藍玉等將鷹揚虎賁之士凡三十餘萬騎萬匹聲罪致討七月禡於龍江樓船蔽江旌旗亘天水陸兼進星流電邁既至湖廣分為兩軍大軍道牂牁踣夜郎平普定竒軍由羅佐關擊可渡河奄至曲靖疾若風雨所向輒克土酋蜂屯獸挺莫敢格者未至白石江十餘里大霧四塞元司徒逹爾瑪拒江自固我師輕騎長驅掩其不備先命千騎從上逰萆山襲其後平旦大兵泅水競渡逹爾瑪麾軍布陳未成列我師徑前奮擊其陳遂亂逹爾瑪走陷於淖生擒之俘斬將士若干人雲南兵大奔乘勝逐之征南分軍擊烏撒東川敗蠻四萬僵尸蔽野遂通大渡河竒軍始至西平永昌率大兵趨雲南時梁王聞敗棄城走晉寧飲鴆卒雲南平自出師至是凡百餘日得府州若干户若干馬牛軍實無算承制建官大軍鎮焉明年分兵下大理下金齒下臨安元江凡雲南故境皆郡縣矣又明年遣間使降車里降緬降八百咸以壤奠貢洪惟天兵不浹十辰東抵牂牁南著交址西踰吐蕃北界神州幅􅊷萬里悉臣悉妾何成功之速哉蓋皇帝文武神聖煦為春陽肅為秋霜綏之以仁摩之以義混混乎內之於泰和元氣中使其民熙熙以翔皥皥以羣得覩中州文物之懿太平之樂而不知沐聖澤之深也上自漢唐以迄於元羈縻而巳乃今維持鞏固與內地等信乎王者之無外也又明年班師振旅定功行賞諸將以下皆進爵有差於乎古之有盛德大烈必形諸歌頌皇風興大雅作草茅微臣不敢多讓臣景常稽首頓首而為頌曰皇明御天統有萬方際天蟠地武功煌煌三辰耀靈海宇聿清叶氣嘉生蒸為太平蠢兹蠻方稔藏姦凶恇恇穰穰以褻天常乾坤之量海嶽是包彼昏而狂誕敢叫呶皇赫斯怒爰整元戎吉日載戒車攻馬同於爍王師暨暨桓桓天討是將震懾百蠻兵無留行勢若迅霆日星晦霧江海沸騰鷹揚曲靖俘彼統酋征麾所指再􅏡天休戰不貪殺殺不卻降斥原疏斾以迄用康大憝聿逋筐篚元黃拓禹之迹維周職方表方建官棋布星分仡仡大城以奠其民封豕修蛇以變以化昔也猰㺄今為騶虞載駟載伐戈鋋不腥南金犀角罔敢弗庭凡此南功將臣僉同維一乃心上毗帝聰大烈之龎超漢軼唐風霆流行天地翕張會朝清明聖化基之萬國一統坐而釐之草茅微臣作此頌焉武功告成天子萬年本朝平滇頌有序檢討尤侗長洲皇帝御極二十年命大將軍貝子章泰綏逺將軍總督蔡育榮等統滿漢官兵討雲南逆孽吳世璠詔若曰此窮冦不足膏齊斧兵法攻城為下勿肉薄傷士卒殄及平民其築長圍困之必自斃自二月至於十月城中食盡畔衆皆譁我師進克子城世璠蹙自剄偽黨開門降迎王師以入百姓前歌後舞壺簞載道或相與埀涕曰不圖今日復為王人見太平也幕府上露布至京宣捷午門外羣臣拜手揚言曰於鑠哉此非師武臣力繄一人如天之福無疆無休蓋自三桂倡亂八載於茲踞滇為窟狡焉啓疆竊我黔陽陷我巴蜀封豕長蛇薦食三楚波及豫章之界蹂躪我城郭瘡痍我人民不寧惟是又招八閩勾兩粵誘我蟊賊以蕩搖我邊疆東南蠢動靡有寧宇於是天子赫怒榪牙誓師大發禁旅并良家彍騎連營百萬度支轉餉半天下舳艫牛馬終夜有聲鉦人伐鼓一月三捷大憝稔惡天用勦絶其命賊徒駭潰閩越之人震懾流汗匍匐乞命朝廷下制書賜尚之信死以尺組縛耿精忠致闕下二方底定璠猶不悛收合餘燼自竄叢棘孤雛腐鼠保首領之不暇卒取覆亡為萬世僇其伏罪亦已晚矣夫以堂堂天朝踴躍用兵殲厥小醜摧枯震落何憂不克然當其始也一夫抗命三孽連衡若火之燎於原不可撲滅以皇上天威率其股肱心膂之臣熊羆彪虎之佐運籌帷幄折衝樽爼一戰而舉荆襄再戰而收衡永西師絶連雲之棧跨劍閣搗成都東師破辰龍關席捲貴竹直抵苴蘭城下摩旗點蒼之野飲馬盤龍之津風馳電掃谷靜山空自征伐以來未有驅除若斯之速也且滇雖一隅僭始莊蹻閉嶲昆明不通中國蒙舍并有六詔蠶食滋大鄭趙楊號令三嬗終歸假氏逮元始入版圖明遂郡縣其地然以世祖之雄略潁涼西平之壯謀加以十一總管三宣六慰而伯忽舍利畏造變於前阿資思任構釁於後蠻爭觸鬬日尋干戈何者夜郎不知漢大聲教阻絶嗜殺怙亂其習俗然也况叛臣教之嘯其凶族逆我顔行驅市人於鋒鏑朝箕暮斂糜爛其室家此邦之人水深火熱喁喁然延頸待救若枯旱之望雨今陛下義征不庭提赤子出沸羮之中使登袵席髳人濮人回首面內胥沾闓澤甚盛德也雖虞帝之格苖民殷宗之克鬼方何以加焉然後振旅而還告廟獻俘班朝飲至勳庸銘乎鐘鼎名號昭於史册不其敻乎於是天子沛然改容曰豫一人敢不荷天之寵承祖宗三后之慶顧自軍興宵旰不遑諸大夫勞苦於內諸將士暴露於外烽燧所至毋乃驚懼子弟憂患長老其他飛茭挽粟疲於奔命者不可勝數朕心憫焉賴社稷之靈以遏亂略罪人斯得庶幾息兵革嘉與海內更始其頒爵賞蠲賦役赦殊死以下天下聞之僉謂皇上武功赫赫既如彼文命洋洋又若此博恩廣施逺撫長駕車書混一符瑞響臻道侔乎乾坤業隆乎三五雖鳴和鸞奏雅樂封泰山禪梁父夫何恧哉小臣侗備官珥筆退而作頌一篇爰揚至尊之光烈用告太師歌以舞萬其辭曰皇清受命厯無疆上暢九垓下八荒大共小球皆來王北至肅慎南越裳天子穆穆坐明堂載櫜弓矢秉圭璋蠢爾強藩何跳梁射天逐日肆披猖二豎從之同顛狂彭彭大車拒螳螂吾皇一怒威神張手麾白旄掃欃槍鑿門推轂授斧斨礪乃鋒刃峙糗糧雷輜星駟啓戎行勢同猛虎驅跛羊大首既隕羣奔亡遂挽彭蠡回瀟湘蠶叢鳥道闢康莊木瓜金築歸疆場競牽鐵索渡瀾滄井蛙遺息走且僵藐如山鬼伏箐篁銅鼓一鳴魂魄喪長鯨就戮短狐戕前徒倒戈爭投降君子小人篚壺漿竹王祠下迎三郎六軍齊轡臨城隍鞭指邛笮揮冉駹牂牁㽛町遙相望碧雞晝啼金馬驤彩雲飄颻昆池旁平填洱海成田桑市廛不改耰鋤長僰童唱歌傳白狼翠毛象齒貢梯航捷書飛羽奏明光天顔有喜夜未央百工來賀舞且揚帝曰嗟咨心如傷賊臣不道犯天綱良民何辜罹池殃居者裹負行羈韁哀我人斯亦孔將刑獄幾何念桁楊錢榖幾何問倉箱亟放赦令覃恩章后以誥命施四方乃開石室紀太常彤弓盧矢間珮璫龍旗和鈴鞗革鶬朱鷺鐃吹登廟廊職方會同統萬邦王道蕩蕩臻平康文武止戈佳兵藏逝將歸馬華山陽功成治定禮樂彰秩宗黼黻夔笙簧龍圖龜書出低昻郊逰麒麟苑鳳凰黑秬黃􅓿兆豐穰青芝赤箭呈嘉祥仰觀玉燭俯金湯美哉丕基亘皇唐宜升介丘答穹蒼云云亭亭風雨翔金泥玉檢書輝煌探策占之夀永昌皇清受命厯無疆説本朝藉田説總督鄂爾泰滿洲禮之有藉田也明仁也教孝也以天子之尊而必親耕則天下之為農者孰不勤於耕此天子之仁愛天下而使之務本也所以明仁也以天子之尊而必親耕以供粢盛則天下之為子者孰不勤於養親此天子之孝先天下而使之養親也所以教孝也月令有之曰孟春之月天子乃以元日祈穀於上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵於太廟三公九卿諸侯大夫皆御命曰勞酒謹按元日上辛也元辰郊後吉日也日以干言辰以支言互文也則是躬耕之典當行於祈榖之後而同在孟春之月也考之周禮天官甸師掌師其屬而耕耨王藉以時入之以共齊盛此即天子之藉田而甸師掌之者也然藉田不獨天子有之諸侯亦然祭義曰天子為藉千𤱔冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川先王以為醴酪粢盛於是乎取之敬之至也是故千𤱔百畝之數此天子諸侯之視為等級而其躬耕以致敬則一也祭統曰天子親耕於南郊以共粢盛王后蠶於北郊以共純服諸侯耕於東郊亦以共粢盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂敬敬盡然後可以事神明此祭之道也是故南郊東郊之殊此天子諸侯視為分别而其親耕以致誠信則一也後世躬耕不行藉田漸廢周宣王不藉千畝虢文公諫曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給於是乎在和協輯睦於是乎興財用繁殖於是乎始敦龎淳固於是乎成觀於此語而知藉田之義廣矣大矣漢文帝二年詔曰夫農天下之本也其開藉田朕親率耕以給宗廟粢盛夫文帝漢之賢君也此禮既舉後之明主亦猶能踵而行之然唯天子行之畿內天子而下無復有議及者幾比於繁纓大輅之不可請近代郡縣大者不惟比於古公侯之國而小者亦逺勝於子男之邦則藉田之禮皆所當行乃不唯郡縣不唯督撫即天子亦不能歲舉此禮即使嵗舉此禮而郊畿而外雖公卿大夫鮮有能講明其義者今聖天子特舉躬耕以為天下先自督撫以及郡縣州衛所等官凡在守土之司通行耕藉之禮此誠千古未有之曠典也臣身為總制兩省封疆一身表率况滇黔在萬里之逺僻近蠻荒一旦躬逢盛舉不獨山農野叟實所未聞即縉紳士夫亦無從考核臣不揣膚陋用表彰其義著為藉田先農二説宣示僚屬遍告農夫使知我聖天子本此仁孝之至推廣誠敬之思而其所以為天下臣民祈天永命以同享夫萬邦屢豐之慶者其用意誠深且逺可不共殫其仁孝誠敬之心以奉聖眷而答天休哉至於耕藉儀注已詳於會典位有尊卑禮無二致可倣其意而行之無所容末議也臣謹稽首而為之記先農説鄂爾泰藉田之禮宜祀先農夫先農何神也始於何時神位宜如何書壇設何所涓吉何日陳設何器祭享何品樂奏何章既躬親其事敢不先考正其説試為略言之古聖王之制祭祀也法施於民則祀之是故厲山氏之有天下也其子曰農能殖百榖周棄繼之故祀以為稷此祀稷之始也共工氏之霸九州也其子曰后土能平九州故祀以為社此祀社之始也而郊特牲稱天子大蠟八先嗇一神農也司嗇二后稷之官也農三古之田畯有功於民者也郵表畷四郵亭之舍標表田畝田畯居之以督耕者也貓虎五貓食田鼠虎食田豕皆有功於稼者也防六水庸七防隄也以蓄水亦以障水水庸溝也以受水亦以泄水皆農事之備也昆蟲八螟蝗之屬害稼者也是故蠟之祭有八皆以為農而以先嗇為主蓋以神農為八神之主此祀農之始也班固食貨志又從而申其説曰闢土殖榖曰農炎帝教民殖榖故號神農氏謂神其農業也又厲山氏有子曰農能殖百榖後世因名耕氓曰農其言農之義甚著而先農之稱考之於經未有紀載惟劉向五經要義曰壇於田以祀先農如社衛宏漢儀春始東耕於藉田引詩先農則神農也魏秦靜議風伯雨師靈星先農社稷為國六神晉泰始四年耕於東郊以太牢祀先農周隋及唐所稱先農皆祭神農於帝社配以后稷即貞觀初太宗親耕東郊仍藉田壇之名埀拱中乃以藉田壇為先農開元十九年祀神農於壇上以后稷配二十三年親祀神農於東郊配以勾芒遂躬耕盡隴止乾元二年詔去耒耕雕刻天子出通化門釋軷而入壇遂祭神農以后稷配冕而朱紘躬九推焉憲宗元和五年詔以來歲正月藉田太常修撰韋公肅言藉田禮廢久矣有司無可考乃據禮經參考開元乾元故事為先農壇於藉田此先農壇之所由來也漢文帝紀二年春正月丁亥開藉田唐禮樂志孟春吉亥享先農此春月亥日祀先農之所由來也臣於是本之經佐之史核之國朝會典而為之參酌其制即如今之於神位也則書曰先農之神蓋以神農后稷皆各有専祀而於此則統而書之也然以頒示天下使農夫皆能曉其義則必實指其名而數之曰某某教農之君某某勸農之官也使農夫皆得津津口頰轉相稱誦愛慕嚮往而後其用力益勤則是先農之位宜主神農而配以后稷神農居中后稷居右皆南嚮田畯以下依八蠟之祀皆東西向比於兩廡之祀而位次正矣諸侯親耕於東郊則督撫以下藉田皆宜在東郊先農壇在藉田之北壇門南向中為先農壇壇髙而方四面有階祭日奉神位以祀壇之後為神庫如宗廟寢室之制以安神位壇之前旁為瘞池以瘞毛血神庫之左為神倉儲藉田之榖以供粢盛酒醴神庫之右為宰牲亭以供親割壇門外為觀耕臺臺下為藉田壇之旁别置齋室未祭而先齋既祭而燕皆於其地而壇基立矣古之躬耕在孟春元辰後之躬耕在孟春吉亥宗乎古則宜用元辰法乎近則宜用吉亥但孟春之月土雖脈發凍未全解今酌以仲春之吉亥而吉定矣其在祭器則三爵一尊酒盞三十登一鉶二簠二籩十豆十篚一俎一毛血盤一爐一燭臺二香案一祝板一而祭器備矣其在祭品天子則用太牢今督撫以下唯用少牢餘無可減爵實以酒醴登實以太羮鉶實以和羮簠實以黍稷簋實以稻粱籩實以棗栗榛菱芡鹿脯白餅黑餅形鹽薧魚豆實以菁菹芹菹笋菹韭菹鹿醢兔醢魚醢醓醢脾析豚朐篚實以青色量幣爼實以羊一豕一而品物齊矣若夫樂奏七章則以丁祭樂舞為之舞佾如其數迎神奏永豐之章奠帛初獻奏時豐之章亞獻奏咸豐之章終獻奏大豐之章徹饌奏屢豐之章送神奏報豐之章望瘞奏慶豐之章七闋既終而樂奏成矣未祭之先自齋宿以至於省牲省具演禮演樂祭之日自迎神以至於初獻終獻送神望瘞悉如文廟之儀而大禮舉矣位次正而心不疑壇基立而地不遷涓吉定而時不忒祭器備而知其不可假易品物齊而知其不貴殊珍樂奏成而無有不和大禮舉而孰敢不敬而先農説於是乎畢議明疏通邊方河道議巡按毛鳳詔麻城竊照雲南地方有水路直抵四川馬湖府初以遐僻為禹迹所不到遂為土人所據至我國家始設郡縣其地同於華夏然貢獻之物扛官使之行李軍民商賈之物貨擔負萬里筋力已疲而土官土舍因見道路阻絶每懷異志及今國勢強盛不行開道將來之悔不敢謂無也本道訪據武定府揭帖內開本府有迤東通四川水路自雲南海口至安寧羅次富民只舊你革逹吉普渡河安革法干土色至大江俱本省地方大江至四川東川地方大江邊阿納木姑共一十三站內土色有疊水又有迤西通四川水路自雲南陸路至富民武定虛仁環州至金沙江巡檢司凡五站本司金沙江水路下船至罵剌母白馬口燦剌則五曲革直勒則卓剌除魯圭寧抄答甸沙吉撒麻村亦至土色大江阿納木姑凡一十四站內則卓沙吉有疊水等情又據金沙江巡檢司應襲巡檢土舍李朝宣稟帖內開金沙江上至麗江瀾滄至姚安府武定府下至東川烏蒙芒部上江𢎞治正德間馬湖府安監生放杉板嘉靖十七年王萬安亦放杉板俱係拖梢大板大船經過或十餘隻或八九隻建昌行都司奉欽取大木寧番越嶲鹽井建昌等五衛俱在上江打沖河三江口并德昌千户所地方或劄􅑉或散放會川衛在下江科州採斫查審開江船行若問灘水險阻魯開虎跳灘天生橋十分不為險阻等情又審據本府薑驛驛丞梁松等稟稱本驛設在金沙江巡檢司之西過江五十里與四川會川衛抵界每見客人來販木劄成􅑉筏自本司江流而晝夜六日即抵馬湖隨􅑉下船或一二十隻裝載糧食有養豬畜客人跳􅑉擲船如履平地離本司江下五十六里有大小虎跳灘係是金沙江至冬春水落之際可以施功開鑿等情又據本府揭帖內開據經過建昌客人何松執稱建昌衛管下德昌守禦千户所洗迷村伐木下江頭一程至白水站一程至會川衛管下甸沙關一程至梅易千户所三程至武定府和曲州金沙江等情隨喚何松亦稱馬湖建昌等處客人採取大小板枋俱自德昌下河從金沙江巡檢司經過直至馬湖敘州令伊畫圖各到道為照前項河道武定迤東極為捷徑且甚便益但訪得河內間有蠻尖石兩邊巖石生合成橋水從石縫流下未委虛的若迤西金沙江則水面洪闊四時橫流客商通販前後不絶中間雖有虎跳二灘然皆沙石易鑿此則斷然可通而無疑者也先年巡撫都御史黃衷會議開修取金沙江巡檢司曠愛招集馬湖橫江客人俱到布政司舉行間以升遷中止近年巡撫都御史汪文盛亦曽委官踏勘以征南中止事功之會人咸惜之合無批行總司會同布都二司從長議計先將東西二道各委能幹文武重職帶同屬官多給官銀督同本處土官土舍俱優其廩給帶領木竹石鐵等匠厚其口糧衣鞋沿途用銀雇倩熟知地利鄉導人役隨帶小船及沿河採買木竹劄為􅑉筏乘載通行逐處踏勘直至馬湖大江而止中間要見舟楫無礙經行者幾處危石可鑿者幾處幾丈尺如有絶險人力所不能施者或作兩截盤運沿河陸路可通者幾處不通者幾處應合開闢者幾處幾里幾十步及沿河有無人煙稀密堪立驛遞鋪分哨堡等項各計合用夫力工匠若干錢糧若干悉心料理勘估明白畫圖帖説並將用過官銀具由造册回報然後擬議奏請行委三司堂上官親詣督理開通施行則不獨一時一方之利實國家久安長治之計也本朝捐助廢員回籍議布政使陳𢎞謀臨桂議得去任之廢員例當依限回籍即病故之家口亦宜扶柩歸里此固功令所當遵而亦生人之至願也祇以滇處天末萬里迢遙跬步皆山舟車莫濟凡赴任來滇者尚以資斧維艱莫能依限早到况當一官罣誤旅邸蕭條米珠薪桂慘度日之如年車殆馬煩雖稱貸而何補至於本官病故旅櫬飄零家口羈留還鄉無日尤極宦境之酸辛宜為同官所悱惻者矣伏惟憲臺胞與為懷哀矜備至將從前革職及病故者通查催令回籍猶恐窮途莫告無力還鄉飭令查款資助俾天涯枯骨得以返葬故鄉免遭暴露即去任廢員亦不致逗遛地方有干嚴例此誠仁義兼盡曲體無遺之盛心也本司道覆查縣丞吏目典史驛丞等微員革職解任身故無力回籍者已於康熙五十三年欽奉上諭通行各省設法資助回籍滇省已蒙各憲於核定公件時每年酌留一千兩以為資助微員回籍之費近經本司詳明分别革職病故酌量資助量已敷用至於文職州縣以上及武職回籍向來無項可動多係現任各員共敦寅好量力資助祇以地方逺近不一零星公分終苦願力不齊到處倡捐兼恐緩急無濟除一面通查從前流落不能回籍廢員及靈柩不能歸里者俟各屬覆到逐一敘明緣由另詳外所需助費自宜先行議款查司庫經費日繁年徴公件久已入不敷出間款無多終非長策本司道等愚見莫若仍於倡助之中酌定畫一之舉查滇省司道以下州縣以上除不經徴錢糧之廳員不計外每年共有養亷銀十三萬九千餘兩擬以養廉每百兩捐出銀一兩合之共得銀一千三百餘兩即從雍正十二年為始無論署事兼理應得養廉之數扣存司庫俟查明廢貟及家口靈柩實在不能回籍者文官知縣以上武官守備以上酌量道里逺近家口多寡詳請憲示批定數目於此內動給如蒙憲臺格外加恩另候核奪統俟報有起程日期始行發給毋使領去花銷逗遛請益其文職因貪贓去任及離任未久力能回籍武官籍係本省者不準幫給嗣後永以為例本司於年終將扣存銀兩及捐助過數目造册送憲查核如有餘剩留存下年如此番通察資送之後將來自必漸少公捐之數積有餘剩亦可留辦不能開銷公項之善事在現任之員非其屬貟即其寅好每年所出無幾較之零星捐助原無加多而聚少可以成多衆擎更為易舉從此官遂首邱之願不致流落異鄉魂無羈旅之悲均得早還故土去任者無招搖滋事之惡習地方官無失察容留之處分所以崇厚道而廣皇仁凛功令而肅官體者均於是乎在憲德所埀當於蒼山洱海共其髙深矣義學規條議陳𢎞謀竊惟人材之興惟資教育風俗之易端賴詩書蓋師道立則善人多士習端則民風厚實積漸之使然而非旦夕之可致也滇居邊末漢夷雜處仰沐聖化之涵濡無逺弗屆固已聲教日隆文明漸啓矣而貧寒子弟猶苦無力延師夷猓鄉愚或苦不知向學教澤未廣則士習難以變遷化導未周則民風終於喬野故邊省義學視中土為尤急而鄉村義學視城市為尤急案查滇省義學荷蒙憲仁加意作養設法振興義學之設所在多有而於改土歸流之處俱奉題明設立義學或動公件或撥官莊其為化誨邊民之計誠足以樹之風聲而各屬之仰體德意者亦各捐建學舍置買學田祇以地方遼濶或止設於城市而未及於鄉村公費無多或止行於目前而未經其久逺即其原有公田而或被隱占或被侵收地方官以度支不敷經理為難不無因陋就簡之意本司到任以來時承兩憲諄諄提命留心教養曽經通檄行查將現在開設者為某處應行增設者為某處目下修脯作何出産從前公項有無侵占如無公項即將所需之費核定具覆往返駁查不遺餘力經今二載據雲南等府屬及各提舉陸續造册詳報前來本司逐加查核如雲南府屬之昆明等共四十九屬册報城鄉設立義學共二百八十一所或舊有學田或新經添置或於官莊餘榖并叛産公租內撥給均已足敷束修其雲南府屬之呈貢等十一屬所設義學五十二所或稱田租不敷或稱現在捐給本司竊念義學之設必使費有常經庶幾事可埀久因逐加酌核按其所缺之數及買田之費於本司養廉內捐銀一千二百五十二兩飭令各該屬買田收租永供修脯至於設學既多必須詳立規模始可永行無弊謹擬條例四則恭候憲奪一館師宜慎也成材之學取法宜上經館之師選擇宜嚴地方官留心採訪無論本地舉貢生員及外來紳士必須立品端方學有根柢者延之為師至於城鄉蒙館即於本地附近生員儒士內慎選誠朴自好不與外事者為之地方官不時稽查勤惰並令教官按時協查如能克端師範實心訓課該州縣優其禮貌時加奬勵果有成效於年底報明本司量行優奬如虛糜修脯惰於督課者查明另延倘有不安本分於設學之村寨唆訟生事愚㺯夷民者是不得義學之益反滋漢姦之擾立即另行延請仍將所犯查審詳究以示懲戒每歲開館以正月為期散館以十二月為期開館時地方官將某館延請某人為師於何日開館之處具報至歲底散館將某館生徒若干成材若干幼童若干注明漢人夷人申報查考不得遲開早散有名無實虛糜館榖一化誨宜廣也成材之士務在敦勉實學習讀佳文不可仍踵陋習専工浮靡請將憲臺所刋書院條規及斯文精萃分發成材各館令其師生人等専心傳習并令館師將存心立品居家治事之道隨事指點切加勸戒至於蒙童則課讀而外必訓以拜跪坐立之禮儀君親節孝之大義每逢朔望館師率領各徒以次序立拜謁至聖次拜館師次令各徒交相拜揖館師於該地方敬將聖諭廣訓明白講解令各學徒環立聽講并許該處耆老民人齊集聽講上年本司詳請印發聖諭廣訓及本司恭繹聖諭均宜按館補發又本司前歲重刋朱子治家格言四禮四禮翼原為興行禮教起見均請按館分發以上分發聖諭及各書均交館師遞相交代毋使遺失一學徒宜分别遞升以示鼓勵也在城義學成材為多在鄉義學蒙童為多然亦有蒙童而儘可造就漸至成材者是不可不遞加甄别如蒙館義學內有資性聰穎勤於課業可以學文者即升之在城經館此等逺來就學薪水維艱該地方官量給膏火以示奬勵即城中蒙館童子能曉經書學為文字者亦即升之成材經館如經館中有成材生員文筆可造而人材又復可觀者仍許遵奉憲檄量給盤費給文送至省城候兩憲考取送入書院讀書如此層遞進取猶是古者由鄉而國之意而鄉僻生徒各知奮志觀光將來于此中提拔數人轉相傳授士習文風均有裨益至村寨蒙館夷猓子弟鮮通官語不識漢字其始必以讀書為苦是在地方官加意引誘設法奬勵並令館師用心開導俾先通漢音漸識漢字并即訓以習禮明義不得以夷猓而忽之更不得以夷猓而拒之如有土目頭人阻撓不許向學者立即究處一田租歸官經理以杜私隱也從前學田州縣並不管理或教官經收或館師自收易致盤踞漸多侵隱今撥給各館田𤱔有一處而分給數館者有數處而同給一館者零星分收完欠更難查察嗣後均應歸地方官經收分給館師不許館師私收不許胥役分肥或租田附近學館地方官即令老成鄉約人等催令租户眼同就近上納并將納過數目報明地方官查考如有拖欠立即追比倘秋成尚逺館師不能枵腹課讀地方官量行捐墊取領存案於秋收時還項并將此田地租息另給佃户執照於照內填明田畝坐落丘數租斗數目取具佃户租約如佃户逞刁抗欠追照另行招佃將來新舊官交代一并另造清册交代可也以上所陳如蒙憲裁核定通行飭遵則既有一定之經費又有一定之事冝庶不致有名無實有初鮮終從此星羅碁布處處有絃誦之風目染耳濡人人親詩書之澤行之既久禮義足以化椎魯習之既深學問即以變氣質不特可造之俊士有所淬礪以觀成抑且難易之夷風皆可漸摩而胥化聖朝樂育之深仁憲臺訓型之至教必且永永無極矣所有原設新設各義學館師姓名田畝坐落丘假條糧租息等項相應備造簡明清册詳請憲臺查核其捐銀新置之産行令作速置買另册報核至駁查未覆之二十二屬俟覆到另詳造報如現已設有義學之州縣尚有應行添設者亦令隨時續設另文報查暫就庵觀之學舍亦令陸續建造是否有當相應詳請憲臺批示施行雲南通志卷二十九之十一欽定四庫全書雲南通志卷二十九之十二考明百濮考布衣董難太和牧誓庸蜀羌髳微盧彭濮人傳曰庸濮在江漢之南疏曰此八國皆西南夷也逸周書伊尹為四方獻令正南百濮爾雅南至於濮鉛鄭語叔熊逃難於濮而蠻楚蚡冒始啓濮劉伯莊曰濮在楚西南左傳巴濮楚鄧吾南土也又云麇人率百濮伐楚通典有尾濮木綿濮文面濮折腰濮赤口濮黑僰濮周書王會篇卜人以丹砂注云西南之蠻蓋濮人也諸濮地與哀牢相接余按哀牢即今永昌濮人即今順寧所名蒲蠻者是也濮人之俗用麂尾末椎其髻且好以漆飾面通典所云尾及文面言其飾也木綿即攀枝花濮地多産之可以夾纊言其居産被服也折腰濮人見尊者則折腰以趨言其禮俗也赤口濮人調舌為音如鸚鵡然言其舌聲也黑僰其色多黑言其種類也濮與蒲字音相近今訛為蒲耳或以全滇之地其人百種槩名曰濮亦甚謬矣百濮所居連壤余又以僰音按之濮字在僰音亦合一屋韻蒲字在僰音亦合七虞韻僰語稱其人為濮而不稱為蒲是一證也又濮俗截大竹為筒以注水謂之濮竹如郫筒之得名以此驗之益彰彰矣今之論百濮者既不得其地又不得其音雖近濮地者尚爾懵然余因稽之載籍證以方音作百濮考序唐西南備邊録序失名唐太和四年十月戊申制詔兵部侍郎臣德裕節度劍南西川維蜀西控戎索南接蠻服昔在中葉武尅不剛蟊賊內訌蛇豨薦食表撑裏拓猶懼侵軼未隂綢户莫急二邊於是先事候情并謀合智料敵勢扼地險計軍實而備邊録作焉即十三卷之簡見萬里外之情所以制勝無形銷患未萌也兹不可無序夫破敵於一方其策易備敵於多方其謀囏朔方既城薄伐于西文王其勤也玁狁既攘鞫旅于南宣王之武也針芒瀉氣蟻穴潰堤智慮不周捍防不密則疆場之虞不生所備而生所玩吁可懼哉然山川厄塞非圖莫見兵財盈虛非書莫著是故軍防有録撰于天寶九州别録上於貞元禦夷新録奏於元和元振述安邊之策敬輿條備邊之失前英後傑帷籌幄畫詳已然之變忽未動之憂寢薪為安折栁為固猷之不逺寇將生心德裕身佩西陲之任得不為南鄙慮乎方唐盛際德威溥揚北縻突厥東憺遼海窮髮反景悉主悉臣文恬武嬉喪羊于易吐夷開釁河隴失險締從南詔協力謀我岷江飲馬倚為先鋒井絡坤垠我圉孔棘有守曰臯鑿青溪道要結蠻好掎鹿效順纂集事狀為卷十七質幣結轍闓户誨盜戎膽雖讋蠻禍始萌徑入成都如升虛邑唐之君臣日旰食矣疇咨良翰矯失刷恥爰命德裕抗旌秉鉞葺殘奮怯改紀其政乃建籌邊之樓凡險要與蠻相入者圖之左與戎密邇者圖之右而部落饋餫靡不察乃立雄邊之軍其精兵曰南燕及連弩騎士曰飛星及突騎而農戰器械靡不飭大渡孰制城以杖義榮經孰控城以禦侮西山孰厄城以柔逺復卭崍關徙越巂治而蠻之齒寒怛謀納款維州歸璧而夷之氣奪猶慮敵去而備弛也兵將糧械之數城鎮種落之名嵗計經用之目講求利病輯為一書諸郡故實外夷情狀臚分縷析燦如指掌創立陴壘成以朱書總繪小圖標之首卷而第四卷序維州本末尤悉書成于太和六祀逮會昌中秉國之鈞始奏上之觀諸文集猶有可考二邊方騷而金湯之二敵孔熾而霆雷之匪碩畫沈幾曷克臻茲藏之禁嚴副在邊瑣日戒夕惕庶克有定大中而後慆憂好暇懷燕安之毒玩鷙擊之形河湟歸疆西顧無騎壒矣厲階之梗惟蠻為甚餂粳及米繇劍而嶺乾符之季有臣雲虔自雍管涉川陸四十七程至善闡以南詔録三卷獻于朝吁德裕之録以蜀備蠻藩籬之冦也雲虔之録以雍備蠻則闖然入户庭矣憂先於事事至而憂奚翅銖石之差與據往鑒新不可不毖患於微眇也易之蹇曰利西南必有六二匪躬之臣而後能濟蹇難德裕以之按唐藝文志是録列在兵書今館閣書目存者一卷餘軼不存我思古人愛莫起之撫陳編而三歎謹序元志略序學士虞集臨川京師西南行萬里為雲南地方廣萬里昔我世祖伐而取之守者勿能定既即位奠海內使省臣薩達克齊往撫以恩惠沿俗而道之善利鎮以親王貴人者四十年方是時治平日臻士大夫多材能樂事朝廷不樂外官天子憫人之失牧也常簡法增秩以命吏而為吏者多徼幸名器無治術無惠安遐荒之心禽獸其人而漁食之無以宣布德澤稱旨意甚者起事造釁以毒害其人其人故暴悍素不知教冤憤竊發勢則使然不然惡生樂死夫豈其情也哉嗟乎昔者簞壺迎徯之民日以老死且盡生者格於貪吏以自逺於恩化其吏士之見知者無所建白而馭於中者又不識察其情夫一隅之地常以為中國憂而論治者卒未究其故不亦悲夫河間李侯景山由樞密宣慰烏蠻烏蠻雲南一部也始下車未及有所施會羣蠻不靖按行調發餽給鎮撫周履雲南悉其見聞志略四卷因報政上之余按而讀之考其土産風氣服食之宜人物材力之愚智勇怯山川之形勢厄塞要害而世祖皇帝之神威聖略概可想見未嘗不俯仰而興歎也其志曰張喬斬姦猾長吏九十餘人而三十六部盡降諸葛孔明用其豪傑而財賦足以給軍國史萬嵗貪賄隨服隨叛梁毗一金不取酋長咸悅李知古以重賦僇尸張虔陀以淫虐致亂此於事至較著明白者也其術不甚簡易乎有志之士尚有所覽焉至讀其紀行諸詩必有悲其立志者矣明董莊愍死節威楚序參政謫戍王奎松陽龍亡虎逝而羣狐嘷風披雲靡而震霆作此可以覩大人之變明治化之迹也按元史龍溪集紀天厯初雲南中慶路鎮將敗狐叛遣兵攻威楚官吏或逃或屈獨知事董文彥義不從賊鋭聲詬罵賊不忍聞截其耳以塞其口文彥嚼血唾賊罵不絶聲賊怒裂而殉之明年敗狐伏誅憲司以事聞朝廷嘉之諡曰莊愍旌其門官其子時中豫斥臨安時中為文學掾一如集中言泣且請曰先父不幸死賊手雖褒嘉於朝時中懼其事之荒湮也先生以文章顯幸為我序之嗚呼忠臣烈士何代無之求之夷服曽不多見昔安祿山以范陽反顔杲卿死河北張巡許逺死睢陽雖武夫小卒皆知盡節闔城皆然華夏忠義之習無怪也唐史列之於傳植大義於後世者至矣敗狐之叛中慶大藩也威楚大都也省府大臣不死之風紀執法不死之刺史不死之知事一夷人耳食九品秩乃凛凜乎仗大義樹大節寧死而不顧見理明而臨事不眩也使天下之人皆若文彥則叛亂何繇而生哉豫生也後仕不先人不獲與太史著作之列而元史不載莊愍死節事豈史闕歟抑在夷略歟抑述史時雲南未附不得聞歟以未附闕文君子固不能無憾以在夷而略則失之逺矣因為述之於簡以補史氏之闕通志序巡撫鄭顒錢塘景泰甲戌孟秋七月有詔纂修方輿志書禮部奏選文學之士授以條畫分行天下俾其所至會諸方嶽儒臣廣搜精擇計偕以上而進士王榖實來雲南衆議右布政使陳君安簡宜總其事君承事惟謹暨諸文儒夙夜在公殫心竭慮期搜訪之必精尋故鈎新在去取之皆當不四越月而志書告成將鋟梓以傳詣豫丐言為序惟雲南之事載在漢班固西南夷傳者舊矣至元李景山始為志略然其時聲教初及制度簡率文章之事未甚明備道德風俗之美未甚同一宜乎搜訪者難精而該載者不博也我朝奄有天下幅員之廣疆域之大振古莫及雲南以險逺後服太祖皇帝特命勳臣鎮之迄今七十餘年山林川澤墳衍原隰物産之富郡縣城郭疆理之雄靈壇古迹琳宫梵宇之勝園池樓閣亭臺館榭之麗賢臣哲士之生於其鄉仕於其地詩書禮樂之教養其人於是道德既同而風俗丕變矣孔子曰如有王者必世而後仁此其時耶雖然禮樂文章之明備道德風俗之同一固由悠久教化之浹洽然非得人纂修抑何以成昭代制作之盛而覩今日大一統之寰區哉是書逺稽諸經近考史籍井疆里俗食貨藝文之事古今因革損益之宜條分縷析明白詳盡可謂無遺漏矣而陳君搜訪去取之當亦於是而有可考焉滇候記序楊愼見前逺逰子曰千里不同風百里不共雷日月之隂徑寸而移雨暘之地隔壟而分兹其細也太明太蒙之野戴斗戴日之城或日中而無影或深暝而見旭或銜燭龍以為照或煮羊脾而已曙山川之隔閡氣候之不齊其極也是以有測景之圭有書雲之臺有相風之竿有候風之律海有星占河有括象以此知其不齊也故曰不出户知天下天下誠難以不出户知也非躬閲之其載籍夫九邱之書志九州之異也佚而不傳周處作九州風土記宗懍作荆楚嵗時記至於巴蜀異志嶺表異録皆是物也余流放滇越溫暑毒草之地鮮過從晤言之適幽憂而屏居流離而閲時感其異候有殊中土輒籍而記之豈欲妄意古人乎他日冀萬一釋其棘矜歸於氓甽焚枯酌醴班荆坐茅與擊壤之老聚沙之童晨夕話之亦可以代博奕之為矣雲南鄉試録序楊愼聖天子嗣大歷服之十九年實惟閏之一章入庚子蔀首粵當三物賓興期雲南巡按御史某申令甲嚴法癸葺試寏昺文軌業爰飭其故期不愆於素乃以布政司某司調按察司某司監郡大夫若支郡大夫邑郎官洎流末官咸慎選精遴昈局蒞事罔弗虔學官某輩若干人應聘以屆罔弗共闔滇之校四十有二入彀之士二千有竒皆提學副使某所睫擇也先長夏回星淖雨湛􅴐及初商應律啓􅨡升陽乃甲子鎖院御史􅌊蕭誓衆曰矢公矢慎乃違此二矢昕有如日暝有如燭乃臚唱諸士而試之戊辰一之辛未二之甲戌三之題則紬簡刺之卷則分經閲之公簾以內司試者鐍之夋夋如也鰓鰓如也公簾以外司調司監者分職之魚魚如也雅雅如也御史又實臨內外而綱維之翼翼如也井井如也拔簡其試之中得草人鍥雕其文之優草首為雲南庚子科鄉試録以獻某濫竽授簡拜手揚言曰大道散而有六經六經散而有諸子諸子之是非取裁於六經六經之刪修折衷乎聖道三代而上道見於事業而流衍於文章三代以還道寓於文章而不純於事業故鄉舉里選取其事業矣敷奏明揚取其文章矣兩漢以經術對策取士六朝以品薦詞華甄人隋合南北始有科舉最盛於唐增光於宋而其得人之效視三代蔑矣我太祖髙皇帝重奬天衷再造人極掃舊元之晦盲否塞復三代之純固惇龎日而月之星而辰之彝而倫之文而章之君師之道兼隆仁聖之事畢矣嘗伏讀科舉之詔矣易用程子傳朱子本義書從夏氏蔡氏兩傳詩采漢箋暨集傳春秋本三傳兼胡氏禮記則古注疏與陳澔集説裁訂自淵衷參采乎諸儒使孔孟復生亦無異論也又嘗觀先正首科之題辭矣曰初場在通經而明理次場在通古而贍辭末場在通今而知務上之涵養乾知大始下之承順坤作成物菁莪朴棫之化梓材多士之興良有以也丹青既久而渝神化亦窮以變厥今士習何如哉其髙者凌虛厲空師心去迹厭觀理之煩貪居敬之約漸近清談遂流禪學矣卑焉者則掇拾叢殘誦貫糟魄陳陳相因辭不辨心紛紛競録問則呿口此何異瞍矇誦詩閽寺傳令乎窮髙者既如彼卑論者又如此視漢唐諸儒且恧焉况三代之英乎聖祖制舉之美意舉賢求士之良規豈端使之然哉今皇上逺述唐虞近法聖祖屢下明詔鋭意作新文必宗經必法古必崇雅必黜浮菁莪之詩梓材之書復作於今日收濟濟之士迓穆穆之衡行嫓於古先諸士乎沐薰濡化提耳面命是千年之期而一朝之遇也况爾滇雲聖祖常有諭言曰氣厚風和君子道行之所爾諸士子生其鄉邦久佩謨訓矣一人之身且有新吾三日之士尚猶刮目矧曰涵泳已百七十載濟濟數三五六經諸士朂哉今日之滇雲非昔日之滇雲矣朂哉不以一第自滿而以三代之英自獻某也願徼榮靈假於諸士子僭書以俟大理府志序楊愼大理滇西繁雄郡也緣洱水出罷谷為西南巨浸蒼山像靈鷲為西南巨鎮而襟帶而巖險而物華而人英又褎然育煥然縟犁然有當於中土之奧區卓乎無謝於南溟之竒甸焉嘗稽之往籍緯書云神農地過日月之表則日表骨利月表青邱滇池比之猶為邇封陸終為黃帝之所娶若水為顓頊之所生産里為湯亳之貢國濮人為武牧之征隊載籍昭然可以覆視奚待常頞為通道始而唐蒙為開郡先乎昔之郡乘方志事狀行紀若韋臯若徐雲虔若竇滂若樊綽若韋齊休若陳隱之所著雖曰臚列實則録存書亡若勝國之李景山昭代之王景常籍焉具存然或失之誤或失之略山河若柯戒而以一經行盡之幅員數千里而以一卷帙約之原本山川有恧其能説極命草木無裨於多識矣柱史溫泉郝公翻舊志而病之乃徴議於督學憲使默泉吳公參伯龍山沈公僉憲膠峰安公板令於太守黃巖蔡公蔡公奉楮及幣禮謁給諫𢎞山楊公荆守侍御中溪李公二公家本郡人官舊史氏多識前代之載且諳土著之詳於是攄懷舊之蓄念發思古之幽情立創新例大增舊文閲數月而新志成集二美而卷帙合時則黃巖公政成化流之暇宅生居方之餘也而古迹英躔琳宫寶地表昔賢之遺愛供騷人之景物者一一鼎新之賁飾之輪之奐之詠之榜之不翅栁吳興之蘋洲謝宣城之疊嶂矣其為新志之助不亦多乎慎也恩譴裔土流戍滇隂紫城蒼麓夙嘗受館僦㕓香界㻁岑昔饒解鞍橫枕乃以首簡屬之孱毫非敢曰僭杜征南之先固願附張京兆之後云爾通志序御史李元陽太和前史稱兩漢四履之盛東樂浪西燉煌南日南北鴈門西南永昌永昌在南中為逺郡舉逺以見近也漢章帝元和間滇池出龍馬四白烏二因遍置學校漸遷其俗由此言之雲南在漢文約之所漸被聲教之所周流其來久矣據兩漢書武帝元狩間置益州等四郡領縣四十有二其時循吏王阜張喬等十有二人至唐天寶以後邊吏無良群夷忿怒始有割據之禍宋室之興棄而不取二百年間隔為異域兩漢風猷斬然莫繼嗚呼士生斯時能不荒陋者寡矣矧文獻哉我髙皇帝恢復華夏奠正區宇置雲南郡縣視兩漢有加焉英皇命儒臣用禹貢職方之遺意為輿地一統志而雲南之建置至為明備正德間前輩括圖經為雲南志尚多闕略隆慶六年大司馬關西蘭谷鄒公開府南中首詢闕事惟時方伯長樂師岡陳君學憲長樂一水陳君以通志對公曰一方圖籍豈宜久闕遂命有司以六十年來諸所損益約四十餘條遍布列郡俾核實以報藩臬諸大夫謂陽齒居鄉右或識往事因屬筆焉頃之學憲蒞郡得以咨白義例面承指授然雖勉強操觚恆以年終為懼會大巡侍御解州兼山侯公陽信振樓馬公新鄉養齋郭公相繼按蒞皆蒙贊其決樂其成事有不容中已者乃遵一統志約其凡目粵稽歷代史山海水經諸子藝文汲冢周書以明其疆域土貢之離合采説文通典玉海鄭漁仲馬端臨之志考以證其經營廢置之因由逺取晉常璩南中志唐樊綽雲南志以及韋臯崔佐時徐雲虔所為南詔諸録近取臺院司道興革損益兵餉經費一切成規攟托野史搜訪耆碩言有物而事有程然後取法各省通志張立題部犁為十有二類而以事目繫之治道莫先於域民故以地理為之首庶政必遵乎制置故建設即次之民財民力其道貴節故賦役又次之禦侮備乏其道貴豫故兵食又次之養士以成賢育才以致用故學校科目又次之吏於其上而功德可思生於其鄉而行誼可述故官師人物又次之祀典在所必敬百神有時而宗故祠祀寺觀又次之稽往詔來必資辭令故藝文又次之羈縻雜志末之以此十二類括數千里華夷之地貫穿二十府古今巨細之事比次以倫追引無間析而第之為一十七卷豈敢遽言成書譬彼繪事先為素地云爾若夫品藻宦業豫奪人物則有宗工巨匠持衡於上非陽所敢預也重觀滇海序給事中楊士雲太和本朝聲教四訖稽古作程內簡臺史外列臬司觀風於天下一人大觀在上四方觀化於下非省方觀民何以設教嘉靖乙丑聚峰毛先生以臺史觀滇維時中官肆虐罔遏巨室封利罔懲戎心叵測罔馭曰茲惟亂本不可長亟疏論狀咸得請大閹罷鎮群醜慹服迄於今賴之報命中傷左官壬寅以僉臬再至再巡洱海攝詰戎兵維時僰氓久逸難變陵德敝化難間草竊潛作難弭甚而金沙可逹難於謀始曰茲亦惟亂本毋狃乃教民事毖民淫嚴斥堠議請疏江圖永久餘風用殄畢棄咎亦罔不咸賴升庵太史題重觀滇海張之鄉大夫士歌之進豫序之於乎觀之時義大矣觀之初六童觀罔鑒趣順謂之童觀斯昧六二窺觀寡鑒從順謂之窺觀斯狹六三觀我生自審行可謂之生觀斯察六四觀國之光明習國儀謂之光觀斯有融先生德兼三四應上近五故茲觀風上裨大觀下裨觀化隼可射狐可獲戎可戒孚可革冦可禦大川可涉觀民設教明哉熙哉滇職永利休哉可歌已豫聞在昔介軒王公澤州楊公觀滇有辭罔俾二公専美西南又可歌已其諸觀陜與天下者咸若是獨滇乎哉庸附羣言之首試田圖籍序尚書包見捷建水萬厯戊午滇闈論秀會侍御潘公攬轡至綱紀其事作人之效煥然改觀間者滇人士先後鱗集昆明亷得其二迤道里疲露狀慨然興愾謂管子伯者猶曰士首國之四民不可使雜處而令其言龎其事亂故聖主處士必於燕間誠慮之也比歲黔士良病逺涉業稍營公田庶幾少瘳今每飯未嘗不在牂牁也方書俱在豈滇黔一體而二視之遂一意節嗇廩費裒鏹若干金購田若干畝約三稔課輸租若干金以給全省應比諸士爰刻田之圖籍用識不朽一日函書南浦問敘不佞不佞竊歎公澄清萬里功績卓爍非一而此舉之大有造於滇人士也語曰一歲樹榖百歲樹人以滇渺焉天末徼聖朝道化翔洽士類蒸蒸羔鴈成羣制科之額視昔浸加乃士子丁風簷下筆陳詞鋒譬之於戰鹿鳴鶚薦目之為捷浸假士不紛志於旅資有彚征于泰茅皆作于公之醪纊以賈其餘勇則其志開而神王也夫然故公之養士為造士愛人為知人其樹風聲於滇者意可謂宏逺矣乃滇人士宜何如祈嚮以報公哉昔宋有饗士者登歌四章曰山曰水曰鴻鴈曰松柏而蘇子瞻繹以勉士之動欲難進靜欲及時為學而志於得其道至其論稼又惓惓於完地利識天時耕穫有度而津津稱古人之大過人者在博觀而約取厚積而薄發要非區區博一第明得志者至今讀其言凜凜為俗學之戒然則公之望我滇人士之得售者想亦子瞻之深意也夫千里比肩纍世接踵士倘有意力田逢年乎宜益知勉學以無為石田庶不負公矣本朝通志序總督范承勳奉天滇志何昉乎蓋自晉常璩倡之於前唐樊綽元李京之徒踵事而增華焉逮明聲教日闢景泰間右藩陳安簡奉詔纂修為書四卷嗣是李元陽包見捷劉文徴之數子者後先纂述滇志亦漸備矣獨是數十年來疊遭冦亂典章散軼即於灰燼之餘偶得殘篇要皆存什一於千百其失也或病其略嵗癸亥我皇上特命儒臣纂修大清一統志詔天下各進省志於時滇以逆孽初平諸務草創僅襲舊文攟托近事遵部限而上之未及精詳其失也或譏其濫略與濫皆不可以埀永久况滇雖逺在天末其山川險易建置因革與夫政教之興衰吏治之得失民風之醇疵是皆治滇者所宜亟講也詎可忽諸臣於二十五年欽奉簡命來制茲土見兵燹之餘其生齒凋耗尚未盡登也制度頽廢尚未盡舉也賦役繁重尚未盡復也文教尚未盡修武備尚未盡飭也日夜兢兢蒿目而憂嘗望古遙集欲得往代之賢臣善政奉為楷模而則倣之乃檢點遺文得其梗概三代以前無考矣由秦漢以迄於唐大率皆羈縻弗絶治人治法蓋寥寥也元之賽典赤其區畫經營之事至今父老猶能言之緬其遺躅邈然難追有明樹藩建節繄豈無人及末造法隨時敝以致豕突鴟張之輩職為厲階稽往事者每有遺憾焉自本朝戡定以來我皇上軫念遐荒恩綸疊下山川日益奠麗夷漢日益安帖溝洫日益疏濬土田日益開墾熙皥耕鑿者民風絃誦詩書者士習休息而蕃衍者户口輸將而恐後者貢賦雖山澤魚鹽之利不敵中州而樹畜稼穡之勤漸臻樂利撫今追昔未有如我國家之聲靈遐暢逺邁千古者也當此之時使滇志猶然闕略其何以揚太平之盛治昭大一統之𢎞規也哉臣因會疏題明載為續纂拜疏之日即嚴行設局敦請紳士以郡臣丁煒總其務學臣吳自肅督其成務令序次有規編輯有體分條析目據事直書既不敢失之略亦不敢失之濫庶幾滇乘有成書可埀之永久而告無過也已於以獻之當寧遐荒萬里如在目前安在志滇之書不可以為治滇之書也臣謹序所以纂修之由拜手揚言於簡端普濟堂條規序巡撫管總督事鄂爾泰滿洲天下聞有衰羸疲癃殘疾之人而不為惻然動心者哉無有也古之王者深憫乎此載之王制著之周官頒之月令其所以用意者至厚而所以為之經畫者亦至深且逺也後之君子踵而行之於是乎有養濟院之設由來舊矣我皇上加意養老曠典頻頒而於衰羸疲癃殘疾之人所在存恤京師廣寧門外有普濟堂者日活數千人以為常豫過其地輒式焉矜其人也敬其事也及奉命來滇百務待舉揆政所先無急於此於是飭藩司委邑令鳩工庀材堂以落成定為規條以埀永久俾世世遵行勿替凡以仰體我皇上軫恤斯民恫瘝時切之意云爾夫滇屬在邊方君門萬里似此煢獨幾無可告哀矣不意王風所被無間遐邇俾生斯地者與輦轂之下衰羸疲癃殘疾之人初無以異則孰不扶杖感泣願須臾無死以觀德化之成也雖然不唯其政唯其人不唯其始惟其終倘有其舉之莫或廢焉我唯願官斯土者依成法而守之當如一日也是則豫之所深幸也夫斯文精萃序總督尹繼善滿洲滇黔粵三省地處極邊自古人文之盛弗逮中土國家養育百年聲教四訖我皇上加意作人敦崇實學仁漸義摩之治舉遐陬僻壤咸耀於光明癸丑春詔天下設立書院特賜帑金以資膏火所以育人材𢎞造就者恩至渥也數年來封疆大吏蒞茲土者皆能仰承聖意化導多方購置經書增葺學舍以廣招徠邊方之士咸知觀感奮興蒸蒸然漸趨於盛然傳人代少讀書講課之法罕有師承且道路﨑嶇書籍難致其書院所藏又卷帙浩繁類非篇篇可讀人人得見者雖有矯然傑出之質而見聞弗廣誦習無資學者苦之余既蒞任之明年頑梗悉除疆圉寧謐顧維幅員遼濶苖猓錯居獷悍成風易動難靜非以詩書禮樂之教涵濡而馴擾之難望其化氣質而移習俗爰舉書院事宜與撫軍張覲臣學使吳潁菴藩司陳汝咨悉心籌畫立條約選真才延明師贍廩給凡所措置勿涉虛文冀收實效而又念士子無書可讀也于是裒集制藝詩古文詞每體各選一册旁搜博採悉擇理法並到辭意兼工者然後入選凡幾閲月而書告成名曰斯文精萃竊思讀書之要博學於文學問之道擇焉務精余少居遼海孤陋寡聞早列科名遂登仕版於文章甘苦原未深知嗣宦逰文物之邦名山石室頗足取資又因案牘勞形未遑旁及今者忝任苖疆一切籌邊裕餉吏治民生正多有志未逮何敢從事章句學操選政以博虛名雖然教育英才大臣之職也培植文風師長之責也職無可諉責無旁貸而或因陋就簡奉行故事士習何由丕振故於簿書之餘不辭焚膏繼晷與二三同志互相考定以成是編而又以購書無多古今之英華不無遺漏此余之不能無憾於斯文也然是編也雖選録稍隘實體無不備擇無不精無論自童子以至館閣應世之具取之裕如即舉數千百年以來君臣之誥誡政治之張弛凡有益於身心學問之事無不具載非徒可以文章目之者而且簡而能該要而不煩炳炳烺烺可歌可誦三省之人茍能奉為模楷實力研求因文以致行明經而逹用則上可以黼黻休明下可以教行鄉里邊境之人文駸駸日上庶無負聖天子興賢育才之至意及使者殷殷誘掖之苦心况推而廣之海內之士或留心採擇不廢揣摩亦未始非學業之一助云趙州志序巡撫張允隨奉天天下郡國之有地里志自漢班固始原於禹貢沿之周禮彬彬然可誦也後世郡邑州都建置因革更易代殊名稱之瞀考據者惑焉及唐杜佑宋馬端臨先後作通典通考薈萃天下之山川人物列為一部較之班志又為加詳矣然唐宋時西南叛服不常若浮若沉負版不載以是杜馬亦所從略蓋春秋謹嚴於內外之辨者此物此志也我皇朝誕膺天命統一華夷幅員之廣古今莫及而疆理之制則以京畿郡邑直隸六部天下分為十四布政司以統諸府州縣於是而各有志書紀其地里雖相沿於前代乎然蟠木流沙無雷向日靡不來庭而來王則合諸志之全而大一統焉蓋於斯為極盛者也雍正十年世宗憲皇帝特命詞臣纂修一統志分行各省修輯通志以備采擇雲南為梁州裔境自漢置益部以來稍通中國至今漸被聖化百年而後禮樂可興此其時矣省既開館延文學之士以黼黻之外而各府州縣皆同時興舉而趙州於滇亦推人文勝地故其為志獨能本諸經史弗諛弗誣此不特作者之學有本源亦以徴夫育秀鍾靈人可傳而事足信者匪徒以書肆説鈴觀之也州牧程近仁來請序豫維趙之於滇抑傳所云蕞爾國者也然自設州治以來四百餘年其間風俗之澆淳治理之得失田土之蕪闢人才之盛衰與時而遷變者多矣今聖天子在上加惠元元遐荒萬里之外若照几席守土之官但能宣布皇上德意以俾恩澤下究於百姓而不邀近功小利塗飾觀聽冀博才能之名則趙之民不將蒸蒸興起而悉臻夫至化之域也哉伏讀上諭云治天下者在於治天下之人心必使民氣和暢民情豫順快然知有里井之可安恬然知有室家之可樂斯為無象之太平閭閻實被其澤此必直省中息事寧人安全休養道在於優遊馴致而非可取必於旦夕間也大哉王言所當共勉夫奉宣德化教養斯民者守令職也巡省風俗而以愛民為稱職督撫大吏事也倡率鼓勵寧敢他諉故因趙州志之序而愷切言之嗚呼亦豈獨為趙州之志而言之也與哉重刋四禮序陳𢎞謀見前型俗莫善於禮而成教必始於家家而無禮則名分乖愛敬薄俗之流失端必由之紫陽朱子折衷古今損益羣籍著家禮一書瓊山邱氏因其文衍為儀節海內通行久矣萬厯中商邱宋栗庵先生省其繁重為四禮初稿大要不失朱子本意而節目簡易人不必縉紳家不必閥閲胥可行之余嘗謂是編也宜於中原寒素之家尤宜於邊方側陋之族是深得乎禮之意而通之不愧為朱子功臣也鋟板已失流布未廣欲重刋以行而因循未就今年春承乏滇藩滇地僻逺書籍罕至而夷漢雜居鮮克由禮其須是編也尤亟因鋟梓以行而朱子通禮司馬氏居家雜儀吕氏居鄉雜儀并婦人拜考證亦附刋焉誠使家置一編講明而遵守之於型方訓俗之道不無小補顧余涼德不足以感化斯人而地位與民弗親又不能躬進斯民而一一與之更始則夫不鄙余之迂拙而推而遍之設誠致行使教興於家而化成於州郡實於親民之良有司有厚望焉重刋近思録集解序陳𢎞謀子朱子與東萊先生讀周子程子張子之書擇其關於大體切於日用者編為近思録凡格致誠正之方修已治人之要節目詳明體用兼備朱子曰四子者六經之階梯近思録者四子之階梯又以窮鄉晚進有志於學無良師友之助者得此亦足以得其門而入朱子誘掖後學之苦心尤在於此平岩葉氏用力於此書最専且久所著集解原本朱子舊注參之諸儒辨論而附以已説明且備矣𢎞謀服膺此編攜之篋衍近見滇中罕所流布因出以重付梓人將散之列郡俾義孰家孰人置一編也夫滇士之有志於學者多矣得此編而沉潛玩索切已體認依類貫通由是以求濂洛關閩之全書以窮六經之奧旨當必有深造自得而不能自已者此余所切望於滇人士也刋既竣敬書於簡端以俟重刊小學纂注序陳𢎞謀五方風氣殊矣民生其間不能無剛柔輕重遲速之異而原其本始性善皆同古之聖人修道立教萃天下子弟於黨庠術序而訓之以彝倫日用蓋豫防其天性之漓而以蒙養為作聖之功意深逺矣子朱子所著小學其事切於童蒙而其理徹乎上下本之經傳稽諸往迹廣之以嘉言實之以善行所謂小學一書乃做人榜樣者此也今者躬逢聖世化民成俗之方至周至備各省書院絃誦多人固已十五國同風矣𢎞謀承乏六詔職司旬宣得陳請兩臺於所部郡縣廣設義學欲使邊方士庶均沐聖朝雅化則敦本行崇實學宜首務矣會梁溪顧右卿先生掌教五華書院出篋中所攜紫超髙君所輯小學纂注以示余余讀之愛其詮解明備考校無訛尤便初學因重為刋板附以童蒙須知頒之通省學孰俾逺方之士父師以是教子弟以是學所謂習與智長化與性成異日明體逹用胥於此立其基安見遐陬僻壤不可以敦本崇實之教教之也哉引本朝臨安重修瀘江橋引知府張無咎掖縣橋以利涉茍無關於水患一鄉之善士可為也即為之亦不必急若瀘江橋水患之所關甚巨者也橋跨瀘江之中上遊自異龍湖至者四十餘里其間白泥螞蝗諸溝沙石奔赴以十數計皆壅積河底水之去橋者三四尺耳所謂楚牙鴈齒渺不得見矣當秋之交隂霪為虐山潦交瀉洶湧之勢不得遽逹漫橋而過不獨居民纍月苦水而數十里隄防往往崩潰泛溢彌望洪濤郡之為害者此為最也前此歲歲修築但委之民便而為愚民惜力不實心禦患屢厪上憲憂余奉命涖任之初灼知其故爰與臨鎮及州牧祝君合謀捐俸數百金廣儲樁石遴員分督尅日興工浚河三尺以培兩埂於受水之區倍加指授雜植樹木務期一勞永逸雖煩民弗恤也於是上自謝家灣下迄巖洞昔之頽基斷埂者今則周坦堅厚可容車馬河患庶幾可免矣而橋之低平如故但橋不髙難瀉水勢水勢難瀉則兩堤不易保橋之增髙可一刻緩哉再捐俸為倡以郡人傅翁董其事雖責屬獨任而力須衆成俾其形勢穹窿吐納百川於以永慶安瀾資灌溉而茂桑麻千溝萬𤱔咸食盈寧之福者其為功不僅在往來利涉已也然則斯舉也寧可緩乎為序橋之當急以為勷其事者勸焉時雍正八年之月日也跋明禹碑跋舉人張含永昌於乎禹功神矣禹文亦神矣萬世永賴惟禹功四海永敷惟禹文萬世賴其功故百靈護其文矣鏤夏鼎藏包湖廬阜豫乃檋之詞孤山記道里之刻皆不可見可見惟此岣嶁碑一爾皇帝立元嘉靖之十有六載仁洽虞夏文貫姚姒滇蒙小子邇如皇畿得觀岣嶁刻集咸不能識其全既歸滇覩蜀都太史慎釋文字為之影句為之音含驚且喜曰何文苑藝林舉昧焉而楊子獨識之乎既而思曰夫禹生於石紐廣袤蜀之文禹開之也楊子生於蜀其所謂江漢炳靈世載其英將顯茲神禹之迹而默啓楊子邪故曰聖人為天口賢人為聖譯信夫初楊子讀此碑不得者四字夜倐夢黃衣魚首人告之曰此南瀆衍亨也篝火而覔之良若契焉故曰思之不通鬼神將通之故曰天地有官隂陽有藏待時顯也昔司馬遷亦漢太史也南探禹穴弗獲覩茲竒何楊子洎豫生後史遷幾二千年而幸獲見之乎故曰飛龍在天位乎天德見龍在田天下文明時之顯也義逺矣哉鏤鼎藏山之文將次第顯乎滇載記自跋楊慎見前史稱西南夷靡莫之屬以什數滇最大元封中以兵臨滇王舉國降然而未有稱也及張氏受姓後世迭君長者蒙氏鄭氏趙氏楊氏段氏髙氏凡七姓惟蒙段最久故著稱焉夷裔盜名號互起滅若蜂蟻然不足録也然至與中夏交綏接刃疲我齊民世主甘心焉以無用戕有用是可慨已漢司馬氏傳西南夷誠有意哉余嬰罪投裔求蒙段之故於圖經而不得也問其籍于舊家有白古通玄峰年運志其書用僰文義兼象教稍為刪正令其可讀其可載者蓋盡此矣滇僰於三代為荒服漢僅標分其方雖元以兵力勝之而不能守也於今列箐落而郡縣之馴鱗介而衣裳之華風沃澤同域共貫昭代恢宇前此孰並傳稱神農地過日月之表幾近是哉夫分隔之亂昔如彼大一統之治今若此干羽不警百五十年探言其故則金匱祕文縉紳罕覩况荒徼乎余慕宋司馬氏作通鑑采獲小説若河洛行年紀廣陵妖亂志者百二十家法孔子著春秋取羣書於百二十國也因是有感遂纂蒙段事以為滇載記然滇故老猶歷歷説平南事云潁川侯傳友德以文武才定昆明葉榆身先甲士手草羽檄功為第一振旅入都􅈴髙不賞絶世千僇後百五十餘年憲臣始為奏請立祠滇城又當時平南者有都督馮誠亦以讒忌遭難至今思其功而愍其遇余因附著之平段事後無使沒焉本朝重刋四禮翼跋陳𢎞謀見前明吕叔簡先生四禮翼吾師髙安先生稱其可與六經並存於撫浙時梓行其書傳誦通都而邊末獨少余來滇中較刋四禮之後復梓此本蓋行禮者其前必有所豫其後尤有所繼輔而翼之禮不虛行也吕先生為萬厯中名臣􅏡歷外臺所至著書汲汲以化民成俗為先務髙安先生在浙意亦猶是也自惟德薄能鮮未能仰希前哲萬一而勸俗型方竊有志焉天理自具人心非有方土風氣之殊至道即在倫常非有極逺窮髙之事人親其親人長其長於是書求之不逺矣事生篇末先生以祿養不逮兩親切終天之恨意悲語摯凡為人子莫不惕然動念余抱風木之痛尤不忍卒讀云重刋孝經注解跋陳𢎞謀經者常也孝為天地之常經聖人孝弟之至可以通神明光四海民則之而孝有始終亦可以行成而身立故孝經一書古今立教者之根本也伏惟聖朝以孝治天下鄉會兩試並以孝經命題欲使天下士子咸講求於根本之地亦既家置一編矣顧滇地刋本多為場屋揣摩而於全經奧旨儒先講義未能擇精語詳操觚之士樂其易從略知大意不求甚解余竊病之嘗從玉峰徐氏所刋經解中得讀孝經注解一書首列明皇之注繼以司馬文正公范淳夫先生之詮解發揮經旨殆無餘藴今特重加開雕廣為流布俾讀是經者深思體究各得其章􅍺指趣之所歸庶天地經常昭如日月將必衆著於親親長長之義不徒視為弋取科名之具云謹跋墓表本朝節士張葆孺墓表侍郎吕履恆新安嗚呼此有清節士張公葆孺之墓也豫嘗聞公行事不獲見其人幸其孫月槎出吾門讀所為公狀慨然想見其為人未嘗不激昻奮發興起其志氣竊嘆士節不可不砥也公諱良伍葆孺其字也又字允侯號黃石别號五聚其先蜀之巴縣人始祖均德為元明威將軍入滇家石屏州世有隱德曽祖汝橋舉鄉飲大賓祖煜然歲貢生官訓導父一甲明崇禎庚辰進士纍官至太僕贈大理寺卿妣王淑人公生而岐嶷篤學有志尚入郡庠食餼性善飲可一石至醉則豪吟睥睨旁若無人教子若孫講讀遵大理公家法足不履公門士以此重之吳逆之變建偽號開科趨仕者如騖公避居山村中飭諸子勿應試偽有司逼之力告養母不出後二年王淑人卒論者髙其節且服其先識云今夫平居談節義章縫輩類能津津齒頰間或語及逆節輒裂眥詆詈不使齒於人此非必盡偽亦天性然也一旦時窮勢迫搖搖然視其身如懸旌惟風飈所左右齷齪者無論已即一二自好者亦不克反衆獨立皭然自拔於塵壒之表然則士之克以節見者鮮矣至若分符守封疆為天子死其職如顔魯公之使李希烈假太尉之擊朱泚前史亦難之况以天末儒生去京師萬里宦籍未通身家可念且際乎顚沛之頃者哉豫所以表公之墓不禁三致意於士節之難全也公年四十應明經生平恂恂如童稚嘗以善退為學志不欲上人若無有甚異者顧其於忠孝大節確乎有不拔之操而天亦若善佑之俾其兩全無缺非積善有慶而能若是乎往聞吳逆變時甘忠果公及葉公應榴皆以致命遂志優典褒恤至胡尚書兆龍初為漢中副使道聞難時匿其印於稻畦身為酒家傭卒用自晦以全臣節斯亦竒矣易曰過涉滅頂不可咎也孔子稱臨大節而不可奪若忠果公三人者或以死事成仁或以潔身免亂事不必一轍然皆表暴於世荷國殊恩封馬鬛晉通顯可不謂榮焉若我張公一介砥節不求聞於當世世亦鮮知之顧使其名湮沒而不彰非後死者之責哉公生明天啓甲子卒康熙戊寅得年七十有五葬鄉飲公墓側卒後五月始授南寧訓導配許氏有淑德與公偕老年八十七乃終子五人德宿歲貢生景宿應恩貢生未授卒以子貴贈檢討吉宿嵗貢生台宿早卒元宿庠生女一人孫十二人自景宿出者曰漢癸巳進士由翰林院庶吉士授檢討即月槎也嘗為豫述公軼事及其性行甚詳又曰公承家埀五十年不替先德易簀時謂其子孫曰吾每思大理公宦蜀事悲不自勝有終身之恨乃今然後可見吾祖若父於地下矣其守身以事親如此嗚呼此其所以為節士歟志銘明恭肅嚴公墓志銘大學士王錫爵太倉今上萬厯中大臣之以清德著望受天子特逹知所拔擢待遇皆異等而未竟其用以死者海內蓋有三公諸城邱簡肅公蕣瓊州海忠介公瑞與今昆明嚴恭肅公清先是嚴公謝太宰事歸上數問閣臣嚴尚書病愈否會本兵缺則特旨詔補公如楊襄毅故事又特使使者馳傳趣公行又數問閣臣嚴尚書何時來已公疏至具言臣實病且廢不勝首邱私念以負上惟上哀察上不得已停筆欲署其奏久之方許比越嵗上優禮歸老重臣又首晉公太子少保給廩米輿夫無何訃聞上若曰是惟豫萬里親臣贈恤故事外宜有特加於是閣臣議端僖恭肅二諡以請上又特旨點用今諡其終始注眷殷繁款篤尤兩公所未及云公字直甫號寅所其先五代祖名子敬者自浙之嘉興徙居滇祖皓父春塢公鍈以公貴得纍贈至資政大夫刑部尚書祖母董氏母佘氏俱夫人佘夫人生四子公最少而咄咄竒悟鄉先逹光祿施公昱擇壻得公以女歸之嘉靖癸卯舉於鄉明年成進士除富順尹富順故劇邑或以調公此未淬之劍而輕斬蛟斷犀耶公謹謝曰小子何敢抑余劍也乃方在冶中惟工之所鑄而擇利可乎至則能聲大騰以救荒課為天下最丁母憂後除邯鄲其治如故操尋召入為工部屯田司主事歷貟外郎郎中督修外城及九陵皆斤斤謹出納侵牟吏膠手所省費以巨萬已工成當敘升公辭不受受加俸丁父憂復除兵部車駕車駕主行郵政以清強敢任怨聞坐忤出知保定府會歲旱多盜公政先保民歲既漸熟乃具為條教劘俗飭蠧犁然有理故事三輔郡嵗籍民充京師庫役公議罷之至今稱便居保定三年課復最歷升易州兵備副使陜西參政四川按察使即其地轉右布政使所至自撫按特舉及兩京臺諫會舉不下數十疏隆慶戊辰擢都察院右僉都御史巡撫貴州尋改四川公故川吏知其民所疾苦乃具籍川課之當輸京者議割二十萬金就近改給陜西軍餉罷郡縣卒之團操成都擾民者貢番入邊則為定限額數額外不得浮一人他約束一切以惠利為本而痛持豪家悍吏以法以是士大夫譽誹常參半而內江趙文肅公獨深知之會有以流盜詿公當落職趙公力爭得豫告候調及後五年起督鴈門關不果改貴州入為南大理寺卿尋改北歷刑部吏部右侍郎復自吏部升刑部尚書上之知公自其在刑部能執法不骪權勢始既柄用典銓則日夜討故事論官材丞掾以下皆親為標署楊遵彥之默識黃次公之至精不能過也中外吏師其廉儉苴牘之問幾無一迹上孶孶以太平屬公且未艾而公病歸矣歸之日遣使慰勞仍賜馳傳以萬厯庚寅年六月二十八日薨於家距其生嘉靖甲申年四月十八日得夀六十有七公性檢厲勤於事其操行嚴於趨舍辭受尤凜凛所居官身自與僮僕食粗衣敝蕭然也槖中裝雖圖書琴鶴不取諸人蜀王慕公使使致扇餌微餉而不受初拜尚書貧不能具服色束素犀帶以朝其輩類或指戲之公釋褐時玳瑁七品帶故在耶公笑曰不然夫犀帶不裝金安知非玉吾顧恐難為上耳蓋公之內行修潔與海邱二公略同而二公喜溪刻標異稍暗於大體乃公獨薰然長者色溫氣和人無賢不肖貴賤皆禮接之其行法處議本人情計久逺無崖岸峻物之行歡咋抵掌之談以故明主眷遇尤渥而海內至今稱大人之能安國家鎮雅俗者必首公云銘曰公起滇南萬里遇主不介而親其惟德舉試吏一同為郎再考環轍方維頌者交道中丞之節于蜀于黔斤斤其明濯濯其亷入典法臺不骫三尺以晉冢卿式是百辟胡威之清惟畏人知蘇章強切以忠見思古社稷臣待公屈指千載遭遇未究遐祉鬱乎髙山司空取營埋石其墟載以嘉名曰惟帝賚曰允師錫尚俾來許仰止無斁賦明金馬山賦僉事謫戍劉寅崞縣蓐收柄靈房星聚精超鴻蒙而含秀倐凝結而成形此金馬之山所以置陬訾而奠昆明也在昔神禹受命爰分九區表嶽鎮之崇崇隔方維之頓殊有岱有華抗東西以屹若曰衡曰恆界南北而截如曠哉梁益併包坤隅功不假於疏鑿地獨鍾乎膏腴起層巒之嵯峨控滇南之故墟斯谽谺之巖谷駕綿邈之方輿造父固莫施其銜勒王良亦難範以馳驅觀夫蔓草埀騣凶鬯匕尖風批耳白月懸瞳青松掉尾漬赤瀋以湛露流汗溝之邐迤鑄莫待乎棠溪産非資於麗水形類騰驤之騏驑勢似振鬛之騄駬過日影之須臾摩蒼旻於尺咫逮夫噓氣成雲噴沫起風障泥炫熒熒之彩霞鞶纓繞煌煌之流虹迅雷張其猛烈疾電助其威雄瀉甘澍以注下卷拳毛之濛茸疊巘益翠巔崖增紅洞扇啓廄間之𢎞敞鶯聲響和鸞之玲瓏萬騎仰觀而辟易羣夷睨視而驚沖至於岌嶪巋巍岧嶤􅍶崒或奔如驚或驟如突峻拔天脊峭削風骨蓊蘙森爽隱轔鬱杳橫亘於百里擬長城之矹矹是宜拱帝京之尊嚴障大藩以寧謐也或有野老詰豫而言曰子徒見其小而不窮其大知其名而不究其實吾將為子陳之元黃肇分氓生蚩蚩若魚若蟲無識無知聰明間出命為君師立一代之典章成四海之雍熙嗟惟此邦視為外夷境荒荒而泯泯水漫漫而瀰瀰姚姒置之不即顧問商周鄙之不遑保釐俾昏迷而弗悟竟風靡於侏􅍣楚命莊蹻辟地逺來自王於滇顧瞻徘徊君臣之分少定天敘之典未諧漢武奮志勞民費財命張騫而逺出弭使節而虛回亦有孝宣不務大體慕神怪之恍惚行禋祀之瀆禮王褒馳驛而西上僅致一奠而乃已遺祠廟於巖阿謾冥摉而逺紀唐畏􅓕巔之跳梁宋限大渡之涯涘元雖小安亦何足齒猗歟皇明撫有萬方聖武神文巍巍堂堂既底寧於華夏遂有事於戎荒命矯矯之虎臣揮天戈而奮揚直指雲南掃除欃槍截長鯨之鬐鬛刳妖狐之肺腸顯允黔寧智勇忠良威已施於戡定恩復盡於胥匡化強梗為禮義變椎卉為冠裳揖讓之風濟濟絃誦之聲琅琅紹述前烈適有惠襄招㩦二以誠信鎔頑嚚以慈祥國公繼之綱紀益張載平安南功業彌昌總制仁賢淑旗綏章來鎮來臨克柔克剛致逺人之盡服邁前哲而有光俾金馬迥然而特立與碧雞相對而相望小姑息之宋元陋怯弱之漢唐夫然後知皇明之盛德冠古今而莫並紀昭靖之殊勳埀悠久而不忘余聞其言拜跪嘆嗟遂為之歌曰金馬之旁兮有稻有粳金馬之陽兮有郭有城臣宣旬其善政兮民勤事乎農耕咸矢心而弗渝兮願永享夫千萬之太平戎旅賦楊愼見前恭承恩譴兮於役滇越捐佩江臯兮解紳雲闕三陟崔崔兮九折􅝨􅝨不日不月兮遂屆窮髮撫孤旅而悁脰兮掩衆困而􅜢心悵圭籥之駸遄兮逾四稔而迄今父母孔逺兮懿親離而北南類連逵而分衢兮似同波而殊潯慈烏欣於共巢兮恆鳥悲乎異林彼纎羽之微族兮亦命侣而跢跦何生人之含靈兮乃離羣而弗如詠清人之介駟兮感放士之鳴鴸姬公畏於熠耀兮尼父唶夫蟪蛄屈託乘於螭豹兮莊寄徑於鼪鼯在聖哲而固然兮攬古人而乘欨哀吾生之罹郵兮背中土而播荒粵戴盆而伏嵁兮望崦嵫之末光神恍悢而蜚揚兮形臠卷而傖囊睇孫水之浩渺兮瞻靈闕之峻極聆猩猩之夜啼兮履狒狒之朝迹尋終古之攸居兮問祝融之昔宅胥靡登而不懼兮魑魅過而奚栗崛􅞸駭揚兮含沙影流喟茲徂春兮忽焉杪秋月令殊於九州兮瘴卉華而歲周若有人兮好我擕旨酒兮思柔采檳榔兮綴扶留贈相離兮結忘憂搴􅝄雞兮為脯露江魚兮為修滇歌兮㸑舞白日逝兮元景浮獨持觴而懷逺兮雜歎嘯其向陬遂還軫而休室兮隱零雨乎寂夜引簟枕而假寐兮遙歸夢乎親舍家人嘻以疑語兮閭里紛其來訝衆雞鳴而驚余兮晨光曶乎東射悵夢歡而覺悲兮淚承睫而交下假靈氛以歷占兮援龜頌兮余謝曰明廷其布德乎子行歸乎肆赦系曰莫靡荒服自中古兮日月之表燭不普兮章亥步窮禹罔睹兮蘭津開道行商苦兮碧雞望祭使者阻兮子亦何為恆此土兮命兮不祥順勿忤兮樂天知命云何憮兮滇南賦知縣俞緯楚雄滇南草木子嘗慕司馬子長之逰恨其時初事南服心奓體倦役目騁耳未足以盡其大觀也惋然言於西蜀石潭先生曰夫人居勝地則其志朗其御逺處偏安則其中倔其氣索此牽乎地者也又讀帝系舜以諸馮而繼命西伯以岐山而造周為之而已曷與地謀此係乎人者也先生以余歉處滇者乎請誦所見聞而就正焉夫滇之處絶鎮也地衍西南之域天文井鬼之分肇自巨唐宅西於昧谷禹貢導水於南溟莊蹻據衆而可王既通五尺於嬴秦迄乎漢氏置五郡鑿昆明張騫之通西徼諸葛之事南征控八垓於神州闢萬里之煙雲廓瀘江而為門掘西緬以為塞接交益而並峙抗崑崙之重扼槃乎藪陸之所湊族類不減乎中土或炫爛之怪錯奄八區而誰伍於前則跨帶交址連延南海危聳撑空懸石雲靄溪汨汨而渚流谷掩掩以伏偃途迷迷乎衡宇亘萬里而愈逺於後則據躡吐蕃枕輢石門﨑嶇跳跌要害之屯北指轅以岷巴復逺御乎隴右背長江以為塹還十瞼而錯繆於東則右綿施鬼萬壑所充嵩峻屼㟮肩鼇柱空涵沃野於千里負天限之關垣引長渠於二廣卻風門於辰沅於西則遙制八百控有猛密老撾肢屬干崖附籍皇圖逺攝乎遐陬獷悍馴擾於帝懷恆懇懇以納款又何見乎蒿萊其封域之內則夷險崇卑雄據千里長林邃谷屏嶺塹水蓋將自其大者而觀之其山則龍盤鳳翥虎踞蛇伸岡巒拱衛翠壁霄青左哀牢右太華陽瓜有天耳之扼隘銀生連烏蒙以接霞牟尋所嶽之點蒼王褒使祀之金碧蜻蛉崇峰修谷成會要之區柘南嶺嶂摩雲為控扼之邑於是乎竹箭緣壑楊栁臨岸橘柚抽枝松相挺幹梭羅婆羅之殊其華棠梨槵子之蕡其實紫榆杏棕椒榿杉漆木蘭椿槐櫻李桃栗園桂之馥秋馨霜梅之傳春信乳檀爍爍而霞騰安息靄靄而雲噴卉則紫花白蓮素馨杜鵑薔薇芍藥芭蕉紫菀青蘭芬芳於幽谷山茶蔥鬱於峯巔蔓修藤吐種種竒葩有標其葉有灼其華或經秋而傲霜或蒸日而拂霞爾乃孔羽珮翠鶴頂冠朱雉雊稟素鸚鵡人呼蛤蚧穿其木鸛鶚鳴其隂寶樹巢珊瑚之鳥莒山來鸜鵒之吟鷹隼鷙搏烏鳥反哺白鷴于飛翡翠啄霧子規夜作而促耕燕雀棲暖而春至翅回鳴號戾止乎其內獸則熊羆咆號於深林虎豹長嘯而風烈夕羊畏露狡迎月猩猩夜啼猿猱競捷松鼠之攀緣神鹿之隱穴犀象嗷牙豪豬刺簪麝狐假威犛牛踞山踟蹰乎其間珍則有琥珀丹青珠瑂瑕英金沙銀礦川媚山靈瑪瑙珊瑚絶藴寶井錫鐵銅鉛石緑碧瑱果則無花猩猩胡桃松實檳榔無柯南棗荆棘搖顆香橙纍纍金橘蜜桶獅頭同族異育羊桃橄欖柿榴御霜或託根于崆洞之隂或菶蔭於圃囿之陽其浸則滇池嘉利滄水洱海異龍陽宗之湖撫仙星雲之陂滴瀝滲淫會其流涓淤泱灢成其大浟湙瀲灧浮空澎湃噓吸百川洗滌塵隘乃若秋月懸波午風轉幌飛沫起濤揚瀾溢浪圓景當天彩雲蕩漾溟溟濛濛色連霄漢又若瀾滄麗水金沙元江橫襟濛帶山陵懷襄圓淵九回以懸騰湓流雷響而電揚長江浹潗峻湍崔嵬盤渦谷轉淩濤山頽渾淪浩渺乍挹乍堆爾乃泄滷湧鹹於浚井採山煮水於鹽池內帑輸賦巨商擅資於是乎蛟龍隱灘黿鼉處水乃見怪物興雲致雨其族則有長鯨吞舟修鱣吐沫金線竹釘水母蚌􅛔江公大頭康郎細鱗鯖鰐鰉鯢輪􅡯鱟蝞螺􅲶蝸鯽目蝦噴霓鱗甲鏙錯煥爛錦斑泝回順流噞喁沉浮其四野則邱陵墳衍原隰陂渠溝洫畷畛黍稷離離池塘既隩髙城深池關譏啓柝江梁濟水寢廟綿五世之勳巨室端維垣之矩喬木隂隂朱黻靡靡其居民則髙門鼎貴魁豪岸逸流寓多齊魯之昆戍遣悉吳越之裔其間雖有毒獹烏蠻鴆獠咢栗惟構巢於巖阿結茅於山脊友麋鹿之與木石竟莫伍於㕓市觀郊隩之富奧實京邑之綱紀帝王之外援開國之𢎞宇斯蓋宅土之所安業觀聽之所溢美此其大較也然此特山川之粗也乃若天有至粹地有至精協氣昭宣名世挺生施全之傳毛詩許淑之授五經張隆之墓擾狐楊惠之孝感神明文章政事蔚若王升風裁凜然爝若張叔董文彥義以拒賊死睢陽之忠吕季平誓不附雍茂子卿之躅傅寶南州人傑仲宣齊名經術張英身代時勉之罪郭文秀發相如之曲和光道人廉惠先生恥干利祿居恬政明又若㸑字釋蝌斗之文筮師精卜數之揲麥宗通番蠻之書草書綴羲之之帖義若用之節若方玘出將入相若一清守死善道若繼魯廷璧剛直不阿有澄清當世之志希載博雅修潔逹拯溺亨屯之體近則山嶽炳靈風氣𢎞啓英俊迭出未可枚舉當盛世而擅名稽海內而為擬是故遊談者之樂譽景行者之仰止石潭先生喟然嘆曰壯哉吾子其善逰乎余舊有志於是縱言琅琳實獲我心滌我之沉疴敞我之靈襟竒竒怪怪眩恍奪神而今惜其去子而之湖荆也滇雲子怫然不懌曰石門劍閣三巴綿絡楚王夢逰之陽臺大禹黑水之疏鑿岷峨掇之以舒抱江潼藉之以披廓物不終聚復云駕言泫然淋淋不知其然雲南通志卷二十九之十二欽定四庫全書雲南通志卷二十九之十三詩古歌謠渡蘭滄歌水經注漢明帝時通博南山道渡蘭津行者苦之歌曰漢德廣開不賓度博南越蘭津渡蘭滄為他人僰道謠益州記曰瀘水源出曲羅兩峯有殺氣暑月舊不行故武侯以夏渡為艱瀘水又下合諸水而總其目故有瀘江之名自朱提至僰道有黑水羊官三津之阻行者苦之為之語曰猶溪頳木盤蛇七曲盤羊烏龍氣與天通四言古晉述南中志常璩蜀郡赤德中微巨猾干篡白夷乘釁致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌蒙此艱難五言古唐臨水亭舊志相傳為寓蒼洱作不知何據姑存之博士閭邱均成都髙館基層山幕坐藉芳草旁對野村樹下臨車馬道清朗娛心術幽遐備瞻討回合峯隱雲聯綿渚縈島氣似滄洲勝風為青春好相及勝年時無令歎衰老古風翰林李白山東羽檄如流星虎符合專城喧呼救邊急羣烏皆夜鳴白日照紫微三公運權衡天地皆得一淡然四海清藉問此何為答言楚徵兵渡瀘及五月將赴雲南征怯卒非戰士炎方難逺行長號别嚴親日月慘光晶泣盡繼以血心摧兩無聲困獸當猛虎窮魚餌奔鯨千去不一回投軀豈全生如何舞干戚一使有苗平同諸公送李宓雲南伐蠻御史儲光羲昆明濱滇池蠢爾敢逆常天星耀鐵鑕弔彼西南方總宰統元戎太守齒軍行囊括千萬里矢謨在廟堂耀耀金虎符一息到炎荒搜兵自交址茇舍出瀘陽羣山髙嶄巖凌越如鳥翔封豕驟跧伏巨象遙披攘回溪深天淵揭厲逾舟梁元武掃狐蜮蛟龍除方良雷霆隨神兵硼磕動穹蒼斬伐若草木繫縲同豕羊餘醜飲瀰河啁啾亂行藏君子惡薄險王師恥重傷廣車設罝罦太白收光芒邊吏靜縣道新書行紀綱劍關掉鞅歸武辨朝建章龍樓加命服獬豸擁秋霜邦人頌靈旗側聽何洋洋京觀在七德休哉我神皇過遂久縣劉灣百蠻亂南方羣盜如蝟起騷然疲中原征戰從此始白門太和城來往一萬里去者無全生十人九人死代馬臥陽山燕兵哭瀘水妻行求死夫母行求死子蒼天滿愁雲白骨積空壘哀哀雲南行十萬同己矣送袁中丞持節册南詔五韻同平章事權德輿略陽西南使星去遠徼通朝聘煙雨僰道深麾幢漢儀盛途輕五尺險水愛雙流淨上國洽恩波外臣遵禮命離亭駐紫騮且盡尊中聖元碧雞山鄭衍中慶西南來有山勢雄奕屏開障大荒壁立數千尺晴巒疊奇峰幽壑藏怪石清風響松濤老樹森矛戟俯瞰滇池水仰矗雲山碧山靈得異境廟貌存古迹君侯本世家奉詔平叛逆兹承寵光行山迎馬首懌鎮遏良有謀煙瘴似氷釋從此邊陲寧殊􅈴書竹帛西蕃箐學士張翥寧晉西道出邛僰百里彌箐林俯行不見日刺木鬱蕭森伏莽有夷獠巢枝無越禽根盤三嶺險氣接西蕃深銀山雪夏白金沙嵐晝霒主恩畀良帥時平靖蠻心風威所播灑瘴地空毒淫願言闢南徼蔽以樹棠隂入霑益亂後傷懷進士公孫輔德陽驅馬霑益州南望滇海頭向來繁華地變滅如浮漚逈不見人煙但見河水流青山宛然在風景何蕭颼郡縣生荆棘汙萊翳田疇夜聽虎豹號晝顧麋鹿遊羣烏集戰壘野磷飛林邱灼灼道旁花只為行者愁緬思冦亂際藩垣失防秋空虛起外侮口語興戈矛盛衰雖天運禍端亦人謀生靈爾何辜吾欲天公尤謁蘭滄武侯祠學士揭傒斯富州炎靈壓東都臥龍起南陽漢業入三顧蜀日宣重光豈伊山川險况在兵刃強八陳通神明二表貫穹蒼天運有隆替吾君自虞唐煌煌十萬師聲威搖八荒大星殞渭南萬古一悲傷但使漢賊分安有終不亡桓桓蕭相軍雙旄出永昌下馬城南池為公酹一觴滇池喬堅滇水不可涉石戟森嵯峨胡能宅蛟龍但可藏黿鼉渚風蕩驚湍乃爾泥滓多我欲澄其源應自崑崙阿才謬諒靡救臨流將奈何商山紫芝曲漁父滄浪歌斯人久不作千載無清波明蘭滄江學録毛鉉兩山髙插雲巋然若天岸草樹緑相繆仰視天一線中有一長江江流急於箭亂石齟其中噴激成飛霰客子何問津雞鳴夜將旦僕夫相顧愁舟楫恐失援天明涉此險永作邊城翰蕉洞幽幽小洞天沉沉若隧道石門古莫扄石磴淨於掃石花三月開色比桃李好人爭秉燭觀過此即枯稿既非人技為無乃天所造况無鐫鑿痕此理不可曉贈楊寧征麓川大學士楊士奇廬陵楊生青雲客文彩耀白璧腰間龍泉劍别我有遠適吾聞禹徂征舞干致苗格所以宣尼訓服遠修文德好謀而有成明明垂警飭如何才智士宏議薄古昔懷忿忽逺圖急功幸茍得寧論萬里行糗糧豫儲積漢廷所遣將孰是趙充國子行職贊襄黽勉攄良畫雖有斗酒餞安能寫胸臆仙樂臺僉事孟霦澤州山郭朝雨餘青蕪連野路期與髙人遊籃輿西北騖蒼山亂雲間隱隱鐘聲度危塔出層霄金壇灑香霧久厭冠簪纍禪林時信步碁局傍晴軒茶煙穿竹樹頗得靜者心安知白日暮常此坐觀空迷方倘能悟大觀樓副使趙維垣永寧我從哀牢來鳥譯連亭障一望楪榆城宇宙何昭曠瑤峯冠白雲金魚分玉浪岫虎川途暉濤鷺風煙向豈羡方壺遊可使天台讓元聖心幽馮海若亦飈蕩吾欲問山靈無言空罔象但覩巖壑間森森釋門傍青元洞參政馬卿林縣夙昔慕仙侣採藥尋名山蓬􅌡殊恍惚勝境自人寰世網猶未脫遙遙謫南蠻簿領日紛糾春風偶餘間巡行厯阡陌登遊遍林巒山椒洞門啓玲瓏彩雲間奇石狀扂臬斧鑿羞垂班天光牖虛白月窟浮清潺珠璣瑱乳綴綺繡壁苔斑儼然清華境寸碧出雲鬟果有笙鶴翁霞氅何斕斒遺我金簡書兼之白玉環環以象太極書以示九還謂勗松柏心無為桃李顔再拜感至教翛舉不可攀仙路豈云遠煉修良匪艱矢心斷金石常恐芳嵗殘紅塵落已久丹書幾時頒願言達精誠排雲叩天關元謀縣歌修撰謫戍楊慎新都遙見元謀縣塜墓何纍纍藉問何人墓官尸與吏骸山川多瘴癘仕宦少生回三月春草青元謀不可行九月草交頭元謀不可遊嗟爾營營子何為歘來此九州幸自寬何為此遊盤采蘭引廣通縣東響水關産蘭緑葉紫莖春華秋馥蓋楚騷所稱紉佩之蘭也人家盆植如蒲萱者蓋蘭之别種曰蓀與芷耳時川薑子見而采以贈豫知九畹之受誣千載矣一旦而雪作采蘭引秋風衆草歇叢蘭揚其香緑葉與紫莖猗猗山之陽結根不當戶無人自芬芳密林交翳翳鳴泉何湯湯欲采往無路局步愁褰裳美人馳目成要豫以昏黃山谷嵗復晚修佩為誰長採芳者何人蓀芷共升堂徒令楚老惜坐使宣尼傷感此興中懷弦琴不成章謁二忠祠大學士夏言貴溪朝出南城門望見城南祠含悽眺田野灑淚升堂基棟宇何峩峩松柏森前墀言念二君子皎皎雙玉枝聖皇啓初運元孹據滇池銜命屬後先仗節死一時義氣奮殊俗英聲動邊陲列聖眷明德憲臣繼陳辭褒揚錫異典記述磨穹碑余奉萬里役弭節昆明涯弔往有深蹙感今重遐思道消仁義捐俗降節槩虧洶濤蕩激中見此千仞崖疾風轉髙蓬徑草終弗移斯人久徂謝爼豆光陸離榮名豈終極天枉奚足悲飛來寺提學胡堯時泰和行過飛來寺逶迤趙州路忽見點蒼山飄焉神與騖巖嵌雪未消峯髙鳥難度姿潤青芙蓉長日生雲霧眷兹千仞岡誰能振髙步人生嗟如鳩結巢簷下樹不極髙與明栖栖空旦暮半間亭知府章士元蘇州昔賢理彭澤託迹東西林豈繄耽名教實寄方外心余質本樗散黽勉嬰紱簪西南繫一郡綿力苦不任徵科與敲撲填此煩冤襟爰追昔人意佳境還招尋邂逅入精廬幽賞愜孤吟曇花爭永晝香燈散秋隂夷猶未成久瀟灑良獨深乘興數來往挈榼聊自斟同行盡寀服相歡各矢音如知會心處無間古與今倏忽嵗云改庭柯鬱森森未諧結廬願有懷春江潯悵此羈旅迹繾綣空蹄涔何當返初服一臥吳山岑白水關驛對月參議馮時可華亭淺山曳輕雲茂林鬱深碧夜氣涼如水當窗迎皓魄露華洗空氛清暉流几席已欣鳥道脫尚恨鴛樓隔抱影獨寤寐銜恩感今昔天宇本自寬人生胡自窄萬里遊亦奇百城臨且適當劇即程書乘間亦振屐悠然如在林孤臣何局蹐飲朝霞漫興知府黃兆隆隂晴互朝昏氣候靡有定春半尚餘寒未愜登山興偶辱翩翩賢邀遊招提境出郭適清和日淡纖雲淨梨開白盈枝桃飛紅滿徑藝藝麥正芳嚶嚶鳥相應厯壑既經邱穿林復陟磴望望詣朝霞果然三界勝縱目萬象空身如超上乘澗水浮間花禪堂發孤磬亭亭古柏隂落落長松徑碧繡緑蘿懸石冷香泉迸入門供帳繁綺筵笙歌併且盡主人情不問山僧姓更有同心儔元談時印證披豁見天真銜杯不欲醒自苦俗吏忙得此歡懷罄留連光景遲收拾無餘剩臨風咏歸來天外紫煙暝望雪山參政謝肇浙晉江山行數百里貿貿靡所屆回上四盤坡我馬痡以憊千峰繞翠屏驚見玉龍挂爛如白芙蓉橫聳青天外斜日正照耀銀宫起光怪皓質互四時千秋復萬代元鶴不敢棲路草緑映帶永懷面壁蹤結想香林界坐令俗骨清頓覺神情快安得馭泠風凌虛飲沆瀣蘭津渡巡按鄧渼新城冒險戒征鞍行色委空翠回飈引去旌迤邐向虛縋峭壁倚雄峙長江貫澎濞虹梁跨飛動鮫宫審所寄地維恐中陷日車側引避石古霜華明天寒岸隂閟靜聞飢鶻嘯遽疑飛雨至客魂驚始定幽光屢􅌓眙南登蜀相祠英風此未墜行部迤東西軺中雜述二首策馬登山椒下有古時邱灌莽翳縱橫雀聲鳴啾啾井竈已蕪沒碑版尚可求夷俗每下拜行人為涕流藉問何代賢乃是武鄉侯當時行軍營遺名至今留攻心得上策南人戢狂謀板蕩英略顯承平士習偷武定既餘孽隴川未俘酋疥癬何足言樽爼無勝籌桓桓介胄士坐貽巾幗羞憑軾想精靈徒此仰令猷九原如可作微公誰與遊出自郭北門有叟泣路隅自言賈人子少小工廢居北走邯鄲道南遊厯勾吳資給幸益饒斥買盡膏腴長子獄小吏次子業為儒幼子獨無事踏踘並樗蒲齎貸遍貧人頗獲鄉曲譽鞍馬溢街巷出入間且都轉盼十載間人事有盈虛長子死虐璫告密橫見誅前嵗武定變次子復被屠幼子無警省門戶轉蕭疏府帖召買金里胥迫相呼忍淚遣之行逺販豺虎區經年絶還期瘦軀知在無公家有程限官法嚴追逋朽老甘痛楚鞭撻無餘膚廢箸不足償歸賣婢與奴羅紈昔盈箱今也婦無襦殘年復餘幾委骨終溝渠語竟淚簌簌聞者亦欷歔藏金著古訓改玉欽令圖德音沛早晚忍死且須臾華藏寺梁州仲冬月氣候如秋早憂俗省煩瞀乘間恣幽討鳴笳越修阪停車渡清潦攀林踐香界漸近山更好斸翠開筠房疏碧架蘭橑銀榜倚虛壁紅亭映深島濫泉珠自瀉雜英霰微冒回飈蕩松林蒼翠若可掃山果摘霜橘蔬食甘蕰藻局俗鮮勝韻遺榮得曠抱去岱久已審懸車豈待老武定變朝登武定城暮宿抵羅次有何龎眉叟遮車泣訴事問叟何所苦問叟何所覬叟耄復健忘憶一不記二往者萬厯初邊守幸康乂守令咸得人民物鮮札厲伍伯不到門什一有恆稅斗米才十錢半鏹易一醉龜貝自轉輸工價集駢坒相歡太平人但供角抵戲嗚呼草載間乾坤一幽閉中丞文且武抵掌談封拜羽檄豈虛來兵革靡寧嵗忍以百萬命而快一人意忍白千里地而希茅土賜守臣本蟊賊中璫甚狂猘此輩紈袴子况彼糞除隸咆哮而負嵎逢者鮮不噬不忍因民怨奈何虎冠吏一夫敢倡難餘孽竟昌熾訛傳寇初集頗遭守者詈黽勉授殘甲垂頭望睥睨蜂涌圍己合蟻薄城遂潰巷戰力不敵免胄期殞碎烈烈金與王闔門竟死義宛轉蛾眉女慷慨丈夫氣泣抱黃口兒牽挽及娣姒相繼付烈焰義不汙賊鑕草間茍求活羞彼郡都尉難撲燎原火易乘破竹勢中丞文且武小醜曾蒂芥下令城中外毋得輒引避按堵第如故已定退賊計賊來如風雨剝膚患孔亟晨興牙門啓文武咸就位冦賊在門庭請問計安出中丞噤無語汗流手顫悸但云烏合衆不久自當退城外鼓盈天城中哭震地賊徒皆重鎧踉蹌錯其臂每聞得漢兒刃腹必洞刺刳腸絓樹枝烏鳶下爭食尸積雲津橋血流滇海澨中丞非不武空拳安可試登樓望賊徒悚然思所畏或用緩賊謀姑為好語慰彼賊若罔聞瞋目仍攘袂惡詬至不堪左右皆沮愧甘受城下盟竊發虞姦細犒用十二牛文錦先皮幣椹紫織成衣黃金鈎落帶銀印龜形鈕本自上方製名器敢輕假曾謝挈瓶智賊衆始拜舞觀者猶惴惴賊來荷戈入賊去駝金回可憐窈窕娘抑作犬羊配虜獲動無算男婦必纍騎輜重百里間綿綿行不絶玀賊固驍悍小勝輒忸􅏸中丞文且武開門悉精鋭擊歸伺其怠小醜安足殪但聞攀牆看誰將一矢遺夷民舊部落府主新儀衛前歌後有舞送歸刺史廨昭昭漢日月幾向蠻天墜忍死幸須臾延頸王師至焚香拜馬首雙頰如雨淚不意溝壑軀復覩漢旌幟感激活我恩人持一笥餌長跽主帥前帥聞乃大誶怒聲吼如雷立命三軍士居此圍城中盡與賊勾結從賊有顯戮任其所斬刈軍士擁向前兩手捽其髮舉刀便欲斫觀者但􅌓眙叩頭連乞命我輩有何罪爾輩實無罪是爾命盡日昨傳中丞令首開購級例重賞不踰時以此競趨利􅊧賊無所得失利且有害頭顱許借我誰能别真偽老幼聞此言號劈淚盈眥生既無門控死當訴上帝駢首就鋒刃流血如泉沸次第列功狀報捷日三四中丞啓捷書抵掌大稱快催軍益前進功多賞亦倍傳教諸將營努力功名會今年殺諸賊金印如斗大當取懸肘後急擊慎勿失天網恢恢布多殺神所忌逆賊既就俘將吏亦被逮糜爛同一理誰逃百六厄叟昔有三子諸孫繞膝嬉酷經喪亂來並無髫齔嗣田園既蕪沒居室遭焚燹親友凋殘盡生理迷所寄人皆羡髙年髙年有憔悴歎息老叟語停鞍重歔欷召變良有初妖象著為彗町畽作戰場噫嘻豈偶值易隆驛知府周仕國普安為吏不自由雞鳴戒前途問君何為爾將事謁且趨上官前導至走馬臨長衢馬上極咆哮風火不停驅盡欲飽其腹遲則生禍虞昨日郵書至為言餉傳逋疲卒八九家形影半凋枯門戶塞荆棘妻子匿菰蘆苦稱被水旱畝地盡荒蕪僅餘皮骨在典鬻無完膚詔使日夜至愷澤同春敷而我獨重困何以偷須臾倉卒感斯言仰天長欷歔攬衣亟起去耳中聞追呼九鼎山知府陳荀産銅仁佛初不住寺古穴蔽巖篠化身那知年深洞詎覺曉逺公倚空虛淨室凌縹眇飛樓挂花棚石磴上不了尋到巖路窮方達僧居㟽傍花方丈幽共坐蒲團小人語出雲竇鐘聲低樹杪問師悟何時雲破山月皓哀夏呈貢祖訓知縣黃孔昭吳縣夏君一命均奉檄入荒徼合并五華寺杯酒共吟眺丈夫慨以慷風雲坐談笑何期受重圍一死臣節效吏無黃犢賣路有青蠅弔碧血何處藏寒原走殘燒本朝交水同知姚文燮桐城山勢不在髙恢𢎞氣彌壯險夷造化心縈盤審趨向千崖積重翠己盡物類狀修坰變層岑廬舍成倚傍流景自容與縈情謝感愴緑疇帶清湍牸犢恣牧放膴膴耕原田元氣復凋喪譬登袵席初雖癯神己王相形息爭觸自易興禮讓三江匯衆溪漣漪繞秋嶂遙雲不斷青似此復何悵萬松庵知縣張端亮蒙化台山望無際庵在山之趾泠然一壑松萬松豎如指老蛟攫流雲稚龍浴清泚尋徑造香林叩扉松樹裏壁嵌古銅青石點苔花紫僧不厭客來客亦愛僧止枯茗豁疏襟談深悟無始日落聽昏鐘一天清梵起法界寺雅集用禪房花木深為韻和潁庵吳學使之作總督尹繼善滿洲恰值春歸日桃李又爭姸尋幽向山洞步步入春煙石磴盤雲上松梢信手搴青藤纏絶壁小麥遍梯田浮生間片刻卻誤老僧禪節序何時好四野啓青陽仙源流洞口石乳垂山房春風自南來生意滿巖疆細雨正霏霏大有占農祥龍湫一水隔登厯更褰裳小院開樽處殘梅尚有花酒行人半醉香雜樹交加暫可逺塵俗敢云愛煙霞緑竹誰培植蔓草費搜爬漫將此中趣輕向外人誇勝景屢追陪幽林到華轂爾我兩忘形推心每置腹喜得年嵗豐長享太平福歌咏遍溪山清光被草木登臨日已西歸鞭促僮僕天涯偶聚首况復是知心古人秉燭遊所惜在光隂歸林鳴鳥急擁岫暮雲深朂哉崇令德逝者何駸駸三復吟君詩清風吹我襟七言古隋征南寧夷過石門山行軍總管史萬嵗杜陵石城門峻誰開闢更鼓誤聞風落石界天白嶺勝金湯鎮壓西南天半壁唐軍中行路難臨海丞駱賓王義烏君不見封狐雄虺自成羣憑深負固結妖氛玉璽分兵徵惡少金壇授律動將軍將軍擁旄宣廟略戰士橫戈靜夷落長驅一息背銅梁直指三危登劒閣閣道迢遙起戍樓劒門搖曵俯靈邱邛關九折無平路江水雙源有急流征役無期返他鄉嵗月晚杳杳邱陵出蒼蒼林薄遠途危紫蓋峰路澀青泥坂去去指哀牢行行入不毛絶壁千重險連山四望髙中外分區宇夷夏殊風土交址枕南荒昆彌臨北戶川原饒毒霧溪谷多淫雨行潦四時流崩崖千嵗古漂梗飛蓬不暫安捫蘿引葛陟危巒昔時聞道從軍樂今日方知行路難滄江緑水東流駛炎州丹徼南中地南中南斗映星河秦關秦塞阻煙波三春邊地風光少五月瀘川瘴癘多朝驅疲斥堠夕息倦樵歌向月彎繁弱連星轉太阿義重輕生懷一顧東征西伐凡幾度夜夜朝朝斑鬢新年年嵗嵗戎衣故灞城隅滇池水天涯萬轉積地際行無已徒覺炎涼節物非不知關山千萬里棄置無重陳征行多苦辛且悅清笳梅桞曲詎憶芳圍桃李人絳節紅旗分日羽丹心白刃酬明主但令一被君王知誰憚三邊征戰苦行路難幾千端無復歸雲憑短翰空餘望日想長安天威行員外顧雲池州蠻嶺髙蠻海闊去舸回艘投此歇一夜舟人得夢間草草相呼一時發颶風怒起雲顛狂波濤擺掣魚龍殭海神怕急上岸走山靈股栗入石藏金蛇飛伏霍閃過白日倒挂金繩長轟轟砢砢雷車轉霹靂一聲天地戰風走雲開始望看萬里有天才四片車遙遙馬闐闐平如底直如弦雲南八國萬部落皆知此路來朝天耿恭拜出井底水廣利刺開山上泉若論終古濟物意二將之功皆小焉蠻子朝尚書白居易太原蠻子朝泛皮船兮渡繩橋來自巂州道路遙入界先經蜀川過蜀將收功先表賀臣國雲南六詔蠻東連牂牁西連番六詔星居初瑣碎合為一詔漸強大開元皇帝雖聖神惟蠻倔強不來賓鮮于仲通六萬卒征蠻一陳全軍沒至今西洱河岸邊箭孔刀痕滿枯骨誰知今日慕華風不勞一人蠻自通誠由陛下休明德亦賴微臣誘諭功德宗看表知如此笑令中使迎蠻子蠻子導從者誰何摩挲俗羽雙偎伽清平官持赤藤杖大軍將擊金呿嵯異牟尋男尋閣勸特敕召對延英殿上心貴在懷遠蠻引臨御坐近天顔冕旒下垂親勞徠賜衣賜食移時對移時對不可得大臣相看有羡色可憐宰相拖紫佩金章朝日唯聞對一刻折臂翁新豐老人八十八頭鬢鬚眉皆似雪元孫扶向店前行左臂憑肩右臂折問翁折臂來幾年兼問致折何因緣翁云貫屬新豐縣生逢聖代無征戰慣聽梨園歌管聲不識旗槍與弓箭無何天寶大徵兵戶有三丁點一丁點得驅將何處去五月萬里雲南行聞道雲南有瀘水椒花落時瘴煙起大軍徒涉水如湯未過十人二三死村南村北哭啼哀兒别爺娘夫别妻皆云前後征蠻者千萬人行無一回是時翁年二十四兵部牒中有名字夜深不敢使人知偷將大石鎚折臂張弓簸旗俱不堪從兹始免征雲南骨碎筋傷非不苦且圖揀退歸鄉土臂折來經六十年一肢雖廢一身全至今風雨隂寒夜直到天明痛不眠痛不眠終不悔且喜老身今獨在不然當時瀘水頭身死魂飛骨不收應作雲南望鄉鬼萬人塜上哭呦呦老人言君聽取君不見開元宰相宋開府不賞邊功防黷武又不聞天寶宰相楊國忠欲求恩幸立邊功邊功未立生人怨請問新豐折臂翁蠻子朝同平章事元稹河南西南六詔有遺種僻在荒陬路尋壅部落支離君長賤比諸蠻夷為幽冗吐蕃強盛頻侵削降有懼心戰無勇夜防抄盜保深山朝望煙塵上髙塜鳥道繩橋來款附非因慕化因危悚清平官繫金呿嵯求天叩地持雙珙益州大將韋令公頃實遭時定汧隴自居劇鎮無他績幸得蠻來固恩寵為蠻開道引蠻朝迎蠻送蠻常繼踵天子臨軒四方賀朝廷無事惟端拱漏天走馬春雨寒瀘水飛地瘴煙重椎頭醜類除憂患瘇足役夫勞洶涌吐蕃互市嵗不供雲蠻通好轡長駷戎王養馬漸多年南人耗悴西人恐元雪山宣慰副使李京河間麗江雪山天下絶積玉堆瓊幾干疊足盤厚地背摩天衡華真成兩邱垤平生愛作子長遊覽勝探奇不少休安得乘風凌絶頂倒騎箕尾看神州過金沙江雨中夜過金沙江五月渡瀘即此地兩巖峻極若登天下視此江如井裏三月頭九月尾煙瘴拍天如霧起我行時當六月末王事役人安敢避來此滇池至越巂畏途一千三百里干戈浩蕩虎豹穴晝不遑寧夜無寐憶昔先帝南征月簞食壺漿竟臣妾撫之以寬來以德五十餘年為樂國一朝賊臣肆胸臆生事邀功作邊隙可憐三十七部民魚肉豈能分玉石君不見南詔安危在一人莫道今無賽典赤明臨安秋江靜釣參政謫戍王奎松陽長江西來幾千里白浪飛流拍天起中有修鱗長比人不入先生釣竿裏先生襟度足與娛直釣在意不在魚要將清風蕩星斗不與怒濤同捲舒昨夜一絲醮寒月今夜一絲拂飛雪舉頭傲睨天地裂目光夜射蛟鼉窟先生釣竿幾許長先生經綸千丈強子陵桐江遇文叔尚父渭水逢周王江山回首應非故世事茫茫難縷數赤壁天空雁不來采石月明鯨已去乾坤上下清絶塵天橫水白結冰銀先生有意投竿起嵗月無情那待人判山玩月判山山上秋月明判山山下秋水清道人持杯待明月氣壓太華吞滄溟嫦娥靚糚倚碧井照見琉璃幾千頃興來吸盡金叵羅舞袖徘徊弄清影道中望蕩山逯昶懷慶入關地平少邱坂旌旗微茫城尚遠碧水漁舟白日寒黃塵旅店秋風晚半山佛寺鬱嵯峨樹色溪聲雲氣多不得皈依此中住幾回馬首暫經過登聚遠樓主簿謫戍平顯杭州白日送客還南滇夜夢還踏滇池船連峰倒垂三百里白雲水底行青天五華山上香風起萬點菱花墮秋水僧逰海藏受齋歸小笠輕袍船一葦霜眉碧眼髙結喉揖余同登絶頂樓樓中古篆屈鼎足黃金揭榜蟠銀鈎傾壺共灑醍酥汁東壁淋漓電光入扶桑亞風掀海立金馬騰驤脫其縶攄虹聳見西浪風遙聞雞犬白雲中羽人不謹碧雞籠躍出一朵青芙蓉芙蓉花開成碧藕玉案流香旨於酒東北飛來鶴上仙云是商山採芝叟苾芻厭喧寂坐久空牀卻作獅子吼獅子吼聲吼如雷螺巖石扇訇而開招我題詩蒼翠壁呼童為掃夜明苔膜拜其中金粟影珊瑚舌相青蓮臺因談空空論白業分霑法喜清涼杯我時六人斷塵縛若將終身有斯樂天雞振羽啼一聲下界奔濤滿松壑松濤撲面冷然驚官街鐘鼓交鍠鍠煙霞已失嘯傲伴夢寐徒憶滇陽城滇陽城渺在何許客歸應念平生語相思石上舊精魂萬里蘿龕一燈雨賦得滇池夜月布衣郭文昆明長天無雲山四清白月在水搖虛明冷極萬象鏡光裏乾坤一色秋冥冥玉壺載酒遊空碧人在清涼水晶域座中何郎湖海客醉眼卻嫌滇水窄飄飄書劒不可留坐令樂事成離憂安得身如水與月千里萬里隨君舟武定獅子巖何年竺國青狻猊奮然掣斷黃金羈天龍聽法不暇捕躍來萬里西南陲化為千尋之異石至今鬃鬛青離披千林松響訝哮吼半巖雲動疑奔馳勢凌羣山總獸伏獨有碧雞金馬爭雄奇神僧佛客作狡獪特以招提鎮其背霜鐘月磬䀨不醒吐霧吞霞騁光怪山林疑是給孤園樓閣幻成金色界寒飇吹處愈生威旭日臨時倍增態我來未敢輕笑談只恐驚騰向雲外登曠逸樓巡撫鄭顒錢塘上人棲迹雲霞中樓居背倚青芙蓉映簾花木四攢繞深幽雅稱金仙宫古聞滇陽擅佳麗五華特秀西南叢滄波遠引勢吞吐城闉俯瞰煙溟濛樓臺萬井互參列浮屠百尺髙凌空面前岡巒總奔赴嵯峨宛若君山峰點蒼山僉事童軒鄱陽點蒼山色何奇哉芙蓉朵朵天邊開嶙峋直上九千仞俯視羣岫皆蓓蕾夸娥不能移巨靈不能劈南風十日吹不平但見雲開橫鐵壁琪花瑤草四時間此景倣佛非人間千年老雪消不盡龍湫六月生隂寒我欲乘風升絶頂倒控蒼虬凌倒景黃鶴仙人手可招咫尺蓬萊五雲境泛舟歌參政朱應登寶應澄江江波翠蕭爽扁舟遠泛臨江上煙消日出意興殊牙檣捩柁平如掌南方嚴冬氣仍暖馮夷擊鼓同歡賞山黛石壁逶迤開蘋花荇葉參差長水鴉銜魚時出浦宿鷺將雛不驚榜白雲不動青山移四面合沓排銀榜須臾長風起天末寒氣颼颼振林莽驚濤駭浪倏怒號神龍錦鯉紛來往人生憂樂頃刻異世事浮沉足深想憂樂浮沉那可哀且將新酒溢金杯長江西南入交址馬援征行安在哉幾多掀揭回頭少古今偉絶俱塵埃江流不管古今事明日江頭人復來臨安春社行楊慎見前臨安二月天氣暄滿城靚糚春服姸花簇旗亭錦圍巷佛遊人嬉車馬闐少年社火燃燈寺埒材角妙紛紛至公孫舞劒駭張筵宜僚弄丸驚楚市楊桞藏鴉白門晚梅梁栖燕紅樓逺青山白日感羈遊翠斝清樽詎消遣宛洛風光似夢中故園兄弟復西東醉歌茗艼月中去請君莫唱思悲翁觀大理武安王廟畫壁歌武安王廟蒼山旁金生畫壁真擅長只今一百五十載火旗雲馬神揚揚古來好手吾能説開元之中三昧絶左衛將軍李思訓右丞才子王摩詰金生動筆思王李古法不廢今罕比何時放遣來滇水尋奇亦遇蒼山址乘興歘然掃素壁蛟龍抃舞長風起千年戰功猶昨日颯爽英姿炯不死想見解衣磅礴時寂寞後代覓心知蛛絲蟲網日凋壞賞者何人護者誰翻嗟古來才子蕪沒亦何限感慨為爾擊節生遙悲海風行蒼山峽束蒼江口天梁中貫晴雷吼中有不斷之長風衝波動林沙石走咫尺巔崖迥不分征馬長嘶客低首我行其野嵗仲春春寒野隂雲物屯病骨凌兢坐自躓欲去未到先愁人山靈相假若有神纖蘿不動停飇塵鳴鳥聲樂旅顔破僕夫笑語龐眉伸翻思往昔蘭臺直被襟曾奮雌雄筆金門玉堂遠别來景差唐勒長相憶飄蓬落葉向南荒憔悴榮華寧有常不學回風悲屈子江邊愁結芰荷裳寶井篇彩石光珠從古重窈窕繁華急玩弄豈知兩片弱雲鬟戴卻九夷重譯貢寶井曾聞道路賒蛇風蜃雨急天涯馳傳千羣隨嫖姚披圖萬里逐輕車君不見永昌城南寶井路七里亭前碗水鋪情知死别少生還妻子爺娘泣相訴川長不聞遙哭聲但是黃沙起金霧潞江八灣瘴氣多黃草壩連猛虎坡遍茅相對甘芝寨崩磧浮沙曩轉河説有南牙山更惡帕頭漆齒號蠻莫光搖戛燈與孟連啞瘴須臾無救藥莫勒江邊多地羊隊隊行行入帳房紅藤纒足詔法女金葉填牙緬甸王回首滇雲已萬里寶井前瞻猶望洋紫剌硬紅千鎰價真贋入眼無髙下得寶歸來似更生弔影驚魂夢猶怕吾聞崑崙之山玉拂鵲慶雲之地金擲龜安得仙人縮地法寶井移在長安街惡氛行金碧山前惡氛起賊馬來飲滇池水城西放火銀漢紅炎焰城頭髙十里兩重日暈圍白虹萬家仰首呼蒼穹相顧慘然無顔色嗚呼寄命須臾中賊徒渾幾個枕戈臨水臥我軍屯北門分明不敢過土酋脅盟來索官城上無言騎堞看父老倉忙雙泣泗細説去冬尋甸事絃急柱促柄倒持首禍今朝竟何自堂