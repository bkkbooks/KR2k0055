前代之遙對榛莽而堪憐尚有毛公之宇人稱並美德固有鄰以彼二百餘人為始為終非無翻覆之子獨此西南荒徼一生一死羣傳激烈之名惟遺教之在人久立祠以風世山川如故依然爭流競秀之觀廟貌安存不無世遠年湮之感芟其蕪穢爰復新之薦以蘋蘩為可繼也地仍雞麓因夢魂所熟流連顔以碧嶢借題贈之留舊額君子之澤未斬滇人之慕尤長死者有知神其永戀望青雲衣兮百世豈有離憂遇瀋陽公於九京亦應含笑典型不朽功德滋深用綴篇章聿伸仰止堁風菵露哀牢疆山川瘴癘難禁當新都公子老成客孤臣萬里堪悲傷年七十二金雞杳白頭搖落西南羌當時世廟議大禮撼門痛哭千夫強仗節抗疏言矯矯手觸蠆尾投蠻荒伊川不作晦翁逝今昔濮議誰斟量先生云臣所執者程頤朱熹之論大禮未定大獄起批鱗折檻空激昻璁蕚諸人恥同列詎知作俑來豐坊先生云學術不同議論亦異臣恥與蕚等同列明堂秋饗復聚訟餘毒林甫爭拍張謂分宜也嗚呼先生遂不返箐酋洞獠羣相將水弩含沙火雲熱天教老噉紅檳榔吳粉傅面兩丫髻簪花擁伎何徜徉都盧倒吹潑醉墨僰兒觀者如堵牆白狼噭跳烏爨弄百斛文鼎非尋常雷硠光焰留南詔好手濃煎班馬香我撫殘篇羅几案如嗅艾納兼都梁藻彩標格稱絶調矧於大節尤堂堂海莊故墟碧雞麓猩猩白晝啼書倉巾杖逍遙鬚眉古圖畫遺像生光鋩竹檜一徑夾流水菊乾楓落寒雲僵潮州儋耳同一轍祠廟贔屭摩青蒼小子作繭自裹縛形骸枯稿眠黔陽焉得升階更翦紙招魂歸送蠶鳧鄉髙吟幻夢誰憐句杲杲冬日朝在房先生詩云遙想生還成幻夢縱令死去有誰憐月令十月日在房青華洞提學吳自肅見前驅車驅車洱海旁盈盈一水煙微茫嵯峨紺殿朝朝陽登樓遙望山蒼蒼側聞古洞歌雲房躡屐從之心徜徉古色斑剝飛青黃入門骨冷神清涼後先燃炬紛成行驚魂駭目呼媧皇五丁巨靈開洪荒能為造化呈文章上真羣聖來仙幢錯落車馬聞騰驤獅蹲虎踞形飛揚向人作勢爪牙張美人隱隱芙蓉糚珊瑚叢架圍仙牀氤氲石髓沾衣裳鏜鞳互響聲鏗鏘前人留句爭輝煌誰堪獨步誇詞場我來四顧生倣徨吁嗟人世多面牆白夫謠輿夫輿夫生南滇盤雲渡嶺如登天羊皮覆背見餘體面如菜色生煤煙徒步驚看痛欲絶况復有物磨其肩晨興車過永平道老稚嘈雜來山前羣持炊餅爭相餉呼兒呼父聲顛連又見往來行路者驅同牛馬時加鞭吁嗟乎以貴役賤分應爾車中我見猶深憐彼雖蚩蚩亦人子以賤虐賤胡為然登太華山寺知府丁煒晉江山舊有寺頽廢范制俯鼎建撰刻太華紀勝我昔曾經西華嶽三峯秀削森如斫玉女明星插漢髙芙蓉去天才一握磋跎無計恣躋攀攬轡狂歌神齷齪朅來滇海已三年今朝乍陟太華巔入門雙眼眩丹碧應真龍象方新鮮琳宫結構仗節鉞隱然福地需名賢振夜直造諸天境瀲灧湖光開萬頃是時過雨洗煙鬟西子新糚臨鏡靚漁杈釣艇亞蒹葭夷猶不礙鷺鷗靜翠鴛金馬送青來紛綸誰暇窮要領落日沉波散綺霞瀫漪駘蕩驚龍蛇蕩胸奇景渺難狀憑闌拊掌徒吁嗟吁嗟兮苴蘭素號仙靈窟開闢何人為闡發子長空自傳西南忍使名山終汨沒摩挲碑版嘆髙文葛巾欲帶昆明雲擬拓銀鈎千萬紙寄與域中禽向共知聞臥遊勿忘太華美作配皓靈從此始蒼山廟古杉行知縣張泰交陽城點蒼廟前有古杉摩日干霄髙難攀鐵骨霜皮蒼翠枝枝拂山頭根抱巖風起濤翻震萬壑嵗暮深寒夜不落雷雨崩空倒百川振動虬龍怒拏攫山多松柏古且奇似兹獨樹誰能齊植自何年更何人混沌日月安可知昔聞匠工揮斧斸斧才舉手忽傷足心魄驚飛信有神用保天年蟠地軸七星昔傍麻姑壇傳説今已全摧殘惟兹十九峯中峯靈護此木蒼團團喜洲唐梅老幹矯蘭峯唐杉矗塵表看君自是千嵗顔較他年齒誰大小噫吁嘻武侯鐵柱今安歸蒙段宫室亦灰飛幾經太平幾離亂君獨亭亭無是非絶出煙氛挺介節過者拱立無敢褻儼如乾坤一偉人經厯撑持百不折余來幾度瞻其旁今日蘋蘩春薦香祝神更加培護無翦伐天家正須此材為棟梁南莊道中侍講許賀來石屏南中十里走平陸遠近村浮煙樹緑曠莽原田半荒蕪隴上草青間臥犢馬首西風送午涼橋外泉聲咽緑竹半實半秀稻花香不雨不晴雲斷續蒼茫何處是龍山隱見樓臺攢古木此間幽寂可栖真擬向峯巔結茆屋秀山古柏督學魏方泰廣昌天地古氣伐欲盡秀山老柏猶崢嶸孤樹半霄青未了落落不爭桃李榮我來湧金憩柏下雙湖雨滌流雲英蒼虬攫雲撼大颶遙空颯沓餘秋聲秀山茶花行滇中四時春不斷山行日月褰帳看絶倫最是秀山茶倣佛朱霞燦天半七十二種各夭嬈卷瓣分心作意嬌密葉真成青幄幔臨花偏愛軟枝條寶花玩月飄輕倩更聞朵朵隨風轉到地猶同向日葵不教泥滓涴花面自從初夏已含胎破臘驚看共蚤梅一花能耐經旬綻一樹能經兩月開讀書寒士娛清暇數枝分種雞窗下聊學郭駝供筆資售向人間無髙價豪家競費賞花錢牡丹富貴芍藥妍寂寞自開還自落無人攜酒此花前我今為爾澆醽醁碗大紅毬喜不俗繞樹日長千百回夜深還復燒髙燭髙燭頻燒喚奈何金樽莫惜醉時歌有客座中忽太息不知何事感生多客言海棠雖嬌嫩香氣有無何足論有香未到十分憐無香寧抵十分恨憐轉深兮恨轉深此花植得費沉吟可惜當年人不見空抱煙村一片心我亦雅同彭氏趣不計無香廁花數憐到此花恨不生轉恨客情太膠固小枝覓得兩三盆準擬攜歸溪上村清風也自慚投硯隔霧不圖老眼昏更酬司花祝不已願花長似昆明美江北江南總是春莫教橘去翻成枳禹碑歌主事段昕安寧禹碑即韓昌黎詩所稱字青石赤鸞飄鳯泊者當時亦傳聞於道士之口故有千􅊧萬索之句未嘗親見其碑也然同時劉夢得詩亦有嘗聞祝融峯上有神禹銘古石琅玕姿祕文螭虎形之語則此碑實有之獨惜好古者􅊧索不得致疑以傳疑東坡云岣嶁何須到韓公浪自悲及朱紫陽遊衡嶽不見此碑著韓文考異遂謂韓詩為傳聞之誤嗚呼禹聖人也禹碑神物也有見之者有傳之者有􅊧索不遇而疑之者其顯晦當亦有時耶明嘉靖間吾鄉碧泉張先生撫蜀歸出拓本以示升庵先生云得之衡山者共七十七字篆皆龜龍文人多不能曉升庵乃象形會意句為之譯惟四字未解夜夢黃衣魚首人曰此南瀆衍亨也禹碑自是有全文矣遂摹於州之法華寺後石壁照原本鐫之自明至今又將二百餘年字俱完好好古者每摩挲不能去余生韓公後將干年矣唐宋諸先生所不得見者余乃得於咫尺之地可不謂幸歟韓蘇石鼓詩光焰萬丈照耀千古余才薄劣萬萬不逮古人然見神物而喜傳之不自知其手筆之凡近也因作歌以繼升庵先生之後云岣嶁山尖神禹碑字青石赤形模奇韓句誰何道士偶一見昌黎徒作猿猱悲令人􅊧索不可得紫陽考異空傳疑芙蓉紫蓋開扄鑰祕文靈寶無人窺雲封榛塞幾千載龍威丈人知復誰那知神物有時出鸞飄鳯泊天南陲碧泉老人探笥篋元圭文命光陸離新都戍客識奇字象形會意按根枝神人指授盡了了補天巨手非人為七十七字鏤金薤雷霆騰耀星斗垂寒山石擘巨靈掌鬼工天巧司斤鎚太乙下視舌上嬌髙撑天柱支坤維鱗者鬛者毛介者龜龍蟲鳥魚虹螭祖禰軒頡孫史籀三古以後無其辭憶昔昏墊警神聖司空幹蠱承帝咨蒼水使者授金簡驅神役怪攣支祈勞形忘家竄鳥獸鬱塞昏徙萬國治嶽瀆平定衣食備至今水土歌雍熙此石此字天地寶祝融呵護天留遺鴻都人喧石經蔡嶧山火燎丞相斯六書八體妙雕繪奇古獨數石鼓詩對此紛紛悉傾倒五都市物見鼎彛西南僻遠少文獻文章大塊無如兹晶光閃爍留晚照晚照安寧八景之一勒石碑處金碧鬼神常肩隨生世太晚不足恨古人不見我見之坐臥摩挲手刻劃無異身在鑄鼎時剜苔剔蘚補齾缺體勢飛動神淋漓字青石赤形模奇岣嶁山尖神禹碑弔甘忠果檢討王思訓昆明長鯨激浪昆池泄萬頃翻成龍戰血鬐鬛飛上碧雞山頭觸西南天柱折霧作蚩尤將士迷大僚泥首遭燃臍蒼鵝匝地銅馬健花叢蹂破金稜堤霜鼙振動幾千里前突鴉軍尹與史靈寶不戰哥舒降睢陽誰效中丞死重臣抗節獨有公戟張頿髮聲靈霳誓掃妖氛難徒手呼天灑血黔山紅臨淮齧指少南八無與守者妾空殺羽檄親馳出調師欲以精誠格所轄時公聞變將守城拒賊而將士已皆從逆勢莫能支因謀馳赴鎮遠扼抗咽喉調集楚師為恢復計單騎提攜稚子孤何善雅圖奔相扶苦飲三日豺虎血溯從潕水穿崎嶇但期調集楚衆力枕戈滅此方朝食遍地腥羶蜂蟻多橋上弓刀樹如棘空有浩氣絶外援舌在不愧顔平原隔河罵賊怒清涌沙洲徒卒聞斯言從容步至吉祥寺北望再拜畢臣志幼兒引頸兩客隨笑赴重泉事不二江臯亂石埋幽魂鵑啼猿叫愁鴟蹲天地黯慘日光薄靈精貫月悲黃昏大兵南下靖醜孽先闢蓬蒿尋壯烈傲骨㟏岈護鬼神握拳透爪眥猶裂九重動色咨廷評錫以忠果名錚錚羣生享比竹王墓踏歌夔鼓吹蘆笙滇人猶不忘厚德築以佳城植松柏哀鳴楚些曰歸來絮酒登髙招毅魄貞臣之後世其昌繼麾節鉞臨巖疆過廟挽思暮雲濕專祠東郭升馨香在昔子充不辱使千秋奇節芳蘭芷有人慟哭記滇南復見今時王孝子喬木厯厯煙蒼蒼髙山仰止煙水長豈必羅池賽神降丹生荔子芭蕉黃吁嗟老濞逆天道七國因之不能保溪毛澗藻薦孤忠何處吳宫問花草巨靈峽知州周鉞長洲巨靈作力不可當劈開太華分首陽髙掌遠跖有零落飛此雲霞墮杳茫羅漢壁上斗絶處嶄焉突兀懸危岡天斤鬼斧未施巧多事欲試百煉鋼長柯十尋漫擊掊猿緣猱陟難跳踉徒有勝情乏勝具愛奇入骨空倣徨無階可升自硉矹騁目亦足凌青蒼安用拙工費頑鈍乃使磊砢遭拍張恩樂縣歌總督鄂爾泰滿洲星連井鬼古荒服蒙氏自王詔分六馬龍他郎甸殊名通呼者島夷所熟更為猛摩隸銀生阿僰據之蒙日蹙終唐迄宋六百年蒙亡段繼那能復元至元間轄元江阿哀阿羅歸簿録初授軍民長官司蒙統蒙魯世夷目洪武內附仍頭銜者樂甸邑比湯沐來者木版賜姓刀戶領幾千丁蕃育祖孫父子十七傳我朝四代歸臣僕雍正丙午清邊疆順者安恬逆者戮萬寨百蠻皆傾誠仰識天心聨斗獨聨斗刀氏之後精悍由來是健兒銜壁牽羊俯首伏只求改土署流官不愛腥羶愛薄粥上章代奏達天門榮頒官帶九品祿升甸為縣賜嘉名詔傳恩樂人爭讀縣衙恰對文筆山地脈受自碧松麓松濤拂几筆陳雄遙望一峯賽雞足三字山名繡嶂重圍似屏扆山名老梅山名橫出凹巴腹夷呼老梅山為凹巴山霓旌炫日三家坡立營於此軍容壯麗邊聲肅景來水名河源自景東哈􅸍嚕三字景東水名魯馬所出鞭魯馬水名瀆浦麻托寫二水名出鎮沅七鄉田疇同霑霂漢人不及夷人多分為五種别其族一種擺夷刀姓繁性喜憑髙居重屋稱父為爸母為咩艾男葉女相呼逐衣著多與漢人同偏好花巾頭上覆女子綰髮青幅纒短衣線帶羞綺縠端重整齊愛桶裙翻嗤紈袴太澀縮婚盟亦藉媒妁言茶鹽通好兩姓睦用茶鹽薑糖等作聘催縫布袋賀新年拋擲空中迓百福六月草四光燭天燃炬鬭火雲煙矗刴腥醢肉劇相呼何必繁絃勞絲竹家家好鬼不信醫吉凶疾病無須卜也教子弟學讀書但願留淳化其朴一種蒲蠻似擺夷譬如五穀穜與稑若非面目殊直欲指馬呼為鹿一種窩泥好樓居屋角開門何局蹴王曾田畢與劉彭方之漢姓無差繆蓋頭四角彩線垂一方青布人何淑别嫌亦惡同姓婚親迎遠避蟲蛇值始喪殺豬復砍牛孝子心悲腸轉轂姻朋入山木作槽舉室哀吟向槽哭筮日殮之葬山坑忍效貍首歌登木近日雅聞絃誦音曲跽延師誇入孰一種古棕性格懸不耕水田種山穀巖栖嗜酒訪街期扶醉歸來喜可掬佳人辮髮不橫叉笑殺簪珥藏糚簏納聘納采銀與牛歌跳吹笙傾百斛卻嫌牀蓐髙生寒環火同眠儉且􅫥亡者既焚骨不收撮土低埋嗟何速一種猓玀豪姓誰羅馬張楊比潘陸山居不愛石作牆環以木塊周四隩牛豕滿欄雞滿柵體肥骨細工牲畜麻苧宜涼羊皮溫世間那怯有寒燠閨中慣喜著長衣裙穿百摺拖六幅束髻懸彩類窩泥冰上老人往而復門外青青髙結蓬肥肉多煮酒多漉新婦蓬下會佳兒攜手跳歌心轣轆俗尚巫鬼構松亭搖旗呐喊同尸祝屋後喧闐屋前聞宰殺犬羊等雛鶩尸燒形化骨不銷貯以罌瓶葬崖谷結茅忽又向他山啓瓶别踴躍築天生夷猓各不齊風猶近古渾朴遬仁義禮智忠信鄉六鄉名願汝同心歸雍穆勿須學劒但讀書要知賣刀去買犢讀書耕田享太平恩樂無疆子孫育作此好歌敬聽之什襲以珍藏之櫝趙州席歌教授趙淳趙州趙州席密同竹簟堪永夕無限辛勤織得成孤燈促織鳴東壁困來祗自藉蒲眠留取精良輸戶役自入朱門籍錦衾恣睢蹴踏誰復惜補遺本朝乾陽山遠眺五言古知府張漢石屏偶從山背行南訪乾陽面路轉出崇岡明湖橫一鑑起欲淩風翔長空拙羽翰洞口俯長川髙卑陳所見直俯北山趾橫俯南山尾山勢東南來跳擲層波裏支壑與蔓峯駢拇還枝指勢欲穿湖來山麓畏觸抵山島忽在原孤城忽在沚斗大一州橫微茫見城市廣此視九州九點煙猶此縱目西復西秀山接杖履我家華表柱玉立隨雲起迢迢白雲間情深慰陟屺振衣萬峯前臥遊終百里天垂一冪青離天可盈咫洞始何年開洞終何年圮終始不須論洞虛何所倚古來幾遊人古人長已矣後人續遊觀遞遊何日止我輩有今日兹遊為情使請申今日歡山尊起重洗雲南通志卷二十九之十三欽定四庫全書雲南通志卷二十九之十四五言排律唐詔放雲南弟子還國鄭洪業德被陪臣子仁垂聖主恩雕題舞鳳闕丹服出金門有澤沽殊俗無征及獖􅏈銅梁分漢土玉壘駕鸞軒瘴嶺蠶叢盛巴江越巂垠萬方同感化豈獨日南藩元碧雞山宣慰使張雄飛臨沂北闕辭丹鳳南雲看碧雞紫苔移玉座瑤草濕金泥雨霽龍歸洞風生虎渡溪尋梅穿竹徑採藥躡松梯白日依山盡青山入海低寄書無雁過擇木有猿啼花映高低樹園分逺近畦飛星馳寶馬沉水吐銀猊魚戲蓮房北鷗鳴荻渚西長歌漢頌罷刻石紀新題明石屏道中僉事歐陽旦安福地瘴天愈熱風開日乍晴青山迎去馬緑樹引行旌畎畝苗初長陂塘水欲平花因成子落鳥為戀雛鳴逺近田家舍參差野戍營牧童偷李實山女賣松明載米人趨市傳餐婦餉耕土夷頻問種野草亦詢名紫石函端硯香茶勝雪坑偶然得心趣石隙一泉清遊石寶寺楊慎見前迥回澗數峯合叢篁一徑斜翠氛林蓊日斑澑碧橫霞石棧重懸閣雲亭半蔽花甍傾警燕雀窟迥錯龍蛇昏曉更天界隂陽竄物華檀施象數著幻巧鬼工奢千尺罥羅幕雙堆擁玉髽厨人羮緑笋溪客飯胡麻單夾春身健空山雨後譁諸天人不到來往白雲車遊崇聖寺塵劫非人境煙霞是佛都山開銀色界海湧玉浮圖追蠡形猶壯伽藍迹已無經函飄粉蠧畫壁剝天吳零雨頽牆草驚風廢井梧禪心隨夜寂旅望對秋孤遠目窮千里傾懷倒百壺狂歌意無極感此歲云徂九鼎寺路繞羊腸轉雲從馬首開半崖交草樹絶壁倚樓臺碧澗聞幽玉丹邱問劫灰佛緣甘苦寂僧行厭喧豗野鹿銜花過山禽薦果來獨耽塵外趣人世莫相猜蒼洱紀行十八韻提學方沆莆田褰帷望不極載槖復西征衆壑隂晴異長洲草木平人稀餘燕雀野曠絶鼯鼪未遂初衣賦空懸攬轡情烽煙無夜吠禾黍殷秋聲驄馭行看遍雞峯舊有名捫蘿神霧合支策洞雲迎逸興王猷得高才季重並時王虞卿吳原豫二憲使同遊披襟靈鷲嶺息駕葉榆城杞菊寒生態松筠晚結盟俄驚霜鬢短翻訝一陽萌映帙迥回斜照移樽對落英西南滇萬里禮樂魯諸生搖筆風堪變羈心歲屢更鄉書鴻渺渺交誼鳥嚶嚶步屧孤亭爽焚香百願清泉流來枕簟山色到簷楹更憶高陽伴歸歟采杜蘅溫泉謝肇浙見前靈砂蒸地脈暘谷沸成湯孤館雙巗削寒塘半畝方優曇非有種豈蔲自生香砌玉迎苔碧騰煙射日黃醉應眠水底間可泛溪旁纓以無塵淨心從不垢涼滑增紅膩玉色沁緑沉槍秋水含朱女清風傅粉郎難投夏浦佩且宿贊公房回首當城下凄然憶故鄉茶花百咏鄧渼見前滇茶甲海內種類之繁至七十有二其在省城內外者尤佳豫以庚戌歲按部事竣駐省候代時值冬末春初此花盛開名園精舍間獲寓目爍日蒸霞摛文布繡火齊四照雲錦成帷信天壤之竒觀品物之巨麗也昔人謂此花有七絶豫以為未盡厥美有十德焉色之艷而不妖一也樹之壽有經二三百年者猶如新植二也枝幹高疏有四五丈者大可合抱三也膚文蒼潤黯若古雲氣樽罍四也枝條黝斜狀似麈尾龍形可愛五也蟠根獸攫輪囷離竒可屏可枕六也豐葉如幄森沉蒙荗七也性耐霜雪四時常青有松柏操八也次第開放近二月始謝每朵自開至落可歷旬餘九也折入瓶中水養十餘日不變半吐者亦能開十也此皆他花所不能全者因考唐人以前此花獨不經題咏以僻逺故不通中土遂使竒姿豔質淪落無聞近代有作率多不能為此花傳神暇日因戲為百咏詩一首牽綴比擬未免兒態庶幾為此花吐氣傳之四方或有採焉遍檢古人句山茶未得名形容應有待品價似難輕此地本炎德在天疑火精芳菲迎暮歲爛熳及元正宜壽如山木莊子篇名經霜似女貞柔條牽百丈老幹倚孤撑美蔭團松蓋新㽔怒竹萌重葩翻蔽葉岐蒂總依莖接植人工巧土人植茶法用兩樹相接花始繁盛開先品物亨光華分若木肌理細殷柳疉蕚曾承露豐苞獨嚮明叢深疑避蝶春淺未聞鶯次第開偏久交紛壓恐傾巨於璙碧盞圓若紫繁纓韍綬交垂綵綃紈乍染頳紅膚時綻甲赤色合居庚按譜遺金谷邀歡即錦棚流雲相照映射日更光晶篋啓紅羅纈餐分紫石瑛摘鬚嫌斷線接蕊愛連瓔覽德冠稱鳳能言喙屬鸚火齊銜粉壁舍利到金罌道士霞為帔佳兒錦作綳枝枝經纂組朵朵薦璣珵漢苑裁何得隋宮翦不成深宜藏翡翠艷欲惱鵁鶄摯虞鵁鶄賦見水則喜睹火則憂步障褰華薄氍毹展絳英影懸金較帶汗落錦斑騂似焰噓丹竈為霞燒赤城深元同燕燕點血類程猩繡羽懸雕籠朱輝發短檠霜林搖翠葆海日浴金鉦錦水徐鄰浪矞雲不作霙紅毬分綵索朱芾間蔥珩栁絮空傷媚芝房詎足正稱名根野荈奪色妬山櫻蓮或羞泥汙葵空向日誠珠離酒泉奈蜜剖楚江萍質本堅蒲栁香無取杜蘅道旁徒樹李庭院枉栽荆乍可蘭為友誰言棣是兄繽紛異紅藥憔悴惜朱嬴菊名逾月遲蓂落終朝惜蕣榮古詩蕣榮不終朝詎稱霜挺桂天台山賦八桂森挺以凌霜何事雨移橙用杜詩嘉種雖分部兹花合主盟杜鵑殊不類二芳記以杜鵑花配山茶鶗鴂敢先鳴的皪披林影菲微散曉晴後雕仍早放霧繞更煙縈閩婢空慚賤金鳳花楊妃别有情别種有楊妃山茶寶珠光自溢磬口韻猶清枝愛垂絲軟心憐捲瓣生蝶翎看墜粉鶴頂似含瓊茶品之貴者有寶珠磬口軟枝分心捲瓣蝶翅粉鶴頂紅諸名一種皆稱美羣芳孰與爭嬌姿長似寤姱質更如儜露下啼粧泫風前舞態呈施朱嫌太赤頽玉未辭酲倏似顰容斂遙當笑靨迎口脂香澤傅眉黛逺山橫合德偕宜主娥皇儷女媖令人疲應接有客更屏營倚處慚形穢看時恐目盲道德經五色令人目盲每當春淡蕩及此歲崢嶸節候佳南詔繁華匹上京深紅間淺紫布谷復彌坑旭景宜蘭若霞鋪駭楚傖紛敷彌繡野徙植近雕甍竊慮霜威入思將夏屋帡窺垣恆寂寂隔水更盈盈早沐緋衣賜偏宜素腕擎助嬌斜寶髻充耳當瓊瑩賞玩須歌伎吹噓借墨鄉招搖多伴侶感愴易嫠惸天女貪分供園丁差價贏每歲元日市賣此花供佛紅紫溢目出門逢巨麗曳杖陟嶢崢婀娜隨烏帽飄颻墮兒觥杯盤狼藉列車馬往來偵曉駐浮雲蓋宵移玉柱筝佳人理叉釧貴客駐干旌競作尋花使寧辭醉酒鐺夷謳徴穆護曲調擬清平舞袖淹同坐纏頭費從伶攀留思逺道折贈付來伻不遇神農録空留姚魏聲紅顔銷瘴癘珍品失寰瀛安得移中土猶堪慰此行僰童應見慣楚客易心驚幾樹臨官舍三牟慰旅程有時還獨倚竟日但空瞪盛極憂衰至憐深與恨并物華虛冉冉此意自怦怦坐撫琴三弄間消酒一盛眠須㩦枕簟狂或繞簷楹相賞無知己餘酣對老兵何心思北土有賦侈南征感處人千里吟當月五更未須怨搖落終許伴幽貞暗覺鄉園近深嗟世網嬰嵇含狀草木桂海志虞衡逸史竒應續新詩暇自賡屬辭深比興從此定佳評叮噹山鄧原嶽見前灌木千章合巗花三月深泉聲盤嶺急雲氣結林陰駐幰方危磴褰帷復遠岑嵐光添秀色靈籟發清音不盡􅊧羅興其如汗漫心計程無百里問徑有千尋臃腫圍竒樹軥輈語怪禽未須愁瘴癘頗已愜登臨西塞狼煙定南天雁羽沉嘯歌還不廢聊此散煩襟七言排律明平彝老人副使何景明汝南平彝老人髮兩肩哀哀訴語淚如泉歲收斗粟輸田賦日向諸鄰乞米錢風雨飢寒趨路側子孫流落避兵年青春有伴難還土白首無家尚戍邊官裏征徭何日已軍中苦樂古來偏魂驚戰鼓心猶怯背中飛弧肉盡穿獨去負戈尋夜寨誰來銷甲種春田敢愁溝壑填衰謝只擬封疆息燧煙我願麾前法唐將籌邊有策到今傳春集天臺寺何大參賔巖適至李元陽見前暖律初交霜雪微春光湖色兩依依明帆幾點碧波淨弱栁千條緑草肥羅綺風輕嬌麗日鞦韆影轉逗斜暉當年修禊追同好分日遨遊願不違古壁丹青窺澗户春城車馬競山扉九徴蝕柱標唐迹諸葛荒臺帶漢威檀界輕煙香細細溪橋小雨白霏霏詞臣節自蓬山下王母鸞從玉笛飛但見景光前度似郤嗟筋力近來非芳時郊野煙花簇盛代山河錦繡圍不有君恩許疏放豈堪消受芰荷衣本朝摩蒼山次韻舉人徐崇嶽保山十里煙巒紫翠蒙㩦來清夢許君同石能生月寒如雪松欲拏空韻在風鐘歇定僧眠正穩茶香半偈聽初終王郎砍地猶酣酒安道逢人已碎桐蹈海幾年空憤世盟山此語實由衷佳人化石情何極處士妻梅事可通三笑好添溪水上一笻先指洞雲中不須更問藏書處家住摩蒼東復東五言律唐南中寄皇甫侍御主簿賈島范陽曉鐘催早朝自是赴嘉招舟泊湘江闊田收楚澤遙雁驚起衰草猿渴下寒條來使黔南日時應問寂寥送雍陶入蜀江山事若諳那肯滯雲南草色分危磴杉陰近古潭日斜褒谷鳥夏淺巂州蠶吾自疑雙鬢相逢更不堪送裴璋還蜀刺史雍陶成都家在劍南外新年音信稀自為千里客已送幾人歸陌上月初落馬前花正飛離言殊未盡春雨濕征衣明晚入五華山訓導胡粹中山隂向晚歸幽寺明霞飛逺林四山新雨歇一徑緑苔深松老齋僧臘泉鳴扣梵音階前兩馴鹿去住任禪心望楊林澤布衣蘭荗嵩明秋水涵空闊登樓雨霽時山低月上早風細浪生遲鳧鴈棲難定魚龍勢莫窺何人舟一葉撑破碧琉璃滇南即事三首都督沭璘定遠自昔梁州域西南路盡通碧雞名岫逺金馬故關雄羅婦裙花布蒲蠻臂柘弓聖恩同覆載處處樂時豐漫説滇南俗人民半雜夷管絃春舍早燈火夜街遲問歲占雞骨禳凶瘞虎皮輶車巡歷處時聽語侏􅍣萬山藏古寨六詔雜諸蠻僰女頭籠帽番僧耳墜環啖蛇傳土俗屠犬祀神姦更有西戎種輕生性最頑天井鋪童軒見前偶坐炎方客來披六月裘山高赤日薄樹老白雲留聽瀑全疑雨臨風絶勝秋煩心如到此何必玉壺遊鶴慶道中巖深多險阻馬足正凌兢暝雪依巢鳥斜陽歸寺僧林疏鳴敗葉澗古積堅冰去去無辭逺荒山又幾層遊十九峯深處土知府木公麗江探幽逺入林僻徑轉難尋雲漏斜暉影山藏古雪陰蔦蘿懸樹密潭水出磎深此地無人到寒猿日自吟高嶢登舟閃應雷永昌湖光三百里一棹界中流碧漢銜波動青山拍鏡浮葦煙迷鷺渚篙月挂漁舟不待逢搖落蕭蕭六月秋滇池泛舟見新鴈楊慎見前忽見行行鴈來應自故鄉天涯多少路雲際幾番霜滇水饒葭菼禺山足稻粱金河爾休戀無限塞弦張圓通寺夏言見前古寺翠崖隂危亭絶頂臨鶴巢松有夢雲出岫無心仄徑攀蘿上叢臺刻竹吟南蠻秋日暝哀響合猿吟懷古副使萬嗣達險箐維千里重關抱九隆流沙神禹迹越析舊唐封蜃氣蛟河重龍珠鶴嶺雄萬年當鎖鑰一柱表崆洞移石亭草王知府木青麗江萬松深窈處獨構此茅廬劚地移新竹通泉澑水渠琴書常作侶木石與為居笑殺求名者磻溪一老漁過蒲陀崆參政薑欣南昌蒼洱西頭路秋來幾往還一村三渡水十里九重山僧寺多依嶺人家半雜蠻草年成底事巖險苦躋攀龍尾關天生橋方沆見前蒼嶺青未了寒煙野戍平危梁通地􅎃削壁類天成霜色孤鴻瞑濤聲萬馬行昔年曾割據形勝控榆城過蒲陀崆觀洱河源尋源聞黑水百折此山隈鳥道雙旌轉陰崖一線開奔濤疑聚雪觸石忽喧雷為别東流性南溟去不回白水驛和魏道中韻大學士張瑞圖晉江策馬臨荒甸前旌度渺茫空山足霧雨絶徼異陰陽處暑偏衣冷方秋覺夜長亦知行尚逺未敢念江鄉本朝滇南雜興編修典試史申義江都漢室兩司馬遙持使節臨江山有文彩兵甲已銷沉鸚鵡千山語檳榔萬樹隂賦心兼史筆才藻入清襟賔居曉發入蕉谷知府黃元治徽州野空多宿靄日出破寒隂馬首芭蕉谷人聲橘柚林溪回茅屋角路繞蔗田心折過黃沙阪僧鐘下碧岑觀風日再示諸生鄂爾泰見前帖括元何事飛騰道在兹未能甘泯沒那得任支離賓主禪宗偈色絲孝女碑汝曹須努力冠劍及明時登太和宮俗名銅瓦寺鑄銅為殿環築甕城明撫軍陳用賓偕沐公裔孫創建時勸農東郊抵般羅村因而就登焉迎仙橋入山處也畔路鸚鵡即此山又庵名度驂騑細徑盤高躅橫枝掠健衣一行奉時令小駐仰仁威殿額名銅瓦功勳碣摩挲認夕暉同楊凝齋先生藩署觀荷一勺碧玻璃紅衣白羽齊臨風標淨質出水濯淤泥翡翠吟隨影鴛鴦蓋被堤豁然亭名對君子徙倚夕亭西九日海天閣秋氣鬱佳哉秋鴻歸去來百年原是客萬里獨登臺黃葉寺前雨茱萸江上杯海天際寥濶搔首矚林隈聞雁故國霜前雁驚聞夜唳秋何來寄書信此去少蘆洲矰弋寧長避飛鳴不暫休衡陽輕萬里愧爾稻粱謀登署中卷石亭按察常安滿洲縱目無餘地登臨有此亭振衣盤石磴著屐破蒼冥一水連雲白四山入座青舉頭南極近直對老人星過小關嶺知州夏治源漢陽北伐先南入雄關抵劍門干城蜀將相壞土漢乾坤豈是粗安計須知七縱恩千年征戰地古柏至今存宿迷渡知縣田榕玉屏夙昔知津客今宵歎渡迷路遙黑爨北山亂白崖西古瓦翻松鼠荒林叫竹雞眼看春盡處一問小偏提麗江雜詩二首倪蛻松江晚街分鬼市蠻婦雜雌聲屋小皆甌脫人稀半寄生通番俱有路設險竟無城辛苦防邊計年年卒踐更纂譜從秋葉追原自古年頗疑天女誕或信麥宗賢漢詔猶蠻觸元官郤世延從來經國事逺御有微權七言律唐都慶觀御史杜光庭縉雲三山一一駕紅鸞仙去雲間逺古壇煉藥舊臺空處所挂衣喬木兩摧殘清風嶺接猿聲近白石溪涵水影寒二十四峯皆可隱振纓長往亦何難鴻都觀亡吳霸業已功全深隱雲林始學仙鸞鶴自飄三蜀駕波濤猶憶五湖船雙溪夜月鳴寒玉衆嶺秋空斂翠煙也有扁舟歸去興故鄉東望思悠然元題河尾關驛壁喬堅蒼峯千丈玉槎牙錦樹糢糊噪晚鴉濁水難將明月浴好山多被亂雲遮村江日落人爭渡旅店年豐酒易賒可是炎方風景别深冬開遍野桃花明通海湖布政謫戍韓宜可山隂江寒鳬鴈集汀沙半掩柴門夕照斜洞口煙嵐連野燒城頭鼓角雜寒笳猿聲常嘯林間月鴉背輕翻樹杪霞幾度扶笻翹首望青山隱隱隔天涯送胡榿軒還永昌都督冰昻定逺有客乘驂過洱西平原春草正萋萋人煙迢遞連金齒山勢逶迤拱碧雞流水小橋楊栁緑落花微雨鷓鴣啼遙知别後相思處雲樹蒼茫夢欲迷和建文帝作編修從亡程濟績溪吳霜點點鬢毛侵不改惟餘匪石心作客歲寒應自久避人巖壑未曾深龍蛇追逐知心少魚鴈依稀逺信沉回首金陵悲往事短笻高岫一登臨遊太華潘仁和州天風吹鬢酒初醒太華峯頭且共登山色慣迎逃世客水聲常送渡溪僧定中雲去龍生鉢夢裏猿啼月在藤最愛石窗風雨過蚤涼先到讀書燈太華寺郭文見前晚晴獨倚栴檀閣煙景蒼蒼一望開湖勢欲浮雙塔去山形如擁五華來仙遊應有飛空舄僧去寧無渡水杯不為平生仙骨在安能得上妙高臺遊無為寺沐璘見前白石磷磷積翠巒林花深處有茅庵煮茶迎客煙生竈斸筍出山雲滿籃香爇龍涎清沴氣壁懸麈尾罷禪談野禽不斷人來往驚觸崖花下碧潭漾備道中童軒見前十載馳驅不暫休又銜君命到南陬涼蟬細雨疏槐晚疲馬西風落葉秋萬里有家恆作客一官多纍漫成憂百年事業知何在辜負滄浪舊釣舟拱華樓大學士楊一清安寧螳水潺潺不斷流白雲芳草帶斜舟坐來山色無餘地占盡風光是此樓雞嶺夕陽高樹合石橋新雨落花稠也知看竹須乘興不用東君掃榻留樓山夜宿御史張西銘寧州寒巖絶壁宿深秋悵望遙空動客愁啼鳥按更山月缺殘燈映榻野螢流蹉跎歲月悲雙鬢寂寞風煙老一裘今日褰裳辭舊侶似聞笙鶴過高樓九日黔國後園何景明見前