body:
  text: 欽定四庫全書雲南通志卷十二經費文職官俸役食喂馬生員廩餼鋪兵工食鞭春祭祀武職官俸經費兵馬餉乾月米驛堡恤附賞周禮以九式均節邦之財用司㑹掌之所謂祭祀匪頒芻秣之類嵗有常需皆與正供相權量以為出入者此經費之規必預知其數㑹通以制用也滇以瘠土處巖疆嵗入每不償其所出內則仰於大農外則資於協餉我列聖相承以至今於邊省軍國官民之計尤厪籌維不特䖍共明祀典禮加崇而所以優賚臣民軫恤軍士尚有出於定額之外者所宜與月要嵗㑹之常著為成式者同垂志乘也志經費賞恤附焉文職衙門總督雲貴部院俸銀一百八十兩門皂傳報等役三十八名每名工食銀六兩共銀二百二十八兩嵗共銀四百八兩滇黔各半雲南支銷銀二百四兩巡撫副都御史俸銀一百五十五兩門皂傳報等役三十八名每名工食銀六兩共銀二百二十八兩嵗共銀三百八十三兩提督學院俸銀係户部支銷門皂快手等役三十五名每名工食銀六兩嵗共銀二百一十兩布政使司布政使經歷理問庫大使庫副使共俸銀三百四十六兩五錢二分門皂快手等役六十一名每名工食銀六兩共銀三百六十六兩嵗共銀七百一十二兩五錢二分按察使司按察使經歷司獄共俸銀二百六兩五錢二分門皂快手等役五十五名每名工食銀六兩共銀三百三十兩嵗共銀五百三十六兩五錢二分驛傳鹽法道副使經歷庫大使共俸銀一百九十兩門皂快手等役四十三名每名工食銀六兩共銀二百五十八兩嵗共銀四百四十八兩糧儲水利道副使俸銀一百五兩門皂快手等役三十五名每名工食銀六兩共銀二百一十兩嵗共銀三百一十五兩分巡迤東道副使俸銀一百五兩門皂快手壯丁等役六十五名每名工食銀六兩共銀三百九十兩嵗共銀四百九十五兩分巡迤西道副使俸銀一百五兩門皂快手壯丁等役六十五名每名工食銀六兩共銀三百九十兩嵗共銀四百九十五兩雲南府知府同知通判知州四員知縣七員經歷州同縣丞吏目四員司獄典史七員教授學正四員教諭七員訓導十二員共俸銀一千七百七十六兩四錢八分門皂壯丁等役九百二十五名每名工食銀六兩共銀五千五百五十兩喂馬銀一百四十四兩廩生三百名每名廩餼銀二兩四錢共銀七百二十兩鋪兵一百二十九名每名工食銀三兩六錢共銀四百六十四兩四錢鞭春銀三十四兩九錢九分五釐祭祀銀三百六十六兩嵗共銀九千五十五兩八錢七分五釐曲靖府知府同知知州六員知縣二員吏目六員司獄典史二員教授學正六員教諭二員訓導八員共俸銀一千三百二十二兩三錢六分門皂壯丁等役六百七十四名每名工食銀六兩共銀四千四十四兩喂馬銀一百八兩廩生二百三十名每名廩餼銀二兩四錢共銀五百五十二兩鋪兵五十八名每名工食銀三兩六錢共銀二百八兩八錢鞭春銀二十兩祭祀銀二百二十八兩嵗共銀六千四百八十三兩一錢六分臨安府知府同知知州四員知縣四員經歷吏目四員司獄巡檢五員典史四員教授學正四員教諭四員訓導九員共俸銀一千四百四十九兩九錢六分門皂壯丁等役六百五十一名每名工食銀六兩共銀三千九百六兩喂馬銀一百八兩廩生二百四十名每名廪餼銀二兩四錢共銀五百七十六兩鋪兵一百四十名每名工食銀三兩六錢共銀五百四兩鞭春銀一十九兩祭祀銀二百二十八兩嵗共銀六千七百九十兩九錢六分澄江府知府通判知州二員知縣二員吏目二員司獄典史二員教授學正二員教諭二員訓導五員共俸銀七百三十兩二錢門皂壯丁等役三百六十一名每名工食銀六兩共銀二千一百六十六兩喂馬銀六十兩廩生一百四十名每名廩餼銀二兩四錢共銀三百三十六兩鋪兵三十八名每名工食銀三兩六錢共銀一百三十六兩八錢鞭春銀十兩祭祀銀一百二十四兩嵗共銀三千五百六十三兩武定府知府同知知州二員知縣經歷吏目二員典史巡檢教授學正二員教諭訓導四員共俸銀六百八十二兩一錢六分門皂壯丁等役二百八十七名每名工食銀六兩共銀一千七百二十二兩喂馬銀四十八兩廩生一百二十名每名廪餼銀二兩四錢共銀二百八十八兩鋪兵二十一名每名工食銀三兩六錢共銀七十五兩六錢鞭春銀六兩祭祀銀九十二兩嵗共銀二千九百一十三兩七錢六分廣西府知府通判知州二員經歷州同吏目二員教授學正二員訓導三員共俸銀五百八十二兩六錢門皂壯丁等役二百五十三名每名工食銀六兩共銀一千五百一十八兩喂馬銀三十六兩廩生一百名每名廩餼銀二兩四錢共銀二百四十兩鋪兵一十一名每名工食銀三兩六錢共銀三十九兩六錢鞭春銀三兩七錢祭祀銀五十二兩嵗共銀二千四百七十一兩九錢廣南府知府經歷教授訓導共俸銀一百七十六兩五錢二分門皂壯丁等役八十九名每名工食銀六兩共銀五百三十四兩喂馬銀一十二兩廪生三十名每名廩餼銀二兩四錢共銀七十二兩鋪兵九名每名工食銀三兩六錢共銀三十二兩四錢祭祀銀二十六兩嵗共銀八百五十二兩九錢二分元江府知府通判知縣經歷典史巡檢教授教諭訓導二員共俸銀三百七十六兩八分門皂壯丁弓兵等役一百七十一名每名工食銀六兩共銀一千二十六兩喂馬銀二十四兩廩生六十名每名廩餼銀二兩四錢共銀一百四十四兩鋪兵三十名每名工食銀三兩六錢共銀一百八兩鞭春銀縣額二兩祭祀銀七十二兩嵗共銀一千七百五十二兩八分開化府知府同知知縣典史教授訓導共俸銀二百九十三兩四分門皂壯丁等役一百四十五名每名工食銀六兩共銀八百七十兩喂馬銀一十二兩廩生四十名每名廩餼銀二兩