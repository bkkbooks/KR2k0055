body:
  text: 雲南通志卷十三水利水曰潤下自然之性畎澮隄防則聖人因而節宣之以利用厚民生者也滇中自元薩達克齊築陂池以備水旱張立道求泉原得壤地萬頃始興水利矣然萬山奔流而下衝擊沙石時多填淤而又地髙勢迅涸可立待講水利者較他省地形為難而其經營為尤急又安得竟視為山農之區而不與遂溝洫澮同其利耶於是或分濬以殺其洶涌或約束以制其汗漫或相其壅障而排刷之或時其盈縮而蓄泄之鎮斯土者率屬勵翼無逺弗周庶推廣聖天子講求水利粒我蒸民至意後之人按籍而考興廢之由因時而妙通塞之用斯萬世永賴而大庇民乎志水利雲南府昆明縣附郭滇池在城南周圍三百餘里受盤龍江黃龍潭海源寶象河諸水會為巨津土人呼之為海環海田畝資以灌溉者數十萬頃海口大河在城西南八十里泄滇池之水自龍王廟螺殼亂石雞心青魚諸灘至石龍壩而達安寧兩岸皆山各有子河流入濵海州縣即其流入之界各司一河以専責成故有昆陽呈貢晉寧昆明歸化子河等名北則白塔臘龍二箐水於昆陽之洱宗閘入南則瓦泥箐邢家園水於呈貢之普安閘入又羅武箐水於晉寧之清水閘入天自芭蕉二箐水於昆明之新村大閘入雲龍箐水於歸化之平定哨閘入諸水皆橫入大河沙石填壅每雨水暴漲宣泄不及沿海田禾半遭淹沒明𢎞治時巡撫陳金自螺殼灘至青魚灘修濬二十餘里通暢河流定有大修嵗修之例然海口外尚有老埂一道橫阻河身埂外龍王廟前又有牛舌灘牛舌洲各長五十餘丈三重埂塞萬歷初布政使方良曙於牛舌洲左豹子山下竭力疏濬本朝康熙四十八年總督貝和諾巡撫郭瑮委員重加開挖修濬雍正三年總督髙其倬相繼大修未幾復壅雍正八九年總督鄂爾泰會同巡撫張允隨専委水利道副使黃士傑咨度形勢通濬河流剷平老埂牛舌洲灘復以晉寧河水徒急橫阻新河每至倒流並建逼水壩使新河得以暢入大河又於石龍壩下另開引河一道諸水暢流涸出腴田甚廣責成監司丞尉不時查勘疏通題定嵗修銀二百兩松華壩在城東北三十里松華山下元平章賽典赤贍思丁經畫水利乃於此築壩分盤龍江水為金稜河并建盤龍金稜銀稜寶象海源馬料六河諸閘溉田萬頃歷加修濬李本朝康熙五年以來水泛堤決先後巡撫袁懋功天浴疏請嵗支鹽課葺之二十年大兵平滇壩已傾毁二十二年巡撫王繼文會同總督蔡育榮題請捐修歷年相繼疏濬未幾復壅雍正八年總督鄂爾泰會同巡撫張允隨委員分修六河並明通等河及諸壩閘題定嵗修銀八百兩盤龍江在城東源出嵩明州牧羊水南流六十餘里至甸南滙舊邵甸縣龍潭河蜿蜒二十餘里至松華山盤繞於城之東南西三面南入滇池故曰盤龍其支流則自松華壩初分為金稜河至城南分水龍王廟一分為採蓮河再分為永昌河過馬蹄閘折而北行半里東分一渠逆入城濠西分為板壩河半里又分為西壩河至小西門又分為倉後河魚池河其正流南至密灣納金鈴閘瀉水至望城橋又分為揚太金三河以上俱西入草海正流歷南壩晏公廟滙於滇池其蓄泄之閘七王公閘在城南門外小澤口永昌河閘在城南三里土橋外水本朝康熙二十三年利道孔興詔置墮苴閘在城南四里土橋外四道壩閘在城南五里土橋外明𢎞治間置南壩閘在城南十里元薩達克齊建明總兵沐璘巡撫􅬬顒甃石為閘添設巡守西壩閘在城西南五里擺渡村河中小西閘在城小西門外本以上諸閘多有淤圮朝雍正八年疏導深通砌石岸壩閘增開子河新築堤埂金稜河在城東十里俗稱汁河自松華壩分水經金馬山麓繞春登里東鄉至海約六十里兩岸俱石堤盤亙髙大許束水於中分砌涵洞以均引灌其蓄泄之閘八桑園閘在城東八里白龍寺導白龍潭水入河小壩閘在城東十里導楊媽河水由過洞灌小壩村田再本朝康熙二十七年總督范承勳於小壩閘下建一閘三元石閘在城東十里分水為明通河金稜閘在城東南五里佴家灣水盛泄入盤龍江以防堤潰燕尾閘在城南八里南村界分水為西岔河戴金箔閘在城北二十五里桃園村大韓冕閘小韓冕閘俱在城東北十五里任旗營相距百步以上閘岸多有淤圮並本朝雍正八年疏濬添修石岸新開泄水石閘二處銀稜河在城北俗稱銀汁河源出龍泉山黑龍潭由落鎖坡至童子橋蜿蜒二十餘里流過沙浪里南入盤龍江達滇池其蓄泄之閘七文殊寺閘在城西北八里小馬村小營閘在城北八里小營村白龍潭閘在城北十里上莊王俊閘在城北十里馬村後王公堰閘在城北十二里涌泉寺下猓玀閘在城北二十里左衛營大閘在城北二十五里蒜村以上閘堤多有淤圮古本朝雍正八年疏濬子河引水入江并於堆童子橋增髙石路堵禦江水不使漫溢寶象河在城南二十里源有二一自山小龍潭至板橋驛東一自黃龍潭至板橋驛西於明隂寺前合流而西經老崔橋至小板橋又分為三一名官渡河西流十五里入海北分一河名玀西流十五里又北分一河名舊門溪西流三十里俱入海東南田畝咸資分溉其蓄泄之閘六楊柳壩閘在城東十里和甸營矣龍村閘在城東二十里牛舌尖閘在城東二十里小板橋響水閘在城東二十四里過路村下石壩閘在城東二十五里三碗村土橋閘在城東南八里石虎岡年以上閘堤本朝雍正八重經修築海源河在城西二十里一名鴛鴦池源出聚仙山下黃龍潭流經海源寺里許建中左右三閘分受沙河水合流二十里入草海中閘淤塞水從右閘奔注淹損班莊上下田禾清本朝雍正八年疏通中閘水入正流造十字橋騎水上駕渡漲流河尾另立暗洞分渾水出青草湖清水灌田加築沙河堤埂循流建閘導至雞舌尖歸於本河水無旁溢其蓄泄之閘