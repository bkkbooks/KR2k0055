body:
  text: 雲南通志卷十八上秩官附武秩公署使命昔大禹弻成五服咸建五長各迪有功滇於其時為西南荒裔在周則處鎮藩之末王官所設版尹之屬至此益略矣漢唐以來多即其渠率而用之經制闊疏迄乎元明增置官吏漸同中土我朝六合一家加意柔逺慎簡大臣節制撫綏下至州縣吏皆選任賢能周詳訓諭所以阜成兆民使蠻夷率服誕昭一統之治也夫官無大小期于盡職後之涖是土者誠各顧名思義並舉斯篇所載稽其美惡定所從違庶幾無曠厥官克副聖天子委任之意而甘棠遺愛亦永歌於弗替也夫志秩官武秩使命及公署俱附焉宋以前設官員數無考元憲宗五年立萬户府十有九置大理都元帥府世祖至元間置巡行勸農使置行樞密院軍興時設事已則罷置宣慰司有軍事則兼都元帥府又諸路先後置總管府沿邊置宣撫安撫招討司其沿革改設年分可考者俱見建置十年置行中書省於善闡十二年命宣慰司與都元帥府並聽行省節制置郡縣尹長選廉能者任之十九年罷雲南宣慰司二十年置雲南道提刑按察司二十一年罷雲南都元帥府以所管軍民隸行省二十四年罷雲南道按察司二十六年復立按察司二十七年以按察司所治置行御史臺二十九年設廉訪司徙置行御史臺於陜西三十年復立行御史臺於雲南成宗大德二年復罷行御史臺置肅政廉訪司仁宗延祐元年置雲南行省儒學提舉司英宗至治二年置中慶大理兩路推官泰定帝泰定四年置雲南行省檢校官順帝至正四年復立雲南按察司行省置丞相一員平章政事二員右丞二員左丞一員參知政事二員郎中二員員外二員都事二員檢校一員照磨一員架閣管勾一員理問二員副理問二員知事一員提控案牘一員都鎮撫一員副都鎮撫一員宣慰使司都元帥府在大理金齒等處者每府置宣慰使三員同知二員副使二員經歷二員知事二員照磨兼架閣管勾一員在永昌等處者減經歷知事各一員宣慰使兼管軍萬户府在曲靖等路臨安廣西道元江等處者每府置宣慰使三員同知副使各一員經歷一員都事二員照磨兼管勾一員都元帥府置都元帥二員副元帥二員經歷知事各一員元帥府置元帥一員經歷知事各一員宣撫司在麗江路者置宣撫使一員同知副使各二員僉事一員計議經歷知事各一員提控案牘架閣一員在廣南西道者不置副使僉事安撫司置安撫使一員同知副使僉事各一員經歷知事各一員招討司置招討使一員經歷一員諸路萬户府置萬户一員副萬户一員經歷一員知事一員又府屬有鎮撫司上中下所千户副千户上下所百户等員諸路總管府上路置總管一員同知治中判官各一員下路不置治中而同知如治中之秩後置推官上路二員下路一員經歷一員知事一員或二員照磨兼承發架閣一員諸散府置知府或府尹一員同知判官推官知事提控案牘各一員諸州上州曰尹中州下州曰知州雲南皆下州置知州一員同知判官各一員吏目一員諸縣上縣置尹丞簿尉各一員典史二員雲南縣皆中下中縣不置丞下縣置官如中縣事簡之地則以簿兼尉後又别置尉别有印典史一員行省置儒學提舉一員副提舉一員外路置儒學教授一員學正一員學録一員散府置教授一員下州置學正一員其行御史臺置大夫一員中丞二員侍御史二員治書侍御史二員經歷一員都事二員照磨一員架閣管勾一員承發管勾兼獄丞一員肅政廉訪司置廉訪使二員副使二員僉事四員經歷一員知事一員照磨兼管勾一員凡元帥府總管府宣撫司安撫司招討司萬户府千户所府州縣皆有達嚕噶齊一員以蒙古人為之漢人為二其任官之人多無可考明洪武十五年置雲南都指揮使司改雲南行省為布政使司按舊志有安普臨元金滄洱海四分守道以布政司參政參議領之其設立年分無考仍置雲南鹽課司改諸路為府置知府知州知縣等官其後各府州縣升降分合增設裁改俱詳見建置三十年置雲南按察使司按舊志有安普臨元金滄洱海四分巡道以按察司僉事為之其設立年分無考永樂九年置雲南巡按監察御史按舊志有清軍監察御史其設立年分無考正統五年置雲南巡撫都御史自此至景泰間時設時罷成化十二年置臨元瀾滄金騰曲靖四兵備道以按察司副使為之十六年復置雲南巡撫都御史嗣後始常置嘉靖十七年命雲南巡撫兼贊理軍務隆慶四年命雲南巡撫兼理建昌畢節等處軍務萬歷十二年命雲南巡撫兼督川貴兵餉尋改分巡安普道為兵巡安普道天啓二年置川湖廣西雲貴五省總督兼攝貴州巡撫事務駐貴州布政使司置左右布政使各一員分守安普道左參政一員督糧鹽法道分守臨元道督理銀場道右參政各一員分守金滄道左參議一員分守洱海道右參議一員經歷都事照磨檢校理問司獄濟用庫大使副使各一員按察使司置按察使一員清軍道屯田道提學道副使各一員金騰瀾滄臨安曲靖四兵備道副使各一員分巡安普臨元金滄洱海四道僉事各一員按兵備道有布政司參議銜者見師旅考至分守分巡道銜亦前後錯雜不一經歷知事照磨檢校司獄各一員雲南都指揮使司所置員數詳見兵防雲南鹽課司黑白二井各置提舉一員同提舉副提舉吏目巡檢大使各一員其餘諸井或置大使一員諸府置知府一員同知一員通判二員或一員推官一員經歷知事照磨檢校司獄各一員諸州置知州一員州同州判吏目各一員諸縣置知縣一員縣丞主簿典史各一員巡檢驛丞員數不一府各置儒學教授一員訓導一員或二員州各置學正一員訓導一員縣各置教諭一員訓導一員其府州縣自同知州同縣丞以下儒學自教授以下或全置或不全置或先有後裁或先無後設各不等本朝順治十六年置經略督師入滇後事竣罷設置雲貴總督又仍明制置雲南巡撫雲南等處承宣布政使司提刑按察使司分守分巡兵備兵巡督糧驛傳提學諸道鹽課司提舉知府知州知縣等官改都指揮使司為都使司設屯田都司操捕都司及經歷十七年置元江府流官知府康熙三年移元江府通判駐普洱四年裁左右布政止置布政使裁屯田操捕都司置蒙化府掌印同知五年裁府州縣冗官及巡檢驛丞等共一百四十五員六年置開化府流官知府裁各府推官八年改尋甸府知府為尋甸州知州二十年裁安普臨元金滄洱海四分守道置分守永昌道又裁分巡兵備安普臨元金滄道止置糧儲驛鹽提學三道二十六年裁都使司及經歷三十一年置師宗雲州新平定邊元謀五州縣教職三十三年增置曲靖澄江廣西元江開化順寧武定景東八府尋甸建水新興趙州劍川五州昆明宜良河陽楚雄定逺保山六縣儒學訓導三十四年以舊平彝衛地置平彝縣知縣三十七年改北勝州知州為永北府知府巡撫石文晟奏準元江開化廣南廣西四府煙瘴地方知府以下至教雜職等官於本省棟選對品調補三年即升鶴慶順寧永昌永北四府劍川騰越二州極邊地方亦對品調補五年即升尋以教職籍係本省仍還銓選四十一年始以翰林院官提督雲南學政自後欽點無定四十二年置永北府昆陽彌勒陸涼馬龍霑益雲龍六州儒學訓導南寧河陽呈貢雲南江川五縣儒學教諭五十七年移武定府同知駐撒甸雍正元年置麗江府流官知府增設經歷頒雲南府州縣官聖諭各一册二年頒發聖諭廣訓朔望宣講賜督撫司道府州縣等官聖訓各一道二年改威逺土州置流官同知移廣西府通判駐五嶆四年添設威逺經歷抱母按板二井各置鹽課大使及巡檢五年以舊霑益州地置宣威州知州移鶴慶府通判駐維西置劍川州州判駐中甸置鎮沅府流官知府恩樂縣知縣又於東川府附郭置會澤縣知縣總督鄂爾泰巡撫楊名時奏準元江普洱廣西師宗威逺并新改之鎮沅府宣威州恩樂縣等缺本省調補三年俸滿保題升用東川一府并新置會澤縣正雜等缺本省調補或請簡補五年俸滿保題升用開化廣西二府正雜等官廣西分防通判新平知縣祿勸知州麗江知府及經歷鶴慶府分防通判劍川州分防州判黑白二井提舉彌沙阿陋二井大使等缺本省調補或請簡補俱以邊缺升轉鶴慶順寧永北永昌四府劍川騰越雲州三州知州俱照邊俸聽部升轉六年置東川府儒學教授待補則補各設巡檢設東川府經歷駐巧家營會澤縣典史駐者海置烏蒙府流官知府又置通判駐大關并置教授經歷知事司獄等官魯甸及鹽井渡口各置巡檢改鎮雄土府為州置流官知州及學正吏目彝良置州同威信置州判母享置巡檢又以舊米貼地置永善縣知縣及教諭典史移大理府通判駐彌渡命雲貴總督兼節制廣西省七年欽賜督撫提鎮等世祖御製人臣警心録改普洱為府置知府又置同知駐攸樂移通判駐思茅并置經歷鹽大使等官裁開化府通判置附郭文山縣知縣八年欽頒大義覺迷録令各府州縣刋布宣講提督學政自後定例皆以翰林院官為之置師宗州州同駐邱北置分巡迤東道轄雲南曲靖臨安澄江武定廣西廣南元江開化鎮沅東川昭通普洱十三府駐尋甸州改分守永昌道為分巡迤西道轄大理楚雄姚安永昌鶴慶順寧永北麗江蒙化景東十府仍駐大理府頒欽定訓飭府州縣條規九年置昭通府附郭恩安縣知縣置昭通府同知駐大關移通判駐魯甸十年裁曲靖府通判添置元江府通判駐他郎置昆陽州州同駐海口姚州州判駐普淜南安州州判駐舊􅑇嘉縣十三年改雲貴廣西總督仍為雲貴總督總部漢成帝陳立牂牁太守萬年都尉元帝王吉益州刺史王尊益州刺史平帝枚根越巂太守後漢光武文齊益州太守鄭鴻越巂太守繁勝益州太守長貴越巂太守一作任貴明帝鄭純西部都尉遷永昌太守朱黼益州刺史黼一作輔張翕越巂太守章帝王尋永昌太守王阜益州太守阜一作追安帝張喬益州刺史楊竦益州從事張湍翕子越巂太守桓帝曹鸞永昌太守馮灝永昌太守劉安世永昌太守靈帝雍陟益州太守李顒益州太守龎芝益州刺史景毅益州太守張亮則牂牁太守張化永昌太守常員永昌太守沈稚永昌太守黎虎永昌太守以上四人世次夫考三國漢昭烈董和益州太守鄧方朱提太守領庲降都督費詩牂牁太守李恢庲降都督杜良建寧太守常頎益州從事李嚴犍為太守正昻建寧太守張裔建寧太守吕凱永昌功曹後遷雲南太守王伉永昌府丞後遷太守後主諸葛亮丞相領益州牧馬忠牂牁太守後遷庲降都督張翼庲降都督龔祿越巂太守焦璜越巂太守張嶷越巂太守霍弋庲降副都督領永昌太守晉武帝杜軫建寧令鮮于嬰寧州刺史費統寧州刺史李毅南夷校尉後領寧州刺史惠帝杜俊建寧太守雍約朱提太守馬恢建寧太守孫辨永昌從事毛孟寧州治中趙混建寧太守懷帝王遜南夷校尉領寧州刺史李劉毅子朱提太守愍帝雷照平夷太守孟桓南廣太守元帝孟才建寧太守李釗越巂太守王堅遜子南夷校尉領寧州刺史姚嶽寧州禆將嶽一作祟爨琛興古太守爨亮梁水太守亮一作量李逖益州太守逖一作過尹奉寧州刺史成帝楊術朱提太守耿容建寧太守霍彪建寧太守陳楷建寧太守常松益州刺史毛楚牂牁太守鄧嶽都督寧州諸軍事周撫都督寧州諸軍事陶侃都督交廣寧等七州軍事庾翼都督益寧等七州軍事穆帝桓溫都督荆梁等州軍事領護南蠻校尉周楚監益寧二州軍事益州刺史周仕孫寧州刺史後遷監益梁二州軍事謝恕撫夷中郎將加寧州刺史孝武桓豁都督寧益六州軍事桓沖都督益寧等州軍事領護南蠻校尉