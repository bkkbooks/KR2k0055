據河逐戎因言西南夷為害可且罷專力事胸奴帝乃許之王然于柏始昌呂越人以上三人官無考元狩元年博望侯張騫言使大夏時見蜀布邛竹杖問所從來曰從東南身毒國身毒國有蜀物此去蜀不遠今使大夏從羌中險誠通蜀身毒國道便近又無害帝悅使然于始昌越人等十餘輩間出西南夷指求身毒國始至滇元鼎六年復使然于以粵破及誅南夷兵威風諭滇王入朝事詳師旅考司馬遷龍門人郎中元封元年奉使西征巴蜀以南略邛莋昆明還報命王褒蜀郡人諫大夫五鳳三年有方士盛言益州金馬碧雞之神可禱祀而致帝遣褒持節往求之時蠻叛道不通乃就蜀巴郡醮祭移文頌之張匡蜀郡人大中大夫河平二年夜郎王興鉤町王禹漏卧侯俞舉兵相攻遣匡持節解和事詳師旅考唐吉𢎞緯巂州治中武德四年使通南寧諭昆彌內附昆彌因遣使朝貢西洱河一帶復通中國竒嶽將軍貞觀二十二年右武衛將軍梁建方討松外諸蠻遣嶽詣西洱河諭其帥楊威等歸附又約降蠻帥楊盛等事詳師旅考黎敬義中使天寶七載遣持册封南詔閣羅鳳為雲南王崔佐時節度巡官貞元間南詔異牟尋請歸唐西川節度使韋臯護送其使至京帝嘉之賜以詔書命臯遣諜往覘臯令佐時至羊苴咩城時吐蕃使者多在陰戒佐時衣牂牁使者服以入佐時曰我乃唐使者安得從小夷服異牟尋夜迎之設位陳燎佐時即宣天子意異牟尋內畏吐蕃顧左右失色流涕再拜受命使其子閣勸及清平官與佐時盟點蒼山乃發兵攻吐蕃使者殺之刻金契以獻遣使隨佐時入朝袁滋蔡州朗山人工部員外郎貞元間韋臯始招異牟尋內屬帝選郎吏可撫循者皆憚行獨滋不辭帝嘉之擢祠部郎中兼御史中丞賜金紫持節往使成都少尹龎頎副之崔佐時為判官俱文珍為宣慰使劉幽巖為判官册封異牟尋為南詔王滋至太和城異牟尋遣兄蒙細羅勿等以良馬六十迎之金鐫玉珂兵振鐸夾路陳異牟尋金甲蒙虎皮執雙鐸鞘執矛千人衛大象十二引於前騎軍徒軍以次列詰旦授册異牟尋率官屬北面立宣慰使東向册使南向乃讀詔册相者引異牟尋去位跽授册印稽首再拜又授賜服備物退曰開元天寶中曾祖及祖皆蒙册襲王自此五十年貞元皇帝洗痕録功復賜爵命子子孫孫永為唐臣因大會其下享使者出銀手脫馬頭盤二謂滋曰此天寶時先君以鴻臚少鄉宿衛皇帝所賜也有笛工歌女皆垂白示滋曰此先君歸國時皇帝賜胡部龜兹音聲二列今喪亡略盡唯二人故在酒行異牟尋奉觴滋前滋授觴曰南詔當深思祖考成業抱忠竭誠永為西南藩屏使後嗣有以不絶也異牟尋拜曰敢不承使者所命滋還異牟尋遣清平官入謝貢獻尹偕中使貞元十七年西川節度使韋臯會諸道兵大破吐蕃惟南詔攻其腹心俘獲最多帝使偕慰異牟尋事詳師旅考武少儀太常卿元和三年異牟尋死使持節弔祭册封其子尋閣勸李銑少府少監元和十一年南詔勸龍晟為弄楝節度王嵳巔所殺立其弟勸利詔銑為册立弔祭使韋審規京兆少尹長慶三年持節册封南詔豐佑支詳太僕卿咸通十二年南詔酋龍謀攻成都詔詳為和蠻使以緩其兵事詳師旅考韓重金吾將軍咸通十四年南詔坦綽寇邊遣重持節往使諭之徐雲虔節度巡官乾符四年南詔法請修好未幾寇西川節度使髙駢奏請與和親朝議不決嶺南西道節度使辛讜遣雲虔攝使者往覘至善闡法見之引就幄雲虔與法抗禮法不悅使人謂雲虔曰貴牒欲驃信稱臣奉表貢方物驃信已遣人與唐約為兄弟不則舅甥何表貢之有雲虔曰驃信之先由大唐之命得合六詔為一恩德深厚中間乖隔小忿罪在邊鄙今驃信欲修舊好豈可違祖宗故事乎順祖考孝也事大國義也息爭戰仁也審名分禮也四者皆令德可不勉乎法悅設宴禮待授以木夾送還然終不肻奉表稱貢李龜年嗣曹王廣明元年西川節度使陳敬瑄申和親議宰相盧攜等譎説帝許以宗室女為安化長公主婚南詔拜龜年宗正少卿為雲南使大理司直徐雲虔副之內常侍劉光裕為雲南內使霍承錫副之及還具言驃信誠欵後南詔屢遣使來迎公主未行而黃巢平帝東還乃歸其使宋辛怡顯淳化五年李順亂蜀招安使雷有終遣怡顯使大理段素英時蜀順賊與南蠻結連為寇詔募命官士庶通邊事者往黎巂界招撫之故怡顯自薦請行至道元年始迄事而歸後作雲南録獻之元伊埒楚王君侯王鑑以上三人官無考憲宗二年世祖奉命征西南夷次臨洮遣术等三人諭大理不果行三年十一月師渡金沙江復遣木等往使不報及大理平世祖曰城破而我使不出計必死矣訪得三使尸既瘞命姚樞為文祭之劉芳兵部郎中中統二年使大理等國至吐蕃遇害詔恤其家寧端甫侍郎至元四年偕張立道使安南阿嚕德勒官無考至元八年奉敕撫治大理噶瑪拉實哩奇塔特托音劉源以上三人官無考至元十年奉詔使𬗟國諭遣子弟近臣來朝拜達勒右丞至元十九年詔同雲南諸路行中書省參知政事信苴日迎雲南征緬之師濟伯格官無考至元二十二年詔考核雲南行省瑪蘇庫阿薩爾官無考至元二十八年詔乘傳詣雲南捕黑虎伊濟台巴哈至元二十九年使緬國詔令遙授左丞廷議以尚書行使事其副以郎中處之卾爾多官無考泰定元年雲南車里蠻為寇奉詔招諭之其酋寒賽子尼面雁構木子刁零出降伊埒穆爾丹布延實哩以上二人官無考泰定二年大理諸蠻為寇雲南行省請出師不允遣馬丹等使大理實立等使威楚招諭之諾海都事欒智鎮撫至順二年同那海奉詔往諭烏蒙叛酋祿余祿余拒不受俄而賊大至那海復就陳前宣詔招之遂遇害明王禕浙江義烏人師元學士黃縉隱居青巖山中著書會太祖取婺徵至行在署中書省掾時商略機務悉契上衷語必稱其字而不名歷官翰林待制與宋濓同典機密掌制誥上嘗曰浙東有二大儒卿與宋濓耳學問之博卿不如濓才思之雄濓不如卿洪武五年春正月命禕偕蘇成詔諭雲南禕既奉命不少辭即日欣然就道以六月至雲南見梁王君臣禕諭之曰大明創業統一萬方爾僻在西南未被聲教特遣使者來諭急宜奉版圖歸職方不聼館别室禕又言曰朝廷軫念雲南黎庶不忍殱於鋒刃故令開諭若拒不服必奉行天討王曰漢閉昆明使使莫通唐勤遠略祗以自憊天兵雖多恐無所用之禕曰王未聞乎陳友諒據楚張士誠據吳陳友定據閩明玉珍據蜀彼皆重關峻嶺長江大塹率膏斧鑕維爾元君北走以死庫庫特穆爾輩賣降恐後往事俱在今王自度謀勇孰愈誠諒兵強地廣孰愈中國量德較義孰愈天朝推亡固存孰愈天命王曰先生言是也會元之後有自立於朔漠者遣使托克托索餉欲連兵以拒迫梁王殺禕王不忍匿禕民間脫脫聞之誚讓益甚王不得已出禕見脫脫禕慷慨言曰天既訖汝元命我皇上實代之汝爝火餘燼乃與日月爭光乎我豈畏死耶脫脫厲聲詈梁王或曰兩國交爭不罪來使况王公文行天下無雙宜有以全之脫脫曰今雖孔聖不可存梁王不能救遂殺禕時六年十二月二十四也卒年五十有二聞者莫不流涕梁王遣司徒達爾瑪致祭具棺衾殮之二十二年贈翰林學士奉議大夫諡文節正統間改忠文成化間賜祭立祠命有司春秋致祭巴拜故元威順王子洪武七年齎詔諭梁王吳雲江南宜興人以能詩授校書郎改渭南縣丞升刑部郎中尋升尚書改湖廣參知政事先是上遣王禕詔諭雲南遇害特遣雲齎敕往諭時梁王遣其臣鐵知院等二十人報使北漠為大軍所獲送京師上釋之與雲偕行至雲南沙塘口鐵知院等令雲胡服辨髮改制書詐為元使共紿梁王雲責以大義矢死不回鐵知院知不可奪遂殺之梁王聞之遣人具棺槨殮雲於給孤寺𢎞治間贈刑部尚書諡忠節與王禕同祀賜額曰二忠有司春秋致祭李思聰湖廣桂陽人行人司行人錢古訓浙江餘姚人行人司行人洪武二十九年緬甸為夷僰侵其境遣使入訴太祖命思聰等二人齎詔往諭思倫聞詔恐懼俯伏謝罪願罷兵適部長刁幹孟率其部衆叛思聰等以朝廷威德諭之叛者稍退思倫欲以使者脅服其衆因留思聰等餽以象馬金寶等物思聰等作書卻之言中國不以象馬金寶為貴以忠臣烈士孝子順孫為珍宜恭送使者回朝斯可以明爾忠順思倫邀思聰等設宴欵待率部衆送之境上思聰等還具奏其事且著百夷傳記述其山川人物風俗道路之詳以進太祖嘉之各賜衣一襲張洪常熟人行人司行人永樂間緬甸那羅塔殺孟養宣慰刁木旦并其地命洪齎詔諭緬甸退還侵地羅塔不服凡六往返始聼命羅塔始欲置毒服其誠信乃已周讓給事中永樂間奉使古剌數月至其地其酋率下備象馬舟艦來迎咸喜愕以手加額曰使者從天下也後遣使同讓入貢請吏上錫以冠帶印綬授為古剌宣慰使劉傑兵科給事中永樂十三年駐節大理府繕造軍器綜理微密操場陳法皆其所定楊寧刑部主事正統三年麓川土司思任反掠騰衝南甸取孟養地遣寧往諭之不服事詳師旅考杜隰華亭人正統間麓川未下議遣使宣諭難其人有薦隰者召對賜襲衣囊藥力士重譯為介以行至則詣其不庭卒以其人入貢上嘉奬升禮科給事中以疾辭王純太康人浙江參政正統間持節撫慰麓川平𬗟宣慰司贈遺金貝固卻不受還晉浙江右布政使江盈科桃源人進士萬歷間奉命恤刑雲南至鶴慶獄中無甚重辟半係逋課者以北衙礦課日增遴饒戶辦其役往往貨産鬻孥亦不能償逮斃者無算科惻然曰余奉命欽恤將死者生之豈此生者忍視其死也恤刑莫先恤此力爭之當事當事難之科乃特疏請罷報可窮簷多所全活郡人德之祠於序左樊瑩浙江人刑部侍郎𢎞治十八年奉使旅雲南山川考察文武官罷黜一千二百餘員皆征麓川濫授者按歷代使命甚多今惟據各史所載名氏可稽者具列於左本朝能圖滿洲人刑部尚書麻勒吉滿洲人學士順治十六年同命入滇查釋難民蘇納海滿洲人戶部尚書順治十六年奉命入滇撥沐氏勳莊給吳三桂馬爾吉滿洲人祕書院學士康熙元年齎送平西親王册寶沙爾圖滿洲人戶部侍郎多諾滿洲人𢎞文院學士以上二人康熙六年奉命諭吳三桂會議節省錢糧折爾肻滿洲人吏部侍郎傅逹禮滿洲人學士黨物禮滿洲人郎中沙木哈滿洲人郎中王新命奉天人郎中以上五人俱於康熙十二年奉命入滇催移吳三桂家屬回京并沿途豫備夫糧佛倫滿洲人內閣學士金鋐直𨽻宛平人侍郎康熙二十年同奉命至滇總理軍需額爾黑圖蒙古人戶部郎中康熙二十年奉命由四川建昌一路催兵入滇督辦軍糧宋俄岱滿洲人禮部主事康熙二十一年齎送御書清慎勤三字至滇賜督撫懸挂庫勒納滿洲人兵部左侍郎康熙二十二年奉命赴滇查議土司世職徐炯江南崑山人行人司行人康熙二十六年齎恩詔至滇杜冷格滿洲人侍衛康熙四十二年齎送御書育材匾額懸昆明書院滄江之鐵索橋御書飛虹彼岸匾額懸挂瀾瓦哈立滿洲人王府長史兼禮部郎中康熙五十二年奉命赴滇賞兵布爾賽滿洲人監視武英殿英柱滿洲人護軍參領郎烏里滿洲人郎中雙德滿洲人監副以上四人康熙五十三年奉命至滇偕西洋人費隱單爻占繪圖文量嚮道乃哥滿洲人理藩院官覺羅殷泰滿洲人十四年同奉康熙五命至滇以八表儀器測日影髙下雲南北極髙二十四度強和里滿洲人都統康熙五十七年同參領滿丕鄂彌逹等奉命赴滇會同總督提督巡視金沙江要口傅紳滿洲人吏部左侍郎康熙五十九年奉命赴滇賞進藏官兵杭奕祿滿洲人都察院左副都御史任蘭枝江南溧陽人內閣學