body:
  text: 題為纂修雲南省志成稿謹奉表恭進者臣等誠惶誠恐稽首頓首上言伏以聖治覃敷萬國慶車書之會帝光逺被八方騰奎璧之輝採志乘於遐陬遍覽民風土俗集圖書於袐府彚成寶籙瑤函蓋功德既邁帝而超王則著述宜信今而傳後永志方輿之勝聿彰逺大之模謹輯新編恭呈御覽竊惟南交昧谷宅平秩於堯封黑水梁州奏隨刋於禹貢産里來王景亳濮人大會孟津雖屬僻處之邊隅久載古來之簡䇿逮楚蹻略地而後漢武置郡以還風氣漸開載籍略備書傳益部昉自東京記號南中等諸逸史樊綽之屬辭紀事李京之問俗辨方皆隨漁獵為見聞僅存什一於千百即包劉合撰亦多前後抵牾楊李遺篇未免參差缺略欣逄盛世著有成書事既信而足徴詞皆典而可則然歷年已久增郡亦多治與道同政因俗易凡山川疆域之勢經畫規制之詳必考訂之無訛庶參稽之有藉仰惟我世宗憲皇帝德合兩儀智周萬物聲名施及蠻貊存神過化基治平於億萬斯年覆載莫不尊親異俗殊方頌懷柔者千八百國卉衣椎結之衆咸被服乎詩書刀耕火種之鄉胥咏歌夫樂利干羽列虞廷之舞梯航繪周室之圖特沛綸音增修省志是用尅期開局因而案部分編次第成書參詳授梓欽惟我皇上學本性成聖由天縱纘丕顯丕承之緒仁風披拂咸歌至治馨香迓寖昌寖熾之庥化日舒長共慶太和翔洽當聖德維新之日適滇志告成之時體裁原本於舊函事迹博稽夫羣論藝文首宸翰倬雲漢以為章制作紀皇謨與日星而並麗列輿圖以便觀覽記經費以謹度支通水利以重農功核積貯以裕國計略於前志增在今編至於山川賦役人物秩官悉綱舉而目從亦門分而類别紀地則蒙蕃交緬壤接六詔之區占星則井鬼參狼野分兩迤之域問南方之珍異百昌暢茂寧僅蒟醬橦花遵王路之蕩平九折坦夷非復蛇盤頳木安內攘外尤謹兵防展土籌邊先詳建置收軼事於九隆十瞼疆戎索於六慰三宣總三十卷朗若列眉舉數千里瞭如指掌既開雕以成帙敬裝繕而進呈臣等學識空疏見聞寡陋生逄景運喜一道而同風職任總裁敢遠稽而近考雖辨而不華質而不俚有愧著作之三長然言以足志文以足言勉竭芻蕘之一得伏願柔遠能邇彰往察來披圖成聚米之觀銅柱鐵橋鞏河山於永固展卷仰同文之治碧雞金馬瞻雲日於常新樂熙皥而頌升平非徒慶土宇版章之盛沭生成而沾化育咸永為日用飲食之民矣臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞雲南通志修輯職名總裁參閲提督雲南學政翰林院編修原任雲南道監察御史臣吳延熙日講官起居注提督雲南學政翰林院侍讀加二級臣吳應枚監修雲南等處承宣布政使司布政使加一級紀録一次臣陳𢎞謀雲南等處提刑按察使司按察使加三級紀録五次臣徐嘉賔提調署理雲南分巡迤東道加一級紀録二次臣王廷琬雲南分巡迤西道按察使司副使加二級臣雷之瑜董理署雲南府印務開化府知府臣宫爾勸雲南府知府臣儲之盤纂修翰林院庶吉士原署姚州知州臣靖道謨分修和曲州知州臣徐修仁雲龍州知州臣徐本遷平彝縣知縣今署劍川州知州臣髙為阜原署江川縣知縣臣蔣斆淳署平彝縣知縣臣李本漋署河陽縣知縣臣蔣雯原任貴州普安州知州臣金灝原任浙江遂安縣知縣臣何其偉原任湖廣黃安縣知縣臣張宗臨安府儒學教授臣夏冕麗江府儒學教授臣萬咸燕署鶴慶府儒學教授臣趙淳羅次縣儒學訓導臣李可栻江南宣城縣生員臣梅瑑成校對署富民縣知縣臣尹祖伊學習進士臣李作梅元江府儒學教授臣楊薰宜良縣儒學教授臣程雲路易門縣舉人臣趙正紀尋甸州舉人臣余其祥通海縣舉人臣董繼舒姚安府經歷臣徐起元監刻原署江川縣知縣臣蔣斆淳學習進士臣李作梅姚安府經歷臣徐起元雲南通志凡例一舊志成於康熙三十年體裁義例雖已詳備但厯今四十餘年國家重熙纍洽制度日新舊志中有宜增入者亦有可兼括者斟酌繁簡共成三十卷非敢求異前人總欲期於允當也一志必首圖舊矣以全省之山川繪於尺幅恐不能條分縷晰毫髮無遺憾也圖宜繫以説郡治之山自何處與省治分支州縣治之山自何處與郡治分支郡治與州縣治之山有與外省外郡犬牙相入者悉著明之庶就説考圖數千里之疆域形勢瞭如指掌矣舊志缺然今為增入一舊志有大事考中間所志不外建置學校田賦兵防諸事若本志不載則原委不清若兩處俱載則辭義多復今將考內事迹分别載入諸志中使各從其類以免煩復之失一疆域山川編次略異舊例舊以郵傳附於疆域關哨津梁附於山川然山川乃天地自然之位置關津則王者慎固封守利用前民之制度人之所為與天之所設不同至於郵傳以通達道路與關津一例故周禮掌節一官與司門司關俱掌於司徒而形方氏掌邦國之地域而正其封疆者則隸於司馬今以關哨郵傳津梁俱移附城池從其類也一山川分類原以大小為序故水之類首江次河次海次湖次川次溪次澗次池池之後於諸水以其不過一勺與沼沚相類若今之滇池志稱周三百里古以名國實為全省巨浸今泥於池之名列之溪澗之下其支流之稱江稱河者反居其上於義未安按現修一統志例五嶽四瀆列山川之前不以類敘亦不論方向滇池應倣此例其餘仍各以類從一學校從前志書俱以文廟屬於祠祀舊志獨改列學校今自世宗憲皇帝加封先聖五代崇儒重道曠古獨隆不與社稷山川祠祀並列誠為允協丁祭禮樂前志因總督范承勳繕製始悉行繪圗詳注第通志原以志一省之事數十年來郡邑課程秩官諸項各有增益紀載繁多文廟禮樂乃天下所同宜從裁減其繕製所自始仍當志之一兩稅之外物土之宜以裕國用皆謂課程為目有四鹽法錢法稅課厰課舊志附課程於鹽法似於綱目未清故今以課程為綱鹽法為課程之目一賦役課程以綜財用之入經費以紀財用之出積貯以備軍國緩急之需匪頒有式發斂以時經國之逺謨也爰將經費積貯各成一志補前志之所未及焉一閘壩堰塘舊附城池然滇省地勢山崇水迅土田髙仰水之為利者什九害者什一修築濬導之有方可全利而無害今且設官專理迤東西兩監司及州縣佐治官各兼管水利誠百世永賴也應以水利另為一志一太守表率一郡牧令職在親民聖主引見必詳為訓諭誠重其選也前志秩官紀名至監司而止今增入本朝府州縣俾姓氏昭然耳目庶後之觀者孰賢孰否觸目警心實寓勸懲之道一使命師命舊附封建志謂其功在邊陲與帶礪之盟同為不朽故得並列按使命中如常頞唐蒙諸人開道荒徼諭降諸夷謂與帶礪同可也若尋常皇華之使與茅土之封並列未免不倫今將使命一條移附秩官之後至師命諸人於師旅考中已經悉見略無遺漏此條竟可不設一古者入為卿士出總元戎文德武功交相為用厥後牧民之長與詰戎之師雖有分途然受官天朝奔走率職其義一也舊志附武秩官於兵防之後似非文武一體之義今改附文秩官後其兵防則附以師旅考庶厯代安內攘外之謀窮兵黷武之害俱可考鑒其得失焉一凡賢士大夫之生長其地者謂之人物自從祀學校之鄉賢外其有宦迹炳著及忠孝文學之士名聞鄉里而潛德幽光尚未獲表章者要皆人物之選也今合舊志鄉賢孝義隱逸增入忠烈宦迹文學統為人物志一方技舊附隱逸然巢父老萊究不可與越人唐舉同傳改附於仙釋非惟見出世之學足以齊名三教即大道之支流餘裔茍精其業皆能有述於世焉一各省通志藝文之後列雜異一門亦倣史家紀表志傳之外别有載記附録之例但事雖雜然繁陳必各以類從方有條而不紊舊志於蒙段楊趙諸姓之割據青神谷女壁龍金索之幻怪錯雜紀載殊無倫次今約略以殊方軼事異迹遺文别為四目庶少有條理欽定四庫全書史部十一雲南通志目録地理類三都會郡縣之屬卷一圗説卷二星野氣候附卷三山川卷四建置卷五疆域形勢附卷六城池關哨郵傳津梁附卷七學校書院義學書籍附卷八風俗卷九户口卷十田賦卷十一課程卷十二經費賞恤附卷十三水利卷十四積貯卷十五祠祀寺觀附卷十六上下兵防師旅考附卷十七封建卷十八上之二下之一下秩官一秩官二武秩使命公署附卷十九名宦忠烈附卷二十上下中選舉一選舉二武科辟薦附卷二十一上下人物一人物二卷二十二列女卷二十三流寓卷二十四土司種人附卷二十五仙釋方技附卷二十六古迹冢墓附卷二十七物産卷二十八祥異卷二十九藝文一藝文二藝文三藝文四藝文五藝文六藝文七藝文八藝文九藝文十藝文十一藝文十二藝文十三藝文十四卷三十雜記欽定四庫全書雲南通志提要臣等謹案雲南通志三十卷國朝大學士鄂爾泰等監修雲南在漢本屬益州後為南詔所據至元代始入版籍其有地志則始見于唐然傳于今者僅有樊綽之蠻書所紀皆六詔山川歷年既久舊迹多湮證之於今相合者十無一二明史藝文志載太祖初平雲南詔儒臣考定為志書六十一卷今已散佚他如楊慎之滇程記滇載記諸書掇拾成篇不免挂一漏萬謝肇浙所注滇略號為善本然所述止于明代本朝康熙三十年始草創通志稍具規模猶多舛略雍正七年鄂爾泰總督雲貴奉詔纂輯乃屬姚州知州靖道謨因舊志增修凡為門三十門為一卷乾隆元年書成後任總督尹繼善等具表上之其間視舊志增併不一如圖之有説及府州縣題名皆補舊志之所無大事考使命師命諸目舊志所有而冗復失當者則刪去之又課程原附鹽法閘壩堰塘原附城池今皆别自為門綱領粲然視原本頗有較理焉乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
