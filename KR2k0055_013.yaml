body:
  text: 欽定四庫全書雲南通志卷十四積貯為治之本在於重農足食之方莫先積穀古者耕九餘三有備無患雖遇歉歲民無饑色若臨時而圖補救則往往無及矣故積貯者天下之大命也矧滇中山多田少舟楫不通不能望轉輸於他路未雨綢繆之計尤宜急焉國家稽古定制郡縣貯穀常平每年存七糶三責成於有司行之久矣復厪世宗憲皇帝睿慮酌行古社倉法春貸秋斂社立長副以主其事官無私焉可不謂法良意美矣乎惟良司牧實力奉行擇里社之誠信而亷幹者任之官不得藉稽察之名以恣侵漁豪右不得規收發之柄以滋蠧弊庻幾有贏無耗民食永資所謂有治法尤賴有治人也至歲徴本色任土作貢者已具田賦兹不載志積貯元世祖至元六年始立常平倉於路府豐年米賤官為増價糴之歉年米貴官為減價糶之立義倉於鄉社社置一倉以社長主之豐年每親丁納米五斗驅丁二斗無粟聽納雜色歉年就給社民八年詔以和糴倉糧貯常平倉二十三年詔以鐵課糴糧充常平倉武宗至大二年詔府州縣設立常平倉以權穀價泰定帝泰定二年勅有司治義倉以救荒書頒州縣文宗天厯二年命所在置常平倉備荒明洪武十八年令天下有司凡遇歲饑先發倉穀賑貸然後具奏正統五年令各處預備倉凡民人自願納米麥細糧一千石之上雜糧二千石之上請勅奬諭六年詔預備倉民有饑窘即時驗實賑濟七年令布政司凡預備倉糧給借饑民每米一石候有收之年折納稻穀二石五斗還官又令各府州縣變賣贓罰入官之物糴糧備賑成化九年定吏典納米預備倉給賞格𢎞治十年令以無礙官錢糴米貯預備倉十八年令各府州縣贓罰贖罪等物折糴稻穀入預備倉正徳二年令雲南撫按同三司掌印等官查勘各庫藏所積除軍前支用銀物外其餘堪以變賣及官地湖池等項可以召人佃種收租者儘數設法糴買米穀上倉專備賑濟又議准凡問刑衙門有例該納米者每石折穀一石五斗收貯各預備倉七年令人犯贖罪紙劄許折穀米上倉嘉靖三年令各處撫按官督該司處置預備倉以積穀多少為考績殿最四年令撫按官翻刋積穀備荒過事宜發所屬檢閲收過穀石實數并令於春季奏報六年令撫按官督有司倣常平法積穀救荒八年令各府州縣積穀備荒行義倉法令本土人民各二三十家約為一㑹每㑹共推家道殷實素有徳行一人為社首處事公平一人為社正㑹書算一人為社副每朔望一㑹分别等第上等之家出米四斗中等二斗下等一斗每斗加耗五合入倉上等者主之但遇荒年上户量貸豐年照數還倉下户酌量賑給不復還倉府州縣造册送撫按每年查算一次若虚即罰社首出一年之米二十四年令罪人有力者納米入預備倉萬厯五年令撫按酌定地方難易為積穀等差年終分别多寡定有司賞罰八年令撫按奏報積穀實數并勅有司不許妄行苛罰本朝順治十七年議准常平倉穀春夏出糶秋冬糴還平價生息務期便民如遇㐫荒即按數給散災户貧民有司實力奉行十八年議准捐輸賑荒見任官員鄉紳願納米一千石或銀一千兩以上者加級納米一千石銀一千兩以下至米一百石銀一百兩以上者分别紀錄商民納米五十石銀五十兩者給匾旌奬納米一百石銀一百兩者給九品頂帶納數多者遞加職銜生員俊秀准納米入監讀書康熙十八年令地方官整理常平倉每歲秋收勸諭官紳士民捐輸米穀照例議叙鄉村立社倉鎮店立義倉捐輸積貯公舉本鄉敦重善良之人管理出陳入新春月借貸秋收償還每石取息一斗年終州縣將數目呈詳上司報部管倉人儲穀繁多題明給頂帶榮身有官吏掊克者照侵欺正糧例處分有强派抑勒借端擾民者該督撫題叅治罪十九年令直省常平倉穀畱本地備賑義社倉穀畱本村備賑永停協解外郡二十一年令雲貴總督蔡毓榮於滇南酌定各款捐輸米十餘萬石分貯兩迤郡縣每歲出陳易新遇有征調本省額糧未敷則酌動以濟兵年饑則平糶以濟民更將事例定為銀米兼輸米以備積貯之需銀以供修城之用二十五年巡撫王繼文奏准雲南孤貧口糧歲發常平倉捐穀賑恤二十九年上諭常平等倉積穀關係𦂳要見今某省實心奉行某省奉行不力着再行各該督撫確查具奏嗣後直省總督巡撫及司道府㕔州縣官員務宜確遵屢次諭㫖切實奉行如有仍前玩愒茍圖塞責漫無積貯者將該管官員總督巡撫一并從重治罪三十年定土司延誤公事者照流官罰俸例罰米備賑三十一年詔各該地方官勸諭百姓比户量力共相樂輸州縣官將捐助者姓名與米數註册其春夏乏食者貸與之至秋照數收入四十五年覆准總督貝和諾以滇省舟楫不通常平倉積貯較之别省尤為𦂳要自康熙二十九年春季起至四十二年春季止通共捐過監生并各官捐納紀録穀三十二萬七千三百二十石自四十二年四月暫行停止令往陜西甘屬地方捐納迄今三年滇省赴甘屬捐納監生者止有六名彼此無益令雲南常平倉仍照例本省捐納雍正二年詔行便民社倉將常平倉捐輸穀石自雍正二年為始改為社倉仍令糧道專管彚造總册每於年終詳報題達一次三年上以南北各省秋成大熟因諭督撫轉飭所屬有司宜乗豐年力行社倉之法十一年上諭各省州縣設立社倉原以便民濟用若遇應行借給之處該州縣官一面申詳上司一面即速舉行雲南糧儲道實貯各府州縣鹽井歴年社倉穀麥荍稗青稞共六萬九千九百九石四斗六升二合零實貯各府州縣鹽井歴年捐納捐輸罰俸降罰學租捐買米穀麥荍稗豆共四十二萬八千六百三十八石二斗一合零雲南府實貯捐納穀一萬石又存道款捐買米一千五百五十石昆明縣實貯歴年社倉穀六千二十石九斗八升六合捐納捐輸米穀一萬六千四百八十六石五斗七合又存道款捐買米三千四百五十石富民縣實貯歴年社倉穀六百九十一石四斗六合捐納捐輸穀四千三百二十八石八斗四升宜良縣實貯歴年社倉穀一千九百四十七石四斗八升捐納捐輸穀二千八百一十八石二升五合羅次縣實貯歴年社倉穀四百六十三石七斗四升五合捐納捐輸穀五千一百九十四石九斗二升晉寧州實貯歴年社倉穀二千五百三十三石五斗捐納捐輸穀六千二百石二斗四升呈貢縣實貯歴年社倉穀七百八十七石四斗九升捐納捐輸穀三千三百三十四石二斗八升安寧州實貯歴年社倉穀七百二十七石三斗七升捐納捐輸穀三千七百四十一石一斗九合禄豐縣實貯歴年社倉穀一千二百九十五石六斗八升三合零捐納捐輸穀四千四百六十八石一斗二升昆陽縣實貯歴年社倉穀一千七石九斗三升捐納捐輸穀四千四百二十石二斗九升易門縣實貯歴年社倉穀七百二十七石四斗八升捐納捐輸穀四千五百九十一石六斗三升三合零嵩明州實貯歴年社倉穀一千三百七十八石六斗捐納捐輸穀五千八百三十八石一斗二升曲靖府實貯捐納捐輸穀荍六千九百一十九石五斗八升南寧縣實貯歴年社倉穀五百七十四石九斗七升捐納捐輸穀五百五十七石七斗三升霑益州實貯歴年社倉穀二百二十石四斗捐納捐輸穀二千六百四十一石一斗一升五合陸凉州實貯歴年社倉穀二千三百四十四石五斗九升八合捐納捐輸穀麥荍四千六十一石三斗一升馬龍州實貯歴年社倉穀一百八十七石二斗捐納捐輸穀三千九百一十石四斗六升二合羅平州實貯歴年社倉穀五百二十七石九斗五升五合零捐納捐輸穀米五千一百五十石七斗九升尋甸州實貯歴年社倉穀一千一百一十五石一斗二升捐納捐輸穀四千一百七十九石九斗九升六合平彞縣實貯歴年社倉穀六百九石三斗八升捐輸穀五十二石一斗一升宣威州實貯歴年社倉穀二百四十石二斗四升一合零捐納穀二千七百五十石四斗五升五合臨安府實貯捐納捐輸穀五千一百七十九石七斗建水州實貯歴年社倉穀七百三十石五斗捐納捐輸穀一千一十石一斗四升石屏州實貯歴年社倉穀四百六十三石五升五合捐納捐輸穀四千六百三十五石九斗六升阿迷州實貯歴年社倉穀二千一百九十六石二斗四升捐納捐輸穀麥七千三百八石六斗一升三合寧州實貯歴年社倉穀三百七十一石六斗七升五合捐納捐輸穀四千一百一十一石三斗九升通海縣實貯歴年社倉穀五百一十五石捐納捐輸穀四千七十八石一斗三升河西縣實貯歴年社倉穀四百七十三石七斗三合零捐納捐輸穀四千九十二石二斗九升㠄峩縣實貯歴年社倉穀三百六十五石七斗八升捐納捐輸穀四千二百二十四石八斗八升䝉自縣實貯歴年社倉穀六百九十一石六斗四升九合四勺捐納捐輸穀四千六百九十二石二斗澂江府河陽縣實貯歴年社倉穀一千一百七十三石八斗九升捐納捐輸穀三千五百二十七石五升五合江川縣實貯歴年社倉穀四百五十五石四斗九升二合捐納捐輸穀豆四千七十六石三斗九升新興州實貯歴年社倉穀荍一千九百八十九石八斗五升九合捐納捐輸穀六千三百六十四石四斗路南州實貯歴年社倉穀一千二十四石捐納捐輸穀四千二百七十九石八斗六升武定府實貯捐納捐輸穀三千六百九十石三斗和曲州實貯歴年社倉穀三百九十石九斗五升捐納捐輸穀稗四千三百七十一石一斗三升九合元謀縣實貯歴年社倉穀一千二百三十三石一斗二升捐納捐輸穀六千一百七十一石二斗二升禄勸州實貯歴年社倉穀三百八十三石六升八合零捐納捐輸穀四千九百一十一石三斗三升廣西府實貯歴年社倉穀荍九百四石九斗六升捐納捐輸米穀七千八百八十二石師宗州實貯歴年社倉穀荍五百七石七斗捐納捐輸穀荍四千八百三十四石五斗九升彌勒州實貯歴年社倉穀八百四十九石六斗七升捐納捐輸穀五千二十六石五斗六升五合廣南府實貯歴年社倉穀九百六十三石六升零捐納捐輸穀八千一百八十二石六斗廣南營實貯歴年社倉穀四百三十五石四斗元江府實貯歴年社倉穀一千九百五十七石九斗六升捐納捐輸穀六千一百九十二石五斗二升五合新平縣實貯歴年社倉穀二百四十四石九斗捐納捐輸穀一千五百四石五斗九升開化府文山縣實貯歴年社倉穀一千六百石五斗九升捐納捐輸穀一萬二千一百六十五石六斗四升鎮沅府實貯歴年社倉穀二百五石四斗五升捐輸穀荍二百六十五石恩樂縣實貯歴年社倉穀一百二十八石八斗捐輸穀荍稗二百四十二石威逺實貯歴年社倉穀一百五十四石三斗九升東川府㑹澤縣實貯捐納穀七千二百四十七石普洱府實貯歴年社倉穀九百七十六石四斗三升九合零捐輸罰俸米穀一千一百一十六石八斗五升大理府實貯捐納捐輸穀六千二百一十三石九斗太和縣實貯歴年社倉穀九百三十五石九斗一升三合捐納捐輸穀六千四百二十石六斗二升趙州實貯歴年社倉穀九百七十二石四斗捐納捐輸穀六千七百五十石五斗六升雲南縣實貯歴年社倉穀一千六百五十四石一斗三升捐納捐輸穀六千九百一十四石三斗七升鄧川州實貯歴年社倉穀三百八十四石捐納捐輸穀三千三百三十九石五斗四升浪穹縣實貯歴年社倉穀四百三十五石三斗五升捐納捐輸穀二千九百四十二石七斗二升賓川州實貯歴年社倉穀三百七十九石一斗五升捐納捐輸穀六千八百五十五石五斗一升雲龍州實貯歴年社倉穀五百一十三石九斗八升捐納捐輸穀四千三百七十五石八斗楚雄